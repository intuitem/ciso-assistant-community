name: CI - zizmor

on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install zizmor
        shell: bash
        run: |
          set -euo pipefail
          cargo install zizmor --locked
      - name: Run zizmor and fail only on template-injection
        shell: bash
        run: |
          set -euo pipefail
          out="$(zizmor --no-online-audits --format github .github/workflows)" || exit_code=$? || exit_code=$?
          if [[ ${exit_code:-0} -ge 15 ]] || [[ ${exit_code:-0} -le 9 && ${exit_code:-0} -ne 0 ]]; then
            echo "$out"
            echo "zizmor execution failed with exit code ${exit_code:-0}"
            exit 1
          fi
          echo "$out"

          if echo "$out" | grep -q "title=template-injection"; then
            echo "template-injection found -> failing"
            exit 1
          fi

          echo "OK: no template-injection findings."