name: Startup Tests
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]
    paths:
      - "backend/**"
      - "frontend/**"
      - "enterprise/**"
      - "docker-compose-build.yml"
      - ".github/workflows/startup-tests.yml"
  workflow_dispatch:

# Cancel older in-progress runs for the same PR or the same ref (branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  GITHUB_WORKFLOW: github_actions
  backend-directory: ./backend
  frontend-directory: ./frontend
  enterprise-backend-directory: ./enterprise/backend
  enterprise-frontend-directory: ./enterprise/frontend
  enterprise-frontend-build-directory: ./enterprise/frontend/.build/frontend
  enterprise-backend-settings-module: enterprise_core.settings
  POSTGRES_VERSION: "16"
  UBUNTU_VERSION: "ubuntu-24.04"
  PYTHON_VERSION: "3.14"

jobs:
  startup-functional-test:
    runs-on: ubuntu-24.04
    env:
      LOG_LEVEL: DEBUG
      LOG_OUTFILE: ciso-assistant.log
      DJANGO_DEBUG: "True"
      DJANGO_SUPERUSER_EMAIL: admin@tests.com
      DJANGO_SUPERUSER_PASSWORD: 1234
      POSTGRES_NAME: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DB_HOST: localhost
      CISO_ASSISTANT_SUPERUSER_EMAIL: ""
      CISO_ASSISTANT_URL: http://localhost:4173
      PUBLIC_BACKEND_API_URL: http://localhost:8000/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv and set up python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Check uv version
        run: uv --version
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Cache Virtualenv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.backend-directory }}/.venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('backend/uv.lock') }}
      - name: Install backend requirements
        working-directory: ${{ env.backend-directory }}
        run: uv sync --locked
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10
      - name: Install frontend dependencies
        working-directory: ${{ env.frontend-directory }}
        run: pnpm i --frozen-lockfile
      - name: Get installed Playwright version
        working-directory: ${{ env.frontend-directory }}
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"
      - name: Cache playwright binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - name: Install Playwright Browsers
        working-directory: ${{ env.frontend-directory }}
        timeout-minutes: 32
        run: |
          for attempt in 1 2 3; do
            if timeout 600 pnpm exec playwright install; then
              exit 0
            fi
            echo "::warning::Playwright install attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1
      - name: Run migrations
        working-directory: ${{ env.backend-directory }}
        run: uv run python manage.py migrate
      - name: Start test server
        working-directory: ${{ env.backend-directory }}
        run: |
          uv run python manage.py createsuperuser --noinput
          nohup uv run python manage.py runserver &
      - name: Build frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=10240"
        working-directory: ${{ env.frontend-directory }}
        run: pnpm run build
      - name: Run tests
        working-directory: ${{ env.frontend-directory }}
        run: pnpm exec playwright test tests/functional/startup.test.ts
      - name: Set current date as env variable
        if: ${{ !cancelled() }}
        run: echo "NOW=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_ENV
      - name: Sanitize branch name
        if: ${{ !cancelled() }}
        run: |
          SAFE_NAME=$(echo "$BRANCH_NAME" | sed -E 's/[^a-zA-Z0-9_-]/_/g')
          echo "BRANCH_SANITIZED=$SAFE_NAME" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: ${{ env.BRANCH_SANITIZED }}-${{ env.NOW }}-${{ github.job }}-report-${{ matrix.playwright-browser }}
          path: |
            ${{ env.backend-directory }}/*.log
            ${{ env.frontend-directory }}/tests/reports/
          retention-days: 5

  startup-docker-compose-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 22
    env:
      COMPOSE_TEST: True
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10
      - name: Install frontend dependencies
        working-directory: ${{ env.frontend-directory }}
        run: pnpm i --frozen-lockfile
      - name: Get installed Playwright version
        working-directory: ${{ env.frontend-directory }}
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"
      - name: Cache playwright binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - name: Install Playwright Browsers
        working-directory: ${{ env.frontend-directory }}
        timeout-minutes: 32
        run: |
          for attempt in 1 2 3; do
            if timeout 600 pnpm exec playwright install; then
              exit 0
            fi
            echo "::warning::Playwright install attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1
      - name: Build the Docker app
        run: |
          rm -rf db
          mkdir db
          docker compose -f docker-compose-build.yml up -d
      - name: Wait for migrations to complete
        run: |
          echo "Waiting for migrations to complete..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose-build.yml exec -T backend python manage.py migrate --check 2>/dev/null; then
              echo "Migrations complete after ~$((i * 10))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Migrations did not complete within 600s"
              docker compose -f docker-compose-build.yml logs backend
              exit 1
            fi
            sleep 10
          done
      - name: Config the Docker app
        run: |
          docker compose -f docker-compose-build.yml exec -T backend /bin/bash -c "DJANGO_SUPERUSER_EMAIL=admin@tests.com DJANGO_SUPERUSER_PASSWORD=1234 python manage.py createsuperuser --noinput && exit 0"
      - name: Run tests
        working-directory: ${{ env.frontend-directory }}
        run: |
          server_response='{"type":"redirect","status":302,"location":"/"}'
          for attempt in {1..10}; do
            echo "Login attempt ${attempt}"
            response=$(curl -s -d "username=admin@tests.com&password=1234" -H "Origin: https://localhost:8443" https://localhost:8443/login\?/login -k)
            echo "[SERVER_RESPONSE] $response"
            echo "[EXPECTED_RESPONSE] $server_response"
            if [[ "$response" == "$server_response" ]]; then
              echo "Success"
              exit 0
            fi
            if [[ "$attempt" -lt 10 ]]; then
              echo "Login failed, retrying in 30 seconds..."
              sleep 30
            fi
          done
          echo "Failure"
          echo "Check if migrations are not too long"
          exit 1

  enterprise-startup-functional-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 19
    env:
      LOG_LEVEL: DEBUG
      LOG_OUTFILE: ciso-assistant.log
      DJANGO_DEBUG: "True"
      DJANGO_SUPERUSER_EMAIL: admin@tests.com
      DJANGO_SUPERUSER_PASSWORD: 1234
      POSTGRES_NAME: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DB_HOST: localhost
      CISO_ASSISTANT_SUPERUSER_EMAIL: ""
      CISO_ASSISTANT_URL: http://localhost:4173
      DJANGO_SETTINGS_MODULE: enterprise_core.settings
      PUBLIC_BACKEND_API_URL: http://localhost:8000/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv and set up python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Check uv version
        run: uv --version
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Cache Virtualenv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.enterprise-backend-directory }}/.venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('enterprise/backend/uv.lock') }}
      - name: Install enterprise backend
        working-directory: ${{ env.enterprise-backend-directory }}
        run: uv sync --locked
      - name: Build enterprise frontend
        working-directory: ${{ env.enterprise-frontend-directory }}
        env:
          NODE_OPTIONS: "--max-old-space-size=10240"
        run: make
      - name: Get installed Playwright version
        working-directory: ${{ env.enterprise-frontend-build-directory }}
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"
      - name: Cache playwright binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - name: Install Playwright Browsers
        working-directory: ${{ env.enterprise-frontend-build-directory }}
        timeout-minutes: 32
        run: |
          for attempt in 1 2 3; do
            if timeout 600 pnpm exec playwright install; then
              exit 0
            fi
            echo "::warning::Playwright install attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1
      - name: Run migrations
        working-directory: ${{ env.backend-directory }}
        env:
          SETTINGS_MODULE: ${{ env.enterprise-backend-settings-module }}
        run: uv run --project ../enterprise/backend python manage.py migrate --settings="$SETTINGS_MODULE"
      - name: Start test server
        working-directory: ${{ env.backend-directory }}
        env:
          SETTINGS_MODULE: ${{ env.enterprise-backend-settings-module }}
        run: |
          uv run --project ../enterprise/backend python manage.py createsuperuser --noinput --settings="$SETTINGS_MODULE"
          nohup uv run --project ../enterprise/backend python manage.py runserver --settings="$SETTINGS_MODULE" &
      - name: Run tests
        working-directory: ${{ env.enterprise-frontend-build-directory }}
        run: pnpm exec playwright test tests/functional/startup.test.ts
      - name: Set current date as env variable
        run: echo "NOW=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_ENV
      - name: Sanitize branch name
        run: |
          SAFE_NAME=$(echo "$BRANCH_NAME" | sed -E 's/[^a-zA-Z0-9_-]/_/g')
          echo "BRANCH_SANITIZED=$SAFE_NAME" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: ${{ env.BRANCH_SANITIZED }}-${{ env.NOW }}-${{ github.job }}-report-${{ matrix.playwright-browser }}
          path: |
            ${{ env.backend-directory }}/*.log
            ${{ env.enterprise-frontend-build-directory }}/tests/reports/
          retention-days: 5

  enterprise-startup-docker-compose-test:
    runs-on: ubuntu-24.04
    env:
      COMPOSE_TEST: True
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install frontend dependencies
        working-directory: ${{ env.enterprise-frontend-directory }}
        run: make pre-build
      - name: Get installed Playwright version
        working-directory: ${{ env.enterprise-frontend-build-directory }}
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"
      - name: Cache playwright binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - name: Install Playwright Browsers
        working-directory: ${{ env.enterprise-frontend-build-directory }}
        timeout-minutes: 32
        run: |
          for attempt in 1 2 3; do
            if timeout 600 pnpm exec playwright install; then
              exit 0
            fi
            echo "::warning::Playwright install attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1
      - name: Build the Docker app
        run: docker compose -f enterprise/docker-compose-build.yml up -d
      - name: Wait for migrations to complete
        env:
          SETTINGS_MODULE: ${{ env.enterprise-backend-settings-module }}
        run: |
          echo "Waiting for migrations to complete..."
          for i in $(seq 1 60); do
            if docker compose -f enterprise/docker-compose-build.yml exec -T backend python manage.py migrate --check --settings="$SETTINGS_MODULE" 2>/dev/null; then
              echo "Migrations complete after ~$((i * 10))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Migrations did not complete within 600s"
              docker compose -f enterprise/docker-compose-build.yml logs backend
              exit 1
            fi
            sleep 10
          done
      - name: Config the Docker app
        env:
          SETTINGS_MODULE: ${{ env.enterprise-backend-settings-module }}
        run: |
          docker compose -f enterprise/docker-compose-build.yml exec -T backend /bin/bash -c "DJANGO_SUPERUSER_EMAIL=admin@tests.com DJANGO_SUPERUSER_PASSWORD=1234 python manage.py createsuperuser --noinput --settings="$SETTINGS_MODULE" && exit 0"
      - name: Run tests
        working-directory: ${{ env.frontend-directory }}
        run: |
          server_response='{"type":"redirect","status":302,"location":"/"}'
          for attempt in {1..10}; do
            echo "Login attempt ${attempt}"
            response=$(curl -s -d "username=admin@tests.com&password=1234" -H "Origin: https://localhost:8443" https://localhost:8443/login\?/login -k)
            echo "[SERVER_RESPONSE] $response"
            echo "[EXPECTED_RESPONSE] $server_response"
            if [[ "$response" == "$server_response" ]]; then
              echo "Success"
              exit 0
            fi
            if [[ "$attempt" -lt 10 ]]; then
              echo "Login failed, retrying in 30 seconds..."
              sleep 30
            fi
          done
          echo "Failure"
          echo "Check if migrations are not too long"
          exit 1
