name: Helm Linters
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]
    paths:
      - "charts/ciso-assistant-next/**"
      - ".github/workflows/helm-linters.yaml"
  workflow_dispatch:

# Cancel older in-progress runs for the same PR or the same ref (branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5
        with:
          version: "latest"

      - name: Lint Helm Chart
        run: |
          cd charts
          helm repo add qdrant https://qdrant.github.io/qdrant-helm
          helm dependency build ciso-assistant-next
          helm lint ciso-assistant-next

  helm-check-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check Helm Dependencies lock
        run: |
          helm repo add qdrant https://qdrant.github.io/qdrant-helm
          helm dependency build charts/ciso-assistant-next

  helm-check-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check values schema json
        uses: losisin/helm-values-schema-json-action@b0dbd950f1b546a97789ae081ba1ec1b0557f927 # v1.8.0
        with:
          working-directory: charts/ciso-assistant-next
          input: values.yaml
          fail-on-diff: true

  helm-check-helm-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate helm-docs
        uses: losisin/helm-docs-github-action@2ccf3e77eb70dc80d62f8cc26f15d0a96b75fef4 # v1.8.0
        with:
          chart-search-root: charts/ciso-assistant-next
          fail-on-diff: true
