name: Build and Push Docker Images Dummy
permissions:
  contents: read
on:
  workflow_dispatch:

# Cancel older in-progress runs for the same PR or the same ref (branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UBUNTU_VERSION: "ubuntu-24.04"
  VERSION: dummy

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Get version and Create .meta file
        run: |
          echo "VERSION=$(git describe --tags --always)" >> $GITHUB_ENV
          echo "BUILD=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "CISO_ASSISTANT_VERSION=$(git describe --tags --always)" > .meta
          echo "CISO_ASSISTANT_BUILD=$(git rev-parse --short HEAD)" >> .meta
          cp .meta ./backend/
          cp .meta ./backend/ciso_assistant/

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=${{ env.VERSION }}
          labels: |
            org.opencontainers.image.title=CISO Assistant Backend
            org.opencontainers.image.description=An open-source GRC platform for cybersecurity compliance and risk management
            org.opencontainers.image.vendor=intuitem
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.url=https://intuitem.com
            org.opencontainers.image.documentation=https://intuitem.gitbook.io/ciso-assistant
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=${{ env.VERSION }}
          labels: |
            org.opencontainers.image.title=CISO Assistant Frontend
            org.opencontainers.image.description=An open-source GRC platform for cybersecurity compliance and risk management
            org.opencontainers.image.vendor=intuitem
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.url=https://intuitem.com
            org.opencontainers.image.documentation=https://intuitem.gitbook.io/ciso-assistant
      - name: Build Backend ARM Docker Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}/backend:arm64-${{ env.VERSION }}
          labels: ${{ steps.meta-backend.outputs.labels }}
      - name: Build Frontend ARM Docker Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}/frontend:arm64-${{ env.VERSION }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
      - name: Build Backend Docker Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}/backend:${{ env.VERSION }}
          labels: ${{ steps.meta-backend.outputs.labels }}
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}/frontend:${{ env.VERSION }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
