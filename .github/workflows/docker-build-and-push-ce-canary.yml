name: Build/Push Canary Images - CE
permissions:
  contents: read
  packages: write
on:
  push:
    tags:
      - "canary-*"
  workflow_dispatch:
# Cancel older in-progress runs for the same PR or the same ref (branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  UBUNTU_VERSION: "ubuntu-24.04"
jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          CANARY_VERSION="canary-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "version=${CANARY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
          labels: |
            org.opencontainers.image.title=CISO Assistant Frontend
            org.opencontainers.image.description=An open-source GRC platform for cybersecurity compliance and risk management
            org.opencontainers.image.vendor=intuitem
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.url=https://intuitem.com
            org.opencontainers.image.documentation=https://intuitem.gitbook.io/ciso-assistant
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          annotations: ${{ steps.meta-frontend.outputs.annotations }}

  build-backend:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Create .meta file
        shell: bash
        env:
          CISO_ASSISTANT_VERSION: ${{ needs.prepare.outputs.version }}
          CISO_ASSISTANT_BUILD: ${{ needs.prepare.outputs.build }}
        run: |
          set -euo pipefail
          {
            echo "CISO_ASSISTANT_VERSION=$CISO_ASSISTANT_VERSION"
            echo "CISO_ASSISTANT_BUILD=$CISO_ASSISTANT_BUILD"
          } > .meta
          cp .meta ./backend/
          cp .meta ./backend/ciso_assistant/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
          labels: |
            org.opencontainers.image.title=CISO Assistant Backend
            org.opencontainers.image.description=An open-source GRC platform for cybersecurity compliance and risk management
            org.opencontainers.image.vendor=intuitem
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.url=https://intuitem.com
            org.opencontainers.image.documentation=https://intuitem.gitbook.io/ciso-assistant
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          annotations: ${{ steps.meta-backend.outputs.annotations }}

  merge-manifests:
    needs: [prepare, build-frontend, build-backend]
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifests
        shell: bash
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          # Frontend
          docker buildx imagetools create \
            -t "ghcr.io/$REPO/frontend:$VERSION" \
            -t "ghcr.io/$REPO/frontend:canary" \
            "ghcr.io/$REPO/frontend:$VERSION-amd64" \
            "ghcr.io/$REPO/frontend:$VERSION-arm64"

          # Backend
          docker buildx imagetools create \
            -t "ghcr.io/$REPO/backend:$VERSION" \
            -t "ghcr.io/$REPO/backend:canary" \
            "ghcr.io/$REPO/backend:$VERSION-amd64" \
            "ghcr.io/$REPO/backend:$VERSION-arm64"
