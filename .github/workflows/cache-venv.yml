name: Warm backend venv cache

# Pre-populates the GitHub Actions cache with backend/.venv on the default
# branch's scope, so PRs targeting it restore the venv on cold start instead
# of paying ~30s for `uv sync` per shard (multiplied by ~60 functional shards
# + ~56 API shards + startup-tests = significant).
#
# Writes the keys that backend-api-tests.yml, functional-tests.yml and
# startup-tests.yml all look up:
#   venv-Linux-py<python_version>-<hash(backend/uv.lock)>
#   venv-Linux-py<python_version>-<hash(enterprise/backend/uv.lock)>

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/uv.lock"
      - "backend/pyproject.toml"
      - "enterprise/backend/uv.lock"
      - "enterprise/backend/pyproject.toml"
      - ".github/workflows/cache-venv.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  backend-directory: ./backend
  enterprise-backend-directory: ./enterprise/backend

jobs:
  warm_venv:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and set up python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Cache Virtualenv
        id: cache-venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.backend-directory }}/.venv
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/uv.lock') }}

      - name: Install backend requirements
        if: steps.cache-venv.outputs.cache-hit != 'true'
        working-directory: ${{ env.backend-directory }}
        run: uv sync --locked

  warm_enterprise_venv:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and set up python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Cache Virtualenv
        id: cache-venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.enterprise-backend-directory }}/.venv
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('enterprise/backend/uv.lock') }}

      - name: Install enterprise backend requirements
        if: steps.cache-venv.outputs.cache-hit != 'true'
        working-directory: ${{ env.enterprise-backend-directory }}
        run: uv sync --locked
