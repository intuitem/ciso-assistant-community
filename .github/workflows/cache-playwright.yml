name: Warm Playwright cache

# Pre-populates the GitHub Actions cache with Playwright browser binaries on
# the default branch's scope, so PRs targeting it restore the cache on cold
# start instead of re-downloading from cdn.playwright.dev (which is observably
# flaky and can hang).
#
# Writes two keys matching what functional-tests.yml and startup-tests.yml
# look up:
#   Linux-playwright-<version>-chromium   (functional-tests, chromium-only)
#   Linux-playwright-<version>            (startup-tests, full default set)

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"
      - ".github/workflows/cache-playwright.yml"
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  frontend-directory: ./frontend

jobs:
  warm_chromium:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - name: Install frontend dependencies
        working-directory: ${{ env.frontend-directory }}
        run: pnpm i --frozen-lockfile

      - name: Get installed Playwright version
        working-directory: ${{ env.frontend-directory }}
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"

      - name: Cache chromium
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-chromium

      - name: Download chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.frontend-directory }}
        timeout-minutes: 17
        env:
          DEBUG: pw:install
        run: |
          for attempt in 1 2 3; do
            if timeout 300 pnpm exec playwright install chromium; then
              exit 0
            fi
            echo "::warning::Playwright chromium download attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1

  warm_all_browsers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - name: Install frontend dependencies
        working-directory: ${{ env.frontend-directory }}
        run: pnpm i --frozen-lockfile

      - name: Get installed Playwright version
        working-directory: ${{ env.frontend-directory }}
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"

      - name: Cache full browser set
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Download full browser set
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.frontend-directory }}
        timeout-minutes: 32
        env:
          DEBUG: pw:install
        run: |
          for attempt in 1 2 3; do
            if timeout 600 pnpm exec playwright install; then
              exit 0
            fi
            echo "::warning::Playwright full-set download attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1
