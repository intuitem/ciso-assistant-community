name: API Tests
permissions:
  contents: read
on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]
    paths:
      - "backend/**"
      - ".github/workflows/backend-api-tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  GITHUB_WORKFLOW: github_actions
  PYTHON_VERSION: "3.14"
  UBUNTU_VERSION: "ubuntu-24.04"
  BACKEND_DIR: ./backend

jobs:
  # JOB 1: Build DB and Cache Deps
  setup:
    runs-on: ubuntu-24.04
    env:
      DJANGO_DEBUG: "True"
      DB_HOST: localhost
      EMAIL_HOST: localhost
      EMAIL_PORT: 1025
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      DEFAULT_FROM_EMAIL: "ciso-assistant@alsigo.net"
      CISO_ASSISTANT_SUPERUSER_EMAIL: ""
      CISO_ASSISTANT_URL: http://127.0.0.1:5173
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # test credential
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and set up python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Cache Virtualenv
        id: cache-venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.BACKEND_DIR }}/.venv
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: uv sync --locked

      - name: Run migrations (sqlite)
        working-directory: ${{ env.BACKEND_DIR }}
        run: uv run python manage.py migrate

      - name: Upload Database
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilt-db
          path: ${{ env.BACKEND_DIR }}/db/ciso-assistant.sqlite3
          retention-days: 1

      - name: Restore PG dump cache
        id: pg-dump-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.BACKEND_DIR }}/db/prebuilt-pg.sql
          key: pg-dump-${{ runner.os }}-${{ hashFiles('backend/**/migrations/*.py', 'backend/uv.lock') }}

      - name: Run migrations (postgres) and dump
        if: steps.pg-dump-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          POSTGRES_NAME: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          PGPASSWORD: postgres
        run: |
          uv run python manage.py migrate
          pg_dump -h localhost -U postgres -d postgres > db/prebuilt-pg.sql

      - name: Upload PG dump
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilt-pg-dump
          path: ${{ env.BACKEND_DIR }}/db/prebuilt-pg.sql
          retention-days: 1

  # JOB 2: Generate Matrix
  list-files:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Find Test Files
        id: set-matrix
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          FILES=$(find app_tests/api -name "test_*.py" ! -name "test_utils.py" | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$FILES" >> $GITHUB_OUTPUT

  # JOB 3: Run Parallel Tests
  test:
    needs: [setup, list-files]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        test-file: ${{ fromJson(needs.list-files.outputs.matrix) }}
        backend: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # test credential
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DJANGO_DEBUG: "True"
      DB_HOST: localhost
      EMAIL_HOST: localhost
      EMAIL_PORT: 1025
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      DEFAULT_FROM_EMAIL: "ciso-assistant@alsigo.net"
      CISO_ASSISTANT_SUPERUSER_EMAIL: ""
      CISO_ASSISTANT_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and set up python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      # Restore the exact venv created in 'setup' job to skip installation
      - name: Restore Virtualenv Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-venv
        with:
          path: ${{ env.BACKEND_DIR }}/.venv
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/uv.lock') }}

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: uv sync --locked

      - name: Download Database
        if: matrix.backend == 'sqlite'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prebuilt-db
          path: ${{ env.BACKEND_DIR }}/db/

      - name: Prepare Test Database
        if: matrix.backend == 'sqlite'
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          # Copy pre-built DB to the name defined in settings.py TEST config
          cp db/ciso-assistant.sqlite3 db/test_ciso-assistant.sqlite3

      - name: Download PG dump
        if: matrix.backend == 'postgres'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prebuilt-pg-dump
          path: ${{ env.BACKEND_DIR }}/db/

      - name: Restore PG dump to test database
        if: matrix.backend == 'postgres'
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE test_postgres;"
          psql -h localhost -U postgres -d test_postgres -f db/prebuilt-pg.sql > /dev/null

      - name: Run Test File
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          TEST_FILE: ${{ matrix.test-file }}
          JOB_INDEX: ${{ strategy.job-index }}
          BACKEND: ${{ matrix.backend }}
        run: |
          if [ "$BACKEND" = "postgres" ]; then
            export POSTGRES_NAME=postgres
            export POSTGRES_USER=postgres
            export POSTGRES_PASSWORD=postgres
          fi
          # Use --reuse-db to prevent pytest from destroying/recreating the DB
          uv run pytest "$TEST_FILE" --reuse-db --html="pytest-report-${JOB_INDEX}.html" --self-contained-html

      - name: Prepare Artifact Name
        if: ${{ !cancelled() }}
        env:
          RAW_BRANCH: ${{ env.BRANCH_NAME }}
        run: |
          set -euo pipefail
          SAFE_BRANCH=$(echo "$RAW_BRANCH" | sed -E 's/[^a-zA-Z0-9_-]/_/g')
          echo "BRANCH_SANITIZED=$SAFE_BRANCH" >> "$GITHUB_ENV"
          echo "NOW=$(date +'%Y-%m-%dT%H-%M-%S')" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: ${{ env.BRANCH_SANITIZED }}-${{ env.NOW }}-report-${{ matrix.backend }}-${{ strategy.job-index }}
          path: ${{ env.BACKEND_DIR }}/pytest-report-${{ strategy.job-index }}.html
          retention-days: 5
