subject: "CISO Assistant: Security exception expired since ${expired_since} day(s)"
body: |
  Hello,

  You have ${exception_count} security exception(s) expired since ${expired_since} day(s):

  ${exception_list}

  Please log in to your CISO Assistant portal to review and update these security exceptions: [Go to CISO Assistant](${ciso_assistant_url})

  Thank you.
