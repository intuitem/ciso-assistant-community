subject: "CISO Assistant: Security exception '${exception_name}' is now ${new_status}"
body: |
  Hello,

  The status of the following security exception has changed:

  - Name: ${exception_name}
  - Reference ID: ${exception_ref_id}
  - New status: ${new_status}
  - Updated by: ${actor_name}
  - Domain: ${folder_name}

  Log in to your CISO Assistant portal to view this security exception: [Go to CISO Assistant](${ciso_assistant_url})

  Thank you.
