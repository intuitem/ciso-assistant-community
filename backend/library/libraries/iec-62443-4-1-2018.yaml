      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
      ref_id: SUM-4
      name: Security update delivery
      description: 'Practice: Updates are delivered via authenticated, integrity-protected
        mechanisms to authorized customers. Evidence: Signed update packages, authenticated
        distribution channels, and download/verification documentation.'
      implementation_groups:
      - sdl_practices
    - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sum-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
      ref_id: SUM-5
      name: Timely delivery of security patches
      description: 'Practice: Security patches are delivered within timeframes proportional
        to severity, per a documented policy; an out-of-cycle / emergency-patch path
        exists for high-impact zero-days (Log4Shell-class events) with a target measured
        in hours, not days. Evidence: Patch SLA policy (e.g. critical = N days, high
        = M days) plus emergency-patch SLA; metrics show SLA attainment for both routine
        and emergency releases.'
      implementation_groups:
      - sdl_practices
