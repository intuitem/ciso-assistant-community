      ref_id: SUM-3
      name: Dependent component or operating system security update documentation
      description: 'Practice: For updates that depend on components outside the supplier''s
        control (OS, third-party libraries), the dependency relationship and tested
        versions are documented. Evidence: Compatibility matrices listing tested OS
        / dependency versions per product release.'
      implementation_groups:
      - sdl_practices
