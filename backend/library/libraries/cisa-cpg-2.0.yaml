    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:6-a
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rc
      ref_id: 6.A
      name: Incident Planning and Preparedness
      description: Organizations are capable of safely and effectively recovering from a cybersecurity incident.
      annotation: |-
        Outcome: Organizations are capable of safely and effectively recovering from a cybersecurity incident.

        TTP/Risk Addressed: Disruption to the availability of an asset, service, or system.

        Recommended Actions:
        - Execute plans recovering/restoring service to critical assets impacted by incidents
        - Enable degraded operations (paper-based, radio communications) without critical assets or internet
        - Complete post-incident analysis identifying improvement areas
        - Incorporate lessons learned; enhance detection/response capabilities
        - Update policies, procedures, and training; ensure stakeholder awareness of changes

        Cost: Moderate | Impact: High | Complexity: Complex
