urn: urn:intuitem:risk:library:cisa-cpg-2.0
locale: en
ref_id: CISA-CPG-2.0
name: CISA Cybersecurity Performance Goals v2.0
description:
  CISA Cross-Sector Cybersecurity Performance Goals (CPG) 2.0 - Voluntary practices with high-impact security actions
  aligned to the NIST Cybersecurity Framework.
copyright: This document is provided by CISA (Cybersecurity and Infrastructure Security Agency) and is public domain.
version: 1
publication_date: "2025-03-04"
provider: CISA
packager: intuitem
translations:
  fr:
    name: Objectifs de performance en cybersécurité CISA v2.0
    description:
      Objectifs de performance en cybersécurité (CPG) 2.0 de la CISA - Pratiques volontaires avec des actions de
      sécurité à fort impact alignées sur le cadre de cybersécurité du NIST. Cette traduction française n'est pas une traduction
      officielle de la CISA.
    copyright:
      Ce document est fourni par la CISA (Cybersecurity and Infrastructure Security Agency) et est du domaine public.
      La traduction française est une traduction non officielle fournie à titre indicatif.
objects:
  reference_controls:
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-01
      ref_id: RC.01
      name: Cybersecurity Roles and Responsibilities Policy
      category: policy
      csf_function: govern
      description:
        Document all cybersecurity roles, responsibilities, and authorities in organizational policy. Distribute
        responsibilities across the organization, including third parties. Ensure legal and regulatory compliance.
      translations:
        fr:
          name: Politique de rôles et responsabilités en cybersécurité
          description:
            Documenter tous les rôles, responsabilités et autorités en matière de cybersécurité dans la politique
            organisationnelle. Répartir les responsabilités au sein de l'organisation, y compris avec les tiers. Assurer la
            conformité légale et réglementaire.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-02
      ref_id: RC.02
      name: Cybersecurity Policy Lifecycle Management
      category: policy
      csf_function: govern
      description:
        Review cybersecurity policies annually and update when requirements, risks, threats, or technology changes.
        Communicate and enforce policies reflecting organizational strategy and priorities.
      translations:
        fr:
          name: Gestion du cycle de vie des politiques de cybersécurité
          description:
            Réviser les politiques de cybersécurité annuellement et les mettre à jour en cas de changement des exigences,
            des risques, des menaces ou des technologies. Communiquer et appliquer les politiques reflétant la stratégie et
            les priorités organisationnelles.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-03
      ref_id: RC.03
      name: OT-Specific Security Policy
      category: policy
      csf_function: govern
      description:
        Develop OT-specific cybersecurity policies acknowledging IT program limitations and critical function priorities.
        Establish governance encompassing regulatory, legal, risk, environmental, and operational obligations.
      translations:
        fr:
          name: Politique de sécurité spécifique aux OT
          description:
            Développer des politiques de cybersécurité spécifiques aux technologies opérationnelles (OT), tenant
            compte des limitations des programmes informatiques et des priorités des fonctions critiques. Établir une gouvernance
            englobant les obligations réglementaires, juridiques, environnementales et opérationnelles.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-04
      ref_id: RC.04
      name: Incident Response Plan Management
      category: process
      csf_function: govern
      description:
        Develop, maintain, update, and regularly exercise incident response plans for common and organizationally
        specific scenarios. Ensure realistic drills including all relevant stakeholders. Review and drill IR plans minimum annually.
        Account for OT-specific safety and containment considerations.
      translations:
        fr:
          name: Gestion du plan de réponse aux incidents
          description:
            Développer, maintenir, mettre à jour et exercer régulièrement les plans de réponse aux incidents pour
            des scénarios courants et spécifiques à l'organisation. Garantir des exercices réalistes incluant toutes les parties
            prenantes. Réviser et tester les plans au minimum annuellement. Prendre en compte les considérations de sûreté et
            de confinement spécifiques aux OT.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-05
      ref_id: RC.05
      name: Supply Chain Incident Notification SLAs
      category: process
      csf_function: govern
      description:
        Require vendors and service providers to notify customers of security incidents and vulnerabilities within
        risk-informed timeframes via SLAs and contracts.
      translations:
        fr:
          name: SLA de notification d'incidents de la chaîne d'approvisionnement
          description:
            Exiger des fournisseurs et prestataires de services qu'ils notifient les clients des incidents de sécurité
            et des vulnérabilités dans des délais adaptés au risque, via des SLA et des contrats.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-06
      ref_id: RC.06
      name: OT Supply Chain Authenticity Verification
      category: process
      csf_function: govern
      description:
        Document and track OT asset serial numbers, checksums, digital certificates/signatures to verify authenticity
        of hardware, software, and firmware.
      translations:
        fr:
          name: Vérification de l'authenticité de la chaîne d'approvisionnement OT
          description:
            Documenter et suivre les numéros de série, les sommes de contrôle, les certificats numériques et signatures
            des actifs OT pour vérifier l'authenticité du matériel, des logiciels et des micrologiciels.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-07
      ref_id: RC.07
      name: Managed Service Provider Risk Management
      category: process
      csf_function: govern
      description:
        Develop understanding of MSP services and security products. Understand contractual agreements and proactively
        address security gaps. Ensure contracts detail how and when MSPs notify customers of incidents.
      translations:
        fr:
          name: Gestion des risques liés aux prestataires de services managés
          description:
            Développer la compréhension des services et produits de sécurité des MSP. Comprendre les accords contractuels
            et combler proactivement les lacunes de sécurité. S'assurer que les contrats précisent comment et quand les MSP
            notifient les clients des incidents.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-08
      ref_id: RC.08
      name: Asset Inventory Management
      category: process
      csf_function: identify
      description:
        Maintain regularly updated inventory of all organizational assets including data, hardware, software, systems,
        facilities, and personnel. Update critical IT/OT assets more frequently.
      translations:
        fr:
          name: Gestion de l'inventaire des actifs
          description:
            Maintenir un inventaire régulièrement mis à jour de tous les actifs organisationnels, incluant les données,
            le matériel, les logiciels, les systèmes, les installations et le personnel. Mettre à jour plus fréquemment les
            actifs IT/OT critiques.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-09
      ref_id: RC.09
      name: Vulnerability Management Program
      category: process
      csf_function: identify
      description:
        Implement vulnerability management program to patch and mitigate misconfigured software timely. Monitor risk
        response progress via POA&M, risk registers, and risk detail reports. Assign responsibilities for processing cybersecurity
        threat, vulnerability, or incident disclosures.
      translations:
        fr:
          name: Programme de gestion des vulnérabilités
          description:
            Mettre en œuvre un programme de gestion des vulnérabilités pour corriger et atténuer les logiciels mal
            configurés en temps voulu. Suivre l'avancement de la réponse aux risques via les POA&M, les registres de risques
            et les rapports détaillés. Attribuer les responsabilités pour le traitement des divulgations de menaces, vulnérabilités
            ou incidents.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-10
      ref_id: RC.10
      name: Legacy System Compensating Controls
      category: technical
      csf_function: identify
      description:
        Incorporate compensating security controls for legacy systems where patching is infeasible. For OT assets,
        apply compensating controls such as segmentation and monitoring, making assets inaccessible from public internet.
      translations:
        fr:
          name: Contrôles compensatoires pour les systèmes existants
          description:
            Incorporer des contrôles de sécurité compensatoires pour les systèmes existants lorsque la correction
            est impossible. Pour les actifs OT, appliquer des contrôles compensatoires tels que la segmentation et la surveillance,
            rendant les actifs inaccessibles depuis l'internet public.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-11
      ref_id: RC.11
      name: Independent Security Validation
      category: process
      csf_function: identify
      description:
        Regularly engage third-party cybersecurity experts for penetration tests, bug bounties, incident simulations,
        and table-top exercises. Assess ability of adversaries to infiltrate and move laterally within networks. Ensure findings
        are addressed.
      translations:
        fr:
          name: Validation indépendante de la sécurité
          description:
            Engager régulièrement des experts tiers en cybersécurité pour des tests d'intrusion, des programmes de
            bug bounty, des simulations d'incidents et des exercices sur table. Évaluer la capacité des adversaires à infiltrer
            et se déplacer latéralement dans les réseaux. S'assurer que les conclusions sont traitées.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-12
      ref_id: RC.12
      name: Vulnerability Disclosure Program
      category: process
      csf_function: identify
      description:
        Maintain public, easily discoverable method for notifying security teams of vulnerable, misconfigured, or
        exploitable assets. Acknowledge valid submissions and respond timely. Protect good-faith reporters under safe harbor
        provisions. Apply security.txt files conforming to RFC 9116 on all public-facing web domains.
      translations:
        fr:
          name: Programme de divulgation des vulnérabilités
          description:
            Maintenir une méthode publique et facilement accessible pour signaler aux équipes de sécurité les actifs
            vulnérables, mal configurés ou exploitables. Accuser réception des soumissions valides et y répondre dans des délais
            raisonnables. Protéger les personnes signalant les vulnérabilités de bonne foi. Appliquer les fichiers security.txt
            conformes à la RFC 9116 sur tous les domaines web publics.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-13
      ref_id: RC.13
      name: Network Topology Documentation
      category: process
      csf_function: identify
      description:
        Maintain accurate documentation describing current network topology across all IT and OT networks. Perform
        network reviews and track annually; update when topology changes.
      translations:
        fr:
          name: Documentation de la topologie réseau
          description:
            Maintenir une documentation précise décrivant la topologie réseau actuelle pour tous les réseaux IT et
            OT. Effectuer des revues réseau et les suivre annuellement ; mettre à jour en cas de changement de topologie.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-14
      ref_id: RC.14
      name: Default Password Elimination
      category: technical
      csf_function: protect
      description:
        Require changing default manufacturer passwords for all hardware, software, and firmware before network connection.
        If infeasible (hard-coded passwords), document and implement compensating controls; monitor logs for network traffic
        and login attempts.
      translations:
        fr:
          name: Élimination des mots de passe par défaut
          description:
            Exiger le changement des mots de passe par défaut du fabricant pour tout matériel, logiciel et micrologiciel
            avant la connexion au réseau. Si impossible (mots de passe codés en dur), documenter et mettre en œuvre des contrôles
            compensatoires ; surveiller les journaux de trafic réseau et de tentatives de connexion.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-15
      ref_id: RC.15
      name: Password Strength Policy
      category: technical
      csf_function: protect
      description:
        Enforce system policy establishing minimum password strength including 16+ character length for all password-protected
        IT and OT assets. Leverage passphrases and password managers. Prioritize upgrade/replacement of assets unable to support
        sufficient strength passwords.
      translations:
        fr:
          name: Politique de robustesse des mots de passe
          description:
            Appliquer une politique système établissant une robustesse minimale des mots de passe incluant une longueur
            de 16 caractères ou plus pour tous les actifs IT et OT protégés par mot de passe. Utiliser des phrases de passe
            et des gestionnaires de mots de passe. Prioriser la mise à niveau ou le remplacement des actifs ne pouvant pas supporter
            une robustesse suffisante.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-16
      ref_id: RC.16
      name: Unique Credential Management
      category: process
      csf_function: protect
      description:
        Create distinct, separate credentials for similar services and asset access across IT/OT networks. Ensure
        no password reuse across accounts. Unique passwords for admin/machine accounts. No universal NPE account passwords.
        Utilize role-based accounts.
      translations:
        fr:
          name: Gestion des identifiants uniques
          description:
            Créer des identifiants distincts et séparés pour des services similaires et l'accès aux actifs entre
            les réseaux IT/OT. Garantir l'absence de réutilisation de mots de passe entre les comptes. Mots de passe uniques
            pour les comptes d'administration et de machines. Pas de mot de passe universel pour les comptes non personnels.
            Utiliser des comptes basés sur les rôles.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-17
      ref_id: RC.17
      name: Credential Revocation and Offboarding
      category: process
      csf_function: protect
      description:
        Establish defined, enforced administrative offboarding process for staff, contractors, and vendors including
        return of physical tokens/badges and revocation of all system/facility access. Disable inactive accounts after specified
        period (e.g., 30 days) via automated process.
      translations:
        fr:
          name: Révocation des identifiants et départ du personnel
          description:
            Établir un processus administratif défini et appliqué de départ pour le personnel, les prestataires et
            les fournisseurs, incluant la restitution des jetons physiques et badges, et la révocation de tous les accès aux
            systèmes et aux locaux. Désactiver les comptes inactifs après une période définie (par ex. 30 jours) via un processus
            automatisé.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
      ref_id: RC.18
      name: Failed Login Monitoring and Alerting
      category: technical
      csf_function: protect
      description:
        Capture and log all unsuccessful logins per security policy. Alert security personnel after consecutive unsuccessful
        attempts and deviations from normal user behavior. Store alerts in security or ticketing system for retroactive analysis.
      translations:
        fr:
          name: Surveillance et alerte des tentatives de connexion échouées
          description:
            Capturer et journaliser toutes les tentatives de connexion infructueuses conformément à la politique
            de sécurité. Alerter le personnel de sécurité après des tentatives consécutives infructueuses et des écarts par
            rapport au comportement normal de l'utilisateur. Stocker les alertes dans un système de sécurité ou de tickets pour
            analyse rétrospective.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-19
      ref_id: RC.19
      name: Multi-Factor Authentication Deployment
      category: technical
      csf_function: protect
      description:
        Require MFA using strongest available method for assets with remote access. Prioritize phishing-resistant
        MFA (FIDO/WebAuthn or PKI-based), then mobile app-based soft tokens, then SMS/voice as last resort. Enable MFA on all
        remotely accessible OT accounts/systems.
      translations:
        fr:
          name: Déploiement de l'authentification multifacteur
          description:
            Exiger l'AMF en utilisant la méthode la plus forte disponible pour les actifs avec accès à distance.
            Prioriser l'AMF résistante à l'hameçonnage (FIDO/WebAuthn ou basée sur PKI), puis les jetons logiciels d'application
            mobile, puis SMS/voix en dernier recours. Activer l'AMF sur tous les comptes et systèmes OT accessibles à distance.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-20
      ref_id: RC.20
      name: Privileged Account Separation
      category: process
      csf_function: protect
      description:
        Ensure user accounts lack administrator privileges. Administrators maintain separate user accounts for non-admin
        activities. Re-evaluate privileges on recurring basis. Maintain separation of duties across multiple individuals/roles.
      translations:
        fr:
          name: Séparation des comptes à privilèges
          description:
            S'assurer que les comptes utilisateurs ne disposent pas de privilèges d'administrateur. Les administrateurs
            maintiennent des comptes utilisateurs séparés pour les activités non administratives. Réévaluer les privilèges périodiquement.
            Maintenir la séparation des tâches entre plusieurs individus et rôles.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-21
      ref_id: RC.21
      name: Least Privilege Implementation
      category: process
      csf_function: protect
      description:
        All user accounts, system roles, and processes operate with minimum privileges necessary for their tasks.
        Perform quarterly reviews of access permissions and role assignments validating policy compliance.
      translations:
        fr:
          name: Mise en œuvre du moindre privilège
          description:
            Tous les comptes utilisateurs, rôles système et processus fonctionnent avec les privilèges minimaux nécessaires
            à leurs tâches. Effectuer des revues trimestrielles des permissions d'accès et des attributions de rôles pour valider
            la conformité à la politique.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
      ref_id: RC.22
      name: Network Segmentation
      category: technical
      csf_function: protect
      description:
        Place routers between networks creating boundaries, increasing broadcast domains, and filtering broadcast
        traffic. Use boundaries to contain security breaches by restricting traffic to separate segments. Physically segment
        OT enclaves (e.g., data diodes) when applicable.
      translations:
        fr:
          name: Segmentation réseau
          description:
            Placer des routeurs entre les réseaux créant des limites, augmentant les domaines de diffusion et filtrant
            le trafic. Utiliser les limites pour contenir les violations de sécurité en restreignant le trafic à des segments
            séparés. Segmenter physiquement les enclaves OT (par ex. diodes de données) le cas échéant.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-23
      ref_id: RC.23
      name: Cybersecurity Awareness and Training Program
      category: process
      csf_function: protect
      description:
        Provide initial cybersecurity training before new employees access systems. Provide at least annual training
        covering social engineering, attack reporting, acceptable use, and basic cyber hygiene. Identify specialized roles requiring
        additional training. Provide OT personnel security awareness training.
      translations:
        fr:
          name: Programme de sensibilisation et de formation à la cybersécurité
          description:
            Fournir une formation initiale à la cybersécurité avant que les nouveaux employés n'accèdent aux systèmes.
            Fournir au moins une formation annuelle couvrant l'ingénierie sociale, le signalement des attaques, l'utilisation
            acceptable et l'hygiène cyber de base. Identifier les rôles spécialisés nécessitant une formation complémentaire.
            Former le personnel OT à la sensibilisation à la sécurité.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-24
      ref_id: RC.24
      name: Encryption and Cryptographic Controls
      category: technical
      csf_function: protect
      description:
        Use encryption, digital signatures, and cryptographic hashes protecting network communication confidentiality
        and integrity. Identify critical data for protection in transit and at rest. Prevent plaintext storage of sensitive
        data and passwords. Use encryption for OT external connections where latency permits.
      translations:
        fr:
          name: Chiffrement et contrôles cryptographiques
          description:
            Utiliser le chiffrement, les signatures numériques et les condensats cryptographiques pour protéger la
            confidentialité et l'intégrité des communications réseau. Identifier les données critiques à protéger en transit
            et au repos. Empêcher le stockage en clair des données sensibles et des mots de passe. Utiliser le chiffrement pour
            les connexions OT externes lorsque la latence le permet.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-25
      ref_id: RC.25
      name: Email Security Configuration
      category: technical
      csf_function: protect
      description:
        Enable STARTTLS, SPF, DKIM, and DMARC (set to reject) on all corporate email infrastructure to reduce risk
        from spoofing, phishing, and interception.
      translations:
        fr:
          name: Configuration de la sécurité des courriels
          description:
            Activer STARTTLS, SPF, DKIM et DMARC (configuré sur « reject ») sur toute l'infrastructure de messagerie
            d'entreprise pour réduire les risques d'usurpation d'identité, d'hameçonnage et d'interception.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-26
      ref_id: RC.26
      name: Macro and Autorun Restriction
      category: technical
      csf_function: protect
      description:
        Enforce system-wide policy disabling macros or similar embedded code by default. Establish policy for authorized
        macro enablement on specific assets. Disable Autorun/AutoPlay by default preventing unintentional code execution.
      translations:
        fr:
          name: Restriction des macros et de l'exécution automatique
          description:
            Appliquer une politique système désactivant par défaut les macros ou le code embarqué similaire. Établir
            une politique pour l'activation autorisée des macros sur des actifs spécifiques. Désactiver l'exécution automatique
            (Autorun/AutoPlay) par défaut pour prévenir l'exécution involontaire de code.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-27
      ref_id: RC.27
      name: Secure Change Management Process
      category: process
      csf_function: protect
      description:
        Implement policies and processes for secure change management. Enforce configuration restrictions preventing
        unauthorized changes. Test and document proposed changes in non-production environments. Implement OT limited functionality
        permitting only necessary functions, protocols, and services.
      translations:
        fr:
          name: Processus de gestion sécurisée des changements
          description:
            Mettre en œuvre des politiques et processus de gestion sécurisée des changements. Appliquer des restrictions
            de configuration empêchant les modifications non autorisées. Tester et documenter les changements proposés dans
            des environnements hors production. Mettre en œuvre une fonctionnalité limitée pour les OT ne permettant que les
            fonctions, protocoles et services nécessaires.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-28
      ref_id: RC.28
      name: Backup and Recovery Program
      category: process
      csf_function: protect
      description:
        Develop list of all maintained backups including installation media, license keys, configuration information,
        and retention periods. Back up critical operations in near-real-time. Securely store backups offsite and offline. Test
        backups and recovery minimum annually. Validate integrity before restoration. Include OT device configurations and engineering
        drawings.
      translations:
        fr:
          name: Programme de sauvegarde et de récupération
          description:
            Développer la liste de toutes les sauvegardes maintenues incluant les supports d'installation, les clés
            de licence, les informations de configuration et les durées de rétention. Sauvegarder les opérations critiques en
            quasi-temps réel. Stocker les sauvegardes hors site et hors ligne de manière sécurisée. Tester les sauvegardes et
            la récupération au minimum annuellement. Valider l'intégrité avant la restauration. Inclure les configurations des
            équipements OT et les schémas techniques.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-29
      ref_id: RC.29
      name: Hardware and Software Approval Process
      category: process
      csf_function: protect
      description:
        Implement administrative policy requiring review, testing, and approval before new hardware, firmware, or
        software installation. Maintain approved list including versions. Consider OT environment additional requirements for
        patches/updates ensuring no operational or safety impact.
      translations:
        fr:
          name: Processus d'approbation du matériel et des logiciels
          description:
            Mettre en œuvre une politique administrative exigeant la revue, les tests et l'approbation avant l'installation
            de tout nouveau matériel, micrologiciel ou logiciel. Maintenir une liste approuvée incluant les versions. Prendre
            en compte les exigences supplémentaires de l'environnement OT pour les correctifs et mises à jour afin de ne pas
            impacter les opérations ou la sûreté.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-30
      ref_id: RC.30
      name: Security Log Collection and Management
      category: technical
      csf_function: protect
      description:
        Collect and store administrative/security-focused logs (OS, applications, IDS/IPS, firewalls, DLP, VPNs).
        Store logs centrally in SIEM or database with restricted access. Store logs per risk-informed duration or regulatory
        guidelines. For OT assets with non-standard logs, collect network traffic.
      translations:
        fr:
          name: Collecte et gestion des journaux de sécurité
          description:
            Collecter et stocker les journaux d'administration et de sécurité (systèmes d'exploitation, applications,
            IDS/IPS, pare-feux, DLP, VPN). Stocker les journaux de manière centralisée dans un SIEM ou une base de données avec
            accès restreint. Conserver les journaux selon des durées adaptées au risque ou aux exigences réglementaires. Pour
            les actifs OT avec des journaux non standards, collecter le trafic réseau.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-31
      ref_id: RC.31
      name: Removable Media and Unauthorized Device Controls
      category: technical
      csf_function: protect
      description:
        Maintain policies ensuring unauthorized media and hardware don't connect to IT/OT assets. Establish procedures
        removing, disabling, or securing physical ports preventing unauthorized device connection.
      translations:
        fr:
          name: Contrôles des supports amovibles et des dispositifs non autorisés
          description:
            Maintenir des politiques garantissant que les supports et matériels non autorisés ne se connectent pas
            aux actifs IT/OT. Établir des procédures pour retirer, désactiver ou sécuriser les ports physiques afin d'empêcher
            la connexion de dispositifs non autorisés.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-32
      ref_id: RC.32
      name: Internet-Facing Device Hardening
      category: technical
      csf_function: protect
      description:
        Minimize internet-facing assets. Prioritize timely patches/updates. Disable unnecessary OS applications and
        network protocols. Never expose network management interfaces to public internet. Logically segment networks per trust
        boundaries and platform types.
      translations:
        fr:
          name: Durcissement des dispositifs exposés à Internet
          description:
            Minimiser les actifs exposés à Internet. Prioriser les correctifs et mises à jour en temps voulu. Désactiver
            les applications et protocoles réseau inutiles du système d'exploitation. Ne jamais exposer les interfaces de gestion
            réseau sur l'Internet public. Segmenter logiquement les réseaux selon les périmètres de confiance et les types de
            plateformes.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-33
      ref_id: RC.33
      name: Malicious Code Detection and Prevention
      category: technical
      csf_function: detect
      description:
        Implement signature-based and non-signature-based mechanisms (behavior, heuristics, anomalies) detecting/eradicating
        malicious code at endpoints. Ensure antivirus software is updated, active, and configured for auto-scanning. Use OT-compatible
        antivirus with special change management practices.
      translations:
        fr:
          name: Détection et prévention du code malveillant
          description:
            Mettre en œuvre des mécanismes basés sur les signatures et non basés sur les signatures (comportement,
            heuristique, anomalies) pour détecter et éradiquer le code malveillant sur les terminaux. S'assurer que l'antivirus
            est à jour, actif et configuré pour l'analyse automatique. Utiliser un antivirus compatible OT avec des pratiques
            spéciales de gestion des changements.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-34
      ref_id: RC.34
      name: Adverse Event Identification and Analysis
      category: process
      csf_function: detect
      description:
        Define clear adverse event criteria and processes. Escalate suspected events per incident response plan.
        Automate event information analysis. Conduct analyst role-specific training. Account for OT-specific events and anomalies.
      translations:
        fr:
          name: Identification et analyse des événements indésirables
          description:
            Définir des critères et des processus clairs pour les événements indésirables. Escalader les événements
            suspects selon le plan de réponse aux incidents. Automatiser l'analyse des informations sur les événements. Former
            les analystes aux protocoles spécifiques. Prendre en compte les événements et anomalies spécifiques aux OT.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-35
      ref_id: RC.35
      name: Incident Communication Procedures
      category: process
      csf_function: respond
      description:
        Design communications plan identifying stakeholders and coordination mechanisms during incidents. Securely
        share information per response plans. Regularly update senior leadership. Notify HR on insider threats. Establish media
        communications procedures.
      translations:
        fr:
          name: Procédures de communication en cas d'incident
          description:
            Concevoir un plan de communication identifiant les parties prenantes et les mécanismes de coordination
            lors des incidents. Partager l'information de manière sécurisée selon les plans de réponse. Informer régulièrement
            la direction. Notifier les RH en cas de menace interne. Établir des procédures de communication médiatique.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-36
      ref_id: RC.36
      name: Incident Reporting Procedures
      category: process
      csf_function: respond
      description:
        Maintain policy and procedures on reporting confirmed incidents to external entities (regulators, SRMAs,
        ISACs, ISAOs, CISA). Report within regulatory timeframes or as soon as safely feasible.
      translations:
        fr:
          name: Procédures de signalement des incidents
          description:
            Maintenir une politique et des procédures de signalement des incidents confirmés aux entités externes
            (régulateurs, autorités sectorielles, ISAC, ISAO, CISA). Signaler dans les délais réglementaires ou dès que possible
            en toute sécurité.
    - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-37
      ref_id: RC.37
      name: Incident Recovery and Lessons Learned
      category: process
      csf_function: recover
      description:
        Execute plans recovering/restoring service to critical assets impacted by incidents. Enable degraded operations
        (paper, radio). Complete post-incident analysis identifying improvement areas. Incorporate lessons learned. Update policies,
        procedures, and training.
      translations:
        fr:
          name: Récupération après incident et retour d'expérience
          description:
            Exécuter les plans de récupération et de restauration des services pour les actifs critiques impactés
            par les incidents. Permettre les opérations en mode dégradé (papier, radio). Réaliser une analyse post-incident
            identifiant les axes d'amélioration. Intégrer les retours d'expérience. Mettre à jour les politiques, procédures
            et formations.
  threats:
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-01
      ref_id: T.01
      name: Insufficient Cybersecurity Governance
      description:
        Lack of sufficient cybersecurity accountability, investment, or effectiveness due to absent or inadequate
        policies, roles, and procedures for managing cybersecurity risk.
      translations:
        fr:
          name: Gouvernance insuffisante de la cybersécurité
          description:
            Manque de responsabilité, d'investissement ou d'efficacité en matière de cybersécurité en raison de l'absence
            ou de l'inadéquation des politiques, des rôles et des procédures de gestion des risques cyber.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
      ref_id: T.02
      name: Ineffective Incident Response
      description:
        Inability to quickly and effectively isolate, contain, eradicate, remediate, and communicate about cybersecurity
        incidents. Communication failures slow resolution, increase downtime, and amplify damage.
      translations:
        fr:
          name: Réponse aux incidents inefficace
          description:
            Incapacité à isoler, contenir, éradiquer, remédier et communiquer rapidement et efficacement lors d'incidents
            de cybersécurité. Les défaillances de communication ralentissent la résolution, augmentent les temps d'arrêt et
            amplifient les dommages.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
      ref_id: T.03
      name: Supply Chain Compromise
      description:
        Adversaries exploit vulnerabilities by abusing trusted third-party relationships, manipulating products or
        delivery mechanisms before they reach final users, or compromising vendor environments.
      translations:
        fr:
          name: Compromission de la chaîne d'approvisionnement
          description:
            Les adversaires exploitent les vulnérabilités en abusant des relations de confiance avec des tiers, en
            manipulant les produits ou les mécanismes de livraison avant qu'ils n'atteignent les utilisateurs finaux, ou en
            compromettant les environnements des fournisseurs.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
      ref_id: T.04
      name: Exploitation of Known Vulnerabilities
      description:
        Adversaries target unpatched and misconfigured systems, particularly those exposed to the internet, leveraging
        software vulnerabilities, temporary malfunctions, or configuration errors to gain initial access.
      translations:
        fr:
          name: Exploitation de vulnérabilités connues
          description:
            Les adversaires ciblent les systèmes non corrigés et mal configurés, en particulier ceux exposés à Internet,
            en exploitant les vulnérabilités logicielles, les dysfonctionnements temporaires ou les erreurs de configuration
            pour obtenir un accès initial.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-05
      ref_id: T.05
      name: Unvalidated Security Controls
      description:
        Gaps in cyber defenses or overconfidence in existing protections due to lack of independent validation that
        implemented controls are properly configured and working as intended.
      translations:
        fr:
          name: Contrôles de sécurité non validés
          description:
            Lacunes dans les défenses cyber ou excès de confiance dans les protections existantes en raison d'un
            manque de validation indépendante du bon fonctionnement et de la configuration des contrôles mis en place.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
      ref_id: T.06
      name: Insufficient Asset and Network Visibility
      description:
        Incomplete or inaccurate understanding of organizational assets, network topology, and security logs inhibits
        effective detection, incident response, and recovery.
      translations:
        fr:
          name: Visibilité insuffisante des actifs et du réseau
          description:
            Compréhension incomplète ou inexacte des actifs organisationnels, de la topologie réseau et des journaux
            de sécurité, entravant la détection efficace, la réponse aux incidents et la reprise d'activité.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-07
      ref_id: T.07
      name: Default Credential Exploitation
      description:
        Adversaries acquire and exploit default manufacturer account credentials to gain initial access, maintain
        persistence, escalate privileges, or evade defenses.
      translations:
        fr:
          name: Exploitation des identifiants par défaut
          description:
            Les adversaires acquièrent et exploitent les identifiants de comptes par défaut du fabricant pour obtenir
            un accès initial, maintenir la persistance, élever les privilèges ou contourner les défenses.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-08
      ref_id: T.08
      name: Brute Force and Password Attacks
      description:
        Adversaries use brute force techniques to crack passwords, systematically guessing credentials using repetitive
        or iterative methods against unknown passwords or obtained hashes.
      translations:
        fr:
          name: Attaques par force brute et sur les mots de passe
          description:
            Les adversaires utilisent des techniques de force brute pour craquer les mots de passe, en devinant systématiquement
            les identifiants par des méthodes répétitives ou itératives sur des mots de passe inconnus ou des condensats obtenus.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
      ref_id: T.09
      name: Credential Theft and Misuse
      description:
        Adversaries obtain and exploit account credentials through theft, reuse, or abuse of inactive accounts to
        gain access, maintain persistence, escalate privileges, or bypass network access controls.
      translations:
        fr:
          name: Vol et utilisation abusive d'identifiants
          description:
            Les adversaires obtiennent et exploitent des identifiants de comptes par vol, réutilisation ou abus de
            comptes inactifs pour obtenir un accès, maintenir la persistance, élever les privilèges ou contourner les contrôles
            d'accès réseau.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      ref_id: T.10
      name: Unauthorized Access and Lateral Movement
      description:
        Unauthorized access to network resources enabling adversaries to move across systems undetected, escalate
        privileges, and compromise sensitive data and critical systems.
      translations:
        fr:
          name: Accès non autorisé et mouvement latéral
          description:
            Accès non autorisé aux ressources réseau permettant aux adversaires de se déplacer entre les systèmes
            sans être détectés, d'élever les privilèges et de compromettre les données sensibles et les systèmes critiques.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
      ref_id: T.11
      name: Social Engineering and Phishing
      description:
        Adversaries use deceptive emails, malicious attachments or links, and social engineering tactics to trick
        users into revealing sensitive information, executing malicious code, or granting unauthorized access.
      translations:
        fr:
          name: Ingénierie sociale et hameçonnage
          description:
            Les adversaires utilisent des courriels trompeurs, des pièces jointes ou liens malveillants et des tactiques
            d'ingénierie sociale pour inciter les utilisateurs à divulguer des informations sensibles, exécuter du code malveillant
            ou accorder un accès non autorisé.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-12
      ref_id: T.12
      name: Network Interception and Data Manipulation
      description:
        Adversaries position themselves between networked devices to enable network sniffing and data manipulation,
        or steal operational data for personal gain or future operations.
      translations:
        fr:
          name: Interception réseau et manipulation de données
          description:
            Les adversaires se positionnent entre les équipements réseau pour permettre l'écoute et la manipulation
            de données, ou voler des données opérationnelles à des fins personnelles ou pour de futures opérations.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-13
      ref_id: T.13
      name: Uncontained Network Compromise
      description:
        If a network is compromised by an unauthorized user, lack of segmentation allows malicious activity to spread
        uncontrolled across networks and critical infrastructure.
      translations:
        fr:
          name: Compromission réseau non contenue
          description:
            Si un réseau est compromis par un utilisateur non autorisé, l'absence de segmentation permet à l'activité
            malveillante de se propager de manière incontrôlée à travers les réseaux et les infrastructures critiques.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
      ref_id: T.14
      name: Malware and Malicious Code
      description:
        Adversaries deploy malware including payloads, droppers, and backdoors to control remote machines, evade
        defenses, and execute post-compromise actions. Malware can spread via removable media to air-gapped networks.
      translations:
        fr:
          name: Logiciels malveillants et code malveillant
          description:
            Les adversaires déploient des logiciels malveillants incluant des charges utiles, des téléchargeurs et
            des portes dérobées pour contrôler des machines à distance, contourner les défenses et exécuter des actions post-compromission.
            Les logiciels malveillants peuvent se propager via des supports amovibles vers des réseaux isolés.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-15
      ref_id: T.15
      name: Unmanaged System Changes
      description:
        Delayed, insufficient, or incomplete ability to maintain or restore functionality of critical devices and
        service operations due to unauthorized or untested changes.
      translations:
        fr:
          name: Changements système non maîtrisés
          description:
            Capacité retardée, insuffisante ou incomplète à maintenir ou restaurer le fonctionnement des dispositifs
            critiques et des opérations de service en raison de changements non autorisés ou non testés.
    - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-16
      ref_id: T.16
      name: Data Destruction and Service Disruption
      description:
        Adversaries disrupt critical systems, delete data, and disable recovery services to prevent system recovery,
        causing disruption to asset, service, or system availability.
      translations:
        fr:
          name: Destruction de données et interruption de service
          description:
            Les adversaires perturbent les systèmes critiques, suppriment des données et désactivent les services
            de récupération pour empêcher la restauration des systèmes, causant une interruption de la disponibilité des actifs,
            services ou systèmes.
  framework:
    urn: urn:intuitem:risk:framework:cisa-cpg-2.0
    ref_id: CISA-CPG-2.0
    name: CISA CPG v2.0
    description: CISA Cross-Sector Cybersecurity Performance Goals 2.0
    min_score: 1
    max_score: 4
    scores_definition:
      - score: 1
        name: Not Implemented
        description:
          The goal is not addressed. The organization has not taken action on the recommended practices, or actions
          are entirely ad hoc with no documented approach.
        translations:
          fr:
            name: Non mis en œuvre
            description:
              L'objectif n'est pas traité. L'organisation n'a pris aucune mesure concernant les pratiques recommandées,
              ou les actions sont entièrement ponctuelles sans approche documentée.
      - score: 2
        name: Partially Implemented
        description:
          Some recommended actions are in place but implementation is incomplete or inconsistent. Practices may be
          ad hoc or limited to specific areas of the organization.
        translations:
          fr:
            name: Partiellement mis en œuvre
            description:
              Certaines actions recommandées sont en place mais la mise en œuvre est incomplète ou incohérente. Les
              pratiques peuvent être ponctuelles ou limitées à des domaines spécifiques de l'organisation.
      - score: 3
        name: Largely Implemented
        description:
          Most recommended actions are systematically applied across the organization. Practices are documented,
          repeatable, and cover the majority of relevant assets and processes.
        translations:
          fr:
            name: Largement mis en œuvre
            description:
              La plupart des actions recommandées sont systématiquement appliquées dans l'ensemble de l'organisation.
              Les pratiques sont documentées, reproductibles et couvrent la majorité des actifs et processus concernés.
      - score: 4
        name: Fully Implemented
        description:
          All recommended actions are in place, tested, and continuously improved. Practices are organization-wide,
          regularly reviewed, and adapted based on lessons learned and evolving threats.
        translations:
          fr:
            name: Entièrement mis en œuvre
            description:
              Toutes les actions recommandées sont en place, testées et continuellement améliorées. Les pratiques
              sont appliquées à l'échelle de l'organisation, régulièrement revues et adaptées en fonction des retours d'expérience
              et de l'évolution des menaces.
    requirement_nodes:
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
        assessable: false
        depth: 1
        ref_id: GV
        name: GOVERN
        description:
          The organization's cybersecurity risk management strategy, expectations, and policy are established, communicated,
          and monitored.
        translations:
          fr:
            name: GOUVERNER
            description:
              La stratégie, les attentes et la politique de gestion des risques de cybersécurité de l'organisation
              sont établies, communiquées et surveillées.
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
        assessable: false
        depth: 1
        ref_id: ID
        name: IDENTIFY
        description: The organization's current cybersecurity risks are understood.
        translations:
          fr:
            name: IDENTIFIER
            description: Les risques de cybersécurité actuels de l'organisation sont compris.
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        assessable: false
        depth: 1
        ref_id: PR
        name: PROTECT
        description: Safeguards to manage the organization's cybersecurity risks are used.
        translations:
          fr:
            name: PROTÉGER
            description: Des mesures de protection sont utilisées pour gérer les risques de cybersécurité de l'organisation.
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:de
        assessable: false
        depth: 1
        ref_id: DE
        name: DETECT
        description: Possible cybersecurity attacks and compromises are found and analyzed.
        translations:
          fr:
            name: DÉTECTER
            description: Les attaques et compromissions potentielles en matière de cybersécurité sont détectées et analysées.
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rs
        assessable: false
        depth: 1
        ref_id: RS
        name: RESPOND
        description: Actions regarding a detected cybersecurity incident are taken.
        translations:
          fr:
            name: RÉPONDRE
            description: Des actions sont prises concernant un incident de cybersécurité détecté.
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rc
        assessable: false
        depth: 1
        ref_id: RC
        name: RECOVER
        description: Assets and operations affected by a cybersecurity incident are restored.
        translations:
          fr:
            name: RÉTABLIR
            description: Les actifs et les opérations affectés par un incident de cybersécurité sont restaurés.
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-a
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
        ref_id: 1.A
        name: Establish Cybersecurity Responsibilities
        description:
          Roles, responsibilities, and authorities related to the organization's cybersecurity program are established,
          communicated, enforced, and aligned within the organization and external partners.
        annotation: |-
          Outcome: Roles, responsibilities, and authorities related to the organization's cybersecurity program are established, communicated, enforced, and aligned within the organization and external partners.

          TTP/Risk Addressed: Lack of sufficient cybersecurity accountability, investment, or effectiveness.

          Recommended Actions:
          - Document all cybersecurity roles and responsibilities in organizational policy
          - Distribute cybersecurity responsibilities across the organization; third parties may assist
          - Implement legal and regulatory cybersecurity requirements, including privacy
          - Establish continuous IT/OT team collaboration for security and operational effectiveness

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-01
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-01
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-03
        translations:
          fr:
            name: Établir les responsabilités en cybersécurité
            description:
              Les rôles, responsabilités et autorités liés au programme de cybersécurité de l'organisation sont établis,
              communiqués, appliqués et alignés au sein de l'organisation et avec les partenaires externes.
            annotation: |-
              Résultat attendu : Les rôles, responsabilités et autorités liés au programme de cybersécurité de l'organisation sont établis, communiqués, appliqués et alignés au sein de l'organisation et avec les partenaires externes.

              TTP/Risque traité : Manque de responsabilité, d'investissement ou d'efficacité en matière de cybersécurité en raison de l'absence ou de l'inadéquation des politiques, des rôles et des procédures de gestion des risques cyber.

              Actions recommandées :
              - Documenter tous les rôles et responsabilités en cybersécurité dans la politique organisationnelle
              - Répartir les responsabilités en cybersécurité au sein de l'organisation ; des tiers peuvent y contribuer
              - Mettre en œuvre les exigences légales et réglementaires en cybersécurité, y compris la protection de la vie privée
              - Établir une collaboration continue entre les équipes IT et OT pour l'efficacité de la sécurité et des opérations

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-b
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
        ref_id: 1.B
        name: Manage Cybersecurity Oversight
        description: The organization's cybersecurity risk management strategy, expectations, and policies are established.
        annotation: |-
          Outcome: The organization's cybersecurity risk management strategy, expectations, and policies are established.

          TTP/Risk Addressed: Insufficient cybersecurity policies and procedures/practices that can manage cybersecurity risk for the organization's technologies and processes.

          Recommended Actions:
          - Review cybersecurity policies annually; update when requirements, risks, threats, or technology changes
          - Communicate and enforce policies reflecting organizational strategy and priorities
          - Establish governance encompassing regulatory, legal, risk, environmental, and operational obligations
          - Develop OT-specific policies acknowledging IT program limitations and critical function priorities

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-01
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-02
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-03
        translations:
          fr:
            name: Gérer la gouvernance de la cybersécurité
            description:
              La stratégie, les attentes et les politiques de gestion des risques de cybersécurité de l'organisation
              sont établies.
            annotation: |-
              Résultat attendu : La stratégie, les attentes et les politiques de gestion des risques de cybersécurité de l'organisation sont établies.

              TTP/Risque traité : Manque de responsabilité, d'investissement ou d'efficacité en matière de cybersécurité en raison de l'absence ou de l'inadéquation des politiques, des rôles et des procédures de gestion des risques cyber.

              Actions recommandées :
              - Réviser les politiques de cybersécurité annuellement ; les mettre à jour en cas de changement des exigences, risques, menaces ou technologies
              - Communiquer et appliquer les politiques reflétant la stratégie et les priorités organisationnelles
              - Établir une gouvernance englobant les obligations réglementaires, juridiques, environnementales et opérationnelles
              - Développer des politiques spécifiques aux OT tenant compte des limitations des programmes IT et des priorités des fonctions critiques

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-c
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
        ref_id: 1.C
        name: Manage Incident Response Plans
        description:
          Identify improvements by practicing cybersecurity and incident response plans to maintain and update the
          organization's cybersecurity program.
        annotation: |-
          Outcome: Identify improvements by practicing cybersecurity and incident response plans to maintain and update the organization's cybersecurity program.

          TTP/Risk Addressed: Inability to quickly and effectively isolate, contain, eradicate, remediate, and communicate about cybersecurity incidents.

          Recommended Actions:
          - Develop, maintain, update, and regularly exercise IR plans for common and organizationally specific scenarios
          - Ensure realistic drills including all relevant stakeholders
          - Review and drill IR plans minimum annually
          - Account for OT-specific safety and containment considerations

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-04
        translations:
          fr:
            name: Gérer les plans de réponse aux incidents
            description:
              Identifier les améliorations en pratiquant les plans de cybersécurité et de réponse aux incidents pour
              maintenir et mettre à jour le programme de cybersécurité de l'organisation.
            annotation: |-
              Résultat attendu : Identifier les améliorations en pratiquant les plans de cybersécurité et de réponse aux incidents pour maintenir et mettre à jour le programme de cybersécurité de l'organisation.

              TTP/Risque traité : Incapacité à isoler, contenir, éradiquer, remédier et communiquer rapidement et efficacement lors d'incidents de cybersécurité. Les défaillances de communication ralentissent la résolution, augmentent les temps d'arrêt et amplifient les dommages.

              Actions recommandées :
              - Développer, maintenir, mettre à jour et exercer régulièrement les plans de RI pour des scénarios courants et spécifiques à l'organisation
              - Garantir des exercices réalistes incluant toutes les parties prenantes
              - Réviser et tester les plans de RI au minimum annuellement
              - Prendre en compte les considérations de sûreté et de confinement spécifiques aux OT

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-d
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
        ref_id: 1.D
        name: Supply Chain Incident Reporting & Vulnerability Disclosure
        description:
          Organizations more rapidly learn about and respond to known incidents or breaches across vendors and service
          providers.
        annotation: |-
          Outcome: Organizations more rapidly learn about and respond to known incidents or breaches across vendors and service providers.

          TTP/Risk Addressed: Insufficient cybersecurity supply chain risk management (C-SCRM) practices that cannot securely support the organization's technologies and processes.

          Recommended Actions:
          - Require vendors/service providers to notify customers of security incidents and vulnerabilities within risk-informed timeframes via SLAs and contracts
          - Document and track OT asset serial numbers, checksums, digital certificates/signatures to verify authenticity of hardware, software, and firmware

          Cost: Moderate | Impact: Moderate | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-05
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-06
        translations:
          fr:
            name: Signalement des incidents et divulgation des vulnérabilités de la chaîne d'approvisionnement
            description:
              Les organisations apprennent et répondent plus rapidement aux incidents ou violations connus chez les
              fournisseurs et prestataires de services.
            annotation: |-
              Résultat attendu : Les organisations apprennent et répondent plus rapidement aux incidents ou violations connus chez les fournisseurs et prestataires de services.

              TTP/Risque traité : Les adversaires exploitent les vulnérabilités en abusant des relations de confiance avec des tiers, en manipulant les produits ou les mécanismes de livraison avant qu'ils n'atteignent les utilisateurs finaux, ou en compromettant les environnements des fournisseurs.

              Actions recommandées :
              - Exiger des fournisseurs et prestataires qu'ils notifient les clients des incidents de sécurité et des vulnérabilités dans des délais adaptés au risque via des SLA et des contrats
              - Documenter et suivre les numéros de série, sommes de contrôle, certificats numériques et signatures des actifs OT pour vérifier l'authenticité du matériel, des logiciels et des micrologiciels

              Coût : Modéré | Impact : Modéré | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-e
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
        ref_id: 1.E
        name: Manage Risks from Managed Service Providers
        description:
          The risks posed by a managed service provider (MSP) are identified, recorded, assessed, prioritized, monitored,
          and updated over the course of the relationship.
        annotation: |-
          Outcome: The risks posed by a managed service provider (MSP) are identified, recorded, assessed, prioritized, monitored, and updated over the course of the relationship.

          TTP/Risk Addressed: Adversaries can exploit vulnerabilities by abusing trusted third-party relationships.

          Recommended Actions:
          - Develop understanding of MSP services and security products
          - Understand contractual agreements and proactively address security gaps outside contract scope
          - Ensure contracts detail how and when MSPs notify customers of incidents affecting their environment

          Cost: Moderate | Impact: Moderate | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-07
        translations:
          fr:
            name: Gérer les risques liés aux prestataires de services managés
            description:
              Les risques posés par un prestataire de services managés (MSP) sont identifiés, enregistrés, évalués,
              priorisés, surveillés et mis à jour tout au long de la relation.
            annotation: |-
              Résultat attendu : Les risques posés par un prestataire de services managés (MSP) sont identifiés, enregistrés, évalués, priorisés, surveillés et mis à jour tout au long de la relation.

              TTP/Risque traité : Les adversaires exploitent les vulnérabilités en abusant des relations de confiance avec des tiers, en manipulant les produits ou les mécanismes de livraison avant qu'ils n'atteignent les utilisateurs finaux, ou en compromettant les environnements des fournisseurs.

              Actions recommandées :
              - Développer la compréhension des services et produits de sécurité du MSP
              - Comprendre les accords contractuels et combler proactivement les lacunes de sécurité hors du périmètre contractuel
              - S'assurer que les contrats précisent comment et quand les MSP notifient les clients des incidents affectant leur environnement

              Coût : Modéré | Impact : Modéré | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-a
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
        ref_id: 2.A
        name: Manage Organizational Assets
        description:
          A maintained asset inventory to improve cybersecurity resilience by reducing downtime, aiding recovery,
          bolstering defenses, and improving preparedness.
        annotation: |-
          Outcome: A maintained asset inventory to improve cybersecurity resilience by reducing downtime, aiding recovery, bolstering defenses, and improving preparedness.

          TTP/Risk Addressed: Adversaries might use computer accessories, networking hardware, or other devices as entry points to infiltrate systems or networks.

          Recommended Actions:
          - Maintain regularly updated inventory of all organizational assets including data, hardware, software, systems, facilities, and personnel
          - Update critical IT/OT assets more frequently

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-08
        translations:
          fr:
            name: Gérer les actifs organisationnels
            description:
              Un inventaire maintenu des actifs pour améliorer la résilience en cybersécurité en réduisant les temps
              d'arrêt, en facilitant la reprise, en renforçant les défenses et en améliorant la préparation.
            annotation: |-
              Résultat attendu : Un inventaire maintenu des actifs pour améliorer la résilience en cybersécurité en réduisant les temps d'arrêt, en facilitant la reprise, en renforçant les défenses et en améliorant la préparation.

              TTP/Risque traité : Compréhension incomplète ou inexacte des actifs organisationnels, de la topologie réseau et des journaux de sécurité, entravant la détection efficace, la réponse aux incidents et la reprise d'activité.

              Actions recommandées :
              - Maintenir un inventaire régulièrement mis à jour de tous les actifs organisationnels incluant les données, le matériel, les logiciels, les systèmes, les installations et le personnel
              - Mettre à jour plus fréquemment les actifs IT/OT critiques

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-b
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
        ref_id: 2.B
        name: Mitigate Known Vulnerabilities
        description: Reduced likelihood of threat actors exploiting known vulnerabilities to breach organizational networks.
        annotation: |-
          Outcome: Reduced likelihood of threat actors exploiting known vulnerabilities to breach organizational networks.

          TTP/Risk Addressed: Adversaries frequently target unpatched and misconfigured systems, particularly those exposed to the internet. Adversaries often leverage software vulnerabilities, temporary malfunctions, or configuration errors to gain initial access to a network.

          Recommended Actions:
          - Implement vulnerability management program to patch and mitigate misconfigured software timely
          - Monitor risk response progress via POA&M, risk registers, and risk detail reports
          - Document potential risks of proposed changes; provide rollback guidance
          - Assign responsibilities for processing cybersecurity threat, vulnerability, or incident disclosures
          - Incorporate compensating security controls for legacy systems where possible
          - For OT assets where patching is infeasible, apply compensating controls (segmentation, monitoring)

          Cost: High | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-09
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-10
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-27
        translations:
          fr:
            name: Atténuer les vulnérabilités connues
            description:
              Réduction de la probabilité que des acteurs malveillants exploitent des vulnérabilités connues pour
              compromettre les réseaux de l'organisation.
            annotation: |-
              Résultat attendu : Réduction de la probabilité que des acteurs malveillants exploitent des vulnérabilités connues pour compromettre les réseaux de l'organisation.

              TTP/Risque traité : Les adversaires ciblent les systèmes non corrigés et mal configurés, en particulier ceux exposés à Internet, en exploitant les vulnérabilités logicielles, les dysfonctionnements temporaires ou les erreurs de configuration pour obtenir un accès initial.

              Actions recommandées :
              - Mettre en œuvre un programme de gestion des vulnérabilités pour corriger et atténuer les logiciels mal configurés en temps voulu
              - Suivre l'avancement de la réponse aux risques via les POA&M, les registres de risques et les rapports détaillés
              - Documenter les risques potentiels des changements proposés ; fournir des instructions de retour en arrière
              - Attribuer les responsabilités pour le traitement des divulgations de menaces, vulnérabilités ou incidents
              - Incorporer des contrôles de sécurité compensatoires pour les systèmes existants lorsque possible
              - Pour les actifs OT où la correction est impossible, appliquer des contrôles compensatoires (segmentation, surveillance)

              Coût : Élevé | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-c
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
        ref_id: 2.C
        name: Obtain Independent Validation of Cybersecurity Controls
        description: Validate that implemented security controls are properly configured and working as intended.
        annotation: |-
          Outcome: Validate that implemented security controls are properly configured and working as intended.

          TTP/Risk Addressed: Gaps in cyber defenses or overconfidence in existing protections.

          Recommended Actions:
          - Regularly engage third-party cybersecurity experts for penetration tests, bug bounties, incident simulations, and table-top exercises
          - Assess ability of adversaries to infiltrate and move laterally within networks targeting critical systems
          - Ensure findings from tests are addressed

          Cost: High | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-05
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-11
        translations:
          fr:
            name: Obtenir une validation indépendante des contrôles de cybersécurité
            description:
              Valider que les contrôles de sécurité mis en œuvre sont correctement configurés et fonctionnent comme
              prévu.
            annotation: |-
              Résultat attendu : Valider que les contrôles de sécurité mis en œuvre sont correctement configurés et fonctionnent comme prévu.

              TTP/Risque traité : Lacunes dans les défenses cyber ou excès de confiance dans les protections existantes en raison d'un manque de validation indépendante du bon fonctionnement et de la configuration des contrôles mis en place.

              Actions recommandées :
              - Engager régulièrement des experts tiers en cybersécurité pour des tests d'intrusion, des bug bounties, des simulations d'incidents et des exercices sur table
              - Évaluer la capacité des adversaires à infiltrer et se déplacer latéralement dans les réseaux ciblant les systèmes critiques
              - S'assurer que les conclusions des tests sont traitées

              Coût : Élevé | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-d
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
        ref_id: 2.D
        name: Maintain Vulnerability Disclosure/Reporting Process
        description: Organizations more rapidly learn about vulnerabilities or weaknesses.
        annotation: |-
          Outcome: Organizations more rapidly learn about vulnerabilities or weaknesses.

          TTP/Risk Addressed: Unreported security vulnerabilities in software, networks, devices, and systems can be exploited by adversaries before they are mitigated.

          Recommended Actions:
          - Maintain public, easily discoverable method for notifying security teams of vulnerable, misconfigured, or exploitable assets via email or web form
          - Acknowledge valid submissions and respond timely considering completeness and complexity
          - Mitigate validated, exploitable weaknesses consistently with severity
          - Protect individuals identifying/reporting vulnerabilities in good faith under safe harbor provisions
          - Apply security.txt files conforming to RFC 9116 on all public-facing web domains

          Cost: Low | Impact: Low | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-12
        translations:
          fr:
            name: Maintenir un processus de divulgation et de signalement des vulnérabilités
            description: Les organisations apprennent plus rapidement les vulnérabilités ou faiblesses.
            annotation: |-
              Résultat attendu : Les organisations apprennent plus rapidement les vulnérabilités ou faiblesses.

              TTP/Risque traité : Les adversaires ciblent les systèmes non corrigés et mal configurés, en particulier ceux exposés à Internet, en exploitant les vulnérabilités logicielles, les dysfonctionnements temporaires ou les erreurs de configuration pour obtenir un accès initial.

              Actions recommandées :
              - Maintenir une méthode publique et facilement accessible pour signaler aux équipes de sécurité les actifs vulnérables, mal configurés ou exploitables par courriel ou formulaire web
              - Accuser réception des soumissions valides et répondre dans des délais raisonnables
              - Atténuer les faiblesses validées et exploitables proportionnellement à leur sévérité
              - Protéger les personnes identifiant ou signalant les vulnérabilités de bonne foi
              - Appliquer les fichiers security.txt conformes à la RFC 9116 sur tous les domaines web publics

              Coût : Faible | Impact : Faible | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-e
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
        ref_id: 2.E
        name: Document Network Topology
        description: More efficiently and effectively respond to incidents and maintain service continuity.
        annotation: |-
          Outcome: More efficiently and effectively respond to incidents and maintain service continuity.

          TTP/Risk Addressed: Incomplete or inaccurate understanding of network topology inhibits effective incident response and recovery.

          Recommended Actions:
          - Maintain accurate documentation describing current network topology and relevant information across all IT and OT networks
          - Perform network reviews and track annually; update when topology changes

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-13
        translations:
          fr:
            name: Documenter la topologie réseau
            description: Répondre plus efficacement aux incidents et maintenir la continuité de service.
            annotation: |-
              Résultat attendu : Répondre plus efficacement aux incidents et maintenir la continuité de service.

              TTP/Risque traité : Compréhension incomplète ou inexacte des actifs organisationnels, de la topologie réseau et des journaux de sécurité, entravant la détection efficace, la réponse aux incidents et la reprise d'activité.

              Actions recommandées :
              - Maintenir une documentation précise décrivant la topologie réseau actuelle et les informations pertinentes pour tous les réseaux IT et OT
              - Effectuer des revues réseau et les suivre annuellement ; mettre à jour en cas de changement de topologie

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-a
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.A
        name: Changing Default Passwords
        description: Prevent threat actors from using default passwords to achieve initial access and move laterally in a network.
        annotation: |-
          Outcome: Prevent threat actors from using default passwords to achieve initial access and move laterally in a network.

          TTP/Risk Addressed: Adversaries might acquire and exploit default account credentials to gain initial access, maintain persistence, escalate privileges, or evade defenses.

          Recommended Actions:
          - Require changing default manufacturer passwords for all hardware, software, and firmware before network connection
          - If infeasible (hard-coded passwords), document and implement compensating controls; monitor logs for network traffic and login attempts
          - Change default passwords on existing OT systems; establish policy for all new/future devices

          Cost: Low | Impact: High | Complexity: Simple
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-07
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-14
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
        translations:
          fr:
            name: Changer les mots de passe par défaut
            description:
              Empêcher les acteurs malveillants d'utiliser les mots de passe par défaut pour obtenir un accès initial
              et se déplacer latéralement dans un réseau.
            annotation: |-
              Résultat attendu : Empêcher les acteurs malveillants d'utiliser les mots de passe par défaut pour obtenir un accès initial et se déplacer latéralement dans un réseau.

              TTP/Risque traité : Les adversaires acquièrent et exploitent les identifiants de comptes par défaut du fabricant pour obtenir un accès initial, maintenir la persistance, élever les privilèges ou contourner les défenses.

              Actions recommandées :
              - Exiger le changement des mots de passe par défaut du fabricant pour tout matériel, logiciel et micrologiciel avant la connexion au réseau
              - Si impossible (mots de passe codés en dur), documenter et mettre en œuvre des contrôles compensatoires ; surveiller les journaux de trafic réseau et de tentatives de connexion
              - Changer les mots de passe par défaut sur les systèmes OT existants ; établir une politique pour tous les nouveaux dispositifs

              Coût : Faible | Impact : Élevé | Complexité : Simple
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-b
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.B
        name: Establish Minimum Password Strength
        description: Organizational passwords are harder for threat actors to guess or crack.
        annotation: |-
          Outcome: Organizational passwords are harder for threat actors to guess or crack.

          TTP/Risk Addressed: Adversaries use brute force techniques to crack passwords when unknown or hashes are obtained. They systematically guess passwords using repetitive or iterative methods.

          Recommended Actions:
          - Enforce system policy establishing minimum password strength including 16+ character length for all password-protected IT and OT assets
          - Leverage passphrases and password managers for longer passwords
          - When minimum lengths are infeasible, apply compensating controls and record them; log all login attempts
          - Prioritize upgrade/replacement of assets unable to support sufficient strength passwords

          Cost: Low | Impact: High | Complexity: Simple
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-08
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-15
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
        translations:
          fr:
            name: Établir une robustesse minimale des mots de passe
            description: Les mots de passe de l'organisation sont plus difficiles à deviner ou craquer pour les acteurs malveillants.
            annotation: |-
              Résultat attendu : Les mots de passe de l'organisation sont plus difficiles à deviner ou craquer pour les acteurs malveillants.

              TTP/Risque traité : Les adversaires utilisent des techniques de force brute pour craquer les mots de passe, en devinant systématiquement les identifiants par des méthodes répétitives ou itératives sur des mots de passe inconnus ou des condensats obtenus.

              Actions recommandées :
              - Appliquer une politique système établissant une robustesse minimale des mots de passe incluant une longueur de 16 caractères ou plus pour tous les actifs IT et OT protégés par mot de passe
              - Utiliser des phrases de passe et des gestionnaires de mots de passe
              - Lorsque les longueurs minimales sont impossibles, appliquer des contrôles compensatoires et les enregistrer ; journaliser toutes les tentatives de connexion
              - Prioriser la mise à niveau ou le remplacement des actifs ne supportant pas une robustesse suffisante

              Coût : Faible | Impact : Élevé | Complexité : Simple
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-c
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.C
        name: Create Unique Credentials
        description:
          Adversaries are unable to reuse compromised credentials to move laterally across the organization, particularly
          between IT and OT networks.
        annotation: |-
          Outcome: Adversaries are unable to reuse compromised credentials to move laterally across the organization, particularly between IT and OT networks.

          TTP/Risk Addressed: Adversaries can obtain and exploit account credentials to gain access, maintain persistence, escalate privileges, or evade defenses. Compromised credentials can bypass network access controls.

          Recommended Actions:
          - Create distinct, separate credentials for similar services and asset access across IT/OT networks
          - Users refrain from reusing passwords across accounts, applications, and services
          - System administrators and service/machine accounts have unique passwords
          - No universal non-person entity (NPE) account passwords
          - Utilize role-based accounts for IT/OT systems when possible

          Cost: Low | Impact: High | Complexity: Simple
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-16
        translations:
          fr:
            name: Créer des identifiants uniques
            description:
              Les adversaires ne peuvent pas réutiliser des identifiants compromis pour se déplacer latéralement
              dans l'organisation, en particulier entre les réseaux IT et OT.
            annotation: |-
              Résultat attendu : Les adversaires ne peuvent pas réutiliser des identifiants compromis pour se déplacer latéralement dans l'organisation, en particulier entre les réseaux IT et OT.

              TTP/Risque traité : Les adversaires obtiennent et exploitent des identifiants de comptes par vol, réutilisation ou abus de comptes inactifs pour obtenir un accès, maintenir la persistance, élever les privilèges ou contourner les contrôles d'accès réseau.

              Actions recommandées :
              - Créer des identifiants distincts et séparés pour des services similaires et l'accès aux actifs entre les réseaux IT/OT
              - Les utilisateurs s'abstiennent de réutiliser les mots de passe entre les comptes, applications et services
              - Les administrateurs système et les comptes de service/machine ont des mots de passe uniques
              - Pas de mot de passe universel pour les comptes non personnels (NPE)
              - Utiliser des comptes basés sur les rôles pour les systèmes IT/OT lorsque possible

              Coût : Faible | Impact : Élevé | Complexité : Simple
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-d
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.D
        name: Revoking Credentials for Departing Staff
        description: Prevent unauthorized access to organizational accounts or resources by former staff.
        annotation: |-
          Outcome: Prevent unauthorized access to organizational accounts or resources by former staff.

          TTP/Risk Addressed: Adversaries can exploit inactive accounts of former staff to evade detection.

          Recommended Actions:
          - Establish defined, enforced administrative offboarding process for staff, contractors, vendors including return of physical tokens/badges and revocation of all system/facility access
          - Review user access and disable inactive accounts after specified period (e.g., 30 days), ideally via automated process

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-17
        translations:
          fr:
            name: Révoquer les identifiants du personnel sortant
            description: Empêcher l'accès non autorisé aux comptes ou ressources de l'organisation par d'anciens employés.
            annotation: |-
              Résultat attendu : Empêcher l'accès non autorisé aux comptes ou ressources de l'organisation par d'anciens employés.

              TTP/Risque traité : Les adversaires obtiennent et exploitent des identifiants de comptes par vol, réutilisation ou abus de comptes inactifs pour obtenir un accès, maintenir la persistance, élever les privilèges ou contourner les contrôles d'accès réseau.

              Actions recommandées :
              - Établir un processus administratif défini et appliqué de départ pour le personnel, les prestataires et les fournisseurs, incluant la restitution des jetons physiques et badges et la révocation de tous les accès
              - Réviser les accès utilisateurs et désactiver les comptes inactifs après une période définie (par ex. 30 jours), idéalement via un processus automatisé

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-e
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.E
        name: Monitor Unsuccessful (Automated) Login Attempts
        description: Protect organizations from automated, credential-based attacks.
        annotation: |-
          Outcome: Protect organizations from automated, credential-based attacks.

          TTP/Risk Addressed: Adversaries might acquire and exploit default account credentials to gain access, maintain persistence, escalate privileges, or evade defenses.

          Recommended Actions:
          - Capture and log all unsuccessful logins per organization's security policy
          - Notify security personnel after consecutive unsuccessful attempts and deviations from normal behavior
          - Log and store alerts in relevant security or ticketing system for retroactive analysis

          Cost: Moderate | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-07
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-30
        translations:
          fr:
            name: Surveiller les tentatives de connexion infructueuses (automatisées)
            description: Protéger les organisations contre les attaques automatisées basées sur les identifiants.
            annotation: |-
              Résultat attendu : Protéger les organisations contre les attaques automatisées basées sur les identifiants.

              TTP/Risque traité : Les adversaires acquièrent et exploitent les identifiants de comptes par défaut du fabricant pour obtenir un accès initial, maintenir la persistance, élever les privilèges ou contourner les défenses.

              Actions recommandées :
              - Capturer et journaliser toutes les tentatives de connexion infructueuses conformément à la politique de sécurité de l'organisation
              - Notifier le personnel de sécurité après des tentatives consécutives infructueuses et des écarts par rapport au comportement normal
              - Journaliser et stocker les alertes dans le système de sécurité ou de tickets pertinent pour analyse rétrospective

              Coût : Modéré | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-f
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.F
        name: Implement Multi-factor Authentication
        description: Add a critical, additional layer of security to protect asset accounts.
        annotation: |-
          Outcome: Add a critical, additional layer of security to protect asset accounts.

          TTP/Risk Addressed: Adversaries without prior knowledge of legitimate credentials might try commonly used passwords across various accounts. They might also systematically guess passwords using repetitive or iterative methods.

          Recommended Actions:
          - Require MFA using strongest available method for assets with remote access
          - MFA options ranked by strength: (1) Phishing-resistant MFA (FIDO/WebAuthn or PKI-based), (2) Mobile app-based soft tokens, (3) SMS/voice only when no other options available
          - All IT accounts leverage MFA; prioritize highest-risk accounts
          - OT: Enable MFA on all remotely accessible accounts/systems; if unavailable, remove remote access, add segmentation

          Cost: Moderate | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-08
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-19
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
        translations:
          fr:
            name: Mettre en œuvre l'authentification multifacteur
            description: Ajouter une couche de sécurité critique et supplémentaire pour protéger les comptes des actifs.
            annotation: |-
              Résultat attendu : Ajouter une couche de sécurité critique et supplémentaire pour protéger les comptes des actifs.

              TTP/Risque traité : Les adversaires utilisent des techniques de force brute pour craquer les mots de passe, en devinant systématiquement les identifiants par des méthodes répétitives ou itératives sur des mots de passe inconnus ou des condensats obtenus.

              Actions recommandées :
              - Exiger l'AMF en utilisant la méthode la plus forte disponible pour les actifs avec accès à distance
              - Options d'AMF classées par robustesse : (1) AMF résistante à l'hameçonnage (FIDO/WebAuthn ou basée sur PKI), (2) Jetons logiciels d'application mobile, (3) SMS/voix uniquement en l'absence d'autre option
              - Tous les comptes IT utilisent l'AMF ; prioriser les comptes à plus haut risque
              - OT : Activer l'AMF sur tous les comptes et systèmes accessibles à distance ; si indisponible, supprimer l'accès distant, ajouter la segmentation

              Coût : Modéré | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-g
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.G
        name: Administrators Maintain Separate User and Privileged Accounts
        description:
          Make it harder for threat actors to gain access to administrator or privileged accounts, even if common
          user accounts are compromised.
        annotation: |-
          Outcome: Make it harder for threat actors to gain access to administrator or privileged accounts, even if common user accounts are compromised.

          TTP/Risk Addressed: Adversaries might obtain and exploit credentials from existing accounts for initial access, persistence, privilege escalation, or defense evasion.

          Recommended Actions:
          - User accounts lack administrator privileges
          - Administrators maintain separate user accounts for non-admin activities
          - Re-evaluate privileges on recurring basis validating continued need
          - Maintain separation of duties distributing responsibilities across multiple individuals/roles

          Cost: Low | Impact: High | Complexity: Simple
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-20
        translations:
          fr:
            name: Les administrateurs maintiennent des comptes utilisateurs et privilégiés séparés
            description:
              Rendre plus difficile l'accès des acteurs malveillants aux comptes d'administrateur ou privilégiés,
              même si les comptes utilisateurs courants sont compromis.
            annotation: |-
              Résultat attendu : Rendre plus difficile l'accès des acteurs malveillants aux comptes d'administrateur ou privilégiés, même si les comptes utilisateurs courants sont compromis.

              TTP/Risque traité : Les adversaires obtiennent et exploitent des identifiants de comptes par vol, réutilisation ou abus de comptes inactifs pour obtenir un accès, maintenir la persistance, élever les privilèges ou contourner les contrôles d'accès réseau.

              Actions recommandées :
              - Les comptes utilisateurs ne disposent pas de privilèges d'administrateur
              - Les administrateurs maintiennent des comptes utilisateurs séparés pour les activités non administratives
              - Réévaluer les privilèges périodiquement pour valider le besoin continu
              - Maintenir la séparation des tâches en répartissant les responsabilités entre plusieurs individus et rôles

              Coût : Faible | Impact : Élevé | Complexité : Simple
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-h
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.H
        name: Implement the Principles of Least Privilege
        description:
          Minimizes unauthorized access to systems, data, and processes, reduces human error, and prevents malicious
          actions.
        annotation: |-
          Outcome: Minimizes unauthorized access to systems, data, and processes, reduces human error, and prevents malicious actions.

          TTP/Risk Addressed: Unauthorized access to network resources and the potential for adversaries to move across systems undetected, compromising sensitive data and critical systems.

          Recommended Actions:
          - All user accounts, system roles, and processes operate with minimum privileges necessary
          - Perform quarterly reviews of access permissions and role assignments validating policy compliance

          Cost: Low | Impact: High | Complexity: Simple
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-21
        translations:
          fr:
            name: Mettre en œuvre les principes du moindre privilège
            description:
              Minimise l'accès non autorisé aux systèmes, données et processus, réduit les erreurs humaines et prévient
              les actions malveillantes.
            annotation: |-
              Résultat attendu : Minimise l'accès non autorisé aux systèmes, données et processus, réduit les erreurs humaines et prévient les actions malveillantes.

              TTP/Risque traité : Accès non autorisé aux ressources réseau permettant aux adversaires de se déplacer entre les systèmes sans être détectés, d'élever les privilèges et de compromettre les données sensibles et les systèmes critiques.

              Actions recommandées :
              - Tous les comptes utilisateurs, rôles système et processus fonctionnent avec les privilèges minimaux nécessaires
              - Effectuer des revues trimestrielles des permissions d'accès et des attributions de rôles pour valider la conformité à la politique

              Coût : Faible | Impact : Élevé | Complexité : Simple
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-i
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.I
        name: Implement Logical/Physical Network Segmentation
        description:
          Limiting the impact of a potential breach and preventing adversaries from accessing sensitive data, spaces,
          and/or critical infrastructure.
        annotation: |-
          Outcome: Limiting the impact of a potential breach and preventing adversaries from accessing sensitive data, spaces, and/or critical infrastructure.

          TTP/Risk Addressed: If a network is compromised by an unauthorized user, a securely segregated network can contain malicious occurrences.

          Recommended Actions:
          - Place routers between networks creating boundaries, increasing broadcast domains, and filtering broadcast traffic
          - Use boundaries to contain security breaches by restricting traffic to separate segments and shutting down segments during intrusion
          - Physically segment OT enclaves (e.g., data diodes) when applicable

          Cost: High | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-13
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
        translations:
          fr:
            name: Mettre en œuvre la segmentation réseau logique et physique
            description:
              Limiter l'impact d'une compromission potentielle et empêcher les adversaires d'accéder aux données
              sensibles, aux espaces et/ou aux infrastructures critiques.
            annotation: |-
              Résultat attendu : Limiter l'impact d'une compromission potentielle et empêcher les adversaires d'accéder aux données sensibles, aux espaces et/ou aux infrastructures critiques.

              TTP/Risque traité : Si un réseau est compromis par un utilisateur non autorisé, l'absence de segmentation permet à l'activité malveillante de se propager de manière incontrôlée à travers les réseaux et les infrastructures critiques.

              Actions recommandées :
              - Placer des routeurs entre les réseaux créant des limites, augmentant les domaines de diffusion et filtrant le trafic
              - Utiliser les limites pour contenir les violations de sécurité en restreignant le trafic à des segments séparés et en isolant les segments lors d'une intrusion
              - Segmenter physiquement les enclaves OT (par ex. diodes de données) le cas échéant

              Coût : Élevé | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-j
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.J
        name: Implement Cybersecurity Training
        description: Organizational users learn and perform more secure behaviors.
        annotation: |-
          Outcome: Organizational users learn and perform more secure behaviors.

          TTP/Risk Addressed: Users vulnerable to spear phishing, social engineering, and other techniques that involve user interaction.

          Recommended Actions:
          - Provide initial cybersecurity training before new employees access computer systems
          - Provide at least annual training covering social engineering recognition, attack reporting, acceptable use, and basic cyber hygiene
          - Identify specialized roles requiring additional training
          - Provide role-based training to specialized roles including contractors, partners, suppliers
          - Provide OT personnel security awareness training

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-23
        translations:
          fr:
            name: Mettre en œuvre la formation à la cybersécurité
            description: Les utilisateurs de l'organisation apprennent et adoptent des comportements plus sûrs.
            annotation: |-
              Résultat attendu : Les utilisateurs de l'organisation apprennent et adoptent des comportements plus sûrs.

              TTP/Risque traité : Les adversaires utilisent des courriels trompeurs, des pièces jointes ou liens malveillants et des tactiques d'ingénierie sociale pour inciter les utilisateurs à divulguer des informations sensibles, exécuter du code malveillant ou accorder un accès non autorisé.

              Actions recommandées :
              - Fournir une formation initiale à la cybersécurité avant que les nouveaux employés n'accèdent aux systèmes informatiques
              - Fournir au moins une formation annuelle couvrant la reconnaissance de l'ingénierie sociale, le signalement des attaques, l'utilisation acceptable et l'hygiène cyber de base
              - Identifier les rôles spécialisés nécessitant une formation complémentaire
              - Fournir une formation basée sur les rôles aux rôles spécialisés incluant les prestataires, partenaires et fournisseurs
              - Fournir au personnel OT une formation de sensibilisation à la sécurité

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-k
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.K
        name: Utilize Strong Encryption
        description:
          Encryption is deployed to maintain confidentiality and integrity of sensitive data across the organization's
          network.
        annotation: |-
          Outcome: Encryption is deployed to maintain confidentiality and integrity of sensitive data across the organization's network.

          TTP/Risk Addressed: Adversaries can position themselves between networked devices to enable network sniffing and data manipulation, or steal operational data for personal gain or future operations.

          Recommended Actions:
          - Use encryption, digital signatures, and cryptographic hashes protecting network communication confidentiality and integrity
          - Identify critical data for protection in transit and at rest (PII, proprietary information, PLC programs, CAD/CAM files)
          - Prevent plaintext electronic storage of sensitive data and passwords
          - Store credentials securely via credential/password managers
          - Use encryption for OT external connections where latency permits

          Cost: Moderate | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-12
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-24
        translations:
          fr:
            name: Utiliser un chiffrement robuste
            description:
              Le chiffrement est déployé pour maintenir la confidentialité et l'intégrité des données sensibles sur
              le réseau de l'organisation.
            annotation: |-
              Résultat attendu : Le chiffrement est déployé pour maintenir la confidentialité et l'intégrité des données sensibles sur le réseau de l'organisation.

              TTP/Risque traité : Les adversaires se positionnent entre les équipements réseau pour permettre l'écoute et la manipulation de données, ou voler des données opérationnelles à des fins personnelles ou pour de futures opérations.

              Actions recommandées :
              - Utiliser le chiffrement, les signatures numériques et les condensats cryptographiques pour protéger la confidentialité et l'intégrité des communications réseau
              - Identifier les données critiques à protéger en transit et au repos (données personnelles, informations propriétaires, programmes PLC, fichiers CAO/FAO)
              - Empêcher le stockage électronique en clair des données sensibles et des mots de passe
              - Stocker les identifiants de manière sécurisée via des gestionnaires de mots de passe
              - Utiliser le chiffrement pour les connexions OT externes lorsque la latence le permet

              Coût : Modéré | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-l
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.L
        name: Enable Email Security
        description: Reduce risk from common email-based threats, such as spoofing, phishing, and interception.
        annotation: |-
          Outcome: Reduce risk from common email-based threats, such as spoofing, phishing, and interception.

          TTP/Risk Addressed: Adversaries might send victims emails with malicious attachments or links, aiming to run harmful code on their systems. They can also conduct phishing through third-party services.

          Recommended Actions:
          - Enable STARTTLS on all corporate email infrastructure
          - Enable Sender Policy Framework (SPF)
          - Enable DomainKeys Identified Mail (DKIM)
          - Enable DMARC and set to 'reject'

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-25
        translations:
          fr:
            name: Activer la sécurité des courriels
            description:
              Réduire les risques liés aux menaces courantes par courriel, telles que l'usurpation d'identité, l'hameçonnage
              et l'interception.
            annotation: |-
              Résultat attendu : Réduire les risques liés aux menaces courantes par courriel, telles que l'usurpation d'identité, l'hameçonnage et l'interception.

              TTP/Risque traité : Les adversaires utilisent des courriels trompeurs, des pièces jointes ou liens malveillants et des tactiques d'ingénierie sociale pour inciter les utilisateurs à divulguer des informations sensibles, exécuter du code malveillant ou accorder un accès non autorisé.

              Actions recommandées :
              - Activer STARTTLS sur toute l'infrastructure de messagerie d'entreprise
              - Activer le Sender Policy Framework (SPF)
              - Activer DomainKeys Identified Mail (DKIM)
              - Activer DMARC et le configurer sur « reject »

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-m
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.M
        name: Disable Autorun & Macros By Default
        description: Reduce the risk from embedded macros and similar executable code.
        annotation: |-
          Outcome: Reduce the risk from embedded macros and similar executable code.

          TTP/Risk Addressed: Adversaries rely on users to open malicious files to execute code. Social engineering tactics could be used to convince users to open such files.

          Recommended Actions:
          - Enforce system-wide policy disabling macros or similar embedded code by default
          - Establish policy for authorized users requesting macro enablement on specific assets
          - Disable Autorun/AutoPlay by default

          Cost: Low | Impact: Moderate | Complexity: Simple
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-26
        translations:
          fr:
            name: Désactiver l'exécution automatique et les macros par défaut
            description: Réduire le risque lié aux macros intégrées et au code exécutable similaire.
            annotation: |-
              Résultat attendu : Réduire le risque lié aux macros intégrées et au code exécutable similaire.

              TTP/Risque traité : Les adversaires utilisent des courriels trompeurs, des pièces jointes ou liens malveillants et des tactiques d'ingénierie sociale pour inciter les utilisateurs à divulguer des informations sensibles, exécuter du code malveillant ou accorder un accès non autorisé.

              Actions recommandées :
              - Appliquer une politique système désactivant par défaut les macros ou le code embarqué similaire
              - Établir une politique pour les utilisateurs autorisés demandant l'activation des macros sur des actifs spécifiques
              - Désactiver l'exécution automatique (Autorun/AutoPlay) par défaut

              Coût : Faible | Impact : Modéré | Complexité : Simple
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-n
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.N
        name: Establish Change Management Processes
        description: Policies and procedures exist to manage system changes and configurations.
        annotation: |-
          Outcome: Policies and procedures exist to manage system changes and configurations.

          TTP/Risk Addressed: Delayed, insufficient, or incomplete ability to maintain or restore functionality of critical devices and service operations.

          Recommended Actions:
          - Implement policies and processes for secure change management
          - Enforce configuration restrictions preventing unauthorized changes
          - Test and document proposed changes in non-production environments; analyze security impacts
          - Implement OT limited functionality permitting only necessary functions, protocols, and services

          Cost: Moderate | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-15
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-27
        translations:
          fr:
            name: Établir des processus de gestion des changements
            description: Des politiques et procédures existent pour gérer les changements et configurations des systèmes.
            annotation: |-
              Résultat attendu : Des politiques et procédures existent pour gérer les changements et configurations des systèmes.

              TTP/Risque traité : Capacité retardée, insuffisante ou incomplète à maintenir ou restaurer le fonctionnement des dispositifs critiques et des opérations de service en raison de changements non autorisés ou non testés.

              Actions recommandées :
              - Mettre en œuvre des politiques et processus de gestion sécurisée des changements
              - Appliquer des restrictions de configuration empêchant les modifications non autorisées
              - Tester et documenter les changements proposés dans des environnements hors production ; analyser les impacts sur la sécurité
              - Mettre en œuvre une fonctionnalité OT limitée ne permettant que les fonctions, protocoles et services nécessaires

              Coût : Modéré | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-o
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.O
        name: Maintain System Backups & Restoration Ability
        description:
          Organizations reduce data loss and service disruption risks while efficiently managing, responding to,
          and recovering from incidents.
        annotation: |-
          Outcome: Organizations reduce data loss and service disruption risks while efficiently managing, responding to, and recovering from incidents.

          TTP/Risk Addressed: Adversaries can disrupt critical systems, delete data, and disable recovery services to prevent system recovery.

          Recommended Actions:
          - Develop list of all maintained backups including installation media, license keys, configuration information, and retention periods
          - Back up critical operations systems in near-real-time; frequently back up all operational systems
          - Securely store backups offsite and offline
          - Test backups and recovery minimum annually
          - Validate backup integrity before initiating restoration
          - Check restoration assets for indicators of compromise
          - OT: Include device configurations, roles, engineering drawings, and tools

          Cost: High | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-16
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-28
        translations:
          fr:
            name: Maintenir les sauvegardes et la capacité de restauration des systèmes
            description:
              Les organisations réduisent les risques de perte de données et d'interruption de service tout en gérant,
              répondant et se remettant efficacement des incidents.
            annotation: |-
              Résultat attendu : Les organisations réduisent les risques de perte de données et d'interruption de service tout en gérant, répondant et se remettant efficacement des incidents.

              TTP/Risque traité : Les adversaires perturbent les systèmes critiques, suppriment des données et désactivent les services de récupération pour empêcher la restauration des systèmes, causant une interruption de la disponibilité des actifs, services ou systèmes.

              Actions recommandées :
              - Développer la liste de toutes les sauvegardes maintenues incluant les supports d'installation, les clés de licence, les informations de configuration et les durées de rétention
              - Sauvegarder les systèmes d'opérations critiques en quasi-temps réel ; sauvegarder fréquemment tous les systèmes opérationnels
              - Stocker les sauvegardes hors site et hors ligne de manière sécurisée
              - Tester les sauvegardes et la récupération au minimum annuellement
              - Valider l'intégrité des sauvegardes avant d'initier la restauration
              - Vérifier l'absence d'indicateurs de compromission dans les supports de restauration
              - OT : Inclure les configurations des dispositifs, les rôles, les schémas techniques et les outils

              Coût : Élevé | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-p
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.P
        name: Maintain Hardware & Software Approval Process
        description:
          Increase visibility into deployed technology assets and reduce the likelihood of breach by users installing
          unapproved hardware, firmware, or software.
        annotation: |-
          Outcome: Increase visibility into deployed technology assets and reduce the likelihood of breach by users installing unapproved hardware, firmware, or software.

          TTP/Risk Addressed: Adversaries can manipulate products or delivery mechanisms before they reach final users and attempt data or system compromise.

          Recommended Actions:
          - Implement administrative policy requiring review, testing, and approval before new hardware, firmware, or software installation
          - Maintain approved hardware, firmware, and software list including approved versions
          - Consider OT environment additional requirements for patches/updates ensuring no operational or safety impact

          Cost: Moderate | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-29
        translations:
          fr:
            name: Maintenir un processus d'approbation du matériel et des logiciels
            description:
              Augmenter la visibilité sur les actifs technologiques déployés et réduire la probabilité de compromission
              par l'installation de matériel, micrologiciel ou logiciel non approuvé.
            annotation: |-
              Résultat attendu : Augmenter la visibilité sur les actifs technologiques déployés et réduire la probabilité de compromission par l'installation de matériel, micrologiciel ou logiciel non approuvé.

              TTP/Risque traité : Les adversaires exploitent les vulnérabilités en abusant des relations de confiance avec des tiers, en manipulant les produits ou les mécanismes de livraison avant qu'ils n'atteignent les utilisateurs finaux, ou en compromettant les environnements des fournisseurs.

              Actions recommandées :
              - Mettre en œuvre une politique administrative exigeant la revue, les tests et l'approbation avant l'installation de tout nouveau matériel, micrologiciel ou logiciel
              - Maintenir une liste approuvée du matériel, des micrologiciels et des logiciels incluant les versions approuvées
              - Prendre en compte les exigences supplémentaires de l'environnement OT pour les correctifs et mises à jour afin de ne pas impacter les opérations ou la sûreté

              Coût : Modéré | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-q
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.Q
        name: Maintain Log Collection & Storage
        description:
          Enhance visibility to detect and respond to cyber incidents while ensuring security logs are protected
          from unauthorized access and tampering.
        annotation: |-
          Outcome: Enhance visibility to detect and respond to cyber incidents while ensuring security logs are protected from unauthorized access and tampering.

          TTP/Risk Addressed: Delayed, insufficient, or incomplete ability to detect and respond to potential cyber incidents.

          Recommended Actions:
          - Collect and store administrative/security-focused logs (OS, applications, IDS/IPS, firewalls, DLP, VPNs)
          - Store logs centrally (SIEM tool or database); only authorized, authenticated users access/modify
          - Store logs per risk-informed duration or regulatory guidelines
          - Notify security teams when critical log functions are disabled
          - For OT assets with non-standard logs, collect network traffic between those assets

          Cost: Moderate | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-30
        translations:
          fr:
            name: Maintenir la collecte et le stockage des journaux
            description:
              Améliorer la visibilité pour détecter et répondre aux incidents cyber tout en protégeant les journaux
              de sécurité contre l'accès non autorisé et la falsification.
            annotation: |-
              Résultat attendu : Améliorer la visibilité pour détecter et répondre aux incidents cyber tout en protégeant les journaux de sécurité contre l'accès non autorisé et la falsification.

              TTP/Risque traité : Compréhension incomplète ou inexacte des actifs organisationnels, de la topologie réseau et des journaux de sécurité, entravant la détection efficace, la réponse aux incidents et la reprise d'activité.

              Actions recommandées :
              - Collecter et stocker les journaux d'administration et de sécurité (systèmes d'exploitation, applications, IDS/IPS, pare-feux, DLP, VPN)
              - Stocker les journaux de manière centralisée (outil SIEM ou base de données) ; seuls les utilisateurs autorisés et authentifiés y accèdent
              - Conserver les journaux selon des durées adaptées au risque ou aux exigences réglementaires
              - Notifier les équipes de sécurité lorsque des fonctions critiques de journalisation sont désactivées
              - Pour les actifs OT avec des journaux non standards, collecter le trafic réseau entre ces actifs

              Coût : Modéré | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-r
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.R
        name: Prohibit Connection of Unauthorized Devices
        description:
          Prevent malicious actors from achieving initial access or data exfiltration via unauthorized portable media
          devices.
        annotation: |-
          Outcome: Prevent malicious actors from achieving initial access or data exfiltration via unauthorized portable media devices.

          TTP/Risk Addressed: Adversaries might infiltrate systems, including disconnected or air-gapped networks, by copying malware to removable media.

          Recommended Actions:
          - Maintain policies ensuring unauthorized media and hardware don't connect to IT/OT assets
          - Establish procedures removing, disabling, or securing physical ports preventing unauthorized device connection

          Cost: Moderate | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-31
        translations:
          fr:
            name: Interdire la connexion de dispositifs non autorisés
            description:
              Empêcher les acteurs malveillants d'obtenir un accès initial ou d'exfiltrer des données via des supports
              amovibles non autorisés.
            annotation: |-
              Résultat attendu : Empêcher les acteurs malveillants d'obtenir un accès initial ou d'exfiltrer des données via des supports amovibles non autorisés.

              TTP/Risque traité : Les adversaires déploient des logiciels malveillants incluant des charges utiles, des téléchargeurs et des portes dérobées pour contrôler des machines à distance, contourner les défenses et exécuter des actions post-compromission. Les logiciels malveillants peuvent se propager via des supports amovibles vers des réseaux isolés.

              Actions recommandées :
              - Maintenir des politiques garantissant que les supports et matériels non autorisés ne se connectent pas aux actifs IT/OT
              - Établir des procédures pour retirer, désactiver ou sécuriser les ports physiques afin d'empêcher la connexion de dispositifs non autorisés

              Coût : Modéré | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-s
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
        ref_id: 3.S
        name: Secure Internet Facing Devices
        description:
          Unauthorized users cannot gain an initial system foothold by exploiting known weaknesses in internet-facing
          assets.
        annotation: |-
          Outcome: Unauthorized users cannot gain an initial system foothold by exploiting known weaknesses in internet-facing assets.

          TTP/Risk Addressed: Adversaries might exploit weaknesses in internet-facing hosts or systems targeting software bugs, temporary glitches, or misconfigurations.

          Recommended Actions:
          - Minimize internet-facing assets whenever possible
          - Prioritize keeping software current via timely patches/updates
          - Disable all unnecessary OS applications, software, and network protocols on internet-facing assets
          - Never expose network management interfaces to public internet
          - Logically segment enterprise and production networks per trust boundaries and platform types

          Cost: Moderate | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-32
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-09
        translations:
          fr:
            name: Sécuriser les dispositifs exposés à Internet
            description:
              Les utilisateurs non autorisés ne peuvent pas obtenir un point d'ancrage initial dans le système en
              exploitant des faiblesses connues des actifs exposés à Internet.
            annotation: |-
              Résultat attendu : Les utilisateurs non autorisés ne peuvent pas obtenir un point d'ancrage initial dans le système en exploitant des faiblesses connues des actifs exposés à Internet.

              TTP/Risque traité : Les adversaires ciblent les systèmes non corrigés et mal configurés, en particulier ceux exposés à Internet, en exploitant les vulnérabilités logicielles, les dysfonctionnements temporaires ou les erreurs de configuration pour obtenir un accès initial.

              Actions recommandées :
              - Minimiser les actifs exposés à Internet autant que possible
              - Prioriser la mise à jour des logiciels via des correctifs en temps voulu
              - Désactiver toutes les applications, logiciels et protocoles réseau inutiles du système d'exploitation sur les actifs exposés à Internet
              - Ne jamais exposer les interfaces de gestion réseau sur l'Internet public
              - Segmenter logiquement les réseaux d'entreprise et de production selon les périmètres de confiance et les types de plateformes

              Coût : Modéré | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:4-a
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:de
        ref_id: 4.A
        name: Establish Malicious Code Detection
        description:
          Enables early threat identification, strengthens system integrity, provides insights for faster remediation,
          and minimizes downtime.
        annotation: |-
          Outcome: Enables early threat identification, strengthens system integrity, provides insights for faster remediation, and minimizes downtime.

          TTP/Risk Addressed: Malicious software can involve payloads, droppers, backdoors, etc. Adversaries use malware to control remote machines, evade defenses, and execute post-compromise actions.

          Recommended Actions:
          - Implement signature-based and non-signature-based mechanisms detecting/eradicating malicious code at endpoints
          - Ensure antivirus software is updated, active, and configured for auto-scanning emails and removable media
          - Use OT-compatible antivirus with special practices including compatibility checks and performance testing

          Cost: Moderate | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-33
        translations:
          fr:
            name: Établir la détection du code malveillant
            description:
              Permet l'identification précoce des menaces, renforce l'intégrité des systèmes, fournit des informations
              pour une remédiation plus rapide et minimise les temps d'arrêt.
            annotation: |-
              Résultat attendu : Permet l'identification précoce des menaces, renforce l'intégrité des systèmes, fournit des informations pour une remédiation plus rapide et minimise les temps d'arrêt.

              TTP/Risque traité : Les adversaires déploient des logiciels malveillants incluant des charges utiles, des téléchargeurs et des portes dérobées pour contrôler des machines à distance, contourner les défenses et exécuter des actions post-compromission. Les logiciels malveillants peuvent se propager via des supports amovibles vers des réseaux isolés.

              Actions recommandées :
              - Mettre en œuvre des mécanismes basés sur les signatures et non basés sur les signatures pour détecter et éradiquer le code malveillant sur les terminaux
              - S'assurer que l'antivirus est à jour, actif et configuré pour l'analyse automatique des courriels et supports amovibles
              - Utiliser un antivirus compatible OT avec des pratiques spéciales incluant les vérifications de compatibilité et les tests de performance

              Coût : Modéré | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:4-b
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:de
        ref_id: 4.B
        name: Identify Adverse Events
        description: Organizations can identify adverse security events.
        annotation: |-
          Outcome: Organizations can identify adverse security events.

          TTP/Risk Addressed: Initial access, privilege escalation, and lateral movement.

          Recommended Actions:
          - Define clear adverse event criteria and processes; escalate suspected events per incident response plan
          - Automate event information analysis accelerating investigative timelines
          - Conduct analyst role-specific training on proper protocols for suspected cyber incidents
          - Account for OT-specific events and anomalies

          Cost: Moderate | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-34
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-04
        translations:
          fr:
            name: Identifier les événements indésirables
            description: Les organisations peuvent identifier les événements de sécurité indésirables.
            annotation: |-
              Résultat attendu : Les organisations peuvent identifier les événements de sécurité indésirables.

              TTP/Risque traité : Accès non autorisé aux ressources réseau permettant aux adversaires de se déplacer entre les systèmes sans être détectés, d'élever les privilèges et de compromettre les données sensibles et les systèmes critiques.

              Actions recommandées :
              - Définir des critères et processus clairs pour les événements indésirables ; escalader les événements suspects selon le plan de réponse aux incidents
              - Automatiser l'analyse des informations sur les événements pour accélérer les délais d'investigation
              - Former les analystes aux protocoles appropriés pour les incidents cyber suspectés
              - Prendre en compte les événements et anomalies spécifiques aux OT

              Coût : Modéré | Impact : Élevé | Complexité : Complexe
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:5-a
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rs
        ref_id: 5.A
        name: Establish Incident Communication Procedures
        description:
          Coordinate crisis communication methods between internal and external organization partners and critical
          suppliers.
        annotation: |-
          Outcome: Coordinate crisis communication methods between internal and external organization partners and critical suppliers.

          TTP/Risk Addressed: Without established communication procedures, incidents can disrupt coordination among response teams, slowing incident resolution, increasing downtime, and amplifying overall damage.

          Recommended Actions:
          - Design communications plan identifying stakeholders and coordination mechanisms during incidents
          - Collaborate with stakeholders; securely share information per response plans
          - Regularly update senior leadership on major incident status
          - Notify human resources when malicious insider activity occurs
          - Establish and follow media communications procedures

          Cost: Low | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-35
        translations:
          fr:
            name: Établir des procédures de communication en cas d'incident
            description:
              Coordonner les méthodes de communication de crise entre les partenaires internes et externes de l'organisation
              et les fournisseurs critiques.
            annotation: |-
              Résultat attendu : Coordonner les méthodes de communication de crise entre les partenaires internes et externes de l'organisation et les fournisseurs critiques.

              TTP/Risque traité : Incapacité à isoler, contenir, éradiquer, remédier et communiquer rapidement et efficacement lors d'incidents de cybersécurité. Les défaillances de communication ralentissent la résolution, augmentent les temps d'arrêt et amplifient les dommages.

              Actions recommandées :
              - Concevoir un plan de communication identifiant les parties prenantes et les mécanismes de coordination lors des incidents
              - Collaborer avec les parties prenantes ; partager l'information de manière sécurisée selon les plans de réponse
              - Informer régulièrement la direction des incidents majeurs
              - Notifier les ressources humaines en cas d'activité malveillante interne
              - Établir et suivre les procédures de communication médiatique

              Coût : Faible | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:5-b
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rs
        ref_id: 5.B
        name: Establish Incident Reporting Procedures
        description:
          CISA and other organizations are better able to provide assistance or understand the broader scope of a
          cyber incident.
        annotation: |-
          Outcome: CISA and other organizations are better able to provide assistance or understand the broader scope of a cyber incident.

          TTP/Risk Addressed: Without timely incident reporting, CISA and other groups are less able to assist affected organizations and lack critical insight into the broader threat landscape.

          Recommended Actions:
          - Maintain policy and procedures on reporting confirmed incidents to external entities (regulators, SRMAs, ISACs, ISAOs, CISA)
          - Report known incidents within regulatory timeframes or as soon as safely feasible

          Cost: Moderate | Impact: High | Complexity: Moderate
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-36
        translations:
          fr:
            name: Établir des procédures de signalement des incidents
            description:
              La CISA et d'autres organisations sont mieux en mesure de fournir une assistance ou de comprendre la
              portée plus large d'un incident cyber.
            annotation: |-
              Résultat attendu : La CISA et d'autres organisations sont mieux en mesure de fournir une assistance ou de comprendre la portée plus large d'un incident cyber.

              TTP/Risque traité : Incapacité à isoler, contenir, éradiquer, remédier et communiquer rapidement et efficacement lors d'incidents de cybersécurité. Les défaillances de communication ralentissent la résolution, augmentent les temps d'arrêt et amplifient les dommages.

              Actions recommandées :
              - Maintenir une politique et des procédures de signalement de tous les incidents confirmés aux entités externes (régulateurs, autorités sectorielles, ISAC, ISAO, CISA)
              - Signaler les incidents connus dans les délais réglementaires applicables ou dès que possible en toute sécurité

              Coût : Modéré | Impact : Élevé | Complexité : Modéré
      - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:6-a
        assessable: true
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rc
        ref_id: 6.A
        name: Incident Planning and Preparedness
        description: Organizations are capable of safely and effectively recovering from a cybersecurity incident.
        annotation: |-
          Outcome: Organizations are capable of safely and effectively recovering from a cybersecurity incident.

          TTP/Risk Addressed: Disruption to the availability of an asset, service, or system.

          Recommended Actions:
          - Execute plans recovering/restoring service to critical assets impacted by incidents
          - Enable degraded operations (paper-based, radio communications) without critical assets or internet
          - Complete post-incident analysis identifying improvement areas
          - Incorporate lessons learned; enhance detection/response capabilities
          - Update policies, procedures, and training; ensure stakeholder awareness of changes

          Cost: Moderate | Impact: High | Complexity: Complex
        threats:
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-16
          - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
        reference_controls:
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-37
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-02
          - urn:intuitem:risk:function:cisa-cpg-2.0:rc-23
        translations:
          fr:
            name: Planification et préparation à la reprise après incident
            description: Les organisations sont capables de se remettre de manière sûre et efficace d'un incident de cybersécurité.
            annotation: |-
              Résultat attendu : Les organisations sont capables de se remettre de manière sûre et efficace d'un incident de cybersécurité.

              TTP/Risque traité : Les adversaires perturbent les systèmes critiques, suppriment des données et désactivent les services de récupération pour empêcher la restauration des systèmes, causant une interruption de la disponibilité des actifs, services ou systèmes.

              Actions recommandées :
              - Exécuter les plans de récupération et de restauration des services pour les actifs critiques impactés par les incidents, incluant la capacité d'exécuter les fonctions essentielles en mode dégradé (opérations papier, communications radio)
              - Réaliser une analyse post-incident identifiant les axes d'amélioration
              - Intégrer les retours d'expérience, améliorer les capacités de détection et de réponse
              - Mettre à jour les politiques, procédures et formations ; s'assurer que les parties prenantes sont informées des changements

              Coût : Modéré | Impact : Élevé | Complexité : Complexe
