locale: fr
ref_id: "Referentiel Certification des \xE9tablissements de sant\xE9 pour la qualit\xE9\
  \ des soins"
name: "Referentiel Certification des \xE9tablissements de sant\xE9 pour la qualit\xE9\
  \ des soins"
description: "La certification, mission confi\xE9e \xE0 la Haute Autorit\xE9 de sant\xE9\
  \ (HAS) par les ordonnances de 1996, est une proc\xE9dure d\u2019\xE9valuation du\
  \ niveau de qualit\xE9 et de s\xE9curit\xE9 des soins des \xE9tablissements de sant\xE9\
  , publics et priv\xE9s. Elle est effectu\xE9e par des professionnels (des pairs)\
  \ mandat\xE9s par la HAS, les experts-visiteurs. Cette proc\xE9dure, ind\xE9pendante\
  \ de l\u2019\xE9tablissement et de ses organismes de tutelle, porte sur le niveau\
  \ de qualit\xE9 et de s\xE9curit\xE9 des soins d\xE9livr\xE9s aux patients. Le r\xE9\
  f\xE9rentiel constitue le socle du dispositif de certification. Dans ce r\xE9f\xE9\
  rentiel, sont list\xE9s les crit\xE8res \xE0 satisfaire par l\u2019\xE9tablissement\
  \ de sant\xE9 et tous les \xE9l\xE9ments n\xE9cessaires \xE0 leur compr\xE9hension\
  \ et leur \xE9valuation."
copyright: "Haute autorit\xE9 de la sant\xE9"
version: 1
