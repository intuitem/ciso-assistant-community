urn: urn:intuitem:risk:library:nist-csf-2.0-journey
locale: en
ref_id: NIST-CSF-2.0-Journey
name: NIST CSF 2.0 — Journey Threat and Control Library
description:
  Threat and reference control library supporting the NIST CSF 2.0 organisational
  journey preset. Defines eight threat scenarios aligned to all six CSF 2.0 Functions
  (Govern, Identify, Protect, Detect, Respond, Recover) and twenty reference controls
  mapped to NIST CSF 2.0 subcategories. Draws on NIST SP 800-30 Rev.1 and MITRE ATT&CK.
copyright:
  Threat scenarios and reference controls are original content informed by 
  NIST SP 800-30 Rev.1, NIST CSF 2.0, and MITRE ATT&CK. NIST CSF 2.0 framework content 
  is public domain per NIST policy. MITRE ATT&CK is used under CC BY 4.0.
  Packaged for use with the intuitem/CISO Assistant platform.
version: 1
publication_date: "2025-03-23"
provider: NIST CSF
packager: Paul Flatt
translations:
  fr:
    name: NIST CSF 2.0 — Bibliothèque de menaces et de contrôles du parcours
    description:
      Bibliothèque de menaces et de contrôles de référence supportant le preset de
      parcours NIST CSF 2.0. Définit huit scénarios de menaces et vingt contrôles
      de référence alignés sur les sous-catégories du CSF 2.0.

objects:

  # =================================================================
  # THREATS
  # =================================================================
  threats:

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-govern
      ref_id: T-GV-01
      name: Inadequate Cybersecurity Governance and Accountability
      description:
        Absence of defined cybersecurity roles, executive accountability, documented policies,
        or an organisational risk management strategy results in uncoordinated security decisions
        and unmanaged enterprise risk. Security investments become misaligned with business
        objectives, compliance obligations are missed, and incident response authority is unclear.
        This threat underpins failures across all other CSF functions.
      annotation: |-
        Establish a cybersecurity governance charter defining roles, responsibilities, and
        accountability (e.g. CISO, risk owner, asset owners). Document an organisational
        cybersecurity policy and risk appetite statement approved at executive or board level.
        Align cybersecurity strategy to business objectives and legal/regulatory obligations.
        Conduct periodic governance reviews at least annually.
      translations:
        fr:
          name: Gouvernance cybersécurité insuffisante
          description:
            L'absence de rôles, politiques ou responsabilités exécutives définis entraîne des
            décisions de sécurité non coordonnées et une gestion des risques insuffisante.
          annotation: |-
            Établir une charte de gouvernance définissant les rôles et responsabilités.
            Documenter une politique de cybersécurité approuvée au niveau exécutif ou du conseil.
            Conduire des revues de gouvernance au moins annuellement.

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-identify
      ref_id: T-ID-01
      name: Unknown or Unmanaged Assets Exploited
      description:
        Attackers target shadow IT, unmanaged endpoints, undocumented cloud instances, or legacy
        systems that fall outside the organisation's asset inventory, vulnerability management,
        and patch management processes. Without comprehensive asset visibility the organisation
        cannot assess exposure, apply controls, or respond effectively to incidents involving
        untracked resources. Commonly exploited via internet-facing services, forgotten VPNs,
        and unmanaged SaaS accounts.
      annotation: |-
        Maintain a comprehensive asset inventory covering hardware, software, cloud resources,
        data, and third-party dependencies (aligned to ID.AM). Integrate discovery tooling
        (e.g. network scanning, cloud asset management) to identify unmanaged assets. Assign
        asset owners and define criticality ratings. Include shadow IT discovery as part of
        periodic risk assessments.
      translations:
        fr:
          name: Actifs inconnus ou non gérés exploités
          description:
            Des attaquants ciblent le shadow IT, les appareils non gérés ou les systèmes non
            documentés hors de la visibilité de l'organisation.
          annotation: |-
            Maintenir un inventaire complet des actifs. Intégrer des outils de découverte pour
            identifier les actifs non gérés. Assigner des propriétaires d'actifs et définir
            des niveaux de criticité.

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-protect-phishing
      ref_id: T-PR-01
      name: Credential Theft via Phishing or Social Engineering
      description:
        An employee or privileged user is deceived into disclosing credentials, approving
        fraudulent MFA prompts (MFA fatigue), or executing malicious payloads through phishing
        emails, spear-phishing, smishing, or voice-based social engineering. Compromised
        credentials provide attackers with authenticated access to email, collaboration
        platforms, business applications, and identity systems — often bypassing perimeter
        controls entirely.
      annotation: |-
        Enforce phishing-resistant MFA (e.g. FIDO2/passkeys) for all users, prioritising
        privileged and remote access accounts. Deploy email filtering with anti-phishing
        controls (DMARC, DKIM, SPF). Conduct regular phishing simulation exercises and
        role-based security awareness training. Implement Conditional Access policies to
        restrict access from unmanaged devices and unusual locations. Monitor identity logs
        for impossible travel and anomalous sign-in patterns.
      translations:
        fr:
          name: Vol d'identifiants par hameçonnage ou ingénierie sociale
          description:
            Un employé divulgue ses identifiants via un email d'hameçonnage ou une attaque
            d'ingénierie sociale, accordant un accès non autorisé aux systèmes métier.
          annotation: |-
            Appliquer une MFA résistante au hameçonnage. Déployer des contrôles anti-hameçonnage
            pour la messagerie (DMARC, DKIM, SPF). Conduire des simulations de phishing et des
            formations de sensibilisation basées sur les rôles.

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-protect-vuln
      ref_id: T-PR-02
      name: Exploitation of Unpatched Software or Systems
      description:
        Attackers exploit publicly known vulnerabilities (CVEs) in unpatched operating systems,
        business applications, network devices, or internet-facing services to achieve initial
        access, privilege escalation, or lateral movement. Exploitation may be opportunistic
        via automated scanning or targeted. Unpatched vulnerabilities in internet-exposed assets
        are among the most common initial access vectors in ransomware and data breach incidents.
      annotation: |-
        Establish a vulnerability management programme with defined patch timelines based on
        criticality (e.g. critical CVEs within 48 hours, high within 14 days). Prioritise
        internet-facing and privileged systems. Use automated vulnerability scanning tools and
        integrate with threat intelligence feeds to identify actively exploited CVEs. Apply
        application allowlisting and system hardening baselines to reduce exploitable attack
        surface.
      translations:
        fr:
          name: Exploitation de logiciels ou systèmes non mis à jour
          description:
            Des attaquants exploitent des vulnérabilités connues dans des systèmes, applications
            ou équipements réseau non corrigés pour obtenir un accès initial ou élever leurs
            privilèges.
          annotation: |-
            Établir un programme de gestion des vulnérabilités avec des délais de correction
            définis selon la criticité. Utiliser des outils d'analyse automatisés et des flux
            de renseignement sur les menaces pour identifier les CVE activement exploitées.

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-protect-supplychain
      ref_id: T-PR-03
      name: Supply Chain or Third-Party Compromise
      description:
        A trusted vendor, managed service provider (MSP), SaaS platform, or software supplier
        is compromised, providing attackers with a legitimate and trusted pathway into the
        organisation's systems, data, or networks. Supply chain attacks may exploit software
        update mechanisms, shared remote access credentials, or API integrations. MSP-delivered
        tooling with broad administrative access represents a particularly high-risk vector.
      annotation: |-
        Maintain a register of critical suppliers and third-party dependencies with associated
        risk ratings. Conduct supplier security assessments proportional to access level and
        criticality. Apply least-privilege principles to all third-party access and avoid
        standing privileged access for vendors. Monitor third-party connections and review
        supplier incident notification obligations in contracts. Subscribe to software vendor
        security advisories and respond to supply chain compromise notifications promptly.
      translations:
        fr:
          name: Compromission de la chaîne d'approvisionnement ou d'un tiers
          description:
            Un fournisseur ou prestataire de confiance est compromis, offrant aux attaquants
            un accès aux systèmes ou données de l'organisation via une voie de confiance.
          annotation: |-
            Maintenir un registre des fournisseurs critiques avec des évaluations de risque.
            Appliquer le principe du moindre privilège pour tous les accès tiers. Surveiller
            les connexions tierces et examiner les obligations de notification dans les contrats.

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-detect-lateral
      ref_id: T-DE-01
      name: Undetected Intrusion and Lateral Movement
      description:
        An attacker who has achieved initial access maintains persistent presence and moves
        laterally across internal systems for an extended period — often weeks or months —
        without triggering detection. During this dwell time the attacker escalates privileges,
        maps the environment, establishes additional persistence mechanisms, and exfiltrates
        data. Insufficient logging coverage, lack of centralised log correlation, or absence
        of behavioural detection significantly increase dwell time and breach impact.
      annotation: |-
        Deploy centralised log aggregation and SIEM/XDR capabilities with detection rules
        covering authentication anomalies, unusual internal access patterns, and known lateral
        movement techniques. Ensure comprehensive logging of endpoint, identity, network, and
        cloud activity with sufficient retention (minimum 12 months recommended). Implement
        network segmentation to limit blast radius. Conduct periodic threat hunting exercises
        and validate detection coverage against MITRE ATT&CK techniques relevant to your sector.
      translations:
        fr:
          name: Intrusion non détectée et mouvement latéral
          description:
            Un attaquant maintient un accès persistant et se déplace latéralement sans déclencher
            de détection, escaladant ses privilèges et exfiltrant des données critiques.
          annotation: |-
            Déployer une agrégation centralisée des journaux et des capacités SIEM/XDR avec
            des règles de détection couvrant les anomalies d'authentification et les techniques
            de mouvement latéral connues. Mettre en œuvre la segmentation réseau.

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-respond-ransomware
      ref_id: T-RS-01
      name: Ransomware Deployment and Business Disruption
      description:
        Ransomware is deployed across endpoints, servers, and shared storage systems following
        an initial compromise — typically via phishing, exploitation of unpatched vulnerabilities,
        or compromised remote access. Ransomware encrypts critical business data, may exfiltrate
        sensitive information for double-extortion, and causes significant operational disruption.
        Without a tested incident response plan and resilient backups, recovery may take days to
        weeks and incur substantial financial and reputational damage.
      annotation: |-
        Develop, document, and test an Incident Response Plan covering ransomware scenarios
        including containment, eradication, and communication playbooks. Ensure executive and
        legal escalation paths are pre-defined. Maintain offline or immutable backups of all
        critical systems and data, tested against defined RTO/RPO. Implement anti-ransomware
        controls including EDR, application control, and protected backup access. Register with
        relevant national cybersecurity agencies (e.g. CERT NZ, ACSC) for incident reporting
        obligations.
      translations:
        fr:
          name: Déploiement de rançongiciel et perturbation de l'activité
          description:
            Un rançongiciel est déployé sur les postes et le stockage partagé, chiffrant les
            données critiques et provoquant une perturbation opérationnelle majeure avec risque
            de perte permanente de données.
          annotation: |-
            Développer et tester un Plan de Réponse aux Incidents couvrant les scénarios de
            rançongiciel. Maintenir des sauvegardes hors ligne ou immuables testées contre les
            RTO/RPO définis. Mettre en œuvre des contrôles EDR et de contrôle des applications.

    - urn: urn:intuitem:risk:threat:nist-csf-2.0:t-recover-bcdr
      ref_id: T-RC-01
      name: Failure to Recover from a Significant Cyber Incident
      description:
        Inadequate, untested, or undocumented backup and recovery procedures result in extended
        downtime, permanent data loss, or failed restoration following a significant cyber
        incident. Recovery failures may stem from backups not isolated from ransomware
        encryption, missing recovery runbooks, undefined RTO/RPO, lack of tested Business
        Continuity Plans, or insufficient personnel trained to execute recovery procedures
        under incident conditions.
      annotation: |-
        Define and document RTO and RPO targets for all critical systems and data assets.
        Implement a 3-2-1 backup strategy (three copies, two media types, one offsite/offline).
        Test backup restoration procedures at least annually and after significant infrastructure
        changes. Develop and maintain Business Continuity and Disaster Recovery plans covering
        cyber incident scenarios. Conduct tabletop exercises simulating ransomware or destructive
        attack recovery. Ensure recovery procedures are accessible offline in the event of a
        network-wide incident.
      translations:
        fr:
          name: Incapacité à se remettre d'un incident cyber majeur
          description:
            Des sauvegardes, procédures de reprise ou plans de continuité inadéquats ou non
            testés entraînent une indisponibilité prolongée et une perte permanente de données
            suite à un incident cyber majeur.
          annotation: |-
            Définir les RTO et RPO pour tous les actifs critiques. Mettre en œuvre une stratégie
            de sauvegarde 3-2-1. Tester les procédures de restauration au moins annuellement.
            Conduire des exercices sur table simulant la reprise après un incident de rançongiciel.

  # =================================================================
  # FRAMEWORK — NIST CSF 2.0 with reference control mappings
  # =================================================================
  framework:
    urn: urn:intuitem:risk:framework:nist-csf-2.0-journey
    ref_id: NIST-CSF-2.0-journey
    name: NIST CSF v2.0 — Journey
    description: NIST Cybersecurity Framework 2.0 with mapped reference controls for the organisational journey preset
    min_score: 1
    max_score: 4
    scores_definition:
      - score: 1
        name: Partial
        description:
          Application of the organizational cybersecurity risk strategy is managed
          in an ad hoc manner. There is limited awareness of cybersecurity risks
          at the organizational level.
      - score: 2
        name: Risk Informed
        description:
          Risk management practices are approved by management but may not be
          established as organization-wide policy. There is an awareness of
          cybersecurity risks at the organizational level but an organization-wide
          approach to managing cybersecurity risks has not been established.
      - score: 3
        name: Repeatable
        description:
          The organization's risk management practices are formally approved and
          expressed as policy. Organizational cybersecurity practices are regularly
          updated based on the application of risk management processes to changes
          in business requirements, threats, and the technological landscape.
      - score: 4
        name: Adaptive
        description:
          There is an organization-wide approach to managing cybersecurity risks
          that uses risk-informed policies, processes, and procedures to address
          potential cybersecurity events. The organization adapts its cybersecurity
          practices based on previous and current cybersecurity activities, including
          lessons learned and predictive indicators.

    requirement_nodes:

      # ---------------------------------------------------------------
      # GOVERN (GV)
      # ---------------------------------------------------------------
      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv
        assessable: false
        depth: 1
        ref_id: GV
        name: GOVERN
        description:
          The organization's cybersecurity risk management strategy, expectations,
          and policy are established, communicated, and monitored.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc
        assessable: false
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv
        ref_id: GV.OC
        name: Organizational Context
        description:
          The circumstances surrounding the organization's cybersecurity risk
          management decisions are understood.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc-01
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc
        ref_id: GV.OC-01
        description:
          The organizational mission is understood and informs cybersecurity
          risk management.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-01
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc-02
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc
        ref_id: GV.OC-02
        description:
          Internal and external stakeholders are understood, and their needs
          and expectations regarding cybersecurity risk management are understood
          and considered.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-01
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-03

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc-03
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc
        ref_id: GV.OC-03
        description:
          Legal, regulatory, and contractual requirements regarding cybersecurity
          are understood and managed.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-01
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-04

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc-04
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc
        ref_id: GV.OC-04
        description:
          Critical objectives, capabilities, and services that stakeholders
          depend on or expect from the organization are understood and communicated.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-01
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc-05
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.oc
        ref_id: GV.OC-05
        description:
          Outcomes, capabilities, and services that the organization depends
          on are understood and communicated.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-05

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        assessable: false
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv
        ref_id: GV.RM
        name: Risk Management Strategy
        description:
          The organization's priorities, constraints, risk tolerance and appetite
          statements, and assumptions are established, communicated, and used
          to support operational risk decisions.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm-01
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        ref_id: GV.RM-01
        description:
          Risk management objectives are established and agreed to by
          organizational stakeholders.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-06

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm-02
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        ref_id: GV.RM-02
        description:
          Risk appetite and risk tolerance statements are established,
          communicated, and maintained.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm-03
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        ref_id: GV.RM-03
        description:
          Cybersecurity risk management activities and outcomes are included
          in enterprise risk management processes.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-06

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm-04
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        ref_id: GV.RM-04
        description:
          Strategic direction that describes appropriate risk response options
          is established and communicated.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-04

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm-05
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        ref_id: GV.RM-05
        description:
          Lines of communication across the organization are established for
          cybersecurity risks, including risks from suppliers and other third
          parties.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-03
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-05

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm-06
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        ref_id: GV.RM-06
        description:
          A standardized method for calculating, documenting, categorizing,
          and prioritizing cybersecurity risks is established and communicated.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-06

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm-07
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rm
        ref_id: GV.RM-07
        description:
          Strategic opportunities (i.e., positive risks) are characterized
          and are included in organizational cybersecurity risk discussions.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr
        assessable: false
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv
        ref_id: GV.RR
        name: Roles, Responsibilities, and Authorities
        description:
          Cybersecurity roles, responsibilities, and authorities to foster
          accountability, performance assessment, and continuous improvement
          are established and communicated.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr-01
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr
        ref_id: GV.RR-01
        description:
          Organizational leadership is responsible and accountable for
          cybersecurity risk and fosters a culture that is risk-aware, ethical,
          and continually improving.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-01
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-03

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr-02
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr
        ref_id: GV.RR-02
        description:
          Roles, responsibilities, and authorities related to cybersecurity
          risk management are established, communicated, understood, and
          enforced.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-03

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr-03
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr
        ref_id: GV.RR-03
        description:
          Adequate resources are allocated commensurate with the cybersecurity
          risk strategy, roles, responsibilities, and policies.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-03
          - urn:intuitem:risk:function:nist-csf-2.0:rc-gv-06

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr-04
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:gv.rr
        ref_id: GV.RR-04
        description:
          Cybersecurity is included in human resources practices.
        reference_controls:
