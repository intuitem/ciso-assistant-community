        assessable: false
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rs
        ref_id: RS.MI
        name: Incident Mitigation
        description:
          Activities are performed to prevent expansion of an event and mitigate
          its effects.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rs.mi-01
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rs.mi
        ref_id: RS.MI-01
        description:
          Incidents are contained.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rs-04

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rs.mi-02
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rs.mi
        ref_id: RS.MI-02
        description:
          Incidents are eradicated.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rs-04

      # ---------------------------------------------------------------
      # RECOVER (RC)
      # ---------------------------------------------------------------
      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc
        assessable: false
        depth: 1
        ref_id: RC
        name: RECOVER
        description:
          Assets and operations affected by a cybersecurity incident are restored.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp
        assessable: false
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc
        ref_id: RC.RP
        name: Incident Recovery Plan Execution
        description:
          Restoration activities are performed to ensure operational availability
          of systems and services affected by cybersecurity incidents.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp-01
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp
        ref_id: RC.RP-01
        description:
          The recovery portion of the incident response plan is executed once
          initiated from the incident response process.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-01

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp-02
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp
        ref_id: RC.RP-02
        description:
          Recovery actions are selected, scoped, prioritized, and performed.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-01

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp-03
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp
        ref_id: RC.RP-03
        description:
          The integrity of backups and other restoration assets is verified
          before using them for restoration.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-01
          - urn:intuitem:risk:function:nist-csf-2.0:rc-pr-06

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp-04
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp
        ref_id: RC.RP-04
        description:
          Critical mission functions and cybersecurity risk management are
          considered to establish post-incident operational norms.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-01
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-02

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp-05
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp
        ref_id: RC.RP-05
        description:
          The integrity of restored assets is verified, systems and services
          are restored, and normal operating status is confirmed.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-01

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp-06
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.rp
        ref_id: RC.RP-06
        description:
          The end of incident recovery is declared based on criteria, and
          incident-related documentation is completed.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-01

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.co
        assessable: false
        depth: 2
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc
        ref_id: RC.CO
        name: Incident Recovery Communication
        description:
          Restoration activities are coordinated with internal and external
          parties.

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.co-03
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.co
        ref_id: RC.CO-03
        description:
          Recovery activities and progress in restoring operational capabilities
          are communicated to designated internal and external stakeholders.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-03

      - urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.co-04
        assessable: true
        depth: 3
        parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-journey:rc.co
        ref_id: RC.CO-04
        description:
          Public updates on incident recovery are shared using approved methods
          and messaging.
        reference_controls:
          - urn:intuitem:risk:function:nist-csf-2.0:rc-rc-03
  reference_controls:

    # ---------------------------------------------------------------
    # GOVERN (GV)
    # ---------------------------------------------------------------
    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-gv-01
      ref_id: RC.GV-01
      name: Cybersecurity Governance Charter and Policy
      category: policy
      csf_function: govern
      description:
        Establish and document a cybersecurity governance charter defining executive
        accountability, cybersecurity roles and responsibilities, and organisational
        risk appetite. Approve at board or executive level and review annually.
        Aligned to GV.OC-01, GV.RR-01, GV.RR-02, GV.PO-01.
      translations:
        fr:
          name: Charte de gouvernance et politique de cybersécurité
          description:
            Établir et documenter une charte de gouvernance cybersécurité définissant
            les responsabilités exécutives, les rôles et l'appétit au risque. Approuver
            au niveau exécutif ou du conseil et réviser annuellement.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-gv-02
      ref_id: RC.GV-02
      name: Risk Appetite and Risk Tolerance Statements
      category: policy
      csf_function: govern
      description:
        Document and communicate organisational risk appetite and risk tolerance
        statements for cybersecurity. Translate into measurable thresholds used
        to prioritise risk response decisions. Aligned to GV.RM-01, GV.RM-02.
      translations:
        fr:
          name: Déclarations d'appétit et de tolérance au risque
          description:
            Documenter et communiquer les déclarations d'appétit et de tolérance
            au risque cybersécurité. Traduire en seuils mesurables pour prioriser
            les décisions de réponse aux risques.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-gv-03
      ref_id: RC.GV-03
      name: Cybersecurity Roles, Responsibilities, and Authorities
      category: process
      csf_function: govern
      description:
        Document all cybersecurity roles, responsibilities, and authorities in
        organisational policy. Include performance requirements in personnel descriptions.
        Establish separation of duties across critical security functions.
        Aligned to GV.RR-02, GV.RR-03, GV.RR-04.
      translations:
        fr:
          name: Rôles, responsabilités et autorités en cybersécurité
          description:
            Documenter tous les rôles, responsabilités et autorités en cybersécurité.
            Inclure les exigences de performance dans les descriptions de poste.
            Établir la séparation des tâches pour les fonctions critiques.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-gv-04
      ref_id: RC.GV-04
      name: Cybersecurity Policy Lifecycle Management
      category: process
      csf_function: govern
      description:
        Review and update cybersecurity policies at least annually and when
        significant changes occur to threats, technology, regulations, or business
        objectives. Require staff acknowledgement of policy receipt.
        Aligned to GV.PO-01, GV.PO-02, GV.OV-01, GV.OV-02.
      translations:
        fr:
          name: Gestion du cycle de vie des politiques de cybersécurité
          description:
            Réviser et mettre à jour les politiques de cybersécurité au moins
            annuellement et lors de changements significatifs. Exiger l'accusé
            réception des politiques par le personnel.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-gv-05
      ref_id: RC.GV-05
      name: Supply Chain Risk Management Programme
      category: process
      csf_function: govern
      description:
        Establish a cybersecurity supply chain risk management programme including
        supplier criticality register, contractual security requirements, and incident
        notification SLAs. Conduct supplier due diligence proportional to access
        level and criticality. Aligned to GV.SC-01, GV.SC-02, GV.SC-04, GV.SC-05,
        GV.SC-06, GV.SC-07.
      translations:
        fr:
          name: Programme de gestion des risques de la chaîne d'approvisionnement
          description:
            Établir un programme de gestion des risques de la chaîne d'approvisionnement
            incluant un registre de criticité des fournisseurs, des exigences contractuelles
            et des SLA de notification d'incidents.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-gv-06
      ref_id: RC.GV-06
      name: Cybersecurity Performance Measurement and Oversight
      category: process
      csf_function: govern
      description:
        Define and track key performance indicators (KPIs) and key risk indicators
        (KRIs) for cybersecurity risk management. Report metrics to senior leadership
        at defined intervals. Conduct periodic governance reviews.
        Aligned to GV.OV-01, GV.OV-02, GV.OV-03.
      translations:
        fr:
          name: Mesure de performance et surveillance de la cybersécurité
          description:
            Définir et suivre des indicateurs clés de performance et de risque
            pour la gestion des risques cybersécurité. Communiquer les métriques
            à la direction générale à intervalles définis.

    # ---------------------------------------------------------------
    # IDENTIFY (ID)
    # ---------------------------------------------------------------
    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-id-01
      ref_id: RC.ID-01
      name: Comprehensive Asset Inventory
      category: process
      csf_function: identify
      description:
        Maintain regularly updated inventories of all hardware, software, data,
        services, and third-party dependencies. Include cloud-based resources,
        IoT and OT assets, and SaaS applications. Assign asset owners and criticality
        ratings. Aligned to ID.AM-01, ID.AM-02, ID.AM-04, ID.AM-05, ID.AM-07,
        ID.AM-08.
      translations:
        fr:
          name: Inventaire complet des actifs
          description:
            Maintenir des inventaires régulièrement mis à jour de tous les actifs
            matériels, logiciels, données, services et dépendances tierces. Attribuer
            des propriétaires d'actifs et des niveaux de criticité.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-id-02
      ref_id: RC.ID-02
      name: Network Topology and Data Flow Documentation
      category: process
      csf_function: identify
      description:
        Maintain accurate documentation of current network topology, authorised
        communication baselines, and internal and external data flows. Review
        and update annually or when topology changes. Aligned to ID.AM-03.
      translations:
        fr:
          name: Documentation de la topologie réseau et des flux de données
          description:
            Maintenir une documentation précise de la topologie réseau actuelle,
            des bases de communication autorisées et des flux de données. Réviser
            annuellement ou lors de changements de topologie.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-id-03
      ref_id: RC.ID-03
      name: Vulnerability Management Programme
      category: process
      csf_function: identify
      description:
        Implement a vulnerability management programme covering scanning, risk
        rating, and patch timelines by criticality. Prioritise internet-facing
        and privileged systems. Apply compensating controls for legacy systems
        where patching is infeasible. Aligned to ID.RA-01, ID.RA-05, ID.RA-06,
        ID.RA-07, ID.RA-08.
      translations:
        fr:
          name: Programme de gestion des vulnérabilités
          description:
            Mettre en œuvre un programme de gestion des vulnérabilités couvrant
            l'analyse, la notation des risques et les délais de correction par
            criticité. Appliquer des contrôles compensatoires pour les systèmes
            existants.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-id-04
      ref_id: RC.ID-04
      name: Cyber Threat Intelligence Integration
      category: process
      csf_function: identify
      description:
        Receive and analyse cyber threat intelligence from reputable sources and
        information sharing forums. Use intelligence to identify current threat
        actors, TTPs, and new vulnerabilities relevant to the organisation's
        technology stack. Aligned to ID.RA-02, ID.RA-03.
      translations:
        fr:
          name: Intégration du renseignement sur les cybermenaces
          description:
            Recevoir et analyser des renseignements sur les cybermenaces provenant
            de sources réputées. Utiliser ces renseignements pour identifier les
            acteurs malveillants actuels et les vulnérabilités pertinentes.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-id-05
      ref_id: RC.ID-05
      name: Cybersecurity Improvement and Lessons Learned
      category: process
      csf_function: identify
      description:
        Identify improvements from security assessments, penetration tests, incident
        post-mortems, tabletop exercises, and operational metrics. Review and update
        all cybersecurity plans annually. Conduct collaborative lessons learned with
        critical suppliers. Aligned to ID.IM-01, ID.IM-02, ID.IM-03, ID.IM-04.
      translations:
        fr:
          name: Amélioration de la cybersécurité et retours d'expérience
          description:
            Identifier les améliorations à partir des évaluations de sécurité,
            tests d'intrusion, post-mortems d'incidents et exercices. Réviser
            et mettre à jour annuellement tous les plans de cybersécurité.

    # ---------------------------------------------------------------
    # PROTECT (PR)
    # ---------------------------------------------------------------
    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-01
      ref_id: RC.PR-01
      name: Multi-Factor Authentication Deployment
      category: technical
      csf_function: protect
      description:
        Require MFA for all users with remote access, prioritising phishing-resistant
        methods (FIDO2/passkeys, PKI-based). Enforce MFA for all privileged accounts.
        Periodically reauthenticate users based on risk context.
        Aligned to PR.AA-03, PR.AA-05.
      translations:
        fr:
          name: Déploiement de l'authentification multifacteur
          description:
            Exiger la MFA pour tous les utilisateurs avec accès distant, en
            priorisant les méthodes résistantes au hameçonnage. Appliquer la
            MFA pour tous les comptes privilégiés.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-02
      ref_id: RC.PR-02
      name: Identity and Credential Lifecycle Management
      category: process
      csf_function: protect
      description:
        Manage provisioning, review, and revocation of user credentials and access
        rights. Enforce unique credentials per account and service. Disable inactive
        accounts after a defined period. Revoke all access promptly upon offboarding.
        Aligned to PR.AA-01, PR.AA-02, PR.AA-05.
      translations:
        fr:
          name: Gestion du cycle de vie des identités et des identifiants
          description:
            Gérer l'attribution, la revue et la révocation des identifiants et
            droits d'accès. Appliquer des identifiants uniques par compte. Désactiver
            les comptes inactifs et révoquer tous les accès lors du départ.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-03
      ref_id: RC.PR-03
      name: Least Privilege and Privileged Account Separation
      category: process
      csf_function: protect
      description:
        Enforce least privilege for all user accounts, system roles, and processes.
        Require administrators to maintain separate accounts for privileged and
        non-privileged activities. Conduct quarterly access reviews.
        Aligned to PR.AA-05, PR.AA-06.
      translations:
        fr:
          name: Moindre privilège et séparation des comptes privilégiés
          description:
            Appliquer le moindre privilège pour tous les comptes utilisateurs
            et processus système. Exiger des administrateurs de maintenir des
            comptes séparés pour les activités privilégiées et non privilégiées.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-04
      ref_id: RC.PR-04
      name: Security Awareness and Training Programme
      category: process
      csf_function: protect
      description:
        Provide cybersecurity awareness training to all staff before system access
        and at least annually thereafter. Include social engineering recognition,
        phishing simulations, acceptable use, and basic cyber hygiene. Provide
        role-based training for privileged users and security practitioners.
        Aligned to PR.AT-01, PR.AT-02.
      translations:
        fr:
          name: Programme de sensibilisation et de formation à la sécurité
          description:
            Fournir une formation de sensibilisation à la cybersécurité à tout
            le personnel avant l'accès aux systèmes et au moins annuellement.
            Inclure des simulations de phishing et une formation basée sur les rôles.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-05
      ref_id: RC.PR-05
      name: Data Protection and Encryption Controls
      category: technical
      csf_function: protect
      description:
        Use encryption, digital signatures, and cryptographic hashes to protect
        data confidentiality and integrity in transit and at rest. Prevent plaintext
        storage of sensitive data and credentials. Enforce full disk encryption
        on endpoints. Aligned to PR.DS-01, PR.DS-02, PR.DS-10.
      translations:
        fr:
          name: Contrôles de protection des données et de chiffrement
          description:
            Utiliser le chiffrement et les signatures numériques pour protéger
            les données en transit et au repos. Empêcher le stockage en clair des
            données sensibles. Appliquer le chiffrement complet du disque sur les postes.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-06
      ref_id: RC.PR-06
      name: Backup and Recovery Controls
      category: process
      csf_function: protect
      description:
        Create, protect, and test backups of all critical data and systems. Implement
        a 3-2-1 backup strategy with offline or immutable copies. Define and validate
        RTO and RPO targets. Test restoration procedures at least annually.
        Aligned to PR.DS-11.
      translations:
        fr:
          name: Contrôles de sauvegarde et de reprise
          description:
            Créer, protéger et tester les sauvegardes de toutes les données et
            systèmes critiques. Mettre en œuvre une stratégie 3-2-1 avec des copies
            hors ligne ou immuables. Définir et valider les RTO et RPO.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-07
      ref_id: RC.PR-07
      name: Vulnerability and Patch Management
      category: technical
      csf_function: protect
      description:
        Perform routine and emergency patching within timelines defined by vulnerability
        criticality. Establish and enforce security configuration baselines for all
        platforms. Replace end-of-life software and hardware. Apply allowlisting and
        restrict unauthorised software installation.
        Aligned to PR.PS-01, PR.PS-02, PR.PS-03, PR.PS-05.
      translations:
        fr:
          name: Gestion des vulnérabilités et des correctifs
          description:
            Appliquer les correctifs selon les délais définis par criticité.
            Établir des bases de configuration sécurisées. Remplacer les logiciels
            et matériels en fin de vie. Restreindre l'installation de logiciels non autorisés.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-08
      ref_id: RC.PR-08
      name: Security Log Collection and Management
      category: technical
      csf_function: protect
      description:
        Configure all operating systems, applications, and services to generate log
        records. Centralise log collection in a SIEM or log management platform with
        restricted access. Retain logs for a risk-informed duration (minimum 12 months
        recommended). Aligned to PR.PS-04.
      translations:
        fr:
          name: Collecte et gestion des journaux de sécurité
          description:
            Configurer tous les systèmes, applications et services pour générer
            des journaux. Centraliser la collecte dans un SIEM avec accès restreint.
            Conserver les journaux pendant une durée adaptée au risque.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-pr-09
      ref_id: RC.PR-09
      name: Network Segmentation and Access Controls
      category: technical
      csf_function: protect
      description:
        Segment organisation networks by trust boundaries and platform type. Restrict
        traffic between segments to only what is required. Implement zero trust
        principles to limit lateral movement. Minimise internet-facing assets and
        harden all external-facing services.
        Aligned to PR.IR-01, PR.IR-03, PR.IR-04.
      translations:
        fr:
          name: Segmentation réseau et contrôles d'accès
          description:
            Segmenter les réseaux de l'organisation selon les périmètres de confiance.
            Restreindre le trafic entre segments. Appliquer les principes Zero Trust
            et minimiser les actifs exposés à Internet.

    # ---------------------------------------------------------------
    # DETECT (DE)
    # ---------------------------------------------------------------
    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-de-01
      ref_id: RC.DE-01
      name: Continuous Monitoring and Anomaly Detection
      category: technical
      csf_function: detect
      description:
        Deploy SIEM or XDR capabilities with detection rules covering network anomalies,
        authentication events, endpoint activity, and known threat techniques. Monitor
        networks, endpoints, identity systems, and cloud activity for indicators of
        compromise. Use behaviour analytics to detect insider threats.
        Aligned to DE.CM-01, DE.CM-03, DE.CM-06, DE.CM-09.
      translations:
        fr:
          name: Surveillance continue et détection des anomalies
          description:
            Déployer des capacités SIEM ou XDR avec des règles de détection couvrant
            les anomalies réseau, les événements d'authentification et l'activité des
            terminaux. Utiliser l'analytique comportementale pour les menaces internes.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-de-02
      ref_id: RC.DE-02
      name: Adverse Event Analysis and Incident Declaration
      category: process
      csf_function: detect
      description:
        Define adverse event criteria and automated alert escalation processes.
        Correlate events from multiple log sources to identify patterns. Integrate
        cyber threat intelligence into log analysis. Declare incidents when events
        meet defined criteria. Aligned to DE.AE-02, DE.AE-03, DE.AE-04, DE.AE-06,
        DE.AE-07, DE.AE-08.
      translations:
        fr:
          name: Analyse des événements indésirables et déclaration d'incidents
          description:
            Définir des critères d'événements indésirables et des processus d'escalade
            automatisés. Corréler les événements de plusieurs sources de journaux.
            Déclarer les incidents lorsque les critères sont atteints.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-de-03
      ref_id: RC.DE-03
      name: Malicious Code Detection and Prevention
      category: technical
      csf_function: detect
      description:
        Implement endpoint detection and response (EDR) or antivirus solutions using
        both signature-based and behavioural detection mechanisms. Ensure solutions
        are actively updated and configured for automated scanning of emails, files,
        and removable media. Aligned to DE.CM-09.
      translations:
        fr:
          name: Détection et prévention du code malveillant
          description:
            Mettre en œuvre des solutions EDR ou antivirus utilisant des mécanismes
            de détection basés sur les signatures et les comportements. S'assurer
            que les solutions sont actives et configurées pour l'analyse automatisée.

    # ---------------------------------------------------------------
    # RESPOND (RS)
    # ---------------------------------------------------------------
    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-rs-01
      ref_id: RC.RS-01
      name: Incident Response Plan
      category: process
      csf_function: respond
      description:
        Develop, document, and regularly test an Incident Response Plan covering common
        scenarios including ransomware, data breach, account compromise, and supply chain
        incidents. Define escalation paths, containment playbooks, communication procedures,
        and recovery criteria. Review and drill at least annually.
        Aligned to RS.MA-01, RS.MA-02, RS.MA-03, RS.MA-04, RS.MA-05.
      translations:
        fr:
          name: Plan de réponse aux incidents
          description:
            Développer, documenter et tester régulièrement un Plan de Réponse aux
            Incidents couvrant les scénarios courants. Définir les procédures d'escalade,
            les playbooks de confinement et les procédures de communication.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-rs-02
      ref_id: RC.RS-02
      name: Incident Analysis and Forensic Evidence Preservation
      category: process
      csf_function: respond
      description:
        Conduct root cause analysis for all significant incidents. Collect, preserve,
        and safeguard the integrity of incident data and forensic evidence using defined
        chain-of-custody procedures. Document all response actions with immutable records.
        Aligned to RS.AN-03, RS.AN-06, RS.AN-07, RS.AN-08.
      translations:
        fr:
          name: Analyse des incidents et préservation des preuves forensiques
          description:
            Conduire une analyse des causes profondes pour tous les incidents
            significatifs. Collecter et préserver l'intégrité des preuves forensiques
            selon des procédures de chaîne de custody définies.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-rs-03
      ref_id: RC.RS-03
      name: Incident Communication and Notification Procedures
      category: process
      csf_function: respond
      description:
        Establish internal and external incident communication procedures including
        stakeholder notification, regulatory reporting obligations, media communications,
        and supplier coordination. Notify relevant national cybersecurity agencies
        (e.g. CERT NZ, ACSC) within regulatory timeframes.
        Aligned to RS.CO-02, RS.CO-03.
      translations:
        fr:
          name: Procédures de communication et de notification en cas d'incident
          description:
            Établir des procédures de communication interne et externe incluant
            la notification des parties prenantes, les obligations de signalement
            réglementaire et la coordination avec les fournisseurs.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-rs-04
      ref_id: RC.RS-04
      name: Incident Containment and Eradication
      category: technical
      csf_function: respond
      description:
        Implement containment and eradication capabilities for detected incidents
        including network isolation, account suspension, endpoint quarantine, and removal
        of malicious artefacts. Allow automated and manual execution of containment
        actions. Aligned to RS.MI-01, RS.MI-02.
      translations:
        fr:
          name: Confinement et éradication des incidents
          description:
            Mettre en œuvre des capacités de confinement et d'éradication pour
            les incidents détectés, incluant l'isolation réseau, la suspension de
            compte et la quarantaine des terminaux.

    # ---------------------------------------------------------------
    # RECOVER (RC)
    # ---------------------------------------------------------------
    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-rc-01
      ref_id: RC.RC-01
      name: Incident Recovery Plan Execution
      category: process
      csf_function: recover
      description:
        Execute recovery procedures to restore affected systems and services following
        a cybersecurity incident. Validate backup integrity before restoration. Confirm
        the absence of indicators of compromise in restored assets before returning to
        production. Document recovery actions and declare end of incident based on
        defined criteria. Aligned to RC.RP-01, RC.RP-02, RC.RP-03, RC.RP-04, RC.RP-05,
        RC.RP-06.
      translations:
        fr:
          name: Exécution du plan de reprise après incident
          description:
            Exécuter les procédures de reprise pour restaurer les systèmes et
            services affectés. Valider l'intégrité des sauvegardes avant restauration.
            Confirmer l'absence d'indicateurs de compromission dans les actifs restaurés.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-rc-02
      ref_id: RC.RC-02
      name: Business Continuity and Disaster Recovery Plans
      category: process
      csf_function: recover
      description:
        Develop, maintain, and test Business Continuity and Disaster Recovery plans
        covering cyber incident scenarios. Define RTO and RPO for all critical systems.
        Enable degraded operations capability. Conduct tabletop exercises simulating
        ransomware and destructive attack recovery at least annually.
        Aligned to RC.RP-04, RC.CO-03.
      translations:
        fr:
          name: Plans de continuité d'activité et de reprise après sinistre
          description:
            Développer, maintenir et tester les plans de continuité d'activité
            et de reprise après sinistre couvrant les scénarios d'incidents cyber.
            Définir les RTO et RPO pour tous les systèmes critiques.

    - urn: urn:intuitem:risk:function:nist-csf-2.0:rc-rc-03
      ref_id: RC.RC-03
      name: Recovery Communication and Public Updates
      category: process
      csf_function: recover
      description:
        Communicate recovery activities and restoration progress to designated internal
        stakeholders, senior leadership, and external parties as required. Share public
        updates on incident recovery using approved messaging. Follow breach notification
        obligations where applicable. Aligned to RC.CO-03, RC.CO-04.
      translations:
        fr:
          name: Communication de reprise et mises à jour publiques
          description:
            Communiquer les activités de reprise et les progrès de restauration
            aux parties prenantes désignées. Partager des mises à jour publiques
            en utilisant des messages approuvés. Respecter les obligations de
            notification des violations applicables.
