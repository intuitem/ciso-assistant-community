    - urn: urn:intuitem:risk:function:doc-pol:doc.educ_plan
      ref_id: DOC.EDUC_PLAN
      name: Information security awareness and training plan
      category: process
      csf_function: govern
      description:
        "Objective: Raise awareness for all employees and provide targeted
        training for relevant staff to promote secure behaviors, ensure compliance,
        and reduce risks.

        Scope: Awareness for all employees and contractors; targeted training for specific
        teams (e.g., IT, security, access managers).

        Roles and Responsibilities: Assign responsibilities to IT, HR, and security
        teams.

        Training Requirements: Define mandatory topics (e.g., access management, secure
        configurations) and frequency (e.g., annual, onboarding).

        Delivery Methods: Awareness through e-learning and campaigns; training through
        hands-on workshops and simulations.

        Evaluation: Track participation rates, quiz scores, and phishing test results.

        Compliance: Align with regulations (e.g., GDPR, ISO 27001) and maintain audit-ready
        records.

        Continuous Improvement: Update based on feedback and emerging threats."
      annotation: "7.3.c

        A.6.3

        cis-v8: 14.1, 14.2, 14.9"
      translations:
        fr:
          name: Plan de sensibilisation et de formation
          description:
            "Objectif : Sensibiliser l\u2019ensemble des employ\xE9s \xE0\
            \ la s\xE9curit\xE9 de l\u2019information et former sp\xE9cifiquement les\
            \ personnes concern\xE9es pour promouvoir des comportements s\xE9curis\xE9\
            s, assurer la conformit\xE9 et r\xE9duire les risques.\nPort\xE9e : Sensibilisation\
            \ pour tous les employ\xE9s et prestataires, formation cibl\xE9e pour les\
            \ \xE9quipes concern\xE9es (ex. : IT, s\xE9curit\xE9, responsables d'acc\xE8\
            s).\nR\xF4les et Responsabilit\xE9s : Attribution des responsabilit\xE9\
            s aux \xE9quipes IT, RH et s\xE9curit\xE9.\nExigences de Formation : D\xE9\
            finir les sujets obligatoires (ex. : gestion des acc\xE8s, configuration\
            \ s\xE9curis\xE9e) et la fr\xE9quence (ex. : annuelle, \xE0 l\u2019int\xE9\
            gration).\nM\xE9thodes de Diffusion : Sensibilisation via e-learning et\
            \ campagnes, formation via ateliers pratiques et simulations.\n\xC9valuation\
            \ : Suivre les taux de participation, les r\xE9sultats des quiz et les tests\
            \ de phishing.\nConformit\xE9 : S\u2019aligner sur les r\xE9glementations\
            \ (ex. : RGPD, ISO 27001) et conserver des dossiers pour audits.\nAm\xE9\
            lioration Continue : Mettre \xE0 jour en fonction des retours et des menaces\
            \ \xE9mergentes."
        de:
          name: "Plan f\xFCr Informationssicherheitsbewusstsein und Schulungen"
          description:
            "Zielsetzung: Sensibilisierung aller Mitarbeitenden sowie gezielte\
            \ Schulungen f\xFCr relevante Rollen, um sicheres Verhalten zu f\xF6rdern,\
            \ Compliance sicherzustellen und Risiken zu reduzieren.\nGeltungsbereich:\
            \ Sensibilisierung f\xFCr alle Mitarbeitenden und Auftragnehmer; zielgerichtete\
            \ Schulungen f\xFCr spezifische Teams (z. B. IT, Sicherheit, Zugriffsadministration).\n\
            Rollen und Verantwortlichkeiten: Verantwortung wird IT-, HR- und Sicherheitsteams\
            \ zugewiesen.\nSchulungsanforderungen: Festlegung verpflichtender Themen\
            \ (z. B. Zugriffsmanagement, sichere Konfigurationen) und H\xE4ufigkeiten\
            \ (z. B. j\xE4hrlich, Onboarding).\nBereitstellungsmethoden: Sensibilisierung\
            \ \xFCber E-Learning und Kampagnen; Schulungen \xFCber praxisorientierte\
            \ Workshops und Simulationen.\nEvaluation: Nachverfolgung der Teilnahmequoten,\
            \ Quiz-Ergebnisse und Phishing-Testresultate.\nCompliance: Ausrichtung an\
            \ relevanten Vorschriften (z. B. DSGVO, ISO 27001) und Aufrechterhaltung\
            \ pr\xFCfbereiter Nachweise.\nKontinuierliche Verbesserung: Aktualisierung\
            \ auf Basis von Feedback und neuen Bedrohungen."
        es:
          name:
            "Plan de concienciaci\xF3n y formaci\xF3n en seguridad de la informaci\xF3\
            n"
          description:
            "Objetivo: Sensibilizar a todos los empleados y proporcionar\
            \ formaci\xF3n espec\xEDfica al personal pertinente para promover comportamientos\
            \ seguros, garantizar el cumplimiento y reducir los riesgos.\nAlcance: Concienciaci\xF3\
            n para todos los empleados y contratistas; formaci\xF3n espec\xEDfica para\
            \ determinados equipos (por ejemplo, TI, seguridad, gestores de accesos).\n\
            Funciones y responsabilidades: Asignar responsabilidades a los equipos de\
            \ TI, RR. HH. y seguridad.\nRequisitos de formaci\xF3n: Definir los contenidos\
            \ obligatorios (por ejemplo, gesti\xF3n de accesos, configuraciones seguras)\
            \ y la periodicidad (por ejemplo, anual, incorporaci\xF3n).\nM\xE9todos\
            \ de impartici\xF3n: Concienciaci\xF3n mediante formaci\xF3n en l\xEDnea\
            \ y campa\xF1as; formaci\xF3n mediante talleres pr\xE1cticos y simulaciones.\n\
            Evaluaci\xF3n: Realizar el seguimiento de las tasas de participaci\xF3n,\
            \ los resultados de los cuestionarios y los resultados de las pruebas de\
            \ phishing.\nCumplimiento: Alinear con la normativa (por ejemplo, RGPD,\
            \ ISO 27001) y mantener registros preparados para auditor\xEDa.\nMejora\
            \ continua: Actualizar en funci\xF3n de la retroalimentaci\xF3n y de las\
            \ amenazas emergentes."
      typical_evidence:
