urn: urn:intuitem:risk:library:nist-csf-2.0-sncf
locale: fr
ref_id: NIST-CSF-2.0-SNCF
name: NIST CSF 2.0 - SNCF (DDA simplifié)
description: Déclinaison SNCF du NIST Cybersecurity Framework (CSF) 2.0 - exigences simplifiées issues du référentiel DDA, structurées selon les fonctions et catégories du NIST CSF 2.0.
copyright: SNCF - dérivé du NIST Cybersecurity Framework 2.0 (information publique NIST).
version: 1
publication_date: '2025-09-04'
provider: SNCF
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:nist-csf-2.0-sncf
    ref_id: NIST-CSF-2.0-SNCF
    name: NIST CSF 2.0 - SNCF (DDA simplifié)
    description: Déclinaison SNCF du NIST Cybersecurity Framework 2.0.
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv
      assessable: false
      depth: 1
      ref_id: GV
      name: GOUVERNER
      description: La stratégie, les attentes et la politique de gestion des risques de cybersécurité de l’organisation sont établies, communiquées et surveillées
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id
      assessable: false
      depth: 1
      ref_id: ID
      name: IDENTIFIER
      description: Les risques de cybersécurité actuels de l’organisation sont compris
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr
      assessable: false
      depth: 1
      ref_id: PR
      name: PROTÉGER
      description: Des mesures de protection sont utilisées pour gérer les risques de cybersécurité de l’organisation
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de
      assessable: false
      depth: 1
      ref_id: DE
      name: DÉTECTER
      description: Les attaques et compromissions de cybersécurité possibles sont détectées et analysées
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs
      assessable: false
      depth: 1
      ref_id: RS
      name: RÉPONDRE
      description: Des mesures concernant un incident de cybersécurité détecté sont prises
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc
      assessable: false
      depth: 1
      ref_id: RC
      name: RÉCUPÉRER
      description: Les actifs et les opérations affectés par un incident de cybersécurité sont restaurés
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-oc
      assessable: false
      depth: 2
      ref_id: GV.OC
      name: Contexte organisationnel
      description: Les circonstances (mission, attentes des parties prenantes, dépendances et exigences légales, réglementaires et contractuelles) entourant les décisions de gestion des risques de cybersécurité de l’organisation sont comprises
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      assessable: false
      depth: 2
      ref_id: GV.RM
      name: Stratégie de gestion des risques
      description: Les priorités, les contraintes, les déclarations de tolérance et d’appétence au risque et les hypothèses de l’organisation sont établies, communiquées et utilisées pour soutenir les décisions en matière de risques opérationnels
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rr
      assessable: false
      depth: 2
      ref_id: GV.RR
      name: Rôles, responsabilités et autorités
      description: Les rôles, responsabilités et autorités en matière de cybersécurité visant à la responsabilisation, l’évaluation des performances et l’amélioration continue sont établis et communiqués
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-po
      assessable: false
      depth: 2
      ref_id: GV.PO
      name: Politique
      description: La politique de cybersécurité organisationnelle est établie, communiquée et appliquée
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-ov
      assessable: false
      depth: 2
      ref_id: GV.OV
      name: Surveillance
      description: Les résultats des activités et des performances de gestion des risques de cybersécurité à l’échelle de l’organisation sont utilisés pour informer, améliorer et ajuster la stratégie de gestion des risques
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      assessable: false
      depth: 2
      ref_id: GV.SC
      name: Gestion des risques de la chaîne d’approvisionnement en cybersécurité
      description: Les processus de gestion des risques de la chaîne d’approvisionnement en matière de cybersécurité sont identifiés, établis, gérés, surveillés et améliorés par les parties prenantes de l’organisation
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      assessable: false
      depth: 2
      ref_id: ID.AM
      name: Gestion d’actifs
      description: Les actifs (p. ex., données, matériel, logiciels, systèmes, installations, services, personnes) qui permettent à l’organisation d’atteindre ses objectifs commerciaux sont identifiés et gérés en fonction de leur importance relative par rapport aux objectifs organisationnels et à la stratégie de risque de l’organisation
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      assessable: false
      depth: 2
      ref_id: ID.RA
      name: Évaluation des risques
      description: |-
        Le risque de cybersécurité pour l’organisation, les actifs et
        les individus est compris par l’organisation
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-im
      assessable: false
      depth: 2
      ref_id: ID.IM
      name: Amélioration
      description: Les améliorations aux processus, procédures et activités de gestion des risques de cybersécurité organisationnels sont identifiées dans toutes les Fonctions du CSF.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-aa
      assessable: false
      depth: 2
      ref_id: PR.AA
      name: Gestion des identités, authentification et contrôle d’accès
      description: L’accès aux actifs physiques et logiques est limité aux utilisateurs, services et matériels autorisés et géré en fonction du risque évalué d’accès non autorisé
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-at
      assessable: false
      depth: 2
      ref_id: PR.AT
      name: Sensibilisation et formation
      description: Le personnel de l’organisation reçoit une sensibilisation et une formation à la cybersécurité afin qu’il puisse accomplir ses tâches liées à la cybersécurité
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ds
      assessable: false
      depth: 2
      ref_id: PR.DS
      name: Sécurité des données
      description: Les données sont gérées conformément à la stratégie de risque de l’organisation afin de protéger la confidentialité, l’intégrité et la disponibilité des informations
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ps
      assessable: false
      depth: 2
      ref_id: PR.PS
      name: Sécurité de la plateforme
      description: Le matériel, les logiciels (p. ex., les micrologiciels, les systèmes d’exploitation, les applications) et les services des plateformes physiques et virtuelles sont gérés conformément à la stratégie de risque de l’organisation pour protéger leur confidentialité, leur intégrité et leur disponibilité
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ir
      assessable: false
      depth: 2
      ref_id: PR.IR
      name: Résilience des infrastructures technologiques
      description: Les architectures de sécurité sont gérées avec la stratégie de risque de l’organisation pour protéger la confidentialité, l’intégrité et la disponibilité des actifs, ainsi que la résilience organisationnelle
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-cm
      assessable: false
      depth: 2
      ref_id: DE.CM
      name: Contrôle continu
      description: Les actifs sont surveillés pour détecter des anomalies, des indicateurs de compromission et d’autres événements potentiellement indésirables
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-ae
      assessable: false
      depth: 2
      ref_id: DE.AE
      name: Analyse des événements indésirables
      description: Les anomalies, les indicateurs de compromission et d’autres événements potentiellement indésirables sont analysés pour caractériser les événements et détecter les incidents de cybersécurité
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-ma
      assessable: false
      depth: 2
      ref_id: RS.MA
      name: Gestion des incidents
      description: Les réponses aux incidents de cybersécurité détectés sont gérées
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-an
      assessable: false
      depth: 2
      ref_id: RS.AN
      name: Analyse des incidents
      description: Des enquêtes sont menées pour garantir une réponse efficace et soutenir les activités criminalistiques et de récupération
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-co
      assessable: false
      depth: 2
      ref_id: RS.CO
      name: Rapports et communications en matière de réponse aux incidents
      description: Les activités de réponse sont coordonnées avec les parties prenantes internes et externes, comme l’exigent les lois, les réglementations ou les politiques
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-mi
      assessable: false
      depth: 2
      ref_id: RS.MI
      name: Atténuation des incidents
      description: Les activités sont réalisées pour empêcher l’expansion d’un événement et atténuer ses effets
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-rp
      assessable: false
      depth: 2
      ref_id: RC.RP
      name: Exécution du plan de récupération après incident
      description: Les activités de restauration sont effectuées pour garantir la disponibilité opérationnelle des systèmes et services affectés par les incidents de cybersécurité
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-co
      assessable: false
      depth: 2
      ref_id: RC.CO
      name: Communication de récupération après incident
      description: Les activités de restauration sont coordonnées avec les parties internes et externes
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.oc-01
      assessable: true
      depth: 3
      ref_id: GV.OC-01
      description: Les missions et la stratégie de l'entreprise et de ses filiales doivent être communiquées et intégrées par le biais d'une vision et d'une stratégie, tout en prenant en compte les risques de cybersécurité qui pourraient entraver ces objectifs.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-oc
      annotation: |-
        Ex1: Partager la mission de l'organisation (par exemple, par le biais de déclarations de vision et de mission, de stratégies de marketing et de service) afin de fournir une base pour l'identification des risques susceptibles d'entraver cette mission.

        Documents de référence :
        - Politique de gouvernance SSI
        - Politique de gestion de la conformité
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.oc-02
      assessable: true
      depth: 3
      ref_id: GV.OC-02
      description: Les parties prenantes internes et externes doivent être identifiées et connues. Leurs besoins et attentes en matière de cybersécurité doivent être gérés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-oc
      annotation: |-
        Ex1 : Identifier les parties prenantes internes concernées et leurs attentes en matière de cybersécurité (par exemple, les attentes des dirigeants, des administrateurs et des conseillers en matière de performances et de risques ; les attentes culturelles des employés).
        Ex2 : Identifier les parties prenantes externes concernées et leurs attentes en matière de cybersécurité (par exemple, les attentes des clients en matière de protection de la vie privée, les attentes des entreprises en matière de partenariats, les attentes des autorités de réglementation en matière de conformité, les attentes de la société en matière d'éthique).

        Documents de référence :
        - Politique de gestion des risques
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique de gouvernance SSI
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.oc-03
      assessable: true
      depth: 3
      ref_id: GV.OC-03
      description: La stratégie de cybersécurité doit être soigneusement alignée avec les diverses exigences légales, réglementaires et contractuelles qui régissent l'entreprise et ses filiales.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-oc
      annotation: "Ex1 : Déterminer un processus de suivi et de gestion des exigences légales et réglementaires en matière de protection des informations personnelles (par exemple, RGPD, directive européenne NIS). \nEx2 : Déterminer un processus de suivi et de gestion des exigences contractuelles en matière de gestion de la cybersécurité des informations relatives aux fournisseurs, aux clients et aux partenaires. \nEx3 : Aligner la stratégie de cybersécurité de l'organisation sur les exigences légales, réglementaires et contractuelles.\n\nDocuments de référence :\n- Politique de gestion de la conformité"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.oc-04
      assessable: true
      depth: 3
      ref_id: GV.OC-04
      description: Les actifs et les opérations essentiels pour délivrer les missions de l'entreprise et de ses filiales doivent être déterminés via des niveaux validés et partagés. L'impact potentiel de leur perte partielle ou totale doit être communiqué, avec le plan de résilience inhérent.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-oc
      annotation: "Ex1 : Établir des critères pour déterminer la criticité des capacités et des services de l'organisation, telle qu'elle est perçue par les parties prenantes internes et externes\nEx2 : Déterminer (par exemple, à partir d'une analyse d'impact) les actifs et les opérations commerciales qui sont essentiels pour atteindre les objectifs de la mission et l'impact potentiel d'une perte (ou d'une perte partielle) de ces opérations. \nEx3 : Établir et communiquer des objectifs de résilience (par exemple, des objectifs de délai de rétablissement) pour la fourniture de capacités et de services essentiels dans différents états de fonctionnement (par exemple, en cas d'attaque, pendant le rétablissement, en fonctionnement normal).\n\nDocuments de référence :\n- Politique de gestion des risques\n- Politique de gestion de la continuité et de la résilience des activités\n- Politique de gestion des actifs"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.oc-05
      assessable: true
      depth: 3
      ref_id: GV.OC-05
      description: Les objectifs ou ressources critiques dont dépendent les parties prenantes externes, ou qu'elles attendent de l'entreprise et de ses filiales, doivent être compris et communiqués.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-oc
      annotation: |-
        Ex1 : Dresser un inventaire des dépendances de l'organisation vis-à-vis des ressources externes (par exemple, les installations, les fournisseurs d'hébergement en nuage) et de leurs relations avec les actifs de l'organisation et les fonctions de l'entreprise.
        Ex2 : Identifier et documenter les dépendances externes qui sont des points de défaillance potentiels pour les capacités et services critiques de l'organisation, et partager ces informations avec le personnel concerné.

        Documents de référence :
        - Politique de gestion de la continuité et de la résilience des activités
        - Politique de gouvernance SSI
        - Politique de gestion des actifs
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rm-01
      assessable: true
      depth: 3
      ref_id: GV.RM-01
      description: Les objectifs de gestion des risques de cybersécurité doivent être établis et acceptés par les parties prenantes de l'entreprise et de ses filiales.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      annotation: |-
        Ex1 : Mettre à jour les objectifs de gestion des risques de cybersécurité à court et à long terme dans le cadre de la planification stratégique annuelle et lorsque des changements majeurs interviennent.
        Ex2 : Fixer des objectifs mesurables pour la gestion du risque de cybersécurité (par exemple, gérer la qualité de la formation des utilisateurs, assurer une protection adéquate contre les risques pour les systèmes de contrôle industriels).
        Ex3 : Les dirigeants s'accordent sur les objectifs de cybersécurité et les utilisent pour mesurer et gérer les risques et les performances.

        Documents de référence :
        - Poliitique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rm-02
      assessable: true
      depth: 3
      ref_id: GV.RM-02
      description: Les déclarations d’appétence et de tolérance au risque doivent être établies, communiquées et régulièrement mises à jour.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      annotation: |-
        Ex1 : Déterminer et communiquer des déclarations d'appétences pour le risque qui traduisent les attentes concernant le niveau de risque approprié pour l'organisation.
        Ex2 : Traduire les déclarations d'appétences au risque en déclarations de tolérance au risque spécifiques, mesurables et largement compréhensibles.
        Ex3 : Affiner périodiquement les objectifs de l'organisation et l'appétence au risque en fonction de l'exposition connue au risque et du risque résiduel.

        Documents de référence :
        - Poliitique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rm-03
      assessable: true
      depth: 3
      ref_id: GV.RM-03
      description: Les activités et les résultats de la gestion des risques de cybersécurité doivent être inclus dans les processus de gestion des risques de l’entreprise et de ses filiales.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      annotation: |-
        Ex1 : Regrouper et gérer les risques liés à la cybersécurité avec les autres risques de l'entreprise (conformité, finances, opérations, réglementation, réputation, sécurité, etc.)
        Ex2 : Inclure les responsables des risques liés à la cybersécurité dans la planification de la gestion des risques de l'entreprise
        Ex3 : Établir des critères pour l'escalade des risques de cybersécurité dans le cadre de la gestion des risques de l'entreprise.

        Documents de référence :
        - Poliitique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rm-04
      assessable: true
      depth: 3
      ref_id: GV.RM-04
      description: Une orientation stratégique décrivant les différentes options de réponse aux risques doit être établie et communiquée.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      annotation: "Ex1 : Préciser les critères permettant d'accepter et d'éviter les risques de cybersécurité pour différentes classifications de données\nEx2 : Déterminer s'il y a lieu de souscrire une assurance cybersécurité \nEx3 : Documenter les conditions dans lesquelles les modèles de responsabilité partagée sont acceptables (par exemple, externaliser certaines fonctions de cybersécurité, demander à un tiers d'effectuer des transactions financières pour le compte de l'organisation, utiliser des services publics basés sur l'informatique en nuage).\n\nDocuments de référence :\n- Poliitique de gestion des risques"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rm-05
      assessable: true
      depth: 3
      ref_id: GV.RM-05
      description: Un cadre de gouvernance pour la communication des risques de cybersécurité doit être mis en place au sein des différents services de l'entreprise et de ses filiales, y compris pour les risques liés aux fournisseurs et autres tiers.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      annotation: |-
        Ex1 : Déterminer comment informer les cadres supérieurs, les cadres dirigeants et la direction de la situation de l'organisation en matière de cybersécurité à des intervalles convenus.
        Ex2 : Déterminer comment tous les services de l'organisation - tels que la direction, les opérations, les auditeurs internes, le service juridique, le service des acquisitions, le service de la sécurité physique et le service des ressources humaines - communiqueront entre eux au sujet des risques liés à la cybersécurité.

        Documents de référence :
        - Poliitique de gestion des risques
        - Politique de gouvernance SSI
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rm-06
      assessable: true
      depth: 3
      ref_id: GV.RM-06
      description: Une méthode normalisée de calcul, de documentation, de catégorisation et de priorisation des risques de cybersécurité doit être établie et communiquée.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      annotation: |-
        Ex1 : Établir des critères pour l'utilisation d'une approche quantitative dans l'analyse des risques de cybersécurité, et préciser les formules de probabilité et d'exposition.
        Ex2 : Créer et utiliser des modèles (par exemple, une cartographie des risques) pour documenter les informations relatives aux risques de cybersécurité (par exemple, la description des risques, l'exposition, le traitement).
        Ex3 : Établir des critères de hiérarchisation des risques aux niveaux appropriés de l'entreprise.
        Ex4 : Utiliser une liste cohérente de catégories de risques pour faciliter l'intégration, l'agrégation et la comparaison des risques de cybersécurité.

        Documents de référence :
        - Poliitique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rm-07
      assessable: true
      depth: 3
      ref_id: GV.RM-07
      description: Les opportunités visant à réduire les risques (risques positifs) doivent être incluses dans les discussions sur les risques organisationnels.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rm
      annotation: |-
        Ex1 : Définir et communiquer des orientations et des méthodes pour identifier les opportunités et les inclure dans les discussions sur les risques (par exemple, l'analyse des forces, des faiblesses, des opportunités et des menaces [SWOT]).
        Ex2 : Identifier des objectifs ambitieux et les documenter
        Ex3 : Calculer, documenter et hiérarchiser les risques positifs et les risques négatifs.

        Documents de référence :
        - Poliitique de gestion des risques
        - Politique de gouvernance SSI
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rr-01
      assessable: true
      depth: 3
      ref_id: GV.RR-01
      description: La direction de l'entreprise et de ses filiales doit être responsable des risques liés à la cybersécurité et doit favoriser une culture des risques, éthique et en constante amélioration.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rr
      annotation: "Ex1 : Les dirigeants (par exemple, les directeurs) conviennent de leurs rôles et responsabilités dans l'élaboration, la mise en œuvre et l'évaluation de la stratégie de cybersécurité de l'organisation.\nEx2 : Partager les attentes des dirigeants concernant une culture sûre et éthique, en particulier lorsque l'actualité offre l'occasion de mettre en évidence des exemples positifs ou négatifs de gestion des risques liés à la cybersécurité. \nEx3 : Les dirigeants demandent au RSSI de maintenir une stratégie globale de gestion des risques de cybersécurité, de la réviser et de la mettre à jour au moins une fois par an et après des événements majeurs. \nEx4 : Effectuer des examens pour s'assurer que les responsables de la gestion des risques liés à la cybersécurité disposent d'une autorité et d'une coordination adéquates.\n\nDocuments de référence :\n- Poliitique de gestion des risques\n- Politique de gouvernance SSI"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rr-02
      assessable: true
      depth: 3
      ref_id: GV.RR-02
      description: Les rôles, responsabilités et autorités liés à la gestion des risques de cybersécurité et d'audits internes doivent être établis, communiqués, compris et appliqués.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rr
      annotation: |-
        Ex1 : Documenter les rôles et responsabilités en matière de gestion des risques dans la politique
        Ex2 : Indiquer qui est responsable des activités de gestion des risques liés à la cybersécurité et comment les équipes et les personnes concernées doivent être consultées et informées.
        Ex3 : Inclure les responsabilités en matière de cybersécurité et les exigences de performance dans les fiches de poste du personnel
        Ex4 : Documenter les objectifs de performance pour le personnel exerçant des responsabilités en matière de gestion des risques liés à la cybersécurité, et mesurer périodiquement les performances pour identifier les domaines à améliorer.
        Ex5 : Définir clairement les responsabilités en matière de cybersécurité au sein des opérations, des fonctions de gestion des risques et des fonctions d'audit interne.

        Documents de référence :
        - Poliitique de gestion des risques
        - Politique de gouvernance SSI
        - Politique de gestion de la conformité
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rr-03
      assessable: true
      depth: 3
      ref_id: GV.RR-03
      description: Des ressources adéquates doivent être allouées en fonction de la stratégie, des rôles, des responsabilités et des politiques en matière de risque de cybersécurité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rr
      annotation: "Ex1 : Procéder à des examens périodiques de la gestion afin de s'assurer que les personnes chargées de la gestion des risques liés à la cybersécurité disposent de l'autorité nécessaire. \nEx2 : Déterminer l'affectation des ressources et les investissements en fonction de la tolérance au risque et de la réponse à y apporter. \nEx3 : Fournir des ressources humaines, techniques et des processus adéquats et suffisants pour soutenir la stratégie de cybersécurité.\n\nDocuments de référence :\n- Politique de gouvernance SSI"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.rr-04
      assessable: true
      depth: 3
      ref_id: GV.RR-04
      description: La cybersécurité doit être incluse dans les pratiques en matière de ressources humaines.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-rr
      annotation: "Ex1 : Intégrer les considérations relatives à la gestion des risques de cybersécurité dans les processus de gestion des ressources humaines (par exemple, sélection du personnel, intégration, notification des changements, cessation d'activité). \nEx2 : Considérer les connaissances en matière de cybersécurité comme un facteur positif dans les décisions de recrutement, de formation et de fidélisation du personnel.\nEx3 : Effectuer des vérifications des antécédents avant d'intégrer de nouveaux membres du personnel dans des fonctions sensibles, et répéter périodiquement ces vérifications pour les membres du personnel exerçant de telles fonctions.\nEx4 : Définir et faire respecter les obligations du personnel en matière de connaissance, d'adhésion et de respect des politiques de sécurité dans le cadre de leurs fonctions.\n\nDocuments de référence :\n- Politique de gouvernance SSI\n- Politique de gestion sécurisée des ressources humaines"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.po-01
      assessable: true
      depth: 3
      ref_id: GV.PO-01
      description: La politique de gestion des risques de cybersécurité doit être établie et approuvée par la direction en fonction du contexte organisationnel.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-po
      annotation: |-
        Ex1 : Créer, diffuser et maintenir une politique de gestion des risques compréhensible et utilisable, avec des déclarations sur les intentions, les attentes et les orientations de la direction.
        Ex2 : Examiner périodiquement la politique et les processus et procédures de soutien pour s'assurer qu'ils sont conformes aux objectifs et aux priorités de la stratégie de gestion des risques, ainsi qu'à l'orientation générale de la politique de cybersécurité.
        Ex3 : Exiger l'approbation de la politique par la direction générale
        Ex4 : Communiquer la politique de gestion des risques de cybersécurité et les processus et procédures qui l'accompagnent dans l'ensemble de l'organisation.
        Ex5 : Exiger du personnel qu'il accuse réception de la politique lors de son embauche, chaque année et à chaque mise à jour de la politique.

        Documents de référence :
        - Politique de gouvernance SSI
        - Politique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.po-02
      assessable: true
      depth: 3
      ref_id: GV.PO-02
      description: La politique de gestion des risques de cybersécurité doit être revue périodiquement, communiquée et appliquée en fonction, des exigences, menaces et évolutions technologiques.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-po
      annotation: |-
        Ex1 : Mettre à jour la politique sur la base d'examens périodiques des résultats de la gestion des risques liés à la cybersécurité afin de s'assurer que la politique et les processus et procédures qui l'accompagnent permettent de maintenir le risque à un niveau acceptable.
        Ex2 : Prévoir un calendrier pour l'examen des modifications de l'environnement de risque de l'organisation (par exemple, modifications du risque ou des objectifs de la mission de l'organisation), et communiquer les mises à jour recommandées de la politique.
        Ex3 : Mettre à jour la politique pour refléter les changements dans les exigences légales et réglementaires
        Ex4 : Mettre à jour la politique pour refléter les changements technologiques (par exemple, l'adoption de l'intelligence artificielle) et les changements dans l'entreprise (par exemple, l'acquisition d'une nouvelle entreprise, de nouvelles exigences contractuelles).

        Documents de référence :
        - Politique de gestion des risques
        - Politique de gestion de la conformité
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.ov-01
      assessable: true
      depth: 3
      ref_id: GV.OV-01
      description: Les résultats de la stratégie de gestion des risques de cybersécurité doivent être examinés pour éclairer et ajuster la stratégie.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-ov
      annotation: |-
        Ex1 : Evaluer dans quelle mesure la stratégie de gestion des risques et les résultats obtenus ont aidé les dirigeants à prendre des décisions et à atteindre les objectifs de l'organisation.
        Ex2 : Examiner si les stratégies de gestion des risques de cybersécurité qui entravent les opérations ou l'innovation doivent être ajustées.

        Documents de référence :
        - Politique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.ov-02
      assessable: true
      depth: 3
      ref_id: GV.OV-02
      description: La stratégie de gestion des risques de cybersécurité doit être revue et ajustée pour garantir la couverture des exigences et des risques.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-ov
      annotation: |-
        Ex1 : Examiner les résultats de l'audit pour confirmer que la stratégie de cybersécurité existante a permis de respecter les exigences internes et externes.
        Ex2 : Examiner le contrôle des performances des personnes occupant des fonctions liées à la cybersécurité afin de déterminer si des changements de politique sont nécessaires.
        Ex3 : Réexaminer la stratégie à la lumière des incidents liés à la cybersécurité.

        Documents de référence :
        - Politique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.ov-03
      assessable: true
      depth: 3
      ref_id: GV.OV-03
      description: La performance de la gestion des risques de cybersécurité doit être évaluée et révisée si nécessaire.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-ov
      annotation: |-
        Ex1 : Examiner les indicateurs clés de performance (KPI) pour s'assurer que les politiques et procédures de l'ensemble de l'organisation atteignent leurs objectifs.
        Ex2 : Examiner les principaux indicateurs de risque (KRI) afin d'identifier les risques auxquels l'organisation est confrontée, y compris la probabilité et l'impact potentiel.
        Ex3 : Recueillir et communiquer à la présidence et aux comités de direction des données sur la gestion des risques liés à la cybersécurité.

        Documents de référence :
        - Politique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-01
      assessable: true
      depth: 3
      ref_id: GV.SC-01
      description: Une stratégie, un plan d’actions, des objectifs, des politiques et des processus de gestion des risques liés à la chaîne d’approvisionnement doivent être établis.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: |-
        Ex1 : Établir une stratégie qui exprime les objectifs du programme de gestion des risques liés à la cybersécurité dans la chaîne d'approvisionnement
        Ex2 : Développer le programme de gestion des risques liés à la cybersécurité de la chaîne d'approvisionnement, y compris un plan (avec des étapes), des politiques et des procédures qui guident la mise en œuvre et l'amélioration du programme, et partager les politiques et les procédures avec les parties prenantes de l'organisation.
        Ex3 : Développer et mettre en œuvre des processus de programme basés sur la stratégie, les objectifs, les politiques et les procédures qui sont approuvés et exécutés par les parties prenantes de l'organisation.
        Ex4 : Mettre en place un mécanisme inter-organisationnel qui assure l'alignement entre les fonctions qui contribuent à la gestion des risques liés à la cybersécurité de la chaîne d'approvisionnement, telles que la cybersécurité, l'informatique, les opérations, le service juridique, les ressources humaines et l'ingénierie.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique des gestion des risqes
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-02
      assessable: true
      depth: 3
      ref_id: GV.SC-02
      description: Les rôles et responsabilités en matière de cybersécurité pour les fournisseurs, les clients et les partenaires doivent être établis, communiqués et coordonnés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: "Ex1 : Identifier un ou plusieurs rôles ou postes spécifiques qui seront responsables de la planification, de l'affectation des ressources et de l'exécution des activités de gestion des risques liés à la chaîne d'approvisionnement en matière de cybersécurité.\nEx2 : Consigner dans une politique les rôles et responsabilités en matière de gestion des risques liés à la cybersécurité de la chaîne d'approvisionnement.\nEx3 : Créer des matrices de responsabilités afin de déterminer qui sera responsable des activités de gestion des risques liés à la cybersécurité de la chaîne d'approvisionnement et comment ces équipes et ces personnes seront consultées et informées. \nEx4 : Inclure les responsabilités et les exigences de performance en matière de gestion des risques liés à la cybersécurité de la chaîne d'approvisionnement dans les descriptions du personnel afin d'assurer la clarté et d'améliorer la responsabilisation.\nEx5 : Documenter les objectifs de performance pour le personnel exerçant des responsabilités spécifiques en matière de gestion des risques liés à la cybersécurité, et les mesurer périodiquement pour démontrer et améliorer les performances.\nEx6 : Définir les rôles et les responsabilités des fournisseurs, des clients et des partenaires commerciaux en ce qui concerne les responsabilités partagées pour les risques de cybersécurité applicables, et les intégrer dans les politiques de l'organisation et les accords avec des tiers.\nEx7 : Communiquer en interne les rôles et responsabilités des tiers en matière de gestion des risques liés à la cybersécurité dans la chaîne d'approvisionnement.\nEx8 : Établir des règles et des protocoles pour le partage d'informations et les processus de reporting entre l'organisation et ses fournisseurs.\n\nDocuments de référence :\n- Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement\n- Politique de gouvernance SSI"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-03
      assessable: true
      depth: 3
      ref_id: GV.SC-03
      description: La gestion des risques en cybersécurité de la chaîne d’approvisionnement doit être intégrée aux processus de gestion des risques d’entreprise.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: |-
        Ex1 : Identifier les domaines d'alignement et de chevauchement avec la cybersécurité et la gestion du risque d'entreprise
        Ex2 : Établir des ensembles de contrôles intégrés pour la gestion des risques liés à la cybersécurité et celle de la chaîne d'approvisionnement
        Ex3 : Intégrer la gestion des risques liés à la cybersécurité de la chaîne d'approvisionnement dans les processus d'amélioration
        Ex4 : Faire remonter à la direction générale les risques importants de cybersécurité dans les chaînes d'approvisionnement et les traiter au niveau de la gestion des risques de l'entreprise.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-04
      assessable: true
      depth: 3
      ref_id: GV.SC-04
      description: Les fournisseurs doivent être connus et priorisés en fonction de leur criticité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: |-
        Ex1 : Développer des critères de criticité des fournisseurs basés, par exemple, sur la sensibilité des données traitées ou détenues par les fournisseurs, le degré d'accès aux systèmes de l'organisation et l'importance des produits ou services pour la mission de l'organisation.
        Ex2 : Tenir un registre de tous les fournisseurs et les classer par ordre de priorité en fonction des critères de criticité.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-05
      assessable: true
      depth: 3
      ref_id: GV.SC-05
      description: Les exigences en matière de cybersécurité concernant les risques des chaînes d’approvisionnement doivent être établies et intégrées dans les contrats.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: "Ex1 : Établir des exigences de sécurité pour les fournisseurs, les produits et les services en fonction de leur niveau de criticité et de l'impact potentiel en cas de compromission.\nEx2 : Inclure toutes les exigences en matière de cybersécurité et de chaîne d'approvisionnement que les tiers doivent respecter, ainsi que la manière dont le respect de ces exigences peut être vérifié, dans le langage contractuel par défaut.\nEx3 : Définir les règles et les protocoles de partage d'informations entre l'organisation et ses fournisseurs et sous-traitants dans les accords.\nEx4 : Gérer les risques en incluant des exigences de sécurité dans les accords en fonction de leur criticité et de l'impact potentiel en cas de compromission.\nEx5 : Définir des exigences de sécurité dans les accords de niveau de service (SLA) pour contrôler les performances de sécurité des fournisseurs tout au long du cycle de vie de la relation avec ces derniers\nEx6 : Exiger contractuellement des fournisseurs qu'ils divulguent les caractéristiques, les fonctions et les vulnérabilités de leurs produits et services en matière de cybersécurité pendant toute la durée de vie du produit ou la durée du service\nEx7 : Exiger contractuellement des fournisseurs qu'ils fournissent et tiennent à jour un inventaire des composants (par exemple, nomenclature des logiciels ou du matériel) pour les produits critiques.\nEx8 : Exiger contractuellement des fournisseurs qu'ils contrôlent leurs employés et qu'ils se protègent contre les menaces internes. \nEx9 : Exiger contractuellement des fournisseurs qu'ils apportent la preuve qu'ils appliquent des pratiques de sécurité acceptables, par exemple par le biais d'une auto-attestation, d'une conformité à des normes connues, de certifications ou d'inspections. \nEx10 : Préciser dans les contrats et autres accords les droits et responsabilités de l'organisation, de ses fournisseurs et de leurs chaînes d'approvisionnement en ce qui concerne les risques en matière de cybersécurité.\n\nDocuments de référence :\n- Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-06
      assessable: true
      depth: 3
      ref_id: GV.SC-06
      description: La planification et une diligence raisonnable doivent être effectuées pour réduire les risques avant d’entrer dans des relations formelles avec des fournisseurs ou d’autres tiers.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: |-
        Ex1 : Effectuer un contrôle préalable approfondi des fournisseurs potentiels qui soit cohérent avec la planification des achats et proportionnel au niveau de risque, à la criticité et à la complexité de chaque relation avec le fournisseur.
        Ex2 : Évaluer l'adéquation des capacités technologiques et de cybersécurité ainsi que les pratiques de gestion des risques des fournisseurs potentiels.
        Ex3 : Évaluer les risques encourus par les fournisseurs au regard des exigences commerciales et des exigences applicables en matière de cybersécurité.
        Ex4 : Évaluer l'authenticité, l'intégrité et la sécurité des produits critiques avant leur acquisition et leur utilisation.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-07
      assessable: true
      depth: 3
      ref_id: GV.SC-07
      description: Les risques associés à un fournisseur, ses produits, ses services, et d'autres tiers doivent être compris, enregistrés, hiérarchisés, évalués, traités et surveillés tout au long de la relation contractuelle.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: |-
        Ex1 : Adapter les formats et la fréquence des évaluations en fonction de la réputation du tiers et de la criticité des produits ou services qu'il fournit.
        Ex2 : Evaluer les preuves de conformité des tiers aux exigences contractuelles en matière de cybersécurité, telles que les auto-attestations, les garanties, les certifications et autres artefacts.
        Ex3 : Contrôler les fournisseurs essentiels pour s'assurer qu'ils remplissent leurs obligations en matière de sécurité tout au long du cycle de vie de la relation fournisseur, en utilisant diverses méthodes et techniques, telles que des inspections, des audits, des tests ou d'autres formes d'évaluation.
        Ex4 : Surveiller les fournisseurs, les services et les produits critiques pour détecter les changements dans leur profil de risque et réévaluer la criticité du fournisseur et l'impact sur le risque en conséquence.
        Ex5 : S'éxercer aux interruptions imprévues liées aux fournisseurs et à la chaîne d'approvisionnement afin de les anticiper et d'assurer la continuité de l'activité.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-08
      assessable: true
      depth: 3
      ref_id: GV.SC-08
      description: Les fournisseurs concernés et autres tiers doivent être inclus dans les activités de planification, de réponse et de récupération en cas d’incident.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: |-
        Ex1 : Définir et utiliser des règles et des protocoles pour rapporter les activités de réponse aux incidents et de récupération, ainsi que le statut entre l'organisation et ses fournisseurs.
        Ex2 : Identifier et documenter les rôles et responsabilités de l'organisation et de ses fournisseurs en matière de réponse aux incidents.
        Ex3 : Inclure les fournisseurs critiques dans les exercices et simulations de réponse aux incidents
        Ex4 : Définir et coordonner les méthodes et protocoles de communication de crise entre l'organisation et ses fournisseurs critiques
        Ex5 : Organiser des sessions de RETEX en collaboration avec les fournisseurs essentiels.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-09
      assessable: true
      depth: 3
      ref_id: GV.SC-09
      description: Les pratiques de sécurité de la chaîne d’approvisionnement doivent être intégrées aux programmes de cybersécurité et de gestion des risques de l'entreprise et de ses filiales, leur performance est également contrôlée.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: "Ex1 : Les politiques et les procédures exigent des registres de provenance pour tous les produits et services technologiques acquis.\nEx2 : Fournir périodiquement aux dirigeants des rapports sur les risques concernant la manière dont il est prouvé que les composants acquis ne sont pas altérés et qu'ils sont authentiques.\nEx3 : Communiquer régulièrement entre les gestionnaires des risques de cybersécurité et le personnel opérationnel sur la nécessité d'acquérir des correctifs, des mises à jour et des mises à niveau de logiciels uniquement auprès de fournisseurs de logiciels authentifiés et dignes de confiance. \nEx4 : Examiner les politiques pour s'assurer qu'elles exigent que le personnel du fournisseur agréé effectue la maintenance des produits du fournisseur.\nEx5 : Les politiques et les procédures exigent que les mises à niveau du matériel critique soient vérifiées pour détecter les changements non autorisés.\n\nDocuments de référence :\n- Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv.sc-10
      assessable: true
      depth: 3
      ref_id: GV.SC-10
      description: Les plans de gestion des risques de la chaîne d’approvisionnement doivent comprendre des dispositions pour les activités postérieures à un accord.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:gv-sc
      annotation: |-
        Ex1 : Établir des processus pour mettre fin aux relations critiques dans des circonstances normales et défavorables
        Ex2 : Définir et mettre en œuvre des plans pour la maintenance et l'obsolescence des composants en fin de vie.
        Ex3 : Vérifier que l'accès des fournisseurs aux ressources de l'organisation est désactivé rapidement lorsqu'il n'est plus nécessaire.
        Ex4 : Vérifier que les biens contenant les données de l'organisation sont retournés ou éliminés de manière opportune, contrôlée et sûre.
        Ex5 : Elaborer et mettre en œuvre un plan de résiliation ou de transition des relations avec les fournisseurs qui tienne compte des risques et de la résilience de la chaîne d'approvisionnement
        Ex6 : Atténuer les risques pour les données et les systèmes créés par la cessation des relations avec les fournisseurs
        Ex7 : Gérer les risques de fuite de données associés à la cessation des relations avec les fournisseurs

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.am-01
      assessable: true
      depth: 3
      ref_id: ID.AM-01
      description: Les inventaires des matériels utilisés par l’entreprise et ses filiales doivent être maintenus.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      annotation: |-
        Ex1 : Maintenir des inventaires pour tous les types de matériel, y compris les appareils informatiques, IoT, OT, mobiles et équipements réseaux.
        Ex2 : Surveiller en permanence les réseaux pour détecter le nouveau matériel et mettre à jour automatiquement les inventaires.

        Documents de référence :
        - Politique de gestion des actifs
        - Politique de gestion des vulnérabilités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.am-02
      assessable: true
      depth: 3
      ref_id: ID.AM-02
      description: Les inventaires des logiciels, services et systèmes utilisés par l’entreprise et ses filiales doivent être maintenus.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      annotation: "Ex1 : Tenir des inventaires pour tous les types de logiciels et de services, y compris les logiciels commerciaux, les logiciels libres, les applications personnalisées, les services API et les applications et services basés sur l'informatique en nuage. \nEx2 : Surveiller en permanence toutes les plateformes, y compris les conteneurs et les machines virtuelles, pour détecter les changements dans l'inventaire des logiciels et des services\nEx3 : Maintenir un inventaire des systèmes de l'organisation\n\nDocuments de référence :\n- Politique de gestion des actifs\n- Politique de gestion des vulnérabilités"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.am-03
      assessable: true
      depth: 3
      ref_id: ID.AM-03
      description: Une cartographie des flux de communication réseaux autorisés en interne et en externe doit être maintenue.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      annotation: "Ex1 : Maintenir les ancrages de référence des flux de communication et de données : \n   - au sein des réseaux câblés et sans fil de l'entreprise et ses filiales ;\n   - entre l'entreprise, ses filiales et les tiers ;\n   - pour l'utilisation de l'infrastructure en tant que service (IaaS) de l'entreprise et ses filiales.\nEx2 : Maintenir une documentation sur les ports, protocoles et services réseau attendus qui sont généralement utilisés par les systèmes autorisés.\n\nDocuments de référence :\n- Politique de gestion des actifs"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.am-04
      assessable: true
      depth: 3
      ref_id: ID.AM-04
      description: Les inventaires des services fournis par les fournisseurs doivent être maintenus.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      annotation: |-
        Ex1 : Inventorier tous les services externes utilisés par l'entreprise et ses filiales, y compris les offres tierces de type IaaS, plateforme en tant que service (PaaS) et logiciel en tant que service (SaaS), les API et les autres services d'application hébergés à l'extérieur.
        Ex2 : mettre à jour l'inventaire lorsqu'un nouveau service externe va être utilisé afin d'assurer un suivi adéquat de la gestion des risques de cybersécurité liés à l'utilisation de ce service par l'organisation.

        Documents de référence :
        - Politique de gestion des actifs
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.am-05
      assessable: true
      depth: 3
      ref_id: ID.AM-05
      description: Les actifs et les données doivent être priorisés en fonction de leur criticité et de leur impact sur la mission.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      annotation: "Ex1 : Définir les critères de hiérarchisation de chaque catégorie d'actifs et de données \nEx2 : Appliquer les critères de priorisation aux actifs et aux données\nEx3 : Suivre les priorités des actifs et des données, et les mettre à jour périodiquement ou lorsque des changements importants interviennent dans l'organisation.\n\nDocuments de référence :\n- Politique de gestion des actifs"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.am-07
      assessable: true
      depth: 3
      ref_id: ID.AM-07
      description: Les inventaires de données et les métadonnées correspondantes doivent être maintenus.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      annotation: "Ex1 : Tenir à jour une liste des types de données désignées comme présentant un intérêt (par exemple, les informations personnelles identifiables, les informations de santé protégées, les numéros de comptes financiers, la propriété intellectuelle de l'organisation, les données technologiques opérationnelles, ...)\nEx2 : Découvrir et analyser en permanence les données ponctuelles afin d'identifier de nouvelles occurrences des types de données désignés. \nEx3 : Attribuer des classifications de données aux types de données désignés par le biais de balises ou d'étiquettes.\nEx4 : Suivre la provenance, le propriétaire des données et la géolocalisation de chaque instance des types de données désignés.\n\nDocuments de référence :\n- Politique de gestion des actifs"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.am-08
      assessable: true
      depth: 3
      ref_id: ID.AM-08
      description: Les actifs (systèmes, matériels, logiciels, services, données...)  doivent être gérés, maintenus et restitués le cas échant lors de changement ou de la fin d’emploi, de contrat ou d’accord.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-am
      annotation: "Ex1 : Intégrer les considérations de cybersécurité tout au long du cycle de vie des systèmes, du matériel, des logiciels, des produits et des services \nEx2 : Identifier les utilisations non officielles de la technologie pour atteindre les objectifs de la mission (« Shadow IT »)\nEx3 : Identifier périodiquement les systèmes, matériels, logiciels et services redondants qui augmentent inutilement la surface d'attaque de l'organisation.\nEx4 : Configurer et sécuriser correctement les systèmes, le matériel, les logiciels et les services avant leur déploiement en production\nEx5 : Mettre à jour les inventaires lorsque les systèmes, le matériel, les logiciels et les services sont déplacés ou transférés au sein de l'organisation\nEx6 : Détruire en toute sécurité les données stockées conformément à la politique de conservation des données de l'organisation, en utilisant la méthode de destruction prescrite, et conserver et gérer un enregistrement des destructions.\nEx7 : Assainir en toute sécurité le stockage des données lorsque le matériel est mis hors service, déclassé, réaffecté ou envoyé en réparation ou en remplacement.\nEx8 : Proposer des méthodes de destruction du papier, des supports de stockage et d'autres formes physiques de stockage des données.\n\nDocuments de référence :\n- Politique de gestion des actifs\n- Politique de sécurité de l'exploitation"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-01
      assessable: true
      depth: 3
      ref_id: ID.RA-01
      description: Les vulnérabilités des actifs doivent être identifiées, validées et enregistrées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: "Ex1 : Utiliser les technologies de gestion des vulnérabilités pour identifier les logiciels non corrigés et mal configurés \nEx2 : Évaluer les architectures de réseaux et de systèmes pour détecter les faiblesses de conception et de mise en œuvre qui affectent la cybersécurité.\nEx3 : Examiner, analyser ou tester les logiciels développés par l'organisation afin d'identifier les vulnérabilités de conception, de codage et de configuration par défaut.\nEx4 : Évaluer les installations qui abritent des ressources informatiques critiques afin de détecter les vulnérabilités physiques et les problèmes de résilience.\nEx5 : Surveiller les sources de renseignements sur les cybermenaces afin d'obtenir des informations sur les nouvelles vulnérabilités des produits et des services\nEx6 : Examiner les processus et les procédures pour détecter les vulnérabilités qui pourraient être exploitées pour nuire à la cybersécurité.\n\nDocuments de référence :\n- politique de gestion des vulnérabilités"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-02
      assessable: true
      depth: 3
      ref_id: ID.RA-02
      description: Les renseignements sur les cybermenaces doivent provenir de sources fiables.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: "Ex1 : Configurer les outils et technologies de cybersécurité dotés de capacités de détection ou de réaction afin d'ingérer en toute sécurité les flux de renseignements sur les cybermenaces. \nEx2 : Recevoir et examiner les avis de tiers réputés sur les acteurs actuels de la menace et leurs tactiques, techniques et procédures (TTP).\nEx3 : Surveiller les sources de renseignements sur les cybermenaces pour obtenir des informations sur les types de vulnérabilités que les technologies émergentes peuvent présenter.\n\nDocuments de référence :\n- politique de gestion des risques\n- politique de gestion des vulnérabilités"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-03
      assessable: true
      depth: 3
      ref_id: ID.RA-03
      description: Les menaces internes et externes qui pèsent sur l'entreprise et ses filiales doivent être identifiées et enregistrées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: |-
        Ex1 : Utiliser les renseignements sur les cybermenaces pour se tenir au courant des types d'acteurs susceptibles de cibler l'entreprise et ses filiales et des TTP qu'ils sont susceptibles d'utiliser.
        Ex2 : Effectuer une chasse aux menaces pour rechercher des signes de présence d'acteurs menaçants dans l'environnement.
        Ex3 : Mettre en œuvre des processus d'identification des acteurs de la menace interne

        Documents de référence :
        - politique de gestion des risques
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-04
      assessable: true
      depth: 3
      ref_id: ID.RA-04
      description: La probabilité et les impacts potentiels de menaces exploitant des vulnérabilités doivent être identifiés et enregistrés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: |-
        Ex1 : Les dirigeants et les spécialistes de la gestion des risques liés à la cybersécurité collaborent pour estimer la probabilité et l'impact des scénarios de risque et les consigner dans des registres de risques.
        Ex2 : Énumérer les conséquences potentielles pour l'entreprise et ses filiales d'un accès non autorisé aux communications et aux systèmes de l'organisation, ainsi qu'aux données traitées dans ou par ces systèmes.
        Ex3 : Prendre en compte les impacts potentiels des défaillances en cascade pour les systèmes de systèmes.

        Documents de référence :
        - politique de gestion des risques
        - politique de gestion des vulnérabilités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-05
      assessable: true
      depth: 3
      ref_id: ID.RA-05
      description: Les menaces, les vulnérabilités, les probabilités et les impacts doivent être utilisés pour comprendre les risques inhérents.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: "Ex1 : Développer des modèles de menaces pour mieux comprendre les risques pour les données et identifier les réponses appropriées aux risques \nEx2 : Prioriser l'affectation des ressources et les investissements en matière de cybersécurité sur la base des probabilités et des impacts estimés.\n\nDocuments de référence :\n- politique de gestion des risques\n- politique de gestion des vulnérabilités"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-06
      assessable: true
      depth: 3
      ref_id: ID.RA-06
      description: Les réponses aux risques doivent être établies, priorisées, planifiées, suivies et communiquées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: |-
        Ex1 : Appliquer les critères du plan de gestion de la vulnérabilité pour décider d'accepter, de transférer, d'atténuer ou d'éviter le risque.
        Ex2 : Appliquer les critères du plan de gestion des vulnérabilités pour sélectionner les contrôles compensatoires afin d'atténuer les risques
        Ex3 : Suivre l'évolution de la mise en œuvre de la réponse aux risques (par exemple, plan d'action et, registre des risques, rapport détaillé sur les risques).
        Ex4 : Utiliser les résultats de l'évaluation des risques pour éclairer les décisions et les actions relatives à la réponse aux risques
        Ex5 : Communiquer les réponses aux risques prévues aux parties prenantes concernées par ordre de priorité

        Documents de référence :
        - politique de gestion des risques
        - Politique de gestion des vulnérabilités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-07
      assessable: true
      depth: 3
      ref_id: ID.RA-07
      description: Les changements et les dérogations doivent être gérés, évalués en termes d'impact sur les risques, enregistrés et suivis.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: |-
        Ex1 : Mettre en œuvre et suivre des procédures pour la documentation formelle, l'examen, le test et l'approbation des changements proposés et des exceptions demandées.
        Ex2 : Documenter les risques possibles liés à la réalisation ou à la non-réalisation de chaque modification proposée et fournir des conseils sur la suppression des modifications
        Ex3 : Documenter les risques liés à chaque exception demandée et le plan de réponse à ces risques
        Ex4 : Examiner périodiquement les risques qui ont été acceptés sur la base des actions futures ou des étapes prévues.

        Documents de référence :
        - politique de gestion des dérogations SSI
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-08
      assessable: true
      depth: 3
      ref_id: ID.RA-08
      description: Les processus de réception, d’analyse et de réponse aux divulgations de vulnérabilités doivent être établis.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: |-
        Ex1 : Partager les informations sur la vulnérabilité entre l'organisation et ses fournisseurs en suivant les règles et les protocoles définis dans les contrats.
        Ex2 : Attribuer les responsabilités et vérifier l'exécution des procédures de traitement, d'analyse d'impact et de réponse aux divulgations de menaces, de vulnérabilités ou d'incidents de cybersécurité par les fournisseurs, les clients, les partenaires et les organismes gouvernementaux de cybersécurité.

        Documents de référence :
        - politique de gestion des vulnérabilités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-09
      assessable: true
      depth: 3
      ref_id: ID.RA-09
      description: L'authenticité et l'intégrité des matériels et des logiciels doivent être évaluées avant l'acquisition et l'utilisation.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: |-
        Ex1 : Évaluer l'authenticité et la cybersécurité des produits et services technologiques critiques avant leur acquisition et leur utilisation

        Documents de référence :
        - Politique de sécurité de l'exploitation
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.ra-10
      assessable: true
      depth: 3
      ref_id: ID.RA-10
      description: Les fournisseurs doivent faire l'objet d'une évaluation en termes de cybersécurité avant toute acquisition.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-ra
      annotation: |-
        Ex1 : Évaluer les risques encourus par les fournisseurs au regard des exigences commerciales et des exigences applicables en matière de cybersécurité, y compris au niveau de la chaîne d'approvisionnement.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique des audits de sécurité
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.im-01
      assessable: true
      depth: 3
      ref_id: ID.IM-01
      description: Les améliorations possibles doivent être identifiées à partir des évaluations de conformité et de performances de la cybersécurité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-im
      annotation: |-
        Ex1 : Effectuer des auto-évaluations des services critiques en tenant compte des menaces et des technologies de pointe actuelles.
        Ex2 : Investir dans des évaluations par des tiers ou des audits indépendants de l'efficacité du programme de cybersécurité de l'organisation afin d'identifier les domaines à améliorer.
        Ex3 : Évaluer en permanence la conformité aux exigences de cybersécurité sélectionnées par des moyens automatisés.

        Documents de référence :
        - Politique de gestion de la conformité
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique des audits de sécurité
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.im-02
      assessable: true
      depth: 3
      ref_id: ID.IM-02
      description: Les améliorations possibles doivent être identifiées à partir de tests et d'exercices de sécurité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-im
      annotation: |-
        Ex1 : Identifier les améliorations à apporter aux futures activités de réponse aux incidents sur la base des résultats des évaluations de la réponse aux incidents (par exemple, exercices et simulations sur table, tests, examens internes, audits indépendants).
        Ex2 : Identifier les améliorations à apporter aux futures activités de continuité des activités, de reprise après sinistre et de réponse aux incidents sur la base d'exercices réalisés en coordination avec les prestataires de services essentiels et les fournisseurs de produits.
        Ex3 : Impliquer les parties prenantes internes (par exemple, les cadres supérieurs, le service juridique, les ressources humaines) dans les tests et les exercices de sécurité, le cas échéant.
        Ex4 : Effectuer des tests de pénétration afin d'identifier les possibilités d'améliorer le niveau de sécurité de certains systèmes à haut risque, avec l'approbation de la direction.
        Ex5 : Mettre en œuvre des plans d'urgence pour répondre et se remettre de la découverte que des produits ou des services n'ont pas été fournis par le fournisseur ou le partenaire contractuel ou qu'ils ont été modifiés avant leur réception.
        Ex6 : Recueillir et analyser les mesures de performance à l'aide d'outils et de services de sécurité afin d'améliorer le programme de cybersécurité.

        Documents de référence :
        - Politique de gestion de la conformité
        - Politique des audits de sécurité
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.im-03
      assessable: true
      depth: 3
      ref_id: ID.IM-03
      description: Les améliorations possibles doivent être identifiées à partir de l’exécution des processus opérationnels.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-im
      annotation: |-
        Ex1 : Organiser des sessions sur les enseignements tirés en collaboration avec les fournisseurs
        Ex2 : Examiner chaque année les politiques, processus et procédures en matière de cybersécurité afin de tenir compte des enseignements tirés de l'expérience.
        Ex3 : Utiliser des indicateurs pour évaluer les performances opérationnelles en matière de cybersécurité au fil du temps.

        Documents de référence :
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique de gestion des incidents
        - Politique de gestion de la conformité
        - politique de gouvernance SSI
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id.im-04
      assessable: true
      depth: 3
      ref_id: ID.IM-04
      description: Les plans de réponse aux incidents et autres plans de cybersécurité doivent être établis, communiqués, maintenus et améliorés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:id-im
      annotation: |-
        Ex1 : Établir des plans d'urgence (par exemple, réponse aux incidents, continuité des activités, reprise après sinistre) pour répondre et se remettre des événements indésirables qui peuvent perturber les opérations, exposer des informations confidentielles ou mettre en péril la mission et la viabilité de l'organisation.
        Ex2 : Inclure dans tous les plans d'urgence des informations sur les contacts et la communication, les processus de gestion des scénarios courants et les critères de priorisation, d'escalade et d'élévation.
        Ex3 : Créer un plan de gestion des vulnérabilités afin d'identifier et d'évaluer tous les types de vulnérabilités et de hiérarchiser, tester et mettre en œuvre les réponses aux risques.
        Ex4 : Communiquer les plans de cybersécurité (y compris les mises à jour) aux personnes chargées de les mettre en œuvre et aux parties concernées.
        Ex5 : Revoir et mettre à jour tous les plans de cybersécurité chaque année ou lorsqu'il est nécessaire d'y apporter des améliorations significatives.

        Documents de référence :
        - Politique de gestion des incidents
        - Politique de gestion de la continuité et de la résilience des activités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.aa-01
      assessable: true
      depth: 3
      ref_id: PR.AA-01
      description: Les identités et les informations d’identification des utilisateurs, services et matériels doivent être gérées par l’entreprise et ses filiales.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-aa
      annotation: |-
        Ex1 : Initier des demandes de nouveaux accès ou d'accès supplémentaires pour les employés, les sous-traitants et d'autres personnes, et suivre, examiner et satisfaire les demandes, avec l'autorisation des propriétaires du système ou des données, le cas échéant.
        Ex2 : Emettre, gérer et révoquer des certificats cryptographiques et des jetons d'identité, des clés cryptographiques (c'est-à-dire la gestion des clés) et d'autres informations d'identification
        Ex3 : Sélectionner un identifiant unique pour chaque appareil à partir de caractéristiques matérielles immuables ou d'un identifiant fourni de manière sécurisée à l'appareil.
        Ex4 : Étiqueter physiquement le matériel autorisé avec un identifiant à des fins d'inventaire et d'entretien.

        Documents de référence :
        - politique de gestion des identités
        - politique de contrôle d'accès physique et logique
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.aa-02
      assessable: true
      depth: 3
      ref_id: PR.AA-02
      description: Les identités doivent être vérifiées en fonction des informations d’identification et de contexte.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-aa
      annotation: |-
        Ex1 : Vérifier l'identité déclarée d'une personne au moment de l'inscription à l'aide de titres d'identité officiel et formel délivrés par le gouvernement (par exemple, passeport, visa, permis de conduire).
        Ex2 : Délivrer un identifiant différent pour chaque personne (pas de partage d'identifiant).

        Documents de référence :
        - politique de gestion des identités
        - politique de contrôle d'accès physique et logique
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.aa-03
      assessable: true
      depth: 3
      ref_id: PR.AA-03
      description: Les utilisateurs, les services et les matériels doivent être authentifiés à l'état de l'art.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-aa
      annotation: "Ex1 : Exiger une authentification multifactorielle \nEx2 : Appliquer des politiques relatives à la force minimale des mots de passe, des codes PIN et d'autres authentifiants similaires \nEx3 : Réauthentifier périodiquement les utilisateurs, les services et le matériel en fonction du risque (par exemple, dans les architectures de confiance zéro).\nEx4 : Veiller à ce que le personnel autorisé puisse accéder aux comptes essentiels à la protection de la sécurité dans des conditions d'urgence.\n\nDocuments de référence :\n- politique de gestion des identités\n- politique de contrôle d'accès physique et logique"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.aa-04
      assessable: true
      depth: 3
      ref_id: PR.AA-04
      description: Les assertions d'identité doivent être protégées, transmises et vérifiées selon des normes de sécurité en vigueur.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-aa
      annotation: |-
        Ex1 : Protéger les assertions d'identité utilisées pour transmettre l'authentification et les informations relatives à l'utilisateur par le biais de systèmes d'authentification unique.
        Ex2 : Protéger les assertions d'identité utilisées pour transmettre des informations d'authentification et d'utilisateur entre des systèmes fédérés
        Ex3 : Mettre en œuvre des approches fondées sur des normes pour les assertions d'identité dans tous les contextes et suivre toutes les orientations pour la génération (par exemple, modèles de données, métadonnées), la protection (par exemple, signature numérique, cryptage) et la vérification (par exemple, validation de la signature) des assertions d'identité.

        Documents de référence :
        - politique de gestion des identités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.aa-05
      assessable: true
      depth: 3
      ref_id: PR.AA-05
      description: Les autorisations d’accès doivent être définies dans une politique, gérées, appliquées et révisées selon les principes du moindre privilège et la séparation des tâches.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-aa
      annotation: |-
        Ex1 : Examiner les privilèges d'accès logique et physique périodiquement et lorsque quelqu'un change de rôle ou quitte l'organisation, et annuler rapidement les privilèges qui ne sont plus nécessaires.
        Ex2 : Prendre en compte les attributs du demandeur et de la ressource demandée dans les décisions d'autorisation (par exemple, la géolocalisation, le jour/l'heure, la cyber-santé du point d'extrémité du demandeur).
        Ex3 : Restreindre l'accès et les privilèges au minimum nécessaire (par exemple, architecture de confiance zéro).
        Ex4 : Examiner périodiquement les privilèges associés aux fonctions critiques de l'entreprise afin de confirmer la bonne séparation des tâches.

        Documents de référence :
        - politique de contrôle d'accès physique et logique
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.aa-06
      assessable: true
      depth: 3
      ref_id: PR.AA-06
      description: L'accès physique aux actifs doit être géré, surveillé et appliqué proportionnellement aux risques identifiés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-aa
      annotation: |-
        Ex1 : Utiliser des agents de sécurité, des caméras de sécurité, des entrées verrouillées, des systèmes d'alarme et d'autres contrôles physiques pour surveiller les installations et en restreindre l'accès.
        Ex2 : Utiliser des contrôles de sécurité physique supplémentaires pour les zones contenant des biens à haut risque
        Ex3 : Escorter les invités, les vendeurs et les autres tiers dans les zones contenant des biens critiques pour l'entreprise.

        Documents de référence :
        - politique de contrôle d'accès physique et logique
        - Politique de gestion des risques environnementaux et de la sécurité physique
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.at-01
      assessable: true
      depth: 3
      ref_id: PR.AT-01
      description: Les utilisateurs des ressources doivent être formés à reconnaître les cybermenaces, et à suivre les pratiques de cybersécurité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-at
      annotation: |-
        Ex1 : Sensibiliser et former à la cybersécurité les employés, les sous-traitants, les partenaires, les fournisseurs et tous les autres utilisateurs des ressources non publiques de l'organisation.
        Ex2 : Former les utilisateurs à reconnaître les tentatives d'ingénierie sociale et autres attaques courantes, à signaler les attaques et les activités suspectes, à se conformer aux politiques d'utilisation acceptable et à effectuer des tâches d'hygiène cyber de base (par exemple, patcher les logiciels, choisir les mots de passe, protéger les informations d'identification).
        Ex3 : Expliquer les conséquences des violations de la politique de cybersécurité, tant pour les utilisateurs individuels que pour l'organisation dans son ensemble
        Ex4 : Evaluer ou tester périodiquement les utilisateurs sur leur compréhension des pratiques de base en matière de cybersécurité
        Ex5 : Exiger un rappel annuel des bonnes pratiques afin de les renforcer et d'en introduire de nouvelles.

        Documents de référence :
        - politique de contrôle d'accès physique et logique
        - Politique de gestion des risques environnementaux et de la sécurité physique
        - Politique de gestion sécurisée des ressources humaines
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - Politique de sécurité dans les projets
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.at-02
      assessable: true
      depth: 3
      ref_id: PR.AT-02
      description: Les spécialistes doivent être formés pour prendre en compte les risques de cybersécurité dans leurs tâches.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-at
      annotation: |-
        Ex1 : Identifier les rôles spécialisés au sein de l'organisation qui nécessitent une formation supplémentaire en matière de cybersécurité, tels que le personnel chargé de la sécurité physique et de la cybersécurité, le personnel financier, les cadres supérieurs et toute personne ayant accès à des données critiques pour l'entreprise.
        Ex2 : Sensibiliser et former à la cybersécurité, en fonction des rôles, toutes les personnes occupant des fonctions spécialisées, y compris les sous-traitants, les partenaires, les fournisseurs et les autres tiers.
        Ex3 : Evaluer ou tester périodiquement les utilisateurs sur leur compréhension des pratiques de cybersécurité pour leurs rôles spécialisés
        Ex4 : Exiger un rappel annuel des bonnes pratiques afin de les renforcer et d'en introduire de nouvelles.

        Documents de référence :
        - Politique de gouvernance SSI
        - politique de gestion sécurisée des ressources humaines
        - Politique de sécurité dans les projets
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ds-01
      assessable: true
      depth: 3
      ref_id: PR.DS-01
      description: "La confidentialité, l'intégrité et la disponibilité des données au repos doivent être protégées. \nLes informations stockées, traitées ou accessibles via les \nterminaux finaux des utilisateurs doivent être protégées.\nLes informations stockées dans les systèmes d'information, les terminaux ou tout autre support de stockage doivent être \nsupprimées lorsqu'elles ne sont plus nécessaires."
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ds
      annotation: |-
        Ex1 : Utiliser le chiffrement, les signatures numériques et les hachages cryptographiques pour protéger la confidentialité et l'intégrité des données stockées dans les fichiers, les bases de données, les images de disques de machines virtuelles, les images de conteneurs et d'autres ressources.
        Ex2 : Utiliser le chiffrement intégral des disques pour protéger les données stockées sur les terminaux des utilisateurs
        Ex3 : Confirmer l'intégrité des logiciels en validant les signatures
        Ex4 : Restreindre l'utilisation des supports amovibles pour limiter l'exfiltration des données
        Ex5 : Sécuriser physiquement les supports amovibles contenant des informations sensibles non chiffrées, par exemple dans des bureaux ou des armoires fermés à clé.

        Documents de référence :
        - Politique de protection de l'information
        - Politique de la cryptographie et du chiffrement
        - Politique de gestion des actifs
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ds-02
      assessable: true
      depth: 3
      ref_id: PR.DS-02
      description: La confidentialité, l'intégrité et la disponibilité des données en transit doivent être protégées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ds
      annotation: "Ex1 : Utiliser le chiffrement, les signatures numériques et les hachages cryptographiques pour protéger la confidentialité et l'intégrité des communications réseau.\nEx2 : Chiffrer ou bloquer automatiquement les courriels sortants et autres communications contenant des données sensibles, en fonction de la classification des données\nEx3 : Bloquer l'accès des systèmes et réseaux de l'entreprise au courrier électronique personnel, au partage de fichiers, aux services de stockage de fichiers et à d'autres applications et services de communication personnels. \nEx4 : Empêcher la réutilisation de données sensibles provenant d'environnements de production (par exemple, les dossiers des clients) dans des environnements de développement, de test et d'autres environnements non productifs.\n\nDocuments de référence :\n- politique de protection de l'information\n- Politique de gestion de la cryptographie et du chiffrement"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ds-10
      assessable: true
      depth: 3
      ref_id: PR.DS-10
      description: La confidentialité, l'intégrité et la disponibilité des données en cours d'utilisation doivent être protégées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ds
      annotation: |-
        Ex1 : Effacer les données qui doivent rester confidentielles (par exemple, des processeurs et de la mémoire) dès qu'elles ne sont plus nécessaires.
        Ex2 : Protéger les données en cours d'utilisation contre l'accès par d'autres utilisateurs et processus de la même plate-forme.

        Documents de référence :
        - politique de protection de l'information
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ds-11
      assessable: true
      depth: 3
      ref_id: PR.DS-11
      description: Les sauvegardes des données doivent être créées, protégées, maintenues et testées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ds
      annotation: |-
        Ex1 : Sauvegarder en permanence les données critiques en temps quasi réel et sauvegarder fréquemment les autres données selon un calendrier convenu.
        Ex2 : Tester les sauvegardes et les restaurations pour tous les types de sources de données au moins une fois par an
        Ex3 : Stocker de manière sécurisé certaines sauvegardes hors ligne et hors site de manière qu'un incident ou un désastre ne les endommage pas.
        Ex4 : Appliquer la séparation géographique et les restrictions de géolocalisation pour le stockage des sauvegardes de données.

        Documents de référence :
        - Politique de gestion des sauvegardes
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ps-01
      assessable: true
      depth: 3
      ref_id: PR.PS-01
      description: "Les pratiques de gestion des configurations doivent être \nétablies et appliquées afin de délivrer le juste nécessaire.\nL'accès aux sites web externes doit être géré pour réduire l'exposition aux contenus malveillants"
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ps
      annotation: |-
        Ex1 : Établir, tester, déployer et maintenir des configurations par défaut renforcées qui appliquent les politiques de cybersécurité de l'organisation et ne fournissent que des capacités essentielles (c'est-à-dire le principe de la moindre fonctionnalité).
        Ex2 : Examiner tous les paramètres de configuration par défaut susceptibles d'avoir une incidence sur la cybersécurité lors de l'installation ou de la mise à jour de logiciels.
        Ex3 : Contrôler les logiciels mis en œuvre pour détecter les écarts par rapport aux configurations par défaut approuvées.

        Documents de référence :
        - Politique de gestion des configurations
        - Politique d'acquisition, développement et maintenance des systèmes d’information
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ps-02
      assessable: true
      depth: 3
      ref_id: PR.PS-02
      description: Les logiciels doivent être maintenus, remplacés et supprimés en fonction du risque.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ps
      annotation: "Ex1 : Effectuer les correctifs de routine et d'urgence dans les délais spécifiés définie par le plan de gestion des vulnérabilités.\nEx2 : Mettre à jour les images des conteneurs et déployer de nouvelles instances de conteneurs pour remplacer les instances existantes plutôt que de les mettre à jour.\nEx3 : Remplacer les versions de logiciels et de services en fin de vie par des versions supportées et maintenues.\nEx4 : Désinstaller et supprimer les logiciels et services non autorisés qui présentent des risques excessifs \nEx5 : Désinstaller et supprimer tous les composants inutiles (par exemple, les utilitaires du système d'exploitation) que les attaquants pourraient utiliser à mauvais escient.\nEx6 : Définir et mettre en œuvre des plans de maintenance et d'obsolescence des logiciels et des services en fin de vie.\n\nDocuments de référence :\n- Politique d'acquisition, développement et maintenance des systèmes d’information\n- politique de gestion des vulnérabilités"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ps-03
      assessable: true
      depth: 3
      ref_id: PR.PS-03
      description: Les matériels doivent être entretenus, remplacés et retirés en fonction du risque.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ps
      annotation: |-
        Ex1 : Remplacer le matériel lorsqu'il n'a pas les capacités de sécurité nécessaires ou lorsqu'il ne peut pas prendre en charge un logiciel ayant les capacités de sécurité nécessaires.
        Ex2 : Définir et mettre en œuvre des plans de maintenance et d'obsolescence du matériel en fin de vie.
        Ex3 : Procéder à l'élimination du matériel de manière sécurisée, responsable et vérifiable.

        Documents de référence :
        - Politique d'acquisition, développement et maintenance des systèmes d’information
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ps-04
      assessable: true
      depth: 3
      ref_id: PR.PS-04
      description: Les journaux d'activités doivent être générés et mis à disposition pour une surveillance continue.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ps
      annotation: |-
        Ex1 : Configurer tous les systèmes d'exploitation, applications et services (y compris les services en nuage) pour qu'ils génèrent des enregistrements de journaux.
        Ex2 : Configurer les générateurs de journaux pour qu'ils partagent de manière sécurisée leurs journaux avec les systèmes et services de l'infrastructure de journalisation de l'organisation.
        Ex3 : Configurer les générateurs de journaux pour qu'ils enregistrent les données nécessaires aux architectures de confiance zéro.

        Documents de référence :
        - Politique de supervision
        - politique de sécurité de l'exploitation
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ps-05
      assessable: true
      depth: 3
      ref_id: PR.PS-05
      description: L'installation et l'exécution de logiciels non autorisés doivent être bloquées, par exemple via une approche en liste blanche ou liste noire.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ps
      annotation: |-
        Ex1 : Lorsque le risque le justifie, restreindre l'exécution des logiciels aux seuls produits autorisés ou refuser l'exécution des logiciels non autorisés.
        Ex2 : Vérifier la source d'un nouveau logiciel et son intégrité avant de l'installer.
        Ex3 : Configurer les plateformes pour qu'elles utilisent uniquement des services DNS approuvés qui bloquent l'accès aux domaines malveillants connus.
        Ex4 : Configurer les plateformes pour permettre l'installation de logiciels approuvés par l'organisation uniquement

        Documents de référence :
        - Politique de sécurité de l'exploitation
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ps-06
      assessable: true
      depth: 3
      ref_id: PR.PS-06
      description: |-
        Les pratiques de développement sécurisé pour les logiciels doivent être appliquées et surveillées tout au long du cycle de vie des logiciels.
        Des principes de sécurité de développement logiciels doivent être appliqués.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ps
      annotation: |-
        Ex1 : Protéger tous les composants des logiciels développés par l'organisation contre la falsification et l'accès non autorisé.
        Ex2 : Sécuriser tous les logiciels produits par l'organisation, en réduisant au minimum les vulnérabilités dans leurs versions.
        Ex3 : Maintenir les logiciels utilisés dans les environnements de production et les éliminer en toute sécurité lorsqu'ils ne sont plus nécessaires.

        Documents de référence :
        - Politique d'acquisition, développement et maintenance des systèmes d’information
        - Politique de sécurité dans les projets
        - Politique de gestion des configurations
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ir-01
      assessable: true
      depth: 3
      ref_id: PR.IR-01
      description: Les réseaux et les environnements doivent être protégés contre les accès et les utilisations non autorisés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ir
      annotation: |-
        Ex1 : Segmenter logiquement les réseaux de l'organisation et les plateformes basées sur le cloud en fonction des limites de confiance et des types de plateformes (par exemple, IT, IoT, OT, mobile, invités), et n'autoriser les communications requises qu'entre les segments.
        Ex2 : Segmenter logiquement et/ou physiquement les réseaux de l'organisation par rapport aux réseaux externes, et n'autoriser que les communications nécessaires à pénétrer dans les réseaux de l'organisation depuis les réseaux externes.
        Ex3 : Mettre en œuvre des architectures de confiance zéro pour restreindre l'accès réseau à chaque ressource au minimum nécessaire.
        Ex4 : Vérifier l'état des terminaux avant de les autoriser à accéder aux ressources de production et à les utiliser.

        Documents de référence :
        - politique de contrôle d'accès physique et logique
        - politique de sécurité de l'exploitation
        - Politique d'acquisition, développement et maintenance des systèmes d’information
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ir-02
      assessable: true
      depth: 3
      ref_id: PR.IR-02
      description: Les actifs technologiques de l'organisation doivent être protégés contre les risques environnementaux.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ir
      annotation: |-
        Ex1 : Protéger les équipements de l'organisation contre les menaces environnementales connues, telles que les inondations, les incendies, le vent, la chaleur et l'humidité excessives.
        Ex2 : Inclure la protection contre les menaces environnementales et des dispositions relatives à une infrastructure d'exploitation adéquate dans les exigences imposées aux prestataires de services qui exploitent des systèmes pour le compte de l'organisation.

        Documents de référence :
        - Politique de gestion des actifs
        - Politique de gestion des risques environnementaux et de la sécurité physique
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ir-03
      assessable: true
      depth: 3
      ref_id: PR.IR-03
      description: Des mécanismes doivent être mis en œuvre pour satisfaire aux exigences de résilience en situations normales mais aussi dégradées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ir
      annotation: |-
        Ex1 : Eviter les points de défaillance uniques dans les systèmes et l'infrastructure
        Ex2 : Utiliser l'équilibrage des charges pour augmenter la capacité et améliorer la fiabilité
        Ex3 : Utiliser des composants à haute disponibilité, tels que des systèmes de stockage et d'alimentation redondants, pour améliorer la fiabilité du système.

        Documents de référence :
        - Politique de gestion de la continuité et de la résilience des activités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr.ir-04
      assessable: true
      depth: 3
      ref_id: PR.IR-04
      description: Les ressources adéquates sont maintenues pour assurer la disponibilité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:pr-ir
      annotation: |-
        Ex1 : Surveiller l'utilisation du stockage, de l'énergie, du calcul, de la bande passante du réseau et d'autres ressources
        Ex2 : Prévoir les besoins futurs et adapter les ressources en conséquence

        Documents de référence :
        - Politique de gestion de la continuité et de la résilience des activités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.cm-01
      assessable: true
      depth: 3
      ref_id: DE.CM-01
      description: Les réseaux et services réseau doivent être surveillés pour détecter les événements potentiellement indésirables.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-cm
      annotation: |-
        Ex1 : Surveiller le DNS, le BGP et d'autres services et protocoles de réseau pour détecter les événements indésirables.
        Ex2 : Surveiller les réseaux câblés et sans fil pour détecter les connexions provenant de points d'extrémité non autorisés
        Ex3 : Surveiller les installations pour détecter les réseaux sans fil non autorisés ou malveillants
        Ex4 : Comparer les flux réels du réseau avec les configurations par défaut pour détecter les écarts.
        Ex5 : Surveiller les communications réseau pour identifier les changements dans les mesures de sécurité à des fins de confiance zéro.

        Documents de référence :
        - Politique de supervision
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.cm-02
      assessable: true
      depth: 3
      ref_id: DE.CM-02
      description: L'environnement physique doit être surveillé pour détecter les événements potentiellement indésirables.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-cm
      annotation: |-
        Ex1 : Surveiller les journaux des systèmes de contrôle d'accès physique (par exemple, les lecteurs de badges) pour trouver des schémas d'accès inhabituels (par exemple, des écarts par rapport à la norme) et des tentatives d'accès infructueuses.
        Ex2 : Examiner et contrôler les registres d'accès physique (par exemple, l'enregistrement des visiteurs, les feuilles d'émargement, etc.)
        Ex3 : Contrôler les contrôles d'accès physiques (par exemple, serrures, verrous, gonds, alarmes) pour détecter les signes de falsification.
        Ex4 : Surveiller l'environnement physique à l'aide de systèmes d'alarme, de caméras et d'agents de sécurité.

        Documents de référence :
        - Politique de gestion des risques environnementaux et de la sécurité physique
        - politique de supervision
        - politique de contrôle d'accès physique et logique
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.cm-03
      assessable: true
      depth: 3
      ref_id: DE.CM-03
      description: Dans le respect de la réglementation applicable en vigueur (par ex. RGPD), l'activité du personnel et l'utilisation des outils technologiques doivent être surveillées afin de détecter les événements potentiellement indésirables.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-cm
      annotation: |-
        Ex1 : Utiliser un logiciel d'analyse du comportement pour détecter les activités anormales des utilisateurs afin d'atténuer les menaces internes.
        Ex2 : Surveiller les journaux des systèmes de contrôle d'accès logique pour trouver des modèles d'accès inhabituels et des tentatives d'accès infructueuses.
        Ex3 : Contrôler en permanence les technologies de déception, y compris les comptes d'utilisateurs, pour détecter toute utilisation.

        Documents de référence :
        - politique de supervision
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.cm-06
      assessable: true
      depth: 3
      ref_id: DE.CM-06
      description: Les activités et services des prestataires externes doivent être surveillés afin de détecter les événements potentiellement indésirables ou en écart avec le comportement attendu.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-cm
      annotation: "Ex1 : Contrôler les activités d'administration et de maintenance à distance et sur site que les prestataires externes effectuent sur les systèmes de l'organisation \nEx2 : Surveiller l'activité des services en nuage, des fournisseurs de services Internet et d'autres fournisseurs de services pour détecter les écarts par rapport au comportement attendu.\n\nDocuments de référence :\n- Politique de supervision\n- Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.cm-09
      assessable: true
      depth: 3
      ref_id: DE.CM-09
      description: Les matériels informatique, les logiciels, les environnements d’exécution et leurs données doivent être surveillés pour détecter les événements potentiellement indésirables.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-cm
      annotation: |-
        Ex1 : Surveiller le courrier électronique, le web, le partage de fichiers, les services de collaboration et d'autres vecteurs d'attaque courants afin de détecter les logiciels malveillants, le phishing, les fuites et exfiltrations de données et d'autres événements indésirables.
        Ex2 : Surveiller les tentatives d'authentification afin d'identifier les attaques contre les informations d'identification et la réutilisation non autorisée des informations d'identification
        Ex3 : Surveiller les configurations logicielles pour détecter les écarts par rapport aux configurations par défaut de la sécurité
        Ex4 : Surveiller le matériel et les logiciels pour détecter les signes d'altération
        Ex5 : Utiliser des technologies présentes sur les terminaux pour détecter les lacunes en cybersécurité (par exemple, correctifs manquants, infections par des logiciels malveillants, logiciels non autorisés) et rediriger les terminaux vers un environnement de remédiation avant que l'accès ne soit autorisé.

        Documents de référence :
        - Politique de supervision
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.ae-02
      assessable: true
      depth: 3
      ref_id: DE.AE-02
      description: Les événements potentiellement indésirables doivent être analysés pour mieux comprendre les risques associés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-ae
      annotation: |-
        Ex1 : Utiliser des outils de gestion des informations et des événements de sécurité (SIEM) ou d'autres outils pour surveiller en permanence les événements de journalisation afin de détecter les activités malveillantes et suspectes connues.
        Ex2 : Utiliser des informations actualisées sur les cybermenaces dans les outils d'analyse des journaux afin d'améliorer la précision de la détection et de caractériser les acteurs de la menace, leurs méthodes et les indicateurs de compromission
        Ex3 : Effectuer régulièrement des examens manuels des événements de connexion pour les technologies qui ne peuvent pas être suffisamment surveillées par l'automatisation.
        Ex4 : Utiliser les outils d'analyse des journaux pour produire des rapports sur leurs résultats.

        Documents de référence :
        - Politique de supervision
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.ae-03
      assessable: true
      depth: 3
      ref_id: DE.AE-03
      description: Les informations doivent être corrélées à partir de sources multiples.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-ae
      annotation: |-
        Ex1 : Transférer en permanence les données de journalisation générées par d'autres sources vers un nombre relativement restreint de serveurs de journalisation.
        Ex2 : Utiliser une technologie de corrélation d'événements (par exemple, SIEM) pour collecter des informations capturées par des sources multiples
        Ex3 : Utiliser les renseignements sur les cybermenaces pour aider à corréler les événements entre les sources de journalisation.

        Documents de référence :
        - Politique de supervision
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.ae-04
      assessable: true
      depth: 3
      ref_id: DE.AE-04
      description: L’impact et la portée des événements indésirables doivent être compris.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-ae
      annotation: |-
        Ex1 : Utiliser les SIEM ou d'autres outils pour estimer l'impact et la portée, et revoir et affiner les estimations.
        Ex2 : Une personne crée ses propres estimations de l'impact et de la portée.

        Documents de référence :
        - Politique de supervision
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.ae-06
      assessable: true
      depth: 3
      ref_id: DE.AE-06
      description: Les informations sur les événements indésirables doivent être partagées avec les acteurs habilités et saisies dans les outils autorisés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-ae
      annotation: "Ex1 : Utiliser un logiciel de cybersécurité pour générer des alertes et les transmettre au centre des opérations de sécurité (SOC), aux personnes chargées de répondre aux incidents et aux outils de réponse aux incidents. \nEx2 : Les personnes chargées de répondre aux incidents et les autres personnes autorisées peuvent accéder à tout moment aux résultats de l'analyse des journaux.\nEx3 : Créer et attribuer automatiquement des tickets dans le système de ticketing de l'organisation lorsque certains types d'alertes se produisent.\nEx4 : Créer et attribuer manuellement des tickets dans le système de billetterie de l'organisation lorsque le personnel technique découvre des indicateurs de compromission.\n\nDocuments de référence :\n- Politique de supervision\n- Politique de gestion des incidents ?"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.ae-07
      assessable: true
      depth: 3
      ref_id: DE.AE-07
      description: Les renseignements sur les cybermenaces et d'autres informations contextuelles doivent être intégrés à l'analyse.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-ae
      annotation: |-
        Ex1 : Fournir en toute sécurité des informations sur les cybermenaces aux technologies, aux processus et au personnel de détection
        Ex2 : Fournir en toute sécurité des informations provenant d'inventaires d'actifs aux technologies, processus et personnels de détection.
        Ex3 : Acquérir et analyser rapidement les informations sur les vulnérabilités des technologies de l'organisation communiquées par les fournisseurs, les vendeurs et les avis de sécurité de tiers.

        Documents de référence :
        - Politique de gestion des actifs
        - Politique de gestion des fournisseurs/tiers/chaine d'approvisionnement
        - politique de supervision
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de.ae-08
      assessable: true
      depth: 3
      ref_id: DE.AE-08
      description: Les événements indésirables qui atteignent des seuils prédéfinis doivent être déclarés comme incidents à traiter en fonction de leur criticité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:de-ae
      annotation: |-
        Ex1 : Appliquer les critères d'incident aux caractéristiques connues et supposées de l'activité afin de déterminer si un incident doit être déclaré.
        Ex2 : Prendre en compte les faux positifs connus lors de l'application des critères d'incident

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.ma-01
      assessable: true
      depth: 3
      ref_id: RS.MA-01
      description: "Le plan de réponse aux incidents doit être exécuté en coordination avec les tiers concernés une fois qu’un incident est déclaré. \nL'exécution de plans de cybersécurité supplémentaires doit être lancée si nécessaire pour soutenir la réponse à l'incident (continuité des activités et reprise après sinistre)."
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-ma
      annotation: "Ex1 : Les technologies de détection signalent automatiquement les incidents identifiés \nEx2 : Demander l'assistance à l'externalisation de la réponse aux incidents de l'organisation\nEx3 : Désigner un responsable pour chaque incident\nEx4 : Lancer l'exécution de plans de cybersécurité supplémentaires si nécessaire pour soutenir la réponse à l'incident (par exemple, continuité des activités et reprise après sinistre).\n\nDocuments de référence :\n- politique de gestion des incidents"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.ma-02
      assessable: true
      depth: 3
      ref_id: RS.MA-02
      description: Les rapports d'incidents doivent être triés et validés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-ma
      annotation: |-
        Ex1 : Examiner préliminairement les rapports d'incidents pour confirmer qu'ils sont liés à la cybersécurité et qu'ils nécessitent des activités de réponse aux incidents.
        Ex2 : Appliquer des critères pour estimer la gravité d'un incident

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.ma-03
      assessable: true
      depth: 3
      ref_id: RS.MA-03
      description: Les incidents doivent être catégorisés et priorisés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-ma
      annotation: |-
        Ex1 : Examiner plus en détail et classer les incidents en fonction de leur type (par exemple, violation de données, ransomware, DDoS, compromission de compte).
        Ex2 : Classer les incidents par ordre de priorité en fonction de leur portée, de leur impact probable et de leur caractère urgent.
        Ex3 : Choisir des stratégies de réponse aux incidents actifs en équilibrant le besoin de récupérer rapidement d'un incident avec le besoin d'observer l'attaquant ou de mener une enquête plus approfondie.

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.ma-04
      assessable: true
      depth: 3
      ref_id: RS.MA-04
      description: Les incidents doivent être escaladés en fonction de leur criticité.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-ma
      annotation: |-
        Ex1 : Suivre et valider le statut de tous les incidents en cours
        Ex2 : Coordonner l'escalade ou l'élévation des incidents avec les parties prenantes internes et externes désignées.

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.ma-05
      assessable: true
      depth: 3
      ref_id: RS.MA-05
      description: Les critères de reprise sur incidents doivent être appliqués.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-ma
      annotation: |-
        Ex1 : Appliquer les critères de rétablissement de l'incident aux caractéristiques connues et supposées de l'incident afin de déterminer si les processus de rétablissement de l'incident doivent être lancés.
        Ex2 : Prendre en compte l'éventuelle perturbation opérationnelle des activités de récupération en cas d'incident

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.an-03
      assessable: true
      depth: 3
      ref_id: RS.AN-03
      description: Une analyse doit être effectuée pour établir ce qui s'est passé lors d'un incident et en déterminer la cause initiale.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-an
      annotation: "Ex1 : Déterminer la séquence des événements qui se sont produits au cours de l'incident et quels actifs et ressources ont été impliqués dans chaque événement.\nEx2 : Tenter de déterminer les vulnérabilités, les menaces et les acteurs de la menace qui ont été directement ou indirectement impliqués dans l'incident.\nEx3 : Analyser l'incident pour trouver les causes profondes et systémiques. \nEx4 : Vérifier les méthodes et technologies utilisées pour obtenir des informations supplémentaires sur le comportement de l'attaquant.\n\nDocuments de référence :\n- politique de gestion des incidents"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.an-06
      assessable: true
      depth: 3
      ref_id: RS.AN-06
      description: Les actions effectuées lors d'une investigation doivent être enregistrées et conservées tout en s'assurant de leur intégrités.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-an
      annotation: |-
        Ex1 : Exiger de chaque intervenant et des autres personnes (par exemple, les administrateurs de système, les ingénieurs en cybersécurité) qui effectuent des tâches d'intervention en cas d'incident qu'ils enregistrent leurs actions et rendent l'enregistrement immuable.
        Ex2 : Exiger du responsable de l'incident qu'il documente l'incident en détail et qu'il soit responsable de la préservation de l'intégrité de la documentation et des sources de toutes les informations rapportées.

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.an-07
      assessable: true
      depth: 3
      ref_id: RS.AN-07
      description: L’intégrité, la provenance, les données et métadonnées relatives aux incidents de sécurité doivent être collectées et conservées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-an
      annotation: |-
        Ex1: Collecter, préserver et sauvegarder l'intégrité de toutes les données et métadonnées pertinentes relatives à l'incident (par exemple, la source des données, la date et l'heure de la collecte) sur la base des procédures de préservation des preuves et de la chaîne de conservation des preuves.

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.an-08
      assessable: true
      depth: 3
      ref_id: RS.AN-08
      description: L'ampleur d'un incident doit être estimée et validée.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-an
      annotation: |-
        Ex1 : Examiner d'autres cibles potentielles de l'incident pour rechercher des indicateurs de compromission et des preuves de persistance.
        Ex2 : Exécuter des outils sur les cibles pour rechercher des indicateurs de compromission et des preuves de persistance.

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.co-02
      assessable: true
      depth: 3
      ref_id: RS.CO-02
      description: Les parties prenantes internes et externes doivent être informées des incidents.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-co
      annotation: "Ex1 : Suivre les procédures de notification de violation de l'organisation après avoir découvert une violation de données, y compris notifier les clients concernés. \nEx2 : Notifier les incidents aux partenaires commerciaux et aux clients conformément aux exigences contractuelles.\nEx3 : Notifier les incidents aux organismes chargés de l'application de la loi et aux organismes de réglementation en fonction des critères du plan d'intervention en cas d'incident et de l'approbation de la direction.\n\nDocuments de référence :\n- politique de gestion des incidents"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.co-03
      assessable: true
      depth: 3
      ref_id: RS.CO-03
      description: Les informations doivent être partagées avec les parties prenantes internes et externes impliquées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-co
      annotation: "Ex1 : Partager de manière sécurisé les informations conformément aux plans d'intervention et aux accords de partage d'informations\nEx2 : Partager volontairement avec un centre de partage et d'analyse de l'information (ISAC) des informations sur les méthodes de travail observées d'un attaquant, en supprimant toutes les données sensibles.\nEx3 : Notifier les RH en cas d'activité malveillante d'un initié\nEx4 : Informer régulièrement les dirigeants de l'état d'avancement des incidents majeurs.\nEx5 : Suivre les règles et les protocoles définis dans les contrats pour le partage d'informations sur les incidents entre l'organisation et ses fournisseurs \nEx6 : Coordonner les méthodes de communication de crise entre l'organisation et ses fournisseurs essentiels.\n\nDocuments de référence :\n- politique de gestion des incidents"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.mi-01
      assessable: true
      depth: 3
      ref_id: RS.MI-01
      description: Les incidents doivent être endigués par un plan d'actions.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-mi
      annotation: |-
        Ex1 : Les technologies de cybersécurité (par exemple, les logiciels antivirus) et les caractéristiques de cybersécurité d'autres technologies (par exemple, les systèmes d'exploitation, les dispositifs d'infrastructure de réseau) effectuent automatiquement des actions de confinement.
        Ex2 : Permettre aux personnes chargées de répondre aux incidents de sélectionner et d'exécuter manuellement des actions de confinement.
        Ex3 : Permettre à un tiers (par exemple, un fournisseur d'accès à Internet, un fournisseur de services de sécurité gérés) d'effectuer des actions de confinement pour le compte de l'organisation.
        Ex4 : Transférer automatiquement les points d'extrémité compromis vers un réseau local virtuel (VLAN) de remédiation.

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs.mi-02
      assessable: true
      depth: 3
      ref_id: RS.MI-02
      description: Les incidents doivent être remédiés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rs-mi
      annotation: "Ex1 : Les technologies de cybersécurité et les caractéristiques de cybersécurité d'autres technologies (par exemple, les systèmes d'exploitation, les dispositifs d'infrastructure de réseau) effectuent automatiquement des actions d'éradication.\nEx2 : Permettre aux personnes chargées de répondre aux incidents de sélectionner et d'exécuter manuellement des actions d'éradication \nEx3 : Autoriser un tiers (par exemple, un fournisseur de services de sécurité gérés) à effectuer des actions d'éradication ou de remédiation pour le compte de l'organisation.\n\nDocuments de référence :\n- politique de gestion des incidents"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.rp-01
      assessable: true
      depth: 3
      ref_id: RC.RP-01
      description: La partie reconstruction du plan de réponse aux incidents doit être lancée une fois le processus de réponse aux incidents démarré.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-rp
      annotation: |-
        Ex1 : Appliquer les procédures de restauration pendant ou après les processus de réponse à l'incident
        Ex2 : Informer toutes les personnes exerçant des responsabilités en matière de restauration, des plans de rétablissement et des autorisations requises pour mettre en œuvre chaque aspect des plans.

        Documents de référence :
        - politique de gestion des incidents
        - Politique de gestion de la continuité et de la résilience des activités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.rp-02
      assessable: true
      depth: 3
      ref_id: RC.RP-02
      description: Les actions de reconstruction doivent être sélectionnées, délimitées, priorisées et exécutées en fonction des critères définis dans le plan de réponse à l'incident.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-rp
      annotation: |-
        Ex1 : Sélectionner les actions de rétablissement en fonction des critères définis dans le plan de réponse à incident et des ressources disponibles
        Ex2 : Modifier les actions de rétablissement planifiées sur la base d'une réévaluation des besoins et des ressources de l'organisation.

        Documents de référence :
        - politique de gestion des incidents
        - Politique de gestion de la continuité et de la résilience des activités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.rp-03
      assessable: true
      depth: 3
      ref_id: RC.RP-03
      description: L'intégrité des sauvegardes et autres actifs de restauration doit être vérifiée avant d'être utilisé.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-rp
      annotation: |-
        Ex1 : Vérifier que les ressources de restauration ne présentent pas d'indicateurs de compromission, de corruption de fichiers ou d'autres problèmes d'intégrité avant de les utiliser.

        Documents de référence :
        - Politique de gestion de la continuité et de la résilience des activités
        - Politique de gestion des incidents
        - Politique de gestion des sauvegardes
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.rp-04
      assessable: true
      depth: 3
      ref_id: RC.RP-04
      description: Les fonctions critiques permettant de délivrer les missions de l'entreprise et de ses filiales ainsi que la gestion des risques de cybersécurité doivent être considérées pour établir des processus opérationnels après un incident.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-rp
      annotation: |-
        Ex1 : Utiliser les dossiers relatifs à l'impact sur les activités et à la catégorisation des systèmes (y compris les objectifs de prestation de services) pour valider que les services essentiels sont rétablis dans l'ordre approprié.
        Ex2 : Travailler avec les porteurs d'offres SI / IT pour confirmer le succès de la restauration des systèmes et le retour aux opérations normales.
        Ex3 : Contrôler les performances des systèmes restaurés afin de vérifier l'adéquation de la restauration.

        Documents de référence :
        - politique de gestion des incidents
        - Politique de gestion de la continuité et de la résilience des activités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.rp-05
      assessable: true
      depth: 3
      ref_id: RC.RP-05
      description: L’intégrité des actifs restaurés doit être vérifiée, le fonctionnement normal des systèmes et services doit également être confirmé.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-rp
      annotation: |-
        Ex1 : Vérifier que les biens restaurés ne présentent pas d'indicateurs de compromission et que les causes profondes de l'incident ont été corrigées avant leur mise en production.
        Ex2 : Vérifier l'exactitude et l'adéquation des mesures de restauration prises avant de mettre en ligne un système restauré.

        Documents de référence :
        - politique de gestion des incidents
        - Politique de gestion de la continuité et de la résilience des activités
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.rp-06
      assessable: true
      depth: 3
      ref_id: RC.RP-06
      description: Une fois la reprise de l'incident terminée elle doit être déclarée sur la base de critères et l'incident doit être documenté.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-rp
      annotation: |-
        Ex1 : Préparer un rapport, à l'issue, qui documente l'incident lui-même, les mesures d'intervention et de rétablissement prises et les enseignements tirés.
        Ex2 : Déclarer la fin de la restauration consécutive à l'incident, une fois que les critères sont remplis.

        Documents de référence :
        - politique de gestion des incidents
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.co-03
      assessable: true
      depth: 3
      ref_id: RC.CO-03
      description: Les activités de récupération et les progrès réalisés dans la restauration des capacités opérationnelles doivent être communiqués aux parties prenantes internes et externes désignées.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-co
      annotation: "Ex1 : Partager de manière sécurisé, les informations relatives au rétablissement, y compris l'avancement de la restauration, conformément aux plans d'intervention et aux accords de partage d'informations.\nEx2 : Informer régulièrement les dirigeants de l'état du rétablissement et de l'avancement de la remise en état en cas d'incident majeur\nEx3 : Suivre les règles et les protocoles définis dans les contrats pour le partage d'informations sur les incidents entre l'organisation et ses fournisseurs. \nEx4 : Coordonner la communication de crise entre l'organisation et ses fournisseurs critiques\n\nDocuments de référence :\n- Politique de gestion de la continuité et de la résilience des activités\n- Politique de gestion des incidents\n- Politique de gestion des sauvegardes"
    - urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc.co-04
      assessable: true
      depth: 3
      ref_id: RC.CO-04
      description: Les informations d'avancement concernant la reconstruction après un incident doivent être partagées à l’aide de méthodes et de messages validés.
      parent_urn: urn:intuitem:risk:req_node:nist-csf-2.0-sncf:rc-co
      annotation: |-
        Ex1 : Suivre les procédures de notification de violation de l'organisation pour se remettre d'une violation de données.
        Ex2 : Expliquer les mesures prises pour remédier à l'incident et éviter qu'il ne se reproduise

        Documents de référence :
        - politique de gestion des incidents
        - Politique de gestion de la continuité et de la résilience des activités
