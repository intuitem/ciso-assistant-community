    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.1
      assessable: false
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4
      ref_id: VI.4.1
      name: "Exigences g\xE9n\xE9rales"
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.1.a
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.1
      ref_id: VI.4.1.a
      description: "Les auditeurs doivent, en ad\xE9quation avec les objectifs, crit\xE8\
        res, p\xE9rim\xE8tre et activit\xE9s d\u2019audit, \xE9valuer le niveau de\
        \ conformit\xE9 et/ou de s\xE9curit\xE9 du syst\xE8me d\u2019information audit\xE9\
        ."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.1.b
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.1
      ref_id: VI.4.1.b
      description: "Les auditeurs doivent, en adoptant une approche par les risques,\
        \ identifier les composants du syst\xE8me d\u2019information et les documents\
        \ pertinents \xE0 auditer ainsi que les personnes pertinentes \xE0 rencontrer."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.1.c
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.1
      ref_id: VI.4.1.c
      description: "Les auditeurs doivent rendre compte au responsable d\u2019\xE9\
        quipe des constats d\u2019audit durant toute la prestation."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.2
      assessable: false
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4
      ref_id: VI.4.2
      name: "Audit d\u2019architecture"
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.2.a
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.2
      ref_id: VI.4.2.a
      description: "[ARCHI] Le prestataire doit \xEAtre capable, en ad\xE9quation\
        \ avec les objectifs, crit\xE8res et p\xE9rim\xE8tre de l\u2019audit, d\u2019\
        \xE9valuer la conformit\xE9 et/ou la s\xE9curit\xE9 de l\u2019architecture\
        \ du syst\xE8me d\u2019information audit\xE9 en analysant, lorsqu\u2019ils\
        \ existent, les documents suivants :\ni. les documents d\u2019architecture\
        \ technique (DAT) ;\nii. les sch\xE9mas d\u2019architecture de niveau 2 et\
        \ 3 du mod\xE8le OSI ;\niii. les matrices de flux ;\niv. les inventaires des\
        \ interconnexions avec des r\xE9seaux tiers ou Internet"
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.2.b
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.2
      ref_id: VI.4.2.b
      description: "[ARCHI] Le prestataire doit \xEAtre capable, en ad\xE9quation\
        \ avec les objectifs, crit\xE8res et p\xE9rim\xE8tre de l\u2019audit, d\u2019\
        \xE9valuer la configuration des composants du syst\xE8me d\u2019information\
        \ audit\xE9 afin d\u2019\xE9valuer la conformit\xE9 et/ou la s\xE9curit\xE9\
        \ de l\u2019architecture du syst\xE8me d\u2019information audit\xE9."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.3
      assessable: false
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4
      ref_id: VI.4.3
      name: Audit de configuration
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.3.a
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.3
      ref_id: VI.4.3.a
      description: "[CONF] Le prestataire doit \xEAtre capable, en ad\xE9quation avec\
        \ les objectifs, crit\xE8res et p\xE9rim\xE8tre de l\u2019audit, d\u2019\xE9\
        valuer la conformit\xE9 et/ou la s\xE9curit\xE9 des configurations des \xE9\
        l\xE9ments suivants :\ni. annuaires d\u2019utilisateurs ;\nii. composants\
        \ de s\xE9curit\xE9 physique (UTL, lecteurs de badges, cam\xE9ras, etc.) ;\n\
        iii. composants r\xE9seaux (routeurs, commutateurs, etc.) ;\niv. composants\
        \ de s\xE9curit\xE9 r\xE9seaux (pare-feu, chiffreurs, antivirus, etc.) ;\n\
        v. composants de s\xE9curit\xE9 locaux (antivirus, Endpoint Detection and\
        \ Response (EDR),\netc.) ;\nvi. syst\xE8mes d\u2019exploitation (serveurs,\
        \ postes de travail, \xE9quipements sp\xE9cifiques) ;\nvii. applications (m\xE9\
        tier, base de donn\xE9es, serveurs Web, etc.) ;\nviii. environnements d\u2019\
        informatique en nuage, de conteneurisation et de virtualisation."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.4
      assessable: false
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4
      ref_id: VI.4.4
      name: Audit de code source
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.4.a
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.4
      ref_id: VI.4.4.a
      description: "[CODE] Le prestataire doit \xEAtre capable, en ad\xE9quation avec\
        \ les objectifs, crit\xE8res et p\xE9rim\xE8tre de l\u2019audit, d\u2019\xE9\
        valuer la conformit\xE9 et/ou la s\xE9curit\xE9 du code source du logiciel\
        \ audit\xE9 en analysant, lorsqu\u2019ils existent, les documents relatifs\
        \ :\ni. aux sp\xE9cifications du logiciel ;\nii. \xE0 l\u2019architecture\
        \ du logiciel ;\niii. \xE0 l\u2019impl\xE9mentation du logiciel ;\niv. \xE0\
        \ l\u2019administration du logiciel ;\nv. \xE0 l\u2019utilisation du logiciel\
        \ ;\nvi. aux m\xE9thodes et r\xE9sultats de tests du logiciel."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.4.b
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.4
      ref_id: VI.4.4.b
      description: "[CODE] Le prestataire doit \xEAtre capable, en ad\xE9quation avec\
        \ les objectifs, crit\xE8res et p\xE9rim\xE8tre de l\u2019audit, d\u2019\xE9\
        valuer la conformit\xE9 et/ou la s\xE9curit\xE9 des parties de code source\
        \ du logiciel audit\xE9 relatives :\ni. aux m\xE9canismes d\u2019authentification\
        \ ;\nii. aux m\xE9canismes cryptographiques ;\niii. \xE0 la gestion des utilisateurs\
        \ ;\niv. aux contr\xF4les d\u2019acc\xE8s aux ressources ;\nv. aux interactions\
        \ avec d\u2019autres applications ;\nvi. \xE0 la validation des donn\xE9es."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5
      assessable: false
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4
      ref_id: VI.4.5
      name: "Test d\u2019intrusion"
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5.a
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5
      ref_id: VI.4.5.a
      description: "[INTRUSION] Le prestataire doit \xEAtre capable de r\xE9aliser\
        \ un test d\u2019intrusion selon les trois modes : bo\xEEte noire, bo\xEE\
        te grise, bo\xEEte blanche."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5.b
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5
      ref_id: VI.4.5.b
      description: "[INTRUSION] Le prestataire doit \xEAtre capable de simuler des\
        \ profils d\u2019attaquants disposant de potentiels d\u2019attaque associ\xE9\
        s \xE0 une menace strat\xE9gique."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5.c
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5
      ref_id: VI.4.5.c
      description: "[INTRUSION] Le prestataire doit \xEAtre capable de simuler des\
        \ profils d\u2019attaquants disposant de potentiels d\u2019attaque associ\xE9\
        s \xE0 une menace syst\xE9mique, hacktiviste ou isol\xE9e."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5.d
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5
      ref_id: VI.4.5.d
      description: "[INTRUSION] Le prestataire ne doit exploiter les vuln\xE9rabilit\xE9\
        s susceptibles de rendre le syst\xE8me d\u2019information audit\xE9 instable\
        \ voire provoquer un d\xE9ni de service qu\u2019avec l\u2019accord \xE9crit\
        \ du commanditaire"
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5.e
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.5
      ref_id: VI.4.5.e
      description: "[INTRUSION] Le prestataire doit, si le test d\u2019intrusion n\u2019\
        est pas, \xE0 la demande du\ncommanditaire, r\xE9alis\xE9 sur l\u2019environnement\
        \ de production mais sur un autre\nenvironnement (test, pr\xE9production,\
        \ etc.), v\xE9rifier que cet environnement est comparable \xE0 l\u2019environnement\
        \ de production, et v\xE9rifier que les r\xE9sultats du test d\u2019intrusion\
        \ sont applicables \xE0 l\u2019environnement de production."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.6
      assessable: false
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4
      ref_id: VI.4.6
      name: Audit organisationnel et physique
