      name: "\xC9tape 7 \u2013 Cl\xF4ture de la prestation"
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.7.a
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.7
      ref_id: VI.7.a
      description: "Il est recommand\xE9 que, suite \xE0 la remise du rapport d\u2019\
        audit, le responsable d\u2019\xE9quipe organise une r\xE9union de cl\xF4ture\
        \ \xE0 laquelle participent a minima le responsable d\u2019\xE9quipe, les\
        \ auditeurs, les experts le cas \xE9ch\xE9ant, le correspondant de la prestation\
        \ au sein du commanditaire, la direction du commanditaire ainsi que les responsables\
        \ s\xE9curit\xE9 et m\xE9tier du syst\xE8me d\u2019information audit\xE9.\
        \ Cette r\xE9union permet de pr\xE9senter la synth\xE8se du\nrapport d\u2019\
        audit et de r\xE9pondre aux \xE9ventuelles questions du commanditaire."
      implementation_groups:
      - S
      - E
