      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1.c
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1
      ref_id: IV.1.c
      description: "Le prestataire doit, en sa qualit\xE9 de professionnel, avoir\
        \ un devoir de conseil vis-\xE0-vis du commanditaire."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1.d
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1
      ref_id: IV.1.d
      description: "Le prestataire doit s\u2019assurer du consentement du commanditaire\
        \ avant toute communication \xE0 des tiers d'informations et supports relatifs\
        \ \xE0 la prestation."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1.e
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1
      ref_id: IV.1.e
      description: "Le prestataire doit apporter la preuve que son organisation, les\
        \ moyens qu\u2019il met en \u0153uvre pour r\xE9aliser la prestation et les\
        \ modalit\xE9s de son fonctionnement, notamment financi\xE8res, ne sont pas\
        \ susceptibles de compromettre son impartialit\xE9 \xE0 l\u2019\xE9gard du\
        \ commanditaire."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1.f
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1
      ref_id: IV.1.f
      description: "Le prestataire doit r\xE9aliser la prestation de mani\xE8re impartiale,\
        \ en toute bonne foi et dans le respect du commanditaire, de ses personnels\
        \ et de ses infrastructures."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1.g
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1
      ref_id: IV.1.g
      description: "Le prestataire doit enregistrer et traiter les plaintes relatives\
        \ aux prestations qualifi\xE9es d\xE9pos\xE9es par les commanditaires, les\
        \ b\xE9n\xE9ficiaires et, de mani\xE8re g\xE9n\xE9rale, l\u2019ensemble des\
        \ tiers."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1.h
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1
      ref_id: IV.1.h
      description: "Le prestataire doit informer sans d\xE9lai l\u2019ANSSI de tout\
        \ d\xE9p\xF4t d\u2019une plainte relative \xE0 une prestation qualifi\xE9\
        e et du traitement de celle-ci."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      assessable: false
      depth: 2
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv
      ref_id: IV.2
      name: Gestion des personnels
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.a
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.a
      description: "Le prestataire doit, avant toute incorporation d\u2019un auditeur\
        \ ou d\u2019un responsable d\u2019\xE9quipe dans ses \xE9quipes, proc\xE9\
        der \xE0 la v\xE9rification des formations, connaissances, comp\xE9tences\
        \ et r\xE9f\xE9rences professionnelles, et de la v\xE9racit\xE9 de leur curriculum\
        \ vitae."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.b
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.b
      description: "Le prestataire doit s\u2019assurer, avant le d\xE9but de chaque\
        \ prestation, que les membres de l'\xE9quipe, disposent des connaissances\
        \ et comp\xE9tences associ\xE9es \xE0 leurs activit\xE9s conform\xE9ment \xE0\
        \ l\u2019Annexe 2."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.c
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.c
      description: "Le prestataire ne doit recourir qu\u2019\xE0 des auditeurs et\
        \ responsables d\u2019\xE9quipe disposant d\u2019une attestation individuelle\
        \ de comp\xE9tence pour r\xE9aliser la prestation. Le prestataire peut, avec\
        \ l\u2019accord du commanditaire, incorporer dans l\u2019\xE9quipe d\u2019\
        audit des personnes ne disposant pas d\u2019attestation individuelle de comp\xE9\
        tence au titre de leur formation ou de leur mont\xE9e en comp\xE9tence. Ces\
        \ personnes sont pr\xE9sentes en tant qu\u2019observateurs et ne participent\
        \ pas \xE0 la r\xE9alisation de la prestation."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.d
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.d
      description: "Le prestataire doit assurer la formation continue des auditeurs\
        \ et responsables d\u2019\xE9quipe afin de maintenir \xE0 jour leurs connaissances\
        \ et comp\xE9tences en mati\xE8re de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information, et en particulier celles  requises pour la r\xE9alisation de\
        \ leurs missions."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.e
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.e
      description: "Le prestataire doit permettre aux auditeurs et responsables d\u2019\
        \xE9quipe d\u2019assurer une veille afin de maintenir \xE0 jour leurs connaissances\
        \ et comp\xE9tences en mati\xE8re de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information, et en particulier celles requises pour la r\xE9alisation de leurs\
        \ missions."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.f
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.f
      description: "Le prestataire est responsable des m\xE9thodes et outils utilis\xE9\
        s par l\u2019\xE9quipe d\u2019audit ainsi que de leur bonne utilisation durant\
        \ la prestation"
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.g
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.g
      description: "Le prestataire doit sensibiliser les auditeurs et responsables\
        \ d\u2019\xE9quipe \xE0 la r\xE9glementation en vigueur au sein de l\u2019\
        Union europ\xE9enne en mati\xE8re de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information, et en particulier celle applicable \xE0 leurs missions."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2.h
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.2
      ref_id: IV.2.h
      description: "Le prestataire doit s\u2019assurer qu\u2019aucun membre de l\u2019\
        \xE9quipe d\u2019audit ne fait l\u2019objet d\u2019une inscription au casier\
        \ judiciaire incompatible avec l\u2019exercice de ses missions."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      assessable: false
      depth: 2
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv
      ref_id: IV.3
      name: "Protection de l\u2019information"
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.a
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.a
      description: "Le prestataire doit \xE9laborer et tenir \xE0 jour une appr\xE9\
        ciation des risques relatifs \xE0 son activit\xE9 d\u2019audit."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.b
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.b
      description: "Il est recommand\xE9 que le prestataire mette en \u0153uvre la\
        \ m\xE9thode pour r\xE9aliser l\u2019appr\xE9ciation et le traitement des\
        \ risques relatifs \xE0 son activit\xE9 d\u2019audit."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.c
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.c
      description: "Le prestataire doit prot\xE9ger en int\xE9grit\xE9 et en confidentialit\xE9\
        \ les informations et supports relatifs \xE0 la prestation selon leur marquage\
        \ et leur niveau de sensibilit\xE9."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.d
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.d
      description: "Le prestataire doit appliquer le principe du moindre privil\xE8\
        ge et limiter l\u2019acc\xE8s aux informations et supports relatifs \xE0 la\
        \ prestation aux strictes personnes ayant le droit et le besoin d\u2019en\
        \ conna\xEEtre."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.e
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.e
      description: "Le prestataire peut \xEAtre amen\xE9 \xE0 connecter un m\xEAme\
        \ \xE9quipement (cl\xE9 USB, ordinateur,\netc.) \xE0 son syst\xE8me d'information\
        \ homologu\xE9 et au syst\xE8me d'information audit\xE9. Le\nprestataire doit\
        \ mettre en \u0153uvre des mesures de s\xE9curit\xE9 adapt\xE9es pour ces\
        \ \xE9quipements afin de r\xE9pondre aux besoins op\xE9rationnels de la prestation\
        \ et aux besoins de s\xE9curit\xE9 de son syst\xE8me d'information homologu\xE9\
        ."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.e-bis
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.e bis
      description: "Il n\u2019est pas exig\xE9 du prestataire qu\u2019il homologue\
        \ ces \xE9quipements Diffusion Restreinte si le syst\xE8me d\u2019information\
        \ audit\xE9 n\u2019est pas homologu\xE9 Diffusion Restreinte."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.f
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.f
      description: "Le prestataire doit homologuer son syst\xE8me d\u2019information."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.g
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.g
      description: "Le prestataire doit homologuer son syst\xE8me d\u2019information\
        \ pour la protection d'informations et supports portant la mention Diffusion\
        \ Restreinte."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.h
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.h
      description: "Il est recommand\xE9 que le prestataire mette en \u0153uvre la\
        \ d\xE9marche d\xE9crite dans le guide pour homologuer son syst\xE8me d\u2019\
        information."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.i
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.i
      description: "Le prestataire doit \xEAtre capable d\u2019utiliser son syst\xE8\
        me d\u2019information pour r\xE9aliser la totalit\xE9 d\u2019une prestation."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.j
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.j
      description: "Le prestataire doit mettre en \u0153uvre l\u2019ensemble des r\xE8\
        gles du guide d\u2019hygi\xE8ne informatique pour le niveau renforc\xE9 sur\
        \ son syst\xE8me d\u2019information homologu\xE9 Diffusion Restreinte"
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.k
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.k
      description: "Le prestataire doit mettre en \u0153uvre l\u2019ensemble des r\xE8\
        gles relatives \xE0 la protection des syst\xE8mes d'information traitant des\
        \ informations et supports portant la mention Diffusion Restreinte d\xE9finies\
        \ dans sur son syst\xE8me d\u2019information homologu\xE9 Diffusion Restreinte."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.l
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.l
      description: "Il est recommand\xE9 que le prestataire mette en \u0153uvre les\
        \ recommandations du guide sur son syst\xE8me d\u2019information homologu\xE9\
        \ Diffusion Restreinte."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.m
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.m
      description: "Le prestataire doit mettre en \u0153uvre l\u2019ensemble des r\xE8\
        gles du guide d\u2019hygi\xE8ne informatique pour le niveau standard sur son\
        \ syst\xE8me d\u2019information."
      implementation_groups:
      - S
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.n
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.n
      description: "Le prestataire doit r\xE9aliser une revue p\xE9riodique des droits\
        \ d\u2019acc\xE8s sur son syst\xE8me d\u2019information."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.o
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.o
      description: "Le prestataire doit r\xE9aliser une revue des droits d\u2019acc\xE8\
        s sur son syst\xE8me d\u2019information tous les six mois."
      implementation_groups:
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3.p
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.3
      ref_id: IV.3.p
      description: "Le prestataire doit disposer d\u2019un syst\xE8me d\u2019information\
        \ hors ligne afin de conserver l\u2019ensemble des informations et supports\
        \ relatifs \xE0 la prestation pour lesquels il a re\xE7u une autorisation\
        \ de conservation du commanditaire."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v
      assessable: false
      depth: 1
      ref_id: V
      name: Exigences applicables aux personnels du prestataire
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v.1
      assessable: false
      depth: 2
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v
      ref_id: V.1
      name: "Connaissances et comp\xE9tences g\xE9n\xE9rales"
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v.1.a
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v.1
      ref_id: V.1.a
      description: "Les auditeurs et responsables d\u2019\xE9quipe doivent ma\xEE\
