      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.5
      ref_id: VI.5.a
      description: "Le responsable d\u2019\xE9quipe doit organiser une restitution\
        \ dite \xAB \xE0 chaud \xBB \xE0 la fin de chaque journ\xE9e afin de pr\xE9\
        senter au correspondant de la prestation au sein du commanditaire :\ni. un\
        \ \xE9tat d\u2019avancement de la prestation ;\nii. une synth\xE8se des r\xE9\
        sultats des activit\xE9s d\u2019audit de la journ\xE9e ;\niii. les \xE9ventuelles\
        \ non-conformit\xE9s et/ou vuln\xE9rabilit\xE9s identifi\xE9es au cours de\
        \ la\njourn\xE9e dont l\u2019exploitation pourrait engendrer des risques critiques,\
        \ les sc\xE9narios\nde menaces associ\xE9es ainsi que les mesures de s\xE9\
        curit\xE9 recommand\xE9es pour traiter\nces risques ;\niv. les \xE9ventuelles\
        \ difficult\xE9s rencontr\xE9es durant la journ\xE9e : collaboration difficile\
        \ ou\nindisponibilit\xE9 du personnel du commanditaire ou du b\xE9n\xE9ficiaire,\
        \ difficult\xE9 d\u2019acc\xE8s\naux locaux, au syst\xE8me d\u2019information\
        \ ou \xE0 la documentation, etc."
      implementation_groups:
      - E
