        \ dans la norme  ISO 1901."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v.1.b
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v.1
      ref_id: V.1.b
      description: "Les auditeurs doivent poss\xE9der les qualit\xE9s personnelles\
