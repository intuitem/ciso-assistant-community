    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1.b
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:iv.1
      ref_id: IV.1.b
      description: "Le prestataire doit \xEAtre soumis au droit d\u2019un \xC9tat\
