      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.7
      ref_id: VI.7.d
      description: "Il est recommand\xE9 que le prestataire produise un proc\xE8s-verbal\
