        \ crit\xE8res et p\xE9rim\xE8tre de l\u2019audit, \xE9valuer l\u2019organisation\
        \ de la s\xE9curit\xE9 des syst\xE8mes d\u2019information."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.6.b
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.6
      ref_id: VI.4.6.b
      description: "[ORGAPHY] Le prestataire doit \xEAtre capable d\u2019\xE9valuer\
        \ l\u2019organisation de la s\xE9curit\xE9 en analysant, lorsqu\u2019ils existent,\
        \ les documents suivants :\ni. l\u2019appr\xE9ciation des risques ;\nii. la\
        \ politique de s\xE9curit\xE9 des syst\xE8mes d\u2019information (PSSI) ;\n\
        iii. le dossier d\u2019homologation ;\niv. le plan de reprise d\u2019activit\xE9\
        \ (PRA) ;\nv. le plan de continuit\xE9 d\u2019activit\xE9 (PCA) ;\nvi. le\
        \ plan d\u2019assurance s\xE9curit\xE9 (PAS) ;\nvii. le processus de gestion\
        \ des incidents."
      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.6.c
      assessable: true
      depth: 4
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:vi.4.6
      ref_id: VI.4.6.c
      description: "[ORGAPHY] Le prestataire doit \xEAtre capable d\u2019\xE9valuer\
        \ la s\xE9curit\xE9 physique du syst\xE8me d\u2019information audit\xE9 et\
        \ notamment les syst\xE8mes de :\ni. contr\xF4le d\u2019acc\xE8s physique\
        \ ;\nii. d\xE9tection d\u2019intrusions physiques ;\niii. vid\xE9oprotection\
        \ ;\niv. pr\xE9vention des risques naturels : incendie, inondations, etc."
      implementation_groups:
      - E
