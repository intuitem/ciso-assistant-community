      implementation_groups:
      - S
      - E
    - urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v.1.c
      assessable: true
      depth: 3
      parent_urn: urn:cintamaya:risk:req_node:passi-framework-2.2:v.1
      ref_id: V.1.c
      description: "Les responsables d\u2019\xE9quipe doivent poss\xE9der les qualit\xE9\
        s personnelles d\xE9crites au chapitre \xAB 7.2.3.4 Comp\xE9tences g\xE9n\xE9\
        rales du responsable d\u2019une \xE9quipe d\u2019audit \xBB de la norme."
      implementation_groups:
