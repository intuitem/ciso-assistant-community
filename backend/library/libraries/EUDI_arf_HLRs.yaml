      ref_id: AS-WP-09-022
      description: A Wallet Provider SHALL consider all relevant factors, including
        offline usage, interoperability, and the risk of a WUA becoming a vector to
        track the User, when deciding on the validity period of a WUA.
      annotation: 'Regarding interoperability, see ISSU_12c, which limits the validity
        period of PIDs issued based on the validity period of the WUA | Legacy ref-id:
        WUA_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-023
