      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.18
      ref_id: EW-PIO-29-001
      description: An Attestation Provider issuing representation attestations to
        a natural person representing another natural person SHALL ensure that either
        the attestations are short-lived or that all entities which, according to
        applicable law, must have the ability to request revocation of such attestations,
        are able to do so.
      annotation: 'Legacy ref-id: RP_02'
