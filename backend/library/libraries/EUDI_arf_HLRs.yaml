      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6
      ref_id: A.2.3.6.E
      name: Wallet Instance Attestations
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-028
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.e
      ref_id: AS-WP-09-028
      description: A Wallet Provider SHALL ensure that a non-revoked Wallet Unit at
        all times presents a temporally valid and non-revoked WIA to a PID Provider
        or Attestation Provider during the issuance process of a PID or attestation.
      annotation: 'This requirement applies to both device-bound and non-device-bound
        attestations. | Legacy ref-id: WUA_22'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-029
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.e
      ref_id: AS-WP-09-029
      description: When issuing, presenting, or verifying a WIA, Wallet Providers,
        Wallet Units, PID Providers, and Attestation Providers SHALL only use cryptographic
        algorithms included in the [ECCG Agreed Cryptographic Mechanisms v2.0](https://certification.enisa.europa.eu/document/download/a845662b-aee0-484e-9191-890c4cfa7aaa_en?filename=ECCG%20Agreed%20Cryptographic%20Mechanisms%20version%202.pdf).
      annotation: 'Legacy ref-id: WUA_23'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-030
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.e
      ref_id: AS-WP-09-030
      description: A Wallet Unit SHALL present a WIA only to a PID Provider or Attestation
        Provider, as part of the issuance process of a PID or an attestation, and
        not to a Relying Party or any other entity.
      annotation: 'Legacy ref-id: WUA_24'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-031
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.e
      ref_id: AS-WP-09-031
      description: During issuance of a PID or attestation, the PID Provider or Attestation
        Provider SHALL verify the WIA in accordance with the requirements in OpenID4VCI
        Appendix E.
      annotation: 'This requirement applies to both device-bound and non-device-bound
        attestations. | Legacy ref-id: WUA_25'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      assessable: false
      depth: 1
      ref_id: A.2.3.7
      name: Topic 10 - Issuing a PID or attestation to a Wallet Unit
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.A
      name: Generic HLRs
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-10-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: EW-PIO-10-001
      description: Wallet Providers SHALL ensure that their Wallet Solution supports
        the OpenID4VCI protocol specified in [OpenID4VCI], as profiled in Sections
        4 and 6 of [HAIP], and with additions and changes as documented in this Annex
        (see e.g. this Topic and [Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation))
        and in [Technical Specification 3](../../technical-specifications/ts3-wallet-unit-attestation.md).
      annotation: 'For clarity: in [HAIP] v1.0, Section 6 implies that Wallet Units
        must comply with the applicable requirements in [OpenID4VCI] Annex A.2 when
        requesting the issuance of an attestation in ISO/IEC 18013-5-compliant format,
        and with the applicable requirements in [OpenID4VCI] Annex A.3 when requesting
        the issuance of an attestation in SD-JWT VC format. | Legacy ref-id: ISSU_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-001
      description: PID Providers and Attestation Providers SHALL support the OpenID4VCI
        protocol specified in [OpenID4VCI], as profiled in Sections 4 and 6 of [HAIP],
        and with additions and changes as documented in this Annex (see e.g. this
        Topic and [Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation))
        and in [Technical Specification 3](../../technical-specifications/ts3-wallet-unit-attestation.md).
      annotation: 'For clarity: in [HAIP] v1.0, Section 6 implies that PID Providers
        and Attestation Providers must comply with the applicable requirements in
        [OpenID4VCI] Annex A.2 when issuing an attestation in ISO/IEC 18013-5-compliant
        format, and with the applicable requirements in [OpenID4VCI] Annex A.3 when
        issuing an attestation in SD-JWT VC format. | Legacy ref-id: ISSU_01a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-002
      description: Wallet Providers SHALL ensure that their Wallet Solution supports
        the attestation formats specified in ISO/IEC 18013-5, see [ISO18013-5], and
        in SD-JWT-based Verifiable Credentials (SD-JWT VC), see [SD-JWT-VC], with
        additions and changes as documented in this Annex and in future technical
        specifications created by or on behalf of the Commission.
      annotation: 'Legacy ref-id: ISSU_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-003
      description: Wallet Units, PID Providers, and Attestation Providers SHALL support
        the [W3C Digital Credentials API](https://wicg.github.io/digital-credentials/)
        for the issuance of PIDs and attestations.
      annotation: 'This requirement implies that the following conditions will be
        satisfied: a) the DC API specification will become a W3C Recommendation, b)
        this specification will comply with the principles outlined in [Section 4.4.3.1](./../architecture-and-reference-framework-main.md#4431-introduction)
        of the ARF main document, c) this specification will be broadly supported
        by relevant browsers and operating systems, and d) the [OpenID4VCI] standard
        will specify how to use OpenID4VCI with the DC API. | Legacy ref-id: ISSU_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-004
      description: The OpenID4VCI protocol referenced in requirement ISSU_01, or an
        EUDI Wallet-specific extension or profile thereof, SHALL enable PID Providers
        and Attestation Provider to issue to a Wallet Unit a batch of multiple PIDs
        or attestations that are simultaneously valid and contain the same attributes.
      annotation: 'Legacy ref-id: ISSU_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-005
      description: A Wallet Unit SHALL support a process to activate a newly issued
        PID, in accordance with the requirements for LoA High in [Commission Implementing
        Regulation (EU) 2015/1502](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32015R1502)
        Section 2.2.2. The Wallet Unit SHALL NOT allow a User to use a non-activated
        PID.
      annotation: 'a) The goal of the activation process is to verify that the PID
        was delivered into the Wallet Unit and WSCA/WSCD of the User who is the subject
        of the PID. b) This requirement is not applicable for QEAAs, PuB-EAAs or non-qualified
        EAAs, since these are not identity means in the sense of Commission Implementing
        Regulation (EU) 2015/1502. | Legacy ref-id: ISSU_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-006
      description: After a Wallet Unit receives a PID or an attestation from a PID
        Provider or Attestation Provider, it SHALL verify that the PID or attestation
        it received matches the PID or attestation requested by the Wallet Unit.
      annotation: 'Legacy ref-id: ISSU_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-007
      description: After a Wallet Unit receives a PID from a PID Provider, it SHALL
        validate the signature of the PID using a trust anchor of the PID Provider
        provided in a LoTE made available in accordance with [[Topic 31](./annex-2.02-high-level-requirements-by-topic.md#a2320-topic-31---notification-and-publication-of-pid-provider-wallet-provider-attestation-provider-access-certificate-authority-and-provider-of-registration-certificates)],
        unless this would result in the validation of the PID signature being done
        by the same component that created the signature.
      annotation: 'This could be the case in architectures where the Wallet Provider
        is also the PID Provider and the Wallet Units use a remote HSM as their WSCD.
        | Legacy ref-id: ISSU_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-008
      description: After a Wallet Unit receives a QEAA from a QEAA Provider, it SHALL
        validate the qualified signature of the QEAA in accordance with Art. 32 of
        the [European Digital Identity Regulation]. For the verification, the Wallet
        Unit SHALL use a trust anchor provided in a QEAA Provider Trusted List made
        available in accordance with [Art. 22](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=uriserv%3AOJ.L_.2014.257.01.0073.01.ENG#d1e2162-73-1)
        of the [European Digital Identity Regulation].
      annotation: 'a) Requirements ISSU_07 to ISSU_10 are equivalent to requirements
        OIA_12 to OIA_15 in [Topic 1](./annex-2.02-high-level-requirements-by-topic.md#a231-topic-1---accessing-online-services-with-a-wallet-unit).
        b) These requirements imply that a Wallet Instance must be aware whether the
        attestation it is requesting from an issuer is a PID, a QEAA, a PuB-EAA, or
        a non-qualified EAA. These requirements also imply that the Wallet Unit must
        store trust anchors in such a way that, when it receives an issued attestation,
        it is able to distinguish between trust anchors usable either for PIDs, for
        QEAAs, for PuB-EAAs, or for non-qualified EAAs. | Legacy ref-id: ISSU_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-009
      description: After a Wallet Unit receives a PuB-EAA from a PUB-EAA Provider,
        it SHALL validate the qualified signature of the PuB-EAA in accordance with
        Art. 32 of the [European Digital Identity Regulation]. For that verification,
        the Wallet Unit SHALL use the public key provided in the qualified certificate
        of the QTSP supporting the qualified signature. The Wallet Unit SHALL also
        validate the qualified certificate of the QTSP using a trust anchor provided
        in a Trusted List made available in accordance with [Art. 22](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=uriserv%3AOJ.L_.2014.257.01.0073.01.ENG#d1e2162-73-1)
        of the [European Digital Identity Regulation]. Finally, the Wallet Unit SHALL
        also verify the certified attributes of the qualified certificate, as specified
        in [Article 45f](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e3902-1-1).
      annotation: 'Legacy ref-id: ISSU_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-010
      description: After a Wallet Unit receives a non-qualified EAA from an EAA Provider,
        it SHALL validate the signature of the EAA if it has access to the trust anchors
        of the EAA Provider.
      annotation: 'For a non-qualified EAA, an Attestation Rulebook may be available,
        see [[Topic 12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks)],
        explaining how EAA Providers distribute their trust anchors. However, it is
        not required for Wallet Units to be in possession of the trust anchors of
        all non-qualified EAA Providers, even when an Attestation Rulebook is available.
        | Legacy ref-id: ISSU_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-011
      description: A Wallet Unit SHALL request the User's approval before storing
        a PID or attestation obtained from a PID Provider or Attestation Provider.
        When requesting approval, the Wallet Instance SHALL display the contents of
        the PID or attestation to the User. The Wallet Instance SHALL also inform
        the User about the identity of the PID Provider or Attestation Provider, using
        the subject information in the PID Provider's or Attestation Provider's access
        certificate.
      annotation: 'Legacy ref-id: ISSU_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-012
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-012
      description: In case one or more of the verifications in ISSU_06 - ISSU_11 fail,
        the Wallet Unit SHALL immediately delete the PID or attestation it received.
        The Wallet Instance SHALL notify the User about the fact that issuance of
        the PID or attestation was not successful, including the reason for this failure.
      annotation: 'Legacy ref-id: ISSU_11b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-013
      description: A PID Provider or Attestation Provider SHALL offer its PIDs or
        attestations in all formats required in the PID Rulebook or the applicable
        Attestation Rulebook, see [[Topic 12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks)].
      annotation: 'Examples include the mdoc format specified in [ISO/IEC 18013-5]
        and the SD-JWT VC-format specified in [SD-JWT VC]. | Legacy ref-id: ISSU_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-014
      description: A Wallet Provider SHALL ensure that, when a User instructs their
        Wallet Unit to request a PID or attestation from a PID Provider or Attestation
        Provider, the Wallet Unit requests that PID or attestation in all formats
        offered by the PID Provider or Attestation Provider.
      annotation: 'Examples include the mdoc format specified in [ISO/IEC 18013-5]
        and the SD-JWT VC-format specified in [SD-JWT VC]. | Legacy ref-id: ISSU_12a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-015
      description: The WSCA/WSCD or a keystore SHALL generate a new key pair for a
        new PID or attestation, on request the Wallet Instance. This MAY be done either
        prior to the issuance of any PID or attestation, or during the issuance process.
      annotation: 'a) See also WUA_05 and WUA_05a. b) In case of synchronous issuing
        in a remote HSM architecture, re-use of an existing key pair for the new PID
        or attestation may be acceptable and it may not be necessary to generate a
        new key pair for each new PID or attestation. | Legacy ref-id: ISSU_12b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-016
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-016
      description: The expiration date of a PID SHALL be no later than the expiration
        date of the WUA presented as part of the PID issuance process.
      annotation: 'This requirement is an implication of WURevocation_18 in [Topic
        38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation).
        If the PID would be valid for longer than the WUA, the PID Provider would
        not be able to use the revocation information in the WUA to verify the revocation
        status of the Wallet Unit. | Legacy ref-id: ISSU_12c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.a
      ref_id: AS-AP-10-017
      description: If an Attestation Provider supports revocation chaining for its
        attestations per WURevocation_19 in [Topic 38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation),
        the expiration date of an attestation SHALL be no later than the expiration
        date of the WUA presented as part of the attestation issuance process.
      annotation: 'See note in ISSU_12c. | Legacy ref-id: ISSU_12d'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.B
      name: HLRs for PID issuance
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-018
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-018
      description: A Wallet Provider SHALL ensure that at least one PID Provider is
        willing to issue a PID complying with [PID Rulebook] to Users of the Wallet
        Units it provides.
      annotation: 'Legacy ref-id: ISSU_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-019
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-019
      description: A PID Provider SHALL ensure that all PIDs it issues to Wallet Units
        comply with the requirements specified in [PID Rulebook].
      annotation: 'Legacy ref-id: ISSU_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-020
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-020
      description: A PID Provider SHALL support the OpenID4VCI protocol referenced
        in ISSU_01 for issuing PIDs.
      annotation: 'Legacy ref-id: ISSU_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-021
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-021
      description: Empty
      annotation: 'Legacy ref-id: ISSU_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-022
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-022
      description: A PID Provider SHALL implement device binding for all PIDs it issues,
        meaning it SHALL ensure that a PID is cryptographically bound to the WSCA/WSCD
        included in the Wallet Unit, as specified in [Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation).
      annotation: 'Device binding is called ''mdoc authentication'' in [ISO/IEC 18013-5]
        and ''key binding'' in [SD-JWT-VC]. | Legacy ref-id: ISSU_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-023
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-023
      description: A PID Provider SHALL verify the identity of the subject of the
        PID in compliance with Level of Assurance (LoA) High requirements.
      annotation: 'These requirements will be determined by the relevant eID scheme.
        | Legacy ref-id: ISSU_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-024
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-024
      description: A PID Provider SHALL ensure that the attributes attested in the
        PID issued are valid for the identified PID subject at any point of time of
        PID validity.
      annotation: 'Legacy ref-id: ISSU_18a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-025
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-025
      description: For the verification of a WUA or WIA, a PID Provider SHALL accept
        the trust anchors in the Wallet Provider LoTE(s) it needs.
      annotation: 'a) The Wallet Provider LoTE is explained in [[Topic 31](./annex-2.02-high-level-requirements-by-topic.md#a2320-topic-31---notification-and-publication-of-pid-provider-wallet-provider-attestation-provider-access-certificate-authority-and-provider-of-registration-certificates)].
        b) It is not mandatory for a PID Provider to accept all Wallet Provider LoTEs,
        if there are multiple. This is because it is not mandatory for a PID Provider
        to accept all certified Wallet Solutions in the EUDI Wallet ecosystem. Each
        PID Provider will choose which LoTEs they need to subscribe to. | Legacy ref-id:
        ISSU_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-026
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-026
      description: A PID Provider SHALL support all Wallet Solutions recognised under
        the corresponding notified eID scheme, meaning that it is willing and able
        to issue a PID to a Wallet Unit on request of the User.
      annotation: 'Legacy ref-id: ISSU_19a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-027
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-027
      description: To inform its potential PID subjects about the Wallet Solution(s)
        they can use for requesting a PID, a PID Provider SHALL publish a list of
        supported Wallet Solutions in such a way that it can be easily found, for
        example on the PID Provider's website.
      annotation: 'This a policy requirement rather than a technical requirement.
        | Legacy ref-id: ISSU_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-028
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-028
      description: Before issuing a PID, a PID Provider SHALL verify that the Wallet
        Provider mentioned in the Wallet Unit's WUA and WIA is present in a Wallet
        Provider LoTE. The PID Provider SHALL also authenticate and validate the WUA
        and WIA using the trust anchor(s) registered for the Wallet Provider in that
        LoTE. Moreover, it SHALL verify that the Wallet Units's WUA is not revoked.
      annotation: 'a) For the WUA, see [[Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation)]
        and [[Topic 38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation)].
        b) [CIR 2024/2977](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R2977),
        Article 3 (9), also allows another authentication mechanism in accordance
        with an electronic identity scheme notified at assurance level high. However,
        the ARF does not further specify such other authentication mechanisms, which
        means that in general they will not be interoperable. | Legacy ref-id: ISSU_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-029
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-029
      description: A PID Provider SHALL sign its Credential Issuer metadata as specified
        in section 12.2.3 of [OpenID4VCI]. To do so, the PID Provider SHALL use the
        private key corresponding to the public key in its access certificate. The
        PID Provider SHALL include its access certificate, as well as all intermediate
        certificate(s) leading up to the trust anchor of the corresponding Access
        Certificate Authority (see ISSU_33) in the LoTE, in the ``x5c`` parameter
        in the JOSE header of the JSON Web Signature for the metadata.
      annotation: 'Legacy ref-id: ISSU_22'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-030
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-030
      description: Empty
      annotation: 'Legacy ref-id: ISSU_22a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-031
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-031
      description: Empty
      annotation: 'Legacy ref-id: ISSU_22b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-032
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-032
      description: For the verification of a PID Provider's access certificates, a
        Wallet Unit SHALL accept the trust anchors in the LoTE(s) of Access Certificate
        Authorities it needs.
      annotation: 'a) Access Certificate Authority LoTEs are explained in [[Topic
        27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties)].
        | Legacy ref-id: ISSU_23'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-033
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-033
      description: A Wallet Provider SHALL support at least one PID Provider, meaning
        that its Wallet Units SHALL be capable of requesting the issuance of a PID
        from these PID Provider(s), and that the Wallet Provider has agreed with the
        PID Provider(s) that the PID Provider(s) will process such a request according
        to the agreed rules and procedures.
      annotation: 'Legacy ref-id: ISSU_23a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-034
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-034
      description: Prior to or during installation of a Wallet Instance, the Wallet
        Provider SHALL notify the User about the PID Provider(s) that are supported
        by the Wallet Unit.
      annotation: 'Legacy ref-id: ISSU_23b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-035
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-035
      description: A Wallet Unit SHALL authenticate and validate the access certificate
        of the PID Provider before requesting the issuance of a PID. The Wallet Unit
        SHALL verify that the access certificate is authentic and is valid at the
        time of validation, and that the issuer of the access certificate is included
        in an Access Certificate Authority LoTE.
      annotation: 'Legacy ref-id: ISSU_24'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-036
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-036
      description: Before requesting the issuance of an attestation, the Wallet Unit
        SHALL verify that the PID Provider is indeed a registered PID Provider. To
        do so, the Wallet Unit SHALL a) Inspect the ``entitlement`` member in the
        registration certificate of the PID Provider, if provided in the Credential
        Issuer Metadata per ETSI TS 119 472-3 section 4.2.3, and verify the authenticity
        of the registration certificate. b) If no registration certificate is present,
        query the responsible Registrar for the registered value of ``entitlement``,
        using the URI in the Credential Issuer Metadata, if possible. c) If querying
        the Registrar is not possible, optionally inspect the ``entitlement`` member
        included in the Credential Issuer Metadata itself per ETSI TS 119 472-3 section
        4.2.3. If this procedure does not confirm that the PID Provider is indeed
        registered as a PID Provider, the Wallet Unit SHALL display a warning to the
        User, and SHALL NOT request the issuance of a PID.
      annotation: 'The information in the ``entitlement`` member included in the Credential
        Issuer Metadata (3rd option above) is self-declared by the PID Provider. It
        is up to the Wallet Provider to decide to trust this information if the registration
        certificate is not available and querying the registry is not successful.
        | Legacy ref-id: ISSU_24a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-037
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.b
      ref_id: AS-AP-10-037
      description: An Attestation Provider SHALL ensure all attestations issued to
        Wallet Units comply with the requirements specified in the applicable Rulebook,
        as described in [[Topic 12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks)].
      annotation: 'Legacy ref-id: ISSU_25'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.C
      name: HLRs for Attestation Issuance
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-038
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-038
      description: An Attestation Provider SHALL support the OpenID4VCI protocol referenced
        in ISSU_01 for issuing attestations.
      annotation: 'Legacy ref-id: ISSU_26'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-039
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-039
      description: An Attestation Provider SHOULD implement device binding for all
        attestations it issues. If an issued attestation is device-bound, the Attestation
        Provider SHALL ensure that the attestation is cryptographically bound to a
        WSCA/WSCD or a keystore available to the Wallet Unit, as specified in [Topic
        9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation).
      annotation: 'a) Device binding is called ''mdoc authentication'' in [ISO/IEC
        18013-5] and ''key binding'' in [SD-JWT-VC]. b) Implementing mdoc authentication
        is mandatory in [ISO/IEC 18013-5] and therefore, it is mandatory for attestations
        complying with that standard. c) An Attestation Provider can indicate the
        desired level of security for the private key storage in its Credential Issuer
        metadata . See [OpenID4VCI] section 12.2.4 and Appendix D.2. See also WIAM_14b,
        WIAM_14c, and WUA_05 and WUA_05a. | Legacy ref-id: ISSU_27'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-040
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-040
      description: If the subject of the attestation is a natural person, an Attestation
        Provider SHALL verify the identity of the subject of the attestation, in compliance
        with applicable requirements and in accordance with relevant standards or
        Implementing Regulations.
      annotation: 'Not every attestation has a natural person as its subject. For
        example, a holiday voucher may be valid for any User that can present it to
        a Relying Party and therefore has no subject. This is comparable to the concept
        of a ''bearer token''. | Legacy ref-id: ISSU_27a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-041
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-041
      description: If applicable, an Attestation Provider SHALL ensure that the attributes
        attested in the attestation issued are valid for the identified attestation
        subject.
      annotation: 'Legacy ref-id: ISSU_27b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-042
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-042
      description: The Attestation Provider SHALL verify that the User requesting
        the attestation has the right to receive it.
      annotation: 'Legacy ref-id: ISSU_27c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-043
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-043
      description: For the verification of a WUA or WIA, an Attestation Provider SHALL
        accept the trust anchors in the Wallet Provider LoTE.
      annotation: 'The Wallet Provider LoTE is explained in [[Topic 31](./annex-2.02-high-level-requirements-by-topic.md#a2320-topic-31---notification-and-publication-of-pid-provider-wallet-provider-attestation-provider-access-certificate-authority-and-provider-of-registration-certificates)].
        | Legacy ref-id: ISSU_28'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-044
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-044
      description: A QEAA Provider or PuB-EAA Provider SHALL support all Wallet Solutions,
        except in case the attestation in question is a Strong User Authentication
        (SUA) attestation as meant in [Topic 20](./annex-2.02-high-level-requirements-by-topic.md#a2313-topic-20---strong-user-authentication-for-electronic-payments)
        and the Wallet Provider does not support processing of the transactional data
        associated with the SUA attestation. Except for such cases, A QEAA Provider
        or PuB-EAA Provider SHALL NOT discriminate between Wallet Solutions when processing
        a request for the issuance of an attestation.
      annotation: 'This requirement is not applicable for non-qualified EAA Providers.
        For example, a non-qualified EAA Provider may choose to issue attestations
        in the format specified in [W3C VCDM], see ARB_01a. In that case, it will
        support only those Wallet Solutions that have implemented this attestation
        format. | Legacy ref-id: ISSU_29'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-045
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-045
      description: 'Before issuing a device-bound attestation, an Attestation Provider
        SHALL: - verify that the Wallet Provider mentioned in the Wallet Unit''s WUA
        is present in the Wallet Provider LoTE. - authenticate and validate the WUA
        using the trust anchor(s) registered for the Wallet Provider in that LoTE.
        - verify that the Wallet Unit''s WUA is not revoked.'
      annotation: 'For the WUA, see [[Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation)]
        and [[Topic 38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation)].
        | Legacy ref-id: ISSU_30'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-046
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-046
      description: 'Before issuing an attestation, an Attestation Provider SHALL:
        - verify that the Wallet Provider mentioned in the Wallet Unit''s WIA is present
        in the Wallet Provider LoTE. - authenticate and validate the WIA using the
        trust anchor(s) registered for the Wallet Provider in that LoTE.'
      annotation: 'This requirement applies to both device-bound and non-device-bound
        attestations | Legacy ref-id: ISSU_30a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-047
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-047
      description: Empty
      annotation: 'Legacy ref-id: ISSU_31'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-048
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-048
      description: An Attestation Provider SHALL sign its Credential Issuer metadata
        as specified in section 12.2.3 of [OpenID4VCI]. To do so, the Attestation
        Provider SHALL use the private key corresponding to the public key in its
        access certificate. The Attestation Provider SHALL include its access certificate,
        as well as all intermediate certificate(s) leading up to the trust anchor
        of the corresponding Access Certificate Authority  in the LoTE (see ISSU_33),
        in the ``x5c`` parameter in the JOSE header of the JSON Web Signature for
        the metadata.
      annotation: 'Legacy ref-id: ISSU_32'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-049
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-049
      description: Empty
      annotation: 'Legacy ref-id: ISSU_32a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-050
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-050
      description: For the verification of access certificates, a Wallet Unit SHALL
        accept the trust anchors in all LoTE(s) for Access Certificate Authorities.
      annotation: 'Access Certificate Authority LoTEs are explained in [[Topic 27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties)].
        | Legacy ref-id: ISSU_33'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-051
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-051
      description: For the verification of the registration certificates of Attestation
        Providers, a Wallet Unit SHALL accept the trust anchors in all LoTE(s) for
        Providers of registration certificates.
      annotation: 'Legacy ref-id: ISSU_33a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-052
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-052
      description: A Wallet Provider SHALL support all Attestation Providers, except
        possibly if the attestation in question is a Strong User Authentication (SUA)
        attestation as meant in [Topic 20](./annex-2.02-high-level-requirements-by-topic.md#a2313-topic-20---strong-user-authentication-for-electronic-payments)
        and the Wallet Provider chooses to not support processing of the transactional
        data associated with that attestation. Except for such cases, Wallet Units
        SHALL be capable of requesting the issuance of a QEAA, PuB-EAA, or non-qualified
        EAA from all Attestation Providers at the User's request.
      annotation: 'Legacy ref-id: ISSU_33b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-053
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-053
      description: A Wallet Unit SHALL authenticate and validate the access certificate
        of the Attestation Provider before requesting the issuance of an attestation.
        The Wallet Unit SHALL verify that the access certificate is authentic and
        is valid at the time of validation, and that the issuer of the access certificate
        is in the Access Certificate Authority LoTE(s), as documented in [[Topic 27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties)].
      annotation: 'Legacy ref-id: ISSU_34'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-054
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-054
      description: Before requesting the issuance of an attestation, the Wallet Unit
        SHALL verify that the Attestation Provider is a registered QEAA Provider,
        PuB-EAA Provider, or EAA Provider. To do so, the Wallet Unit SHALL a) Inspect
        the ``entitlement`` member in the registration certificate of the Attestation
        Provider, if provided in the Credential Issuer Metadata per ETSI TS 119 472-3
        section 4.2.3, and verify the authenticity of the registration certificate.
        b) If no registration certificate is present, query the responsible Registrar
        for the registered value of ``entitlement``, using the URI in the Credential
        Issuer Metadata, if possible. c) If querying the Registrar is not possible,
        optionally inspect the ``entitlement`` member included in the Credential Issuer
        Metadata itself per ETSI TS 119 472-3 section 4.2.3. If this procedure does
        not confirm that the Attestation Provider is indeed registered as a QEAA Provider,
        PuB-EAA Provider, or EAA Provider, the Wallet Unit SHALL display a warning
        to the User, and SHALL NOT request the issuance of an attestation.
      annotation: 'The information in the ``entitlement`` member included in the Credential
        Issuer Metadata (3rd option above) is self-declared by the Attestation Provider.
        It is up to the Wallet Provider to decide to trust this information if the
        registration certificate is not available and querying the registry is not
        successful. | Legacy ref-id: ISSU_34a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-055
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-055
      description: Before requesting the issuance of an attestation, the Wallet Unit
        SHALL verify whether the Provider properly registered for the issuance of
        the type of attestation that the User wants to obtain. To do so, the Wallet
        Unit SHALL a) Inspect the ``providesAttestations`` member in the registration
        certificate of the Attestation Provider, if provided in the Credential Issuer
        Metadata per ETSI TS 119 472-3 section 4.2.3, and verify the authenticity
        of the registration certificate. b) If no registration certificate is present,
        query the responsible Registrar for the registered value of ``providesAttestations``,
        using the URI in the Credential Issuer Metadata, if possible. c) If querying
        the Registrar is not possible, optionally inspect the ``providesAttestations``
        member included in the Credential Issuer Metadata itself per ETSI TS 119 472-3
        section 4.2.3. If this procedure does not confirm that the Attestation Provider
        registered for the relevant type of attestation, the Wallet Unit SHALL display
        a warning to the User, and SHALL NOT request the issuance of an attestation.
      annotation: 'The information in the ``providesAttestation`` member included
        in the Credential Issuer Metadata (3rd option above) is self-declared by the
        Attestation Provider. It is up to the Wallet Provider to decide to trust this
        information if the registration certificate is not available and querying
        the registry is not successful. | Legacy ref-id: ISSU_34b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-056
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.c
      ref_id: AS-AP-10-056
      description: A PID Provider or Attestation Provider SHALL ensure that all unique
        elements in a PID or attestation have a negligible chance of having the same
        value across all PIDs or attestations issued by that Provider. This SHALL
        include at least a) the salt used for hashing every attribute, b) the hash
        values of all attributes, c) the attestation identifier or index used for
        revocation purposes (if applicable), d) the attestation public key used for
        device binding (if applicable), and e) the value of the Attestation Provider
        signature.
      annotation: 'a) The list of unique elements is based on [ISO/IEC 18013-5] and
        [SD-JWT VC]. b) This requirement can be achieved, for example, by ensuring
        that salt values, indexes and attestation identifiers are pseudo-random numbers
        generated by a cryptographically secure pseudo-random number generator (CSPRNG).
        | Legacy ref-id: ISSU_35'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.D
      name: HLRs for Privacy Risks and Mitigation
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-057
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-057
      description: A Wallet Provider SHALL ensure that all unique elements in a WUA
        or WIA have a negligible chance of having the same value across all WUAs and
        WIAs issued by that Wallet Provider. This SHALL include at least a) the attestation
        identifier or index used for WUa revocation purposes, b) the WUA and WIA public
        key used for device binding, and c) the value of the Wallet Provider signature
        over the WUA and WIA.
      annotation: 'a) The list of unique elements is based on [Technical Specification
        3](../../technical-specifications/ts3-wallet-unit-attestation.md). b) This
        requirement can be achieved, for example, by ensuring that indexes are pseudo-random
        numbers generated by a cryptographically secure pseudo-random number generator
        (CSPRNG). | Legacy ref-id: ISSU_35a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-058
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-058
      description: After issuing a PID, attestation, or WUA, a PID Provider, Attestation
        Provider or Wallet Provider SHALL discard the values of all unique elements,
        including at least the ones mentioned in requirement ISSU_35 or ISSU_35a (as
        applicable) above, as well as any timestamps, as soon as they are no longer
        needed. The Provider SHALL NOT communicate these values to any other party
        inside or outside the EUDI Wallet ecosystem.
      annotation: 'Legacy ref-id: ISSU_35b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-059
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-059
      description: When issuing PIDs, attestations, or WUAs in a batch to a Wallet
        Unit, a PID Provider, Attestation Provider, or Wallet Provider SHALL ensure
        that the timestamps in these PIDs, attestations, or WUAs do not enable Relying
        Parties to conclude that they are part of the same batch (and therefore belong
        to the same User).
      annotation: 'This can be done, for example, by making timestamps sufficiently
        imprecise that a high number of batches, each issued to a different Wallet
        Unit, share the same timestamp values (herd privacy). | Legacy ref-id: ISSU_36'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-060
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-060
      description: 'A Wallet Provider SHALL ensure that its Wallet Solution supports
        the following methods for limiting the number of times a User can present
        the same PID or attestation to Relying Parties: Method A (Once-only attestations,
        as specified in requirement ISSU_43 - ISSU_47) and Method B (Limited-time
        attestations, as specified in requirement ISSU_48 - ISSU_50). In addition,
        a Wallet Provider MAY ensure that its Wallet Solution supports Method C (Rotating-batch
        attestations, as specified in requirement ISSU_51 - ISSU_54) or Method D (Per-Relying
        Party attestations, as specified in requirement ISSU_55 - ISSU_57).'
      annotation: 'Wallet Solutions, PID Providers, Attestation Providers, and Wallet
        Providers are free to define and use other methods as well. However, such
        other methods are out of scope of the ARF. | Legacy ref-id: ISSU_37'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-061
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-061
      description: A PID Provider or Attestation Provider SHALL have a policy describing
        which of the methods A, B, C, or D, it will use to limit the number of times
        a Wallet Unit may present a single PID or attestation. For each supported
        method, the policy SHALL also specify how the values for respective parameters
        for that method, such as technical validity period and batch size, will be
        chosen. The goal of the policy SHALL be to ensure that the risk of linkability
        is mitigated to an acceptable level, given the (expected) usage of the PID
        or attestation by the User. To determine what an acceptable level of risk
        is, the PID Provider or Attestation Provider SHALL carry out a risk analysis
        regarding linkability.
      annotation: 'a) If an Attestation Provider issues multiple attestation types,
        these requirements apply for each type of attestation separately. b) [Technical
        Specification 3] specifies that WUAs shall be sent to a PID Provider or Attestation
        Provider only once. In other words, for WUAs, the use of Method A is mandatory.
        | Legacy ref-id: ISSU_38'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-062
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-062
      description: PID Providers and Attestation Providers SHALL include the ``credential_reuse_policy``
        parameter, specified in section 4.2.4.2 of ETSI 119 472-3, in their Credential
        Issuer Metadata to specify which of the methods A, B, C, or D the Wallet Unit
        must use for the PID or attestation issued. Indicated methods SHALL be ordered
        by preference.
      annotation: 'See also ISSU_40. | Legacy ref-id: ISSU_39'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-063
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-063
      description: Wallet Units SHALL support the ``credential_reuse_policy`` Credential
        Issuer Metadata parameter specified in section 4.2.4.2 of ETSI 119 472-3 and
        SHALL present each PID and attestation in accordance with the values set for
        this parameter by the relevant PID Provider or Attestation Provider.
      annotation: 'Legacy ref-id: ISSU_39a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-064
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-064
      description: PID Providers and Attestation Providers SHALL indicate in their
        OpenID4VCI Issuer metadata at least that either method A or method B must
        be used for a given type of PID or attestation. A PID Provider or Attestation
        Provider MAY additionally indicate that it prefers using method C and/or method
        D over method A or method B. In such a case, a Wallet Unit supporting method
        C and/or method D SHALL use that method, while a Wallet Unit not supporting
        these methods SHALL use method A or method B, as applicable.
      annotation: 'Example: An Attestation Provider indicates methods {D, C, A} in
        their metadata, in that order. A Wallet Unit that supports methods C and D
        (as well as A and B) then uses method D for this type of attestation. A Wallet
        Unit supporting methods A, B and C uses method C. A Wallet Unit supporting
        only methods A and B uses method A. | Legacy ref-id: ISSU_40'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-065
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-065
      description: To the maximum extent possible, Wallet Providers, PID Providers,
        and Attestation Providers SHALL ensure that Users do not notice which of the
        methods A, B, C, or D is used for their PIDs, attestations, or WUAs.
      annotation: 'Legacy ref-id: ISSU_41'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-066
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-066
      description: To the maximum extent possible, Wallet Providers, PID Providers,
        and Attestation Providers SHALL ensure that no User action is needed for the
        re-issuance of WUAs, PIDs, or attestations.
      annotation: 'For the topic of re-issuance, see also the [Discussion Paper for
        Topic B](../../discussion-topics/b-re-issuance-and-batch-issuance-of-pids-and-attestations.md).
        | Legacy ref-id: ISSU_42'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-084
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.d
      ref_id: AS-AP-10-084
      description: A Wallet Unit SHALL give its User the option to manually initiate
        a re-issuance process for any of the PIDs or attestations in their Wallet
        Unit.
      annotation: 'This requirement does not apply for WUAs, since Users must not
        be involved in the management of WUAs. | Legacy ref-id: ISSU_58'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.Method A
      name: Once-only attestations
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-067
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-a
      ref_id: AS-AP-10-067
      description: The Wallet Unit SHALL request the PID Provider or Attestation Provider
        to issue PIDs or attestations in batches to the Wallet Unit. All PIDs or attestations
        in a batch SHALL have the same attribute values and the same technical validity
        period.
      annotation: 'Legacy ref-id: ISSU_43'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-068
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-a
      ref_id: AS-AP-10-068
      description: The Wallet Unit SHALL present each PID or attestation only once
        to a Relying Party, except when it has fallen back to Method B as specified
        below, or to another available method.
      annotation: 'Legacy ref-id: ISSU_44'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-069
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-a
      ref_id: AS-AP-10-069
      description: The Wallet Unit SHALL have a lower limit for the number of unused
        PIDs or attestations it holds, and SHALL request the issuance of a new batch
        when this limit is reached. The PID Provider or Attestation Provider SHALL
        inform the Wallet Unit about the value of the lower limit and the size of
        the batch to be requested, using the ``credential_reuse_policy`` Credential
        Issuer Metadata parameter specified in section 4.2.4.2 of ETSI 119 472-3.
      annotation: 'Legacy ref-id: ISSU_45'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-070
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-a
      ref_id: AS-AP-10-070
      description: If the Wallet Unit must request a new batch of PIDs or attestations
        but is not able to do so because it is offline, the Wallet Unit SHALL warn
        the User that they are about to lose the possibility to present this PID or
        attestation to a Relying Party and request them to connect their device to
        the internet.
      annotation: 'Legacy ref-id: ISSU_46'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-071
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-a
      ref_id: AS-AP-10-071
      description: If the Wallet Unit has run out of unused PIDs or attestations,
        but is not able to request a new batch because it is offline, it SHALL fall
        back to method B (see ISSU_48 - ISSU_50). This means that, when requested
        by a Relying Party or Attestation Provider, the Wallet Unit SHALL again present
        one of the already used PIDs or attestations. The Wallet Unit SHALL return
        to using method A as soon as it is able to go online and request a new batch
        of PIDs or attestations.
      annotation: 'Legacy ref-id: ISSU_47'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.Method B
      name: Limited-time attestations
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-072
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-b
      ref_id: AS-AP-10-072
      description: The Wallet Unit SHALL request the PID Provider or Attestation Provider
        to issue a single PID or attestation to the Wallet Unit.
      annotation: 'Legacy ref-id: ISSU_48'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-073
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-b
      ref_id: AS-AP-10-073
      description: The Wallet Unit SHALL present a PID or attestation multiple times
        to the same Relying Party or to different Relying Parties, when requested
        to do so.
      annotation: 'Legacy ref-id: ISSU_49'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-074
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-b
      ref_id: AS-AP-10-074
      description: The Wallet Unit SHALL request the PID Provider or Attestation Provider
        to re-issue a PID or attestation some time before the one existing in the
        Wallet Unit expires. The PID Provider or Attestation Provider SHALL inform
        the Wallet Unit about the moment at which the Wallet Unit must request the
        re-issuance of a PID or attestation (relative to the expiration date of the
        existing one), using the ``credential_reuse_policy`` Credential Issuer Metadata
        parameter specified in section 4.2.4.2 of ETSI 119 472-3.
      annotation: 'It is the responsibility of the Relying Party receiving a PID or
        attestation to validate whether a presented PID or attestation is temporally
        valid. A Wallet Unit is allowed to present a PID or attestation even if its
        expiration date is in the past. | Legacy ref-id: ISSU_50'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.Method C
      name: Rotating-batch attestations
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-075
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-c
      ref_id: AS-AP-10-075
      description: The Wallet Unit SHALL request the PID Provider or Attestation Provider
        to issue PIDs or attestations in batches to the Wallet Unit. All PIDs or attestations
        in a batch SHALL have the same attribute values and the same technical validity
        period.
      annotation: 'Legacy ref-id: ISSU_51'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-076
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-c
      ref_id: AS-AP-10-076
      description: When a presentation of attributes is requested by multiple Relying
        Parties, the Wallet Unit SHALL present each PID or attestation in a batch
        once, in a random order.
      annotation: 'Legacy ref-id: ISSU_52'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-077
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-c
      ref_id: AS-AP-10-077
      description: When all PIDs or attestations in a batch have been presented once,
        the Wallet Unit SHALL reset the batch, and start presenting each PID or attestation
        in the batch again in a random order.
      annotation: 'Legacy ref-id: ISSU_53'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-078
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-c
      ref_id: AS-AP-10-078
      description: The Wallet Unit SHALL request the PID Provider or Attestation Provider
        to re-issue a batch of PIDs or attestations some time before the batch in
        the Wallet Unit expires. The PID Provider or Attestation Provider SHALL inform
        the Wallet Unit about the size of the batch and about the moment at which
        the Wallet Unit must request the re-issuance of a batch (relative to the expiration
        date of the existing batch), using the ``credential_reuse_policy`` Credential
        Issuer Metadata parameter specified in section 4.2.4.2 of ETSI 119 472-3.
      annotation: 'Legacy ref-id: ISSU_54'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.Method D
      name: Per-Relying Party attestations
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-079
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-d
      ref_id: AS-AP-10-079
      description: The Wallet Unit SHALL present a different PID or attestation to
        each different Relying Party upon their request. This means that it SHALL
        comply with Method A for such Relying Parties.
      annotation: 'Legacy ref-id: ISSU_55'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-080
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-d
      ref_id: AS-AP-10-080
      description: In case a given Relying Party requests attributes from a given
        type of PID or attestation multiple times, the Wallet Unit MAY present the
        same PID or attestation to this Relying Party each time. If it does, it SHALL
        comply with Method B or Method C for such a Relying Party.
      annotation: 'Legacy ref-id: ISSU_56'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-081
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-d
      ref_id: AS-AP-10-081
      description: Empty
      annotation: 'Legacy ref-id: ISSU_56a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-082
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-d
      ref_id: AS-AP-10-082
      description: The Wallet Unit SHALL keep track of which PID or attestation it
        has presented to which Relying Party.
      annotation: 'To do so, the Wallet Unit can use the unique RP identifier from
        the extension of the presentation request meant in RPRC_19a. | Legacy ref-id:
        ISSU_57'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-083
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.method-d
      ref_id: AS-AP-10-083
      description: Empty
      annotation: 'Legacy ref-id: ISSU_57a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.E
      name: HLRs for re-issuance and batch issuance of PIDs and attestations
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-085
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-085
      description: After a successful re-issuance, a Wallet Unit SHALL compare the
        attribute values of the re-issued PID or attestation with those of the existing
        PID or attestation, and SHALL notify the User in case of any differences.
      annotation: 'This requirement does not apply for WUAs, since Users must not
        be involved in the management of WUAs. | Legacy ref-id: ISSU_59'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-086
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-086
      description: A Wallet Unit SHALL gracefully handle situations in which re-issuance
        of a PID, attestation, or WUA is refused by the PID Provider, Attestation
        Provider, or Wallet Provider,for example by attempting a retry after an appropriate
        delay.
      annotation: 'Legacy ref-id: ISSU_60'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-087
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-087
      description: A Wallet Unit SHALL support PID or attestation first-time batch
        issuance with a single User authentication, regardless of the size of the
        batch.
      annotation: 'a) See also requirement WIAM_14. b) This requirement does not apply
        for WUAs, since Users must not be involved in the management of WUAs. | Legacy
        ref-id: ISSU_61'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-088
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-088
      description: If a PID or attestation was successfully re-issued because the
        value of one or more of its attributes was changed (including attributes being
        added or deleted), a Wallet Unit SHOULD delete the correct pre-existing PID
        or attestation.
      annotation: 'a) It is up to the Wallet Unit, possibly using metadata provided
        by the PID Provider or Attestation Provider using the [OpenID4VCI] protocol,
        to determine the PID or attestation to be deleted. b) Additionally, per requirement
        VCR_09, the PID Provider or Attestation Provider revokes the pre-existing
        PID or attestation. | Legacy ref-id: ISSU_62'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-089
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-089
      description: PID Providers and Attestation Providers, and Wallet Units SHALL
        support the features of [OpenID4VCI] enabling the re-issuance of PIDs and
        attestations.
      annotation: 'Legacy ref-id: ISSU_63'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-090
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-090
      description: PID Providers, Attestation Providers, and Wallet Units SHALL support
        the features of [OpenID4VCI] enabling the batch issuance of PIDs or attestations.
      annotation: 'Legacy ref-id: ISSU_64'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-091
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-091
      description: A PID Provider or an Attestation Provider of device-bound attestations
        SHALL verify that a re-issued PID or device-bound attestation is issued to
        the same Wallet Unit as the existing PID or attestation.
      annotation: 'A PID Provider or Attestation Provider can do so by issuing a refresh
        token to the Wallet Instance during the original issuance of the PID or attestation,
        and requiring that the Wallet Instance uses it to obtain a fresh access token
        during re-issuance; see [OpenID4VCI] section 14.5. The PID Provider or Attestation
        Provider needs to be able to trust that the Wallet Instance handles the refresh
        tokens in a secure way, so that an attacker cannot use them from another Wallet
        Instance. This requires trust in the (continued) security and integrity of
        both the original Wallet Instance and the other Wallet Instance. This trust
        is provided by providing the PID Provider or Attestation Provider with a valid
        WUA for the new Wallet Unit during re-issuance, and by enabling the PID Provider
        or Attestation Provider to verify that the existing Wallet Unit has not been
        revoked. | Legacy ref-id: ISSU_65'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-092
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.e
      ref_id: AS-AP-10-092
      description: Empty
      annotation: 'Legacy ref-id: ISSU_66'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7
      ref_id: A.2.3.7.F
      name: HLRs for attestation-signing certificate profiles and certificate policies
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-093
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      ref_id: AS-AP-10-093
      description: "A PID Provider SHALL have a policy governing all aspects of PID\
        \ issuance and management. The policy SHALL comply with at least the extended\
        \ normalised certificate policy (\u2018NCP+\u2019) requirements as specified\
        \ in ETSI EN 319 411-1, insofar applicable for the issuance of PIDs rather\
        \ than public key certificates."
      annotation: 'A common dedicated policy for issuing PIDs may be developed in
        the future. If so, this requirement will be changed to refer to it. | Legacy
        ref-id: ISSU_67'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-094
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      ref_id: AS-AP-10-094
      description: PID Providers SHALL ensure that the certificates they use for signing
        PIDs comply with all applicable requirements in ETSI TS 119 412-6, in particular
        Clause 4.
      annotation: 'Legacy ref-id: ISSU_68'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-095
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      ref_id: AS-AP-10-095
      description: "A QEAA Provider SHALL have a policy governing all aspects of QEAA\
        \ issuance and management. The policy SHALL comply with at least the policy\
        \ for qualified certificates issued to a natural person where the private\
        \ key and the related certificate reside on a QSCD (\u2018QCP-n-qscd\u2019\
        ) or qualified certificates issued to a legal person where the private key\
        \ and the related certificate reside on a QSCD (\u2018QCP-l-qscd\u2019) requirements\
        \ as specified in ETSI EN 319 411-2, insofar applicable for the issuance of\
        \ QEAAs rather than public key certificates."
      annotation: 'A common dedicated policy for issuing QEAAs may be developed in
        the future. If so, this requirement will be changed to refer to it. | Legacy
        ref-id: ISSU_69'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-096
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      ref_id: AS-AP-10-096
      description: QEAA Providers SHALL ensure that the certificates they use for
        signing QEAAs comply with all applicable requirements in ETSI TS 119 412-6,
        in particular Clause 7.
      annotation: 'Legacy ref-id: ISSU_70'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-097
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      ref_id: AS-AP-10-097
      description: Providers of non-qualified EAAs SHALL ensure that the certificates
        they use for signing EAAs comply with all applicable requirements in ETSI
        TS 119 412-6, in particular Clause 6.
      annotation: 'Legacy ref-id: ISSU_71'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-098
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      ref_id: AS-AP-10-098
      description: "A PuB-EAA Provider SHALL have a policy governing all aspects of\
        \ PuB-EAA issuance and management. The policy SHALL comply with at least the\
        \ extended normalised certificate policy (\u2018NCP+\u2019) requirements as\
        \ specified in ETSI EN 319 411-1, insofar applicable for the issuance of PuB-EAAs\
        \ rather than public key certificates."
      annotation: 'A common dedicated policy for issuing PuB-EAAs may be developed
        in the future. If so, this requirement will be changed to refer to it | Legacy
        ref-id: ISSU_72'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-10-099
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.7.f
      ref_id: AS-AP-10-099
      description: PuB-EAAs Providers SHALL ensure that the certificates they use
        for signing PuB-EAAs comply with all applicable requirements in ETSI TS 119
        412-6, in particular Clause 8.
      annotation: 'Legacy ref-id: ISSU_73'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8
      assessable: false
      depth: 1
      ref_id: A.2.3.8
      name: Topic 11 - Pseudonyms
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8
      ref_id: A.2.3.8.A
      name: HLRs related to Use Cases A and B
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-001
      description: A Wallet Unit SHALL enable a User to generate a Pseudonym and register
        it at a Relying Party.
      annotation: 'For an attested pseudonym, pseudonym generation takes place by
        requesting the issuance of a pseudonym attestation. Pseudonym registration
        takes place by presenting the attestation. | Legacy ref-id: PA_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-002
      description: A Wallet Unit SHALL enable a User to authenticate with a Pseudonym
        towards a Relying Party if the Wallet Unit was used previously to register
        the Pseudonym for the same Relying Party
      annotation: 'Legacy ref-id: PA_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-003
      description: A Wallet Unit SHALL be able to perform the actions specified in
        the above two requirements independently of whether the interaction with the
        Relying Party is initiated on the same device hosting the Wallet Instance
        or on a device different from the one hosting the Wallet Instance.
      annotation: 'Legacy ref-id: PA_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-004
      description: A Wallet Unit SHALL enable the User to use multiple different Pseudonyms
        at a given Relying Party, unless it is explicitly designed as a scope rate-limited
        attestation.
      annotation: 'Legacy ref-id: PA_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-005
      description: A Wallet Unit SHOULD enable a User to freely choose a User alias
        for each Pseudonym registered at a Relying Party. Setting an alias SHOULD
        be optional for the User. The User SHOULD be able to change the alias for
        any Pseudonym.
      annotation: 'Legacy ref-id: PA_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-006
      description: A Wallet Unit SHALL enable a User to choose which Pseudonym to
        authenticate with towards a Relying Party, if multiple Pseudonyms are registered
        for this Relying Party. The Wallet Unit SHOULD present the User with the aliases
        of the applicable Pseudonyms, if assigned, when making this choice.
      annotation: 'Legacy ref-id: PA_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-007
      description: A Wallet Unit SHALL enable a User to delete a Pseudonym.
      annotation: 'Legacy ref-id: PA_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-008
      description: A Wallet Unit SHALL enable the User to manage Pseudonyms within
        the Wallet Unit in a user-friendly and transparent manner.
      annotation: 'Legacy ref-id: PA_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-009
      description: A Wallet Unit SHALL log Pseudonym registration and presentation
        transactions as specified in [Topic 19](./annex-2.02-high-level-requirements-by-topic.md#a2312-topic-19---user-navigation-requirements-dashboard-logs-for-transparency).
      annotation: 'Legacy ref-id: PA_08a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.a
      ref_id: AS-WP-11-010
      description: A Wallet Unit SHALL enable the User to see all existing pseudonyms,
        including the associated Relying Party (if any).
      annotation: 'Legacy ref-id: PA_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8
      ref_id: A.2.3.8.B
      name: HLRs related to Relying Parties
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.b
      ref_id: AS-WP-11-011
      description: A Relying Party SHALL be able to verify that a User is registering
        a Pseudonym using a non-revoked Wallet Unit.
      annotation: 'Legacy ref-id: PA_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-012
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.b
      ref_id: AS-WP-11-012
      description: A Relying Party SHALL be able to verify that a User is authenticating
        with a Pseudonym using a non-revoked Wallet Unit.
      annotation: 'Legacy ref-id: PA_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.b
      ref_id: AS-WP-11-013
      description: If Wallet Unit is used to register a Pseudonym at a Relying Party
        in combination with a PID or attestation being presented to the same Relying
        Party, then this Relying Party SHALL be able to verify that the same User
        performed both actions.
      annotation: 'Legacy ref-id: PA_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.b
      ref_id: AS-WP-11-014
      description: The Relying Party SHALL be able to validate that the pseudonym
        presented to them belongs to the User presenting it.
      annotation: 'Legacy ref-id: PA_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8
      ref_id: A.2.3.8.C
      name: HLRs related to privacy
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      ref_id: AS-WP-11-015
      description: A Wallet Unit SHALL store the information necessary for authenticating
        with a Pseudonym in either a WSCA/WSCD or in a keystore.
      annotation: 'Legacy ref-id: PA_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-016
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      ref_id: AS-WP-11-016
      description: A Relying Party SHALL NOT be able to derive the User's true identity,
        or any data identifying the User, from the Pseudonym value received by the
        Relying Party.
      annotation: 'Legacy ref-id: PA_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      ref_id: AS-WP-11-017
      description: A Wallet Unit SHALL NOT reveal the same Pseudonym to different
        Relying Parties, unless the User explicitly chooses otherwise.
      annotation: 'Legacy ref-id: PA_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-018
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      ref_id: AS-WP-11-018
      description: It SHALL NOT be possible to correlate Pseudonyms based on their
        values nor on other metadata sent by the Wallet Unit during registration and
        authentication, meaning that colluding Relying Parties SHALL NOT able to conclude
        that different Pseudonyms belong to the same User.
      annotation: 'Legacy ref-id: PA_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-019
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      ref_id: AS-WP-11-019
      description: The Wallet Unit SHALL ensure that Pseudonyms contain sufficient
        entropy to make the chance of colliding Pseudonyms (meaning two Users having
        the same Pseudonym value for the same Relying Party) negligible.
      annotation: 'Legacy ref-id: PA_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-020
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      ref_id: AS-WP-11-020
      description: A Wallet Unit SHALL NOT share the User's optionally assigned Pseudonym
        aliases with any Relying Party.
      annotation: 'Legacy ref-id: PA_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-021
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.c
      ref_id: AS-WP-11-021
      description: The Wallet Unit SHALL verify the identity of a Relying Party when
        a User registers a Pseudonym or authenticates with a Pseudonym. If the profile
        or extension of [W3C WebAuthn] meant in PA_21 does not enable the Wallet Unit
        to do this, the Wallet Unit SHALL trust the WebAuthn Client (i.e., the browser)
        to verify the Relying Party identity.
      annotation: '[W3C WebAuthn] currently does not offer a way for an Authenticator
        (i.e., the Wallet Unit) to authenticate a Relying Party. Instead, the Client
        (i.e., the browser) will authenticate the Relying Party, using TLS. | Legacy
        ref-id: PA_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8
      ref_id: A.2.3.8.D
      name: HLRs related to interoperability
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-022
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.d
      ref_id: AS-WP-11-022
      description: The Commission SHALL create or reference a technical specification
        containing a profile or extension of the [W3C WebAuthn] specification compliant
        with the HLRs specified in this Topic. This specification SHALL contain all
        details necessary for Wallet Units and Relying Parties to generate, register,
        and use Pseudonyms.
      annotation: 'Legacy ref-id: PA_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-023
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.d
      ref_id: AS-WP-11-023
      description: Wallet Providers MAY ensure that their Wallet Solution supports
        the HLRs defined for this topic by letting their Wallet Units perform the
        role of a WebAuthn authenticator following the [W3C WebAuthn] specification
        and the technical specification referenced in referenced in PA_21.
      annotation: 'Legacy ref-id: PA_22'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8
      ref_id: A.2.3.8.E
      name: HLRs related to scope rate-limited pseudonyms
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-024
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-024
      description: A protocol enabling scope rate-limited pseudonyms SHALL rely solely
        on algorithms included in the [ECCG Agreed Cryptographic Mechanisms v2.0](https://certification.enisa.europa.eu/document/download/a845662b-aee0-484e-9191-890c4cfa7aaa_en?filename=ECCG%20Agreed%20Cryptographic%20Mechanisms%20version%202.pdf).
      annotation: 'Legacy ref-id: PA_23'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-025
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-025
      description: A protocol enabling scope rate-limited pseudonyms SHALL enable
        a Wallet Unit to allow a User to generate a scope rate-limited pseudonym,
        register this by a Relying Party, and prove that this is within the rate and
        scope restrictions determined by the Relying Party.
      annotation: 'Legacy ref-id: PA_24'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-026
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-026
      description: A protocol enabling scope rate-limited pseudonyms SHALL allow a
        Relying Party, when a User presents a scope rate-limited pseudonym, to verify
        that the rate is not exceeded for this User.
      annotation: 'Legacy ref-id: PA_25'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-027
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-027
      description: A protocol enabling scope rate-limited pseudonyms SHALL allow a
        Relying Party to choose the scope and rate when requesting a scope rate-limited
        pseudonym from a User.
      annotation: 'Legacy ref-id: PA_26'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-028
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-028
      description: A protocol enabling scope rate-limited pseudonyms SHALL NOT allow
        any entity or collusion of entities not including the User, to link scope
        rate-limited pseudonyms of the same User when used across several different
        Relying Parties. This SHALL hold even if the scope and rate are identical
        across the different Relying Parties and both for registration and authentication
        of the scope rate-limited pseudonym
      annotation: 'Legacy ref-id: PA_27'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-029
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-029
      description: A protocol enabling scope rate-limited pseudonyms SHALL ensure
        that if the rate is larger than 1, a User's different pseudonyms SHALL be
        unlinkable for the same scope. This SHALL hold against any entity or collusion
        of entities, not including the User. Further, such protocol SHALL ensure that
        during registration or authentication with such a pseudonym, it SHALL NOT
        be possible for the Relying Party to deduce any information about how many
        pseudonyms the User has already registered (except that it does not exceed
        the predetermined rate).
      annotation: 'Legacy ref-id: PA_28'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-030
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-030
      description: A protocol enabling scope rate-limited pseudonyms SHALL ensure
        that no entity or collusion of entities, not including a User, is able to
        authenticate or register with a scope rate-limited pseudonym of this User.
      annotation: 'Legacy ref-id: PA_29'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-031
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-031
      description: A Wallet Unit SHALL store cryptographic material necessary for
        authenticating as a scope rate-limited pseudonyms in either a WSCA/WSCD or
        in a keystore.
      annotation: 'Legacy ref-id: PA_30'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-11-032
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.8.e
      ref_id: AS-WP-11-032
      description: A User's scope rate limited pseudonyms for a particular scope and
        rate SHALL be persistent over time even if they start using another Wallet
        Unit.
      annotation: 'Legacy ref-id: PA_31'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9
      assessable: false
      depth: 1
      ref_id: A.2.3.9
      name: Topic 12 - Attestation Rulebooks
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9
      ref_id: A.2.3.9.A
      name: Requirements regarding attestation formats
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-12-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.a
      ref_id: AS-AP-12-001
      description: 'The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA or a PuB-EAA SHALL specify that one or more
        of the following two common format(s) must be used for these attestations:
        - The format specified in ISO/IEC 18013-5, see [ISO18013-5]. - The format
        specified in SD-JWT-based Verifiable Credentials (SD-JWT VC), see [SD-JWT-VC].'
      annotation: 'Legacy ref-id: ARB_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.a
      ref_id: EW-DM-12-001
      description: 'The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHALL specify that one or more
        of the following three common format(s) must be used for these attestations:
        - The format specified in ISO/IEC 18013-5, see [ISO18013-5]. - The format
        specified in SD-JWT-based Verifiable Credentials (SD-JWT VC), see [SD-JWT-VC].
        - The format specified in W3C Verifiable Credentials Data Model, see [W3C
        VCDM v2.0].'
      annotation: 'Legacy ref-id: ARB_01a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.a
      ref_id: EW-DM-12-002
      description: The Scheme Provider for an Attestation Rulebook describing attestations
        using the format specified in [SD-JWT VC] SHALL ensure that these attestations
        comply with the 'IETF SD-JWT VC Profile' specified in [HAIP] Section 6.1.
      annotation: 'Legacy ref-id: ARB_01b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.a
      ref_id: EW-DM-12-003
      description: The Scheme Provider for an Attestation Rulebook SHALL analyse whether
        it must be possible for a User to present that type of attestation when the
        Wallet Unit and the Relying Party are in proximity and attestations are presented
        without using the internet. If so, the Attestation Rulebook SHALL specify
        that the attestations must be issued in the ISO/IEC 18013-5-compliant mdoc
        format.
      annotation: 'In theory, it is possible to use SD-JWT VC-compliant attestations
        in proximity use cases. In practice, however, the only protocol available
        to request and present SD-JWT VC-compliant attestations between a Wallet Unit
        and a Relying Party Instance is OpenID4VP. That protocol cannot be used without
        internet connectivity. | Legacy ref-id: ARB_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.a
      ref_id: EW-DM-12-004
      description: The Scheme Provider for an Attestation Rulebook MAY specify in
        the Attestation Rulebook that that type of attestation must be issued in the
        [SD-JWT VC]-compliant format, provided the [SD-JWT VC] specification has been
        approved by an EU standardisation body or by the European Digital Identity
        Cooperation Group established pursuant to [Article 46e](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e4536-1-1)(1)
        of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.a
      ref_id: EW-DM-12-005
      description: If an Attestation Rulebook specifies that a type of attestation
        can be issued in a format compliant with [W3C VCDM v2.0], the Scheme Provider
        for that Attestation Rulebook SHALL ensure the Rulebook references one or
        more documents specifying in detail how a Relying Party can request attributes
        from a such an attestation, and how a User can selectively disclose attributes
        from such an attestation. Moreover, these referenced documents SHALL be approved
        by an EU standardisation body or by the European Digital Identity Cooperation
        Group established pursuant to [Article 46e](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e4536-1-1)(1)
        of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9
      ref_id: A.2.3.9.B
      name: Requirements regarding attestation types
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.b
      ref_id: EW-DM-12-006
      description: The Scheme Provider for an Attestation Rulebook SHALL specify a
        value for the attestation type, which SHALL be unique within the scope of
        the EUDI Wallet ecosystem.
      annotation: 'In ISO/IEC 18013-5, the attestation type is called ''document type''
        and is included as a ``docType`` key-value pair in both the mdoc request and
        the mdoc response. Also, a method for generating unique attestation type values
        is recommended. In OpenID4VP, the attestation type is included in the meta
        property of a Credential Query in a presentation request. In [SD-JWT VC],
        the attestation type is called ''SD-JWT VC type'' and is included as a ``vct``
        claim in the SD-JWT VC. | Legacy ref-id: ARB_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9
      ref_id: A.2.3.9.C
      name: Requirements regarding attestation schemes
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-007
      description: The Scheme Provider for an Attestation Rulebook SHALL define all
        attributes that an attestation of that type may contain. This definition SHALL
        first describe the semantics of each attribute in an encoding-independent
        manner and SHALL subsequently for each attribute specify an ISO/IEC 18013-5-compliant
        format, an SD-JWT VC-compliant format, or both, as needed given the choices
        made according to ARB_01 - ARB_04.
      annotation: 'Legacy ref-id: ARB_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-008
      description: For ISO/IEC 18013-5-compliant attestations, the Attestation Rulebook
        SHALL define each attribute within an attribute namespace. An attribute namespace
        SHALL fully define the identifier, the syntax, and the semantics of each attribute
        within that namespace. An attribute namespace SHALL have an identifier that
        is unique within the scope of the EUDI Wallet ecosystem, and each attribute
        identifier SHALL be unique within that namespace.
      annotation: 'In ISO/IEC 18013-5, namespaces are discussed and a method for generating
        unique namespace identifiers is recommended. | Legacy ref-id: ARB_06a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-009
      description: 'For [SD-JWT VC]-compliant attestations, the Scheme Provider for
        the Attestation Rulebook SHALL ensure that each claim name is either: - included
        in the IANA registry for JWT claims, - is a Public Name as defined in [RFC
        7519], or is a Private Name specific to the attestation type.'
      annotation: '[SD-JWT VC] does not discuss how to avoid conflicting claim names.
        Since SD-JWTs are a special kind of JWTs, the methods specified in RFC 7519
        are applicable. | Legacy ref-id: ARB_06b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-010
      description: When determining the attributes to be included in a new attestation
        type, the Scheme Provider for the applicable Attestation Rulebook SHOULD consider
        referring to attributes that are already included in the catalogue of attributes
        specified in [Topic 25](./annex-2.02-high-level-requirements-by-topic.md#a2315-topic-25---unified-definition-and-controlled-vocabularies-for-attributes)
        or specified in an attestation scheme included in the catalogue of attestation
        schemes specified in [Commission Implementing Regulation 2025/1569](http://data.europa.eu/eli/reg_impl/2025/1569/oj),
        rather than unnecessarily re-defining all attributes.
      annotation: 'Legacy ref-id: ARB_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-011
      description: The Scheme Provider for an Attestation Rulebook SHOULD, when specifying
        a new attribute, take into consideration existing conventions for attribute
        identifier values and attribute syntaxes.
      annotation: 'These conventions may depend on the format of the attestation,
        i.e., CBOR for ISO/IEC 18013-5-compliant attestations or JSON for SD-JWT VC-compliant
        attestations. | Legacy ref-id: ARB_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-012
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-012
      description: The Scheme Provider for an Attestation Rulebook SHALL specify,
        for each attribute in the attestation, whether the presence of that attribute
        is mandatory, optional, or conditional.
      annotation: 'Legacy ref-id: ARB_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-013
      description: The Scheme Provider for an Attestation Rulebook for an ISO/IEC
        18013-5 compliant attestation MAY define a domestic namespace to specify attributes
        that are specific to that Rulebook and are not included in the applicable
        EU-wide or sectoral namespace. All requirements for namespaces in this Topic
        SHALL also apply for domestic namespaces.
      annotation: 'Legacy ref-id: ARB_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-014
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA or a PuB-EAA SHALL include in the Rulebook an
        attribute as meant in [Annex V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point a) and [Annex VII](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-56-1)
        point a) of the [European Digital Identity Regulation]. This attribute SHALL
        reference the technical specification meant in ARB_25.
      annotation: 'Legacy ref-id: ARB_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-015
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHOULD include an attribute in
        the Rulebook indicating that the attestation is an EAA. This attribute SHALL
        reference the technical specification meant in ARB_25.
      annotation: 'Legacy ref-id: ARB_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-016
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-016
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA SHALL include in the Rulebook one or more attributes
        or metadata representing the set of data meant in [Annex V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point b) of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-017
      description: The Scheme Provider for an attestation Rulebook describing a type
        of attestation that is a PuB-EAA SHALL include in the Rulebook one or more
        attributes or metadata representing the set of data meant in [Annex VII](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-56-1)
        point b) of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-018
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-018
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHOULD include in the Rulebook
        one or more attributes or metadata representing the set of data meant in [Annex
        V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point b) of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-019
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-019
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA or a PuB-EAA SHALL include in the Rulebook one
        or more attributes representing the set of data meant in [Annex V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point c) or [Annex VII](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e46-55-1)
        point c) of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-020
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-020
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHOULD include in the Rulebook
        one or more attributes representing the set of data meant in [Annex V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point c) of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-021
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-021
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA or a PuB-EAA SHALL include in the Rulebook one
        or more attributes or metadata representing the set of data meant in [Annex
        V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point e) or [Annex VII](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-56-1)
        point e) of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-022
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-022
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHOULD include in the Rulebook
        one or more attributes representing the set of data meant in [Annex V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point e) of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: ARB_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-023
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-023
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA or a PuB-EAA SHALL include in the Rulebook one
        or more attributes or metadata representing the location meant in [Annex V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point h) or [Annex VII](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-56-1)
        point h) of the [European Digital Identity Regulation]. For a QEAA, this location
        SHALL indicate at least the URL at which a machine-readable version of the
        trust anchor to be used for verifying the QEAA can be found or looked up.
        For a PuB-EAA, this location SHALL indicate at least the URL at which a machine-readable
        version of the qualified certificate that signed the PuB-EAA can be found
        or looked up.
      annotation: 'Legacy ref-id: ARB_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-024
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.c
      ref_id: EW-DM-12-024
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHOULD include in the Rulebook
        one or more attributes or metadata representing the location at which a machine-readable
        version of the trust anchor to be used for verifying the EAA can be found
        or looked up.
      annotation: 'What this location indicates precisely is dependent on the nature
        of the mechanism used for distributing trust anchors - see requirement ARB_26.
        | Legacy ref-id: ARB_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9
      ref_id: A.2.3.9.D
      name: Miscellaneous requirements
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-025
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-025
      description: The Scheme Provider for an Attestation Rulebook SHALL specify all
        technical details necessary to ensure interoperability, security, and privacy
        of that attestation.
      annotation: 'An Attestation Rulebook may also specify requirements regarding
        how the Wallet Unit must display the attestation and the attributes in it
        to the User. | Legacy ref-id: ARB_22'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-026
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-026
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA or a PuB-EAA SHALL specify which of the revocation
        mechanisms specified in [Topic 7](./annex-2.02-high-level-requirements-by-topic.md#a235-topic-7---attestation-revocation-and-revocation-checking)
        SHALL be supported by that attestation.
      annotation: 'Legacy ref-id: ARB_23'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-027
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-027
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHALL specify whether that type
        of EAA must be revocable. If an EAA type must be revocable, the relevant Rulebook
        SHALL determine which of the revocation mechanisms specified in [Topic 7](./annex-2.02-high-level-requirements-by-topic.md#a235-topic-7---attestation-revocation-and-revocation-checking)
        SHALL be supported by that attestation.
      annotation: 'Legacy ref-id: ARB_24'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-028
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-028
      description: An Attribute Schema Provider SHALL include in its Attestation Rulebook
        the attribute ``attestation_legal_category``, specified in the [Attestation
        Rulebook Template](https://github.com/eu-digital-identity-wallet/eudi-doc-attestation-rulebooks-catalog/blob/main/template/attestation-rulebook-template.md),
        with the appropriate value as specified in the Template.
      annotation: 'This attribute contains the indication meant in [Annex V](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-54-1)
        point a) and [Annex VII](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e40-56-1)
        point a). | Legacy ref-id: ARB_25'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-029
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-029
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a non-qualified EAA SHOULD define in the Rulebook the
        mechanism(s) allowing a Relying Party to obtain, in a trustworthy manner,
        the trust anchor(s) of the EAA Providers issuing this type of EAA.
      annotation: '[TS 11](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/blob/main/docs/technical-specifications/ts11-interfaces-and-formats-for-catalogue-of-attributes-and-catalogue-of-schemes.md),
        section 4.3.1, recommends the use of the List of trusted entities (LoTE) data
        model as defined in [ETSI TS 119 602](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/issues/278)
        for non-qualified EAAs. | Legacy ref-id: ARB_26'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-030
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-030
      description: Empty
      annotation: 'Legacy ref-id: ARB_27'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-031
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-031
      description: An Attribute Scheme Provider SHOULD specify an attribute in an
        Attestation Rulebook that indicates whether the Attestation Provider during
        attestation issuance requested a cryptographic binding (as specified in [Topic
        18](./annex-2.02-high-level-requirements-by-topic.md#a2311-topic-18---combined-presentations-of-attributes))
        between the new attestation and an existing PID or attestation. If present
        in a Rulebook, the identifier for this attribute SHALL be ``cryptographically_bound_to``,
        and its contents SHALL be an attestation type or vct (see ARB_05).
      annotation: 'The meaning of this attribute, if present, is that this attestation
        is cryptographically bound to one or more attestations of the given attestation
        type or vct on this Wallet Unit. If a Relying Party receives this attribute
        from a Wallet Unit, it can subsequently request the Wallet Unit to send a
        proof of cryptographic binding between the attestation and an attestation
        indicated in the ``cryptographically_bound_to`` attribute. | Legacy ref-id:
        ARB_28'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-032
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-032
      description: The Scheme Provider for an Attestation Rulebook describing a type
        of attestation that is a QEAA, PuB-EAA, or non-qualified EAA SHOULD ensure
        that the structure and contents of the Attestation Rulebook follow the descriptions
        in the [Attestation Rulebook template](https://github.com/eu-digital-identity-wallet/eudi-doc-attestation-rulebooks-catalog/blob/main/template/attestation-rulebook-template.md).
      annotation: 'Legacy ref-id: ARB_29'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-033
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-033
      description: If an Attestation Rulebook specifies a [SD-JWT VC]-compliant attestation,
        the Scheme Provider for that Attestation Rulebook SHALL specify for all claims
        (i.e., all top-level properties, all nested properties, and all array entries)
        whether an Attestation Provider MUST, MAY, or MUST NOT make that claim selectively
        disclosable.
      annotation: 'a) This requirement does not apply to claims defined as non-selectively
        disclosable in [SD-JWT VC]. b) There will be use cases where a specific claim
        must not be disclosed without simultaneously disclosing one or more other
        claims. Such cases should be solved by making all of these claims members
        of the same JSON object (or elements of the same JSON array). That JSON object
        (or array) is then the claim that must be selectively disclosable, while the
        nested properties (or individual array elements) must not be selectively disclosable.
        c) This requirement does not apply to [ISO/IEC 18013-5]-compliant attestations,
        since in such attestations, by definition all data elements are selectively
        disclosable, while none of the key-value pairs or array elements inside a
        data element (if any) are selectively disclosable. | Legacy ref-id: ARB_30'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-034
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-034
      description: If an Attestation Rulebook specifies a [SD-JWT VC]-compliant attestation,
        the Scheme Provider for that Attestation Rulebook SHOULD consider defining
        a Type Metadata Document for it, as defined in Chapter 6 of [SD-JWT VC]. If
        the Scheme Provider defines such a document, it SHOULD contain the Claim Selective
        Disclosure Metadata (defined in Section 9.3 of [SD-JWT VC]) for each of the
        claims, in order to specify if that claim is selectively disclosable (see
        requirement ARB_30).
      annotation: 'Although a Type Metadata Document is a highly technical document,
        defining it has a number of advantages for developers, Attestation Providers,
        Relying Parties, and Wallet Units, as spelled out in Chapter 6 of [SD-JWT
        VC]. | Legacy ref-id: ARB_31'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-035
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-035
      description: Empty
      annotation: 'Legacy ref-id: ARB_32'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-036-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-036-1
      description: If a Scheme Provider for an Attestation Rulebook registers an attestation
        scheme in the catalogue of attestation schemes meant in [Commission Implementing
        Regulation 2025/1569](http://data.europa.eu/eli/reg_impl/2025/1569/oj), Article
        8, the registration SHALL include a reference to the corresponding Attestation
        Rulebook.
      annotation: 'By definition, an attestation scheme is machine-readable, whereas
        an Attestation Rulebook is human-readable. | Legacy ref-id: ARB_33'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-12-036-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.9.d
      ref_id: EW-DM-12-036-2
      description: The Scheme Provider for an Attestation Rulebook SHALL specify whether
        that attestation is device-bound or not.
      annotation: 'Legacy ref-id: ARB_34'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10
      assessable: false
      depth: 1
      ref_id: A.2.3.10
      name: Topic 16 - Signing documents with a Wallet Unit
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10
      ref_id: A.2.3.10.A
      name: Requirement for Wallet Providers
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-001
      description: Wallet Providers SHALL ensure that each User has the possibility
        to receive a qualified certificate for Qualified Electronic Signatures, bound
        to a QSCD, that is either local, external, or remotely managed in relation
        to the Wallet Instance.
      annotation: 'Legacy ref-id: QES_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-002
      description: 'Wallet Providers SHALL ensure that each User who is a natural
        person has, at least for non-professional purposes, free-of-charge access
        to a Signature Creation Application which allows the creation of free-of-charge
        Qualified Electronic Signatures using the certificates referred to in QES_01.
        Wallet Providers SHALL ensure that: - The Signature Creation Application SHALL,
        as a minimum, be capable of signing or sealing User-provided data and Relying
        Party-provided data. - The Signature Creation Application SHALL be implemented
        as part of a Wallet Solution or external to it (by providers of trust services
        or by Relying Parties). - The Signature Creation Application SHALL be able
        to generate signatures or seals in formats compliant with at least the mandatory
        formats referred to in QES_08.'
      annotation: 'a) Signature Creation Application (SCA): see definition in the
        ETSI TS 119 432 standard. 2) If the SCA is external to the Wallet Solution,
        it may be for example a separate mobile application, or be hosted remotely,
        for instance by the QTSP or by a Relying Party. | Legacy ref-id: QES_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-003
      description: For the use of the qualified certificate referred to in QES_01,
        Wallet Providers SHALL ensure that a Wallet Unit implements secure authentication
        of the User, as well as signature or seal invocation capabilities, as a part
        of a local, external or remote QSCD.
      annotation: 'Legacy ref-id: QES_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-004
      description: Wallet Providers SHALL enable their Wallet Units to interface with
        QSCDs using protocols and interfaces necessary for the implementation of secure
        User authentication and signature or seal functionality.
      annotation: 'In a Relying Party-centric flow, the remote QTSP will likely be
        selected by the Relying Party, which implies the QSCD is managed by the remote
        QTSP. In a Wallet Unit-driven flow, the User should be able to choose the
        QSCD. | Legacy ref-id: QES_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-005
      description: Wallet Providers SHALL enable their Wallet Units to be used for
        User enrolment to a remote QES Provider (i.e., a QTSP offering remote QES),
        except where the Wallet Unit interfaces with local or external QSCDs.
      annotation: 'Legacy ref-id: QES_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-006
      description: 'Wallet Providers SHALL ensure that their Wallet Solution supports
        at least one of the following options for remote QES signature creation: -
        remote QES creation through secure authentication to a QTSP signature web
        portal, - remote QES creation channelled by the Wallet Unit, - remote QES
        creation channelled by a Relying Party.'
      annotation: 'Legacy ref-id: QES_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-007
      description: Wallet Providers SHALL ensure that, where a Signature Creation
        Application relies on a remote Qualified Signature Creation Device and where
        it is integrated into a Wallet Instance, it supports the Cloud Signature Consortium
        API Specification 2.0 [CSC API].
      annotation: 'Legacy ref-id: QES_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-008
      description: 'Wallet Providers SHALL ensure that their Wallet Units are able
        to create signatures or seals in accordance with the mandatory PAdES format
        as specified in ETSI EN 319 142-1 V1.1.1 (2016-04). In addition, Wallet Providers
        SHOULD ensure that their Wallet Units are able to create signatures or seals
        in accordance with the following formats: - XAdES as specified in ETSI EN
        319 132-1 V1.2.1 (2022-02), - JAdES as specified in ETSI TS 119 182-1 V1.2.1
        (2024-07), - CAdES as specified in ETSI EN 3191 22-1 V1.3.1 (2023-06), and
        - ASiC as specified in ETSI EN 319 162-1 V1.1.1 (2016-04) and ETSI EN 319
        162-2 V1.1.1 (2016-04).'
      annotation: 'Legacy ref-id: QES_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-009
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-009
      description: Empty
      annotation: 'Legacy ref-id: QES_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-010
      description: Wallet Providers SHALL ensure that, where the Signature Creation
        Application is implemented as part of the Wallet Unit and is used to generate
        signatures or seals of the representation of the document or data to be signed
        or sealed, the Wallet Unit presents the representation of the document or
        data to be signed or sealed to the User.
      annotation: 'Legacy ref-id: QES_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-011
      description: Wallet Providers SHALL ensure that, where the Signature Creation
        Application is implemented as part of the Wallet Unit, a Wallet Unit computes
        the hash or digest of the document or data to be signed through a Signature
        Create Application component.
      annotation: 'Legacy ref-id: QES_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-012
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-012
      description: Wallet Providers SHALL ensure that a Wallet Unit is able to create
        the signature value of the document or data to be signed either using a local
        or a remote signing application.
      annotation: 'a local signing application is on-device. It may either be embedded
        in the Wallet Unit or be an external application. | Legacy ref-id: QES_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-013
      description: Wallet Providers SHALL ensure that a Wallet Unit provides a log
        of transactions related to qualified electronic signatures or seals generated
        by or through the Wallet Unit, allowing the User to view the history of previously
        signed data or documents, according to requirement DASH_04 in [Topic 19](./annex-2.02-high-level-requirements-by-topic.md#a2312-topic-19---user-navigation-requirements-dashboard-logs-for-transparency).
      annotation: 'If the signature is generated by a remote Signature Creation Application,
        the Wallet is at minimum used to authenticate the User to the remote QTSP
        and to obtain the User''s consent for the usage of the private signing key.
        The logs then record information about these processes. | Legacy ref-id: QES_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-014
      description: Wallet Providers SHALL ensure that the User will be able to explicitly
        authorise the creation of a qualified electronic signature or seal through
        their Wallet Unit.
      annotation: 'Legacy ref-id: QES_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-015
      description: Wallet Providers SHALL ensure that a Wallet Unit can verify, in
        remote signature creation scenarios, that the qualified electronic signature
        or seal creation device is part of a qualified service, which is carried out
        by a qualified trust service provider.
      annotation: 'Legacy ref-id: QES_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-016
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-016
      description: Wallet Providers SHOULD ensure that a Wallet Unit supports multiple-signing
        scenarios where multiple signatories are required to sign the same document
        or data.
      annotation: 'Legacy ref-id: QES_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-017
      description: Wallet Providers SHALL ensure that Wallet Units provide a signature
        creation confirmation upon the creation of a qualified electronic signature,
        informing the User about the outcome of the signature creation process.
      annotation: 'See also QES_17a. | Legacy ref-id: QES_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-018
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-018
      description: If the Signature Creation Application is external to the Wallet
        Unit, after the User authorises the usage of the private signing key, the
        Signature Creation Application SHALL return the outcome of the signature creation
        process to the Wallet Unit.
      annotation: 'Legacy ref-id: QES_17a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-019
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-019
      description: Wallet Providers SHALL configure at least one default qualified
        signing service in the Wallet Unit.
      annotation: 'Legacy ref-id: QES_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-020
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-020
      description: Wallet Providers SHALL ensure that, where the Signature Creation
        Application is implemented as part of the Wallet Unit, a Wallet Unit supports
        ETSI TS 119 101 (Electronic Signatures and Infrastructures (ESI) - Policy
        and security requirements for applications for signature creation and signature
        validation) when using signing keys managed by the QSCD, whether locally,
        externally, or remotely in relation to the Wallet Instance.
      annotation: 'Legacy ref-id: QES_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-021
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-021
      description: Empty
      annotation: 'Legacy ref-id: QES_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-022
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-022
      description: Empty
      annotation: 'Legacy ref-id: QES_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-023
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.a
      ref_id: AS-WP-16-023
      description: Empty
      annotation: 'Legacy ref-id: QES_22'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10
      ref_id: A.2.3.10.B
      name: Requirements for QTSPs
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-024
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.b
      ref_id: AS-WP-16-024
      description: 'QTSPs providing the remote QES part of a Wallet Solution SHALL
        support: 1. ETSI TS 119 431-1 (Electronic Signatures and Infrastructures (ESI)
        Part 1: TSP service components operating a remote QSCD / SCDev), 2. ETSI TS
        119 431-2 (Electronic Signatures and Infrastructures (ESI) - Policy and security
        requirements for trust service providers - Part 2: TSP service components
        supporting AdES digital signature creation), 3. ETSI TS 119 432 (Electronic
        Signatures and Infrastructures (ESI) - Protocols for remote digital signature
        creation). Wallet Providers and QTSPs providing the remote QES part of a Wallet
        Solution SHALL comply with Sole Control Assurance Level (SCAL) 2 as defined
        in CEN EN 419 241-1 (Trustworthy Systems Supporting Server Signing - Part
        1: General System Security Requirements).'
      annotation: 'Legacy ref-id: QES_23'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-025
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.b
      ref_id: AS-WP-16-025
      description: QTSPs providing the Signature Creation Application as part of the
        remote QES part of a Wallet Solution SHALL support ETSI TS 119 101 (Electronic
        Signatures and Infrastructures (ESI) - Policy and security requirements for
        applications for signature creation and signature validation).
      annotation: 'Legacy ref-id: QES_24'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10
      ref_id: A.2.3.10.C
      name: Requirements for Relying Parties
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-026
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.c
      ref_id: AS-WP-16-026
      description: Relying Parties providing the Signature Creation Application in
        a Relying Party-centric flow SHALL support ETSI TS 119 101 (Electronic Signatures
        and Infrastructures (ESI) - Policy and security requirements for applications
        for signature creation and signature validation).
      annotation: 'Legacy ref-id: QES_24a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10
      ref_id: A.2.3.10.D
      name: Requirements for the Commission
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-027
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.d
      ref_id: AS-WP-16-027
      description: Empty
      annotation: 'Legacy ref-id: QES_25'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-16-028
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.10.d
      ref_id: AS-WP-16-028
      description: Empty
      annotation: 'Legacy ref-id: QES_26'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      assessable: false
      depth: 1
      ref_id: A.2.3.11
      name: Topic 18 - Combined presentations of attributes
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-18-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      ref_id: AS-WP-18-001
      description: A Cryptographic Binding of Attestations scheme SHALL enable a WSCA/WSCD
        to prove that it manages two or more private keys, paired with two or more
        public keys provided to it by the Wallet Unit.
      annotation: 'a)These public keys may be included in WUAs, PIDs, attestations,
        or pseudonyms. b) The proof may be transitive, so a proof that two keys are
        stored/managed in the same WSCA/WSCD may be done by proving these keys relate
        to each other via a third key (also stored in the WSCA/WSCD). | Legacy ref-id:
        ACP_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-18-001
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      ref_id: AS-MS-18-001
      description: A Cryptographic Binding of Attestations scheme SHALL rely solely
        on algorithms included in the [ECCG Agreed Cryptographic Mechanisms v2.0](https://certification.enisa.europa.eu/document/download/a845662b-aee0-484e-9191-890c4cfa7aaa_en?filename=ECCG%20Agreed%20Cryptographic%20Mechanisms%20version%202.pdf).
      annotation: 'Legacy ref-id: ACP_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-18-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      ref_id: AS-AP-18-001
      description: A Cryptographic Binding of Attestations scheme SHOULD be implemented
        using a Zero-Knowledge Proof mechanism that satisfies the requirements specified
        in [Topic 53](./annex-2.02-high-level-requirements-by-topic.md#a2331-topic-53-zero-knowledge-proofs).
      annotation: 'Legacy ref-id: ACP_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-18-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      ref_id: AS-WP-18-002
      description: A Cryptographic Binding of Attestations scheme SHALL be compatible
        with the requirements for attestation issuance in this document, in particular
        [Topic 10](./annex-2.02-high-level-requirements-by-topic.md#a237-topic-10---issuing-a-pid-or-attestation-to-a-wallet-unit),
        as well as with requirements for both remote and proximity presentation flows
        in this document, in particular [Topic 1](./annex-2.02-high-level-requirements-by-topic.md#a231-topic-1---accessing-online-services-with-a-wallet-unit)
        and [Topic 24](./annex-2.02-high-level-requirements-by-topic.md#a2314-topic-24---user-identification-in-proximity-scenarios).
      annotation: 'Legacy ref-id: ACP_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-18-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      ref_id: AS-WP-18-003
      description: A Cryptographic Binding of Attestations scheme SHALL enable an
        Attestation Provider, during the issuance of an attestation, to request and
        obtain proof that the private key for the new attestation is managed by the
        same WSCA/WSCD as the private key of a PID or another attestation already
        existing on the Wallet Unit.
      annotation: 'ACP_05 and ACP_06 may require an addition to the common OpenID4VCI
        protocol referenced in requirement ISSU_01, or an extension or profile thereof.
        | Legacy ref-id: ACP_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-18-002
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      ref_id: AS-AP-18-002
      description: Empty
      annotation: 'Legacy ref-id: ACP_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-18-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.11
      ref_id: AS-AP-18-003
      description: Before making a request according to ACP_05, an Attestation Provider
        SHALL verify that the new attestation indeed belongs to the User of the existing
        PID or attestation.
      annotation: 'Legacy ref-id: ACP_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      assessable: false
      depth: 1
      ref_id: A.2.3.12
      name: Topic 19 - User navigation requirements (Dashboard logs for transparency)
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-001
      description: A Wallet Provider SHALL enable a User to access a user-friendly
        dashboard functionality in their Wallet Unit.
      annotation: 'Legacy ref-id: DASH_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-002
      description: 'The Wallet Unit SHALL log all transactions executed through the
        Wallet Unit, including any transactions that were not completed successfully.
        This log SHALL include all types of transaction executed through the Wallet
        Unit: a) PID or attestation issuance and re-issuance transactions, b) PID
        or attestation presentation transactions, c) Wallet-to-Wallet transactions
        (see [Topic 30](./annex-2.02-high-level-requirements-by-topic.md#a2319-topic-30---interaction-between-wallet-units)),
        d) pseudonym registration or presentation transactions, e) signature or seal
        creation transactions (see [Topic 16](./annex-2.02-high-level-requirements-by-topic.md#a2310-topic-16---signing-documents-with-a-wallet-unit)),
        f) data deletion requests sent to a Relying Party (see [Topic 48](./annex-2.02-high-level-requirements-by-topic.md#a2327-topic-48---blueprint-for-requesting-data-deletion-to-relying-parties)),
        g) reports sent to a Data Protection Authority (see [Topic 50](./annex-2.02-high-level-requirements-by-topic.md#a2328-topic-50---blueprint-to-report-unlawful-or-suspicious-request-of-data)),
        h) PID or attestation deletions by the User.'
      annotation: 'For the data to be logged for a data deletion request to a Relying
        Party or a report sent to a DPA, see Topic 48 and Topic 50, respectively.
        For other types of transaction, the data to be logged is specified in the
        requirements in this Topic. | Legacy ref-id: DASH_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-003
      description: The Wallet Unit SHALL retain transactions in the log at least for
        the minimum retention period specified in applicable legislation. If the Wallet
        Unit must delete transactions from the log, for instance because of size limitations,
        the Wallet Unit SHALL notify the User via the dashboard before doing so, indicating
        the potential consequences for the User's data protection rights, and SHALL
        instruct the User how to export the transactions that are about to be deleted.
        See DASH_07.
      annotation: 'Legacy ref-id: DASH_02a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-004
      description: The dashboard SHALL include a functionality to display to the User
        an overview of all transactions in the log.
      annotation: 'Legacy ref-id: DASH_02b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-005
      description: The transaction log meant in DASH_02 SHALL comply with all relevant
        requirement in [Technical Specification 10](../../technical-specifications/ts10-data-portability-and-download-(export).md),
        including measures to ensure and/or verify its confidentiality, integrity,
        and authenticity.
      annotation: 'Legacy ref-id: DASH_02c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-006
      description: 'For a PID or attestation presentation transaction executed through
        the Wallet Unit, the log SHALL contain at least: a) the date and time of the
        transaction, b) the name and unique identifier of the corresponding Relying
        Party, and the Member State in which that Relying Party is established, c)
        the name, contact details (if available), and unique identifier of the intermediary,
        if an intermediary is involved in the transaction, d) the attestation type(s)
        and the identifier(s) of the attribute(s) that were requested, as well as
        those that were presented, e) in the case of non-completed transactions, the
        reason for such non-completion, f) the URL of the online service of the Relying
        Party''s Registrar. g) the web form URL (if available), e-mail address (if
        available), and telephone number (if available) provided by the Relying Party
        for sending data deletion requests, see requirement RPRC_11 in [Topic 44](./annex-2.02-high-level-requirements-by-topic.md#a2326-topic-44---registration-certificates-for-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties),
        h) the name and country of the Data Protection Authority supervising the Relying
        Party, as well as the web form URL (if available), e-mail address (if available),
        and telephone number (if available) provided by this DPA for reporting suspicious
        attribute presentation requests. i) information on the intended use and the
        URL to the applicable privacy policy (if available).'
      annotation: 'The information in points g), h), and i) may be retrieved from
        the registration certificate or from the Registrar''s online service (see
        [Topic 44](../annex-2/annex-2.02-high-level-requirements-by-topic.md#a2326-topic-44---relying-party-registration-certificates)).
        | Legacy ref-id: DASH_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-007
      description: For a PID or attestation presentation transaction or a Wallet-to-Wallet
        transaction executed through the Wallet Unit, the log SHALL NOT contain the
        value of any attributes presented to the Relying Party or the Verifier Wallet
        Unit.
      annotation: 'Legacy ref-id: DASH_03a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-008
      description: 'For a Wallet-to-Wallet transaction executed through the Wallet
        Unit, the log SHALL contain at least: a) the date and time of the transaction,
        b) the role of the Wallet Unit (Holder Wallet Unit or Verifier Wallet Unit),
        c) the attestation type(s) and the identifier(s) of the attribute(s) that
        were requested, as well as those that were presented, d) in the case of non-completed
        transactions, the reason for such non-completion.'
      annotation: 'Legacy ref-id: DASH_03b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-009
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-009
      description: 'For a pseudonym registration or presentation transaction executed
        through the Wallet Unit, the log SHALL contain at least: a) the date and time
        of the transaction, b) identifying information about the Relying Party, if
        known to the Wallet Unit, c) whether it is a pseudonym registration or pseudonym
        presentation transaction, d) in the case of non-completed transactions, the
        reason for such non-completion.'
      annotation: 'Regarding point b), see PA_20 in [Topic 11](./annex-2.02-high-level-requirements-by-topic.md#a238-topic-11---pseudonyms).
        | Legacy ref-id: DASH_03c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-010
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-010
      description: If a presentation request contains transactional data, the Wallet
        Unit SHALL log the value of this transactional data only to the extent explicitly
        required by the applicable Technical Specification associated with the requested
        SUA attestation, and in accordance with data minimisation principles. If the
        applicable Technical Specification does not explicitly specify that transactional
        data shall be logged, the Wallet Unit SHALL NOT log the value of any transactional
        data.
      annotation: 'a) For the concepts of transactional data and SUA attestations
        and their related Technical Specifications, see [Topic 20](./annex-2.02-high-level-requirements-by-topic.md#a2313-topic-20---strong-user-authentication-for-electronic-payments).
        b) For example, for PSD2 Strong Customer Authentication transactions, the
        scope of transactional data to be included in the transaction log is defined
        in [Technical Specification 12](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications-private/blob/main/docs/technical-specifications/ts12-electronic-payments-SCA-implementation-with-wallet.md)
        and includes the payment transaction identifier and merchant name. | Legacy
        ref-id: DASH_03d'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-011
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-011
      description: 'For a signature or seal creation transaction executed through
        the Wallet Unit, the log SHALL contain at least: a) the date and time of the
        transaction, b) the document or data signed or sealed (if available to the
        Wallet Unit), c) in the case of non-completed transactions, the reason for
        such non-completion.'
      annotation: 'Legacy ref-id: DASH_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-012
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-012
      description: 'For a PID or attestation issuance or re-issuance transaction executed
        through the Wallet Unit, the log SHALL contain at least: a) the date and time
        of the transaction, b) the name, contact details (if available), and unique
        identifier of the corresponding PID Provider or Attestation Provider, c) the
        attestation type requested, as well as the attestation type issued, d) the
        number of attestations requested and issued (i.e., the size of the batch in
        case of batch issuance). d) in the case of non-completed transactions, the
        reason for such non-completion. e) for a re-issuance transaction, whether
        it was triggered by the User or by the Wallet Unit without involvement of
        the User, f) the URL of the associated Registrar''s online service.'
      annotation: 'This URL can be retrieved from the access certificate. | Legacy
        ref-id: DASH_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-013
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-013
      description: 'For the deletion of a PID or attestation by the User, the log
        SHALL contain at least: a) the date and time of the deletion event, b) the
        attestation type of the deleted PID or attestation. c) The name and unique
        identifier of the corresponding PID Provider or Attestation Provider.'
      annotation: 'This requirement is not about deletion of transactions from the
        log, as per DASH_06a. | Legacy ref-id: DASH_05a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-014
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-014
      description: The Wallet Provider SHALL ensure the confidentiality, integrity,
        and authenticity of all transactions included in the log.
      annotation: 'Legacy ref-id: DASH_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-015
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-015
      description: Via the dashboard, the Wallet Unit SHALL enable the User to delete
        any transaction in the log. Before deleting any transactions, the Wallet Unit
        SHALL indicate to the User the potential consequences for the User's data
        protection rights.
      annotation: 'This requirement applies even in case the minimum retention period
        specified in applicable legislation (see DASH_02a) is not yet over. | Legacy
        ref-id: DASH_06a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-016
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-016
      description: The Wallet Unit SHALL ensure that no entity other than the User
        can delete transactions from the log, except possibly for the reason mentioned
        in DASH_02a.
      annotation: 'Legacy ref-id: DASH_06b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-017
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-017
      description: The dashboard SHALL allow the User to export the details of one
        or more transactions in the log to a file, using the common format specified
        according to DASH_02c, while ensuring their confidentiality, authenticity
        and integrity. The file SHALL be stored in an external storage or remote storage
        location of the User's choice, from among the storage options supported by
        the Wallet Unit and SHALL use the common format and security measures specified
        according to DASH_02c.
      annotation: 'Legacy ref-id: DASH_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-018
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-018
      description: For a natural-person User, a Wallet Instance SHALL provide a User
        interface.
      annotation: 'Legacy ref-id: DASH_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-019
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-019
      description: The User interface referred to in DASH_08 SHALL provide a view
        with - the EU Digital Identity Wallet Trust Mark, - accompanying general information
        on the certification of Wallet Solutions, - links to the certification status
        information as defined in the [Technical Specification 1](../../technical-specifications/ts1-eudi-wallet-trust-mark.md).
      annotation: 'Legacy ref-id: DASH_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-020
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-020
      description: Positioning of the view meant in DASH_09 in the Wallet UI navigation
        SHALL follow design guidelines provided by the European Commission.
      annotation: 'Legacy ref-id: DASH_09a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-021
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-021
      description: Wallet Providers and Wallet Units SHALL comply with all relevant
        requirements in [Technical Specification 1](../../technical-specifications/ts1-eudi-wallet-trust-mark.md)
        for the EUDI Wallet Trust Mark.
      annotation: 'Legacy ref-id: DASH_09b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-022
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-022
      description: Empty.
      annotation: 'See requirement WIAM_12a in [Topic 40](./annex-2.02-high-level-requirements-by-topic.md#a2323-topic-40---wallet-instance-installation-and-wallet-unit-activation-and-management).
        | Legacy ref-id: DASH_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-023
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-023
      description: Empty
      annotation: 'Legacy ref-id: DASH_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-19-024
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.12
      ref_id: AS-WP-19-024
      description: The User interface referred to in DASH_08 SHALL enable the User,
        for each presentation transaction in the log, to easily request the Relying
        Party to delete any or all attributes presented to it in that transaction,
        or to send a report about that particular transaction to a DPA.
      annotation: 'Legacy ref-id: DASH_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      assessable: false
      depth: 1
      ref_id: A.2.3.13
      name: Topic 20 - Strong User authentication for electronic payments
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-001
      description: A Wallet Unit SHALL be able to process the transactional data included
        in a presentation request for the SUA attestation(s) specified in [Technical
        Specification 12](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications-private/blob/main/docs/technical-specifications/ts12-electronic-payments-SCA-implementation-with-wallet.md),
        according to all requirements in that Technical Specification.
      annotation: 'Technical Specification 12 specifies a SUA attestation intended
        for performing SCA as specified in the PSD2 Regulation. The related Rulebook
        is called "SCA Attestation Rulebook". | Legacy ref-id: SUA_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-002
      description: Scheme Providers MAY specify Attestation Rulebooks (see [Topic
        12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks))
        and associated technical specifications for SUA attestations other that the
        ones specified in [TS12](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications-private/blob/main/docs/technical-specifications/ts12-electronic-payments-SCA-implementation-with-wallet.md).
        The Attestation Rulebook or the technical specification of such of a SUA attestation
        SHALL specify the syntax and semantics of the transactional data associated
        with that attestation.
      annotation: 'Legacy ref-id: SUA_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-003
      description: The Technical Specification associated with a given SUA attestation
        SHALL specify all necessary requirements for Wallet Units to process transactional
        data intended for this SUA attestation, at least regarding a) rendering and
        displaying the data to the User when obtaining approval for presentation,
        b) processing (e.g., hashing) the data for inclusion in the device binding
        signature, and c) the scope of information to be logged about a SUA attestation
        presentation transaction by a Wallet Unit.
      annotation: 'Legacy ref-id: SUA_02a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-004
      description: The Attestation Provider of a SUA attestation other than the one(s)
        specified in [TS12](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications-private/blob/main/docs/technical-specifications/ts12-electronic-payments-SCA-implementation-with-wallet.md)
        SHALL NOT issue such an attestation to a Wallet Unit that does not comply
        with all relevant requirements in the SUA Attestation Rulebook and the technical
        specification for that attestation.
      annotation: 'Legacy ref-id: SUA_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-005
      description: In the response to a presentation request for a SUA attestation
        that includes transactional data, a Wallet Unit SHALL include (a representation
        of) that data, according to requirements included in the associated technical
        specification or Attestation Rulebook or in information provided to the Wallet
        Unit in the presentation request. In the latter case, the rules to interpret
        such information SHALL be included in the associated technical specification
        or Attestation Rulebook.
      annotation: 'This requirement, as well as SUA_05, only applies if the requested
        SUA attestation is present on the Wallet Unit and if the User consents to
        signing the transactional data and presenting the requested attributes. |
        Legacy ref-id: SUA_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-006
      description: The Wallet Unit SHALL include (a representation of) the transactional
        data received in a presentation request in the signature creation process
        used for device binding, using the private key of the requested SUA attestation
        and the mechanisms specified for key binding in [SD-JWT-VC] or mdoc authentication
        in [ISO/IEC 18013-5], as applicable. For this process, the Wallet Unit SHALL
        comply with the applicable requirements in the technical specification and
        the Attestation Rulebook for the requested SUA attestation, see SUA_01 or
        SUA_02.
      annotation: 'a) The resulting signature value constitutes a proof of transaction.
        This signature value, possibly in combination with other protocols items,
        fulfils the requirements for the authentication code required in [PSD2]. b)
        See also requirement OIA_02 in [Topic 1](./annex-2.02-high-level-requirements-by-topic.md#a231-topic-1---accessing-online-services-with-a-wallet-unit).
        | Legacy ref-id: SUA_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-007
      description: The Wallet Unit SHALL render or adapt the dialogue message(s) displayed
        to the User (like font size and colour, background colour, text position,
        labels in the buttons to 'approve' or 'reject' a transaction), according to
        requirements in [TS12](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications-private/blob/main/docs/technical-specifications/ts12-electronic-payments-SCA-implementation-with-wallet.md).
      annotation: 'Legacy ref-id: SUA_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-20-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.13
      ref_id: AS-WP-20-008
      description: Upon receiving a presentation request with transactional data,
        the Wallet Unit SHALL validate if the transactional data is intended for the
        given attestation and that the transactional data conforms to the related
        technical specification and/or Attestation Rulebook. In case the validation
        result is positive, the Wallet Unit SHALL process the transactional data in
        compliance with the related technical specification.
      annotation: 'Legacy ref-id: SUA_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      assessable: false
      depth: 1
      ref_id: A.2.3.14
      name: Topic 24 - User identification in proximity scenarios
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-24-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      ref_id: EW-PIO-24-001
      description: To enable identification using proximity flows, Wallet Units SHALL
        support device retrieval as specified in ISO/IEC 18013-5 for presenting PID
        or attestation attributes. Wallet Units SHALL comply with the requirements
        for mDLs and mdocs ISO/IEC 18013-5.
      annotation: 'Nominally, ISO/IEC 18013-5 is intended only for mDLs and mDL readers.
        The corresponding standard for mobile documents in general (including Wallet
        Units with the EUDI Wallet ecosystem) will be ISO/IEC 23220-4, which is based
        on ISO/IEC 18013-5. However, the latter standard is not finished yet and therefore
        cannot be referenced at the moment. To guarantee interoperability between
        Wallet Units and Relying Party Instances in proximity scenarios, it is necessary
        to make choices from among the possibilities specified in ISO/IEC 18013-5.
        Making the same choices as for mDLs ensure this. | Legacy ref-id: ProxId_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-24-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      ref_id: EW-PIO-24-002
      description: If a Relying Party supports using proximity flows, its Relying
        Party Instances SHALL support device retrieval as specified in ISO/IEC 18013-5
        for requesting PID or attestation attributes. Such Relying Party Instances
        SHALL comply with the requirements for mDL readers and mdoc readers in ISO/IEC
        18013-5.
      annotation: 'See note to ProxId_01. Support for proximity flows by Relying Parties
        is not mandatory. | Legacy ref-id: ProxId_01a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-24-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      ref_id: EW-PIO-24-003
      description: Wallet Units, PID Providers, Attestation Providers, Wallet Providers,
        and Relying Parties SHALL NOT support server retrieval as specified in ISO/IEC
        18013-5 for requesting and presenting PID or attestation attributes.
      annotation: 'Using server retrieval, a Relying Party would request User attributes
        directly from a PID Provider or Attestation Provider, after having received
        an authentication and/or authorisation token from the User''s Wallet Unit.
        | Legacy ref-id: ProxId_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-24-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      ref_id: EW-PIO-24-004
      description: A Wallet Unit SHALL present the presentation request and the identity
        of the Relying Party to the User when processing the request.
      annotation: 'Legacy ref-id: ProxId_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-24-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      ref_id: EW-PIO-24-005
      description: A Wallet Unit SHALL request its User to approve the presentation
        of attributes from their Wallet Unit for proximity identification before presenting
        them to the Relying Party or Verifier Wallet Unit.
      annotation: 'Legacy ref-id: ProxId_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-24-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      ref_id: EW-PIO-24-006
      description: A Wallet Unit SHALL transmit the requested User attributes to the
        requesting Relying Party Instance securely in accordance with ISO/IEC 18013-5
        for proximity flows.
      annotation: 'Legacy ref-id: ProxId_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-24-007
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.14
      ref_id: EW-PIO-24-007
      description: Empty
      annotation: 'Legacy ref-id: ProxId_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.15
      assessable: false
      depth: 1
      ref_id: A.2.3.15
      name: Topic 25 - Unified definition and controlled vocabularies for attributes
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-25-001
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.15
