    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-021
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-021
      description: If the WSCA/WSCD is able to export a private key, the Wallet Provider
        SHALL specify this capability as an attribute in the WUA.
      annotation: 'Legacy ref-id: WUA_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.c
      assessable: false
