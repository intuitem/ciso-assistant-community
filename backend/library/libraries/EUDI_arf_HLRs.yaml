      ref_id: AS-WP-30-001
      description: A Wallet Unit SHALL be able to act as a Holder Wallet Unit, in
        accordance with all requirements in this Topic.
      annotation: 'Legacy ref-id: W2W_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-002
      description: When acting as a Holder Wallet Unit, if there is a contradiction
        between a requirement for Holder Wallet Units in this Topic and any requirement
        for Wallet Units in other Topics in this document, the requirement in this
        Topic SHALL take precedence. However, when acting as a Holder Wallet Unit,
        a Wallet Unit SHALL comply with all requirements for Wallet Units in other
        Topics in this document that do not contradict any requirement in this Topic.
      annotation: 'Legacy ref-id: W2W_02'
