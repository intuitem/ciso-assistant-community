urn: urn:intuitem:risk:library:eudi_arf_hlrs
locale: en
ref_id: EUDI_ARF_ANNEX 2.02 - High-Level Requirements by topic
name: EUDI_ARF_ANNEX 2.02 - High-Level Requirements by topic
description: This annex to the ARF main document includes high-level requirements
  (HLRs) related to the EUDI Wallet ecosystem. The requirements define the responsible
  actor that should implement each requirement. There are no requirements imposed
  on the Users.
copyright: EU
version: 1
publication_date: 2026-03-26
provider: EU
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:eudi_arf_hlrs
    ref_id: EUDI_ARF_ANNEX 2.02 - High-Level Requirements by topic
    name: EUDI_ARF_ANNEX 2.02 - High-Level Requirements by topic
    description: This annex to the ARF main document includes high-level requirements
      (HLRs) related to the EUDI Wallet ecosystem. The requirements define the responsible
      actor that should implement each requirement. There are no requirements imposed
      on the Users.
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      assessable: false
      depth: 1
      ref_id: A.2.3.1
      name: Topic 1 - Accessing Online Services with a Wallet Unit
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-001
      description: A Wallet Unit SHALL support [OpenID4VP] for remote presentation
        flows and [ISO/IEC 18013-5] for proximity presentation flows, to receive and
        respond to presentation requests for person identification data (PID) and
        attestations by Relying Parties.
      annotation: 'Legacy ref-id: OIA_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-002
      description: A Wallet Unit SHALL support proving cryptographic device binding
        between the WSCA/WSCD or a keystore included in the Wallet Unit and a PID
        or attestation, in accordance with [SD-JWT VC] or [ISO/IEC 18013-5].
      annotation: 'Such a mechanism is called ''mdoc authentication'' in [ISO/IEC
        18013-5] and ''key binding'' in [SD-JWT VC]. | Legacy ref-id: OIA_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-003
      description: When issuing, presenting, or verifying an attestation, Wallet Units,
        PID Providers, Attestation Providers, and Relying Parties SHALL only use cryptographic
        algorithms included in the [ECCG Agreed Cryptographic Mechanisms v2.0](https://certification.enisa.europa.eu/document/download/a845662b-aee0-484e-9191-890c4cfa7aaa_en?filename=ECCG%20Agreed%20Cryptographic%20Mechanisms%20version%202.pdf).
      annotation: 'Legacy ref-id: OIA_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-004
      description: Wallet Providers SHALL ensure that their Wallet Solution supports
        the protocol specified in 'OpenID for Verifiable Presentations', see [OpenID4VP],
        with additions and changes as documented in this Annex and in technical specifications
        referenced in this Annex.
      annotation: 'Legacy ref-id: OIA_03a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-005
      description: For remote presentation flows using redirects, when the format
        of the requested attestation complies with [ISO/IEC 18013-5], Relying Parties
        and Wallet Units SHALL comply with the requirements in [HAIP] Sections 5,
        5.1 and 5.3.1, as well as with the 'ISO mdocs' profile in Section 6.
      annotation: 'a) ''[HAIP] Section 5'' refers only to the requirements directly
        under the Section 5 heading. This does not include sections 5,1, 5.2, and
        5.3. b) For clarity: in [HAIP] v1.0, the ''ISO mdocs profile'' implies that
        Relying Parties and Wallet Units must comply with the applicable requirements
        in [OpenID4VP] Annex B.2. | Legacy ref-id: OIA_03b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-006
      description: For remote presentation flows using redirects, when the format
        of the requested attestation complies with [SD-JWT VC], Relying Parties and
        Wallet Units SHALL comply with the requirements in [HAIP] Sections 5, 5.1,
        and 5.3.2, as well as with the 'IETF SD-JWT VCs' profile in Section 6.
      annotation: 'a) ''[HAIP] Section 5'' refers only to the requirements directly
        under the Section 5 heading. This does not include sections 5,1, 5.2, and
        5.3. b) For clarity: in [HAIP] v1.0 Section 6, the ''IETF SD-JWT VCs profile''
        implies that Relying Parties and Wallet Units must comply with the requirements
        in [OpenID4VP] Annex B.3, as well as with the requirements in Section 6.1.
        | Legacy ref-id: OIA_03c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-007
      description: A Wallet Unit SHALL verify and process PID or attestation presentation
        requests from Relying Parties in accordance with the protocols and interfaces
        specified in [OpenID4VP] for remote flows.
      annotation: 'Legacy ref-id: OIA_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-008
      description: After verifying and processing a PID or attestation request, the
        Wallet Unit SHALL display to the User the identity of the requesting Relying
        Party and the requested attributes.
      annotation: 'Legacy ref-id: OIA_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-009
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-009
      description: A Wallet Unit SHALL present the requested attributes only after
        having received the User's approval.
      annotation: 'See also OIA_07. | Legacy ref-id: OIA_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-010
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-010
      description: A Wallet Unit SHALL support selective disclosure of attributes
        from PIDs and attestations to be presented to the requesting Relying Parties.
      annotation: 'Legacy ref-id: OIA_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-011
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-011
      description: Wallet Units and Relying Party Instances SHALL support the [W3C
        Digital Credentials API]](<https://wicg.github.io/digital-credentials/>) for
        remote presentation flows, provided that a) this API is a W3C Recommendation,
        b) this API complies with the expectations outlined in [Chapter 3](../../discussion-topics/f-digital-credential-api.md#3)
        of the Topic F discussion paper, and c) this API is broadly supported by relevant
        browsers and operating systems.
      annotation: 'Legacy ref-id: OIA_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-012
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-012
      description: If Wallet Units and Relying Party Instances do not support the
        [W3C Digital Credentials API], they SHALL implement adequate mitigations for
        the challenges described in [Section 4.4.3.1](../../architecture-and-reference-framework-main.md#4431-introduction)
        of the ARF main document.
      annotation: 'Legacy ref-id: OIA_08a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-013
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-013
      description: If a Wallet Unit supports the [W3C Digital Credentials API], it
        SHALL, by default (see OIA_08d), disclose the presence of all stored attestations
        (meaning their attestation type) to the Digital Credentials API framework,
        but it SHALL NOT disclose the presence of attributes in these attestations,
        nor their values.
      annotation: 'The latter restriction applies even if such disclosure would enhance
        the services provided by the operating system to the Wallet Unit, for example,
        attestation selection in the context of the Digital Credentials API. | Legacy
        ref-id: OIA_08b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-014
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-014
      description: If a Relying Party supports the [W3C Digital Credentials API],
        the Relying Party's presentation request MAY be processed by the browser and/or
        the operating system for searching available attestations, for preventing
        fraud targeting the User, or for troubleshooting purposes. Moreover, the request
        SHOULD be processed by the browser and/or the Operating System for User security
        purposes. However, the request SHALL NOT be processed by the browser and/or
        the operating system for market analysis purposes (including as a secondary
        purpose) or for the browser's and/or the operating system's own purposes.
      annotation: 'Legacy ref-id: OIA_08c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-015
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-015
      description: If a Wallet Unit supports the [W3C Digital Credentials API], it
        SHALL provide a global User setting to disable the disclosure of stored attestations
        to the Digital Credentials API framework, as described in OIA_08b. When this
        setting is set to disable disclosure, the Wallet Unit SHOULD subsequently
        enable the User to select individual attestations to be disclosed to the DC
        API.
      annotation: 'Legacy ref-id: OIA_08d'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-016
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-016
      description: If a Wallet Unit supports the [W3C Digital Credentials API], it
        SHALL use the CTAP-Hybrid flow only if the expectations outlined in Chapter
        4 of the [Topic F discussion paper](../../discussion-topics/f-digital-credential-api.md)
        are met.
      annotation: 'Legacy ref-id: OIA_08e'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-017
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-017
      description: For remote presentation flows the Wallet Unit SHALL ensure that
        the attributes included in the presented attestation are accessible only to
        the Relying Party Instance, by encrypting the presentation response.
      annotation: 'Legacy ref-id: OIA_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-018
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-018
      description: For both proximity and remote presentation flows, if a Wallet Unit
        contains two PIDs having the same encoding (e.g. ISO/IEC 18013-5 or SD-JWT
        VC-compliant) and a Relying Party requests a PID, the Wallet Unit SHALL ask
        the User which of these PIDs they want to present, unless the Wallet Unit
        can decide from context.
      annotation: 'Legacy ref-id: OIA_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-019
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-019
      description: For both proximity and remote presentation flows, if a Wallet Unit
        contains two attestations having the same encoding (e.g. ISO/IEC 18013-5 or
        SD-JWT VC-compliant) and the same attestation type, and a Relying Party requests
        an attestation of that type and encoding, the Wallet Unit SHALL ask the User
        which of these attestations they want to present, unless the Wallet Unit can
        decide from context.
      annotation: 'Attestation types are explained in [[Topic 12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks)].
        | Legacy ref-id: OIA_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-020
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-020
      description: For both proximity and remote presentation flows, a Relying Party
        SHALL validate the signature of a PID using a trust anchor provided in a PID
        Provider LoTE made available in accordance with [[Topic 31](./annex-2.02-high-level-requirements-by-topic.md#a2320-topic-31---notification-and-publication-of-pid-provider-wallet-provider-attestation-provider-access-certificate-authority-and-provider-of-registration-certificates)].
      annotation: 'Legacy ref-id: OIA_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-021
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-021
      description: For both proximity and remote presentation flows, a Relying Party
        SHALL validate the qualified signature of a QEAA in accordance with Art.32
        of the [European Digital Identity Regulation]. For the verification, the Relying
        Party SHALL use a trust anchor provided in a QEAA Provider Trusted List made
        available in accordance with [Art. 22](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=uriserv%3AOJ.L_.2014.257.01.0073.01.ENG#d1e2162-73-1)
        of the [European Digital Identity Regulation].
      annotation: 'Legacy ref-id: OIA_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-022
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-022
      description: For both proximity and remote presentation flows, a Relying Party
        SHALL validate the qualified signature of a PuB-EAA in accordance with [Art.32](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=uriserv%3AOJ.L_.2014.257.01.0073.01.ENG#d1e2594-73-1)
        of the [European Digital Identity Regulation]. For that verification, the
        Relying Party SHALL use the public key provided in the qualified certificate
        of the QTSP supporting the qualified signature. The Relying Party SHALL also
        validate the qualified certificate of the QTSP using a trust anchor provided
        in a Trusted List made available in accordance with [Art. 22](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=uriserv%3AOJ.L_.2014.257.01.0073.01.ENG#d1e2162-73-1)
        of the [European Digital Identity Regulation]. The Relying Party SHALL also
        verify the certified attributes of the qualified certificate, as specified
        in [Article 45f](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e3902-1-1).
      annotation: 'Legacy ref-id: OIA_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-01-023
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: EW-PIO-01-023
      description: For both proximity and remote presentation flows, a Relying Party
        SHALL validate the signature of a non-qualified EAA using a trust anchor provided
        according to the mechanism(s) specified in the applicable Rulebook, see [[Topic
        12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks)].
      annotation: 'a) OIA_12 - OIA_15 imply that a Relying Party Instance must know
        if the attestation it is requesting from a Wallet Instance is a PID, a QEAA,
        a PuB-EAA, or a non-qualified EAA. These requirements also imply that the
        Relying Party Instance must store trust anchors in such a way that, at the
        time of verification, it is able to distinguish between trust anchors usable
        either for PIDs, for QEAAs, for PuB-EAAs, or for non-qualified EAAs. b) PID
        Providers, QEAA Providers, and PuB-EAA Providers are trusted by other actors
        in the EUDI Wallet ecosystem to not fraudulently issue attestations (or PIDs)
        that they are not legally allowed to issue. This trust is warranted since
        these kinds of providers operate within a regulated framework and are regularly
        audited. However, non-qualified EAA Providers are unregulated and may not
        be completely trustworthy. Therefore, when it receives an non-qualified attestation,
        a Relying Party Instance may have to verify that the non-qualified EAA Provider
        is authorised or registered to issue this type of attestation, in addition
        to verifying the signature over the attestation using the EAA Provider''s
        trust anchor. Mechanisms allowing to do this should be defined in the applicable
        Rulebook, see ARB_26. | Legacy ref-id: OIA_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-01-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.1
      ref_id: AS-RP-01-002
      description: When receiving a PID or attestation, a Relying Party Instance SHALL
        discard the values of all unique elements, including at least the ones mentioned
        in requirement ISSU_35 in [Topic 10](./annex-2.02-high-level-requirements-by-topic.md#a237-topic-10---issuing-a-pid-or-attestation-to-a-wallet-unit),
        as well as any timestamps, as soon as they are no longer needed. The Relying
        Party Instance SHALL NOT communicate these values to the Relying Party or
        to any other party inside or outside the EUDI Wallet ecosystem.
      annotation: 'Legacy ref-id: OIA_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2
      assessable: false
      depth: 1
      ref_id: A.2.3.2
      name: Topic 3 - PID Rulebook
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2
      ref_id: A.2.3.2.A
      name: Generic HLRs
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-01
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.a
      ref_id: EW-DM-03-01
      description: PIDs and PID Providers SHALL comply with all requirements in [PID
        Rulebook].
      annotation: 'Legacy ref-id: PID_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-02
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.a
      ref_id: EW-DM-03-02
      description: A PID Provider SHALL issue any PID in both the format specified
        in ISO/IEC 18013-5 [ISO/IEC 18013-5] and the format specified in [SD-JWT VC].
      annotation: '[CIR 2024/2977] mentions the W3C Verifiable Credentials Data Model
        v1.1 instead of [SD-JWT VC]. The latest stable version of this standard is
        [W3C VCDM 2.0]. However, W3C VCDM is not a complete specification of an attestation
        format. In particular, it does not specify a specific proof method to be used.
        Without additional specification, such as those in [W3C VC-JOSE-COSE] or [W3C
        VC Data Integrity], and making further choices, it is impossible to implement
        a PID based on W3C VCDM. This Rulebook considers [SD-JWT VC] to essentially
        be such an additional specification. See also [Section 5.3.4](../../architecture-and-reference-framework-main.md#534-w3c-verifiable-credentials)
        of the ARF main document. | Legacy ref-id: PID_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-03
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.a
      ref_id: EW-DM-03-03
      description: The portrait in a PID SHALL consist of a single portrait image
        in JPEG format. The portrait image SHALL comply with the quality requirements
        for a Full Frontal Image Type in ISO/IEC 19794-5 clauses 8.2, 8.3, and 8.4.
        However, the attribute portrait SHALL NOT comply with the format requirements
        in ISO/IEC 19794-5 clauses 8.1 and 8.5, meaning it SHALL NOT contain any of
        the headers or blocks specified in clause 5 except for the image data itself
        (a JPEG).
      annotation: 'Legacy ref-id: PID_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2
      ref_id: A.2.3.2.B
      name: HLRs for ISO/IEC 18013-5-compliant PIDs
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-04
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-04
      description: PID Providers SHALL use "eu.europa.ec.eudi.pid.1" as the attestation
        type for ISO/IEC 18013-5-compliant PIDs.
      annotation: 'a) This identifier uses the general format [Reverse Domain].[Domain
        Specific Extension]. Since the European Commission controls the domain ec.europa.eu,
        this attestation type identifier will not collide with any attestation type
        identifiers defined by other organisations in other Attestation Rulebooks.
        b) The version number 1 in this identifier is used to distinguish between
        the first version of the PID, defined in the [PID Rulebook](../annex-3/annex-3.01-pid-rulebook.md),
        and any future version, which will then have an incremented version number.
        | Legacy ref-id: PID_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-05
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-05
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        SHALL use the value "eu.europa.ec.eudi.pid.1" for the identifier of the namespace
        for the PID attributes specified in [Section 4.2 of the PID Rulebook](../annex-3/annex-3.01-pid-rulebook.md#42-encoding-of-pid-attributes-and-metadata).
      annotation: 'a) The version number 1 allows for future extension(s) or change(s)
        of the ISO/IEC 18013-5-compliant PID attributes. b) This namespace has the
        same value as the attestation type specified in requirement PID_04. This is
        allowed according to ISO/IEC 18013-5. | Legacy ref-id: PID_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-06
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-06
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        MAY include attributes that are not defined in the [PID Rulebook](../annex-3/annex-3.01-pid-rulebook.md).
        If so, these attributes SHALL be defined within a domestic PID namespace as
        meant in requirement ARB_10 in [Topic 12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks).
        The PID Provider SHALL generate the identifier for this domestic PID namespace
        by appending the applicable ISO 3166-1 alpha-2 country code or the ISO 3166-2
        region code, separated by a period, to the PID namespace identifier specified
        in PID_05, excluding the version number. The PID Provider MAY include a version
        number in the domestic PID namespace identifier.
      annotation: 'For example, the identifier of the first domestic PID namespace
        for Germany could be "eu.europa.ec.eudi.pid.de.1". | Legacy ref-id: PID_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-07
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-07
      description: A PID Provider that defines a domestic namespace SHALL publish
        the namespace, including all attribute identifiers, their definition, presence
        and encoding format, in an Attestation Rulebook complying with all applicable
        requirements in [Topic 12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks).
      annotation: 'Legacy ref-id: PID_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-08
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-08
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        SHALL include both the attributes and the metadata specified in [CIR 2024/2977]
        in the PID as (issuer-signed or device-signed) data elements.
      annotation: 'This implies that technically speaking, there is no difference
        between these attributes and metadata. | Legacy ref-id: PID_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-09
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-09
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        SHALL encode each attribute or metadata in the PID as specified in the third
        column of the tables in [Section 4.2.1 of the PID Rulebook](../annex-3/annex-3.01-pid-rulebook.md#421-overview).
      annotation: 'Legacy ref-id: PID_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-10
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        SHALL encode each attribute or metadata in the PID in Concise Binary Object
        Representation (CBOR) according to [RFC 8949].
      annotation: 'Legacy ref-id: PID_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-11
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        SHALL ensure that each PID contains at most one attribute with the same attribute
        identifier.
      annotation: 'Legacy ref-id: PID_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-12
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        SHALL ensure that the value of all attributes and metadata in the PID is valid
        at the value of the timestamp in the validFrom element in the MSO, see [ISO/IEC
        18013-5] clause 9.1.2.4.
      annotation: 'The value of the age_over_18, age_over_NN, or age_in_years attributes,
        if present, changes whenever the User to whom the person identification data
        relates has a relevant birthday. The value of many other attributes will also
        change over time. | Legacy ref-id: PID_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.b
      ref_id: EW-DM-03-13
      description: When issuing a PID compliant with [ISO/IEC 18013-5], a PID Provider
        SHALL ensure that the issuance_date attribute, if present, is not later than
        the validFrom element in the MSO, see [ISO/IEC 18013-5] clause 9.1.2.4.
      annotation: 'Legacy ref-id: PID_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2
      ref_id: A.2.3.2.C
      name: HLRs for SD-JWT VC-compliant PIDs
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-14
      description: A PID Provider issuing [SD-JWT VC]-compliant PIDs SHALL include
        the vct claim in their PIDs, where the vct claim SHALL be a URN within the
        `urn:eudi:pid:` namespace. The type indicated by the vct claim SHALL be `urn:eudi:pid:1`
        for the type defined in this document or a domestic type that extends it.
      annotation: 'Legacy ref-id: PID_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-15
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-15
      description: Empty
      annotation: 'Legacy ref-id: PID_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-16
      description: A PID Provider that defines a domestic type SHALL publish information
        about the type, including all claim identifiers, their definition, presence
        and encoding format, in an Attestation Rulebook complying with all applicable
        requirements in [Topic 12](./annex-2.02-high-level-requirements-by-topic.md#a239-topic-12---attestation-rulebooks).
      annotation: 'Legacy ref-id: PID_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-17
      description: When issuing a PID compliant with [SD-JWT VC], a PID Provider SHALL
        include both the attributes and the metadata specified in [CIR 2024/2977]
        in the PID as claims.
      annotation: 'This implies that technically speaking, there is no difference
        between these attributes and metadata. | Legacy ref-id: PID_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-18
      description: When issuing a PID compliant with [SD-JWT VC], a PID Provider SHALL
        encode each attribute or metadata in the PID as specified in the tables in
        [Section 5.2 of the PID Rulebook](../annex-3/annex-3.01-pid-rulebook.md#52-encoding-of-pid-attributes).
      annotation: 'Legacy ref-id: PID_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-19
      description: When issuing a PID compliant with [SD-JWT VC], a PID Provider SHALL
        ensure that the value of all attributes and metadata in the PID is valid at
        the value of the timestamp in the nbf claim, if present.
      annotation: 'The value of the age-related claims, if present, changes whenever
        the User to whom the person identification data relates has a relevant birthday.
        The value of many other attributes will also change over time. | Legacy ref-id:
        PID_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-20
      description: When issuing a PID compliant with [SD-JWT VC], a PID Provider SHALL
        ensure that the date_of_issuance claim, if present, is not later than the
        value of the timestamp in the nbf claim, if present.
      annotation: 'Legacy ref-id: PID_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-03-21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.2.c
      ref_id: EW-DM-03-21
      description: When issuing a PID compliant with [SD-JWT VC], a PID Provider SHALL
        make all claims (i.e., all top-level properties, all nested properties, and
        all array entries) selectively disclosable individually, except those claims
        defined as non-selectively disclosable in [SD-JWT VC].
      annotation: 'Legacy ref-id: PID_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.3
      assessable: false
      depth: 1
      ref_id: A.2.3.3
      name: Topic 4 - mDL Rulebook
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-04-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.3
      ref_id: EW-DM-04-001
      description: mDLs and mDL Providers SHALL comply with all requirements in [mDL
        Rulebook].
      annotation: 'Legacy ref-id: mDL_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4
      assessable: false
      depth: 1
      ref_id: A.2.3.4
      name: Topic 6 - Relying Party authentication and User approval
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4
      ref_id: A.2.3.4.A
      name: Relying Party authentication
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-001
      description: 'The Wallet Unit used by a User, as well as the Relying Party Instance
        used by the Relying Party, SHALL implement a mechanism for Relying Party authentication
        in PID or attestation presentation transactions. This mechanism SHALL: - enable
        the Wallet Unit to identify and authenticate the Relying Party, - enable the
        Wallet Unit to verify that the request from the Relying Party was not copied
        and replayed, - use an access certificate issued in accordance with [[Topic
        27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties)].'
      annotation: 'Legacy ref-id: RPA_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-002
      description: If a Wallet Unit supports the [W3C Digital Credentials API] for
        remote presentation flows, it SHALL retain full authority over the process
        meant in RPA_01. In particular, this process SHALL NOT be handled by a third
        party, including the browser and the operating system.
      annotation: 'Legacy ref-id: RPA_01a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-003
      description: For performing Relying Party authentication, Wallet Units and Relying
        Party Instances SHALL support access certificates as specified in ETSI TS
        119 475 and ETSI TS 119 411-8.
      annotation: 'In [ISO/IEC 18013-5], the Relying Party authentication mechanism
        is called mdoc reader authentication and uses an X.509 certificate. For [OpenID4VP],
        [HAIP] specifies that Client Identifier Prefix ``x509_hash`` must be used
        to authenticate the Relying Party; this also uses an X.509 certificate. |
        Legacy ref-id: RPA_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-06-001
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-RP-06-001
      description: Empty
      annotation: 'Legacy ref-id: RPA_02a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-004
      description: A Wallet Unit and a Relying Party Instance SHALL perform Relying
        Party authentication in all PID or attestation presentation transactions to
        Relying Parties, whether proximity or remote, using an access certificate.
      annotation: 'The actions both entities perform differ. For example, while the
        Relying Party creates a signature over some data in the request, the Wallet
        Unit validates that signature. | Legacy ref-id: RPA_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-005
      description: For the verification of access certificates, a Wallet Unit SHALL
        accept the trust anchors in the LoTE(s) of all Access Certificate Authorities
        notified by Member States.
      annotation: 'For more information about Access Certificate Authorities, please
        see [[Topic 31](./annex-2.02-high-level-requirements-by-topic.md#a2320-topic-31---notification-and-publication-of-pid-provider-wallet-provider-attestation-provider-access-certificate-authority-and-provider-of-registration-certificates)].
        | Legacy ref-id: RPA_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-006
      description: If Relying Party authentication fails for any reason, the Wallet
        Instance SHALL inform the User that the identity of the Relying Party could
        not be verified and that therefore the request is not trustworthy.
      annotation: 'Legacy ref-id: RPA_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-007
      description: If Relying Party authentication succeeds, the Wallet Instance SHALL
        display to the User the name of the Relying Party as included in the access
        certificate received from the Relying Party Instance, together with the attributes
        requested by the Relying Party. The Wallet Instance SHALL do so when asking
        the User for approval according to RPA_07.
      annotation: 'If the Relying Party is an intermediary acting on behalf of an
        intermediated Relying Party, the Wallet Instance displays the names of both
        the intermediary and the intermediated Relying Party to the User, see RPI_07.
        | Legacy ref-id: RPA_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.a
      ref_id: AS-WP-06-008
      description: If Relying Party authentication fails for any reason, the Wallet
        Unit SHALL notify the User. In addition, the Wallet Unit SHALL either not
        present the requested attributes to the Relying Party, or give the User the
        choice to present the requested attributes or not.
      annotation: 'It is up to the Wallet Provider to make a choice for one of these
        two options. | Legacy ref-id: RPA_06a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4
      ref_id: A.2.3.4.B
      name: User approval
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-009
      description: A Wallet Unit SHALL ensure the User approved the presentation of
        any attribute(s) in the Wallet Unit to a Relying Party or Verifier Wallet
        Unit, prior to presenting these attributes. A Wallet Unit SHALL always allow
        the User to refuse presenting an attribute requested by the Relying Party
        or Verifier Wallet Unit.
      annotation: 'Legacy ref-id: RPA_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-010
      description: If a Wallet Unit supports the [W3C Digital Credentials API] for
        remote presentation flows, it SHALL retain full authority over the process
        meant in RPA_07. In particular, this process SHALL NOT be handled by a third
        party, including the browser and the operating system.
      annotation: 'Legacy ref-id: RPA_07a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-011
      description: A Wallet Unit SHALL authenticate the User before allowing the User
        to give or refuse approval for releasing any attributes, in accordance with
        WIAM_14 or WIAM_15, as applicable.
      annotation: 'Legacy ref-id: RPA_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-012
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-012
      description: Empty
      annotation: 'Legacy ref-id: RPA_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-013
      description: When asking for User approval, the Wallet Unit SHALL show to the
        User the User-friendly description of the Relying Party's intended use and,
        if available, the link to the applicable privacy policy.
      annotation: 'The User-friendly description of the Relying Party''s intended
        use is included in the presentation request and also in the registration certificate,
        if available. The link to the privacy policy is included in the registration
        certificate, or in the absence of a registration certificate, the Wallet Unit
        obtained the link from the Registrar''s online service, if the User requested
        this. See RPRC_19a and other requirements in [Topic 44](./annex-2.02-high-level-requirements-by-topic.md#a2326-topic-44---registration-certificates-for-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties)
        for details. | Legacy ref-id: RPA_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-014
      description: The Wallet Unit SHOULD ensure that the User gives approval either
        to present all attributes requested in a presentation request, or none of
        them.
      annotation: 'This means that a User should be asked either to approve the presentation
        of all requested attributes or to deny all of them. The Wallet Unit should
        not allow partial approval, since this would mean that the Relying Party cannot
        deliver the service, but nevertheless receives some User attributes. This
        would be a violation of the User''s privacy. Note that a Relying Party is
        not allowed to request more data than is justified for the intended use. So
        if the User feels that the Relying Party is actually requesting more data
        than needed, that implies that the Relying Party is not trustworthy and should
        not receive any data. | Legacy ref-id: RPA_10a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-015
      description: When the presentation of an attestation is denied by the User,
        the Wallet Unit SHALL behave towards the Relying Party as if the attestation
        did not exist.
      annotation: 'Legacy ref-id: RPA_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-06-016
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.4.b
      ref_id: AS-WP-06-016
      description: When asking for User approval, the Wallet Unit MAY indicate to
        the User whether the attestation requested by a Relying Party is device-bound
        or not.
      annotation: 'The intent of this indication is to warn the User than a non-device-bound
        attestation may be copied by the Relying Party and presented to a third party.
        | Legacy ref-id: RPA_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      assessable: false
      depth: 1
      ref_id: A.2.3.5
      name: Topic 7 - Attestation revocation and revocation checking
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-001
      description: 'A PID Provider, QEAA Provider, or PuB-EAA Provider SHALL use one
        of the following methods for revocation of a PID, QEAA, or PuB-EAA: - Only
        issue short-lived attestations having a validity period of 24 hours or less,
        such that revocation will never be necessary, - Use an Attestation Status
        List mechanism specified per VCR_11, or - Use an Attestation Revocation List
        mechanism specified per VCR_11.'
      annotation: 'The 24-hour period originates from ETSI EN 319 411-1 V1.4.1, requirement
        REV-6.2.4-03A. This requires that the process of revocation must take at most
        24 hours. Consequently, revocation may make no sense if the attestation is
        valid for less than 24 hours, because it may reach the end of its validity
        period before it is revoked. | Legacy ref-id: VCR_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-002
      description: A Wallet Provider SHALL use either the second or the third of the
        methods specified in VCR_01 for revocation of a WUA.
      annotation: 'Due to requirement WUA_08 in [Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation),
        it is not possible to issue short-lived WUAs. This implies that all WUAs are
        revocable. | Legacy ref-id: VCR_01a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-003
      description: For non-qualified EAAs, the relevant Rulebook SHALL specify whether
        that type of EAA must be revocable. If a non-qualified EAA type must be revocable,
        the relevant Rulebook SHALL determine which of the methods mentioned in VCR_01
        must be implemented by the relevant EAA Providers for the revocation of such
        an EAA.
      annotation: 'Legacy ref-id: VCR_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-004
      description: If a PID or attestation is revocable, the PID Provider of a given
        PID, or the Attestation Provider of a given attestation, SHALL be the only
        party in the EUDI Wallet ecosystem responsible for executing the revocation
        of that PID or attestation.
      annotation: 'A PID Provider or Attestation Provider MAY outsource the operation
        of the revocation process to a third party. | Legacy ref-id: VCR_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-005
      description: The Wallet Provider of a given WUA SHALL be the only party in the
        EUDI Wallet ecosystem responsible for executing the revocation of that WUA.
      annotation: 'A Wallet Provider MAY outsource the operation of the revocation
        process to a third party. | Legacy ref-id: VCR_03a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-006
      description: A PID Provider, Attestation Provider or Wallet Provider that revoked
        a PID, attestation, or WUA SHALL NOT reverse the revocation.
      annotation: 'Legacy ref-id: VCR_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-007
      description: If a PID, attestation, or WUA is revocable, the PID Provider, Attestation
        Provider, or Wallet Provider SHALL have a policy specifying under which conditions
        a PID, attestation, or WUA it issued will be revoked.
      annotation: 'Legacy ref-id: VCR_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-008
      description: If a PID or attestation is revocable, the PID Provider or Attestation
        Provider SHALL revoke a PID or attestation when its security has been compromised.
      annotation: 'Legacy ref-id: VCR_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-009
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-009
      description: A Wallet Provider SHALL revoke all valid WUAs issued to a Wallet
        Unit upon the explicit request of the User to revoke their Wallet Unit.
      annotation: 'Legacy ref-id: VCR_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-010
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-010
      description: If a PID is revocable, the PID Provider SHALL revoke that PID upon
        the explicit request of the User to whom the PID was issued.
      annotation: 'Legacy ref-id: VCR_07a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-011
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-011
      description: If an attestation is revocable, the Attestation Provider SHOULD
        revoke that attestation upon the explicit request of the User to whom the
        attestation was issued.
      annotation: 'Legacy ref-id: VCR_07b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-012
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-012
      description: If a PID is revocable, the PID Provider SHALL revoke that PID if
        the Wallet Unit on which it resides is revoked, in compliance with requirement
        WURevocation_18 in [Topic 38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation).
      annotation: 'Legacy ref-id: VCR_07c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-013
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-013
      description: If an attestation is revocable, the Attestation Provider MAY revoke
        that attestation if the Wallet Unit on which it resides is revoked, in compliance
        with requirement WURevocation_19 in [Topic 38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation).
      annotation: 'Legacy ref-id: VCR_07d'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-014
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-014
      description: If a PID is revocable, the PID Provider SHALL revoke a PID upon
        the death of the natural person who is the subject of the PID.
      annotation: 'a) In addition, in these circumstances the PID Provider also requests
        the Wallet Provider to revoke the Wallet Unit, see WURevocation_11. b) The
        topic of Wallet Units for legal persons, possibly containing a legal-person
        PID, has has been removed from this ARF in view of the development of a separate
        business wallet. | Legacy ref-id: VCR_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-015
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-015
      description: If a PID or attestation is revocable, the PID Provider or Attestation
        Provider SHALL revoke that PID or attestation if the value of one or more
        of its attributes was changed (including attributes being added or deleted)
        and it is still valid for at least 24 hours. Subsequently, if the User's contact
        details are known, the PID Provider or Attestation Provider SHOULD, via an
        out-of-band manner, notify the User about the revocation and ask the User
        to request re-issuance of the PID or attestation using their Wallet Unit.
      annotation: 'If the value of the attributes is determined by a party different
        from the Provider, such as an Authentic Source, the Provider is responsible
        for ensuring that this third party notifies them about such changes. | Legacy
        ref-id: VCR_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-016
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-016
      description: Wallet Providers SHALL implement the attestation revocation mechanisms
        specified per VCR_11 in their Wallet Solutions.
      annotation: 'Legacy ref-id: VCR_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-017
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-017
      description: The Commission SHALL create or reference technical specifications
        providing all necessary details for PID Providers, Attestation Providers,
        and Wallet Providers to implement an Attestation Status List mechanism or
        an Attestation Revocation List mechanism for the PIDs, attestations, and WUAs
        they issue. These technical specifications SHALL also contain all details
        necessary for Relying Party Instances, Relying Parties, and Wallet Units interacting
        with other Wallet Units to use these mechanisms to verify the revocation status
        of PIDs, attestations, and WUAs.
      annotation: '''Attestation Status List'' and ''Attestation Revocation List''
        are specific mechanisms, defined in Annex 1. Attestation Revocation Lists
        are sometimes referred to as ''Identifier Lists''. | Legacy ref-id: VCR_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-018
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-018
      description: If a Relying Party decides it needs to be able to verify the revocation
        status of PIDs or attestations, it SHALL support both the Attestation Status
        List mechanism and the Attestation Revocation List mechanism specified per
        VCR_11.
      annotation: 'Per VCR_13, it is recommended but not mandatory for a Relying Party
        to verify whether a PID or attestation is revoked. | Legacy ref-id: VCR_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-019
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-019
      description: A PID Provider or Attestation Provider SHALL support both the Attestation
        Status List mechanism and the Attestation Revocation List mechanism specified
        per VCR_11 for verifying the revocation status of a WUA.
      annotation: 'Legacy ref-id: VCR_12a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-020
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-020
      description: A Relying Party Instance SHOULD verify the revocation status of
        a PID or attestation upon obtaining it from a Wallet Unit, following the steps
        specified per VCR_11. When a Relying Party considers deviating from this recommendation
        by not performing revocation checking, it SHALL perform a risk analysis considering
        all relevant factors for the use case, including risks to the User and risks
        to the Relying Party itself.
      annotation: 'Legacy ref-id: VCR_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-021
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-021
      description: A Relying Party SHALL perform a risk analysis considering all relevant
        factors for the use case, including risks to the User and risks to the Relying
        Party itself, to determine whether it will accept or refuse a PID or attestation
        in case no reliable information regarding the revocation status of that PID
        or attestation is available.
      annotation: 'Examples of conditions under which no reliable revocation information
        is available are 1) The attestation does not contain revocation information
        (because it is not revocable). 2) The Relying Party Instance is offline and
        any cached status information is no longer valid. 3) The latest attestation
        status lists or attestation identifier lists provided by the PID Provider
        or Attestation Provider (i.e., available online) are no longer valid. 4) The
        Relying Party Instance is offline, but the use case requires up-to-date revocation
        information (instead of trusting cached information that is still valid.)
        | Legacy ref-id: VCR_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-022
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-022
      description: A Relying Party Instance SHOULD NOT request the relevant Attestation
        Status List or Attestation Revocation List each time an attestation is presented
        to it by a Wallet Unit. Rather, the Relying Party operating the Relying Party
        Instance SHOULD download each new version of the list once, at a time and
        from a location unrelated to the presentation of a PID or attestation by a
        User. The Relying Party SHOULD then distribute the list to all of its Relying
        Party Instances, using an Relying Party-internal distribution mechanism. Each
        Relying Party Instance SHOULD cache the list, so that it can perform revocation
        checks without making an online request. The Relying Party SHOULD perform
        a risk analysis to determine the frequency with which it will download the
        revocation lists and the maximum caching period its Relying Party Instances
        will use.
      annotation: 'Legacy ref-id: VCR_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-023
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-023
      description: A PID Provider, Attestation Provider or Wallet Provider SHALL NOT
        require the Relying Party or Relying Party Instance to authenticate itself
        before downloading an Attestation Status List or Attestation Revocation List.
      annotation: 'Legacy ref-id: VCR_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-024
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-024
      description: When using an Attestation Status List for revocation, the PID Provider,
        Attestation Provider or Wallet Provider SHALL randomly assign the index for
        each PID or attestation, to prevent this index from becoming a correlator.
      annotation: 'Randomly assigning indices within a bitstring or byte array is
        more complicated than creating random identifiers (e.g. serial numbers) for
        attestations, as is needed for an Attestation Revocation List. This is because
        duplicate indices and unnecessarily long bitstrings or byte arrays must be
        prevented. | Legacy ref-id: VCR_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-025
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-025
      description: When using an Attestation Status List for revocation, the PID Provider,
        Attestation Provider, or Wallet Provider SHALL represent a sufficiently large
        number of PIDs, attestations, or WUAs on each Attestation Status List to ensure
        herd privacy.
      annotation: 'In this context, herd privacy means that if an entity requests
        a particular status list, the PID Provider, Attestation Provider, or Wallet
        Provider is not able to deduce which PID, attestation or WUA (likely) was
        presented to that entity. Complying with this requirement may be difficult
        in case the number of PIDs, attestations, or WUAs to be represented on the
        list is small. In such a case, decoy entries can be added to the list to obfuscate
        the real number of referenced PIDs, attestations, or WUAs. | Legacy ref-id:
        VCR_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-07-026
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.5
      ref_id: AS-AP-07-026
      description: A Wallet Unit SHOULD regularly check the revocation status of its
        PIDs, attestations, and WUAs, and notify the User if a PID, attestation, or
        WUA (i.e, the Wallet Unit itself), is revoked.
      annotation: 'Legacy ref-id: VCR_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6
      assessable: false
      depth: 1
      ref_id: A.2.3.6
      name: Topic 9 - Wallet Unit Attestation and Wallet Instance Attestation
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6
      ref_id: A.2.3.6.A
      name: Wallet Unit Attestations
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-001
      description: A WUA SHALL contain information about the storage type and certification
        of the WSCA/WSCD or a keystore available to the Wallet Unit, and SHALL comply
        with the relevant requirements in [Technical Specification 3](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/blob/main/docs/technical-specifications/ts3-wallet-unit-attestation.md).
      annotation: 'A PID Provider or Attestation Provider can use this information
        to take a well-grounded decision on whether to issue a PID or attestation
        to the Wallet Unit. | Legacy ref-id: WUA_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-002
      description: The WUA SHALL enable PID Providers and Attestation Providers to
        verify the authenticity and revocation status of the Wallet Unit.
      annotation: 'Legacy ref-id: WUA_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-003
      description: A Wallet Provider SHALL ensure that a non-revoked Wallet Unit at
        all times presents a temporally valid and non-revoked WUA to a PID Provider
        or Attestation Provider during the issuance process of a PID or device-bound
        attestation.
      annotation: 'Legacy ref-id: WUA_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-004
      description: When issuing, presenting, or verifying a WUA, Wallet Providers,
        Wallet Units, PID Providers, and Attestation Providers SHALL only use cryptographic
        algorithms included in the [ECCG Agreed Cryptographic Mechanisms v2.0](https://certification.enisa.europa.eu/document/download/a845662b-aee0-484e-9191-890c4cfa7aaa_en?filename=ECCG%20Agreed%20Cryptographic%20Mechanisms%20version%202.pdf).
      annotation: 'Legacy ref-id: WUA_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-005
      description: During issuance of a PID, the Wallet Unit SHALL provide the PID
        Provider with a valid WUA describing the WSCA/WSCD that generated the new
        PID private key.
      annotation: 'A PID private key is always generated and managed by the WSCA/WSCD,
        which by definition complies with requirements for Level of Assurance High.
        | Legacy ref-id: WUA_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-006
      description: During issuance of a device-bound attestation, a Wallet Unit SHALL
        retrieve the requirements of the Attestation Provider regarding key storage
        from the Credential Issuer metadata (see ISSU_27). The Wallet Unit SHALL determine
        which of its WSCA/WSCD or keystore(s), if any, comply with these requirements.
        If a compliant WSCA/WSCD or keystore is available to the Wallet Unit, the
        Wallet Unit SHALL provide the Attestation Provider with a valid WUA describing
        the selected WSCA/WSCD or keystore.
      annotation: 'A WUA describes the properties of the WSCA/WSCD or a keystore (see
        WUA_01) and contains one or more public key(s) corresponding to private key(s)
        generated by and stored in that WSCA/WSCD or keystore (WUA_09). | Legacy ref-id:
        WUA_05a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-007
      description: If a Wallet Unit contains a WSCA/WSCD and one or more keystores,
        it SHALL, internally and securely, keep track of which PID(s) and attestation(s)
        are bound to which WSCA/WSCD or keystore.
      annotation: 'Legacy ref-id: WUA_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-008
      description: A Wallet Unit SHALL present a WUA only to a PID Provider or Attestation
        Provider, as part of the issuance process of a PID or a key-bound attestation,
        and not to a Relying Party or any other entity.
      annotation: 'Legacy ref-id: WUA_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.a
      ref_id: AS-WP-09-009
      description: A WUA SHALL enable PID Providers to request a Wallet Provider to
        revoke a Wallet Unit, in accordance with requirement WURevocation_11, by including
        an identifier for the Wallet Unit in the WUA. The Wallet Provider SHALL ensure
        that this Wallet Unit identifier does not enable tracking of the User.
      annotation: 'a) This is a legal requirement from [CIR 2024/2977]. See also [Section
        6.5.3.4 of the ARF main document](../../architecture-and-reference-framework-main.md#6534-wallet-provider-issues-one-or-more-wallet-unit-attestations-to-the-wallet-unit).
        b) The Wallet Unit identifier meant here can be the same as the one used for
        revoking the WUA, for instance a URI and index to an Attestation Status List
        (see [Topic 7](./annex-2.02-high-level-requirements-by-topic.md#a235-topic-7---attestation-revocation-and-revocation-checking)).
        | Legacy ref-id: WUA_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6
      ref_id: A.2.3.6.B
      name: WUA in relation to Cryptographic Keys
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-010
      description: A WUA SHALL contain one or more public keys, and the corresponding
        private keys SHALL be generated by and stored in the WSCA/WSCD or the keystore
        described in the WUA.
      annotation: 'a) By signing the WUA, the Wallet Provider attests to the fact
        that the private key(s) corresponding to the public key(s) in the WUA are
        generated by and stored in this WSCA/WSCD or keystore. This implies that the
        Wallet Provider has verified that this is actually the case. However, neither
        the ARF nor [TS3](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/blob/main/docs/technical-specifications/ts3-wallet-unit-attestation.md)
        specify at which moment the WSCA/WSCD or keystore generated the private keys,
        or how the Wallet Provider verified that it did so. b) After receiving a WUA
        during the issuance process for a (batch of) PID(s) or device-bound attestation(s),
        a PID Provider or Attestation Provider will include each of these public keys
        in a PID or attestation, thereby ensuring that this PID or attestation is
        bound to the WSCA/WSCD or keystore described in the WUA. | Legacy ref-id:
        WUA_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-011
      description: Wallet Providers SHALL ensure that the certificates they use for
        signing WUAs and WIAs comply with all applicable requirements in ETSI TS 119
        412-6, in particular Clause 5
      annotation: 'Legacy ref-id: WUA_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-012
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-012
      description: An Attestation Provider issuing non-device-bound attestations SHALL
        indicate in its in Credential Issuer metadata that it does not need a WUA,
        as specified in [TS3](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/blob/main/docs/technical-specifications/ts3-wallet-unit-attestation.md).
        A Wallet Unit SHALL NOT send a WUA to an Attestation Provider when requesting
        a non-device-bound attestation.
      annotation: 'A Wallet Unit sends a WIA to the Attestation Provider regardless
        of whether the attestations it issues are device-bound or not. | Legacy ref-id:
        WUA_10a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-013
      description: A Wallet Provider SHALL ensure that the presentation of a WUA is
        cryptographically bound to the specific context it is intended to be used
        in.
      annotation: 'As specified in [TS3](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/blob/main/docs/technical-specifications/ts3-wallet-unit-attestation.md),
        this is achieved by letting the signed WUA itself contain a nonce provided
        by the PID Provider or Attestation Provider during the issuance process. Alternatively,
        the Wallet Unit presents the WUA along with a Proof-of-Possession consisting
        of a signature over that nonce, created by the private key corresponding to
        one of the public keys attested in the WUA. | Legacy ref-id: WUA_10b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-014
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-014
      description: Empty
      annotation: 'Legacy ref-id: WUA_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-015
      description: During issuance of a PID or a device-bound attestation, the PID
        Provider or Attestation Provider SHALL verify the WUA in accordance with the
        requirements in OpenID4VCI Appendix F.4.
      annotation: 'As explained in the note to WUA_09, if the verification of the
        WUA is successful, the PID Provider or Attestation Provider can trust that
        all public keys in the WUA are bound to the WSCD or keystore described in
        the WUA. | Legacy ref-id: WUA_11a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-016
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-016
      description: Empty
      annotation: 'Legacy ref-id: WUA_11b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.b
      ref_id: AS-WP-09-017
      description: During issuance of a PID or a device-bound attestation, the PID
        Provider or Attestation Provider SHALL receive a proof that the Wallet Unit
        possesses the private keys corresponding to all public keys in the WUA.
      annotation: 'As specified in [TS3](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/blob/main/docs/technical-specifications/ts3-wallet-unit-attestation.md),
        this proof consist of the signature of the Wallet Provider over the WUA in
        combination with the proof mentioned in WUA_10b. | Legacy ref-id: WUA_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-018
      assessable: false
