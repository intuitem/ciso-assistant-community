      ref_id: AS-MS-27-022
      description: A Member State SHALL approve a PID Provider according to a well-defined
        policy before including it in its PID Provider Registry. To that end, a Member
        State SHALL define specific vetting processes and rules of acceptance for
        inclusion of PID Providers in its Registry.
      annotation: 'Legacy ref-id: Reg_19'
