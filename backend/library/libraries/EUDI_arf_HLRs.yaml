      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-003
      description: A Wallet Unit SHALL be able to act as a Verifier Wallet Unit, in
        accordance with all requirements in this Topic.
      annotation: 'Legacy ref-id: W2W_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-004
      description: When acting as a Verifier Wallet Unit, a Wallet Unit SHALL NOT
        comply with any requirement for Wallet Units in other Topics in this document.
      annotation: 'Legacy ref-id: W2W_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-005
      description: A Wallet Unit SHALL act as a Holder Wallet Unit only if the User
        selects a 'Holder Wallet Unit mode'. If the User closes the Wallet Unit, or
        after a period of non-activity, the Wallet Unit SHALL return to 'normal' mode.
      annotation: 'Legacy ref-id: W2W_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-006
      description: When entering the Holder Wallet Unit mode, a Wallet Unit SHALL
        inform its User that this mode should only be used for interactions with natural
        persons using a Wallet Unit, and that the User should not proceed if they
        are in fact interacting with a Relying Party.
      annotation: 'Legacy ref-id: W2W_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-007
      description: A Wallet Unit SHALL act as a Verifier Wallet Unit only if the User
        selects a 'Verifier Wallet Unit mode'. If the User closes the Wallet Unit,
        or after a period of non-activity, the Wallet Unit SHALL return to 'normal'
        mode.
      annotation: 'Legacy ref-id: W2W_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-30-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: EW-PIO-30-001
      description: A Verifier Wallet Unit and a Holder Wallet Unit SHALL support attestation
        presentation only in proximity, meaning they SHALL support only [ISO/IEC 18013-5]
        to communicate.
      annotation: 'Legacy ref-id: W2W_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-008
      description: Holder Wallet Units SHALL comply with the requirements for mDLs
        and for mdocs in ISO/IEC 18013-5, unless specified differently in [Technical
        Specification 9](../../technical-specifications/ts9-wallet-to-wallet-interactions.md).
      annotation: 'Legacy ref-id: W2W_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-009
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-009
      description: Verifier Wallet Units SHALL comply with the requirements for mDL
        readers and for mdoc readers in ISO/IEC 18013-5, unless specified differently
        in [Technical Specification 9](../../technical-specifications/ts9-wallet-to-wallet-interactions.md).
      annotation: 'Legacy ref-id: W2W_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-010
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-010
      description: A Holder Wallet Unit SHOULD provide the Holder, through a user-friendly
        UI, with the option to inform the Verifier Wallet Unit about the attributes
        which the Verifier should include in the presentation request, by sending
        a presentation offer. If the Holder creates a presentation offer, the Holder
        Wallet Unit SHALL transfer it to the Verifier Wallet Unit as specified in
        [Technical Specification 9](../../technical-specifications/ts9-wallet-to-wallet-interactions.md).
      annotation: 'TS9 specifies an extension of the device engagement structure specified
        in ISO/IEC 18013-5. | Legacy ref-id: W2W_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-011
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-011
      description: A Holder Wallet Unit SHALL recommend the Holder to create a presentation
        offer, as this will increase the chance of success of the use case.
      annotation: 'Legacy ref-id: W2W_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-012
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-012
      description: A Verifier Wallet Unit SHALL provide the Verifier, through a user-friendly
        UI, with the possibility to select the attributes that will be included in
        the presentation request.
      annotation: 'Legacy ref-id: W2W_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-013
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-013
      description: For the purposes of W2W_07, if the Verifier Wallet Unit received
        a presentation offer, it SHALL present this offer to the Verifier, and enable
        the Verifier to include one or more of the attributes in the offer into the
        presentation request. However, the Verifier Wallet Unit SHALL NOT allow the
        Verifier to include any attribute not present in the offer.
      annotation: 'Legacy ref-id: W2W_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-014
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-014
      description: For the purposes of W2W_07, if the Verifier Wallet Unit did not
        receive a presentation offer, it SHALL present the Verifier with a list of
        attributes that can be included in the presentation request. The Verifier
        Wallet Unit MAY ask the Verifier some questions about the purpose of the use
        case to narrow down the list.
      annotation: 'Legacy ref-id: W2W_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-015
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-015
      description: A Verifier Wallet Unit SHALL authenticate the Verifier and SHALL
        obtain the Verifier's approval prior to sending a presentation request to
        a Holder Wallet Unit.
      annotation: 'Legacy ref-id: W2W_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-016
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-016
      description: A Verifier Wallet Unit SHALL implement measures to limit the number
        of presentation requests it can send per unit of time, to prevent abuse of
        the Wallet-to-Wallet functionality by Relying Parties. The limitation strategy,
        for instance exponential backoff time between subsequent presentation requests
        or hard limits for the number of requests, SHALL be decided by the Wallet
        Provider, based on applicable requirements in [Technical Specification 9](../../technical-specifications/ts9-wallet-to-wallet-interactions.md).
      annotation: 'Legacy ref-id: W2W_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-017
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-017
      description: Empty
      annotation: 'Legacy ref-id: W2W_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-018
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-018
      description: When receiving a presentation response, a Verifier Wallet SHALL
        verify the received attestation according to requirements OIA_12 - OIA_15
        in [Topic 1](./annex-2.02-high-level-requirements-by-topic.md#a231-topic-1---accessing-online-services-with-a-wallet-unit).
      annotation: 'Legacy ref-id: W2W_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-019
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-019
      description: A Verifier Wallet Unit SHALL display all verified attributes to
        the Verifier.
      annotation: 'Legacy ref-id: W2W_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-020
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-020
      description: A Verifier Wallet Unit SHALL NOT persistently store any attestations
        or attributes received. A Verifier Wallet Unit SHOULD minimise the time the
        received presentation is stored in memory. A Verifier Wallet Unit SHALL comply
        with OIA_16 in [Topic 1](./annex-2.02-high-level-requirements-by-topic.md#a231-topic-1---accessing-online-services-with-a-wallet-unit).
      annotation: 'Legacy ref-id: W2W_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-30-021
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.19
      ref_id: AS-WP-30-021
      description: Wallet Providers SHOULD take measures to prevent a User from taking
        screenshots while their Wallet Unit is acting as a Verifier Wallet Unit.
      annotation: 'Legacy ref-id: W2W_22'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20
      assessable: false
      depth: 1
      ref_id: A.2.3.20
      name: Topic 31 - Notification and publication of PID Provider, Wallet Provider,
        Attestation Provider, Access Certificate Authority, and Provider of registration
        certificates
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20
      ref_id: A.2.3.20.A
      name: Generic requirements for notification
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-001
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.a
      ref_id: AS-MS-31-001
      description: Member States SHALL notify all PID Providers, PuB-EAA Providers,
        Wallet Providers, Access Certificate Authorities, and Providers of registration
        certificates to the European Commission, according all relevant requirements
        in [Technical Specification 2](../../technical-specifications/ts2-notification-publication-provider-information.md).
      annotation: 'Legacy ref-id: GenNot_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-002
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.a
      ref_id: AS-MS-31-002
      description: As part of [Technical Specification 2] referred to in GenNot_01,
        the European Commission SHALL establish standard operating procedures for
        the notification of a PID Provider, PuB-EAA Provider, Wallet Provider, Access
        Certificate Authority, or Provider of registration certificates to the Commission.
      annotation: 'The outcome of the notification procedure is the publication of
        the information notified by the Member State according to [Article 5a](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e1347-1-1)
        (18) in a machine and human readable manner using the common system mentioned
        in Section H, TLPub_01. | Legacy ref-id: GenNot_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-003
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.a
      ref_id: AS-MS-31-003
      description: 'The common system mentioned in GenNot_01 SHALL enable: - A secure
        notification channel between Member States and the Commission for all notifications.
        - A notification, verification, and publication process and associated validation
        steps (with follow-up and monitoring) at the Commission side. - Collected
        data to be processed, consolidated, signed or sealed, and published in both
        a machine-processable Trusted List or LoTE and in a human-readable format,
        manually and/or automatically using e.g. a web service and/or API.'
      annotation: 'Legacy ref-id: GenNot_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-004
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.a
      ref_id: AS-MS-31-004
      description: As regard to GenNot_03, second bullet, the Commission SHALL verify
        whether the notified data is complete and meets the technical specifications,
        while the Member States SHALL be responsible for the correctness of the notified
        information.
      annotation: 'Legacy ref-id: GenNot_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-005
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.a
      ref_id: AS-MS-31-005
      description: As part of the specifications referred to in GenNot_01, the European
        Commission SHALL establish standard operating procedures for the suspension
        or cancellation of a PID Provider, PuB-EAA Provider, Wallet Provider, Access
        Certificate Authority, or Provider of registration certificates. These operating
        procedures SHALL include unambiguous conditions for suspension or cancellation.
        As an outcome of the suspension or cancellation procedure, the status of the
        suspended or cancelled PID Provider, PuB-EAA Provider, Wallet Provider, Access
        Certificate Authority or Provider of registration certificates in the respective
        LoTE or Trusted List SHALL be changed to Invalid.
      annotation: 'Legacy ref-id: GenNot_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20
      ref_id: A.2.3.20.B
      name: Requirements for the notification of PID Providers
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-006
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      ref_id: AS-MS-31-006
      description: The European Commission SHALL establish technical specifications
        for the common set of information to be notified about PID Providers.
      annotation: 'Legacy ref-id: PPNot_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      ref_id: AS-WP-31-001
      description: 'The common set of information to be notified about a PID Provider
        SHALL include at least: 1. Identification data: i. MS/Country of establishment,
        ii. Name as registered in an official record, iii. Where applicable: a. A
        business registration number from an official record, b. Identification data
        from that official record. 2. PID Provider trust anchors, i.e., public keys
        and name as per point 1) ii) above, supporting the authentication of PIDs
        issued by the PID Provider, 3. Trust anchors of Access Certificate Authorities
        for PID Providers, i.e., public keys and CA name, supporting the authentication
        of the PID Provider by Wallet Units at the service supply point(s) listed
        per point 4. below. 4. Service supply point(s), i.e., the URL(s) at which
        a Wallet Unit can start the process of requesting and obtaining a PID.'
      annotation: 'a) Relating to point 3. above: PID Provider Access Certificate
        Authority trust anchors are notified separately from the Access Certificate
        Authority for Relying Parties (see Section G below), since PID Providers are
        -legally speaking- not Relying Parties. b) For the concept of an Access Certificate
        Authority, see also [[Topic 27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties)]
        and [Section 6.3.2 of the ARF main document](../../architecture-and-reference-framework-main.md#632-pid-provider-or-attestation-provider-registration-and-notification).
        | Legacy ref-id: PPNot_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-007
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      ref_id: AS-MS-31-007
      description: PID Providers SHALL ensure that all PIDs they issue can be authenticated
        using the PID Provider trust anchors notified to the Commission.
      annotation: 'Legacy ref-id: PPNot_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-008
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      ref_id: AS-MS-31-008
      description: PID Providers SHALL ensure that their access certificates can be
        authenticated using the applicable Access Certificate Authority trust anchors
        notified to the Commission.
      annotation: '[[Topic 6](./annex-2.02-high-level-requirements-by-topic.md#a234-topic-6---relying-party-authentication-and-user-approval)]
        describes how access certificates will be used. | Legacy ref-id: PPNot_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-009
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      ref_id: AS-MS-31-009
      description: PID Provider trust anchors SHALL be accepted because of their secure
        notification by the Member States to the Commission and by their publication
        in the corresponding Commission-compiled PID Provider LoTE, which is sealed
        by the Commission.
      annotation: 'Legacy ref-id: PPNot_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-010
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      ref_id: AS-MS-31-010
      description: Access Certificate Authority trust anchors SHALL be accepted because
        of their secure notification by the Member States to the Commission and by
        their publication in the corresponding Commission-compiled LoTE, which is
        signed or sealed by the Commission.
      annotation: 'Legacy ref-id: PPNot_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-011
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.b
      ref_id: AS-MS-31-011
      description: The format of a PID Provider LoTE SHALL comply with ETSI TS 119
        602 v1.1.1, including Annex D.
      annotation: 'Legacy ref-id: PPNot_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20
      ref_id: A.2.3.20.C
      name: Requirements for the notification of Wallet Providers
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.c
      ref_id: AS-WP-31-002
      description: The European Commission SHALL establish technical specifications
        for the common set of information to be notified about Wallet Providers.
      annotation: 'Legacy ref-id: WPNot_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.c
      ref_id: AS-WP-31-003
      description: 'The common set of information to be notified about a Wallet Provider
        SHALL include: 1. Identification data: i. MS/Country of establishment, ii.
        Name as registered in an official record, iii. Where applicable: a. Business
        registration number from an official record, and b. Identification data from
        the official record. 2. Wallet Provider trust anchors, i.e., public keys and
        name as per point 1. b. above, supporting the authentication of Wallet Unit
        Attestations and Wallet Instance Attestations issued by the Wallet Provider.
        3. Name and reference number of the certified Wallet Solution(s) provided
        by the Wallet Provider.'
      annotation: 'a) See [[Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation)]
        and [[Topic 38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation)]
        for the definition of the WUA and WIA. b) A Wallet Provider does not need
        an access certificate to interact with Wallet Units. | Legacy ref-id: WPNot_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.c
      ref_id: AS-WP-31-004
      description: Wallet Providers SHALL ensure that all WUAs and WIAs they issue
        can be authenticated using the trust anchors notified to the Commission.
      annotation: 'Legacy ref-id: WPNot_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.c
      ref_id: AS-WP-31-005
      description: Wallet Provider trust anchors SHALL be accepted because of their
        secure notification by the Member States to the Commission and by their publication
        in the corresponding Commission-compiled Wallet Provider LoTE, which is sealed
        by the Commission.
      annotation: 'Legacy ref-id: WPNot_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.c
      ref_id: AS-WP-31-006
      description: The format of a Wallet Provider LoTE SHALL comply with ETSI TS
        119 602 v1.1.1, including Annex E.
      annotation: 'Legacy ref-id: WPNot_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.c
      ref_id: AS-WP-31-007
      description: If a Wallet Provider is cancelled (see requirement GenNot_05 above),
        that Wallet Provider SHALL immediately revoke all of its valid WUAs, in accordance
        with the requirements in [Topic 38](./annex-2.02-high-level-requirements-by-topic.md#a2322-topic-38---wallet-unit-revocation).
        If a Wallet Provider is suspended, that Wallet Provider and the Member State
        SHALL agree on the necessary precautionary measures that need to be taken,
        which MAY include the immediate revocation of all or some of its valid WUAs.
      annotation: 'WIAs do not have to be revoked, since they are short-lived. | Legacy
        ref-id: WPNot_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20
      ref_id: A.2.3.20.D
      name: Requirements for the notification of PuB-EAA Providers
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-012
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.d
      ref_id: AS-MS-31-012
      description: The European Commission SHALL establish technical specifications
        for the common set of information to be notified about PuB-EAA Providers.
      annotation: 'Legacy ref-id: PuBPNot_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.d
      ref_id: AS-WP-31-008
      description: 'The common set of information to be notified by Member States
        about PuB-EAA Providers SHALL include at least: 1. Identification data: i.
        MS/Country of establishment, ii. Name as registered in an official record,
        iii. Where applicable: a. Registration number as in official record, and b.
        Official record identification data. iv. Identification data of the Union
        or national law under which a. Either the PuB-EAA Provider is established
        as the responsible body for the Authentic Source based on which the electronic
        attestation of attributes is issued, or b. The PuB-EAA Provider is the body
        designated to act on behalf of the responsible body referred to in point 1.
        iv. a. v.The conformity assessment report issued by a conformity assessment
        body, confirming that the requirements set out in paragraphs 1, 2 and 6 of
        [Article 45f](https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32024R1183#d1e3902-1-1)
        are met. 2. Service supply point(s), i.e., the URL(s) at which a Wallet Unit
        can start the process of requesting and obtaining a PuB-EAA from the PuB-EAA
        Provider.'
      annotation: 'Legacy ref-id: PuBPNot_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-013
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.d
      ref_id: AS-MS-31-013
      description: The format of the PuB-EAA Provider Trusted List SHALL comply with
        ETSI TS 119 612 v2.1.1.
      annotation: 'Legacy ref-id: PuBPNot_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20
      ref_id: A.2.3.20.E
      name: Requirements for the notification of Access Certificate Authorities and
        Providers of registration certificates
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-014
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-MS-31-014
      description: The European Commission SHALL establish technical specifications
        for the common set of information to be notified about Access Certificate
        Authorities and Providers of registration certificates.
      annotation: 'Legacy ref-id: RPACANot_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-WP-31-009
      description: 'The common set of information to be notified about an Access Certificate
        Authority or a Provider of registration certificates SHALL include: 1. Identification
        data: i) Member State or country of establishment, ii) Name as registered
        in an official record, iii) Where applicable: - A business registration number
        from an official record, - Identification data from that official record.
        2. Trust anchors of the Access Certificate Authority or Provider of registration
        certificates, i.e., public keys and name as per point 1) ii), supporting the
        authentication of access certificates and registration certificates by Wallet
        Units.'
      annotation: 'Legacy ref-id: RPACANot_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-015
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-MS-31-015
      description: Relying Parties, PID Providers, QEAA Providers, PuB-EAA Providers,
        and non-qualified EAA Providers SHALL ensure that their access certificates
        can be authenticated using the trust anchors of an Access Certificate Authority
        notified to the Commission.
      annotation: 'Legacy ref-id: RPACANot_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-016
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-MS-31-016
      description: Relying Parties, PID Providers, QEAA Providers, PuB-EAA Providers,
        and non-qualified EAA Providers SHALL ensure that their registration certificates,
        if issued to them, can be authenticated using the trust anchors of a Provider
        of registration certificates notified to the Commission.
      annotation: 'Legacy ref-id: RPACANot_03a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-017
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-MS-31-017
      description: The trust anchors of Access Certificate Authorities and Providers
        of registration certificates SHALL be accepted because of their secure notification
        by the Member States to the Commission and by their publication in the corresponding
        Commission-compiled LoTEs, which are signed or sealed by the Commission.
      annotation: 'Legacy ref-id: RPACANot_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-018-1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-MS-31-018-1
      description: The format of a LoTE for Access Certificate Authorities SHALL comply
        with ETSI TS 119 602 v1.1.1, including Annex F.
      annotation: 'Legacy ref-id: RPACANot_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-018-2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-MS-31-018-2
      description: The format of a LoTE for Providers of registration certificates
        SHALL comply with ETSI TS 119 602 v1.1.1, including Annex G.
      annotation: 'Legacy ref-id: RPACANot_05a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-31-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: EW-DM-31-001
      description: If an Access Certificate Authority is suspended or cancelled (see
        requirement GenNot_05 above), that Access Certificate Authority SHALL immediately
        revoke all of its temporally valid access certificates.
      annotation: 'This implies that if an intermediary obtained its access certificates
        from an Access Certificate Authority that is suspended or cancelled, any intermediated
        Relying Party depending on that intermediary will not be able to request attributes
        from Wallet Units, even though its registration is still valid. Such an intermediated
        Relying Party will either have to transit to another intermediary (which has
        access certificates issued by an active Access Certification Authority) or
        wait until the original intermediary obtains new access certificates either
        from another Access CA or from the original one, once that CA can continue
        its operations. | Legacy ref-id: RPACANot_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-019
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.e
      ref_id: AS-MS-31-019
      description: If a Provider of registration certificates is suspended or cancelled
        (see requirement GenNot_05 above), that Provider SHALL immediately revoke
        all of its valid registration certificates (if any). Moreover, the corresponding
        Registrar SHALL prohibit all access to the registry entries published online
        per Reg_03 and Reg_04.
      annotation: 'Legacy ref-id: RPACANot_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20
      ref_id: A.2.3.20.F
      name: Requirements for the publication of Trusted Lists and LoTES compiled by
        the Commission
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: AS-WP-31-010
      description: The European Commission SHALL establish technical specifications
        for the system enabling the publication by the Commission of the information
        notified by the Member States regarding PID Providers, Wallet Providers, PuB-EAA
        Providers, Access Certificate Authorities, and Providers of registration certificates.
      annotation: 'Legacy ref-id: TLPub_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: AS-WP-31-011
      description: The European Commission SHALL establish technical specifications
        for the set of information to be published about PID Providers, Wallet Providers,
        PuB-EAA Providers, Access Certificate Authorities and Providers of registration
        certificates, based on the information notified by the Member States.
      annotation: 'The information to be published MAY be different from the information
        to be notified per requirements PPNot_01, WPNot_01, PuBPNot_01, and RPACANot_01
        above, respectively. | Legacy ref-id: TLPub_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-31-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: EW-DM-31-002
      description: The publication of the information referred to in TLPub_01 SHALL
        take place over a secure channel protecting the authenticity and integrity
        of the published information.
      annotation: 'Legacy ref-id: TLPub_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-31-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: EW-DM-31-003
      description: The technical system mentioned in TLPub_01 SHALL NOT require authentication
        or prior registration and authorisation of any entity wishing to retrieve
        the published information.
      annotation: 'Legacy ref-id: TLPub_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-31-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: EW-DM-31-004
      description: The information referred to in TLPub_01 SHALL be published in an
        electronically signed or sealed form that is suitable for automated processing,
        and in a human-readable format, e.g., through introspection and display facilities,
        over an authenticated channel.
      annotation: 'Legacy ref-id: TLPub_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-012
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: AS-WP-31-012
      description: The Commission SHALL publish in the OJEU the locations of the LoTEs
        for PID Providers, Wallet Providers, Access Certificate Authorities, and Providers
        of registration certificates, as well as the location of the Trusted List(s)
        of PuB-EAA Providers.
      annotation: 'Legacy ref-id: TLPub_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-31-020
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: AS-MS-31-020
      description: The Commission SHALL publish in the OJEU the trust anchors to be
        used for verifying the signature or seal mentioned in TLPub_05.
      annotation: 'Legacy ref-id: TLPub_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-31-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.20.f
      ref_id: AS-WP-31-013
      description: As part of the specifications referred to in TLPub_01, the European
        Commission SHALL establish technical specifications for ensuring the availability
        and authenticity of the full history regarding the information notified about
        PID Providers, Wallet Providers, PuB-EAA Providers, Access Certificate Authorities,
        and Providers of registration certificates.
      annotation: 'Legacy ref-id: TLPub_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21
      assessable: false
      depth: 1
      ref_id: A.2.3.21
      name: Topic 34 - Migrate to a different Wallet Solution
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21
      ref_id: A.2.3.21.A
      name: Back-up requirements
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      ref_id: AS-WP-34-001
      description: 'A Wallet Unit SHALL include and keep up-to-date a Migration Object,
        containing the following information: - The contents of the log for all transactions
        executed through the Wallet Unit, as listed in requirement DASH_02. - A list
        of PIDs and attestations (except Wallet Unit Attestations and Wallet Instance
        Attestations) present in the Wallet Unit, according to the requirements in
        this Topic.'
      annotation: 'Legacy ref-id: Mig_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      ref_id: AS-WP-34-002
      description: The Migration Object SHALL comply with all requirements in [Technical
        Specification 10](../../technical-specifications/ts10-data-portability-and-download-(export).md).
      annotation: 'Legacy ref-id: Mig_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      ref_id: AS-WP-34-003
      description: For each PID or device-bound attestation that is issued to it,
        a Wallet Unit SHALL add to the Migration Object all data necessary to request
        issuance of that PID or attestation once again. This SHALL include at least
        the attestation type and the PID Provider or Attestation Provider that issued
        the PID or attestation, as well as their service supply points. However, the
        Migration Object SHALL NOT contain attribute identifiers or attribute values,
        and SHALL NOT contain any private keys of the PID or device-bound attestation.
      annotation: 'Legacy ref-id: Mig_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      ref_id: AS-WP-34-004
      description: 'For each non-device-bound attestation that is issued to it, a
        Wallet Unit SHALL add to the Migration Object one of the following: either
        all data necessary to request issuance of that attestation once again, as
        listed in Mig_03, or all data necessary to transfer the attestation to a new
        device without involvement of the Attestation Provider, including attribute
        identifiers and attribute values. The Wallet Unit SHALL enable the User to
        indicate if they want to store attribute identifiers and values in the Migration
        Object.'
      annotation: 'Legacy ref-id: Mig_03a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      ref_id: AS-WP-34-005
      description: If the User deletes a PID or attestation from their Wallet Unit,
        the Wallet Unit SHALL delete the corresponding entry from the Migration Object.
      annotation: 'Legacy ref-id: Mig_03b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      ref_id: AS-WP-34-006
      description: The Wallet Unit SHALL store the Migration Object in an external
        storage or remote storage location of the User's choice, from among the storage
        options supported by the Wallet Unit, in such a way that the User can still
        retrieve the object from a new Wallet Unit in case the existing Wallet Unit
        becomes unavailable.
      annotation: 'a) It is up to the Wallet Provider to decide which external storage
        options or remote storage locations the Wallet Unit supports for storing the
        Migration Object. b) The new Wallet Unit may be either an instance of the
        same Wallet Solution as the old one, or an instance of a different Wallet
        Solution. | Legacy ref-id: Mig_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.a
      ref_id: AS-WP-34-007
      description: The Wallet Unit SHALL store the Migration Object in such a way
        that its confidentiality, integrity, and authenticity is protected and that
        it is protected against use by others than the User.
      annotation: 'This could be done, for example, by using password-based cryptography
        to encrypt the object. | Legacy ref-id: Mig_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21
      ref_id: A.2.3.21.B
      name: Restore Requirements
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-008
      description: Directly after installation of a new Wallet Instance, the Wallet
        Instance SHALL enable the User to import a Migration Object from an external
        storage or remote storage location indicated by the User, from among the storage
        options supported by the Wallet Unit.
      annotation: 'Legacy ref-id: Mig_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-009
      description: When importing a Migration Object, for each PID and device-bound
        attestation listed in the Migration Object, the Wallet Unit SHALL enable the
        User to select that PID or attestation. When a PID or device-bound attestation
        is selected, the Wallet Unit SHALL request the respective PID Provider or
        Attestation Provider to re-issue that PID or attestation. If the User selects
        a PID, the PID SHALL be the first to be restored.
      annotation: 'Legacy ref-id: Mig_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-010
      description: When importing a Migration Object, for each non-device-bound attestation
        listed in the Migration Object, the Wallet Unit SHALL enable the User to select
        that attestation. When an attestation is selected, the Wallet Unit SHALL,
        depending on whether the Migration Object contains attribute identifiers and
        attribute values (see Mig_03a), either restore the attestation or request
        the respective Attestation Provider to re-issue it.
      annotation: 'Legacy ref-id: Mig_07a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-011
      description: When importing a Migration Object, the Wallet Unit SHALL ask the
        User whether they want to restore the log from the Migration Object. When
        the User agrees, the Wallet Unit SHALL restore the log, and SHALL append future
        transactions to this log according to the requirements in [Topic 19](./annex-2.02-high-level-requirements-by-topic.md#a2312-topic-19---user-navigation-requirements-dashboard-logs-for-transparency).
      annotation: 'Legacy ref-id: Mig_07b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-012
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-012
      description: Empty
      annotation: 'Legacy ref-id: Mig_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-013
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-013
      description: Empty
      annotation: 'Legacy ref-id: Mig_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-014
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-014
      description: Empty
      annotation: 'Legacy ref-id: Mig_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-015
      description: The processes and interfaces used for issuance of a PID or attestation
        as part of a migration process SHALL be the same as those used for a 'normal'
        issuance process, as specified in [Topic 10](./annex-2.02-high-level-requirements-by-topic.md#a237-topic-10---issuing-a-pid-or-attestation-to-a-wallet-unit).
      annotation: 'Legacy ref-id: Mig_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-016
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-016
      description: Empty
      annotation: 'Legacy ref-id: Mig_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-017
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-017
      description: Empty
      annotation: 'Legacy ref-id: Mig_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-018
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-018
      description: Empty
      annotation: 'Legacy ref-id: Mig_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-34-019
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.21.b
      ref_id: AS-WP-34-019
      description: Empty
      annotation: 'Legacy ref-id: Mig_15'
