      annotation: 'Legacy ref-id: CAT_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-25-005
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.15
      ref_id: AS-MS-25-005
      description: Empty
      annotation: 'Legacy ref-id: CAT_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-25-006
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.15
      ref_id: AS-MS-25-006
      description: Empty
      annotation: 'Legacy ref-id: CAT_03b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-25-007
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.15
      ref_id: AS-MS-25-007
      description: A request to include or to modify an attribute in the catalogue
        of attributes SHALL indicate how a QTSP can use the verification point for
        that attribute.
      annotation: 'This could be, for instance, in the form of (a reference to) an
        endpoint description text. | Legacy ref-id: CAT_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.16
      assessable: false
      depth: 1
      ref_id: A.2.3.16
      name: Topic 27 - Registration of PID Providers, Providers of QEAAs, PuB-EAAs,
        and non-qualified EAAs, and Relying Parties
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.16.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.16
      ref_id: A.2.3.16.A
      name: General requirements for Member State registration processes
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-27-001
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.16.a
      ref_id: AS-MS-27-001
      description: Member States SHALL provide processes and mechanisms for PID Providers,
        QEAA Providers, PuB-EAA Providers, non-qualified EAA Providers, and Relying
        Parties to register in a registry.
      annotation: 'Member States may choose to implement a single registry for all
        these roles, or a separate registry for each of these roles. | Legacy ref-id:
        Reg_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-27-002
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.16.a
      ref_id: AS-MS-27-002
      description: Member States SHALL register a common set of data about a) PID
        Providers, b) QEAA Providers, c) PuB-EAA Providers, d) non-qualified EAA Providers.
        and e) Relying Parties, according to the relevant requirements in [Technical
        Specification 6](../../technical-specifications/ts6-common-set-of-rp-information-to-be-registered.md).
      annotation: 'For PID Providers, QEAA Providers, PuB-EAA Providers, and non-qualified
        EAA Providers, the common set of data specified in [Technical Specification
        6] include the attestation type(s) that the provider intends to issue to Wallet
        Units. | Legacy ref-id: Reg_01a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-27-003
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.16.a
      ref_id: AS-MS-27-003
      description: Empty
      annotation: 'Legacy ref-id: Reg_01b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-27-004
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.16.a
      ref_id: AS-MS-27-004
      description: Member States SHALL make publicly available all necessary details
        and documentation about the registration processes for their registry.
      annotation: 'Legacy ref-id: Reg_02'
