      description: Member States SHALL publish the registry entries online, in a sealed
        or signed machine-readable common format suitable for automated processing,
        according to the relevant requirements in [Technical Specification 5](../../technical-specifications/ts5-common-formats-and-api-for-rp-registration-information.md),
        for the purpose of transparency to Users and other stakeholders.
      annotation: 'Legacy ref-id: Reg_03'
