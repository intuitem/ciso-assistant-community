    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22
      assessable: false
      depth: 1
      ref_id: A.2.3.22
      name: Topic 38 - Wallet Unit revocation
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22
      ref_id: A.2.3.22.A
      name: Issuing a Wallet Unit Attestation
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-38-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.a
      ref_id: AS-WP-38-001
      description: To enable a PID Provider or an Attestation Provider to verify the
        authenticity and the revocation status of a Wallet Unit it is interacting
        with, a Wallet Provider SHALL issue one or more Wallet Unit Attestations to
        the Wallet Unit, as specified in [Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation).
      annotation: 'The first of these WUAs will be issued during the activation phase
        of a Wallet Unit. During the lifetime of the Wallet Unit, the Wallet Provider
        will re-issue WUAs as needed. | Legacy ref-id: WURevocation_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-38-002
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.a
      ref_id: AS-WP-38-002
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.a
      ref_id: EW-DM-38-001
      description: "A Wallet Provider SHALL have a policy governing all aspects of\
        \ WUA issuance and management. The policy SHALL distinguish between WUAs for\
        \ WSCA/WSCDs and WUAs for keystores. For WUAs describing a WSCA/WSCD, the\
        \ policy SHALL comply with at least the extended normalised certificate policy\
        \ (\u2018NCP+\u2019) requirements as specified in ETSI EN 319 411-1, insofar\
        \ applicable for the issuance of WUAs rather than public key certificates.\
        \ For WUAs describing a keystore, the policy SHALL comply with at least the\
        \ normalised certificate policy (\u2018NCP\u2019) requirements as specified\
        \ in ETSI EN 319 411-1, insofar applicable for the issuance of WUAs rather\
        \ than public key certificates"
      annotation: 'A common dedicated policy for issuing WUAs may be developed in
        the future. If so, this requirement will be changed to refer to it. | Legacy
        ref-id: WURevocation_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-002
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.a
      ref_id: EW-DM-38-002
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-003
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.a
      ref_id: EW-DM-38-003
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22
      ref_id: A.2.3.22.B
      name: Revoking a Wallet Unit
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-004
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-004
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-005
      description: A Wallet Provider SHALL be able to revoke a Wallet Unit by revoking
        its WUA(s), as specified in [[Topic 7](./annex-2.02-high-level-requirements-by-topic.md#a235-topic-7---attestation-revocation-and-revocation-checking)].
      annotation: 'Legacy ref-id: WURevocation_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-006
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-006
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-007-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-007-1
      description: 'During the lifetime of a Wallet Unit, the Wallet Provider SHALL
        regularly verify that the security of the Wallet Unit is not breached or compromised.
        If the Wallet Provider detects a security breach or compromise, the Wallet
        Provider SHALL analyse its cause(s) and impact(s). If the breach or compromise
        affects the trustworthiness or reliability of the Wallet Unit, the Wallet
        Provider SHALL revoke the Wallet Unit and SHALL immediately revoke the corresponding
        WUA(s). The Wallet Provider SHALL do so at least in the following circumstances:
        - If the security of the Wallet Unit, or the security of the mobile device
        and OS on which the corresponding Wallet Instance is installed, or the security
        of the WSCA/WSCD it uses for managing critical cryptographic assets, is breached
        or compromised in a manner that affects its trustworthiness or reliability.
        - If the security of the Wallet Solution is breached or compromised in a manner
        that affects the trustworthiness or reliability of all corresponding Wallet
        Units. - If the security of the common authentication and data protection
        mechanisms used by the Wallet Unit is breached or compromised in a manner
        that affects their trustworthiness or reliability. - If the security of the
        electronic identification scheme under which the Wallet Unit is provided is
        breached or compromised in a manner that affects its trustworthiness or reliability.'
      annotation: 'Note to the first bullet: This corresponds to a Critical or High
        Risk level security posture risk status according to the table in [Section
        6.5.4.2 of the ARF main document](../../architecture-and-reference-framework-main.md#6542-wallet-unit-revocation),
        as analysed or detected for a Wallet Instance due to monitoring done according
        to WPSM_03. | Legacy ref-id: WURevocation_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-008-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-008-1
      description: If the Wallet Provider must revoke the entire Wallet Unit (e.g.,
        for one of the reasons stated in WURevocation_09), then the Wallet Provider
        SHALL revoke all WUAs related to the WSCA/WSCD and to all keystores.
      annotation: 'Legacy ref-id: WURevocation_09a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-009-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-009-1
      description: If there is a security breach of the WSCA/WSCD, then the Wallet
        Provider SHALL revoke the entire Wallet Unit by revoking all WUAs related
        to the WSCA/WSCD and to all keystores.
      annotation: 'Legacy ref-id: WURevocation_09b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-010-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-010-1
      description: If there is a security breach of a keystore, then the Wallet Provider
        SHALL at least revoke all WUAs related to that keystore. The Wallet Provider
        SHOULD also revoke the WUAs related to the WSCA/WSCD and to the other keystores
        (if any). If the Wallet Provider decides to only revoke the relevant keystore,
        the Wallet Provider SHALL create a risk analysis showing that this does not
        lead to unacceptable risks to the User, PID Providers and Attestation Providers,
        Relying Parties, or the Wallet Provider itself.
      annotation: 'If the Wallet Provider does not revoke the other WUAs, only the
        attestations bound to the revoked keystore will be impacted. Other functionalities
        of the Wallet Unit, including the presentation of a PID, will remain available
        to the User. | Legacy ref-id: WURevocation_09c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-011-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-011-1
      description: A Wallet Provider SHALL revoke a Wallet Unit upon the explicit
        request of the User registered during the Wallet Unit activation process,
        see [Topic 40](./annex-2.02-high-level-requirements-by-topic.md#a2323-topic-40---wallet-instance-installation-and-wallet-unit-activation-and-management).
        To do so, the Wallet Provider SHALL revoke all valid WUA(s) for that Wallet
        Unit. The Wallet Provider SHALL authenticate the User before accepting a request
        to revoke the Wallet Unit.
      annotation: 'Legacy ref-id: WURevocation_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-012
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-012
      description: A Wallet Provider SHALL revoke a Wallet Unit upon the explicit
        request of a PID Provider, in case the natural person using the Wallet Unit
        has died. To do so, the Wallet Provider SHALL revoke all valid WUA(s) for
        that Wallet Unit. To identify the Wallet Unit that is to be revoked, the PID
        Provider SHALL use a Wallet Unit identifier provided by the Wallet Provider
        in the WUA during PID issuance.
      annotation: 'See the notes to WUA_08. | Legacy ref-id: WURevocation_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-013
      description: Before revoking a Wallet Unit per WURevocation_11, the Wallet Provider
        SHALL verify that the party requesting revocation is indeed a valid PID Provider
        listed in the LoTE of PID Providers.
      annotation: 'Legacy ref-id: WURevocation_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.b
      ref_id: EW-DM-38-014
      description: Before requesting a Wallet Provider to revoke a Wallet Unit per
        WURevocation_11, the PID Provider SHALL ensure that the revocation does not
        harm the interests of any of the stakeholders. The PID Provider SHALL include
        a documented policy ensuring that this is the case in the policy meant in
        WURevocation_03.
      annotation: 'Legacy ref-id: WURevocation_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22
      ref_id: A.2.3.22.C
      name: Informing the User
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.c
      ref_id: EW-DM-38-015
      description: A Wallet Provider SHALL inform a User without delay, and within
        24 hours at most, in case the Wallet Provider decided to revoke the User's
        Wallet Unit. The Wallet Provider SHALL also inform the User about the reason(s)
        for the revocation. This information SHALL be understandable for the general
        public. It SHALL include (a reference to) technical details about any security
        breach if applicable. The Wallet Provider SHALL inform the User about the
        function(s) of the Wallet Unit that remain available to the User, if any,
        and functions that will not work any more. The Wallet Provider SHALL also
        inform the User about measures they can take to ensure they have a fully working
        Wallet Unit again as soon as possible, such as migrating to a different Wallet
        Solution.
      annotation: 'Functions that remain available to the User may include viewing
        their own attributes in their Wallet Unit and accessing their account at the
        Wallet Provider. | Legacy ref-id: WURevocation_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-016
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.c
      ref_id: EW-DM-38-016
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.c
      ref_id: EW-DM-38-017
      description: To inform a User about the revocation of their Wallet Unit, the
        Wallet Provider SHALL use a communication channel that is independent of the
        Wallet Unit. In addition, the Wallet Provider MAY use the Wallet Unit itself
        to inform the User.
      annotation: 'Legacy ref-id: WURevocation_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22
      ref_id: A.2.3.22.D
      name: Verifying the revocation status of a Wallet Unit
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-007-2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      ref_id: EW-DM-38-007-2
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-38-018
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      ref_id: AS-WP-38-018
      description: A PID Provider issuing revocable PIDs SHALL, for each of its valid
        PIDs, regularly verify whether the Wallet Provider revoked the Wallet Unit
        on which that PID is residing, using the revocation information in the WUA
        it received during issuance of that PID. If it turns out that the Wallet Unit
        is revoked, the PID Provider SHALL immediately revoke the respective PID in
        accordance with all requirements in [[Topic 7](./annex-2.02-high-level-requirements-by-topic.md#a235-topic-7---attestation-revocation-and-revocation-checking)].
      annotation: 'a) This is a consequence of the legal requirement in [CIR 2024/2977],
        Article 5, 4.(b). b) See [Technical Specification 3](../../technical-specifications/ts3-wallet-unit-attestation.md)
        for how the PID Provider can do this verification. c) The reverse is not true:
        When a PID is revoked, this does not imply that the Wallet Unit on which it
        is residing should also be revoked. Instead, the Wallet Unit moves to the
        Operational state. See [ARF main document Section 4.6.3](../../architecture-and-reference-framework-main.md#463-wallet-unit).
        | Legacy ref-id: WURevocation_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-38-019
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      ref_id: AS-WP-38-019
      description: An Attestation Provider issuing revocable attestations MAY decide
        to revoke an attestation if the Wallet Provider revoked the Wallet Unit on
        which that attestation is residing, in the same manner as described in WURevocation_18.
        An Attestation Provider SHALL publish its policy in this regard.
      annotation: 'Publishing its policy regarding revocation allows a Relying Party
        to decide if it can put sufficient trust in the attestations issued by that
        Attestation Provider. | Legacy ref-id: WURevocation_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-008-2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      ref_id: EW-DM-38-008-2
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_19a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-009-2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      ref_id: EW-DM-38-009-2
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_19b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-010-2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      ref_id: EW-DM-38-010-2
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-38-011-2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.22.d
      ref_id: EW-DM-38-011-2
      description: Empty
      annotation: 'Legacy ref-id: WURevocation_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23
      assessable: false
      depth: 1
      ref_id: A.2.3.23
      name: Topic 40 - Wallet Instance installation and Wallet Unit activation and
        management
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23
      ref_id: A.2.3.23.A
      name: HLRs for Wallet Instance installation
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.a
      ref_id: AS-WP-40-001
      description: To ensure that the User can trust the Wallet Solution, a Wallet
        Provider SHOULD make its certified Wallet Solution available for installation
        only via the official app store of the relevant operating system (e.g., Android,
        iOS).
      annotation: 'This allows the operating system of the device to perform relevant
        checks regarding the authenticity of the Wallet Unit. | Legacy ref-id: WIAM_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-002
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.a
      ref_id: AS-WP-40-002
      description: 'If a Wallet Provider makes its certified Wallet Solution available
        for installation through other means than the official OS app store, it SHALL
        implement a mechanism allowing the User to verify the authenticity of the
        Wallet Unit. Moreover, it SHALL provide clear instructions to the User on
        how to install the Wallet Instance, including at least: - instructions on
        the verification of the authenticity of the Wallet Instance to be installed,
        - instructions on bypassing of any operating system limitations on side-loading
        of apps, if applicable, and ensuring that these limitations are restored after
        the Wallet Instance has been installed.'
      annotation: 'This requirement also applies for the installation of a Wallet
        Instance on a User device that is not a mobile device, and for which no official
        operating system app store may exist. | Legacy ref-id: WIAM_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23
      ref_id: A.2.3.23.B
      name: HLRs for Wallet Unit activation
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-003
      description: A Wallet Provider SHALL ensure that a Wallet Instance starts a
        process to activate the new Wallet Unit with the Wallet Provider immediately
        after installation or when the User first opens the Wallet Instance. The Wallet
        Provider SHALL ensure that the Wallet Instance starts this process only with
        a secure backend of the Wallet Provider.
      annotation: 'Legacy ref-id: WIAM_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-004
      description: During the activation process of a new Wallet Unit, the Wallet
        Provider SHALL verify that the new Wallet Instance is a genuine instance of
        its Wallet Solution.
      annotation: 'Legacy ref-id: WIAM_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-005
      description: During the activation process of a new Wallet Unit, the Wallet
        Provider SHALL process information about the User device and the available
        WSCA/WSCD and keystore(s), as far as necessary to issue Wallet Unit Attestations
        and Wallet Instance Attestations to the Wallet Unit conform all requirements
        in [Topic 9](./annex-2.02-high-level-requirements-by-topic.md#a236-topic-9---wallet-unit-attestation-and-wallet-instance-attestation).
        The Wallet Provider MAY process additional information necessary for managing
        the Wallet Unit, but it SHALL NOT process more information than it reasonably
        needs for legitimate purposes. The Wallet Provider SHALL request User consent
        (through the Wallet Instance) for all information and data it will process,
        both during activation and throughout the lifetime of the Wallet Unit. The
        Wallet Provider SHALL inform the User about the purposes of data processing,
        in accordance with the General Data Protection Regulation.
      annotation: 'Legacy ref-id: WIAM_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-006
      description: The Wallet Provider SHALL request the User, through the new Wallet
        Instance, to set up a User account at the Wallet Provider. The Wallet Provider
        SHALL explain to the User that this is necessary to enable the User to request
        revocation of the Wallet Unit in case of theft or loss. The Wallet Provider
        SHALL register one or more User authentication methods that the Wallet Provider
        will use to authenticate the User in the future. These methods SHALL be independent
        of the Wallet Unit and the User device. The Wallet Provider SHALL allow the
        User to register using an alias instead of true identity data. The Wallet
        Provider SHALL NOT use any registered User data for purposes other than User
        authentication, unless the User gives explicit consent to do so. The Wallet
        Provider SHALL register the relationship between the Wallet Unit and the corresponding
        User account.
      annotation: 'Legacy ref-id: WIAM_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-007
      description: A Wallet Provider SHALL activate a new Wallet Unit before a User
        can use it to have issued an PID or attestation.
      annotation: 'One or more WUAs are issued as part of the activation process.
        | Legacy ref-id: WIAM_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-008
      description: A Wallet Provider SHALL only activate a new Wallet Unit if it has
        verified that the Wallet Unit includes a WSCA/WSCD that is certified to be
        compliant with applicable requirements for Level of Assurance High. In addition,
        the Wallet Unit MAY include one or more keystores.
      annotation: 'A WSCA/WSCD by definition complies with requirements for Level
        of Assurance High, see WIAM_14. | Legacy ref-id: WIAM_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-009
      description: If a WSCA/WSCD contains cryptographic assets related to multiple
        Wallet Units, the Wallet Provider SHALL ensure that a Wallet Unit can only
        access keys that are related to that Wallet Unit.
      annotation: 'Legacy ref-id: WIAM_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-010
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-010
      description: During the activation process of a new Wallet Unit, a Wallet Provider
        SHALL create and sign at least one Wallet Unit Attestation for the WSCA/WSCD
        and one Wallet Unit Attestation for each keystore, and issue them to the Wallet
        Unit. The Wallet Provider SHALL verify that the private key(s) corresponding
        to the public key(s) in each WUA are protected by the respective WSCA/WSCD
        or keystore, under control of the User.
      annotation: 'Legacy ref-id: WIAM_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-011
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.b
      ref_id: AS-WP-40-011
      description: During the activation process of a new Wallet Unit, the Wallet
        Provider SHALL offer the User a means to verify the formal certification information
        of their Wallet Solution.
      annotation: 'Legacy ref-id: WIAM_10a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23
      ref_id: A.2.3.23.C
      name: HLRs for Wallet Unit management
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-012
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-012
      description: Empty
      annotation: 'Legacy ref-id: WIAM_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-013
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-013
      description: All communication between the Wallet Provider and the Wallet Instance
        SHALL be mutually authenticated and SHOULD be encrypted.
      annotation: 'Legacy ref-id: WIAM_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-014
      description: The Wallet Unit SHALL ensure that the Wallet Provider cannot access
        the contents of the Wallet Unit, in particular to learn a) which attestations
        are present on the Wallet Unit, b) the status of these attestations, c) the
        value of attributes in these attestations, and d) the contents of the Wallet
        Unit log meant in DASH_02.
      annotation: 'Legacy ref-id: WIAM_12a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-015
      description: If the User uninstalls the Wallet Instance, the Wallet Instance
        SHALL request the associated WSCA/WSCD and keystore(s) to delete all cryptographic
        assets related to the Wallet Unit and to all PIDs and device-bound attestations
        on the Wallet Unit, if the WSCA/WSCD and keystore(s) are connected to the
        User device at the moment the Wallet Instance is uninstalled.
      annotation: 'a) Deletion of PID or WUA cryptographic assets requires User authentication,
        as specified in requirement WIAM_14. b) The Wallet Instance does not necessarily
        inform the Wallet Provider about the uninstallation of the Wallet Instance.
        c) It may happen there is no connection to the WSCA/WSCD or to a keystore
        at the moment the User uninstalls the Wallet Instance. For instance, in case
        the WSCA/WSCD is an external smart card and the User does not present that
        card to the User device. Another example occurs when the WSCA/WSCD is a remote
        HSM and the User device is offline at the moment the User uninstalls the Wallet
        Instance. In such cases, the cryptographic assets will probably remain present
        on the WSCA/WSCD or on the keystore, even though they will never be used again.
        If needed, it is up to the Wallet Provider to define how the Wallet Unit should
        handle such situations. For example, an HSM manager could address such cases
        by deciding to delete cryptographic keys in the HSM that are too old or haven''t
        been used for too long, while being aware of the risks in doing so. | Legacy
        ref-id: WIAM_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-016
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-016
      description: If a Wallet Unit supports the [W3C Digital Credentials API] and
        the User uninstalls the Wallet Instance, the Wallet Unit SHALL disclose the
        fact that it no longer stores any previously disclosed PID(s) or attestation(s)
        to the Digital Credentials API framework.
      annotation: 'Legacy ref-id: WIAM_13a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-017
      description: A WSCA/WSCD managing the critical assets of a PID, such as private
        or secret cryptographic keys, SHALL authenticate the User at Level of Assurance
        High before performing any cryptographic operation involving any of these
        assets.
      annotation: 'a) [CIR 2024/2981], Annex IV, section 2 (3) states "As a prerequisite
        to the certification under national certification schemes, the WSCD shall
        be assessed against the requirements of assurance level high as set out in
        Implementing Regulation (EU) 2015/1502." Therefore, a WSCA/WSCD by legal definition
        complies with requirements of LoA High. b) Note to WIAM_14 - WIAM_14b: Many
        actions of the Wallet Unit, such as processing a Relying Party presentation
        request and presenting an attestation, require multiple cryptographic operations,
        for example ephemeral key generation followed by key agreement and presentation
        signing and encryption. These requirements does not imply that a separate
        User authentication is necessary before each of these operations. Rather,
        a successful User authentication will be valid for all cryptographic operations
        necessary for a Wallet Unit action. It is up to the Wallet Provider to determine
        what constitutes a ''Wallet Unit action'', finding a balance between security
        (more User authentications) and User convenience (fewer User authentications).
        During certification of the Wallet Solution, it will be verified that the
        solution provides an adequate level of security. | Legacy ref-id: WIAM_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-018
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-018
      description: A WSCA/WSCD managing the critical assets of a WUA SHALL authenticate
        the User at Level of Assurance High before performing any cryptographic operation
        involving any of these assets.
      annotation: 'Legacy ref-id: WIAM_14a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-019
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-019
      description: A WSCA/WSCD managing the cryptographic assets of an attestation
        having a level of security High SHALL authenticate the User at level of security
        High before performing any cryptographic operation involving any of these
        assets.
      annotation: 'a) The term ''Level of Assurance'', as used in the European Digital
        Identity Regulation and in Implementing Regulation (EU) 2015/1502, is only
        applicable to electronic identity means, which in the context of the EUDI
        Wallet means only the PID. For that reason, this requirement uses the term
        ''level of security''. Levels of security are defined in standards or specifications
        different from CIR 2024/1502, for instance ISO/IEC 18045. b) During issuance
        of an attestation, the Attestation Provider in its Credential Issuer metadata
        indicates the level of security it requires for the key storage and user authentication
        for this type of attestation. See [OpenID4VCI] section 12.2.4 and Appendix
        D.2. | Legacy ref-id: WIAM_14b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-020
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-020
      description: A Wallet Unit SHALL use either the WSCA/WSCD or a keystore to manage
        any cryptographic assets that are not considered to be critical assets.
      annotation: 'a) The ARF uses the term ''keystore'' to refer to a hardware-backed
        repository and service in which non-critical cryptographic assets are generated,
        stored, and used exclusively inside a dedicated hardware security boundary.
        b) Examples of non-critical cryptographic assets are private and secret keys
        of attestations having a level of security lower than High. c) As mentioned
        in WIAM_14 and WIAM_14b, the private and secret keys of PIDs and WUAs are
        critical assets and therefore are stored in a WSCA/WSCD. | Legacy ref-id:
        WIAM_14c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-021
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-021
      description: Before performing any operation, a Wallet Instance SHALL securely
        authenticate the User using a multi-factor authentication mechanism provided
        by the User device.
      annotation: 'One of the authentication factors is the possession of the User
        device. | Legacy ref-id: WIAM_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-022
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-022
      description: For the purpose of WIAM_15, the Wallet Instance SHALL enforce the
        activation of an OS-level User authentication mechanism with adequate security
        policies.
      annotation: '''Adequate'' here means adequate for any operation excluding the
        issuance or presentation of PIDs, WUAs, and potentially other attestations
        at level of security High. This includes but is not limited to generating
        pseudonyms, accessing the transaction log (dashboard), data export and migration,
        requesting the erasure of personal data by a Relying Party, and reporting
        a Relying Party to a DPA. | Legacy ref-id: WIAM_15a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-023
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-023
      description: The Wallet Unit SHALL enable the User to use a Wallet Unit-specific
        authentication method for User authentication, in addition to the User authentication
        mechanism provided by the User device per WIAM_15. The Wallet Provider SHALL
        either make the use of this additional authentication method mandatory for
        all Users, or leave it to each User to decide if they want to use it.
      annotation: 'a) this authentication method may be implemented by the Wallet
        Instance, a (local) keystore, the WSCA/WSCD, or any other component of the
        Wallet Unit. b) As an optimisation to reduce the number of User authentication
        events, the Wallet Provider can choose to implement this additional authentication
        method in the WSCA/WSCD, in such a way that it complies with WIAM_14. | Legacy
        ref-id: WIAM_15b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-024
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-024
      description: The Wallet Instance SHALL also use the User authentication mechanism
        provided by the User device (WIAM_15) and possibly the Wallet Unit-specific
        PIN (WIAM_15b) to unlock the keystore mentioned in WIAM_14c, where applicable.
      annotation: 'Legacy ref-id: WIAM_15c'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-025
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-025
      description: For the User authentication mechanism provided by the User device,
        the Wallet Instance SHALL force the User device to enable a time-based control
        (e.g., a session timeout or re-authentication interval), to ensure that access
        is automatically revoked after a defined period of inactivity.
      annotation: 'Legacy ref-id: WIAM_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-026
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-026
      description: A WSCA/WSCD SHALL be able to authenticate a User at Level of Assurance
        High in accordance with the requirements in [Commission Implementing Regulation
        (EU) 2015/1502](https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32015R1502)
        section 2.2.1.
      annotation: 'Legacy ref-id: WIAM_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-027
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-027
      description: Empty
      annotation: 'Legacy ref-id: WIAM_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-028
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-028
      description: A WSCA/WSCD and a keystore SHALL be able to prove possession of
        the private key corresponding to a public key on request of a Wallet Instance,
        for example by signing a challenge with that private key.
      annotation: 'Legacy ref-id: WIAM_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-029
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-029
      description: A WSCA/WSCD SHALL protect a private key it generated during the
        entire lifetime of the key. This protection SHALL at least imply that the
        WSCA/WSCD prevents the private key from being extracted in the clear. If a
        WSCA/WSCD is able to export a private key in encrypted format, the resulting
        level of protection SHALL be equivalent to the protection level of the private
        key when stored in the WSCA.
      annotation: 'Legacy ref-id: WIAM_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-40-030
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.23.c
      ref_id: AS-WP-40-030
      description: Whenever the WSCA/WSCD successfully authenticated the User, the
        Wallet Unit SHOULD check if the WSCD contains cryptographic assets for PIDs
        or attestations that cannot be presented any longer to Relying Parties, for
        example because they have expired or because a once-only attestation (see
        [Topic 10](./annex-2.02-high-level-requirements-by-topic.md#a237-topic-10---issuing-a-pid-or-attestation-to-a-wallet-unit),
        section D, method A) was presented to a Relying Party already. The Wallet
        Unit SHOULD then request the WSCA/WSCD to destroy all cryptographic assets
        related to these PIDs or attestations.
      annotation: 'The reason for this recommendation is that probably, Wallet Providers
        will want to prevent an accumulation of unused private keys in the WSCA/WSCD,
        given that such devices typically do not have much storage space. However,
        deletion of private keys (and potentially other cryptographic assets) is a
        cryptographic key operation and cannot be done without User authentication
        - see WIAM_14. At the same time, for usability reasons the User must not be
        involved in such ''cleaning up'' processes, see also ISSU_42. The recommended
        solution is to take advantage of a User authentication event to also carry
        out any necessary cleaning operations. | Legacy ref-id: WIAM_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      assessable: false
      depth: 1
      ref_id: A.2.3.24
      name: Topic 42 - Requirements for QTSPs to access Authentic Sources
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-001
      description: 'In accordance with technical specifications referred to in QTSPAS_07,
        Member States SHALL define: - discovery mechanisms that enable QTSPs to request
        information about Authentic Sources or designated intermediaries recognised
        at the national level. This includes information regarding the attributes
        of a natural or legal person for which the Authentic Source or designated
        intermediary is considered a primary source, or for which it is recognised
        as authentic in accordance with Union law or national law, including administrative
        practices. - procedures for QTSPs to request the verification of attributes
        from Authentic Sources.'
      annotation: 'Legacy ref-id: QTSPAS_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-002
      description: 'An Authentic Source in the public sector, or its designated intermediary,
        SHALL implement an interface complying with the technical specification mentioned
        in QTSPAS_07 for receiving verification requests and sending responses. For
        each received request, the Authentic Source SHALL - identify and authenticate
        the requestor in such a way that it can subsequently determine whether the
        requestor is a QTSP issuing qualified electronic attestation of attributes,
        for example by means of a lookup in the QTSP Trusted List. - authenticate
        the User and obtain their approval, if it is legally obliged to do so, in
        addition to the User authentication and approval already performed by the
        QTSP according to QTSPAS_08. - verify whether the attribute values claimed
        by the QTSP match the values held by the Authentic Source and, finally, -
        respond with one of the following for each attribute: +''match'', if the attribute
        value held for this User by the Authentic Source is identical to the value
        claimed by the QTSP, + ''no match'', if the attribute value held for this
        User by the Authentic Source is not identical to the value claimed by the
        QTSP, including if the Authentic Source is the authentic source for this attribute
        but does not hold a value for this User, +''unknown'', if the Authentic Source
        is not the authentic source for this attribute.'
      annotation: 'Legacy ref-id: QTSPAS_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-003
      description: An Authentic Source or designated intermediary SHALL respond to
        a verification request for attributes by any QTSP issuing qualified electronic
        attestation of attributes.
      annotation: 'Legacy ref-id: QTSPAS_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-004
      description: An Authentic Source or designated intermediary SHALL implement
        the technical specifications mentioned in QTSPAS_01, so that the QTSP will
        receive the result of the verification of the requested attributes as described
        in QTSPAS_02. If the verification is deferred, the response to the QTSP SHALL
        include the maximum time that it will take to verify the requested attributes,
        and a unique identifier that the QTSP SHALL use to obtain the result of the
        verification.
      annotation: 'Legacy ref-id: QTSPAS_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-005
      description: A QTSP SHALL send an attribute verification request directly to
        the Authentic Source or designated intermediary recognised at national level,
        after discovering it using the mechanisms mentioned in QTSPAS_01.
      annotation: 'Legacy ref-id: QTSPAS_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-006
      description: Member States SHALL specify the processes and mechanisms to designate
        the Authentic Sources or intermediaries recognised at national level in accordance
        with Union or national law, allowing these Authentic Sources or intermediaries
        to verify the attributes presented to them by QTSPs.
      annotation: 'Legacy ref-id: QTSPAS_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-007
      description: The Commission SHALL publish, in cooperation with the European
        Digital Identity Cooperation Group, a technical specification, referring to
        applicable standards, specifications and procedures, that will cover at least
        the attributes specified in Annex VI, wherever those attributes rely on Authentic
        Sources within the public sector, for which Member States must ensure that
        measures are taken to allow qualified providers of electronic attestations
        of attributes to verify by electronic means, at the request of the User, their
        authenticity against the relevant authentic source.
      annotation: 'Legacy ref-id: QTSPAS_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-008
      description: The standards and procedures mentioned in QTSPAS_07 SHOULD, whenever
        possible, be aligned and compatible with those used for the platforms implementing
        the Once Only Technical System (OOTS).
      annotation: 'There is a clear synergy of both of these data exchange approaches.
        In fact, the national OOTS node would be a candidate for acting as an intermediary
        between QTSPs issuing QEAAs and the Authentic Sources. | Legacy ref-id: QTSPAS_07a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-42-009
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.24
      ref_id: AS-AP-42-009
      description: A QTSP SHALL obtain approval from the User to verify the authenticity
        of the attributes, before requesting the verification of those attributes
        by the relevant Authentic Source or designated intermediary.
      annotation: 'Legacy ref-id: QTSPAS_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      assessable: false
      depth: 1
      ref_id: A.2.3.25
      name: Topic 43 - Embedded disclosure policies
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-001
      description: A Wallet Unit SHALL enable an Attestation Provider to optionally
        express an embedded disclosure policy for a QEAA, PuB-EAA, or non-qualified
        EAA.
      annotation: 'The [European Digital Identity Regulation] does not contain a requirement
        for PIDs to be able to contain an embedded disclosure policy. | Legacy ref-id:
        EDP_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-002
      description: A Wallet Unit SHALL support embedded disclosure policies implementing
        the 'Authorised relying parties only policy' described in Annex III of Implementing
        Regulation (EU) 2024/2979. If present, such an embedded disclosure policy
        SHALL contain a list of EU-wide unique identifiers of Relying Parties, as
        specified in Reg_32. The Wallet Unit SHALL retrieve the Relying Party identifier
        from the access certificate presented by the Relying Party, and compare it
        to the list of authorised identifiers in the policy, unless the Relying Party
        is an intermediary. If the Relying Party is an intermediary, the Wallet Unit
        SHALL retrieve the unique identifier of the intermediated Relying Party from
        the presentation request or from the registration certificate of the intermediated
        Relying Party and compare this identifier to the list of authorised identifiers
        in the policy.
      annotation: 'See RPI_07 for how the Wallet Unit can see if the Relying Party
        is an intermediary. | Legacy ref-id: EDP_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-003
      description: A Wallet Unit SHALL support embedded disclosure policies implementing
        the 'Specific root of trust' policy described in Annex III of Implementing
        Regulation (EU) 2024/2979. If present, such an embedded disclosure policy
        SHALL contain a list of root or intermediate certificates used for signing
        Relying Party access certificates. The Wallet Unit SHALL compare the certificate
        chain that was used to sign the access certificate provided by the Relying
        Party to the list of authorised root or intermediate certificates in the policy,
        unless the Relying Party is an intermediary. If the Relying Party is an intermediary,
        the Wallet Unit SHALL retrieve the root certificate of the Provider of registration
        certificates of the intermediated Relying Party from the presentation request
        or from the Registrar's online service (as applicable) and compare this certificate
        to the list of authorised certificates in the policy.
      annotation: 'See RPI_07 for how the Wallet Unit can see if the Relying Party
        is an intermediary. | Legacy ref-id: EDP_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-43-001
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: EW-DM-43-001
      description: Empty
      annotation: 'Legacy ref-id: EDP_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-004
      description: An embedded disclosure policy SHOULD contain a link to a website
        of the Attestation Provider explaining the disclosure policy in layman's terms.
        If this is the case, the Wallet Unit SHALL display the link to the User and
        allow them to navigate to that website.
      annotation: 'Legacy ref-id: EDP_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-005
      description: The Wallet Unit SHALL evaluate an embedded disclosure policy in
        conjunction with the information received from the requesting Relying Party,
        in order to determine if the Relying Party has permission from the Attestation
        Provider to access the requested attestation.
      annotation: 'Legacy ref-id: EDP_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-006
      description: The Wallet Unit SHALL enable the User, based on the outcome of
        the evaluation of the applicable embedded disclosure policy(s), to deny or
        allow the presentation of the requested attestation to the Relying Party.
      annotation: 'Legacy ref-id: EDP_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-007
      description: The Commission SHALL take measures to ensure a technical specification
        is created establishing common mechanisms for the specification of embedded
        disclosure policies by Attestation Providers, and for the evaluation of such
        policies by Wallet Units.
      annotation: 'Legacy ref-id: EDP_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-43-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: EW-PIO-43-001
      description: An Attestation Provider SHALL include an embedded disclosure policy
        (if any) by value in the Issuer metadata related to the attestation, in compliance
        with the [OpenID4VCI] issuance protocol or an extension thereof specified
        in the technical specification mentioned in EDP_08.
      annotation: 'Legacy ref-id: EDP_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-43-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-WP-43-008
      description: During attestation issuance, a Wallet Unit SHALL retrieve and store
        locally the corresponding embedded disclosure policy, if any.
      annotation: 'Legacy ref-id: EDP_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-43-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.25
      ref_id: AS-AP-43-001
      description: An Attestation Provider SHALL revoke an attestation if a corresponding
        embedded disclosure policy is added, changed, or deleted.
      annotation: 'Legacy ref-id: EDP_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      assessable: false
      depth: 1
      ref_id: A.2.3.26
      name: Topic 44 - Registration certificates for PID Providers, Providers of QEAAs,
        PuB-EAAs, and non-qualified EAAs, and Relying Parties
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: A.2.3.26.A
      name: Generic requirements on the specification and contents of registration
        certificates
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-001
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-001
      description: Providers of registration certificates SHALL comply with all relevant
        requirements in ETSI TS 119 475.
      annotation: 'Legacy ref-id: RPRC_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-002
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-002
      description: Empty
      annotation: 'Legacy ref-id: RPRC_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-003
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-003
      description: The contents of a registration certificate SHALL include at least
        the information required in Annex V of the [CIR 2025/848](https://data.europa.eu/eli/reg_impl/2025/848/oj)
        regarding registration of wallet-relying parties.
      annotation: 'Legacy ref-id: RPRC_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-004
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-004
      description: If the subject of the registration certificate uses the services
        of an intermediary (see [Topic 52](./annex-2.02-high-level-requirements-by-topic.md#a2330-topic-52-relying-party-intermediaries)),
        the 'association to the intermediary' mentioned in Annex I (15) of [CIR 2025/848]
        SHALL consist of the user-friendly name and unique identifier of this intermediary,
        as meant in requirements Reg_31 and Reg_32.
      annotation: 'This name and identifier are identical to those in the access certificate
        of the intermediary. | Legacy ref-id: RPRC_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-005
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-005
      description: Empty
      annotation: 'Legacy ref-id: RPRC_04a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-006
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-006
      description: If the subject of the registration certificate is not a Relying
        Party (i.e. in the terms of CIR 2025/848, a Service Provider), the certificate
        SHALL NOT contain the intended use as meant in Annex I (9) and (10) of CIR
        2025/848.
      annotation: 'A PID Provider or Attestation Provider may request attributes from
        the Wallet Unit during issuance. If so, it registers as both a Service Provider
        and an Attestation Provider, and consequently its registration certificate
        contains its intended use. | Legacy ref-id: RPRC_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-007
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-007
      description: The contents of a registration certificate SHALL include a name
        for the subject of the certificate, in a format suitable for presenting to
        a User.
      annotation: 'A Wallet Unit needs the name of a Relying Party at least when requesting
        User approval according to [[Topic 6](./annex-2.02-high-level-requirements-by-topic.md#a234-topic-6---relying-party-authentication-and-user-approval)]
        | Legacy ref-id: RPRC_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-008
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-008
      description: The contents of a registration certificate SHALL include an EU-wide
        unique identifier for the subject of the certificate.
      annotation: 'a) A Wallet Unit needs an identifier for a Relying Party at least
        to allow the User to send a report of suspicious Relying Party presentation
        requests to a data protection authority according to [Topic 50](./annex-2.02-high-level-requirements-by-topic.md#a2328-topic-50---blueprint-to-report-unlawful-or-suspicious-request-of-data).
        b) The EU-wide unique identifier could, for example, be a concatenated list
        of one or more registered official Relying Party identifiers listed in Annex
        I(3) of the [CIR 2025/848](https://data.europa.eu/eli/reg_impl/2025/848/oj)
        regarding registration of Wallet Relying Parties, expressed in the semantic
        form defined in [ETSI EN 319 412-1] sections 5.1.4 or 5.1.5. | Legacy ref-id:
        RPRC_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-009
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.a
      ref_id: EW-DM-44-009
      description: The EU-wide unique identifier meant in RPRC_07 SHALL be identical
        in all registration certificates issued for a given entity.
      annotation: 'In case the registration certificates issued to an intermediated
        Relying Party are held and presented by an intermediary, the entity meant
        in this requirement is the intermediated Relying Party. An intermediary may
        obtain and hold registration certificates with a different unique identifier
        for other intermediated Relying Parties. | Legacy ref-id: RPRC_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.b
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: A.2.3.26.B
      name: Requirements on the issuance of registration certificates to Relying Parties
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-010
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: EW-DM-44-010
      description: A Member State Registrar MAY decide that, during the registration
        process for Relying Parties, as specified in [Topic 27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties),
        a Provider of registration certificates associated to the Registrar must create
        and sign or seal one or more registration certificates. If the Registrar decides
        to do so, the Provider of registration certificates SHALL create and sign
        or seal a separate registration certificate for each intended use registered
        by each Relying Party, and issue it to the Relying Party. Each registration
        certificate SHALL comply with the requirements in the technical specification
        mentioned in RPRC_02.
      annotation: 'See also [Topic 52](./annex-2.02-high-level-requirements-by-topic.md#a2330-topic-52-relying-party-intermediaries).
        | Legacy ref-id: RPRC_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-011
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: EW-DM-44-011
      description: If, during registration, a Relying Party received one or more registration
        certificates, it SHALL distribute these to all its Relying Party Instances.
      annotation: 'Legacy ref-id: RPRC_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-012
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: EW-DM-44-012
      description: 'The contents of a registration certificate issued to a Relying
        Party SHALL at least one of the following: a) the URL of a web form provided
        by the Relying Party, which Users can use to send data deletion requests,
        b) an e-mail address of the Relying Party, on which the Relying Party is prepared
        to receive data deletion requests from Users, c) a telephone number of the
        Relying Party, on which the Relying Party is prepared to receive data deletion
        requests from Users.'
      annotation: 'See [Topic 48](./annex-2.02-high-level-requirements-by-topic.md#a2327-topic-48---blueprint-for-requesting-data-deletion-to-relying-parties)
        for more information about data deletion requests. | Legacy ref-id: RPRC_11'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-013
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: EW-DM-44-013
      description: 'The contents of a registration certificate issued to a Relying
        Party SHALL contain the name and country of the Data Protection Authority
        supervising the Relying Party. In addition, the registration certificate SHALL
        contain at least one of the following: a) the URL of a web form provided by
        the DPA, which Users can use to report suspicious attribute presentation requests.
        c) an e-mail address of the DPA, on which the DPA is prepared to receive reports
        about suspicious attribute presentation requests from Users, c) a telephone
        number of the DPA, on which the DPA is prepared to receive reports about suspicious
        attribute presentation requests from Users.'
      annotation: 'See [Topic 50](./annex-2.02-high-level-requirements-by-topic.md#a2328-topic-50---blueprint-to-report-unlawful-or-suspicious-request-of-data)
        for more information about reporting suspicious attribute presentation requests.
        | Legacy ref-id: RPRC_12'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.c
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: A.2.3.26.C
      name: Requirements on the issuance of registration certificates to PID Providers
        and Attestation Providers
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-44-001
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.c
      ref_id: AS-AP-44-001
      description: A Registrar MAY decide that, during the registration process for
        PID Providers, QEAA Providers, PuB-EAA Provider, or non-qualified EAA Providers,
        as specified in [Topic 27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties),
        a Provider of registration certificates associated to the Member State Registrar
        must create and sign or seal a registration certificate and issue it to the
        registering party. If so, that registration certificate SHALL comply with
        the requirements in the technical specification mentioned in RPRC_02.
      annotation: 'Legacy ref-id: RPRC_13'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-44-002
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.c
      ref_id: AS-AP-44-002
      description: If, during registration, a PID Provider, QEAA Provider, PuB-EAA
        Provider, or non-qualified EAA Provider received a registration certificate,
        it SHALL distribute it to all its service supply points.
      annotation: 'A service supply point is a system at which a Wallet Unit can start
        the process of requesting and obtaining a PID or attestation.  Legacy ref-id:
        RPRC_14'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-44-003
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.c
      ref_id: AS-AP-44-003
      description: The contents of a registration certificate issued to a PID Provider,
        a QEAA Provider, a PuB-EAA Provider, or a non-qualified EAA Provider SHALL
        contain the type(s) of attestation that this entity intends to issue to Wallet
        Units.
      annotation: 'Legacy ref-id: RPRC_15'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: A.2.3.26.D
      name: Requirements on the presentation and verification of registration certificates
        of Relying Parties
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-014
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-014
      description: Either after receiving a presentation request or as a general User
        setting, a Wallet Unit SHALL offer the User the possibility to indicate whether
        the User wants to verify the information registered by the competent Registrar
        about the Relying Party the User is interacting with.
      annotation: 'Legacy ref-id: RPRC_16'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-015
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-015
      description: If the User indicated that they want to verify the information
        registered about the Relying Party and the Relying Party sent a registration
        certificate to the Wallet Unit, the Wallet Unit SHALL verify the authenticity
        and validity of the registration certificate according to the technical specification
        meant in RPRC_02. If the outcome of the verification is negative, the Wallet
        Unit SHALL, when asking for User approval according to RPA_07, notify the
        User that it could not obtain the information registered about the entity.
      annotation: 'Legacy ref-id: RPRC_17'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-016
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-016
      description: If the User indicated that they want to verify the information
        registered about the Relying Party, but the Relying Party did not send a registration
        certificate to the Wallet Unit, the Wallet Unit SHALL connect to the URL of
        the online service of the Registrar to obtain this information. If the Wallet
        Unit cannot connect to this URL or if it cannot verify the authenticity and
        validity of the registered information, it SHALL, when asking for User approval
        according to RPA_07, notify the User that it could not obtain the information
        registered about the Relying Party.
      annotation: 'The URL of the Registrar is included in the extension of the presentation
        request, see RPRC_19a. | Legacy ref-id: RPRC_18'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-017
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-017
      description: If a Relying Party Instance received one or more registration certificates
        (see RPRC_10), it SHALL include a single registration certificate applicable
        for its current intended use in each presentation request to a Wallet Unit,
        according to the applicable standard's extension mentioned in RPRC_20. The
        registration certificate SHALL be included in the request by value, not by
        reference. The Relying Party Instance SHALL do so both in proximity and remote
        presentation flows.
      annotation: 'This ensures that no external requests are necessary to validate
        the Relying Party. | Legacy ref-id: RPRC_19'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-018
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-018
      description: 'A Relying Party Instance SHALL include in each presentation request
        the following information, according to the applicable standard''s extension
        mentioned in RPRC_20a: a) the user-friendly name of the Relying Party, b)the
        unique identifier of the Relying Party, c) a User-friendly description of
        the intended use of the Relying Party, d) the URL of the Registrar of the
        Relying Party, and e) the identifier of the intended use of the Relying Party.'
      annotation: 'Including items a) and b) enables the Wallet Unit to show to the
        User the name of the Relying Party. Including c) enables the Wallet Unit to
        inform the User about the intended use. Including c) and d) enables the Wallet
        Unit, if desired by the User, to request from the Registrar the attributes
        registered by the Relying Party for this intended use, as well as the corresponding
        privacy policy and other registered information. See [Technical Specification
        5](../../technical-specifications/ts5-common-formats-and-api-for-rp-registration-information.md)
        for the definition of this information. Note that in case the Relying Party
        Instance is operated by an intermediary, items a) - e) pertain to the intermediated
        Relying Party, see also RPI_06. | Legacy ref-id: RPRC_19a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-019
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-019
      description: Relying Party Instances and Wallet Units SHALL support the extension
        for [ISO/IEC 18013-5] or the extension for [OpenID4VP], as specified in ETSI
        TS 119 472-2 and amended by a CIR in preparation, as applicable, for transferring
        a single Relying Party registration certificate from a Relying Party Instance
        to a Wallet Unit.
      annotation: 'The correct CIR will be referenced here when it is published. |
        Legacy ref-id: RPRC_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-020
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-020
      description: Relying Party Instances and Wallet Units SHALL support the extension
        for [ISO/IEC 18013-5] or the extension for [OpenID4VP], as specified in ETSI
        TS 119 472-2 and amended by a CIR in preparation, as applicable, for transferring
        the information listed in RPRC_19a from a Relying Party Instance to a Wallet
        Unit.
      annotation: 'The correct CIR will be referenced here when it is published. |
        Legacy ref-id: RPRC_20a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-44-021
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.d
      ref_id: EW-DM-44-021
      description: If the User indicated that they want to verify the information
        registered about a Relying Party and the Wallet Unit retrieved this information
        either from the registration certificate or from the online service of the
        Registrar (see RPRC_16 - RPRC_18), it SHALL verify that all attributes requested
        in the presentation request are included in the list of attributes registered
        by the Registrar. If the outcome of the verification is negative, the Wallet
        Unit SHALL, when asking for User approval according to RPA_07, notify the
        User about the requested attributes that the Relying Party did not register.
      annotation: 'Legacy ref-id: RPRC_21'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.e
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26
      ref_id: A.2.3.26.E
      name: Requirements on the presentation and verification of registration certificates
        of PID Providers and Attestation Providers
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-44-004-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.e
      ref_id: AS-AP-44-004-1
      description: If a PID Provider or Attestation Provider received a registration
        certificate (see RPRC_14), it SHALL include the registration certificate in
        its Credential Issuer metadata used in the common OpenID4VCI protocol referenced
        in ISSU_01 and the extension thereof in ETSI TS 119 472-3. The registration
        certificate SHALL be included in the metadata by value, not by reference.
      annotation: 'This ensures that no external requests are necessary to validate
        the PID Provider or Attestation Provider, and that issuance transactions are
        atomic and self-contained. | Legacy ref-id: RPRC_22'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-44-004-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.e
      ref_id: AS-AP-44-004-2
      description: 'A PID Provider or Attestation Provider SHALL include the the following
        information in its Credential Issuer metadata used in the common OpenID4VCI
        protocol referenced in ISSU_01 and the extension thereof in ETSI TS 119 472-3:
        a) the user-friendly name of the PID Provider or Attestation Provider, b)
        the unique identifier of the PID Provider or Attestation Provider, c) a User-friendly
        description of the PID(s) or attestation(s) issued by this PID Provider or
        Attestation Provider, d) the URL of the Registrar of the PID Provider or Attestation
        Provider, and e) the attestation type(s) that the PID Provider or Attestation
        Provider intends to issue to Wallet Units.'
      annotation: 'Legacy ref-id: RPRC_22a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-44-005
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.26.e
      ref_id: AS-AP-44-005
      description: A Wallet Unit SHALL verify that the type of attestation it wants
        to request from the PID Provider or Attestation Provider is registered by
        the relevant Registrar, according to ISSU_24a for PID Providers and ISSU_34a
        for Attestation Providers.
      annotation: 'Unlike for Relying Parties, see RPRC_21, the Wallet Unit always
        carries out this verification, regardless of the preference of the User set
        as per RPRC_16. | Legacy ref-id: RPRC_23'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      assessable: false
      depth: 1
      ref_id: A.2.3.27
      name: Topic 48 - Blueprint for requesting data deletion to Relying Parties
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-48-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-WP-48-001
      description: A Wallet Provider SHALL ensure that its Wallet Units support the
        possibilities mentioned in DATA_DLT_02, allowing a User to request from a
        Relying Party the erasure of their attributes that were presented by that
        Wallet Unit to that Relying Party, in accordance with Article 17 of Regulation
        (EU) 2016/679.
      annotation: 'Legacy ref-id: DATA_DLT_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-48-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-RP-48-001
      description: 'A Wallet Unit SHALL support at least the following possibilities
        to send a data erasure request to a Relying Party: a) Open a URL in an external
        browser to ask for the deletion of data in a web form provided by the Relying
        Party, b) Open an external mail client and start a draft e-mail to the Relying
        Party, with a suitable template text, c) open an external phone client and
        start a phone call. Depending on whether a Relying Party URL, e-mail address,
        and/or phone number was logged for the relevant attestation presentation transaction
        (see requirement DASH_03 in [Topic 19](./annex-2.02-high-level-requirements-by-topic.md#a2312-topic-19---user-navigation-requirements-dashboard-logs-for-transparency)),
        the Wallet Unit SHALL offer the User to use one or more of these possibilities.'
      annotation: 'Legacy ref-id: DATA_DLT_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-48-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-RP-48-002
      description: If the User initiates sending a data erasure request for a particular
        attestation presentation transaction, but no Relying Party URL, e-mail address,
        or telephone number is available in the log for that transaction, the Wallet
        Unit SHALL connect to the URL of the online service of the Registrar indicated
        in the log to obtain this information. The Wallet Unit SHALL inform the User
        that it must connect to the Registrar to look up the contact information it
        needs to send a data deletion request.
      annotation: 'This situation may occur if there was no registration certificate
        in the presentation request and the User did not request the Wallet Unit to
        obtain the information registered about the Relying Party from the Registrar.
        See RPRC_16 - RPRC_18 in [Topic 44](./annex-2.02-high-level-requirements-by-topic.md#a2326-topic-44---registration-certificates-for-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties).
        | Legacy ref-id: DATA_DLT_02a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-48-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-RP-48-003
      description: A Wallet Instance SHALL provide a function where the User may select
        one Relying Party to which a data deletion request must be submitted.
      annotation: 'Legacy ref-id: DATA_DLT_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-48-002
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-WP-48-002
      description: Empty
      annotation: 'Legacy ref-id: DATA_DLT_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-48-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-WP-48-003
      description: A Wallet Unit SHALL include the initiation of a data deletion request
        in a log, so it can be displayed to the User via the dashboard as specified
        in [Topic 19](./annex-2.02-high-level-requirements-by-topic.md#a2312-topic-19---user-navigation-requirements-dashboard-logs-for-transparency).
      annotation: 'Because the request is sent by an external web browser, e-mail
        client, or phone client (see DATA_DLT_02), the Wallet Unit can only log the
        initiation of the request. | Legacy ref-id: DATA_DLT_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-48-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-RP-48-004
      description: 'For the initiation of a data deletion request, the log SHALL contain
        at least: - Date and time of the initiation of the request, - Name and unique
        identifier of the Relying Party to which the request was made, - Attributes
        requested to be deleted.'
      annotation: 'Legacy ref-id: DATA_DLT_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-48-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-RP-48-005
      description: Before executing a data deletion request, a Relying Party SHALL
        authenticate the requesting User (or the request itself), using appropriate
        authentication mechanisms of its own choosing. The Relying Party SHOULD use
        the authentication or signature facilities offered by the User's Wallet Unit
        for this purpose.
      annotation: 'Legacy ref-id: DATA_DLT_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-48-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.27
      ref_id: AS-WP-48-004
      description: Wallet Units, Relying Parties, and Registrars SHALL comply with
        the relevant requirements in [Technical Specification 7](../../technical-specifications/ts7-common-interface-for-data-deletion-request.md).
      annotation: 'Legacy ref-id: DATA_DLT_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      assessable: false
      depth: 1
      ref_id: A.2.3.28
      name: Topic 50 - Blueprint to report unlawful or suspicious request of data
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-50-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: AS-WP-50-001
      description: A Wallet Unit SHALL enable the User to start the process of reporting
        a suspicious presentation request to a DPA. When prompted by the User, a Wallet
        Unit SHALL provide the contact details of the DPA which supervises the Relying
        Party that made the suspicious request, if available in the log for that request
        (see DASH_03). If the contact details of the supervising DPA are not available
        in the log, the Wallet Unit SHALL provide the contact details of the DPA of
        the region in which the Wallet Provider is residing. In addition, the Wallet
        Unit MAY also provide the contact details of other DPAs, taken from the European
        Data Protection Board website (<https://www.edpb.europa.eu/about-edpb/about-edpb/members_en>).
      annotation: 'The DPA contact details may be unavailable in the log if there
        was no registration certificate in the presentation request and the User did
        not request the Wallet Unit to obtain the information registered about the
        Relying Party from the Registrar. See RPRC_16 - RPRC_18 in [Topic 44](./annex-2.02-high-level-requirements-by-topic.md#a2326-topic-44---registration-certificates-for-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties).
        | Legacy ref-id: RPT_DPA_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-50-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: AS-WP-50-002
      description: The Wallet Unit SHALL offer the User the option to report a suspicious
        request to a DPA via the transaction log presented in the dashboard, see [Topic
        19](./annex-2.02-high-level-requirements-by-topic.md#a2312-topic-19---user-navigation-requirements-dashboard-logs-for-transparency).
      annotation: 'Legacy ref-id: RPT_DPA_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-50-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: AS-WP-50-003
      description: 'A Wallet Unit SHALL support at least the following possibilities
        to report a suspicious presentation request to a DPA, depending on what contact
        details are available for the DPA: a) Open a URL in an external browser to
        report the request in a web form provided by the DPA. b) Open an external
        e-mail client and start a draft e-mail to the DPA, with a suitable template
        text, c) open an external phone client and start a phone call.'
      annotation: 'Legacy ref-id: RPT_DPA_02a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-50-001
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: EW-DM-50-001
      description: Empty
      annotation: 'Legacy ref-id: RPT_DPA_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-50-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: AS-WP-50-004
      description: A Wallet Provider SHALL ensure that a Wallet Unit allows its User
        to substantiate a report sent to a DPA, including by attaching relevant information
        to identify the Relying Party and the Users' claims in a machine-readable
        format.
      annotation: 'The log kept by the Wallet Unit is standardised in [Technical Standard
        10](https://github.com/eu-digital-identity-wallet/eudi-doc-standards-and-technical-specifications/blob/main/docs/technical-specifications/ts10-data-portability-and-download-(export).md)
        and is machine-readable in order to enable data portability. An excerpt from
        this log therefore can be used to substantiate the report. | Legacy ref-id:
        RPT_DPA_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-50-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: AS-WP-50-005
      description: A Wallet Unit SHALL log the fact that it initiated the sending
        of a report to a DPA (see RPT_DPA_02a), as specified in [Topic 19](./annex-2.02-high-level-requirements-by-topic.md#a2312-topic-19---user-navigation-requirements-dashboard-logs-for-transparency).
      annotation: 'Legacy ref-id: RPT_DPA_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-50-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: EW-DM-50-002
      description: 'For a report sent to a DPA, the log SHALL contain at least: a)
        the date and time when the report was sent, b) the name and country of the
        DPA, and c) the channel and contact information used for initiating sending
        the report, i.e., the URL, e-mail address, or phone number of the DPA.'
      annotation: 'Legacy ref-id: RPT_DPA_05a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-50-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.28
      ref_id: AS-WP-50-006
      description: Wallet Units, Data Protection Authorities, and Registrars SHALL
        comply with the relevant requirements in [Technical Specification 8](../../technical-specifications/ts8-common-interface-for-reporting-of-wrp-to-dpa.md).
      annotation: 'Legacy ref-id: RPT_DPA_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.29
      assessable: false
      depth: 1
      ref_id: A.2.3.29
      name: Topic 51 - PID or attestation deletion
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-51-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.29
      ref_id: AS-WP-51-001
      description: A Wallet Unit SHALL at any time enable the User to delete any PID
        or attestation from their Wallet Unit.
      annotation: 'Legacy ref-id: PAD_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-51-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.29
      ref_id: AS-WP-51-002
      description: If the User indicates that a PID or attestation must be deleted,
        and the Wallet Unit contains multiple PIDs or attestation having the corresponding
        attestation type and Provider, a Wallet Unit SHALL delete all of these PIDs
        and attestations simultaneously.
      annotation: 'This situation may occur if the PID Provider or Attestation Provider
        issued a batch of attestations to the Wallet Unit, rather than a single one.
        | Legacy ref-id: PAD_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-51-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.29
      ref_id: AS-WP-51-003
      description: If the Wallet Unit deletes a PID or attestation on the User's request,
        the Wallet Unit SHALL NOT notify the respective PID Provider or Attestation
        Provider.
      annotation: 'This is a matter of User privacy. | Legacy ref-id: PAD_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-51-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.29
      ref_id: AS-WP-51-004
      description: If the Wallet Unit deletes a PID or device-bound attestation on
        the User's request, the Wallet Unit SHALL ensure that all cryptographic assets
        in the WSCA/WSCD related to this PID, or in a keystore related to this attestation,
        are securely destroyed.
      annotation: 'Key deletion for a PID key is a cryptographic key operation and
        requires User authentication, as specified in requirement WIAM_14. | Legacy
        ref-id: PAD_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-51-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.29
      ref_id: AS-WP-51-005
      description: If a Wallet Unit supports the [W3C Digital Credentials API] and
        it deletes, on the User's request, a PID or attestation previously disclosed
        to the Digital Credentials API framework, the Wallet Instance SHALL disclose
        the fact that it no longer stores this PID or attestation to the Digital Credentials
        API framework.
      annotation: 'Legacy ref-id: PAD_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-51-006
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.29
      ref_id: AS-WP-51-006
      description: Empty
      annotation: 'Legacy ref-id: PAD_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      assessable: false
      depth: 1
      ref_id: A.2.3.30
      name: Topic 52 Relying Party intermediaries
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-001
      description: An intermediary SHALL register as a Relying Party, in accordance
        with all requirements in [Topic 27](./annex-2.02-high-level-requirements-by-topic.md#a2316-topic-27---registration-of-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties),
        while indicating it intends to act as an intermediary.
      annotation: 'a) This implies that an intermediary obtains an access certificate
        containing its own name and unique Relying Party identifier. b) An intermediary
        may also obtain a registration certificate according to [Topic 44](./annex-2.02-high-level-requirements-by-topic.md#a2326-topic-44---registration-certificates-for-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties),
        but this certificate will not be used for intermediated transactions. c) An
        entity that registered as an intermediary may also register as a Relying Party
        in its own capacity. In such a case, it will receive one or more registration
        certificates for its intended use(s), and will use one of these certificates
        when interacting with a Wallet Unit. | Legacy ref-id: RPI_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-002
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-002
      description: Empty
      annotation: 'Legacy ref-id: RPI_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-003
      description: An intermediary SHALL register each intermediated Relying Party
        it is acting on behalf of at a Registrar in the Member State where the intermediated
        Relying Party is established, according all requirements in [Topic 44](./annex-2.02-high-level-requirements-by-topic.md#a2326-topic-44---registration-certificates-for-pid-providers-providers-of-qeaas-pub-eaas-and-non-qualified-eaas-and-relying-parties).
        If a Provider of registration certificates associated with the Registrar issues
        registration certificates, the intermediary SHALL receive a registration certificate
        for each of the registered intended uses of the intermediated Relying Party.
      annotation: 'Legacy ref-id: RPI_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-004
      description: When registering an intermediated Relying Party, an intermediary
        SHALL provide legally valid evidence that this Relying Party will indeed use
        the services of this intermediary to interact with Wallet Units. The Registrar
        SHALL verify this evidence, and, if it is found to be correct, SHALL register
        the relationship between the intermediary and the intermediated Relying Party.
      annotation: 'Such evidence may, for instance, be a contract between the intermediary
        and the intermediated Relying Party. | Legacy ref-id: RPI_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-005
      description: When an intermediated Relying Party asks its intermediary to request
        some attributes from a Wallet Unit, it SHALL specify a) its user-friendly
        name, b) its unique identifier, c) the URL of its Registrar. d) the identifier
        of its intended use, e) a User-friendly description of its intended use. In
        addition, if the intermediated Relying Party has registration certificates,
        it SHALL indicate which single registration certificate the intermediary must
        include in the presentation request.
      annotation: 'a) See RPRC_19a for why the intermediary needs this information.
        b) Since a), b) and c) will not change for each request, specification of
        this information can be done once. The same is true for d) and e) if the intermediated
        Relying Party has only one registered intended use. | Legacy ref-id: RPI_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-006
      description: When requested by an intermediated Relying Party, an intermediary
        SHALL request a presentation of attributes from a specific Wallet Unit. In
        the request, the intermediary SHALL include the intermediary's access certificate
        meant in requirement RPI_01 and the registration certificate of the Relying
        Party, as meant in RPI_03, if available. In addition, whether or not a registration
        certificate is available, the intermediary SHALL include in the request the
        information about the intermediated Relying Party required in RPRC_19a.
      annotation: 'Legacy ref-id: RPI_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-007
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-007
      description: Empty
      annotation: 'Legacy ref-id: RPI_06a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-008
      description: In case a Wallet Unit receives a presentation request from an intermediary
        on behalf of an intermediated Relying Party, it SHALL display the names and
        identifiers of both the intermediary and the intermediated Relying Party to
        the User when asking for User approval, as described in RPA_07.
      annotation: 'In this case, the name and identifier of the intermediary are included
        in the access certificate presented by the Relying Party Instance, whereas
        the name and identifier of the intermediated Relying Party are included in
        the extension of the presentation request (see RPRC_19a), and in the registration
        certificate if available. If these names and identifiers are different, the
        Wallet Unit knows that the presentation request is from an intermediary on
        behalf of an intermediated Relying Party. | Legacy ref-id: RPI_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-009
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-009
      description: In case a Wallet Unit receives a presentation request from an intermediary
        on behalf of an intermediated Relying Party, and if the User indicated that
        they want to verify the information registered about this Relying Party (according
        to RPRC_16), the Wallet Unit SHALL verify that that the contractual relationship
        between the Relying Party and the intermediary is indeed registered by the
        responsible Registrar according to RPI_04, see also RPRC_04. If this verification
        fails, the Wallet Unit SHALL notify the User when asking for User consent.
      annotation: 'The Wallet Unit can either do this by inspecting the registration
        certificate (if available) or by querying the Registrar. | Legacy ref-id:
        RPI_07a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-010
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-010
      description: Empty
      annotation: 'Legacy ref-id: RPI_07b'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-011
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-011
      description: When a Wallet Unit presents to an intermediary any User attributes
        from a PID or attestation, the intermediary SHALL, after successfully carrying
        out the verifications in RPI_09, forward these attributes (only) to the Relying
        Party on behalf of which the presentation request was made. If any of the
        verifications in RPI_09 fail, the intermediary SHALL NOT forward any attributes
        to the Relying Party.
      annotation: 'Legacy ref-id: RPI_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-012
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-012
      description: When a Wallet Unit presents to an intermediary any attributes from
        a PID or attestation, the intermediary SHALL verify the authenticity of the
        PID or attestation, its revocation status, device binding, and User binding,
        as well as any combined presentation of attributes, if applicable, as specified
        in this ARF and if agreed with the Relying Party. Furthermore, the intermediary
        SHALL verify the authenticity of the Wallet Unit and its revocation status,
        as specified in this ARF, if agreed with the Relying Party.
      annotation: 'This ARF does not mandate that a Relying Party must carry out all
        of these verifications. Therefore, the intermediary and any Relying Party
        using its services must agree on what verifications the intermediary will
        carry out. | Legacy ref-id: RPI_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-rp-51-013
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.30
      ref_id: AS-RP-51-013
      description: The intermediary SHALL delete any PIDs or attestations it obtained
        from the Wallet Unit, including any User attributes, completely and immediately
        after it has sent the User attributes to the intermediated Relying Party.
        If the intermediary does not send any User attributes to the intermediated
        Relying Party, for example because one of the verifications in the previous
        step failed, the intermediary SHALL delete the PIDs, attestations, or WUAs
        completely and immediately as soon as it has completed all necessary verifications.
      annotation: 'Legacy ref-id: RPI_10'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      assessable: false
      depth: 1
      ref_id: A.2.3.31
      name: Topic 53 Zero-Knowledge Proofs
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-001
      description: 'A ZKP scheme SHALL provide support for the following generic functions,
        while hiding all attributes of PIDs or attestations: (i) generation of a proof
        that an (some) attribute(s) having a specific value is (are) included in a
        PID or attestation, (ii) generation of a proof that a PID or attestation is
        within its validity period, (iii) generation of a proof that a PID or attestation
        has not been revoked, and (iv) generation of a proof that a PID or device-bound
        attestation is bound to a key stored in the WSCA/WSCD or in a keystore of
        the Wallet Unit. Additionally, a ZKP scheme SHOULD provide support for the
        following function, which SHOULD be used only when hiding the PID Provider
        or Attestation Provider is necessary: (v) generation of a proof that a PID
        or attestation has been issued by a trusted PID Provider or Attestation Provider,
        without revealing the PID Provider or Attestation Provider.'
      annotation: 'See section 4.1.1 of the Discussion Paper for Topic G. | Legacy
        ref-id: ZKP_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-002
      description: A ZKP scheme SHALL support proving possession of attestation of
        a given type.
      annotation: 'See section 4.1.2 and 4.1.3 of the Discussion Paper for Topic G.
        | Legacy ref-id: ZKP_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-003
      description: 'A ZKP scheme SHOULD support the privacy-preserving binding of
        an attestation to a PID. In addition to the generic functions defined in ZKP_01,
        for this use case, a ZKP scheme SHALL provide support for the following functions:
        (i) generation of a proof that the Wallet Unit stores an attestation and a
        PID and that the attestation includes a specific attribute, having a specific
        value, which is also present in the PID.'
      annotation: 'See section 4.1.4 of the Discussion Paper for Topic G. | Legacy
        ref-id: ZKP_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ap-51-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: AS-AP-51-001
      description: 'A ZKP scheme SHOULD support the derivation of a verifiable User
        pseudonym, by combining an attribute value that is unique for the User with
        Relying Party-specific context (e.g., the Relying Party identifier) In addition
        to the generic functions defined in ZKP_01, for this use case, a ZKP scheme
        SHALL provide support for the following functions: (i) generation of a request
        for the issuance of an attestation that includes a secret attribute unique
        to the User, without revealing this attribute to the Attestation Provider,
        (ii) generation of an attestation presentation that includes a verifiable
        pseudonym derived from the secret attribute, a Relying Party identifier, and
        context-related information.'
      annotation: 'See section 4.1.5 of the Discussion Paper for Topic G. | Legacy
        ref-id: ZKP_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-004
      description: A ZKP scheme SHALL be usable in both remote and proximity presentation
        flows. While the inclusion of ZKP will introduce computational and verification
        delays, these delays SHALL NOT critically undermine or defeat the purpose
        of the Relying Party service (e.g. because of a critical impact on the User
        experience of the Wallet Unit).
      annotation: 'Legacy ref-id: ZKP_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-005
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-005
      description: A ZKP scheme SHOULD be able to generate proofs for already issued
        PIDs and attestations in the formats specified in [ISO/IEC 18013-5] or [SD-JWT
        VC].
      annotation: 'Legacy ref-id: ZKP_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-006
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-006
      description: A ZKP scheme SHALL NOT introduce any additional communication or
        information that could be used to track or link User activity during, before,
        or after proof generation.
      annotation: 'Legacy ref-id: ZKP_07'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-007
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-007
      description: A ZKP scheme SHALL rely solely on algorithms included in the [ECCG
        Agreed Cryptographic Mechanisms v2.0](https://certification.enisa.europa.eu/document/download/a845662b-aee0-484e-9191-890c4cfa7aaa_en?filename=ECCG%20Agreed%20Cryptographic%20Mechanisms%20version%202.pdf).
      annotation: 'Legacy ref-id: ZKP_08'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-dm-51-008
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.31
      ref_id: EW-DM-51-008
      description: Use of a ZKP scheme SHALL NOT prevent the Wallet Unit's ability
        to provide User authentication with Level of Assurance High.
      annotation: 'Legacy ref-id: ZKP_09'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.32
      assessable: false
      depth: 1
      ref_id: A.2.3.32
      name: Topic 54 - Accessibility
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-54-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.32
      ref_id: AS-WP-54-001
      description: Wallet Providers SHALL ensure that their Wallet Units comply with
        applicable requirements and standards in [Directive 2016/2012 on the accessibility
        of websites and mobile applications of public sector bodies](http://data.europa.eu/eli/dir/2016/2102/oj).
      annotation: 'Compliance with the European Standard [ETSI EN 301 549 V1.1.2](https://www.etsi.org/deliver/etsi_en/301500_301599/301549/01.01.02_60/en_301549v010102p.pdf)
        (2015-04) provides a presumption of conformity to the Accessibility Directive.
        | Legacy ref-id: ACC_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-54-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.32
      ref_id: AS-WP-54-002
      description: Wallet Providers SHALL ensure that their Wallet Units comply with
        accessibility requirements for products and services established under [Directive
        (EU) 2019/882](http://data.europa.eu/eli/dir/2019/882/oj).
      annotation: 'Compliance with the European Standard [ETSI EN 301 549 V1.1.2](https://www.etsi.org/deliver/etsi_en/301500_301599/301549/01.01.02_60/en_301549v010102p.pdf)
        (2015-04) potentially provides a presumption of conformity to this Directive.
        | Legacy ref-id: ACC_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.33
      assessable: false
      depth: 1
      ref_id: A.2.3.33
      name: Topic 55 - Certificate Transparency
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-55-001
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.33
      ref_id: AS-MS-55-001
      description: An Access CA issuing access certificates SHALL register these in
        a CT log according to RFC 9162, if such a log is available for access certificates.
      annotation: 'Legacy ref-id: CT_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-55-002
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.33
      ref_id: AS-MS-55-002
      description: An Access CA issuing access certificates SHALL describe in its
        CPS how it logs all access certificates.
      annotation: 'Legacy ref-id: CT_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-55-003
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.33
      ref_id: AS-MS-55-003
      description: In case a CT log provider for access certificates is available,
        all Access CAs SHALL act as monitors in the CT ecosystem. Access CAs SHOULD
        still monitor the CT logs in situations of temporary unavailability.
      annotation: 'Legacy ref-id: CT_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-55-004
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.33
      ref_id: AS-MS-55-004
      description: An Access CA SHALL include at least one Signed Certificate Timestamp
        (SCT) in each access certificate.
      annotation: 'Legacy ref-id: CT_04'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-55-005
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.33
      ref_id: AS-MS-55-005
      description: When verifying an access certificate during PID or attestation
        issuance or presentation, a Wallet Unit SHALL also verify that the access
        certificate includes at least one valid Signed Certificate Timestamp (SCT).
      annotation: 'Legacy ref-id: CT_05'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-ms-55-006
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.33
      ref_id: AS-MS-55-006
      description: If an access certificate does not include a valid SCT, a Wallet
        Unit SHALL handle this as a failure or Relying Party authentication, in compliance
        with all requirements in [[Topic 6](./annex-2.02-high-level-requirements-by-topic.md#a234-topic-6---relying-party-authentication-and-user-approval)]
        and in particular requirement RPA_06a.
      annotation: 'Legacy ref-id: CT_06'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.34
      assessable: false
      depth: 1
      ref_id: A.2.3.34
      name: Topic 56 - Wallet Provider Support and Maintenance
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-56-001
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.34
      ref_id: AS-WP-56-001
      description: 'A Wallet Provider SHALL monitor their installed base of operational
        Wallet Instances for maintenance purposes, and determine and document in a
        transparent manner the data it needs and is allowed to monitor in order to
        deliver the required support. Data or attributes that SHOULD be monitored
        include: 1) Runtime errors, for uncaught errors in production code, 2) UX
        and telemetry information, for UX field analysis, 3) OS version and health
        information, for detection of OS level vulnerabilities, 4) Wallet Instance
        SDK and software library version information, for Wallet Instance code vulnerabilities,
        5) User locale/localisation data, for catching localisation related errors,
        6) Wallet Instance version, for catching errors or vulnerabilities due to
        outdated versions, 7) Supported WSCA/WSCDs and their supported capabilities,
        for detection of cryptography incompatibilities, 8) Unique device identifier
        such as IDFV or persisted UUID (iOS) or AndroidID (Android), for maintaining
        an up-to-date list of Wallet Instance-related device installations and for
        detecting potential malicious use (unrecognised identifier), 9) Device sensor
        identifiers and patch levels, for checking if sensor hardware in the device
        is up-to-date. 10) hardware-level details about the device, to identify known
        hardware-based problems or vulnerabilities, 11) BLE and NFC support by device,
        for analysing the security and feasibility of proximity use cases with a given
        Wallet Instance.'
      annotation: 'Legacy ref-id: WPSM_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-56-002
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.34
      ref_id: AS-WP-56-002
      description: Wallet Providers SHALL, for maintenance purposes, write custom
        crash logs for sending them for further analysis.
      annotation: 'Legacy ref-id: WPSM_02'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-56-003
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.34
      ref_id: AS-WP-56-003
      description: A Wallet Provider SHALL monitor the security posture of its operational
        Wallet Instances for the purpose of detecting critical security risks in the
        environment the Wallet Instance is run at, and determine and document in a
        transparent manner the data it needs and is allowed to monitor. Information
        that SHOULD be monitored for software and hardware level problems/vulnerabilities
        on device includes 1) detection of device rooting/jailbreaking, 2) emulator
        detection, 3) device OS version and health data, 4) Wallet Instance SDK and
        SW library versions, 5) Wallet Instance version, 6) Supported WSCA/WSCD and
        7) Sensor identifiers and patch levels.
      annotation: 'Legacy ref-id: WPSM_03'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-56-004
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.34
      ref_id: AS-WP-56-004
      description: During the lifetime of the Wallet Unit, the Wallet Provider SHALL
        update the Wallet Unit as necessary to ensure its continued security and functionality.
      annotation: 'Legacy ref-id: WPSM_04'
