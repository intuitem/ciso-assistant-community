      ref_id: AS-MS-29-001
      description: The Commission SHALL create an Attestation Rulebook for representation
        attestations issued to a natural person representing another natural person.
        The Rulebook SHALL specify the unique attestation type of these representation
        attestations. The Rulebook SHALL also specify attributes used for defining
        a validity period, the nature of the representation, and the operations the
        representative is authorised to perform, thereby limiting the scope of its
        authorisation.
      annotation: 'Legacy ref-id: RP_01'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:ew-pio-29-001
