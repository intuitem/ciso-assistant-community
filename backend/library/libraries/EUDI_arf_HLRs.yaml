      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.d
      ref_id: AS-WP-09-025
      description: A Wallet Provider SHALL ensure that its Wallet Units comply with
        all relevant requirements specified in [Technical Specification 3](../../technical-specifications/ts3-wallet-unit-attestation.md).
      annotation: 'Legacy ref-id: WUA_20'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-026
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:a.2.3.6.d
      ref_id: AS-WP-09-026
      description: A PID Provider or Attestation Provider SHALL comply with all relevant
        requirements specified in [Technical Specification 3](../../technical-specifications/ts3-wallet-unit-attestation.md).
      annotation: 'Legacy ref-id: WUA_20a'
    - urn: urn:intuitem:risk:req_node:eudi_arf_hlrs:as-wp-09-027
