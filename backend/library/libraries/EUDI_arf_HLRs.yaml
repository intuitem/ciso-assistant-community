      ref_id: AS-MS-27-006
      description: Member States SHALL make the registry entries available online,
        in a human-readable format. The website used for this purpose SHALL use a
        secure channel protecting the authenticity and integrity of the information
        in the registry during transport. Member States SHALL NOT require authentication
