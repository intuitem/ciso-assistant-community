      description: A Member State SHALL approve an Attestation Provider according
        to a well-defined policy before including it in its Attestation Provider Registry.
        To that end, a Member State SHALL define specific vetting processes and rules
        of acceptance for inclusion of Attestation Providers in its Registry. These
