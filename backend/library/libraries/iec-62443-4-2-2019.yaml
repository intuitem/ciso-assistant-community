      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:12
      ref_id: SAR 3.2
      name: Protection from malicious code (software application)
      description: 'Control: Software application provides hooks for malicious-code
        protection (allowlisting, integrity validation) compatible with its runtime.
        Verify: Application-level integrity checks (manifest verification, code signing,
        plugin signing) are documented.'
      implementation_groups:
      - software_app
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      assessable: false
      depth: 1
      ref_id: '13'
      name: Embedded device requirements (EDR)
      description: Component-type-specific overlays for embedded devices (PLCs, RTUs,
        IEDs). Apply when certifying an embedded-device component.
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-2.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 2.4
      name: Mobile code (embedded device)
      description: 'Control: Embedded device mobile-code restrictions cover firmware-loaded
        scripts, interpreters, and dynamically loaded code. Verify: Firmware does
        not load unsigned dynamic code; allowed-types list is documented.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-2.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 2.13
      name: Use of physical diagnostic and test interfaces (embedded device)
      description: 'Control: Embedded device debug interfaces (JTAG, UART, programming
        headers) are disabled or authentication-locked in production. Verify: Production
        firmware disables debug interfaces; access requires an authenticated procedure.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 3.2
      name: Protection from malicious code (embedded device)
      description: 'Control: Embedded device firmware integrity is verified (signed
        firmware, secure boot); the device does not execute unsigned code. Verify:
        Firmware signing is enforced at boot; signing-key management is documented.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 3.10
      name: Support for updates (embedded device)
      description: 'Control: Embedded device firmware updates are authenticated, integrity-protected,
        and survive interruption (atomic install / dual-bank). Verify: Update mechanism
        uses signed firmware; partial-update failure does not brick the device.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 3.11
      name: Physical tamper resistance and detection (embedded device)
      description: 'Control: Embedded device tamper-resistance mechanisms (potting,
        mesh, sensors) match the SL-C; tamper events are logged or trigger key zeroization.
        Verify: Physical-tamper testing has been performed; tamper-response behavior
        is documented.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 3.12
      name: Provisioning product supplier roots of trust (embedded device)
      description: 'Control: Supplier roots of trust are provisioned in a secure factory
        environment and protected in hardware (secure element, fuses, OTP). Verify:
        Factory provisioning has documented controls; supplier roots are stored in
        tamper-resistant storage.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 3.13
      name: Provisioning asset owner roots of trust (embedded device)
      description: 'Control: Asset-owner roots can be provisioned through an authenticated
        procedure; supplier defaults can be replaced. Verify: A documented owner-provisioning
        procedure exists; ownership-transfer steps are auditable.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
      ref_id: EDR 3.14
      name: Integrity of the boot process (embedded device)
      description: 'Control: Embedded device secure boot validates firmware authenticity
        from the immutable hardware root of trust through bootloader and OS. Verify:
        Secure-boot chain is documented; boot-failure behavior (halt, recovery) is
        defined.'
      implementation_groups:
      - embedded_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      assessable: false
      depth: 1
      ref_id: '14'
      name: Host device requirements (HDR)
      description: Component-type-specific overlays for host devices (engineering
        workstations, servers, HMI hosts). Apply when certifying a host-device component.
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-2.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 2.4
      name: Mobile code (host device)
      description: 'Control: Host device mobile-code restrictions cover OS-level interpreters,
        drivers, plugins, and scripts. Verify: Host-OS configurations restrict mobile-code
        execution per documented allowlist.'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-2.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 2.13
      name: Use of physical diagnostic and test interfaces (host device)
      description: 'Control: Host device physical interfaces (USB, serial, JTAG) are
        managed (disabled where not needed, authentication-locked otherwise). Verify:
        Physical-interface policy is documented and enforced via OS or hardware controls.'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 3.2
      name: Protection from malicious code (host device)
      description: 'Control: Host devices implement malicious-code protection appropriate
        to a general-purpose OS (anti-malware, allowlisting, integrity monitoring).
        Verify: Host-OS protection is configured, current, and monitored.'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 3.10
      name: Support for updates (host device)
      description: 'Control: Host-OS and application updates are authenticated and
        integrity-protected. Verify: OS and application updates are signed; update
        mechanism is documented.'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 3.11
      name: Physical tamper resistance and detection (host device)
      description: 'Control: Host devices implement physical access controls and tamper
        detection (chassis intrusion, boot-time integrity). Verify: Tamper-detection
        events are logged; physical-access controls are documented.'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 3.12
      name: Provisioning product supplier roots of trust (host device)
      description: 'Control: Host devices ship with supplier roots of trust protected
        by hardware (TPM, OS keys). Verify: TPM/HSM provenance is documented; supplier-root
        integrity is verifiable.'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 3.13
      name: Provisioning asset owner roots of trust (host device)
      description: 'Control: Asset owners can provision their own roots of trust onto
        the host (TPM ownership transfer, custom CA install). Verify: Owner-provisioning
        procedure is documented; supplier defaults can be replaced.'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
      ref_id: HDR 3.14
      name: Integrity of the boot process (host device)
      description: 'Control: Host secure boot (UEFI Secure Boot, measured boot) validates
        the host boot chain from hardware root of trust. Verify: Secure boot is enabled
        in production; boot-time integrity is measurable (e.g. via TPM PCR values).'
      implementation_groups:
      - host_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      assessable: false
      depth: 1
      ref_id: '15'
      name: Network device requirements (NDR)
      description: Component-type-specific overlays for network devices (switches,
        routers, firewalls, gateways). Apply when certifying a network-device component.
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-1.6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 1.6
      name: Wireless access management (network device)
      description: 'Control: Network devices providing wireless access (APs) implement
        wireless-specific authentication, encryption, and segregation. Verify: Wireless-AP
        configurations are documented (SSIDs, encryption, auth methods); wireless
        segments are isolated.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-1.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 1.13
      name: Access via untrusted networks (network device)
      description: 'Control: Network devices acting as boundaries between trusted
        and untrusted zones implement the additional safeguards required for untrusted-network
        access. Verify: Boundary configurations match the documented inter-zone policy;
        untrusted-side access requires elevated safeguards.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-2.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 2.4
      name: Mobile code (network device)
      description: 'Control: Mobile-code execution on network devices (embedded scripting,
        automation) is restricted to authorized types and sources. Verify: Network-device
        scripting/automation is constrained per documented allowlist.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-2.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 2.13
      name: Use of physical diagnostic and test interfaces (network device)
      description: 'Control: Network device physical interfaces (console, USB, JTAG)
        are managed and physical access is controlled. Verify: Console/management
        ports require authentication; out-of-band access is protected.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 3.2
      name: Protection from malicious code (network device)
      description: 'Control: Network device firmware integrity is verified; unauthorized
        firmware will not load. Verify: Firmware signing is enforced; firmware-update
        history is auditable.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 3.10
      name: Support for updates (network device)
      description: 'Control: Network device firmware updates are authenticated, integrity-protected,
        and minimize service disruption (e.g. ISSU, graceful failover). Verify: Update
        mechanism is documented; failover/rollback procedures are tested.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 3.11
      name: Physical tamper resistance and detection (network device)
      description: 'Control: Network devices implement physical access controls suited
        to their deployment (locked enclosures, intrusion sensors). Verify: Physical-security
        requirements are documented per deployment scenario.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 3.12
      name: Provisioning product supplier roots of trust (network device)
      description: 'Control: Supplier roots of trust are protected in network device
        hardware (TPM, secure element). Verify: Supplier root-of-trust storage is
        documented; provenance is verifiable.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 3.13
      name: Provisioning asset owner roots of trust (network device)
      description: 'Control: Asset-owner roots can be provisioned onto network devices
        (custom CAs, signed configurations). Verify: Owner-provisioning procedure
        exists; supplier defaults can be replaced.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 3.14
      name: Integrity of the boot process (network device)
      description: 'Control: Network device secure boot validates firmware from hardware
        root of trust. Verify: Secure-boot chain is documented and enforced in production.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-5.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 5.2
      name: Zone boundary protection (network device)
      description: 'Control: Network devices enforcing zone boundaries (firewalls,
        gateways, data diodes) implement the documented inter-zone data-flow policy.
        Verify: Boundary rules match the zone-and-conduit design; rule changes go
        through change control. NIST 800-53: SC-7.'
      implementation_groups:
      - network_device
    - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-5.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
      ref_id: NDR 5.3
      name: General purpose, person-to-person communication restrictions (network
        device)
      description: 'Control: Network devices block general-purpose person-to-person
        communications (email, chat, browsing) at boundaries between control zones
        and external networks. Verify: Boundary policies block general-purpose comms
        protocols/ports between control zones and corporate/Internet zones.'
      implementation_groups:
      - network_device
