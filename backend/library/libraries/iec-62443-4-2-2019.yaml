      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:12
      ref_id: SAR 2.4
      name: Mobile code (software application)
      description: "Control: For software applications, mobile-code restrictions cover\
        \ the application's runtime \u2014 embedded interpreters, scripting hosts,\
        \ plugin systems. Verify: Application mobile-code execution paths are documented\
        \ and constrained per allowlist."
      implementation_groups:
      - software_app
