urn: urn:intuitem:risk:library:ii-901_integral
locale: fr
ref_id: II-901
name: "II n\xB0 901/SGDSN/ANSSI - Instruction interminist\xE9rielle n\xB0 901 relative\
  \ \xE0 la protection des syst\xE8mes d'information sensibles"
description: "La pr\xE9sente instruction d\xE9finit les objectifs et les r\xE8gles\
  \ relatifs \xE0 la protection des syst\xE8mes d'information sensibles, notamment\
  \ ceux traitant des informations portant la mention *Diffusion Restreinte*.\n\n\
  La pr\xE9sente instruction s'adresse \xE0 l'ensemble des personnes physiques ou\
  \ morales intervenant dans ces syst\xE8mes.\n\nLe respect des r\xE8gles contribue\
  \ \xE0 garantir la continuit\xE9 des activit\xE9s de l'entit\xE9 qui met en \u0153\
  uvre le syst\xE8me d'information, \xE0 prot\xE9ger l'image de cette entit\xE9, \xE0\
  \ pr\xE9venir la compromission d'informations sensibles et \xE0 assurer la s\xE9\
  curit\xE9 des personnes et des biens.\n\nCes r\xE8gles peuvent \xEAtre pr\xE9cis\xE9\
  es au cas par cas en s'appuyant sur les normes techniques existantes et sur les\
  \ guides techniques et les recommandations de l'Agence nationale de la s\xE9curit\xE9\
  \ des syst\xE8mes d'information (ANSSI).\n\nSources :\nhttps://cyber.gouv.fr/reglementation/cybersecurite-systemes-dinformation/protection-information-sensible-diffusion-restreinte/instruction-interministerielle-n901/\n\
  https://www.legifrance.gouv.fr/circulaire/id/39217"
copyright: SGDSN / ANSSI
version: 1
publication_date: 2026-05-22
provider: ANSSI
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:ii-901_integral
    ref_id: II-901
    name: "II n\xB0 901/SGDSN/ANSSI - Instruction interminist\xE9rielle n\xB0 901\
      \ relative \xE0 la protection des syst\xE8mes d'information sensibles"
    description: "La pr\xE9sente instruction d\xE9finit les objectifs et les r\xE8\
      gles relatifs \xE0 la protection des syst\xE8mes d'information sensibles, notamment\
      \ ceux traitant des informations portant la mention *Diffusion Restreinte*.\n\
      \nLa pr\xE9sente instruction s'adresse \xE0 l'ensemble des personnes physiques\
      \ ou morales intervenant dans ces syst\xE8mes.\n\nLe respect des r\xE8gles contribue\
      \ \xE0 garantir la continuit\xE9 des activit\xE9s de l'entit\xE9 qui met en\
      \ \u0153uvre le syst\xE8me d'information, \xE0 prot\xE9ger l'image de cette\
      \ entit\xE9, \xE0 pr\xE9venir la compromission d'informations sensibles et \xE0\
      \ assurer la s\xE9curit\xE9 des personnes et des biens.\n\nCes r\xE8gles peuvent\
      \ \xEAtre pr\xE9cis\xE9es au cas par cas en s'appuyant sur les normes techniques\
      \ existantes et sur les guides techniques et les recommandations de l'Agence\
      \ nationale de la s\xE9curit\xE9 des syst\xE8mes d'information (ANSSI).\n\n\
      Sources :\nhttps://cyber.gouv.fr/reglementation/cybersecurite-systemes-dinformation/protection-information-sensible-diffusion-restreinte/instruction-interministerielle-n901/\n\
      https://www.legifrance.gouv.fr/circulaire/id/39217"
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:ii-901_integral:titre-i
      assessable: false
      depth: 1
      ref_id: Titre I
      name: "D\xE9finition et p\xE9rim\xE8tre"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-1er
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-i
      ref_id: Article 1er
      name: "D\xE9finitions"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-1er:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-1er
      description: "Les syst\xE8mes d'information sensibles sont ceux qui traitent\
        \ d'informations dont la divulgation \xE0 des personnes non autoris\xE9es,\
        \ l'alt\xE9ration ou l'indisponibilit\xE9 sont de nature \xE0 porter atteinte\
        \ \xE0 la r\xE9alisation des objectifs des entit\xE9s qui les mettent en \u0153\
        uvre.\nLes syst\xE8mes d'information Diffusion Restreinte sont les syst\xE8\
        mes d'information sensibles qui traitent d'informations portant la mention\
        \ Diffusion Restreinte<sup>1</sup> ou ses \xE9quivalentes europ\xE9ennes ou\
        \ internationales."
      annotation: "<sup>1</sup> Voir l'article 5 et l'annexe 3, intitul\xE9e \xAB\
        \ R\xE8gles de protection des informations ou supports portant la mention\
        \ Diffusion Restreinte \xBB, de l'instruction g\xE9n\xE9rale interminist\xE9\
        rielle n\xB0 1300/SGDSN/PSE/PSD du 30 novembre 2011 sur la protection du secret\
        \ de la d\xE9fense nationale. La mention Diffusion Restreinte n'est pas un\
        \ niveau de classification mais une mention de protection qui signale \xE0\
        \ l'utilisateur la discr\xE9tion dont il doit faire preuve dans la manipulation\
        \ des informations couvertes par cette mention."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-i
      ref_id: Article 2
      name: Champ d'application
    - urn: urn:intuitem:risk:req_node:ii-901_integral:a2.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-2
      ref_id: A2.1
      description: "L'instruction s'applique :\n* aux administrations de l'\xC9tat<sup>2</sup>\
        \ qui mettent en \u0153uvre des syst\xE8mes d'information sensibles;\n* aux\
        \ entit\xE9s publiques ou priv\xE9es soumises \xE0 la r\xE9glementation relative\
        \ \xE0 la protection du potentiel scientifique et technique de la nation (PPST)<sup>3</sup>\
        \ qui mettent en \u0153uvre des syst\xE8mes d'information sensibles<sup>4</sup>\
        \ ;\n* \xE0 toute autre entit\xE9 publique ou priv\xE9e qui met en \u0153\
        uvre des syst\xE8mes d'information Diffusion Restreinte."
      annotation: "<sup>2</sup> Les administrations de l'\xC9tat au sens de la pr\xE9\
        sente instruction sont les administrations centrales, les \xE9tablissements\
        \ publics nationaux, les services d\xE9concentr\xE9s de l'\xC9tat et les autorit\xE9\
        s administratives ind\xE9pendantes.\n<sup>3</sup> Le cadre r\xE9glementaire\
        \ de la PPST est d\xE9fini \xE0 l'article R. 413-5-1 du code p\xE9nal ainsi\
        \ que par le d\xE9cret n\xB0 2011-1425 du 2 novembre 2011 portant application\
        \ de l'article 413-7 du code p\xE9nal et relatif \xE0 la protection du potentiel\
        \ scientifique et technique de la nation et par l'arr\xEAt\xE9 du 3 juillet\
        \ 2012 relatif \xE0 la protection du potentiel scientifique et technique de\
        \ la nation.\n<sup>4</sup> Sauf lorsqu'ils traitent d'informations classifi\xE9\
        es et sont en cons\xE9quence r\xE9gis par les textes relatifs \xE0 la protection\
        \ des informations couvertes par le secret de la d\xE9fense nationale, les\
        \ syst\xE8mes d'information qui sont mis en \u0153uvre par une entit\xE9 soumise\
        \ \xE0 la r\xE9glementation relative \xE0 la PPST et qui traitent d'informations\
        \ relatives aux sp\xE9cialit\xE9s dont les savoir-faire sont susceptibles\
        \ d'\xEAtre d\xE9tourn\xE9s \xE0 des fins de terrorisme ou de prolif\xE9ration\
        \ d'armes de destruction massive et de leurs vecteurs constituent des syst\xE8\
        mes d'information Diffusion Restreinte."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:a2.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-2
      ref_id: A2.2
      description: "La pr\xE9sente instruction a valeur de recommandation pour toute\
        \ autre entit\xE9 publique ou priv\xE9e qui met en \u0153uvre des syst\xE8\
        mes d'informations sensibles, notamment des syst\xE8mes traitant d'informations\
        \ r\xE9gies par des obligations de s\xE9curit\xE9 sp\xE9cifiques<sup>5</sup>."
      annotation: "<sup>5</sup> Sont notamment concern\xE9s les syst\xE8mes traitant\
        \ d'informations couvertes par le secret professionnel, constituant des correspondances\
        \ priv\xE9es ou mentionn\xE9es \xE0 l'article 6 de la loi n\xB0 78-753 du\
        \ 17 juillet 1978 portant diverses mesures d'am\xE9lioration des relations\
        \ entre l'administration et le public et diverses dispositions d'ordre administratif,\
        \ social et fiscal. Sont \xE9galement concern\xE9s les syst\xE8mes d'information\
        \ mentionn\xE9s dans l'ordonnance n\xB0 2005-1516 du 8 d\xE9cembre 2005 relative\
        \ aux \xE9changes \xE9lectroniques entre les usagers et les autorit\xE9s administratives\
        \ et entre les autorit\xE9s administratives."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:a2.3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-2
      ref_id: A2.3
      description: "La pr\xE9sente instruction ne s'applique pas aux syst\xE8mes d'information\
        \ traitant d'informations couvertes par le secret de la d\xE9fense nationale<sup>6</sup>."
      annotation: "<sup>6</sup> Ces syst\xE8mes sont r\xE9gis par les articles R.\
        \ 2311-1 et suivants du code de la d\xE9fense et par l'instruction g\xE9n\xE9\
        rale interminist\xE9rielle n\xB0 1300/SGDSN/PSE/PSD du 30 novembre 2011 sur\
        \ la protection du secret de la d\xE9fense nationale, notamment son titre\
        \ V."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-i
      ref_id: Article 3
      name: "Principes strat\xE9giques appliqu\xE9s"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-3:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-3
      description: "Les r\xE8gles d\xE9crites dans la pr\xE9sente instruction s'appuient\
        \ sur cinq principes strat\xE9giques :\n* mettre en place une organisation\
        \ consacr\xE9e \xE0 la s\xE9curit\xE9 des syst\xE8mes d'information, incluant\
        \ des volets pr\xE9ventifs et d\xE9fensifs et reposant sur des moyens humains,\
        \ mat\xE9riels et financiers identifi\xE9s ;\n* \xE9valuer les risques p\xE9\
        riodiquement, dans une d\xE9marche d'am\xE9lioration continue de la s\xE9\
        curit\xE9 de chaque syst\xE8me pendant leur dur\xE9e de vie ;\n* d\xE9fendre\
        \ en profondeur, en s'assurant d\xE8s la conception que si l'une des mesures\
        \ de s\xE9curit\xE9 est compromise ou d\xE9faillante, d'autres assurent la\
        \ protection des informations sensibles ;\n* respecter les r\xE8gles \xE9\
        l\xE9mentaires d'hygi\xE8ne informatique, d\xE9finies par l'ANSSI, mises en\
        \ \u0153uvre par des administrateurs de syst\xE8mes d'information form\xE9\
        s \xE0 cet effet;\n* recourir \xE0 des produits de s\xE9curit\xE9 agr\xE9\xE9\
        s, qualifi\xE9s ou, \xE0 d\xE9faut, certifi\xE9s et \xE0 des prestataires\
        \ de services de confiance qualifi\xE9s par l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-i
      ref_id: Article 4
      name: "Application des r\xE8gles"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:a4.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-4
      ref_id: A4.1
      description: "Application des r\xE8gles aux syst\xE8mes d'information sensibles\n\
        Les administrations de l'\xC9tat qui mettent en \u0153uvre des syst\xE8mes\
        \ d'information sensibles appliquent la politique de s\xE9curit\xE9 des syst\xE8\
        mes d'information de l'\xC9tat (PSSIE)<sup>7</sup>. Une administration de\
        \ l'\xC9tat qui respecte la PSSIE est r\xE9put\xE9e se conformer \xE0 l'ensemble\
        \ des dispositions du titre II.\nLes entit\xE9s publiques ou priv\xE9es mentionn\xE9\
        es \xE0 l'article 2.1 qui mettent en \u0153uvre des syst\xE8mes d'information\
        \ sensibles appliquent les r\xE8gles pr\xE9vues au titre II ainsi que celles\
        \ pr\xE9vues \xE0 l'annexe 1. Ces derni\xE8res sont les r\xE8gles de la PSSIE\
        \ adapt\xE9es aux entit\xE9s situ\xE9es hors du champ d'application de cette\
        \ politique de s\xE9curit\xE9."
      annotation: "<sup>7</sup> La PSSIE a \xE9t\xE9 approuv\xE9e par une circulaire\
        \ du Premier ministre sign\xE9e le 17 juillet 2014."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:a4.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-4
      ref_id: A4.2
      description: "Application des r\xE8gles aux syst\xE8mes d'information Diffusion\
        \ Restreinte\nLes administrations de l'\xC9tat qui mettent en \u0153uvre des\
        \ syst\xE8mes d'information Diffusion Restreinte appliquent la PSSIE ainsi\
        \ que les r\xE8gles pr\xE9vues au titre III.\nLes entit\xE9s publiques ou\
        \ priv\xE9es qui mettent en \u0153uvre des syst\xE8mes d'information Diffusion\
        \ Restreinte appliquent les r\xE8gles pr\xE9vues aux titres II et III ainsi\
        \ qu'\xE0 l'annexe 1."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      assessable: false
      depth: 1
      ref_id: Titre II
      name: "Protection des syst\xE8mes d'information sensibles"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 5
      name: "D\xE9termination de la sensibilit\xE9 des informations"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-5
      description: "Chaque entit\xE9 mettant en \u0153uvre un syst\xE8me d'information\
        \ sensible :"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1
      description: identifie l'information sensible qu'elle traite ;
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1
      description: marque cette information par les moyens de son choix ;
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1:3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1
      description: "d\xE9termine, si besoin, une \xE9chelle de sensibilit\xE9 correspondant\
        \ \xE0 des niveaux en mati\xE8re de disponibilit\xE9, d'int\xE9grit\xE9 et\
        \ de confidentialit\xE9 des informations de son syst\xE8me d'information sensible\
        \ ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1:4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:1
      description: "applique des mesures de protection adapt\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-5:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-5
      description: "Lorsque les informations sensibles transitent entre plusieurs\
        \ entit\xE9s, leur niveau de sensibilit\xE9 est explicitement mentionn\xE9\
        \ par l'entit\xE9 \xE9mettrice afin qu'elles soient prot\xE9g\xE9es en cons\xE9\
        quence par l'entit\xE9 destinataire en termes de disponibilit\xE9, d'int\xE9\
        grit\xE9 et de confidentialit\xE9, pendant et apr\xE8s leur transit."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 6
      name: "Gouvernance de la protection des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-6:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-6
      description: "Chaque entit\xE9 :"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-6:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-6:1
      description: "applique une politique de s\xE9curit\xE9 des syst\xE8mes d'information\
        \ (PSSI), valid\xE9e au plus haut niveau de l'entit\xE9 et couvrant tous les\
        \ aspects, techniques ou non, de la s\xE9curit\xE9 (communication, ressources\
        \ humaines et financi\xE8res, aspects juridiques, etc.) ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-6:1:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-6:1
      description: "organise la gouvernance et attribue les responsabilit\xE9s en\
        \ mati\xE8re de s\xE9curit\xE9 des syst\xE8mes d'information."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 7
      name: "Ma\xEEtrise des risques"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-7:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-7
      description: "La PSSI de l'entit\xE9 r\xE9sulte d'une analyse des risques men\xE9\
        e:"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-7:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-7:1
      description: pour tous les risques, pas seulement techniques, qu'ils soient
        d'origine humaine ou non ;
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-7:1:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-7:1
      description: "pour chacun des syst\xE8mes d'information de l'entit\xE9 ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-7:1:3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-7:1
      description: "en appr\xE9ciant l'impact qu'une menace sur un composant du syst\xE8\
        me pourrait avoir sur les missions de l'entit\xE9, son image, son patrimoine\
        \ ou la s\xE9curit\xE9 des biens et des personnes."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 8
      name: "Homologation des syst\xE8mes d'information sensibles"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-8:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-8
      description: "Tout syst\xE8me d'information sensible doit faire l'objet d'une\
        \ homologation de s\xE9curit\xE9 avant sa mise en service. Dans le dossier\
        \ d'homologation figurent notamment les risques r\xE9siduels, c'est-\xE0-dire\
        \ ceux qui ne sont pas couverts par des mesures de protection."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-8:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-8
      description: "L'autorit\xE9 d'homologation doit \xEAtre choisie au sein de l'entit\xE9\
        , au niveau hi\xE9rarchique suffisant pour assumer la responsabilit\xE9 aff\xE9\
        rente \xE0 la d\xE9cision d'homologation. Elle accepte notamment les risques\
        \ r\xE9siduels. Elle est en principe l'autorit\xE9 qui emploie le syst\xE8\
        me."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-8:3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-8
      description: "En pronon\xE7ant sa d\xE9cision d'homologation, l'autorit\xE9\
        \ d'homologation d\xE9clare que le syst\xE8me d'information est conforme aux\
        \ r\xE8gles pr\xE9vues par la pr\xE9sente instruction."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 9
      name: "Protection des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-9
      description: "L'entit\xE9 dispose d'une cartographie de l'ensemble des syst\xE8\
        mes d'information dont elle est responsable. Cette cartographie est tenue\
        \ \xE0 jour. Elle est n\xE9cessaire \xE0 l'entit\xE9 pour assurer la protection\
        \ de ses syst\xE8mes d'information."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-9
      description: "L'entit\xE9 prot\xE8ge ses syst\xE8mes d'information contre les\
        \ menaces identifi\xE9es pendant toute leur dur\xE9e de vie. La protection\
        \ repose sur plusieurs volets :"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:2:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:2
      description: "physique: elle retarde ou emp\xEAche l'acc\xE8s physique des personnes\
        \ non autoris\xE9s aux locaux, aux syst\xE8mes et aux informations, tout en\
        \ maintenant la disponibilit\xE9 des acc\xE8s pour les personnes autoris\xE9\
        es. Elle permet \xE9galement d'\xE9viter et de d\xE9tecter les incidents physiques\
        \ tels les d\xE9fauts d'alimentation, les d\xE9fauts de climatisation, les\
        \ incendies et les d\xE9g\xE2ts des eaux ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:2:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:2
      description: "logique : elle permet de se pr\xE9munir contre les attaques informatiques\
        \ malveillantes et accidentelles mais surtout de prot\xE9ger les r\xE9seaux,\
        \ les \xE9quipements, les donn\xE9es et leurs supports, les acc\xE8s logiques\
        \ ainsi que l'administration des syst\xE8mes;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:2:3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:2
      description: "organisationnel : elle est mise en \u0153uvre selon des processus\
        \ explicitement d\xE9finis dans la PSSI de l'entit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-9:3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-9
      description: "En cas d'\xE9l\xE9vation du niveau de la menace, l'entit\xE9 renforce\
        \ les mesures de vigilance et de protection de ses syst\xE8mes."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 10
      name: "Gestion des incidents de s\xE9curit\xE9 des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-10:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-10
      description: "M\xEAme prot\xE9g\xE9e, l'entit\xE9 se pr\xE9pare \xE0 subir des\
        \ attaques sur ses syst\xE8mes d'information. Elle int\xE8gre la s\xE9curit\xE9\
        \ des syst\xE8mes d'information (SSI) dans ses proc\xE9dures de gestion de\
        \ crise et dans ses exercices p\xE9riodiques. Pour \xEAtre en mesure d'agir\
        \ pour r\xE9duire l'impact des attaques et des incidents, elle se dote :"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-10:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-10:1
      description: "d'une capacit\xE9 de d\xE9tection, d'analyse, de qualification\
        \ et de r\xE9action, afin notamment d'assurer la continuit\xE9 de ses missions\
        \ ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-10:1:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-10:1
      description: "d'un dispositif de gestion des incidents afin de d\xE9tecter et\
        \ d'analyser les attaques et de r\xE9agir face \xE0 des \xE9v\xE9nements anormaux."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-10:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-10
      description: "Des retours d'exp\xE9rience de traitement des incidents sont pr\xE9\
        vus apr\xE8s chaque \xE9v\xE9nement."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-11
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 11
      name: "\xC9valuation du niveau de s\xE9curit\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-11:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-11
      description: "L'entit\xE9 \xE9value en permanence le niveau de s\xE9curit\xE9\
        \ de ses syst\xE8mes d'information et les risques r\xE9siduels. Elle effectue\
        \ r\xE9guli\xE8rement des v\xE9rifications et r\xE9alise des audits fonctionnels\
        \ et techniques de s\xE9curit\xE9 des syst\xE8mes d'information. Cette \xE9\
        valuation permet de r\xE9duire l'impact des attaques et des incidents et d'assurer\
        \ la continuit\xE9 de service de l'entit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-12
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-ii
      ref_id: Article 12
      name: "Relations avec les autorit\xE9s de l'\xC9tat"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-12:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-12
      description: "Sans pr\xE9judice des dispositions l\xE9gislatives et r\xE9glementaires\
        \ sp\xE9ciales, notamment celles applicables aux op\xE9rateurs d'importance\
        \ vitale, chaque entit\xE9 coop\xE8re avec les autorit\xE9s de l'\xC9tat telles\
        \ que l'ANSSI ou les minist\xE8res de tutelle pour assurer la s\xE9curit\xE9\
        \ de ses syst\xE8mes d'information. Elle r\xE9pond, en cas de crise, aux sollicitations\
        \ de ces autorit\xE9s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      assessable: false
      depth: 1
      ref_id: Titre III
      name: "Protection des syst\xE8mes d'information Diffusion Restreinte"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-13
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      ref_id: Article 13
      name: "Homologation des syst\xE8mes d'information Diffusion Restreinte"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-13:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-13
      description: "Tout syst\xE8me d'information Diffusion Restreinte est homologu\xE9\
        \ \xE0 ce titre dans les conditions pr\xE9vues \xE0 l'article 8. L'homologation\
        \ pr\xE9voit en particulier la mani\xE8re dont est contr\xF4l\xE9e et ma\xEE\
        tris\xE9e la destruction du syst\xE8me lui-m\xEAme ou d'autres supports ayant\
        \ contenu des informations portant la mention Diffusion Restreinte."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-14
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      ref_id: Article 14
      name: Traitement des informations portant la mention Diffusion Restreinte
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-14:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-14
      description: "En fonction de son besoin et de ses moyens techniques, humains\
        \ et financiers, l'entit\xE9 choisit, conform\xE9ment aux dispositions du\
        \ pr\xE9sent article et de l'annexe 2, la classe du r\xE9seau sur lequel sont\
        \ trait\xE9es les informations portant la mention Diffusion Restreinte."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-14:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-14
      description: "Le traitement en clair des informations portant la mention Diffusion\
        \ Restreinte, notamment leur stockage et leur diffusion, s'effectue sur des\
        \ r\xE9seaux de classe 1 ou 2."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-14:3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-14
      description: "Le choix d'un r\xE9seau de classe 2 est fortement recommand\xE9\
        . En effet, toute connexion \xE0 un r\xE9seau public constitue en elle-m\xEA\
        me une vuln\xE9rabilit\xE9 qui peut facilement conduire \xE0 la compromission\
        \ d'informations."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-14:4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-14
      description: "Les informations portant la mention Diffusion Restreinte sont\
        \ chiffr\xE9es \xE0 l'aide de moyens agr\xE9\xE9s \xE0 ce niveau par l'ANSSI\
        \ d\xE8s lors qu'elles transitent ou sont stock\xE9es en dehors d'une zone\
        \ physiquement prot\xE9g\xE9e dans les conditions pr\xE9vues \xE0 l'article\
        \ 15."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-15
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      ref_id: Article 15
      name: Protection physique des locaux
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-15
      description: "Les mesures de s\xE9curit\xE9 physique sont choisies en proportion\
        \ des menaces d\xE9termin\xE9es par l'analyse des risques pr\xE9vue \xE0 l'article\
        \ 7. Elles ont pour objectif \xE0 la fois de pr\xE9venir la perte, l'alt\xE9\
        ration ou la d\xE9t\xE9rioration d'une information portant la mention Diffusion\
        \ Restreinte et de recueillir des informations pour r\xE9soudre des incidents\
        \ informatiques en :"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1
      description: "d\xE9fendant par une barri\xE8re p\xE9rim\xE9trique physique les\
        \ limites de la zone \xE0 prot\xE9ger ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1
      description: "dissuadant l'acc\xE8s non autoris\xE9 par toute mesure physique\
        \ appropri\xE9e ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1:3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1
      description: "contr\xF4lant l'acc\xE8s des locaux de fa\xE7on \xE9lectronique,\
        \ \xE9lectrom\xE9canique ou humaine ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1:4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1
      description: "conservant la tra\xE7abilit\xE9 des acc\xE8s ;"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1:5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-15:1
      description: "prot\xE9geant des intrusions par un syst\xE8me de d\xE9tection\
        \ (ce syst\xE8me peut remplacer une barri\xE8re p\xE9rim\xE9trique ou la compl\xE9\
        ter pour renforcer le niveau de s\xE9curit\xE9)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-16
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      ref_id: Article 16
      name: Externalisation
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-16:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-16
      description: "En cas d'externalisation d'une prestation qui met en \u0153uvre\
        \ un syst\xE8me d'information Diffusion Restreinte, l'entit\xE9 et son prestataire\
        \ tiennent compte des recommandations figurant dans le guide de l'ANSSI relatif\
        \ \xE0 l'externalisation<sup>8</sup>. Le contrat qui les lie garantit la conformit\xE9\
        \ du syst\xE8me d'information aux r\xE8gles pr\xE9vues par la pr\xE9sente\
        \ instruction. La prestation s'effectue, dans la mesure du possible, \xE0\
        \ partir du territoire national."
      annotation: "<sup>8</sup> Guide de l'ANSSI \xAB Ma\xEEtriser les risques de\
        \ l'infog\xE9rance - Externalisation des syst\xE8mes d'information \xBB, http://www.ssi.gouv.fr/infogerance."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-16:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-16
      description: "Il est recommand\xE9 \xE0 toute entit\xE9 de choisir des prestataires\
        \ de services de confiance qualifi\xE9s par l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-17
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      ref_id: Article 17
      name: "Utilisation en milieu non ma\xEEtris\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-17:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-17
      description: "Les informations portant la mention Diffusion Restreinte contenues\
        \ dans des dispositifs nomades (ordinateurs portables, m\xE9dia amovibles,\
        \ t\xE9l\xE9phones, etc.) sont chiffr\xE9es par des moyens agr\xE9\xE9s par\
        \ l'ANSSI, afin de limiter le risque de divulgation en cas de perte ou de\
        \ vol."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-17:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-17
      description: "La consultation de documents \xE9lectroniques portant la mention\
        \ Diffusion Restreinte dans les lieux publics est entour\xE9e de pr\xE9cautions\
        \ particuli\xE8res (utilisation d'un filtre de confidentialit\xE9 sur l'\xE9\
        cran, surveillance continuelle du poste nomade lui-m\xEAme, des alentours,\
        \ des supports portant la mention Diffusion Restreinte ou des \xE9quipements\
        \ qui les utilisent)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-17:3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-17
      description: "La connexion d'\xE9quipements personnels \xE0 un syst\xE8me d'informations\
        \ Diffusion Restreinte est proscrite."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-17:4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-17
      description: "Il en va de m\xEAme de la connexion d'\xE9quipements nomades traitant\
        \ d'informations portant la mention Diffusion Restreinte \xE0 tout autre syst\xE8\
        me d'information que ceux homologu\xE9s par l'entit\xE9 pour traiter de telles\
        \ informations, sauf si l'homologation du syst\xE8me d'information auquel\
        \ le dispositif nomade appartient le permet et si les r\xE8gles pr\xE9vues\
        \ par la pr\xE9sente instruction sont respect\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-18
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      ref_id: Article 18
      name: Supports audiovisuels
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-18:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-18
      description: "Avant de diffuser des informations portant la mention Diffusion\
        \ Restreinte sur un support audiovisuel, le responsable de la diffusion v\xE9\
        rifie que les participants ont besoin d'en conna\xEEtre. Il s'assure \xE9\
        galement que les syst\xE8mes d'information utilis\xE9s sont homologu\xE9s\
        \ pour traiter des informations portant la mention Diffusion Restreinte."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-18:2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-18
      description: "\xC0 cette occasion, les \xE9ventuelles captations photographiques,\
        \ vid\xE9o ou audio des informations font l'objet d'une attention particuli\xE8\
        re. Le cas \xE9ch\xE9ant, ces captations sont interdites."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-19
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iii
      ref_id: Article 19
      name: "Autorisations de d\xE9rogation"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-19:1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-19
      description: "Lorsque les circonstances l'imposent, des d\xE9rogations, limit\xE9\
        es dans le temps, aux r\xE8gles pr\xE9vues par la pr\xE9sente instruction\
        \ peuvent \xEAtre accord\xE9es \xE0 une entit\xE9 pour un syst\xE8me d'information\
        \ Diffusion Restreinte qu'elle met en \u0153uvre. Les d\xE9rogations sont\
        \ accord\xE9es par le haut fonctionnaire de d\xE9fense et de s\xE9curit\xE9\
        \ du minist\xE8re dont rel\xE8ve l'entit\xE9 qui met en \u0153uvre le syst\xE8\
        me d'information. Les autorisations de d\xE9rogation, accompagn\xE9es de leur\
        \ motivation, sont communiqu\xE9es \xE0 l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iv
      assessable: false
      depth: 1
      ref_id: Titre IV
      name: Dispositions transitoires et finales
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-20
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iv
      ref_id: Article 20
      name: Dispositions transitoires
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-20:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-20
      description: "Les entit\xE9s disposent d'un d\xE9lai de trois ans \xE0 compter\
        \ de la date de publication de la pr\xE9sente instruction pour mettre en conformit\xE9\
        \ avec les r\xE8gles qu'elle pr\xE9voit leurs syst\xE8mes d'information Diffusion\
        \ Restreinte mis en service avant la date de publication de la pr\xE9sente\
        \ instruction ou dans les six mois suivant cette date. Durant ce d\xE9lai,\
        \ les entit\xE9s \xE9tablissent et tiennent \xE0 la disposition de l'ANSSI\
        \ la liste des manquements aux r\xE8gles pr\xE9vues par la pr\xE9sente instruction."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-21
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:titre-iv
      ref_id: Article 21
      name: Abrogation
    - urn: urn:intuitem:risk:req_node:ii-901_integral:article-21:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:article-21
      description: "La pr\xE9sente instruction abroge la recommandation n\xB0 901/DISSI/SCSSI\
        \ du 2 mars 1994 pour la protection des syst\xE8mes d'information traitant\
        \ des informations sensibles non classifi\xE9es de d\xE9fense et la recommandation\
        \ n\xB0 600/DISSI/SCSSI de mars 1993 pour la protection des informations sensibles\
        \ ne relevant pas du secret de d\xE9fense."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      assessable: false
      depth: 1
      ref_id: Annexe 1
      name: "R\xE8gles pour les entit\xE9s situ\xE9es hors du champ d'application\
        \ de la PSSIE"
      annotation: "<sup>9</sup> Ces r\xE8gles sont adapt\xE9es de la politique de\
        \ s\xE9curit\xE9 des syst\xE8mes d'information de l'\xC9tat."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: Politique, organisation, gouvernance
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:1
      ref_id: Objectif 1
      name: "Mettre en place une organisation ad\xE9quate, garantissant la prise en\
        \ compte pr\xE9ventive et r\xE9active de la s\xE9curit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:1.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-1
      ref_id: '1.1'
      name: Organisation SSI
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.1
      ref_id: ORG-SSI
      name: Organisation de la SSI
      description: "Une organisation d\xE9di\xE9e \xE0 la SSI est d\xE9ploy\xE9e au\
        \ sein de chaque entit\xE9. Cette organisation d\xE9finit les responsabilit\xE9\
        s internes et \xE0 l'\xE9gard des tiers, les modalit\xE9s de coordination\
        \ avec les autorit\xE9s externes ainsi que les modalit\xE9s d'application\
        \ des mesures de protection. Des proc\xE9dures d'application des mesures sont\
        \ \xE9crites et port\xE9es \xE0 la connaissance de tous."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:1.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-1
      ref_id: '1.2'
      name: Acteurs SSI
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-act-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.2
      ref_id: ORG-ACT-SSI
      name: Identification des acteurs de la SSI
      description: "L'organisation de la SSI s'appuie sur des acteurs clairement identifi\xE9\
        s, responsables de la mise en application g\xE9n\xE9rale de la PSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:1.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-1
      ref_id: '1.3'
      name: "Responsabilit\xE9s internes"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-rssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.3
      ref_id: ORG-RSSI
      name: "D\xE9signation du responsable de la SSI"
      description: "La direction de l'entit\xE9 s'appuie sur un ou plusieurs responsables\
        \ de la s\xE9curit\xE9 des syst\xE8mes d'information (RSSI), charg\xE9s de\
        \ l'assister dans le pilotage et la gestion de la SSI. Des correspondants\
        \ locaux de la SSI peuvent \xEAtre d\xE9sign\xE9s, le cas \xE9ch\xE9ant, afin\
        \ de constituer un relais du RSSI. Le RSSI d'une entit\xE9 fait valider les\
        \ mesures d'application de la PSSI par la direction de l'entit\xE9 et veille\
        \ \xE0 leur application. Des d\xE9nominations alternatives des fonctions mentionn\xE9\
        es ci-dessus peuvent \xEAtre utilis\xE9es si n\xE9cessaire."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-resp
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.3
      ref_id: ORG-RESP
      name: "Formalisation des responsabilit\xE9s"
      description: "Une note d'organisation fixe la r\xE9partition au sein de chaque\
        \ entit\xE9 et au niveau local des responsabilit\xE9s et r\xF4les en mati\xE8\
        re de SSI. Cette note sera, le plus souvent, propos\xE9e par le RSSI et valid\xE9\
        e par la direction de l'entit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:1.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-1
      ref_id: '1.4'
      name: "Responsabilit\xE9s vis-\xE0-vis des tiers"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-tiers
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.4
      ref_id: ORG-TIERS
      name: Gestion contractuelle des tiers
      description: "Le RSSI coordonne les actions permettant l'int\xE9gration des\
        \ clauses li\xE9es \xE0 la SSI dans tout contrat ou convention impliquant\
        \ un acc\xE8s par des tiers \xE0 des informations ou \xE0 des ressources informatiques."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:1.5
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-1
      ref_id: '1.5'
      name: PSSI
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-pil-pssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.5
      ref_id: ORG-PIL-PSSI
      name: "D\xE9finition et pilotage de la PSSI"
      description: "Chaque entit\xE9 \xE9tablit une PSSI, valid\xE9e par la direction.\
        \ Une structure de pilotage de la PSSI est d\xE9finie. Cette structure est\
        \ charg\xE9e de sa mise en place, de son \xE9volution, de son suivi et de\
        \ son contr\xF4le."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:1.6
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-1
      ref_id: '1.6'
      name: "Application des mesures de s\xE9curit\xE9 au sein de l'entit\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-app-instr
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.6
      ref_id: ORG-APP-INSTR
      name: "Application de l'instruction dans l'entit\xE9"
      description: "Le RSSI planifie les actions d'application de la PSSI. Il rend\
        \ compte r\xE9guli\xE8rement de l'application des mesures de s\xE9curit\xE9\
        \ aupr\xE8s de la direction de l'entit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:org-app-docs
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:1.6
      ref_id: ORG-APP-DOCS
      name: Formalisation de documents d'application
      description: "Le RSSI \xE9tablit et tient \xE0 jour les documents, approuv\xE9\
        s par la direction de l'entit\xE9, permettant l'application des mesures de\
        \ la PSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: Ressources humaines
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:2
      ref_id: Objectif 2
      name: Faire des personnes les maillons forts des SI.
    - urn: urn:intuitem:risk:req_node:ii-901_integral:2.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-2
      ref_id: '2.1'
      name: Utilisateurs
    - urn: urn:intuitem:risk:req_node:ii-901_integral:rh-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:2.1
      ref_id: RH-SSI
      name: Charte d'application de la SSI
      description: "Une charte d'application de la PSSI, r\xE9capitulant les mesures\
        \ pratiques d'utilisation s\xE9curis\xE9e des ressources informatiques et\
        \ \xE9labor\xE9e sous le pilotage de la cha\xEEne fonctionnelle de la SSI,\
        \ est communiqu\xE9e \xE0 l'ensemble des agents de chaque entit\xE9. Cette\
        \ charte doit \xEAtre opposable juridiquement et, si possible, int\xE9gr\xE9\
        e au r\xE8glement int\xE9rieur de l'entit\xE9. Le personnel non permanent\
        \ (stagiaires, int\xE9rimaires, prestataires) est inform\xE9 de ses devoirs\
        \ dans le cadre de son usage des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:2.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-2
      ref_id: '2.2'
      name: Personnel permanent
    - urn: urn:intuitem:risk:req_node:ii-901_integral:rh-motiv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:2.2
      ref_id: RH-MOTIV
      name: "Choix et sensibilisation des personnes tenant les postes cl\xE9s de la\
        \ SSI"
      description: "Une attention particuli\xE8re doit \xEAtre port\xE9e au recrutement\
        \ des personnes cl\xE9s de la SSI : RSSI, correspondants locaux de la SSI\
        \ et administrateurs de s\xE9curit\xE9. Les RSSI et leurs correspondants locaux\
        \ doivent \xEAtre sp\xE9cifiquement form\xE9s \xE0 la SSI. Les administrateurs\
        \ des SI doivent \xEAtre r\xE9guli\xE8rement sensibilis\xE9s aux devoirs li\xE9\
        s \xE0 leur fonction et doivent veiller \xE0 respecter ces exigences dans\
        \ le cadre de leurs activit\xE9s quotidiennes."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:rh-conf
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:2.2
      ref_id: RH-CONF
      name: Personnels de confiance
      description: "Toutes les personnes manipulant des informations sensibles doivent\
        \ le faire avec une attention particuli\xE8re, dans le respect des textes\
        \ en vigueur. Les sanctions \xE9ventuelles s'appliquant aux cas de n\xE9gligence\
        \ ou de malveillance leur sont rappel\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:rh-util
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:2.2
      ref_id: RH-UTIL
      name: "Sensibilisation des utilisateurs des syst\xE8mes d'information"
      description: "Chaque utilisateur doit \xEAtre r\xE9guli\xE8rement inform\xE9\
        \ des exigences de s\xE9curit\xE9 le concernant. Il doit \xEAtre form\xE9\
        \ \xE0 l'utilisation des outils de travail conform\xE9ment aux r\xE8gles de\
        \ la SSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:2.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-2
      ref_id: '2.3'
      name: Mouvement de personnel
    - urn: urn:intuitem:risk:req_node:ii-901_integral:rh-mouv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:2.3
      ref_id: RH-MOUV
      name: "Gestion des arriv\xE9es, des mutations et des d\xE9parts"
      description: "Une proc\xE9dure permettant de g\xE9rer les arriv\xE9es, les mutations\
        \ et les d\xE9parts des collaborateurs doit \xEAtre formalis\xE9e et appliqu\xE9\
        e strictement. Cette proc\xE9dure doit couvrir au minimum :\n* la gestion\
        \ et la r\xE9vocation des comptes et des droits d'acc\xE8s aux SI, y compris\
        \ pour les partenaires et les prestataires externes ;\n* la gestion du contr\xF4\
        le d'acc\xE8s aux locaux ;\n* la gestion des \xE9quipements mobiles ;\n* la\
        \ gestion du contr\xF4le des habilitations."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:2.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-2
      ref_id: '2.4'
      name: Personnel non permanent
    - urn: urn:intuitem:risk:req_node:ii-901_integral:rh-nperm
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:2.4
      ref_id: RH-NPERM
      name: "Gestion du personnel non permanent (stagiaires, int\xE9rimaires, prestataires)"
      description: "Les r\xE8gles de la PSSI s'appliquent \xE0 tout personnel non\
        \ permanent utilisateur d'un SI d'une entit\xE9. Les dispositions contractuelles\
        \ pr\xE9existantes r\xE9gissant l'emploi de ce personnel sont amend\xE9es\
        \ si n\xE9cessaire. Pour tout personnel non permanent, un tutorat par un agent\
        \ permanent est mis en place, afin de l'informer de ces r\xE8gles et d'en\
        \ contr\xF4ler l'application."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: Gestion des biens
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:3
      ref_id: Objectif 3
      name: "Tenir \xE0 jour une cartographie d\xE9taill\xE9e et compl\xE8te des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:gdb-invent
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-3
      ref_id: GDB-INVENT
      name: Inventaire des ressources informatiques
      description: "Chaque entit\xE9 \xE9tablit et maintient \xE0 jour un inventaire\
        \ des ressources informatiques sous sa responsabilit\xE9, en s'appuyant sur\
        \ un outillage adapt\xE9. Cet inventaire est tenu \xE0 la disposition du RSSI\
        \ et de l'ANSSI en cas de besoin de coordination op\xE9rationnelle. Il comprend\
        \ la liste des \xAB briques \xBB mat\xE9rielles et logicielles utilis\xE9\
        es ainsi que leurs versions exactes. Il est constitu\xE9 d'une base de donn\xE9\
        es de configuration, maintenue \xE0 jour et tenue \xE0 disposition du RSSI.\n\
        L'historique des attributions des biens inventori\xE9s doit \xEAtre conserv\xE9\
        \ dans le respect de la r\xE9glementation en vigueur."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:gdb-carto
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-3
      ref_id: GDB-CARTO
      name: Cartographie
      description: "La cartographie pr\xE9cise les centres informatiques, les architectures\
        \ des r\xE9seaux, sur lesquelles sont identifi\xE9s les points n\xE9vralgiques\
        \ et la sensibilit\xE9 des informations manipul\xE9es, et qualifie le niveau\
        \ de s\xE9curit\xE9 attendu. Cette cartographie est maintenue \xE0 jour et\
        \ tenue \xE0 disposition du RSSI et de l'ANSSI en cas de besoin de coordination\
        \ op\xE9rationnelle."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:3
      ref_id: Objectif 4
      name: "Qualifier l'information de fa\xE7on \xE0 adapter les mesures de protection."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:gdb-qualif-sensi
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-4
      ref_id: GDB-QUALIF-SENSI
      name: Qualification des informations
      description: "La sensibilit\xE9 de toute information doit \xEAtre \xE9valu\xE9\
        e. Le marquage syst\xE9matique des documents, en fonction du niveau de sensibilit\xE9\
        , est fortement recommand\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:gdb-prot-is
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-4
      ref_id: GDB-PROT-IS
      name: Protection des informations
      description: "L'utilisateur doit prot\xE9ger les informations qu'il est amen\xE9\
        \ \xE0 manipuler dans le cadre de ses fonctions, selon leur sensibilit\xE9\
        \ et tout au long de leur cycle de vie, depuis leur cr\xE9ation jusqu'\xE0\
        \ leur \xE9ventuelle destruction."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "Int\xE9gration de la SSI dans le cycle de vie des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:4
      ref_id: Objectif 5
      name: "Appr\xE9cier, traiter, et communiquer sur les risques relatifs \xE0 la\
        \ s\xE9curit\xE9 des syst\xE8mes d'information."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:5.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-5
      ref_id: '5.1'
      name: "Gestion des risques et homologation de s\xE9curit\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-homolog-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:5.1
      ref_id: INT-HOMOLOG-SSI
      name: "Homologation de s\xE9curit\xE9 des syst\xE8mes d'information"
      description: "Tout syst\xE8me d'information doit faire l'objet d'une d\xE9cision\
        \ d'homologation de sa s\xE9curit\xE9 avant sa mise en exploitation. L'homologation\
        \ est l'acte selon lequel une autorit\xE9, dite autorit\xE9 d'homologation,\
        \ d\xE9sign\xE9e par la direction de l'entit\xE9, atteste formellement aupr\xE8\
        s des utilisateurs que le syst\xE8me d'information est prot\xE9g\xE9 conform\xE9\
        ment aux objectifs de s\xE9curit\xE9 fix\xE9s. La d\xE9cision d'homologation\
        \ est prise le cas \xE9ch\xE9ant apr\xE8s avis d'une commission d'homologation.\
        \ Cette d\xE9cision s'appuie sur une analyse de risques adapt\xE9e aux enjeux\
        \ du syst\xE8me consid\xE9r\xE9 et pr\xE9cise les conditions d'emploi."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-6
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:4
      ref_id: Objectif 6
      name: "G\xE9rer dynamiquement les mesures de protection, tout au long de la\
        \ vie du SI"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:6.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-6
      ref_id: '6.1'
      name: "Maintien en condition de s\xE9curit\xE9 des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:6.1
      ref_id: INT-SSI
      name: "Int\xE9gration de la s\xE9curit\xE9 dans les projets"
      description: "La s\xE9curit\xE9 des syst\xE8mes d'information doit \xEAtre prise\
        \ en compte dans toutes les phases des projets informatiques, sous le contr\xF4\
        le de l'autorit\xE9 d'homologation, de la conception et de la sp\xE9cification\
        \ du syst\xE8me jusqu'\xE0 son retrait du service."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-quot-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:6.1
      ref_id: INT-QUOT-SSI
      name: "Mise en \u0153uvre au quotidien de la SSI"
      description: "La s\xE9curit\xE9 des syst\xE8mes d'information se traite au quotidien\
        \ par des pratiques d'hygi\xE8ne informatique. Des proc\xE9dures \xE9crites\
        \ d\xE9finissent les actes \xE9l\xE9mentaires du maintien en condition de\
        \ s\xE9curit\xE9 lors des phases de conception, d'\xE9volution ou de retrait\
        \ d'un syst\xE8me."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-tdb
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:6.1
      ref_id: INT-TDB
      name: "Cr\xE9er un tableau de bord SSI"
      description: "Un tableau de bord de la SSI est mis en place et tenu \xE0 jour.\
        \ Il fournit au RSSI et aux autorit\xE9s une vision g\xE9n\xE9rale du niveau\
        \ de s\xE9curit\xE9 et de son \xE9volution, rendant ainsi plus efficace le\
        \ pilotage de la SSI. Au niveau strat\xE9gique, le tableau de bord de la SSI\
        \ permet de suivre l'application de la politique de s\xE9curit\xE9 et de disposer\
        \ d'\xE9l\xE9ments propres \xE0 qualifier les ressources devant \xEAtre allou\xE9\
        es \xE0 la SSI. Au niveau du pilotage, la mise en place de ce tableau de bord\
        \ permet de contr\xF4ler la r\xE9alisation d'objectifs op\xE9rationnels, d'am\xE9\
        liorer la qualit\xE9 de\nservice et de d\xE9tecter au plus t\xF4t les retards\
        \ dans la r\xE9alisation de certains objectifs de s\xE9curit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-7
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:4
      ref_id: Objectif 7
      name: "Utiliser des produits et des services dont la s\xE9curit\xE9 est \xE9\
        valu\xE9e et attest\xE9e selon des proc\xE9dures reconnues par l'ANSSI, afin\
        \ de renforcer la protection des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:7.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-7
      ref_id: '7.1'
      name: "Produits de s\xE9curit\xE9 et services de confiance labellis\xE9s"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-aq-psl
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:7.1
      ref_id: INT-AQ-PSL
      name: "Acquisition de produits de s\xE9curit\xE9 et de services de confiance"
      description: "Lorsqu'ils sont disponibles, des produits de s\xE9curit\xE9 ou\
        \ des services de confiance labellis\xE9s (agr\xE9\xE9s, qualifi\xE9s ou certifi\xE9\
        s) par l'ANSSI doivent \xEAtre utilis\xE9s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-8
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:4
      ref_id: Objectif 8
      name: "Veiller aux exigences de s\xE9curit\xE9 lorsqu'il est fait appel \xE0\
        \ une prestation par des tiers."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:8.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-8
      ref_id: '8.1'
      name: Gestion des prestataires
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-pres-cs
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:8.1
      ref_id: INT-PRES-CS
      name: "Clauses de s\xE9curit\xE9"
      description: "Toute prestation dans le domaine des SI est encadr\xE9e par des\
        \ clauses de s\xE9curit\xE9. Ces clauses sp\xE9cifient les mesures SSI que\
        \ le prestataire doit respecter dans le cadre de ses activit\xE9s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-pres-cntrl
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:8.1
      ref_id: INT-PRES-CNTRL
      name: "Suivi et contr\xF4le des prestations fournies"
      description: "Le maintien d'un niveau de s\xE9curit\xE9 au cours du temps n\xE9\
        cessite un double contr\xF4le :\n* l'un, effectu\xE9 p\xE9riodiquement par\
        \ l'\xE9quipe encadrant la prestation, qui porte sur les actions du sous-traitant\
        \ et la conformit\xE9 au cahier des charges ;\n* l'autre, effectu\xE9 par\
        \ une \xE9quipe externe, qui porte sur la pertinence du cahier des charges\
        \ en amont des projets, la conformit\xE9 des r\xE9ponses apport\xE9es par\
        \ le sous-traitant en phase de recette et le niveau de s\xE9curit\xE9 global\
        \ obtenu en phase de production."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-rex-ar
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:8.1
      ref_id: INT-REX-AR
      name: Analyse de risques
      description: "Toute op\xE9ration d'externalisation s'appuie sur une analyse\
        \ de risques pr\xE9alable, de fa\xE7on \xE0 d\xE9terminer des objectifs de\
        \ s\xE9curit\xE9 et d\xE9finir des mesures adapt\xE9es. L'ensemble des objectifs\
        \ de s\xE9curit\xE9 ainsi d\xE9termin\xE9s permet de d\xE9finir une cible\
        \ de s\xE9curit\xE9 servant de cadre au contrat \xE9tabli avec le prestataire."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-rex-hb
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:8.1
      ref_id: INT-REX-HB
      name: "H\xE9bergement"
      description: "L'h\xE9bergement des donn\xE9es sensibles de l'administration\
        \ sur le territoire national est obligatoire, sauf d\xE9rogation d\xFBment\
        \ motiv\xE9e et pr\xE9cis\xE9e dans la d\xE9cision d'homologation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:int-rex-hs
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:8.1
      ref_id: INT-REX-HS
      name: "H\xE9bergement et clauses de s\xE9curit\xE9"
      description: "Tout contrat d'h\xE9bergement d\xE9taille les dispositions mises\
        \ en \u0153uvre pour prendre en compte la SSI. Ce sont notamment les mesures\
        \ prises pour assurer le maintien en condition de s\xE9curit\xE9 des syst\xE8\
        mes et permettre une gestion de crise efficace (conditions d'acc\xE8s aux\
        \ journaux, mise en place d'astreintes, etc.)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "S\xE9curit\xE9 physique"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-9
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:5
      ref_id: Objectif 9
      name: "Inscrire la s\xE9curisation physique des SI dans la s\xE9curisation physique\
        \ des locaux et dans les processus associ\xE9s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-zones
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-9
      ref_id: PHY-ZONES
      name: "D\xE9coupage des sites en zones de s\xE9curit\xE9"
      description: "Un d\xE9coupage des sites en zones physiques de s\xE9curit\xE9\
        \ doit \xEAtre effectu\xE9, en liaison avec le RSSI, les correspondants locaux\
        \ de la SSI et les services charg\xE9s de l'immobilier, de la s\xE9curit\xE9\
        \ et des moyens g\xE9n\xE9raux. Pour chaque zone de s\xE9curit\xE9, des crit\xE8\
        res pr\xE9cis d'autorisation d'acc\xE8s sont \xE9tablis."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:9.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-9
      ref_id: '9.1'
      name: "R\xE8gles de s\xE9curit\xE9 s'appliquant aux zones d'accueil du public"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-publ
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:9.1
      ref_id: PHY-PUBL
      name: "Acc\xE8s r\xE9seau en zone d'accueil du public"
      description: "Tout acc\xE8s au r\xE9seau install\xE9 dans une zone d'accueil\
        \ du public doit \xEAtre filtr\xE9 ou isol\xE9 du reste du r\xE9seau informatique\
        \ de l'entit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-sens
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:9.1
      ref_id: PHY-SENS
      name: Protection des informations sensibles au sein des zones d'accueil
      description: "Le traitement d'informations sensibles au sein des zones d'accueil\
        \ est \xE0 \xE9viter. Si un tel traitement est strictement n\xE9cessaire,\
        \ il doit rester ponctuel et exceptionnel. Des mesures particuli\xE8res sont\
        \ alors adopt\xE9es, notamment en mati\xE8re de protection audiovisuelle ainsi\
        \ qu'en mati\xE8re de protection des informations stock\xE9es sur les supports."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:9.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-9
      ref_id: '9.2'
      name: "R\xE8gles de s\xE9curit\xE9 compl\xE9mentaires s'appliquant aux locaux\
        \ techniques"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-tech
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:9.2
      ref_id: PHY-TECH
      name: "S\xE9curit\xE9 physique des locaux techniques"
      description: "L'acc\xE8s aux locaux techniques abritant des \xE9quipements d'alimentation\
        \ et de distribution d'\xE9nergie ou des \xE9quipements de r\xE9seau et de\
        \ t\xE9l\xE9phonie doit \xEAtre physiquement prot\xE9g\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-telecom
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:9.2
      ref_id: PHY-TELECOM
      name: "Protection des c\xE2bles \xE9lectriques et de t\xE9l\xE9communications"
      description: "Il convient de prot\xE9ger le c\xE2blage du r\xE9seau contre les\
        \ dommages et les interceptions des communications qu'ils transmettent. En\
        \ compl\xE9ment, les panneaux de raccordements et les salles des c\xE2bles\
        \ doivent \xEAtre plac\xE9s en dehors des zones d'accueil du public et leur\
        \ acc\xE8s doit \xEAtre contr\xF4l\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ctrl
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:9.2
      ref_id: PHY-CTRL
      name: "Contr\xF4les anti-pi\xE9geages"
      description: "Sur les SI particuli\xE8rement sensibles, il convient de mener\
        \ des contr\xF4les anti-pi\xE9geages r\xE9guliers, effectu\xE9s par du personnel\
        \ form\xE9. Il peut \xEAtre fait appel \xE0 des services sp\xE9cialis\xE9\
        s pour les op\xE9rations dites de \xAB d\xE9poussi\xE9rage \xBB."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-10
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:5
      ref_id: Objectif 10
      name: "Proportionner les protections physiques des centres informatiques aux\
        \ enjeux li\xE9s \xE0 la concentration des moyens et donn\xE9es abrit\xE9\
        s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:10.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-10
      ref_id: '10.1'
      name: "R\xE8gles g\xE9n\xE9rales"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-loc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.1
      ref_id: PHY-CI-LOC
      name: "D\xE9coupage des locaux en zones de s\xE9curit\xE9"
      description: "Un d\xE9coupage du centre informatique en zones physiques de s\xE9\
        curit\xE9 doit \xEAtre effectu\xE9, en liaison avec le RSSI et les services\
        \ charg\xE9s de l'immobilier, de la s\xE9curit\xE9 et des moyens g\xE9n\xE9\
        raux. Des r\xE8gles doivent fixer les conditions d'acc\xE8s \xE0 ces diff\xE9\
        rentes zones."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-heberg
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.1
      ref_id: PHY-CI-HEBERG
      name: "Convention de service en cas d'h\xE9bergement tiers"
      description: "Dans le cas o\xF9 un tiers g\xE8re tout ou partie des locaux du\
        \ centre informatique, une convention de service, d\xE9finissant les responsabilit\xE9\
        s mutuelles en mati\xE8re de s\xE9curit\xE9, doit \xEAtre \xE9tablie entre\
        \ ce tiers et l'entit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:10.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-10
      ref_id: '10.2'
      name: "R\xE8gles de s\xE9curit\xE9 compl\xE9mentaires s'appliquant aux zones\
        \ internes et restreintes"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-ctrlacc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.2
      ref_id: PHY-CI-CTRLACC
      name: "Contr\xF4le d'acc\xE8s physique"
      description: "L'acc\xE8s aux zones internes (autoris\xE9es uniquement au personnel\
        \ du centre informatique ou aux visiteurs accompagn\xE9s) et restreintes (autoris\xE9\
        es aux seules personnes habilit\xE9es ou aux visiteurs accompagn\xE9s) doit\
        \ reposer sur un dispositif de contr\xF4le d'acc\xE8s physique. Ce dispositif\
        \ doit s'appuyer sur des produits de s\xE9curit\xE9 labellis\xE9s, lorsqu'ils\
        \ sont disponibles, et \xEAtre maintenu en condition de s\xE9curit\xE9 de\
        \ fa\xE7on rigoureuse."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-moyens
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.2
      ref_id: PHY-CI-MOYENS
      name: "D\xE9livrance des moyens d'acc\xE8s physique"
      description: "La d\xE9livrance des moyens d'acc\xE8s physique doit respecter\
        \ un processus formel permettant de s'assurer de l'identit\xE9 de la personne\
        \ et s'appuyer sur le processus d'arriv\xE9e et de d\xE9part du personnel.\
        \ Le personnel autre que celui explicitement autoris\xE9 ou habilit\xE9 mais\
        \ n\xE9anmoins appel\xE9 \xE0 intervenir dans les zones internes ou restreintes\
        \ (entretien ou r\xE9paration des b\xE2timents ou des \xE9quipements non informatiques,\
        \ nettoyage, visiteurs) acc\xE8de \xE0 ces zones sous surveillance permanente\
        \ et syst\xE9matique."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-trace
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.2
      ref_id: PHY-CI-TRACE
      name: "Tra\xE7abilit\xE9 des acc\xE8s"
      description: "Une tra\xE7abilit\xE9 des acc\xE8s des visiteurs externes aux\
        \ zones restreintes doit \xEAtre mise en place. Ces traces sont conserv\xE9\
        es un an, dans le respect de la r\xE9glementation prot\xE9geant les donn\xE9\
        es personnelles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:10.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-10
      ref_id: '10.3'
      name: "R\xE8gles de s\xE9curit\xE9 compl\xE9mentaires s'appliquant aux salles\
        \ informatiques et aux locaux techniques"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-energie
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.3
      ref_id: PHY-CI-ENERGIE
      name: "Local \xE9nergie"
      description: "L'alimentation de secteur des \xE9quipements devra \xEAtre conforme\
        \ aux r\xE8gles de l'art, de fa\xE7on \xE0 se pr\xE9munir contre les atteintes\
        \ \xE0 la s\xE9curit\xE9 des personnes et des \xE9quipements li\xE9es \xE0\
        \ un d\xE9faut \xE9lectrique."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-clim
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.3
      ref_id: PHY-CI-CLIM
      name: Climatisation
      description: "Une climatisation proportionn\xE9e aux besoins \xE9nerg\xE9tiques\
        \ du syst\xE8me informatique doit \xEAtre install\xE9e. Des proc\xE9dures\
        \ de r\xE9action en cas de panne, connues du personnel, doivent \xEAtre \xE9\
        labor\xE9es et v\xE9rifi\xE9es annuellement. Ces dispositions visent \xE0\
        \ pr\xE9venir toute surchauffe des \xE9quipements, pouvant engendrer une perte\
        \ du service voire une d\xE9t\xE9rioration du mat\xE9riel."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-inc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.3
      ref_id: PHY-CI-INC
      name: Lutte contre l'incendie
      description: "L' installation de mat\xE9riel de protection contre le feu est\
        \ obligatoire. Des proc\xE9dures de r\xE9action \xE0 un incendie sont d\xE9\
        finies et r\xE9guli\xE8rement test\xE9es. Les salles techniques doivent \xEA\
        tre propres. Aucun carton, papier ou autre mati\xE8re inflammable ne doit\
        \ \xEAtre entrepos\xE9 dans ces locaux."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-ci-eau
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:10.3
      ref_id: PHY-CI-EAU
      name: Lutte contre les voies d'eau
      description: "Une \xE9tude sur les risques dus aux voies d'eau doit \xEAtre\
        \ r\xE9alis\xE9e. Cette \xE9tude doit notamment prendre en compte le risque\
        \ de fuite sur un collecteur d'eau douce."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-11
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:5
      ref_id: Objectif 11
      name: "Traiter de mani\xE8re globale la s\xE9curit\xE9 des syst\xE8mes d'information\
        \ et de communication qui assurent la s\xFBret\xE9 d'un site."
      description: "Les sites importants, reconnus le cas \xE9ch\xE9ant comme points\
        \ d'importance vitale, s'appuient sur des services support des activit\xE9\
        s de s\xFBret\xE9 physique. Dans ce cadre, l'appellation \xAB services de\
        \ syst\xE8mes d'information et de communication de s\xFBret\xE9 \xBB regroupe:\n\
        * les services support des activit\xE9s de contr\xF4le d'acc\xE8s et de d\xE9\
        tection d'intrusion (CAD), permettant au personnel de s\xFBret\xE9 :\n  *\
        \ d'authentifier, d'autoriser et de tracer l'acc\xE8s \xE0 une ressource physique\
        \ (contr\xF4le d'acc\xE8s),\n  * de d\xE9tecter, d'alerter et de tracer toute\
        \ tentative d'acc\xE8s non autoris\xE9 (d\xE9tection d'intrusion).\n* les\
        \ services support des activit\xE9s de vid\xE9o-surveillance (VS), fournissant\
        \ au personnel de s\xFBret\xE9 un syst\xE8me de cam\xE9ras dispos\xE9es sur\
        \ l'ensemble du site, de transport des flux vid\xE9o, d'enregistrement, d'archivage\
        \ et de visionnage de ces vid\xE9os ;\n* les services support de la gestion\
        \ technique des b\xE2timents (GTB), permettant de superviser et de g\xE9rer\
        \ l'ensemble des \xE9quipements des b\xE2timents du site, et d'avoir une vue\
        \ globale de l'\xE9tat de ces b\xE2timents ;\n* les services support de la\
        \ s\xE9curit\xE9 contre les incendies (INC), regroupant l'ensemble des moyens\
        \ informatiques mis en \u0153uvre pour d\xE9tecter, informer, intervenir ou\
        \ \xE9vacuer tout ou partie du site en cas d'incendie."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:phy-si-sur
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-11
      ref_id: PHY-SI-SUR
      name: "S\xE9curisation du SI de s\xFBret\xE9"
      description: "Pour les sites physiques consid\xE9r\xE9s comme importants, des\
        \ mesures de protection doivent \xEAtre d\xE9finies et appliqu\xE9es en se\
        \ fondant sur les conclusions d'une analyse de risques. L'analyse de risques\
        \ conduit \xE0 la d\xE9signation des \xAB briques \xBB essentielles dont il\
        \ faut assurer la protection contre des actes malveillants. Un syst\xE8me\
        \ de gestion de la s\xE9curit\xE9 du SI de s\xFBret\xE9, s'inspirant de la\
        \ norme ISO 27001, assure le maintien en condition de s\xE9curit\xE9. L'emploi\
        \ de produits de s\xE9curit\xE9 labellis\xE9s, quand ils existent, est fortement\
        \ recommand\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "S\xE9curit\xE9 des r\xE9seaux"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-12
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:6
      ref_id: Objectif 12
      name: "Utiliser les infrastructures ma\xEEtris\xE9es de l'entit\xE9, en respectant\
        \ les r\xE8gles de s\xE9curit\xE9 qui leur sont attach\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:12.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-12
      ref_id: '12.1'
      name: "S\xE9curit\xE9 des r\xE9seaux internes"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-maitrise
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:12.1
      ref_id: RES-MAITRISE
      name: "Syst\xE8mes autoris\xE9s sur le r\xE9seau"
      description: "Seuls les \xE9quipements g\xE9r\xE9s et configur\xE9s par les\
        \ \xE9quipes informatiques habilit\xE9es peuvent \xEAtre connect\xE9s au r\xE9\
        seau local d'une entit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-interco
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:12.1
      ref_id: RES-INTERCO
      name: "Interconnexion avec des r\xE9seaux externes"
      description: "Toute interconnexion entre les r\xE9seaux locaux d'une entit\xE9\
        \ et un r\xE9seau externe (r\xE9seau d'un tiers, Internet, etc.) doit \xEA\
        tre r\xE9alis\xE9e via les infrastructures ma\xEEtris\xE9es de l'entit\xE9\
        ."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-entsor
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:12.1
      ref_id: RES-ENTSOR
      name: "Mettre en place un filtrage r\xE9seau pour les flux sortants et entrants"
      description: "Dans l'optique de r\xE9duire les possibilit\xE9s offertes \xE0\
        \ un attaquant, les connexions des machines du r\xE9seau interne vers l'ext\xE9\
        rieur doivent \xEAtre filtr\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-prot
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:12.1
      ref_id: RES-PROT
      name: Protection des informations
      description: "Les acc\xE8s \xE0 Internet passent obligatoirement \xE0 travers\
        \ des passerelles ma\xEEtris\xE9es de l'entit\xE9. D\xE8s lors que des informations\
        \ sensibles doivent transiter sur des r\xE9seaux non ma\xEEtris\xE9s, il convient\
        \ de les prot\xE9ger sp\xE9cifiquement par un chiffrement adapt\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-13
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:6
      ref_id: Objectif 13
      name: "Ma\xEEtriser les interconnexions de r\xE9seaux locaux. Configurer de\
        \ mani\xE8re ad\xE9quate les \xE9quipements de r\xE9seau actifs."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:13.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-13
      ref_id: '13.1'
      name: "S\xE9curit\xE9 des r\xE9seaux locaux"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-clois
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:13.1
      ref_id: RES-CLOIS
      name: "Cloisonner le SI en sous-r\xE9seaux de niveaux de s\xE9curit\xE9 homog\xE8\
        nes"
      description: "Par analogie avec le cloisonnement physique d'un b\xE2timent,\
        \ le syst\xE8me d'information doit \xEAtre segment\xE9 selon des zones pr\xE9\
        sentant chacune un niveau de s\xE9curit\xE9 homog\xE8ne."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-intercogeo
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:13.1
      ref_id: RES-INTERCOGEO
      name: "Interconnexion des sites g\xE9ographiques locaux d'une entit\xE9"
      description: "L'interconnexion au niveau local de r\xE9seaux locaux d'une entit\xE9\
        \ n'est possible que si la proximit\xE9 g\xE9ographique le justifie et sous\
        \ r\xE9serve de la mise en place de connexions sp\xE9cifiques et de passerelles\
        \ s\xE9curis\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-ress
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:13.1
      ref_id: RES-RESS
      name: Cloisonnement des ressources en cas de partage de locaux
      description: "Dans le cas o\xF9 une entit\xE9 partage des locaux avec des entit\xE9\
        s externes, des mesures de cloisonnement des ressources informatiques doivent\
        \ \xEAtre mises en place. Les mesures prises doivent \xEAtre valid\xE9es par\
        \ l'autorit\xE9 d'homologation si elles ne sont pas physiques."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-14
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:6
      ref_id: Objectif 14
      name: "Ne pas porter atteinte \xE0 la s\xE9curit\xE9 du SI par le d\xE9ploiement\
        \ d'acc\xE8s non supervis\xE9s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:14.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-14
      ref_id: '14.1'
      name: "Acc\xE8s sp\xE9cifiques"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-internet-specifique
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:14.1
      ref_id: RES-INTERNET-SPECIFIQUE
      name: "Cas particulier des acc\xE8s sp\xE9cifiques dans une entit\xE9"
      description: "Les acc\xE8s sp\xE9cifiques \xE0 Internet n\xE9cessitant des droits\
        \ particuliers pour un usage professionnel ne peuvent \xEAtre mis en place\
        \ que sur d\xE9rogation d\xFBment justifi\xE9e et sur des machines isol\xE9\
        es physiquement et s\xE9par\xE9es du r\xE9seau de l'entit\xE9, apr\xE8s validation\
        \ pr\xE9alable de l'autorit\xE9 d'homologation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-15
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:6
      ref_id: Objectif 15
      name: "Ma\xEEtriser le d\xE9ploiement, la configuration et l'usage des r\xE9\
        seaux sans fil."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:15.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-15
      ref_id: '15.1'
      name: "S\xE9curit\xE9 des r\xE9seaux sans fil"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-ssfil
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:15.1
      ref_id: RES-SSFIL
      name: "Mise en place de r\xE9seaux sans fil"
      description: "Le d\xE9ploiement de r\xE9seaux sans fil doit faire l'objet d'une\
        \ analyse de risques sp\xE9cifique. Les protections intrins\xE8ques \xE9tant\
        \ insuffisantes, des mesures compl\xE9mentaires doivent \xEAtre prises dans\
        \ le cadre de la d\xE9fense en profondeur. En particulier, une segmentation\
        \ du r\xE9seau doit \xEAtre mise en place de fa\xE7on \xE0 limiter \xE0 un\
        \ p\xE9rim\xE8tre d\xE9termin\xE9 les cons\xE9quences d'une intrusion depuis\
        \ la voie radio. \xC0 d\xE9faut de mise en \u0153uvre de mesures sp\xE9cifiques,\
        \ le d\xE9ploiement de r\xE9seaux sans fil sur des SI manipulant des donn\xE9\
        es sensibles est proscrit."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-16
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:6
      ref_id: Objectif 16
      name: "Configurer les m\xE9canismes de commutation et de routage pour se prot\xE9\
        ger des attaques."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:16.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-16
      ref_id: '16.1'
      name: "S\xE9curisation des m\xE9canismes de commutation et de routage"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-couchbas
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:16.1
      ref_id: RES-COUCHBAS
      name: "Implanter des m\xE9canismes de protection contre les attaques sur les\
        \ couches basses"
      description: "Une attention particuli\xE8re doit \xEAtre apport\xE9e \xE0 l'implantation\
        \ des protocoles de couches basses, de fa\xE7on \xE0 se pr\xE9munir des attaques\
        \ usuelles par saturation ou empoisonnement de cache. Cela concerne, par exemple,\
        \ le protocole ARP."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-routdyn
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:16.1
      ref_id: RES-ROUTDYN
      name: Surveiller les annonces de routage
      description: "Lorsque l'utilisation de protocoles de routage dynamique est n\xE9\
        cessaire, celle-ci doit s'accompagner de la mise en place d'une surveillance\
        \ des annonces de routage et de proc\xE9dures permettant de r\xE9agir rapidement\
        \ en cas d'incidents."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-routdyn-igp
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:16.1
      ref_id: RES-ROUTDYN-IGP
      name: "Configurer le protocole IGP de mani\xE8re s\xE9curis\xE9e"
      description: "Le protocole de routage dynamique de type IGP doit \xEAtre activ\xE9\
        \ exclusivement sur les interfaces n\xE9cessaires \xE0 la construction de\
        \ la topologie du r\xE9seau et d\xE9sactiv\xE9 sur le reste des interfaces.\
        \ La configuration du protocole de routage dynamique doit syst\xE9matiquement\
        \ s'accompagner d'un mot de passe de type MESSAGE- DIGEST-KEY."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-routdyn-egp
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:16.1
      ref_id: RES-ROUTDYN-EGP
      name: "S\xE9curiser les sessions EGP"
      description: "Lors de la mise en place d'une session EGP avec un pair ext\xE9\
        rieur sur un m\xE9dia partag\xE9, cette session doit s'accompagner d'un mot\
        \ de passe de type MESSAGE-DIGEST-KEY."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-secret
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:16.1
      ref_id: RES-SECRET
      name: "Modifier syst\xE9matiquement les \xE9l\xE9ments d'authentification par\
        \ d\xE9faut des \xE9quipements et services"
      description: "Les mots de passe par d\xE9faut doivent \xEAtre imp\xE9rativement\
        \ modifi\xE9s, de m\xEAme que les certificats. Les dispositions n\xE9cessaires\
        \ doivent \xEAtre prises aupr\xE8s des fournisseurs de fa\xE7on \xE0 pouvoir\
        \ modifier les certificats install\xE9s par d\xE9faut."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-durci
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:16.1
      ref_id: RES-DURCI
      name: "Durcir les configurations des \xE9quipements de r\xE9seaux"
      description: "Les \xE9quipements de r\xE9seaux, comme les routeurs, doivent\
        \ faire l'objet d'un durcissement sp\xE9cifique comprenant notamment, outre\
        \ le changement des mots de passe et des certificats, la d\xE9sactivation\
        \ des interfaces et des services inutiles ainsi que la mise en place de m\xE9\
        canismes de protection du plan de contr\xF4le."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-17
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:6
      ref_id: Objectif 17
      name: "Tenir \xE0 jour une cartographie d\xE9taill\xE9e et compl\xE8te des r\xE9\
        seaux et des interconnexions."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:17.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-17
      ref_id: '17.1'
      name: "Cartographie de r\xE9seau"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:res-carto
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:17.1
      ref_id: RES-CARTO
      name: "\xC9laborer les documents d'architecture technique et fonctionnelle"
      description: "L'architecture en r\xE9seau du syst\xE8me d'information doit \xEA\
        tre d\xE9crite et formalis\xE9e \xE0 travers des sch\xE9mas d'architecture\
        \ et des configurations, maintenus au fil des \xE9volutions apport\xE9es au\
        \ SI. Les documents d'architecture sont sensibles et font l'objet d'une protection\
        \ adapt\xE9e. La cartographie du r\xE9seau s'ins\xE8re dans la cartographie\
        \ globale des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "Architecture des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-18
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:7
      ref_id: Objectif 18
      name: "Appliquer les principes de d\xE9fense en profondeur \xE0 l'architecture\
        \ mat\xE9rielle et logicielle des centres informatiques."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:18.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-18
      ref_id: '18.1'
      name: Architecture des centres informatiques
    - urn: urn:intuitem:risk:req_node:ii-901_integral:archi-heberg
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:18.1
      ref_id: ARCHI-HEBERG
      name: "Principes d'architecture de la zone d'h\xE9bergement"
      description: "D' une mani\xE8re g\xE9n\xE9rale, l'architecture des infrastructures\
        \ des centres informatiques est con\xE7ue de fa\xE7on \xE0 satisfaire l'ensemble\
        \ des besoins en disponibilit\xE9, confidentialit\xE9, tra\xE7abilit\xE9 et\
        \ int\xE9grit\xE9. Le principe de d\xE9fense en profondeur doit \xEAtre respect\xE9\
        , en particulier par la mise en \u0153uvre successive de \xAB zones d\xE9\
        militaris\xE9es \xBB (DMZ), d'environnements de s\xE9curit\xE9 en zone d'h\xE9\
        bergement, de machines virtuelles ou physiques d\xE9di\xE9es, de r\xE9seaux\
        \ locaux virtuels (VLAN) appropri\xE9s, d'un filtrage strict des flux applicatifs\
        \ et d'administration."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:archi-stockci
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:18.1
      ref_id: ARCHI-STOCKCI
      name: Architecture de stockage et de sauvegarde
      description: "Le r\xE9seau de stockage et de sauvegarde pour les besoins des\
        \ centres informatiques repose sur une architecture consacr\xE9e."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:archi-pass
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:18.1
      ref_id: ARCHI-PASS
      name: Passerelle Internet
      description: "Les interconnexions Internet passent obligatoirement par les passerelles\
        \ nationales homologu\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "Exploitation des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-19
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:8
      ref_id: Objectif 19
      name: "D\xE9finir et mettre en \u0153uvre des mesures de protection renforc\xE9\
        es pour les informations sensibles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:19.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-19
      ref_id: '19.1'
      name: Protection des informations sensibles
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-prot-inf
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:19.1
      ref_id: EXP-PROT-INF
      name: "Protection des informations sensibles en confidentialit\xE9 et en int\xE9\
        grit\xE9"
      description: "Des mesures doivent \xEAtre mises en \u0153uvre afin de garantir\
        \ la protection des informations sensibles en termes de confidentialit\xE9\
        \ et d'int\xE9grit\xE9. A d\xE9faut d'utilisation d'un r\xE9seau homologu\xE9\
        , ces informations doivent \xEAtre chiffr\xE9es \xE0 l'aide d'un moyen de\
        \ chiffrement labellis\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-20
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:8
      ref_id: Objectif 20
      name: "Durcir les configurations des ressources informatiques et surveiller\
        \ les interventions op\xE9r\xE9es sur celles-ci."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:20.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-20
      ref_id: '20.1'
      name: "S\xE9curit\xE9 des ressources informatiques"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-trac
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:20.1
      ref_id: EXP-TRAC
      name: "Tra\xE7abilit\xE9 des interventions sur le syst\xE8me"
      description: "Les interventions de maintenance sur les ressources informatiques\
        \ de l'entit\xE9 doivent \xEAtre trac\xE9es par le service informatique. Les\
        \ traces doivent \xEAtre accessibles au correspondant local de la SSI durant\
        \ au moins un an."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-config
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:20.1
      ref_id: EXP-CONFIG
      name: Configuration des ressources informatiques
      description: "Les syst\xE8mes d'exploitation et les logiciels doivent faire\
        \ l'objet d'un durcissement. Les configurations et les mises \xE0 jour sont\
        \ effectu\xE9es dans le strict respect des guides ou des proc\xE9dures en\
        \ vigueur dans l'entit\xE9 ou, \xE0 d\xE9faut, en vigueur au niveau central."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-doc-config
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:20.1
      ref_id: EXP-DOC-CONFIG
      name: Documentation des configurations
      description: "La configuration standard des ressources informatiques doit \xEA\
        tre document\xE9e et mise \xE0 jour \xE0 chaque changement notable."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-21
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:8
      ref_id: Objectif 21
      name: "Authentifier les usagers et contr\xF4ler leurs acc\xE8s aux ressources\
        \ des SI en fonction d'une politique explicite d'autorisations."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:21.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-21
      ref_id: '21.1'
      name: "Contr\xF4le des acc\xE8s logiques"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-id-auth
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.1
      ref_id: EXP-ID-AUTH
      name: "Identification, authentification et contr\xF4le d'acc\xE8s logique"
      description: "L'acc\xE8s \xE0 toute ressource non publique doit n\xE9cessiter\
        \ une identification et une authentification individuelle de l'utilisateur.\
        \ Dans le cas de l'acc\xE8s \xE0 des donn\xE9es sensibles, des moyens d'authentification\
        \ forte doivent \xEAtre utilis\xE9s. A cette fin, l'usage d'une carte \xE0\
        \ puce doit \xEAtre privil\xE9gi\xE9. Le contr\xF4le d'acc\xE8s doit \xEA\
        tre g\xE9r\xE9 et s'appuyer sur un processus formalis\xE9 coh\xE9rent avec\
        \ la gestion des ressources humaines."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-droits
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.1
      ref_id: EXP-DROITS
      name: "Droits d'acc\xE8s aux ressources"
      description: "Apr\xE8s avoir d\xE9termin\xE9 le niveau de sensibilit\xE9, le\
        \ besoin de diffusion et de partage des ressources, les droits d'acc\xE8s\
        \ aux ressources doivent \xEAtre g\xE9r\xE9s suivant les principes suivants\
        \ : besoin d'en conna\xEEtre (chaque utilisateur n'est autoris\xE9 \xE0 acc\xE9\
        der qu'aux ressources pour lesquelles on lui accorde explicitement le b\xE9\
        n\xE9fice de l'acc\xE8s) et moindre privil\xE8ge (chaque utilisateur acc\xE8\
        de aux ressources avec le minimum de privil\xE8ges lui permettant de conduire\
        \ les actions explicitement autoris\xE9es pour lui)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-profils
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.1
      ref_id: EXP-PROFILS
      name: "Gestion des profils d'acc\xE8s aux applications"
      description: "Les applications manipulant des donn\xE9es sensibles doivent permettre\
        \ une gestion fine par profils d'acc\xE8s. Les principes du besoin d'en conna\xEE\
        tre et du moindre privil\xE8ge s'appliquent."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:21.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-21
      ref_id: '21.2'
      name: Processus d'autorisation
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-proc-auth
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.2
      ref_id: EXP-PROC-AUTH
      name: "Autorisations d'acc\xE8s des utilisateurs"
      description: "Toute action d'autorisation d'acc\xE8s d'un utilisateur \xE0 une\
        \ ressource des SI, qu'elle soit locale ou nationale, doit s'inscrire dans\
        \ le cadre d'un processus d'autorisation formalis\xE9, qui s'appuie sur le\
        \ processus d'arriv\xE9e et de d\xE9part du personnel."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-revue-auth
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.2
      ref_id: EXP-REVUE-AUTH
      name: "Revue des autorisations d'acc\xE8s"
      description: "Une revue des autorisations d'acc\xE8s doit \xEAtre r\xE9alis\xE9\
        e annuellement sous le contr\xF4le du RSSI, le cas \xE9ch\xE9ant avec l'appui\
        \ du correspondant local de la SSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:21.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-21
      ref_id: '21.3'
      name: Gestion des authentifiants
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-conf-auth
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.3
      ref_id: EXP-CONF-AUTH
      name: "Confidentialit\xE9 des informations d'authentification"
      description: "Les informations d'authentification (mots de passe d'acc\xE8s\
        \ aux SI, cl\xE9s priv\xE9es li\xE9es aux certificats \xE9lectroniques, etc.)\
        \ doivent \xEAtre consid\xE9r\xE9es comme des donn\xE9es sensibles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-gest-pass
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.3
      ref_id: EXP-GEST-PASS
      name: Gestion des mots de passe
      description: "Les utilisateurs ne doivent pas stocker leurs mots de passe en\
        \ clair, par exemple dans un fichier, sur leur poste de travail. Les mots\
        \ de passe ne doivent pas transiter en clair sur les r\xE9seaux."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-init-pass
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.3
      ref_id: EXP-INIT-PASS
      name: Initialisation des mots de passe
      description: "Chaque compte utilisateur doit \xEAtre cr\xE9\xE9 avec un mot\
        \ de passe initial al\xE9atoire unique. Si les circonstances l'imposent, un\
        \ mot de passe plus simple mais \xE0 usage unique peut \xEAtre envisag\xE9\
        ."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-pol-pass
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.3
      ref_id: EXP-POL-PASS
      name: Politiques de mots de passe
      description: "Les r\xE8gles de gestion et de protection des mots de passe suivent\
        \ les recommandations de l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-certifs
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.3
      ref_id: EXP-CERTIFS
      name: "Utilisation de certificats \xE9lectroniques"
      description: "Les autorit\xE9s administratives au sens de l'ordonnance n\xB0\
        \ 2005-1516 du 8 d\xE9cembre 2005 appliquent les r\xE8gles du\nr\xE9f\xE9\
        rentiel g\xE9n\xE9ral de s\xE9curit\xE9 pour les certificats \xE9lectroniques.\
        \ Les autres entit\xE9s s'inspirent de ces r\xE8gles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-qual-pass
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.3
      ref_id: EXP-QUAL-PASS
      name: "Contr\xF4le syst\xE9matique de la qualit\xE9 des mots de passe"
      description: "Des moyens techniques permettant d'imposer la politique de mots\
        \ de passe, par exemple pour s'assurer du respect de l'\xE9ventuelle obligation\
        \ relative \xE0 l'usage de caract\xE8res sp\xE9ciaux, doivent \xEAtre mis\
        \ en place. A d\xE9faut, un contr\xF4le p\xE9riodique des param\xE8tres techniques\
        \ relatifs aux mots de passe doit \xEAtre r\xE9alis\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:21.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-21
      ref_id: '21.4'
      name: Gestion des authentifiants d'administration
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-seq-admin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.4
      ref_id: EXP-SEQ-ADMIN
      name: "S\xE9questre des authentifiants des administrateurs"
      description: "Les authentifiants permettant l'administration des ressources\
        \ des SI doivent \xEAtre plac\xE9s sous s\xE9questre et tenus \xE0 jour, dans\
        \ un coffre ou une armoire ferm\xE9e \xE0 cl\xE9. L'administrateur authentifi\xE9\
        \ doit \xEAtre inform\xE9 de l'existence de ces op\xE9rations de gestion,\
        \ de leurs finalit\xE9s et de leurs limites. Tout acc\xE8s d'administration\
        \ \xE0 une ressource informatique doit pouvoir \xEAtre trac\xE9 et permettre\
        \ de remonter \xE0 la personne exer\xE7ant ce droit. Les informations d'authentification\
        \ b\xE9n\xE9ficiant d'un moyen de protection physique, notamment d'une carte\
        \ \xE0 puce, n'ont, par d\xE9faut, pas besoin de faire l'objet d'op\xE9rations\
        \ de s\xE9questre de la part d'autres personnes que l'administrateur authentifi\xE9\
        \ lui-m\xEAme."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-pol-admin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.4
      ref_id: EXP-POL-ADMIN
      name: Politique des mots de passe des administrateurs
      description: "Chaque administrateur doit disposer d'un mot de passe propre et\
        \ destin\xE9 \xE0 l'administration."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dep-admin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:21.4
      ref_id: EXP-DEP-ADMIN
      name: "Gestion du d\xE9part d'un administrateur des SI"
      description: "En cas de d\xE9part d'un administrateur disposant de privil\xE8\
        ges sur des composants des SI, les comptes individuels dont il disposait doivent\
        \ \xEAtre imm\xE9diatement d\xE9sactiv\xE9s. Les \xE9ventuels mots de passe\
        \ d'administration dont il avait connaissance doivent \xEAtre chang\xE9s,\
        \ par exemple les mots de passe des comptes fonctionnels, des comptes g\xE9\
        n\xE9riques ou des comptes de service utilis\xE9s dans le cadre des fonctions\
        \ de l'administrateur."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:8
      ref_id: Objectif 22
      name: "Fournir aux administrateurs les outils n\xE9cessaires \xE0 l'exercice\
        \ des t\xE2ches de SSI et configurer ces outils de mani\xE8re s\xE9curis\xE9\
        e."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      ref_id: '22.1'
      name: "Administration des syst\xE8mes"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-restr-droits
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      ref_id: EXP-RESTR-DROITS
      name: Restnctlon des droits
      description: "Sauf exception d\xFBment motiv\xE9e et valid\xE9e par le RSSI,\
        \ les utilisateurs n'ont pas de droits d'administration."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-prot-admin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      ref_id: EXP-PROT-ADMIN
      name: "Protection des acc\xE8s aux outils d'administration"
      description: "L'acc\xE8s aux outils et aux interfaces d'administration doit\
        \ \xEAtre strictement limit\xE9 aux personnes habilit\xE9es, selon une proc\xE9\
        dure formelle d'autorisation d'acc\xE8s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-habilit-admin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      ref_id: EXP-HABILIT-ADMIN
      name: Habilitation des administrateurs
      description: "L'habilitation des administrateurs s'effectue selon une proc\xE9\
        dure valid\xE9e par l'autorit\xE9 d'homologation. Le nombre de personnes habilit\xE9\
        es pour des op\xE9rations d'administration doit \xEAtre connu et valid\xE9\
        \ par l'autorit\xE9 d'homologation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-gest-admin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      ref_id: EXP-GEST-ADMIN
      name: Gestion des actions d'administration
      description: "Les op\xE9rations d'administration doivent \xEAtre trac\xE9es\
        \ de mani\xE8re \xE0 pouvoir imputer individuellement les actions d'administration."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-sec-fluxadmin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      ref_id: EXP-SEC-FLUXADMIN
      name: "S\xE9curisation des flux d'administration"
      description: "Les op\xE9rations d'administration sur les ressources locales\
        \ d'une entit\xE9 doivent s'appuyer sur des protocoles s\xE9curis\xE9s. Un\
        \ r\xE9seau d\xE9di\xE9 \xE0 l'administration des \xE9quipements, tout au\
        \ moins un r\xE9seau logiquement s\xE9par\xE9 de celui des utilisateurs, doit\
        \ \xEAtre utilis\xE9. Les postes d'administrateur doivent \xEAtre d\xE9di\xE9\
        s et ne doivent pas pouvoir acc\xE9der \xE0 Internet."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-central
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      ref_id: EXP-CENTRAL
      name: "Centraliser la gestion du syst\xE8me d'information"
      description: "Afin de g\xE9rer efficacement un grand nombre de postes d'utilisateurs,\
        \ de serveurs ou d'\xE9quipements en r\xE9seau, les administrateurs doivent\
        \ utiliser des outils centralis\xE9s, permettant l'automatisation de traitements\
        \ quotidiens et offrant une vue globale et pertinente sur le syst\xE8me d'information."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-sec-dist
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.1
      ref_id: EXP-SEC-DIST
      name: "S\xE9curisation des outils de prise de main \xE0 distance"
      description: "La prise de main \xE0 distance d'une ressource informatique locale\
        \ ne doit \xEAtre r\xE9alisable que par les agents autoris\xE9s par l'\xE9\
        quipe locale charg\xE9e des SI, sur les ressources informatiques de leur p\xE9\
        rim\xE8tre. Des mesures de s\xE9curit\xE9 sp\xE9cifiques doivent \xEAtre d\xE9\
        finies et respect\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:22.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      ref_id: '22.2'
      name: Administration des domaines
      annotation: "<sup>10</sup> La notion de domaine est prise ici dans son sens\
        \ g\xE9n\xE9ral, \xE0 savoir un regroupement d'\xE9quipements. Il s'agirait\
        \ par exemple, dans une architecture Microsoft, du regroupement de machines\
        \ partageant des informations d'annuaires."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-pol
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.2
      ref_id: EXP-DOM-POL
      name: "D\xE9finir une politique de gestion des comptes du domaine"
      description: "Une politique explicite de gestion des comptes du domaine doit\
        \ \xEAtre \xE9tablie."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-pass
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.2
      ref_id: EXP-DOM-PASS
      name: "Configurer la strat\xE9gie des mots de passe des domaines"
      description: "La politique de gestion des mots de passe doit \xEAtre con\xE7\
        ue de fa\xE7on \xE0 prot\xE9ger contre les attaques par essais successifs\
        \ de mots de passe. Une complexit\xE9 minimale dans le choix des mots de passe\
        \ doit \xEAtre impos\xE9e aux utilisateurs."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:22.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      ref_id: '22.3'
      name: Gestion des comptes
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-nomenclat
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.3
      ref_id: EXP-DOM-NOMENCLAT
      name: "D\xE9finir et appliquer une nomenclature des comptes du domaine"
      description: "La gestion des comptes doit s'appuyer sur une nomenclature adapt\xE9\
        e, afin de pouvoir distinguer selon leur usage les comptes d'utilisateur standard,\
        \ les comptes d'administration (domaine, serveurs, postes de travail) et les\
        \ comptes de service."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-restadmin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.3
      ref_id: EXP-DOM-RESTADMIN
      name: Restreindre au maximum l'appartenance aux groupes d'administration du
        domaine
      description: "L'appartenance aux groupes du domaine ADMINISTRATEURS DE L'ENTREPRISE\
        \ et ADMINISTRATEURS DU DOMAINE n'est n\xE9cessaire que dans de tr\xE8s rares\
        \ cas. Les op\xE9rations les plus courantes doivent \xEAtre effectu\xE9es\
        \ avec des comptes du domaine membres des groupes locaux d'administration\
        \ des ordinateurs ou ayant une d\xE9l\xE9gation d'administration."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-serv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.3
      ref_id: EXP-DOM-SERV
      name: "Ma\xEEtriser l'utilisation des comptes de service"
      description: "Les mots de passe des comptes de service sont souvent inscrits\
        \ en dur dans des applications ou dans des syst\xE8mes. Cette mauvaise pratique\
        \ ne permet pas d'\xEAtre en mesure de changer ces mots de passe, par exemple\
        \ en urgence. Il est ainsi n\xE9cessaire de veiller \xE0 pouvoir ma\xEEtriser\
        \ leur utilisation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-limitserv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.3
      ref_id: EXP-DOM-LIMITSERV
      name: Limiter les droits des comptes de service
      description: "Les comptes de service doivent faire l'objet d'une restriction\
        \ des droits, en suivant le principe du moindre privil\xE8ge."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-obsolet
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.3
      ref_id: EXP-DOM-OBSOLET
      name: "D\xE9sactiver les comptes du domaine obsol\xE8tes"
      description: "Il est n\xE9cessaire de d\xE9sactiver imm\xE9diatement, voire\
        \ de supprimer, les comptes obsol\xE8tes,\nque ce soient des comptes d'utilisateur\
        \ (administrateur, service ou utilisateur standard) ou des comptes de machine."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-dom-adminloc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.3
      ref_id: EXP-DOM-ADMINLOC
      name: "Am\xE9liorer la gestion des comptes d'administrateur locaux"
      description: "Afm d'emp\xEAcher la r\xE9utilisation des empreintes d'un compte\
        \ d'utilisateur local d'une machine \xE0 une autre, il faut soit utiliser\
        \ des mots de passe diff\xE9rents pour les comptes locaux d'administration,\
        \ soit interdire la connexion \xE0 distance via ces comptes."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:22.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      ref_id: '22.4'
      name: Envoi en maintenance et mise au rebut
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-maint-ext
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.4
      ref_id: EXP-MAINT-EXT
      name: Maintenance externe
      description: "Les donn\xE9es non chiffr\xE9es doivent \xEAtre effac\xE9es avant\
        \ l'envoi en maintenance externe de toute ressource informatique. Les op\xE9\
        rations de chiffrement doivent faire appel \xE0 des produits de s\xE9curit\xE9\
        \ labellis\xE9s. L'effacement des donn\xE9es sensibles doit s'appuyer sur\
        \ des produits de s\xE9curit\xE9 labellis\xE9s ou respecter des proc\xE9dures\
        \ \xE9tablies en concertation avec l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-mis-reb
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.4
      ref_id: EXP-MIS-REB
      name: Mise au rebut
      description: "Lorsqu'une ressource informatique est amen\xE9e \xE0 quitter d\xE9\
        finitivement l'entit\xE9, les donn\xE9es pr\xE9sentes sur les disques durs\
        \ ou la m\xE9moire int\xE9gr\xE9e doivent \xEAtre effac\xE9es de mani\xE8\
        re s\xE9curis\xE9e. L'effacement des donn\xE9es sensibles doit s'appuyer sur\
        \ des produits de s\xE9curit\xE9 labellis\xE9s ou respecter des proc\xE9dures\
        \ \xE9tablies en concertation avec l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:22.5
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      ref_id: '22.5'
      name: Lutte contre les codes malveillants
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-prot-malv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.5
      ref_id: EXP-PROT-MALV
      name: Protection contre les codes malveillants
      description: "Des logiciels de protection contre les codes malveillants, appel\xE9\
        s commun\xE9ment antivirus, doivent \xEAtre install\xE9s sur l'ensemble des\
        \ serveurs d'interconnexion, des serveurs applicatifs et des postes de travail\
        \ de l'entit\xE9. Ces logiciels de protection doivent \xEAtre distincts pour\
        \ ces trois cat\xE9gories au moins et le d\xE9pouillement de leurs journaux\
        \ doit \xEAtre corr\xE9l\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ges-antivir
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.5
      ref_id: EXP-GES-ANTIVIR
      name: "Gestion des \xE9v\xE9nements de s\xE9curit\xE9 de l'antivirus"
      description: "Les \xE9v\xE9nements de s\xE9curit\xE9 de l'antivirus doivent\
        \ \xEAtre envoy\xE9s \xE0 un serveur national pour analyse statistique et\
        \ gestion des probl\xE8mes a posteriori (exemples : serveur constamment infect\xE9\
        , virus d\xE9tect\xE9 et non \xE9radiqu\xE9 par l'antivirus, etc.)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-maj-antivir
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.5
      ref_id: EXP-MAJ-ANTIVIR
      name: "Mise \xE0 jour de la base de signatures"
      description: "Les mises \xE0 jour des bases antivirales et des moteurs d'antivirus\
        \ doivent \xEAtre d\xE9ploy\xE9es automatiquement sur les serveurs et les\
        \ postes de travail par un dispositif prescrit par les services centraux."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-navig
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.5
      ref_id: EXP-NAVIG
      name: Configuration du navigateur Internet
      description: "Le navigateur d\xE9ploy\xE9 par l'\xE9quipe locale charg\xE9e\
        \ des SI sur l'ensemble des serveurs et des postes de travail n\xE9cessitant\
        \ un acc\xE8s Internet ou Intranet doit \xEAtre configur\xE9 de mani\xE8re\
        \ s\xE9curis\xE9e (d\xE9sactivation des services inutiles, nettoyage du magasin\
        \ de certificats, etc.)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:22.6
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      ref_id: '22.6'
      name: "Mise \xE0 jour des syst\xE8mes et des logiciels"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-pol-cor
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.6
      ref_id: EXP-POL-COR
      name: "D\xE9finir et mettre en \u0153uvre une politique de suivi et d'application\
        \ des correctifs de s\xE9curit\xE9"
      description: "Le maintien du niveau de s\xE9curit\xE9 d'un syst\xE8me d'information\
        \ impose une gestion organis\xE9e et adapt\xE9e des mises \xE0 jour de s\xE9\
        curit\xE9. Un processus de gestion des correctifs propre \xE0 chaque syst\xE8\
        me ou applicatif doit \xEAtre d\xE9fini et adapt\xE9 aux contraintes et au\
        \ niveau d'exposition du syst\xE8me."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-cor-sec
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.6
      ref_id: EXP-COR-SEC
      name: "D\xE9ploiement des correctifs de s\xE9curit\xE9"
      description: "Les correctifs de s\xE9curit\xE9 des ressources informatiques\
        \ locales doivent \xEAtre d\xE9ploy\xE9s par l'\xE9quipe locale charg\xE9\
        e des SI en s'appuyant sur les pr\xE9conisations et les outils propos\xE9\
        s par les services centraux."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-obsolet
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.6
      ref_id: EXP-OBSOLET
      name: "Assurer la migration des syst\xE8mes obsol\xE8tes"
      description: "L'ensemble des logiciels utilis\xE9s sur le syst\xE8me d'information\
        \ doit l'\xEAtre dans une version pour laquelle\nl'\xE9diteur assure le support\
        \ et le tient \xE0 jour. En cas de d\xE9faillance du support, il convient\
        \ d'en \xE9tudier l'impact et de prendre les mesures adapt\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-isol
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.6
      ref_id: EXP-ISOL
      name: "Isoler les syst\xE8mes obsol\xE8tes restants"
      description: "Il est n\xE9cessaire d'isoler les syst\xE8mes obsol\xE8tes, qui\
        \ sont gard\xE9s volontairement pour assurer un maintien en condition op\xE9\
        rationnelle des projets et pour lesquels une migration n'est pas envisageable.\
        \ Chaque fois que cela est possible, cette isolation doit \xEAtre effectu\xE9\
        e au niveau du r\xE9seau par un filtrage strict, au niveau des \xE9l\xE9ments\
        \ d'authentification, qui ne doivent pas \xEAtre communs avec le reste du\
        \ SI, et au niveau des applications (aucune ressource ne doit \xEAtre partag\xE9\
        e avec le reste du SI)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:22.7
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-22
      ref_id: '22.7'
      name: Journalisation
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-jour-sur
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.7
      ref_id: EXP-JOUR-SUR
      name: "\xAB Journalisation \xBB des alertes"
      description: "Chaque syst\xE8me doit disposer de dispositifs de \xAB journalisation\
        \ \xBB permettant de conserver une trace des \xE9v\xE9nements de s\xE9curit\xE9\
        . Ces traces doivent \xEAtre conserv\xE9es de mani\xE8re s\xFBre."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-pol-jour
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.7
      ref_id: EXP-POL-JOUR
      name: "D\xE9finir et mettre en \u0153uvre une politique de gestion et d'analyse\
        \ des"
      description: "journaux de traces. Une politique de gestion et d'analyse des\
        \ journaux de traces des \xE9v\xE9nements de s\xE9curit\xE9 est d\xE9finie\
        \ par le RSSI, valid\xE9e par l'autorit\xE9 d'homologation et mise en \u0153\
        uvre. Le niveau de s\xE9curit\xE9 d'un syst\xE8me d'information d\xE9pend\
        \ en grande partie de la capacit\xE9 de ses exploitants et de ses administrateurs\
        \ \xE0 d\xE9tecter les erreurs, les dysfonctionnements et les tentatives d'acc\xE8\
        s illicites survenant sur les \xE9l\xE9ments qui le composent."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-cons-jour
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:22.7
      ref_id: EXP-CONS-JOUR
      name: Conservation des journaux
      description: "Les journaux des \xE9v\xE9nements de s\xE9curit\xE9 doivent \xEA\
        tre conserv\xE9s pendant douze mois glissants, hors contraintes l\xE9gales\
        \ et r\xE9glementaires particuli\xE8res imposant des dur\xE9es de conservation\
        \ sp\xE9cifiques."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-23
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:8
      ref_id: Objectif 23
      name: "D\xE9fendre les SI n\xE9cessite une vigilance de tous et des actions\
        \ permanentes."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:23.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-23
      ref_id: '23.1'
      name: "D\xE9fense des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ges-dyn
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.1
      ref_id: EXP-GES-DYN
      name: "Gestion dynamique de la s\xE9curit\xE9"
      description: "L'\xE9quipe en charge de la SSI doit proc\xE9der, notamment via\
        \ l'analyse des journaux, \xE0 la surveillance des comportements anormaux\
        \ au sein du syst\xE8me d'information et \xE0 la surveillance des flux d'entr\xE9\
        e et de sortie du syst\xE8me d'information."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:23.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-23
      ref_id: '23.2'
      name: "Gestion des mat\xE9riels informatiques fournis \xE0 l'utilisateur"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-mait-mat
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.2
      ref_id: EXP-MAIT-MAT
      name: "Ma\xEEtrise des mat\xE9riels"
      description: "Les postes de travail, y compris dans le cas d'une location, sont\
        \ fournis \xE0 l'utilisateur par l'entit\xE9, g\xE9r\xE9s et configur\xE9\
        s sous la responsabilit\xE9 de l'entit\xE9. La connexion d'\xE9quipements\
        \ non ma\xEEtris\xE9s, non administr\xE9s ou non mis \xE0 jour par l'entit\xE9\
        , qu'il s'agisse d'ordiphones, d'\xE9quipements informatiques nomades et fixes\
        \ ou de supports de stockage amovibles, sur des \xE9quipements et des r\xE9\
        seaux professionnels est interdite."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-prot-vol
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.2
      ref_id: EXP-PROT-VOL
      name: Rappel des mesures de protection contre le vol
      description: "Les postes fixes b\xE9n\xE9ficient des mesures de protection physique\
        \ offertes au titre de la pr\xE9sente PSSI. Chaque utilisateur doit veiller\
        \ \xE0 la s\xE9curit\xE9 des supports amovibles (cl\xE9s USB et disques amovibles),\
        \ notamment en les conservant dans un endroit s\xFBr. Il est recommand\xE9\
        \ de chiffrer les donn\xE9es contenues sur ces supports. Les supports contenant\
        \ des donn\xE9es sensibles doivent \xEAtre stock\xE9s dans des meubles fermant\
        \ \xE0 clef."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-declar-vol
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.2
      ref_id: EXP-DECLAR-VOL
      name: "D\xE9clarer les pertes et vols"
      description: "Toute perte ou vol d'une ressource d'un syst\xE8me d'information\
        \ doit \xEAtre d\xE9clar\xE9e au RSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-reaffect
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.2
      ref_id: EXP-REAFFECT
      name: "R\xE9affectation de mat\xE9riels informatiques"
      description: "Une proc\xE9dure de gestion des postes et des supports dans le\
        \ cadre de d\xE9parts de personnel ou de r\xE9affectations \xE0 de nouveaux\
        \ utilisateurs doit \xEAtre mise en place et valid\xE9e par le RSSI. Elle\
        \ doit d\xE9finir les conditions de recours \xE0 un effacement des donn\xE9\
        es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:23.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-23
      ref_id: '23.3'
      name: Nomadisme
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-nomad-sens
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.3
      ref_id: EXP-NOMAD-SENS
      name: "D\xE9claration des \xE9quipements nomades aptes \xE0 traiter des informations\
        \ sensibles"
      description: "L'autorit\xE9 d'homologation du SI valide les usages possibles\
        \ des \xE9quipements nomades vis-\xE0-vis du traitement des informations sensibles\
        \ ; les usages non explicitement autoris\xE9s sont interdits."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-acc-dist
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.3
      ref_id: EXP-ACC-DIST
      name: "Acc\xE8s \xE0 distance au syst\xE8me d'information de l'organisme"
      description: "Les autorit\xE9s administratives au sens de l'ordonnance n\xB0\
        \ 2005-1516 du 8 d\xE9cembre 2005 appliquent les r\xE8gles de l'annexe B3\
        \ du r\xE9f\xE9rentiel g\xE9n\xE9ral de s\xE9curit\xE9 pour l'authentification\
        \ des utilisateurs distants. Les autres entit\xE9s s'inspirent de ces r\xE8\
        gles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:23.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-23
      ref_id: '23.4'
      name: "S\xE9curisation des imprimantes et des copieurs multifonctions manipulant\
        \ des informations sensibles"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-imp-sens
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.4
      ref_id: EXP-IMP-SENS
      name: Impression des informations sensibles
      description: "Les impressions d'informations sensibles doivent \xEAtre effectu\xE9\
        es selon une proc\xE9dure d\xE9finie pr\xE9alablement, garantissant un contr\xF4\
        le par l'utilisateur, du d\xE9clenchement de l'impression jusqu'\xE0 la r\xE9\
        cup\xE9ration du support imprim\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-imp-2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:23.4
      ref_id: EXP-IMP-2
      name: "S\xE9curit\xE9 des imprimantes et des copieurs multifonctions"
      description: "Les imprimantes et les copieurs multifonctions sont des ressources\
        \ informatiques \xE0 part enti\xE8re qui doivent \xEAtre g\xE9r\xE9es en tant\
        \ que telles. Elles ne doivent pas pouvoir communiquer avec l'ext\xE9rieur."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-24
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:8
      ref_id: Objectif 24
      name: "Exploiter de mani\xE8re s\xE9curis\xE9e les centres informatiques en\
        \ s'appuyant sur des proc\xE9dures adapt\xE9es et sur la ma\xEEtrise des outils\
        \ de supervision."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-24
      ref_id: '24.1'
      name: "S\xE9curit\xE9 des ressources informatiques"
      description: "Les r\xE8gles suivantes sont pr\xE9sent\xE9es selon le mod\xE8\
        le qui structure l'architecture des applications selon trois tiers (pr\xE9\
        sentation - application- donn\xE9es)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-os
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-OS
      name: "Syst\xE8mes d'exploitation"
      description: "Les syst\xE8mes d'exploitation d\xE9ploy\xE9s doivent faire l'objet\
        \ d'un support valide de la part d'un \xE9diteur ou d'un prestataire de service.\
        \ Seuls les services et les applications n\xE9cessaires sont install\xE9s,\
        \ de fa\xE7on \xE0 r\xE9duire la surface d'attaque. Une attention particuli\xE8\
        re doit \xEAtre apport\xE9e aux comptes administrateurs."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-ltp
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-LTP
      name: "Logiciels en tiers pr\xE9sentation"
      description: "La mise en \u0153uvre d'une configuration renforc\xE9e est obligatoire\
        \ sur les logiciels d\xE9ploy\xE9s pour le tiers pr\xE9sentation (exemples:\
        \ serveur Web, Reverse Proxy)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-lta
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-LTA
      name: Logiciels en tiers application
      description: "Des r\xE8gles de d\xE9veloppement et de configuration s\xE9curis\xE9\
        s des logiciels en tiers application doivent \xEAtre fix\xE9es et appliqu\xE9\
        es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-ltd
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-LTD
      name: "Logiciels en tiers donn\xE9es"
      description: "Des r\xE8gles tr\xE8s strictes (restrictions d'acc\xE8s, interdictions\
        \ de connexions, gestion des privil\xE8ges) s'appliquent aux logiciels en\
        \ tiers donn\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-protfic
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-PROTFIC
      name: "Passerelle d'\xE9change de fichiers"
      description: "Les \xE9changes de fichiers entre applications doivent privil\xE9\
        gier les protocoles s\xE9curis\xE9s (SSLITLS, FTPS, etc.)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-messtech
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-MESSTECH
      name: Messagerie technique
      description: "Pour satisfaire les besoins d'exploitation et de supervision des\
        \ infrastructures et des applications, une messagerie dite technique peut\
        \ \xEAtre d\xE9ploy\xE9e en zone de \xAB back-office \xBB du centre informatique.\
        \ Cette messagerie technique ne doit \xEAtre en aucun cas utilis\xE9e directement\
        \ par un utilisateur."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-filt
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-FILT
      name: Filtrage des flux applicatifs
      description: "De fa\xE7on \xE0 garantir un niveau de s\xE9curit\xE9 satisfaisant\
        \ face aux attaques informatiques, des m\xE9canismes de filtrage et de cloisonnement\
        \ doivent \xEAtre mis en \u0153uvre."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-admin
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-ADMIN
      name: Flux d'administration
      description: "D'une mani\xE8re g\xE9n\xE9rale, il convient de diff\xE9rencier\
        \ deux types de flux d'administration : les flux d'administration de l'infrastructure,\
        \ r\xE9serv\xE9s aux agents du centre informatique, et les flux d'administration\
        \ des applications m\xE9tier, r\xE9serv\xE9s \xE0 la direction m\xE9tier.\
        \ L'attribution des droits d'administration doit respecter cette diff\xE9\
        renciation. Les deux types de flux d'administration doivent \xEAtre dans la\
        \ mesure du possible cloisonn\xE9s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-dns
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-DNS
      name: Service de noms de domaine - DNS technique
      description: "Dans le cas du d\xE9ploiement d'un serveur de noms de domaines\
        \ pour les besoins techniques internes au centre informatique, on utilisera\
        \ les extensions s\xE9curis\xE9es DNSSEC."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-effac
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-EFFAC
      name: Effacement de support
      description: "Le reconditionnement et la r\xE9utilisation des disques durs pour\
        \ un autre usage, par exemple la r\xE9attribution d'une machine ou d'un serveur,\
        \ ne sont autoris\xE9s qu'apr\xE8s une op\xE9ration d'effacement s\xE9curis\xE9\
        \ des donn\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-destr
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-DESTR
      name: Destruction de support
      description: "La fin de vie d'un support ou d'un mat\xE9riel embarquant un support\
        \ de stockage (imprimante, routeur, commutateur, etc.) doit s'accompagner\
        \ d'une op\xE9ration de destruction avant remise au constructeur."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-trac
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-TRAC
      name: "Tra\xE7abilit\xE9 et imputabilit\xE9"
      description: "Afin d'assurer une coh\xE9rence dans les \xE9changes entre applications\
        \ ainsi qu'une tra\xE7abilit\xE9 pertinente des \xE9v\xE9nements techniques\
        \ et de s\xE9curit\xE9, les centres d'exploitation emploient une r\xE9f\xE9\
        rence de temps commune (service NTP, Network Time Protocol)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-supervis
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-SUPERVIS
      name: Supervision
      description: "Un cloisonnement entre les flux de supervision (remont\xE9e d'informations)\
        \ et les flux d'administration (commandes, mises \xE0 jour) doit \xEAtre mis\
        \ en place."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-amoy
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-AMOY
      name: "Acc\xE8s aux p\xE9riph\xE9riques amovibles"
      description: "L'acc\xE8s aux supports informatiques amovibles fait l'objet d'un\
        \ traitement adapt\xE9, plus particuli\xE8rement lorsque ces supports ont\
        \ \xE9t\xE9 utilis\xE9s pour m\xE9moriser des informations sensibles ou lorsqu'ils\
        \ sont utilis\xE9s pour des op\xE9rations d'exploitation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-accres
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-ACCRES
      name: "Acc\xE8s aux r\xE9seaux"
      description: "Dans un centre informatique, le contr\xF4le physique des acc\xE8\
        s aux r\xE9seaux, l'attribution des adresses IP, le filtrage des informations\
        \ et l'usage de dispositifs sp\xE9cifiques (machines virtuelles, cartes d'administration\
        \ \xE0 distance, etc.) font l'objet de proc\xE9dures s\xE9curis\xE9es."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:exp-ci-audit
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:24.1
      ref_id: EXP-CI-AUDIT
      name: "Audit et contr\xF4le"
      description: "Le RSSI pilote des audits r\xE9guliers du syst\xE8me d'information\
        \ relevant de sa responsabilit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "S\xE9curit\xE9 du poste de travail"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-25
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      ref_id: Objectif 25
      name: "Durcir les configurations des postes de travail en prot\xE9geant les\
        \ utilisateurs."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:25.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-25
      ref_id: '25.1'
      name: "Mise \xE0 disposition du poste"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-gest
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.1
      ref_id: PDT-GEST
      name: Fourniture et gestion des postes de travail
      description: "Les postes de travail utilis\xE9s dans le cadre professionnel\
        \ sont fournis et g\xE9r\xE9s par l'\xE9quipe Locale charg\xE9e des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-config
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.1
      ref_id: PDT-CONFIG
      name: Formalisation de la configuration des postes de travail
      description: "Une proc\xE9dure formalis\xE9e de configuration des postes de\
        \ travail est \xE9tablie par chaque entit\xE9, conform\xE9ment aux recommandations\
        \ de l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:25.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-25
      ref_id: '25.2'
      name: "S\xE9curit\xE9 physique des postes de travail"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-verouil-fixe
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.2
      ref_id: PDT-VEROUIL-FIXE
      name: "Verrouillage de l'unit\xE9 centrale des postes fixes"
      description: "Lorsque l'unit\xE9 centrale d'un poste fixe est peu volumineuse,\
        \ donc susceptible d'\xEAtre facilement emport\xE9e, elle doit \xEAtre prot\xE9\
        g\xE9e contre le vol par un syst\xE8me d'attache, par exemple par un c\xE2\
        ble antivol."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-verouil-port
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.2
      ref_id: PDT-VEROUIL-PORT
      name: Verrouillage des postes portables
      description: "Un c\xE2ble physique de s\xE9curit\xE9 doit \xEAtre fourni avec\
        \ chaque poste portable. Les utilisateurs doivent \xEAtre sensibilis\xE9s\
        \ \xE0 son utilisation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:25.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-25
      ref_id: '25.3'
      name: "R\xE9affectation du poste et r\xE9cup\xE9ration d'informations"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-reaffect
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.3
      ref_id: PDT-REAFFECT
      name: "R\xE9affectation du poste de travail"
      description: "Une proc\xE9dure de SSI d\xE9finit les r\xE8gles concernant le\
        \ traitement \xE0 appliquer aux informations ayant \xE9t\xE9 stock\xE9es ou\
        \ manipul\xE9es sur les postes r\xE9affect\xE9s."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:25.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-25
      ref_id: '25.4'
      name: "Gestion des privil\xE8ges sur les postes de travail"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-privil
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.4
      ref_id: PDT-PRIVIL
      name: "Privil\xE8ges des utilisateurs sur les postes de travail"
      description: "La gestion des privil\xE8ges des utilisateurs sur leurs postes\
        \ de travail doit suivre le principe du moindre privil\xE8ge : chaque utilisateur\
        \ ne doit disposer que des privil\xE8ges n\xE9cessaires \xE0 la conduite des\
        \ actions relevant de sa mission."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-priv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.4
      ref_id: PDT-PRIV
      name: "Utilisation des privil\xE8ges d'acc\xE8s des administrateurs"
      description: "Les privil\xE8ges d'acc\xE8s des administrateurs doivent \xEA\
        tre utilis\xE9s uniquement pour les actions d'administration le n\xE9cessitant."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-adm-local
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.4
      ref_id: PDT-ADM-LOCAL
      name: Gestion du compte de l'administrateur local
      description: "L'acc\xE8s au compte de l'administrateur local sur les postes\
        \ de travail doit \xEAtre strictement limit\xE9 aux \xE9quipes en charge de\
        \ l'exploitation et du support sur ces postes de travail."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:25.5
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-25
      ref_id: '25.5'
      name: Protection des informations
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-stock
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.5
      ref_id: PDT-STOCK
      name: Stockage des informations
      description: "Dans la mesure du possible, les donn\xE9es trait\xE9es par les\
        \ utilisateurs doivent \xEAtre stock\xE9es sur des espaces en r\xE9seau, eux-m\xEA\
        mes sauvegard\xE9s selon les exigences des entit\xE9s et en accord avec les\
        \ r\xE8gles de s\xE9curit\xE9 en vigueur."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-sauv-loc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.5
      ref_id: PDT-SAUV-LOC
      name: "Sauvegarde et synchronisation des donn\xE9es locales"
      description: "Dans le cas o\xF9 des donn\xE9es doivent \xEAtre stock\xE9es localement\
        \ sur le poste de travail, des moyens de synchronisation ou de sauvegarde\
        \ doivent \xEAtre fournis aux utilisateurs."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-part-fic
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.5
      ref_id: PDT-PART-FIC
      name: Partage de fichiers
      description: "Le partage de r\xE9pertoires ou de donn\xE9es h\xE9berg\xE9es\
        \ localement sur les postes de travail n'est pas autoris\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-suppr-part
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.5
      ref_id: PDT-SUPPR-PART
      name: "Suppression des donn\xE9es sur les postes partag\xE9s"
      description: "Les donn\xE9es pr\xE9sentes sur les postes partag\xE9s (portable\
        \ de pr\xEAt, par exemple) doivent \xEAtre supprim\xE9es entre deux utilisations,\
        \ d\xE8s lors que les utilisateurs ne disposent pas du m\xEAme besoin d'en\
        \ conna\xEEtre."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-chiff-sens
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.5
      ref_id: PDT-CHIFF-SENS
      name: "Chiffrement des donn\xE9es sensibles"
      description: "Un moyen de chiffrement labellis\xE9 doit \xEAtre mis \xE0 la\
        \ disposition des utilisateurs et des administrateurs afin de chiffrer les\
        \ donn\xE9es sensibles stock\xE9es sur les postes de travail, les serveurs,\
        \ les espaces de travail ou les supports amovibles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-amoy
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.5
      ref_id: PDT-AMOY
      name: Fourniture de supports de stockage amovibles
      description: "Les supports de stockage amovibles (cl\xE9s USB et disque durs\
        \ externes, notamment) doivent \xEAtre fournis aux utilisateurs par l'\xE9\
        quipe locale charg\xE9e des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:25.6
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-25
      ref_id: '25.6'
      name: Nomadisme
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-nomad-access
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.6
      ref_id: PDT-NOMAD-ACCESS
      name: "Acc\xE8s \xE0 distance aux SI de l'entit\xE9"
      description: "Les acc\xE8s \xE0 distance aux SI de l'entit\xE9 (acc\xE8s dits\
        \ \xAB nomades \xBB) doivent intervenir via des r\xE9seaux priv\xE9s virtuels\
        \ (VPN) de confiance conformes aux recommandations de l'ANSSI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-nomad-parefeu
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.6
      ref_id: PDT-NOMAD-PAREFEU
      name: Pare-feu local
      description: "Un pare-feu local conforme aux recommandations de l'ANSSI doit\
        \ \xEAtre install\xE9 sur les postes nomades."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-nomad-stock
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.6
      ref_id: PDT-NOMAD-STOCK
      name: Stockage local d'information sur les postes nomades
      description: "Le stockage local d'information sur les postes de travail nomades\
        \ doit \xEAtre limit\xE9 au strict n\xE9cessaire. Les informations sensibles\
        \ doivent \xEAtre obligatoirement chiffr\xE9es par un moyen de chiffrement\
        \ labellis\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-nomad-filt
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.6
      ref_id: PDT-NOMAD-FILT
      name: "Filtre de confidentialit\xE9"
      description: "Pour les postes de travail nomades manipulant des donn\xE9es sensibles,\
        \ un filtre de confidentialit\xE9 doit \xEAtre fourni et \xEAtre positionn\xE9\
        \ sur l'\xE9cran d\xE8s lors que le poste est utilis\xE9 en dehors de l'entit\xE9\
        ."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-nomad-connex
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.6
      ref_id: PDT-NOMAD-CONNEX
      name: Configuration des interfaces de connexion sans fil
      description: La configuration des interfaces de connexion sans fil doit interdire
        les usages dangereux de ces interfaces.
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-nomad-desactiv
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:25.6
      ref_id: PDT-NOMAD-DESACTIV
      name: "D\xE9sactivation des interfaces de connexion sans fil"
      description: "Des r\xE8gles de configuration des interfaces de connexion sans\
        \ fil (Wifi, Bluetooth, 30, etc.), permettant d'interdire les usages non ma\xEE\
        tris\xE9s et d'\xE9viter les intrusions via ces interfaces, doivent \xEAtre\
        \ d\xE9finies et appliqu\xE9es. Les interfaces sans fil ne doivent \xEAtre\
        \ activ\xE9es qu'en cas de besoin."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-26
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      ref_id: Objectif 26
      name: "Param\xE9trer les imprimantes et les copieurs multifonctions afin de\
        \ diminuer leur surface d'attaque."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:26.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-26
      ref_id: '26.1'
      name: "S\xE9curisation des imprimantes et des copieurs multifonctions"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-mul-durciss
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:26.1
      ref_id: PDT-MUL-DURCISS
      name: Durcissement des imprimantes et des copieurs multifonctions
      description: "Les imprimantes et les copieurs multifonctions h\xE9berg\xE9s\
        \ localement dans une entit\xE9 doivent faire l'objet d'un durcissement en\
        \ termes de s\xE9curit\xE9: changement des mots de passe initialement fix\xE9\
        s par le constructeur, d\xE9sactivation des interfaces en r\xE9seau inutiles,\
        \ suppression des services inutiles, chiffrement des donn\xE9es sur le disque\
        \ dur lorsque cette fonctionnalit\xE9 est disponible, configuration de r\xE9\
        seau statique."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-mul-secnum
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:26.1
      ref_id: PDT-MUL-SECNUM
      name: "S\xE9curisation de la fonction de num\xE9risation"
      description: "Lorsqu'elle est activ\xE9e, la fonction de num\xE9risation sur\
        \ les copieurs multifonctions h\xE9berg\xE9s dans une entit\xE9 doit \xEA\
        tre s\xE9curis\xE9e. Les mesures de s\xE9curit\xE9 suivantes doivent notamment\
        \ \xEAtre appliqu\xE9es : envoi de documents uniquement \xE0 destination d'une\
        \ adresse de messagerie interne \xE0 l'entit\xE9, envoi \xE0 une seule adresse\
        \ de messagerie."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-27
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      ref_id: Objectif 27
      name: "S\xE9curiser la t\xE9l\xE9phonie pour prot\xE9ger les utilisateurs contre\
        \ des attaques malveillantes."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:27.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-27
      ref_id: '27.1'
      name: "S\xE9curisation de la t\xE9l\xE9phonie"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-tel-minim
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:27.1
      ref_id: PDT-TEL-MINIM
      name: "S\xE9curiser la configuration des autocommutateurs"
      description: "Les autocommutateurs doivent \xEAtre maintenus \xE0 jour en ce\
        \ qui concerne les correctifs de s\xE9curit\xE9. Leur configuration doit \xEA\
        tre durcie. La d\xE9finition et l'affectation des droits d'acc\xE8s et des\
        \ privil\xE8ges aux utilisateurs (transfert d\xE9part-d\xE9part, entr\xE9\
        e en tiers, interphonie, autorisation de d\xE9blocage, renvoi sur un num\xE9\
        ro ext\xE9rieur, substitution, substitution de privil\xE8ge, interception\
        \ d'appel dirig\xE9, etc.) doivent faire l'objet d'une attention particuli\xE8\
        re. Une revue de la programmation t\xE9l\xE9phonique doit \xEAtre organis\xE9\
        e p\xE9riodiquement."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-tel-codes
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:27.1
      ref_id: PDT-TEL-CODES
      name: "Codes d'acc\xE8s t\xE9l\xE9phoniques"
      description: "Il est n\xE9cessaire de sensibiliser les utilisateurs au besoin\
        \ de modifier le code d'acc\xE8s de leur t\xE9l\xE9phone et de leur messagerie\
        \ vocale."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-tel-dect
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:27.1
      ref_id: PDT-TEL-DECT
      name: Limiter l'utilisation du DECT
      description: "Les communications r\xE9alis\xE9es au travers du protocole DECT\
        \ sont susceptibles d'\xEAtre intercept\xE9es, m\xEAme si les m\xE9canismes\
        \ d'authentification et de chiffrement que propose ce protocole sont activ\xE9\
        s. Il est recommand\xE9 d'attribuer des postes t\xE9l\xE9phoniques filaires\
        \ aux utilisateurs dont les \xE9changes sont les plus sensibles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-28
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      ref_id: Objectif 28
      name: "Contr\xF4ler r\xE9guli\xE8rement la conformit\xE9 des param\xE9trages\
        \ de s\xE9curit\xE9 appliqu\xE9s aux postes de travail."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:28.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-28
      ref_id: '28.1'
      name: "Contr\xF4les de conformit\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pdt-conf-verif
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:28.1
      ref_id: PDT-CONF-VERIF
      name: "Utiliser des outils de v\xE9rification automatique de la conformit\xE9"
      description: "Un outil de v\xE9rification r\xE9guli\xE8re de la conformit\xE9\
        \ des \xE9l\xE9ments de configuration des postes de travail doit \xEAtre mis\
        \ en place, afin d'\xE9viter une d\xE9rive dans le temps de ces \xE9l\xE9\
        ments de configuration."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-29
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      ref_id: Objectif 29
      name: "Reconna\xEEtre la s\xE9curit\xE9 comme une fonction essentielle et la\
        \ prendre en compte d\xE8s la conception des projets."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:29.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-29
      ref_id: '29.1'
      name: "D\xE9veloppement des syst\xE8mes"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-integr-secloc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:29.1
      ref_id: DEV-INTEGR-SECLOC
      name: "Int\xE9grer la s\xE9curit\xE9 dans les d\xE9veloppements locaux"
      description: "Toute initiative locale de d\xE9veloppement informatique doit\
        \ respecter les recommandations de l'ANSSI, concernant la prise en compte\
        \ de la s\xE9curit\xE9 dans les projets et les d\xE9veloppements informatiques.\
        \ Le service \xE0 l'origine du projet se porte garant de l'application du\
        \ r\xE9f\xE9rentiel g\xE9n\xE9ral de s\xE9curit\xE9 et de l'application d'une\
        \ d\xE9marche d'homologation du syst\xE8me."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-sous-trait
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:29.1
      ref_id: DEV-SOUS-TRAIT
      name: "Int\xE9grer des clauses de SSI dans les contrats de sous-traitance de\
        \ d\xE9veloppement informatique"
      description: "Lors de l'\xE9criture d'un contrat de sous-traitance de d\xE9\
        veloppement, plusieurs clauses relatives \xE0 la SSI doivent \xEAtre int\xE9\
        gr\xE9es :\n* formation obligatoire des d\xE9veloppeurs sur le d\xE9veloppement\
        \ s\xE9curis\xE9 et sur les vuln\xE9rabilit\xE9s classiques;\n* utilisation\
        \ obligatoire d'outils permettant de minimiser les erreurs introduites durant\
        \ le d\xE9veloppement (outils gratuits d'analyse statique de code, utilisation\
        \ de biblioth\xE8ques r\xE9put\xE9es pour leur s\xE9curit\xE9, etc.) ;\n*\
        \ production de documentation technique d\xE9crivant l'implantation des protections\
        \ d\xE9velopp\xE9es (gestion de l'authentification, stockage des mots de passe,\
        \ gestion des droits, chiffrement, etc.) ;\n* respect de normes de d\xE9veloppement\
        \ s\xE9curis\xE9, qu'elles soient propres au d\xE9veloppeur, publiques ou\
        \ propres au commanditaire ;\n* obligation pour le prestataire de corriger,\
        \ dans un temps raisonnable et pour un prix d\xE9fini, les vuln\xE9rabilit\xE9\
        s introduites durant le d\xE9veloppement et port\xE9es \xE0 sa connaissance,\
        \ en incluant automatiquement les corrections des autres occurrences des m\xEA\
        mes erreurs de programmation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-30
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      ref_id: Objectif 30
      name: "Mener les d\xE9veloppements des logiciels selon une m\xE9thodologie de\
        \ s\xE9curisation du code produit."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:30.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-30
      ref_id: '30.1'
      name: "D\xE9veloppements des logiciels et s\xE9curit\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-fuites
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:30.1
      ref_id: DEV-FUITES
      name: Limiter les fuites d'information
      description: "Les fuites d'informations techniques sur les logiciels utilis\xE9\
        s permettent aux attaquants de d\xE9celer plus facilement d'\xE9ventuelles\
        \ vuln\xE9rabilit\xE9s. Il est imp\xE9ratif de limiter fortement la diffusion\
        \ d'informations au sujet des produits utilis\xE9s, m\xEAme si cette pr\xE9\
        caution ne constitue pas une protection en tant que telle."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-log-adher
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:30.1
      ref_id: DEV-LOG-ADHER
      name: "R\xE9duire l'adh\xE9rence des applications \xE0 des produits ou \xE0\
        \ technologies sp\xE9cifiques"
      description: "Le fonctionnement d'une application s'appuie sur un environnement\
        \ logiciel et mat\xE9riel. En phases de conception et de sp\xE9cification\
        \ technique, il est n\xE9cessaire de s'assurer que les applications n'ont\
        \ pas une trop forte adh\xE9rence vis-\xE0-vis des environnements sur lesquels\
        \ elles reposent. En effet, l'apparition de failles sur un environnement a\
        \ de fait un impact sur la s\xE9curit\xE9 des applications qui en d\xE9pendent.\
        \ En plus du maintien en condition de s\xE9curit\xE9 propre \xE0 l'application,\
        \ il est donc n\xE9cessaire de pouvoir faire \xE9voluer son environnement\
        \ pour garantir sa s\xE9curit\xE9 dans la dur\xE9e."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-log-crit
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:30.1
      ref_id: DEV-LOG-CRIT
      name: "Instaurer des crit\xE8res de d\xE9veloppement s\xE9curis\xE9"
      description: "Une fois pass\xE9es les phases de d\xE9finition des besoins et\
        \ de conception de l'architecture applicative, le niveau de s\xE9curit\xE9\
        \ d'une application d\xE9pend fortement des modalit\xE9s pratiques suivies\
        \ lors de sa phase de d\xE9veloppement."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-log-cycle
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:30.1
      ref_id: DEV-LOG-CYCLE
      name: "Int\xE9grer la s\xE9curit\xE9 dans le cycle de vie du logiciel"
      description: "La s\xE9curit\xE9 doit \xEAtre int\xE9gr\xE9e \xE0 toutes les\
        \ \xE9tapes du projet, depuis l'expression des besoins jusqu'\xE0 la maintenance\
        \ applicative, en passant par la r\xE9daction du cahier des charges et les\
        \ phases de recette."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-log-web
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:30.1
      ref_id: DEV-LOG-WEB
      name: "Am\xE9liorer la prise en compte de la s\xE9curit\xE9 dans les d\xE9veloppements\
        \ Web"
      description: "Les d\xE9veloppements Web, en particulier les d\xE9veloppements\
        \ en PHP, font l'objet de probl\xE8mes de s\xE9curit\xE9 r\xE9currents qui\
        \ ont conduit \xE0 la constitution de r\xE9f\xE9rentiels de s\xE9curit\xE9\
        . Ces r\xE9f\xE9rentiels ont pour objectif de fixer des r\xE8gles de bonne\
        \ pratique \xE0 l'usage des d\xE9veloppeurs. Ce sont des r\xE8gles d'ordre\
        \ g\xE9n\xE9rique ou pouvant \xEAtre sp\xE9cifiques \xE0 un langage (PHP,\
        \ ASP, NET, etc.)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-log-pass
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:30.1
      ref_id: DEV-LOG-PASS
      name: "Calculer les empreintes de mots de passe de mani\xE8re s\xE9curis\xE9\
        e"
      description: "Lorsqu'une application doit stocker les mots de passe de ses utilisateurs,\
        \ il est important de mettre en \u0153uvre des mesures permettant de se pr\xE9\
        munir contre les attaques document\xE9es : attaques par dictionnaire, attaques\
        \ par tables dites \xAB arc-en-ciel \xBB, attaques par force brute, etc."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-31
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:9
      ref_id: Objectif 31
      name: "Accompagner le d\xE9veloppement s\xE9curis\xE9 d'applications \xE0 risques\
        \ par des contre-mesures minimisant l'impact d'attaques nouvelles."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:31.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-31
      ref_id: '31.1'
      name: "Applications \xE0 risques"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:dev-filt-appl
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:31.1
      ref_id: DEV-FILT-APPL
      name: "Mettre en \u0153uvre des fonctionnalit\xE9s de filtrage applicatif pour\
        \ les applications \xE0 risque"
      description: "Devant les applications \xE0 risques, il est recommand\xE9 de\
        \ faire usage d'une solution tierce de filtrage applicatif."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: Traitement des incidents
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-32
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:10
      ref_id: Objectif 32
      name: "Partager l'information (alertes, incidents) dans le respect des r\xE8\
        gles de prudence et mutualiser les op\xE9rations de remise en \xE9tat, de\
        \ fa\xE7on \xE0 lutter efficacement contre les attaques."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:32.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-32
      ref_id: '32.1'
      name: "Cha\xEEnes op\xE9rationnelles"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:ti-ops-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:32.1
      ref_id: TI-OPS-SSI
      name: "Cha\xEEnes op\xE9rationnelles de la SSI"
      description: "Les alertes et les incidents sont g\xE9r\xE9s selon des proc\xE9\
        dures test\xE9es lors d'exercices. La coordination des comp\xE9tences est\
        \ organis\xE9e \xE0 l'\xE9chelon de l'entit\xE9. Les situations d'urgences\
        \ peuvent faire appel \xE0 des mesures d\xE9finies pr\xE9alablement dans le\
        \ cadre de plans."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:32.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-32
      ref_id: '32.2'
      name: "Traitement des alertes de s\xE9curit\xE9 \xE9mises par les instances\
        \ nationales (ANSSI)"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:ti-mob
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:32.2
      ref_id: TI-MOB
      name: Mobilisation en cas d'alerte
      description: "En cas d'alerte de s\xE9curit\xE9 identifi\xE9e au niveau national,\
        \ les RSSI de chaque entit\xE9 s'assurent de la bonne application des exigences\
        \ formul\xE9es par les instances nationales, dans les meilleurs d\xE9lais."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:32.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-32
      ref_id: '32.3'
      name: "Remont\xE9e des incidents de s\xE9curit\xE9 rencontr\xE9s"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:ti-qual-trait
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:32.3
      ref_id: TI-QUAL-TRAIT
      name: Qualification et traitement des incidents
      description: "La cha\xEEne fonctionnelle de la SSI est inform\xE9e par la cha\xEE\
        ne op\xE9rationnelle de tout incident de s\xE9curit\xE9 et contribue si n\xE9\
        cessaire \xE0 la qualification de l'incident et au pilotage de son traitement."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:ti-inc-rem
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:32.3
      ref_id: TI-INC-REM
      name: "Remont\xE9e des incidents"
      description: "Tout incident de s\xE9curit\xE9, m\xEAme apparemment mineur, dont\
        \ l'impact d\xE9passe ou est susceptible de d\xE9passer le SI d'une entit\xE9\
        , fait l'objet d'un compte-rendu, via la cha\xEEne de SSI, au centre op\xE9\
        rationnel de la s\xE9curit\xE9 des syst\xE8mes d'information (COSSI) de l'ANSSI.\n\
        La remont\xE9e d'incidents par les cha\xEEnes op\xE9rationnelles participe\
        \ \xE0 la vigilance permanente. Cette remont\xE9e est imm\xE9diate pour les\
        \ incidents dont la port\xE9e est susceptible de d\xE9passer \xE0 court terme\
        \ le p\xE9rim\xE8tre de l'entit\xE9 et pour les incidents correspondant \xE0\
        \ des signalements sp\xE9cifiques, notamment de la part de l'ANSSI. La remont\xE9\
        e prend la forme d'une synth\xE8se mensuelle pour les autres incidents.\n\
        Les crit\xE8res et les proc\xE9dures pr\xE9cis de remont\xE9e d'incidents\
        \ sont \xE9labor\xE9s sous le pilotage de la cha\xEEne fonctionnelle de la\
        \ SSI, en lien avec la cha\xEEne op\xE9rationnelle.\nChaque entit\xE9 doit\
        \ maintenir \xE0 jour un historique pr\xE9cis des suites de chaque incident,\
        \ afin de capitaliser les enseignements tir\xE9s de la r\xE9solution ou non\
        \ de ces incidents.\nLa difficile caract\xE9risation des attaques (ambigu\xEF\
        t\xE9 de la source, du dommage, du moyen, de la finalit\xE9) rend n\xE9cessaire\
        \ les \xE9changes d'informations, m\xEAme sur des \xAB signaux faibles \xBB\
        , ainsi que la coordination continue des actions."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:11
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "Continuit\xE9 d'activit\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-33
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:11
      ref_id: Objectif 33
      name: "Se doter de plans de continuit\xE9 d'activit\xE9 et les tester."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:33.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-33
      ref_id: '33.1'
      name: "Gestion de la continuit\xE9 d'activit\xE9 des SI"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-minis
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.1
      ref_id: PCA-MINIS
      name: "D\xE9finition du plan de continuit\xE9 d'activit\xE9 des SI"
      description: "Chaque entit\xE9 d\xE9finit un plan de continuit\xE9 d'activit\xE9\
        \ des SI permettant d'assurer, en cas de sinistre, la continuit\xE9 d'activit\xE9\
        \ des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:33.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-33
      ref_id: '33.2'
      name: "D\xE9finition du plan de continuit\xE9 d'activit\xE9 des syst\xE8mes\
        \ d'information d'une entit\xE9"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-local
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.2
      ref_id: PCA-LOCAL
      name: "D\xE9finition du plan local de continuit\xE9 d'activit\xE9 des syst\xE8\
        mes d'information"
      description: "Le directeur des syst\xE8mes d'information ou le RSSI d'une entit\xE9\
        \ d\xE9finit la structure et les objectifs du plan de continuit\xE9 d'activit\xE9\
        \ des syst\xE8mes d'information permettant d'assurer effectivement, en cas\
        \ de sinistre, la continuit\xE9 de l'activit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:33.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-33
      ref_id: '33.3'
      name: "Mise en \u0153uvre du plan local de continuit\xE9 d'activit\xE9 des syst\xE8\
        mes d'information"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-suivilocal
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.3
      ref_id: PCA-SUIVILOCAL
      name: "Suivi de la mise en \u0153uvre du plan de continuit\xE9 d'activit\xE9\
        \ local des SI"
      description: "Le RSSI d'une entit\xE9 s'assure de la bonne mise en \u0153uvre\
        \ des dispositions pr\xE9vues dans le plan de continuit\xE9 d'activit\xE9\
        \ des syst\xE8mes d'information."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-proc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.3
      ref_id: PCA-PROC
      name: "Mise en \u0153uvre des dispositifs techniques et des proc\xE9dures op\xE9\
        rationnelles"
      description: "Les \xE9quipes informatiques mettent en \u0153uvre les dispositifs\
        \ techniques et les proc\xE9dures op\xE9rationnelles contribuant \xE0 la continuit\xE9\
        \ des SI. Elles en assurent la supervision quotidienne et la maintenance dans\
        \ le temps."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-sauve
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.3
      ref_id: PCA-SAUVE
      name: "Protection de la disponibilit\xE9 des sauvegardes"
      description: "Les donn\xE9es sauvegard\xE9es ne doivent pas \xEAtre soumises\
        \ aux m\xEAmes risques de sinistres que les donn\xE9es en cours d'exploitation."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-prot
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.3
      ref_id: PCA-PROT
      name: "Protection de la confidentialit\xE9 des sauvegardes"
      description: "Les sauvegardes doivent \xEAtre trait\xE9es de mani\xE8re \xE0\
        \ garantir leur confidentialit\xE9 et leur int\xE9grit\xE9."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:33.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-33
      ref_id: '33.4'
      name: "Maintien en conditions op\xE9rationnelles du plan local de continuit\xE9\
        \ d'activit\xE9 des SI"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-exerc
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.4
      ref_id: PCA-EXERC
      name: "Exercice r\xE9gulier du plan local de continuit\xE9 d'activit\xE9 des\
        \ syst\xE8mes d'information"
      description: "Le RSSI d'une entit\xE9 organise des exercices r\xE9guliers, afin\
        \ de tester le plan local de continuit\xE9 d'activit\xE9 des syst\xE8mes d'information."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:pca-misajour
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:33.4
      ref_id: PCA-MISAJOUR
      name: "Mise \xE0 jour du plan local de continuit\xE9 d'activit\xE9 des syst\xE8\
        mes d'information"
      description: "Le RSSI d'une entit\xE9 assure la tenue \xE0 jour du plan local\
        \ de continuit\xE9 d'activit\xE9 des SI."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:12
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1
      name: "Conformit\xE9, audit, inspection, contr\xF4le"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-34
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-1:12
      ref_id: Objectif 34
      name: "Effectuer des contr\xF4les (audits, inspections) et des exercices r\xE9\
        guliers de fa\xE7on \xE0 mesurer les progr\xE8s accomplis et corriger les\
        \ manquements."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:34.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:objectif-34
      ref_id: '34.1'
      name: "Contr\xF4les"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:contr-ssi
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:34.1
      ref_id: CONTR-SSI
      name: "Contr\xF4les locaux"
      description: "La conformit\xE9 \xE0 la PSSI de l'entit\xE9 est v\xE9rifi\xE9\
        e par des contr\xF4les r\xE9guliers. Les RSSI de chaque entit\xE9 conduisent\
        \ des actions locales d'\xE9valuation de la conformit\xE9 \xE0 la PSSI et\
        \ contribuent \xE0 la consolidation, dans un bilan annuel, de l'\xE9tat d'avancement\
        \ de sa mise en \u0153uvre."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-2
      assessable: false
      depth: 1
      ref_id: Annexe 2
      name: "Diff\xE9rentes classes de r\xE9seau"
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-2:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-2
      description: "Un r\xE9seau de classe 0 est un r\xE9seau public (Internet, etc.)\
        \ ou un r\xE9seau connect\xE9 \xE0 un r\xE9seau public qui ne respecte pas\
        \ les exigences de la classe 1 ci-dessous."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-2:2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-2
      description: "Un r\xE9seau de classe 1 est un r\xE9seau qui est isol\xE9 de\
        \ tout r\xE9seau de classe 0 \xE0 l'aide de dispositifs de filtrage et de\
        \ rupture de flux de la fa\xE7on suivante<sup>11</sup> :\n* au moins un dispositif\
        \ de filtrage qualifi\xE9 au niveau standard est mis en coupure de tous les\
        \ flux depuis et vers le r\xE9seau de classe 0 ;\n* un dispositif de rupture\
        \ de tous les flux (proxy) depuis et vers le r\xE9seau de classe 0, si possible\
        \ qualifi\xE9 au niveau \xE9l\xE9mentaire, est positionn\xE9 entre deux dispositifs\
        \ de filtrage;\n* une sonde de d\xE9tection qualifi\xE9e au moins au niveau\
        \ \xE9l\xE9mentaire contr\xF4le l'ensemble des flux \xE9chang\xE9s avec le\
        \ r\xE9seau de classe 0.\nLes interconnexions entre r\xE9seaux de classe 1\
        \ sont autoris\xE9es<sup>12</sup> La d\xE9finition de la passerelle d'interconnexion\
        \ est \xE0 la charge des entit\xE9s concern\xE9es. L'interconnexion fait l'objet\
        \ d'une homologation distincte de celle des r\xE9seaux."
      annotation: "<sup>11</sup> Voir la note technique de l'ANSSI sur son site web\
        \ : \xAB D\xE9finition d'une architecture de passerelle d'interconnexion s\xE9\
        curis\xE9e \xBB pr\xE9sentant les principes de conception de dispositifs d'interconnexion.\n\
        <sup>12</sup> L'interconnexion est autoris\xE9e y compris via un r\xE9seau\
        \ de classe 0 d\xE8s lors que des \xE9quipements de chiffrement agr\xE9\xE9\
        s par l'ANSSI sont utilis\xE9s en coupure (voir article 14)."
    - urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-2:3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ii-901_integral:annexe-2
      description: "Un r\xE9seau de classe 2 est un r\xE9seau qui :\n* est isol\xE9\
        , c'est-\xE0-dire non connect\xE9, m\xEAme indirectement, \xE0 Internet ;\n\
        * ne comprend aucune interconnexion \xAB descendante \xBB<sup>13</sup> permettant\
        \ l'envoi de flux en clair ou chiffr\xE9s \xE0 destination des r\xE9seaux\
        \ de classe 0 ou 1, sauf \xE0 utiliser des dispositifs agr\xE9\xE9s sp\xE9\
        cifiquement pour cet usage ;\n* comprend \xE9ventuellement des interconnexions\
        \ \xAB montantes \xBB permettant la r\xE9ception de flux en provenance des\
        \ r\xE9seaux de classe 0 ou 1 au travers d'une diode agr\xE9\xE9e par l'ANSSI\
        \ pour de tels usages.\nLes interconnexions entre r\xE9seaux de classe 2 sont\
        \ autoris\xE9es<sup>14</sup> La d\xE9finition de la passerelle d'interconnexion\
        \ est \xE0 la charge des entit\xE9s concern\xE9es. L'interconnexion fait l'objet\
        \ d'une homologation distincte de celle des r\xE9seaux."
      annotation: "<sup>13</sup> Un flux descendant est un flux dont l'origine est\
        \ un r\xE9seau de classe 2 et la destination un r\xE9seau de classe inf\xE9\
        rieure ; un flux montant est, \xE0 l'inverse, un flux dont la destination\
        \ est un r\xE9seau de classe 2 et l'origine un r\xE9seau de classe inf\xE9\
        rieure ; il ne s'agit pas d'un flux de transit, entre deux composants d'un\
        \ r\xE9seau de classe 2, au travers d'un r\xE9seau de classe inf\xE9rieure.\n\
        <sup>14</sup> L'interconnexion est autoris\xE9e y compris via un r\xE9seau\
        \ de classe 0 d\xE8s lors que des \xE9quipements de chiffrement agr\xE9\xE9\
        s par l'ANSSI sont utilis\xE9s en coupure (voir article 14)."
