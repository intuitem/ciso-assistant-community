    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:abro_2026:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: 'Hoofdstuk 1: Bestuur en organisatie'
      translations:
        en:
          name: 'Chapter 1: Management and organisation'
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1
      ref_id: '1.1'
      name: Inrichten van de beveiligingsorganisatie
      translations:
        en:
          name: Setting up the security organisation
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.1
      description: Opdrachtnemer beschikt over een door het Hoogste bestuursorgaan
        van de Opdrachtnemer bekrachtigd integraal beveiligingsbeleid dat organisatorische,
        personele, fysieke en cybersecurity-aspecten beschrijft. Dit beleid kent geen
        belemmeringen om te kunnen voldoen aan de vanuit ABRO 2026 vereiste maatregelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Contractor must have an integral security policy in place,\
            \ endorsed by the Contractor\u2019s Highest Executive Authority. This\
            \ describes organisational, personnel, physical and cybersecurity aspects.\
            \ This policy has no impediments to meeting the requirements laid down\
            \ in ABRO 2026."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.2
      description: "Opdrachtnemer voert een Risicoanalyse uit voor de Bijzondere Opdracht(en)\
        \ en neemt daarbij de resultaten van de door Opdrachtgever uitgevoerde Risicoanalyse\
        \ mee. De Risicoanalyse wordt minimaal jaarlijks door Opdrachtnemer ge\xEB\
        valueerd en indien nodig herzien. Hierin is ten minste:"
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The Contractor must perform a Risk Analysis for the Special
            Contract(s), taking into account the results of the Risk Analysis conducted
            by Contracting Authority. At least once a year, the Risk Analysis must
            be reviewed by the Contractor and revised as necessary. It includes at
            least:'
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.3
      description: "Opdrachtnemer heeft een risicomanagementproces vastgesteld en\
        \ ge\xEFmplementeerd in relatie tot de Bijzondere Opdracht(en) en het Te Beschermen\
        \ Belang."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must establish and implement a risk management
            process related to the Special Contract(s) and the Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.4
      description: "Opdrachtnemer draagt een medewerker aan voor de rol van Beveiligingsfunctionaris\
        \ bij NBIV conform formulier 'Aanstelling Beveiligingsfunctionaris'. Na goedkeuring\
        \ wordt de Beveiligingsfunctionaris benoemd door NBIV. Afhankelijk van de\
        \ aard en omvang van de Bijzondere Opdracht(en), het aantal betrokken locaties\
        \ en specialismen kunnen zo nodig \xE9\xE9n of meerdere sub-Beveiligingsfunctionarissen\
        \ worden benoemd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Contractor must nominate an employee to NOIS for the role\
            \ of Security Officer, in accordance with the \u2018Appointment of Security\
            \ Officer\u2019 form. Upon approval, the Security Officer will be appointed\
            \ by NOIS. Depending on the nature and size of the Special Contract(s),\
            \ the number of sites, and the specialisms involved, one or more Deputy\
            \ Security Officers may be appointed, if necessary."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.5
      description: "Afhankelijk van de aard en omvang van de Bijzondere Opdracht(en),\
        \ kan Opdrachtnemer een medewerker aandragen voor de rol van Cyber-Beveiligingsfunctionaris\
        \ bij NBIV conform formulier 'Aanstelling Beveiligingsfunctionaris'. Na goedkeuring\
        \ wordt de Cyber-Beveiligingsfunctionaris benoemd door NBIV. Zo nodig kunnen\
        \ \xE9\xE9n of meerdere sub-Cyber-Beveiligingsfunctionarissen worden benoemd,\
        \ zie ook bijlage 2."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Depending on the nature and scope of the Special Contract(s),\
            \ the Contractor may nominate an employee to NOIS for the role of Cyber\
            \ Security Officer, in accordance with the \u2018Appointment of Security\
            \ Officer\u2019 form. Upon approval, the Cyber Security Officer will be\
            \ appointed by NOIS. If necessary, one or more Deputy Cyber Security Officers\
            \ may be appointed; also see appendix 2."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.6
      description: 'De Beveiligingsfunctionaris fungeert als primair contactpersoon
        voor NBIV. De Beveiligingsfunctionaris:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The Security Officer acts as the primary contact for NOIS.
            The Security Officer:'
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.7
      description: Indien bij de Bijzondere Opdracht gebruik wordt gemaakt van Cryptografische
        beveiligingsoplossingen draagt Opdrachtnemer een medewerker aan voor de rol
        van Cryptobeheerder bij NBIV conform formulier 'Aanstelling Cryptobeheerder'.
        Na goedkeuring wordt de Cryptobeheerder benoemd door NBIV. Zo nodig kunnen
        meerdere Cryptobeheerders worden benoemd, zie ook bijlage 3.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "If the Special Contract involves the use of Cryptographic\
            \ Security Solutions, the Contractor must nominate an employee to NOIS\
            \ for the role of Crypto Custodian, in accordance with the \u2018Appointment\
            \ of Crypto Custodian\u2019 form. Upon approval, the Crypto Custodian\
            \ will be appointed by NOIS. If necessary, multiple Crypto Custodians\
            \ may be appointed; also see appendix 3."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.8
      description: "Opdrachtnemer beschikt over een Beveiligingsplan opgesteld door\
        \ de Beveiligingsfunctionaris, conform bijlage 1. Het Beveiligingsplan is\
        \ goedgekeurd door het Hoogste bestuursorgaan van Opdrachtnemer, geaccordeerd\
        \ door NBIV en eenduidig ge\xEFmplementeerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must have a Security Plan in place, prepared
            by the Security Officer, in accordance with appendix 1. The Security Plan
            is approved by the Highest Executive Authority of the Contractor, agreed
            by NOIS and uniformly implemented.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.9
      description: Het Beveiligingsplan is alleen toegankelijk voor Geautoriseerde
        Medewerkers en bij het opstellen en behandelen van het Beveiligingsplan zijn
        maatregelen getroffen om de Integriteit en Vertrouwelijkheid te waarborgen,
        waaronder het toepassen van 'Need-to-Be' en 'Need-to-Know'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Plan must only be accessed by Authorised Employees
            and in preparing and handling the Security Plan measures have been taken
            to safeguard Integrity and Confidentiality, including the application
            of Need to-Be and Need-to-Know.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.10
      description: Opdrachtnemer voert op verzoek van NBIV voor het verkrijgen van
        een ABRO-Verklaring een Zelfinspectie uit met behulp van de zelfinspectielijst
        om in te schatten in welke mate Opdrachtnemer voldoet aan de op grond van
        ABRO 2026 vereiste maatregelen en verstrekt deze aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: To obtain an ABRO Declaration the Contractor must perform,
            at the request of NOIS, a Self-Inspection to estimate the extent to which
            the Contractor complies with the measures required under ABRO 2026 and
            provide it to NOIS. To this end, the Contractor must use the Self-Inspection
            List.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.11
      description: Opdrachtnemer overlegt zo snel als mogelijk en uiterlijk binnen
        48 uur na een daartoe strekkend verzoek van NBIV een actuele registratie van
        Bedrijfsmiddelen die worden gebruikt voor de Bijzondere Opdracht(en).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "As soon as possible, the Contractor must submit an up-to-date\
            \ record of the Company Resources used for the Special Contract(s). The\
            \ Contractor must do so no later than 48 hours after NOIS\u2019s request\
            \ to that effect."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.12
      description: "Minimaal jaarlijks en op verzoek van NBIV verstrekt de Beveiligingsfunctionaris\
        \ een overzicht aan NBIV met alle door de Opdrachtnemer gebruikte externe\
        \ IP-adressen, Internet Service Provider(s) en domeinnamen, conform formulier\
        \ \u2018IP-adressen en domeinnamen\u2019."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "At least once a year and upon NOIS\u2019s request, the Security\
            \ Officer must provide NOIS with an overview of all external IP Addresses,\
            \ Internet Service Provider(s) and domain names used by the Contractor\
            \ in accordance with the 'IP addresses and domain names' form."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.13
      description: "Opdrachtnemer heeft bij het inrichten van beveiligingsmaatregelen\
        \ rekening gehouden met vigerende wetgeving om te zorgen dat het welzijn en\
        \ de veiligheid van medewerkers niet in het geding komt. Indien vigerende\
        \ wetgeving, zoals de Arbowet, maakt dat bepaalde beveiligingsmaatregelen\
        \ niet volledig kunnen worden ge\xEFmplementeerd, heeft Opdrachtnemer in afstemming\
        \ met NBIV passende mitigerende maatregelen genomen."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When designing security measures, the Contractor must take
            into account prevailing legislation to ensure that the well-being and
            safety of employees is not compromised. If prevailing legislation, such
            as the Occupational Health and Safety Act, means that certain security
            measures cannot be fully implemented, the Contractor must take appropriate
            mitigating measures in coordination with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.14
      description: Opdrachtnemer geeft volledige medewerking bij nalevingscontroles
        en onderzoeken in relatie tot de Bijzondere Opdracht bij Opdrachtnemer door
        NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must fully cooperate with compliance checks
            and investigations at the Contractor, performed by NOIS and related to
            the Special Contract.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.15
      description: Toegang tot een Te Beschermen Belang of Systeem uit hoofde van
        controles of audits door anderen dan wettelijke toezichthouders of andere
        bij wet gemandateerde instanties, is vooraf goedgekeurd door NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Access to an Interest to be Protected or System pursuant to
            checks or audits by others than statutory regulators or other bodies mandated
            by law, is subject to prior approval by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.16
      description: In het geval van controles, audits en onderzoeken in relatie tot
        de Bijzondere Opdracht door derden (zoals NAVO, EU of ESA), stemt Opdrachtnemer
        op voorhand af met NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In case of inspections, audits and investigations related to
            the Special Contract by third parties (such as NATO, EU or ESA), the Contractor
            must coordinate with NOIS in advance
    - urn: urn:intuitem:risk:req_node:abro_2026:1.1.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.1
      ref_id: 1.1.17
      description: "Bij be\xEBindiging van de Bijzondere Opdracht dient Opdrachtnemer\
        \ alle door Opdrachtgever verstrekte of tijdens de Bijzondere Opdracht gegenereerde\
        \ Te Beschermen Belangen te retourneren conform een met Opdrachtgever vastgesteld\
        \ proces, tenzij Opdrachtgever in afstemming met NBIV, voorafgaand schriftelijk\
        \ goedkeuring heeft verleend het Te Beschermen Belang te vernietigen middels\
        \ goedgekeurde procedures en methodes."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: On termination of the Special Contract, the Contractor must
            return all Interests to be Protected provided by the Contracting Authority
            or generated during the Special Contract, in accordance with a process
            established together with the Contracting Authority, unless the Contracting
            Authority, in coordination with NOIS, has given prior written approval
            to destroy the Interests to be Protected through approved procedures and
            methods.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1
      ref_id: '1.2'
      name: Beveiligingsfunctionaris
      translations:
        en:
          name: Security Officer
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.1
      description: De Beveiligingsfunctionaris is ten minste verantwoordelijk voor
        de taken zoals beschreven in bijlage 2.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: At the very least, the Security Officer is responsible for
            the tasks described in appendix 2.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.2
      description: De Beveiligingsfunctionaris is belast met de dagelijkse zorg voor
        de beveiliging, oefent toezicht uit en voert jaarlijks een Zelfinspectie uit
        met behulp van de zelfinspectielijst. De resultaten en de opvolging van bevindingen
        zijn schriftelijk vastgelegd en gerapporteerd aan het Hoogste bestuursorgaan
        van Opdrachtnemer.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer is charged with taking care of daily security,
            exercises supervision and performs an annual Self Inspection using the
            Self-Inspection List. The results and follow-up of findings must be recorded
            in writing and reported to the Highest Executive Authority of the Contractor.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.3
      description: De Beveiligingsfunctionaris toetst jaarlijks en bij wijzigingen
        het Beveiligingsplan en onderliggende beveiligingsmaatregelen aan de praktijk.
        Hierbij wordt ten minste gebruik gemaakt van de zelfinspectielijst. De resultaten
        hiervan zijn schriftelijk vastgelegd en gerapporteerd aan het Hoogste bestuursorgaan
        van Opdrachtnemer, met afschrift aan NBIV. Bij wijzigingen wordt het Beveiligingsplan
        geactualiseerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Every year and if changes occur, the Security Officer compares
            the Security Plan and underlying security measures with practice. At the
            very least, the Self-Inspection List is used for this purpose. The results
            are recorded in writing and reported to the Highest Executive Authority
            of the Contractor, with a copy to NOIS. If changes occur, the Security
            Plan must be updated.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.4
      description: Wijzigingen van beveiligingsmaatregelen of (beleids)wijzigingen
        die invloed hebben op de beveiligingsmaatregelen in het kader van de Bijzondere
        Opdracht(en) zijn goedgekeurd door NBIV en opgenomen in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Changes to security measures and (policy) changes affecting
            the security measures related to the Special Contract(s) must be provided
            to NOIS for review and incorporated into the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.5
      description: Wijzigingen in beveiligingsmaatregelen, bijvoorbeeld naar aanleiding
        van een gewijzigd dreigingsbeeld of een Beveiligingsincident, zijn vastgelegd
        in het Beveiligingsplan binnen de door NBIV gestelde termijn.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Changes to security measures, for example in response to a
            changed threat landscape or a Security Incident, must be recorded in the
            Security Plan within the deadline set by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.6
      description: De Beveiligingsfunctionaris houdt een actuele registratie bij van
        alle medewerkers met een VGB, VOG en ondertekende Geheimhoudingsverklaring(en).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer must keep an up-to-date record of all
            employees who have a Certificate of No Objection, Certificate of Conduct
            and signed Non-Disclosure Agreement(s).
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.7
      description: De Beveiligingsfunctionaris beschikt over een actueel overzicht
        van alle Te Beschermen Belangen die in beheer zijn van Opdrachtnemer.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer must have an up-to-date overview of all
            Interests to be Protected that are managed by the Contractor.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.8
      description: De Beveiligingsfunctionaris houdt een actuele registratie bij van
        wie werkzaamheden aan de Bijzondere Opdracht heeft uitgevoerd of wie toegang
        heeft tot een Te Beschermen Belang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The Security Officer must keep an up-to-date record of who
            has performed activities on the Special Contract or who has access to
            an Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.2.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.2
      ref_id: 1.2.9
      description: De Beveiligingsfunctionaris houdt een actuele registratie bij van
        wie welke Bijzondere Informatie in zijn bezit heeft.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer must keep an up-to-date record of who
            has which Special Information in their possession.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1
      ref_id: '1.3'
      name: Zeggenschap en bedrijfsstructuur
      translations:
        en:
          name: Control and corporate structure
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.1
      description: Opdrachtnemer heeft ten behoeve van de ABRO-Verklaring een verklaring
        van eigendom, Zeggenschap en bedrijfsstructuur opgesteld conform formulier
        'Verklaring van eigendom, Zeggenschap en bedrijfsstructuur' en verstrekt aan
        NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "For the purpose of the ABRO Declaration the Contractor must\
            \ prepare a declaration of \u2018ownership, Control and corporate structure\u2019\
            , in accordance with the \u2018declaration of ownership, Control and corporate\
            \ structure\u2019 form and provide it to NOIS."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.2
      description: Opdrachtnemer legt elke voorgenomen wijziging in eigendom, Zeggenschap
        (inclusief bestuurders), bedrijfsstructuur of aandeelhouderschap (inclusief
        wijzigingen naar aanleiding van voorgenomen (her)financiering) van Opdrachtnemer
        onmiddellijk conform formulier 'Wijziging van eigendom, Zeggenschap en bedrijfsstructuur'
        schriftelijk ter goedkeuring voor aan NBIV, zodanig dat NBIV de voorgenomen
        wijziging tijdig kan beoordelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "For the purpose of approval the Contractor must immediately\
            \ notify NOIS, in writing, of any intended change in ownership, Control\
            \ (including directors), corporate structure or shareholding (including\
            \ changes as a result of any intended (re)financing) of the Contractor,\
            \ in accordance with the \u2018Change of ownership, Control and corporate\
            \ structure\u2019 form, such that NOIS can review the intended change\
            \ in a timely manner."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.3
      description: Opdrachtnemer meldt elke voorgenomen samenwerking met buitenlandse
        bedrijven of overheden onmiddellijk schriftelijk aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must immediately notify NOIS, in writing, of
            any intended cooperation with foreign companies or governments.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.4
      description: "Opdrachtnemer meldt elk van de volgende gebeurtenissen onmiddellijk\
        \ conform formulier 'Wijziging van eigendom, Zeggenschap en bedrijfsstructuur'\
        \ schriftelijk aan NBIV: voorgenomen splitsing, strategische samenwerking,\
        \ Uitbesteding, sourcing, fusie, verandering in Significante invloed, dreigende\
        \ gedeeltelijke of volledige overname (inclusief binding en 'non-binding offers'),\
        \ bedrijfsbe\xEBindiging, surseance van betaling of faillissement."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Contractor must immediately notify NOIS, in writing, of\
            \ each of the following events, in accordance with the \u2018Change of\
            \ ownership, Control and corporate structure\u2019 form: intended demergers,\
            \ strategic collaborations, Outsourcings, sourcings, mergers, changes\
            \ in Significant Influence, impending partial or full acquisitions (including\
            \ binding and non-binding offers), business cessations, suspensions of\
            \ payment, or bankruptcies."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.5
      description: Managementbeslissingen aangaande voorgenomen splitsing, strategische
        samenwerking, Uitbesteding, sourcing, fusie, veranderingen in Significante
        invloed en dreigende gedeeltelijke of volledige overname (inclusief binding
        en 'non-binding offers') worden onmiddellijk conform formulier 'Wijziging
        van eigendom, Zeggenschap en bedrijfsstructuur' schriftelijk ter goedkeuring
        voorgelegd aan NBIV, zodanig dat NBIV de voorgenomen wijziging tijdig kan
        beoordelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Management decisions relating to intended demergers, strategic\
            \ cooperations, Outsourcings, sourcings, mergers, changes in Significant\
            \ Influence and impending partial or full acquisitions (including binding\
            \ and non-binding offers) must be immediately submitted in writing to\
            \ NOIS for approval, in accordance with the \u2018Change of ownership,\
            \ Control and corporate structure\u2019 form, such that NOIS can review\
            \ the intended changes in a timely manner."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.6
      description: Opdrachtnemer meldt elke voorgenomen wijziging van bedrijfsactiviteiten,
        locaties of veranderende omgevingsfactoren rond bestaande locaties die (in)direct
        betrekking hebben op een Bijzondere Opdracht, onmiddellijk schriftelijk aan
        NBIV conform formulier 'Wijziging van eigendom, Zeggenschap en bedrijfsstructuur'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Contractor must immediately report to NOIS, in writing,\
            \ any intended change of business operations, sites or changing environmental\
            \ factors around existing sites that directly or indirectly relate to\
            \ a Special Contract, in accordance with the \u2018Change of ownership,\
            \ Control and corporate structure\u2019 form."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.7
      description: Het verplaatsen van een Te Beschermen Belang of werkzaamheden in
        het kader van een Bijzondere Opdracht anders dan opgenomen in het Beveiligingsplan,
        gebeurt alleen na schriftelijke goedkeuring van NBIV en in afstemming met
        Opdrachtgever.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Relocation of an Interest to be Protected or activities under
            a Special Contract other than included in the Security Plan only takes
            place with the written approval of NOIS and in coordination with the Contracting
            Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.8
      description: "Opdrachtnemer verschaft duidelijkheid bij welk (onderdeel van\
        \ het) bedrijf en op welke locatie de Bijzondere Opdracht wordt belegd en\
        \ streeft maximaal naar onderbrenging van alle Bijzondere Opdrachten bij \xE9\
        \xE9n duidelijk herkenbaar en juridisch en organisatorisch af te schermen\
        \ (onderdeel van het) bedrijf."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must clearly state to which (part of the) company
            and to which site the Special Contract will be allocated. As much as possible
            it must strive to outsource all Special Contracts to a single, clearly
            recognisable and legally and organisationally separated (part of the)
            company.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.3.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.3
      ref_id: 1.3.9
      description: Opdrachtgever kan op basis van een Risicoanalyse, in afstemming
        met NBIV vaststellen dat er additionele risico's zijn waarvoor aanvullende
        beveiligingsmaatregelen moeten worden getroffen door Opdrachtnemer. Voorbeelden
        van aanvullende beveiligingsmaatregelen zijn verplichte verwerking of behandeling
        op Nederlands grondgebied door een in Nederland gevestigde rechtspersoon.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Based on a Risk Analysis, the Contracting Authority may determine,
            in coordination with NOIS, that there are additional risks for which additional
            security measures must be implemented by the Contractor. Examples of additional
            security measures are mandatory processing or handling by a Dutch based
            legal entity, on Dutch territory.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1
      ref_id: '1.4'
      name: Rubricering en aanvullende beveiligingsafspraken
      translations:
        en:
          name: Classification and additional security arrangements
    - urn: urn:intuitem:risk:req_node:abro_2026:1.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.4
      ref_id: 1.4.1
      description: Opdrachtnemer beschikt over een actueel, door Opdrachtgever ingevuld
        en geaccordeerd, opdrachtspecifiek overzicht van Te Beschermen Belangen, zie
        bijlage 4.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must have an up-to-date, contract-specific list
            of Interests to be Protected, completed and approved by the Contracting
            Authority; see appendix 4.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.4
      ref_id: 1.4.2
      description: Indien de Bijzondere Opdracht met een buitenlandse Opdrachtgever
        aanvullende of afwijkende specifieke beveiligingsmaatregelen vereist, beschikt
        Opdrachtnemer over een actuele Project Security Instruction (PSI) of Security
        Aspect Letter (SAL).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If the Special Contract with a foreign Contracting Authority
            requires additional or deviating specific security measures, the Contractor
            must have an up-to-date Project Security Instruction (PSI) or Security
            Aspect Letter (SAL).
    - urn: urn:intuitem:risk:req_node:abro_2026:1.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.4
      ref_id: 1.4.3
      description: E-mailverkeer tussen Opdrachtgever en Opdrachtnemer is, ook wanneer
        het geen Bijzondere Informatie bevat, zodanig beveiligd (zoals middels Forced
        TLS) dat de Vertrouwelijkheid en Integriteit gewaarborgd is.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Email traffic between the Contracting Authority and the Contractor,
            even when it does not contain Special Information, must be secured (for
            instance through Forced TLS) such that Confidentiality and Integrity is
            safeguarded.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.4
      ref_id: 1.4.4
      description: Opdrachtnemer treft maatregelen om te waarborgen dat Bijzondere
        Informatie met verschillende Rubriceringsdomeinen en -niveaus gescheiden wordt
        verwerkt en opgeslagen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must take measures to ensure that Special Information
            with different Classification Domains and Levels is processed and stored
            separately.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.4
      ref_id: 1.4.5
      description: Voorafgaand aan het genereren van informatie in het kader van de
        Bijzondere Opdracht waarop redelijkerwijs een Rubricering van toepassing is,
        doet de Beveiligingsfunctionaris een verzoek tot Rubricering aan Opdrachtgever.
        Na vaststelling door Opdrachtgever wordt deze informatie als zodanig gegenereerd,
        geregistreerd en behandeld door Opdrachtnemer.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Prior to generating information under the Special Contract
            to which a Classification is reasonably applicable, the Security Officer
            must submit a request for Classification to the Contracting Authority.
            Following determination by the Contracting Authority, this information
            must be generated, recorded and handled as such by the Contractor.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.4.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.4
      ref_id: 1.4.6
      description: In geval van onvoorziene situaties, bijvoorbeeld door een gewijzigd
        dreigingsbeeld, nieuwe aanvalsmethodieken, uitvoering van meerdere Bijzondere
        Opdrachten op een locatie of Systeem, of kennisaggregatie, kunnen binnen redelijke
        grenzen additionele organisatorische, personele, fysieke of Cyber beveiligingsmaatregelen
        worden voorgeschreven. Opdrachtnemer geeft invulling aan deze beveiligingsmaatregelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Any unforeseen situations, for example due to a changed threat
            landscape, new attack methods, execution of multiple Special Contracts
            at a site or System, or knowledge aggregation, may require the stipulation
            of additional organisational, personnel, physical or Cyber security measures,
            within reasonable limits. The Contractor must implement these security
            measures.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1
      ref_id: '1.5'
      name: Onderaannemers en (toe)leveranciers
      translations:
        en:
          name: Subcontractors and Suppliers
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.1
      description: Opdrachtnemer legt voorgenomen Uitbesteding van werkzaamheden in
        het kader van een Bijzondere Opdracht aan een Onderaannemer vooraf ter goedkeuring
        voor aan de Opdrachtgever en NBIV conform formulier 'Aanvraag Onderaannemer'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Contractor must submit any intended Outsourcing of activities\
            \ under a Special Contract to a Subcontractor for prior approval to the\
            \ Contracting Authority and NOIS, in accordance with the \u2018Subcontractor\
            \ Application\u2019 form."
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.2
      description: Opdrachtnemer heeft in afstemming met Opdrachtgever en NBIV een
        opdrachtspecifiek overzicht van Te Beschermen Belangen voor elke bij de Bijzondere
        Opdracht betrokken Onderaannemer en eventuele achterliggende Onderaannemers
        opgesteld, zodanig dat voor Opdrachtgever en NBIV inzichtelijk is welke Onderaannemer
        toegang heeft tot welke Te Beschermen Belangen, zie ook bijlage 4.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In coordination with the Contracting Authority and NOIS, the
            Contractor must prepare a contract-specific list of Interests to be Protected
            for each Subcontractor and any underlying Subcontractors involved in the
            Special Contract, such that it is clear to the Contracting Authority and
            NOIS which Subcontractor has access to which Interests to be Protected;
            also see appendix 4.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.3
      description: Na goedkeuring van Opdrachtgever en NBIV tot Uitbesteding heeft
        Opdrachtnemer in het contract met Onderaannemer die op enigerwijze in aanraking
        komen met een Te Beschermen Belang de vigerende ABRO bedongen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: After the Contracting Authority and NOIS have granted their
            approval to Outsource, the Contractor must stipulate the prevailing ABRO
            in the contract with the Subcontractor that comes into contact with an
            Interest to be Protected in any way whatsoever.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.4
      description: Na toestemming van NBIV op basis van een door een Buitenlandse
        partner verstrekte Facility Security Clearance, heeft Opdrachtnemer in het
        contract met de buitenlandse Onderaannemer(s) de in het betrokken land geldende
        beveiligingseisen bedongen. Een overzicht van Te Beschermen Belangen is hierbij
        verstrekt aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Following approval by NOIS based on a Facility Security Clearance
            provided by a Foreign Partner, in the contract with the foreign Subcontractor(s)
            the Contractor must stipulate the security requirements applicable in
            the country involved. In this respect NOIS must be provided with a completed
            list of Interests to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.5
      description: Opdrachtnemer bepaalt in afstemming met Opdrachtgever op basis
        van een Risicoanalyse of de door (Toe)leverancier(s) geleverde producten en/of
        diensten een risico vormen voor de Bijzondere Opdracht. Indien dit het geval
        is wordt de (Toe)leverancier als Onderaannemer aangemerkt en heeft Opdrachtnemer
        de vigerende ABRO contractueel bedongen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In coordination with the Contracting Authority and based on
            a Risk Analysis, the Contractor must determine whether the products and/or
            services provided by Supplier(s) pose a risk to the Special Contract.
            If this is the case, the Supplier is considered to be a Subcontractor
            and the Contractor must contractually stipulate the applicable ABRO.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.6
      description: Opdrachtnemer draagt de verantwoordelijkheid voor het voldoen aan
        de eisen uit ABRO 2026 door Onderaannemer(s).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor is responsible for compliance with ABRO 2026
            requirements by the Subcontractor(s).
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.7
      description: "Opdrachtnemer heeft een proces vastgesteld en ge\xEFmplementeerd\
        \ om veranderingen in en naleving van gemaakte beveiligingsafspraken met Onderaannemer(s)\
        \ doorlopend te beheren, controleren en te evalueren. In geval van geconstateerde\
        \ tekortkomingen die invloed hebben op een Te Beschermen Belang informeert\
        \ Opdrachtnemer NBIV conform de Incident Response Procedure."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must establish and implement a process to continually
            manage, monitor and review changes to and compliance with security arrangements
            entered into with Subcontractor(s). If any deficiencies are identified
            that affect an Interest to be Protected, the Contractor must inform NOIS
            in accordance with the Incident Response Procedure.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.8
      description: Wanneer binnen een samenwerkingsverband met andere bedrijven wordt
        gewerkt aan de Bijzondere Opdracht zijn de werkzaamheden aan een Te Beschermen
        Belang zoveel mogelijk gecentraliseerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When working on the Special Contract within a partnership with
            other companies, the activities related to an Interest to be Protected
            are centralised as much as possible.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.9
      description: Opdrachtnemer verstrekt een overzicht aan NBIV van de gehele keten
        van Onderaannemer(s) en (Toe)leverancier(s) en de landen waarin zij gevestigd
        zijn voor alle bedrijfsactiviteiten die van toepassing zijn op de Bijzondere
        Opdracht(en) en werkzaamheden die raken aan een Te Beschermen Belang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must provide NOIS with an overview of the entire
            chain of Subcontractor(s) and Supplier(s) and the countries in which they
            are located, for all business operations applicable to the Special Contract(s)
            and activities involved in an Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.5.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.5
      ref_id: 1.5.10
      description: Wanneer een Te Beschermen Belang wordt ondergebracht bij een door
        Opdrachtnemer gekozen Escrow Agent, is de vigerende ABRO contractueel bedongen
        en beschikt de Escrow Agent over een ABRO-Verklaring voor de Bijzondere Opdracht
        voordat een Te Beschermen Belang wordt overgedragen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When an Interest to be Protected is placed with an Escrow Agent
            chosen by the Contractor, the prevailing ABRO must be contractually stipulated
            and the Escrow Agent must have an ABRO Declaration for the Special Contract
            before an Interest to be Protected is transferred.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1
      ref_id: '1.6'
      name: Opnamen en publicaties
      translations:
        en:
          name: Recordings and publications
    - urn: urn:intuitem:risk:req_node:abro_2026:1.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.6
      ref_id: 1.6.1
      description: Opdrachtnemer maakt het bestaan van, of opgedane kennis tijdens,
        de Bijzondere Opdracht op geen enkele wijze bekend buiten de geautoriseerde
        personen of organisaties. Dit geldt voor alle informatie waarvan Opdrachtnemer
        het vertrouwelijk karakter kent of redelijkerwijs kan vermoeden. Enkel na
        voorafgaand, uitdrukkelijk en schriftelijke goedkeuring van Opdrachtgever
        of organisatie aan wie de informatie toebehoort, mag over de Bijzondere Opdracht
        buiten de geautoriseerde personen of organisaties worden gecommuniceerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor is not permitted in any way to disclose the
            existence of, or knowledge gained during, the Special Contract outside
            the authorised persons or organisations. This applies to all information
            whose confidential nature the Contractor knows about or can reasonably
            suspect. Only after prior, express and written approval by the Contracting
            Authority or organisation to which the information belongs, may disclosures
            about the Special Contract be made outside the authorised persons or organisations.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.6
      ref_id: 1.6.2
      description: Het maken van Opnamen van een Te Beschermen Belang en/of het Compartiment,
        anders dan noodzakelijk voor het uitvoeren van de Bijzondere Opdracht, is
        niet toegestaan. Tenzij in afstemming met NBIV voorafgaande schriftelijke
        goedkeuring van Opdrachtgever is verkregen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: It is not permitted to make Recordings of an Interest to be
            Protected and/or the Compartment, other than necessary for the execution
            of the Special Contract, unless prior written approval is obtained from
            the Contracting Authority, in coordination with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.6.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.6
      ref_id: 1.6.3
      description: Opdrachtnemer maakt contactgegevens van en afspraken met NBIV op
        geen enkele wijze (publiekelijk) bekend.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor is not permitted in any way to (publicly) disclose
            contact details of, and agreements with, NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1
      ref_id: '1.7'
      name: Beveiligingsincidenten
      translations:
        en:
          name: Security Incidents
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.1
      description: "Opdrachtnemer heeft een Incident Response Procedure vastgesteld\
        \ en ge\xEFmplementeerd voor het afhandelen en evalueren van Beveiligingsincidenten.\
        \ Deze is bekend bij alle medewerkers die werken aan of toegang hebben tot\
        \ een Te Beschermen Belang."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must establish and implement an Incident Response
            Procedure for handling and evaluating Security Incidents. All employees
            who work on or have access to an Interest to be Protected must be familiar
            with this procedure.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.2
      description: "In geval van een geconstateerde Compromittatie van een Te Beschermen\
        \ Belang wordt de Beveiligingsfunctionaris onmiddellijk ge\xEFnformeerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In case of detection of a Compromise of an Interest to be Protected,
            the Security Officer must be informed immediately.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.3
      description: "Beveiligingsincidenten worden na constatering geverifieerd en\
        \ direct aan NBIV gemeld conform formulier \u2018Melding Beveiligingsincident\u2019\
        ."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Security Incidents must be verified after detection and reported
            directly to NOIS in accordance with the 'Security Incident Report' form.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.4
      description: Gegevens ten aanzien van toegang tot en inzicht in een Te Beschermen
        Belang zijn vastgelegd en worden 3 maanden bewaard om achteraf onderzoek naar
        vermoede Beveiligingsincidenten mogelijk te maken.
      implementation_groups:
      - '3'
      - '4'
      translations:
        en:
          description: Data relating to access to and insight into an Interest to
            be Protected must be recorded and retained for 3 months to enable subsequent
            investigation of suspected Security Incidents.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.5
      description: Gegevens ten aanzien van toegang tot en inzicht in een Te Beschermen
        Belang zijn vastgelegd en worden 6 maanden bewaard om achteraf onderzoek naar
        vermoede Beveiligingsincidenten mogelijk te maken.
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Data relating to access to and insight into an Interest to
            be Protected must be recorded and retained for 6 months to enable subsequent
            investigations into suspected Security Incidents.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.6
      description: Alle beschikbare informatie die direct gerelateerd is aan een Beveiligingsincident
        wordt bewaard voor een periode die na Melding in afstemming met NBIV wordt
        bepaald.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: After Reporting, all available information directly related
            to a Security Incident must be retained for a period determined in coordination
            with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.7
      description: Er is een evaluatiemechanisme gedefinieerd waarmee men specifieke
        lessen identificeert, bijvoorbeeld naar aanleiding van een Beveiligingsincident,
        en waar nodig deze verwerkt in het beveiligingsbeleid en implementeert.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An evaluation mechanism must be defined that identifies specific
            lessons learned, for example following a Security Incident, and where
            necessary improvements must be incorporated into the security policy and
            implemented.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.8
      description: In geval van grove nalatigheid of bewuste Compromittatie van een
        Te Beschermen Belang door een medewerker informeert de Beveiligingsfunctionaris
        NBIV direct.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In case of gross negligence or deliberate Compromise of an
            Interest to be Protected by an employee, the Security Officer must inform
            NOIS directly.
    - urn: urn:intuitem:risk:req_node:abro_2026:1.7.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:1.7
      ref_id: 1.7.9
      description: Opdrachtnemer heeft in haar beveiligingsbeleid vastgelegd hoe wordt
        omgegaan met medewerkers die bewust of onbewust een Beveiligingsincident veroorzaken,
        welke disciplinaire maatregelen mogelijk zijn en dat in het geval van strafbare
        feiten aangifte wordt gedaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In its security policy the Contractor must define how employees
            who knowingly or unknowingly cause a Security Incident are dealt with,
            what disciplinary measures are available, and that a report will be filed
            in case of criminal offences.
    - urn: urn:intuitem:risk:req_node:abro_2026:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: 'Hoofdstuk 2: Personeel'
      translations:
        en:
          name: 'Chapter 2: Personnel'
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2
      ref_id: '2.1'
      name: Veiligheidsonderzoek, VGB en VOG
      translations:
        en:
          name: Security Screening, Certificate of No Objection and Certificate of
            Conduct
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.1
      description: Betrokken Medewerkers beschikken over een VOG op basis van het
        door Opdrachtgever vastgestelde screeningsprofiel voor het uitvoeren van de
        betreffende functie. Een VOG is niet ouder dan de door Opdrachtgever gestelde
        termijn.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Employees Involved must have a Certificate of Conduct based
            on the screening profile set by the Contracting Authority for performing
            the function involved. A Certificate of Conduct must not be older than
            the period specified by the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.2
      description: Betrokken Medewerkers beschikken over een geldige VGB voor het
        vervullen van een Vertrouwensfunctie op het door Opdrachtgever vastgesteld
        niveau. Een VGB is niet ouder dan 5 jaar.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Employees Involved have a valid Certificate of No Objection
            for fulfilling a Position of Confidentiality at the level set by the Contracting
            Authority. A Certificate of No Objection must not be older than 5 years.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.3
      description: Opdrachtnemer houdt een actuele registratie bij van de Bijzondere
        Opdracht(en) en de Betrokken Medewerker(s) met daarbij de VOG of VGB en afgiftedatum.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor must keep an up-to-date record of the Special
            Contract(s) and Employee(s) Involved, including the Certificate of Conduct
            or Certificate of No Objection and the date of issue.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.4
      description: Indien bij een internationale opdracht nationaliteitseisen worden
        vastgesteld door Opdrachtgever, worden deze door Opdrachtnemer nageleefd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If nationality requirements are set by the Contracting Authority
            in an international contract, they must be complied with by the Contractor.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.5
      description: Opdrachtnemer heeft in afstemming met NBIV vastgesteld of er medewerkers
        zijn die voor de uitvoering van hun functie beschikken over Buitengewone bevoegdheden
        of toegangsrechten (bijvoorbeeld Beheerders) en daarmee een bovengemiddeld
        risico vormen voor een Te Beschermen Belang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor, in coordination with NOIS, has identified whether
            any employees have Elevated Privileges or Access Rights (such as Administrators)
            for the performance of their duties and thus pose an above-average risk
            to an Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.6
      description: Voor Betrokken Medewerkers met Buitengewone bevoegdheden of toegangsrechten,
        zoals Beheerders, facilitair medewerkers, servicedeskmedewerkers en securityanalisten,
        heeft Opdrachtnemer in afstemming met Opdrachtgever en NBIV additionele beveiligingsmaatregelen
        getroffen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: For Employees Involved who have Elevated Privileges or Access
            Rights, such as Administrators, facility staff, service desk staff and
            security analysts, the Contractor has put in place additional security
            measures, in coordination with the Contracting Authority and NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.7
      description: Indien Opdrachtgever periodieke vernieuwing van een VOG van Betrokken
        Medewerkers vereist, vraagt de Beveiligingsfunctionaris minimaal 1 maand voor
        het verstrijken van de afgesproken termijn een nieuw VOG aan.
      implementation_groups:
      - '4'
      translations:
        en:
          description: If the Contracting Authority requires periodic renewal of a
            Certificate of Conduct of Employees Involved, the Security Officer must
            apply for a new Certificate of Conduct at least 1 month before the expiry
            of the agreed term.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.1
      ref_id: 2.1.8
      description: Ten minste 3 maanden voor het verstrijken van de termijn voor hernieuwd
        onderzoek van een VGB van Betrokken Medewerkers vraagt de Beveiligingsfunctionaris
        een hernieuwd Veiligheidsonderzoek aan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: At least 3 months before the expiry of the deadline for re-examination
            of a Certificate of No Objection of Employees Involved, the Security Officer
            must request a renewed Security Screening.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2
      ref_id: '2.2'
      name: Geheimhoudingsverklaring
      translations:
        en:
          name: Non-Disclosure Agreement
    - urn: urn:intuitem:risk:req_node:abro_2026:2.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.2
      ref_id: 2.2.1
      description: Betrokken Medewerkers hebben een Geheimhoudingsverklaring ondertekend
        conform formulier 'Geheimhoudingsverklaring'. Deze verklaringen worden bewaard
        door de Beveiligingsfunctionaris en op verzoek worden specifieke Geheimhoudingsverklaringen
        verstrekt aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Employees Involved must sign a Non-Disclosure Agreement, in\
            \ accordance with the \u2018Non-Disclosure Agreement\u2019 form. These\
            \ declarations are kept by the Security Officer and specific Non-Disclosure\
            \ Agreements are provided to NOIS upon request."
    - urn: urn:intuitem:risk:req_node:abro_2026:2.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.2
      ref_id: 2.2.2
      description: De Cryptobeheerder is als Vertrouwensfunctionaris aangemerkt en
        heeft een Geheimhoudingsverklaring getekend conform formulier 'Geheimhoudingsverklaring
        Cryptobeheerder'. Deze verklaring wordt bewaard door de Beveiligingsfunctionaris
        en op verzoek worden specifieke verklaringen verstrekt aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Crypto Custodian is designated as an Employee holding\
            \ a Position of Confidentiality and must sign a Non Disclosure Agreement,\
            \ in accordance with the \u2018Non Disclosure Agreement Crypto Custodian\u2019\
            \ form. This agreement must be kept by the Security Officer and specific\
            \ agreements are provided to NOIS upon request."
    - urn: urn:intuitem:risk:req_node:abro_2026:2.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2
      ref_id: '2.3'
      name: Ontheffing uit een Vertrouwensfunctie
      translations:
        en:
          name: Discharge from a Position of Confidentiality
    - urn: urn:intuitem:risk:req_node:abro_2026:2.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.3
      ref_id: 2.3.1
      description: 'Wanneer een medewerker door Opdrachtnemer ontheven wordt als Vertrouwensfunctionaris
        meldt de Beveiligingsfunctionaris dit aan NBIV. Dit gebeurt bijvoorbeeld bij
        of gelijktijdig met de volgende aanleidingen:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'When an employee is discharged by the Contractor in the capacity
            of Employee holding a Position of Confidentiality, the Security Officer
            must notify NOIS. This includes situations where the following occurs:'
    - urn: urn:intuitem:risk:req_node:abro_2026:2.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.3
      ref_id: 2.3.2
      description: De Beveiligingsfunctionaris heeft aan de medewerker een toelichting
        gegeven op de ontheffingsverklaring, de VOG en VGB-registratie bijgewerkt,
        en zeker gesteld dat de medewerker geen toegang meer heeft tot of beschikt
        over een Te Beschermen Belang. Bij ontheffing uit een Vertrouwensfunctie ontvangt
        NBIV van de Beveiligingsfunctionaris een door de medewerker getekende ontheffingsverklaring
        conform formulier 'Ontheffing uit Vertrouwensfunctie'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Security Officer must explain the declaration of discharge\
            \ to the employee, must update the records in which Certificates of Conduct\
            \ and Certificates of No Objection are kept, and must ensure that the\
            \ employee no longer has access to or possession of an Interest to be\
            \ Protected. Upon discharge from a Position of Confidentiality, NOIS receives\
            \ from the Security Officer a declaration of discharge signed by the employee,\
            \ in accordance with the \u2018Discharge from Position of Confidentiality\u2019\
            \ form."
    - urn: urn:intuitem:risk:req_node:abro_2026:2.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.3
      ref_id: 2.3.3
      description: "Er is een procedure voor veranderingen op personeelsvlak (o.a.\
        \ verandering of be\xEBindiging van functie of dienstverband) of in de contractuele\
        \ relatie tussen Opdrachtnemer en Opdrachtgever. Deze omvat minimaal:"
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'A procedure is in place for changes at staff level (including
            changes or terminations of positions or employment contracts) or in the
            contractual relationship between the Contractor and the Contracting Authority.
            At the very least this includes:'
    - urn: urn:intuitem:risk:req_node:abro_2026:2.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2
      ref_id: '2.4'
      name: Wijziging van de beveiligingsorganisatie
      translations:
        en:
          name: Change of the security organisation
    - urn: urn:intuitem:risk:req_node:abro_2026:2.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.4
      ref_id: 2.4.1
      description: 'Opdrachtnemer verleent medewerking bij het ontheffen van een (Cyber-)Beveiligingsfunctionaris
        of Cryptobeheerder op aangeven van NBIV. Dit gebeurt bijvoorbeeld bij of gelijktijdig
        met de volgende aanleidingen:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The Contractor must cooperate in discharging a (Cyber) Security
            Officer or Crypto Custodian at the direction of NOIS. This includes situations
            after or concurrent with the following causes:'
    - urn: urn:intuitem:risk:req_node:abro_2026:2.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.4
      ref_id: 2.4.2
      description: Bij ontheffing van de (Cyber-)Beveiligingsfunctionaris ontvangt
        NBIV een door de medewerker getekende ontheffingsverklaring conform formulier
        'Ontheffing Beveiligingsfunctionaris'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "If the (Cyber) Security Officer is discharged, NOIS must be\
            \ sent a declaration of discharge signed by the employee, in accordance\
            \ with the \u2018Security Officer Discharge\u2019 form."
    - urn: urn:intuitem:risk:req_node:abro_2026:2.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.4
      ref_id: 2.4.3
      description: Bij ontheffing van de Cryptobeheerder ontvangt NBIV een door de
        medewerker getekende ontheffingsverklaring conform formulier 'Ontheffing Cryptobeheerder'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Upon discharge of the Crypto Custodian, NOIS must be sent\
            \ a declaration of discharge signed by the employee, in accordance with\
            \ the \u2018Crypto Custodian Discharge\u2019 form."
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2
      ref_id: '2.5'
      name: Training en bewustzijn
      translations:
        en:
          name: Training and awareness
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.1
      description: Betrokken Medewerkers doorlopen aantoonbaar, voorafgaand aan werkzaamheden
        aan een nieuwe Bijzondere Opdracht en daarna minimaal jaarlijks de relevante
        training(en). Hierin worden de beleidsregels en procedures uitgelegd voor
        het behandelen van een Te Beschermen Belang en worden relevante dreigingen
        besproken.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Prior to working on a new Special Contract and after that at
            least once a year, Employees Involved must demonstrably complete the relevant
            course(s). Such course(s) explain the policies and procedures for handling
            an Interest to be Protected and discusses (discuss) relevant threats.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.2
      description: Opdrachtnemer informeert aantoonbaar alle Betrokken Medewerkers
        minimaal jaarlijks dat zij zwakke plekken in de beveiliging direct melden
        bij de Beveiligingsfunctionaris.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: At least once a year, the Contractor must demonstrably inform
            all Employees Involved that they must immediately report security weaknesses
            to the Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.3
      description: Minimaal jaarlijks worden Betrokken Medewerkers en intern Beveiligingspersoneel
        getraind in het uitvoeren van beveiligingsmaatregelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: At least once a year, Employees Involved and internal Security
            Personnel must be trained in carrying out security measures.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.4
      description: "De Beveiligingsfunctionaris toetst minimaal jaarlijks in samenwerking\
        \ met relevante Betrokken Medewerkers en intern Beveiligingspersoneel de werking\
        \ van beveiligingsmaatregelen in de praktijk aan de hand van realistische\
        \ scenario's voor Compromittatie, zowel gericht op potenti\xEBle externe als\
        \ interne dreigingen."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: At least once a year, the Security Officer, in cooperation
            with relevant Employees Involved and internal Security Personnel, must
            test the operational effectiveness of security measures in practice. To
            this end, realistic scenarios for Compromise must be used, focusing both
            on potential external and internal threats.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.5
      description: De Beveiligingsfunctionaris heeft iedere Vertrouwensfunctionaris
        gewezen op de verantwoordelijkheden die voortvloeien uit het bekleden van
        een Vertrouwensfunctie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer must make each Employee holding a Position
            of Confidentiality aware of the responsibilities ensuing from holding
            a Position of Confidentiality.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.6
      description: De Beveiligingsfunctionaris heeft iedere Vertrouwensfunctionaris
        gewezen op mogelijke aanleidingen voor een hernieuwd Veiligheidsonderzoek
        en adviseert om in het geval dat zo'n aanleiding zich voordoet hier Melding
        van te doen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer must make every Employee holding a Position
            of Confidentiality aware of possible reasons for a renewed Security Screening
            and advises to Report it if such a reason arises.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.7
      description: De Beveiligingsfunctionaris geeft individueel advies en begeleiding
        aan Betrokken Medewerkers die werken aan een Bijzondere Opdracht bijvoorbeeld
        over het hebben van buitenlandse contacten of zakelijke reizen naar een Risicoland.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer must provide individual advice and guidance
            to Employees Involved who work on a Special Contract, for example on having
            foreign contacts or taking business trips to a High-Risk Country.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.5.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.5
      ref_id: 2.5.8
      description: Binnen een Compartiment wordt gewerkt met de Clear Desk en Clear
        Screen principes. Een Te Beschermen Belang wordt nooit onbeheerd achtergelaten
        en een Compact Te Beschermen Belang wordt na gebruik opgeborgen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Within a Compartment, the Clear Desk and Clear Screen principles
            are followed. An Interest to be Protected is never left unattended and
            a Compact Interest to be Protected is stored away after use.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2
      ref_id: '2.6'
      name: Reizen naar het buitenland
      translations:
        en:
          name: Travelling abroad
    - urn: urn:intuitem:risk:req_node:abro_2026:2.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.6
      ref_id: 2.6.1
      description: Bij een zakelijke reis van een Vertrouwensfunctionaris naar een
        Risicoland meldt de Beveiligingsfunctionaris dit bij NBIV conform formulier
        'Melding bezoek Risicoland'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "When an Employee holding a Position of Confidentiality takes\
            \ a business trip to a High-Risk Country, the Security Officer must report\
            \ this to NOIS, in accordance with the \u2018Notification of visit to\
            \ High-Risk Country\u2019 form."
    - urn: urn:intuitem:risk:req_node:abro_2026:2.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.6
      ref_id: 2.6.2
      description: Indien voor een zakelijke reis in het kader van de Bijzondere Opdracht
        een Request for Visit (RfV) benodigd is, dient de Vertrouwensfunctionaris
        tijdig via de Beveiligingsfunctionaris een RfV ter goedkeuring in bij NBIV.
        Zonder goedgekeurde RfV kan de reis niet plaatsvinden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If a business trip under the Special Contract requires a Request
            for Visit (RfV), the Employee holding a Position of Confidentiality must
            submit an RfV to NOIS for approval in a timely manner, through the Security
            Officer. Without an approved RfV, the trip cannot take place.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.6.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.6
      ref_id: 2.6.3
      description: De Beveiligingsfunctionaris brieft en debrieft de Vertrouwensfunctionaris
        ten aanzien van de zakelijke reis naar een Risicoland. Van de debriefing wordt
        een verslag opgesteld en op verzoek overhandigd aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Officer must brief and debrief the Employee holding
            a Position of Confidentiality on any business trip to a High-Risk Country.
            A debriefing report is prepared and handed over to NOIS upon request.
    - urn: urn:intuitem:risk:req_node:abro_2026:2.6.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:2.6
      ref_id: 2.6.4
      description: Bij een zakelijke reis van een Betrokken Medewerker naar een Risicoland
        wordt gebruik gemaakt van dedicated Mobiele apparatuur die alleen voor deze
        reis wordt ingezet en na terugkomst wordt gewist.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: For a business trip by an Employee Involved to a High-Risk
            Country dedicated Mobile Equipment must be used, which may only be deployed
            for this trip and must be wiped upon return.
    - urn: urn:intuitem:risk:req_node:abro_2026:3
      assessable: false
      depth: 1
      ref_id: '3'
      name: 'Hoofdstuk 3: Fysiek'
      translations:
        en:
          name: 'Chapter 3: Physical'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.1'
      name: Organisatorische maatregelen
      translations:
        en:
          name: Organisational measures
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.1
      description: "Opdrachtnemer neemt in zijn Risicoanalyse voor de Bijzondere Opdracht(en)\
        \ mee welke methoden en hulpmiddelen potenti\xEBle daders tot hun beschikking\
        \ hebben om het Te Beschermen Belang fysiek te compromitteren."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In its Risk Analysis for the Special Contract(s), the Contractor
            must include the methods and tools available to potential intruders to
            physically compromise the Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.2
      description: Opdrachtnemer heeft in afstemming met NBIV op basis van de Risicoanalyse
        het vereiste Beveiligingsrendement vastgesteld. Op basis van het Beveiligingsrendement
        en de Interventietijd zijn de benodigde (Organisatorische-, Bouwkundige-,
        Elektronische-, Reactieve-) maatregelen getroffen om het benodigde vertragende
        effect (Uitsteltijd) te realiseren. Hiervoor is gebruikgemaakt van NEN-normering
        zoals genoemd in bijlage 6.1.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor, on the basis of the Risk Analysis and in coordination
            with NOIS, has established the required Security Effectiveness. Based
            on the Security Effectiveness and the Intervention Time, the necessary
            measures (Organisational, Constructional, Electronic, Reactive) must be
            taken to achieve the required delay effect (Delay Time). To this end,
            the NEN standard referred to in appendix 6.1 must be applied.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.3
      description: De maatregelen in relatie tot de Interventietijd waarborgen aantoonbaar
        (middels gecertificeerde componenten) dat Interventie maximaal 120 minuten
        na Compromittatie van een Te Beschermen Belang plaatsvindt.
      implementation_groups:
      - '3'
      translations:
        en:
          description: The measures related to the Intervention Time must demonstrably
            safeguard (through certified components) that Intervention must take place
            at the latest 120 minutes after Compromise of an Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.4
      description: De maatregelen in relatie tot de Interventietijd waarborgen aantoonbaar
        (middels gecertificeerde componenten) dat Interventie eerder plaatsvindt dan
        Compromittatie van een Te Beschermen Belang (een positief Beveiligingsrendement).
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: The measures related to the Intervention Time must demonstrably
            safeguard (through certified components) that Intervention must take place
            before Compromise of an Interest to be Protected (a positive Security
            Effectiveness).
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.5
      description: Detecterende maatregelen zorgen ervoor dat Compromittatie van een
        Te Beschermen Belang of pogingen daartoe binnen de vereiste tijd worden gedetecteerd
        om het Beveiligingsrendement te realiseren, zie ook bijlage 5.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Detection measures must ensure that Compromise of an Interest
            to be Protected or attempts to do so are detected within the required
            time to achieve Security Effectiveness; also see appendix 5.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.6
      description: De fysieke beveiligingsmaatregelen zijn volgens een schillenstructuur
        opgebouwd met toepassing van 'Need-to-Know' en 'Need-to-Be' principes.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The physical security measures must be built up according\
            \ to a layered structure, applying \u2018Need-to-Know\u2019 and \u2018\
            Need-to-Be\u2019 principles."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.7
      description: Toegang tot een Compartiment met een Te Beschermen Belang is geregistreerd
        om te waarborgen dat alleen Geautoriseerde Medewerkers toegang hebben.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Access to a Compartment with an Interest to be Protected must
            be registered, to safeguard that only Authorised Employees have access.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.8
      description: In de toegangsregistratie voor een Compartiment is minimaal de
        naam van de persoon, de datum en het tijdstip van aankomst en vertrek vastgelegd.
        In geval van niet digitale registratie is deze voorzien van een handtekening.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The access registration for a Compartment must at least register\
            \ the person\u2019s name, date and time of arrival, and departure. If\
            \ it involves a non-digital registration, it must include a signature."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.9
      description: Toegang tot een Compartiment vereist Multi-factor authenticatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Access to a Compartment requires Multi Factor Authentication.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.10
      description: Alleen Geautoriseerde Medewerkers hebben zelfstandig toegang tot
        een Compartiment.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Only Authorised Employees have independent access to a Compartment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.11
      description: Medewerkers hebben uitsluitend toegang tot een Te Beschermen Belang
        na Autorisatie door de Beveiligingsfunctionaris. Geautoriseerde Medewerkers
        beschikken over een VOG of indien vereist een geldige VGB van het voorgeschreven
        niveau.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Employees only have access to an Interest to be Protected after
            Authorisation by the Security Officer. Authorised Employees have a Certificate
            of Conduct or, if required, a valid Certificate of No Objection of the
            prescribed level.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.12
      description: 'In het geval dat een Bezoeker toegang krijgt tot een Compartiment:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'In the event that a Visitor is granted access to a Compartment:'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.13
      description: Toegangsregistratie tot een Compartiment wordt minimaal 6 maanden
        bewaard en op verzoek verstrekt aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Access registration to a Compartment must be retained for a
            minimum of 6 months and provided to NOIS upon request.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.14
      description: Binnen een Compartiment wordt de toegangspas zichtbaar gedragen.
        Op de pas staat ten minste de naam van de persoon.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Within a Compartment, the access pass must be worn visibly.\
            \ The pass must at least bear the person\u2019s name."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.15
      description: De voorgenomen toegang tot een Compartiment door een Bezoeker is
        minimaal 5 werkdagen voor het bezoek ter goedkeuring aan NBIV voorgelegd middels
        formulier 'Autorisatie Bezoeker'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "The intended access to a Compartment by a Visitor must be\
            \ submitted to NOIS for approval at least 5 working days before the visit,\
            \ using the \u2018Visitor Authorisation\u2019 form."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.16
      description: Aan de buitenzijde van het Compartiment zijn de beveiligingsinstructies
        bevestigd die van toepassing zijn voor het Compartiment.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The security instructions applicable to the Compartment must
            be attached to the outside of the Compartment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.17
      description: 'Voor de uitgifte van Fysieke toegangsauthenticatiemiddelen voor
        een Compartiment geldt:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Issuing Physical Access Authentication Devices for a Compartment
            is subject to the following:'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.18
      description: Bij het gebruik van Biometrie is de gebruikte apparatuur voorzien
        van beveiligingsmaatregelen om ongeautoriseerde fysieke toegang tot de inhoud
        van de apparatuur, het aanpassen en het verwisselen van de apparatuur te voorkomen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When using Biometrics, the equipment must be fitted with security
            measures to prevent unauthorised physical access to the equipment's content
            and to prevent unauthorised modification or replacement of the equipment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.19
      description: Bij het gebruik van Biometrische apparatuur zijn Cryptografische
        beveiligingsoplossingen toegepast om de authenticiteit, Integriteit en Vertrouwelijkheid
        van Biometrische informatie te waarborgen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When using Biometric equipment, Cryptographic Security Solutions
            must be applied to ensure the authenticity, Confidentiality and Integrity
            of Biometric information.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.20
      description: Bij het gebruik van Biometrie is de gebruikte apparatuur aantoonbaar
        bestand tegen bekende methoden om Biometrische apparatuur te misleiden of
        te omzeilen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When using Biometrics, the equipment must be demonstrably resistant
            to known methods used to deceive or bypass Biometric equipment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.21
      description: Fysieke toegangsauthenticatiemiddelen zijn conform relevante NEN-normeringen
        gecertificeerd, zie ook bijlage 6.1.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Authentication Means for Physical Access must be certified,
            in accordance with relevant NEN standards; also see appendix 6.1.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.22
      description: Fysieke sleutels en reservesleutels welke toegang geven tot een
        Compartiment blijven te allen tijde op het terrein van Opdrachtnemer en worden
        alleen achtergelaten in een daartoe bestemd Opbergmiddel. Reservesleutels
        worden nooit in hetzelfde Opbergmiddel bewaard als het origineel.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "Physical keys and spare keys giving access to a Compartment\
            \ must remain at the Contractor\u2019s site at all times and are only\
            \ left in a designated Storage Unit. Spare keys are never kept in the\
            \ same Storage Unit as the original."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.23
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.23
      description: Fysieke toegangsauthenticatiemiddelen, cijfercombinaties en Certificaten
        worden beheerd door de Beveiligingsfunctionaris.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Authentication Means for Physical Access, digit combinations
            and Certificates are administered by the Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.24
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.24
      description: Fysieke toegangsauthenticatiemiddelen en cijfercombinaties voor
        Compartimenten en Opbergmiddelen zijn, wanneer niet in gebruik, opgeborgen
        in een Opbergmiddel conform bijlage 6.1.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: If they are not being used, Authentication Means for Physical
            Access and digit combinations for Compartments and Storage Units must
            be stored in a Storage Unit, in accordance with appendix 6.1.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.25
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.25
      description: 'Cijfercombinaties van sloten van Opbergmiddelen worden minimaal
        iedere 6 maanden gewijzigd en onmiddellijk gewijzigd indien:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: 'Digit combinations of Storage Unit locks must be changed at
            the very least every 6 months. They must be changed immediately if:'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.26
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.26
      description: Het verlies of diefstal van een Fysieke toegangsauthenticatiemiddel
        wordt behandeld als een Beveiligingsincident.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The loss or theft of Authentication Means for Physical Access
            must be treated as a Security Incident.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.27
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.27
      description: Fysieke apparatuur, beveiligingscomponenten en Beveiligingssystemen
        worden beheerd en onderhouden om ze blijvend te laten functioneren.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Physical equipment, security components and Security Systems
            must be administered and maintained to keep them functioning permanently.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.28
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.28
      description: Wanneer voor het beheer en onderhoud van fysieke apparatuur, beveiligingscomponenten
        of Beveiligingssystemen gebruik wordt gemaakt van Cloudoplossingen, is de
        leverancier van deze Cloudoplossing aangemeld als onderaannemer bij NBIV.
      implementation_groups:
      - '4'
      translations:
        en:
          description: When Cloud Solutions are used for the administration and maintenance
            of physical equipment, security components or Security Systems, the supplier
            of such Cloud Solutions must be registered with NOIS as a Subcontractor.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.29
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.29
      description: Voor het beheer en onderhoud van fysieke apparatuur, beveiligingscomponenten
        of Beveiligingssystemen wordt geen gebruik gemaakt van Cloudoplossingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: It is not permitted to use Cloud Solutions for the administration
            and maintenance of physical equipment, security components or Security
            Systems.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.30
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.30
      description: Beveiligingspersoneel heeft de beschikking over alarmeringsmiddelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Security Personnel must have alarm devices at their disposal.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.31
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.31
      description: 'Bij het verlaten van een Compartiment door de laatste medewerker
        wordt een sluitronde gemaakt, waarbij ten minste gecontroleerd wordt of:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'When the last employee leaves a Compartment, a closing round
            must be made, during which it must at least be checked that:'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.32
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.32
      description: Een Verboden Plaats moet voldoen aan de TBB 1 beveiligingseisen
        op alle beveiligingsgebieden (organisatorisch, fysiek en cybersecurity).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A Prohibited Area must meet ITBP 1 security requirements in
            all security areas (organisational, personnel, physical and cyber security).
    - urn: urn:intuitem:risk:req_node:abro_2026:3.1.33
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.1
      ref_id: 3.1.33
      description: De Beveiligingsfunctionaris onderhoudt contact met de gemeente
        en lokale politie om op de hoogte te zijn van relevante lokale ontwikkelingen
        en eventuele dreigingen die de beveiliging van een Te Beschermen Belang aangaan.
        Indien nodig treft de Beveiligingsfunctionaris additionele maatregelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The Security Officer liaises with the municipality and the
            local police to stay updated on relevant local developments and any threats
            regarding the security of an Interest to be Protected. If necessary, the
            Security Officer takes additional measures.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.2'
      name: Bouwkundige maatregelen
      translations:
        en:
          name: Constructual measures
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.1
      description: Een Compact Te Beschermen Belang is opgeslagen in een afsluitbaar
        Opbergmiddel dat voldoet aan de normering gesteld in bijlage 6.1.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A Compact Interest to be Protected must be stored in a lockable
            Storage Unit that complies with the standards stipulated in appendix 6.1.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.2
      description: Een Te Beschermen Belang is geplaatst in een Compartiment.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An Interest to be Protected must be placed in a Compartment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.3
      description: De specificaties van een Opbergmiddel en/of Compartiment dat gebruikt
        wordt voor de opslag van een (Compact) Te Beschermen Belang zijn afgestemd
        met NBIV.
      implementation_groups:
      - '1'
      translations:
        en:
          description: The specifications of a Storage Unit and/or Compartment used
            to store a (Compact) Interest to be Protected must be coordinated with
            NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.4
      description: Een Compartiment waarin een Te Beschermen Belang is opgeborgen,
        is afgesloten met een gecertificeerd mechanisme, waardoor ongeautoriseerde
        toegang niet mogelijk is zonder sporen van braak, zie bijlage 6.1.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A Compartment in which an Interest to be Protected is stored
            must be locked with a certified mechanism, preventing unauthorised access
            without traces of forced entry; see appendix 6.1.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.5
      description: Toegangsdeuren tot een Compartiment zijn aan de binnenzijde voorzien
        van een deurdranger en een elektronisch en akoestisch alarm dat afgaat wanneer
        een deur langer openstaat dan noodzakelijk.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Access doors to a Compartment must be fitted with a door closer
            on the inside and an electronic and audible alarm that goes off when a
            door is left open for longer than necessary.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.6
      description: Nooddeuren in een Compartiment zijn alleen naar buiten toe te openen.
        Tevens zijn nooddeuren verzegeld, voorzien van een elektronisch en akoestisch
        alarm en bij opening vindt alarmering plaats.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Emergency doors in a Compartment can only be opened outwards.
            On top of this, emergency doors must be sealed, equipped with an electronic
            and audible alarm, and alarms are triggered when the doors are opened.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.7
      description: Opbergmiddelen tot 1000 kilogram zijn verankerd.
      implementation_groups:
      - '3'
      translations:
        en:
          description: Storage Units of up to 1000 kilograms must be anchored.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.8
      description: Opbergmiddelen tot 1000 kilogram zijn Chemisch verankerd.
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Storage Units of up to 1000 kilograms must be Chemically Anchored.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.9
      description: Bevestigingspunten van Opbergmiddelen die van buitenaf bereikbaar
        zijn, zijn fysiek beveiligd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Any Storage Unit fixing points that can be accessed from the
            outside must be physically secured.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.10
      description: Opbergmiddelen zijn voorzien van Multi-factor authenticatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Storage Units must have Multi Factor Authentication.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.11
      description: Er is Beveiligingsverlichting toegepast rondom het gebouw en/of
        terrein met een Te Beschermen Belang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Security Lighting must be installed around buildings and/or
            grounds that include an Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.12
      description: Bij de aanleg van infrastructuur, zoals bestrating, begroeiing
        of watergangen, is rekening gehouden met inbraakpreventie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: When constructing infrastructure such as paving, vegetation
            or watercourses, burglary prevention must be taken into account.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.13
      description: Een Compartiment is op alle vlakken voorzien van inkijkbeperkende
        maatregelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: All elements of a Compartment must be equipped with measures
            to restrict visibility.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.2.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.2
      ref_id: 3.2.14
      description: Het gebouw waarin zich een Te Beschermen Belang bevindt, is tegen
        opklimmen beveiligd. Losse opklimmogelijkheden zoals (afval) containers en
        ladders zijn verwijderd. Hemelwaterafvoeren, lage muren e.d. zijn van opklimbeveiliging
        voorzien.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The building in which an Interest to be Protected is located
            is secured against climbing. Loose climbing aids, such as (waste) containers
            and ladders, must be removed. Rainwater downpipes, low walls and similar
            features must be equiped with anti-climb protection.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.3'
      name: Elektronische maatregelen
      translations:
        en:
          name: Electronic measures
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.1
      description: Beveiligingssystemen ten behoeve van het beveiligen van de Bijzondere
        Opdracht mogen niet voortkomen uit een land dat een Offensief cyberprogramma
        tegen Nederlandse belangen heeft.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: It is not permitted to have Security Systems for the purpose
            of securing the Special Contract that originate from a country that has
            an Offensive Cyber Programme against Dutch interests.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.2
      description: "Beveiligingssystemen zijn ge\xEFnstalleerd conform normeringen\
        \ gesteld in bijlage 6.1. Onderhoud en controle vinden minimaal jaarlijks\
        \ plaats door een gecertificeerd bedrijf (bijvoorbeeld BORG-certificaat)."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Security Systems must be installed in accordance with the standards
            stipulated in appendix 6.1. Maintenance and inspection must be carried
            out by a certified company (such as with a BORG Certificate), at least
            once a year.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.3
      description: Beveiligingssystemen staan onder detectie zodat ongeautoriseerde
        toegang, sabotage of pogingen daartoe leiden tot alarmering en Interventie
        binnen de vereiste tijd om het benodigde Beveiligingsrendement te realiseren.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Any unauthorised access, sabotage of Security Systems, or any
            attempts to do so, must trigger an alert and lead to Intervention within
            the required time, to achieve the required Security Effectiveness.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.4
      description: Systeemklokken van Beveiligingssystemen maken gebruik van dezelfde
        tijdsynchronisatie en zijn zodanig beveiligd tegen wijzigingen dat deze niet
        onopgemerkt aangepast of gemanipuleerd kunnen worden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: System clocks of Security Systems must use the same time synchronisation
            and must be protected against changes such that they cannot be modified
            or manipulated without being detected.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.5
      description: Een Beveiligingssysteem is niet gekoppeld aan een centraal gebouwbeheersysteem
        of andere Systemen die het mogelijk maken een beveiligingssysteem op afstand
        te beheren.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: It is not permitted to link a Security System to a central
            building administration system or other Systems that allow a security
            system to be administered remotely.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.6
      description: Draadloze verbindingsmogelijkheden van Beveiligingssystemen zijn
        uitgeschakeld en alle componenten zijn beveiligd tegen digitale (Cyber) Compromittatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Wireless connectivity of Security Systems must be disabled
            and all components must be protected against digital (Cyber) Compromise.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.7
      description: Beveiligingssystemen, inclusief achterliggende beheersystemen,
        zijn alleen verbonden via een dedicated en afgeschermd beheernetwerk.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The only manner in which Security Systems, including underlying
            administration systems, can be connected is through a dedicated and protected
            administration network.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.8
      description: Bewegingsmelders zijn voorzien van anti-masking maatregelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Motion detectors must be equipped with anti-masking measures.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.9
      description: Buiten een Compartiment zijn voorzieningen getroffen conform bijlage
        6.1 om personen visueel te herkennen voordat zij het Compartiment betreden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: In accordance with appendix 6.1, facilities must be implemented
            outside a Compartment to visually recognise persons before they enter
            the Compartment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.10
      description: Camerabeelden worden 28 dagen bewaard. Camerabeelden gerelateerd
        aan een (mogelijk) Beveiligingsincident worden zolang als nodig voor het onderzoek
        en de afhandeling van het Beveiligingsincident bewaard. In afstemming met
        NBIV en Opdrachtgever kan worden besloten om de camerabeelden langer te bewaren.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Camera images must be retained for 28 days. Camera images related
            to an actual or possible Security Incident are retained for as long as
            necessary for the investigation and handling of the Security Incident.
            In coordination with NOIS and the Contracting Authority, it may be decided
            to retain camera images for a longer period.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.11
      description: De toegang tot een Compartiment is beveiligd door middel van een
        elektronisch of mechanisch toegangsbeheersysteem.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Access to a Compartment must be secured through an electronic
            or mechanical access control system.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.12
      description: Waar een Elektronisch Toegangsbeheersysteem (ETS) wordt gebruikt,
        zijn maatregelen getroffen om situaties te detecteren waar toegang 'onder
        dwang' is verleend.
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: "Where an Electronic Access Management System (EAMS) is used,\
            \ measures are in place to detect situations where access has been gained\
            \ \u2018through force\u2019."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.13
      description: Een ETS is uitgerust met een Anti Pass Back Systeem.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An EAMS is equipped with an Anti Pass Back System.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.14
      description: Een ETS is voorzien van Logging, waarbij geldt dat de logs minimaal
        6 maanden worden bewaard. De logs worden maandelijks door de Beveiligingsfunctionaris
        gecontroleerd op opvallende afwijkingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An EAMS is equipped with Logging and logs must be retained
            for a minimum of 6 months. The logs must be checked for notable anomalies
            by the Security Officer every month.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.15
      description: Een ETS is zodanig uitgevoerd dat wanneer het Systeem uitschakelt
        of uitvalt, alle toegangen tot het Compartiment worden afgesloten en/of afgesloten
        blijven.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An EAMS is implemented such that when the System shuts down
            or fails, all entrances to the Compartment are locked and/or remain locked.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.16
      description: Een Compartiment beschikt over een noodknopbediening of mechanische
        paniekontgrendeling voor calamiteiten. De procedure rondom het gebruik hiervan
        is beschreven in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A Compartment has an emergency button or mechanical panic release
            for calamities. The procedure around its use must be described in the
            Security Plan
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.17
      description: "Een Te Beschermen Belang staat onder detectie van een IDSS. Het\
        \ IDSS kan ge\xEFnstalleerd zijn op het Compartiment, het Opbergmiddel of\
        \ het Te Beschermen Belang zelf."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An Interest to be Protected is equipped with an IDAS. The IDAS
            may be installed on the Compartment, the Storage Unit or the Interest
            to be Protected itself.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.18
      description: IDSS-onderdelen zijn zodanig geplaatst dat Compromittatie van een
        Te Beschermen Belang of pogingen daartoe worden ontdekt en een alarm genereren.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: IDAS components are positioned such that Compromise of an Interest
            to be Protected or attempts to do so are detected and trigger an alarm.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.19
      description: Het Compartiment met een Te Beschermen Belang is binnen het IDSS
        als aparte zone opgenomen. Deze zone is actief wanneer er geen Geautoriseerde
        Medewerker is in de betreffende ruimte.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The Compartment with an Interest to be Protected must be included
            within the IDAS as a separate zone. When no Authorised Employee is present
            in the relevant room, this zone must be activated.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.20
      description: Het IDSS is altijd geactiveerd, tenzij Geautoriseerde Medewerkers
        aanwezig zijn in het Compartiment.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Unless Authorised Employees are present in the Compartment,
            the IDAS is always activated.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.21
      description: Het deactiveren van een IDSS is alleen mogelijk door een daartoe
        aangewezen persoon middels Multi-factor authenticatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An IDAS can only be deactivated by a designated person, through
            Multi Factor Authentication.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.22
      description: Het IDSS functioneert te allen tijde en onder alle (klimatologische)
        omstandigheden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The IDAS must operate at all times and under all possible conditions.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.23
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.23
      description: Doormelding van een IDSS alarm voldoet aan normeringen gesteld
        in bijlage 6.1.
      implementation_groups:
      - '2'
      - '3'
      translations:
        en:
          description: Automatic IDAS signalling complies with the standards stipulated
            in appendix 6.1.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.24
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.24
      description: Doormelding van een IDSS alarm is in afstemming met NBIV vastgesteld.
      implementation_groups:
      - '1'
      translations:
        en:
          description: An automatic IDAS alarm must be implemented in coordination
            with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.25
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.25
      description: Het IDSS beschikt over een gegarandeerde stroomvoorziening die
        het functioneren garandeert tot ten minste de maximale Interventietijd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The IDAS must have a guaranteed power supply that safeguards
            its operation until at least the maximum Intervention Time.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.26
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.26
      description: Het IDSS signaleert en registreert uitval van de stroomvoorziening
        van een IDSS. Bij stroomuitval wordt gehandeld alsof het een alarmering betreft.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The IDAS must identify and record any power failure of an IDAS.
            The response to a power failure must be the same as if an alarm has been
            triggered.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.27
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.27
      description: Alleen elektronische apparatuur die strikt noodzakelijk is voor
        het uitvoeren van de werkzaamheden is toegestaan in een Compartiment. Het
        goedkeuren van elektronische apparatuur in een Compartiment geschiedt op basis
        van een Risicoanalyse. Hierbij is elektronische apparatuur afkomstig uit een
        land met een Offensief cyberprogramma uitgesloten. Een lijst van de apparatuur
        en de bijbehorende Risicoanalyse is vooraf in afstemming met NBIV goedgekeurd
        door Opdrachtgever, en opgenomen in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Only Electronic Equipment strictly necessary for carrying out
            the activities is permitted in a Compartment. The permission to place
            Electronic Equipment in a Compartment must be based on a Risk Analysis.
            In this respect, Electronic Equipment originating from a country with
            an Offensive Cyber Programme must be excluded. A list of equipment and
            the accompanying Risk Analysis must be approved in advance by the Contracting
            Authority, in coordination with NOIS, and must be included in the Security
            Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.28
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.28
      description: Er zijn (procedurele) maatregelen getroffen om elektronische apparatuur
        die niet strikt noodzakelijk is voor het uitvoeren van werkzaamheden buiten
        het Compartiment te houden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Procedural and other measures must be taken to keep Electronic
            Equipment that is not strictly necessary for carrying out activities outside
            the Compartment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.29
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.29
      description: Elektronische apparatuur van toepassing in de beveiliging of het
        gebouwbeheer (waaronder GBS en connected devices (IoT)) worden beschouwd als
        Systeem en zijn alleen toegestaan in een Compartiment wanneer deze op het
        voor de Bijzondere Opdracht vastgestelde beveiligingsniveau zijn beveiligd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Electronic Equipment applied in the security or the buildings
            management (including BMS and connected devices (IOT)) are considered
            to be Systems and are only permitted in a Compartment when this is secured
            at the security level set for the Special Contract.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.30
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.30
      description: In een Compartiment zijn geen camera's, smart devices, microfoons
        of andere apparatuur met een opname- of communicatiefunctionaliteit aanwezig.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: No cameras, smart devices, microphones or other equipment with
            recording or communication functionality are present in a Compartment.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.31
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.31
      description: Voorafgaand aan de ingebruikname van een Compartiment en bij toevoeging
        of wijziging van Middelen is, in afstemming met NBIV, een Elektronisch veiligheidsonderzoek
        (EVO) en Geluidsdempingsmeting uitgevoerd. Eventuele maatregelen zijn voorafgaand
        aan implementatie afgestemd met NBIV.
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Both before a Compartment is put into use and if Means are
            added or changed, an Electronic Security Screening and Sound Reduction
            Measurement must be carried out, in coordination with NOIS. Any measures
            must be coordinated with NOIS prior to implementation.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.32
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.32
      description: Voorafgaand aan de ingebruikname van een Compartiment en bij toevoeging
        of wijziging van Middelen zijn, in afstemming met NBIV, TEMPEST-maatregelen
        getroffen. De instructies voor de benodigde maatregelen zijn bij NBIV op te
        vragen.
      implementation_groups:
      - '3'
      translations:
        en:
          description: Both before a Compartment is put into use and if Means are
            added or changed, TEMPEST measures must be implemented, in coordination
            with NOIS. The instructions for the required measures can be requested
            through NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.3.33
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.3
      ref_id: 3.3.33
      description: Voorafgaand aan de ingebruikname van een Compartiment en bij toevoeging
        of wijziging van Middelen is, in afstemming met NBIV, een Zoneringsmeting
        (TEMPEST) uitgevoerd. Eventuele maatregelen zijn voorafgaand aan implementatie
        afgestemd met NBIV. De instructies voor de benodigde maatregelen zijn op te
        vragen via NBIV.
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Both before a Compartment is put into use and if Means are
            added or changed, a Zoning Measurement (TEMPEST) must be carried out,
            in coordination with NOIS. Prior to implementation, any required measures
            must be coordinated with NOIS. The instructions for the required measures
            can be requested through NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.4'
      name: Reactieve maatregelen
      translations:
        en:
          name: Reactive measures
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.1
      description: Alarmeringen uit een IDSS en ETS moeten leiden tot Interventie
        binnen de vereiste tijd om het vastgestelde Beveiligingsrendement te realiseren.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Alarms from an IDAS and EAMS must lead to Intervention within
            the required time to achieve the established Security Effectiveness.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.2
      description: Interventie vindt plaats door daartoe aangewezen en opgeleid Beveiligingspersoneel.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Intervention is carried out by designated and trained Security
            Personnel.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.3
      description: Bij een (technische) storing worden mitigerende beveiligingsmaatregelen
        getroffen om het Beveiligingsrendement te waarborgen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: In the event of technical or other failures, mitigating security
            measures are taken to ensure Security Effectiveness.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.4
      description: Alarmverificatie vindt initieel aan de buitenzijde van het Compartiment
        plaats. Hierbij zijn alle toegangen, gevelopeningen, daken e.d. gecontroleerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Initially, alarm verification must take place on the outside
            of the Compartment. This involves checking all entrances, wall openings,
            roofs, etc.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.5
      description: Medewerkers of Beveiligingspersoneel dat alarmverificatie uitvoert,
        heeft ten tijde van de alarmverificatie niet de beschikking over Fysieke toegangsauthenticatiemiddelen
        die toegang geven tot het Te Beschermen Belang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: During alarm verification, Employees or Security Personnel
            carrying out alarm verification do not have access to Authentication Means
            for Physical Access that provide access to the Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.6
      description: "Een PAC beschikt over een justiti\xEBle erkenning en voldoet aan\
        \ de normeringen gesteld in bijlage 6.1."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An External ARC has a statutory accreditation and meets the
            standards set in appendix 6.1.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.7
      description: Een BAC wordt beveiligd als een Compartiment op TBB 4 niveau.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An Internal ARC must be secured as a Compartment at the security
            level applicable to ITBP 4.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.4.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.4
      ref_id: 3.4.8
      description: Na een alarm of Melding controleert de Beveiligingsfunctionaris
        het betreffende Te Beschermen Belang en neemt indien nodig maatregelen om
        het vereiste Beveiligingsrendement te herstellen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Following an alarm or notification, the Security Officer checks
            the Interest to be Protected involved and, if necessary, takes measures
            to restore the required Security Effectiveness.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.5'
      name: Transport en verzenden algemeen
      translations:
        en:
          name: Transport & Sending - general
    - urn: urn:intuitem:risk:req_node:abro_2026:3.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.5
      ref_id: 3.5.1
      description: Een Te Beschermen Belang wordt uitsluitend buiten het Compartiment
        gebracht als dit voor de voortgang van de werkzaamheden absoluut noodzakelijk
        is.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An Interest to be Protected will be taken outside the Compartment
            only if absolutely necessary for the execution of the work.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.5
      ref_id: 3.5.2
      description: Een Te Beschermen Belang en gerelateerde apparatuur, informatie
        en software van Opdrachtnemer die gebruikt wordt bij een Bijzondere Opdracht
        verlaten het Compartiment van Opdrachtnemer niet zonder vooraf gegeven toestemming
        van de Beveiligingsfunctionaris.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "An Interest to be Protected and related equipment, information\
            \ and software of the Contractor used in a Special Contract may not leave\
            \ the Contractor\u2019s Compartment without prior consent of the Security\
            \ Officer."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.5
      ref_id: 3.5.3
      description: De Beveiligingsfunctionaris beschrijft in het Beveiligingsplan
        op welke wijze om wordt gegaan met het Transport en Verzenden van een Te Beschermen
        Belang in het kader van de Bijzondere Opdracht conform bijlage 7. Dit wordt
        in afstemming met NBIV ter goedkeuring voorgelegd aan Opdrachtgever.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In the Security Plan, the Security Officer must describe how
            to handle the Transport and Sending of an Interest to be Protected under
            the Special Contract, in accordance with appendix 7. This description
            must be submitted to the Contracting Authority for approval, in coordination
            with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.5.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.5
      ref_id: 3.5.4
      description: Voorafgaand aan een Transport of Verzenden van een Te Beschermen
        Belang wordt door de Beveiligingsfunctionaris vastgesteld dat de ontvangende
        partij het Te Beschermen Belang conform het vastgestelde beveiligingsniveau
        kan behandelen en geautoriseerd is om te beschikken over het Te Beschermen
        Belang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Prior to any Transport or Sending of an Interest to be Protected,
            the Security Officer must determine that the receiving party can handle
            the Interest to be Protected in accordance with the established security
            level and is authorised to have the Interest to be Protected at its disposal.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.6'
      name: Fysiek Verzenden
      translations:
        en:
          name: Physical Sending
    - urn: urn:intuitem:risk:req_node:abro_2026:3.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.6
      ref_id: 3.6.1
      description: Voorafgaand aan Verzenden wordt het Te Beschermen Belang verpakt
        zodat de inhoud niet zichtbaar, niet kenbaar en inbreuk detecteerbaar is.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Prior to Sending, the Interest to be Protected must be packaged
            such that the contents are not visible and not discernible, and detection
            of intrusion must be possible.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.6
      ref_id: 3.6.2
      description: Verzenden van een Te Beschermen Belang is uitsluitend toegestaan
        wanneer dit aangetekend wordt verzonden met track en trace nummer en met onmiddellijke
        ontvangstbevestiging.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Sending an Interest to be Protected is only permitted when
            it is sent by registered mail, with a track and trace number and with
            immediate acknowledgement of receipt
    - urn: urn:intuitem:risk:req_node:abro_2026:3.6.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.6
      ref_id: 3.6.3
      description: Verzenden van een Te Beschermen Belang per post is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Sending an Interest to be Protected by mail is not permitted.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.7'
      name: Fysiek Transport Te Beschermen Belangen
      translations:
        en:
          name: Physical transport of interest to be protected
    - urn: urn:intuitem:risk:req_node:abro_2026:3.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.7
      ref_id: 3.7.1
      description: Het fysiek Transport van een Te Beschermen Belang (zoals goederen
        en materieel) wordt uitgevoerd conform de door Opdrachtgever vastgestelde
        beveiligingsmaatregelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The physical Transport of an Interest to be Protected (such
            as goods and materiel) is carried out in accordance with the security
            measures established by the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.8'
      name: Fysiek Transport Bijzondere Informatie
      translations:
        en:
          name: Physical Transport of Special Information
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.1
      description: Voorafgaand aan Transport van Bijzondere Informatie wordt een transportplan
        opgesteld conform formulier 'Transportplan' en ter goedkeuring voorgelegd
        aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "Prior to Transport of Special Information, a transport plan\
            \ must be prepared in accordance with the \u2018Transport plan\u2019 form\
            \ and submitted to NOIS for approval."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.2
      description: Het transportplan voor Transport van Bijzondere Informatie buiten
        Nederland wordt tenminste 10 werkdagen voorafgaand aan Transport in afstemming
        met NBIV ter goedkeuring voorgelegd aan de Opdrachtgever.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The transport plan for Transport of Special Information outside
            the Netherlands must be submitted to the Contracting Authority for approval
            at least 10 working days prior to Transport, in coordination with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.3
      description: Bijzondere Informatie wordt getransporteerd in een afsluitbaar
        Transportmiddel waardoor de inhoud niet zichtbaar, niet kenbaar en inbreuk
        detecteerbaar is.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Special Information is transported in a lockable Means of Transport
            such that the contents are not visible and not discernible, and detection
            of intrusion must be possible.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.4
      description: Bijzondere Informatie wordt getransporteerd in een door de Opdrachtgever
        vooraf goedgekeurd Transportmiddel.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Special Information must be transported in a Means of Transport
            approved in advance by the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.5
      description: Transport van Bijzondere Informatie gaat zonder onnodige en ongeplande
        onderbrekingen. De Bijzondere Informatie blijft onder toezicht.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Transport of an Interest to be Protected must be carried out
            without unnecessary and unplanned interruptions. The Interest to be Protected
            must always be supervised.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.6
      description: "Transport van Bijzondere Informatie vindt op \xE9\xE9n van onderstaande\
        \ manieren plaats:"
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'Transport of Special Information must take place in one of
            the following ways:'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.7
      description: "Transport van Bijzondere Informatie vindt op \xE9\xE9n van onderstaande\
        \ manieren plaats:"
      implementation_groups:
      - '3'
      translations:
        en:
          description: 'Transport of Special Information must take place in one of
            the following ways:'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.8
      description: "Transport van Bijzondere Informatie vindt op \xE9\xE9n van onderstaande\
        \ manieren plaats:"
      implementation_groups:
      - '2'
      translations:
        en:
          description: 'Transport of Special Information must take place in one of
            the following ways:'
    - urn: urn:intuitem:risk:req_node:abro_2026:3.8.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.8
      ref_id: 3.8.9
      description: Transport van Bijzondere Informatie geschiedt uitsluitend in afstemming
        met, en na voorafgaande goedkeuring van Opdrachtgever.
      implementation_groups:
      - '1'
      translations:
        en:
          description: Transport of Special Information must only carried out in coordination
            with, and with the prior approval of, the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3
      ref_id: '3.9'
      name: Fysieke opslag, verwerken, ontwikkelen en vernietigen
      translations:
        en:
          name: Physical storage, processing, development and destruction
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.1
      description: Door de Opdrachtnemer in ontvangst of in beheer genomen Te Beschermen
        Belang wordt opgenomen in een actuele registratie, met daarin de locatie,
        uitgifte, inname en herkomst van het Te Beschermen Belang. Deze registratie
        wordt beheerd door de Beveiligingsfunctionaris en is te allen tijde direct
        opvraagbaar door NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An Interest to be Protected received or administered by the
            Contractor must be included in an up-to-date registration, showing the
            site, issue, intake and origin of the Interest to be Protected. This registration
            must be administered by the Security Officer and NOIS must have the possibility
            to immediately retrieve it, at all times.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.2
      description: Gegevensdragers waarop Bijzondere Informatie wordt verwerkt of
        opgeslagen, zijn voorzien van een kenmerk (labeling) conform bijlage 8, waarbij
        verschillende Rubriceringsdomeinen en -niveaus duidelijk te onderscheiden
        zijn.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Data Carriers on which Special Information is processed or
            stored are marked (through labelling), in accordance with appendix 8,
            with the various Classification Domains and levels being clearly distinguishable.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.3
      description: De reproductie van Bijzondere Informatie geschiedt alleen met goedkeuring
        van Opdrachtgever.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Reproduction of Special Information may only be done with the
            approval of the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.4
      description: Er zijn niet meer reproducties gemaakt dan noodzakelijk voor de
        uitvoering van de Bijzondere Opdracht.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: It is not permitted to make more reproductions than those needed
            to execute the Special Contract.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.5
      description: Reproducties kennen dezelfde Rubricering als het origineel, ook
        als slechts delen van het origineel zijn gebruikt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Reproductions have the same Classification as the original,
            even if only parts of the original have been used.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.6
      description: Bijzondere Informatie en daarvan gemaakte reproducties zijn geregistreerd
        en voorzien van een uniek exemplaarnummer.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Special Information and any related reproductions must be registered
            and given a unique copy number.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.7
      description: Het maken van reproducties is voorbehouden aan daartoe aangewezen
        Geautoriseerde Medewerkers die ook verantwoordelijk zijn voor de registratie
        hiervan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Only designated Authorised Employees are permitted to make
            reproductions. They are also responsible for registering any reproductions.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.8
      description: Beveiligingsmaatregelen voor reproductiemiddelen worden in afstemming
        met NBIV vastgesteld.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Security measures for reproduction means must be determined
            in coordination with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.9
      description: Het vernietigen van Bijzondere Informatie geschiedt na toestemming
        van Opdrachtgever conform de in bijlage 8 gespecificeerde vernietigingsmethode
        door een Geautoriseerde Medewerker.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Destruction of Special Information must be carried out by an
            Authorised Employee, in accordance with the method of destruction specified
            in appendix 8, after having obtained permission from the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.10
      description: Het vernietigen van Bijzondere Informatie geschiedt na toestemming
        van Opdrachtgever conform de in bijlage 8 gespecificeerde vernietigingsmethode
        door een Geautoriseerde Medewerker en onder toezicht van een tweede Geautoriseerde
        Medewerker.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Destruction of Special Information must be carried out in accordance
            with the method of destruction specified in appendix 8, by an Authorised
            Employee, under the supervision of a second Authorised Employee, and after
            having obtained permission from the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.11
      description: Van de vernietiging wordt door de Beveiligingsfunctionaris een
        bevestiging van vernietiging opgemaakt conform formulier 'Bevestiging van
        vernietiging'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "A confirmation of destruction is prepared by the Security\
            \ Officer, in accordance with the \u2018Confirmation of destruction\u2019\
            \ form."
    - urn: urn:intuitem:risk:req_node:abro_2026:3.9.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:3.9
      ref_id: 3.9.12
      description: De Opdrachtnemer stelt in overleg met Opdrachtgever een Noodvernietigingsplan
        op. Het Noodvernietigingsplan wordt opgenomen in het Beveiligingsplan en bevat
        procedures en instructies met betrekking tot de vernietiging van een Te Beschermen
        Belang in een noodsituatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The Contractor must prepare an Emergency Destruction Plan,
            in coordination with the Contracting Authority. The Emergency Destruction
            Plan must be included in the Security Plan and must contain procedures
            and instructions relating to the destruction of an Interest to be Protected
            in an emergency situation.
    - urn: urn:intuitem:risk:req_node:abro_2026:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: 'Hoofdstuk 4: Cyber'
      translations:
        en:
          name: 'Chapter 4: Cyber'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.1'
      name: Beheer van ICT-bedrijfsmiddelen
      translations:
        en:
          name: Management of ICT Resources
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.1
      description: Door de Opdrachtnemer in ontvangst of in beheer genomen digitale
        Bijzondere Informatie wordt opgenomen in een actuele registratie, met daarin
        de locatie, uitgifte, inname en herkomst van de Bijzondere Informatie. Deze
        registratie wordt beheerd door de (Cyber-)Beveiligingsfunctionaris en is te
        allen tijde direct opvraagbaar door NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Digital Special Information received or administered by the
            Contractor must be included in an up-to-date record, indicating the site,
            issue, intake and origin of the Special Information. This record must
            be administered by the (Cyber) Security Officer and must be immediately
            retrievable by NOIS at any time.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.2
      description: ICT-bedrijfsmiddelen en de bijbehorende software, processen en
        gegevensverzamelingen worden bijgehouden in een registratie, voorzien van
        een eigenaar, een Beheerder, de gerelateerde Bijzondere Opdracht en de onderlinge
        relatie met andere onderdelen van de registratie, waaronder de overdracht
        van data.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: ICT Resources and the associated software, processes and data
            collections must be kept updated in a record, including an owner, an Administrator,
            the related Special Contract and the interrelationship with other components
            of the record, including the transfer of data.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.3
      description: Systeem- en netwerkcomponenten gerelateerd aan een Bijzondere Opdracht
        worden bijgehouden in een gedetailleerd netwerkdiagram.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: System and network components related to a Special Contract
            must be kept up to date in a detailed network diagram.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.4
      description: Systemen waar Bijzondere Informatie op wordt verwerkt en opgeslagen
        worden alleen ingezet binnen het deel van de IT-infrastructuur dat ingericht
        is voor het betreffende Rubriceringsdomein en -niveau.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Systems on which Special Information is processed and stored
            must be deployed only within the part of the IT infrastructure set up
            for the relevant Classification Domain and Level.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.5
      description: Het gebruik van een KVM-switch om te schakelen tussen Systemen
        van verschillende Rubriceringsniveaus is alleen toegestaan wanneer dit binnen
        eenzelfde Rubriceringsdomein is en gebruik wordt gemaakt van Goedgekeurde
        Middelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The use of a KVM switch to switch between Systems of different
            Classification Levels is only permitted when this occurs within the same
            Classification Domain and using Approved Means.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.6
      description: Voor het beheer en onderhoud van fysieke apparatuur, beveiligingscomponenten
        of Beveiligingssystemen wordt geen gebruik gemaakt van Cloudoplossingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Cloud Solutions must not be used for the administration and
            maintenance of physical equipment, security components or Security Systems.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.7
      description: 'Het hergebruik van ICT-bedrijfsmiddelen voor de uitvoering van
        een Bijzondere Opdracht is toegestaan onder de volgende voorwaarden:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: 'The reuse of ICT Resources for the execution of a Special
            Contract is permitted under the following conditions:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.8
      description: Verwijderbare gegevensdragers worden voor gebruik gecontroleerd
        met een speciaal voor dit doel ingerichte Scrubber conform bijlage 10.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Before they are used, Removable Data Carriers must be checked
            with a dedicated Scrubber, in accordance with appendix 10.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.9
      description: Voor het verwijderen van ICT-bedrijfsmiddelen zijn procedures opgesteld,
        welke door NBIV zijn goedgekeurd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Procedures must be established for the disposal of ICT Resources.
            These procedures must be approved by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.10
      description: "Na be\xEBindigen van de Bijzondere Opdracht of bij het afvoeren\
        \ van (defecte) hardware worden deze met Goedgekeurde Middelen en een door\
        \ NBIV goedgekeurde procedure gewist. Indien wissen niet (volledig) mogelijk\
        \ is, worden de (defecte) hardware conform de in bijlage 8 gespecificeerde\
        \ methoden vernietigd."
      implementation_groups:
      - '4'
      translations:
        en:
          description: Upon termination of the Special Contract or upon disposal of
            hardware (whether defective or not), the hardware must be wiped through
            Approved Means, using a procedure approved by NOIS. If clearance is not
            possible (or only partially), the hardware must be destroyed in accordance
            with the methods specified in appendix 8.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.1.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.1
      ref_id: 4.1.11
      description: "Na be\xEBindigen van de Bijzondere Opdracht of bij het afvoeren\
        \ van (defecte) hardware worden deze conform de in bijlage 8 gespecificeerde\
        \ methoden vernietigd. Er wordt hierbij een bevestiging van vernietiging opgesteld\
        \ conform formulier 'Bevestiging van vernietiging' en op verzoek verstrekt\
        \ aan Opdrachtgever en/of NBIV."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "Upon termination of the Special Contract or upon disposal\
            \ of hardware (whether defective or not), the hardware must be destroyed\
            \ in accordance with the methods specified in appendix 8. To this end,\
            \ a confirmation of destruction must be prepared in accordance with the\
            \ \u2018Confirmation of Destruction\u2019 form, which is to be provided\
            \ to the Contracting Authority and/or NOIS upon request."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.2'
      name: Data classificatie en verwerking
      translations:
        en:
          name: Data classification and processing
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.1
      description: Voorafgaand aan de overdracht of uitwisseling van Bijzondere Informatie
        is door de Beveiligingsfunctionaris vastgesteld dat de ontvangende partij
        de Bijzondere Informatie conform het vastgestelde beveiligingsniveau kan behandelen
        en geautoriseerd is om te beschikken over de Bijzondere Informatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Prior to any transfer or exchange of Special Information, the
            Security Officer must determine that the receiving party is able to handle
            the Special Information in accordance with the established security level
            and is authorised to have the Special Information at its disposal.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.2
      description: Verwijderbare gegevensdragers worden alleen gebruikt als onderdeel
        van een vastgestelde procedure voor data-uitwisseling. Voor deze procedure
        is onder andere vastgelegd welke specifieke Verwijderbare gegevensdrager gebruikt
        wordt en op welke wijze deze beveiligd, bewaard, gewist of vernietigd dient
        te worden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Removable Data Carriers must only be used as part of an established
            data exchange procedure. This procedure stipulates, among other things,
            the specific Removable Data Carrier to be used and how it is to be secured,
            retained, wiped or destroyed.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.3
      description: Verwijderbare gegevensdragers zijn voorzien van een fysiek label
        conform bijlage 8 op basis van de hoogste Rubricering van hetgeen opgeslagen
        is op de betreffende Verwijderbare gegevensdrager.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Removable Data Carriers must be provided with a physical label
            in accordance with appendix 8, based on the highest Classification of
            what is stored on the related Removable Data Carrier.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.4
      description: Gegevensdragers waar Bijzondere Informatie op staat, zijn versleuteld
        door Goedgekeurde Middelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Data Carriers containing Special Information must be encrypted
            through Approved Means.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.5
      description: Voor het wissen van (Verwijderbare) Gegevensdragers, waar Bijzondere
        Informatie op staat, wordt alleen gebruikgemaakt van Goedgekeurde Middelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Only Approved Means must be used to clear (Removable) Data
            Carriers containing Special Information.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.6
      description: "Data Leak Prevention (DLP) maatregelen zijn ge\xEFmplementeerd\
        \ in Systemen, Netwerken en andere apparaten waarop of waarmee Bijzondere\
        \ Informatie wordt gegenereerd, verwerkt of opgeslagen ter voorkoming van\
        \ het onbedoeld delen (bijvoorbeeld per e-mail) van Bijzondere Informatie."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Data Leak Prevention (DLP) measures must be implemented in
            Systems, Networks and other devices on or with which Special Information
            is generated, processed or stored to prevent unintended sharing (such
            as by email) of Special Information.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.7
      description: Bijzondere Informatie van NAVO en EU wordt, indien vastgesteld
        door Opdrachtgever, verwerkt op een daartoe geaccrediteerd Systeem.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Special Information originating from NATO and the EU, if established
            by the Contracting Authority, must be processed on a System accredited
            for that purpose.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.8
      description: Het gebruik van Artificial Intelligence (AI) systemen is alleen
        toegestaan wanneer deze voldoen aan de eisen voor de betreffende TBB-categorie
        en na goedkeuring van Opdrachtgever.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The use of Artificial Intelligence (AI) systems is only permitted
            if these systems meet the requirements for the relevant ITBP category
            and after approval from the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.9
      description: Bij het gebruik van AI systemen is data van verschillende Rubriceringsdomeinen,
        -niveaus of Opdrachtgevers te allen tijde gescheiden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When using AI systems, data from different Classification Domains,
            Classification levels or the Contracting Authorities must be separated
            at all times.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.10
      description: AI systemen functioneren volledig binnen het Vertrouwde Netwerk
        en hebben geen koppelingen met onvertrouwde Netwerken of Systemen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: AI systems must operate entirely within the Trusted Network
            and must not have any links to untrusted Networks or Systems.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.2.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.2
      ref_id: 4.2.11
      description: "Bij het be\xEBindigen van een Bijzondere Opdracht wordt alle (trainings)data,\
        \ gegenereerde uitkomsten en ontwikkelde AI modellen die op basis van Bijzondere\
        \ Informatie tot stand zijn gekomen of herleidbaar zijn tot Bijzondere Informatie,\
        \ overhandigd of vernietigd in afstemming met NBIV, tenzij anders overeengekomen\
        \ met Opdrachtgever."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Upon termination of a Special Contract, all data (training
            data and otherwise), generated outcomes and developed AI models that were
            created on the basis of Special Information or are traceable to Special
            Information must be transferred back or destroyed in consultation with
            NOIS, unless otherwise agreed with the Contracting Authority.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.3'
      name: Identificatie en authenticatie
      translations:
        en:
          name: Identification and Authentication
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.1
      description: Regels omtrent het gebruik van ICT-bedrijfsmiddelen (inclusief
        het gebruik van wachtwoorden) zijn vastgesteld, gedocumenteerd en ter kennis
        gesteld aan Gebruikers.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Rules regarding the use of ICT Resources (including the use
            of passwords) must be established, documented and made known to Users.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.2
      description: Toegang tot een Systeem is beperkt tot daartoe geautoriseerde Gebruikers.
        Dit wordt voorafgaand aan en tijdens een gebruikerssessie geautomatiseerd
        afgedwongen door het Systeem.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Access to a System must be restricted to specifically Authorised
            Users. This must be enforced automatically by the System prior to and
            during a user session.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.3
      description: "Authenticatiegegevens van Gebruikers worden bijgehouden in een\
        \ actuele registratie, op basis waarvan de Gebruikers worden ge\xEFdentificeerd\
        \ en geautoriseerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Authentication Data of Users must be kept in an up-to-date
            record, based on which Users are identified and authorised.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.4
      description: Op basis van een Risicoanalyse is bepaald waar en op welke wijze
        functiescheiding wordt toegepast en welke toegangsrechten worden toegekend.
        De risicoafweging, resultaten en maatregelen zijn opgenomen in een autorisatiematrix
        in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: It must be determined on the basis of a Risk Analysis where
            and how segregation of duties is applied and which access Rights are granted.
            The risk assessment, results and measures must be included in an authorisation
            matrix in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.5
      description: Een account bevat geen indicatie van het privilegeniveau van de
        Gebruiker.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Accounts must not include any indication of the privilege levels
            of Users.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.6
      description: Bij de uitgifte van een authenticatiemiddel is de identiteit van
        de Gebruiker en het recht van de Gebruiker op het betreffende authenticatiemiddel
        vastgesteld.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "When an authentication token is issued, the User\u2019s identity\
            \ and their right to the relevant authentication token must be established."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.7
      description: Accounts worden voorzien van Rechten die noodzakelijk zijn voor
        de uitvoering van de taken van de Gebruiker ('Need-to-Know', 'Need-to-Use').
        Bij het toekennen van Rechten wordt ten minste onderscheid gemaakt tussen
        lees- en schrijfrechten en de applicaties en commando's waar een Gebruiker
        toegang tot heeft.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Accounts must be assigned Rights that are necessary for the\
            \ execution of the User\u2019s tasks (\u2018Need-to-Know\u2019, \u2018\
            Need-to-Use\u2019). When assigning Rights, a distinction must at least\
            \ be made between reading and writing Rights and the applications and\
            \ commands a User has access to."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.8
      description: De Rechten van een Gebruiker omvatten niet een gehele cyclus van
        handelingen in een kritiek Systeem voor de beveiliging of uitvoering van de
        Bijzondere Opdracht.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "A User\u2019s Rights must not include an entire cycle of actions\
            \ in a critical System to secure or execute the Special Contract."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.9
      description: Beheerdersrechten zijn beperkt tot Beheerdersaccounts. Beheeractiviteiten
        worden alleen uitgevoerd vanaf Beheerdersaccounts.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Administrator Rights must be restricted to Administrator Accounts.
            Administration activities are performed only from Administrator Accounts.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.10
      description: Algemene gebruikersactiviteiten, zoals het gebruik van bedrijfsapplicaties,
        e-mail en internet, worden alleen uitgevoerd vanaf een Gebruikersaccount.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: General User activities, such as use of business applications,
            email and internet, must be performed using regular User Accounts.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.11
      description: Rechten van Beheerders worden aan een beperkte groep toegekend
        middels een Privileged Access Management (PAM) oplossing. Hiervan wordt een
        registratie bijgehouden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Rights of Administrators must be granted to a restricted group
            only by means of a Privileged Access Management (PAM) solution. Records
            must be kept of this.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.12
      description: "Toegekende Rechten van Beheerdersaccounts worden periodiek, minimaal\
        \ driemaandelijks, ge\xEBvalueerd."
      implementation_groups:
      - '3'
      - '4'
      translations:
        en:
          description: Rights granted to Administrator Accounts must be reviewed periodically,
            at least quarterly.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.13
      description: "Toegekende Rechten van Beheerdersaccounts worden periodiek, minimaal\
        \ maandelijks, ge\xEBvalueerd."
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Rights granted to Administrator Accounts must be reviewed periodically,
            at least monthly.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.14
      description: Activiteiten vanaf een Beheerdersaccount zijn gelogd en herleidbaar
        naar een individu.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Activities from an Administrator Account must be logged and
            be traceable to an individual.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.15
      description: Alleen daartoe geautoriseerde Beheerders kunnen functies en software
        (de)installeren of (de)activeren.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Only specifically authorised Administrators are permitted to
            (un) install or (de)activate features and software.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.16
      description: Serviceaccounts worden bijgehouden in een actuele registratie,
        voorzien van eigenaar, doel en datum waarop het Serviceaccount voor het laatst
        is beoordeeld. De noodzaak van een Serviceaccount wordt minimaal ieder kwartaal
        beoordeeld.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Service Accounts must be maintained in an up-to-date record,
            indicating the owner, the purpose and the date when the Service Account
            was last assessed. The need for a Service Account must be assessed at
            least quarterly.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.17
      description: Systeemprocessen worden uitgevoerd door unieke Serviceaccounts,
        die niet gekoppeld zijn aan een individu. IT-beheer houdt onder toezicht van
        de (Cyber-) Beveiligingsfunctionaris een actuele registratie bij van de Serviceaccounts
        en de bijbehorende Rechten.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: System processes must be performed by unique Service Accounts,
            which are not linked to individuals. IT management, under the supervision
            of the (Cyber) Security Officer, maintains an up-to-date record of Service
            Accounts and associated Rights.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.18
      description: 'Indien het gebruik van een Serviceaccount noodzakelijk is voor
        de functionaliteit van een Systeem, dient deze uitzondering door NBIV vooraf
        goedgekeurd te worden. Bij het gebruik van een Serviceaccount gelden de volgende
        voorwaarden:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'If the use of a Service Account is necessary for the functionality
            of a System, NOIS must approve this exception in advance. The following
            conditions apply to the use of a Service Account:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.19
      description: "Standaard of automatisch gecre\xEBerde accounts en andere vooraf\
        \ geconfigureerde accounts worden van een nieuw wachtwoord voorzien en uitgeschakeld\
        \ door een Beheerder onder toezicht van de (Cyber-)Beveiligingsfunctionaris."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Default or automatically created accounts and other pre-configured
            accounts must be provided with a new password and disabled by an Administrator
            under the supervision of the (Cyber) Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.20
      description: "Er is een nood- of 'breakglass' account die enkel toegankelijk\
        \ is door middel van een 'enveloppenprocedure'. Voor de procedure is vastgelegd\
        \ hoe een wachtwoord wordt vrijgegeven, wie hiervoor toestemming geeft, hoe\
        \ het gebruik ervan geregistreerd wordt en dat het wachtwoord na gebruik gewijzigd\
        \ wordt. Bij gebruik van deze accounts volgt er direct (automatische) alarmering\
        \ en wordt de (Cyber-)Beveiligingsfunctionaris ge\xEFnformeerd. Het gebruik\
        \ wordt geregistreerd door de (Cyber-)Beveiligingsfunctionaris."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "A dedicated emergency or \u2018break glass\u2019 account is\
            \ available that can only be accessed through an \u2018envelope procedure\u2019\
            . The procedure specifies how a password is released, who authorises it,\
            \ how its use is recorded and that the password must be changed after\
            \ use. When these accounts are used, an immediate (automatic) alert occurs\
            \ and the (Cyber) Security Officer is informed. The (Cyber) Security Officer\
            \ records the use of these accounts."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.21
      description: "Rechten van Gebruikers worden periodiek, minimaal halfjaarlijks,\
        \ ge\xEBvalueerd."
      implementation_groups:
      - '4'
      translations:
        en:
          description: Rights of Users must be reviewed periodically, at least semi-annually.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.22
      description: "Rechten van Gebruikers worden periodiek, minimaal driemaandelijks,\
        \ ge\xEBvalueerd."
      implementation_groups:
      - '2'
      - '3'
      translations:
        en:
          description: Rights of Users must be reviewed periodically, at least quarterly.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.23
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.23
      description: "Rechten van Gebruikers worden periodiek, minimaal maandelijks,\
        \ ge\xEBvalueerd."
      implementation_groups:
      - '1'
      translations:
        en:
          description: Rights of Users must be reviewed periodically, at least monthly.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.24
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.24
      description: Accounts die 40 dagen niet zijn gebruikt, worden automatisch geblokkeerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Accounts that have not been used for 40 days must be automatically
            blocked.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.25
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.25
      description: Als een Gebruiker vijfmaal een verkeerd wachtwoord invoert, wordt
        het Gebruikersaccount geblokkeerd.
      implementation_groups:
      - '4'
      translations:
        en:
          description: If a User enters an incorrect password five times, the User
            Account must be blocked.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.26
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.26
      description: Als een Gebruiker driemaal een verkeerd wachtwoord invoert, wordt
        het Gebruikersaccount geblokkeerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: If a User enters an incorrect password three times, the User
            Account must be blocked.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.27
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.27
      description: Als een Beheerder driemaal een verkeerd wachtwoord invoert wordt
        het Beheerdersaccount geblokkeerd. Het Beheerdersaccount wordt pas na goedkeuring
        van de (Cyber-)Beveiligingsfunctionaris vrijgegeven.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If an Administrator enters an incorrect password three times,
            the Administrator Account is blocked. The Administrator Account must only
            be released after approval by the (Cyber) Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.28
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.28
      description: Een geblokkeerd account wordt gedeblokkeerd volgens een door de
        (Cyber-)Beveiligingsfunctionaris goedgekeurde procedure.
      implementation_groups:
      - '4'
      translations:
        en:
          description: A blocked account must be unblocked according to a procedure
            approved by the (Cyber) Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.29
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.29
      description: Een geblokkeerd account mag alleen worden gedeblokkeerd na goedkeuring
        van de (Cyber-)Beveiligingsfunctionaris.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A blocked account must only be unblocked after approval from
            the (Cyber) Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.30
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.30
      description: 'Wachtwoorden voldoen minimaal aan de volgende kenmerken:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Passwords must meet the following characteristics as a minimum:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.31
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.31
      description: 'Ten aanzien van het gebruik van wachtwoorden geldt:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Use of passwords is subject to the following requirements:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.32
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.32
      description: 'De regels omtrent het gebruik van een Te Beschermen Belang en
        ICT-bedrijfsmiddelen (inclusief het gebruik van wachtwoorden), omvatten minimaal
        het volgende:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The rules regarding use of an Interest to be Protected and
            ICT Resources (including the use of passwords), include at least the following
            requirements:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.33
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.33
      description: Om in te loggen op een Gebruikersaccount wordt gebruikgemaakt van
        persoonsgebonden Multi-factor authenticatie, waarbij SMS niet als een factor
        geldt.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Personalised Multi Factor Authentication must be used to log
            in to a User Account, with SMS not counting as a factor.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.34
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.34
      description: "Om in te loggen op een Gebruikersaccount wordt gebruikgemaakt\
        \ van persoonsgebonden Multi-factor authenticatie, waarvan \xE9\xE9n van de\
        \ factoren een Hardware token is en waarbij SMS niet als een factor geldt."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: To log in to a User Account, personalised Multi Factor Authentication
            must be used, of which one of the factors is a Hardware Token, with SMS
            not counting as a factor.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.35
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.35
      description: "Om in te loggen op een Beheerdersaccount wordt gebruikgemaakt\
        \ van persoonsgebonden Multi-factor authenticatie, waarvan \xE9\xE9n van de\
        \ factoren een Hardware token is en waarbij SMS niet als een factor geldt."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: To log in to an Administrator Account, personalised Multi Factor
            Authentication is used, of which one of the factors is a Hardware Token,
            with SMS not counting as a factor.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.36
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.36
      description: Bij het gebruik van Biometrie als authenticatiefactor voor Multi-factor
        authenticatie is Authenticatie op basis van een pincode als alternatieve mogelijkheid
        uitgesloten.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When using Biometrics as an authentication factor for Multi
            Factor Authentication, PIN-based Authentication is excluded as an alternative
            option.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.37
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.37
      description: Indien Hardware tokens, Biometrische toepassingen of Multi-factor
        authenticatie worden gebruikt, kunnen deze niet worden uitgeschakeld door
        Gebruikers. De (Cyber-)Beveiligingsfunctionaris houdt een actuele registratie
        bij van gebruikte Hardware tokens.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If Hardware Tokens, Biometric applications or Multi Factor
            Authentication are being used, they cannot be disabled by Users. The (Cyber)
            Security Officer must keep an up-to-date record of Hardware Tokens used.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.38
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.38
      description: Voorafgaand aan het gebruik van een Systeem wordt een Melding aan
        de Gebruiker getoond dat alleen geautoriseerd gebruik is toegestaan voor de
        expliciet door de organisatie vastgestelde doeleinden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Prior to using a System, a notification must be shown to the
            User that only authorised use is permitted for the purposes explicitly
            defined by the organisation.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.39
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.39
      description: Een account kan maximaal drie actieve werkplekken (sessies) hebben.
      implementation_groups:
      - '4'
      translations:
        en:
          description: A maximum of three active workplace (sessions) is permitted
            per account.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.40
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.40
      description: "Een account kan maximaal \xE9\xE9n actieve werkplek (sessie) hebben."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A maximum of one active workplace (session) is permitted per
            account.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.41
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.41
      description: 'Indien er een operationele noodzaak is voor het gebruik van een
        groepsaccount, dient deze uitzondering door NBIV vooraf goedgekeurd te zijn.
        Bij het gebruik van een groepsaccount gelden de volgende voorwaarden:'
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'If there is an operational need for the use of a group account,
            this exception must be approved in advance by NOIS. The following conditions
            apply to the use of a group account:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.42
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.42
      description: Het gebruik van groepsaccounts is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The use of group accounts is not permitted.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.43
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.43
      description: Het wachtwoord wordt niet getoond op het scherm tijdens het invoeren
        en er wordt geen informatie getoond die herleidbaar is tot de Authenticatiegegevens.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Passwords must not be displayed on screen during entry and
            information traceable to the Authentication Data must not be displayed.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.44
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.44
      description: 'Gebruikers kunnen zelf hun wachtwoord kiezen en wijzigen. Hierbij
        geldt ten minste het volgende:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Users can choose and change their own passwords. This is subject
            to the following minimum requirements:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.45
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.45
      description: Wachtwoorden worden niet in originele vorm (plain text) opgeslagen
        of verstuurd, tenzij het wordt gebruikt ten behoeve van een 'enveloppenprocedure'.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Passwords must not be stored or transmitted in their original
            form (plain text), unless they are being used for the purpose of an 'envelope
            procedure'.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.3.46
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.3
      ref_id: 4.3.46
      description: Bij een succesvolle aanmelding wordt de datum en tijd van de voorgaande
        aanmelding of aanmeldpoging aan de Gebruiker getoond.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: On successful login, the date and time of the previous login
            or login attempt must be displayed to the User.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.4'
      name: Configuratiemanagement
      translations:
        en:
          name: Configuration management
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.1
      description: Alle functionaliteit van hardware en software (zoals instellingen,
        netwerkpoorten, USB-poorten, diensten, accounts, systeemhulpmiddelen) die
        niet vereist zijn voor de Bijzondere Opdracht, zijn uitgeschakeld.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: All hardware and software functionality (such as settings,
            network ports, USB ports, services, accounts, system tools) not required
            for the Special Contract must be disabled.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.2
      description: Op basis van een Risicoanalyse kan wanneer strikt noodzakelijk
        voor de uitvoering van de Bijzondere Opdracht met goedkeuring van de (Cyber-)Beveiligingsfunctionaris
        een uitzondering worden gemaakt voor het inschakelen van functionaliteiten
        van hardware en software, zoals bijvoorbeeld Gegevensdragers. De (Cyber-)Beveiligingsfunctionaris
        houdt een actuele registratie bij van deze uitzonderingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An exception can be made for activating hardware and software
            functionalities, such as Data Carriers, based on a Risk Analysis when
            this is strictly necessary for the execution of the Special Contract.
            This is subject to the approval of the (Cyber) Security Officer. The (Cyber)
            Security Officer must keep an up-to-date record of these exceptions.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.3
      description: Van alle apparatuur die gebruikt wordt in het kader van de Bijzondere
        Opdracht of die zich binnen het Compartiment bevindt, zijn alle componenten
        voor Draadloze communicatie (zoals Wi-Fi, Bluetooth, NFC en 5G) en alle camera's
        en microfoons verwijderd of hardwarematig onklaar gemaakt. Indien specifieke
        functionaliteit noodzakelijk is voor de uitvoering van een Bijzondere Opdracht
        kan een uitzondering gemaakt worden. Uitzonderingen zijn vooraf goedgekeurd
        door NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: For all equipment used as part of the Special Contract or located
            within the Compartment, all Wireless Communication components (such as
            Wi-Fi, Bluetooth, NFC and 5G) as well as all cameras and microphones must
            be removed or disabled in hardware settings. If specific functionality
            is required for the execution of a Special Contract, exceptions may be
            made. Exceptions must be approved in advance by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.4
      description: Hardening is toegepast op hardware en software, inclusief authenticatieprotocollen
        en -mechanismen, in lijn met de door de fabrikant voorgeschreven en aanbevolen
        beveiligingsmaatregelen, aangevuld op basis van recente marktstandaarden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Hardening must be applied to hardware and software, including\
            \ authentication protocols and mechanisms, in line with the manufacturer\u2019\
            s stipulated and recommended security measures and supplemented based\
            \ on recent industry standards."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.5
      description: Het interne en externe dataverkeer wordt op basis van een Risicoanalyse
        beperkt tot de noodzakelijke protocollen en sessies.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Internal and external data traffic must be restricted to necessary
            protocols and sessions based on a Risk Analysis.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.6
      description: Software, servers, gebruikers-, netwerk- en opslagapparatuur worden
        middels een vastgesteld proces voorzien van veilige configuraties. Deze configuraties
        zijn vastgelegd, worden minimaal jaarlijks beoordeeld en waar nodig aangepast
        en op verzoek gedeeld met NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Software, servers, User-, Network- and storage devices must
            be provided with secure configurations through an established process.
            These configurations must be established, reviewed at least once a year,
            updated where necessary and shared with NOIS upon request.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.7
      description: Een mechanisme controleert de instellingen van informatiebeveiligingsfuncties
        (zoals securitysoftware) op het Koppelvlak tussen verschillende Netwerken
        op ongeautoriseerde wijzigingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A mechanism must be in place that checks the settings of information
            security functions (such as security software) on the Interface between
            different Networks for unauthorised changes.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.8
      description: De instellingen van logmechanismen zijn zodanig beschermd dat deze
        niet onopgemerkt aangepast of gemanipuleerd kunnen worden. Wijzigingen worden
        gecontroleerd middels het vier-ogen principe.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The settings of logging mechanisms must be protected so that
            they cannot be modified or manipulated without being detected. Changes
            must be checked based on the four-eyes principle.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.9
      description: Systeemklokken maken gebruik van dezelfde tijdsynchronisatie en
        zijn zodanig beveiligd tegen wijzigingen dat deze niet onopgemerkt aangepast
        of gemanipuleerd kunnen worden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: System clocks must use the same time synchronisation and must
            be protected against changes such that they cannot be modified or manipulated
            without being detected.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.10
      description: Er wordt alleen door de (Toe)leverancier actief onderhouden hardware
        en software gebruikt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Only actively maintained hardware and software is to be used.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.11
      description: Systeemdocumentatie is, wanneer deze gevoelige informatie bevat
        over beveiligingsmaatregelen van een Te Beschermen Belang die zich op het
        Systeem bevindt, op hetzelfde niveau beveiligd als het Te Beschermen Belang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When System Documentation contains sensitive information about
            security measures of an Interest to be Protected located on the System,
            it must be protected at the same level as the Interest to be Protected.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.4.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.4
      ref_id: 4.4.12
      description: Ten behoeve van het uitvoeren van beheertaken zijn systeemconfiguraties,
        met inbegrip van hardware, software, diensten, Netwerken en beveiliging, gedocumenteerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: For the purpose of performing management tasks, System configurations,
            including hardware, software, services, Networks and security, must be
            documented.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.5'
      name: Netwerkbeveiliging
      translations:
        en:
          name: Network security
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.1
      description: Netwerken, Systemen en applicaties worden gemonitord en beheerd
        zodat aanvallen, storingen en/of fouten ontdekt en hersteld kunnen worden
        en de Beschikbaarheid niet onder het afgesproken minimum niveau komt. Dit
        minimum is opgenomen in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Networks, Systems and applications must be monitored and managed
            so that attacks, failures and/or errors can be detected and repaired and
            Availability does not fall below the agreed minimum level. This minimum
            must be included in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.2
      description: Continue real-time Monitoring en Logging van al het inkomende en
        uitgaande netwerkverkeer en netwerkkoppelingen zijn ingericht, waarbij wordt
        gelet op afwijkingen van het normaalbeeld en waar nodig (geautomatiseerd)
        wordt ingegrepen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Continuous real-time Monitoring and Logging of all incoming
            and outgoing Network traffic and Network links must be in place, paying
            attention to deviations from the normal pattern and intervening (automatically)
            where necessary.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.3
      description: Alle Draadloze communicatie wordt behandeld als Externe (netwerk)
        koppeling.
      implementation_groups:
      - '4'
      translations:
        en:
          description: All Wireless Communication must be treated as an External (Network)
            Connection.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.4
      description: Het gebruik van Draadloze communicatie is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The use of Wireless Communication is not permitted.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.5
      description: In geval van een Externe (netwerk) koppeling is een DMZ toegepast.
      implementation_groups:
      - '4'
      translations:
        en:
          description: A DMZ must be applied in case of an External (Network) Connection.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.6
      description: Voor in- en uitgaand dataverkeer van en naar een onvertrouwde omgeving,
        zowel intern als extern, zijn beveiligingsmaatregelen getroffen zoals een
        DMZ, Proxy-server en/of sandbox.
      implementation_groups:
      - '4'
      translations:
        en:
          description: For inbound and outbound data traffic to and from an untrusted
            environment, both internal and external, security measures such as a DMZ,
            Proxy server and/or sandbox must be in place.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.7
      description: Alle beveiligingsmechanismes maken gebruik van actuele indicatoren,
        zoals virusdefinities en Signatures.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: All security mechanisms must use up-to-date indicators, such
            as virus definitions and Signatures.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.8
      description: Beveiligingsmechanismes ten behoeve van de Bijzondere Opdracht
        mogen niet voortkomen uit een land dat een Offensief cyberprogramma tegen
        de Nederlandse belangen heeft.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Security mechanisms for the purpose of the Special Contract
            must not originate from a country that has an Offensive Cyber Programme
            against Dutch interests.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.9
      description: "Minimaal jaarlijks worden de ge\xEFmplementeerde beveiligingsmaatregelen\
        \ op een Koppelvlak getest op de werking. Bevindingen worden opgevolgd en\
        \ gedocumenteerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: At least once a year, the implemented security measures on
            an Interface must be tested to verify their operational effectiveness.
            Findings must be addressed and documented.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.10
      description: "Minimaal elke 6 maanden worden de ge\xEFmplementeerde beveiligingsmechanismen\
        \ van Netwerken, Systemen en applicaties gecontroleerd op de werking. Bevindingen\
        \ worden opgevolgd en gedocumenteerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: At the very least every six months, the implemented security
            mechanisms of Networks, Systems and applications must be tested to verify
            their operational effectiveness. Findings must be addressed and documented.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.11
      description: Toegang op afstand tot een Te Beschermen Belang (via een remote
        inlogvoorziening) vindt alleen plaats middels Goedgekeurde Middelen en door
        NBIV goedgekeurde procedures. De gebruikte apparatuur voldoet aan de relevante
        beveiligingseisen voor het betreffende Rubriceringsniveau.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Remote Access to an Interest to be Protected (via a remote
            login facility) must only take place through Approved Means and procedures
            approved by NOIS. The equipment used must meet the relevant security requirements
            for the relevant Classification Level.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.12
      description: "In Koppelvlakken met externe of onvertrouwde Netwerken zijn maatregelen\
        \ getroffen om mogelijke aanvallen die de Betrouwbaarheid van de informatievoorziening\
        \ negatief be\xEFnvloeden (bijvoorbeeld (D)DoS-aanvallen) te signaleren en\
        \ hierop te reageren."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In Interfaces with external or untrusted Networks, measures
            must be in place to identify and respond to possible attacks that adversely
            affect the Confidentiality, Integrity and Availability of information
            provision (such as DoS and DDoS attacks).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.13
      description: "Systemen die voor hun functionaliteit gebruikmaken van een verbinding\
        \ met een externe dienst (zoals licentieservers en Device Management oplossingen)\
        \ zijn vooraf goedgekeurd door NBIV. Hierbij zijn mechanismes ge\xEFmplementeerd\
        \ om:"
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'Systems that use a connection to an external service for their
            functionality (such as licence servers and Device Management solutions)
            must be pre-approved by NOIS. To do so, mechanisms must be implemented
            to:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.14
      description: Netwerken zijn voorzien van beheersmaatregelen voor routering gebaseerd
        op mechanismen ter verificatie van bron- en bestemmingsadressen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Networks must feature routing management measures based on
            mechanisms to verify source and destination addresses.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.15
      description: Er zijn technische maatregelen getroffen om te voorkomen dat interne
        netwerkadressen naar buiten toe routeren, zoals het toepassen van Outbound
        Traffic Filtering.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Technical measures must be taken to prevent internal network
            addresses from routing outwards, such as applying Outbound Traffic Filtering.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.16
      description: Bijzondere Informatie wordt alleen verzonden over een onvertrouwde
        verbinding wanneer de Bijzondere Informatie versleuteld is door middel van
        Goedgekeurde Middelen.
      implementation_groups:
      - '3'
      - '4'
      translations:
        en:
          description: Special Information is only permitted to be sent over an untrusted
            connection if the Special Information is encrypted using Approved Means.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.17
      description: "Technische en procedurele maatregelen zijn getroffen om te waarborgen\
        \ dat alleen ge\xEFdentificeerde en geauthentiseerde apparatuur kan worden\
        \ verbonden met het Netwerk. Wanneer onbekende apparatuur wordt aangesloten\
        \ vindt er alarmering plaats."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Technical and procedural measures must be in place to ensure
            that only identified and authenticated equipment can connect to the Network.
            When unknown equipment is connected, alerting takes place.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.18
      description: TOR (The Onion Router)/Darknet verkeer is geblokkeerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: TOR (The Onion Router)/Darknet traffic must be blocked.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.19
      description: 'Op verzoek van NBIV wordt door Opdrachtnemer medewerking verleend
        aan:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'At the request of NOIS, the Contractor must cooperate in:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.20
      description: "De gebruikte versleutelingsprotocollen zijn de meest recente conform\
        \ (inter)nationale beveiligingsstandaarden. Nieuw gepubliceerde standaarden\
        \ dienen binnen de minimaal haalbare termijn ge\xEFmplementeerd te worden.\
        \ Aansluitvoorwaarden van Opdrachtgever prevaleren en afwijkingen worden gemeld\
        \ aan NBIV."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The encryption protocols used must be the most recent protocols
            according to national and international security standards. Newly published
            standards must be implemented within the minimum feasible deadline. The
            connection conditions of the Contracting Authority must prevail and deviations
            must be reported to NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.21
      description: Netwerken voor verschillende Rubriceringsdomeinen zijn gescheiden
        en toegang is beveiligd middels Goedgekeurde Middelen.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Networks for different Classification Domains must be separated
            and access must be secured using Approved Means.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.22
      description: Netwerken voor verschillende Rubriceringsdomeinen zijn fysiek gescheiden
        en toegang is beveiligd middels Goedgekeurde Middelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Networks for different Classification Domains must be physically
            separated and access must be secured using Approved Means.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.23
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.23
      description: Internationale Netwerkkoppelingen maken gebruik van door NBIV goedgekeurde
        producten en procedures.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: International Network Connections must use products and procedures
            approved by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.24
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.24
      description: Netwerken van eenzelfde juridische entiteit waarop een Te Beschermen
        Belang is opgeslagen zijn alleen gekoppeld middels Goedgekeurde Middelen en
        door NBIV goedgekeurde procedures.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Networks of the same legal entity on which an Interest to be
            Protected is stored must be connected only through Approved Means and
            procedures approved by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.25
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.25
      description: Netwerken van verschillende juridische entiteiten waarop een Te
        Beschermen Belang is opgeslagen zijn alleen gekoppeld na goedkeuring van Opdrachtgever.
        Alle entiteiten beschikken over de vereiste ABRO-Verklaring, de koppeling
        maakt gebruik van Goedgekeurde Middelen en door NBIV goedgekeurde procedures,
        en er is voldaan aan de aansluitvoorwaarden van de betreffende Netwerken.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Networks of different legal entities on which an Interest to
            be Protected is stored must be connected only with the approval of the
            Contracting Authority. All entities must have the required ABRO Declaration,
            the connection must take place using Approved Means and based on procedures
            approved by NOIS, and the connection requirements of the relevant Networks
            must be met.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.26
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.26
      description: Bij Koppelvlakken tussen Netwerken van verschillende Rubriceringsniveaus
        is informatie-uitwisseling alleen mogelijk van een Netwerk met een lager Rubriceringsniveau
        naar een Netwerk met een hoger Rubriceringsniveau. De koppeling maakt gebruik
        van Goedgekeurde Middelen. Uitgewisselde informatie wordt behandeld conform
        het Rubriceringsniveau van het Segment waarop de informatie zich bevindt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Information exchange for Interfaces between Networks of different
            Classification Levels must take place only from a Network with a lower
            Classification Level to a Network with a higher Classification Level.
            The interface must use Approved Means. Information exchanged must be handled
            according to the Classification Level of the Segment on which the information
            resides.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.27
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.27
      description: Bij Koppelvlakken tussen Netwerken van verschillende Rubriceringsniveaus
        is informatie-uitwisseling van een Netwerk met een hoger Rubriceringsniveau
        naar een Netwerk met een lager Rubriceringsniveau niet mogelijk.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: For Interfaces between Networks of different Classification
            Levels, information exchange from a Network with a higher Classification
            Level to a Network with a lower Classification Level is not possible.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.28
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.28
      description: Ontsluiting van een Te Beschermen Belang op een Netwerk tussen
        verschillende locaties van de Opdrachtnemer (WAN) is niet toegestaan.
      implementation_groups:
      - '1'
      translations:
        en:
          description: Unlocking an Interest to be Protected on a Network between
            different sites of the Contractor (WAN) is not permitted.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.29
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.29
      description: "De Technische infrastructuur is ingedeeld in Segmenten. Opdrachtnemer\
        \ draagt zorg dat binnen \xE9\xE9n Segment alleen Bijzondere Informatie wordt\
        \ verwerkt van hetzelfde Rubriceringsdomein en -niveau. Opdrachtnemer evalueert\
        \ dit minimaal jaarlijks en herziet Segmenten indien nodig."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Technical Infrastructure is divided into Segments. The
            Contractor must ensure that Special Information of the same Classification
            Domain and Classification Level is processed within one Segment only.
            The Contractor must evaluate this at least once a year and revise Segments
            if necessary.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.30
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.30
      description: Elk Segment heeft een gedefinieerd Rubriceringsdomein en -niveau.
        Bij Koppelvlakken tussen Segmenten vindt controle plaats op protocol, inhoud
        en richting van de communicatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Each Segment must have a defined Classification Domain and
            Classification Level. Interfaces between Segments must be subject to controls
            on protocol, content and direction of communication.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.31
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.31
      description: Segmenten zijn alleen ingericht met voorzieningen die strikt noodzakelijk
        zijn voor de functionaliteit. Beheer en audit van Segmenten vindt plaats vanuit
        een logisch gescheiden Segment.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Segments must be equipped exclusively with features strictly
            necessary for the required functionality. Management and auditing of Segments
            must take place from a logically separated Segment.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.32
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.32
      description: Segmenten zijn alleen ingericht met voorzieningen die strikt noodzakelijk
        zijn voor de functionaliteit. Beheer en audit van Segmenten vindt plaats vanuit
        een Segment.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Segments must be equipped exclusively with features strictly
            necessary for functionality. Management and auditing of Segments must
            take place from within a Segment.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.33
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.33
      description: Segmentering is toegepast om groepen van Systemen, diensten en
        Gebruikers te scheiden in het Netwerk. Bijvoorbeeld door middel van een firewall
        of DMZ.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Segmentation must be applied to separate groups of Systems,
            services and Users in the Network. For example, through a firewall or
            DMZ.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.34
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.34
      description: 'Bij de toepassing van Virtualisatie in het kader van de Bijzondere
        Opdracht wordt een Risicoanalyse uitgevoerd door de (Cyber-) Beveiligingsfunctionaris
        en een Beheerder. Hierbij gelden ten minste de volgende voorwaarden:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'When applying Virtualisation within the framework of the Special
            Contract, a Risk Analysis must be carried out by the (Cyber) Security
            Officer and an Administrator. The following minimum conditions apply:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.5.35
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.5
      ref_id: 4.5.35
      description: 'Het toepassen van VLAN''s is alleen toegestaan in Netwerken met
        hetzelfde Rubriceringsdomein en -niveau. Het ontwerp en de implementatie zijn
        vooraf goedgekeurd door NBIV. Hierbij gelden ten minste de volgende voorwaarden:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The deployment of VLANs is only permitted in Networks with
            the same Classification Domain and Classification Level. NOIS must pre-approve
            the design and implementation. The following minimum conditions apply:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.6'
      name: Endpoint beveiliging
      translations:
        en:
          name: Endpoint security
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.1
      description: Voorzieningen voor Toegang op afstand zijn zo ingericht dat op
        het werkstation of Mobiel apparaat geen enkele informatie vanuit een Vertrouwde
        Netwerk wordt opgeslagen (Zero footprint). Het werkstation of Mobiel apparaat
        is versleuteld met een binnen het Systeem beschikbare harde schijf encryptie
        module, waarbij gebruikt wordt gemaakt van Firmware TPM, Secure boot en Pre-boot
        authentication.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Facilities for Remote Access must be designed in such a way
            that no information from a Trusted Network is stored on the workstation
            or Mobile Device (Zero Footprint). The workstation or Mobile Device must
            be encrypted with a hard disk encryption module available within the System,
            using Firmware TPM, Secure boot and Pre-boot authentication.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.2
      description: Voorzieningen voor Toegang op afstand zijn zo ingericht dat mogelijke
        Malware vanaf het werkstation of Mobiele apparaat niet in het deel terecht
        kan komen waar Bijzondere Informatie is opgeslagen.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Provisions for Remote Access must be designed in such a way
            that possible Malware from the workstation or Mobile device cannot enter
            the part where Special Information is stored.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.3
      description: Het is niet mogelijk ongeautoriseerde software of scripts te installeren
        of uit te voeren op een werkstation of Mobiele apparatuur. Dit wordt technisch
        afgedwongen, waarbij afwijkingen worden gedetecteerd en opgevolgd. Uitzonderingen
        worden schriftelijk goedgekeurd en geregistreerd door de (Cyber-)Beveiligingsfunctionaris.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: It is not possible to install or run unauthorised software
            or scripts on a workstation or Mobile Device. This must be technically
            enforced, with deviations being detected and addressed. Exceptions must
            be approved in writing and recorded by the (Cyber) Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.4
      description: "Indien een Gebruiker ingelogd is op een werkplek(sessie), dan\
        \ vindt het overnemen van de werkplek(sessie) door een Beheerder alleen plaats\
        \ na toestemming van de Gebruiker. Er is een mogelijkheid om overname van\
        \ de werkplek(sessie) zelf te be\xEBindigen en er verschijnt een Melding dat\
        \ de werkplek(sessie) is be\xEBindigd. De Gebruiker houdt toezicht dat de\
        \ Beheerder niet kennisneemt van een Te Beschermen Belang."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "If a User is logged in to a workplace (session), the Administrator\
            \ is only permitted to take over the workplace (session) with the User\u2019\
            s permission. An option must be available to terminate takeover of the\
            \ workplace (session) itself and a Report must appear that the workplace\
            \ (session) has been terminated. The User must supervise that the Administrator\
            \ does not gain knowledge of an Interest to be Protected."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.5
      description: Apparaten die toegang geven tot een Te Beschermen Belang zijn,
        voorafgaand aan de toegang, geautomatiseerd gecontroleerd op naleving van
        een vooraf gedefinieerd beveiligingsbeleid.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Devices providing access to an Interest to be Protected must
            be checked automatically for compliance with a predefined security policy
            prior to providing access.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.6
      description: Een werkplek (sessie) wordt na 10 minuten inactiviteit automatisch
        vergrendeld (Clear Screen).
      implementation_groups:
      - '3'
      - '4'
      translations:
        en:
          description: A workplace (session) must be automatically locked (Clear Screen)
            after 10 minutes of inactivity.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.7
      description: Een werkplek (sessie) wordt na 5 minuten inactiviteit automatisch
        vergrendeld (Clear Screen).
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: A workplace (session) must be automatically locked (Clear Screen)
            after 5 minutes of inactivity.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.8
      description: Bij het gebruik van een Hardware token wordt de werkplek (sessie)
        automatisch vergrendeld bij het verwijderen van de Hardware token.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When using a Hardware Token, the workplace (session) must be
            automatically locked when the Hardware Token is removed.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.9
      description: 'Voor het uitzetten/uitstellen van de automatische vergrendeling
        op een werkplek (sessie) gelden de volgende voorwaarden:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Disabling/deferring automatic locking at a particular workplace
            (session) is subject to the following conditions:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.10
      description: Anti-Malware software scant periodiek, minimaal dagelijks, Systemen
        en voert directe scans uit op bestanden, e-mails en overige informatie wanneer
        deze worden gedownload, geopend, opgeslagen of uitgevoerd. Gevonden Malware
        wordt in quarantaine geplaatst.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Anti-Malware software must periodically, at least daily, scan
            Systems and must perform direct scans on files, emails and other information
            when they are downloaded, opened, saved or executed. Any Malware identified
            must be quarantined.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.11
      description: Anti-Malware software scant periodiek, minimaal dagelijks, Systemen
        en voert directe scans uit op bestanden en overige informatie wanneer deze
        worden geopend, opgeslagen of uitgevoerd. Gevonden Malware wordt in quarantaine
        geplaatst.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Anti-Malware software must periodically, at least daily, scan
            Systems and perform direct scans on files and other information when opened,
            saved or executed. Any Malware identified must be quarantined.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.6.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.6
      ref_id: 4.6.12
      description: De update voor de detectiedefinities vindt minimaal dagelijks plaats.
        Indien hiervoor gebruik wordt gemaakt van online/Cloud gebaseerde anti-Malware
        services dan wordt dit vooraf ter goedkeuring voorgelegd aan NBIV en beschreven
        in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Updating the detection definitions must take place at least
            daily. If online/Cloud-based anti-Malware services are used for this purpose,
            this must be submitted to NOIS in advance for approval and described in
            the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.7'
      name: Beheer van mobiele apparatuur
      translations:
        en:
          name: Management of Mobile Equipment
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.1
      description: 'Een Te Beschermen Belang wordt alleen opgeslagen of verwerkt op
        Mobiele apparatuur voor zover dit strikt noodzakelijk is voor de Bijzondere
        Opdracht, waarbij:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'An Interest to be Protected may be stored or processed on
            Mobile Devices only to the extent strictly necessary for the Special Contract,
            subject to the following conditions:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.2
      description: Mobiele apparatuur buiten het Compartiment bevat geen kenmerken
        die direct herleidbaar zijn tot Opdrachtgever of Opdrachtnemer (zowel fysiek
        op de Mobiele apparatuur als weergegeven op het scherm van de Mobiele apparatuur).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Mobile Equipment outside the Compartment must not contain any
            features that are directly traceable to the Contracting Authority or the
            Contractor (whether physically on the Mobile Equipment or displayed on
            the screen of the Mobile Equipment).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.3
      description: Mobiele apparatuur waarop een Te Beschermen Belang wordt gegenereerd,
        is opgeslagen of wordt verwerkt, maakt alleen gebruik van een Externe koppeling
        wanneer deze is goedgekeurd door NBIV.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Mobile devices on which an Interest to be Protected is generated,
            stored or processed may only use an External Connection when approved
            by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.4
      description: Bij Toegang op afstand wordt al het verkeer van en naar de apparatuur
        gerouteerd over een versleutelde verbinding middels Goedgekeurde Middelen.
        Op basis van een Risicoanalyse kan met voorafgaande goedkeuring van NBIV een
        uitzondering worden gemaakt, bijvoorbeeld ten behoeve van Mobile Device Management,
        updates of het wissen van data.
      implementation_groups:
      - '4'
      translations:
        en:
          description: With Remote Access, all traffic to and from the equipment must
            be routed over an encrypted connection using Approved Means. Based on
            a Risk Analysis, exceptions can be made with prior approval from NOIS,
            such as for the purpose of Mobile Device Management, updates or data deletion.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.5
      description: Voor het gebruik van Mobiele apparatuur en Toegang op afstand zijn
        gebruiksinstructies opgesteld.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Operating instructions must be drawn up for the use of Mobile
            Devices and Remote Access.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.6
      description: Na verlies of diefstal van Mobiele apparatuur wordt de communicatiemogelijkheid
        met de centrale applicaties afgesloten, het authenticatiemechanisme gereset
        en bijbehorende Certificaten direct ingetrokken. De data wordt zo snel mogelijk
        op afstand gewist.
      implementation_groups:
      - '4'
      translations:
        en:
          description: After loss or theft of Mobile devices, the communication capability
            with the central applications must be closed, the Authentication mechanism
            must be reset and associated Certificates must be revoked immediately.
            Data must be wiped remotely as soon as possible.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.7
      description: Indien Mobiele apparatuur zich buiten het Compartiment bevindt,
        wordt deze, bij geen gebruik, binnen 2 minuten vergrendeld.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Mobile Equipment that is located outside the Compartment must
            be locked within 2 minutes if it is not used.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.8
      description: Inkijkbeperkende maatregelen (bijv. screenfilters) zijn toegepast
        voor Mobiele Apparatuur die zich buiten het Compartiment bevindt.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Measures to restrict visibility (such as screen filters) must
            be applied for Mobile Equipment located outside the Compartment.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.7.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.7
      ref_id: 4.7.9
      description: Inkijkbeperkende maatregelen (bijv. screenfilters) zijn toegepast
        op alle apparatuur.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Measures to restrict visibility (such as screen filters) must
            be applied to all equipment.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.8'
      name: Cryptografie
      translations:
        en:
          name: Cryptography
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.1
      description: 'Cryptografische beveiligingsoplossingen zijn ingericht en worden
        beheerd conform de via NBIV verkregen documentatie. Daarnaast worden de volgende
        adviezen en voorwaarden opgevolgd en gedocumenteerd in het Beveiligingsplan:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Cryptographic Security Solutions must be deployed and managed
            in accordance with the documentation obtained through NOIS. In addition,
            the following advice and conditions must be complied with and documented
            in the Security Plan:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.2
      description: Het proces, de rollen, functionarissen en hun verantwoordelijkheden
        ten aanzien van het beheer van Cryptografische beveiligingsoplossingen zijn
        vastgelegd in het cryptografiebeleid (RASCI), als onderdeel van het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The process, roles, officers and their responsibilities regarding
            the management of Cryptographic Security Solutions must be set out in
            the cryptography policy (RASCI), as part of the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.3
      description: Indien Opdrachtnemer cryptografische sleutels krijgt aangeleverd
        via de Nationale Distributie Autoriteit of Opdrachtgever, zijn er ten minste
        twee Cryptobeheerders aangesteld, tenzij met NBIV anders is overeengekomen.
        De Cryptobeheerder voert de taken uit zoals beschreven in bijlage 3.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If the Contractor is provided with cryptographic keys through
            the National Distribution Authority or the Contracting Authority, at least
            two Crypto Custodians must be appointed, unless otherwise agreed with
            NOIS. The Crypto Custodian must further perform the duties as described
            in appendix 3.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.4
      description: De geldigheidsduur van cryptografische sleutels is bepaald door
        de leverancier of het inzetadvies en is vastgelegd in het cryptografiebeleid,
        als onderdeel van het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The validity period of cryptographic keys is determined by
            the supplier or in the deployment advice and must be set out in the cryptography
            policy, as part of the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.5
      description: Het beheer van Cryptografische beveiligingsoplossingen vindt plaats
        middels het vier-ogen principe.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The administration of Cryptographic Security Solutions must
            take place based on the four-eyes principle.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.6
      description: Voor het beheer van Cryptografische beveiligingsoplossingen zijn
        Beheerders opgeleid en zijn beheerdersinstructies aan Beheerders overhandigd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Administrators must be trained in the management of Cryptographic
            Security Solutions, and administrator instructions must be provided to
            Administrators.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.7
      description: Voor het gebruik van Cryptografische beveiligingsoplossingen zijn
        gebruikersinstructies aan Gebruikers overhandigd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Before using Cryptographic Security Solutions, User instructions
            must be provided to Users.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.8
      description: Gebruikers van Cryptografische beveiligingsoplossingen zijn hiertoe
        opgeleid door Opdrachtnemer.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Users of Cryptographic Security Solutions must be trained for
            this purpose by the Contractor.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.9
      description: Cryptografische beveiligingsoplossingen worden alleen toegepast
        als gebruik gemaakt wordt van Goedgekeurde Middelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Cryptographic Security Solutions must be applied only if Approved
            Means are used.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.10
      description: Er is vastgesteld aan welke overeenkomsten, wetten en voorschriften
        (zoals exportrestricties) Cryptografische beveiligingsoplossingen moeten voldoen.
        Dit is vastgelegd in het Beveiligingsplan. De Beveiligingsfunctionaris houdt
        hier toezicht op.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The agreements, laws and regulations (such as export restrictions)
            with which Cryptographic Security Solutions must comply must be established.
            This must be set out in the Security Plan. The Security Officer monitors
            this.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.11
      description: Cryptografische sleutels, apparatuur en documentatie worden tijdens
        de gehele levensduur op minimaal hetzelfde niveau beveiligd als de Te Beschermen
        Belangen die versleuteld worden met de betreffende sleutel, tenzij het inzetadvies
        anders voorschrijft.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Cryptographic keys, equipment and documentation must be secured
            throughout their lifecycle at least at the same level as the Interests
            to be Protected encrypted with the related key, unless deployment advice
            dictates otherwise.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.12
      description: Cryptografische sleutels die zijn verlopen worden niet gebruikt
        en worden vernietigd of behandeld conform het inzetadvies. Verlopen sleutels
        waarvoor geen inzetadvies beschikbaar is, worden in afstemming met NBIV vernietigd
        of behandeld.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Cryptographic keys that have expired must not be used and must
            be destroyed or dealt with in accordance with the deployment advice. Expired
            keys for which deployment advice is not available must be destroyed or
            dealt with in coordination with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.13
      description: Van alle cryptografische sleutels die zijn of worden gebruikt,
        wordt een actuele registratie bijgehouden door de Cryptobeheerder. De registratie
        is voorzien van de ontvanger, de locatie, het gebruik en de vernietiging van
        de sleutels conform de voorwaarden van de eigenaar van de sleutel.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Crypto Custodian must keep an up-to-date record of all
            cryptographic keys that have been or will be used. This record must include
            the recipient, site, use and destruction of the keys, in accordance with
            the terms and conditions of the key owner.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.14
      description: Voorafgaand aan het inladen van een nieuwe cryptografische sleutel
        worden Cryptografische beveiligingsoplossingen gecontroleerd op Compromittatie,
        zoals beschreven in de beheerdersinstructie. Denk hierbij aan het controleren
        van fysieke zegels, Logging en software validatie. Er is een registratie bijgehouden
        door de Cryptobeheerder of, indien deze niet is aangesteld, door de (Cyber-)Beveiligingsfunctionaris.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Prior to loading a new cryptographic key, Cryptographic Security
            Solutions must be checked for Compromise, as described in the administrator
            instructions. This includes checking physical seals, Logging and software
            validation. Records must be kept by the Crypto Custodian or, if not appointed,
            by the (Cyber) Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.15
      description: Een procedure is vastgesteld voor het omgaan met (mogelijk) gecompromitteerde
        Cryptografische beveiligingsoplossingen. Bij Compromittatie wordt dit direct
        gemeld bij de eigenaar van de sleutel en NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A procedure has been established for dealing with compromised
            or potentially compromised Cryptographic Security Solutions. In the event
            of a Compromise, this must immediately be reported to the owner of the
            key and NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.16
      description: Beheer van Cryptografische beveiligingsoplossingen vindt plaats
        vanuit een beheersegment zonder toegang tot externe of onvertrouwde Netwerken
        met uitzondering van bestandsversleuteling middels Goedgekeurde Middelen.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Management of Cryptographic Security Solutions must take place
            from a management segment without access to external or untrusted Networks,
            with the exception of file encryption using Approved Means.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.17
      description: Beheer van Cryptografische beveiligingsoplossingen vindt plaats
        vanuit een beheersegment dat specifiek voor dit doeleinde is ingericht conform
        het Rubriceringsniveau.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Management of Cryptographic Security Solutions must take place
            from a management segment specifically set up for this purpose, in accordance
            with the Classification Level.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.18
      description: Voor de gehele life cycle van digitale Certificaten die binnen
        de organisatie worden gebruikt voor IT-voorzieningen ten behoeve van een Bijzondere
        Opdracht is een procedure vastgesteld.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A procedure must be established for the entire life cycle of
            digital Certificates used within the organisation relating to IT facilities
            to be used for a Special Contract.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.19
      description: Een extern controleerbaar Certificaat is verstrekt door een daartoe
        gecertificeerde Leverancier (zoals WebTrust of ETSI).
      implementation_groups:
      - '4'
      translations:
        en:
          description: An externally verifiable Certificate must be provided by a
            Supplier certified to do so (such as WebTrust or ETSI).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.20
      description: Een Root Certificate Authority-sleutel is opgeslagen in een standalone
        Hardware Security Module (HSM) die voldoet aan FIPS 140-3.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A Root Certificate Authority key must be stored in a FIPS 140-3
            compliant standalone Hardware Security Module (HSM).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.21
      description: Een HSM waarop een Root Certificate Authority-sleutel is opgeslagen
        is fysiek minimaal beveiligd op het beveiligingsniveau dat geldt voor TBB
        3. Hierbij is Need-to-Know en Need-to-Be strikt toegepast.
      implementation_groups:
      - '4'
      translations:
        en:
          description: An HSM on which a Root Certificate Authority key is stored
            must be physically secured at least at the security level applicable to
            ITBP 3, strictly applying the principles of Need-to-Know and Need-to-Be.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.8.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.8
      ref_id: 4.8.22
      description: Een HSM waarop een Root Certificate Authority-sleutel is opgeslagen
        is fysiek minimaal beveiligd op het beveiligingsniveau van de Bijzondere Opdracht.
        Hierbij is Need-to-Know en Need-to-Be strikt toegepast.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An HSM on which a Root Certificate Authority key is stored
            must be physically secured at least at the Special Contract security level,
            strictly applying the principles of Need-to-Know and Need-to-Be.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.9'
      name: Fysieke- en omgevingsbeveiliging
      translations:
        en:
          name: Physical and environmental security
    - urn: urn:intuitem:risk:req_node:abro_2026:4.9.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.9
      ref_id: 4.9.1
      description: Apparatuur en bekabeling is zo geplaatst en beschermd dat risico's
        van schade en storing van buitenaf zijn teruggebracht tot een aanvaardbaar
        niveau, op basis van een Risicoanalyse.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Equipment and cabling must be positioned and protected in such
            a way that risks of external damage and interference are reduced to an
            acceptable level, based on a Risk Analysis.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.9.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.9
      ref_id: 4.9.2
      description: Ter voorkoming van geleiding en emissie dienen niet gebruikte spannings-
        of databekabeling of losse metaalgeleiders te worden verwijderd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: To prevent conduction and emission, unused voltage,data cables
            or loose metal conductors must be removed.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.9.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.9
      ref_id: 4.9.3
      description: Printers maken standaard gebruik van een 'beveiligd afdrukken'
        functie (bijvoorbeeld door middel van pincodeverificatie).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Printers must use a \u2018secure printing\u2019 function by\
            \ default (such as through PIN code authentication)."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.9.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.9
      ref_id: 4.9.4
      description: Alle Bijzondere Informatie die zich buiten het daarvoor bestemde
        fysieke Compartiment bevindt, is versleuteld door middel van Goedgekeurde
        Middelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: All Special Information located outside the designated physical
            Compartment must be encrypted using Approved Means.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.10'
      name: Kwetsbaarheden- en patchmanagement
      translations:
        en:
          name: Vulnerability and patch management
    - urn: urn:intuitem:risk:req_node:abro_2026:4.10.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.10
      ref_id: 4.10.1
      description: Een proces is ingericht voor het identificeren en Mitigeren van
        technische kwetsbaarheden. Dit omvat o.a. detectie van technische kwetsbaarheden
        (minimaal ieder kwartaal) en periodieke Penetratietests (minimaal jaarlijks).
        De resultaten hiervan worden op verzoek gedeeld met NBIV. Penetratietests
        zijn enkel van toepassing op Netwerken met een verbinding naar een ander (extern)
        Netwerk.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A process must be in place to identify and Mitigate technical
            vulnerabilities. This includes detection of technical vulnerabilities
            (at least quarterly) and periodic Penetration Tests (at least once a year).
            The results of these procedures must be shared with NOIS upon request.
            Penetration Tests must be performed only on Networks with a connection
            to another (external) Network.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.10.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.10
      ref_id: 4.10.2
      description: Een proces is ingericht om nieuwe updates en Patches tijdig te
        identificeren en door te voeren. Het doorvoeren van een update of Patch vindt
        plaats na controle.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A process must be in place to identify and implement new updates
            and Patches in a timely manner. Before an update or Patch can be implemented,
            it must first be verified.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.10.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.10
      ref_id: 4.10.3
      description: Kritieke updates en Patches worden zo spoedig mogelijk doorgevoerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Critical updates and Patches must be implemented as soon as
            possible.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.10.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.10
      ref_id: 4.10.4
      description: Indien een kwetsbaarheid bekend is met een CVSS score van 4.0 of
        hoger voor een Systeem met een Externe koppeling, dan wordt de Externe koppeling
        met het Systeem in overleg met Opdrachtgever verbroken en het Systeem buiten
        gebruik gesteld tot de kwetsbaarheid gepatcht of aantoonbaar gemitigeerd is.
        Opdrachtnemer informeert NBIV hierover gedurende dit proces.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In the event of a known vulnerability with a CVSS score of
            4.0 or higher for a System with an External Connection, the External Connection
            to the System must be severed in coordination with the Contracting Authority
            and the System must be taken out of service until the vulnerability is
            patched or demonstrably mitigated. The Contractor must inform NOIS during
            this process.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.11
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.11'
      name: Wijzigingenbeheer
      translations:
        en:
          name: Change management
    - urn: urn:intuitem:risk:req_node:abro_2026:4.11.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.11
      ref_id: 4.11.1
      description: Wijzigingen aan een Te Beschermen Belang verlopen via een vastgesteld
        wijzigingsbeheerproces waarmee wijzigingen herleidbaar zijn en mogelijke negatieve
        effecten inzichtelijk gemaakt kunnen worden. Het doorvoeren van wijzigingen
        geschiedt enkel met voorafgaande goedkeuring van de (Cyber-)Beveiligingsfunctionaris.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Changes to an Interest to be Protected must be made through
            an established change management process that allows changes to be traceable
            and provides insight into possible negative effects. Changes must only
            be implemented with the prior approval of the (Cyber) Security Officer.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.11.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.11
      ref_id: 4.11.2
      description: Wijzigingen aan de configuratie van Systemen worden alleen doorgevoerd
        na aantoonbare controle en acceptatie van een andere daartoe aangewezen Geautoriseerde
        Medewerker. Van de acceptatie is een log bijgehouden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Changes to the configuration of Systems must be made only after
            demonstrable verification and acceptance by another designated Authorised
            Employee. A log must be kept of the acceptance.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.12'
      name: Onderhoud
      translations:
        en:
          name: Maintenance
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.1
      description: "Apparatuur, software en Gegevensdragers worden ge\xEFnstalleerd,\
        \ gebruikt en onderhouden conform de voorschriften van de fabrikant, voor\
        \ zover dit niet conflicteert met en past binnen het gebruik en onderhoudsplan\
        \ van Opdrachtnemer. Afwijkingen dienen gemeld te worden bij NBIV."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Equipment, software and Data Carriers must be installed, used\
            \ and maintained in accordance with the manufacturer\u2019s instructions,\
            \ insofar as this does not conflict but aligns with the Contractor\u2019\
            s use and maintenance plan. Any deviations must be reported to NOIS."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.2
      description: "Procedures (inclusief rollen en verantwoordelijkheden) voor het\
        \ beheer van de IT-voorzieningen waarin Bijzondere Informatie wordt verwerkt\
        \ (o.a. ten aanzien van back-up en herstel, afhandelen van fouten en noodprocedures)\
        \ zijn vastgesteld en beschikbaar gesteld aan Beheerders en worden minimaal\
        \ jaarlijks ge\xEBvalueerd en waar nodig aangepast."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Procedures (including roles and responsibilities) for the management
            of the IT facilities used to process Special Information (such as relating
            to backup and recovery, error handling and emergency procedures) must
            be established and made available to Administrators. Procedures must be
            evaluated at least once a year and updated where necessary.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.3
      description: Beheer op afstand van Systemen is beperkt tot situaties waarin
        dit strikt noodzakelijk is en gebeurt aan de hand van een vastgestelde procedure
        via een verbinding die enkel kan worden geactiveerd door een Geautoriseerde
        Medewerker.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Remote Administration of Systems must be limited to situations
            where it is strictly necessary and must be done using an established procedure
            and through a connection that can only be activated by an Authorised Employee.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.4
      description: Voor Onderhoud en Beheer op afstand worden enkel Goedgekeurde Middelen
        gebruikt.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Only Approved Means must be used for Maintenance and Remote
            Administration.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.5
      description: Toegang voor Onderhoud op afstand door een (Toe)leverancier gebeurt
        enkel op basis van een wijzigingsverzoek of storingsmelding met voorafgaande
        goedkeuring van de (Cyber-)Beveiligingsfunctionaris. Hiervan wordt een actuele
        registratie bijgehouden.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Suppliers must only be granted access for Remote Maintenance
            on the basis of a change request or fault report with prior approval of
            the (Cyber) Security Officer. An up-to-date record must be kept of this.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.6
      description: Onderhoud en beheer op afstand van Systemen is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Remote Maintenance and Administration of Systems is not permitted.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.7
      description: Onderhoud aan Netwerkapparatuur of apparatuur waarvan de datadrager
        niet te verwijderen is, vindt uitsluitend plaats op locatie van Opdrachtnemer
        met toepassing van door NBIV goedgekeurde procedures. De procedures ten aanzien
        van onderhoud zijn als bijlage opgenomen in het Beveiligingsplan.
      implementation_groups:
      - '4'
      translations:
        en:
          description: "Maintenance of Network Devices or equipment from which the\
            \ Data Carrier is not removable must only take place on the Contractor\u2019\
            s site using procedures approved by NOIS. The procedures regarding maintenance\
            \ must be included as an appendix in the Security Plan."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.12.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.12
      ref_id: 4.12.8
      description: Onderhoud aan apparatuur vindt uitsluitend plaats op locatie van
        Opdrachtnemer met toepassing van door NBIV goedgekeurde procedures. De procedures
        ten aanzien van onderhoud zijn als bijlage opgenomen in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "Maintenance of equipment must exclusively take place on the\
            \ Contractor\u2019s site, using procedures approved by NOIS. The procedures\
            \ regarding maintenance must be set out in an appendix to the Security\
            \ Plan."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.13'
      name: Monitoring en logging
      translations:
        en:
          name: Monitoring and logging
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.1
      description: Systeem- en gebruikersactiviteiten worden minimaal gelogd conform
        de richtlijnen van de JSCU Logging-essentials. Op basis van een Risicoanalyse
        is vastgesteld welke aanvullende Logging noodzakelijk is. Deze logbestanden
        zijn minimaal 6 maanden beschikbaar.
      implementation_groups:
      - '4'
      translations:
        en:
          description: System and User activities must at least be logged in accordance
            with the JSCU Logging Essentials guidelines. Any additional Logging required
            must be determined on the basis of a Risk Analysis. These log files must
            be available for a minimum of six months.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.2
      description: Systeem- en gebruikersactiviteiten worden minimaal gelogd conform
        de richtlijnen van de JSCU Logging-essentials. Op basis van een Risicoanalyse
        is vastgesteld welke aanvullende Logging noodzakelijk is. Deze logbestanden
        zijn minimaal 12 maanden beschikbaar.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: System and User activities must at least be logged in accordance
            with the JSCU Logging Essentials guidelines. Any additional Logging required
            must be determined on the basis of a Risk Analysis. These log files must
            be available for a minimum of 12 months.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.3
      description: Activiteiten van Gebruikers binnen Systemen zijn herleidbaar tot
        een individu.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Activities of Users within Systems must be traceable to individuals.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.4
      description: "Er zijn maatregelen getroffen (zoals IDS, Intrusion Prevention\
        \ System (IPS) en Security Information & Event Management (SIEM)) om afwijkingen\
        \ van het normbeeld (anomalies) en ongebruikelijke creaties, aanwezigheid\
        \ en/of be\xEBindiging van processen te detecteren en te onderzoeken op dreigingen."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Measures must be in place (such as IDS, Intrusion Prevention
            System (IPS) and Security Information & Event Management (SIEM)) to detect
            and investigate deviations from the baseline (anomalies) and unusual creations,
            presence and/or termination of processes for threats.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.5
      description: Op basis van vastgestelde drempelwaardes of use cases voor (gelogde)
        systeemactiviteiten wordt automatisch gealarmeerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Automatic alerts must be triggered on the basis of defined
            threshold values or use cases for logged system activities.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.6
      description: De capaciteit en Beschikbaarheid van een logserver wordt gemonitord,
        waarbij overschrijding van een grenswaarde leidt tot automatische alarmering.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The capacity and availability of a log server must be monitored,
            including automatic alerting whenever a threshold value is exceeded.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.7
      description: Logbestanden worden alleen geraadpleegd door een daartoe geautoriseerde
        Gebruiker. De toegang is beperkt tot leesrechten.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Log files must only be accessed by Authorised Users. Access
            must be limited to read-only access.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.8
      description: Logbestanden zijn zodanig beschermd dat deze niet aangepast of
        gemanipuleerd kunnen worden. Het (automatisch) overschrijven of verwijderen
        van logbestanden wordt gelogd in een nieuw aangelegde log.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: System and User activities must at least be logged in accordance
            with the JSCU Logging Essentials guidelines. Any additional Logging required
            must be determined on the basis of a Risk Analysis. These log files must
            be available for a minimum of six months.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.9
      description: Loggegevens over een (vermoed) Beveiligingsincident worden zolang
        als nodig voor het onderzoek en de afhandeling van het Beveiligingsincident
        bewaard en op verzoek verstrekt aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Log data about a suspected or actual Security Incident must
            be retained for as long as necessary for investigating and handling the
            Security Incident and must be provided to NOIS upon request.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.13.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.13
      ref_id: 4.13.10
      description: Loggegevens waaruit Bijzondere Informatie of informatie over het
        Te Beschermen Belang is af te leiden, zijn beveiligd op hetzelfde beveiligingsniveau
        als het Te Beschermen Belang waarop zij betrekking hebben.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Log data from which Special Information or information about
            the Interest to be Protected can be derived must be secured at the same
            security level as the Interest to be Protected to which they relate.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.14'
      name: "Bedrijfscontinu\xEFteit en herstel"
      translations:
        en:
          name: Business continuity and recovery
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.1
      description: Technische en procedurele maatregelen zijn getroffen en opgenomen
        in het Beveiligingsplan om het contractueel overeengekomen niveau van Beschikbaarheid
        (RTO en RPO) te waarborgen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Technical and procedural measures must be in place and must
            be included in the Security Plan to ensure the contractually agreed level
            of Availability (RTO and RPO).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.2
      description: Er zijn voorzieningen ingesteld om voortdurend de Beschikbaarheid
        van de componenten die betrokken zijn bij de verwerking en opslag van Bijzondere
        Informatie te monitoren. Op basis van voorspellende analyses van het gebruik
        worden tijdig maatregelen genomen om de capaciteit indien nodig uit te breiden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Provisions must be in place to continuously monitor the Availability
            of the components involved in processing and storing Special Information.
            Based on predictive analytics of usage, timely measures must be taken
            to expand capacity if required.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.3
      description: Er zijn beperkingen opgelegd aan Gebruikers en Systemen ten aanzien
        van het gebruik van gemeenschappelijke Middelen, zodat een enkele Gebruiker
        (of Systeem) de Beschikbaarheid van Systemen voor andere Gebruikers (of Systemen)
        niet in gevaar kan brengen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Restrictions must be imposed on Users and Systems regarding
            the use of common Means, so that a single User (or System) cannot compromise
            the Availability of Systems for other Users (or Systems).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.4
      description: Procedures voor back-up van Bijzondere Informatie en voor herinrichting
        en foutherstel van verwerkingen (recovery) zijn gedocumenteerd en worden minimaal
        elke 6 maanden getest. Deze procedures zijn gebaseerd op het soort gegevens
        (bestanden, databases, enz.), de maximaal toegestane periode waarover gegevens
        verloren mogen raken (RPO) en de maximaal toelaatbare hersteltijd (RTO).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Procedures for backup of Special Information and for recovery
            of processing must be documented and tested at least every 6 months. These
            procedures must be based on the type of data (files, databases, etc.),
            the maximum permissible period over which data may be lost (RPO) and the
            maximum permissible recovery time (RTO).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.5
      description: Back-upactiviteiten en de locatie van Gegevensdragers waarop de
        back-ups staan worden geregistreerd en beschreven in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Security Plan must include and describe backup activities
            and the site of the Data Carriers on which the backups are stored.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.6
      description: Back-ups worden bewaard op een locatie die zodanig is gekozen dat
        een Beveiligingsincident op de oorspronkelijke locatie niet leidt tot schade
        aan de back-ups.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Backups must be kept in a site selected so as to prevent a
            Security Incident at the original site from causing damage to the backup.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.7
      description: "Back-ups worden minimaal 1 jaar en maximaal voor de duur van de\
        \ Bijzondere Opdracht bewaard. Bij be\xEBindiging van de Bijzondere Opdracht\
        \ worden deze vernietigd middels een door NBIV goedgekeurde procedure. Een\
        \ bevestiging van vernietiging wordt opgesteld, gedeeld met NBIV en gearchiveerd\
        \ conform formulier 'Bevestiging van vernietiging'."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Backups must be retained for a minimum of 1 year and a maximum\
            \ equalling the term of the Special Contract. Upon termination of the\
            \ Special Contract, they must be destroyed using a procedure approved\
            \ by NOIS. A confirmation of destruction must be prepared, shared with\
            \ NOIS and archived, in accordance with the \u2018Confirmation of Destruction\u2019\
            \ form."
    - urn: urn:intuitem:risk:req_node:abro_2026:4.14.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.14
      ref_id: 4.14.8
      description: Back-ups worden behandeld conform hetzelfde beveiligingsniveau
        als het Systeem waarop de originele data staat.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Backups must be handled according to the same security level
            as the System on which the original data resides.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4
      ref_id: '4.15'
      name: Ontwikkeling en acquisitie
      translations:
        en:
          name: Development and acquisition
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.1
      description: 'Het (laten) ontwikkelen van software verloopt via een gedocumenteerde
        Secure Software Development Life Cycle (SSDLC) methodiek waarbij:'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Software development (or commissioning) must be done through
            a documented Secure Software Development Life Cycle (SSDLC) methodology,
            in which:'
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.2
      description: "Ontwikkel-, Test-, Acceptatie- en Productieomgevingen zijn logisch\
        \ gescheiden. De Systemen en applicaties in deze omgevingen be\xEFnvloeden\
        \ Systemen en applicaties in andere omgevingen niet."
      implementation_groups:
      - '4'
      translations:
        en:
          description: Development-, Test-, Acceptance- and Production environments
            must be logically separated. Systems and applications in these environments
            must not affect Systems and applications in other environments.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.3
      description: "Ontwikkel-, Test- en Acceptatieomgevingen zijn fysiek gescheiden\
        \ van Productieomgevingen. De Systemen en applicaties in deze omgevingen be\xEF\
        nvloeden Systemen en applicaties in andere omgevingen niet."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Development-, Test- and Acceptance environments must be physically
            separate from Production environments. Systems and applications in these
            environments must not affect Systems and applications in other environments.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.4
      description: Ontwikkel-, Test-, Acceptatie- en Productieomgevingen worden op
        hetzelfde Rubriceringsniveau beveiligd als de Bijzondere Informatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Development-, Test-, Acceptance- and Production environments
            must be secured at the same Classification Level as the Special Information.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.5
      description: Gebruikers hebben gescheiden Gebruiksaccounts voor Ontwikkel-,
        Test-, Acceptatie- en Productiesystemen om het risico van fouten te verminderen.
        Het moet duidelijk zichtbaar zijn in welk Systeem gewerkt wordt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Users must have separate User Accounts for Development-, Test-,
            Acceptance- and Production Systems to reduce the risk of errors. It must
            be clearly visible in which System Users are working.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.6
      description: Digitale experimenteer- of laboratoriumomgevingen zijn fysiek gescheiden
        van de andere omgevingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Digital experimental or laboratory environments must be physically
            separated from other environments.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.7
      description: Overdracht tussen Ontwikkel-, Test-, Acceptatie- en Productieomgeving
        vindt plaats conform een vastgestelde procedure. Deze procedure is door NBIV
        goedgekeurd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Transfers between Development-, Test-, Acceptance- and Production
            environments must be made in compliance with an established procedure.
            This procedure must be approved by NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.8
      description: "Software wordt pas ge\xEFnstalleerd op een Productieomgeving nadat\
        \ een formele test- en acceptatieprocedure is doorlopen."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Software must not be installed on a Production environment
            until a formal testing and acceptance procedure has been completed.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.9
      description: Van acceptatietesten wordt een log bijgehouden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A log must be kept of acceptance tests.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.10
      description: "Software wordt pas ge\xEFnstalleerd op een Productieomgeving als\
        \ er een rollbackstrategie is geformuleerd en getest."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Software must not be installed on a Production environment
            until a rollback strategy has been formulated and tested.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.11
      description: Binnenkomende software (zowel op fysieke media als gedownload)
        is gecontroleerd op ongeautoriseerde wijzigingen (integriteitscontrole) aan
        de hand van een door de (Toe)leverancier via een gescheiden kanaal geleverde
        checksum, Certificaat of Software Bill of Materials (SBOM).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Incoming software (both on physical media and downloaded) must
            be checked for unauthorised changes (integrity check) using a checksum,
            Certificate or Software Bill of Materials (SBOM) provided by the Supplier
            through a separate channel.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.12
      description: In de ontwerpfase van projecten als onderdeel van de Bijzondere
        Opdracht worden Risicoanalyses uitgevoerd en worden maatregelen gedefinieerd.
        Ook bij wijzigingen in het projectontwerp worden beveiligingsconsequenties
        meegenomen en gedocumenteerd. Jaarlijks en bij wijzigingen wordt gecontroleerd
        of de beveiligingsrisico's en maatregelen nog actueel zijn.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In the design phase of projects as part of the Special Contract,
            Risk Analyses must be performed and measures must be defined. In the event
            of changes to the project design, security implications must also be taken
            into account and documented. Each year and whenever changes are made,
            it must be checked whether the security risks are still current and the
            measures up to date.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.13
      description: De invoer van gegevens wordt minimaal gecontroleerd op grenswaarden,
        ongeldige tekens, onvolledigheid, format en inconsistentie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: At the very least data entry must be checked for threshold
            values, invalid characters, incompleteness, format and inconsistency.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.14
      description: Het Systeem bevat functies waarmee kan worden vastgesteld of gegevens
        correct (juist en volledig) verwerkt zijn.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The System must include functions that can be used to determine
            whether data has been processed correctly (accurately and completely).
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.15
      description: Het Systeem bevat een geautomatiseerde controle op transactie-
        en verwerkingsfouten waarmee vastgesteld kan worden of gegevens juist en volledig
        verwerkt zijn.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The System must include an automated transactional and processing
            error check that determines whether data have been processed correctly
            and completely.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.16
      description: De uitvoerfuncties van programma's maken het mogelijk om de volledigheid
        en juistheid van de gegevens te kunnen vaststellen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The output functions of programmes must make it possible to
            determine the completeness and correctness of data.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.17
      description: De beveiliging van Systemen wordt getest aan de hand van tevoren
        vastgestelde acceptatiecriteria.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Systems security must be tested against predetermined acceptance
            criteria.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.18
      description: Testgegevens en testaccounts worden verwijderd voordat Systemen
        en/of componenten in productie worden genomen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Test data and test accounts must be deleted before Systems
            and/ or components are put into production.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.19
      description: "Acceptatie van Systemen of software vindt plaats nadat vastgesteld\
        \ is dat de ABRO 2026 eisen zijn ge\xEFmplementeerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Acceptance of Systems or software must take place after implementation
            of the ABRO 2026 requirements has been established.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.20
      description: Bij het gebruik van Externe Code Libraries in het kader van de
        Bijzondere Opdracht heeft Opdrachtnemer de kwaliteit en integriteit onafhankelijk
        geverifieerd en de rapportage hiervan gedeeld met Opdrachtgever. Een Software
        Bill of Materials wordt op verzoek verstrekt aan NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When using External Code Libraries as part of the Special Contract,
            the Contractor must independently verify the quality and integrity and
            must share the related report with the Contracting Authority. A SBOM must
            be provided to NOIS upon request.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.21
      description: Er zijn maatregelen getroffen om de Broncode welke is ontwikkeld
        of wordt gebruikt in het kader van de Bijzondere Opdracht, tegen onbedoelde
        wijzigingen te beschermen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Measures must be taken to protect the Source Code developed
            or used as part of the Special Contract from unintended changes.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.22
      description: Alleen Geautoriseerde medewerkers hebben toegang tot de Broncode,
        wanneer deze is ontwikkeld of specifiek wordt gebruikt in het kader van een
        Bijzondere Opdracht.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When Source Code is developed or used specifically as part
            of a Special Contract, only Authorised Employees must have access to it.
    - urn: urn:intuitem:risk:req_node:abro_2026:4.15.23
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:4.15
      ref_id: 4.15.23
      description: Broncode ontwikkeld ten behoeve van de Bijzondere Opdracht wordt
        nooit opgeslagen door middel van een Cloudoplossing.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Source Code developed for the purpose of the Special Contract
            must never be stored through a Cloud Solution.
    - urn: urn:intuitem:risk:req_node:abro_2026:5
      assessable: false
      depth: 1
      ref_id: '5'
      name: 'Hoofdstuk 5: Cloud'
      translations:
        en:
          name: 'Chapter 5: Cloud'
    - urn: urn:intuitem:risk:req_node:abro_2026:5.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5
      ref_id: '5.1'
      name: Algemeen
      translations:
        en:
          name: General
    - urn: urn:intuitem:risk:req_node:abro_2026:5.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.1
      ref_id: 5.1.1
      description: Het gebruik van een Public Cloud-dienst (computing, opslag, transport)
        is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The use of a Public Cloud Service (computing, storage, transport)
            is not permitted.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.1
      ref_id: 5.1.2
      description: Het gebruik van een Public Cloud-dienst (computing, opslag, transport)
        voor Bijzondere Informatie van de NAVO, EU of ESA is niet toegestaan zonder
        voorafgaande goedkeuring van NBIV.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The use of a Public Cloud Service (computing, storage, transport)
            for Special Information from NATO, EU or ESA is not permitted without
            prior approval from NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.1
      ref_id: 5.1.3
      description: CSP is niet gelieerd aan, niet gevestigd in, noch voert beheerwerkzaamheden
        uit in een land dat een Offensief cyberprogramma tegen Nederlandse belangen
        heeft.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The CSP must neither be affiliated with, nor based in, nor
            carry out management activities in any country with an Offensive Cyber
            Programme against Dutch interests.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.1
      ref_id: 5.1.4
      description: Data van Opdrachtgever (inclusief Metadata en telemetrie) blijven
        at-rest, in-transit en in-use binnen Nederland of, indien goedgekeurd door
        Opdrachtgever, het grondgebied van de Europese Economische Ruimte (EER).
      implementation_groups:
      - '4'
      translations:
        en:
          description: "The Contracting Authority\u2019s data (including Metadata\
            \ and telemetry) must remain at-rest, in-transit and in use within the\
            \ Netherlands or, if approved by the Contracting Authority, the territory\
            \ of the European Economic Area (EEA)."
    - urn: urn:intuitem:risk:req_node:abro_2026:5.1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.1
      ref_id: 5.1.5
      description: Beheer en onderhoud van de Cloud-dienst en -infrastructuur in het
        kader van de Bijzondere Opdracht vindt plaats binnen het grondgebied van de
        EER.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Management and maintenance of the Cloud Service and infrastructure
            as part of the Special Contract must take place within the territory of
            the EEA.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.1
      ref_id: 5.1.6
      description: Opdrachtnemer voldoet aan de voor Cloud-diensten relevante eisen
        uit ABRO 2026 hoofdstuk 3 en 4 zoals vermeld in bijlage 11.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The Contractor must meet the requirements relevant to Cloud
            Services as stipulated in ABRO 2026 Chapters 3 and 4, as referred to in
            appendix 11.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5
      ref_id: '5.2'
      name: Governance
      translations:
        en:
          name: Governance
    - urn: urn:intuitem:risk:req_node:abro_2026:5.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.2
      ref_id: 5.2.1
      description: Opdrachtnemer heeft een Risicoanalyse uitgevoerd op het gebruik
        van de Cloud-dienst op basis van de resultaten van de door Opdrachtgever uitgevoerde
        Risicoanalyse en relevante dreigingen inclusief statelijke actoren. Deze Risicoanalyse
        is in afstemming met NBIV goedgekeurd door Opdrachtgever en opgenomen in het
        Beveiligingsplan.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The Contractor must carry out a Risk Analysis relating to the
            use of the Cloud Service based on the results of the Risk Analysis carried
            out by the Contracting Authority and based on relevant threats, including
            state actors. This Risk Analysis must be approved by the Contracting Authority
            in coordination with NOIS and included in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.2
      ref_id: 5.2.2
      description: CSP beschikt gedurende de gehele contractperiode over een SOC2
        type 2 verklaring op basis van alle trusted services criteria of een door
        NBIV als gelijkwaardig beoordeelde Assuranceverklaring, voor de volledige
        scope van de werkzaamheden. Deze verklaring is verstrekt aan NBIV.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Throughout the contract period, the CSP must have a SOC2 type
            2 report based on all trusted services criteria, or an Assurance Report
            that NOIS assesses to be equivalent, for the full scope of activities.
            This statement must be provided to NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.2
      ref_id: 5.2.3
      description: "CSP heeft op basis van de meest recente CSA Cloud Control Matrix\
        \ (CCM) maatregelen ge\xEFmplementeerd en kan opzet, bestaan en werking aantonen,\
        \ of heeft op basis van een door Opdrachtgever goedgekeurde Risicoanalyse\
        \ onderbouwd waarom een of meerdere controls niet van toepassing zijn. Dit\
        \ is opgenomen in het Beveiligingsplan. Wijzigingen hierin worden direct gemeld\
        \ bij NBIV."
      implementation_groups:
      - '4'
      translations:
        en:
          description: Based on the latest CSA Cloud Control Matrix (CCM), the CSP
            must implement measures and must be able to demonstrate their design,
            existence and operational effectiveness, or must substantiate why one
            or more controls do not apply, based on a Risk Analysis approved by the
            Contracting Authority. This is included in the Security Plan. Any related
            changes must be reported to NOIS immediately.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.2
      ref_id: 5.2.4
      description: Wijzigingen in een voor de Bijzondere Opdracht relevante Assuranceverklaring
        of wijzigingen van maatregelen die raken aan de CSA CCM controls worden voorafgaand
        aan implementatie ter goedkeuring voorgelegd aan NBIV.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Prior to their implementation, changes to an Assurance Report
            relevant to the Special Contract or changes to measures affecting CSA
            CCM controls must be submitted to NOIS for approval.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.2
      ref_id: 5.2.5
      description: 'CSP heeft een opdracht specifiek Cloud-beveiligingshoofdstuk opgenomen
        in het Beveiligingsplan waarin is vastgelegd:'
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'The CSP must include a Contract-specific Cloud security chapter
            in the Security Plan, which sets out::'
    - urn: urn:intuitem:risk:req_node:abro_2026:5.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5
      ref_id: '5.3'
      name: Inrichten beveiligingsmaatregelen
      translations:
        en:
          name: Setting up security measures
    - urn: urn:intuitem:risk:req_node:abro_2026:5.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.3
      ref_id: 5.3.1
      description: 'CSP heeft een opdrachtspecifieke architectuur verstrekt aan NBIV
        waarin ten minste is gespecificeerd:'
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'The CSP must provide NOIS with a Contract-specific architecture
            that specifies at least:'
    - urn: urn:intuitem:risk:req_node:abro_2026:5.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.3
      ref_id: 5.3.2
      description: De verdeling van rollen en verantwoordelijkheden tussen CSP en
        Opdrachtgever voor de implementatie en uitvoering van de beveiligingsmaatregelen
        die van toepassing zijn op de Cloud-dienst zijn vastgelegd in een SLA en DAP.
        Een afschrift hiervan is opgenomen in het Beveiligingsplan.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The division of roles and responsibilities between the CSP
            and the Contracting Authority for the implementation and execution of
            the security measures applicable to the Cloud Service must be set out
            in an SLA and a DAP. A copy of each must be included in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.3
      ref_id: 5.3.3
      description: CSP heeft op basis van de Risicoanalyse, indien van toepassing,
        in afstemming met NBIV additionele Monitoring en Logging ingeregeld, gericht
        op detectie van statelijke actoren.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Based on the Risk Analysis, the CSP must set up additional
            Monitoring and Logging, where applicable, in coordination with NOIS, aimed
            at detecting state actors.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.3
      ref_id: 5.3.4
      description: CSP richt de Cloud-dienst en -infrastructuur in volgens het concept
        Secure by default.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The CSP must set up the Cloud Service and infrastructure according
            to the Secure by default concept.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5
      ref_id: '5.4'
      name: Cryptografie en sleutelbeheer
      translations:
        en:
          name: Cryptography and key management
    - urn: urn:intuitem:risk:req_node:abro_2026:5.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.4
      ref_id: 5.4.1
      description: CSP ondersteunt sleutelbeheer dat volledig wordt uitgevoerd door
        Opdrachtgever, of ondersteunt dat Opdrachtgever op basis van een met NBIV
        afgestemde Risicoanalyse een derde partij met ABRO-Verklaring kan inschakelen,
        niet zijnde de CSP.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The CSP must support key management that is performed entirely
            by the Contracting Authority, or must support that the Contracting Authority
            may engage a third party with an ABRO Declaration, other than the CSP,
            based on a Risk Analysis coordinated with NOIS.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.4
      ref_id: 5.4.2
      description: Data van Opdrachtgever at-rest en in-transit is versleuteld conform
        de meest recente markstandaarden.
      implementation_groups:
      - '4'
      translations:
        en:
          description: "The Contracting Authority\u2019s data at-rest and in-transit\
            \ must be encrypted in accordance with the latest industry standards."
    - urn: urn:intuitem:risk:req_node:abro_2026:5.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5
      ref_id: '5.5'
      name: Compliance
      translations:
        en:
          name: Compliance
    - urn: urn:intuitem:risk:req_node:abro_2026:5.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.5
      ref_id: 5.5.1
      description: CSP geeft volledige medewerking bij nalevingscontroles en onderzoeken
        in relatie tot de Bijzondere Opdracht door Opdrachtgever of NBIV, al dan niet
        uitgevoerd door een gecertificeerde derde partij.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The CSP must fully cooperate with compliance reviews and investigations
            by the Contracting Authority or NOIS related to the Special Contract,
            whether or not carried out by a certified third party.
    - urn: urn:intuitem:risk:req_node:abro_2026:5.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.5
      ref_id: 5.5.2
      description: 'CSP heeft en verstrekt procedures voor de afhandeling van onderzoeksvragen
        van overheidsinstanties die toegang tot Tenants of gegevens van Opdrachtgever
        vereisen. De procedures omvatten minimaal:'
      implementation_groups:
      - '4'
      translations:
        en:
          description: "The CSP must have and provide procedures for handling questions\
            \ from government agencies relating to investigations that require access\
            \ to Tenants or the Contracting Authority\u2019s data. At the very least\
            \ the procedures must include:"
    - urn: urn:intuitem:risk:req_node:abro_2026:5.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abro_2026:5.5
      ref_id: 5.5.3
      description: CSP heeft maatregelen getroffen en processen ingeregeld om invulling
        te geven aan de exit-strategie van Opdrachtgever en daaruit volgende bepalingen,
        zoals opgenomen in het contract met Opdrachtgever.
      implementation_groups:
      - '4'
      translations:
        en:
          description: "The CSP must have measures in place and must set up processes\
            \ to allow for execution of the Contracting Authority\u2019s exit strategy\
            \ and subsequent provisions, as included in the Contract with the Contracting\
            \ Authority."
