translations:
  en:
    name: General Security Requirements for Central Government Contracts (ABRO) 2026
    description: '## INTRODUCTION


      Geopolitical developments and events such as acts of sabotage in Europe and
      espionage by state actors stress the need to protect national security interests.
      The government-wide approach to economic security has further reinforced the
      attention for this issue. When the Central Government and the police procure
      products and/or services from a supplier, this may trigger risks to national
      security. The General Security Requirements for Central Government Contracts
      (ABRO) 2026 have been prepared to mitigate these risks.


      The Central Government and the police are in the possession of information,
      systems, equipment and objects, also known as Interests to be Protected. In
      many cases they are important to our national security and malicious parties
      must be prevented from accessing them or taking cognisance of them at all times.
      If you are a supplier for the Central Government or the police and you gain
      access to an Interest to be Protected that affects national security, it is
      important that sufficient safeguards are in place to guarantee the security
      level of the Interest to be Protected. In these cases, you must comply with
      the ABRO 2026 in your role of supplier.


      The ABRO 2026 represents the continued development of ABDO 2019, the General
      Security Requirements for Defence Contracts. With the coming into force of the
      ABRO 2026, the entire Central Government and the police subject suppliers to
      the same security requirements where contracts involving Interests to be Protected
      are concerned. Existing Defence contracts to which ABDO applies, are still subject
      to ABDO for the term of the contract. This document is a translation of the
      original Dutch ABRO 2026. In the event of any conflict or inconsistency between
      this English translation and the original Dutch text, the Dutch text shall prevail.


      ABRO 2026 is adopted to implement article 2 of the ''Kaderbesluit ABRO Rijksdienst'',
      as published in the Government Gazette in The Hague on December 3, 2025.


      Sources :

      * https://open.overheid.nl/documenten/a13699d9-fcf4-43ef-b282-ece9519e9b81/file

      * https://open.overheid.nl/documenten/8a2c1e3a-f62c-4cd6-9827-3d4ccc9162ba/file'
