ref_id: ABRO_2026
name: Algemene Beveiligingseisen voor Rijksoverheidsopdrachten (ABRO) 2026
description: '## VOORWOORD


  Geopolitieke ontwikkelingen en gebeurtenissen zoals sabotageacties in Europa en
  spionage door statelijke actoren onderstrepen de noodzaak van het beschermen van
  nationale veiligheidsbe- langen. De kabinetsbrede aanpak van economische veiligheid
  heeft deze aandacht verder versterkt. Wanneer de Rijksoverheid en politie producten
  en/of diensten inkopen bij een leverancier, kunnen risico''s voor de nationale veiligheid
  ontstaan. Om deze risico''s te beperken, zijn de Algemene Beveiligingseisen voor
  Rijksoverheidsopdrachten (ABRO) 2026 opgesteld.


  De Rijksoverheid en politie beschikken over informatie, systemen, materieel en objecten,
  ook wel Te Beschermen Belangen. In veel gevallen zijn deze van belang voor onze
  nationale veiligheid en moet te allen tijde worden voorkomen dat kwaadwillenden
  toegang krijgen of hiervan kennis kunnen nemen. U kunt als leverancier van een opdracht
  voor de Rijksoverheid of politie toegang krijgen tot een Te Beschermen Belang dat
  raakt aan de nationale veiligheid. Dan is het belangrijk dat er voldoende waarborgen
  zijn om het beveiligingsniveau van het Te Beschermen Belang te garanderen. In deze
  gevallen zult u als leverancier moeten voldoen aan de ABRO 2026.


  De ABRO 2026 is een doorontwikkeling van de ABDO 2019, de Algemene Beveiligingseisen
  voor Defensieopdrachten. Met het in werking treden van de ABRO 2026 gebruiken de
  gehele Rijksoverheid en de politie dezelfde beveiligingseisen als leveranciers worden
  ingeschakeld bij opdrachten waarbij Te Beschermen Belangen zijn betrokken. Voor
  bestaande contracten van Defensie waarop de ABDO van toepassing zijn, blijven de
  ABDO gelden voor de looptijd van het contract.


  Vastgesteld ter invulling van artikel 2 van het Kaderbesluit ABRO rijksdienst, zoals
  gepubliceerd in de Staatscourant, te Den Haag op 3 december 2025.


  Bron :

  * https://open.overheid.nl/documenten/a13699d9-fcf4-43ef-b282-ece9519e9b81/file

  * https://open.overheid.nl/documenten/8a2c1e3a-f62c-4cd6-9827-3d4ccc9162ba/file'
