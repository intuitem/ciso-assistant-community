    name: "T.C. CBDDO Bilgi ve \u0130leti\u015Fim G\xFCvenli\u011Fi Rehberi (B\u0130\
      GR)"
    description: "Rehberin temel amac\u0131; bilgi g\xFCvenli\u011Fi risklerinin azalt\u0131\
      lmas\u0131, ortadan kald\u0131r\u0131lmas\u0131 ve \xF6zellikle gizlili\u011F\
      i,\nb\xFCt\xFCnl\xFC\u011F\xFC veya eri\u015Filebilirli\u011Fi bozuldu\u011F\
      unda milli g\xFCvenli\u011Fi tehdit edebilecek veya kamu d\xFCzeninin\nbozulmas\u0131\
      na yol a\xE7abilecek kritik bilgi/verinin g\xFCvenli\u011Finin sa\u011Flanmas\u0131\
      \ i\xE7in asgari g\xFCvenlik tedbirlerinin\nbelirlenmesi ve belirlenen tedbirlerin\
      \ uygulanmas\u0131 i\xE7in y\xFCr\xFCt\xFClecek faaliyetlerin tan\u0131mlanmas\u0131\
      d\u0131r.\n\nRehber, bilgi i\u015Flem birimi bar\u0131nd\u0131ran veya bilgi\
      \ i\u015Flem hizmetlerini s\xF6zle\u015Fmeler \xE7er\xE7evesinde \xFC\xE7\xFC\
      nc\xFC\ntaraflardan alan, devlet te\u015Fkilat\u0131 i\xE7erisinde yer alan\
      \ kurum ve kurulu\u015Flar ile kritik altyap\u0131 hizmeti veren\ni\u015Fletmeleri\
      \ kapsamaktad\u0131r."
