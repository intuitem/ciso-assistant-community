      name: "Destekleyici Altyap\u0131 Hizmetleri"
      description: "Sistem odas\u0131/veri merkezine gelen elektrik enerji hatt\u0131\
        \ yedekli olmal\u0131d\u0131r. Elektrik kesintilerinde jenerat\xF6r devreye\
        \ girinceye kadar sistem odas\u0131 beslemesi UPS taraf\u0131ndan sa\u011F\
        lanmal\u0131 ve bu UPS sistemine ba\u015Fka cihazlar ba\u011Flanmamal\u0131\
        d\u0131r. UPS\u2019lerin periyodik bak\u0131m, \xF6l\xE7\xFCm ve test i\u015F\
        lemleri ger\xE7ekle\u015Ftirilmeli ve kay\u0131t alt\u0131na al\u0131nmal\u0131\
        d\u0131r. Jenerat\xF6r(lerin) periyodik bak\u0131m, \xF6l\xE7\xFCm ve test\
        \ i\u015Flemleri ger\xE7ekle\u015Ftirilmeli ve kay\u0131t alt\u0131na al\u0131\
        nmal\u0131d\u0131r. Jenerat\xF6r yak\u0131t deposu her zaman dolu ve yedekli\
        \ olmal\u0131d\u0131r. Belli periyotlarda ve uzun s\xFCreli jenerat\xF6r kullan\u0131\
        mlar\u0131nda d\xFCzenli olarak jenerat\xF6r yak\u0131t durumu kontrol edilerek\
        \ kay\u0131t alt\u0131na al\u0131nmal\u0131d\u0131r. Sistem odas\u0131/veri\
        \ merkezi destekleyici servisler aras\u0131nda yer alan UPS, jenerat\xF6r,\
        \ klima vb. olanaklar\u0131n bak\u0131mlar\u0131 \xFCreticileri taraf\u0131\
        ndan tavsiye edilen aral\u0131klarda konusunda yetkin uzmanlar taraf\u0131\
        ndan yap\u0131lmal\u0131 ve ilgili t\xFCm i\u015Flemler kay\u0131t alt\u0131\
        na al\u0131nmal\u0131d\u0131r. Veri merkezi topraklama \xF6l\xE7\xFCmleri\
        \ periyodik olarak yap\u0131lmal\u0131 ve sonu\xE7lar kay\u0131t alt\u0131\
        na al\u0131nmal\u0131d\u0131r."
