      description: DoW Components establish and update a user inventory within the
        OT environment, manually if necessary, preparing for an automated approach
        in later stages.  Privileged OT accounts will be identified. Both standard
        and privileged accounts for applications and systems with local identity stores
        will be identified for future migration and/or decommissioning.  Shared group
        accounts, must-run accounts, or service OT accounts must be identified for
        future migration to inventory and/or decommissioning.
