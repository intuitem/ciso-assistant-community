      ref_id: 1.2.1.OT
      name: Implement Authorization and Access Management for OT Environments
      description: DoW Components implement OT or Enterprise ICAM governance, or other
        authorized credentialing services, in accordance with applicable policies
        and regulations. The authorized credentialing service establishes a set of
        attributes for authentication and authorization within the OT environment.
        Attributes are integrated with the 2.1.3.OT activity process for a complete
        IdP process.  The OT credentialing service is enabled for adding and updating
        attributes for users. OT privileged access and authorization are approved  and
        tailored as specified by the roles.  For OT systems on which it is technically
        capable, any shared group, must-run, and service OT accounts  are migrated
        to proper identities or are decommissioned. Any OT systems identified that
        cannot be migrated and/or decommisioned are tracked using a risk-based metholody
        for future migration and/or decommision.
