    - urn: urn:intuitem:risk:req_node:zt_ot:1.2.2.ot
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:zt_ot:1
      ref_id: 1.2.2.OT
      name: Role Based Dynamic Access for OT Environments
      description: DoW Components develop rules, both technical and procedural, for
        remote and third-party access into the OT environment.   All users must have
        strict role-based access controls prior to access or connection into the OT
        environment.  Remote and third-party access should be limited to the account
        of least privilege required to perform work. OT privileged accounts required
        for operations are accessed through the Authorized Credentialing Service.   Identify
        high-privileged accounts and require these use dynamic access control.
