objects:
  framework:
    urn: urn:intuitem:risk:framework:zt_ot
    ref_id: DOW_ZT_OT
    name: Zero Trust for Operational Technology Activities and Outcomes (ZT OT)
    description: 'This guidance provides a revised set of Activities and Outcomes
      to facilitate current and future adoption of ZT principles in OT environments,
      accounting for the distinct differences between Information Technology (IT)
      and OT practices.

      The ZT for OT Activities and Outcomes are aligned to the ZT for Enterprise IT
      Activities and Outcomes to facilitate interoperability and alignment between
      the two.


      This guidance is focused on DoW owned OT environments and control systems up
      to and including the point of demarcation, encompassing facility related control
      systems, power grids, water treatment facilities, security and life safety systems,
      energy management systems, transportation networks, logistics handling, and
      manufacturing control systems.'
    min_score: 0
    max_score: 105
    implementation_groups_definition:
    - ref_id: Target
      name: Target
      description: Target Level ZT is the minimum set of ZT capability outcomes and
        activities necessary to secure and protect the Department's Data, Applications,
        Assets, and Services (DAAS) to manage risks from currently known threats.
    - ref_id: Advanced
      name: Advanced
      description: Advanced Level ZT capabilities include the complete set of identified
        ZT capability outcomes and activities that enable adaptive responses to cybersecurity
        risk and threats and offer the highest level of protection.
    requirement_nodes:
