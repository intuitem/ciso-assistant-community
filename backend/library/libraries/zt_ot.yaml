urn: urn:intuitem:risk:library:zt_ot
locale: en
ref_id: DOW_ZT_OT
name: Zero Trust for Operational Technology Activities and Outcomes (ZT OT)
description: "The Department of War (DoW) Chief Information Officer (CIO) established\
  \ the Zero Trust (ZT) Portfolio Management Office (PfMO) to coordinate, synchronize,\
  \ and accelerate adoption of ZT architecture and cybersecurity framework across\
  \ the DoW enterprise.\nThe ZT security model transitions away from trusted networks,\
  \ actors, and devices to an environment with continuous authentication and fine-grained\
  \ policy enforcement.\nIn July 2025, the Department issued DTM 25-003, \u201CImplementing\
  \ the DoD Zero Trust Strategy,\u201D which directs DoW Components to achieve, at\
  \ minimum, Target Level ZT across all unclassified and classified systems (including\
  \ national security systems) and control systems/Operational Technology (OT).\n\
  https://dodcio.defense.gov/Portals/0/Documents/Library/ZT-OperationalTechnologyActivitiesOutcomes.pdf"
copyright: Department of War (DoW), Nov 18, 2025
version: 1
publication_date: 2026-05-05
provider: The Department of War (DoW) Chief Information Officer (CIO)
packager: celalunalp
labels:
- ZT
