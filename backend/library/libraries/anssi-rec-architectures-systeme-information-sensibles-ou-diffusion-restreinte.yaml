ref_id: ANSSI-rec-architectures-Systeme-Information-sensibles-ou-Diffusion-Restreinte
name: "ANSSI - Recommandations pour les architectures des Syst\xE8mes d'Information\
  \ (SI) sensibles ou Diffusion Restreinte (DR) - v1.2"
description: "L'instruction interminist\xE9rielle n\xB0 901/SGDSN/ANSSI (II 901) du\
  \ 28 janvier 2015 d\xE9finit les objectifs et les mesures de s\xE9curit\xE9 minimales\
  \ relatifs \xE0 la protection des informations sensibles, notamment celles relevant\
  \ du niveau Diffusion Restreinte (DR).\n\nL'II 901 s'applique :\n* aux administrations\
  \ de l'\xC9tat[1] qui mettent en oeuvre des syst\xE8mes d'information sensibles\
  \ ;\n* aux entit\xE9s publiques ou priv\xE9es soumises \xE0 la r\xE9glementation\
  \ relative \xE0 la protection du potentiel scientifique et technique de la nation\
  \ (PPST) qui mettent en oeuvre des syst\xE8mes d'information sensibles ;\n* \xE0\
  \ toute autre entit\xE9 publique ou priv\xE9e qui met en oeuvre des syst\xE8mes\
  \ d'information Diffusion Restreinte.\n\nLes recommandations du pr\xE9sent guide\
  \ sont destin\xE9es en premier lieu \xE0 ces diff\xE9rentes entit\xE9s, pour lesquelles\
  \ l'II 901 s'applique pleinement. L'II 901 ayant valeur de recommandation pour toute\
  \ autre entit\xE9 publique ou priv\xE9e qui met en oeuvre des syst\xE8mes d'informations\
  \ sensibles, ces bonnes pratiques pourront \xEAtre utilement d\xE9clin\xE9es sur\
  \ tous les types SI sensibles (p.ex. SI h\xE9bergeant des informations prot\xE9\
  g\xE9es au titre du secret des affaires, SI h\xE9bergeant des informations couvertes\
  \ par le secret professionnel, etc.). Le pr\xE9sent guide a \xE9t\xE9 con\xE7u comme\
  \ un outil destin\xE9 \xE0 aider une entit\xE9 \xE0 mettre en oeuvre une architecture\
  \ de SI conforme \xE0 l'II 901. **Attention toutefois car certains champs de l'II\
  \ 901 ne sont volontairement pas trait\xE9s dans ce guide[2].** Cette version du\
  \ guide n'aborde pas la probl\xE9matique de protection des donn\xE9es sensibles\
  \ ou DR lorsqu'elles sont h\xE9berg\xE9es dans un cloud.\n\nLe guide est accompagn\xE9\
  \ d'un outil d'aide et de suivi d'impl\xE9mentation de la s\xE9curit\xE9 (OASIS)\
  \ sous forme de tableur. Ce document aide les entit\xE9s \xE0 donner des priorit\xE9\
  s aux recommandations, \xE0 les classer selon une approche graduelle, puis \xE0\
  \ faire le suivi de leur mise en \u0153uvre. Chaque entit\xE9 peut adapter cette\
  \ approche \xE0 ses enjeux, moyens, comp\xE9tences et SI existants. Pens\xE9 lui-aussi\
  \ comme un outil, ce fichier tableur a pour vocation de fournir aux personnes en\
  \ charge de la mise en oeuvre et de l'homologation d'un SI sensible un moyen concret\
  \ et simple de :\n1. distinguer les mesures de s\xE9curit\xE9 r\xE9glementairement\
  \ impos\xE9es de celles qui rel\xE8vent des bonnes pratiques ;\n2. justifier des\
  \ \xE9carts si certaines mesures ne sont pas retenues ou doivent \xEAtre adapt\xE9\
  es au contexte de l'entit\xE9 ;\n3. \xE9valuer le niveau de mise en oeuvre r\xE9\
  el des exigences r\xE9glementaires retenues.\n\n[1] Les administrations de l'\xC9\
  tat au sens de l'II 901 sont les administrations centrales, les \xE9tablissements\
  \ publics nationaux, les services d\xE9concentr\xE9s de l'\xC9tat et les autorit\xE9\
  s administratives ind\xE9pendantes.\n[2] Les champs non trait\xE9s sont par exemple\
  \ la s\xE9curit\xE9 physique et environnementale, la s\xE9curit\xE9 li\xE9e aux\
  \ d\xE9veloppements informatiques. En cons\xE9quence, il n'est pas suffisant qu'un\
  \ SI soit conforme aux recommandations de ce guide pour attester de sa conformit\xE9\
  \ \xE0 l'ensemble des exigences r\xE9glementaires II 901. Un travail compl\xE9mentaire\
  \ est n\xE9cessaire pour s'assurer de la conformit\xE9 exhaustive du SI consid\xE9\
  r\xE9, si un niveau d'homologation sensible ou DR est vis\xE9.\n\nSource : https://messervices.cyber.gouv.fr/guides/recommandations-pour-les-architectures-des-si-sensibles-ou-dr"
