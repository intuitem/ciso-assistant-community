      \ r\xE9glementairement impos\xE9es de celles qui rel\xE8vent des bonnes pratiques\
      \ ;\n2. justifier des \xE9carts si certaines mesures ne sont pas retenues ou\
      \ doivent \xEAtre adapt\xE9es au contexte de l'entit\xE9 ;\n3. \xE9valuer le\
      \ niveau de mise en oeuvre r\xE9el des exigences r\xE9glementaires retenues.\n\
      \n[1] Les administrations de l'\xC9tat au sens de l'II 901 sont les administrations\
      \ centrales, les \xE9tablissements publics nationaux, les services d\xE9concentr\xE9\
      s de l'\xC9tat et les autorit\xE9s administratives ind\xE9pendantes.\n[2] Les\
      \ champs non trait\xE9s sont par exemple la s\xE9curit\xE9 physique et environnementale,\
      \ la s\xE9curit\xE9 li\xE9e aux d\xE9veloppements informatiques. En cons\xE9\
      quence, il n'est pas suffisant qu'un SI soit conforme aux recommandations de\
      \ ce guide pour attester de sa conformit\xE9 \xE0 l'ensemble des exigences r\xE9\
      glementaires II 901. Un travail compl\xE9mentaire est n\xE9cessaire pour s'assurer\
      \ de la conformit\xE9 exhaustive du SI consid\xE9r\xE9, si un niveau d'homologation\
