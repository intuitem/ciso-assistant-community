      \ valeur de recommandation pour toute autre entit\xE9 publique ou priv\xE9e\
      \ qui met en oeuvre des syst\xE8mes d'informations sensibles, ces bonnes pratiques\
      \ pourront \xEAtre utilement d\xE9clin\xE9es sur tous les types SI sensibles\
      \ (p.ex. SI h\xE9bergeant des informations prot\xE9g\xE9es au titre du secret\
      \ des affaires, SI h\xE9bergeant des informations couvertes par le secret professionnel,\
      \ etc.). Le pr\xE9sent guide a \xE9t\xE9 con\xE7u comme un outil destin\xE9\
      \ \xE0 aider une entit\xE9 \xE0 mettre en oeuvre une architecture de SI conforme\
      \ \xE0 l'II 901. **Attention toutefois car certains champs de l'II 901 ne sont\
      \ volontairement pas trait\xE9s dans ce guide[2].** Cette version du guide n'aborde\
      \ pas la probl\xE9matique de protection des donn\xE9es sensibles ou DR lorsqu'elles\
      \ sont h\xE9berg\xE9es dans un cloud.\n\nLe guide est accompagn\xE9 d'un outil\
      \ d'aide et de suivi d'impl\xE9mentation de la s\xE9curit\xE9 (OASIS) sous forme\
