locale: en
ref_id: mapping-ncsc-caf-3.2-and-ncsc-caf-4.0
name: NCSC CAF v3.2 <-> NCSC CAF v4.0
description: |-
  Mapping between the NCSC Cyber Assessment Framework (CAF) version 3.2 and version 4.0. The mapping operates at the level of Indicators of Good Practice (IGPs). Coverage is 100% of CAF v3.2 IGPs (184/184) — most align 1:1, with notable restructuring in Objective C (detection) and several new principles in v4.0 (A2.b Understanding Threat, A4.b Secure Software Development and Support, C1.f Understanding User's and System's Behaviour, C2.a Threat Hunting).
