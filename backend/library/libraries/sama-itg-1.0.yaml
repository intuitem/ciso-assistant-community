      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      ref_id: 3.4.10-7
      description: All IT projects should be assessed for the risks that could impact
        the scope, timeline and quality of the projects. Any identified risks should
        be mitigated and monitored throughout the project lifecycle.
