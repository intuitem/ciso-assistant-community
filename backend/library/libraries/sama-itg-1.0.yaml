      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      ref_id: 3.4.10-6
      description: IT project steering committee should be established having representation
        from relevant business and technical teams to oversee plan, progress and risks
        associated with the IT projects.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10-7
      assessable: true
