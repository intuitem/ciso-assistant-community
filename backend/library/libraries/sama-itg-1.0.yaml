urn: urn:intuitem:risk:library:sama-itg-1.0
locale: en
ref_id: SAMA-ITG-1.0
name: SAMA IT Governance Framework
description: 'SAMA IT Governance Framework, issued by the Saudi Central Bank (SAMA)
  for its Member Organizations (banks, insurance and finance companies, and payment
  service providers). It defines the IT governance control domains, subdomains, principles
  and control requirements to identify and address IT-related risks. 4 control domains
  / 35 subdomains / 240 control requirements. Reference: https://rulebook.sama.gov.sa'
copyright: "\xA9 SAMA"
version: 1
publication_date: 2026-06-22
provider: SAMA
packager: community
objects:
  framework:
    urn: urn:intuitem:risk:framework:sama-itg-1.0
    ref_id: SAMA-ITG-1.0
    name: SAMA IT Governance Framework
    description: SAMA IT Governance Framework. 4 control domains, 35 subdomains, 240
      control requirements.
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      assessable: false
      depth: 1
      ref_id: '3.1'
      name: Information Technology Governance and Leadership
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.1
      name: Information Technology Governance
      description: An IT Governance structure should be defined, endorsed and supported
        with appropriate resources to oversee and control the Member Organization's
        overall approach to Information Technology.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-1
      description: Member organizations should establish ITSC and be mandated by the
        board.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-2
      description: The ITSC should be headed by senior manager responsible for Member
        Organizations operations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-3
      description: 'The following positions should be represented in the ITSC: (a)
        senior managers from all relevant departments (e.g., CRO, CISO, compliance
        officer, heads of relevant business departments); (b) Chief Information Officer
        (CIO); and (c) Internal Audit may attend as an "observer".'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-4
      description: 'An ITSC charter should be developed, approved and reflect the
        following: (a) committee objectives; (b) roles and responsibilities; (c) minimum
        number of meeting participants; (d) meeting frequency (minimum on quarterly
        basis); and (e) documentation and retention of meeting minutes and decisions.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-5
      description: A full-time senior manager for the IT function, referred to as
        CIO, should be appointed at senior management level.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-6
      description: 'The Member Organizations should: (a) ensure the CIO is a Saudi
        national; (b) ensure the CIO is sufficiently qualified; and (c) obtain a written
        no objection letter from SAMA prior to assigning the CIO.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-7
      description: The Member Organizations should establish formal practices for
        IT-related financial activities covering budget, cost, and prioritization
        of spending aligned with IT strategic objectives.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-8
      description: The overall IT budget should be monitored, reviewed periodically
        and adjusted accordingly to meet the IT and business needs.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-9
      description: Member Organizations should define roles and responsibilities of
        senior management and IT staff using a responsibility assignment matrix, also
        known as RACI. The RACI matrix should outline who are responsible and accountable
        for the functions, as well as who should be consulted or informed.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-10
      description: Member organizations should define enterprise architecture reflecting
        fundamental components of the business processes and its supporting technology
        layers to ensure responsive and efficient delivery of strategic objectives.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-11
      description: Member Organizations should define enterprise application architect
        role within the IT function to identify the required changes to the portfolio
        of applications across the member organizations ecosystem.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-12
      description: 'Roles and responsibilities within IT function should be: (a) documented
        and approved by the management; and (b) segregated to avoid conflict of interest.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1-13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.1
      ref_id: 3.1.1-13
      description: Member Organizations should develop formal IT succession plan in
        coordination with Human Resource (HR) Department taking into consideration
        the reliance on a key IT staff having critical roles and responsibilities.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.2
      name: Information Technology Strategy
      description: An IT strategy should be defined in alignment with the Member Organization's
        strategic objectives and in compliance with legal and regulatory requirements.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      ref_id: 3.1.2-1
      description: IT strategy should be defined, approved, maintained and executed.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      ref_id: 3.1.2-2
      description: 'IT strategic initiatives should be translated into defined roadmap
        considering the following: (a) the initiatives should require closing the
        gaps between current and target environments; (b) the initiatives should be
        integrated into a coherent IT strategy that aligns with the business strategy;
        (c) the initiatives should address the external ecosystem (enterprise partners,
        suppliers, start-ups, etc.); and (d) should include determining dependencies,
        overlaps, synergies and impacts among projects, and prioritization.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      ref_id: 3.1.2-3
      description: 'IT strategy should be aligned with: (a) the Member Organization''s
        overall business objectives; and (b) legal and regulatory compliance requirements
        of the Member Organization.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      ref_id: 3.1.2-4
      description: 'IT strategy at minimum should address: (a) the importance and
        benefits of IT for the Member Organization; (b) the current business and IT
        environment, the future direction, and the initiatives required to migrate
        to the future state environment; and (c) interdependencies of the critical
        information assets.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      ref_id: 3.1.2-5
      description: Member organization should identify IT strategic and emerging technology
        risks that may have impact on the achievement of overall organization wide
        strategic objectives.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      ref_id: 3.1.2-6
      description: Member organization should enhance skill sets and expertise (operational
        and technical) of the existing resources through providing periodic training
        on emerging technologies and if required to have the relevant resources on
        boarded in line with member organization direction towards digitalization.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.2
      ref_id: 3.1.2-7
      description: IT strategy should be reviewed and updated periodically or upon
        material change in the Member Organizations operational environment, change
        in business strategy, objectives or amendment in laws & regulations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.3
      name: Manage Enterprise Architecture
      description: Enterprise architecture should be defined which outlines fundamental
        components of the business processes, data and supporting technology layers
        to ensure responsive and efficient delivery of Member organizations IT strategic
        objectives.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.3-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.3
      ref_id: 3.1.3-1
      description: The enterprise architecture should be defined, approved and implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.3-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.3
      ref_id: 3.1.3-2
      description: The compliance with the enterprise architecture should be monitored.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.3-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.3
      ref_id: 3.1.3-3
      description: 'The enterprise architecture should address the following, but
        not limited to: (a) a strategic outline of organizations technology capabilities;
        (b) outline the gaps between baseline and target architectures, taking both
        business and technical perspectives; and (c) agility to meet changing business
        needs in an effective and efficient manner.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.4
      name: Information Technology Policy and Procedures
      description: IT policy and procedures should be defined, approved, communicated
        and implemented to set member organizations commitment and objectives to IT
        and communicated to the relevant stakeholders.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4
      ref_id: 3.1.4-1
      description: IT policy and procedures should be defined, approved, communicated,
        and implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4
      ref_id: 3.1.4-2
      description: IT policy and procedures should be reviewed periodically taking
        into consideration the evolving technology landscape.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4
      ref_id: 3.1.4-3
      description: IT Policy should be developed considering input from relevant member
        organizations policies (e.g. cyber security, finance, HR).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.4
      ref_id: 3.1.4-4
      description: 'IT Policy should include: (a) the Member Organization''s overall
        IT objectives and scope; (b) a statement of the board''s intent, supporting
        the IT objectives; (c) a definition of general and specific responsibilities
        for IT; and (d) the reference to supporting IT (inter)national standards and
        process (where applicable).'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.5
      name: Roles and Responsibilities
      description: IT roles and responsibilities should be defined and all parties
        involved in the Member Organization's IT processes should have an adequate
        level of understanding of the expectations related to their role.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5
      ref_id: 3.1.5-1
      description: 'The board should be accountable for: (a) the ultimate responsibility
        for the establishment of IT governance practice; (b) ensuring that robust
        IT risk management framework is established and maintained to manage IT risks;
        (c) ensuring that sufficient budget for IT is allocated; (d) approving the
        IT steering committee (ITSC) charter; and (e) endorsing (after being approved
        by the ITSC): (1) the governance and management practices roles and responsibilities;
        (2) the IT strategy; and (3) the IT policy.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5
      ref_id: 3.1.5-2
      description: 'ITSC, at a minimum, should be responsible for: (a) monitoring,
        reviewing and communicating the Member Organization''s IT risks periodically;
        (b) approving, communicating, supporting and monitoring: (1) IT strategy;
        (2) IT policies; (3) IT risk management processes; and (4) key performance
        indicators (KPIs) and key risk indicators (KRIs) for IT.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5
      ref_id: 3.1.5-3
      description: 'The CIO, at minimum, should be accountable for: (a) developing,
        implementing and maintaining: (1) IT strategy; (2) IT policy; and (3) IT budget.
        (b) ensuring that detailed IT standards and procedures are established, approved
        and implemented; (c) delivering risk-based IT solutions that address people,
        process and technology; (d) defining and maintaining specific key performance
        indicators (KPIs) and key risk indicators (KRIs) for IT process; (e) periodically
        inform ITSC on the latest developments on IT strategic initiatives and its
        implementation status; (f) implementing adequate technology to streamline
        all internal operations and help optimize their strategic benefits; (g) the
        IT activities across the Member Organization, including: (1) monitoring of
        the IT operation; (2) monitoring of compliance with IT regulations, policies,
        standards and procedures; and (3) overseeing the investigation of IT related
        incidents. (h) analyzing IT costs, value and risks to advise COO/Managing
        director; and (i) defining IT training plan in coordination with HR.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5
      ref_id: 3.1.5-4
      description: 'The internal audit function should be responsible for: (a) the
        identification of comprehensive set of auditable areas for IT risk and performance
        of effective IT risk assessment during audit planning; and (b) performing
        IT audits.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5
      ref_id: 3.1.5-5
      description: 'The enterprise application architect, at minimum should be responsible
        for: (a) developing of IT ecosystem application architecture models, processes
        and documentation; (b) developing enterprise level application and custom
        integration solutions including major enhancements and interfaces, functions
        and features; and (c) ensuring continuous improvement to transition between
        current and future states of the application architectures.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.5
      ref_id: 3.1.5-6
      description: All Member Organization's staff should be responsible for complying
        with applicable IT policy, standards and procedures.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.6
      name: Regulatory Compliance
      description: Relevant regulations including data privacy should be identified,
        communicated and complied which are affecting IT operations of the Member
        Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.6-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.6
      ref_id: 3.1.6-1
      description: 'Member Organizations should establish a process ensuring compliance
        with IT related regulatory requirements. The process of ensuring compliance
        should: (a) be performed periodically or when new regulatory requirements
        become effective; (b) involve representatives from key areas of the Member
        Organization; (c) result in the update of IT policy, standards and procedures
        to accommodate any necessary changes (if applicable); and (d) maintain an
        up-to-date log of all relevant legal, regulatory and contractual requirements;
        their impact and required actions.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.7
      name: Internal IT Audit
      description: IT Audit should be conducted in accordance with generally accepted
        auditing standards and relevant SAMA framework (s) to verify that the IT control
        design is adequately implemented and operating as intended.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-1
      description: IT audits should be performed independently and according to generally
        accepted auditing standards and relevant SAMA frameworks.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-2
      description: The Member Organizations should establish an audit cycle that determines
        the frequency of IT audits.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-3
      description: Member Organizations should develop formal IT audit plan addressing
        people, process and technology components.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-4
      description: IT audit plan should be approved by the Member Organization's audit
        committee.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-5
      description: The frequency of IT audit should be aligned with the criticality
        and risk of the IT system or process.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-6
      description: A follow-up process for IT audit observations should be established
        to track and monitor IT audit observations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-7
      description: Member Organizations should ensure that the IT auditors have the
        requisite level of competencies and skills to effectively assess and evaluate
        the adequacy of IT policies, procedures, processes and controls implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.7
      ref_id: 3.1.7-8
      description: 'IT audit report, at a minimum, should: (a) include the findings,
        recommendations, management''s response with defined action plan, and responsible
        party and limitations in scope with respect to the IT audits; (b) signed,
        dated and distributed according to the format defined; and (c) submitted to
        the audit committee on periodical basis.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.8
      name: Staff Competence and Training
      description: Staff of the Member Organizations should be equipped with the skills
        and required knowledge to operate the Member Organization's information assets
        in a controlled manner and provided with training regarding how to operate,
        address and apply IT relevant controls on Member Organization's information
        assets.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-1
      description: Member Organizations should identify and define critical roles
        within IT department (e.g. DBA, sysadmin, etc.)
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-2
      description: Member Organizations should ensure adequate staffing for critical
        IT roles, such that critical IT roles are not handled by only one staff.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-3
      description: Member Organizations should identify the professional certifications
        required for staff responsible for critical IT roles.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-4
      description: Member Organizations should evaluate staffing requirements on periodic
        basis or upon major changes to the business, operational or IT environments
        to ensure that the IT function has sufficient resources.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-5
      description: Annual IT training plan should be developed by the Member Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-6
      description: 'Formal training should be conducted, as a minimum for: (a) IT
        staff (existing and new); and (b) Contractors (where applicable).'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-7
      description: IT training plan should be reviewed periodically.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.8
      ref_id: 3.1.8-8
      description: 'Specialist training should be provided to staff in the Member
        Organization''s relevant functional area categories in line with their job
        descriptions, including: (a) staff involved in performing critical IT roles;
        (b) staff involved in developing and (technically) maintaining information
        assets; and (c) staff involved in risk assessments.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1
      ref_id: 3.1.9
      name: Performance Management
      description: Efficiency and effectiveness of IT processes and services of the
        Member Organizations should be continuously measured through key performance
        indicators (KPIs).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.9-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.9
      ref_id: 3.1.9-1
      description: KPIs should be defined, approved and implemented to measure the
        execution of IT processes and system performance.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.9-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.9
      ref_id: 3.1.9-2
      description: 'KPIs should be defined considering for the following, but not
        limited to: (a) IT function and related processes; (b) workforce competency
        and development; and (c) compliance with regulatory regulations.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.9-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.1.9
      ref_id: 3.1.9-3
      description: 'KPIs should be: (a) communicated to the concerned IT Divisions/Units
        of the Member Organizations for implementation; (b) supported by target value
        and thresholds; (c) analyzed to identify the deviations against targets and
        initiate remedial actions; (d) analyzed to identify trends in performance
        and compliance and take appropriate action; and (e) monitored and periodically
        reported to the senior management and ITSC.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2
      assessable: false
      depth: 1
      ref_id: '3.2'
      name: IT Risk Management
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2
      ref_id: 3.2.1
      name: Managing IT Risks
      description: IT Risk Management process should be defined, approved, implemented,
        communicated and aligned to the Member Organization's Enterprise Risk Management
        process, including the identification, analysis, treatment, monitoring and
        review of IT risks at appropriate intervals.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-1
      description: IT risk management process should be defined, approved, implemented
        and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-2
      description: The effectiveness of the IT risk management process should be measured
        and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-3
      description: IT risk management process should be aligned with the Member Organization's
        enterprise risk management process.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-4
      description: 'IT risk management process should clearly address the following
        sub processes, including but not limited to: (a) risk identification, analysis
        and classification; (b) risk treatment; (c) risk reporting; and (d) risk monitoring
        and profiling.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-5
      description: 'IT risk management process should address Member Organization''s
        information assets, including but not limited to: (a) business processes and
        related data; (b) business applications; (c) infrastructure components; and
        (d) Third party relationships and associated risks.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-6
      description: IT risk management process should address Member Organization's
        people aspect (i.e. permanent staff, contractual employees, third party).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-7
      description: 'IT risk management process should be initiated at, but not limited
        to: (a) an early stage of the program and project implementation; (b) prior
        to initiate critical and major changes to the information assets; (c) the
        time of outsourcing services; and (d) prior to procuring of new systems, tools
        and emerging technologies (i.e. Distributed Ledger Technology (DTL), Robotic
        Process Assurance (RPA)etc.)'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-8
      description: 'Existing information assets should be subject to periodic IT risk
        assessment based on their criticality such as: (a) all mission critical and
        critical information assets should be assessed at least once a year; and (b)
        non-critical information assets should be assessed based on their importance
        to the business.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-9
      description: 'IT risk management activities should involve the following stakeholders,
        but not limited to: (a) business owners and users; (b) IT departmental/functional
        heads; (c) technical administrators; and (d) cyber security specialists.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-10
      description: The Member Organization's should develop and implement IT risk
        response (i.e. avoid, mitigate, transfer and accept) and control strategies
        that are consistent with the value of the information assets and member organizations
        risk appetite.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1-11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.1
      ref_id: 3.2.1-11
      description: IT key risk indicators (KRIs) should be defined, implemented and
        monitored.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2
      ref_id: 3.2.2
      name: Risk Identification and Analysis
      description: Information assets should be identified, recorded and maintained
        to gather information about related threats, existing controls and associated
        risks should be analyzed based on their likelihood of occurrences and resulting
        impact.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.2-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.2
      ref_id: 3.2.2-1
      description: IT risk identification should be performed, documented and periodically
        updated in the formal centralized risk register.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.2-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.2
      ref_id: 3.2.2-2
      description: IT risk register should be regularly updated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.2-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.2
      ref_id: 3.2.2-3
      description: 'IT risk analysis should address the following, but not limited
        to: (a) information asset description and classification; (b) potential threat(s)
        to the information asset; (c) impact and likelihood; (d) existing IT controls;
        (e) risk owner (business or process owner); (f) implementation owner (control
        owner); and (g) inherent as well as residual risks related to the information
        assets.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2
      ref_id: 3.2.3
      name: Risk Treatment
      description: IT risks associated with the Member Organization's information
        assets should be adequately treated based on the applicable criteria (i.e.
        accepted, avoided, transferred or mitigated).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-1
      description: IT risk treatment plan should be defined, approved and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-2
      description: IT risk treatment plan should be implemented and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-3
      description: IT risks should be treated according to the Member Organization's
        risk appetite defined by the relevant governance function owner and approved
        by the ITSC.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-4
      description: IT risk treatment plan should include detail design and implementation
        of required controls to mitigate the identified risks.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-5
      description: IT risk treatment plan should ensure that the list of risk treatment
        options are formally documented (i.e. accepting, avoiding, transferring or
        mitigating risks by applying IT controls).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-6
      description: Risk acceptance should be least preferred over risk mitigation
        through implementation of primary controls.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-7
      description: 'Accepting IT risks should be formally documented, approved and
        signed-off by the business owner and reported to the risk committee, ensuring
        that: (a) risk acceptance should be provided with detail justification including
        but not limited to the following: (1) impact (i.e. operational, financial
        and reputational) of not implementing the primary control(s); and (2) compensating
        control(s) in place of primary control(s) for risk mitigation. (b) the accepted
        IT risk should be within the risk appetite of the Member Organization; (c)
        the accepted IT risk should not contradict with the SAMA regulations; (d)
        a separate exception should be documented for each unique risk; (e) risk acceptance
        should be renewed periodically; and (f) Risk acceptance should be presented
        and reported to the risk committee.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-8
      description: Avoiding IT risks should involve a decision by a business owner
        and risk committee to cancel or postpone a particular activity or project
        that introduces an unacceptable IT risk to the business.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-9
      description: 'Transferring or sharing the IT risks should: (a) involve sharing
        the IT risks with relevant (internal or external) providers; and (b) be accepted
        by the receiving (internal or external) provider(s).'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-10
      description: 'Applying IT controls to mitigate IT risks should include: (a)
        identifying appropriate IT controls; (b) evaluating the strengths and weaknesses
        of the IT controls; (c) selection of adequate IT controls; and (d) documenting
        and obtaining sign-off for any residual risk by the business owner and risk
        committee.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3-11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.3
      ref_id: 3.2.3-11
      description: IT risk treatment actions should be documented in a risk treatment
        plan.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2
      ref_id: 3.2.4
      name: Risk Reporting/ Monitoring, and Profiling
      description: IT risks should be treated according to the defined treatment plans
        and should be effectively reviewed, monitored and reported.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-1
      description: IT risk assessment results should be formally documented and reported
        to the relevant business owners and senior management.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-2
      description: IT risk assessment results should include risks, impact, likelihood,
        mitigations, and remediation status.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-3
      description: 'IT risks should be monitored, including but not limited to: (a)
        tracking progress in accordance to the risk treatment plan; and (b) the selected
        and agreed IT controls are being implemented.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-4
      description: The design and operating effectiveness of the revised or newly
        implemented IT controls should be monitored and reviewed periodically.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-5
      description: The relevant business owners should accept the IT risk assessment
        results.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-6
      description: IT risk assessment results should be endorsed by the risk committee.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-7
      description: IT key risk indicators (KRIs) should be defined, implemented and
        monitored.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-8
      description: IT risk profile and related data should be provided as an input
        to operational risk department to formulate an organization level risk profile.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.2.4
      ref_id: 3.2.4-9
      description: IT risk profile should be formulated and presented to the senior
        management, IT Steering Committee and board of directors on periodic basis.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      assessable: false
      depth: 1
      ref_id: '3.3'
      name: Operations Management
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.1
      name: Manage Assets
      description: Asset Management process should be established to provide visibility
        of the Member Organization's information assets by maintaining an accurate
        and up-to-date inventory.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-1
      description: The asset management process should be defined, approved, implemented
        and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-2
      description: The effectiveness of the asset management process should be monitored,
        measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-3
      description: 'The asset management process should include but not limited to:
        (a) asset onboarding; (b) asset identification, classification, labeling and
        handling; (c) asset disposal; and (d) asset decommissioning.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-4
      description: 'Asset register should provide with the level of details, including
        (but not limited): (a) asset name; (b) asset owner; (c) asset custodian; asset
        criticality; (d) asset physical location; (e) asset logical location (network
        zone); (f) asset identified as direct in-scope of PCI; (g) asset identified
        as indirect in-scope of PCI; (h) availability or backup information; (i) service
        contract or license information; (j) technical contacts (OS, Application,
        Database and Network); (k) primary and secondary processes supported by the
        asset; (l) acceptable downtime aligned with BCM - Business Impact Analysis
        where applicable; (m) financial impact per hour in the event of downtime;
        (n) vendor engagement contract number; (o) vendor point of contact details;
        (p) vendor SLA details; and (q) vendor classification details.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-5
      description: Asset register should be maintained and updated on yearly basis,
        or whenever any asset introduced or removed from inventory.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-6
      description: 'Member organizations should: (a) define criteria for the identification
        of critical assets; (b) identify, maintain and periodically update comprehensive
        list of critical assets; (c) proactively monitor performance of critical assets;
        and (d) ensure adequate resilience measures in place for critical assets to
        maintain availability of the required critical services.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-7
      description: 'Asset owner should be responsible for, but not limited to: (a)
        classification and labeling of asset; (b) defining and reviewing access rights,
        restrictions, and taking into account applicable access control policies of
        the Member Organizations; (c) authorizing changes related to assets; and (d)
        ensure alignment with cyber security controls.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.1
      ref_id: 3.3.1-8
      description: Assets should be disposed of in a controlled and secure manner
        upon completion of its useful life and when other relevant obligations are
        met.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.2
      name: Interdependencies
      description: Interdependencies for critical information assets should be identified
        and managed through governance model to ensure availability of business operations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.2-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.2
      ref_id: 3.3.2-1
      description: Member Organizations should define and implement robust governance
        model in light of their interdependencies with relevant stakeholders (e.g.
        service providers, government institutions, etc.)
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.2-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.2
      ref_id: 3.3.2-2
      description: Member Organizations should identify its critical information assets
        interdependencies.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.2-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.2
      ref_id: 3.3.2-3
      description: 'As part of the (BCP) testing, the Member Organizations should
        take into consideration the interdependencies of critical information assets
        scenarios within its infrastructure. * * * _Note: For more Control Requirements
        to improve the overall resilience, please refer to the SAMA -_[_BCM Framework_](https://rulebook.sama.gov.sa/en/node/3709)_._'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.3
      name: Manage Service Level Agreements
      description: Contractual terms and conditions governing the roles, relationships,
        obligations and responsibilities of internal stakeholder and third parties
        should be formally agreed, developed and adequately controlled.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      ref_id: 3.3.3-1
      description: Internal IT Service Level Agreement (SIA) should be formally defined,
        approved, and communicated to the relevant business department of the Member
        Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      ref_id: 3.3.3-2
      description: The effectiveness of the internal IT SLA should be monitored, measured,
        and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      ref_id: 3.3.3-3
      description: 'Internal IT SLA should include the following, but not limited
        to: (a) service level agreed between the business functions and the IT department;
        (b) specific and measurable targets for IT services against the defined KPI''s;
        and (c) roles and responsibilities of the business and IT stakeholders.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      ref_id: 3.3.3-4
      description: The third party relationship process should be defined, approved,
        implemented, and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      ref_id: 3.3.3-5
      description: The effectiveness of the third party relationship process should
        be monitored, measured, and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      ref_id: 3.3.3-6
      description: Formal SLA should be defined and signed with the third party.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.3
      ref_id: 3.3.3-7
      description: 'The third party relationship process should cover following requirements,
        but not limited to: (a) outsourcing service providers should have adequate
        process in place to ensure availability, protection of data and applications
        outsourced; (b) periodic reporting, reviewing and evaluating the contractually
        agreed requirements (in SLAs); (c) changes to the provision of provided services;
        (d) execution of a risk assessment as part of the procurement process; (e)
        escalation process in case of SLA breached; (f) administrative, physical,
        and technical safeguards that reasonably and appropriately protect the confidentiality,
        integrity, and availability of information; (g) legal assurance from the third
        party to provide onsite support that mandates onsite presence of certified
        and experienced relevant support engineer within a defined timeline to support
        the Member Organizations in adverse situations; (h) exiting, terminating,
        or renewing the contract (including escrow agreements if applicable); (i)
        compliance with applicable frameworks including but not limited to SAMA [Cyber
        Security](https://rulebook.sama.gov.sa/en/node/3837), [Business Continuity
        Management](https://rulebook.sama.gov.sa/en/node/3709) and [IT Governance](https://rulebook.sama.gov.sa/en/node/4066)
        Frameworks-and applicable Laws and Regulations; (j) right to audit (Member
        Organizations or independent party); and (k) Non-Disclosure Agreement (''NDA'').'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.4
      name: IT Availability and Capacity Management
      description: Service availability should be maintained to support member organizations
        business functions and to avoid disruption and slowness of systems performance
        through monitoring current system thresholds and prediction of future performance
        and capacity requirements.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      ref_id: 3.3.4-1
      description: The IT availability and capacity management process should be defined,
        approved and implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      ref_id: 3.3.4-2
      description: The effectiveness of the IT availability and capacity management
        process should be monitored, measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      ref_id: 3.3.4-3
      description: IT availability and capacity plan should be developed, approved
        and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      ref_id: 3.3.4-4
      description: 'IT availability and capacity plan should be defined to address
        the following, but not limited to: (a) existing capacity of systems and resources;
        (b) alignment with the current and future business needs; (c) high availability
        requirements (including disruption and slowness for customer channels); (d)
        roles and responsibilities to maintain the plan; and (e) identification of
        dependencies over service providers as part of capacity planning to address
        BCM requirements.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      ref_id: 3.3.4-5
      description: System performance thresholds should be defined and implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      ref_id: 3.3.4-6
      description: 'System performance should be monitored considering the following,
        but not limited to: (a) current and future business requirement; (b) the agreed
        upon SLA with the business; (c) critical IT infrastructures; (d) disruption
        and slowness in the underlying system(s) supporting customer channels; and
        (e) lessons learned from previous system performance issues.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.4
      ref_id: 3.3.4-7
      description: Deviations from established capacity and performance baselines/thresholds
        should be identified, documented, followed-up, and reported to the management
        and ITSC.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.5
      name: Manage Data Center
      description: Adequate physical controls are designed and implemented to protect
        IT facilities and equipment from damage and unauthorized access.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5
      ref_id: 3.3.5-1
      description: Physical and environmental controls for managing the data center
        should be defined, approved and implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5
      ref_id: 3.3.5-2
      description: Physical and environmental controls should be monitored and periodically
        evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5
      ref_id: 3.3.5-3
      description: 'Necessary physical and environmental controls should be implemented
        such as but not limited to: (a) access to the data center should be strictly
        controlled and provided on need to know basis; (b) visitors entry to data
        center should be logged and escorted by an authorized person; (c) smoke detectors;
        (d) fire alarms; (e) fire extinguishers; (f) humidity control; (g) temperature
        monitoring; and (h) CCTV.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5
      ref_id: 3.3.5-4
      description: The outsourcing of data center should comply with the requirements
        published in SAMA circulars on [the Rules of The Outsourcing](https://rulebook.sama.gov.sa/en/node/2389)
        and [Cybersecurity Framework](https://rulebook.sama.gov.sa/en/node/3837).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.5
      ref_id: 3.3.5-5
      description: 'Member Organizations should ensure that appropriate control measures
        are built into contracts with the service providers to whom they plan to outsource
        data center such as but not limited to: (a) have documented business case
        for outsourcing data center services; and (b) nature and type of access to
        data center by the service provider.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.6
      name: Network Architecture and Monitoring
      description: IT event management and network architecture controls should be
        designed and implemented to continuously monitor IT operations in order to
        protect member organizations network from unauthorized access.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.6-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.6
      ref_id: 3.3.6-1
      description: 'Member Organizations should define, approve and implement network
        architecture policy considering the following: (a) organization''s stance
        with respect to acceptable network usage; (b) explicit rules for the secure
        use of specific network resources, services and applications; (c) consequences
        of failure to comply with security rules; (d) organization''s attitude towards
        network abuse; and (e) rationale(s) for the policy, and for any specific security
        rules.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.6-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.6
      ref_id: 3.3.6-2
      description: 'Member Organizations should ensure the implementation of following
        network architecture controls, but not limited to: (a) network diagram showing
        the complete current infrastructure; (b) segmentation of network into multiple
        separate network domains based on the required trust levels (6.8. public domain,
        desktop domain, server domain) and in line with relevant architectural principles;
        (c) perimeter of each network domain should be well protected by a security
        gateway (e.g. firewall, filtering router). For each security gateway a separate
        service access (security) rules should be developed and implemented to ensure
        that only the authorized traffic is allowed to pass; (d) all internal traffic
        (head office users, branch users, third party users, etc.) passing to DMZ
        or internal servers should pass via 2 security gateway (firewall); (e) all
        outbound internet access from internal networks are routed via proxy server
        such that access is allowed only to approved authenticated users; (f) visitor
        network (wired/wireless network) should be isolated and segregated from the
        internal network; (g) the perimeter firewall to the DMZ should raise an alert
        and block active scanning; (h) web application firewall (WAF) should be implemented
        against customer facing applications; (i) ensure non-existence of single node
        of failure that affects the critical service availability; (j) centralized
        authentication server (AAA, TACACS or RADIUS, etc.) should be deployed for
        managing authentication and authorization of network devices; (k) centralized
        log server (e.g. syslog server) should be deployed to collect and store logs
        from all network devices; (l) retention period for logs should be 12 months
        minimum; (m) all network devices should synchronize their clock timings from
        a centralized NTP server; (n) all network communication over extranet (WLAN)
        and internet should be through an encrypted channel; (o) remote access should
        be restricted only to certain group of IP addresses; (p) remote administration
        should be over an encrypted channel (like SSL VPN, SSH); (q) remote administration
        access for vendors should be time-bound and granted on a need basis with approval;
        (r) scan for Member Organization''s devices before accessing the network to
        ensure enforcement of security policies on devices before they access organization''s
        network; and (s) segregation of duties within the infrastructure component
        (supported with a documented authorization profile matrix).'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.6-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.6
      ref_id: 3.3.6-3
      description: 'Member Organizations should ensure that network monitoring is
        performed considering the following, but not limited to: (a) administrative
        trails including login and activity trails (like configuration change, rule
        change, etc.); (b) resource utilization (processor and memory); and (c) network
        connectivity to all branches and ATMs.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.7
      name: Batch Processing
      description: Batch management process should be defined, approved and implemented
        in order to manage the bulk processing of automated tasks in an efficient
        and controlled manner.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7
      ref_id: 3.3.7-1
      description: Batch management process should be defined, approved, implemented
        and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7
      ref_id: 3.3.7-2
      description: The effectiveness of the Batch management process should be measured
        and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7
      ref_id: 3.3.7-3
      description: 'Batch Management process should include the following, but not
        limited to: (a) start and end of day schedules; (b) roles and responsibilities;
        (c) monitoring of batches; and (d) error or exception handling.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7
      ref_id: 3.3.7-4
      description: Changes in the batch schedules should be approved by the relevant
        stakeholder(s).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.7
      ref_id: 3.3.7-5
      description: Member organizations should maintain log containing information
        about start and end of the day batch operations along with its status 6.8.
        (successful or unsuccessful).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.8
      name: IT Incident Management
      description: IT incident Management process should be established to timely
        identify, respond and handle IT incidents impacting the Member Organization's
        information assets and to report relevant incidents to SAMA, according to
        a defined communication protocol.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-1
      description: IT incident management process should be defined, approved, implemented
        and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-2
      description: The effectiveness of the IT incident management process should
        be measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-3
      description: 'IT incident management process should include the following requirements,
        but not limited to: (a) the establishment of a designated team responsible
        for incident management; (b) communication plan; (c) details of key staff
        who need to be notified; (d) skilled and (continuously) trained staff; (e)
        the prioritization and classification of incidents; (f) the timely handling
        of incidents, recording and monitoring progress; (g) the protection of relevant
        evidence and loggings; (h) post-incident activities such as root-cause analysis
        of the incidents; and (i) lessons learned.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-4
      description: IT incident management process should be automated such as through
        IT service desk.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-5
      description: process should be established for documenting the details of incident,
        steps taken which were successful and which were not successful, should be
        communicated to the relevant IT staff for hands on experience and also for
        future reference to enhance efficiency.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-6
      description: 'All user requests and IT incident should be logged with the following
        information but not limited to: (a) unique reference number; (b) date and
        time; (c) name of the impacted services and systems; (d) update the relevant
        owner; and (e) categorization and prioritization based on the urgency and
        impact.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-7
      description: All IT incident should be tracked and resolved as per agreed service
        level.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-8
      description: Member organizations relevant teams should be involved (when applicable)
        to ensure adequate handling of the incident.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-9
      description: The Member Organizations should inform 'General Department of Cyber
        Risk Control' immediately upon identification of 'Medium' or above classified
        incident that have impact on customers, as per SAMA [BCM Framework](https://rulebook.sama.gov.sa/en/node/3709).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-10
      description: The Member Organizations should inform 'General Department of Cyber
        Risk Control' immediately upon identification of disruption and slowness in
        the critical and/or application(s) impacting customer.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-11
      description: Member Organizations should notify 'General Department of Cyber
        Risk Control' before disclosing any information about the incident to the
        media.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8-12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.8
      ref_id: 3.3.8-12
      description: 'The Member Organizations should submit a detail incident report
        within five (5) days to ''General Department of Cyber Risk Control'', including
        the following details as a minimum: (a) title of the incident; (b) identification,
        classification and prioritization of incident; (c) logging and monitoring
        of incident; (d) resolution and closure of incident; (e) impact assessment
        such as financial, data, customer and/or reputational; (f) date and time of
        the incident; (g) name of the impacted services and systems; (h) root-cause
        analysis; and (i) corrective actions with target dates.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.9
      name: Problem Management
      description: Criteria and procedures to report problems should be defined to
        limit recurring incidents and to minimize the impact of incidents on the Member
        Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9
      ref_id: 3.3.9-1
      description: The problem management process should be defined, approved, implemented
        and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9
      ref_id: 3.3.9-2
      description: The effectiveness of the problem management process should be measured
        and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9
      ref_id: 3.3.9-3
      description: 'The problem management process should include the following requirements
        but not limited to: (a) identification, classification and prioritization
        of problem; (b) logging and monitoring of problem; (c) resolution and closure
        of problem; (d) the protection of relevant evidence and loggings; (e) impact
        assessment such as financial, data, customer and/or reputational; (f) date
        and time of the problem; (g) name of the impacted services and systems; (h)
        root-cause analysis; and (i) corrective actions.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.9
      ref_id: 3.3.9-4
      description: The Member Organizations should maintain a database for known error
        records.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.10
      name: Data Backup and Recoverability
      description: Data backup management strategy along with backup and restoration
        procedures should be defined, approved and implemented to ensure reliability,
        availability, and recoverability of data of the Member Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-1
      description: Data backup management strategy should be defined, approved and
        implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-2
      description: 'The data backup management policy should consider the following,
        but not limited to: (a) alignment with SAMA [Business Continuity Management
        Framework](https://rulebook.sama.gov.sa/en/node/3709); (b) implementation
        of replication, backup and recovery capabilities; (c) data storage; (d) data
        retrieval; and (e) data retention as per the legal, regulatory and business
        requirements.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-3
      description: Backup and restoration procedures should be defined, approved and
        implemented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-4
      description: The effectiveness of the backup and restoration procedure should
        be measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-5
      description: 'Member Organizations should define its backup and restoration
        requirements considering the following, but not limited to: (a) legal and
        regulatory requirements; (b) business requirements in line with agreed RPO
        (Recover Point Objective); (c) type of backups (offline, online, full, incremental,
        etc.); and (d) schedule of the backup (daily, weekly, monthly, etc.).'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-6
      description: 'Member Organizations should ensure the following information are
        backed up at minimum: (a) applications; (b) operating systems software; (c)
        databases; and (d) device configurations.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-7
      description: In case of replication of data between primary and disaster recovery
        site, Member Organizations should ensure that all replication issues are timely
        resolved such that data at the disaster recovery site are in sync with the
        primary site as per the agreed recovery point objective (RPO) and recovery
        time objective (RTO).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-8
      description: Member Organizations should ensure that RTOs for critical services
        such as payment systems, customer related services, etc. are adequately defined
        considering the high availability of the supporting operations and minimum
        disruption in the event of disaster.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-9
      description: Member Organization should ensure sufficient investment are made
        from people, process and technology perspective to achieve the targeted RTOs.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-10
      description: Member Organizations should implement alternate mechanism for backup
        redundancy (e.g. transaction dumps in addition to full database backup).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-11
      description: Member Organizations should conduct periodic testing and validation
        of the recovery capability of backup media.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-12
      description: Backup media should be appropriately labelled.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10-13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.10
      ref_id: 3.3.10-13
      description: Backup media including USB disks, containing sensitive or confidential
        information should be encrypted before transportation to offsite for storage.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3
      ref_id: 3.3.11
      name: Virtualization
      description: Formal process for creation, distribution, storage, use and retirement
        of virtualized images, snapshots or containerization should be defined and
        managed in a controlled and secured manner.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-1
      description: A process should be defined, approved, implemented and communicated
        by the Member Organizations to setup, deploy and configure a virtual environment.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-2
      description: The process should be governed with well-defined policies, procedures
        and standards.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-3
      description: The effectiveness of the virtualization or containerization process
        should be measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-4
      description: All virtual components deployed in the Member Organizations should
        be provided with the same level of security as of non-virtualized environment.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-5
      description: All virtual components should be adequately configured using defined
        and approved minimum baseline security standards (MBSS) specific to virtualization
        or containerization.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-6
      description: Strong authentication mechanism should be implemented and access
        should be granted on need to know or least privileged basis for all virtual
        environments including host operating system, hypervisor, guest operating
        systems and any other related components.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-7
      description: The creation, distribution, storage, use, retirement and destruction
        of the virtual images and snapshots should be handle in a controlled and secured
        manner.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.3.11
      ref_id: 3.3.11-8
      description: 'The following should be considered as part of virtualization/containerization
        but not limited to: (a) administrative access should be tightly controlled
        where access via local admin should be restricted; (b) management of hypervisors
        should be restricted to administrators only; (c) virtual test environment
        should be physically and/or logically segregated from the production environment
        and even should not operate on the same host; (d) unnecessary program and
        services should be disabled on virtual machines unless authorized by the business;
        (e) audit logging should be enabled and monitored for all virtual machines
        that should include but not limited to: (1) creation, deployment and removal;
        (2) root and administrative activities; and (3) creation, modification and
        deletion of system level objects. (f) appropriate controls should be in place
        to protect sensitive and critical data being used and managed through virtual
        images or snapshots; and (g) all virtual drives used by the guest operating
        systems should be backed-up and tested on regular basis, using the same policy
        for backup management as is used for non-virtualized systems.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      assessable: false
      depth: 1
      ref_id: '3.4'
      name: System Change Management
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.1
      name: System Change Governance
      description: A Change Management process should be established to ensure that
        changes to the Member Organization's information assets are classified, tested
        and approved before their deployment into production environments
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-1
      description: System change management process should be defined, approved, implemented
        and communicated within the Member Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-2
      description: The effectiveness of the system change management process should
        be measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-3
      description: System change management process should be governed by the change
        management policy and procedure that should be approved, monitored, reviewed
        and updated on periodic basis and/or whenever significant changes occurs in
        the IT environment or changes in laws and regulatory requirements.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-4
      description: 'System change management process should address the following,
        but not limited to: (a) change requirement definition and approval; (b) change
        severity and priority; (c) change risk and impact assessment; (d) change development;
        (e) change testing; (f) change roll-out and roll-back; (g) change roles and
        responsibilities; (h) change documentation; (i) change awareness and/or training
        for users; and (j) change advisory board (CAB) input, if applicable.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-5
      description: A workflow system should be implemented to automate the change
        management process by the Member Organizations to the maximum extent possible.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-6
      description: Any changes in the information assets should be logged, monitored
        and documented.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-7
      description: System environments (i.e. development, testing, production, etc.)
        should be technically and logically segregated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-8
      description: "Access to different system environments should be strictly controlled\
        \ and monitored. In order to do so, segregation of duties (\u2018SoD\u2019\
        ) should be ensured so that no individual have two conflicting responsibilities\
        \ such as (develop, compile, test, migrate and deploy) at the same time."
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-9
      description: 'Emergency changes in the information assets should be performed
        in strictly controlled manner and should consider the following: (a) the number
        of emergency changes should be least preferred over planned changes in order
        to keep such changes as minimum as possible; (b) emergency changes should
        be assessed for their impact on the systems; (c) emergency changes should
        be approved by the Emergency Change Advisory Board (''ECAB''); (d) minimum
        level of testing should be acceptable to implement the emergency changes;
        (e) formal documentation of emergency changes should be completed post implementation;
        (f) post implementation review should be conducted for all emergency changes;
        and (g) root cause analysis should be conducted to determine the cause due
        to which emergency change was required, as well as maintaining a register
        to reflect lesson learned and report to all concerned staff, management and
        ITSC.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.1
      ref_id: 3.4.1-10
      description: Sufficient auditing should be enabled to log emergency changes
        related to information assets for future reference or investigation purposes.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.2
      name: Change Requirement Definition and Approval
      description: Changes to information assets should be formally defined, documented
        and approved by relevant asset owner prior to implementing the change in the
        information assets.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2
      ref_id: 3.4.2-1
      description: Change requirements should be formally initiated by the requestor
        of the change.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2
      ref_id: 3.4.2-2
      description: Change requirements should specify both functional and non-functional
        requirements, where applicable.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2
      ref_id: 3.4.2-3
      description: Change requirements should be formally reviewed and approved by
        the concern asset owner.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2
      ref_id: 3.4.2-4
      description: Any changes in the information assets should be assessed for their
        impact on the systems prior to implement the change.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2
      ref_id: 3.4.2-5
      description: Any change in the information assets should be endorsed by the
        Change Advisory Board (48") prior deploying to the production environment.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.2
      ref_id: 3.4.2-6
      description: "Any changes in the information assets should be reviewed and approved\
        \ by the cyber security function before submitting to \u2018CAB\u2019 _(required\
        \ as per SAMA Cyber Security Framework,_[_3.3.7 Change Management_](https://rulebook.sama.gov.sa/node/3936)_,\
        \ Control Requirements, 4 - d)._"
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.3
      name: System Acquisition
      description: System acquisition process should be established to ensure risks
        associated with the system acquisition and related vendor service level are
        adequately assessed and mitigated prior acquiring system.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      ref_id: 3.4.3-1
      description: System acquisition process should be defined, approved, implemented
        and communicated by the Member Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      ref_id: 3.4.3-2
      description: The effectiveness of the system acquisition process should be measured
        and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      ref_id: 3.4.3-3
      description: System requirements (i.e. functional and non-functional) should
        be formally defined and approved as part of system acquisition.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      ref_id: 3.4.3-4
      description: A feasibility study should be conducted to assess functional and
        non-functional requirements of the new system particularly in conformance
        with SAMA regulatory requirements, and other applicable regulatory requirements.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      ref_id: 3.4.3-5
      description: Vendor evaluation should be incorporated in the system acquisition
        process to assess vendor for their offering and capabilities to support system
        during and post implementation.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      ref_id: 3.4.3-6
      description: 'The system acquisition should be supported with a detail implementation
        plan describing the following, but not limited to: (a) system implementation
        milestones (including requirement gathering, development or customization,
        testing, go-live etc.); (b) timeline for each milestone and their dependencies;
        and (c) resources assigned to milestones.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.3
      ref_id: 3.4.3-7
      description: 'The off-the-shelf system or package should be evaluated based
        on the following, but not limited to: (a) system conformance with the requirements
        of the Member Organization; (b) system creditability and market presence,
        if required; and (c) vendor evaluation and service level.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.4
      name: System Development
      description: System development methodology should be documented, approved and
        implemented to ensure that the development of Member Organization's system
        is performed in a strictly controlled manner.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-1
      description: The system development methodology should be defined, approved,
        implemented and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-2
      description: The effectiveness of the system development methodology should
        be monitored and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-3
      description: 'The system development methodology should address the following,
        but not limited to: (a) system development approach such as agile, waterfall,
        etc.; (b) secure coding standards; (c) testing types and approaches such as
        unit testing, regression testing, stress testing, etc.; (d) version controlling;
        (e) quality control; (f) data migration; (g) documentation; and (h) end user
        training.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-4
      description: The system design document should be defined, documented and approved.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-5
      description: 'The system design document should address the low level design
        requirements for the intended system, which includes but not limited to following:
        (a) configurations requirements; (b) integration requirements; (c) performance
        requirements; (d) cyber security requirements; and (e) data definition requirements.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-6
      description: 'Member organizations relevant IT function or development team
        should conduct secure code review for: (a) applications developed internally;
        and (b) externally developed applications if the source code is available.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-7
      description: Member Organizations should ensure that the secure code review
        report (or equivalent, such as an independent assurance statement) is formulated
        in case the source code is not available with the member organization.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-8
      description: Cyber security controls should be embedded in the system development
        process in line with SAMA [Cyber Security Framework](https://rulebook.sama.gov.sa/node/3837).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.4
      ref_id: 3.4.4-9
      description: Version control system should be utilized to keep track of source
        code or build versions between various system environments (i.e. development,
        test, production, etc.).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.5
      name: Testing
      description: All changes to information systems should be comprehensively tested
        on the test environment based on the defined and approved test cases to ensure
        that changes meets the business requirements as well as to identify defects
        or vulnerabilities before releasing changes to the production environment.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-1
      description: Test plan should be formally defined, approved and documented for
        the changes.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-2
      description: 'Test case should be defined, approved and documented for the changes.
        In addition, test case should address the following, but not limited to: (a)
        test case name and unique ID; (b) test case designed by and tested by; (c)
        test case description with clear identification of negative and positive test
        cases; (d) test priority; (e) date of the test execution; (f) data use to
        test the cases; (g) status of the test case (i.e. pass or fail); (h) expected
        outcome of the test case; and (i) third party testing certification requirement,
        if applicable, i.e. MADA, Tanfeeth, etc.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-3
      description: At a minimum, the following types of testing should be considered
        as part of system change management. (a) unit testing; (b) system integration
        testing (SIT); (c) stress testing (if applicable); (d) security testing; and
        (e) user acceptance testing (UAT).
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-4
      description: All changes to information system should be thoroughly tested on
        a separate test environment in accordance with the approved test cases.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-5
      description: All changes should be formally tested and accepted by the concern
        business users.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-6
      description: Testing should include positive and negative test cases scenarios.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-7
      description: The results of UAT should be documented and maintained for future
        reference purposes.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.5
      ref_id: 3.4.5-8
      description: The production data should not be utilized for system testing in
        the test environment. Only sanitized data should be used for testing purposes.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.6
      name: Change Security Requirements
      description: Cyber security requirements should be defined and thoroughly tested
        for all changes in the information system in a testing environment in order
        to identify and mitigate security vulnerabilities therein prior introducing
        them into the production environment.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.6-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.6
      ref_id: 3.4.6-1
      description: System change management process should consider SAMA [Cyber Security
        Framework](https://rulebook.sama.gov.sa/node/3837) for defining, testing and
        implementing security requirements for any changes in the information assets.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.7
      name: Change Release Management
      description: Change release management process should be defined to ensure that
        system changes are adequately planned and released to the production environment
        in a strictly controlled manner.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7
      ref_id: 3.4.7-1
      description: The release management process should be defined, approved, implemented
        and communicated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7
      ref_id: 3.4.7-2
      description: The release management process should be monitored and periodically
        evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7
      ref_id: 3.4.7-3
      description: 'The release management process should address the following, but
        not limited to: (a) change release strategy and approach; (b) roles and responsibilities
        to carry out change releases; (c) change release schedule and logistics; (d)
        change roll-out and roll-back procedures; and (e) data migration, where applicable.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7
      ref_id: 3.4.7-4
      description: The changes should be released in the corresponding system in disaster
        recovery site upon successful implementation of changes in the production
        environment at main site.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.7
      ref_id: 3.4.7-5
      description: Change should be introduced as part of an agreed change window,
        exceptions has to have their own approval process and seldom allowed without
        compelling reasons.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.8
      name: System Configuration Management
      description: System Configuration Management Process should be defined, approved,
        communicated and implemented to maintain a reliable and accurate information
        about configuration items ('CIs') for Member Organization's information assets.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8
      ref_id: 3.4.8-1
      description: The configuration management process should be defined, approved,
        implemented and communicated by the Member Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8
      ref_id: 3.4.8-2
      description: The configuration management process should be monitored and periodically
        evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8
      ref_id: 3.4.8-3
      description: 'The configuration management process should address the following,
        but not limited to: (a) roles and responsibilities for carrying out configuration
        management; (b) identification and recording of configuration items and their
        criticality with respect to its supporting business processes; (c) interrelationships
        between configuration items among various information assets; and (d) periodic
        verification of configuration items.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.8
      ref_id: 3.4.8-4
      description: "Member Organizations should implement configuration management\
        \ database (\u2018CMCB\u2019) to identify, maintain, and verify information\
        \ related to Member Organization's Information assets."
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.9
      name: Patch Management
      description: Patch management process should be defined and implemented to ensure
        up-to-date with latest applicable and relevant patches (i.e. functional or
        non-functional) are installed in a timely manner to avoid technical issues
        including security breaches due to existing vulnerabilities in the system.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-1
      description: The patch management process should be defined, approved, implemented
        and communicated by the Member Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-2
      description: The effectiveness of the patch management process should be monitored,
        measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-3
      description: All patches should be thoroughly assessed for impact by relevant
        stakeholders including cyber security before being implemented into the production
        environment.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-4
      description: All systems should be periodically scanned or inspected to identify
        any outdated patches and vulnerabilities in the systems.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-5
      description: Deployment of patches should follow a formal change management
        process.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-6
      description: All patches should be thoroughly tested in a separate test environment
        prior introducing to the production environment to avoid any compatibility
        issue with the system and related components.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-7
      description: Patches should be rolled out to systems and related components
        systematically.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-8
      description: Following deployment of patches to the production environment,
        systems should be monitored for any abnormal behavior and, if such behavior
        identified should be thoroughly investigated to identify the root cause and
        fix them properly.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-9
      description: Patch deployment window (i.e. schedule) should be communicated
        to business and relevant stakeholders in advance and preferable should be
        done during non-peak hours and non-freezing periods to avoid any business
        disruption.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9-10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.9
      ref_id: 3.4.9-10
      description: The external feeds from software vendors or other acknowledged
        sources should be monitored to identify any new vulnerabilities in the system
        and to be patched accordingly.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4
      ref_id: 3.4.10
      name: IT Project Management
      description: Formal process should be defined, approved and implemented to effectively
        manage IT project and related risks throughout the lifecycle of the project.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      ref_id: 3.4.10-1
      description: The IT project management process should be defined and approved
        by the Member Organizations.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      ref_id: 3.4.10-2
      description: The IT project management process should be governed with a formally
        defined and approved IT project management framework, policy and procedure
        to manage IT project lifecycle from initiation till closure.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      ref_id: 3.4.10-3
      description: The effectiveness of the IT project management process should be
        monitored, measured and periodically evaluated.
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      ref_id: 3.4.10-4
      description: 'All IT projects should be provided with detail project plan, which
        include the following, but not limited to: (a) detail scope of work including
        activities for a project or each phase of the project; (b) priorities, milestones
        and timelines associated with project or each phase of the project; (c) deliverables;
        (d) roles and responsibilities; and (e) risks associated with any IT projects.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10
      ref_id: 3.4.10-5
      description: 'Necessary documentations for the IT project should be defined,
        approved and maintained for future reference purposes including but not limited
        to following: (a) project charter; (b) requirement analysis, business information
        flow and technical information flow; (c) feasibility as well as cost-benefit
        analysis; and (d) detail project plan.'
    - urn: urn:intuitem:risk:req_node:sama-itg-1.0:3.4.10-6
