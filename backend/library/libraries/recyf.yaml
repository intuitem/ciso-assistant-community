urn: urn:intuitem:risk:library:recyf
locale: fr
ref_id: ReCyF
name: "RECYF : R\xC9F\xC9RENTIEL CYBER France - Version 2.5 du 17/03/2026"
description: "RECYF constitue le r\xE9f\xE9rentiel de cybers\xE9curit\xE9 mentionn\xE9\
  \ au 6\xE8me alin\xE9a de l\u2019article 14 du projet de loi relatif \xE0 la r\xE9\
  silience des infrastructures critiques et au renforcement de la cybers\xE9curit\xE9\
  \ (PJL). Il se compose d\u2019objectifs de s\xE9curit\xE9 et, pour chacun d\u2019\
  eux, de moyens acceptables de conformit\xE9."
copyright: ANSSI
version: 1
publication_date: 2026-03-17
provider: ANSSI
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:recyf
    ref_id: ReCyF
    name: "RECYF : R\xC9F\xC9RENTIEL CYBER France - Version 2.5 du 17/03/2026"
    description: "RECYF constitue le r\xE9f\xE9rentiel de cybers\xE9curit\xE9 mentionn\xE9\
      \ au 6\xE8me alin\xE9a de l\u2019article 14 du projet de loi relatif \xE0 la\
      \ r\xE9silience des infrastructures critiques et au renforcement de la cybers\xE9\
      curit\xE9 (PJL). Il se compose d\u2019objectifs de s\xE9curit\xE9 et, pour chacun\
      \ d\u2019eux, de moyens acceptables de conformit\xE9."
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-1:-recensement-des-systemes-d_information
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 1: Recensement des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-1:-recensement-des-systemes-d_information:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-1:-recensement-des-systemes-d_information
      name: Recensement des SI
    - urn: urn:intuitem:risk:req_node:recyf:1.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-1:-recensement-des-systemes-d_information:1
      ref_id: 1.1-EI/EE
      description: "L\u2019entit\xE9 liste l\u2019ensemble de ses activit\xE9s et\
        \ services, y compris les activit\xE9s et services qui ne correspondent pas\
        \ aux crit\xE8res pour lesquels l\u2019entit\xE9 constitue une entit\xE9 importante\
        \ ou essentielle (par exemple : une entit\xE9 essentielle au titre d\u2019\
        une activit\xE9 exploitation d\u2019un ol\xE9oduc doit lister, en plus des\
        \ activit\xE9s et services participant \xE0 l\u2019exploitation de l\u2019\
        ol\xE9oduc, tous les services et les autres activit\xE9s qu\u2019elle fournit).\n\
        Pour chaque entr\xE9e de cette liste, l\u2019entit\xE9 :\n\u2022\tidentifie\
        \ un responsable de l\u2019activit\xE9 ou du service (par exemple le chef\
        \ de service auquel est rattach\xE9e l'activit\xE9 ou le service, un directeur\
        \ m\xE9tier, la direction g\xE9n\xE9rale) ;\n\u2022\tliste les syst\xE8mes\
        \ d\u2019information les supportant."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:1.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-1:-recensement-des-systemes-d_information:1
      ref_id: 1.2-EI/EE
      description: "L\u2019entit\xE9 pr\xE9cise dans la liste pr\xE9vue au 1.1-EI/EE\
        \ les syst\xE8mes d\u2019information qui ne sont expos\xE9s \xE0 aucun des\
        \ risques mentionn\xE9s \xE0 l\u2019alin\xE9a 2 de l\u2019objectif de s\xE9\
        curit\xE9.\nL\u2019entit\xE9 renseigne les justifications de ces choix."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:1.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-1:-recensement-des-systemes-d_information:1
      ref_id: 1.3-EI/EE
      description: "L\u2019entit\xE9 valide et r\xE9examine annuellement la liste\
        \ pr\xE9vue au 1.1-EI/EE, et en tant que de besoin, notamment en cas d\u2019\
        \xE9volution des activit\xE9s et services de l\u2019entit\xE9 ou en cas de\
        \ mise en service d\u2019un nouveau syst\xE8me d\u2019information."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 2: Mise en \u0153uvre d'un cadre de gouvernance\
        \ de la s\xE9curit\xE9 num\xE9rique"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique
      name: "R\xF4les et responsabilit\xE9s"
    - urn: urn:intuitem:risk:req_node:recyf:2.a.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:1
      ref_id: 2.A.1-EI/EE
      description: "Le dirigeant ex\xE9cutif de l\u2019entit\xE9 est responsable de\
        \ la s\xE9curit\xE9 num\xE9rique au sein de son entit\xE9 et en particulier\
        \ du suivi de la conformit\xE9 des syst\xE8mes d\u2019information aux pr\xE9\
        sentes mesures."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.a.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:1
      ref_id: 2.A.2-EE
      description: "Il d\xE9signe au moins une personne qui le conseille et l\u2019\
        accompagne dans l\u2019exercice de cette responsabilit\xE9. Cette personne\
        \ est le point de contact privil\xE9gi\xE9 de l\u2019Agence nationale de la\
        \ s\xE9curit\xE9 des syst\xE8mes d\u2019information pour tous les sujets relatifs\
        \ \xE0 la s\xE9curit\xE9 num\xE9rique (notamment incidents de s\xE9curit\xE9\
        , communications de l\u2019ANSSI sur les sujets relatifs aux entit\xE9s essentielles)"
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.a.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:1
      ref_id: 2.A.3-EI/EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre une organisation\
        \ adapt\xE9e pour assurer sa s\xE9curit\xE9 num\xE9rique (par exemple : la\
        \ d\xE9signation d\u2019un responsable de la s\xE9curit\xE9 num\xE9rique,\
        \ l\u2019\xE9tablissement d\u2019un RACI, la mise en place d\u2019une comitologie)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique
      name: "Politique de s\xE9curit\xE9 des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:2.b.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:2
      ref_id: 2.B.1-EI/EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre une politique\
        \ de s\xE9curit\xE9 des syst\xE8mes d\u2019information (PSSI)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.b.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:2
      ref_id: 2.B.2-EI/EE
      description: "Cette PSSI comprend au moins :\n\u2022\tL\u2019organisation de\
        \ la gouvernance de la s\xE9curit\xE9 num\xE9rique et notamment les r\xF4\
        les et les responsabilit\xE9s du personnel interne et externe (par exemple\
        \ : prestataires, fournisseurs) ;\n\u2022\tLes orientations et objectifs strat\xE9\
        giques en mati\xE8re de s\xE9curit\xE9 num\xE9rique d\xE9clin\xE9s de la strat\xE9\
        gie globale de l\u2019entit\xE9 ;\n\u2022\tL\u2019engagement du dirigeant\
        \ ex\xE9cutif de l\u2019entit\xE9 \xE0 assurer la s\xE9curit\xE9 num\xE9rique\
        \ des syst\xE8mes d\u2019information dont il est responsable ;\n\u2022\tL\u2019\
        engagement du dirigeant ex\xE9cutif de l\u2019entit\xE9 \xE0 respecter les\
        \ exigences l\xE9gales et r\xE9glementaires et en particulier celles d\xE9\
        finies dans la transposition nationale de la directive NIS 2.\n\u2022\tLa\
        \ PSSI tient \xE9galement compte des exigences, proc\xE9dures et sp\xE9cificit\xE9\
        s propres au(x) secteur(s) dans lesquels l\u2019entit\xE9 exerce ses activit\xE9\
        s."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.b.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:2
      ref_id: 2.B.3-EI/EE
      description: "Le dirigeant ex\xE9cutif de l\u2019entit\xE9 approuve la PSSI."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.b.4-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:2
      ref_id: 2.B.4-EI/EE
      description: "La PSSI est au minimum revue annuellement et mise \xE0 jour lorsque\
        \ n\xE9cessaire, notamment en cas d\u2019\xE9volutions majeures de la menace,\
        \ du contexte m\xE9tier, technique ou organisationnel intervenues apr\xE8\
        s son approbation."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.b.5-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:2
      ref_id: 2.B.5-EI/EE
      description: "L\u2019entit\xE9 d\xE9cline, en tant que de besoin, la PSSI en\
        \ politiques de s\xE9curit\xE9 relatives \xE0 des th\xE8mes pr\xE9cis permettant\
        \ de couvrir tout ou partie des pr\xE9sentes mesures.\nEn particulier, l\u2019\
        entit\xE9 d\xE9finit et met en \u0153uvre, au minimum, des politiques de s\xE9\
        curit\xE9 en mati\xE8re :\n\u2022\tD\u2019usage du chiffrement ;\n\u2022\t\
        De contr\xF4le d\u2019acc\xE8s physique et logique ;\n\u2022\tDe revue de\
        \ l\u2019application des mesures de s\xE9curit\xE9 mises en \u0153uvre ;\n\
        \u2022\tDe gestion des comptes."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique
      name: "Gestion de la conformit\xE9"
    - urn: urn:intuitem:risk:req_node:recyf:2.c.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:3
      ref_id: 2.C.1-EI/EE
      description: "Pour chaque syst\xE8me d\u2019information, l\u2019entit\xE9 r\xE9\
        alise et maintient \xE0 jour une analyse de la conformit\xE9 du syst\xE8me\
        \ d\u2019information vis-\xE0-vis des mesures du pr\xE9sent r\xE9f\xE9rentiel.\n\
        L\u2019analyse de la conformit\xE9 identifie les \xE9ventuels \xE9carts entre\
        \ les mesures mises en \u0153uvre par l\u2019entit\xE9 et les mesures pr\xE9\
        vues dans le pr\xE9sent r\xE9f\xE9rentiel.\nCette analyse tient compte de\
        \ la PSSI de l\u2019entit\xE9."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.c.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:3
      ref_id: 2.C.2-EI/EE
      description: "L\u2019entit\xE9 \xE9tablit, met en \u0153uvre et suit dans la\
        \ dur\xE9e un plan d\u2019action adapt\xE9 \xE0 la structure et \xE0 l\u2019\
        environnement dans lequel elle op\xE8re afin de corriger ces \xE9carts dans\
        \ les meilleurs d\xE9lais.\nLa responsabilit\xE9 de ce plan d\u2019action\
        \ est d\xE9termin\xE9e au regard du cadre de gouvernance de la s\xE9curit\xE9\
        \ num\xE9rique mis en place.\nCe plan d\u2019action pr\xE9voit, au minimum,\
        \ une \xE9ch\xE9ance raisonnable au regard du besoin de s\xE9curisation du\
        \ syst\xE8me d\u2019information et un responsable pour la r\xE9alisation de\
        \ chaque action.\nCe plan d\u2019action ne pr\xE9juge pas de l\u2019appr\xE9\
        ciation du respect de ses obligations l\xE9gales et r\xE9glementaires lors\
        \ d\u2019un contr\xF4le de l\u2019ANSSI."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:2.c.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-2:-mise-en-uvre-d_un-cadre-de-gouvernance-de-la-securite-numerique:3
      ref_id: 2.C.3-EI/EE
      description: "Lorsque l\u2019entit\xE9 n\u2019est pas tenue de mettre en \u0153\
        uvre le r\xE9f\xE9rentiel mais qu\u2019elle d\xE9cide de l\u2019appliquer\
        \ pour d\xE9montrer sa conformit\xE9 aux objectifs de s\xE9curit\xE9, et qu\u2019\
        elle applique une ou plusieurs mesures alternatives aux moyens acceptables\
        \ de conformit\xE9 du r\xE9f\xE9rentiel, elle en pr\xE9cise les justifications\
        \ dans son analyse de la conformit\xE9. L\u2019ANSSI peut appr\xE9cier la\
        \ pertinence de la mesure retenue pour satisfaire la mesure du r\xE9f\xE9\
        rentiel non retenue lors d\u2019un contr\xF4le."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 3: Ma\xEEtrise de l'\xE9cosyst\xE8me"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme
      name: "Cartographie de l'\xE9cosyst\xE8me"
    - urn: urn:intuitem:risk:req_node:recyf:3.a.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme:1
      ref_id: 3.A.1-EI/EE
      description: "L\u2019entit\xE9 d\xE9finit et maintient \xE0 jour une cartographie\
        \ de l\u2019\xE9cosyst\xE8me dans lequel ses syst\xE8mes d\u2019information\
        \ sont mis en \u0153uvre et contenant, au minimum, les informations suivantes\
        \ :\n\u2022\tLa liste des prestataires et fournisseurs informatiques contribuant\
        \ \xE0 la r\xE9alisation des activit\xE9s ou des services de l\u2019entit\xE9\
        \ et avec lesquels il existe une relation de droit ou de fait (par exemple\
        \ : prestataire d\u2019infog\xE9rance, mat\xE9riels et services fournis par\
        \ la maison m\xE8re \xE0 une filiale, fournisseur de mat\xE9riel informatique)\n\
        \u2022\tLa liste des interconnexions avec les syst\xE8mes d\u2019information\
        \ de l\u2019entit\xE9.\n(Cette liste peut s\u2019appuyer sur les d\xE9marches\
        \ d\xE9j\xE0 r\xE9alis\xE9es par l\u2019entit\xE9 pour r\xE9aliser une telle\
        \ liste. Par exemple, la d\xE9claration de sous-traitance r\xE9alis\xE9e dans\
        \ le cadre d\u2019un contrat de la commande publique)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:3.a.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme:1
      ref_id: 3.A.2-EI/EE
      description: "L\u2019entit\xE9 renseigne et maintient \xE0 jour les coordonn\xE9\
        es d\u2019au moins un point de contact pour chaque entr\xE9e figurant dans\
        \ la cartographie de l\u2019\xE9cosyst\xE8me."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme:2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme
      name: "S\xE9curit\xE9 num\xE9rique dans les contrats avec les prestataires et\
        \ fournisseurs informatiques"
    - urn: urn:intuitem:risk:req_node:recyf:3.b.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme:2
      ref_id: 3.B.1-EI/EE
      description: "En cas de recours \xE0 un prestataire ou \xE0 un fournisseur informatique,\
        \ l\u2019entit\xE9 s\u2019assure que la prestation est conforme aux obligations\
        \ auxquelles l\u2019entit\xE9 est assujettie, notamment en mati\xE8re de gestion\
        \ des risques qui menacent la s\xE9curit\xE9 de leurs r\xE9seaux et syst\xE8\
        mes d\u2019information et de notification des incidents importants et s\u2019\
        assure de disposer des assurances contractuelles de cette conformit\xE9 (par\
        \ exemple : plan d\u2019assurance s\xE9curit\xE9, charte de t\xE9l\xE9maintenance,\
        \ mise en place d\u2019indicateurs de suivi de la conformit\xE9)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:3.b.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-3:-maitrise-de-l_ecosysteme:2
      ref_id: 3.B.2-EI/EE
      description: "L'entit\xE9 v\xE9rifie p\xE9riodiquement la conformit\xE9 de la\
        \ prestation aux obligations auxquelles l\u2019entit\xE9 est assujettie notamment\
        \ en mati\xE8re de gestion des risques qui menacent la s\xE9curit\xE9 de leurs\
        \ r\xE9seaux et syst\xE8mes d\u2019information et de notification des incidents\
        \ importants. L\u2019entit\xE9 peut s\u2019appuyer sur des audits dont les\
        \ conditions sont pr\xE9cis\xE9es par les Moyens acceptables de conformit\xE9\
        \ 17.2-EE, 17.4-EE et 17.5-EE relatifs \xE0 l\u2019audit."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
