      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:1
      ref_id: 10.A.4-EI/EE
      description: "Lorsqu'un syst\xE8me d\u2019information est utilis\xE9 pour diffuser\
        \ de l'information au public, l\u2019entit\xE9 n'est pas tenue de cr\xE9er\
        \ de comptes pour l'acc\xE8s du public \xE0 cette information (par exemple\
        \ : l\u2019acc\xE8s \xE0 un site vitrine ne n\xE9cessite pas d\u2019authentifier\
        \ les visiteurs alors que l\u2019acc\xE8s \xE0 l\u2019intranet doit authentifier\
        \ les utilisateurs)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.a.5-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:1
      ref_id: 10.A.5-EI/EE
      description: "L\u2019entit\xE9 d\xE9sactive les comptes qui ne sont plus n\xE9\
        cessaires dans les d\xE9lais pr\xE9vus par sa politique de gestion des comptes\
        \ (par exemple : sous 7 jours)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.a.6-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:1
      ref_id: 10.A.6-EI/EE
      description: "L\u2019entit\xE9 effectue p\xE9riodiquement, au moins annuellement,\
        \ une revue des comptes. Cette revue doit notamment v\xE9rifier le respect\
        \ des pr\xE9sentes mesures relatives \xE0 l'identification et, le cas \xE9\
        ch\xE9ant, corriger les anomalies."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information
      name: Authentification
    - urn: urn:intuitem:risk:req_node:recyf:10.b.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      ref_id: 10.B.1-EI/EE
      description: "L\u2019entit\xE9 prot\xE8ge les acc\xE8s des utilisateurs et processus\
        \ automatiques aux ressources de ses syst\xE8mes d\u2019information au moyen\
        \ d'un m\xE9canisme d'authentification impliquant au moins un \xE9l\xE9ment\
        \ secret (par exemple : un m\xE9canisme d\u2019authentification mono-facteur\
        \ tel qu\u2019un mot de passe, ou multi-facteur, tel qu\u2019une carte \xE0\
        \ puce avec code PIN)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.b.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      ref_id: 10.B.2-EI/EE
      description: "L\u2019entit\xE9 change les \xE9l\xE9ments secrets configur\xE9\
        s par d\xE9faut, avant la mise en service d\u2019une ressource. \xC0 cet effet,\
        \ l\u2019entit\xE9 s'assure aupr\xE8s du fabricant ou du fournisseur de la\
        \ ressource qu'elle dispose des moyens et des droits permettant d\u2019effectuer\
        \ ces changements."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.b.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      ref_id: 10.B.3-EI/EE
      description: "L\u2019\xE9l\xE9ment secret d'un compte partag\xE9 est renouvel\xE9\
        \ \xE0 chaque retrait d'un utilisateur de ce compte."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.b.4-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      ref_id: 10.B.4-EI/EE
      description: "L\u2019\xE9l\xE9ment secret d\u2019un compte n\u2019est connu,\
        \ que des utilisateurs autoris\xE9s \xE0 utiliser le compte (par exemple :\
        \ les mots de passe des comptes partag\xE9s peuvent \xEAtre stock\xE9s dans\
        \ un coffre-fort de mots de passe)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.b.5-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      ref_id: 10.B.5-EI/EE
      description: "Les facteurs d\u2019authentification sont conformes aux recommandations\
        \ de l\u2019autorit\xE9 nationale de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information en mati\xE8re de complexit\xE9, en tenant compte du niveau de\
        \ complexit\xE9 maximal permis par la ressource concern\xE9e, et en mati\xE8\
        re de fr\xE9quence de renouvellement."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.b.6-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      ref_id: 10.B.6-EI/EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas de modifier l'\xE9l\xE9ment secret, l\u2019entit\xE9 met en \u0153uvre\
        \ un contr\xF4le d'acc\xE8s appropri\xE9 \xE0 la ressource concern\xE9e ainsi\
        \ que des mesures de r\xE9duction du risque li\xE9 \xE0 l'utilisation d'un\
        \ \xE9l\xE9ment secret d'authentification fixe."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.b.7-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:2
      ref_id: 10.B.7-EE
      description: "Dans le cadre de cette exception, l\u2019entit\xE9 met \xE9galement\
        \ en \u0153uvre des mesures de s\xE9curit\xE9 permettant d'assurer la tra\xE7\
        abilit\xE9 des acc\xE8s."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information
      name: "Droits d'acc\xE8s"
    - urn: urn:intuitem:risk:req_node:recyf:10.c.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:3
      ref_id: 10.C.1-EI/EE
      description: "L\u2019entit\xE9 n\u2019attribue des droits qu\u2019aux utilisateurs\
        \ et processus automatiques authentifi\xE9s."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.c.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:3
      ref_id: 10.C.2-EI/EE
      description: "Pour chaque utilisateur ou chaque processus automatique, l\u2019\
        entit\xE9 n'attribue les droits d'acc\xE8s qu\u2019aux seules ressources n\xE9\
        cessaires \xE0 la r\xE9alisation des activit\xE9s et services de l\u2019entit\xE9\
        \ ou au maintien en condition op\xE9rationnelle ou de s\xE9curit\xE9."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.c.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:3
      ref_id: 10.C.3-EI/EE
      description: "Pour chaque ressource du syst\xE8me d\u2019information, l\u2019\
        entit\xE9 n\u2019attribue les droits d\u2019acc\xE8s qu\u2019aux seuls utilisateurs\
        \ et processus automatiques justifiant d\u2019un besoin au regard de leurs\
        \ missions."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:10.c.4-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-10:-gestion-des-identites-et-des-acces-des-utilisateurs-aux-systemes-d_information:3
      ref_id: 10.C.4-EI/EE
      description: "L\u2019entit\xE9 effectue p\xE9riodiquement, au moins annuellement,\
        \ une revue des droits d\u2019acc\xE8s. Cette revue doit notamment v\xE9rifier\
        \ le respect des pr\xE9sentes mesures relatives au droit d\u2019acc\xE8s et,\
        \ le cas \xE9ch\xE9ant, corriger les anomalies."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 11: Maitrise de l'administration des syst\xE8\
        mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information
      name: Comptes d'administration
    - urn: urn:intuitem:risk:req_node:recyf:11.a.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      ref_id: 11.A.1-EI/EE
      description: "Les actions d'administration sont effectu\xE9es exclusivement\
        \ \xE0 partir de comptes d'administration et les comptes d'administration\
        \ sont utilis\xE9s exclusivement pour les actions d'administration.\nPar exemple\
        \ : le compte d\u2019administration d\u2019un poste utilisateur est utilis\xE9\
        \ exclusivement pour l\u2019administration de ce poste. L\u2019utilisateur\
        \ de ce poste dispose d\u2019un compte bureautique non administrateur pour\
        \ son utilisation quotidienne."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.a.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      ref_id: 11.A.2-EI/EE
      description: "Les comptes d\u2019administration ne sont utilis\xE9s que par\
        \ des administrateurs ou des personnes autoris\xE9es."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.a.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      ref_id: 11.A.3-EI/EE
      description: "Les comptes d\u2019administration respectent les mesures relatives\
        \ \xE0 la gestion des identit\xE9s et des acc\xE8s des utilisateurs aux syst\xE8\
        mes d\u2019information."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.a.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      ref_id: 11.A.4-EE
      description: "Un compte d'administration est utilis\xE9 exclusivement pour se\
        \ connecter aux ressources que ce compte administre pour effectuer des actions\
        \ d\u2019administration, ou \xE0 une ressource d\u2019administration (par\
        \ exemple : le compte administrateur d\u2019un routeur est utilis\xE9 depuis\
        \ un poste d\u2019administration ou sur le routeur pour l\u2019administrer)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.a.5-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      ref_id: 11.A.5-EI/EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas d\u2019effectuer des actions d\u2019administration \xE0 partir d'un\
        \ compte d'administration, l\u2019entit\xE9 met en \u0153uvre des mesures\
        \ permettant d'assurer le contr\xF4le de ces actions d'administration et des\
        \ mesures de r\xE9duction du risque li\xE9 \xE0 l'utilisation d'un compte\
        \ non d\xE9di\xE9 \xE0 l'administration."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.a.6-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      ref_id: 11.A.6-EE
      description: "L\u2019entit\xE9 \xE9tablit et tient \xE0 jour la liste des comptes\
        \ d'administration de ses syst\xE8mes d\u2019information."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.a.7-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:1
      ref_id: 11.A.7-EE
      description: "Lors de toute modification d'un compte d\u2019administration (ajout,\
        \ suppression, suspension ou modification des droits associ\xE9s), l\u2019\
        entit\xE9 v\xE9rifie que les droits d'acc\xE8s aux ressources et fonctionnalit\xE9\
        s sont attribu\xE9s en coh\xE9rence avec les besoins d'utilisation du compte.\n\
        En particulier, afin de limiter la port\xE9e des droits individuels, ils sont\
        \ attribu\xE9s \xE0 chaque compte d\u2019administration en les restreignant\
        \ autant que possible au p\xE9rim\xE8tre fonctionnel et technique de ce dernier.\n\
        Pour ceci, il est recommand\xE9 d\u2019octroyer les droits d\u2019administration\
        \ au travers des groupes dont les comptes d\u2019administration sont membres."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information
      name: "S\xE9curit\xE9 des annuaires"
    - urn: urn:intuitem:risk:req_node:recyf:11.b.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      ref_id: 11.B.1-EI/EE
      description: "L\u2019entit\xE9 applique sans retard injustifi\xE9 les correctifs\
        \ de s\xE9curit\xE9 sur les annuaires g\xE9rant les utilisateurs ou les ressources\
        \ de ses syst\xE8mes d\u2019information."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.b.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      ref_id: 11.B.2-EE
      description: "La s\xE9curit\xE9 des syst\xE8mes d\u2019information de l\u2019\
        entit\xE9 repose en grande partie sur la s\xE9curit\xE9 du ou des annuaires\
        \ g\xE9rant les utilisateurs ou les ressources des syst\xE8mes d\u2019information.\n\
        L\u2019ensemble des ressources regroupant un annuaire, les ressources mat\xE9\
        rielles et logicielles h\xE9bergeant cet annuaire ou permettant de prendre\
        \ le contr\xF4le de cet annuaire (les comptes, les hyperviseurs, les machines\
        \ d\u2019administration, etc.) est d\xE9sign\xE9 \xAB c\u0153ur de confiance\
        \ \xBB (par exemple : Le Tier0 un annuaire AD DS constitue le c\u0153ur de\
        \ confiance du syst\xE8me d\u2019information).\nPour chacun de ses annuaires,\
        \ l\u2019entit\xE9 identifie les ressources constituant son c\u0153ur de confiance."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.b.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      ref_id: 11.B.3-EE
      description: "Les actions d\u2019administration d\u2019un c\u0153ur de confiance\
        \ sont r\xE9alis\xE9es depuis des comptes d\u2019administration d\xE9di\xE9\
        s \xE0 l\u2019administration de c\u0153urs de confiance."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.b.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      ref_id: 11.B.4-EE
      description: "Les actions d'administration d\u2019un c\u0153ur de confiance\
        \ sont r\xE9alis\xE9es depuis des ressources d\xE9di\xE9es exclusivement \xE0\
        \ l\u2019administration de c\u0153urs de confiance."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.b.5-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      ref_id: 11.B.5-EE
      description: "Les connexions externes \xE0 un c\u0153ur de confiance, \xE0 destination\
        \ des ressources d\u2019administration de c\u0153urs de confiance sont interdites\
        \ par un dispositif de filtrage sur les ressources d\u2019administration (par\
        \ exemple : le filtrage peut \xEAtre r\xE9alis\xE9 par le pare-feu local de\
        \ la ressource d\u2019administration du c\u0153ur de confiance)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.b.6-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      ref_id: 11.B.6-EE
      description: "L\u2019entit\xE9 effectue annuellement une revue de la configuration\
        \ des annuaires g\xE9rant les utilisateurs ou les ressources de ses syst\xE8\
        mes d\u2019information, afin d\u2019identifier tout \xE9l\xE9ment inutile\
        \ ou anormal.\nIl est recommand\xE9 que cette revue s\u2019appuie sur un outil\
        \ automatis\xE9."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:11.b.7-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-11:-maitrise-de-l_administration-des-systemes-d_information:2
      ref_id: 11.B.7-EE
      description: "Lorsqu\u2019elles existent, les recommandations de l\u2019autorit\xE9\
        \ nationale de s\xE9curit\xE9 des syst\xE8mes d\u2019information relatives\
        \ au c\u0153ur de confiance sont mises en \u0153uvre (par exemple : guide\
        \ de s\xE9curisation, guide de r\xE9ponses \xE0 incidents, m\xE9mos techniques,\
        \ recommandations issues des outils de revues de configurations)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 12: Identification et r\xE9action aux incidents\
        \ de s\xE9curit\xE9"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite
      name: Gestion des incidents
    - urn: urn:intuitem:risk:req_node:recyf:12.1-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      ref_id: 12.1-EE
      description: "L\u2019entit\xE9 s\u2019assure de l\u2019\xE9laboration, du maintien\
        \ \xE0 jour et de la mise en \u0153uvre d\u2019une proc\xE9dure de traitement\
        \ des incidents de s\xE9curit\xE9 affectant ses syst\xE8mes d\u2019information."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:12.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      ref_id: 12.2-EE
      description: "L\u2019entit\xE9 s\u2019assure de la mise en \u0153uvre des outils\
        \ permettant de collecter les signalements remont\xE9s, en particulier par\
        \ les sources suivantes :\n\u2022\tLes employ\xE9s de l\u2019entit\xE9 essentielle\
        \ ;\n\u2022\tLes clients et les usagers des activit\xE9s et services mis en\
        \ \u0153uvre par l\u2019entit\xE9 essentielle ;\n\u2022\tLes prestataires\
        \ et les fournisseurs contractant avec l\u2019entit\xE9 essentielle."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:12.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      ref_id: 12.3-EI/EE
      description: "L\u2019entit\xE9 s\u2019assure de la d\xE9finition et de la mise\
        \ en \u0153uvre des m\xE9canismes permettant d\u2019analyser et de qualifier\
        \ les \xE9v\xE9nements remont\xE9s et d\u2019identifier les incidents potentiels\
        \ ou av\xE9r\xE9s."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:12.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      ref_id: 12.4-EE
      description: "L\u2019entit\xE9 s\u2019assure de la d\xE9finition et de la mise\
        \ en \u0153uvre des m\xE9canismes organisationnels et techniques permettant\
        \ de r\xE9agir en cas d\u2019incident et de limiter les cons\xE9quences sur\
        \ la fourniture des services.\nCes m\xE9canismes sont repris, le cas \xE9\
        ch\xE9ant, dans la d\xE9finition des plans de continuit\xE9 et de reprise\
        \ d\u2019activit\xE9."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:12.5-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      ref_id: 12.5-EE
      description: "En compl\xE9ment des dispositions de l\u2019article 17 de la loi\
        \ XXX, l\u2019entit\xE9 s\u2019assure, apr\xE8s chaque incident de s\xE9curit\xE9\
        , qu\u2019une analyse des causes de l\u2019incident a \xE9t\xE9 r\xE9alis\xE9\
        e.\nL\u2019analyse des causes vise \xE0 d\xE9finir et mettre en \u0153uvre\
        \ les mesures de s\xE9curit\xE9 permettant de limiter la vraisemblance d\u2019\
        un nouvel incident ou d\u2019en r\xE9duire l\u2019impact. L\u2019entit\xE9\
        \ conserve des preuves de cette analyse."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:12.6-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      ref_id: 12.6-EI/EE
      description: "L\u2019entit\xE9 conserve les relev\xE9s techniques dont elles\
        \ disposent (par exemple : rapport d\u2019analyse, alertes remont\xE9es par\
        \ les outils de protection contre les codes malveillants) et pouvant \xEA\
        tre utilis\xE9s comme \xE9l\xE9ments de preuve en cas de judiciarisation.\
        \ Ces relev\xE9s techniques sont conserv\xE9s pour une dur\xE9e pertinente\
        \ au regard de la protection des donn\xE9es \xE0 caract\xE8re personnel et\
        \ en particulier la finalit\xE9 du traitement."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:12.7-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-12:-identification-et-reaction-aux-incidents-de-securite:1
      ref_id: 12.7-EE
      description: "Les relev\xE9s techniques relatifs aux analyses des incidents\
        \ sont prot\xE9g\xE9s d\u2019un incident qui les rendrait inexploitables (par\
        \ exemple : le stockage hors-ligne pour r\xE9pondre \xE0 un incident de type\
        \ ran\xE7ongiciel)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 13: Continuit\xE9 et reprise d'activit\xE9"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite
      name: "Continuit\xE9 et reprise d'activit\xE9"
    - urn: urn:intuitem:risk:req_node:recyf:13.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      ref_id: 13.1-EI/EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre des proc\xE9\
        dures de sauvegarde et de restauration de ses syst\xE8mes d\u2019information\
        \ et des donn\xE9es qu\u2019ils manipulent."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:13.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      ref_id: 13.2-EI/EE
      description: "L\u2019entit\xE9 s\u2019assure que les processus de sauvegarde\
        \ et de restauration sont test\xE9s au minimum une fois par an. Ces tests\
        \ visent notamment \xE0 v\xE9rifier la bonne r\xE9alisation des sauvegardes\
        \ et leur bonne restauration."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:13.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      ref_id: 13.3-EI/EE
      description: "Les sauvegardes sont prot\xE9g\xE9es d\u2019un incident les rendant\
        \ inexploitables (par exemple : le stockage hors-ligne pour r\xE9pondre \xE0\
        \ un incident de type ran\xE7ongiciel)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:13.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      ref_id: 13.4-EE
      description: "L\u2019entit\xE9, pour chacun de ses activit\xE9s et services,\
        \ d\xE9finit et documente la dur\xE9e maximale d\u2019interruption admissible\
        \ (DMIA) et le point de r\xE9tablissement des donn\xE9es (PRD)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:13.5-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      ref_id: 13.5-EE
      description: "Les m\xE9canismes de sauvegarde sont dimensionn\xE9s pour r\xE9\
        pondre aux besoins de disponibilit\xE9 associ\xE9s aux diff\xE9rents services\
        \ et aux diff\xE9rentes activit\xE9s fournis par l\u2019entit\xE9."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:13.6-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      ref_id: 13.6-EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre un plan de continuit\xE9\
        \ d\u2019activit\xE9 (PCA) et un plan de reprise d\u2019activit\xE9 (PRA)\
        \ adapt\xE9s aux sc\xE9narios de crises d\u2019origine cyber et coh\xE9rents\
        \ avec la dur\xE9e maximale d\u2019interruption admissible et le point de\
        \ r\xE9tablissement des donn\xE9es."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:13.7-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-13:-continuite-et-reprise-d_activite:1
      ref_id: 13.7-EE
      description: "L\u2019identification de ces mesures de continuit\xE9 s\u2019\
        appuie notamment :\n\u2022\tSur la cartographie de l\u2019\xE9cosyst\xE8me\
        \ ;\n\u2022\tSur la proc\xE9dure de gestion des incidents pour d\xE9tecter\
        \ et r\xE9agir au plus t\xF4t aux incidents ;\n\u2022\tSur la proc\xE9dure\
        \ de gestion des crises d\u2019origine cyber pour permettre la reprise au\
        \ plus t\xF4t des services."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 14: R\xE9action aux crises d'origine cyber"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber
      name: Gestion de crise
    - urn: urn:intuitem:risk:req_node:recyf:14.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.1-EI/EE
      description: "L\u2019entit\xE9 s\u2019assure de la d\xE9finition, du maintien\
        \ \xE0 jour et de la mise en \u0153uvre d\u2019une proc\xE9dure de gestion\
        \ de crises en cas d\u2019incident de s\xE9curit\xE9 sur ses syst\xE8mes d\u2019\
        information n\xE9cessitant le passage en mode crise (par exemple : pour les\
        \ incidents importants au sens de l\u2019article 17 du PJL)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.2-EI/EE
      description: "L\u2019entit\xE9 s\u2019assure du maintien \xE0 jour d\u2019une\
        \ liste imprim\xE9e des personnes mobilisables dans la gestion de la crise\
        \ sur les sujets relatifs \xE0 la s\xE9curit\xE9 num\xE9rique ainsi que leurs\
        \ coordonn\xE9es."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.3-EI/EE
      description: "L\u2019entit\xE9 s\u2019assure que la liste des personnes mobilisables\
        \ pr\xE9vue au 14.2-EI/EE est accessible dans un format adapt\xE9 \xE0 la\
        \ nature de la crise (par exemple, la liste doit \xEAtre accessible au format\
        \ papier si les syst\xE8mes d\u2019information ne sont plus disponibles, et\
        \ elle doit \xEAtre accessible au format num\xE9rique si la version papier\
        \ n\u2019est pas accessible)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.4-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.4-EI/EE
      description: "L\u2019entit\xE9 s\u2019assure du maintien \xE0 jour d\u2019un\
        \ annuaire des parties prenantes externes \xE0 l\u2019entit\xE9 pertinente\
        \ dans la gestion de la crise en s\u2019appuyant sur la cartographie de l\u2019\
        \xE9cosyst\xE8me."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.5-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.5-EI/EE
      description: "L\u2019entit\xE9 essentielle s\u2019assure de la mise en \u0153\
        uvre de retour d\u2019exp\xE9rience (RETEX) permettant d\u2019identifier les\
        \ axes d\u2019am\xE9lioration et les mesures associ\xE9es \xE0 mettre en \u0153\
        uvre suite \xE0 un entra\xEEnement, un exercice ou une crise r\xE9elle."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.6-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.6-EE
      description: "L\u2019entit\xE9 s\u2019assure de la d\xE9finition, du maintien\
        \ \xE0 jour et de la mise en \u0153uvre des crit\xE8res permettant d\u2019\
        activer et de d\xE9sactiver le dispositif de gestion de crise prenant en compte\
        \ les menaces cyber."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.7-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.7-EE
      description: "L\u2019entit\xE9 s\u2019assure de la d\xE9finition, du maintien\
        \ \xE0 jour et de la mise en \u0153uvre des proc\xE9dures et des m\xE9canismes\
        \ de gestion de la crise adapt\xE9s \xE0 la menace cyber en s\u2019appuyant\
        \ sur les recommandations de l\u2019autorit\xE9 nationale de s\xE9curit\xE9\
        \ des syst\xE8mes d\u2019information."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.8-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.8-EE
      description: "L\u2019entit\xE9 s\u2019assure de la d\xE9finition et de la mise\
        \ en \u0153uvre des mesures pour isoler, prot\xE9ger et, le cas \xE9ch\xE9\
        ant, reconstruire les syst\xE8mes d\u2019information concern\xE9s, activables\
        \ en cas d\u2019incident de s\xE9curit\xE9.\nCes mesures prennent en compte\
        \ les infrastructures, applicatifs et services num\xE9riques externalis\xE9\
        s \xE0 des prestataires et sont mises en place en coh\xE9rence avec les plans\
        \ de continuit\xE9 et de reprise d\u2019activit\xE9."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.9-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.9-EE
      description: "L\u2019entit\xE9 s\u2019assure de la d\xE9finition d\u2019une\
        \ strat\xE9gie de communication adapt\xE9e aux crises d\u2019origine cyber,\
        \ incluant des sc\xE9narios de crise, le sch\xE9ma d\u2019organisation de\
        \ la communication de crise, les outils de pilotage de la communication et\
        \ des \xE9l\xE9ments de langage sur des sujets sensibles ou de crise. Cette\
        \ strat\xE9gie prend en compte les sc\xE9narios de menaces cyber identifi\xE9\
        s."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:14.10-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-14:-reaction-aux-crises-d_origine-cyber:1
      ref_id: 14.10-EE
      description: "L\u2019entit\xE9 s\u2019assure de la disponibilit\xE9 de moyens\
        \ de communication de secours, si possible, s\xE9curis\xE9s en temps de crise\
        \ lorsque les moyens de communication habituels sont indisponibles."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-15:-exercices_-tests-et-entrainements
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 15: Exercices, tests et entrainements"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-15:-exercices_-tests-et-entrainements:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-15:-exercices_-tests-et-entrainements
      name: "Exercices, tests et entra\xEEnements"
    - urn: urn:intuitem:risk:req_node:recyf:15.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-15:-exercices_-tests-et-entrainements:1
      ref_id: 15.1-EI/EE
      description: "L\u2019entit\xE9 s\u2019assure de la sensibilisation et de la\
        \ mise en \u0153uvre d\u2019un exercice sur table \xE0 une fr\xE9quence qu\u2019\
        elle d\xE9finit pour les personnes mobilisables dans le dispositif de gestion\
        \ des crises d\u2019origine cyber."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:15.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-15:-exercices_-tests-et-entrainements:1
      ref_id: 15.2-EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre une strat\xE9\
        gie d\u2019entra\xEEnement qui comporte, au minimum, les \xE9l\xE9ments suivants\
        \ :\n\u2022\tUne liste des acteurs amen\xE9s \xE0 participer aux diff\xE9\
        rents dispositifs d\u2019entra\xEEnement et d\u2019exercice ;\n\u2022\tUne\
        \ liste d\u2019exercices permettant d\u2019entra\xEEner ou de tester les capacit\xE9\
        s op\xE9rationnelles ;\n\u2022\tLes objectifs vis\xE9s par la strat\xE9gie\
        \ ; \n\u2022\tLes moyens de v\xE9rification ou d\u2019\xE9valuation d\u2019\
        atteinte de ces objectifs ;\n\u2022\tLes sc\xE9narios de risques ou d\u2019\
        attaques \xE0 tester en priorit\xE9 ;\n\u2022\tLa comitologie de suivi de\
        \ la strat\xE9gie.\nCette strat\xE9gie peut \xEAtre mutualis\xE9e avec d\u2019\
        autres livrables."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:15.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-15:-exercices_-tests-et-entrainements:1
      ref_id: 15.3-EE
      description: "Cette strat\xE9gie d\u2019entra\xEEnement vise \xE0 tester les\
        \ dispositifs mis en \u0153uvre par l\u2019entit\xE9 en mati\xE8re :\n\u2022\
        \tDe gestion des alertes relatives aux incidents, aux vuln\xE9rabilit\xE9\
        s et menaces ;\n\u2022\tDe continuit\xE9 et de reprise d\u2019activit\xE9\
        \ ;\n\u2022\tDe gestion des crises d\u2019origine cyber."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:15.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-15:-exercices_-tests-et-entrainements:1
      ref_id: 15.4-EE
      description: "L\u2019entit\xE9 d\xE9cline cette strat\xE9gie dans la d\xE9finition\
        \ et la mise en \u0153uvre d\u2019un programme triennal d\u2019entra\xEEnement\
        \ et d\u2019exercice. Ce programme pr\xE9cise notamment la fr\xE9quence de\
        \ ces entra\xEEnements et exercices ainsi que leur nature et que leurs objectifs.\n\
        Ce programme triennal doit permettre de tester les dispositifs de gestion\
        \ des incidents, de gestion des crises d\u2019origine cyber et de coop\xE9\
        ration avec l\u2019\xE9cosyst\xE8me et, le cas \xE9ch\xE9ant, le volet cyber\
        \ des plans de continuit\xE9 et de reprise d\u2019activit\xE9."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-16:-mise-en-uvre-d_une-approche-par-les-risques
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 16: Mise en \u0153uvre d'une approche par\
        \ les risques"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-16:-mise-en-uvre-d_une-approche-par-les-risques:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-16:-mise-en-uvre-d_une-approche-par-les-risques
      name: Approche par les risques
    - urn: urn:intuitem:risk:req_node:recyf:16.1-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-16:-mise-en-uvre-d_une-approche-par-les-risques:1
      ref_id: 16.1-EE
      description: "L\u2019entit\xE9 d\xE9finit, met en \u0153uvre et maintient \xE0\
        \ jour une gouvernance par les risques.\nCette gouvernance vise \xE0 s\u2019\
        assurer que le risque num\xE9rique est pris en compte par le dirigeant ex\xE9\
        cutif de l\u2019entit\xE9 et les responsables d\u2019activit\xE9 ou de service\
        \ de l\u2019entit\xE9 au regard des r\xF4les et responsabilit\xE9s d\xE9finis\
        \ et que les moyens financiers, humains ou techniques ad\xE9quats sont allou\xE9\
        s pour ma\xEEtriser ce risque.\nCette gouvernance int\xE8gre les \xE9l\xE9\
        ments issus de l\u2019approche par la conformit\xE9 et la compl\xE8te par\
        \ une approche par les risques, r\xE9alis\xE9e dans les conditions d\xE9finies\
        \ ci-apr\xE8s. Ces approches sont compl\xE9mentaires et peuvent \xEAtre mutualis\xE9\
        es, notamment en termes de livrables attendus."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:16.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-16:-mise-en-uvre-d_une-approche-par-les-risques:1
      ref_id: 16.2-EE
      description: "L\u2019entit\xE9 s\u2019assure que chaque syst\xE8me d\u2019information\
        \ fait l\u2019objet d\u2019une analyse de risques.\nCette exigence peut \xEA\
        tre satisfaite via la r\xE9alisation et le maintien \xE0 jour d\u2019une analyse\
        \ de risques pour chaque activit\xE9 ou service qu\u2019elle fournit, couvrant\
        \ l\u2019ensemble des syst\xE8mes d\u2019information supportant cette activit\xE9\
        \ ou ce service.\nCette analyse de risques s\u2019appuie sur les \xE9l\xE9\
        ments issus :\n\u2022\tDe la PSSI et des sp\xE9cificit\xE9s sectorielles ;\n\
        \u2022\tDe la ma\xEEtrise de l\u2019\xE9cosyst\xE8me ;\n\u2022\tDe la ma\xEE\
        trise du syst\xE8me d\u2019information ;\n\u2022\tDe l\u2019approche par conformit\xE9\
        \ ;\n\u2022\tDes audits.\nLa m\xE9thode EBIOS RM peut \xEAtre utilis\xE9e\
        \ pour r\xE9aliser cette analyse de risques."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:16.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-16:-mise-en-uvre-d_une-approche-par-les-risques:1
      ref_id: 16.3-EE
      description: "L\u2019entit\xE9 valide l\u2019analyse de risques, accepte les\
        \ risques r\xE9siduels et met en \u0153uvre le plan d\u2019action pour ma\xEE\
        triser ces risques.\nLe plan d\u2019action pr\xE9voit, au minimum, une \xE9\
        ch\xE9ance raisonnable et un responsable pour la r\xE9alisation de chaque\
        \ action."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:16.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-16:-mise-en-uvre-d_une-approche-par-les-risques:1
      ref_id: 16.4-EE
      description: "L\u2019entit\xE9 r\xE9examine l\u2019analyse de risques au minimum\
        \ tous les trois ans et en tant que de besoin, notamment en cas d\u2019incident\
        \ de s\xE9curit\xE9 ou d\u2019\xE9volutions majeures du contexte m\xE9tier,\
        \ technique ou organisationnel."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 17: Audit de la s\xE9curit\xE9 des syst\xE8\
        mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information
      name: "Audits de la s\xE9curit\xE9"
    - urn: urn:intuitem:risk:req_node:recyf:17.1-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information:1
      ref_id: 17.1-EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre un programme\
        \ d\u2019audit de l\u2019ensemble de ses syst\xE8mes d\u2019information et\
        \ s\u2019assure que les audits associ\xE9s \xE0 ce programme ainsi que leur\
        \ profondeur et leur fr\xE9quence tiennent compte de tout ou partie de l\u2019\
        analyse de risque r\xE9alis\xE9e, de la criticit\xE9 du syst\xE8me d\u2019\
        information au regard de son organisation et de l\u2019exposition du syst\xE8\
        me d\u2019information aux risques num\xE9riques.\nPour \xE9valuer cette criticit\xE9\
        \ et ce niveau d\u2019exposition, l\u2019entit\xE9 peut s\u2019appuyer sur\
        \ les recommandations de l\u2019autorit\xE9 nationale de s\xE9curit\xE9 des\
        \ syst\xE8mes d\u2019information en mati\xE8re de gestion des risques num\xE9\
        riques."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:17.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information:1
      ref_id: 17.2-EE
      description: "L\u2019audit de s\xE9curit\xE9 permet, de mani\xE8re ind\xE9pendante\
        \ :\n\u2022\tDe v\xE9rifier, sur le p\xE9rim\xE8tre d\xE9fini, l\u2019atteinte\
        \ des objectifs fix\xE9s par la r\xE9glementation via \no\tLa conformit\xE9\
        \ aux pr\xE9sentes mesures, ou \no\tLa mise en \u0153uvre de mesures alternatives\
        \ ; et\n\u2022\tD\u2019\xE9valuer le niveau de s\xE9curit\xE9 du ou des syst\xE8\
        mes d\u2019information couverts au regard des menaces et des vuln\xE9rabilit\xE9\
        s connues."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:17.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information:1
      ref_id: 17.3-EE
      description: "Sans pr\xE9judice d\u2019autres obligations l\xE9gales et r\xE9\
        glementaires, l\u2019audit de s\xE9curit\xE9 comprend au minimum une activit\xE9\
        \ parmi les suivantes : un test d\u2019intrusion (couvrant au minimum les\
        \ interfaces expos\xE9es \xE0 des syst\xE8mes sous la responsabilit\xE9 de\
        \ l\u2019entit\xE9 pour lesquels elle a d\xE9cid\xE9 de ne pas appliquer les\
        \ objectifs de s\xE9curit\xE9 ainsi qu\u2019\xE0 des syst\xE8mes d\u2019information\
        \ tiers), un audit de configuration, un audit d\u2019architecture, un audit\
        \ organisationnel et physique et, lorsque cela est pertinent, un audit de\
        \ code."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:17.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information:1
      ref_id: 17.4-EE
      description: "Le rapport de l\u2019audit de s\xE9curit\xE9 pr\xE9sente :\n\u2022\
        \tUne synth\xE8se de la conformit\xE9 aux pr\xE9sentes mesures ou aux mesures\
        \ d\xE9finies par l\u2019entit\xE9 pour atteindre les objectifs fix\xE9s par\
        \ la r\xE9glementation et du niveau de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information audit\xE9s ;\n\u2022\tLes constats de non-conformit\xE9 et les\
        \ vuln\xE9rabilit\xE9s identifi\xE9es ;\n\u2022\tLes recommandations pour\
        \ y rem\xE9dier."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:17.5-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-17:-audit-de-la-securite-des-systemes-d_information:1
      ref_id: 17.5-EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre un plan d\u2019\
        action visant \xE0 corriger les non-conformit\xE9s et les vuln\xE9rabilit\xE9\
        s identifi\xE9es.\nCe plan d\u2019action pr\xE9voit, au minimum, une \xE9\
        ch\xE9ance raisonnable et un responsable pour la r\xE9alisation de chaque\
        \ action."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-18:-securisation-de-la-configuration-des-ressources-des-systemes-d_information
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 18: S\xE9curisation de la configuration des\
        \ ressources des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-18:-securisation-de-la-configuration-des-ressources-des-systemes-d_information:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-18:-securisation-de-la-configuration-des-ressources-des-systemes-d_information
      name: "S\xE9curisation de la configuration"
    - urn: urn:intuitem:risk:req_node:recyf:18.1-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-18:-securisation-de-la-configuration-des-ressources-des-systemes-d_information:1
      ref_id: 18.1-EE
      description: "L\u2019entit\xE9 n\u2019installe et ne conserve sur ses syst\xE8\
        mes d\u2019information que les ressources logicielles n\xE9cessaires \xE0\
        \ la r\xE9alisation de ses activit\xE9s et services ou au maintien en condition\
        \ op\xE9rationnelle ou de s\xE9curit\xE9 de ses syst\xE8mes d\u2019information\
        \ (par exemple : utilisation d\u2019un mod\xE8le de configuration centralis\xE9\
        \ (master) contenant exclusivement les logiciels/services strictement n\xE9\
        cessaires aux besoins m\xE9tiers et d\u2019administration)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:18.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-18:-securisation-de-la-configuration-des-ressources-des-systemes-d_information:1
      ref_id: 18.2-EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas de d\xE9sactiver ou d\xE9sinstaller une ressource logicielle, l\u2019\
        entit\xE9 met en \u0153uvre des mesures permettant de r\xE9duire le risque\
        \ associ\xE9."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:18.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-18:-securisation-de-la-configuration-des-ressources-des-systemes-d_information:1
      ref_id: 18.3-EE
      description: "L\u2019entit\xE9 configure les ressources de ses syst\xE8mes d\u2019\
        information de mani\xE8re s\xE9curis\xE9e en s\u2019appuyant sur les recommandations\
        \ de l\u2019\xE9diteur de la fonctionnalit\xE9, du fabricant de la ressource\
        \ ou de l\u2019autorit\xE9 nationale de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:18.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-18:-securisation-de-la-configuration-des-ressources-des-systemes-d_information:1
      ref_id: 18.4-EE
      description: "L\u2019entit\xE9 effectue annuellement une revue de configuration\
        \ des ressources de ses syst\xE8mes d\u2019information pour v\xE9rifier l\u2019\
        application des mesures pr\xE9c\xE9dentes. Il est recommand\xE9 que cette\
        \ revue s\u2019appuie sur un ou des outils automatis\xE9s (par exemple : scan\
        \ de port et de vuln\xE9rabilit\xE9, revue (manuel ou automatique) des configurations\
        \ des pares-feux par rapport aux matrices de flux)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 19: Administration des syst\xE8mes d'information\
        \ depuis des ressources d\xE9di\xE9es"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees
      name: Administration des SI
    - urn: urn:intuitem:risk:req_node:recyf:19.1-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.1-EE
      description: "Les actions d\u2019administration sont effectu\xE9es au moyen\
        \ d\u2019un r\xE9seau d\u2019administration d\xE9di\xE9."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.2-EE
      description: "Les ressources des r\xE9seaux d'administration sont g\xE9r\xE9\
        es et configur\xE9es par l\u2019entit\xE9 ou par le prestataire qu'elle a\
        \ mandat\xE9 pour r\xE9aliser les actions d'administration."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.3-EE
      description: "Les ressources mat\xE9rielles des r\xE9seaux d\u2019administration\
        \ sont utilis\xE9es exclusivement pour r\xE9aliser des actions d\u2019administration."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.4-EE
      description: "Le poste physique utilis\xE9 pour effectuer des actions d'administration\
        \ est utilis\xE9 exclusivement pour r\xE9aliser des actions d\u2019administration."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.5-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.5-EE
      description: "La connexion des administrateurs \xE0 un r\xE9seau d\u2019administration\
        \ s\u2019effectue au moyen d\u2019un poste physique utilis\xE9 exclusivement\
        \ pour des actions d\u2019administration."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.6-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.6-EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas de d\xE9dier le poste de travail physique de l'administrateur pour les\
        \ actions d'administration, l\u2019entit\xE9 met en \u0153uvre des mesures\
        \ de durcissement et de cloisonnement du syst\xE8me d'exploitation du poste\
        \ de travail permettant d'isoler le syst\xE8me d\u2019exploitation utilis\xE9\
        \ pour les actions d'administration du syst\xE8me d\u2019exploitation utilis\xE9\
        \ pour les autres actions. Ces mesures sont conformes aux recommandations\
        \ de l\u2019autorit\xE9 nationale de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information, y compris les recommandations alternatives."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.7-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.7-EE
      description: "Les r\xE9seaux d'administration sont connect\xE9s aux ressources\
        \ du syst\xE8me d\u2019information \xE0 administrer au travers d'une liaison\
        \ r\xE9seau physique utilis\xE9e exclusivement pour les actions d'administration.\
        \ Ces ressources sont administr\xE9es au travers de leur interface d'administration\
        \ physique."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.8-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.8-EE
      description: "Les modalit\xE9s de cloisonnement et de filtrage du r\xE9seau\
        \ d\u2019administration respectent les modalit\xE9s de cloisonnement et de\
        \ filtrage mis en \u0153uvre entre et au sein des syst\xE8mes d\u2019information\
        \ (par exemple : deux machines ne pouvant pas communiquer au travers des syst\xE8\
        mes d\u2019information ne peuvent pas communiquer au travers du r\xE9seau\
        \ d\u2019administration)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.9-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.9-EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas d'administrer une ressource au travers d'une liaison r\xE9seau physique\
        \ ou de son interface d'administration physique, l\u2019entit\xE9 met en \u0153\
        uvre des mesures de r\xE9duction du risque telles que des mesures de s\xE9\
        curit\xE9 logique. Ces mesures sont conformes aux recommandations de l\u2019\
        autorit\xE9 nationale de s\xE9curit\xE9 des syst\xE8mes d\u2019information\
        \ y compris les recommandations alternatives."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.10-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.10-EE
      description: "Les communications associ\xE9es \xE0 des actions d\u2019administration\
        \ sont prot\xE9g\xE9es par des m\xE9canismes de chiffrement et d\u2019authentification\
        \ conformes \xE0 l\u2019\xE9tat de l'art tel que recommand\xE9 par l\u2019\
        autorit\xE9 nationale de s\xE9curit\xE9 des syst\xE8mes d\u2019information\
        \ (par exemple : en utilisant des protocoles s\xE9curis\xE9s garantissant\
        \ l\u2019authentification de l\u2019administrateur, l\u2019int\xE9grit\xE9\
        \ et la confidentialit\xE9 des messages)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.11-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.11-EE
      description: "Les communications associ\xE9es \xE0 des actions d\u2019administration\
        \ qui transitent sur des r\xE9seaux non d\xE9di\xE9s \xE0 ces communications\
        \ sont cloisonn\xE9es au moyen de m\xE9canismes de chiffrement et d\u2019\
        authentification conformes aux mesures recommand\xE9es par l\u2019autorit\xE9\
        \ nationale de s\xE9curit\xE9 des syst\xE8mes d\u2019information (par exemple\
        \ : au travers de tunnels VPN)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:19.12-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-19:-administration-des-systemes-d_information-depuis-des-ressources-dediees:1
      ref_id: 19.12-EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas de recourir \xE0 des m\xE9canismes de chiffrement ou d\u2019authentification\
        \ de ces communications, l\u2019entit\xE9 met en \u0153uvre des mesures permettant\
        \ de prot\xE9ger la confidentialit\xE9 et l\u2019int\xE9grit\xE9 de ces flux\
        \ et de renforcer le contr\xF4le et la tra\xE7abilit\xE9 des actions d\u2019\
        administration."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 20: Supervision de la s\xE9curit\xE9 des syst\xE8\
        mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information
      name: "Supervision de la s\xE9curit\xE9"
    - urn: urn:intuitem:risk:req_node:recyf:20.1-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information:1
      ref_id: 20.1-EE
      description: "L\u2019entit\xE9 s\u2019assure que les \xE9quipes en charge de\
        \ l\u2019activit\xE9 de supervision de s\xE9curit\xE9 dimensionnent et op\xE8\
        rent le syst\xE8me d\u2019information supportant l\u2019activit\xE9 de supervision\
        \ de s\xE9curit\xE9 en ad\xE9quation avec leur capacit\xE9 op\xE9rationnelle,\
        \ afin de prendre en compte les journaux et les \xE9v\xE8nements de s\xE9\
        curit\xE9, sans retard injustifi\xE9 et au maximum sous 24h ouvr\xE9s (Par\
        \ exemple : l\u2019ensemble des \xE9v\xE8nements de s\xE9curit\xE9 issus de\
        \ l\u2019EDR)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:20.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information:1
      ref_id: 20.2-EE
      description: "L\u2019entit\xE9 \xE9labore et met en \u0153uvre une d\xE9marche\
        \ d\u2019am\xE9lioration continue de son activit\xE9 de supervision de s\xE9\
        curit\xE9, afin d\u2019am\xE9liorer la couverture des sc\xE9narios de menaces\
        \ identifi\xE9s \xE0 l\u2019occasion de l\u2019analyse de risque pr\xE9vue\
        \ \xE0 l\u2019objectif de s\xE9curit\xE9 16, et l\u2019efficacit\xE9 de la\
        \ supervision de s\xE9curit\xE9, en accord avec les dispositions pr\xE9vues\
        \ 20.1-EE (par exemple : augmentation des sources de collecte, am\xE9lioration\
        \ des processus de traitements, augmentation des capacit\xE9s de traitement,\
        \ centralisation des journaux et des \xE9v\xE8nements de s\xE9curit\xE9, mise\
        \ en place de corr\xE9lation, prise en compte de sc\xE9narios de menace suppl\xE9\
        mentaires)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:20.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information:1
      ref_id: 20.3-EE
      description: "L\u2019entit\xE9 ou le prestataire qu\u2019elle a mandat\xE9 \xE0\
        \ cet effet ma\xEEtrise l\u2019architecture et la configuration du syst\xE8\
        me d\u2019information supportant l\u2019activit\xE9 de supervision de s\xE9\
        curit\xE9 (par exemple : Le syst\xE8me peut \xEAtre compos\xE9 d\u2019une\
        \ ou plusieurs des cha\xEEnes suivantes : collecte, analyse, investigation,\
        \ signalement)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:20.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information:1
      ref_id: 20.4-EE
      description: "En lien avec la d\xE9marche d\u2019am\xE9lioration continue, l\u2019\
        entit\xE9 collecte les donn\xE9es de supervision et les \xE9v\xE8nements de\
        \ s\xE9curit\xE9 utiles \xE0 la d\xE9tection des sc\xE9narios principaux de\
        \ menaces, conform\xE9ment \xE0 la disposition pr\xE9vue en 20.1-EE. Les journaux\
        \ et \xE9v\xE8nements refl\xE8tent, la vari\xE9t\xE9 des activit\xE9s du syst\xE8\
        me d\u2019information associ\xE9es (par exemple : r\xE9seau, syst\xE8me, applicatif,\
        \ utilisateur)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:20.5-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information:1
      ref_id: 20.5-EE
      description: "L\u2019entit\xE9 s\u2019assure que les donn\xE9es de supervision\
        \ et les \xE9v\xE9nements de s\xE9curit\xE9 sont conserv\xE9s pour une dur\xE9\
        e d'au moins trois mois, sans pr\xE9judice d\u2019autres obligations l\xE9\
        gales et r\xE9glementaires (par exemple : le r\xE8glement g\xE9n\xE9ral sur\
        \ la protection des donn\xE9es \xE0 caract\xE8re personnel)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:20.6-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-20:-supervision-de-la-securite-des-systemes-d_information:1
      ref_id: 20.6-EE
      description: "Les donn\xE9es de supervision et les \xE9v\xE9nements de s\xE9\
        curit\xE9 sont prot\xE9g\xE9s d\u2019un incident les rendant inexploitables\
        \ (par exemple : le stockage hors-ligne pour r\xE9pondre \xE0 un incident\
        \ de type ran\xE7ongiciel)."
      implementation_groups:
      - EntiteEssentielle
