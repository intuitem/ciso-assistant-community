      ref_id: 4.2-EI/EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre un programme\
        \ de sensibilisation \xE0 la s\xE9curit\xE9 num\xE9rique de l\u2019ensemble\
        \ des utilisateurs.\nCe programme doit comporter des actions tout au long\
        \ de la pr\xE9sence des utilisateurs dans l\u2019entit\xE9."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:4.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-4:-prise-en-compte-de-la-securite-numerique-dans-la-gestion-des-ressources-humaines:1
      ref_id: 4.3-EE
      description: "L\u2019entit\xE9 pr\xE9voit des clauses de s\xE9curit\xE9 dans\
        \ ses contrats de travail (par exemple : clauses de confidentialit\xE9 de\
        \ nature \xE0 garantir la confidentialit\xE9 des informations auxquelles les\
        \ salari\xE9s ont acc\xE8s au cours de leur contrat et \xE0 l\u2019issu de\
        \ celui-ci)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:4.4-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-4:-prise-en-compte-de-la-securite-numerique-dans-la-gestion-des-ressources-humaines:1
      ref_id: 4.4-EI/EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre un processus\
        \ de gestion des arriv\xE9es, des d\xE9parts et des changements de fonction\
        \ des personnels et des tiers acc\xE9dant aux syst\xE8mes d\u2019information.\
        \ Ce processus pr\xE9voit :\n\u2022\tLa prise de connaissance des r\xE8gles\
        \ de s\xE9curit\xE9 en vigueur lors leur arriv\xE9e ;\n\u2022\tL\u2019attribution\
        \ des acc\xE8s appropri\xE9s lors de leur arriv\xE9e ;\n\u2022\tLa mise \xE0\
        \ jour des acc\xE8s lors d\u2019un changement de fonction ;\n\u2022\tLors\
        \ du d\xE9part, la restitution de l\u2019ensemble du mat\xE9riel qui a \xE9\
        t\xE9 mis \xE0 disposition et la d\xE9sactivation de l\u2019ensemble des acc\xE8\
        s logiques aux syst\xE8mes d\u2019information et physiques aux locaux et salles."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:4.5-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-4:-prise-en-compte-de-la-securite-numerique-dans-la-gestion-des-ressources-humaines:1
      ref_id: 4.5-EI/EE
      description: "L\u2019entit\xE9 d\xE9finit et met en \u0153uvre, pour les fonctions\
        \ assumant des responsabilit\xE9s dans le domaine du num\xE9rique, un programme\
        \ de formations d\xE9di\xE9es \xE0 la s\xE9curit\xE9 num\xE9rique adapt\xE9\
        \ \xE0 leurs responsabilit\xE9s."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 5: Maitrise des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information
      name: "Cartographie des syst\xE8mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:5.a.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:1
      ref_id: 5.A.1-EI/EE
      description: "L\u2019entit\xE9 \xE9labore et maintient \xE0 jour au moins une\
        \ cartographie de ses syst\xE8mes d\u2019information dont le niveau de d\xE9\
        tail est suffisant pour lui permettre :\no\td\u2019assurer le maintien en\
        \ condition op\xE9rationnelles et de s\xE9curit\xE9 de ces syst\xE8mes (par\
        \ exemple : \xEAtre capable d\u2019identifier les ressources mat\xE9rielles\
        \ ou logicielles vuln\xE9rables suite \xE0 la publication d\u2019un bulletin\
        \ d\u2019alerte) ;\no\tde pouvoir r\xE9agir sans retard injustifi\xE9 \xE0\
        \ un incident de s\xE9curit\xE9 affectant ces syst\xE8mes d\u2019information\
        \ (par exemple : \xEAtre capable d\u2019identifier les ressources mat\xE9\
        rielles ou logicielles affect\xE9es par un incident de s\xE9curit\xE9 et ainsi\
        \ limiter les cons\xE9quences de l\u2019incident).\nCette cartographie peut\
        \ s\u2019appuyer sur les recommandations de l\u2019autorit\xE9 nationale de\
        \ s\xE9curit\xE9 des syst\xE8mes d\u2019information en mati\xE8re de cartographie."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information
      name: "Maintien en condition op\xE9rationnelle et de s\xE9curit\xE9"
    - urn: urn:intuitem:risk:req_node:recyf:5.b.1-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.1-EE
      description: "L\u2019entit\xE9 \xE9labore, met en \u0153uvre et maintient \xE0\
        \ jour une proc\xE9dure de maintien en conditions op\xE9rationnelle et de\
        \ s\xE9curit\xE9 des ressources mat\xE9rielles et logicielles de ses syst\xE8\
        mes d\u2019information."
    - urn: urn:intuitem:risk:req_node:recyf:5.b.2-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.2-EI/EE
      description: "L\u2019entit\xE9 maintient \xE0 jour les bases de connaissances\
        \ des outils de protection contre les codes malveillants qu\u2019elle utilise\
        \ (par exemple : la mise \xE0 jour de la base antivirale de l\u2019antivirus,\
        \ la mise \xE0 jour des signatures utilis\xE9es par la solution d\u2019EDR)."
    - urn: urn:intuitem:risk:req_node:recyf:5.b.3-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.3-EI/EE
      description: "L\u2019entit\xE9 met en \u0153uvre une veille sur les vuln\xE9\
        rabilit\xE9s, les correctifs de s\xE9curit\xE9 et les mesures d\u2019att\xE9\
        nuation pr\xE9conis\xE9es susceptibles de concerner les ressources de ses\
        \ syst\xE8mes d\u2019information, qui sont diffus\xE9es notamment par les\
        \ fournisseurs ou les fabricants de ces ressources, par un prestataire mandat\xE9\
        \ ou par des centres de pr\xE9vention et d\u2019alerte en mati\xE8re de cyber\
        \ s\xE9curit\xE9 tels que le CERT-FR (centre gouvernemental de veille, d\u2019\
        alerte et de r\xE9ponse aux attaques informatiques) ou les CSIRT (centres\
        \ de r\xE9ponse aux incidents de s\xE9curit\xE9 informatique)."
    - urn: urn:intuitem:risk:req_node:recyf:5.b.4-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.4-EI/EE
      description: "L\u2019entit\xE9 met en \u0153uvre, au regard de la nature de\
        \ la vuln\xE9rabilit\xE9 :\n\u2022\tsans d\xE9lai : les actions visant \xE0\
        \ l\u2019installation des correctifs de s\xE9curit\xE9 (par exemple : le d\xE9\
        ploiement en environnement de test, pr\xE9-production et production, m\xE9\
        canismes de rollback) ;\n\u2022\tsans retard injustifi\xE9 : l\u2019application\
        \ effective des correctifs de s\xE9curit\xE9 apr\xE8s la r\xE9alisation des\
        \ actions pr\xE9c\xE9dentes\nsur les ressources expos\xE9es \xE0 des syst\xE8\
        mes d\u2019information tiers (par exemple : un serveur Web, un pare-feu expos\xE9\
        \ sur Internet, un serveur de messagerie) et les postes de travail des utilisateurs."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:5.b.5-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.5-EE
      description: "L\u2019entit\xE9 planifie et installe sur l\u2019ensemble de ses\
        \ ressources, y compris celles non expos\xE9es \xE0 des syst\xE8mes d\u2019\
        information tiers, les correctifs de s\xE9curit\xE9."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:5.b.6-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.6-EI/EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas l\u2019installation des correctifs de s\xE9curit\xE9 sur les ressources\
        \ concern\xE9es, l\u2019entit\xE9 met en \u0153uvre des mesures d\u2019att\xE9\
        nuation pour r\xE9duire les risques li\xE9s \xE0 l\u2019utilisation d\u2019\
        une version comportant des vuln\xE9rabilit\xE9s connues (par exemple : isoler\
        \ la ressource du reste du SI, mettre en place un contr\xF4le d'acc\xE8s renforc\xE9\
        )."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:5.b.7-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.7-EI/EE
      description: "L\u2019entit\xE9 met en \u0153uvre sans d\xE9lai les actions visant\
        \ \xE0 l\u2019installation et le maintien \xE0 jour des ressources logicielles\
        \ de ses syst\xE8mes d\u2019information, y compris les logiciels embarqu\xE9\
        s, dans des versions b\xE9n\xE9ficiant d\u2019un support par leurs fournisseurs\
        \ ou leurs fabricants et comportant les mises \xE0 jour de s\xE9curit\xE9."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:5.b.8-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.8-EI/EE
      description: "L\u2019entit\xE9 v\xE9rifie que toute nouvelle version d\u2019\
        un logiciel est t\xE9l\xE9charg\xE9e depuis les ressources officielles mises\
        \ \xE0 disposition par les \xE9diteurs ou les fournisseurs."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:5.b.9-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-5:-maitrise-des-systemes-d_information:2
      ref_id: 5.B.9-EI/EE
      description: "Lorsque des raisons techniques ou op\xE9rationnelles ne permettent\
        \ pas l\u2019installation d\u2019une version support\xE9e par le fournisseur\
        \ ou l\u2019\xE9diteur, l\u2019entit\xE9 met en \u0153uvre des mesures pour\
        \ r\xE9duire les risques li\xE9s \xE0 l\u2019utilisation d\u2019une version\
        \ obsol\xE8te."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-6:-maitrise-des-acces-physiques-aux-locaux
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 6: Maitrise des acc\xE8s physiques aux locaux"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-6:-maitrise-des-acces-physiques-aux-locaux:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-6:-maitrise-des-acces-physiques-aux-locaux
      name: "Ma\xEEtrise des acc\xE8s physiques"
    - urn: urn:intuitem:risk:req_node:recyf:6.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-6:-maitrise-des-acces-physiques-aux-locaux:1
      ref_id: 6.1-EI/EE
      description: "L\u2019entit\xE9 met en place des mesures de s\xE9curit\xE9 permettant\
        \ de limiter l\u2019acc\xE8s de personnes non autoris\xE9es \xE0 ses locaux,\
        \ ses salles serveurs et ses locaux techniques (par exemple : tenue d\u2019\
        un registre des visiteurs, badges d\u2019acc\xE8s, etc)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:6.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-6:-maitrise-des-acces-physiques-aux-locaux:1
      ref_id: 6.2-EE
      description: "L\u2019entit\xE9 s\u2019assure de la protection physique des locaux,\
        \ salles serveurs et locaux techniques (par exemple : vid\xE9osurveillance,\
        \ gardiennage, alarme).\nCette protection physique permet de pr\xE9venir,\
        \ de surveiller et de r\xE9agir aux acc\xE8s non autoris\xE9s \xE0 ces locaux."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:6.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-6:-maitrise-des-acces-physiques-aux-locaux:1
      ref_id: 6.3-EE
      description: "L\u2019entit\xE9 s\u2019assure que les droits d'acc\xE8s physique\
        \ sont attribu\xE9s au regard du besoin strictement n\xE9cessaire \xE0 l\u2019\
        ex\xE9cution des missions des personnes."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:6.4-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-6:-maitrise-des-acces-physiques-aux-locaux:1
      ref_id: 6.4-EI/EE
      description: "L'entit\xE9 s'assure que les personnes externes acc\xE9dant aux\
        \ locaux techniques et salles serveurs de l\u2019entit\xE9 sont accompagn\xE9\
        es ou d\xFBment autoris\xE9es."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-7:-securisation-de-l_architecture-des-systemes-d_information
      assessable: false
      depth: 1
      name: "Objectif de s\xE9curit\xE9 7: S\xE9curisation de l'architecture des syst\xE8\
        mes d'information"
    - urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-7:-securisation-de-l_architecture-des-systemes-d_information:1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-7:-securisation-de-l_architecture-des-systemes-d_information
      name: Cloisonnement
    - urn: urn:intuitem:risk:req_node:recyf:7.a.1-ei_ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-7:-securisation-de-l_architecture-des-systemes-d_information:1
      ref_id: 7.A.1-EI/EE
      description: "L\u2019entit\xE9 cloisonne physiquement et/ou logiquement l\u2019\
        ensemble de ses syst\xE8mes d\u2019information vis-\xE0-vis des autres syst\xE8\
        mes d\u2019information, y compris des syst\xE8mes d\u2019information pour\
        \ lesquels elle a d\xE9cid\xE9 de ne pas appliquer les objectifs de s\xE9\
        curit\xE9 et les syst\xE8mes d\u2019information tiers (par exemple : cloisonnement\
        \ logique par VLAN \u2013 r\xE9seau local virtuel - (r\xE9seau), par VM \u2013\
        \ machine virtuelle - (calcul) ou par volume (stockage))."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:7.a.2-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-7:-securisation-de-l_architecture-des-systemes-d_information:1
      ref_id: 7.A.2-EE
      description: "L\u2019entit\xE9 cloisonne physiquement et/ou logiquement chaque\
        \ syst\xE8me d\u2019information vis-\xE0-vis des autres syst\xE8mes d\u2019\
        information, y compris des syst\xE8mes d\u2019information pour lesquels elle\
        \ a d\xE9cid\xE9 de ne pas appliquer les objectifs de s\xE9curit\xE9 et des\
        \ syst\xE8mes d\u2019information tiers (par exemple : un syst\xE8me d\u2019\
        information est cloisonn\xE9 logiquement des autres syst\xE8mes d\u2019information\
        \ de l\u2019entit\xE9. Il est aussi cloisonn\xE9 physiquement des syst\xE8\
        mes d\u2019information de l\u2019entit\xE9 pour lesquels elle a d\xE9cid\xE9\
        \ de ne pas appliquer les objectifs de s\xE9curit\xE9)."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:7.a.3-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-7:-securisation-de-l_architecture-des-systemes-d_information:1
      ref_id: 7.A.3-EE
      description: "L\u2019entit\xE9 m\xE8ne des r\xE9flexions, pour chaque syst\xE8\
        me d\u2019information, sur la pertinence de d\xE9finir des sous-syst\xE8mes.\
        \ Lorsqu\u2019elle n\u2019identifie aucun sous-syst\xE8me, l\u2019entit\xE9\
        \ en apporte la justification.\nUn sous-syst\xE8me regroupe des ressources\
        \ assurant des fonctionnalit\xE9s similaires et ayant des niveaux de sensibilit\xE9\
        , d\u2019exposition et de s\xE9curit\xE9 homog\xE8nes."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:7.a.4-ee
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:recyf:objectif-de-securite-7:-securisation-de-l_architecture-des-systemes-d_information:1
      ref_id: 7.A.4-EE
      description: "Les sous-syst\xE8mes identifi\xE9s \xE0 la mesure 7.A.4-EE sont\
        \ cloisonn\xE9s entre eux physiquement et/ou logiquement."
      implementation_groups:
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:7.a.5-ee
