      ref_id: 4.1-EI/EE
      description: "L'entit\xE9 d\xE9finit et met en \u0153uvre une charte d'usage\
        \ des syst\xE8mes d'information, et la rend opposable \xE0 chacun des utilisateurs\
        \ de ces syst\xE8mes d'information.\nCette charte peut pr\xE9voir des dispositions\
        \ sp\xE9cifiques pour les administrateurs.\nCette charte peut \xE9galement\
        \ couvrir les syst\xE8mes d'information pour lesquels l'entit\xE9 a d\xE9\
        cid\xE9 de ne pas appliquer les objectifs de s\xE9curit\xE9."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
    - urn: urn:intuitem:risk:req_node:recyf:4.2-ei_ee
      assessable: true
