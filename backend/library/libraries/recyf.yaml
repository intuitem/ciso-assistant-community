      description: "L\u2019entit\xE9 met en \u0153uvre, au niveau des interconnexions,\
        \ les r\xE8gles de filtrage pour n\u2019autoriser que les communications identifi\xE9\
        es \xE0 la mesure 7.B.1-EI/EE ou 7.B.2-EE. Les autres communications sont\
        \ bloqu\xE9es par d\xE9faut."
