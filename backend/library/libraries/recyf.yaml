        \ d\u2019autre part.\nPar exemple : une entit\xE9 mettant en \u0153uvre un\
        \ pare-feu pour filtrer les communications entre ses syst\xE8mes d\u2019information\
        \ (pour lesquels elle applique les objectifs de s\xE9curit\xE9 ou non) d\u2019\
