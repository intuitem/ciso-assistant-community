        \ de mise \xE0 jour fournies par les \xE9diteurs et dont l\u2019authenticit\xE9\
        \ et l\u2019int\xE9grit\xE9 sont v\xE9rifi\xE9es, disposent de m\xE9canismes\
        \ de protection contre les risques d'ex\xE9cution de codes malveillants (par\
        \ exemple : un antivirus ou un EDR)."
      implementation_groups:
      - EntiteImportante
      - EntiteEssentielle
