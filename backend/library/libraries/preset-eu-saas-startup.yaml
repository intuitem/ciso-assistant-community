urn: urn:intuitem:risk:preset:eu-saas-startup
locale: en
ref_id: preset-eu-saas-startup
name: EU SaaS Startup
description: ISO 27001 + GDPR compliance journey for European SaaS companies. Enables the privacy and TPRM modules, loads relevant frameworks, and creates a step-by-step journey.
version: 1
provider: intuitem
packager: intuitem
translations:
  fr:
    name: "Startup SaaS européenne"
    description: "Parcours de conformité ISO 27001 + RGPD pour les entreprises SaaS européennes. Active les modules vie privée et TPRM, charge les référentiels pertinents et crée un parcours étape par étape."

dependencies:
  - urn:intuitem:risk:library:iso27001-2022
  - urn:intuitem:risk:library:gdpr
  - urn:intuitem:risk:library:risk-matrix-5x5-iso27005
  - urn:intuitem:risk:library:vendor-due-diligence
  - urn:intuitem:risk:library:intuitem-common-catalog

objects:
  preset:
    profile:
      company_size:
        - startup
        - sme
      industry:
        - saas
        - technology
      region:
        - eu
      goal: compliance-first

    feature_flags:
      enable:
        - privacy
        - compliance
        - tprm

    scaffolded_objects:
      - type: risk_assessment
        name: "Initial Risk Assessment"
        risk_matrix: urn:intuitem:risk:library:risk-matrix-5x5-iso27005
        ref: main_ra
        translations:
          fr:
            name: "Analyse de risques initiale"
      - type: compliance_assessment
        name: "ISO 27001 Compliance"
        framework: urn:intuitem:risk:library:iso27001-2022
        ref: iso_audit
        translations:
          fr:
            name: "Conformité ISO 27001"
      - type: compliance_assessment
        name: "GDPR Compliance"
        framework: urn:intuitem:risk:library:gdpr
        ref: gdpr_audit
        translations:
          fr:
            name: "Conformité RGPD"

      # --- Processings (GDPR Article 30 — Records of processing activities) ---
      - type: processing
        name: "Customer account management"
        description: "Collection and processing of customer identity, contact, and billing data for account creation, authentication, and subscription management."
        translations:
          fr:
            name: "Gestion des comptes clients"
            description: "Collecte et traitement des données d'identité, de contact et de facturation des clients pour la création de compte, l'authentification et la gestion des abonnements."
      - type: processing
        name: "Product analytics and usage tracking"
        description: "Collection and analysis of user behaviour, feature usage, and performance metrics to improve the product and user experience."
        translations:
          fr:
            name: "Analyse produit et suivi d'utilisation"
            description: "Collecte et analyse du comportement des utilisateurs, de l'utilisation des fonctionnalités et des métriques de performance pour améliorer le produit et l'expérience utilisateur."
      - type: processing
        name: "Email marketing and newsletters"
        description: "Processing of contact data for sending marketing communications, product updates, and newsletters to customers and prospects."
        translations:
          fr:
            name: "Marketing par email et newsletters"
            description: "Traitement des données de contact pour l'envoi de communications marketing, de mises à jour produit et de newsletters aux clients et prospects."
      - type: processing
        name: "Customer support and ticketing"
        description: "Processing of personal data submitted through support channels (email, chat, tickets) to resolve issues and provide assistance."
        translations:
          fr:
            name: "Support client et ticketing"
            description: "Traitement des données personnelles soumises via les canaux de support (email, chat, tickets) pour résoudre les problèmes et fournir une assistance."
      - type: processing
        name: "Employee and HR data management"
        description: "Processing of employee personal data for payroll, contracts, performance management, and legal obligations."
        translations:
          fr:
            name: "Gestion des données employés et RH"
            description: "Traitement des données personnelles des employés pour la paie, les contrats, la gestion des performances et les obligations légales."
      - type: processing
        name: "Cookies and website tracking"
        description: "Use of cookies, tracking pixels, and similar technologies on public-facing websites and the SaaS application for analytics and personalisation."
        translations:
          fr:
            name: "Cookies et suivi du site web"
            description: "Utilisation de cookies, pixels de suivi et technologies similaires sur les sites web et l'application SaaS à des fins d'analyse et de personnalisation."

      # --- Typical SaaS vendor entities ---
      - type: entity
        name: "Cloud hosting provider"
        description: "Primary cloud infrastructure provider (e.g. AWS, GCP, Azure) hosting the SaaS platform and customer data."
        translations:
          fr:
            name: "Hébergeur cloud"
            description: "Fournisseur principal d'infrastructure cloud (ex. AWS, GCP, Azure) hébergeant la plateforme SaaS et les données clients."
      - type: entity
        name: "Payment processor"
        description: "Third-party payment service provider handling customer billing and payment card data (e.g. Stripe, Adyen)."
        translations:
          fr:
            name: "Processeur de paiement"
            description: "Prestataire de services de paiement tiers gérant la facturation et les données de cartes bancaires des clients (ex. Stripe, Adyen)."
      - type: entity
        name: "Email service provider"
        description: "Transactional and marketing email platform (e.g. SendGrid, Mailgun, Mailchimp) processing customer contact data."
        translations:
          fr:
            name: "Prestataire de messagerie"
            description: "Plateforme d'emails transactionnels et marketing (ex. SendGrid, Mailgun, Mailchimp) traitant les données de contact des clients."
      - type: entity
        name: "Analytics provider"
        description: "Product analytics and usage tracking service (e.g. Mixpanel, Amplitude, Google Analytics) processing user behaviour data."
        translations:
          fr:
            name: "Fournisseur d'analyse"
            description: "Service d'analyse produit et de suivi d'utilisation (ex. Mixpanel, Amplitude, Google Analytics) traitant les données de comportement des utilisateurs."
      - type: entity
        name: "Customer support platform"
        description: "Helpdesk and ticketing platform (e.g. Zendesk, Intercom) processing customer personal data through support interactions."
        translations:
          fr:
            name: "Plateforme de support client"
            description: "Plateforme de helpdesk et de ticketing (ex. Zendesk, Intercom) traitant les données personnelles des clients via les interactions de support."

      # --- Assets ---
      - type: asset
        name: "SaaS application"
        description: "The core SaaS product including web application, APIs, and microservices serving customers."
        asset_type: SP
        ref: asset_saas_app
        translations:
          fr:
            name: "Application SaaS"
            description: "Le produit SaaS principal incluant l'application web, les APIs et les microservices au service des clients."
      - type: asset
        name: "Cloud infrastructure"
        description: "Cloud platform resources (compute, storage, networking) hosting the SaaS application and databases."
        asset_type: SP
        ref: asset_cloud_infra
        translations:
          fr:
            name: "Infrastructure cloud"
            description: "Ressources de la plateforme cloud (calcul, stockage, réseau) hébergeant l'application SaaS et les bases de données."
      - type: asset
        name: "CI/CD pipeline"
        description: "Continuous integration and deployment toolchain (e.g. GitHub Actions, GitLab CI) used to build, test, and deploy code."
        asset_type: SP
        ref: asset_cicd
        translations:
          fr:
            name: "Pipeline CI/CD"
            description: "Chaîne d'outils d'intégration et de déploiement continus (ex. GitHub Actions, GitLab CI) utilisée pour construire, tester et déployer le code."
      - type: asset
        name: "Production database"
        description: "Primary database storing application data, customer records, and configuration."
        asset_type: SP
        ref: asset_database
        translations:
          fr:
            name: "Base de données de production"
            description: "Base de données principale stockant les données applicatives, les enregistrements clients et la configuration."
      - type: asset
        name: "Identity and access management"
        description: "Authentication and authorisation services (e.g. Auth0, Okta, internal IAM) managing user sessions and API keys."
        asset_type: SP
        ref: asset_iam
        translations:
          fr:
            name: "Gestion des identités et des accès"
            description: "Services d'authentification et d'autorisation (ex. Auth0, Okta, IAM interne) gérant les sessions utilisateur et les clés API."
      - type: asset
        name: "Customer data"
        description: "Personal and business data of SaaS customers: identity, usage data, uploaded content, and billing information."
        asset_type: PR
        ref: asset_customer_data
        translations:
          fr:
            name: "Données clients"
            description: "Données personnelles et commerciales des clients SaaS : identité, données d'utilisation, contenu téléchargé et informations de facturation."
      - type: asset
        name: "Source code repository"
        description: "Version-controlled source code, configuration files, infrastructure-as-code, and secrets management."
        asset_type: SP
        ref: asset_source_code
        translations:
          fr:
            name: "Dépôt de code source"
            description: "Code source versionné, fichiers de configuration, infrastructure as code et gestion des secrets."

      # --- Risk scenarios ---
      - type: risk_scenario
        name: "Customer data breach via application vulnerability"
        description: "An attacker exploits a vulnerability in the SaaS application (e.g. injection, broken access control) to exfiltrate customer data, resulting in GDPR notification obligations."
        risk_assessment_ref: main_ra
        asset_refs: [asset_saas_app, asset_customer_data]
        threat_urns: [urn:intuitem:risk:threat:intuitem-common-catalog:ict-019]
        translations:
          fr:
            name: "Fuite de données clients via une vulnérabilité applicative"
            description: "Un attaquant exploite une vulnérabilité de l'application SaaS (ex. injection, contrôle d'accès défaillant) pour exfiltrer des données clients, entraînant des obligations de notification RGPD."
      - type: risk_scenario
        name: "Supply chain compromise via CI/CD pipeline"
        description: "An attacker compromises the CI/CD pipeline or a third-party dependency to inject malicious code into the production application."
        risk_assessment_ref: main_ra
        asset_refs: [asset_cicd, asset_saas_app]
        threat_urns: [urn:intuitem:risk:threat:intuitem-common-catalog:ict-003]
        translations:
          fr:
            name: "Compromission de la chaîne d'approvisionnement via le pipeline CI/CD"
            description: "Un attaquant compromet le pipeline CI/CD ou une dépendance tierce pour injecter du code malveillant dans l'application de production."
      - type: risk_scenario
        name: "Cloud infrastructure misconfiguration"
        description: "A misconfiguration in the cloud environment (open storage buckets, overly permissive security groups) exposes customer data or internal services to the internet."
        risk_assessment_ref: main_ra
        asset_refs: [asset_cloud_infra, asset_database]
        threat_urns: [urn:intuitem:risk:threat:intuitem-common-catalog:ict-019]
        translations:
          fr:
            name: "Mauvaise configuration de l'infrastructure cloud"
            description: "Une mauvaise configuration de l'environnement cloud (buckets de stockage ouverts, groupes de sécurité trop permissifs) expose les données clients ou les services internes sur Internet."
      - type: risk_scenario
        name: "Credential theft via phishing"
        description: "An employee falls victim to a phishing attack, compromising credentials to internal systems, cloud console, or source code repositories."
        risk_assessment_ref: main_ra
        asset_refs: [asset_iam, asset_source_code]
        threat_urns: [urn:intuitem:risk:threat:intuitem-common-catalog:ict-002]
        translations:
          fr:
            name: "Vol d'identifiants par hameçonnage"
            description: "Un employé est victime d'une attaque de phishing, compromettant les identifiants d'accès aux systèmes internes, à la console cloud ou aux dépôts de code source."
      - type: risk_scenario
        name: "Ransomware on production database"
        description: "Ransomware encrypts or destroys the production database and backups, causing prolonged service outage and potential data loss."
        risk_assessment_ref: main_ra
        asset_refs: [asset_database, asset_cloud_infra]
        threat_urns: [urn:intuitem:risk:threat:intuitem-common-catalog:ict-001]
        translations:
          fr:
            name: "Rançongiciel sur la base de données de production"
            description: "Un rançongiciel chiffre ou détruit la base de données de production et les sauvegardes, causant une interruption prolongée du service et une potentielle perte de données."
      - type: risk_scenario
        name: "Service unavailability due to DDoS attack"
        description: "A distributed denial-of-service attack overwhelms the SaaS platform, making it unavailable to customers and impacting SLA commitments."
        risk_assessment_ref: main_ra
        asset_refs: [asset_saas_app, asset_cloud_infra]
        threat_urns: [urn:intuitem:risk:threat:intuitem-common-catalog:ict-007]
        translations:
          fr:
            name: "Indisponibilité du service par attaque DDoS"
            description: "Une attaque par déni de service distribué submerge la plateforme SaaS, la rendant indisponible pour les clients et impactant les engagements de SLA."

      # --- Findings assessment ---
      - type: findings_assessment
        name: "Penetration Test Findings"
        category: pentest
        ref: pentest_findings
        translations:
          fr:
            name: "Résultats des tests d'intrusion"

    journey:
      steps:
        - key: assets
          title: "Identify your assets"
          description: "List primary assets (data, processes) and supporting assets (servers, apps, networks)"
          target_model: assets
          translations:
            fr:
              title: "Identifier vos actifs"
              description: "Listez les actifs primaires (données, processus) et les actifs supports (serveurs, applications, réseaux)"
        - key: processings
          title: "Map your data processings"
          description: "Review and complete the record of processing activities required by GDPR Article 30 — document what personal data you process, why, and how."
          target_model: processings
          translations:
            fr:
              title: "Cartographier vos traitements de données"
              description: "Examinez et complétez le registre des activités de traitement exigé par l'article 30 du RGPD — documentez quelles données personnelles vous traitez, pourquoi et comment."
        - key: vendors
          title: "Manage your vendors"
          description: "Review the pre-created vendor entities, add any missing ones, and create entity assessments using the due diligence framework to evaluate each vendor's security posture."
          target_model: entities
          translations:
            fr:
              title: "Gérer vos fournisseurs"
              description: "Examinez les entités fournisseurs pré-créées, ajoutez celles manquantes et créez des évaluations en utilisant le cadre de due diligence pour évaluer la posture sécurité de chaque fournisseur."
        - key: risk_scenarios
          title: "Create risk scenarios"
          description: "Combine threats with assets to identify what could go wrong"
          target_model: risk-assessments
          target_ref: main_ra
          translations:
            fr:
              title: "Créer des scénarios de risque"
              description: "Combinez les menaces avec les actifs pour identifier ce qui pourrait mal tourner"
        - key: controls
          title: "Define controls"
          description: "Create applied controls to mitigate your risk scenarios"
          target_model: applied-controls
          translations:
            fr:
              title: "Définir les mesures"
              description: "Créez des mesures appliquées pour atténuer vos scénarios de risque"
        - key: iso_compliance
          title: "Assess ISO 27001 compliance"
          description: "Go through requirements and map your controls"
          target_model: compliance-assessments
          target_ref: iso_audit
          translations:
            fr:
              title: "Évaluer la conformité ISO 27001"
              description: "Parcourez les exigences et associez vos contrôles"
        - key: gdpr_compliance
          title: "Assess GDPR compliance"
          description: "Review GDPR requirements against your practices"
          target_model: compliance-assessments
          target_ref: gdpr_audit
          translations:
            fr:
              title: "Évaluer la conformité RGPD"
              description: "Passez en revue les exigences du RGPD par rapport à vos pratiques"
        - key: findings
          title: "Track pentest and audit findings"
          description: "Import or create findings from penetration tests, vulnerability scans, and audits. Assign owners, set priorities, and track remediation progress."
          target_model: findings-assessments
          target_ref: pentest_findings
          translations:
            fr:
              title: "Suivre les résultats de tests et d'audits"
              description: "Importez ou créez des résultats de tests d'intrusion, de scans de vulnérabilités et d'audits. Attribuez des responsables, définissez des priorités et suivez la remédiation."
