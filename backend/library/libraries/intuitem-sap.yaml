urn: urn:intuitem:risk:library:intuitem-sap
locale: en
ref_id: intuitem-sap
name: Intuitem Security Assurance Plan
description: 'Document purpose. This Security Assurance Plan explains the controls,
  processes, and evidence that Intuitem provides to protect customer data and ensure
  the availability, integrity, and confidentiality of the CISO Assistant platform.


  Intended audience. Security, risk, compliance, procurement, and technical stakeholders
  at customer organizations.


  Last updated: 2025-08-15'
copyright: intuitem
version: 1
publication_date: 2026-03-04
provider: intuitem
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:intuitem-sap
    ref_id: intuitem-sap
    name: Intuitem Security Assurance Plan
    description: 'Document purpose. This Security Assurance Plan explains the controls,
      processes, and evidence that Intuitem provides to protect customer data and
      ensure the availability, integrity, and confidentiality of the CISO Assistant
      platform.


      Intended audience. Security, risk, compliance, procurement, and technical stakeholders
      at customer organizations.


      Last updated: 2025-08-15'
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:intuitem-sap:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: Scope & Applicability
      description: "This plan covers Intuitem\u2019s SaaS offering of CISO Assistant\
        \ and the associated managed infrastructure, operations, and support services.\
        \ Customer-managed (on-premises) deployments are covered where explicitly\
        \ noted (see \xA718)."
    - urn: urn:intuitem:risk:req_node:intuitem-sap:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: Security Governance
    - urn: urn:intuitem:risk:req_node:intuitem-sap:2.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:2
      ref_id: '2.1'
      name: 'Frameworks:'
      description: Our program is aligned with NIST CSF for cybersecurity management
        and OWASP ASVS for application security.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:2.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:2
      ref_id: '2.2'
      name: 'Policies & ownership:'
      description: Security policies are owned by Intuitem leadership and reviewed
        at least annually.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:2.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:2
      ref_id: '2.3'
      name: 'Roles:'
      description: 'A designated Data Protection Officer (DPO) oversees data protection
        and privacy. Contact: contact@intuitem.com. To report a security issue, please
        use: security@intuitem.com'
    - urn: urn:intuitem:risk:req_node:intuitem-sap:2.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:2
      ref_id: '2.4'
      name: 'Defense-in-depth:'
      description: We apply a multi-layer approach combining preventive, detective,
        and corrective controls.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:3
      assessable: false
      depth: 1
      ref_id: '3'
      name: Risk Management & Governance
    - urn: urn:intuitem:risk:req_node:intuitem-sap:3.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:3
      ref_id: '3.1'
      name: 'Process:'
      description: We maintain an enterprise risk register that captures security,
        operational, and compliance risks.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:3.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:3
      ref_id: '3.2'
      name: 'Methodology:'
      description: Risks are assessed and rated using a combination of likelihood
        and impact, following ISO 27005 principles.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:3.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:3
      ref_id: '3.3'
      name: 'Reviews:'
      description: Risks are reviewed quarterly and after significant changes to systems
        or threat landscape.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:3.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:3
      ref_id: '3.4'
      name: 'Mitigation linkage:'
      description: Each high/critical risk has mapped mitigation measures, tracked
        to completion.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:3.5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:3
      ref_id: '3.5'
      name: 'Customer impact:'
      description: Where relevant, risks and mitigations affecting customers are communicated
        through our account management process (support portal).
    - urn: urn:intuitem:risk:req_node:intuitem-sap:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: Architecture & Hosting
    - urn: urn:intuitem:risk:req_node:intuitem-sap:4.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:4
      ref_id: '4.1'
      name: 'Primary region:'
      description: 'France, operated across two cloud service providers (CSPs): Scaleway
        and OVH.'
    - urn: urn:intuitem:risk:req_node:intuitem-sap:4.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:4
      ref_id: '4.2'
      name: 'Secondary region:'
      description: Netherlands (used for resilience and disaster recovery).
    - urn: urn:intuitem:risk:req_node:intuitem-sap:4.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:4
      ref_id: '4.3'
      name: 'Platform:'
      description: Kubernetes for orchestration, high availability, and auto-scaling.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:4.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:4
      ref_id: '4.4'
      name: 'Network exposure:'
      description: Only HTTPS (port 443) is publicly exposed; all other inbound traffic
        is denied by default.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:4.5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:4
      ref_id: '4.5'
      name: 'Encryption:'
      description: "TLS 1.3 for encryption-in-transit with automatically renewed Let\u2019\
        s Encrypt certificates\u2014Encryption-at-rest at the disk level using a Server-Side\
        \ Encryption with provider-managed keys."
    - urn: urn:intuitem:risk:req_node:intuitem-sap:4.6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:4
      ref_id: '4.6'
      name: 'Special deployments:'
      description: for specific cases, the hosting location can be agreed on with
        the customers to accommodate their needs.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:5
      assessable: false
      depth: 1
      ref_id: '5'
      name: Data Isolation & Multi-Tenancy
    - urn: urn:intuitem:risk:req_node:intuitem-sap:5.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:5
      ref_id: '5.1'
      name: 'No data mixing:'
      description: Customer data is never mixed. Each tenant runs as a dedicated,
        isolated application instance with separate storage volumes.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:5.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:5
      ref_id: '5.2'
      name: 'Deployment-level controls:'
      description: Isolation is enforced at the deployment and storage layers to prevent
        cross-tenant access.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:5.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:5
      ref_id: '5.3'
      name: 'Decoupled storage:'
      description: Data is separated from compute to support fast rebuilds and disaster
        recovery.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:5.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:5
      ref_id: '5.4'
      name: 'Snapshots:'
      description: Periodic volume snapshots are taken for recovery readiness.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:6
      assessable: false
      depth: 1
      ref_id: '6'
      name: Access Control & Identity
    - urn: urn:intuitem:risk:req_node:intuitem-sap:6.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:6
      ref_id: '6.1'
      name: 'Least privilege & need-to-know:'
      description: Access to production is restricted to a small subset of engineers.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:6.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:6
      ref_id: '6.2'
      name: 'MFA everywhere:'
      description: Multi-factor authentication (MFA) is enforced for all privileged
        access.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:6.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:6
      ref_id: '6.3'
      name: 'Customer data access governance:'
      description: Any access to customer data in production requires explicit authorization
        (e.g., a support ticket for debugging) and time-bound access.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:7
      assessable: false
      depth: 1
      ref_id: '7'
      name: Data Retention & Secure Deletion
    - urn: urn:intuitem:risk:req_node:intuitem-sap:7.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:7
      ref_id: '7.1'
      name: 'Retention periods:'
    - urn: urn:intuitem:risk:req_node:intuitem-sap:7.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:7.1
      ref_id: 7.1.1
      description: 'Production data: retained for the lifetime of the subscription
        and deleted within 30 days after termination unless otherwise agreed.'
    - urn: urn:intuitem:risk:req_node:intuitem-sap:7.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:7.1
      ref_id: 7.1.2
      description: 'Backups: retained for 14 days before automated secure deletion.'
    - urn: urn:intuitem:risk:req_node:intuitem-sap:7.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:7.1
      ref_id: 7.1.3
      description: 'Logs: retained per operational needs (default 90 days), anonymized
        or deleted thereafter.'
    - urn: urn:intuitem:risk:req_node:intuitem-sap:7.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:7
      ref_id: '7.2'
      name: 'Deletion method:'
      description: Data is securely deleted using cryptographic erasure or provider-verified
        secure delete.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:7.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:7
      ref_id: '7.3'
      name: 'Customer control:'
      description: On request, customers can request early deletion of specific datasets.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8
      assessable: false
      depth: 1
      ref_id: '8'
      name: Secure Development Lifecycle (SDLC)
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:8
      ref_id: '8.1'
      name: 'Code review:'
      description: All changes undergo peer review. We apply stricter controls for
        third-party contributions to our open-source components.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:8
      ref_id: '8.2'
      name: 'SAST & DAST:'
      description: Automated static (developer workstations and CI/CD) and dynamic
        analysis to detect implementation flaws and runtime issues.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:8
      ref_id: '8.3'
      name: Software Composition Analysis (SCA)
      description: CI/CD pipelines continuously scan third-party libraries for vulnerabilities
        and license issues. Dependency versions are pinned; LTS versions are preferred
        and security patches applied promptly. SBOMs can be provided on request.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:8
      ref_id: '8.4'
      name: 'Credential leakage detection:'
      description: Commits are scanned to prevent secrets exposure; credentials are
        rotated immediately if detected.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8.5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:8
      ref_id: '8.5'
      name: 'Contribution controls:'
      description: Repository-level protections limit who can contribute, approve,
        merge, or trigger releases.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8.6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:8
      ref_id: '8.6'
      name: 'Security training:'
      description: Engineers receive regular training on secure coding practices and
        emerging threats.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:8.7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:8
      ref_id: '8.7'
      name: 'Threat modeling:'
      description: Before each new feature, we run structured threat-modeling to identify
        security and operational risks.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:9
      assessable: false
      depth: 1
      ref_id: '9'
      name: Privacy by Design & Default
    - urn: urn:intuitem:risk:req_node:intuitem-sap:9.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:9
      ref_id: '9.1'
      name: 'Principle:'
      description: Privacy is embedded into our development and operational processes
        from the outset.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:9.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:9
      ref_id: '9.2'
      name: 'Data minimization:'
      description: Only collect and store the minimum personal data needed for service
        delivery.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:9.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:9
      ref_id: '9.3'
      name: 'Pseudonymization/anonymization:'
      description: Apply where feasible for analytics, testing, and troubleshooting.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:10
      assessable: false
      depth: 1
      ref_id: '10'
      name: CI/CD & Change Management
    - urn: urn:intuitem:risk:req_node:intuitem-sap:10.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:10
      ref_id: '10.1'
      name: 'Secure pipelines:'
      description: Releases are built and deployed via controlled CI/CD pipelines
        with staged environments.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:10.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:10
      ref_id: '10.2'
      name: 'Separation of duties:'
      description: Build, approval, and deploy steps are segregated and logged.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:10.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:10
      ref_id: '10.3'
      name: 'Change logging:'
      description: All changes are tracked and auditable (who, what, when).
    - urn: urn:intuitem:risk:req_node:intuitem-sap:11
      assessable: true
      depth: 1
      ref_id: '11'
      name: Secrets & Key Management
    - urn: urn:intuitem:risk:req_node:intuitem-sap:11.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:11
      ref_id: '11.1'
      name: 'Secrets storage:'
      description: Operational secrets are stored in managed key store systems (eg,
        GitHub secret manager) or encrypted configuration stores.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:11.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:11
      ref_id: '11.2'
      name: 'Rotation:'
      description: Keys and credentials are rotated following policy or after potential
        exposure.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:12
      assessable: true
      depth: 1
      ref_id: '12'
      name: Cryptography Policy
    - urn: urn:intuitem:risk:req_node:intuitem-sap:12.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:12
      ref_id: '12.1'
      name: 'Encryption-at-rest:'
      description: AES-256 or equivalent industry-approved algorithms.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:12.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:12
      ref_id: '12.2'
      name: 'Encryption-in-transit:'
      description: TLS 1.3 with strong cipher suites, maintaining a good balance between
        security and browser compatibility.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:12.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:12
      ref_id: '12.3'
      name: 'Key management:'
      description: Keys are generated, stored, and rotated in secure systems; never
        hard-coded in source code. We have automated controls at the CI/CD level to
        double-check this.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:12.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:12
      ref_id: '12.4'
      name: 'Lifecycle:'
      description: Keys are retired and destroyed securely at the end of their lifecycle.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:13
      assessable: false
      depth: 1
      ref_id: '13'
      name: Logging, Monitoring & Detection
    - urn: urn:intuitem:risk:req_node:intuitem-sap:13.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:13
      ref_id: '13.1'
      name: 'Coverage:'
      description: Demo and production environments are continuously monitored for
        availability, performance, regressions, and security events.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:13.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:13
      ref_id: '13.2'
      name: 'Retention & protection:'
      description: Logs are retained per policy and protected from tampering.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:13.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:13
      ref_id: '13.3'
      name: 'Alerting & response:'
      description: Alerts are triaged by on-call staff with documented runbooks.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:14
      assessable: false
      depth: 1
      ref_id: '14'
      name: Vulnerability & Patch Management
    - urn: urn:intuitem:risk:req_node:intuitem-sap:14.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:14
      ref_id: '14.1'
      name: 'Scanning:'
      description: Regular vulnerability scans are performed on application components
        and container images. This information is publicly available through our GitHub
        repository or by scanning the application Docker images.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:14.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:14
      ref_id: '14.2'
      name: 'Prioritization:'
      description: Findings are risk-rated and remediated within target service levels.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:14.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:14
      ref_id: '14.3'
      name: 'Patch cadence:'
      description: We operate a strict schedule to patch the application, underlying
        systems, and dependencies.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:15
      assessable: false
      depth: 1
      ref_id: '15'
      name: Incident Response (IR)
    - urn: urn:intuitem:risk:req_node:intuitem-sap:15.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:15
      ref_id: '15.1'
      name: 'IR Plan:'
      description: A maintained Incident Response Plan defines detection, escalation,
        communication, and remediation procedures.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:15.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:15
      ref_id: '15.2'
      name: 'Exercises:'
      description: We conduct periodic incident simulations for team readiness.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:15.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:intuitem-sap:15
      ref_id: '15.3'
      name: 'Forensics:'
      description: We retain tooling and playbooks to scope incidents and support
        root-cause analysis.
    - urn: urn:intuitem:risk:req_node:intuitem-sap:16
      assessable: false
      depth: 1
      ref_id: '16'
      name: Business Continuity & Disaster Recovery (BC/DR)
    - urn: urn:intuitem:risk:req_node:intuitem-sap:16.1
      assessable: true
      depth: 2
