      ref_id: '3'
      name: Cybersecurity Resilience
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:3-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:3
      ref_id: 3-1
      name: Cybersecurity Resilience Aspects of Business Continuity Management (BCM)
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:3-1-p-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:3-1
      ref_id: 3-1-P-1
      description: 'In addition to subcontrols in the ECC control 3-1-3, the CSP shall
        cover the following additional subcontrols for cybersecurity requirements
        for cybersecurity resilience aspects of business continuity management, as
        a minimum: (1) Developing and implementing disaster recovery and business
        continuity procedures in a secure manner. (2) Developing and implementing
        procedures to ensure resilience and continuity of cybersecurity systems dedicated
        to the protection of Cloud Technology Stack.'
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:3-1-t-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:3-1
      ref_id: 3-1-T-1
      description: 'In addition to subcontrols in the ECC control 3-1-3, the CST shall
        cover the following additional subcontrols for cybersecurity requirements
        for cybersecurity resilience aspects of business continuity management, as
        a minimum: (1) Developing and implementing disaster recovery and business
        continuity procedures related to cloud computing, in a secure manner.'
      implementation_groups:
      - CST
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: Third-Party Cybersecurity
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:4-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:4
      ref_id: 4-1
      name: Supply Chain and Third-Party Cybersecurity
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:4-1-p-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:4-1
      ref_id: 4-1-P-1
      description: 'In addition to implementing the ECC controls 4-1-2 and 4-1-3,
        the CSP shall cover the following additional subcontrols for third-party cybersecurity
        requirements, as a minimum: (1) Ensure that the CSP fulfills NCA''s requests
        to remove software or services, provided by third-party providers that may
        be considered a cybersecurity threat to national organizations, from the marketplace
        provided to CSTs. (2) Requirement to provide security documentation for any
        equipment or services from suppliers and third-party providers. (3) Third
        party providers compliant with law and regulatory requirements relevant to
        their scope. (4) Risk management and security governance on third-party providers
        as part of general cybersecurity risk management and governance.'
      implementation_groups:
      - CSP
