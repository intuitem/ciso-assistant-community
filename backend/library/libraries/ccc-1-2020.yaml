      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-16
      ref_id: 2-16-P-1
      description: Cybersecurity requirements for system development within the CSP
        shall be identified, documented and approved.
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-16-p-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-16
      ref_id: 2-16-P-2
      description: Cybersecurity requirements for system development within the CSP
        shall be applied.
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-16-p-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-16
      ref_id: 2-16-P-3
      description: 'Cybersecurity requirements for system development within the CSP
        shall include as a minimum the following controls along the development lifecycle:
        (1) Considering cybersecurity requirements of the Cloud Technology Stack and
        relevant systems in the design and implementation of the cloud computing services.
        (2) Protecting system development environments, testing environments (including
        data used in testing environment), and integration platforms.'
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-16-p-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-16
      ref_id: 2-16-P-4
      description: Cybersecurity requirements for system development within the CSP
        shall be applied and reviewed periodically.
      implementation_groups:
      - CSP
