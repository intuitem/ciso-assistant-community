      ref_id: 2-17
      name: Storage Media Security
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17-p-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17
      ref_id: 2-17-P-1
      description: Cybersecurity requirements for usage of information and data media
        within the CSP shall be identified, documented and approved.
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17-p-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17
      ref_id: 2-17-P-2
      description: Cybersecurity requirements for usage of information and data media
        within the CSP shall be applied.
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17-p-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17
      ref_id: 2-17-P-3
      description: 'Cybersecurity requirements for usage of information and data media
        within the CSP shall cover, at minimum, the following: (1) Enforcement of
        sanitization of media, prior to disposal or reuse. (2) Using secure means
        when disposing of media. (3) Provision to maintain confidentiality and integrity
        of data on removable media. (4) Human readable labelling of media, to explain
        its classification and the sensitivity of the information it contains. (5)
        Controlled and physically secure storage of removable media. (6) Restriction
        and control of usage of portable media inside the Cloud Technology Stack.'
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17-p-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-17
      ref_id: 2-17-P-4
      description: Cybersecurity requirements for usage of information and data media
        within the CSP shall be applied and reviewed periodically.
      implementation_groups:
      - CSP
