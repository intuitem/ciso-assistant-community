      name: Key Management
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-p-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-P-1
      description: Cybersecurity requirements for key management process within the
        CSP shall be identified, documented and approved.
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-p-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-P-2
      description: Cybersecurity requirements for key management process within the
        CSP shall be applied.
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-p-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-P-3
      description: 'In addition to the ECC subcontrol 2-8-3-2, cybersecurity requirements
        for key management within the CSP shall cover, at minimum, the following:
        (1) Ensure well-defined ownership for cryptographic keys. (2) A secure cryptographic
        key retrieval mechanism in case of cryptographic key lost (such as backup
        of keys and enforcement of trusted key storage, strictly external to cloud).
        (3) Activating and monitoring of all audit trails of keys.'
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-p-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-P-4
      description: Cybersecurity requirements for key management within the CSP shall
        be reviewed periodically.
      implementation_groups:
      - CSP
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-t-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-T-1
      description: Cybersecurity requirements for key management within the CST shall
        be identified, documented and approved.
      implementation_groups:
      - CST
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-t-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-T-2
      description: Cybersecurity requirements for key management within the CST shall
        applied.
      implementation_groups:
      - CST
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-t-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-T-3
      description: 'In addition to the ECC subcontrol 2-8-3-2, cybersecurity requirements
        for key management within the CST shall cover, at minimum, the following:
        (1) Ensure well-defined ownership for cryptographic keys. (2) A secure data
        retrieval mechanism in case of cryptographic encryption key lost (such as
        backup of keys and enforcement of trusted key storage, strictly external to
        cloud).'
      implementation_groups:
      - CST
    - urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15-t-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ccc-1-2020:2-15
      ref_id: 2-15-T-4
      description: Cybersecurity requirements for key management within the CST shall
        be applied and reviewed periodically.
      implementation_groups:
      - CST
