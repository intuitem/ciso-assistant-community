    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.8.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.8
      ref_id: DG.8.2
      name: Data Management Issue Tracking Register
      description: The Entity shall document in a register historical records of data
        management related issues and resolutions raised by business and technical
        users.
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.8.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.8
      ref_id: DG.8.3
      name: Version Control
      description: The Entity shall define and implement version control for data
        management documents and artifacts that the Entity is the creator of.
      implementation_groups:
      - P2
