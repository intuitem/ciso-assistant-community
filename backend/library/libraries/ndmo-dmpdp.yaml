      ref_id: DG.1
      name: Strategy and Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.1
      ref_id: DG.1.1
      name: Data Management and Personal Data Protection Strategy
      description: 'The Entity shall establish a Data Management and Personal Data
        Protection Strategy to align Entity data initiatives and relevant stakeholders
        to achieving its business goals, in alignment with the overall program strategy.
        The Strategy shall cover all domains and reflect: 1. Current data management
        challenges 2. Strategic requirements covering internal requirements derived
        from the Entity''s business strategy as well as external requirements derived
        from the National Data Management Agenda 3. Data Management and Personal Data
        Protection Vision, Mission and Strategic Goals and Objectives 4. Strategic
        and Operational performance metrics with targets across the 3 to 5 years strategy
        duration 5. Required financial budget for the implementation of the strategy,
        broken down by initiatives.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.1
      ref_id: DG.1.2
      name: Guiding Principles
      description: The Entity shall adopt the National Data Management and Personal
        Data Protection Program's Guiding Principles to affirm alignment of the Entity's
        Data Management and Personal Data Protection Strategy to the National Data
        Management and Personal Data Protection agendas. The Entity may, at its discretion,
        include additional Entity-level guiding principles to augment the core set
        of NDMO Guiding Principles. Adoption of the National Data Management and Personal
        Data Protection Program's Guiding Principles shall be articulated either in
        the Data Management and Personal Data Protection Strategy or as a standalone
        document. The guiding principles establish a data-centric culture where all
        stakeholders are unified in understanding what is most important for the Entity's
        Data Management and Personal Data Protection agendas.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.1
      ref_id: DG.1.3
      name: Data Management and Personal Data Protection Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy, the Entity shall develop a Data Management and\
        \ Personal Data Protection Plan with a 3-year implementation roadmap. The\
        \ implementation roadmap shall include, at minimum, the following: 1. Initiatives\
        \ that cover all the Data Management Domains defined in these standards and\
        \ in alignment with the National Data Management and Personal Data Protection\
        \ Framework 2. Prioritization of the list of initiatives based on a prioritization\
        \ framework such as, at minimum, Impact versus Ease of Implementation 1. Highlight\
        \ of the initiatives that are Quick Wins and planned to be implemented within\
        \ the first 6 months, and the mid to long term initiatives that are planned\
        \ throughout the 3-year period."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg
      ref_id: DG.2
      name: Policy and Guidelines
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.2
      ref_id: DG.2.1
      name: Data Management and Personal Data Protection Policy and Guidelines Gap
        Analysis
      description: 'To support implementation of the Entity''s Data Management and
        Personal Data Protection Strategy, the Entity shall conduct a Data Management
        and Personal Data Protection Policy and Guidelines gap analysis, including,
        at minimum, the following: 1. An analysis of the National Data Management
        and Personal Data Protection Program''s Policies, Standards, and Guidelines
        2. Identification and analysis of all data related standards and policies
        currently published by the Entity or the Regulator of the sector to which
        the Entity belongs to 3. An analysis of the internal Entity- specific requirements
        for Data Management and Personal Data Protection Policies and Guidelines 4.
        A Data Management and Personal Data Protection Policies and Guidelines development
        plan that clearly indicates the timeline for implementation.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.2
      ref_id: DG.2.2
      name: Data Management and Personal Data Protection Policy and Guidelines
      description: The Entity shall develop the Entity specific Data Management and
        Personal Data Protection Policy and Guidelines, aligned to the National Data
        Management and Personal Data Protection Policies and Standards.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg
      ref_id: DG.3
      name: Training and Awareness
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.3
      ref_id: DG.3.1
      name: Data Management and Personal Data Protection Training
      description: 'The Entity shall conduct Data Management and Personal Data Protection
        training for all related employees to promote the agenda and enable a data-centric
        culture. The training shall include, at minimum, the following: 1. Awareness
        of the national Data Management and Personal Data Protection laws, policies,
        and standards, and their applicability on the Entity 2. Awareness of the national
        Data Management and Personal Data Protection programs, and their applicability
        on the Entity 3. All data management domains as per the National Data Management
        and Personal Data Protection Framework, addressed to the related Data Management
        and Personal Data Protection roles.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.4
