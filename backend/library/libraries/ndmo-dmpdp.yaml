    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.5
      ref_id: DG.5.1
      name: Compliance Management
      description: 'The Entity shall establish Data Management and Personal Data Protection
        Compliance Management practices, and shall accordingly define the following:
        1. Scope of the periodic compliance audit exercise 2. Processes to plan for
        and execute the compliance audits 3. Processes and tools to report compliance
        audit findings 4. Processes and plans for the remediation and escalation of
        non-compliance The processes shall be aligned to the National Data Management
        and Personal Data Protection Compliance Framework.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.5
      ref_id: DG.5.2
      name: Compliance Audit Results
      description: 'The Entity shall document results and findings from every compliance
        audit performed included in an Audit Report. The Audit Report(s) shall have,
        but not limited to, the following: 1. Compliance or non-compliance to each
        specification in this document 2. Clearly articulated findings with supporting
        evidence for each specification 3. Recommendations to remediate each instance
        of non-compliance 4. Accountable stakeholder for each recommendation, and
        the target date to complete the recommendation.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.5
      ref_id: DG.5.3
      name: Compliance Monitoring
      description: The Entity shall generate and monitor compliance audit scores by
        conducting periodic
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.6
