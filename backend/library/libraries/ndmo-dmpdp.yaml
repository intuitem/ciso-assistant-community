      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.2
      ref_id: MCM.2.1
      name: Data Access Approval
      description: The Entity shall establish and follow a clear process for the approval
        of connecting the Data Catalog tool to the Entity's Data Sources.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.2
      ref_id: MCM.2.2
      name: Metadata Access Approval
      description: The Entity shall establish and follow a clear process for providing
        the Entity's employees an access to the Data Catalog automated tool. The process
        shall implement role-based access to the Data Catalog, which includes the
        creation of access groups (for example read only, read and update, and administrator)
        and an assignment of the Data Catalog's users to these groups. The Data Catalog
        access groups shall be defined based on access rights to the Metadata and
        scope of the Metadata.
      implementation_groups:
      - P2
