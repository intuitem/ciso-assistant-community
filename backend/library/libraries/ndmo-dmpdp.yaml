    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2
      ref_id: RMD.2.4
      name: RMD Information Architecture
      description: 'The Entity shall develop and document an information architecture
        for its target Reference and Master Data environment based on defined conceptual
        architecture. The information architecture shall represent, at minimum, the
        following components: 1. Reference and Master Data Objects - inventory of
        identified Reference and Master Data Objects including metadata definitions
        2. Conceptual and Logical Master Data Model - conceptual and logical data
        model for identified Master Data Objects and their relationships 3. Reference
        and Master Data Sources - Inventory of identified reference and master data
        sources 4. Rules for matching and merging Master Data Records from different
        data sources to create Golden Record within the Data Hub 5. Reference and
        Master Data Flows - One way or bi-directional data movements of: 5a. Master
        Data Records between data sources and the Data Hub 5b. Master Data Golden
        Records between Data Hub and consuming applications 5c. Reference Data between
        Data Hub and consuming applications.'
      implementation_groups:
      - P2
