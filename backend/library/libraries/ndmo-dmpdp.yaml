      ref_id: MCM.3
      name: Training and Awareness
      description: As part of the Training and Awareness control, the Entity shall
        conduct the Data Catalog trainings, accelerate adoption and increase usage
        of its Data Catalog
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.3
      ref_id: MCM.3.1
      name: Data Catalog Training
      description: 'The Entity shall conduct the Data Catalog training for every employee
        having direct need to discover, analyze or administer Metadata to promote
        the proper use of the Data Catalog. The training shall include, at minimum,
        the following: 1. Introduction of the Data Catalog concept and its benefits
        2. Introductory and advanced tutorials about the Data Catalog automated tool
        and its functionalities 3. Hands-on exercises of the Data Catalog automated
        tool based on practical use cases.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.3
      ref_id: MCM.3.2
      name: Data Catalog Adoption and Usage
      description: 'The Entity shall push for an adoption and increase usage of its
        Data Catalog by: 1. Identification of Data Catalog power users - the Entity''s
        Data Catalog advanced users that can act as coaches for other users 2. Creation
        of a communication plan announcing current Data Catalog power users and encouraging
        other Data Catalog users to interact with them. The plan shall include, at
        minimum, the following: 2a. Description of communication actions 2b. Frequency
        of communication actions 2c. Target audience.'
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm
      ref_id: MCM.4
      name: Data Lifecycle Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      ref_id: MCM.4.1
      name: Metadata Stewardship Coverage
      description: The Entity shall assign Business and IT Data Stewards to all the
        Metadata registered within the Data Catalog. Data Stewards assigned to the
        Metadata shall be continuously updated and shall reflect the most current
        Data Stewards' assignments within the Entity.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      ref_id: MCM.4.2
      name: Metadata Population
      description: The Entity shall establish and follow a clear process for registering
        and populating the Metadata within the Data Catalog. The process shall be
        implemented as a workflow in the Data Catalog automated tool and by following
        the National Data Management Office's Data Catalog Guidelines.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      ref_id: MCM.4.3
      name: Metadata Structure
      description: The Entity shall develop the Metadata structure according to the
        National Data Management Office's Data Catalog Guidelines. The Metadata structure
        defines Business Metadata attributes that are required to be populated in
        the Data Catalog. The Entity can augment the mandated Metadata structure with
        additional attributes based on the Entity's requirements.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      ref_id: MCM.4.4
      name: Metadata Update
      description: The Entity shall establish and follow a clear process for updating
        Metadata within its Data Catalog. The process of metadata update shall be
        implemented as a workflow in the Data Catalog automated tool and by following
        the National Data Management Office's Data Catalog Guidelines.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      ref_id: MCM.4.5
      name: Metadata Quality
      description: The Entity shall establish and follow a clear process for identifying
        and addressing quality issues with the Metadata. The Metadata quality management
        process shall include reporting of identified quality issues and development
        of remediation actions within defined SLAs. The process shall be implemented
        as a workflow in the Data Catalog automated tool and by following the National
        Data Management Office's Data Catalog Guidelines.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      ref_id: MCM.4.6
      name: Metadata Annotation
      description: The Entity shall establish a clear process for reviewing on regular
        basis Metadata annotations (tags, comments) added by users to the Metadata
        within the Data Catalog. The process shall be implemented as a workflow in
        the Data Catalog automated tool and by following the National Data Management
        Office's Data Catalog Guidelines.
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.4
      ref_id: MCM.4.7
      name: Metadata Certification
      description: The Entity shall establish a clear process for reviewing on regular
        basis trust certificates assigned by users to the Metadata within the Data
        Catalog. The process shall be implemented as a workflow in the Data Catalog
        automated tool and by following the National Data Management Office's Data
        Catalog Guidelines.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm
      ref_id: MCM.5
      name: Data Catalog Automation
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5
      ref_id: MCM.5.1
      name: Data Catalog Automated Tool
      description: The Entity shall implement the Data Catalog automated tool acting
        as an inventory of the Entity's data assets and supporting automation of Entity's
        Metadata management. The implementation shall be conducted according to the
        National Data Management Office's Data Catalog Guidelines.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5
      ref_id: MCM.5.2
      name: Metadata and Catalog Notifications
      description: "The Entity shall monitor changes to its Metadata by setting up\
        \ automated notifications functionality within the Data Catalog automated\
        \ tool, to keep the entity\u2019s data catalog users aware of any metadata\
        \ updates"
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5
      ref_id: MCM.5.3
      name: Metadata and Catalog Audit Trial
      description: "The Entity shall monitor activity of users within the Data Catalog\
        \ automated tool by setting-up a tracking functionality provided by the tool.\
        \ Monitoring shall include information about users\u2019 logins to the Data\
        \ Catalog and operations they invoke. The Entity shall store as artifacts\
        \ the Data Catalog's activity and tracking logs."
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.5
      ref_id: MCM.5.4
      name: Tool Versioning
      description: The Entity shall have the Data Catalog automated tool updated to
        the latest published Vendor release or shall have a plan to update to the
        latest release reflected in the Data Catalog Development Plan. If the latest
        release is not applicable to the Entity, the Entity shall have the analysis
        and a rationale for its release management strategy.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm
      ref_id: MCM.6
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.6
      ref_id: MCM.6.1
      name: Data Catalog KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        gather statistics on the usage and the adoption of the Data Catalog by users.
        KPIs shall include, at minimum, the following: 1. Number of registered Data
        Catalog users 2. Number of active Data Catalog users 3. Number of logins to
        Data Catalog 4. Number of performed metadata queries 5. Number of annotations
        (tags, comments) added to data assets 6. Number of ratings added to data assets
        7. Number of assigned trust certificates to metadata.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.6
      ref_id: MCM.6.2
      name: Metadata Quality KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure quality of its Metadata. KPIs shall include, at minimum, the following:
        1. Completeness (degree to which business glossaries and data dictionaries
        are completed) 2. Accuracy (degree to which definitions and descriptions align
        to business context) 3. Consistency (degree to which definitions of Metadata
        are consistent across Entity).'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq
      assessable: false
      depth: 1
      ref_id: DQ
      name: Data Quality
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq
      ref_id: DQ.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.1
      ref_id: DQ.1.1
      name: Data Quality Prioritization
      description: The Entity shall prioritize its data from the perspective of its
        importance for the Data Quality Management. The result of the prioritization
        shall be a ranked list of data to be followed when performing the Initial
        Data Quality Assessment. The 1st priority data shall include, at minimum,
        the Entity's master data.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.1
      ref_id: DQ.1.2
      name: Data Quality Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Data Quality\
        \ Plan to implement and manage activities aiming to improve quality of the\
        \ Entity's data. The plan shall include, at minimum, the following: 1. Roadmap\
        \ with the activities and key milestones for implementation of the Entity's\
        \ Data Quality Management. The activities shall, at minimum, incorporate what\
        \ is needed to achieve the specifications in this domain 2. Assignment of\
        \ the required resources and budget to manage the implementation of Data Quality\
        \ management."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.1
      ref_id: DQ.1.3
      name: Initial Data Quality Assessment
      description: 'The Entity shall perform an Initial Data Quality Assessment of
        data included in the Entity''s Data Quality Management scope. The assessment
        shall include, at minimum, the following: 1. Collection of business requirements
        for the Quality of data in the scope'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq
      ref_id: DQ.2
      name: Data Quality Operations
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2
      ref_id: DQ.2.1
      name: Data Quality Rules Development
      description: 'The Entity shall develop and document Data Quality Rules for all
        data included in the Entity''s Data Quality Management scope. The rules are
        used to define the business requirements for Data Quality. The definition
        of Data Quality Rules shall include, at minimum, the following: 1. Rule owner
        - the Data Quality Analyst responsible for the rule''s definition 2. Business
        description of the requirement to be validated by the rule 3. Assignment of
        rules to each of the Data Quality dimensions related to the particular data
        being measured: 3a. Completeness (the degree to which the necessary data is
        available for use) 3b. Uniqueness (the degree to which data records are unique,
        and not duplicates) 3c. Timeliness (the degree to which data is up to date
        and available when it is needed) 3d. Validity (a degree of records'' conformance
        to format, type and range) 3e. Accuracy (a degree to which data values align
        to real values) 3f. Consistency (a degree to which data is consistent across
        different sources) 4. List of data attributes that are validated by the defined
        rules 5. Metrics that are calculated when the rule is validated (e.g. for
        the rule validating the completeness of population of the data field, the
        metrics would be: a number of records'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2
      ref_id: DQ.2.2
      name: Data Quality Monitoring
      description: 'The Entity shall monitor and document the Entity''s Data Quality
        on a regular basis based on the defined Data Quality rules. The Data Quality
        monitoring shall include, at minimum, the following: 1. Execution of existing
        Data Quality Rules according to defined triggering conditions (time schedule,
        event) 2. Reporting of the identified Data Quality issues to the Entity''s
        data stewards and owners (at minimum, Business Data Steward and Business Data
        Executive).'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2
      ref_id: DQ.2.3
      name: Data Quality Issues Resolution
      description: 'The Entity shall establish and follow a clear process for resolving
        the identified Data Quality issues. The process shall include, at minimum,
        the following: 1. The development of a remediation plan. The remediation plan
        shall include, at minimum, the following: 1a. Root cause analysis to determine
        the cause of the identified Data Quality issue 1b. Impact analysis to assess
        negative consequences and level (local, enterprise- wide) of the issue 1c.
        Definition of the options for resolving the issue''s root cause, including
        a feasibility analysis 1d. Specification of data cleansing to be performed
        if a Data Quality issue resolution does not correct data errors in the source
        system 2. The decision and rationale on the selected option to resolve the
        issue 3. The implementation status of the issue''s resolution change 4. The
        review of the implemented change with a verification that the issue is resolved.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2
      ref_id: DQ.2.4
      name: Data Quality Service Level Agreements
      description: 'The Entity shall establish and implement Data Quality Service
        Level Agreements specifying the Entity''s requirements for resolving the identified
        Data Quality issues. The Entity''s Data Quality Service Level Agreement shall
        include, at minimum, the following: 1. Timelines and deadlines for the development
        of the remediation plan for the Data Quality issue 2. Timelines and deadlines
        for the implementation and the review of Data Quality changes 3. Escalation
        actions to be taken when the SLA is not met.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.2
      ref_id: DQ.2.5
      name: Data Quality Tools
      description: 'The Entity shall implement tools supporting automation of the
        Entity''s Data Quality Management. The tools shall cover, at minimum, the
        following capabilities: 1. Data profiling - statistical analysis of data on
        data attribute, table and cross-domain level 2. Data Quality rules management
        - a development and an execution of Data Quality rules 3. Data Quality issues
        management - an automation of workflows for reporting and resolving Data Quality
        issues.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq
      ref_id: DQ.3
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.3
      ref_id: DQ.3.1
      name: Data Quality Trends
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure and report on the Entity''s Data Quality trends against established
        targets. KPIs shall include, at minimum, the following: 1. Number of Data
        Quality issues reported based on the implemented Data Quality Rules 2. Number
        of Data Quality issues reported by the Data Catalog users 3. Number of the
        Data Quality Rules deployed.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.3
      ref_id: DQ.3.2
      name: Data Quality Issues Resolution
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure and report on a performance of the Entity''s Data Quality issues resolution
        process. KPIs shall include, at minimum, the following: 1. Number of resolved
        Data Quality issues vs reported Data Quality issues 2. Number of Data Quality
        issues resolved after the specified deadlines 3. Total time of the development
        of a Data Quality issue remediation plan 4. Total time of resolving a Data
        Quality issue (a root cause resolution implementation).'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq
      ref_id: DQ.4
      name: Data Lifecycle Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.4
      ref_id: DQ.4.1
      name: Data Quality Checkpoints
      description: 'The Entity shall have Business and IT Data Stewards conducting
        the Data Quality reviews within the Software Development Lifecycle (SDLC)
        process. All Data Quality issues identified during Data Quality reviews shall
        be remediated before moving to the production. The Data Quality review should
        include, at minimum, the following: 1. The Data Quality log of identified
        quality issues 2. The remediation plan for the identified issues.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.4
      ref_id: DQ.4.2
      name: Data Quality Support
      description: The Entity shall establish and follow a clear process enabling
        data users to report Data Quality issues to the Business Data Stewards. The
        process shall be implemented as a workflow in the Data Catalog automated tool
        and following the National Data Management Office's Data Catalog Guidelines.
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dq.4
      ref_id: DQ.4.3
      name: Data Quality Metadata
      description: The Entity shall publish existing Data Quality Rules and results
        of Data Quality Monitoring as the metadata registered within the Data Catalog
        automated tool. The population of the metadata shall be executed according
        to the process defined in Metadata and Data Catalog Management domain.
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do
      assessable: false
      depth: 1
      ref_id: DO
      name: Data Operations
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do
      ref_id: DO.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1
      ref_id: DO.1.1
      name: Data Operations Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Data Operations\
        \ Plan to manage and orchestrate Data Operations activities. The plan shall\
        \ include, at minimum, the following: 1. Roadmap with the activities and key\
        \ milestones for the implementation of Data Operations initiatives. The activities\
        \ shall, at minimum, incorporate what is needed to achieve the specifications\
        \ in this domain 2. Assignment of the required resources and budget to manage\
        \ the implementation of Data Operations initiatives."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1
      ref_id: DO.1.2
      name: Data Storage Forecasting
      description: 'The Entity shall conduct periodic forecasts of a storage capacity
        needed to support future business requirements of the Entity based on: 1.
        Observation of historical storage trends 2. Assessment of a performance of
        the Entity''s applications 3. The Entity''s roadmap for applications'' development.
        Forecasts of a storage capacity shall include, at minimum the following: 1.
        Prediction of the Entity''s future storage capacity needs'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1
      ref_id: DO.1.3
      name: Data Systems Prioritization
      description: The Entity shall prioritize its information systems based on their
        business criticality and potential monetary and reputational losses as a consequence
        of emergency or disaster. The result of the prioritization shall be a list
        of ranked information systems which shall be used to establish an order of
        systems recovery in the disaster recovery plan.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.1
      ref_id: DO.1.4
      name: Database Technology Evaluation
      description: 'The Entity shall establish and follow a clear process for evaluation
        and selection of the Database Management System Software. The process'' evaluation
        factors shall include (but not limited to) the following factors: 1. Total
        cost of ownership including, at minimum, licensing, support, training, hardware
        2. Availability of resources skilled in the technology, both internally and
        in the market 3. Presence of related software tools in the Entity 4. Volume
        and velocity limits of the technology 5. Reliability provided by the technology
        6. Scalability of the technology 7. Security controls provided by the technology'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do
      ref_id: DO.2
      name: Policy and Guidelines
      description: As part of the Policy and Guidelines control, the Entity shall
        create a storage and retention policy for the Data Lifecycle Management of
        all stored data
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.2
      ref_id: DO.2.1
      name: Storage and Retention Policy
      description: 'The Entity shall create a storage and retention policy for the
        Data Lifecycle Management of the Entity''s data. The policy shall cover, at
        minimum, the following areas of the data lifecycle: 1. Storage conditions
        ensuring a protection of data in the event of disaster 2. Retention periods
        of data based on its type, classification, business value and legal requirements
        3. Disposal and destruction rules based on the data type and classification
        4. Required actions in the event of an accidental permanent loss of data.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do
      ref_id: DO.3
      name: Database Operations
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3
      ref_id: DO.3.1
      name: Database Monitoring
      description: 'The Entity shall monitor and report database performance on regular
        basis including (but not limited to) the following: 1. Capacity - size of
        the unused storage 2. Availability - accessibility of databases to users 3.
        Queries execution performance - query execution times and errors 4. Changes
        tracking - tracking of database changes for root cause analysis'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3
      ref_id: DO.3.2
      name: Database Access Control
      description: The Entity shall establish and follow a clear process for providing
        the Entity's employees an access to the databases. The process shall implement
        a role-based access to the databases which includes an assignment of roles
        to Entity's employees and granting permissions to the roles. Roles shall be
        defined by following the data classification domain standards.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3
      ref_id: DO.3.3
      name: Storage Configuration Management
      description: 'The Entity shall establish and follow a clear process for managing
        its Storage Configuration. The process shall include (but not limited to)
        the following steps: 1. Configuration identification - identification and
        documentation of the attributes defining the database system configuration
        2. Configuration change control - implementation of changes in the defined
        database configuration'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3
      ref_id: DO.3.4
      name: DBMS Versioning
      description: The Entity shall have its DBMS tools updated to the latest published
        Vendor release or shall have a plan to update to the latest release reflected
        in the Data Management and Personal Data Protection Plan. If the latest release
        is not applicable to the Entity, the Entity shall have the analysis and rationale
        for its release management strategy.
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.3
      ref_id: DO.3.5
      name: Service Level Agreements
      description: 'The Entity shall establish and implement database performance
        Service Level Agreements specifying the Entity''s requirements for the databases
        performance, data availability and recovery. The Entity''s database performance
        Service Level Agreements shall include (but not limited to) the following:
        1. Timeframes for database''s availability for users 2. Maximum allowable
        execution time for selected application transactions 3. Escalation actions
        to be taken when the SLA is not met'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do
      ref_id: DO.4
      name: Business Continuity
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.4
      ref_id: DO.4.1
      name: Data Backup Recovery
      description: 'The Entity shall establish and follow a clear process for the
        data backup and recovery including (but not limited to) the following: 1 -
        Definition of backup frequency for each information system 2 - Scope of backup
        for each information system including scope of data and scope of database
        transaction logs 3 - Location of backup files including a storage medium and
        a physical location 4 - Periodic validations of backup completions using non-production
        system copies'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.4
      ref_id: DO.4.2
      name: Disaster Recovery
      description: 'The Entity shall establish and follow a disaster recovery plan
        including (but not limited to) the following: 1. Prioritized list of information
        systems defining an order of the information systems recovery 2. Assignment
        of roles responsible for addressing an incident response 3. Definition of
        actions to be taken to activate a response to the incident 4. Definition of
        actions to be taken to reduce the damage and mitigate the consequences of
        an incident on Entity''s critical operations 5. Definition of Recovery Point
        Objectives (a maximum targeted period within which data might be lost without
        causing damage to business) for each information system covered in the plan'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.4
      ref_id: DO.4.3
      name: Production Data Access Control
      description: 'The Entity shall establish and follow a clear process for the
        implementation of database changes to Production Environments. The process
        shall include (but not limited to) the following: 1. Change request initiating
        the process 2. Definition of actions to be taken for a controlled implementation
        of changes to databases 3. Definition of actions to be taken for reversing
        the changes in case of identified issues'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do
      ref_id: DO.5
      name: Performance Management
      description: As part of the Performance Management control, the Entity shall
        establish key performance indicators (KPIs) to gather statistics on usage
        of its data storage
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:do.5
      ref_id: DO.5.1
      name: Storage KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        gather statistics on usage of its data storage. KPIs shall include, at minimum,
        the following: 1. Percentage of total data storage capacity used 2. Percentage
        of data storage capacity used by type of database 3. Percentage of data storage
        capacity used for backups 4. Number of performed data transactions 5. Average
        time of queries execution.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm
      assessable: false
      depth: 1
      ref_id: DCM
      name: Document and Content Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm
      ref_id: DCM.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1
      ref_id: DCM.1.1
      name: Document and Content Management Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Document and\
        \ Content Management Plan to implement and control activities aiming to manage\
        \ the Entity's documents and content lifecycle. The plan shall include, at\
        \ minimum, the following: 1. Roadmap with the activities and key milestones\
        \ for implementation of Documents and Content Management processes. The activities\
        \ shall, at minimum, incorporate what is needed to achieve the specifications\
        \ in this domain 2. Assignment of the required resources and budget to manage\
        \ the implementation of Documents and Content Management processes."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1
      ref_id: DCM.1.2
      name: Documents Digitization Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Documents and\
        \ Content Digitization Plan to manage the implementation of paperless management\
        \ initiatives. The plan shall include, at minimum, the following: 1. Roadmap\
        \ with the activities and key milestones for a migration of the Entity's existing\
        \ paper-based documents to the electronic format 2. Roadmap with the activities\
        \ and key milestones for the implementation of initiatives focused on eliminating\
        \ a creation of paper- based documents in the Entity and replacing them with\
        \ electronic documents 3. Assignment of the required resources and budget\
        \ to manage the implementation of paperless management initiatives."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1
      ref_id: DCM.1.3
      name: Documents Prioritization
      description: The Entity shall identify and prioritize its documents to be stored
        and managed in the Entity's DMS. The result of the prioritization shall be
        a ranked list of documents to be used as an input in the implementation of
        the Entity's DMS.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.1
      ref_id: DCM.1.4
      name: Documents Workflows Prioritization
      description: The Entity shall identify and prioritize its key processes to be
        implemented as workflows in DMS to enable automated and paperless management
        of documents within the Entity. The result of the prioritization shall be
        a ranked list of the processes to be used as an input in the implementation
        of the Entity's DMS.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm
      ref_id: DCM.2
      name: Policy and Guidelines
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.2
      ref_id: DCM.2.1
      name: Document and Content Management Policy
      description: 'The Entity shall create a Document and Content Management policy/policies
        on managing the data lifecycle for documents and content within the Entity.
        The policy/policies shall cover, at minimum, the following areas of the document
        and content lifecycle: 1. Documents'' naming conventions used 2. Assignment
        of classification levels to documents 3. Documents and content access approval
        4. Documents and content backup and recovery 5. Documents and content retention
        and disposal'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm
      ref_id: DCM.3
      name: Training and Awareness
      description: As part of the Training and Awareness control, the Entity shall
        conduct document and content management training for the Entity's employees
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.3
      ref_id: DCM.3.1
      name: Document and Content Management Training
      description: 'The Entity shall conduct the Document and Content Management training
        for the Entity''s employees to increase the awareness on leading practices
        in the Document and Content Management. The training shall include, at minimum,
        the following: 1. Introduction of the policies around the Document and Content
        Management 2. Introductory and advanced tutorials about Document and Content
        Management systems used and their functionalities.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm
      ref_id: DCM.4
      name: Document and Content Operations
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4
      ref_id: DCM.4.1
      name: Backup and Recovery
      description: The Entity shall include the Document and Content Management Systems
        within its overall backup and recovery plan
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4
      ref_id: DCM.4.2
      name: Retention and Disposal
      description: 'The Entity shall establish and follow a clear process for retention
        and disposal of the Entity''s documents. The process shall implement the Entity''s
        documents retention and disposal policy and shall include (but not limited
        to) the following: 1. Handover of documents to the Entity''s archival facility
        2. Physical destruction of documents, including overwriting and a secure deletion'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4
      ref_id: DCM.4.3
      name: Document and Content Access Approval
      description: The Entity shall establish and follow a clear process for providing
        Entity's employees access to documents and content stored in the Entity's
        Document and Content Management Systems. The process shall implement a role-based
        access to documents and content. The CMS and DMS access groups shall be defined
        by following the Data Classification domain standards
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4
      ref_id: DCM.4.4
      name: Document and Content Metadata Publishing
      description: The Entity shall publish metadata of documents and content stored
        within the Entity's Document and Content Management Systems in the Entity's
        Data Catalog automated tool. The population of the metadata shall be executed
        according to the process defined in Metadata and Data Catalog Management domain.
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.4
      ref_id: DCM.4.5
      name: Documents and Content Management Tools
      description: 'The Entity shall implement tools supporting automation of the
        Entity''s Document and Content Management. The tools shall include, at minimum,
        the following: 1. Document Management System - an application used to capture,
        store and manage documents in an electronic format (electronic documents and
        digital media). The selected DMS tool shall provide, at minimum, the following
        capabilities: - Storage of documents - OCR (Optical Character Recognition)
        functionality to analyze imported images - Indexing of documents - Versioning
        of documents including tracking of the history of changes - Secured access
        to documents - Global search and discovery on the registered documents - Documents
        workflows development 2. Web Content Management System - an application used
        to store and manage website Content used by the Entity''s portals and internet
        sites 3. Collaboration tools - applications providing users with platform
        to collaborate real-time on electronic documents, communicate using chat and
        track changes in the documents'
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm
      ref_id: DCM.5
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dcm.5
      ref_id: DCM.5.1
      name: Documents Management KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure its documents management efficiency. KPIs shall include, at minimum,
        the following: 1. Volume of the Entity''s documents stored and managed within
        the Entity''s Document Management System 2. Number of users of the Entity''s
        Document Management System 3. % of identified paper-based documents migrated
        to electronic format.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      assessable: false
      depth: 1
      ref_id: DAM
      name: Data Architecture and Modeling
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      ref_id: DAM.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.1
      ref_id: DAM.1.1
      name: Data Architecture and Modeling Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Data Architecture\
        \ and Modeling Plan to implement and manage activities aiming to improve its\
        \ Data Architecture Capabilities. The plan shall include, at minimum, the\
        \ following: 1. Roadmap with the activities and key milestones for the implementation\
        \ of the target Data Architecture Capabilities. The activities shall, at minimum,\
        \ incorporate what is needed to achieve the specifications in this domain\
        \ 2. Assignment of the required resources and budget to manage the implementation\
        \ of the activities included in the Roadmap."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      ref_id: DAM.2
      name: Policy and Guidelines
      description: As part of Policy and Guidelines control, the Entity shall document
        and publish a Data Architecture and Modeling Policy
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.2
      ref_id: DAM.2.1
      name: Data Architecture and Modeling Policy
      description: 'The Entity shall document and publish a Data Architecture and
        Modeling Policy to guide the development of the target data architecture.
        The policy shall cover, at minimum, the following: 1. Target Data Architecture
        shall address strategic requirements defined within the Entity''s Data Management
        and Personal Data Protection Strategy 2. Target Data Architecture shall be
        developed in conjunction with the development of the Entity''s overall Enterprise
        Architecture 3. Target Data Architecture shall adopt a widely used Enterprise
        Architecture Framework, e.g. TOGAF, Zachmann 4. The Entity''s Data Models
        shall be monitored regularly and kept up to date.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      ref_id: DAM.3
      name: Data Architecture Framework Definition
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3
      ref_id: DAM.3.1
      name: Current State Architecture
      description: 'The Entity shall define its ''baseline'' current state Data Architecture
        to support the development of its target state Data Architecture. The current
        state Data and Technical architecture should cover, at minimum, the following:
        1. Data Model - The Entity''s current Enterprise Data Model at Conceptual,
        Logical and Physical level. Each data model level shall cover, at minimum:
        1a. Conceptual Model - Key business entities for the Entity with their relationships
        divided into business subject areas 1b. Logical Model - Conceptual model extended
        with attributes for business entities and addition of less significant entities
        and relationships 1c. Physical Model - Physical representation (physical tables
        names, attributes names, data types, primary and foreign keys etc.) of logical
        data models within the key System Components 2. Key Processes - Essential
        current processes involved in ongoing business operations and decision making
        3. Key System Components - Essential current applications, data storages,
        data processing platforms and data analytics solutions involved in key processes'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3
      ref_id: DAM.3.2
      name: Target State Architecture
      description: 'The Entity shall define and develop a future state target data
        architecture by following the Entity''s Data Architecture and Modeling Policy.
        The target Data Architecture shall cover, at minimum, the following: 1. Data
        Model - the Entity''s target Enterprise Data Model at Conceptual, Logical
        and Physical level. Each data model level shall include, at minimum: 1a. Conceptual
        Model - key business entities for the Entity with their relationships divided
        into business subject areas 1b. Logical Model - conceptual model extended
        with attributes for business entities and addition of less significant entities
        and relationships 1c. Physical Model - physical representation (physical tables
        names, attributes names, data types, primary and foreign keys etc.) of logical
        data models within the key System Components 2. Key Processes - Essential
        target processes involved in ongoing business operations and decision making
        3. Key System Components - Essential target applications, data storages, data
        processing platforms and data analytics solutions involved in key processes
        4. Data Flows and Lineage - Visualized target data movement across the key
        processes and system components.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3
      ref_id: DAM.3.3
      name: Future State Gap Assessment
      description: The Entity shall conduct and document a gap analysis between the
        Entity's current state architecture and the defined target state architecture.
        The gap analysis shall be used as an input for definition of initiatives required
        to implement target state data architecture.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3
      ref_id: DAM.3.4
      name: Big Data Considerations
      description: The Entity shall identify and document its requirements for developing
        a Data Lake environment using a vendor-neutral Big Data
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.3
      ref_id: DAM.3.5
      name: Data Processing Considerations
      description: The Entity shall employ and document a partitioning strategy for
        its target state Data Architecture for efficient processing of various data
        volumes, variety and velocity of data and optimizing data processing and systems
        performance. The partitioning strategy should cover both real-time and batch
        processing operations.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      ref_id: DAM.4
      name: Data Modeling Definition
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.4
      ref_id: DAM.4.1
      name: Model Representation
      description: The Entity shall select and follow a diagramming method (e.g. UML)
        for documenting the structure, relationships and notations of business entities
        at the conceptual, logical and physical level that can be used throughout
        the Software Development Lifecycle (SDLC).
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.4
      ref_id: DAM.4.2
      name: Tools and Technologies
      description: 'The Entity shall select and implement a toolset of technologies
        for the design, development and implementation of data architecture and modeling
        initiatives within the Entity. The Entity''s toolset shall cover, at minimum,
        the following: 1. Data Architecture Design - Visually representing data and
        system components along with data flow diagramming 2. Data Modeling - Drawing
        functionality to create and modify data and system objects, attributes and
        relationships, and perform reverse engineering of existing data models 3.
        Data Lineage - Capturing and maintaining of data flows between systems to
        enable an impact analysis.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      ref_id: DAM.5
      name: Data Lifecycle Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.5
      ref_id: DAM.5.1
      name: Change Management
      description: 'The Entity shall establish and follow an architecture change management
        process to review, approve and implement changes to current and/or target
        state Data Architectures. The scope of architecture changes shall include,
        at minimum, the following: 1. Requests for new Data Architecture and Data
        Modeling initiatives 2. Modifications to Statement of Architecture Work documents
        for existing initiatives.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.5
      ref_id: DAM.5.2
      name: Data Architecture Checkpoints
      description: 'The Entity shall have Data Architecture checkpoints incorporated
        into its Software Development Lifecycle (SDLC) process. The checkpoints shall
        include, at minimum, the following: 1. Investigation of possibilities for
        reusage of existing Data Architecture components to address business requirements
        2. Validation of conformance of created data models with the Entity''s Enterprise
        Data Model 3. Verification if project implies any changes required to the
        Entity''s overall Enterprise Data Model.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      ref_id: DAM.6
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.6
      ref_id: DAM.6.1
      name: Data Architecture and Modeling KPIs
      description: The Entity shall establish key performance indicators (KPIs) to
        measure the state of its Data Architecture and Modeling capabilities. KPIs
        shall include, at minimum, metrics to track progress in transforming current
        state data architecture towards a target state data architecture.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam
      ref_id: DAM.7
      name: Artifacts
      description: As part of the Artifacts control, the Entity shall store and maintain
        its Data Architecture documentation materials
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dam.7
      ref_id: DAM.7.1
      name: Data Architecture and Modeling Register
      description: The Entity shall store in a register its data and technical architecture
        project, reference documentation materials and data model designs.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      assessable: false
      depth: 1
      ref_id: DSI
      name: Data Sharing and Interoperability
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.1
      ref_id: DSI.1.1
      name: Initial Data Integration Assessment
      description: 'The Entity shall perform an Initial Data Integration Assessment
        to identify pain points and inefficiencies in the data movement and the integration
        across the Entity. The assessment shall include, at minimum, the following:
        1. Creating an inventory of all existing IT components (data sources, systems,
        applications and data stores) 2. Documenting a high-level Data Lineage including
        the rules according to which data is changed, and the frequency of changes
        3. Documenting data models used by the Entity''s IT components. The result
        of the Initial Data Integration Assessment shall be a list of identified data
        movement and integration pain points.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.1
      ref_id: DSI.1.2
      name: Target Data Integration Architecture
      description: 'The Entity shall create a Target Data Integration Architecture
        based on the pain points identified in the Initial Data Integration Assessment
        to manage the data movement efficiently across data stores, systems and applications.
        At minimum, the Target Data Integration Architecture shall include, the following:
        1. Data Integration Requirements - Data Integration Requirements defined by
        the key business and IT stakeholders (incl. Data Architects)'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.1
      ref_id: DSI.1.3
      name: Data Integration Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Data Integration\
        \ Plan to identify and orchestrate the implementation of the integration initiatives.\
        \ The plan shall include, at minimum, the following: 1. Roadmap with the activities\
        \ and key milestones for the implementation of the Target Data Integration\
        \ Architecture. The activities shall, at minimum, incorporate what is needed\
        \ to achieve the specifications in this domain 2. Assignment of the required\
        \ resources and budget to manage the implementation of the Data Integration\
        \ initiatives."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.2
      name: Training and Awareness
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.2
      ref_id: DSI.2.1
      name: Data Sharing Training
      description: 'The Entity shall conduct the Data Sharing training for every employee
        involved in the Data Sharing initiatives to ensure that they understand their
        obligations, responsibilities and the consequences of an unauthorized disclosure
        or mishandling of data. The training shall include, at minimum, the following:
        1. Introduction on the applicability of the Data Sharing process 2. Leading
        practices of data handling 3. Consequences of mishandling of data 4. Data
        Sharing Principles and Controls'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.3
      name: Integration Solution Development Lifecycle
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3
      ref_id: DSI.3.1
      name: Integration Requirements Document
      description: 'The Entity shall produce an Integration Requirements Document
        for each Entity''s initiative requiring the data integration between the Entity''s
        IT components. The document shall include, at minimum, the following: 1. Clearly
        defined scope 2. Entity''s Business goals and objectives to be achieved 3.
        Implementation Timeline 4. Resources required 5. Cost estimate 6. Functional
        Requirements 7. Non-Functional Requirements.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3
      ref_id: DSI.3.2
      name: Solution Design Document
      description: "The Entity shall create a Solution Design Document for each integration\
        \ initiative based on the Integration Requirements Document provided. The\
        \ document shall include, at minimum, the following: 1. Integration Solution\
        \ Overview \u2013 Description of the solution supported by the Solution Overview\
        \ Diagram 2. Target Data Integration Architecture Adherence \u2013 Alignment\
        \ to the Target Data Integration Architecture 3. Data Orchestration \u2013\
        \ The Data-Flow- Diagram (DFD) portraying the flow of data in a data integration\
        \ solution from start to finish, including intermediate steps, required to\
        \ complete the transformation 4. Source-To-Target Mapping - Set of data transformation\
        \ instructions that determine"
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3
      ref_id: DSI.3.3
      name: Integration Solution Testing
      description: "The Entity shall perform testing of the developed Integration\
        \ Solution prior to deploying it to the Production Environment to verify that\
        \ it was implemented as defined in the Solution Design Document. At minimum,\
        \ testing shall consist of the following stages: 1. Integration Testing \u2013\
        \ Verifying the correctness of data flows between integrated IT components\
        \ (systems, applications, data stores) to identify and resolve any Data Quality\
        \ issues or bugs 2. Functional Testing \u2013 Verifying that the system meets\
        \ both functional and non- functional requirements and satisfies business\
        \ goals. Each of above stages shall include, at minimum, the following: 1.\
        \ Defining Test Use Cases 2. Setting up a Test Environment 3. Executing Test\
        \ Use Cases in a Test Environment and documenting test results."
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.3
      ref_id: DSI.3.4
      name: Monitoring and Maintenance
      description: 'The Entity shall actively monitor and maintain the Integration
        Solution after its release to the Production Environment. The monitoring and
        maintenance shall include, at minimum, the following: 1. Reporting on any
        identified bugs or defects 2. Producing the Change Request document to accommodate
        for any change requirements from the end users.'
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.4
      name: Data Processes
      description: As part of the Data Processes control, the Entity shall design,
        document and follow ETL and ELT processes
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.4
      ref_id: DSI.4.1
      name: ETL Process
      description: 'The Entity shall design, document and follow ETL (Extract Transform
        Load) process to integrate data from disparate sources and load it into Data
        Warehouse Store. The process shall include the following steps: 1. Extract
        - Data Extraction shall include, at minimum, the following: 1a. Identification
        of data sources from which the data will be extracted 1b. Extracting data
        from the data sources 1c. Staging extracted data temporarily in a physical
        data store on disk or in a memory 2. Transform - Data Transformation shall
        include, at minimum, the following: 2a. Data Mapping - Planning the actual
        transformation process 2b. Data Transformation - Removing duplicate data,
        filling out missing values, filtering, sorting, joining and splitting data
        2c. Review - Validating the correctness of the transformation 3. Load - Storing
        of physically transformed data in the Data Warehouse Store.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.4
      ref_id: DSI.4.2
      name: ELT Process
      description: 'The Entity shall design, document and follow ELT Process to store
        the unstructured data in its raw native format in the Data Lake. The process
        shall include the following steps: 1. Extract - Data Extraction shall include,
        at minimum, the following: 1a. Identification of data sources from which the
        data will be extracted 1b. Extracting data from the data sources'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.5
      name: Data Sharing Process
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.5
      ref_id: DSI.5.1
      name: Data Sharing Process
      description: 'The Entity shall adopt and follow the Data Sharing Process as
        defined in the Data Sharing Regulation published by the National Data Management
        Office when sharing data externally with Public Entities, Private Organizations
        and Individuals. The Data Sharing Process shall include the following steps:
        1. Data Sharing Request Reception 2. Roles assignment 3. Data Classification
        level check 4. Data Sharing Principles assessment 5. Data Sharing decision
        and feedback 6. Business Data Executive approval 7. Design and implementation
        of Data Sharing controls 8. Data Sharing agreement signing 9. Sharing data
        with the Requestor.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.6
      name: Data Sharing Requests
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.6
      ref_id: DSI.6.1
      name: Data Sharing Request Submission Channel
      description: The Entity shall establish on its official Government website a
        channel to manage the submission and the reception of Data Sharing requests.
        Each such request shall be routed to the Data Office.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.7
      name: Data Sharing Agreements
      description: As part of the Data Sharing Agreements control, the Entity shall
        design, implement and review Data Sharing Agreements
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.7
      ref_id: DSI.7.1
      name: Internal Data Sharing Agreements
      description: The Entity shall define and follow an Internal Data Sharing agreement
        template that shall be used when data is shared between information systems
        within the Entity.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.7.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.7
      ref_id: DSI.7.2
      name: External Data Sharing Agreements
      description: 'The Entity shall design and implement the required Data Sharing
        controls as defined in the Data Sharing Regulation. The controls shall be
        agreed with the requesting Entity, and they shall be documented in the Data
        Sharing Agreement. The Data Sharing Agreement shall include, at minimum, the
        following: 1. Purpose of the Data Sharing 2. Information about requesting
        and sharing Entity 3. Lawful basis for sharing 4. Sharing details (date, duration)
        5. Liability provisions The Data Sharing agreement shall be signed by the
        Business Data Executive and the Requestor prior to sharing data.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.7.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.7
      ref_id: DSI.7.3
      name: Data Sharing Agreements' Review
      description: The Entity shall review all ongoing Data Sharing agreements on
        a regular basis to accommodate for any changes. The audit shall be executed,
        and its outcome documented by the Data Steward based on contractual provisions
        and procedures detailed out in the Data Sharing agreement.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi
      ref_id: DSI.8
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.8.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dsi.8
      ref_id: DSI.8.1
      name: Data Sharing and Interoperability KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure the progress and benefits from implementing Data Integration solutions,
        and the effectiveness of Data Sharing activities. KPIs shall include, at minimum,
        the following: 1. Data transfer rate between systems / applications 2. Latency
        between data sources and data targets 3. The number of Data Sharing requests
        received 4. The number of Data Sharing requests accepted/denied 5. The number
        of Data Sharing requests sent 6. The number of ongoing Data Sharing agreements
        7. Average duration of Data Sharing requests evaluation process expressed
        in days.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd
      assessable: false
      depth: 1
      ref_id: RMD
      name: Reference and Master Data Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd
      ref_id: RMD.1
      name: Plan
