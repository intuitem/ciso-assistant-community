      ref_id: DG.6
      name: Data Lifecycle Governance
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.6
      ref_id: DG.6.1
      name: Periodic Plan Review
      description: "The Entity shall conduct periodic reviews to the Entity\u2019\
        s Data Management and Personal Data Protection Plan, and document the outcome\
        \ of these reviews, to ensure the plan maintains alignment towards the stated\
        \ program objectives and evolving priorities. The Entity shall also document\
        \ any changes to the initial approved plan where applicable."
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.6
      ref_id: DG.6.2
      name: Communications
      description: 'The Entity shall implement a communications capability to communicate
        updates on Data Management and Personal Data Protection activities and its
        effectiveness. Communication updates shall be ongoing and, at minimum, include:
        1. Key Data Management and Personal Data Protection program plan, activities
        and decisions 2. Storage of data management documents and artifacts 3. Measure
        of the data management performance metrics 4. Updates on the data management
        policies and processes 5. Updates on the compliance scores, compliance report,
        relevant regulatory environment and implementation plans.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg
      ref_id: DG.7
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.7
      ref_id: DG.7.1
      name: Data Governance KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        gather statistics on Data Governance. KPIs shall include, at minimum, the
        following: 1. Assignment of the Data Management and Personal Data Protection
        roles 2. Periodic Data Management and Personal Data Protection Committee Meetings
        completed 3. Development / Refresh of the Entity Specific Data Management
        Strategy and Policies 4. Trainings and awareness sessions completed 5. Participation
        in Training and Awareness Sessions 6. Compliance Audit Score 7. Start to finish
        cycle time to resolve data related issues reported to the Data Office 8. Number
        of change requests resolved and closed.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.7.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.7
      ref_id: DG.7.2
      name: Continuous Improvement
      description: The Entity shall define, implement, and monitor continuous improvement
        mechanisms for all Data Management domains. Improvements defined should relate
        to dimensions including the data organization and roles, processes, and technologies.
      implementation_groups:
      - P2
