      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1
      ref_id: RMD.1.1
      name: Reference and Master Data Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Reference and\
        \ Master Data Plan to implement and manage activities aiming to improve its\
        \ Reference and Master Data Management Capabilities. The plan shall include,\
        \ at minimum, the following: 1. Roadmap with the activities and key milestones\
        \ for the implementation of the Entity's Reference and Master Data Management.\
        \ The activities shall, at minimum, incorporate what is needed to achieve\
        \ the specifications in this domain 2. Assignment of the required resources\
        \ and budget to manage the implementation of the activities included in the\
        \ Roadmap."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1
      ref_id: RMD.1.2
      name: Reference and Master Data Identification and Prioritization
      description: 'The Entity shall identify its reference and master data. The identification
        shall cover, at minimum, the following: 1. Identification of Master Data objects
        (e.g. customer, product, citizen) used across the Entity 2. Identification
        of Reference Data Objects required by instances of identified Master Data
        Objects 3. Identification of data sources and applications where Reference
        and Master'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1
      ref_id: RMD.1.3
      name: Reference Data Categorization
      description: 'The Entity shall categorize its identified Reference Data Objects
        as either internal or external datasets: - Internal - Any reference data the
        Entity owns, manages and is Single Source of Truth across government - External
        - Any reference data owned and managed by other Entities across government
        or considered standard industry data coming from external organizations such
        as ISO. An identification of internal and external reference data used by
        the Entity is as an input for standardization activities of Reference Data
        at the national Government level.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.1
      ref_id: RMD.1.4
      name: Master Data Categorization
      description: 'The Entity shall categorize its identified Master Data objects
        as either internal or external: - Internal - Any Master Data Objects the Entity
        owns, manages and is Single Source of Truth across government - External -
        Any Master Data Objects owned and managed by other Entities across government.
        An identification of internal and external Master Data Objects used by the
        Entity is as an input for standardization activities of Master Data at the
        national Government level.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd
      ref_id: RMD.2
      name: Architecture
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2
      ref_id: RMD.2.1
      name: RMD Requirements
      description: 'Based on the Data Management and Personal Data Protection Strategy,
        the Entity shall establish and document its requirements for effectively managing
        the Entity''s Reference and Master Data across the data lifecycle. The requirements
        for Reference and Master Data shall cover, at minimum, the following: 1. Processes
        and related roles for managing the Entity''s Reference and Master Data Objects
        across the data lifecycle from creation to archiving 2. Rules for accurate
        matching and merging Master Data Records from different data sources to create
        Golden Record 3. Requirements for provisioning of Master Data Golden Records
        to consuming applications 4. Requirements for provisioning of Reference Data
        Objects to consuming applications 5. Data quality requirements for Reference
        and Master Data Objects to be leveraged an input for Initial Data Quality
        Assessment detailed in Data Quality domain.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2
      ref_id: RMD.2.2
      name: RMD Data Hub Design
      description: The Entity shall evaluate and select Reference Master Data Hub
        architecture design to effectively manage its Reference and Master
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2
      ref_id: RMD.2.3
      name: RMD Conceptual Architecture
      description: The Entity shall develop and document a conceptual architecture
        for its target Reference and Master Data environment per the Entity's selected
        Data Hub architecture design. The conceptual architecture shall indicate foundational
        building block components and
      implementation_groups:
