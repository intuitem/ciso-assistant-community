ref_id: NDMO-DMPDP
name: NDMO Data Management and Personal Data Protection Standards
description: 'NDMO Data Management and Personal Data Protection Standards, issued
  by the National Data Management Office (NDMO) under the Saudi Data and Artificial
  Intelligence Authority (SDAIA). The national standards for data management and personal
  data protection across Saudi public entities and their data-handling partners. 15
  domains, 77 controls and 190 specifications, each specification carrying an implementation
  priority (P1/P2/P3) modelled as an implementation group. Reference: https://sdaia.gov.sa/ndmo'
copyright: "\xA9 NDMO / SDAIA"
version: 1
publication_date: 2026-06-22
provider: NDMO
packager: community
