      ref_id: DG.4.1
      name: Data Management Office
      description: "The Entity shall establish a Data Management Office to manage\
        \ the achievement of the national data management agendas at the Entity level.\
        \ The office responsibilities shall be aligned with the responsibilities defined\
        \ in the \u201COrganizational Manual\u201D published by NDMO."
