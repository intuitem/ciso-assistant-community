      description: "The Entity shall identify and appoint IT Data Stewards to enable\
        \ the data management agenda from an IT perspective. The IT Data Steward responsibilities\
        \ shall be highlighted in a job description and aligned with the responsibilities\
        \ defined in the \u201COrganizational Manual\u201D published by NDMO."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.4.11
