      ref_id: DG.4.2
      name: Entity Data Management Committee
      description: "The Entity shall establish a Data Management Committee aimed to\
        \ provide direction and oversight to the overall data management agenda at\
        \ the Entity level. The committee responsibilities shall be aligned with the\
        \ responsibilities defined in the \u201COrganizational Manual\u201D published\
