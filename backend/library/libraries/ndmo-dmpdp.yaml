    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd
      ref_id: RMD.3
      name: Training and Awareness
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.3
      ref_id: RMD.3.1
      name: Reference and Master Data Training
      description: 'The Entity shall conduct the Reference and Master Data training
        for employees responsible for managing Reference and Master Data. The training
        shall include, at minimum, the following topics: 1. Identification - Identifying
        correct sources of Master and Reference Data 2. Matching - Linking records
        between systems containing Master Data 3. Consolidation - Removing duplication
        and overlap between Master Data Sources 4. Conflict Resolution - Resolving
        conflicts in Reference and Master Data 5. Managing Changes - Leveraging supporting
        technologies in managing and automating Reference and Master Data changes.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd
      ref_id: RMD.4
      name: Data Lifecycle Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4
      ref_id: RMD.4.1
      name: RMD Stewardship Coverage
      description: The Entity shall assign Business and IT Data Stewards to all identified
        Reference and Master Data Objects.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4
      ref_id: RMD.4.2
      name: RMD Data Lifecycle Management Process
      description: 'The Entity shall establish and follow a clear process for managing
        Reference and Master Data Objects across Data Lifecycle from creation to archiving.
        The process shall cover roles and actions involved in, at minimum, the following
        steps of Data Lifecycle: 1. Creation of new Reference and Master Data Objects
        and their instances 2. Modification of existing Reference and Master Data
        Objects and their instances 3. Archiving of Reference and Master Data Objects
        and their instances'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4
      ref_id: RMD.4.3
      name: RMD Data Hub Implementation
      description: 'The Entity shall implement the Reference and Master Data Hub for
        managing its Reference and Master Data Objects and provide Trusted Source
        of reference and master data across entity. As a part of implementation of
        the Data Hub, the Entity shall, at minimum: 1. Instantiate the physical Data
        Hub technical architecture components necessary to address the Entity''s target
        RMD information architecture requirements'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.4
      ref_id: RMD.4.4
      name: Data Hub as Trusted Source
      description: The Entity shall establish the Data Hub as the Entity's Trusted
        Source for any new information system and application implemented requiring
        the use of the Entity's Reference and/or Master Data Objects.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd
      ref_id: RMD.5
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.5
      ref_id: RMD.5.1
      name: RMD Service Level Agreements
      description: The Entity shall establish Service Level Agreements for its RMD
        Data Lifecycle Management Process to effectively balance time vs. cost for
        changes to its Reference and Master Data.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.5
      ref_id: RMD.5.2
      name: RMD Program KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure the effectiveness of development of its Reference and Master Data
        capabilities. KPIs shall include, at minimum, the following: 1. Number of
        incorrect data values in the Master Data Records 2. Mean Time to Repair (MTTR)
        Reference and Master Data quality issues 3. Change request volumes for Reference
        and Master Data Objects.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd
      ref_id: RMD.6
      name: Artifacts
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.6
      ref_id: RMD.6.1
      name: RMD Change Request Logs
      description: The Entity shall document in a register its reference and master
        data change request logs and the decisions made based on those requests.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.6
      ref_id: RMD.6.2
      name: RMD Initiative Planning Documents
      description: The Entity shall document in a register Statement of Architecture
        Work documents for its Reference and Master Data initiatives.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia
      assessable: false
      depth: 1
      ref_id: BIA
      name: Business Intelligence and Analytics
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia
      ref_id: BIA.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1
      ref_id: BIA.1.1
      name: Business Intelligence and Analytics Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Business Intelligence\
        \ and Analytics Plan to manage and orchestrate Business Intelligence and Analytics\
        \ activities. The plan shall include, at minimum, the following: 1. Roadmap\
        \ with the activities and key milestones for the implementation of BI and\
        \ Analytics use cases. The activities shall, at minimum, incorporate what\
        \ is needed to achieve the specifications in this domain 2. Assignment of\
        \ the required resources and budget to manage the implementation BI and Analytics\
        \ use cases"
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1
      ref_id: BIA.1.2
      name: Bi and Analytics Use Case Identification and Prioritization
      description: 'The Entity shall identify and prioritize the list of BI and Analytics
        use cases based on the Entity''s strategy and key challenges faced within
        the sector: 1. Identify: Ideation workshops shall be conducted with a long
        list of identified use cases documented, with each use case defined with its
        name, description, and entities to be involved in this use case 2. Prioritization:
        The long list of use cases shall be shortlisted based on a predefined'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1
      ref_id: BIA.1.3
      name: BI and Analytics Use Case Detailing
      description: 'The Entity shall detail the shortlisted BI and Analytics Use Cases
        that represent the Entity''s business data-driven needs. Each shortlisted
        Analytics Use Case shall, at minimum, have the following documented: 1. Objective
        aimed to be achieved from the use case 2. Type of Analytics leveraged (among
        the five maturity levels of discovery, descriptive, diagnostic, predictive,
        prescriptive) 3. The expected benefits and business value aimed to be derived
        (ROI) through development of a business case 4. Stakeholders involved in the
        implementation of the use case, the owner that would lead the use case, and
        the target consumers that would benefit from the insights generated by the
        use case 5. List of business requirements to implement the use case 6. Data
        sources that would feed the use case with the required data fields 7. The
        technologies required to implement the use cases The long list of use cases,
        their prioritization, and detailing shall be inserted in a use case portfolio
        document.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.1
      ref_id: BIA.1.4
      name: BI and Analytics Use Case Implementation Plan
      description: 'The Entity shall develop and document an implementation plan for
        each the shortlisted and approved BI and Analytics Use Cases defined in the
        use case portfolio and comprise of the next steps to pilot the use case, followed
        by production and then monitoring results. The implementation plan shall address,
        at minimum: 1. Detail Functional and Non-Functional Requirements - Use case
        objectives translated into analytics requirements 2. High Level Design - Conceptual
        design of the analytics solution, e.g. wireframes 3. Staging and Production
        Environment Preparations - Analytics solution hosting environments during
        and after development'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia
      ref_id: BIA.2
      name: Training and Awareness
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.2
      ref_id: BIA.2.1
      name: Business Intelligence and Analytics Training
      description: 'The Entity shall conduct the BI and Analytics training for all
        employees involved in BI and Analytics initiatives to upskill analytics capabilities
        within the Entity. The training shall include, at minimum, the following:
        1. Methods for gathering and organizing data required for the analysis 2.
        Model development, applying analytics methods and using analytics tools 3.
        Data models and data flows development 4. Types of graphical representation
        of data and information 5. Analytical models'' evaluation techniques.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.2
      ref_id: BIA.2.2
      name: Business Intelligence and Analytics Awareness
      description: 'The Entity shall develop and implement Business Intelligence and
        Analytics awareness campaigns to promote the awareness, education and adoption
        of its Business Intelligence and Analytics capabilities. Awareness campaigns
        shall leverage one or more of the Entity''s existing communications channels
        to drive awareness of the Entity''s: 1. Current Analytics Assets Available
        from the Entity - Previously implemented use cases, analytics models, APIs,
        BI reports and dashboards for potential data sharing and reuse 2. BI and Analytics
        Success Stories - Quantifiable and qualitative benefits and outcomes from
        recent use case implementations'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia
      ref_id: BIA.3
      name: Data Lifecycle Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.3
      ref_id: BIA.3.1
      name: Business Intelligence and Analytics Use Case Validation
      description: 'The Entity shall define and conduct a validation process to validate
        use case outcomes, initial intended purpose and alignment with the Entity''s
        overall Analytics Plan. The validation of use cases, at minimum, shall address:
        1. Analytics Use Case functional and non- functional requirements 2. Analytics
        Use Case Personal Data Protection considerations, as prescribed in the Privacy
        Domain 3. Analytics Use Case return on investment as per the target set'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.3
      ref_id: BIA.3.2
      name: Data Science Team
      description: The Entity shall leverage a Data Analytics Team that would drive
        the implementation of the Business Intelligence and Analytics specifications.
        The Data Analytics Team typically include roles such as Data Scientists, Data
        Engineers, and Visualization Engineers.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia
      ref_id: BIA.4
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.4
      ref_id: BIA.4.1
      name: Business Intelligence and Analytics KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure the performance and effectiveness of its Analytics and AI portfolio.
        KPIs shall include, at minimum, the following: 1. Number of use cases defined
        2. Number of use cases piloted 3. Number of use cases implemented and scaled
        4. Total ROI value generated from the implemented use cases 5. Training and
        awareness sessions delivered.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia
      ref_id: BIA.5
      name: Artifacts
      description: As part of the Artifacts control, the Entity shall document in
        a register its BI and Analytics Use Cases
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:bia.5
      ref_id: BIA.5.1
      name: Business Intelligence and Analytics Register
      description: The Entity shall document in a register its BI and Analytics Use
        Cases, final review of outcomes delivered as a result of each implementation
        and related process documentation whereby read access is granted to all Entity
        stakeholders.
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr
      assessable: false
      depth: 1
      ref_id: DVR
      name: Data Value Realization
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr
      ref_id: DVR.1
      name: Plan
      description: As part of the Plan control, the Entity shall identify and document
        Data Value Realization Use Cases and create a Data Value Realization Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.1
      ref_id: DVR.1.1
      name: Data Value Realization Use Cases
      description: "The Entity shall identify, and document Data Value Realization\
        \ Use Cases. The Data Value Realization Use Cases shall include, at minimum,\
        \ the following: 1. Data Revenue Generation Use Cases - Data or Data Products\
        \ to generate revenue from, as defined in the Data Revenue Framework Regulation.\
        \ Data or Data Products are the outputs resulting from transforming data for\
        \ added value by performing additional data collection, enrichment, preparation,\
        \ analysis, or presentation 2. Cost Saving Use Cases \u2013 Data-driven use\
        \ cases that will contribute directly or indirectly to reducing costs and\
        \ achieving efficiencies by leveraging data to improve organizational operational\
        \ performance, productivity, and products and services. For each Data Value\
        \ Realization Use Case the Entity shall estimate and document the projected\
        \ Payback period and Return on Investment (ROI)."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.1
      ref_id: DVR.1.2
      name: Data Value Realization Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Data Value\
        \ Realization Plan to realize its data revenue generation potential and drive\
        \ data-related cost optimization initiatives. The plan shall include, at minimum,\
        \ the following: 1. Roadmap with the activities and key milestones for the\
        \ implementation of Data"
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr
      ref_id: DVR.2
      name: Data Revenue Generation Process
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2
      ref_id: DVR.2.1
      name: Pricing Scheme Definition
      description: The Entity shall, for each Data or Data Product expecting to generate
        revenue from, select and document an appropriate Pricing Scheme Model based
        on the scenarios outlined in the Data Revenue Framework Regulation.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2
      ref_id: DVR.2.2
      name: Data or Data Product Price Calculation
      description: 'The Entity shall, for each Data or Data Product expecting to generate
        revenue from, calculate and document the Total Cost as defined by the Data
        Revenue Framework Regulation. The total cost shall include, at minimum, the
        following: 1. Data Collection Cost - Cost incurred for collecting, cleansing,
        and curating data 2. Data Development Cost - Cost incurred for developing
        analytical models, data visualizations and other value-added services provided
        on top of collected data.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2
      ref_id: DVR.2.3
      name: Charging Model Adoption
      description: 'The Entity shall for each Data or Data Product that it is expecting
        to generate revenue from, define and document the adopted Charging Model.
        The Entity shall choose, at minimum, from the following Charging Models defined
        in the Data Revenue Framework Regulation: 1. Subscription Model 2. Consumption-Based
        Model 3. Freemium / Premium Model 4. One-Time Fee Model.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.2
      ref_id: DVR.2.4
      name: Revenue Generation Request Submission
      description: 'The Entity shall for each Data or Data Product that it is expecting
        to generate revenue from, submit a revenue generation request to the National
        Data Management Office. The request shall include, at minimum, the following:
        1. Description of Data or Data Product 2. Pricing Scheme Documentation 3.
        Proposed Charging Model 4. Proposed Final Unit Price 5. Justification if the
        Final Unit Price does not follow the Cost Recovery Pricing Scheme.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr
      ref_id: DVR.3
      name: Monitoring and Maintenance
      description: As part of the Monitoring and Maintenance control, the Entity shall
        actively monitor and maintain implemented Data Value Realization Use Cases
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.3
      ref_id: DVR.3.1
      name: Data Value Realization Use Cases Monitoring and Maintenance
      description: '"The Entity shall actively monitor and maintain implemented Data
        Value Realization Use Cases. The monitoring and maintenance shall include,
        at minimum, the following: 1. Measuring and validating KPIs (ROI and Payback
        Period) against projected values in the Data Value Realization Plan 2. Developing
        Change Request documents to accommodate change requirements from end users
        3. Reporting defects or malfunctions in the use case implemented.'
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr
      ref_id: DVR.4
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dvr.4
      ref_id: DVR.4.1
      name: Data Value Realization KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure the Entity''s Data Value Realization activities. KPIs shall include,
        at minimum, the following: 1. Number of Data Products developed 2. Number
        of Data or Data Products revenue generation requests raised to NDMO 3. Number
        of Data Products that generated revenue 4. Total revenue generated from offering
        Data or Data Products 5. Total cost saved from implemented Cost Saving Use
        Cases 6. Data Value Realization Use Case Payback period 7. Data Value Realization
        Use Case Return on Investment (ROI).'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od
      assessable: false
      depth: 1
      ref_id: OD
      name: Open Data
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od
      ref_id: OD.1
      name: Plan
      description: As part of the Plan control, the Entity shall develop an Open Data
        Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.1
      ref_id: OD.1.1
      name: Open Data Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create an Open Data\
        \ Plan to identify and coordinate the publishing of its Open Datasets. The\
        \ plan shall include, at minimum, the following: 1. Roadmap with the activities\
        \ and key milestones for the implementation of Open Data initiatives. The\
        \ activities shall, at minimum, incorporate what is needed to achieve the\
        \ specifications in this domain 2. Assignment of the required resources and\
        \ budget to manage the implementation of Open Data initiatives."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od
      ref_id: OD.2
      name: Training and Awareness
      description: As part of the Training and Awareness control, the Entity shall
        plan awareness campaigns to promote the usage and benefits of Open Data
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.2
      ref_id: OD.2.1
      name: Open Data Awareness
      description: 'The Entity shall plan awareness campaigns to ensure potential
        users are aware of the existence, nature, and quality of the Open Data offered
        by the Entity. The awareness plan shall include, at minimum, the following:
        1. Usage of Open Data and its various positive social and economic benefits
        2. Promoting the Entity Open Data and related activities'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od
      ref_id: OD.3
      name: Data Lifecycle Management
      description: As part of the Data Lifecycle Management control, the Entity shall
        identify, publish and maintain its Open Datasets
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3
      ref_id: OD.3.1
      name: Open Data Processes
      description: 'The Entity shall, in alignment to the National Data Management
        Office''s Open Data Regulation, develop and document processes required across
        the lifecycle of Open Data, including, at minimum, the following: 1. Processes
        to identify public datasets to be published the Entity 2. Processes to ensure
        that datasets are published and maintained to their appropriate format, timeliness,
        comprehensiveness, and overall high quality and ensure the exclusion of any
        restricted data 3. Processes for gathering feedback, analyzing performance
        at the Entity level, and improving the overall Open Data national impact.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3
      ref_id: OD.3.2
      name: Open Data Identification
      description: 'The Entity shall, as part of the identification process: 1. Identify
        and document all data classified as ''public'' and prioritize each dataset
        identified as Open Data 2. Perform a valuation of the identified dataset to
        drive decision making on whether it should be published as open data or not
        3. Assess whether some combination of any publicly available data and the
        data intended to be published could allow for the unauthorized disclosure
        of personal information or create any other security or privacy risk or threat'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3
      ref_id: OD.3.3
      name: Open Data Publishing
      description: The Entity shall publish datasets identified under the KSA Open
        Data License, as referred to in the National Data Management Office's Open
        Data Regulation
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3
      ref_id: OD.3.4
      name: Open Data Metadata
      description: The Entity shall identify and document the metadata necessary within
        the Open Dataset to easily identify, describe and search for it once published
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3
      ref_id: OD.3.5
      name: Open Data Format
      description: 'The Entity shall use standardized formats when publishing its
        datasets that are, at minimum, in machine-readable form. Common formats that
        meet this standard include, but may not be limited to, the following: 1. CSV
        - Comma Separated Values 2. JSON - JavaScript Object Notation 3. XML - eXtensible
        Markup Language 4. RDF - Resource Description Framework. The Entity shall
        also accompany datasets with documentation containing instructions on how
        to use them in relation to its published format'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.3
      ref_id: OD.3.6
      name: Open Data Maintenance
      description: 'The Entity shall, as part of the maintenance process: 1. Regularly
        update and document changes to its published Open Datasets and associated
        metadata whenever changes occur 2. Perform continuous review of the published
        Open Datasets to ensure they meet defined regulatory requirements Maintain
        data traceability by documenting data provenance and maintaining versioning
        history of the dataset'
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od
      ref_id: OD.4
      name: Performance Management
      description: As part of the Performance Management control, the Entity shall
        establish Key Performance indicators (KPIs) to measure the progress of the
        Open Data Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.4
      ref_id: OD.4.1
      name: Open Data KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure the progress of the Open Data Plan and gather statistics on the published
        Open Datasets. KPIs shall include, at minimum, the following: 1. Number of
        downloads per published Open Dataset 2. Number of identified and prioritized
        Open Datasets 3. Number of identified Open Datasets that have been published
        4. Number of updates performed on published Open Datasets.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od
      ref_id: OD.5
      name: Artifacts
      description: As part of the Artifacts control, the Entity document in a register
        the list of all Open Datasets
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:od.5
      ref_id: OD.5.1
      name: Open Data Register
      description: The Entity shall document in a register the list of all its identified
        Open Datasets combined with a log of open data activities conducted and decisions
        taken during the Data Lifecycle Management process
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi
      assessable: false
      depth: 1
      ref_id: FOI
      name: Freedom of Information
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi
      ref_id: FOI.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.1
      ref_id: FOI.1.1
      name: FOI Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Freedom of\
        \ Information Plan to address both strategic and operational requirements\
        \ of the National Data Management Office's Freedom of Information Regulations.\
        \ The plan shall include, at minimum, the following: 1. Roadmap with the activities\
        \ and key milestones for achieving and maintaining the Entity's compliance\
        \ with the National Data Management Office's Freedom of Information Regulations.\
        \ The activities shall, at minimum, incorporate what is needed to achieve\
        \ the specifications in this domain 2. Assignment of the required resources\
        \ and budget to achieve and maintain the Entity's compliance with the National\
        \ Data Management Office's Freedom of Information Regulations."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi
      ref_id: FOI.2
      name: Training and Awareness
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.2
      ref_id: FOI.2.1
      name: FOI Awareness
      description: 'The Entity shall launch awareness campaigns to promote and enhance
        the culture of transparency and to raise awareness of the National Data Management
        Office''s Freedom of Information Regulations and right to access Public Information.
        The awareness campaigns shall include, at minimum, the following: 1. Raising
        awareness across the employees involved in the processing of FOI Access Requests
        to understand the main obligations and requirements of National Data Management
        Office''s Freedom of Information Regulations 2. Raising awareness of the Freedom
        of Information Principles and their applicability on Saudi citizens'' rights.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi
      ref_id: FOI.3
      name: Data Lifecycle Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3
      ref_id: FOI.3.1
      name: FOI Request Process Design
      description: The Entity shall design and document a standardized Request for
        Information Process and develop the procedures to manage, process and document
        the requests to access Public Information according to in the National Data
        Management Office Freedom of Information Regulations.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3
      ref_id: FOI.3.2
      name: FOI Request Process Implementation
      description: "The Entity shall establish and follow a clear process to manage\
        \ the requests to access Public Information according to the conditions and\
        \ requirements defined in the National Data Management Office's Freedom of\
        \ Information Regulation. As part of the process the Entity shall make one\
        \ of the following decisions after receiving the request for access to Public\
        \ Information within the period defined in the National Data Management Office's\
        \ Freedom of Information Regulations: 1. Grant the access to Public Information\
        \ 2. Deny the request to access Public Information 3. Extend the time required\
        \ to provide a response to the Requestor 4. Notify the Requestor if the required\
        \ information is available on the Entity\u2019s website or is not within its\
        \ competence."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3
      ref_id: FOI.3.3
      name: Public Entity Publication
      description: "The Entity, under the National Data Management Office's Freedom\
        \ of Information Regulation, shall publish on their official Government websites\
        \ or its affiliate's websites, at minimum, the following information: 1. Laws,\
        \ regulations, instructions and regulatory decisions applicable to the Entity\
        \ 2. Entity's services provided and description detailing how to obtain access\
        \ to those services 3. Entity's organizational structure including Entity's\
        \ roles and responsibilities 4. Entity's job vacancy information, except information\
        \ of security or military job vacancies as determined by security or military\
        \ regulatory authorities or KSA Regulations 5. Entity's annual key strategic\
        \ and operational reports including the Entity's financial statement 6. Entity's\
        \ general statistics and updates on its activities including, at minimum,\
        \ the following: 6a. Number of the Entity's employees 6b. Year of the Entity's\
        \ establishment 6c. Number of the Entity's services provided in the last year\
        \ 6d. Up-to-date Entity's activities' descriptions 7. Contact details to persons\
        \ with valid licenses granted by the Entity including, at minimum, the following:\
        \ 7a. Names of the persons 7b. Postal addresses of the person 7c. E-mail addresses\
        \ of the persons 8. Information on projects offered or awarded by the Entity\
        \ as prescribed by the Freedom of Information Regulations in respect of a\
        \ risk that may affect people\u2019 life, health or property. The information\
        \ shall include, at minimum, the following: 8a. Names of recipients 8b. Execution\
        \ period"
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3
      ref_id: FOI.3.4
      name: Access Request Forms
      description: 'The Entity shall prepare request forms for access to Public Information
        - whether paper or electronic - specifying the required information to be
        provided by the Requestor. The required information shall include, at minimum,
        the following: 1. Information about the Requestor including name, address,
        national ID 2. Description of Public Information being requested 3. Purpose
        behind the request for access to public information 4. Legal basis for the
        request 5. Notice delivery method to the requestor (e-mail, national address)
        6. Date of the request.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3
      ref_id: FOI.3.5
      name: Information Fees Determination
      description: The Entity shall, for each granted Public Information Access Request,
        calculate and document a processing fee by adopting a Pricing Scheme as defined
        in the National Data Management Office's Data Value Realization Regulation.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.3
      ref_id: FOI.3.6
      name: Compliance monitoring
      description: The Entity shall conduct internal audits to monitor compliance
        with the National Data Management Office's Freedom of Information Regulations
        and document its findings in a report submitted to the Open Data and Information
        Access Officer. In cases of non-compliance, corrective actions should be taken
        with a notification to the Regulatory Authority and the National Data Management
        Office and documented within the audit findings report. Refer to the National
        Data Management Office's Freedom of Information Regulations for more detailed
        requirements.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi
      ref_id: FOI.4
      name: Artifacts
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:foi.4
      ref_id: FOI.4.1
      name: FOI Register
      description: 'The Entity shall document in a register compliance records as
        required by the National Data Management Office''s Freedom of Information
        Regulations. The register shall include, at minimum, the following: 1. Information
        on the current Open Data and Information Access Officer 2. Public Information
        Access Requests Records 3. Public Entity Publication 4. Any other records,
        including the manner and format, that is required by the National Data Management
        Office''s Freedom of Information Regulation. Refer to the National Data Management
        Office''s Freedom of Information Regulations for more detailed requirements.'
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc
      assessable: false
      depth: 1
      ref_id: DC
      name: Data Classification
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc
      ref_id: DC.1
      name: Plan
      description: As part of the Plan control, the Entity shall develop a Data Classification
        Plan and prioritize its datasets and artifacts
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.1
      ref_id: DC.1.1
      name: Data Classification Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Data Classification\
        \ Plan to manage and orchestrate its Data Classification activities. The plan\
        \ shall include, at minimum, the following: 1. Roadmap with the activities\
        \ and key milestones for the classification of Entity's data. The activities\
        \ shall, at minimum, incorporate what is needed to achieve the specifications\
        \ in this domain 2. Assignment of the required resources and budget to manage\
        \ the classification of Entity's data."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.1
      ref_id: DC.1.2
      name: Data Classification Prioritization
      description: The Entity shall prioritize the Entity's datasets and artifacts
        to be classified. The result of the prioritization shall be a list of ranked
        datasets and artifacts to be followed when establishing an order of the Entity's
        Data Classification.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc
      ref_id: DC.2
      name: Classification Controls
      description: As part of the Classification Controls, the Entity shall assign
        data handling and protection controls to datasets and artifacts
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.2
      ref_id: DC.2.1
      name: Security Controls
      description: The Entity shall assign data handling and protection controls to
        datasets and artifacts based on their classification to ensure secure handling,
        processing, sharing and disposal of data by following the National Cybersecurity
        Authority regulations.
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc
      ref_id: DC.3
      name: Classification Process
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3
      ref_id: DC.3.1
      name: Data Identification
      description: The Entity shall identify and inventory all datasets and artifacts
        owned by the Entity as part of the Data Classification Implementation process
        detailed in the National Data Management Office's Data Classification Regulation.
        If the Entity had already implemented its Data Catalog automated tool, the
        Entity shall use it to inventory all its datasets and artifacts.
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3
      ref_id: DC.3.2
      name: Impact Assessment
      description: 'The Entity shall conduct an impact assessment of the potential
        damages due to an unauthorized access to all its identified datasets and artifacts.
        The impact assessment shall include the following steps: 1. Identification
        of the potential categories impacted amongst national interest, organizations,
        individuals and environment 2. Selection of the level of impact of potential
        damage for the identified categories amongst ''High'', ''Medium'', ''Low''
        and ''None/Insignificant'' 3. Assignment of classification levels to datasets
        and artifacts based on the selected impact level: 3a. If the impact level
        was assessed as ''High'', then datasets and artifacts shall be classified
        as ''Top Secret'' 3b. If the impact level was assessed as ''Medium'', then
        datasets and artifacts shall be classified as ''Secret'''
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3
      ref_id: DC.3.3
      name: Assessment for Low Impact Data
      description: 'The Entity shall assess the possibility to Classify ''Low'' impact
        data as ''Public'' instead of ''Confidential''. The assessment shall include
        the following: 1. Evaluation if the disclosure of ''Low'' impact data is in
        breach of any existing regulation 2. Identify the potential benefits of opening
        such datasets and artifacts and consider whether those would outweigh the
        negative impacts If release of ''Low'' impact data is not in breach of any
        existing regulation and if benefits of release outweigh the negative impact,
        the Entity shall classify ''Low'' impact data as ''Public''. The assessment
        shall be conducted as part of the Data Classification Implementation process
        by following the National Data Management Office''s Data Classification Regulation.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3
      ref_id: DC.3.4
      name: Data Classification Review
      description: The Entity shall review all its classified datasets and artifacts
        to ensure that the classification levels assigned to them are the most appropriate
        ones as part of the Data Classification Implementation process by following
        National Data Management Office's Data Classification Regulation.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.3
      ref_id: DC.3.5
      name: Data Classification Metadata
      description: The Entity shall publish classification levels assigned to its
        datasets and artifacts as the metadata registered within the Data Catalog
        automated tool. The population of the metadata shall be executed according
        to the
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc
      ref_id: DC.4
      name: Performance Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.4
      ref_id: DC.4.1
      name: Data Classificatio n KPIs
      description: 'The Entity shall establish key performance indicators (KPIs) to
        measure the progress on the classification plan and the implementation of
        the Entity''s Data Classification process. KPIs shall include, at minimum,
        the following: 1. % of datasets and artifacts classified 2. % of datasets
        and artifacts classified by a classification level 3. % of ''Low'' impact
        data classified as ''Confidential'' 4. % of classified datasets and artifacts
        that has been reviewed and approved.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc
      ref_id: DC.5
      name: Artifacts
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dc.5
      ref_id: DC.5.1
      name: Data Register
      description: 'The Entity shall document in a register the list of all its identified
        datasets and artifacts combined with log of Data Classification activities
        conducted during Data Classification Implementation process. The register
        shall include, at minimum, the following: 1. List of the Entity''s identified
        datasets and artifacts 2. Classification levels assigned to identified datasets
        and artifacts 3. Dates of assignment of classification levels to identified
        datasets and artifacts 4. Classification duration applied to identified datasets
        and artifacts 5. Classification levels approved during review 6. Dates of
        classification levels'' review.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp
      assessable: false
      depth: 1
      ref_id: PDP
      name: Personal Data Protection
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp
      ref_id: PDP.1
      name: Plan
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.1
      ref_id: PDP.1.1
      name: Personal Data Protection Initial Assessment
      description: 'The Entity shall perform an initial Personal Data Protection Assessment
        to evaluate the current state of the Personal Data Protection environment.
        The assessment shall include, at minimum, the following: 1. Identification
        of types of personal data being collected 2. Location and method of storage
        of personal data 3. Current processing and uses of the personal data 4. Privacy
        challenges to meet compliance with the National Data Management Office''s
        Personal Data Protection Regulations.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.1
      ref_id: PDP.1.2
      name: Personal Data Protection Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Personal Data\
        \ Protection Plan to address both the strategic and operational privacy requirements\
        \ of the National Data Management Office's Personal Data Protection Regulations.\
        \ The plan shall include, at minimum, the following: 1. Roadmap with the activities\
        \ and key milestones for achieving and maintaining the Entity's compliance\
        \ with the National Data Management Office's Personal Data Protection Regulations.\
        \ The activities shall,"
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp
      ref_id: PDP.2
      name: Training and Awareness
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.2
      ref_id: PDP.2.1
      name: Personal Data Protection Training
      description: 'The Entity shall conduct the Personal Data Protection training
        for every employee to promote a Personal Data Protection-centric culture in
        accordance with the Entity-specific and national privacy regulations. The
        training shall include, at minimum, the following: 1. Importance of Personal
        Data Protection and the Impacts and consequences to the Entity and / or Data
        Subject 2. Definition of Personal Data 3. Data Subject Data Rights 4. Entity
        and Data Subject Responsibilities 5. Notifications as for when the Entity
        and / or Data Subject should be notified and how to handle inquiries about
        personal data collection, processing and sharing.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp
      ref_id: PDP.3
      name: Data Breach
      description: As part of the Data Breach control, the Entity shall establish
        a Data Breach Process
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.3
      ref_id: PDP.3.1
      name: Data Breach Notification
      description: The Entity's Data Controller or Data Processor handling personal
        data shall, in the event it is determined that personal data has been compromised,
        notify the Regulatory Authority within the allotted timeframe specified within
        the National Data Management Office's Personal Data Protection Regulations.
        The allotted timeframe for notification is 72 hours. Refer to the National
        Data Management Office's Personal Data Protection Regulations for more detailed
        requirements.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.3
      ref_id: PDP.3.2
      name: Data Breach Management Process
      description: 'The Entity shall develop and document breach management procedures
        to directly manage and address the privacy violations and to set the functions
        and responsibilities for the affected work team, including cases in which
        the Regulatory Authority is notified once a breach has been identified. The
        breach management process shall include, at minimum, the following: 1. Conducting
        an incident review by the Data Controller with the Regulatory Authority 2.
        Formulating an immediate response to the incident by the Data Controller and
        / or Data Processor 3. Implementing the permanent corrective actions when
        issued by the Regulatory Authority 4. Conducting testing of the implemented
        corrective actions to validate personal data protection solution(s).'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp
      ref_id: PDP.4
      name: Data Lifecycle Management
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4
      ref_id: PDP.4.1
      name: Privacy Notice and Consent Management
      description: 'The Entity shall establish, at minimum, the following Privacy
        Notice and Consent Management components: 1. Define and document its processes
        for providing Data Subjects with notice and requesting consent at all points
        along the data lifecycle where personal data is collected as prescribed by
        the National Data Management Office''s Personal Data Protection Regulations
        2. The Entity shall provide all possible options to Data Subject and his (implicit
        / explicit) approval shall be obtained regarding the collection, use or disclosure
        of personal data 3. The Entity shall document and make available a Privacy
        Notice for Data Subjects to review before or at the time the Entity requests
        permission to collect personal data 4. In the event the Data Controller maintains
        a presence on internet, a hyperlink to privacy notice must be maintained.
        The notice must be made available to the National Data Management Office for
        inspection upon request. Refer to the NMDO Personal Data Protection Regulations
        for more detailed requirements.'
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4
      ref_id: PDP.4.2
      name: Data Subject Rights
      description: The Entity shall establish and document its Data Rights Management
        processes to support the rights of Data Subjects, in accordance with the National
        Data Management Office's Personal
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4
      ref_id: PDP.4.3
      name: Personal Data Protection Risk Assessment s
      description: 'The Entity shall conduct yearly risk assessments of the operation
        and use of its information systems containing personal data, including the
        collection and processing of personal data, and the storing and transmittal
        of personal data by each system - whether automated or manual. Risk assessment
        findings shall, at minimum, be: 1c. Documented 1d. Analyzed for impact and
        likelihood of occurrence 1e. Evaluated against current regulations obligations
        and criticality to resolve.'
      implementation_groups:
      - P3
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.4
      ref_id: PDP.4.4
      name: Compliance Monitoring and Audit
      description: The Entity shall conduct internal audits to monitor compliance
        with privacy regulations and document its findings in a report presented to
        the Data Protection Officer. In cases of non- compliance, corrective actions
        should be taken with a notification to the Regulatory Authority and the National
        Data Management Office and documented within the audit findings report. Refer
        to the National Data Management Office's Personal Data Protection Regulations
        for more detailed requirements.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp
      ref_id: PDP.5
      name: Artifacts
      description: As part of the Artefacts control, the Entity shall document in
        a register its compliance records The fundamental concepts and properties
        of the Entity's systems to enable the purpose, context and guidance for making
        security design decisions Minimum Security provisions to include as components
        into a system during its development, testing and implementation Identity
        of users and information systems requesting to have access to the Entity's
        information assets Obligations to ensure Information Security requirements
        are reflected in the Entity's engagement of third-party suppliers Documented
        and maintained inventory of information assets containing critical Entity
        data Operational duties by the Entity and its personnel to monitor, assess
        and protect the Entity's information assets A framework for preserving and
        maintaining the confidentiality, integrity and availability of data in the
        event of an incident (ISO 27001)
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:pdp.5
      ref_id: PDP.5.1
      name: Personal Data Protection Register
      description: The Entity shall document in a register compliance records for
        a reasonable period of time, but not less than 24 months, and shall make those
        records available when requested by the National Data Management Office as
        defined in the National Data Management Office's Personal Data Protection
        Regulations. The register shall include, at minimum, a record of any collection
        and/or processing of any personal data.
      implementation_groups:
      - P2
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:ds
      assessable: false
      depth: 1
      ref_id: DS
      name: Data Security and Protection
      description: Per the NDMO standard, the Data Security and Protection domain
        is governed by the National Cybersecurity Authority (NCA). Refer to the applicable
        NCA controls (e.g. the Essential Cybersecurity Controls). No NDMO specifications
        are enumerated for this domain.
