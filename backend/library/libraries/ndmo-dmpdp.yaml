      name: Plan
      description: As part of the Plan control, the Entity shall develop a Data Catalog
        Plan and the target metadata architecture
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.1
      ref_id: MCM.1.1
      name: Data Catalog Plan
      description: "Based on the Entity\u2019s defined Data Management and Personal\
        \ Data Protection Strategy and Plan, the Entity shall create a Data Catalog\
        \ Plan to manage the implementation of the Entity\u2019s Data Catalog. The\
        \ plan shall include, at minimum, the following: 1. Roadmap with the activities\
        \ and key milestones for the implementation of the Data Catalog automated\
        \ tool. The activities shall, at minimum, incorporate what is needed to achieve\
        \ the specifications in this domain 2. Assignment of the required resources\
        \ and budget to manage the implementation of the Data Catalog automated tool."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.1
      ref_id: MCM.1.2
      name: Data Sources Prioritization
      description: The Entity shall prioritize data sources to be included in the
        Data Catalog, along with the definition of their business and technical metadata
        (or metadata structure)..
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.1
      ref_id: MCM.1.3
      name: Metadata Architecture
      description: 'The Entity shall develop and document a target metadata architecture.
        The target metadata architecture shall include (but not limited to), the following:
        1. Metadata sources - the Entity''s data sources that are sources of metadata
        for the Data Catalog 2. Metadata repository - the Data Catalog as the Entity''s
        central metadata repository 3. Metadata flows - a definition of metadata flows
        between the metadata sources and the metadata repository 4. Metadata model
        - a metadata model used by the Entity''s Data Catalog.'
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:mcm.2
      assessable: false
