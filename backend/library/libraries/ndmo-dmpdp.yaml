      ref_id: DG.4.11
      name: Legal Advisor
      description: "The Entity shall identify and appoint a Legal Advisor to support\
        \ in data related regulatory matters. The Legal Advisor's responsibilities\
        \ shall be highlighted in a job description and aligned with the responsibilities\
        \ defined in the \u201COrganizational Manual\u201D published by NDMO."
      implementation_groups:
      - P1
    - urn: urn:intuitem:risk:req_node:ndmo-dmpdp:dg.5
