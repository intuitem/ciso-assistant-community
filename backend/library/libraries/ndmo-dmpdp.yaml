      parent_urn: urn:intuitem:risk:req_node:ndmo-dmpdp:rmd.2
      ref_id: RMD.2.5
      name: RMD Data Hub Technical Requirements
      description: The Entity shall define and document the technical requirements
        for its Reference and Master Data Hub platform based on the defined target
        RDM Information Architecture. The
      implementation_groups:
