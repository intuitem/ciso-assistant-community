      description: "La note de cadrage devra contenir un certain nombre d'informations sur un format d\xE9fini :\n - Contexte et enjeux du projet HospiConnect (incluant la partie Consultation Mon espace sant\xE9)\n - Objectifs op\xE9rationnels du projet, indicateurs de suivi et cibles \xE0 atteindre\n - Organisation du projet : gouvernance (pilotage interne, implication des directions) et \xE9quipe projet, modalit\xE9 de coordination et communication\n - Calendrier pr\xE9visionnel : phases et jalons cl\xE9s\n - Compte-rendu de la / les pr\xE9c\xE9dentes r\xE9unions de cadrage\n - Suivi et \xE9valuation : modalit\xE9 de suivi des indicateurs, outils de reporting\n - Communication aux professionnels de sant\xE9"
