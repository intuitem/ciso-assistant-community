      description: "La proc\xE9dure de mise \xE0 jour des comptes utilisateurs est d\xE9crite et op\xE9rationnelle (automatique ou manuelle), notamment pour la gestion des habilitations lors des arriv\xE9es, d\xE9parts et changement de services. Une revue manuelle ou automatique des comptes et des habilitations est effectu\xE9e au minimum chaque ann\xE9e."
