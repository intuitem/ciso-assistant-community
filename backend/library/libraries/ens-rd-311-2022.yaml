    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.10.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.10
      ref_id: op.exp.10.1
