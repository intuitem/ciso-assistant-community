      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.sw.1
      name: "Refuerzo R2 \u2013 Metodolog\xEDa de desarrollo seguro."
      translations:
        en:
          name: Reinforcement R2- Safe Development Methodology.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.sw.1.r2.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.sw.1:3
      ref_id: mp.sw.1.r2.1
      description: "Se aplicar\xE1 una metodolog\xEDa de desarrollo seguro reconocida\
        \ que:\na) Tendr\xE1 en consideraci\xF3n los aspectos de seguridad a lo largo\
        \ de todo el ciclo de vida.\nb) Incluir\xE1 normas de programaci\xF3n segura,\
        \ especialmente: control de asignaci\xF3n y liberaci\xF3n de memoria, desbordamiento\
        \ de memoria (overflow).\nc) Tratar\xE1 espec\xEDficamente los datos usados\
        \ en pruebas.\nd) Permitir\xE1 la inspecci\xF3n del c\xF3digo fuente."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: 'A recognized safe development methodology shall be applied
            which: a) It shall take into account security aspects throughout the life
            cycle. b) It shall include secure programming rules, in particular: control
            of allocation and release of memory, memory overflow. c) It shall specifically
            process data used in testing. d) It shall allow the inspection of the
            source code.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.sw.1:4
