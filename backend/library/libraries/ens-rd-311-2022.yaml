        \ la persecuci\xF3n de delitos. En la determinaci\xF3n de la composici\xF3\
        n y detalle de estas evidencias, se recurrir\xE1 a asesoramiento legal especializado."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Evidence that may be settled in a jurisdictional area shall
            be recorded, especially where the incident may involve disciplinary action
            against internal staff, external suppliers or prosecution of crimes. In
            determining the composition and detail of this evidence, specialized legal
            advice will be used.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.9.3
