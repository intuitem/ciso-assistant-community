      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.info.3:4
      ref_id: mp.info.3.r3.1
      description: "Cuando proceda, se garantizar\xE1 la verificaci\xF3n y validaci\xF3\
        n de la firma electr\xF3nica durante el tiempo requerido por la actividad\
        \ administrativa que aqu\xE9lla soporte, sin perjuicio de que se pueda ampliar\
        \ este per\xEDodo de acuerdo con lo que establezca la Pol\xEDtica de Firma\
        \ Electr\xF3nica y de Certificados que sea de aplicaci\xF3n. Para tal fin\
        \ se adjuntar\xE1 a la firma, o se referenciar\xE1, toda la informaci\xF3\
        n pertinente para su verificaci\xF3n y validaci\xF3n, incluyendo certificados\
        \ o datos de verificaci\xF3n y validaci\xF3n."
      implementation_groups:
      - MEDIO
      - ALTO
      - I
