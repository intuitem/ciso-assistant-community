      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-i
      ref_id: ANEXO I-3
      name: "Determinaci\xF3n del nivel de seguridad requerido en una dimensi\xF3\
        n de seguridad"
      translations:
        en:
          name: Determination of the level of security required in a security dimension
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-i-3:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-i-3
      description: "Una informaci\xF3n o un servicio pueden verse afectados en una\
        \ o m\xE1s de sus dimensiones de seguridad. Cada dimensi\xF3n de seguridad\
        \ afectada se adscribir\xE1 a uno de los siguientes niveles de seguridad:\
        \ BAJO, MEDIO o ALTO. Si una dimensi\xF3n de seguridad no se ve afectada,\
        \ no se adscribir\xE1 a ning\xFAn nivel."
      translations:
        en:
          description: 'Information or service may be affected in one or more of its
            security dimensions. Each security dimension concerned shall be assigned
            to one of the following levels of security: LOW, MEDIUM or HIGH. If a
            security dimension is not affected, it will not be attached to any level.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-i-3.a
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-i-3:1
      ref_id: ANEXO I-3.a
      description: "Nivel BAJO. Se aplicar\xE1 cuando las consecuencias de un incidente\
        \ de seguridad que afecte a alguna de las dimensiones de seguridad supongan\
        \ un perjuicio limitado sobre las funciones de la organizaci\xF3n, sobre sus\
        \ activos o sobre los individuos afectados."
      translations:
        en:
          description: LOW level. It shall apply where the consequences of a security
            incident affecting one of the security dimensions entail limited damage
            to the functions of the organization, its assets or the individuals concerned.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-i-3:1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-i-3:1
