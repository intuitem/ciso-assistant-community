      description: "Siempre que sea posible, la misma persona no aunar\xE1 funciones\
        \ de configuraci\xF3n y mantenimiento del sistema."
      implementation_groups:
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
