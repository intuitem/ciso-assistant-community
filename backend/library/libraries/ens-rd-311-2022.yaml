    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.info.3.r2.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.info.3:3
      ref_id: mp.info.3.r2.1
      description: "Se emplear\xE1n algoritmos y par\xE1metros autorizados por el\
        \ CCN o por un esquema nacional o europeo que resulte de aplicaci\xF3n.\n\n\
        El CCN determinar\xE1 los algoritmos criptogr\xE1ficos que hayan sido autorizados\
        \ nominalmente para su uso en el Esquema Nacional de Seguridad conforme a\
        \ la Instrucci\xF3n T\xE9cnica de Seguridad Criptolog\xEDa de empleo en el\
        \ ENS."
      implementation_groups:
      - MEDIO
      - ALTO
      - I
      - A
      translations:
        en:
          description: Algorithms and parameters authorized by the CCN or by a national
            or European scheme that is applicable shall be used. The CCN shall determine
            the cryptographic algorithms that have been nominally authorized for use
            in the National Security Framework in accordance with the Technical Security
            Instruction on Cryptology of use in the ENS.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.info.3:4
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.info.3
