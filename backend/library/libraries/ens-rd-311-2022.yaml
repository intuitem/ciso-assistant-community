        n de los sistemas de informaci\xF3n no se realizar\xE1n con datos reales.\
        \ En caso de que fuese necesario recurrir a datos reales se garantizar\xE1\
        \ el nivel de seguridad correspondiente."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Preferably, tests prior to the deployment or modification of
            information systems shall not be carried out with actual data. Where it
            is necessary to use actual data, the corresponding level of security shall
            be ensured.
