    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      ref_id: op.acc.3
      name: "Segregaci\xF3n de funciones y tareas"
      translations:
        en:
          name: Segregation of functions and tasks
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Application of the measure
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:1
      description: "\u2013 Dimensiones: (por confidencialidad, integridad, trazabilidad\
        \ y autenticidad).\n\u2013 Nivel BAJO: no aplica.\n\u2013 Nivel MEDIO: op.acc.3.\n\
        \u2013 Nivel ALTO: op.acc.3 + R1."
      translations:
        en:
          description: "Dimensions (by confidentiality, integrity, accountability\
            \ and\nauthenticity).\n\u2013 LOW level: N.A.\n\u2013 MEDIUM level: op.acc.3.\n\
            \u2013 HIGH level: op.acc.3 + R1."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3
      description: "El sistema de control de acceso se organizar\xE1 de forma que\
        \ se exija la concurrencia de dos o m\xE1s personas para realizar tareas cr\xED\
        ticas, anulando la posibilidad de que un solo individuo autorizado pueda abusar\
        \ de sus derechos para cometer alguna acci\xF3n il\xEDcita o no autorizada."
      translations:
        en:
          description: The access control system shall be organized in such a way
            as to require the participation of two or more persons to perform critical
            tasks, nullifying the possibility that a single authorized individual
            may abuse his rights to commit any unlawful or unauthorized action.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3
