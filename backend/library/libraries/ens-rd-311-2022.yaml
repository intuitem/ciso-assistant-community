      ref_id: mp.sw.1.r3.1
      description: "Los siguientes elementos ser\xE1n parte integral del dise\xF1\
        o del sistema:\na) Los mecanismos de identificaci\xF3n y autenticaci\xF3n.\n\
        b) Los mecanismos de protecci\xF3n de la informaci\xF3n tratada.\nc) La generaci\xF3\
        n y tratamiento de pistas de auditor\xEDa."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: 'The following elements shall be an integral part of the system
            design:

            a) Identification and authentication mechanisms.

            b) Mechanisms for the protection of processed information.

            c) The generation and treatment of audit trails.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.sw.1:5
