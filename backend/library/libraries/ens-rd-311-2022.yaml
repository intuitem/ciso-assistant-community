      - D
      translations:
        en:
          description: 'Measures for:

            a) Prevent a recurrence of the incident.

            b) Include in user procedures the identification and way of dealing with
            the incident.

            c) Update, extend, improve or optimize incident resolution procedures.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.7:4
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.7
