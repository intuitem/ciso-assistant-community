      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Qualified certificates shall be used as an authentication mechanism,
            in physical support (card or similar) using algorithms, parameters and
            devices authorized by the CCN.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r4.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:4
      ref_id: op.acc.5.r4.2
      description: "El uso del certificado estar\xE1 protegido por un segundo factor,\
        \ del tipo PIN o biom\xE9trico."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The use of the certificate shall be protected by a second factor
            of the PIN type or biometric type
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r4.3
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:4
      ref_id: op.acc.5.r4.3
      description: "Las credenciales utilizadas deber\xE1n haber sido obtenidas tras\
        \ un registro previo presencial, o bien telem\xE1tico, usando certificado\
        \ electr\xF3nico cualificado."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The credentials used must have been obtained after prior in-person
            registration, or telematic, using qualified electronic certificate.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:5
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      name: "Refuerzo R5 \u2013 Registro."
      translations:
        en:
          name: Reinforcement R5-Registration.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r5.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:5
      ref_id: op.acc.5.r5.1
      description: "Se registrar\xE1n los accesos con \xE9xito y los fallidos."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Successful and failed accesses shall be recorded.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r5.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:5
      ref_id: op.acc.5.r5.2
      description: "Se informar\xE1 al usuario del \xFAltimo acceso efectuado con\
        \ su identidad."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The user shall be informed of the last access made with its
            identity.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:6
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      name: "Refuerzo R6 \u2013 Limitaci\xF3n de la ventana de acceso."
      translations:
        en:
          name: Reinforcement R6-Limitation of the access window.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r6.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:6
      ref_id: op.acc.5.r6.1
      description: "Se definir\xE1n aquellos puntos en los que el sistema requerir\xE1\
        \ una renovaci\xF3n de la autenticaci\xF3n del usuario, mediante identificaci\xF3\
        n singular, no bastando con la sesi\xF3n establecida."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Points where the system will require a renewal of user authentication
            by unique identification shall be defined, not enough with the established
            session.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:7
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      name: "Refuerzo R7 \u2013 Suspensi\xF3n por no utilizaci\xF3n."
      translations:
        en:
          name: Reinforcement R7-Suspension for non-use.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r7.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:7
      ref_id: op.acc.5.r7.1
      description: "Las credenciales se suspender\xE1n tras un periodo definido de\
        \ no utilizaci\xF3n."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be suspended after a defined period of non-use.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      ref_id: op.acc.6
      name: "Mecanismo de autenticaci\xF3n (usuarios de la organizaci\xF3n)"
      translations:
        en:
          name: Authentication mechanism (organization users)
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Application of the measure
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:1
      description: "\u2013 Dimensiones:  (por confidencialidad, integridad, trazabilidad\
        \ y autenticidad).\n\u2013 Nivel BAJO: op.acc.6 + [R1 o R2 o R3 o R4] + R8\
        \ + R9.\n\u2013 Nivel MEDIO: op.acc.6 + [R1 o R2 o R3 o R4] + R5 + R8 + R9.\n\
        \u2013 Nivel ALTO: op.acc.6 + [R1 o R2 o R3 o R4] + R5 + R6 + R7 + R8 + R9."
      translations:
        en:
          description: "Dimensions : (by confidentiality, integrity, accountability\
            \ and authenticity).\n\u2014 LOW level: op.acc.6 + [R1 or R2 or R3 or\
            \ R4] + R8 + R9.\n\u2014 MEDIUM level: op.acc.6 + [R1 or R2 or R3 or R4]\
            \ + R5 + R8 + R9.\n\u2014 HIGH level: op.acc.6 + [R1 or R2 or R3 or R4]\
            \ + R5 + R6 + R7 + R8 + R9."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6
      description: "Esta medida se refiere a personal del organismo, propio o contratado,\
        \ estable o circunstancial, que pueda tener acceso a informaci\xF3n contenida\
        \ en el sistema. Las gu\xEDas CCN-STIC desarrollar\xE1n los mecanismos y calidades\
        \ exigibles a cada tipo de factor de autenticaci\xF3n, en funci\xF3n de los\
        \ niveles de seguridad requeridos por el sistema de informaci\xF3n el que\
        \ se accede y los privilegios concedidos al usuario."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: This measure concerns staff of the body, own or contracted,
            stable or circumstantial, who may have access to information contained
            in the system. The CCN-STIC guides will develop the mechanisms and qualities
            required for each type of authentication factor, depending on the levels
            of security required by the information system that is accessed, and the
            privileges granted to the user.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.1
      description: "Antes de proporcionar las credenciales a los usuarios, estos deber\xE1\
        n conocer y aceptar la pol\xEDtica de seguridad del organismo en los aspectos\
        \ que les afecten."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: "Before providing credentials to users, users must know and\
            \ accept the organization\u2019s security policy in respect of matters\
            \ affecting them."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.2
      description: "Antes de activar el mecanismo de autenticaci\xF3n, el usuario\
        \ reconocer\xE1 que ha recibido las credenciales de acceso y que conoce y\
        \ acepta las obligaciones que implica su tenencia, en particular, el deber\
        \ de custodia diligente, la protecci\xF3n de su confidencialidad y el deber\
        \ de notificaci\xF3n inmediata en caso de p\xE9rdida."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Before activating the authentication mechanism, the user shall
            acknowledge that has received the access credentials and that knows and
            accepts the obligations involved in their possession, in particular the
            duty of diligent custody, the protection of its confidentiality and the
            duty of immediate notification in the event of loss.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.3
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.3
      description: "Las credenciales estar\xE1n bajo el control exclusivo del usuario\
        \ y se activar\xE1n una vez est\xE9n bajo su control efectivo."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be under the sole control of the user and
            shall be activated once they are under their effective control.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.4
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.4
      description: "Las credenciales se cambiar\xE1n con una periodicidad marcada\
        \ por la pol\xEDtica de seguridad de la organizaci\xF3n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: "Credentials shall be changed at intervals marked by the organization\u2019\
            s security policy."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.5
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.5
      description: "Las credenciales ser\xE1n inhabilitadas -pudiendo ser regeneradas,\
        \ en su caso-, cuando conste o se sospeche su p\xE9rdida, compromiso o revelaci\xF3\
        n a entidades (personas, equipos o procesos) no autorizadas."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be disabled, and may be regenerated if necessary,
            when there is evidence or suspicion of loss, commitment or disclosure
            to unauthorized entities (persons, equipment or processes).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.6
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.6
      description: "Las credenciales ser\xE1n inhabilitadas cuando el usuario que\
        \ autentican termina su relaci\xF3n con el sistema."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be disabled when the authenticating user
            ends their relationship with the system.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.7
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.7
      description: "Antes de autorizar el acceso, la informaci\xF3n presentada por\
        \ el sistema ser\xE1 la m\xEDnima imprescindible para que el usuario se autentique,\
        \ evitando todo aquello que pueda, directa o indirectamente, revelar informaci\xF3\
        n sobre el sistema o la cuenta, sus caracter\xEDsticas, su operaci\xF3n o\
        \ su estado. Las credenciales solamente se validar\xE1n cuando se tengan todos\
        \ los datos necesarios y, si se rechaza, no se informar\xE1 del motivo del\
        \ rechazo."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Before authorizing access, the information submitted by the
            system shall be the minimum necessary for the user to authenticate, avoiding
            anything that may, directly or indirectly, disclose information about
            the system or account, its characteristics, its operation or its status.
            Credentials will only be validated when all the necessary data is available
            and, if rejected, the reason for rejection will not be informed.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.8
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.8
      description: "El n\xFAmero de intentos permitidos ser\xE1 limitado, bloqueando\
        \ la oportunidad de acceso una vez superado tal n\xFAmero, y requiriendo una\
        \ intervenci\xF3n espec\xEDfica para reactivar la cuenta, que se describir\xE1\
        \ en la documentaci\xF3n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The number of attempts allowed shall be limited, blocking the
            access opportunity once this number is exceeded, and requiring a specific
            intervention to reactivate the account, which will be described in the
            documentation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.9
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      ref_id: op.acc.6.9
      description: "El sistema informar\xE1 al usuario de sus derechos u obligaciones\
        \ inmediatamente despu\xE9s de obtener el acceso."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The system shall inform the user of its rights or obligations
            immediately after obtaining access.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R1 \u2013 Contrase\xF1as."
      translations:
        en:
          name: Reinforcement R1-Passwords.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r1.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:1
      ref_id: op.acc.6.r1.1
      description: "Se emplear\xE1 una contrase\xF1a como mecanismo de autenticaci\xF3\
        n cuando el acceso se realiza desde zonas controladas y sin atravesar zonas\
        \ no controladas (v\xE9ase refuerzo R8)."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: A password shall be used as an authentication mechanism when
            access is made from controlled areas without crossing uncontrolled areas
            (see reinforcement R8).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r1.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:1
      ref_id: op.acc.6.r1.2
      description: "Se impondr\xE1n normas de complejidad m\xEDnima y robustez frente\
        \ a ataques de adivinaci\xF3n (ver gu\xEDas CCN-STIC)."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Standards of minimal complexity and robustness against divination
            attacks will be imposed (see CCN-STIC guides).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:2
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R2 \u2013 Contrase\xF1a + otro factor de autenticaci\xF3n."
      translations:
        en:
          name: Reinforcement R2-Password + another authentication factor.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r2.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:2
      ref_id: op.acc.6.r2.1
      description: "Se requerir\xE1 un segundo factor tal como \xABalgo que se tiene\xBB\
        , es decir, un dispositivo, una contrase\xF1a de un solo uso (OTP, en ingl\xE9\
        s) como complemento a la contrase\xF1a de usuario, o \xABalgo que se es\xBB\
        ."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: "A second factor such as \u201Csomething you have\u201D is\
            \ required, i.e. a device, a one-time password (OTP) as a complement to\
            \ the user password, or \u201Csomething that is\u201D."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:3
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R3 \u2013 Certificados."
      translations:
        en:
          name: Reinforcement R3-Certified.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r3.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:3
      ref_id: op.acc.6.r3.1
      description: "Se emplear\xE1n certificados cualificados como mecanismo de autenticaci\xF3\
        n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Qualified certificates shall be used as an authentication mechanism.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r3.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:3
      ref_id: op.acc.6.r3.2
      description: "El uso del certificado estar\xE1 protegido por un segundo factor,\
        \ del tipo PIN o biom\xE9trico."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The use of the certificate shall be protected by a second factor,
            of the PIN type or biometric type.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:4
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R4 \u2013 Certificados en dispositivo f\xEDsico."
      translations:
        en:
          name: Reinforcement R4-Certified physical device.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r4.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:4
      ref_id: op.acc.6.r4.1
      description: "Se emplear\xE1n certificados cualificados como mecanismo de autenticaci\xF3\
        n, en soporte f\xEDsico (tarjeta o similar) usando algoritmos, par\xE1metros\
        \ y dispositivos autorizados por el CCN."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Qualified certificates shall be used as an authentication mechanism,
            in physical support (card or similar) using algorithms, parameters and
            devices authorized by the CCN.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r4.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:4
      ref_id: op.acc.6.r4.2
      description: "El uso del certificado estar\xE1 protegido por un segundo factor,\
        \ del tipo PIN o biom\xE9trico."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The use of the certificate shall be protected by a second factor
            of the PIN type or biometric type.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:5
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R5 \u2013 Registro."
      translations:
        en:
          name: Reinforcement R5-Registration.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r5.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:5
      ref_id: op.acc.6.r5.1
      description: "Se registrar\xE1n los accesos con \xE9xito y los fallidos."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Successful and failed accesses shall be recorded.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r5.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:5
      ref_id: op.acc.6.r5.2
      description: "Se informar\xE1 al usuario del \xFAltimo acceso efectuado con\
        \ su identidad."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The user shall be informed of the last access made with his
            identity.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:6
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R6 \u2013 Limitaci\xF3n de la ventana de acceso."
      translations:
        en:
          name: Reinforcement R6-Limitation of the access window.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r6.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:6
      ref_id: op.acc.6.r6.1
      description: "Se definir\xE1n aquellos puntos en los que el sistema requerir\xE1\
        \ una renovaci\xF3n de la autenticaci\xF3n del usuario, mediante identificaci\xF3\
        n singular, no bastando con la sesi\xF3n establecida."
      implementation_groups:
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Points where the system will require a renewal of user authentication
            by unique identification shall be defined, not enough with the established
            session.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:7
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R7 \u2013 Suspensi\xF3n por no utilizaci\xF3n."
      translations:
        en:
          name: Reinforcement R7-Suspension for non-use.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r7.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:7
      ref_id: op.acc.6.r7.1
      description: "Las credenciales se suspender\xE1n tras un periodo definido de\
        \ no utilizaci\xF3n."
      implementation_groups:
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be suspended after a defined period of non-use.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:8
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R8 \u2013 Doble factor para acceso desde o a trav\xE9s de zonas\
        \ no controladas."
      translations:
        en:
          name: Reinforcement R8-Double factor for access from or through uncontrolled
            areas.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:8:1
      assessable: false
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:8
      description: "Se denomina \xABzona controlada\xBB aquella que no es de acceso\
        \ p\xFAblico, requiri\xE9ndose que el usuario, antes de tener acceso al equipo,\
        \ se haya autenticado previamente de alguna forma (control de acceso a las\
        \ instalaciones), diferente del mecanismo de autenticaci\xF3n l\xF3gica frente\
        \ al sistema. Un ejemplo de zona no controlada es Internet"
      translations:
        en:
          description: "\u201CControlled zone\u201D is a zone that is not publicly\
            \ accessible, requiring the user, before having access to the equipment,\
            \ to have previously authenticated in some way (access control to the\
            \ facilities), different from the logical authentication mechanism against\
            \ the system. An example of an uncontrolled area is the Internet."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r8.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:8
      ref_id: op.acc.6.r8.1
      description: "Para el acceso desde o a trav\xE9s de zonas no controladas se\
        \ requerir\xE1 un doble factor de autenticaci\xF3n: R2, R3 o R4"
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: 'Access from or through uncontrolled areas requires a double
            authentication factor: R2, R3 or R4.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:9
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2
      name: "Refuerzo R9 \u2013 Acceso remoto (todos los niveles)."
      translations:
        en:
          name: Reinforcement R9-Remote Access (all levels).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r9.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:9
      ref_id: op.acc.6.r9.1
      description: "Ser\xE1 de aplicaci\xF3n la ITS de Interconexi\xF3n de sistemas\
        \ de informaci\xF3n"
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The Information Systems Interconnection STI shall apply.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6.r9.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.6:2:9
      ref_id: op.acc.6.r9.2
      description: "El acceso remoto deber\xE1 considerar los siguientes aspectos:\n\
        \ a) Ser autorizado por la autoridad correspondiente.\n b) El tr\xE1fico deber\xE1\
        \ ser cifrado.\n c) Si la utilizaci\xF3n no se produce de manera constante,\
        \ el acceso remoto deber\xE1 encontrarse inhabilitado y habilitarse \xFAnicamente\
        \ cuando sea necesario.\n d) Deber\xE1n recogerse registros de auditor\xED\
        a de este tipo de conexiones."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: 'Remote access shall consider the following aspects:

            a) Be authorized by the appropriate authority.

            b) Traffic must be encrypted.

            c) If use does not occur on a constant basis, remote access shall be disabled
            and enabled only when necessary.

            d) Audit records of such connections shall be collected.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-ii-4
      ref_id: op.exp
      name: "Explotaci\xF3n"
      translations:
        en:
          name: Operation
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp
      ref_id: op.exp.1
      name: Inventario de activos
      translations:
        en:
          name: Asset inventory
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.1:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.1
      name: "Aplicaci\xF3n de la medida"
      translations:
