      - D
      translations:
        en:
          description: If there are no products or services in CPSTIC implementing
            the required functionalities, certified products as described in Article
            19 shall be used.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5:3
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5
      description: "Una Instrucci\xF3n T\xE9cnica de Seguridad detallar\xE1 los criterios\
        \ relativos a la adquisici\xF3n de productos de seguridad."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: A Technical Security Instruction shall detail the criteria
            relating to the purchase of security products.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5
      ref_id: op.pl.5.2
      description: "Si el sistema suministra un servicio de seguridad a un tercero\
        \ bajo el alcance del ENS, el producto o productos que en los que se sustente\
        \ dicho servicio debe superar un proceso de cualificaci\xF3n y ser incluido\
        \ en el CPSTIC, o aportar una certificaci\xF3n que cumpla con los requisitos\
        \ funcionales de seguridad y de aseguramiento de acuerdo a lo establecido\
        \ en el art\xEDculo 19."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: If the system provides a security service to a third party
            within the scope of the ENS, the product(s) on which that service is supported
            must pass a qualification process and be included in the CPSTIC or provide
            a certification that complies with the functional security and assurance
            requirements in accordance with Article 19.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5:4
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5
      name: "Refuerzo R1 \u2013 Protecci\xF3n de emisiones electromagn\xE9ticas"
      translations:
        en:
          name: Reinforcement R1-Protection of electromagnetic emissions
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5.r1.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5:4
      ref_id: op.pl.5.r1.1
      description: "La informaci\xF3n deber\xE1 ser protegida frente a las amenazas\
        \ TEMPEST de acuerdo con la normativa en vigor."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Information shall be protected against TEMPEST threats in accordance
            with the regulations in force.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5:5
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5
      name: "Refuerzo R2 \u2013 Lista de componentes software"
      translations:
        en:
          name: "Reinforcement R2 \u2014 List of software components"
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5.r2.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.pl.5:5
      ref_id: op.pl.5.r2.1
      description: "Cada producto y servicio incluir\xE1 en su descripci\xF3n una\
        \ lista de componentes software, acorde a lo especificado en [mp.sw.1.r5]."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Each product and service shall include in its description a
            list of software components, as specified in [mp.sw.1.r5].
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:anexo-ii-4
      ref_id: op.acc
      name: Control de acceso
      translations:
        en:
          name: Access control
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      description: "El control de acceso comprende el conjunto de actividades preparatorias\
        \ y ejecutivas tendentes a permitir o denegar a una entidad, usuario o proceso,\
        \ el acceso a un recurso del sistema para la realizaci\xF3n de una acci\xF3\
        n concreta."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Access control includes all preparatory and executive activities
            aimed at allowing or denying an entity, user or process access to a system
            resource for the implementation of a particular action.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      description: "Los mecanismos de control de acceso deber\xE1n equilibrar la facilidad\
        \ de uso y la protecci\xF3n de la informaci\xF3n y los servicios, primando\
        \ una u otra caracter\xEDstica atendiendo a la categor\xEDa de seguridad del\
        \ sistema."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Access control mechanisms shall balance the user-friendliness
            and protection of information and services, with priority given to the
            security category of the system.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      description: "Cuando se interconecten sistemas en los que la identificaci\xF3\
        n, autenticaci\xF3n y autorizaci\xF3n tengan lugar en diferentes dominios\
        \ de seguridad, bajo distintas responsabilidades, en los casos en que sea\
        \ necesario, las medidas de seguridad locales se acompa\xF1ar\xE1n de los\
        \ correspondientes acuerdos de colaboraci\xF3n que delimiten mecanismos y\
        \ procedimientos para la atribuci\xF3n y ejercicio efectivos de las responsabilidades\
        \ de cada sistema (op.ext)."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: When interconnecting systems in which identification, authentication
            and authorization take place in different security domains, under different
            responsibilities, where necessary, local security measures shall be accompanied
            by the corresponding collaboration agreements delimiting mechanisms and
            procedures for the effective attribution and exercise of the responsibilities
            of each system ([op.ext]).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      ref_id: op.acc.1
      name: "Identificaci\xF3n"
      translations:
        en:
          name: Identification
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Application of the measure
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:1
      description: "\u2013 Dimensiones: (por trazabilidad y autenticidad).\n\u2013\
        \ Nivel BAJO: op.acc.1.\n\u2013 Nivel MEDIO: op.acc.1 +R1.\n\u2013 Nivel ALTO:\
        \ op.acc.1+ R1."
      translations:
        en:
          description: 'Dimensions (by accountability and authenticity)

            LOW level: op.acc.1.

            MEDIUM level: op.acc.1 +R1.

            HIGH level: op.acc.1+ R1.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1
      description: "La identificaci\xF3n de los usuarios del sistema se realizar\xE1\
        \ de acuerdo con lo que se indica a continuaci\xF3n:"
      translations:
        en:
          description: 'The identification of the users of the system shall be carried
            out in accordance with the following:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2
      ref_id: op.acc.1.1
      description: "Se podr\xE1 utilizar como identificador \xFAnico los sistemas\
        \ de identificaci\xF3n previstos en la normativa de aplicaci\xF3n, entre ellos,\
        \ los sistemas de clave concertada y cualquier otro sistema que las administraciones\
        \ consideren v\xE1lido en los t\xE9rminos y condiciones establecidos en la\
        \ Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Com\xFAn\
        \ de las Administraciones P\xFAblicas."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: Identification systems provided for in the applicable regulation
            may be used as a unique identifier, including concerted key systems and
            any other system that the public administrations consider valid under
            the terms and conditions laid down in Law 39/2015 of 1 October 2015 on
            the Common Administrative Procedure of Public Administrations.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2
      ref_id: op.acc.1.2
      description: "Cuando el usuario tenga diferentes roles frente al sistema (como\
        \ ciudadano o usuario final, como trabajador del organismo o como administrador\
        \ de los sistemas, por ejemplo) recibir\xE1 identificadores singulares para\
        \ cada perfil, de forma que se recaben siempre los correspondientes registros\
        \ de actividad, delimit\xE1ndose los privilegios correspondientes a cada perfil."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: When the user has different roles in relation to the system
            (as a citizen or end user, as a staff of the entity or as a system administrator,
            for example) will receive unique identifiers for each profile, so that
            the corresponding activity records are always collected, delimiting the
            privileges corresponding to each profile.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.3
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2
      ref_id: op.acc.1.3
      description: "Cada entidad (entidad, usuario o proceso) que accede al sistema,\
        \ contar\xE1 con un identificador singular que permita conocer el destinatario\
        \ de los mismos y los derechos de acceso que recibe, as\xED como las acciones\
        \ realizadas por cada entidad."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: Each entity (entity, user or process) that accesses the system
            shall have a unique identifier that allows to know the recipient of them
            and the access rights it receives, as well as the actions taken by each
            entity.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.4
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2
      ref_id: op.acc.1.4
      description: "Las cuentas de usuario se gestionar\xE1n de la siguiente forma:"
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: 'User accounts shall be managed as follows:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.4.a
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.4
      ref_id: op.acc.1.4.a
      description: "Cada cuenta (de entidad, usuario o proceso) estar\xE1 asociada\
        \ a un identificador \xFAnico."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: Each account (of entity, user or process) shall be associated
            with a unique identifier.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.4.b
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.4
      ref_id: op.acc.1.4.b
      description: "Las cuentas deben ser inhabilitadas en los siguientes casos: cuando\
        \ el usuario deja la organizaci\xF3n; cuando el usuario cesa en la funci\xF3\
        n para la cual se requer\xEDa la cuenta de usuario; o, cuando la persona que\
        \ la autoriz\xF3 da orden en sentido contrario."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: 'Accounts should be disabled in the following cases: when the
            user leaves the organization; when the user ceases to have the function
            for which the user account was required; or, when the person who authorized
            it gives an order to the contrary.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.4.c
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.4
      ref_id: op.acc.1.4.c
      description: "Las cuentas se retendr\xE1n durante el periodo necesario para\
        \ atender a las necesidades de trazabilidad de los registros de actividad\
        \ asociados a las mismas. A este periodo se le denominar\xE1 \xABperiodo de\
        \ retenci\xF3n\xBB."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: "Accounts shall be retained for the period necessary to meet\
            \ the accountability needs of the activity records associated with them.\
            \ This period shall be referred to as the \u2018retention period\u2019\
            ."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.5
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2
      ref_id: op.acc.1.5
      description: "En los supuestos de comunicaciones electr\xF3nicas, las partes\
        \ intervinientes se identificar\xE1n atendiendo a los mecanismos previstos\
        \ en la legislaci\xF3n europea y nacional en la materia, con la siguiente\
        \ correspondencia entre los niveles de la dimensi\xF3n de autenticidad de\
        \ los sistemas de informaci\xF3n a los que se tiene acceso y los niveles de\
        \ seguridad (bajo, sustancial, alto) de los sistemas de identificaci\xF3n\
        \ electr\xF3nica previstos en el Reglamento (UE) n.\xBA 910/2014, del Parlamento\
        \ Europeo y del Consejo, de 23 de julio de 2014, relativo a la identificaci\xF3\
        n electr\xF3nica y los servicios de confianza para las transacciones electr\xF3\
        nicas en el mercado interior y por el que se deroga la Directiva 1999/93/CE\
        \ y sus normas de desarrollo o ejecuci\xF3n que resulten de aplicaci\xF3n:"
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: 'In cases of electronic communications, the parties involved
            shall be identified on the basis of the mechanisms provided for in relevant
            European and national legislation, with the following correspondence between
            the levels of the authenticity dimension of the information systems to
            which access is available and the levels of security (low, substantial,
            high) of the electronic identification systems provided for in (EU) No
            910/2014 of the European Parliament and of the Council of 23 July 2014
            on electronic identification and trust services for electronic transactions
            in the internal market and repealing Directive 1999/93/EC and its implementing
            or implementing rules:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.5.a
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.5
      ref_id: op.acc.1.5.a
      description: "Si se requiere un nivel BAJO en la dimensi\xF3n de autenticidad\
        \ (anexo I): Nivel de seguridad bajo, sustancial o alto (art\xEDculo 8 del\
        \ Reglamento (UE) n.\xBA 910/2014)."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: 'If a LOW level in the authenticity dimension is required (Annex
            I): Low, substantial or high security level (Article 8 of Regulation (EU)
            No 910/2014).'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.5.b
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.5
      ref_id: op.acc.1.5.b
      description: "Si se requiere un nivel MEDIO en la dimensi\xF3n de autenticidad\
        \ (anexo I): Nivel de seguridad sustancial o alto (art\xEDculo 8 del Reglamento\
        \ (UE) n.\xBA 910/2014)."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: 'If a MEDIUM level is required in the authenticity dimension
            (Annex I): Substantial or high level of security (Article 8 of Regulation
            (EU) No 910/2014).'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.5.c
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.5
      ref_id: op.acc.1.5.c
      description: "Si se requiere un nivel ALTO en la dimensi\xF3n de autenticidad\
        \ (anexo I): Nivel de seguridad alto (art\xEDculo 8 del Reglamento (UE) n.\xBA\
        \ 910/2014)."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: 'If a HIGH level is required in the authenticity dimension
            (Annex I): High security level (Article 8 of Regulation (EU) No 910/2014).'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2
      name: "Refuerzo R1 \u2013 Identificaci\xF3n avanzada."
      translations:
        en:
          name: Reinforcement R1-Advanced Identification.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.r1.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2:1
      ref_id: op.acc.1.r1.1
      description: "La identificaci\xF3n del usuario permitir\xE1 al Responsable del\
        \ Sistema, al Responsable de la Seguridad o a sus respectivos administradores\
        \ delegados, singularizar a la persona asociada al mismo, as\xED como sus\
        \ responsabilidades en el sistema."
      implementation_groups:
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: The identification of the user shall allow the system manager,
            the security officer or their respective delegated administrators to single
            out the person associated with it, as well as their responsibilities in
            the system.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.r1.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2:1
      ref_id: op.acc.1.r1.2
      description: "Los datos de identificaci\xF3n ser\xE1n utilizados por el sistema\
        \ para determinar los privilegios del usuario conforme a los requisitos de\
        \ control de acceso establecidos en la documentaci\xF3n de seguridad."
      implementation_groups:
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: Identification data shall be used by the system to determine
            user privileges in accordance with the access control requirements set
            out in the security documentation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1.r1.3
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.1:2:1
      ref_id: op.acc.1.r1.3
      description: "Se asegurar\xE1 la existencia de una lista actualizada de usuarios\
        \ autorizados y mantenida por el administrador del sistema/de la seguridad\
        \ del sistema."
      implementation_groups:
      - MEDIO
      - ALTO
      - T
      - A
      translations:
        en:
          description: An updated list of authorized users shall be ensured and maintained
            by the system administrator/system security administrator.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      ref_id: op.acc.2
      name: Requisitos de acceso
      translations:
        en:
          name: Access requirements
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Application of the measure
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2:1
      description: "\u2013 Dimensiones:(por confidencialidad, integridad, trazabilidad\
        \ y autenticidad).\n\u2013 Nivel BAJO: op.acc.2.\n\u2013 Nivel MEDIO: op.acc.2.\n\
        \u2013 Nivel ALTO: op.acc.2+ R1."
      translations:
        en:
          description: "Dimensions  (by confidentiality, integrity, accountability\
            \ and authenticity).\n\u2013 LOW level: op.acc.2.\n\u2013 MEDIUM level:\
            \ op.acc.2.\n\u2013 HIGH level: op.acc.2+ R1."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2
      ref_id: op.acc.2.1
      description: "Los recursos del sistema se proteger\xE1n con alg\xFAn mecanismo\
        \ que impida su utilizaci\xF3n, salvo a las entidades que disfruten de derechos\
        \ de acceso suficientes."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
