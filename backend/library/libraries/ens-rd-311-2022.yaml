    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:4
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3
      name: "Refuerzo R2 \u2013 Privilegios de auditor\xEDa."
      translations:
        en:
          name: Reinforcement R2-Audit privileges.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3.r2.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:4
