urn: urn:intuitem:risk:library:esquema-nacional-de-seguridad
locale: es
ref_id: ENS
name: Esquema Nacional de Seguridad - ENS (Real Decreto 311/2022)
description: "El Esquema Nacional de Seguridad (ENS) es el marco normativo que garantiza\
  \ la protecci\xF3n de la informaci\xF3n y los servicios electr\xF3nicos en las administraciones\
  \ p\xFAblicas de Espa\xF1a. Define principios esenciales como confidencialidad,\
  \ integridad, disponibilidad, trazabilidad y autenticidad. Establece niveles de\
  \ seguridad seg\xFAn la criticidad de los sistemas, medidas de protecci\xF3n espec\xED\
  ficas y procedimientos de supervisi\xF3n y auditor\xEDa. Gestionado por el Centro\
  \ Criptol\xF3gico Nacional (CCN), su cumplimiento es obligatorio tanto para entidades\
  \ p\xFAblicas como para sus proveedores tecnol\xF3gicos que gestionan datos sensibles.\n\
  \nHere is the link of the document :\nhttps://www.boe.es/eli/es/rd/2022/05/03/311\n\
  \nHere is the link of the CCN-STIC Security Guides:\nhttps://www.ccn-cert.cni.es/es/guias.html"
copyright: "BOLET\xCDN OFICIAL DEL ESTADO"
version: 3
publication_date: 2026-06-09
provider: "Ministerio para la Transformaci\xF3n Digital y de la Funci\xF3n P\xFAblica\
  \ - Gobierno de Espa\xF1a"
packager: intuitem
translations:
  en:
    name: National Security Framework - ENS (Royal Decree 311/2022)
    description: "The National Security Framework (Esquema Nacional de Seguridad,\
      \ ENS) is Spain\u2019s regulatory framework for protecting information and electronic\
      \ services in public administrations. Initially established by Royal Decree\
      \ 3/2010 of 8 January 2010, it defined the security policy for the use of electronic\
      \ means, based on basic principles and minimum requirements to ensure the security\
      \ of processed information and services provided.\n\nThe ENS establishes key\
      \ principles such as confidentiality, integrity, availability, traceability\
      \ and authenticity. It also defines security levels according to system criticality,\
      \ specific protection measures, and supervision and audit procedures. Managed\
      \ by the National Cryptologic Centre (Centro Criptol\xF3gico Nacional, CCN),\
      \ compliance is mandatory for public entities and for technology providers handling\
      \ sensitive data on their behalf.\n\nHere is the link of the document :\nhttps://ens.ccn.cni.es/es/docman/documentos-publicos/39-boe-a-2022-7191-national-security-framework-ens/file"
objects:
  framework:
    urn: urn:intuitem:risk:framework:esquema-nacional-de-seguridad
    ref_id: ENS
    name: Esquema Nacional de Seguridad - ENS (Real Decreto 311/2022)
    description: "El Esquema Nacional de Seguridad (ENS) es el marco normativo que\
      \ garantiza la protecci\xF3n de la informaci\xF3n y los servicios electr\xF3\
      nicos en las administraciones p\xFAblicas de Espa\xF1a. Define principios esenciales\
      \ como confidencialidad, integridad, disponibilidad, trazabilidad y autenticidad.\
      \ Establece niveles de seguridad seg\xFAn la criticidad de los sistemas, medidas\
      \ de protecci\xF3n espec\xEDficas y procedimientos de supervisi\xF3n y auditor\xED\
      a. Gestionado por el Centro Criptol\xF3gico Nacional (CCN), su cumplimiento\
      \ es obligatorio tanto para entidades p\xFAblicas como para sus proveedores\
      \ tecnol\xF3gicos que gestionan datos sensibles.\n\nHere is the link of the\
      \ document :\nhttps://www.boe.es/eli/es/rd/2022/05/03/311\n\nHere is the link\
      \ of the CCN-STIC Security Guides:\nhttps://www.ccn-cert.cni.es/es/guias.html"
    translations:
      en:
        name: National Security Framework - ENS (ROYAL DECREE 311/2022)
        description: "The National Security Framework (Esquema Nacional de Seguridad,\
          \ ENS) is Spain\u2019s regulatory framework for protecting information and\
          \ electronic services in public administrations. Initially established by\
          \ Royal Decree 3/2010 of 8 January 2010, it defined the security policy\
          \ for the use of electronic means, based on basic principles and minimum\
          \ requirements to ensure the security of processed information and services\
          \ provided.\n\nThe ENS establishes key principles such as confidentiality,\
          \ integrity, availability, traceability and authenticity. It also defines\
          \ security levels according to system criticality, specific protection measures,\
          \ and supervision and audit procedures. Managed by the National Cryptologic\
          \ Centre (Centro Criptol\xF3gico Nacional, CCN), compliance is mandatory\
          \ for public entities and for technology providers handling sensitive data\
          \ on their behalf.\n\nHere is the link of the document :\nhttps://ens.ccn.cni.es/es/docman/documentos-publicos/39-boe-a-2022-7191-national-security-framework-ens/file"
    implementation_groups_definition:
    - ref_id: "B\xC1SICA"
      name: "B\xC1SICA"
      description: "Categor\xEDa de seguridad del sistema\nUna medida que se aplica\
        \ en sistemas de categor\xEDa B\xC1SICA o superior \nUn sistema de informaci\xF3\
        n ser\xE1 de categor\xEDa B\xC1SICA si alguna de sus dimensiones de seguridad\
        \ alcanza el nivel BAJO, y ninguna alcanza un nivel superior.\n\nLos sistemas\
        \ de informaci\xF3n de categor\xEDa B\xC1SICA no necesitar\xE1n realizar una\
        \ auditor\xEDa. Bastar\xE1 una autoevaluaci\xF3n realizada por el mismo personal\
        \ que administra el sistema de informaci\xF3n o en quien \xE9ste delegue."
      translations:
        en:
          name: LOW
          description: 'A measure that applies to BASIC or higher category systems.

            An information system shall be BASIC if one of its security dimensions
            reaches the LOW level, and none reaches a higher level.

            BASIC category information systems shall not be required to undergo an
            audit. A self-assessment carried out by the same personnel administering
            the information system, or by the person to whom they delegate, shall
            be sufficient.'
    - ref_id: MEDIA
      name: MEDIA
      description: "Categor\xEDa de seguridad del sistema\nUna medida que se empiezan\
        \ a aplicar en categor\xEDa MEDIA o superior.\nUn sistema de informaci\xF3\
        n ser\xE1 de categor\xEDa MEDIA si alguna de sus dimensiones de seguridad\
        \ alcanza el nivel de seguridad MEDIO, y ninguna alcanza un nivel de seguridad\
        \ superior."
      translations:
        en:
          name: MEDIUM
          description: 'System security category

            A measure that begins to apply in the MEDIUM category or above.

            An information system shall be MEDIUM category if one of its security
            dimensions reaches the MEDIUM security level and none reaches a higher
            level of security.'
    - ref_id: ALTA
      name: ALTA
      description: "Categor\xEDa de seguridad del sistema\nLos medidas o refuerzos\
        \ que son solo de aplicaci\xF3n en categor\xEDa ALTA o requieren un esfuerzo\
        \ en seguridad superior al de categor\xEDa MEDIA.\nUn sistema de informaci\xF3\
        n ser\xE1 de categor\xEDa ALTA si alguna de sus dimensiones de seguridad alcanza\
        \ el nivel de seguridad ALTO."
      translations:
        en:
          name: HIGH
          description: 'System security category

            A measure that begins to apply in the MEDIUM category or above.

            An information system shall be MEDIUM category if one of its security
            dimensions reaches the MEDIUM security level and none reaches a higher
            level of security.'
    - ref_id: BAJO
      name: BAJO
      description: "Nivel de las dimensiones de seguridad\nUna medida que se aplica\
        \ en sistemas de categor\xEDa B\xC1SICA o superior \nUn sistema de informaci\xF3\
        n ser\xE1 de categor\xEDa B\xC1SICA si alguna de sus dimensiones de seguridad\
        \ alcanza el nivel BAJO, y ninguna alcanza un nivel superior.\""
      translations:
        en:
          name: LOW
          description: 'System security category

            A measure that begins to apply in the MEDIUM category or above.

            An information system shall be MEDIUM category if one of its security
            dimensions reaches the MEDIUM security level and none reaches a higher
            level of security."'
    - ref_id: MEDIO
      name: MEDIO
      description: "Nivel de las dimensiones de seguridad\nUna medida que se empiezan\
        \ a aplicar en categor\xEDa MEDIA o superior.\nUn sistema de informaci\xF3\
        n ser\xE1 de categor\xEDa MEDIA si alguna de sus dimensiones de seguridad\
        \ alcanza el nivel de seguridad MEDIO, y ninguna alcanza un nivel de seguridad\
        \ superior."
      translations:
        en:
          name: MEDIUM
          description: 'Level of security dimensions

            A measure that begins to apply in the MEDIUM category or above.

            An information system shall be MEDIUM category if one of its security
            dimensions reaches the MEDIUM security level and none reaches a higher
            level of security.'
    - ref_id: ALTO
      name: ALTO
      description: "Nivel de las dimensiones de seguridad\nLos medidas o refuerzos\
        \ que son solo de aplicaci\xF3n en categor\xEDa ALTA o requieren un esfuerzo\
        \ en seguridad superior al de categor\xEDa MEDIA.\nUn sistema de informaci\xF3\
        n ser\xE1 de categor\xEDa ALTA si alguna de sus dimensiones de seguridad alcanza\
        \ el nivel de seguridad ALTO."
      translations:
        en:
          name: HIGH
          description: 'Level of security dimensions

            Measures or reinforcements that are only applicable in the HIGH category
            or require a higher security effort than MEDIUM.

            An information system shall be of HIGH category if any of its security
            dimensions reaches the level of HIGH security.'
    - ref_id: C
      name: Confidencialidad
      description: Dimensiones de la seguridad
      translations:
        en:
          name: Confidentiality
          description: Security dimension
    - ref_id: I
      name: Integridad
      description: Dimensiones de la seguridad
      translations:
        en:
          name: Integrity
          description: Security dimension
    - ref_id: T
      name: Trazabilidad
      description: Dimensiones de la seguridad
      translations:
        en:
          name: Accountability
          description: Security dimension
    - ref_id: A
      name: Autenticidad
      description: Dimensiones de la seguridad
      translations:
        en:
          name: Authenticity
          description: Security dimension
    - ref_id: D
      name: Disponibilidad
      description: Dimensiones de la seguridad
      translations:
        en:
          name: Availability
          description: Security dimension
    requirement_nodes:
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xEDtulo-i"
      assessable: false
      depth: 1
      ref_id: "CAP\xCDTULO I"
      name: Disposiciones generales
      translations:
        en:
          name: General provisions
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-1"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-i"
      ref_id: "Art\xEDculo 1"
      name: Objeto.
      translations:
        en:
          name: Subject matter and objectives.
          ref_id: "Article 1 !!!!!!!"
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:1.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-1"
      ref_id: '1.1'
      description: "Este real decreto tiene por objeto regular el Esquema Nacional\
        \ de Seguridad (en adelante, ENS), establecido en el art\xEDculo 156.2 de\
        \ la Ley 40/2015, de 1 de octubre, de R\xE9gimen Jur\xEDdico del Sector P\xFA\
        blico."
      translations:
        en:
          description: The purpose of this Royal Decree is to regulate the National
            Security Framework (hereinafter referred to as ENS), established in Article
            156.2 of Law 40/2015 of 1 October 2015 on the Legal Regime of the Public
            Sector.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:1.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-1"
      ref_id: '1.2'
      description: "El ENS est\xE1 constituido por los principios b\xE1sicos y requisitos\
        \ m\xEDnimos necesarios para una protecci\xF3n adecuada de la informaci\xF3\
        n tratada y los servicios prestados por las entidades de su \xE1mbito de aplicaci\xF3\
        n, con objeto de asegurar el acceso, la confidencialidad, la integridad, la\
        \ trazabilidad, la autenticidad, la disponibilidad y la conservaci\xF3n de\
        \ los datos, la informaci\xF3n y los servicios utilizados por medios electr\xF3\
        nicos que gestionen en el ejercicio de sus competencias."
      translations:
        en:
          description: The ENS consists of the basic principles and minimum requirements
            necessary for the adequate protection of the information processed and
            the services provided by the entities within its scope, in order to ensure
            access, confidentiality, integrity, accountability, authenticity, availability
            and retention of the data, information and services used by electronic
            means that they manage in the exercise of their powers.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:1.3
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-1"
      ref_id: '1.3'
      description: "Lo dispuesto en este real decreto, por cuanto afecta a los sistemas\
        \ de informaci\xF3n utilizados para la prestaci\xF3n de los servicios p\xFA\
        blicos, deber\xE1 considerarse comprendido en los recursos y procedimientos\
        \ integrantes del Sistema de Seguridad Nacional recogidos en la Ley 36/2015,\
        \ de 28 de septiembre, de Seguridad Nacional."
      translations:
        en:
          description: The provisions of this Royal Decree, insofar as it concerns
            the information systems used for the provision of public services, must
            be considered to be covered by the resources and procedures of the National
            Security System set out in Law 36/2015 of 28 September 2015 on National
            Security.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-2"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-i"
      ref_id: "Art\xEDculo 2"
      name: "\xC1mbito de aplicaci\xF3n"
      translations:
        en:
          name: Scope of application.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:2.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-2"
      ref_id: '2.1'
      description: "El presente real decreto es de aplicaci\xF3n a todo el sector\
        \ p\xFAblico, en los t\xE9rminos en que este se define por el art\xEDculo\
        \ 2 de la Ley 40/2015, de 1 de octubre, y de acuerdo con lo previsto en el\
        \ art\xEDculo 156.2 de la misma"
      translations:
        en:
          description: This Royal Decree applies to the entire public sector, as defined
            in Article 2 of Law 40/2015 of 1 October 2015 and in accordance with the
            provisions of Article 156.2 thereof.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:2.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-2"
      ref_id: '2.2'
      description: "Asimismo, sin perjuicio de la aplicaci\xF3n de la Ley 9/1968,\
        \ de 5 de abril, de Secretos Oficiales y otra normativa especial, este real\
        \ decreto ser\xE1 de aplicaci\xF3n a los sistemas que tratan informaci\xF3\
        n clasificada, pudiendo resultar necesario adoptar medidas complementarias\
        \ de seguridad, espec\xEDficas para dichos sistemas, derivadas de los compromisos\
        \ internacionales contra\xEDdos por Espa\xF1a o de su pertenencia a organismos\
        \ o foros internacionales"
      translations:
        en:
          description: Furthermore, without prejudice to the application of Law 9/1968
            of 5 April 1968 on Official Secrets and other special regulations, this
            Royal Decree applies to systems handling classified information, and it
            may be necessary to adopt additional security measures, specific to these
            systems, arising from the international commitments entered into by Spain
            or its membership in international bodies or forums.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:2.3
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-2"
      ref_id: '2.3'
      description: "Este real decreto tambi\xE9n se aplica a los sistemas de informaci\xF3\
        n de las entidades del sector privado, incluida la obligaci\xF3n de contar\
        \ con la pol\xEDtica de seguridad a que se refiere el art\xEDculo 12, cuando,\
        \ de acuerdo con la normativa aplicable y en virtud de una relaci\xF3n contractual,\
        \ presten servicios o provean soluciones a las entidades del sector p\xFA\
        blico para el ejercicio por estas de sus competencias y potestades administrativas"
      translations:
        en:
          description: This Royal Decree also applies to the information systems of
            private sector entities, including the obligation to have the security
            policy referred to in Article 12, when, in accordance with the applicable
            regulations and by virtue of a contractual relationship, they provide
            services or provide solutions to public sector entities for the exercise
            by them of their administrative powers and competencies.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-2:1"
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-2"
      description: "La pol\xEDtica de seguridad a que se refiere el art\xEDculo 12\
        \ ser\xE1 aprobada en el caso de estas entidades por el \xF3rgano que ostente\
        \ las m\xE1ximas competencias ejecutivas."
      translations:
        en:
          description: The security policy referred to in Article 12 shall be approved
            in the case of such entities by the body with the highest executive powers.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-2:2"
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-2"
      description: "Los pliegos de prescripciones administrativas o t\xE9cnicas de\
        \ los contratos que celebren las entidades del sector p\xFAblico incluidas\
        \ en el \xE1mbito de aplicaci\xF3n de este real decreto contemplar\xE1n todos\
        \ aquellos requisitos necesarios para asegurar la conformidad con el ENS de\
        \ los sistemas de informaci\xF3n en los que se sustenten los servicios prestados\
        \ por los contratistas, tales como la presentaci\xF3n de las correspondientes\
        \ Declaraciones o Certificaciones de Conformidad con el ENS"
      translations:
        en:
          description: The specifications of administrative or technical requirements
            for contracts concluded by public sector entities included in the scope
            of this Royal Decree shall include all the requirements necessary to ensure
            compliance with the ENS of the information systems in which the services
            provided by the contractors are supported, such as the presentation of
            the corresponding Declarations or Certifications of conformity with the
            ENS.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-2:3"
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-2"
      description: "Esta cautela se extender\xE1 tambi\xE9n a la cadena de suministro\
        \ de dichos contratistas, en la medida que sea necesario y de acuerdo con\
        \ los resultados del correspondiente an\xE1lisis de riesgos."
      translations:
        en:
          description: This caution shall also extend to the supply chain of these
            contractors, to the extent necessary and in accordance with the results
            of the relevant risk analysis.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:2.4
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-2"
      ref_id: '2.4'
      description: "Cuando las entidades del sector p\xFAblico lleven a cabo la instalaci\xF3\
        n, despliegue y explotaci\xF3n de redes 5G o la prestaci\xF3n de servicios\
        \ 5G, adem\xE1s de las previsiones de este real decreto ser\xE1 de aplicaci\xF3\
        n lo establecido en el Real Decreto-ley 7/2022, de 29 de marzo, sobre requisitos\
        \ para garantizar la seguridad de las redes y servicios de comunicaciones\
        \ electr\xF3nicas de quinta generaci\xF3n, en particular, lo dispuesto en\
        \ su art\xEDculo 17 relativo a la gesti\xF3n de seguridad por las administraciones\
        \ p\xFAblicas, as\xED como su normativa de desarrollo"
      translations:
        en:
          description: Where public sector entities carry out the installation, deployment
            and operation of 5G networks or the provision of 5G services, in addition
            to the provisions of this Royal Decree, the provisions of Royal Decree-Law
            7/2022 of 29 March on requirements to ensure the security of fifth generation
            electronic communications networks and services shall apply, in particular
            the provisions of Article 17 thereof on security management by public
            administrations, as well as its implementing regulations.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-3"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-i"
      ref_id: "Art\xEDculo 3"
      name: "Sistemas de informaci\xF3n que traten datos personales"
      translations:
        en:
          name: Information systems that process personal data
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:3.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-3"
      ref_id: '3.1'
      description: "Cuando un sistema de informaci\xF3n trate datos personales le\
        \ ser\xE1 de aplicaci\xF3n lo dispuesto en el Reglamento (UE) 2016/679 del\
        \ Parlamento Europeo y del Consejo, de 27 de abril de 2016, relativo a la\
        \ protecci\xF3n de las personas f\xEDsicas en lo que respecta al tratamiento\
        \ de datos personales y a la libre circulaci\xF3n de estos datos y por el\
        \ que se deroga la Directiva 95/46/CE (Reglamento General de Protecci\xF3\
        n de Datos) y en la Ley Org\xE1nica 3/2018, de 5 de diciembre, de Protecci\xF3\
        n de Datos Personales y garant\xEDa de los derechos digitales, o, en su caso,\
        \ la Ley Org\xE1nica 7/2021, de 26 de mayo, de protecci\xF3n de datos personales\
        \ tratados para fines de prevenci\xF3n, detecci\xF3n, investigaci\xF3n y enjuiciamiento\
        \ de infracciones penales y de ejecuci\xF3n de sanciones penales, el resto\
        \ de normativa de aplicaci\xF3n, as\xED como los criterios que se establezcan\
        \ por la Agencia Espa\xF1ola de Protecci\xF3n de Datos o en su \xE1mbito competencial,\
        \ por las autoridades auton\xF3micas de protecci\xF3n de datos, sin perjuicio\
        \ de los requisitos establecidos en el presente real decreto"
      translations:
        en:
          description: Where an information system processes personal data, shall
            apply the provisions of Regulation (EU) 2016/679 of the European Parliament
            and of the council of 27 April 2016 on the protection of natural persons
            with regard to the processing of personal data and on the free movement
            of such data, and repealing Directive 95/46/EC (General Data Protection
            Regulation) and Organic Law 3/2018 of 5 December 2018protection of Personal
            Data and guarantee of digital rights, or, where applicable, Organic Law
            7/2021, of 26 May, on the protection of personal data processed for the
            purposes of prevention, detection, investigation and prosecution of criminal
            offences and the execution of criminal penalties, the other applicable
            regulations, as well as the criteria to be established by the Spanish
            Data Protection Agency or in its area of competence, by the autonomous
            data protection authorities, without prejudice to the requirements established
            in this Royal Decree.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:3.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-3"
      ref_id: '3.2'
      description: "En estos supuestos, el responsable o el encargado del tratamiento,\
        \ asesorado por el delegado de protecci\xF3n de datos, realizar\xE1n un an\xE1\
        lisis de riesgos conforme al art\xEDculo 24 del Reglamento General de Protecci\xF3\
        n de Datos y, en los supuestos de su art\xEDculo 35, una evaluaci\xF3n de\
        \ impacto en la protecci\xF3n de datos"
      translations:
        en:
          description: In such cases, the controller or processor, advised by the
            Data Protection Officer, shall carry out a risk analysis in accordance
            with Article 24 of the General Data Protection Regulation and, in the
            cases of Article 35 thereof, an impact assessment on data protection.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:3.3
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-3"
      ref_id: '3.3'
      description: "En todo caso, prevalecer\xE1n las medidas a implantar como consecuencia\
        \ del an\xE1lisis de riesgos y, en su caso, de la evaluaci\xF3n de impacto\
        \ a los que se refiere el apartado anterior, en caso de resultar agravadas\
        \ respecto de las previstas en el presente real decreto."
      translations:
        en:
          description: In any event, the measures to be implemented as a result of
            the risk analysis and, where appropriate, the impact assessment referred
            to in the previous paragraph shall prevail if they are aggravated by those
            provided for in this Royal Decree.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-4"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-i"
      ref_id: "Art\xEDculo 4"
      name: Definiciones
      translations:
        en:
          name: Definitions
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-4:1"
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-4"
      description: "A los efectos previstos en este real decreto, las definiciones,\
        \ palabras, expresiones y t\xE9rminos han de ser entendidos en el sentido\
        \ indicado en el Glosario de t\xE9rminos incluido en el anexo IV"
      translations:
        en:
          description: For the purposes provided in this Royal Decree, definitions,
            words, expressions and terms must be understood in the sense indicated
            in the Glossary of Terms included in Annex IV.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xEDtulo-ii"
      assessable: false
      depth: 1
      ref_id: "CAP\xCDTULO II"
      name: "Principios b\xE1sicos"
      translations:
        en:
          name: Basic principles
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-5"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-ii"
      ref_id: "Art\xEDculo 5"
      name: "Principios b\xE1sicos del Esquema Nacional de Seguridad."
      translations:
        en:
          name: Basic principles of the National Security Framework.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-5:1"
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5"
      description: "El objeto \xFAltimo de la seguridad de la informaci\xF3n es garantizar\
        \ que una organizaci\xF3n podr\xE1 cumplir sus objetivos, desarrollar sus\
        \ funciones y ejercer sus competencias utilizando sistemas de informaci\xF3\
        n. Por ello, en materia de seguridad de la informaci\xF3n deber\xE1n tenerse\
        \ en cuenta los siguientes principios b\xE1sicos"
      translations:
        en:
          description: 'The ultimate purpose of information security is to ensure
            that an organization can fulfil its objectives, carry out its functions
            and exercise its competences using information systems. The following
            basic principles should therefore be taken into account in the area of
            information security:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:5.a
      assessable: false
      depth: 4
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5:1"
      ref_id: 5.a
      description: Seguridad como proceso integral.
      translations:
        en:
          description: Security as an integral process.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:5.b
      assessable: false
      depth: 4
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5:1"
      ref_id: 5.b
      description: "Gesti\xF3n de la seguridad basada en los riesgos."
      translations:
        en:
          description: Risk-based security management.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:5.c
      assessable: false
      depth: 4
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5:1"
      ref_id: 5.c
      description: "Prevenci\xF3n, detecci\xF3n, respuesta y conservaci\xF3n."
      translations:
        en:
          description: Prevention, detection, response and conservation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:5.d
      assessable: false
      depth: 4
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5:1"
      ref_id: 5.d
      description: "Existencia de l\xEDneas de defensa."
      translations:
        en:
          description: Existence of lines of defense.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:5.e
      assessable: false
      depth: 4
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5:1"
      ref_id: 5.e
      description: Vigilancia continua.
      translations:
        en:
          description: Continuous monitoring.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:5.f
      assessable: false
      depth: 4
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5:1"
      ref_id: 5.f
      description: "Reevaluaci\xF3n peri\xF3dica."
      translations:
        en:
          description: Periodic re-evaluation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:5.g
      assessable: false
      depth: 4
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-5:1"
      ref_id: 5.g
      description: "Diferenciaci\xF3n de responsabilidades."
      translations:
        en:
          description: Differentiation of responsibilities.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-6"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-ii"
      ref_id: "Art\xEDculo 6"
      name: La seguridad como un proceso integral
      translations:
        en:
          name: Security as an integral process.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:6.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-6"
      ref_id: '6.1'
      description: "La seguridad se entiende como un proceso integral constituido\
        \ por todos los elementos humanos, materiales, t\xE9cnicos, jur\xEDdicos y\
        \ organizativos relacionados con el sistema de informaci\xF3n. La aplicaci\xF3\
        n del ENS estar\xE1 presidida por este principio, que excluye cualquier actuaci\xF3\
        n puntual o tratamiento coyuntural"
      translations:
        en:
          description: Security is understood as an integral process consisting of
            all the human, material, technical, legal and organizational elements
            related to the information system. The implementation of the ENS will
            be presided over by this principle, which excludes any specific action
            or conjunctural treatment.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:6.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-6"
      ref_id: '6.2'
      description: "Se prestar\xE1 la m\xE1xima atenci\xF3n a la concienciaci\xF3\
        n de las personas que intervienen en el proceso y la de los responsables jer\xE1\
        rquicos, para evitar que, la ignorancia, la falta de organizaci\xF3n y de\
        \ coordinaci\xF3n o de instrucciones adecuadas, constituyan fuentes de riesgo\
        \ para la seguridad"
      translations:
        en:
          description: Maximum attention shall be paid to raising awareness among
            those involved in the process and that of the hierarchical managers, so
            that neither ignorance nor a lack of organization and coordination or
            inappropriate instructions are a source of risk for security.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-7"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-ii"
      ref_id: "Art\xEDculo 7"
      name: "Gesti\xF3n de la seguridad basada en los riesgos"
      translations:
        en:
          name: Risk-based security management.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:7.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-7"
      ref_id: '7.1'
      description: "El an\xE1lisis y la gesti\xF3n de los riesgos es parte esencial\
        \ del proceso de seguridad, debiendo constituir una actividad continua y permanentemente\
        \ actualizada"
      translations:
        en:
          description: Risk analysis and management is an essential part of the security
            process and must be an ongoing and permanently updated activity.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:7.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-7"
      ref_id: '7.2'
      description: "La gesti\xF3n de los riesgos permitir\xE1 el mantenimiento de\
        \ un entorno controlado, minimizando los riesgos a niveles aceptables. La\
        \ reducci\xF3n a estos niveles se realizar\xE1 mediante una apropiada aplicaci\xF3\
        n de medidas de seguridad, de manera equilibrada y proporcionada a la naturaleza\
        \ de la informaci\xF3n tratada, de los servicios a prestar y de los riesgos\
        \ a los que est\xE9n expuestos"
      translations:
        en:
          description: Risk management will allow the maintenance of a controlled
            environment, minimizing risks to acceptable levels. The reduction to these
            levels shall be achieved through an appropriate implementation of security
            measures, in a balanced and proportionate manner to the nature of the
            information processed, the services to be provided and the risks to which
            they are exposed.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-8"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-ii"
      ref_id: "Art\xEDculo 8"
      name: "Prevenci\xF3n, detecci\xF3n, respuesta y conservaci\xF3n"
      translations:
        en:
          name: Prevention, detection, response and conservation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:8.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-8"
      ref_id: '8.1'
      description: "La seguridad del sistema debe contemplar las acciones relativas\
        \ a los aspectos de prevenci\xF3n, detecci\xF3n y respuesta, al objeto de\
        \ minimizar sus vulnerabilidades y lograr que las amenazas sobre el mismo\
        \ no se materialicen o que, en el caso de hacerlo, no afecten gravemente a\
        \ la informaci\xF3n que maneja o a los servicios que presta"
      translations:
        en:
          description: The security of the system shall include actions relating to
            the prevention, detection and response aspects, in order to minimize its
            vulnerabilities and to ensure that threats do not materialize or, if so,
            do not seriously affect the information it handles or the services it
            provides.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:8.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-8"
      ref_id: '8.2'
      description: "Las medidas de prevenci\xF3n, que podr\xE1n incorporar componentes\
        \ orientados a la disuasi\xF3n o a la reducci\xF3n de la superficie de exposici\xF3\
        n, deben eliminar o reducir la posibilidad de que las amenazas lleguen a materializarse"
      translations:
        en:
          description: Prevention measures, which may incorporate components geared
            towards deterrence or reduction of the exposure surface, should eliminate
            or reduce the likelihood of threats materializing.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:8.3
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-8"
      ref_id: '8.3'
      description: "Las medidas de detecci\xF3n ir\xE1n dirigidas a descubrir la presencia\
        \ de un ciberincidente"
      translations:
        en:
          description: Detection measures will be aimed at discovering the presence
            of a cyber incident.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:8.4
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-8"
      ref_id: '8.4'
      description: "Las medidas de respuesta, que se gestionar\xE1n en tiempo oportuno,\
        \ estar\xE1n orientadas a la restauraci\xF3n de la informaci\xF3n y los servicios\
        \ que pudieran haberse visto afectados por un incidente de seguridad"
      translations:
        en:
          description: The response measures, which will be managed in a timely manner,
            will be aimed at the restoration of information and services that may
            have been affected by a security incident.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:8.5
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-8"
      ref_id: '8.5'
      description: "Sin merma de los restantes principios b\xE1sicos y requisitos\
        \ m\xEDnimos establecidos, el sistema de informaci\xF3n garantizar\xE1 la\
        \ conservaci\xF3n de los datos e informaci\xF3n en soporte electr\xF3nico"
      translations:
        en:
          description: Without detriment to the other basic principles and minimum
            requirements laid down, the information system shall ensure the retention
            of data and information in electronic form.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-8:1"
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-8"
      description: "De igual modo, el sistema mantendr\xE1 disponibles los servicios\
        \ durante todo el ciclo vital de la informaci\xF3n digital, a trav\xE9s de\
        \ una concepci\xF3n y procedimientos que sean la base para la preservaci\xF3\
        n del patrimonio digital"
      translations:
        en:
          description: Likewise, the system shall keep services available throughout
            the whole life cycle of digital information, through a design and procedures
            that are the basis for the preservation of digital heritage.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-9"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-ii"
      ref_id: "Art\xEDculo 9"
      name: "Existencia de l\xEDneas de defensa"
      translations:
        en:
          name: Existence of lines of defense.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:9.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-9"
      ref_id: '9.1'
      description: "El sistema de informaci\xF3n ha de disponer de una estrategia\
        \ de protecci\xF3n constituida por m\xFAltiples capas de seguridad, dispuesta\
        \ de forma que, cuando una de las capas sea comprometida, permita"
      translations:
        en:
          description: 'The information system shall have a protection strategy consisting
            of multiple layers of security, arranged in such a way that, when one
            layer is compromised, it allows:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:9.1.a
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:9.1
      ref_id: 9.1.a
      description: "Desarrollar una reacci\xF3n adecuada frente a los incidentes que\
        \ no han podido evitarse, reduciendo la probabilidad de que el sistema sea\
        \ comprometido en su conjunto"
      translations:
        en:
          description: Develop an appropriate response to incidents that have not
            been avoided, reducing the likelihood that the system will be compromised
            as a whole.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:9.1.b
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:9.1
      ref_id: 9.1.b
      description: Minimizar el impacto final sobre el mismo
      translations:
        en:
          description: Minimize the final impact on it.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:9.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-9"
      ref_id: '9.2'
      description: "Las l\xEDneas de defensa han de estar constituidas por medidas\
        \ de naturaleza organizativa, f\xEDsica y l\xF3gica"
      translations:
        en:
          description: The lines of defense must consist of measures of an organizational,
            physical and logical nature.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-10"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-ii"
      ref_id: "Art\xEDculo 10"
      name: "Vigilancia continua y reevaluaci\xF3n peri\xF3dica"
      translations:
        en:
          name: Continuous monitoring and periodic re-evaluation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:10.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-10"
      ref_id: '10.1'
      description: "La vigilancia continua permitir\xE1 la detecci\xF3n de actividades\
        \ o comportamientos an\xF3malos y su oportuna respuesta"
      translations:
        en:
          description: Continuous monitoring will allow the detection of anomalous
            activities or behaviors and their timely response.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:10.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-10"
      ref_id: '10.2'
      description: "La evaluaci\xF3n permanente del estado de la seguridad de los\
        \ activos permitir\xE1 medir su evoluci\xF3n, detectando vulnerabilidades\
        \ e identificando deficiencias de configuraci\xF3n"
      translations:
        en:
          description: Ongoing assessment of the security status of assets will make
            it possible to measure their evolution, detecting vulnerabilities and
            identifying configuration deficiencies.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:10.3
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-10"
      ref_id: '10.3'
      description: "Las medidas de seguridad se reevaluar\xE1n y actualizar\xE1n peri\xF3\
        dicamente, adecuando su eficacia a la evoluci\xF3n de los riesgos y los sistemas\
        \ de protecci\xF3n, pudiendo llegar a un replanteamiento de la seguridad,\
        \ si fuese necesario"
      translations:
        en:
          description: Security measures shall be regularly reassessed and updated,
            adjusting their effectiveness to the evolution of risks and protection
            systems, and may lead to a rethinking of security, if necessary.
    - urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xEDculo-11"
      assessable: false
      depth: 2
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:cap\xED\
        tulo-ii"
      ref_id: "Art\xEDculo 11"
      name: "Diferenciaci\xF3n de responsabilidades"
      translations:
        en:
          name: Differentiation of responsibilities.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:11.1
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-11"
      ref_id: '11.1'
      description: "En los sistemas de informaci\xF3n se diferenciar\xE1 el responsable\
        \ de la informaci\xF3n, el responsable del servicio, el responsable de la\
        \ seguridad y el responsable del sistema"
      translations:
        en:
          description: In the information systems, the person responsible for the
            information, the person responsible for the service, the person responsible
            for security and the person responsible for the system shall be distinguished.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:11.2
      assessable: false
      depth: 3
      parent_urn: "urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:art\xED\
        culo-11"
      ref_id: '11.2'
      description: "La responsabilidad de la seguridad de los sistemas de informaci\xF3\
        n estar\xE1 diferenciada de la responsabilidad sobre la explotaci\xF3n de\
        \ los sistemas de informaci\xF3n concernidos"
