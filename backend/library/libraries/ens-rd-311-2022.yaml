      implementation_groups:
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Where possible, the persons who authorize and control the use
            shall be different.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:3
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3
      name: "Refuerzo R1 \u2013 Segregaci\xF3n rigurosa."
      translations:
        en:
          name: Reinforcement R1-Strict Segregation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3.r1.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:3
