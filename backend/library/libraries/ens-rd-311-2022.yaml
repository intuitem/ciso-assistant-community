      - C
      - I
      - T
      - A
      translations:
        en:
          description: All authorized users must have a set of security attributes
            (privileges) that can be maintained individually.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2.r1.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2:2
