        \ que gestionen servicios bajo la declaraci\xF3n de servicios compartidos."
      translations:
        en:
          description: In the General State Administration, each ministry shall have
            its security policy, which shall be approved by the head of the Department.
            Public bodies and entities belonging to the State institutional public
            sector may have their own security policy, approved by the competent body,
            which shall be consistent with that of the Department with which it maintains
            the relationship of liaison, dependence or secondment, or fall within
            the subjective scope of its security policy. They may also have their
            own security policy, approved by the competent body, consistent with that
            of the Department to which they belong or to which they are attached,
            the management centers of the General State Administration itself which
            manage services under the declaration of shared services.
