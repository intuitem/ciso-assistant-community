        \ acceso remoto, etc.)."
      implementation_groups:
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Access to system security information shall be allowed only
            to authorized security/system administrators, using the necessary access
            mechanisms (console, web interface, remote access, etc.).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      ref_id: op.acc.4
      name: "Proceso de gesti\xF3n de derechos de acceso"
      translations:
        en:
          name: Access rights management process
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Application of the measure
