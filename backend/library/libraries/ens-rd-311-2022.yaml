    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3
      description: "Los equipos (ordenadores port\xE1tiles, tabletas, etc.) que sean\
        \ susceptibles de salir de las instalaciones de la organizaci\xF3n y no puedan\
        \ beneficiarse de la protecci\xF3n f\xEDsica correspondiente, con un riesgo\
        \ manifiesto de p\xE9rdida o robo, ser\xE1n protegidos adecuadamente."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: "Equipment (portable computers, tablets, etc.) which are likely\
            \ to leave the organization\u2019s premises and cannot benefit from the\
            \ corresponding physical protection, with a manifest risk of loss or theft,\
            \ shall be adequately protected."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3
      description: "Sin perjuicio de las medidas generales que les afecten, se adoptar\xE1\
        n las siguientes:"
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: 'Without prejudice to general measures affecting them, the
            following shall be adopted:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3
      ref_id: mp.eq.3.1
      description: "Se llevar\xE1 un inventario de dispositivos port\xE1tiles junto\
        \ con una identificaci\xF3n de la persona responsable de cada uno de ellos\
        \ y un control regular de que est\xE1 positivamente bajo su control."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: A portable device inventory shall be kept together with an
            identification of the person responsible for each device and a regular
            check that it is positively under its control.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3
      ref_id: mp.eq.3.2
      description: "Se establecer\xE1 un procedimiento operativo de seguridad para\
        \ informar al servicio de gesti\xF3n de incidentes de p\xE9rdidas o sustracciones."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: A security operational procedure shall be established to inform
            the loss or subtraction incident management service.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3.3
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3
      ref_id: mp.eq.3.3
      description: "Cuando un dispositivo port\xE1til se conecte remotamente a trav\xE9\
        s de redes que no est\xE1n bajo el estricto control de la organizaci\xF3n,\
        \ el \xE1mbito de operaci\xF3n del servidor limitar\xE1 la informaci\xF3n\
        \ y los servicios accesibles a los m\xEDnimos imprescindibles, requiriendo\
        \ autorizaci\xF3n previa de los responsables de la informaci\xF3n y los servicios\
        \ afectados. Este punto es de aplicaci\xF3n a conexiones a trav\xE9s de internet\
        \ y otras redes que no sean de confianza."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: When a portable device connects remotely over networks that
            are not under the strict control of the organization, the scope of operation
            of the server shall limit accessible information and services to the minimum
            required, requiring prior authorization from those responsible for the
            information and services concerned. This point applies to connections
            over the internet and other networks that are not trusted.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3.4
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3
      ref_id: mp.eq.3.4
      description: "Se evitar\xE1, en la medida de lo posible, que el dispositivo\
        \ port\xE1til contenga claves de acceso remoto a la organizaci\xF3n que no\
        \ sean imprescindibles. Se considerar\xE1n claves de acceso remoto aquellas\
        \ que sean capaces de habilitar un acceso a otros equipos de la organizaci\xF3\
        n u otras de naturaleza an\xE1log"
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The portable device shall be prevented, as far as possible,
            from containing remote access keys to the organization that are not essential.
            Remote access keys are those that are capable of enabling access to other
            equipment of the organization or others of a similar nature.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3
      name: "Refuerzo R1 \u2013 Cifrado del disco."
      translations:
        en:
          name: "Reinforcement R1\u2013 Encryption of the disc."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3.r1.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3:1
      ref_id: mp.eq.3.r1.1
      description: "Se proteger\xE1 el dispositivo port\xE1til mediante cifrado del\
        \ disco duro cuando el nivel de confidencialidad de la informaci\xF3n almacenada\
        \ en el mismo sea de nivel MEDIO."
      implementation_groups:
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The portable device shall be protected by encryption of the
            hard drive when the confidentiality level of the information stored on
            it is MEDIUM level.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3:2
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3
      name: "Refuerzo R2 \u2013 Entornos protegidos."
      translations:
        en:
          name: "Reinforcement R2\u2013 Protected environments."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3.r2.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.3:3:2
      ref_id: mp.eq.3.r2.1
      description: "El uso de dispositivos port\xE1tiles fuera de las instalaciones\
        \ de la organizaci\xF3n se restringir\xE1 a entornos protegidos, donde el\
        \ acceso sea controlado y a salvo de hurtos y miradas indiscretas."
      implementation_groups:
      - ALTA
      - ''
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: "The use of portable devices outside the organization\u2019\
            s facilities shall be restricted to protected environments, where access\
            \ is controlled and safe from theft and prying eyes."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq
      ref_id: mp.eq.4
      name: Otros dispositivos conectados a la red
      translations:
        en:
          name: Other devices connected to the network
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Implementation of the measure
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4:1
      description: "\u2013 Dimensiones: (por confidencialidad).\n\u2013 Nivel BAJO:\
        \ mp.eq.4.\n\u2013 Nivel MEDIO: mp.eq.4 + R1.\n\u2013 Nivel ALTO: mp.eq.4+\
        \ R1"
      translations:
        en:
          description: "Dimensions :(by confidentiality).\n\u2013 LOW level: mp.eq.4.\n\
            \u2013 MEDIUM level: mp.eq.4 + R1.\n\u2013 HIGH level: mp.eq.4+ R1."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4
      description: "Esta medida afecta a todo tipo de dispositivos conectados a la\
        \ red y que puedan tener en alg\xFAn momento acceso a la informaci\xF3n, tales\
        \ como: Esta medida afecta a todo tipo de dispositivos conectados a la red\
        \ y que puedan tener en alg\xFAn momento acceso a la informaci\xF3n, tales\
        \ como:\na) Dispositivos multifunci\xF3n: impresoras, esc\xE1neres, etc.\n\
        b) Dispositivos multimedia: proyectores, altavoces inteligentes, etc.\nc)\
        \ Dispositivos internet de las cosas, en ingl\xE9s Internet of Things (IoT).\n\
        d) Dispositivos de invitados y los personales de los propios empleados, en\
        \ ingl\xE9s Bring Your Own Device (BYOD).\ne) Otros."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      translations:
        en:
          description: "This measure affects all types of devices connected to the\
            \ network that may at some point have access to information, such as:\
            \ \na) Multifunctional devices: printers, scanners, etc.\nb) Multimedia\
            \ devices: projectors, smart speakers, etc.\nc) Internet of Things (IoT)\
            \ devices.\nd) Guest devices and employees\u2019 own personal devices,\
            \ Bring Your Own Device (BYOD)\ne) Others."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4
      ref_id: mp.eq.4.1
      description: "Los dispositivos presentes en el sistema deber\xE1n contar con\
        \ una configuraci\xF3n de seguridad adecuada de manera que se garantice el\
        \ control del flujo definido de entrada y salida de la informaci\xF3n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      translations:
        en:
          description: Devices present in the system shall have an appropriate security
            configuration to ensure the control of the defined flow of information
            input and output.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.eq.4
      ref_id: mp.eq.4.2
      description: "Los dispositivos presentes en la red que dispongan de alg\xFA\
        n tipo de almacenamiento temporal o permanente de informaci\xF3n proporcionar\xE1\
        n la funcionalidad necesaria para eliminar informaci\xF3n de soportes de informaci\xF3\
        n. (Ver [mp.si.5])."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      translations:
        en:
          description: Devices present on the network that have some type of temporary
