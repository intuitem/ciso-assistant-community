        \ (R) que se suman (+) a los requisitos base de la medida pero que no siempre\
        \ son incrementales entre s\xED."
      translations:
        en:
          description: To indicate a higher requirement, security reinforcements (R)
            that add (+) to the basic requirements of the measure are used but are
            not always incremental to each other.
