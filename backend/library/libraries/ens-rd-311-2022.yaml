          name: Reinforcement R4-Test data.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.sw.1.r4.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.sw.1:5
      ref_id: mp.sw.1.r4.1
