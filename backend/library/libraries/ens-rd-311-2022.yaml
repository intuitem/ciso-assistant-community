      translations:
        en:
          description: 'Dimensions (by confidentiality, integrity, accountability
            and authenticity).

            LOW level: op.acc.4.

            MEDIUM level: op.acc.4.

            HIGH level: op.acc.4.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4
      description: "Los derechos de acceso de cada entidad, usuario o proceso se limitar\xE1\
        n atendiendo a los siguientes principios:"
      translations:
        en:
          description: 'The access rights of each entity, user or process shall be
            limited in accordance with the following principles:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4:2
      ref_id: op.acc.4.1
      description: "Todo acceso estar\xE1 prohibido, salvo autorizaci\xF3n expresa."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: All access shall be prohibited, unless expressly authorized.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4:2
      ref_id: op.acc.4.2
      description: "M\xEDnimo privilegio: los privilegios de cada entidad, usuario\
        \ o proceso se reducir\xE1n al m\xEDnimo imprescindible para cumplir sus obligaciones\
        \ o funciones."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: 'Minimum privilege: the privileges of each entity, user or
            process shall be reduced to the minimum necessary to fulfil its duties
            or functions.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4.3
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4:2
      ref_id: op.acc.4.3
      description: "Necesidad de conocer y responsabilidad de compartir: los privilegios\
        \ se asignar\xE1n de forma que las entidades, usuarios o procesos s\xF3lo\
        \ acceder\xE1n al conocimiento de aquella informaci\xF3n requerida para cumplir\
        \ sus obligaciones o funciones. La informaci\xF3n es patrimonio del organismo\
        \ y toda aquella que resulte necesaria para el usuario estar\xE1 a su disposici\xF3\
        n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: 'Need to know and responsibility to share: privileges shall
            be assigned in such a way that entities, users or processes shall only
            have access to knowledge of the information required to fulfil their duties
            or functions. The information is the property of the organization and
            all that is necessary for the user will be at its.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4.4
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4:2
      ref_id: op.acc.4.4
      description: "Capacidad de autorizar: Exclusivamente el personal con competencia\
        \ para ello podr\xE1 conceder, alterar o anular la autorizaci\xF3n de acceso\
        \ a los recursos, conforme a los criterios establecidos por su responsable.\
        \ Los permisos de acceso se revisar\xE1n de forma peri\xF3dica."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: 'Capability to authorize: Access authorization to the resources
            may be granted, altered or cancelled only by the personnel with the authority
            to do so, in accordance with the criteria established by the person responsible.
            Access permits shall be reviewed on a regular basis'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4.5
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.4:2
      ref_id: op.acc.4.5
      description: "Se establecer\xE1 una pol\xEDtica espec\xEDfica de acceso remoto,\
        \ requiri\xE9ndose autorizaci\xF3n expresa."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: A specific remote access policy shall be established, requiring
            express authorization.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc
      ref_id: op.acc.5
      name: "Mecanismo de autenticaci\xF3n (usuarios externos)"
      translations:
        en:
          name: Authentication mechanism (external users)
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Application of the measure
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:1
      description: "\u2013 Dimensiones:  (por confidencialidad, integridad, trazabilidad\
        \ y autenticidad).\n\u2013 Nivel BAJO: op.acc.5 + [R1 o R2 o R3 o R4].\n\u2013\
        \ Nivel MEDIO: op.acc.5 + [R2 o R3 o R4] + R5.\n\u2013 Nivel ALTO: op.acc.5\
        \ + [R2 o R3 o R4] + R5."
      translations:
        en:
          description: "Dimensions : (by confidentiality, integrity, accountability\
            \ and authenticity).\n\u2014 LOW level: op.acc.5 + [R1 or R2 or R3 or\
            \ R4].\n\u2014 MEDIUM level: op.acc.5 + [R2 or R3 or R4] + R5.\n\u2014\
            \ HIGH level: op.acc.5 + [R2 or R3 or R4] + R5."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5
      description: "Referente a usuarios que no son usuarios de la organizaci\xF3\
        n. Las gu\xEDas CCN-STIC desarrollar\xE1n los mecanismos y calidades exigibles\
        \ a cada tipo de factor de autenticaci\xF3n en funci\xF3n de los niveles de\
        \ seguridad requeridos por el sistema de informaci\xF3n el que se accede y\
        \ los privilegios concedidos al usuario."
      translations:
        en:
          description: Referring to users who are not users of the organization. The
            CCN-STIC guides will develop the mechanisms and qualities required for
            each type of authentication factor depending on the security levels required
            by the information system that is accessed, and the privileges granted
            to the user.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.1
      description: "Antes de proporcionar las credenciales de autenticaci\xF3n a las\
        \ entidades, usuarios o procesos, estos deber\xE1n haberse identificado y\
        \ registrado de manera fidedigna ante el sistema o ante un Prestador Cualificado\
        \ de Servicios de Confianza o un proveedor de identidad electr\xF3nica reconocido\
        \ por las administraciones p\xFAblicas, de conformidad con lo dispuesto en\
        \ la Ley 39/2015, de 1 de octubre."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Before providing authentication credentials to entities, users
            or , they must have been identified and registered in a reliable manner
            with the system or with a Qualified Trusted Service Provider or an electronic
            identity provider recognized by public administrations, in accordance
            with the provisions of Law 39/2015 of 1 October 2015.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.2
      description: "Antes de activar el mecanismo de autenticaci\xF3n, el usuario\
        \ reconocer\xE1 que las ha recibido y que conoce y acepta las obligaciones\
        \ que implica su tenencia, en particular, el deber de custodia diligente,\
        \ la protecci\xF3n de su confidencialidad y el deber de notificaci\xF3n inmediata\
        \ en caso de p\xE9rdida"
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Before activating the authentication mechanism, the user shall
            recognize that has received them and that is aware of and accepts the
            obligations of its possession, in particular the duty of diligent custody,
            the protection of its confidentiality and the duty of immediate notification
            in the event of loss.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.3
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.3
      description: "Las credenciales estar\xE1n bajo el control exclusivo del usuario\
        \ y se activar\xE1n una vez est\xE9n bajo su control efectivo."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be under the sole control of the user and
            shall be activated once they are under their effective control.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.4
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.4
      description: "Las credenciales se cambiar\xE1n con una periodicidad marcada\
        \ por la pol\xEDtica de seguridad de la organizaci\xF3n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: "Credentials shall be changed at intervals marked by the organization\u2019\
            s security policy."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.5
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.5
      description: "Las credenciales ser\xE1n inhabilitadas -pudiendo ser regeneradas,\
        \ en su caso-, cuando conste o se sospeche su p\xE9rdida, compromiso o revelaci\xF3\
        n a entidades (personas, equipos o procesos) no autorizadas"
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be disabled, and may be regenerated if necessary,when
            there is evidence or suspicion of loss, commitment or disclosure to unauthorized
            entities (persons, equipment or processes).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.6
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.6
      description: "Las credenciales ser\xE1n inhabilitadas cuando la entidad (persona,\
        \ equipo o proceso) que autentican termina su relaci\xF3n con el sistema."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Credentials shall be disabled when the entity (person, equipment,
            or process) that authenticates ends its relationship with the system.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.7
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.7
      description: "Antes de autorizar el acceso, la informaci\xF3n presentada por\
        \ el sistema ser\xE1 la m\xEDnima imprescindible para que el usuario se autentique,\
        \ evitando todo aquello que pueda, directa o indirectamente, revelar informaci\xF3\
        n sobre el sistema o la cuenta, sus caracter\xEDsticas, su operaci\xF3n o\
        \ su estado. Las credenciales solamente se validar\xE1n cuando se tengan todos\
        \ los datos necesarios y, si se rechaza, no se informar\xE1 del motivo del\
        \ rechazo."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Before authorizing access, the information submitted by the
            system shall be the minimum necessary for the user to authenticate, avoiding
            anything that may, directly or indirectly, disclose information about
            the system or account, its characteristics, its operation or its status.
            Credentials will only be validated when all the necessary data is available
            and, if rejected, the reason for rejection will not be informed.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.8
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.8
      description: "El n\xFAmero de intentos permitidos ser\xE1 limitado, bloqueando\
        \ la oportunidad de acceso una vez superado tal n\xFAmero, y requiriendo una\
        \ intervenci\xF3n espec\xEDfica para reactivar la cuenta, que se describir\xE1\
        \ en la documentaci\xF3n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The number of attempts allowed shall be limited, blocking the
            access opportunity once that number is exceeded, and requiring a specific
            intervention to reactivate the account, which will be described in the
            documentation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.9
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      ref_id: op.acc.5.9
      description: "El sistema informar\xE1 al usuario de sus derechos u obligaciones\
        \ inmediatamente despu\xE9s de obtener el acceso."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The system shall inform the user of its rights or obligations
            immediately after obtaining access.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      name: "Refuerzo R1 \u2013 Contrase\xF1as."
      translations:
        en:
          name: Reinforcement R1-Passwords.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r1.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:1
      ref_id: op.acc.5.r1.1
      description: "Se emplear\xE1 una contrase\xF1a como mecanismo de autenticaci\xF3\
        n."
      implementation_groups:
      - BAJO
      - MEDIO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: A password shall be used as an authentication mechanism.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r1.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:1
      ref_id: op.acc.5.r1.2
      description: "Se impondr\xE1n normas de complejidad m\xEDnima y robustez frente\
        \ a ataques de adivinaci\xF3n (ver gu\xEDas CCN-STIC)."
      implementation_groups:
      - BAJO
      - MEDIO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Standards of minimal complexity and robustness against divination
            attacks shall be imposed (see CCN-STIC guides).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:2
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      name: "Refuerzo R2 \u2013 Contrase\xF1a + OTP."
      translations:
        en:
          name: Reinforcement R2-Password + OTP.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r2.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:2
      ref_id: op.acc.5.r2.1
      description: "Se requerir\xE1 una contrase\xF1a de un solo uso (OTP, en ingl\xE9\
        s) como complemento a la contrase\xF1a de usuario."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: A one- time password (OTP) shall be required to complement
            the user password.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:3
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      name: "Refuerzo R3 \u2013 Certificados."
      translations:
        en:
          name: Reinforcement R3-Certified.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r3.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:3
      ref_id: op.acc.5.r3.1
      description: "Se emplear\xE1n certificados cualificados como mecanismo de autenticaci\xF3\
        n."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Qualified certificates shall be used as an authentication mechanism.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r3.2
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:3
      ref_id: op.acc.5.r3.2
      description: "El uso del certificado estar\xE1 protegido por un segundo factor,\
        \ del tipo PIN o biom\xE9trico."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The use of the certificate shall be protected by a second factor,
            of the PIN type or biometric type.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r3.3
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:3
      ref_id: op.acc.5.r3.3
      description: "Las credenciales utilizadas deber\xE1n haber sido obtenidas tras\
        \ un registro previo presencial, o bien telem\xE1tico, usando un certificado\
        \ electr\xF3nico cualificado."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: The credentials used must have been obtained after prior in-person
            registration, or telematic, using a qualified electronic certificate.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:4
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2
      name: "Refuerzo R4 \u2013 Certificados en dispositivo f\xEDsico."
      translations:
        en:
          name: Reinforcement R4-Certified in physical device.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5.r4.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.5:2:4
      ref_id: op.acc.5.r4.1
