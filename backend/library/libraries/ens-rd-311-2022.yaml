        \ o exigidos, y que podr\xEDan aplicarse en determinados perfiles de cumplimiento\
        \ espec\xEDficos."
      translations:
        en:
          description: Subsequently, a number of additional reinforcements may appear
            to complement the basic requirements, not in all cases required or demanded,
            and which could be applied in certain specific compliance profiles.
