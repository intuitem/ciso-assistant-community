            or limit attacks, limiting damage.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.7.r3.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.7:5
      ref_id: op.exp.7.r3.1
      description: "La reconfiguraci\xF3n din\xE1mica incluye, por ejemplo, cambios\
        \ en las reglas de los enrutadores (routers), listas de control de acceso,\
        \ par\xE1metros del sistema de detecci\xF3n / prevenci\xF3n de intrusiones\
        \ y reglas en los cortafuegos y puertas de enlace, aislamiento de elementos\
        \ cr\xEDticos y aislamiento de las copias de seguridad."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
