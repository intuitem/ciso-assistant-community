        n las decisiones de la persona responsable del recurso, ateni\xE9ndose a la\
        \ pol\xEDtica y normativa de seguridad del sistema."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
