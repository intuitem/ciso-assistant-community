        \ el nivel de seguridad requerido, y ser\xE1 responsable de su documentaci\xF3\
        n y aprobaci\xF3n formal."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      translations:
        en:
          description: The person responsible for each information shall follow the
            criteria set out in the previous section to assign to each information
            the level of security required and shall be responsible for its documentation
            and formal approval.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.info.2.5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.info.2
      ref_id: mp.info.2.5
      description: "El responsable de cada informaci\xF3n en cada momento tendr\xE1\
        \ en exclusiva la potestad de modificar el nivel de seguridad requerido, de\
        \ acuerdo a los apartados anteriores."
      implementation_groups:
      - MEDIO
      - ALTO
      - C
      translations:
        en:
          description: The person responsible for each information at all times shall
            have the exclusive power to modify the level of security required, in
            accordance with the previous sections.
