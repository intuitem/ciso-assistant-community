            and maintenance functions.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3.r1.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.3:3
      ref_id: op.acc.3.r1.2
      description: "La misma persona no puede aunar funciones de auditor\xEDa o supervisi\xF3\
        n con cualquier otra funci\xF3n."
      implementation_groups:
      - ALTO
      - C
      - I
      - T
      - A
      translations:
