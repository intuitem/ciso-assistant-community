        en:
          description: 'Crypto keys shall be protected throughout their life cycle:
            (1) generation, (2) transport to the point of operation, (3) safekeeping
            during the operation, (4) archive after decommissioning and (5) final
            destruction.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.10.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.10
      ref_id: op.exp.10.2
      description: "Los medios de generaci\xF3n estar\xE1n aislados de los medios\
        \ de explotaci\xF3n."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The means of generation shall be isolated from the means of
            exploitation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.10.3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.10
      ref_id: op.exp.10.3
      description: "Las claves retiradas de operaci\xF3n que deban ser archivadas,\
        \ lo ser\xE1n en medios aislados de los de explotaci\xF3n."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
