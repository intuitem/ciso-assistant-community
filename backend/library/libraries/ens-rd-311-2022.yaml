        n, borrado, etc.)."
      implementation_groups:
      - ALTO
      - C
      - I
      - T
      - A
      translations:
        en:
          description: Access privileges shall be implemented to restrict the type
            of access a user may have (read, write, modify, delete, etc.).
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2:3
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2
      name: "Refuerzo R2 \u2013 Control de acceso a dispositivos."
      translations:
        en:
          name: Reinforcement R2- Control Device Access.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2.r2.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.acc.2:3
      ref_id: op.acc.2.r2.1
      description: "Se dispondr\xE1 de soluciones que permitan establecer controles\
        \ de acceso a los dispositivos en funci\xF3n de la pol\xEDtica de seguridad\
