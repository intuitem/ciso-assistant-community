      - A
      - D
      translations:
        en:
          description: The hardware/software configuration of the system shall be
            checked periodically to ensure that unauthorized elements have not been
            introduced or installed.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3.r1.3
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:1
      ref_id: op.exp.3.r1.3
      description: "Se mantendr\xE1 una lista de servicios autorizados para servidores\
        \ y estaciones de trabajo."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: A list of authorized services for servers and workstations
            shall be maintained.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:2
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2
      name: "Refuerzo R2 - Responsabilidad de la configuraci\xF3n."
      translations:
        en:
          name: Reinforcement R2-Responsibility of configuration.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3.r2.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:2
      ref_id: op.exp.3.r2.1
      description: "La configuraci\xF3n de seguridad del sistema operativo y aplicaciones,\
        \ tanto de estaciones y servidores como de la electr\xF3nica de red del sistema,\
        \ ser\xE1 responsabilidad de un n\xFAmero muy limitado de administradores\
        \ del sistema."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The security configuration of the operating system and applications,
            both for stations and servers and for system network electronics, shall
            be the responsibility of a very limited number of system administrators.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:3
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2
      name: Refuerzo R3 - Copias de seguridad.
      translations:
        en:
          name: Reinforcement R3-Security backups.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3.r3.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:3
      ref_id: op.exp.3.r3.1
      description: "Se realizar\xE1n copias de seguridad de la configuraci\xF3n del\
        \ sistema de forma que sea posible reconstruirlo en parte o en su totalidad\
        \ tras un incidente."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The system configuration shall be backed up so that it can
            be rebuilt in part or in full after an incident
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:4
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2
      name: "Refuerzo R4 - Aplicaci\xF3n de la configuraci\xF3n."
      translations:
        en:
          name: Reinforcement R4-Application of the configuration.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3.r4.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:4
      ref_id: op.exp.3.r4.1
      description: "La configuraci\xF3n de seguridad del sistema operativo y de las\
        \ aplicaciones se mantendr\xE1 actualizada a trav\xE9s de una aplicaci\xF3\
        n o procedimiento manual que permita la instalaci\xF3n de las correspondientes\
        \ modificaciones de versi\xF3n y actualizaciones de seguridad oportunas."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The security configuration of the operating system and applications
            shall be kept update through a manual application or procedure allowing
            the installation of appropriate version modifications and security updates.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:5
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2
      name: "Refuerzo R5  \u2013  Control del estado de seguridad de la Configuraci\xF3\
        n."
      translations:
        en:
          name: Reinforcement R5-Control of the Security Status of the Settings.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3.r5.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.3:2:5
      ref_id: op.exp.3.r5.1
      description: "Se dispondr\xE1 de herramientas que permitan conocer de forma\
        \ peri\xF3dica el estado de seguridad de la configuraci\xF3n de los dispositivos\
        \ de red y, en el caso de que resulte deficiente, permitir su correcci\xF3\
        n."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Tools shall be available to enable the security status of the
            network device configuration to be known on a regular basis and, if it
            proves deficient, to enable its correction.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp
      ref_id: op.exp.4
      name: Mantenimiento y actualizaciones de seguridad
      translations:
        en:
          name: Security maintenance and updates [op.exp.4].
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Implementation of the measure.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:1
      description: "\u2013 Dimensiones:  Todas\n\u2013 Categor\xEDa B\xC1SICA: op.exp.4.\n\
        \u2013 Categor\xEDa MEDIA: op.exp.4 + R1.\n\u2013 Categor\xEDa ALTA: op.exp.4\
        \ + R1 + R2."
      translations:
        en:
          description: "Dimensions : All\n\u2013 BASIC Category: op.exp.4.\n\u2013\
            \ MEDIUM Category: op.exp.4 + R1.\n\u2013 HIGH Category: op.exp.4 + R1\
            \ + R2."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4
      description: "Para mantener el equipamiento f\xEDsico y l\xF3gico que constituye\
        \ el sistema, se aplicar\xE1 lo siguiente:"
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: 'In order to maintain the physical and logical equipment that
            constitutes the system, the following shall apply:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      ref_id: op.exp.4.1
      description: "Se atender\xE1 a las especificaciones de los fabricantes en lo\
        \ relativo a instalaci\xF3n y mantenimiento de los sistemas, lo que incluir\xE1\
        \ un seguimiento continuo de los anuncios de defectos"
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: "Manufacturers\u2019 specifications for the installation and\
            \ maintenance of systems shall be met, including continuous monitoring\
            \ of warnings of defects."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      ref_id: op.exp.4.2
      description: "Se dispondr\xE1 de un procedimiento para analizar, priorizar y\
        \ determinar cu\xE1ndo aplicar las actualizaciones de seguridad, parches,\
        \ mejoras y nuevas versiones. La priorizaci\xF3n tendr\xE1 en cuenta la variaci\xF3\
        n del riesgo en funci\xF3n de la implantaci\xF3n o no de la actualizaci\xF3\
        n."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: A procedure shall be available to analyses, prioritize and
            determine when to apply security updates, patches, upgrades, and new versions.
            Prioritization shall take into account the change in risk depending on
            the implementation or not of the update.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4.3
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      ref_id: op.exp.4.3
      description: "El mantenimiento solo podr\xE1 realizarse por personal debidamente\
        \ autorizado."
      implementation_groups:
      - "B\xC1SICA"
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Maintenance may only be carried out by duly authorized personnel.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      name: "Refuerzo R1 \u2013 Pruebas en preproducci\xF3n."
      translations:
        en:
          name: Reinforcement R1-Tests in pre-production.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4.r1.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:1
      ref_id: op.exp.4.r1.1
      description: "Antes de poner en producci\xF3n una nueva versi\xF3n o una versi\xF3\
        n parcheada, se comprobar\xE1 en un entorno de prueba controlado y consistente\
        \ en configuraci\xF3n al entorno de producci\xF3n, que la nueva instalaci\xF3\
        n funciona correctamente y no disminuye la eficacia de las funciones necesarias\
        \ para el trabajo diario."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Before a new or patched version is put into production, it
            shall be tested in a controlled test environment consistent with configuration
            to the production environment, that the new installation works properly
            and does not decrease the efficiency of the functions needed for daily
            work.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:2
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      name: "Refuerzo R2 \u2013 Prevenci\xF3n de fallos."
      translations:
        en:
          name: Reinforcement R2-Failure prevention.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4.r2.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:2
      ref_id: op.exp.4.r2.1
      description: "Antes de la aplicaci\xF3n de las configuraciones, parches y actualizaciones\
        \ de seguridad se prever\xE1 un mecanismo para revertirlos en caso de aparici\xF3\
        n de efectos adversos."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: A mechanism to reverse them in the event of adverse effects
            shall be provided prior to the application of security settings, patches
            and updates.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:3
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      name: "Refuerzo R3 \u2013 Actualizaciones y pruebas peri\xF3dicas."
      translations:
        en:
          name: Reinforcement R3-Updates and periodic tests.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4.r3.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:3
      ref_id: op.exp.4.r3.1
      description: "Se deber\xE1 comprobar de forma peri\xF3dica la integridad del\
        \ firmware utilizado en los dispositivos hardware del sistema (infraestructura\
        \ de red, BIOS, etc.). La periodicidad de estas comprobaciones seguir\xE1\
        \ las recomendaciones de la Gu\xEDa CCN-STIC que sea de aplicaci\xF3n."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The integrity of the firmware used in the hardware devices
            of the system (network infrastructure, BIOS, etc.) must be checked periodically.
            The periodicity of these checks will follow the recommendations of the
            CCN-STIC Guide that is applicable.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:4
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2
      name: "Refuerzo R4  \u2013  Monitorizaci\xF3n continua."
      translations:
        en:
          name: "Reinforcement R4 \u2014 Continuous monitoring."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4.r4.1
      assessable: true
      depth: 7
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.4:2:4
      ref_id: op.exp.4.r4.1
      description: "Se desplegar\xE1 a nivel de sistema una estrategia de monitorizaci\xF3\
        n continua de amenazas y vulnerabilidades. Esta estrategia detallar\xE1:\n\
        \ 1. Los indicadores cr\xEDticos de seguridad a emplear.\n 2. La pol\xEDtica\
        \ de aplicaci\xF3n de parches de seguridad de los componentes software relacionados\
        \ en las listas de [op.exp.1.r4], [op.ext.3.r3] y [mp.sw.1.r5]).\n 3. Los\
        \ criterios de revisi\xF3n regular y excepcional de las amenazas sobre el\
        \ sistema."
      implementation_groups:
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: 'A strategy for continuous monitoring of threats and vulnerabilities
            shall be deployed at the system level. This strategy shall detail:

            1. The critical security indicators to be used.

            2. The security patch application policy for related software components
            in the lists of [op.exp.1.r4], [op.ext.3.r3] and [mp.sw.1.r5]).

            3. The criteria for regular and exceptional review of threats to the system.'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp
      ref_id: op.exp.5
      name: "Gesti\xF3n de cambios"
      translations:
        en:
          name: Change management
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:1
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5
      name: "Aplicaci\xF3n de la medida"
      translations:
        en:
          name: Implementation of the measure
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:1:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:1
      description: "\u2013 Dimensiones:  Todas\n\u2013 Categor\xEDa B\xC1SICA: no\
        \ aplica.\n\u2013 Categor\xEDa MEDIA: op.exp.5.\n\u2013 Categor\xEDa ALTA:\
        \ op.exp.5+ R1."
      translations:
        en:
          description: "Dimensions : All\n\u2013 BASIC Category: N.A.\n\u2013 MEDIUM\
            \ Category: op.exp.5.\n\u2013 HIGH Category: op.exp.5+ R1."
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2
      assessable: false
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5
      description: "Se mantendr\xE1 un control continuo de los cambios realizados\
        \ en el sistema, de forma que:"
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: 'Continuous monitoring of changes to the system shall be maintained
            so that:'
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5.1
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2
      ref_id: op.exp.5.1
      description: "Los cambios se planificar\xE1n para reducir el impacto sobre la\
        \ prestaci\xF3n de los servicios afectados. Para ello, todas las peticiones\
        \ de cambio se registrar\xE1n asignando un n\xFAmero de referencia que permita\
        \ su seguimiento, de forma equivalente al registro de los incidentes."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Changes shall be planned to reduce the impact on the provision
            of the affected services. To this end, all change request shall be recorded
            by assigning a reference number for follow-up, in an equivalent way to
            the recording of incidents.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5.2
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2
      ref_id: op.exp.5.2
      description: "La informaci\xF3n a registrar para cada petici\xF3n de cambio\
        \ ser\xE1 suficiente para que quien deba autorizarlos no tenga dudas al respecto\
        \ y permita gestionarlo hasta su desestimaci\xF3n o implementaci\xF3n."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: The information to be recorded for each change request shall
            be sufficient to allow the person to authorize them to have no doubts
            about it and to manage it until its rejection or implementation.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5.3
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2
      ref_id: op.exp.5.3
      description: "Las pruebas de preproducci\xF3n, siempre que sea posible realizarlas,\
        \ se efectuar\xE1n en equipos equivalentes a los de producci\xF3n, al menos\
        \ en los aspectos espec\xEDficos del cambio."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Pre-production tests, whenever possible, shall be carried out
            on equipment equivalent to production, at least in the specific aspects
            of the change.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5.4
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2
      ref_id: op.exp.5.4
      description: "Mediante un an\xE1lisis de riesgos se determinar\xE1 si los cambios\
        \ son relevantes para la seguridad del sistema. Aquellos cambios que impliquen\
        \ un riesgo de nivel ALTO deber\xE1n ser aprobados, expl\xEDcitamente, de\
        \ forma previa a su implantaci\xF3n, por el Responsable de la Seguridad."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: A risk analysis shall determine whether the changes are relevant
            to system security. Changes that involve a risk at HIGH level must be
            approved, explicitly, prior to their implementation, by the security officer.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5.5
      assessable: true
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2
      ref_id: op.exp.5.5
      description: "Una vez implementado el cambio, se realizar\xE1n las pruebas de\
        \ aceptaci\xF3n convenientes. Si son positivas, se actualizar\xE1 la documentaci\xF3\
        n de configuraci\xF3n (diagramas de red, manuales, el inventario, etc.), siempre\
        \ que proceda."
      implementation_groups:
      - MEDIA
      - ALTA
      - C
      - I
      - T
      - A
      - D
      translations:
        en:
          description: Once the change is implemented, the appropriate acceptance
            tests will be performed. If positive, the configuration documentation
            (network diagrams, manuals, inventory, etc.) shall be updated where appropriate.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2:1
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.5:2
      name: "Refuerzo R1 \u2013 Prevenci\xF3n de fallos."
