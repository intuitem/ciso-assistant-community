      depth: 5
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.si.5
      ref_id: mp.si.5.1
      description: "Los soportes que vayan a ser reutilizados para otra informaci\xF3\
        n o liberados a otra organizaci\xF3n ser\xE1n objeto del borrado seguro de\
        \ su contenido que no permita su recuperaci\xF3n. Cuando la naturaleza del\
        \ soporte no permita un borrado seguro, el soporte no podr\xE1 ser reutilizado\
        \ en ning\xFAn otro sistema."
      implementation_groups:
      - BAJO
      - MEDIO
      - ALTO
      - C
      translations:
        en:
          description: Media intended to be re-used for other information or released
            to another organization shall be subject to the secure deletion of its
            content that does not permit its retrieval. Where the nature of the medium
            does not allow for secure deletion, the support may not be reused in any
            other system.
    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:mp.si.5:3
