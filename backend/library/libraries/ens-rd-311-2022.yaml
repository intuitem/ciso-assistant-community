    - urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.8:2:5
      assessable: false
      depth: 6
      parent_urn: urn:intuitem:risk:req_node:esquema-nacional-de-seguridad:op.exp.8:2
