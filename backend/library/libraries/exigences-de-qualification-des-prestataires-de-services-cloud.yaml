    ref_id: exigences-de-qualification-services-cloud-iiv
    name: "R\xC9F\xC9RENTIEL DES EXIGENCES DE QUALIFICATION DES PRESTATAIRES DE SERVICES\
      \ CLOUD"
    description: "Annexe \xE0 l\u2019arr\xEAt\xE9 du Chef du gouvernement n\xB0 3-17-25\
      \ du 7 safar 1447 (1er ao\xFBt 2025) fixant le r\xE9f\xE9rentiel des exigences\
      \ de qualification des prestataires de services Cloud\nR\xC9F\xC9RENTIEL DES\
      \ EXIGENCES DE QUALIFICATION DES PRESTATAIRES DE SERVICES CLOUD"
    min_score: 0
    max_score: 5
