    requirement_nodes:
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.1
      assessable: false
      depth: 1
      ref_id: '3.1'
      name: "Politiques de s\xE9curit\xE9 de l\u2019information et gestion du risque"
      description: "Ce chapitre a pour objet de garantir que le prestataire de services\
        \ dispose de politiques et d'instructions en mati\xE8re de s\xE9curit\xE9\
        \ qui couvrent les exigences de s\xE9curit\xE9 tout en soutenant les besoins\
        \ m\xE9tier li\xE9s \xE0 la fourniture du service. Ces politiques doivent\
        \ \xEAtre clairement d\xE9finies, accessibles et suivies pour assurer la conformit\xE9\
        \ et la gestion des risques de s\xE9curit\xE9."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.1.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.1
      ref_id: 3.1.1
      name: "Politique de s\xE9curit\xE9 des syst\xE8mes d\u2019information"
      description: "Le prestataire de services doit \xE9laborer une politique de s\xE9\
        curit\xE9 des syst\xE8mes d'information pour son service qui doit \xEAtre\
        \ approuv\xE9e formellement par la direction du prestataire de services, et\
        \ qui doit respecter les dispositions des textes l\xE9gislatifs et r\xE9glementaires\
        \ nationaux, ainsi que les normes et les r\xE9f\xE9rentiels en vigueur notamment\
        \ celles du pr\xE9sent r\xE9f\xE9rentiel qui fixe les crit\xE8res de qualification.\
        \ Cette politique doit \xEAtre communiqu\xE9e et mise \xE0 disposition de\
        \ mani\xE8re appropri\xE9e \xE0 toutes les parties prenantes concern\xE9es\
        \ internes et externes au prestataire de services. Elle doit \xEAtre mise\
        \ \xE0 jour r\xE9guli\xE8rement, et autant de fois que survient un changement\
        \ majeur\nsusceptible d'affecter le service. La politique de s\xE9curit\xE9\
        \ des syst\xE8mes d\u2019information doit \xEAtre r\xE9vis\xE9e au moins annuellement\
        \ par le prestataire de services. La r\xE9vision doit prendre en compte au\
        \ minimum :\n\u23AF Les changements organisationnels et techniques dans la\
        \ fourniture du service cloud.\n\u23AF Les changements l\xE9gislatifs et r\xE9\
        glementaires affectant l'environnement du prestataire de services."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2
      assessable: false
      depth: 1
      ref_id: '3.2'
      name: "Organisation de la s\xE9curit\xE9 de l\u2019information"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2
      ref_id: 3.2.1
      name: "R\xF4les et responsabilit\xE9s"
      description: "Le prestataire de services doit cr\xE9er et mettre en place une\
        \ organisation interne d\xE9di\xE9e \xE0 la s\xE9curit\xE9 afin d\u2019assurer\
        \ la d\xE9finition, l\u2019impl\xE9mentation et le suivi du fonctionnement\
        \ op\xE9rationnel de la s\xE9curit\xE9 du syst\xE8me d\u2019information au\
        \ sein de son organisation.\nLe prestataire de services doit d\xE9signer un\
        \ responsable de la s\xE9curit\xE9 des syst\xE8mes d\u2019information et un\
        \ responsable de la s\xE9curit\xE9 physique.\nLe prestataire de services doit\
        \ clairement d\xE9finir et attribuer les responsabilit\xE9s en mati\xE8re\
        \ de s\xE9curit\xE9 du syst\xE8me d\u2019information pour le personnel impliqu\xE9\
        \ dans la prestation du service.\nLe prestataire de services doit v\xE9rifier\
        \ que les responsabilit\xE9s en mati\xE8re de s\xE9curit\xE9 de l\u2019information\
        \ restent pertinentes apr\xE8s tout changement majeur susceptible d\u2019\
        affecter le service"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2
      ref_id: 3.2.2
      name: "S\xE9paration des t\xE2ches"
      description: "Le prestataire de services doit identifier les risques associ\xE9\
        s \xE0 des cumules de responsabilit\xE9s ou de taches, les prendre en compte\
        \ dans l\u2019appr\xE9ciation des risques et mettre en \u0153uvre des mesures\
        \ pour r\xE9duire ces risques."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2
      ref_id: 3.2.3
      name: "Relations avec les autorit\xE9s"
      description: "Le prestataire de services doit \xE9tablir des relations appropri\xE9\
        es avec les autorit\xE9s comp\xE9tentes en mati\xE8re de cyber s\xE9curit\xE9\
        \ et de protection de donn\xE9es \xE0 caract\xE8re personnel, et le cas \xE9\
        ch\xE9ant avec les r\xE9gulateurs sectoriels concern\xE9s, selon la nature\
        \ des informations confi\xE9es par le commanditaire au prestataire de services."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.2
      ref_id: 3.2.4
      name: "La s\xE9curit\xE9 de l\u2019information dans la gestion de projet"
      description: "Le prestataire de services doit \xE9tablir une documentation comprenant\
        \ une estimation des risques avant tout projet susceptible d\u2019avoir un\
        \ impact sur le service, et ce quelle que soit la nature du projet. En cas\
        \ d\u2019impact potentiel sur la s\xE9curit\xE9 du service, le prestataire\
        \ de services doit informer par \xE9crit le commanditaire et l\u2019autorit\xE9\
        \ nationale de cybers\xE9curit\xE9 des impacts potentiels, des mesures d\u2019\
        att\xE9nuation mises en place et des risques r\xE9siduels y associ\xE9s."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3
      assessable: false
      depth: 1
      ref_id: '3.3'
      name: "S\xE9curit\xE9 des ressources humaines"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3
      ref_id: 3.3.1
      name: Personnel de confiance
      description: "A l\u2019embauche, le prestataire de services doit mettre en \u0153\
        uvre une proc\xE9dure de v\xE9rifications des informations des candidats conform\xE9\
        ment \xE0 la r\xE9glementation en vigueur, \xE0 l\u2019\xE9thique, aux exigences\
        \ m\xE9tier et \xE0 la classification des actifs informationnels accessibles.\n\
        Le prestataire de services doit renforcer ces v\xE9rifications pour s\u2019\
        assurer que les ant\xE9c\xE9dents du personnel disposant de privil\xE8ges\
        \ d\u2019administration \xE9tendus sur les composants logiciels et mat\xE9\
        riels de l\u2019infrastructure ne posent aucun risque quant aux responsabilit\xE9\
        s qui leur sont confi\xE9es."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3
      ref_id: 3.3.2
      name: "Termes et Conditions d\u2019embauche"
      description: "Une charte doit \xEAtre \xE9labor\xE9e par le prestataire de services\
        \ en conformit\xE9 avec la politique de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information. Elle doit \xEAtre valid\xE9e par la hi\xE9rarchie, communiqu\xE9\
        \ et sign\xE9e ou accept\xE9e par l\u2019ensemble des personnes impliqu\xE9\
        es dans la fourniture du service.\nCette charte doit contenir, entre autres\
        \ :\n\u23AF Un rappel des exigences l\xE9gislatives et r\xE9glementaires applicables\
        \ dans le contexte de l\u2019activit\xE9 ;\n\u23AF Les r\xE8gles g\xE9n\xE9\
        rales d'utilisation des ressources informatiques notamment les m\xE9thodes,\
        \ outils et techniques valid\xE9s par le prestataire de services ;\n\u23AF\
        \ Les clauses de confidentialit\xE9 et non divulgation des informations manipul\xE9\
        es.\nLe prestataire de services doit inclure, dans les contrats de travail\
        \ du personnel ayant des privil\xE8ges d'administration \xE9lev\xE9s sur l'infrastructure\
        \ du service, un engagement de responsabilit\xE9, en lien avec la protection\
        \ du secret professionnel et de la propri\xE9t\xE9 intellectuelle. Les privil\xE8\
        ges d\u2019administrations \xE9lev\xE9s concernent des actions telles que\
        \ l'\xE9l\xE9vation de privil\xE8ges, la r\xE9alisation d\u2019actions sans\
        \ traces techniques, et la possibilit\xE9 de d\xE9sactiver ou alt\xE9rer ces\
        \ traces."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3
      ref_id: 3.3.3
      name: Formation et sensibilisation du personnel
      description: "Le prestataire de services doit veiller \xE0 ce que les employ\xE9\
        s soient sensibilis\xE9s \xE0 leurs responsabilit\xE9s  en mati\xE8re de s\xE9\
        curit\xE9 des syst\xE8mes d'information et aux moyens dont ils disposent pour\
        \ s\u2019acquitter de ces responsabilit\xE9s.\nLe prestataire de services\
        \ doit organiser r\xE9guli\xE8rement, selon un programme pr\xE9\xE9tabli et\
        \ valid\xE9 par le responsable de la s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information (RSSI), des sessions de formation et de sensibilisation au profit\
        \ de son personnel en mati\xE8re de s\xE9curit\xE9 des syst\xE8mes d\u2019\
        information adapt\xE9 au service et aux missions des personnels."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3
      ref_id: 3.3.4
      name: Processus disciplinaire
      description: "Le prestataire de services doit mettre en place un processus disciplinaire\
        \ formel applicable \xE0  l\u2019ensemble des personnes impliqu\xE9es dans\
        \ la fourniture du service qui enfreignent les r\xE8gles de la politique de\
        \ s\xE9curit\xE9 des syst\xE8mes d\u2019information."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.3
      ref_id: 3.3.5
      name: Rupture, terme ou modification du contrat de travail
      description: "Afin de pr\xE9server la confidentialit\xE9 et l\u2019int\xE9grit\xE9\
        \ de l\u2019information de ses commanditaires, le prestataire de services\
        \ doit d\xE9finir et assigner dans les contrats de travail les responsabilit\xE9\
        s li\xE9s \xE0 la confidentialit\xE9 et \xE0 la non-divulgation suite \xE0\
        \ la r\xE9siliation, \xE0 la rupture ou \xE0 la modification de tout contrat\
        \ avec une personne impliqu\xE9e dans la prestation du service."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4
      assessable: false
      depth: 1
      ref_id: '3.4'
      name: Gestion des actifs
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4
      ref_id: 3.4.1
      name: "Inventaire et propri\xE9t\xE9 des actifs"
      description: "Le prestataire de services doit tenir \xE0 jour un inventaire\
        \ de l\u2019ensemble des \xE9quipements utilis\xE9s pour  fournir le service.\
        \ Cet inventaire doit pr\xE9ciser pour chaque \xE9quipement :\n\u23AF Les\
        \ identifiants (noms, adresses IP, adresse MAC, etc.) ;\n\u23AF La fonction\
        \ ;\n\u23AF Le mod\xE8le ;\n\u23AF La localisation ;\n\u23AF Le propri\xE9\
        taire ;\n\u23AF Les besoins de s\xE9curit\xE91.\nLe prestataire de services\
        \ doit tenir \xE0 jour un inventaire de l\u2019ensemble des logiciels utilis\xE9\
        s pour le service, et qui pr\xE9cise, pour chaque logiciel, sa version et\
        \ les \xE9quipements sur lesquels il est install\xE9.\nLe prestataire de services\
        \ doit s\u2019assurer de la validit\xE9 des licences des logiciels durant\
        \ la prestation de service.\n\n1  Le besoin de s\xE9curit\xE9 correspond \xE0\
        \ une propri\xE9t\xE9 de s\xE9curit\xE9 \xE0 garantir pour un actif informationnel\
        \ en mati\xE8re de confidentialit\xE9, d\u2019int\xE9grit\xE9 et de disponibilit\xE9\
        ."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4
      ref_id: 3.4.2
      name: Classification des actifs
      description: "Les actifs doivent \xEAtre classifi\xE9s et, si possible, \xE9\
        tiquet\xE9s en fonction des besoins de protection de l'information qu'ils\
        \ traitent, stockent ou transmettent. Cette classification doit \xEAtre effectu\xE9\
        e selon un sch\xE9ma uniforme d\xE9termin\xE9 par les responsables des actifs\
        \ et qui prend en compte les besoins de s\xE9curit\xE9 identifi\xE9s pour\
        \ chaque actif."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4
      ref_id: 3.4.3
      name: "Marquage et manipulation de l\u2019information"
      description: "Le prestataire de services doit mettre en place une proc\xE9dure\
        \ pour le marquage et la manipulation des informations n\xE9cessaires \xE0\
        \ la fourniture du service."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4
      ref_id: 3.4.4
      name: Gestion des supports amovibles
      description: "Le prestataire de services doit documenter et mettre en \u0153\
        uvre une proc\xE9dure pour la gestion des supports amovibles, conform\xE9\
        ment aux besoins de s\xE9curit\xE9 relatifs \xE0 la fourniture du service.\n\
        Lorsque des supports amovibles sont utilis\xE9s sur l\u2019infrastructure\
        \ technique ou pour des t\xE2ches d\u2019administration, ces supports doivent\
        \ \xEAtre d\xE9di\xE9s \xE0 un usage sp\xE9cifique."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4
      ref_id: 3.4.5
      name: Restitution des actifs
      description: "Le prestataire de services doit documenter et mettre en place\
        \ une proc\xE9dure de restitution des actifs permettant de s\u2019assurer\
        \ que chaque personne impliqu\xE9e dans la prestation de service restitue\
        \ tous les actifs en sa possession \xE0 la fin de son contrat."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.4
      ref_id: 3.4.6
      name: "Retrait du Mat\xE9riel"
      description: "Le retrait des mat\xE9riels utilis\xE9s pour la fourniture du\
        \ service cloud n\xE9cessite une approbation formelle du responsable de la\
        \ s\xE9curit\xE9 des syst\xE8mes d\u2019information et doit inclure la suppression\
        \ compl\xE8te et permanente des donn\xE9es ou la destruction appropri\xE9\
        e des supports de stockage."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      assessable: false
      depth: 1
      ref_id: '3.5'
      name: "Contr\xF4le d\u2019acc\xE8s et gestion des identit\xE9s"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      ref_id: 3.5.1
      name: "Politique de contr\xF4le d\u2019acc\xE8s"
      description: "Le prestataire de services est tenu de mettre en place et de documenter\
        \ une politique de contr\xF4le d\u2019acc\xE8s aux syst\xE8mes, r\xE9seaux\
        \ et services sur la base des exigences m\xE9tier et de s\xE9curit\xE9 de\
        \ l\u2019information en respectant le principe du moindre privil\xE8ge.\n\
        La politique de contr\xF4le d\u2019acc\xE8s doit \xEAtre mise \xE0 jour annuellement\
        \ et \xE0 chaque changement majeur susceptible d'avoir un impact sur le service."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      ref_id: 3.5.2
      name: "Enregistrement et d\xE9sinscription des utilisateurs"
      description: "Le prestataire de services doit mettre en \u0153uvre et documenter\
        \ une proc\xE9dure formelle d\u2019enregistrement et de d\xE9sinscription\
        \ des utilisateurs de syst\xE8mes d\u2019information, destin\xE9e \xE0 permettre\
        \ l\u2019attribution de droits d\u2019acc\xE8s.\nLe prestataire de services\
        \ est tenu de cr\xE9er des comptes nominatifs lors de l\u2019enregistrement\
        \ des utilisateurs plac\xE9s sous sa responsabilit\xE9.\nLe prestataire de\
        \ services doit mettre en place des mesures et moyens n\xE9cessaires pour\
        \ garantir que la d\xE9sinscription d'un utilisateur entra\xEEne la suppression\
        \ de tous ses acc\xE8s aux ressources du syst\xE8me d'information du service,\
        \ ainsi que l'effacement de ses donn\xE9es, conform\xE9ment \xE0 la proc\xE9\
        dure  d'enregistrement et de d\xE9sinscription des utilisateurs pr\xE9cit\xE9\
        e."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      ref_id: 3.5.3
      name: "Gestion des droits d\u2019acc\xE8s"
      description: "Le prestataire de services est tenu de mettre en place et de documenter\
        \ une proc\xE9dure pour g\xE9rer l'attribution, la modification et le retrait\
        \ des droits d'acc\xE8s aux ressources du syst\xE8me d'information du service.\n\
        Le prestataire de services doit mettre \xE0 la disposition de ses commanditaires\
        \ les outils et les moyens permettant de distinguer les r\xF4les des utilisateurs\
        \ du service, en fonction de leurs responsabilit\xE9s fonctionnelles.\nLe\
        \ prestataire de services doit tenir \xE0 jour l'inventaire des utilisateurs\
        \ sous sa responsabilit\xE9 disposant des droits d'administration sur les\
        \ ressources du syst\xE8me d'information du service.\nLe prestataire de services\
        \ doit pouvoir fournir, pour chaque utilisateur cr\xE9\xE9 par ses soins,\
        \ qu'il soit sous sa responsabilit\xE9 ou celle du commanditaire, la liste\
        \ d\xE9taill\xE9e de tous les droits d'acc\xE8s qu'il poss\xE8de sur les diff\xE9\
        rents actifs du syst\xE8me d'information du service.\nLe prestataire de services\
        \ doit \xE9tablir une liste de droits d'acc\xE8s incompatibles entre eux.\
        \ Lors de l'attribution de droits d'acc\xE8s \xE0 un utilisateur, il doit\
        \ veiller \xE0 ce que cet utilisateur ne d\xE9tienne pas de droits incompatibles\
        \ au titre de la liste pr\xE9c\xE9demment \xE9tablie.\nLe prestataire de services\
        \ doit int\xE9grer dans la proc\xE9dure de gestion des droits d'acc\xE8s les\
        \ actions de r\xE9vocation ou de suspension des droits pour tout utilisateur."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      ref_id: 3.5.4
      name: "Revue des droits d\u2019acc\xE8s utilisateurs"
      description: "Le prestataire de services doit effectuer une r\xE9vision annuelle\
        \ des droits d'acc\xE8s des utilisateurs sur  son p\xE9rim\xE8tre de responsabilit\xE9\
        .\nLe prestataire de services doit fournir au commanditaire un outil permettant\
        \ de faciliter l'examen des droits d'acc\xE8s des utilisateurs sous sa responsabilit\xE9\
        ."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      ref_id: 3.5.5
      name: Gestion des authentifications des utilisateurs
      description: "Le prestataire de services doit documenter et mettre en \u0153\
        uvre une proc\xE9dure de gestion des comptes  utilisateurs et des droits d'acc\xE8\
        s pour les utilisateurs internes et externes, ainsi que pour les composants\
        \ syst\xE8mes impliqu\xE9s dans les processus d'autorisation automatis\xE9\
        s. Cette proc\xE9dure doit porter sur :\n\u23AF L\u2019assignation de noms\
        \ d'utilisateur uniques, la gestion des droits d'acc\xE8s bas\xE9e sur le\
        \ principe du moindre privil\xE8ge et du besoin de savoir, ainsi que la s\xE9\
        paration des t\xE2ches (par exemple, la gestion des comptes d'utilisateur\
        \ s\xE9par\xE9e de l'approbation de l'acc\xE8s) ;\n\u23AF La gestion des moyens\
        \ d'authentification, y compris l'\xE9mission et la r\xE9initialisation des\
        \ mots de passe, la mise \xE0 jour des listes de r\xE9vocation de certificats\
        \ (CRL) et l'importation des certificats racines en cas d'utilisation de certificats\
        \ d\u2019authentification, etc ;\n\u23AF L'impl\xE9mentation d\u2019outils\
        \ d'authentification multi-facteurs afin de r\xE9pondre aux diff\xE9rents\
        \ sc\xE9narios d'utilisation pr\xE9vus au pr\xE9sent r\xE9f\xE9rentiel ;\n\
        \u23AF La mise en place des syst\xE8mes qui g\xE9n\xE8rent des mots de passe\
        \ ou \xE9valuent leur robustesse lorsque l'authentification par mot de passe\
        \ est en place.\nTout m\xE9canisme d'authentification doit inclure un verrouillage\
        \ du compte apr\xE8s un nombre d\xE9termin\xE9 de tentatives \xE9chou\xE9\
        es.\nDans le cadre d'un service SaaS, le prestataire de services doit offrir\
        \ \xE0 ses commanditaires des solutions d'authentification multi-facteurs\
        \ pour l'acc\xE8s des utilisateurs finaux si besoin.\nLorsque des comptes\
        \ techniques, non nominatifs, sont n\xE9cessaires, le prestataire de services\
        \ doit mettre en place des mesures permettant aux utilisateurs de s'authentifier\
        \ d'abord avec leur compte nominatif avant d'acc\xE9der \xE0 ces comptes techniques\
        \ pour en assurer la tra\xE7abilit\xE9 d\u2019usage."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      ref_id: 3.5.6
      name: "Acc\xE8s aux interfaces d\u2019administration"
      description: "Les comptes d'administration sous la responsabilit\xE9 du prestataire\
        \ de services doivent \xEAtre g\xE9r\xE9s \xE0 l'aide d'outils et d'annuaires\
        \ s\xE9par\xE9s de ceux utilis\xE9s pour la gestion des comptes utilisateurs\
        \ sous la responsabilit\xE9 du commanditaire.\nLes interfaces d'administration\
        \ fournies aux commanditaires doivent \xEAtre s\xE9par\xE9es de celles utilis\xE9\
        es par le prestataire de services et ne doivent pas permettre de se connecter\
        \ aux comptes d'administrateurs sous la responsabilit\xE9 du prestataire de\
        \ services.\nLes interfaces d'administration utilis\xE9es par le prestataire\
        \ de services ne doivent pas \xEAtre accessibles depuis un r\xE9seau public,\
        \ et ne doivent pas permettre la connexion des utilisateurs sous la responsabilit\xE9\
        \ du commanditaire.\nDans le cadre d'un service SaaS, les interfaces d'administration\
        \ fournies aux commanditaires doivent \xEAtre distinctes de celles permettant\
        \ l'acc\xE8s des utilisateurs finaux.\nUne authentification multi-facteurs\
        \ doit \xEAtre exig\xE9e avant toute interaction entre un utilisateur et une\
        \ interface d'administration et les flux d'administration doivent \xEAtre\
        \ authentifi\xE9s et chiffr\xE9s conform\xE9ment aux exigences du pr\xE9sent\
        \ r\xE9f\xE9rentiel.\nLorsque le prestataire de services utilise un service\
        \ IaaS comme socle technique pour fournir d\u2019autres services de type PaaS\
        \ ou SaaS, les ressources utilis\xE9es par le prestataire de services ne doivent\
        \ jamais \xEAtre accessibles via l'interface publique r\xE9serv\xE9e aux commanditaires\
        \ du service IaaS.\nLorsque le prestataire de services utilise un service\
        \ PaaS comme socle technique pour fournir d\u2019autres services de type SaaS,\
        \ les ressources attribu\xE9es \xE0 l'usage du prestataire de services ne\
        \ doivent en aucun cas \xEAtre accessibles via l'interface publique destin\xE9\
        e aux autres commanditaires du service PaaS."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5.7
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.5
      ref_id: 3.5.7
      name: "Restriction des acc\xE8s \xE0 l\u2019information"
      description: "Le prestataire de services doit mettre en place des mesures de\
        \ s\xE9paration appropri\xE9es entre ses diff\xE9rents commanditaires.\nLe\
        \ prestataire de services doit instaurer des mesures de s\xE9paration ad\xE9\
        quates entre le syst\xE8me d'information du service et ses autres syst\xE8\
        mes d'information (bureautique, gestion informatique, gestion technique des\
        \ b\xE2timents, contr\xF4le d'acc\xE8s physique, etc.). Le prestataire de\
        \ services doit concevoir, d\xE9velopper, configurer et d\xE9ployer le syst\xE8\
        me d'information\ndu service en garantissant au minimum une s\xE9paration\
        \ entre l'infrastructure technique et les \xE9quipements utilis\xE9s pour\
        \ administrer les services et les ressources qu'elle h\xE9berge. Dans le cadre\
        \ du support technique, si le diagnostic et la r\xE9solution d'un probl\xE8\
        me rencontr\xE9 par un commanditaire n\xE9cessitent un acc\xE8s \xE0 ses donn\xE9\
        es, le prestataire de services doit :\n\u23AF N\u2019autoriser l\u2019acc\xE8\
        s aux donn\xE9es du commanditaire qu\u2019apr\xE8s consentement explicite\
        \ du commanditaire ;\n\u23AF V\xE9rifier que la personne \xE0 qui l\u2019\
        acc\xE8s doit \xEAtre autoris\xE9 a satisfait aux v\xE9rifications de l\u2019\
        exigence 3.3.1 du pr\xE9sent r\xE9f\xE9rentiel ;\n\u23AF Consid\xE9rer les\
        \ actions men\xE9es, une fois l\u2019acc\xE8s autoris\xE9, comme des actions\
        \ d\u2019administration et les journaliser comme telles ;\n\u23AF Supprimer\
        \ l\u2019autorisation d\u2019acc\xE8s aux donn\xE9es du commanditaire au terme\
        \ de ces actions.\nDans le cas d'une intervention r\xE9alis\xE9e \xE0 distance\
        \ par une personne localis\xE9e hors du territoire marocain (Cas de prestaires\
        \ de services qualifi\xE9s niveau 1), mettre en \u0153uvre une passerelle\
        \ s\xE9curis\xE9e (poste de rebond) par laquelle la personne devra se connecter\
        \ et permettant une supervision (autorisation ou interdiction des actions,\
        \ demandes d\u2019explications, etc..) en temps r\xE9el, par une personne\
        \ ayant elle-m\xEAme satisfait aux v\xE9rifications de l\u2019exigence 3.3.1\
        \ du pr\xE9sent r\xE9f\xE9rentiel"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6
      assessable: false
      depth: 1
      ref_id: '3.6'
      name: Cryptographie
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6
      ref_id: 3.6.1
      name: "Politique d'utilisation de la cryptographie et de la gestion des cl\xE9\
        s"
      description: "Le prestataire de services doit documenter, communiquer et appliquer\
        \ une politique de cryptographie  qui couvre les proc\xE9dures de cryptage\
        \ et la gestion des cl\xE9s. La politique d'utilisation de la cryptographie\
        \ doit :\n\u23AF Exiger l\u2019utilisation de m\xE9canismes cryptographiques\
        \ et de protocoles de r\xE9seau s\xE9curis\xE9s conformes aux meilleures pratiques\
        \ de l'\xE9tat de l'art ;\n\xCAtre align\xE9e avec le sch\xE9ma de classification\
        \ de l'information en place ;\n\u23AF Sp\xE9cifier des exigences pour la g\xE9\
        n\xE9ration, le stockage, l'archivage, la r\xE9cup\xE9ration, la distribution,\
        \ le retrait et la suppression des cl\xE9s ;\n\u23AF Tenir compte des exigences\
        \ juridiques en vigueur concernant la cryptographie, notamment la loi n\xB0\
        43-20 relative aux services de confiance pour les transactions \xE9lectroniques\
        \ et du d\xE9cret n\xB02-22-687 du 21 rabii II 1444 (16 novembre 2022) pris\
        \ pour son application."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6
      ref_id: 3.6.2
      name: "Chiffrement des donn\xE9es en transmission"
      description: "Le prestataire de services doit \xE9tablir des proc\xE9dures et\
        \ des mesures techniques pour garantir que les donn\xE9es transmises sur les\
        \ r\xE9seaux publics soient crypt\xE9es de mani\xE8re s\xE9curis\xE9e. L'accent\
        \ est mis sur l'authentification et le cryptage des donn\xE9es en transit.\n\
        Le prestataire de services doit utiliser les versions les plus r\xE9centes\
        \ et r\xE9put\xE9es s\xE9curis\xE9es des protocoles de chiffrement des communications."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6
      ref_id: 3.6.3
      name: "Chiffrement des donn\xE9es stock\xE9es"
      description: "Le prestataire de services doit \xE9tablir et d\xE9ployer un m\xE9\
        canisme de chiffrement qui emp\xEAche la  r\xE9cup\xE9ration des donn\xE9\
        es des commanditaires lors de la r\xE9attribution d'une ressource ou de la\
        \ r\xE9cup\xE9ration du support physique.\nDans le cas de service de Niveau\
        \ 2, les cl\xE9s priv\xE9es utilis\xE9es pour ce cryptage doivent \xEAtre\
        \ uniquement connues du commanditaire :\n\u25AA Dans le cas d\u2019un service\
        \ IaaS, cet objectif pourra \xEAtre atteint :\n\u2212 Par un chiffrement du\
        \ disque ou du syst\xE8me de fichier, lorsque le protocole d\u2019acc\xE8\
        s en mode fichiers garantit que seuls des blocs vides peuvent \xEAtre allou\xE9\
        s (par exemple stockage de type NAS \xAB Network Attached Storage ou serveur\
        \ de stockage en r\xE9seau \xBB dans lequel un bloc physique n\u2019est effectivement\
        \ affect\xE9 qu\u2019au moment de l\u2019\xE9criture),\n\u2212 Par un chiffrement\
        \ par volume dans le cas d\u2019un acc\xE8s en mode bloc (par exemple stockage\
        \ de type SAN \xAB Storage Area Network \xBB ou stockage local), avec au moins\
        \ une cl\xE9 par commanditaire ;\n\u25AA Dans le cas d'un service PaaS ou\
        \ SaaS, cet objectif pourrait \xEAtre atteint en mettant en \u0153uvre un\
        \ chiffrement applicatif au sein du p\xE9rim\xE8tre du prestataire de services,\
        \ o\xF9 chaque commanditaire dispose au moins d'une cl\xE9 de chiffrement\
        \ d\xE9di\xE9e. Le prestataire de services doit utiliser une m\xE9thode de\
        \ chiffrement des donn\xE9es respectant les r\xE8gles et les bonnes pratiques\
        \ de s\xE9curit\xE9, \xE0 savoir :\n\u23AF Utiliser des algorithmes de chiffrement\
        \ reconnus pour leur fiabilit\xE9 au niveau international ;\n\u23AF S\u2019\
        assurer que les longueurs de cl\xE9 sont suffisantes pour garantir la s\xE9\
        curit\xE9 des donn\xE9es contre les attaques connues. Suivre les recommandations\
        \ en mati\xE8re de longueur de cl\xE9 pour chaque algorithme utilis\xE9 ;\n\
        \u23AF Adapter le choix des m\xE9canismes cryptographiques en fonction des\
        \ besoins sp\xE9cifiques de s\xE9curit\xE9 de chaque application ou contexte,\
        \ en tenant compte de la sensibilit\xE9 des donn\xE9es trait\xE9es.\nLe prestataire\
        \ de services doit appliquer un chiffrement aux donn\xE9es stock\xE9es sur\
        \ les supports amovibles et les supports de sauvegarde qui doivent quitter\
        \ le p\xE9rim\xE8tre de s\xE9curit\xE9 physique du syst\xE8me d'information\
        \ du service en fonction des exigences de s\xE9curit\xE9 li\xE9es \xE0 la\
        \ classification des donn\xE9es (voir exigence 3.4.2 du pr\xE9sent r\xE9f\xE9\
        rentiel)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6
      ref_id: 3.6.4
      name: Hachage des mots de passe
      description: "Le prestataire de services doit uniquement conserver les empreintes\
        \ des mots de passe des utilisateurs et des comptes techniques.\nLe prestataire\
        \ de services doit mettre en \u0153uvre une fonction de hachage respectant\
        \ les r\xE8gles et les bonnes pratiques de s\xE9curit\xE9, \xE0 savoir :\n\
        \u23AF Choisir des fonctions de hachage reconnues comme s\xFBres et \xE0 jour,\
        \ en \xE9vitant les algorithmes obsol\xE8tes ;\n\u23AF Ajoutez un sel unique\
        \ (une valeur al\xE9atoire) \xE0 chaque mot de passe avant de le hacher pour\
        \ emp\xEAcher les attaques par tables arc-en-ciel et renforcer la s\xE9curit\xE9\
        \ contre les attaques par dictionnaire ;\n\u23AF S\u2019assurer que la longueur\
        \ du r\xE9sultat du hachage est suffisante pour \xE9viter les collisions (deux\
        \ entr\xE9es produisant le m\xEAme hach\xE9)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6
      ref_id: 3.6.5
      name: "Non r\xE9pudiation"
      description: "Lorsque le prestataire de services met en \u0153uvre un m\xE9\
        canisme de signature \xE9lectronique pour assurer\nla non r\xE9pudiation,\
        \ il est recommand\xE9 que celui-ci fasse appel \xE0 des tiers prestataires\
        \ de confiance\nd\xE9clar\xE9s aupr\xE8s de l\u2019autorit\xE9 nationale en\
        \ charge des services de confiance pour les transactions\n\xE9lectroniques\
        \ ou agr\xE9\xE9s par elle selon le niveau de signature adopt\xE9."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.6
      ref_id: 3.6.6
      name: "Gestion des cl\xE9s"
      description: "Le prestataire de services doit mettre en place des proc\xE9dures\
        \ et des mesures techniques pour la gestion compl\xE8te du cycle de vie des\
        \ cl\xE9s, incluant la g\xE9n\xE9ration, la distribution, le stockage, l'utilisation,\
        \ la r\xE9vocation et la destruction. Ces proc\xE9dures doivent tenir compte\
        \ des \xE9l\xE9ments suivants :\n\u23AF Stocker les cl\xE9s de mani\xE8re\
        \ s\xE9curis\xE9e en utilisant des dispositifs de protection appropri\xE9\
        e ou des environnements s\xE9curis\xE9s ;\n\u23AF Utiliser des g\xE9n\xE9\
        rateurs de cl\xE9s cryptographiquement s\xE9curis\xE9s et conformes aux standards\
        \ internationaux relatifs \xE0 la cryptographie pour garantir l'impr\xE9visibilit\xE9\
        \ et la robustesse des cl\xE9s ;\n\u23AF S\u2019assurer que les cl\xE9s sont\
        \ transmises de mani\xE8re s\xE9curis\xE9e, en utilisant des m\xE9canismes\
        \ de chiffrement appropri\xE9s pour \xE9viter les interceptions ;\n\u23AF\
        \ Limiter l'acc\xE8s aux cl\xE9s aux seules personnes ou syst\xE8mes autoris\xE9\
        s. Mettre en place des contr\xF4les d'acc\xE8s rigoureux et des politiques\
        \ d'utilisation ad\xE9quates ;\n\u23AF Mettre en place des proc\xE9dures pour\
        \ r\xE9voquer rapidement les cl\xE9s compromises ou obsol\xE8tes. S\u2019\
        assurer que les cl\xE9s r\xE9voqu\xE9es ne peuvent plus \xEAtre utilis\xE9\
        es ;\n\u23AF D\xE9finir des politiques d'expiration des cl\xE9s pour garantir\
        \ que les cl\xE9s utilis\xE9es sont toujours valides et pertinentes ;\n\u23AF\
        \ D\xE9truire les cl\xE9s de mani\xE8re s\xE9curis\xE9e lorsqu'elles ne sont\
        \ plus n\xE9cessaires, en s\u2019assurant qu'elles ne peuvent pas \xEAtre\
        \ r\xE9cup\xE9r\xE9es ou reconstitu\xE9es."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      assessable: true
      depth: 1
      ref_id: '3.7'
      name: "S\xE9curit\xE9 physique et environnementale"
      description: "Garantir la pr\xE9vention d'un acc\xE8s physique non autoris\xE9\
        \ aux installations, ainsi que la protection contre le vol, les dommages,\
        \ la perte ou l\u2019interruption des op\xE9rations li\xE9es \xE0 ces services."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.1
      name: "P\xE9rim\xE8tres de s\xE9curit\xE9 physique"
      description: "Le prestataire de services doit mettre en place et documenter\
        \ des mesures de s\xE9curit\xE9 qui comprennent le marquage des zones et les\
        \ moyens de contr\xF4le d\u2019acc\xE8s. Le prestataire de services doit identifier\
        \ des zones publiques, des zones priv\xE9es et des zones sensibles. Cette\
        \ d\xE9limitation peut se faire selon la typologie suivante :\n\u23AF Zones\
        \ publiques : autoris\xE9es \xE0 toute personne. Aucune ressource d\xE9di\xE9\
        e au service ou permettant l\u2019acc\xE8s \xE0 ses composants ne doit \xEA\
        tre h\xE9berg\xE9e au niveau de ces zones.\n\u23AF Zones priv\xE9es : peuvent\
        \ h\xE9berger :\na) les plateformes et les outils de d\xE9veloppement du service\
        \ ;\nb) les postes d\u2019administration, d\u2019exploitation et de supervision\
        \ ;\nc) les locaux \xE0 partir desquels le prestataire de services op\xE8\
        re.\n\u23AF Zones sensibles : Les zones sensibles sont exclusivement d\xE9\
        di\xE9es \xE0 l\u2019h\xE9bergement du syst\xE8me d\u2019information de production\
        \ du service."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.2
      name: "Contr\xF4le d\u2019acc\xE8s physique"
      description: "Le prestataire de services doit s\xE9curiser les zones restreintes\
        \ (Zones priv\xE9es, zones sensibles) contre  les acc\xE8s non autoris\xE9\
        s en mettant en place un dispositif de contr\xF4le d\u2019acc\xE8s individualis\xE9\
        . Ce dispositif doit assurer la tra\xE7abilit\xE9 des acc\xE8s du personnel\
        \ et des tiers autoris\xE9s et accompagn\xE9s aux zones restreintes, et conserver\
        \ les enregistrements pour une dur\xE9e d\u2019au moins trois mois.\nLe prestataire\
        \ de services doit \xE9tablir et documenter des protocoles sp\xE9cifiques\
        \ pour l'acc\xE8s physique en situation d'urgence.\nLe prestataire de services\
        \ doit afficher \xE0 l'entr\xE9e des zones restreintes un avertissement indiquant\
        \ les limites et les conditions d'acc\xE8s \xE0 ces zones. Le prestataire\
        \ de services doit d\xE9finir et documenter les plages horaires et les conditions\
        \ d'acc\xE8s aux\ndiff\xE9rentes zones en fonction des profils des personnes\
        \ autoris\xE9es \xE0 y acc\xE9der.\nLe prestataire de services doit mettre\
        \ en place et documenter des proc\xE9dures pour accompagner syst\xE9matiquement\
        \ les visiteurs dans les zones restreintes et doit \xE9galement assurer la\
        \ tra\xE7abilit\xE9 de l'identit\xE9 des visiteurs conform\xE9ment \xE0 la\
        \ l\xE9gislation et la r\xE9glementation en vigueur. En cas d'intervention\
        \ (diagnostic, maintenance, ou administration) par un visiteur tiers dans\
        \ une zone restreinte, le prestataire de services doit superviser ces actions\
        \ par un personnel ayant satisfait aux v\xE9rifications de l'exigence sp\xE9\
        cifique 3.3.1 du pr\xE9sent r\xE9f\xE9rentiel.\nLe prestataire de services\
        \ doit mettre en place des syst\xE8mes de surveillance et de d\xE9tection\
        \ pour pr\xE9venir les acc\xE8s non autoris\xE9s aux zones restreintes.\n\
        Le prestataire de services doit instaurer un syst\xE8me de journalisation\
        \ des acc\xE8s physiques aux zones sensibles et proc\xE9der \xE0 une revue\
        \ de ces journaux au moins une fois par mois. Le prestataire de services doit\
        \ mettre en place des mesures pour assurer qu'il n'y ait aucun acc\xE8s direct\
        \ entre une zone publique et une zone sensible"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.3
      name: "Travail dans les zones priv\xE9es et sensibles"
      description: "Le prestataire de services doit inclure les aspects de s\xE9curit\xE9\
        \ physique dans sa politique de s\xE9curit\xE9 et  lors de l'\xE9valuation\
        \ des risques conform\xE9ment au niveau de s\xE9curit\xE9 requis par la cat\xE9\
        gorie de la zone. Le prestataire de services doit \xE9tablir et mettre en\
        \ place des proc\xE9dures relatives au travail en zones priv\xE9es et sensibles,\
        \ et s'assurer que ces proc\xE9dures sont communiqu\xE9es aux intervenants\
        \ concern\xE9s."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.4
      name: Zones de livraison et de chargement
      description: "Les zones de livraison et de chargement, ainsi que tout autre\
        \ point par lequel des personnes non  autoris\xE9es peuvent acc\xE9der aux\
        \ locaux sans \xEAtre accompagn\xE9es, sont cat\xE9goris\xE9es comme des zones\
        \ publiques.\nLe prestataire de services doit s\xE9parer les points d'acc\xE8\
        s de ces zones vers les zones priv\xE9es et sensibles afin de pr\xE9venir\
        \ les acc\xE8s non autoris\xE9s, ou \xE0 d\xE9faut mettre en place des mesures\
        \ compensatoires pour maintenir le m\xEAme niveau de s\xE9curit\xE9."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.5
      name: "S\xE9curit\xE9 du c\xE2blage"
      description: "Le prestataire de services doit documenter et d\xE9ployer des\
        \ mesures visant \xE0 s\xE9curiser le c\xE2blage \xE9lectrique et de  \xE9\
        l\xE9communication contre les dommages physiques ainsi que les tentatives\
        \ d'interception.\nLe prestataire de services doit \xE9tablir et tenir \xE0\
        \ jour un plan de c\xE2blage. Il est recommand\xE9 que le prestataire de services\
        \ mette en place des mesures pour identifier les c\xE2bles (comme l'utilisation\
        \ de codes couleurs, d'\xE9tiquetages, etc.) afin de faciliter leur exploitation\
        \ et r\xE9duire les risques d'erreurs de manipulation."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.6
      name: "Maintenance des mat\xE9riels"
      description: "Le prestataire de services doit mettre en place des mesures pour\
        \ assurer que l'installation, la maintenance et l'entretien des \xE9quipements\
        \ du syst\xE8me d\u2019information h\xE9berg\xE9s dans des zones priv\xE9\
        es et sensibles respectent les exigences de confidentialit\xE9 et de disponibilit\xE9\
        \ d\xE9finies dans la convention de service.\nLe prestataire de services doit\
        \ conclure des contrats de maintenance afin de b\xE9n\xE9ficier des mises\
        \ \xE0 jour de s\xE9curit\xE9 des logiciels install\xE9s sur les \xE9quipements\
        \ du syst\xE8me d\u2019information du service. Le prestataire de services\
        \ doit garantir que les supports ne peuvent \xEAtre renvoy\xE9s \xE0 un tiers\
        \ que si les donn\xE9es du commanditaire qui y sont stock\xE9es sont chiffr\xE9\
        es conform\xE9ment aux exigences 3.6.1 et 3.6.3 du pr\xE9sent r\xE9f\xE9rentiel,\
        \ ou si elles ont \xE9t\xE9 pr\xE9alablement effac\xE9es \xE0 l'aide d'un\
        \ m\xE9canisme de suppression s\xE9curis\xE9e.\nLe prestataire de services\
        \ doit mettre en place des mesures pour assurer que les conditions d\u2019\
        installation, de maintenance et d\u2019entretien des \xE9quipements techniques\
        \ auxiliaires (comme l'alimentation \xE9lectrique, la climatisation, la protection\
        \ contre l'incendie, etc.) respectent les exigences de disponibilit\xE9 d\xE9\
        finies dans la convention de service."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.7
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.7
      name: "Recyclage s\xE9curis\xE9 du mat\xE9riel"
      description: "3.7.7. Sortie des actifs\nLe prestataire de services doit \xE9\
        tablir une proc\xE9dure pour le transfert hors site des donn\xE9es du\ncommanditaire,\
        \ des \xE9quipements et des logiciels, requ\xE9rant une autorisation \xE9\
        crite de la direction du\nprestataire et du commanditaire. Il doit \xE9galement\
        \ garantir que les mesures de protection de la\nconfidentialit\xE9 et de l'int\xE9\
        grit\xE9 des actifs pendant leur transport soient \xE9quivalentes \xE0 celles\
        \ en place\nsur site.\n\nLe prestataire de services doit \xE9tablir et mettre\
        \ en \u0153uvre des proc\xE9dures pour effacer de mani\xE8re\ns\xE9curis\xE9\
        e, en utilisant une r\xE9\xE9criture de motifs al\xE9atoires, tous les supports\
        \ de donn\xE9es qui sont mis \xE0\ndisposition d\u2019un commanditaire. Dans\
        \ les cas o\xF9 l\u2019espace de stockage est chiffr\xE9, il est possible\n\
        d'effectuer un effacement s\xE9curis\xE9 en supprimant la cl\xE9 de chiffrement\
        \ correspondante."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7.8
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.7
      ref_id: 3.7.8
      name: "S\xE9curit\xE9 de l\u2019environnement"
      description: "Protection contre l'incendie et les fuites d\u2019eau : La protection\
        \ contre l'incendie et les fuites d\u2019eau\ndoit \xEAtre assur\xE9e par\
        \ des mesures structurelles, techniques et organisationnelles notamment par\
        \ des\ncompartiments coupe-feu avec une r\xE9sistance d\u2019au moins 60 minutes\
        \ ; des moyens de d\xE9tection\npr\xE9coce des incendies ou des fuites d\u2019\
        eau, des syst\xE8mes d'extinction automatique ou r\xE9duction de\nl'oxyg\xE8\
        ne, et des alarmes incendie et fuites d\u2019eau.\nProtection contre les interruptions\
        \ dues aux pannes de courant : Des mesures doivent \xEAtre mises\nen place\
        \ pour pr\xE9venir les interruptions des services li\xE9s \xE0 l'alimentation\
        \ \xE9lectrique ou \xE0 la\nclimatisation notamment par l\u2019utilisation\
        \ de syst\xE8mes d\u2019alimentation sans coupure, dit\nUPS,(Uniterruptible\
        \ Power Supply) et de g\xE9n\xE9rateurs de secours, v\xE9rifi\xE9s r\xE9guli\xE8\
        rement.\nSurveillance des param\xE8tres op\xE9rationnels et environnementaux\
        \ : Les param\xE8tres de\nfonctionnement des installations techniques (alimentation,\
        \ refroidissement, etc.) et les conditions\nenvironnementales (temp\xE9rature,\
        \ humidit\xE9) doivent \xEAtre surveill\xE9s. Lorsque les param\xE8tres\n\
        d\xE9passent la plage autoris\xE9e, des alertes automatiques doivent \xEA\
        tre envoy\xE9es aux responsables pour\nprendre des mesures correctives imm\xE9\
        diates."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      assessable: false
      depth: 1
      ref_id: '3.8'
      name: "S\xE9curit\xE9 li\xE9e \xE0 l\u2019exploitation"
      description: ''
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.1
      name: "Proc\xE9dures d\u2019exploitation document\xE9es"
      description: "Le prestataire de services est tenu de documenter les proc\xE9\
        dures d\u2019exploitation, les tenir \xE0 jour et de\nles mettre \xE0 disposition\
        \ de tous les utilisateurs concern\xE9s."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.2
      name: Gestion des changements
      description: "Le prestataire de services doit mettre en place et documenter\
        \ une proc\xE9dure de gestion des\nchangements effectu\xE9s sur les syst\xE8\
        mes et les moyens de traitement de l'information.\nLe prestataire de services\
        \ doit \xE9tablir et appliquer une proc\xE9dure permettant, en cas d'op\xE9\
        rations\nsusceptibles d'affecter la s\xE9curit\xE9 ou la disponibilit\xE9\
        \ du service, de transmettre rapidement aux\ncommanditaires les informations\
        \ suivantes :\n\u23AF La date et l\u2019heure programm\xE9es du d\xE9but et\
        \ de la fin des op\xE9rations ;\n\u23AF La nature des op\xE9rations ;\n\u23AF\
        \ Les impacts sur la s\xE9curit\xE9 ou la disponibilit\xE9 du service; \n\u23AF\
        \ Le contact au sein du prestataire de services.\nDans le cadre d'un service\
        \ PaaS, le prestataire de services doit notifier le commanditaire d\xE8s que\n\
        possible de toute modification pr\xE9vue sur des \xE9l\xE9ments logiciels\
        \ dont il est responsable, lorsque la\ncompatibilit\xE9 totale ne peut \xEA\
        tre garantie. Le prestataire de services doit avertir le commanditaire d\xE8\
        s\nque possible de toute modification pr\xE9vue des \xE9l\xE9ments du service\
        \ susceptible de r\xE9duire ses\nfonctionnalit\xE9s."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.3
      name: "S\xE9paration des environnements"
      description: "Les environnements de d\xE9veloppement, de test et de production\
        \ doivent \xEAtre s\xE9par\xE9s pour r\xE9duire\nnotamment les risques d\u2019\
        acc\xE8s ou de changements non autoris\xE9s dans les trois environnements."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.4
      name: Protection contre les logiciels malveillants
      description: "Le prestataire de services doit documenter et mettre en \u0153\
        uvre les mesures de d\xE9tection, de\npr\xE9vention et de restauration pour\
        \ se prot\xE9ger contre les logiciels malveillants. Cette exigence doit\n\
        couvrir n\xE9cessairement le syst\xE8me d'information du service, y compris\
        \ les postes de travail g\xE9r\xE9s par\nle prestataire et les flux entrants\
        \ vers ce syst\xE8me.\nLe prestataire de services doit \xE9tablir un programme\
        \ de sensibilisation pour ses employ\xE9s concernant\nles risques des logiciels\
        \ malveillants et les meilleures pratiques pour minimiser l\u2019impact d'une\n\
        infection."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.5
      name: Sauvegarde
      description: "Le prestataire de services doit \xE9laborer une politique de sauvegarde\
        \ et de restauration des donn\xE9es\nqu'il g\xE8re dans le cadre du service.\
        \ Cette politique doit inclure une sauvegarde p\xE9riodique de toutes\nles\
        \ donn\xE9es (informations, logiciels, configurations, etc.) sous sa responsabilit\xE9\
        \ dans le cadre du\nservice.\nLe prestataire de services doit mettre en place\
        \ et documenter des mesures de protection des\nsauvegardes en conformit\xE9\
        \ avec la politique de contr\xF4le d\u2019acc\xE8s (voir chapitre 3.5). Cette\
        \ politique\ndoit \xE9galement pr\xE9voir une revue mensuelle des acc\xE8\
        s aux sauvegardes.\nLe prestataire de services doit tester r\xE9guli\xE8rement\
        \ les supports de sauvegarde en s\u2019assurant que les\ndonn\xE9es sauvegard\xE9\
        es peuvent \xEAtre restaur\xE9es en temps voulu conform\xE9ment \xE0 une proc\xE9\
        dure de\nrestauration document\xE9e.\nLe prestataire de services doit prot\xE9\
        ger physiquement les supports de sauvegarde en les pla\xE7ant dans\nun endroit\
        \ prot\xE9g\xE9 (Armoire ignifuge) ou en les externalisant sur un site suffisamment\
        \ distant du site\nprincipal.\nLe ou les sites de sauvegarde sont assujettis\
        \ aux m\xEAmes exigences de s\xE9curit\xE9 que le site principal et\nles communications\
        \ entre site principal et site de sauvegarde doivent \xEAtre prot\xE9g\xE9\
        es par chiffrement,\nconform\xE9ment aux exigences du chapitre 3.6 du pr\xE9\
        sent r\xE9f\xE9rentiel."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.6
      name: "Journalisation des \xE9v\xE8nements"
      description: "Le prestataire de services doit mettre en place et documenter\
        \ une politique de journalisation\napplicable aux composants SI sous sa responsabilit\xE9\
        \ qui servent \xE0 fournir les services Cloud et qui\ninclut au minimum les\
        \ \xE9l\xE9ments suivants :\n\u23AF La liste des sources de collecte ;\n\u23AF\
        \ La liste des \xE9v\xE9nements \xE0 journaliser par source ;\n\u23AF L\u2019\
        objet de la journalisation par \xE9v\xE9nement ;\n\u23AF La fr\xE9quence de\
        \ la collecte et base de temps utilis\xE9e ;\n\u23AF La dur\xE9e de r\xE9\
        tention locale et centralis\xE9e ;\n\u23AF Les mesures de protection des journaux\
        \ (dont chiffrement et duplication) ;\n\u23AF La localisation des journaux.\n\
        Le prestataire de services doit g\xE9n\xE9rer et collecter les \xE9v\xE9nements\
        \ suivants :\n\u23AF Les activit\xE9s des utilisateurs li\xE9es \xE0 la s\xE9\
        curit\xE9 de l\u2019information ;\n\u23AF La modification des droits d\u2019\
        acc\xE8s dans le p\xE9rim\xE8tre de sa responsabilit\xE9 ;\n\u23AF Les \xE9\
        v\xE9nements issus des m\xE9canismes de lutte contre les logiciels malveillants\
        \ (voir exigence\n3.8.4 du pr\xE9sent r\xE9f\xE9rentiel) ;\n\u23AF Les exceptions\
        \ ;\n\u23AF Les d\xE9faillances ;\n\u23AF Tout autre \xE9v\xE9nement li\xE9\
        \ \xE0 la s\xE9curit\xE9 de l\u2019information.\nCes journaux doivent \xEA\
        tre centralis\xE9s et prot\xE9g\xE9s contre les risques de falsification ou\
        \ d\u2019acc\xE8s non\nautoris\xE9. Ils doivent \xEAtre conserv\xE9s pour\
        \ une dur\xE9e minimale de douze mois.\nLe prestataire de services doit, sur\
        \ demande d'un commanditaire, fournir l'int\xE9gralit\xE9 des \xE9v\xE9nements\n\
        le concernant dans un format exploitable standardis\xE9 (ex : json, Csv ou\
        \ Xml)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.7
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.7
      name: "Protection de l\u2019information journalis\xE9e"
      description: "Le prestataire de services doit assurer la protection des \xE9\
        quipements de journalisation et des\n\xE9v\xE9nements enregistr\xE9s contre\
        \ toute menace pouvant affecter leur disponibilit\xE9, leur int\xE9grit\xE9\
        \ ou leur\nconfidentialit\xE9.\nLe prestataire de services doit transf\xE9\
        rer les \xE9v\xE9nements journalis\xE9s vers des serveurs centraux\nd\xE9\
        di\xE9s, en assurant leur protection en termes de confidentialit\xE9 et d'int\xE9\
        grit\xE9, et les conserver sur une\nmachine physique distincte de celle qui\
        \ les a g\xE9n\xE9r\xE9s.\nLe prestataire de services doit \xE9tablir une\
        \ sauvegarde des \xE9v\xE9nements collect\xE9s conform\xE9ment \xE0 une\n\
        politique appropri\xE9e.\nLe prestataire de services doit ex\xE9cuter les\
        \ processus de journalisation et de collecte des \xE9v\xE9nements\nen utilisant\
        \ des comptes disposant des privil\xE8ges ad\xE9quats et n\xE9cessaires, tout\
        \ en limitant l'acc\xE8s aux\n\xE9v\xE9nements enregistr\xE9s conform\xE9\
        ment \xE0 la politique de contr\xF4le d'acc\xE8s (voir exigence 3.5.1 du\n\
        pr\xE9sent r\xE9f\xE9rentiel)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.8
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.8
      name: Synchronisation des horloges
      description: "Pour assurer la pr\xE9cision des journaux d\u2019\xE9v\xE9nements\
        \ qui peuvent \xEAtre utilis\xE9s lors des investigations,\nle prestataire\
        \ de services doit assurer la synchronisation des horloges de l\u2019ensemble\
        \ des syst\xE8mes de\ntraitement de l\u2019information sur une r\xE9f\xE9\
        rence de temps commune (service NTP, Network Time\nProtocol)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.9
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.9
      name: "Analyse et corr\xE9lation des \xE9v\xE9nements"
      description: "Le prestataire de services doit concevoir et d\xE9ployer une infrastructure\
        \ permettant d'analyser et de\ncorr\xE9ler les \xE9v\xE9nements enregistr\xE9\
        s par le syst\xE8me de journalisation, afin de d\xE9tecter ceux pouvant\n\
        impacter la s\xE9curit\xE9 du syst\xE8me d'information du service. Cette analyse\
        \ doit pouvoir se faire en temps\nr\xE9el ou ult\xE9rieurement, pour des \xE9\
        v\xE9nements sur une p\xE9riode allant jusqu'\xE0 six mois.\nLe prestataire\
        \ de services doit traiter les alarmes g\xE9n\xE9r\xE9es par l'infrastructure\
        \ d'analyse et de\ncorr\xE9lation des \xE9v\xE9nements sur une base quotidienne."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.10
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.10
      name: "Installation de logiciels sur des syst\xE8mes en exploitation"
      description: "Le prestataire de services doit d\xE9finir et mettre en place\
        \ un processus de contr\xF4le des logiciels que les\nutilisateurs peuvent\
        \ installer sur les \xE9quipements du syst\xE8me d\u2019information du service.\n\
        Le prestataire de services doit \xE9laborer une proc\xE9dure pour la gestion\
        \ de la configuration des\nenvironnements logiciels fournis au commanditaire,\
        \ en particulier pour assurer leur maintien en\ncondition de s\xE9curit\xE9\
        ."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.11
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.11
      name: "Gestion des vuln\xE9rabilit\xE9s techniques"
      description: "Le prestataire de services doit \xE9laborer un processus de veille\
        \ pour g\xE9rer les vuln\xE9rabilit\xE9s techniques\ndes logiciels et des\
        \ syst\xE8mes pr\xE9sents dans le syst\xE8me d'information du service.\nLe\
        \ prestataire de services doit \xE9valuer son exposition \xE0 ces vuln\xE9\
        rabilit\xE9s en les int\xE9grant dans\nl'analyse des risques et mettre en\
        \ \u0153uvre les mesures de traitement des risques appropri\xE9es."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.12
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.12
      name: Administration
      description: "Le prestataire de services doit \xE9laborer une proc\xE9dure exigeant\
        \ que les administrateurs utilisent des\npostes d\xE9di\xE9s exclusivement\
        \ aux t\xE2ches d\u2019administration et ayant subi des mesures de durcissement\n\
        de configuration adapt\xE9es.\nL\u2019acc\xE8s aux outils et interfaces d\u2019\
        administration doit \xEAtre strictement limit\xE9 aux personnes habilit\xE9\
        es,\nselon une proc\xE9dure formelle d\u2019autorisation d'acc\xE8s.\nLorsque\
        \ le prestataire de services autorise une situation de mobilit\xE9 pour les\
        \ administrateurs sous sa\nresponsabilit\xE9, il doit l\u2019encadrer par\
        \ une politique document\xE9e. La solution mise en \u0153uvre doit assurer\n\
        que le niveau de s\xE9curit\xE9 de cette situation de mobilit\xE9 est au moins\
        \ \xE9quivalent au niveau de s\xE9curit\xE9\nhors situation de mobilit\xE9\
        ."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.13
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.13
      name: "Surveillance des flux sortants de l\u2019infrastructure"
      description: "Le prestataire de services doit fournir une capacit\xE9 d'inspection\
        \ et de suppression des sortants de\nl\u2019infrastructure technique relatifs\
        \ au p\xE9rim\xE8tre du service (informations de facturation, les \xE9ventuels\n\
        journaux n\xE9cessaires au traitement d'incidents, etc.) :\n\u23AF Les sortants\
        \ doivent pouvoir \xEAtre expurg\xE9s des donn\xE9es pouvant porter atteinte\
        \ \xE0 la\nconfidentialit\xE9 des donn\xE9es des commanditaires ;\n\u23AF\
        \ Cette capacit\xE9 d'inspection et de suppression doit g\xE9n\xE9rer des\
        \ journaux d'activit\xE9 et doit\npouvoir faire l'objet d'un audit ;\n\u23AF\
        \ Les sortants sont trait\xE9s sur des dispositifs sp\xE9cifiques op\xE9r\xE9\
        s et maintenus par le prestataire\nde services, et h\xE9berg\xE9s dans une\
        \ zone cloisonn\xE9e du reste de l\u2019infrastructure."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8.14
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.8
      ref_id: 3.8.14
      name: Lignes directrices et recommandations pour les commanditaires du service
      description: "Le prestataire de services fournit aux commanditaires des lignes\
        \ directrices et des recommandations\npour l'utilisation s\xE9curis\xE9e du\
        \ service cloud. Ces informations visent \xE0 aider le commanditaire dans\
        \ la\nconfiguration, l'installation et l'utilisation s\xE9curis\xE9e du service,\
        \ dans la mesure o\xF9 cela est applicable\nau service et aux responsabilit\xE9\
        s du commanditaire. Les informations fournies couvrent plusieurs\naspects,\
        \ tels que :\n\u23AF Instructions pour une configuration s\xE9curis\xE9e ;\n\
        \u23AF Sources d'information sur les vuln\xE9rabilit\xE9s connues et les m\xE9\
        canismes de mise \xE0 jour ;\n\u23AF M\xE9canismes de gestion des erreurs\
        \ et des journaux ;\n\u23AF M\xE9canismes d'authentification ;\n\u23AF Concepts\
        \ de r\xF4les et de droits, y compris les combinaisons qui augmentent les\
        \ risques ;\n\u23AF Services et fonctions pour l'administration du service\
        \ cloud par des utilisateurs privil\xE9gi\xE9s."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.9
      assessable: false
      depth: 1
      ref_id: '3.9'
      name: "S\xE9curit\xE9 des communications"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.9.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.9
      ref_id: 3.9.1
      name: "Cartographie du syst\xE8me d\u2019information"
      description: "Le prestataire de services doit \xE9tablir et tenir \xE0 jour\
        \ une cartographie du syst\xE8me d\u2019information du\nservice en pr\xE9\
        cisant les composants mat\xE9riels et logiciels, les architectures des r\xE9\
        seaux ainsi que la\nmatrice des flux r\xE9seau autoris\xE9s.\nLes documents\
        \ de cartographie doivent \xEAtre maintenus au fil des \xE9volutions apport\xE9\
        es aux syst\xE8mes\nd\u2019information et faire l\u2019objet d\u2019une protection\
        \ adapt\xE9e."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.9.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.9
      ref_id: 3.9.2
      name: "Cloisonnement du r\xE9seau"
      description: "Le prestataire de services est tenu de cloisonner le syst\xE8\
        me d'information du service selon la nature\ndes flux (production, administration\
        \ etc.), le domaine technique (traitement, stockage, etc.) et les\nniveaux\
        \ de sensibilit\xE9 des actifs informationnels connect\xE9s.\nLe prestataire\
        \ de services doit isoler, soit physiquement soit par chiffrement, tous les\
        \ flux de donn\xE9es\ninternes au syst\xE8me d'information du service afin\
        \ de les prot\xE9ger des autres syst\xE8mes d'information.\nSi le r\xE9seau\
        \ d'administration de l'infrastructure technique n'est pas physiquement s\xE9\
        par\xE9, les flux\nd\u2019administration doivent \xEAtre achemin\xE9s \xE0\
        \ travers un tunnel chiffr\xE9.\nLe prestataire de services doit d\xE9ployer\
        \ et configurer un pare-feu applicatif afin de prot\xE9ger les\ninterfaces\
        \ d\u2019administration, accessibles via un r\xE9seau public et destin\xE9\
        es \xE0 ses commanditaires."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.9.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.9
      ref_id: 3.9.3
      name: "Surveillance des r\xE9seaux"
      description: "Le prestataire de services doit mettre en place les moyens appropri\xE9\
        s pour la d\xE9tection et la\nsupervision des \xE9v\xE9nements de s\xE9curit\xE9\
        \ au niveau des principaux n\u0153uds d\u2019interconnexion r\xE9seau\ndans\
        \ le syst\xE8me d\u2019information du service et pour permettre un traitement\
        \ et une corr\xE9lation entre ces\n\xE9v\xE9nements de s\xE9curit\xE9."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10
      assessable: false
      depth: 1
      ref_id: '3.10'
      name: "Acquisition, d\xE9veloppement et maintenance des syst\xE8mesd\u2019information"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10
      ref_id: 3.10.1
      name: "Politique de d\xE9veloppement s\xE9curis\xE9"
      description: "Le prestataire de services doit \xE9laborer et mettre en place,\
        \ conform\xE9ment aux guides et r\xE9f\xE9rentiels\n\xE9labor\xE9s par l\u2019\
        autorit\xE9 nationale de cybers\xE9curit\xE9, une politique de d\xE9veloppement\
        \ s\xE9curis\xE9 des\nlogiciels et des syst\xE8mes, qui d\xE9finit notamment\
        \ :\n\u23AF Les exigences de s\xE9curit\xE9 de l\u2019environnement de d\xE9\
        veloppement ;\n\u23AF Les exigences de s\xE9curit\xE9 dans la phase de conception\
        \ ;\n\u23AF Les points de contr\xF4le de la s\xE9curit\xE9 aux diff\xE9rentes\
        \ \xE9tapes cl\xE9s du projet ;\n\u23AF Les r\xE9f\xE9rentiels de d\xE9veloppement\
        \ s\xE9curis\xE9 \xE0 utiliser ;\n\u23AF Les r\xE8gles de protection du code\
        \ source et le contr\xF4le des versions.\nLe prestataire de services doit\
        \ \xE9laborer et mettre en place une formation sur le d\xE9veloppement\ns\xE9\
        curis\xE9 sp\xE9cifiquement adapt\xE9e aux employ\xE9s concern\xE9s."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10
      ref_id: 3.10.2
      name: "Proc\xE9dures de contr\xF4le des changements de syst\xE8me"
      description: "Le prestataire de services doit documenter et mettre en place\
        \ une proc\xE9dure pour contr\xF4ler les\nchangements apport\xE9s au syst\xE8\
        me d\u2019information du service.\nLe prestataire de services doit documenter\
        \ et mettre en place une proc\xE9dure pour valider les\nchangements apport\xE9\
        s au syst\xE8me d\u2019information du service dans un environnement de\npr\xE9\
        production avant leur d\xE9ploiement en production afin de s'assurer qu'elles\
        \ n'entra\xEEnent aucun effet\nind\xE9sirable sur l'activit\xE9 ou la s\xE9\
        curit\xE9 du service.\nLe prestataire de services doit maintenir un historique\
        \ des versions des logiciels et syst\xE8mes (internes,\nexternes ou commerciaux)\
        \ d\xE9ploy\xE9s, afin de pouvoir, si n\xE9cessaire, recr\xE9er un environnement\n\
        complet dans un environnement de test \xE0 une date pr\xE9cise. La dur\xE9\
        e de conservation de cet historique\ndoit correspondre \xE0 celle des sauvegardes\
        \ (voir exigence 3.8.5 du pr\xE9sent r\xE9f\xE9rentiel)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10
      ref_id: 3.10.3
      name: "Environnement de d\xE9veloppement s\xE9curis\xE9"
      description: "Le prestataire de services doit \xE9tablir un environnement s\xE9\
        curis\xE9 de d\xE9veloppement qui assure la\ngestion compl\xE8te du cycle\
        \ de d\xE9veloppement du syst\xE8me d\u2019information du service.\nLe prestataire\
        \ de services doit prendre en compte les environnements de d\xE9veloppement\
        \ dans\nl\u2019appr\xE9ciation des risques et garantir leur protection conform\xE9\
        ment aux exigences du pr\xE9sent\nr\xE9f\xE9rentiel."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10
      ref_id: 3.10.4
      name: "D\xE9veloppement externalis\xE9"
      description: "Le prestataire de services doit documenter et mettre en place\
        \ une proc\xE9dure pour superviser et\ncontr\xF4ler l'activit\xE9 de d\xE9\
        veloppement externalis\xE9 des logiciels et des syst\xE8mes. Cette proc\xE9\
        dure doit\ngarantir que le d\xE9veloppement externalis\xE9 soit conforme \xE0\
        \ la politique de d\xE9veloppement s\xE9curis\xE9 du\nprestataire de services\
        \ et atteint un niveau de s\xE9curit\xE9 \xE9quivalent \xE0 celui d'un d\xE9\
        veloppement interne\n(voir exigence 3.10.1 du pr\xE9sent r\xE9f\xE9rentiel)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10
      ref_id: 3.10.5
      name: "Test de la s\xE9curit\xE9 et conformit\xE9 du syst\xE8me"
      description: "Le prestataire de services doit soumettre les syst\xE8mes d'information,\
        \ qu'ils soient nouveaux ou mis \xE0\njour, \xE0 des tests de conformit\xE9\
        \ et de fonctionnalit\xE9 en mati\xE8re de s\xE9curit\xE9 durant le d\xE9\
        veloppement.\nIl doit documenter et mettre en \u0153uvre une proc\xE9dure\
        \ de test qui identifie :\n\u23AF Les t\xE2ches \xE0 r\xE9aliser ;\n\u23AF\
        \ Les donn\xE9es d'entr\xE9e ;\n\u23AF Les r\xE9sultats attendus."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.10
      ref_id: 3.10.6
      name: "Protection des donn\xE9es de test"
      description: "Le prestataire de services doit documenter et mettre en place\
        \ une proc\xE9dure pour garantir l'int\xE9grit\xE9\ndes donn\xE9es de test\
        \ utilis\xE9es en pr\xE9production.\nSi le prestataire de services envisage\
        \ d'utiliser des donn\xE9es de production du commanditaire pour\nr\xE9aliser\
        \ des tests, il doit obtenir l'accord pr\xE9alable du commanditaire et anonymiser\
        \ ces donn\xE9es. Le\nprestataire de services doit \xE9galement veiller \xE0\
        \ pr\xE9server la confidentialit\xE9 des donn\xE9es durant leur\nanonymisation."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11
      assessable: false
      depth: 1
      ref_id: '3.11'
      name: Relations avec les tier
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11
      ref_id: 3.11.1
      name: Identification des tiers
      description: "Le prestataire de services doit tenir \xE0 jour une liste exhaustive\
        \ des parties prenantes impliqu\xE9es dans\nla mise en \u0153uvre du service,\
        \ telles que les h\xE9bergeurs, d\xE9veloppeurs, int\xE9grateurs, archiveurs,\
        \ sous-\ntraitants intervenant sur site ou \xE0 distance, fournisseurs d\u2019\
        \xE9quipements, etc... Cette liste doit d\xE9tailler\nle r\xF4le de chaque\
        \ tiers dans le service ainsi que dans le traitement des donn\xE9es.\nLe prestataire\
        \ de services doit remettre au commanditaire une liste exhaustive des tiers\
        \ ayant acc\xE8s\naux donn\xE9es et l'informer de tout changement de sous-traitants,\
        \ afin que le commanditaire puisse\nexprimer son accord et ce, sans pr\xE9\
        judice de l\u2019application du paragraphe 5 de l\u2019article 5 du d\xE9\
        cret\npr\xE9cit\xE9 n\xB02-24-921."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11
      ref_id: 3.11.2
      name: "La s\xE9curit\xE9 dans les accords conclus avec les tiers"
      description: "Le prestataire de services doit s'assurer que les tiers impliqu\xE9\
        s dans la mise en \u0153uvre du service\nrespectent un niveau de s\xE9curit\xE9\
        \ au moins \xE9quivalent \xE0 celui de sa propre politique de s\xE9curit\xE9\
        . Il doit\nd\xE9finir ces exigences sp\xE9cifiques pour chaque tiers en fonction\
        \ de sa contribution au service, et les\ninclure dans les cahiers des charges\
        \ ou les clauses de s\xE9curit\xE9 des accords de partenariat. Ces\nexigences\
        \ doivent \xE9galement \xEAtre int\xE9gr\xE9es dans les contrats sign\xE9\
        s avec les tiers.\nLe prestataire de services doit inclure, dans les contrats\
        \ avec chacun des tiers impliqu\xE9s dans la mise\nen \u0153uvre du service,\
        \ des clauses d\u2019audit permettant \xE0 l\u2019autorit\xE9 nationale de\
        \ cybers\xE9curit\xE9 ou toute\nentit\xE9 mandat\xE9e par elle de v\xE9rifier\
        \ que ces tiers respectent les exigences d\xE9finies dans le pr\xE9sent\n\
        r\xE9f\xE9rentiel.\nLe prestataire de services doit \xE9tablir et attribuer\
        \ les r\xF4les et responsabilit\xE9s li\xE9s \xE0 la modification ou\n\xE0\
        \ la r\xE9siliation du contrat avec chaque tiers participant \xE0 la mise\
        \ en \u0153uvre du service."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11
      ref_id: 3.11.3
      name: Surveillance et revue des services des fournisseurs
      description: "Le prestataire de services doit \xE9tablir et mettre en \u0153\
        uvre une proc\xE9dure pour v\xE9rifier r\xE9guli\xE8rement\nque les tiers\
        \ participant \xE0 la mise en \u0153uvre du service respectent les exigences\
        \ du pr\xE9sent r\xE9f\xE9rentiel."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11
      ref_id: 3.11.4
      name: "Gestion des changements apport\xE9s dans les services des tiers"
      description: "Le prestataire de services doit \xE9laborer une proc\xE9dure pour\
        \ suivre les modifications effectu\xE9es par les\ntiers impliqu\xE9s dans\
        \ la mise en \u0153uvre du service, afin d\u2019\xE9valuer leur impact potentiel\
        \ sur la s\xE9curit\xE9 du\nsyst\xE8me d'information du service.\nLorsque\
        \ le changement op\xE9r\xE9 par un tiers impliqu\xE9 dans la mise en \u0153\
        uvre du service impacte le niveau\nde s\xE9curit\xE9, le prestataire de services\
        \ doit informer sans d\xE9lai tous les commanditaires et l\u2019autorit\xE9\
        \nnationale de cybers\xE9curit\xE9 et prendre les mesures requises pour restaurer\
        \ le niveau de s\xE9curit\xE9\nant\xE9rieur."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.11
      ref_id: 3.11.5
      name: "Engagements de confidentialit\xE9"
      description: "Le prestataire de services doit \xE9laborer une proc\xE9dure pour\
        \ revoir, au moins une fois par an, les\nexigences en mati\xE8re d\u2019engagement\
        \ de confidentialit\xE9 ou de non-divulgation vis-\xE0-vis des tiers\nimpliqu\xE9\
        s dans la mise en \u0153uvre du service."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12
      assessable: false
      depth: 1
      ref_id: '3.12'
      name: "3.12.Gestion des incidents li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019\
        information"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12
      ref_id: 3.12.1
      name: "Responsabilit\xE9s et proc\xE9dures"
      description: "Le prestataire de services doit documenter et mettre en place\
        \ une proc\xE9dure pour r\xE9pondre\nrapidement et efficacement aux incidents\
        \ de s\xE9curit\xE9. Cette proc\xE9dure doit pr\xE9ciser les moyens et\nd\xE9\
        lais de communication des incidents de s\xE9curit\xE9 aux commanditaires concern\xE9\
        s, ainsi que le niveau\nde confidentialit\xE9 requis pour cette communication.\n\
        Le prestataire de services doit informer ses employ\xE9s ainsi que tous les\
        \ tiers impliqu\xE9s dans la mise en\n\u0153uvre du service de cette proc\xE9\
        dure."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12
      ref_id: 3.12.2
      name: "Signalements li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information"
      description: "Le prestataire de services doit \xE9tablir et appliquer une proc\xE9\
        dure qui demande \xE0 ses employ\xE9s ainsi\nqu'aux tiers impliqu\xE9s dans\
        \ la mise en \u0153uvre du service de signaler tout incident de s\xE9curit\xE9\
        \ av\xE9r\xE9 ou\nsuspect\xE9, ainsi que toute vuln\xE9rabilit\xE9 de s\xE9\
        curit\xE9 identifi\xE9e.\nLe prestataire de services doit \xE9laborer et mettre\
        \ en place une proc\xE9dure qui permet \xE0 tous les\ncommanditaires de signaler\
        \ tout incident de s\xE9curit\xE9 av\xE9r\xE9 ou suspect\xE9, ainsi que toute\
        \ faille de\ns\xE9curit\xE9 identifi\xE9e\nLe prestataire de services doit\
        \ informer imm\xE9diatement les commanditaires des incidents de s\xE9curit\xE9\
        \nsurvenus, ainsi que des mesures recommand\xE9es pour en limiter les impacts.\
        \ Il doit \xE9galement\npermettre au commanditaire de s\xE9lectionner les\
        \ niveaux de gravit\xE9 des incidents pour lesquels il\nsouhaite \xEAtre notifi\xE9\
        . Le prestataire de services doit notifier les incidents de s\xE9curit\xE9\
        \ 2 aux autorit\xE9s comp\xE9tentes\nconform\xE9ment aux exigences l\xE9gales\
        \ et r\xE9glementaires en vigueur. \n\n2 Incident de s\xE9curit\xE9 : tout\
        \ \xE9v\xE9nement affectant la s\xE9curit\xE9 des syst\xE8mes d\u2019information,\
        \ incluant les incidents de\ncybers\xE9curit\xE9 au sens de la loi n\xB0 05-20,\
        \ ainsi que les violations de donn\xE9es \xE0 caract\xE8re personnel r\xE9\
        gies par la loi n\xB009-08\nrelative \xE0 la protection des personnes physiques\
        \ \xE0 l\u2019\xE9gard du traitement des donn\xE9es \xE0 caract\xE8re personnel."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12
      ref_id: 3.12.3
      name: "Appr\xE9ciation des \xE9v\xE9nements li\xE9s \xE0 la s\xE9curit\xE9 de\
        \ l\u2019information et prise de d\xE9cision"
      description: "Le prestataire de services est charg\xE9 d'\xE9valuer les \xE9\
        v\xE9nements li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information afin\nde\
        \ d\xE9terminer s'ils doivent \xEAtre consid\xE9r\xE9s comme des incidents\
        \ de s\xE9curit\xE9. Cette \xE9valuation doit se\nbaser sur une ou plusieurs\
        \ \xE9chelles (estimation, \xE9valuation, etc.) qui ont \xE9t\xE9 pr\xE9alablement\
        \ d\xE9finies\nen accord avec le commanditaire.\nLe prestataire de services\
        \ doit mettre en place une classification sp\xE9cifique permettant de distinguer\n\
        clairement les incidents de s\xE9curit\xE9 qui concernent les donn\xE9es des\
        \ commanditaires, en tenant\ncompte des r\xE9sultats de l'\xE9valuation des\
        \ risques."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12
      ref_id: 3.12.4
      name: "R\xE9ponse aux incidents li\xE9s \xE0 la s\xE9curit\xE9 de l\u2019information"
      description: "Le prestataire de services est tenu de g\xE9rer les incidents\
        \ de s\xE9curit\xE9 jusqu'\xE0 leur r\xE9solution compl\xE8te\net doit informer\
        \ les commanditaires conform\xE9ment aux proc\xE9dures \xE9tablies.\nLe prestataire\
        \ de services doit conserver une archive des documents d\xE9taillant les incidents\
        \ de\ns\xE9curit\xE9.\nPour le niveau 2, le prestataire de services doit solliciter\
        \ uniquement les services d'un prestataire de\nr\xE9ponse aux incidents de\
        \ s\xE9curit\xE9 qualifi\xE9 pour traiter les incidents de s\xE9curit\xE9\
        \ qui demandent une\nexpertise suppl\xE9mentaire."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12
      ref_id: 3.12.5
      name: "Tirer des enseignements des incidents li\xE9s \xE0 la s\xE9curit\xE9\
        \ de l\u2019information"
      description: "Le prestataire de services doit documenter et instaurer un processus\
        \ d'am\xE9lioration continue visant \xE0\nr\xE9duire la fr\xE9quence et l'impact\
        \ des types d'incidents de s\xE9curit\xE9 d\xE9j\xE0 trait\xE9s.\nLes incidents\
        \ de s\xE9curit\xE9 doivent \xEAtre class\xE9s, prioris\xE9s et analys\xE9\
        s de mani\xE8re approfondie pour en\nidentifier la cause principale. Cela\
        \ doit \xEAtre fait par des experts internes du prestataire de services,\n\
        avec l'aide \xE9ventuelle de prestataires externes de s\xE9curit\xE9."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.12
      ref_id: 3.12.6
      name: Recueil de preuves
      description: "Le prestataire de services doit \xE9tablir et appliquer une proc\xE9\
        dure pour enregistrer les informations\nrelatives aux incidents de s\xE9curit\xE9\
        , afin qu'elles puissent servir d'\xE9l\xE9ments de preuve."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13
      assessable: false
      depth: 1
      ref_id: '3.13'
      name: "Gestion de la continuit\xE9 d\u2019activit\xE9"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13
      ref_id: 3.13.1
      name: "Organisation de la continuit\xE9 d\u2019activit\xE9"
      description: "Le prestataire de services doit pr\xE9parer un plan de continuit\xE9\
        \ et de reprise d\u2019activit\xE9s int\xE9grant\nl'ensemble des solutions\
        \ pour pallier les arr\xEAts des processus et applications critiques pour\
        \ le service.\nIl doit porter notamment sur des solutions de secours informatique\
        \ (sauvegarde, site de secours,\nbascule, r\xE9silience des r\xE9seaux, redondance\
        \ mat\xE9rielle et logicielle, etc.) Le prestataire de services doit revoir\
        \ annuellement le plan de continuit\xE9 d'activit\xE9 du service et chaque\n\
        fois qu'un changement significatif susceptible d'affecter le service intervient."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13
      ref_id: 3.13.2
      name: "Mise en \u0153uvre de la continuit\xE9 d\u2019activit"
      description: "Le prestataire de services doit mettre en place des proc\xE9dures\
        \ pour maintenir la continuit\xE9 et la\ndisponibilit\xE9, conform\xE9ment\
        \ aux engagements contractuels envers le commanditaire"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13
      ref_id: 3.13.3
      name: "V\xE9rifier, revoir et \xE9valuer la continuit\xE9 d\u2019activit\xE9"
      description: "Le prestataire de services doit \xE9laborer une proc\xE9dure pour\
        \ \xE9valuer le plan de continuit\xE9 d'activit\xE9s,\nafin de v\xE9rifier\
        \ sa pertinence et son efficacit\xE9 en cas de crise."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13
      ref_id: 3.13.4
      name: "Disponibilit\xE9 des moyens de traitement de l\u2019informatio"
      description: "Le prestataire de services doit mettre en place les mesures n\xE9\
        cessaires pour assurer la disponibilit\xE9 du\nservice conform\xE9ment aux\
        \ exigences sp\xE9cifi\xE9es dans la convention de service (voir l\u2019exigence\
        \ 3.15.1\ndu pr\xE9sent r\xE9f\xE9rentiel)."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13.5
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13
      ref_id: 3.13.5
      name: "Sauvegarde de la configuration de l\u2019infrastructure technique"
      description: "Le prestataire de services doit \xE9tablir une proc\xE9dure pour\
        \ r\xE9aliser des sauvegardes hors ligne de la\nconfiguration de l'infrastructure\
        \ technique"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13.6
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.13
      ref_id: 3.13.6
      name: "Mise \xE0 disposition d\u2019un dispositif de sauvegarde des donn\xE9\
        es du commanditair"
      description: "Le prestataire de services doit documenter et proposer au commanditaire\
        \ un service de sauvegarde\ndes donn\xE9es."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14
      assessable: false
      depth: 1
      ref_id: '3.14'
      name: "Conformit\xE9"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14
      ref_id: 3.14.1
      name: "Identification de la l\xE9gislation et des exigences contractuelles applicables"
      description: "Le prestataire de services doit identifier les exigences l\xE9\
        gales, r\xE9glementaires et contractuelles en\nvigueur applicables au service.\n\
        Le prestataire de services doit \xE9laborer et appliquer des proc\xE9dures\
        \ pour se conformer aux exigences\nl\xE9gales, r\xE9glementaires et contractuelles\
        \ en vigueur applicables au service, ainsi qu'aux besoins\nsp\xE9cifiques\
        \ en mati\xE8re de s\xE9curit\xE9.\nLe prestataire de services doit rendre\
        \ accessible \xE0 un commanditaire, sur demande, l'ensemble de ces\nproc\xE9\
        dures.\nLe prestataire de services doit \xE9tablir et appliquer un processus\
        \ de surveillance proactive des\nexigences l\xE9gales, r\xE9glementaires et\
        \ contractuelles en vigueur applicables au service"
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14
      ref_id: 3.14.2
      name: "Revue ind\xE9pendante de la s\xE9curit\xE9 de l\u2019information"
      description: "Revue continue\nLe prestataire de services doit \xE9laborer et\
        \ mettre en \u0153uvre un programme d\u2019audit sur trois ans d\xE9finissant\
        \ le p\xE9rim\xE8tre et la fr\xE9quence des audits en conformit\xE9 avec la\
        \ gestion du changement, les politiques internes, et les r\xE9sultats de l\u2019\
        appr\xE9ciation des risques. Ce programme doit pr\xE9voir au moins un audit\
        \ par an r\xE9alis\xE9 par un prestataire qualifi\xE9 d\u2019audit de la s\xE9\
        curit\xE9 des syst\xE8mes d\u2019information.\nL'ensemble du programme d'audit\
        \ doit notamment couvrir :\n\u23AF L'audit de la configuration de l\u2019\
        infrastructure technique du service, r\xE9alis\xE9 par \xE9chantillonnage\
        \ et englobant tous les types d\u2019\xE9quipements et de serveurs pr\xE9\
        sents dans le syst\xE8me d\u2019information du service ;\n\u23AF Le test d\u2019\
        intrusion des interfaces d'administration expos\xE9es sur un r\xE9seau public\
        \ ;\n\u23AF Le test d'intrusion de l'interface utilisateur pour les services\
        \ SaaS ;\n\u23AF Si le service comprend des d\xE9veloppements internes, l\u2019\
        audit du code source ax\xE9 sur les fonctionnalit\xE9s de s\xE9curit\xE9 impl\xE9\
        ment\xE9es, avec une approche continue privil\xE9gi\xE9e ;\n\u23AF Il est\
        \ recommand\xE9 que le prestataire de services impl\xE9mente des m\xE9canismes\
        \ automatis\xE9s d'audit de configuration adapt\xE9s \xE0 l\u2019infrastructure\
        \ technique du service.\n\nRevue initiale\nAvant l'\xE9valuation pour la qualification\
        \ du service, le prestataire de services doit r\xE9aliser une revue\nind\xE9\
        pendante initiale de la s\xE9curit\xE9 de l\u2019information par un prestataire\
        \ d\u2019audit de la s\xE9curit\xE9 des\nsyst\xE8mes d\u2019information (PASSI)\
        \ qualifi\xE9. Cette revue initiale doit inclure notamment :\n\u23AF Pour\
        \ les services autres que IaaS (comme PaaS, SaaS, etc.), il est essentiel\
        \ de r\xE9aliser un audit\nde la configuration des ressources virtuelles ou\
        \ physiques, ainsi que des syst\xE8mes\nd'exploitation et des logiciels de\
        \ base (tels que les OS, les middlewares, les bases de donn\xE9es,\netc.)\
        \ inclus dans le p\xE9rim\xE8tre du service.\n\u23AF Un test d\u2019intrusion\
        \ visant les interfaces d'administration du service mises \xE0 disposition\
        \ des\ncommanditaires ;\n\u23AF Pour un service de type SaaS, il est n\xE9\
        cessaire de r\xE9aliser un test d'intrusion sur l'interface\nmise \xE0 disposition\
        \ des utilisateurs finaux, ainsi qu'un audit du code source concernant les\n\
        fonctionnalit\xE9s de s\xE9curit\xE9 impl\xE9ment\xE9es telles que l'authentification,\
        \ la gestion des sessions\net la gestion du cloisonnement en cas de mode multi-tenant.\n\
        \nRevue des changements majeurs \nEn cas de changement majeur susceptible\
        \ d'affecter le service, le prestataire de services doit faire\nr\xE9aliser\
        \ une revue ind\xE9pendante de changement par un prestataire d\u2019audit\
        \ de la s\xE9curit\xE9 des syst\xE8mes\nd\u2019information (PASSI) qualifi\xE9\
        . Cette revue ind\xE9pendante de changement doit notamment couvrir les\nactivit\xE9\
        s d'audit suivantes :\n\u23AF Audit d\u2019architecture ;\n\u23AF Audit organisationnel\
        \ et physique ;\n\u23AF Audit de la configuration de l\u2019infrastructure\
        \ technique du service ;\n\u23AF Un test d\u2019intrusion portant sur les\
        \ interfaces d'administration du service mises \xE0 disposition\ndes commanditaires\
        \ ;\n\u23AF Pour un service de type SaaS, il est essentiel de r\xE9aliser\
        \ un test d'intrusion sur l'interface mise\n\xE0 disposition des utilisateurs\
        \ finaux dans le cadre du catalogue de services, ainsi qu'un audit\ndu code\
        \ source ax\xE9 sur les fonctionnalit\xE9s de s\xE9curit\xE9 impl\xE9ment\xE9\
        es telles que\nl'authentification, la gestion des sessions et la gestion du\
        \ cloisonnement en cas de mode\nmulti-tenant. Si le SaaS offre un service\
        \ de s\xE9curit\xE9 de l'information, une certification produit\nd\xE9di\xE9\
        e est \xE9galement requise."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14
      ref_id: 3.14.3
      name: "Conformit\xE9 avec les politiques et les normes de s\xE9curit\xE9"
      description: "Le prestataire de services, par l'interm\xE9diaire du responsable\
        \ de la s\xE9curit\xE9 des syst\xE8mes\nd\u2019information, doit r\xE9guli\xE8\
        rement v\xE9rifier que toutes les proc\xE9dures de s\xE9curit\xE9 plac\xE9\
        es sous sa\nresponsabilit\xE9 sont correctement mises en \u0153uvre afin de\
        \ garantir leur conformit\xE9 avec les politiques\net normes de s\xE9curit\xE9\
        \ \xE9tablies."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14.4
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.14
      ref_id: 3.14.4
      name: "Examen de la conformit\xE9 technique"
      description: "Le prestataire de services doit \xE9laborer documenter et mettre\
        \ en \u0153uvre une politique pour v\xE9rifier la\nconformit\xE9 technique\
        \ du service aux exigences du pr\xE9sent r\xE9f\xE9rentiel. Cette politique\
        \ doit d\xE9finir les\nobjectifs, les m\xE9thodes d'\xE9valuation, la fr\xE9\
        quence des v\xE9rifications, les r\xE9sultats attendus ainsi que les\nmesures\
        \ correctives \xE0 prendre le cas \xE9ch\xE9ant."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.15
      assessable: false
      depth: 1
      ref_id: '3.15'
      name: "Exigences en ce qui concerne la convention de service, la localisation\
        \ des donn\xE9es et la protection des donn\xE9es \xE0 caract\xE8re personnel\""
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.15.1
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.15
      ref_id: 3.15.1
      name: Convention de service
      description: "Le prestataire de services est tenu de r\xE9diger une convention\
        \ de service avec chaque commanditaire.\nToute modification de cette convention\
        \ doit \xEAtre approuv\xE9e par le commanditaire.\nLe prestataire de services\
        \ doit pr\xE9ciser dans la convention de service :\n\u23AF Les obligations,\
        \ droits et responsabilit\xE9s de chaque partie, y compris le prestataire\
        \ de services,\nles tiers impliqu\xE9s, et les commanditaires ;\n\u23AF Les\
        \ \xE9l\xE9ments express\xE9ment exclus de ses responsabilit\xE9s, dans le\
        \ respect des exigences\nl\xE9gales et r\xE9glementaires en vigueur ;\n\u23AF\
        \ La localisation du service. La localisation du support doit \xEAtre pr\xE9\
        cis\xE9e lorsqu\u2019il est r\xE9alis\xE9 en\ndehors du territoire marocain.\n\
        La convention de service doit \xEAtre r\xE9gie par la l\xE9gislation et la\
        \ r\xE9glementation marocaines et sp\xE9cifier,\nle cas \xE9ch\xE9ant, tout\
        \ autre droit qui pourrait \xEAtre applicable \xE0 cette convention.\nLa convention\
        \ de service doit pr\xE9ciser que la collecte, la manipulation, le stockage\
        \ et, de mani\xE8re\ng\xE9n\xE9rale, le traitement des donn\xE9es li\xE9es\
        \ \xE0 l'avant-vente, \xE0 la mise en \u0153uvre, \xE0 la maintenance et \xE0\
        \nl'arr\xEAt du service seront effectu\xE9s conform\xE9ment aux exigences\
        \ l\xE9gales en vigueur.\nLa convention de service doit pr\xE9ciser que le\
        \ prestataire de services est tenu de fournir au\ncommanditaire, sur demande,\
        \ les \xE9l\xE9ments d'appr\xE9ciation des risques associ\xE9s \xE0 la soumission\
        \ des\ndonn\xE9es du commanditaire \xE0 la l\xE9gislation d'un pays autre\
        \ que le Maroc.\nLe prestataire de services doit d\xE9tailler dans la convention\
        \ de service les mesures techniques et\norganisationnelles qu'il met en place\
        \ pour garantir le respect de la l\xE9gislation applicable.\nLa convention\
        \ de service doit inclure une clause de r\xE9vision permettant au commanditaire\
        \ de r\xE9silier\nla convention sans p\xE9nalit\xE9 en cas de perte de la\
        \ qualification du service.\nLe prestataire de services doit int\xE9grer dans\
        \ la convention de service une clause de r\xE9versibilit\xE9\npermettant au\
        \ commanditaire de r\xE9cup\xE9rer toutes ses donn\xE9es, qu'elles soient\
        \ fournies directement\npar lui ou g\xE9n\xE9r\xE9es \xE0 partir de ses donn\xE9\
        es ou actions dans le cadre du service. Le prestataire de services doit garantir\
        \ cette r\xE9versibilit\xE9 en utilisant l'une des m\xE9thodes techniques\n\
        suivantes :\n\u23AF Fournir les donn\xE9es sous forme de fichiers dans un\
        \ ou plusieurs formats document\xE9s et\nexploitables en dehors du service\
        \ du prestataire de services ;\n\u23AF Mettre en place des interfaces techniques\
        \ permettant l'acc\xE8s aux donn\xE9es selon un sch\xE9ma\ndocument\xE9 et\
        \ exploitable (API, formats pivots, etc.).\nLe prestataire de services doit\
        \ sp\xE9cifier dans la convention de service le niveau de disponibilit\xE9\
        \ du\nservice.\nLe prestataire de services doit pr\xE9ciser dans la convention\
        \ de service qu'il n'a pas le droit d'utiliser les\ndonn\xE9es transmises\
        \ et g\xE9n\xE9r\xE9es par le commanditaire, ces donn\xE9es \xE9tant exclusivement\
        \ r\xE9serv\xE9es au\ncommanditaire.\nLa convention de service doit indiquer\
        \ explicitement que le prestataire de services s\u2019engage \xE0 ne\ncommuniquer\
        \ \xE0 des tiers, aucune information relative \xE0 la prestation fournie au\
        \ commanditaire, sans\navoir obtenu au pr\xE9alable son autorisation \xE9\
        crite.\nLe prestataire de services doit pr\xE9ciser dans la convention de\
        \ service si les donn\xE9es du commanditaire\nsont automatiquement sauvegard\xE9\
        es. Si ce n'est pas le cas, le prestataire de services doit informer le\n\
        commanditaire des risques associ\xE9s et indiquer clairement les \xE9tapes\
        \ que le commanditaire doit\nsuivre pour assurer la sauvegarde de ses donn\xE9\
        es.\nLe prestataire de services doit pr\xE9ciser dans la convention de service\
        \ s'il permet l'acc\xE8s distant pour\nl'administration ou le support du syst\xE8\
        me d'information du service.\nLe prestataire de services doit indiquer dans\
        \ la convention de service que :\n\u23AF Le service est qualifi\xE9 et fournir\
        \ l'attestation de qualification ;\n\u23AF Le commanditaire peut d\xE9poser\
        \ une r\xE9clamation concernant le service qualifi\xE9 aupr\xE8s de\nl\u2019\
        autorit\xE9 nationale de cybers\xE9curit\xE9 ;\n\u23AF Le commanditaire autorise\
        \ l\u2019autorit\xE9 nationale de cybers\xE9curit\xE9 \xE0 auditer le service\
        \ et son\nsyst\xE8me d'information pour v\xE9rifier la conformit\xE9 avec\
        \ les exigences du pr\xE9sent r\xE9f\xE9rentiel."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.15.2
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.15
      ref_id: 3.15.2
      name: "Localisation des donn\xE9es"
      description: "Le prestataire de services doit documenter et informer le commanditaire\
        \ de la localisation o\xF9 les\ndonn\xE9es de ce dernier sont stock\xE9es\
        \ et trait\xE9es.\nLorsqu\u2019il s\u2019agit du Niveau 2, le prestataire\
        \ de services doit stocker, traiter les donn\xE9es sensibles et\nadministrer\
        \ le service du commanditaire depuis le territoire marocain.\nLe prestataire\
        \ de services doit stocker et traiter les donn\xE9es techniques (telles que\
        \ les identit\xE9s des\nb\xE9n\xE9ficiaires et des administrateurs de l'infrastructure\
        \ technique, les donn\xE9es manipul\xE9es par le\nr\xE9seau d\xE9fini par\
        \ logiciel, les journaux de l'infrastructure technique, l'annuaire, les certificats,\
        \ la\nconfiguration des acc\xE8s, etc.) au sein du territoire marocain. Cette\
        \ exigence prend un caract\xE8re\nexclusif lorsqu\u2019il s\u2019agit du niveau\
        \ 2.\nLe prestataire de services peut r\xE9aliser des op\xE9rations de support\
        \ aux commanditaires depuis un \xC9tat\nhors du territoire marocain. Il doit\
        \ documenter les types d'op\xE9rations pouvant \xEAtre effectu\xE9es depuis\n\
        cet \xC9tat et d\xE9crire les m\xE9canismes de contr\xF4le d'acc\xE8s et de\
        \ supervision assurant le suivi de ces op\xE9rations depuis le Maroc, et ce\
        \ sans pr\xE9judice de l\u2019application du paragraphe 4 de l\u2019article\
        \ 5 du\nd\xE9cret pr\xE9cit\xE9 n\xB02-24-921."
    - urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.15.3
      assessable: true
      depth: 2
      parent_urn: urn:bassou:risk:req_node:qualification_services_cloud_iiv:3.15
      ref_id: 3.15.3
      name: "Protection des donn\xE9es \xE0 caract\xE8re personnel"
      description: "Le prestataire de services est tenu de prouver qu'il respecte\
        \ les principes de protection des donn\xE9es\npour les traitements de donn\xE9\
        es \xE0 caract\xE8re personnel r\xE9alis\xE9s pour son propre compte. Il doit\
        \ fournir\ndes \xE9l\xE9ments de preuve par rapport aux points suivants :\n\
        \u23AF Les finalit\xE9s des traitements sont clairement d\xE9finies, l\xE9\
        gitimes et transparentes ;\n\u23AF La tra\xE7abilit\xE9 des traitements est\
        \ assur\xE9e, tant pour le prestataire de services que pour son\ncommanditaire\
        \ ;\n\u23AF Les traitements reposent sur une base l\xE9gale valide ;\n\u23AF\
        \ Les finalit\xE9s des traitements ne doivent en aucun cas \xEAtre d\xE9tourn\xE9\
        es ;\n\u23AF Les donn\xE9es trait\xE9es doivent \xEAtre limit\xE9es au strict\
        \ n\xE9cessaire, ad\xE9quates et pertinentes pour\nles finalit\xE9s poursuivies\
        \ ;\n\u23AF La qualit\xE9 des donn\xE9es doit \xEAtre pr\xE9serv\xE9e, en\
        \ garantissant leur exactitude et leur mise \xE0 jour ;\n\u23AF Les dur\xE9\
        es de conservation des donn\xE9es doivent \xEAtre pr\xE9cis\xE9ment d\xE9\
        finies et limit\xE9es.\nLe prestataire de services doit justifier, pour les\
        \ traitements de donn\xE9es caract\xE8re personnel effectu\xE9s\npour son\
        \ propre compte, qu'il respecte les droits des personnes concern\xE9es. Il\
        \ doit, au minimum,\njustifier les \xE9l\xE9ments suivants :\n\u23AF L\u2019\
        information des usagers doit \xEAtre fournie de mani\xE8re loyale et transparente\
        \ ;\n\u23AF Le consentement des usagers doit \xEAtre recueilli de fa\xE7on\
        \ explicite, d\xE9montrable et\nr\xE9tractable ;\n\u23AF Les usagers doivent\
        \ avoir la possibilit\xE9 d'exercer leurs droits d'acc\xE8s, de rectification\
        \ et\nd'effacement des donn\xE9es ;\n\u23AF Les usagers doivent \xE9galement\
        \ pouvoir exercer leurs droits de limitation du traitement, de\nportabilit\xE9\
