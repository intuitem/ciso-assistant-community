      ref_id: 2-10-3
      description: 'Cybersecurity requirements for technical vulnerabilities management
        shall include the following as a minimum: (1) Periodic vulnerabilities assessment
        and detection. (2) Vulnerabilities classification based on their severities.
        (3) Vulnerabilities remediation based on their classification and the associated
        cyber risks. (4) Patch management to remediate vulnerabilities, and ensuring
        the integrity and effectiveness of these updates and fixes are verified using
        a non-production environment before being applied. (5) Communication and subscription
        with trusted resources for new and up-todate vulnerabilities.'
