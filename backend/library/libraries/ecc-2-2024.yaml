      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-4
      ref_id: 2-4-3
      description: "Cybersecurity requirements for protection of the email service\
        \ of the entity shall include the following as a minimum: (1) Analyzing and\
        \ filtering email messages (specifically phishing emails and spam emails)\
        \ using modern and advanced email protection techniques and mechanisms. (2)\
        \ Multi-factor authentication, and defining the suitable authentication factors\
        \ and their numbers as well as the suitable authentication techniques based\
        \ on the result of impact assessment of authentication failure and bypass\
        \ for remote and webmail access. (3) Email archiving and backup. (4) Secure\
        \ management and protection against Advanced Persistent Threats (APT), which\
        \ normally utilize zero-day malware and viruses. (5) Validation of the entity\u2019\
        s email service domains by using Sender Policy Framework (SPF), Domain Keys\
        \ Identified Mail (DKIM), and Domain Message Authentication Reporting and\
        \ Conformance (DMARC)."
