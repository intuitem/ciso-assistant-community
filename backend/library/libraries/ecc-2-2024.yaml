    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-5-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-5
      ref_id: 2-5-3
      description: "Cybersecurity requirements for the entity\u2019s network security\
        \ management shall include the following as a minimum: (1) Logical or physical\
        \ isolation and segmentation of network segments in a secure manner which\
        \ is required to control relevant cybersecurity risks, using firewall and\
        \ defense-in-depth principle. (2) Isolation of production network from testing\
        \ and development environment networks. (3) Secure browsing and internet connectivity,\
        \ including strict restrictions on suspicious websites, file storage/sharing\
        \ websites, and remote access websites. (4) Wireless network security and\
        \ protection using secure authentication and encryption techniques and avoiding\
        \ the connection of wireless networks to the entity\u2019s internal network,\
        \ except after a comprehensive assessment of subsequent risks, with handling\
        \ them in a way that protects the technology assets of the entity. (5) Restricting\
        \ and managing network services, protocols, and ports. (6) Intrusion Prevention\
        \ Systems (IPS). (7) Security of Domain Name Service (DNS). (8) Secure management\
        \ and protection of Internet browsing channel against Advanced Persistent\
        \ Threats (APT), which normally utilize zero-day malware and viruses. (9)\
        \ Protecting against Distributed Denial of Service (DDoS) attacks to limit\
        \ risks arising from these attacks."
