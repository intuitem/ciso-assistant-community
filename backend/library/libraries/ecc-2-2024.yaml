urn: urn:intuitem:risk:library:ecc-2-2024
locale: en
ref_id: ecc-2-2024
name: Essential Cybersecurity Controls (ECC-2:2024)
description: 'NCA Essential Cybersecurity Controls (ECC-2:2024), the updated edition
  of the National Cybersecurity Authority''s flagship cybersecurity framework for
  the Kingdom of Saudi Arabia. 4 main domains / 28 subdomains / 108 controls. Each
  subdomain carries its official objective; subcontrols are folded into their parent
  control. Reference: https://nca.gov.sa'
copyright: "\xA9 NCA"
version: 1
publication_date: 2026-06-22
provider: NCA
packager: community
objects:
  framework:
    urn: urn:intuitem:risk:framework:ecc-2-2024
    ref_id: ecc-2-2024
    name: Essential Cybersecurity Controls (ECC-2:2024)
    description: NCA Essential Cybersecurity Controls (ECC-2:2024). 4 main domains,
      28 subdomains, 108 controls. The 2024 edition supersedes ECC-1:2018.
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: Cybersecurity Governance
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-1
      name: Cybersecurity Strategy
      description: To ensure that the action plans, objectives, initiatives, and projects
        of the entity contribute to compliance with the relevant legislative and regulatory
        requirements.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-1-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-1
      ref_id: 1-1-1
      description: "The cybersecurity strategy of the entity shall be identified,\
        \ documented, and approved, and it shall be supported by the head of the entity\
        \ or his/her delegate (Hereinafter referred to as the \u201CAuthorized Official\u201D\
        ). The strategy goals shall be in line with the relevant legislative and regulatory\
        \ requirements."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-1-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-1
      ref_id: 1-1-2
      description: The entity shall execute an action plan to apply the cybersecurity
        strategy.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-1-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-1
      ref_id: 1-1-3
      description: The cybersecurity strategy shall be reviewed at planned intervals
        (or in case of changes to the relevant legislative and regulatory requirements).
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-2
      name: Cybersecurity Management
      description: To ensure that the Authorized Official of the entity complies with
        and supports the implementation and management of cybersecurity programs within
        the entity, as per the relevant legislative and regulatory requirements.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-2-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-2
      ref_id: 1-2-1
      description: A department for cybersecurity shall be established within the
        entity. This department shall be independent from the Information Technology
        and Communications Department (As per High Order No. 37140, dated 14/08/1438H.).
        It is recommended that the Cybersecurity Department reports directly to the
        head of the entity or his/her delegate while ensuring that this does not result
        in a conflict of interests.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-2-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-2
      ref_id: 1-2-2
      description: All cybersecurity positions shall be filled out with full-time
        and qualified Saudi cybersecurity professionals.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-2-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-2
      ref_id: 1-2-3
      description: "A cybersecurity supervisory committee shall be established pursuant\
        \ to the instruction of the entity\u2019s Authorized Official to ensure compliance\
        \ with, support for, and monitoring of the implementation of the cybersecurity\
        \ programs and regulations. The committee\u2019s members, responsibilities,\
        \ and governance framework shall be identified, documented, and approved.\
        \ The committee shall include the head of the cybersecurity department as\
        \ a member. It is recommended that the committee reports directly to the head\
        \ of the entity or his/her delegate while ensuring that this does not result\
        \ in a conflict of interests."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-3
      name: Cybersecurity Policies and Procedures
      description: "To ensure that the cybersecurity requirements and the entity\u2019\
        s compliance therewith are documented and communicated, as per the entity\u2019\
        s regulatory requirements and the relevant legislative and regulatory requirements."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3
      ref_id: 1-3-1
      description: "The cybersecurity department of the entity shall identify and\
        \ document cybersecurity policies and procedures, including the cybersecurity\
        \ controls and requirements, and have them approved by the entity\u2019s Authorized\
        \ Official, and communicate them to the relevant personnel and parties inside\
        \ the entity."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3
      ref_id: 1-3-2
      description: The cybersecurity department shall ensure that the cybersecurity
        policies and procedures, including the relevant controls and requirements,
        are implemented at the entity.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3
      ref_id: 1-3-3
      description: The cybersecurity policies and procedures shall be supported by
        technical security standards (e.g. technical security standards for firewall,
        databases, operating systems, etc.).
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-3
      ref_id: 1-3-4
      description: The cybersecurity policies and procedures shall be reviewed and
        updated at planned intervals (or in case of changes to the relevant legislative
        and regulatory requirements and standards). Changes shall be documented and
        approved.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-4
      name: Cybersecurity Roles and Responsibilities
      description: To ensure that roles and responsibilities are clearly defined for
        all parties participating in implementing the cybersecurity controls within
        the entity.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-4-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-4
      ref_id: 1-4-1
      description: "The Authorized Official shall identify, document, and approve\
        \ the governance organizational structure, roles, and responsibilities of\
        \ the entity\u2019s cybersecurity, and assign the persons concerned therewith.\
        \ The necessary support shall be provided for the implementation thereof while\
        \ ensuring that this does not result in a conflict of interests."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-4-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-4
      ref_id: 1-4-2
      description: The cybersecurity roles and responsibilities within the entity
        shall be reviewed and updated at planned intervals (or in case of changes
        to the relevant legislative and regulatory requirements).
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-5
      name: Cybersecurity Risk Management
      description: "To ensure managing cybersecurity risks in a methodological approach,\
        \ in order to protect the entity\u2019s information and technology assets,\
        \ as per the entity\u2019s regulatory policies and procedures and the relevant\
        \ legislative and regulatory requirements."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5
      ref_id: 1-5-1
      description: The cybersecurity department of the entity shall identify, document,
        and approve the cybersecurity risk management methodology and procedures within
        the entity, in accordance with considerations of confidentiality, and the
        integrity and availability of information and technology assets.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5
      ref_id: 1-5-2
      description: The cybersecurity department shall implement the cybersecurity
        risk management methodology and procedures within the entity.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5
      ref_id: 1-5-3
      description: 'The cybersecurity risk assessment procedures shall be implemented
        at least in the following cases: (1) At early stage of technology projects.
        (2) Before making major changes to technology infrastructure. (3) During planning
        to obtain third party services. (4) During planning and before the release
        of new technology services and products.'
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-5
      ref_id: 1-5-4
      description: The cybersecurity risk management methodology and procedures shall
        be reviewed and updated at planned intervals (or in case of changes to the
        relevant legislative and regulatory requirements and standards). Changes shall
        be documented and approved.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-6
      name: Cybersecurity in Information and Technology Project Management
      description: "To ensure that cybersecurity requirements are included in the\
        \ methodology and procedures of the entity\u2019s project management, in order\
        \ to protect the confidentiality, integrity, accuracy, and availability of\
        \ the entity\u2019s information and technology assets, as per the entity\u2019\
        s regulatory policies and procedures and the relevant legislative and regulatory\
        \ requirements."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6
      ref_id: 1-6-1
      description: Cybersecurity requirements shall be included in the project management
        methodology and procedures and in the information and technology asset change
        management within the entity to ensure identifying and managing cybersecurity
        risks as part of the technology project lifecycle. The cybersecurity requirements
        shall be a key part of the requirements for technology projects.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6
      ref_id: 1-6-2
      description: 'The cybersecurity requirements for project management and information
        and technology asset changes within the entity shall include the following
        as a minimum: (1) Vulnerability assessment and remediation. (2) Reviewing
        secure configuration and hardening and updates packages before launching projects
        and changes.'
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6
      ref_id: 1-6-3
      description: 'The cybersecurity requirements for software and application development
        projects within the entity shall include the following as a minimum: (1) Using
        the secure coding standards. (2) Using trusted and licensed sources for software
        development tools and libraries. (3) Conducting compliance test for software
        against the cybersecurity requirements within the entity. (4) Secure integration
        between applications. (5) Reviewing secure configuration and hardening and
        updates packages before launching software products'
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-6
      ref_id: 1-6-4
      description: The cybersecurity requirements for project management within the
        entity shall be periodically reviewed.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-7
      name: Compliance with Cybersecurity Standards, Laws and Regulations
      description: "To ensure that the entity\u2019s cybersecurity program complies\
        \ with the relevant legislative and regulatory requirements."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-7-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-7
      ref_id: 1-7-1
      description: If there are nationally approved international agreements or commitments
        that include cybersecurity requirements, the entity shall identify and comply
        with these requirements.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-8
      name: Periodical Cybersecurity Review and Audit
      description: "To ensure that the cybersecurity controls adopted by the entity\
        \ are implemented and applicable in accordance with the entity\u2019s regulatory\
        \ policies and procedures, relevant national legislative and regulatory requirements,\
        \ and international requirements imposed on the entity by law."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-8-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-8
      ref_id: 1-8-1
      description: The cybersecurity department of the entity shall periodically review
        the implementation of cybersecurity controls by the entity.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-8-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-8
      ref_id: 1-8-2
      description: The implementation of cybersecurity controls by the entity shall
        be reviewed and audited by parties other than the cybersecurity department
        at the entity, provided that the audit and review are to be conducted independently
        while considering the principle of conflict of interest, as per the Generally
        Accepted Auditing Standards (GAAS) and the relevant legislative and regulatory
        requirements.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-8-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-8
      ref_id: 1-8-3
      description: The results of cybersecurity audits and reviews shall be documented
        and presented to the cybersecurity supervisory committee and the Authorized
        Official. Results shall include the audit and review scope, observations,
        recommendations, corrective actions, and remediation plans.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-9
      name: Cybersecurity in Human Resources
      description: "To ensure that cybersecurity risks and requirements for personnel\
        \ (employees and contractors) of the entity are managed efficiently prior\
        \ to, during, and upon the end or termination of their employment, as per\
        \ the entity\u2019s regulatory policies and procedures and the relevant legislative\
        \ and regulatory requirements."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9
      ref_id: 1-9-1
      description: Cybersecurity requirements for personnel of the entity shall be
        identified, documented, and approved prior to, during, and upon the end or
        termination of their employment.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9
      ref_id: 1-9-2
      description: Cybersecurity requirements for personnel of the entity shall be
        implemented.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9
      ref_id: 1-9-3
      description: "Cybersecurity requirements prior to the commencement of the employment\
        \ relationship between personnel and the entity shall include the following\
        \ as a minimum: (1) Incorporating the personnel\u2019s cybersecurity responsibilities\
        \ clauses and nondisclosure clauses in their employment contracts with the\
        \ entity (including during and after employment end/termination with the entity).\
        \ (2) Conducting screening or vetting for personnel in cybersecurity positions\
        \ and technical positions with critical and privileged powers."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9
      ref_id: 1-9-4
      description: "Cybersecurity requirements for personnel during their employment\
        \ relationship with the entity shall include the following as a minimum: (1)\
        \ Cybersecurity awareness (during on-boarding and during employment). (2)\
        \ Implementation and compliance with cybersecurity requirements, as per the\
        \ entity\u2019s cybersecurity policies, procedures, and operations."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9
      ref_id: 1-9-5
      description: "The personnel\u2019s powers shall be reviewed and revoked immediately\
        \ upon the end/termination of their employment with the entity."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-9
      ref_id: 1-9-6
      description: Cybersecurity requirements for personnel of the entity shall be
        periodically reviewed.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1
      ref_id: 1-10
      name: Cybersecurity Awareness and Training Program
      description: "To ensure that the entity\u2019s personnel have the required security\
        \ awareness, are aware of their cybersecurity responsibilities, and are equipped\
        \ with the required cybersecurity skills, qualifications, and training courses\
        \ in order to protect the entity\u2019s information and technology assets\
        \ and fulfill their cybersecurity duties."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10
      ref_id: 1-10-1
      description: A cybersecurity awareness program, delivered through multiple channels,
        shall be periodically developed and approved by the entity to strengthen the
        awareness about cybersecurity, cyber threats, and risks, and to build a positive
        cybersecurity awareness culture.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10
      ref_id: 1-10-2
      description: The approved cybersecurity awareness program shall be implemented
        within the entity.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10
      ref_id: 1-10-3
      description: 'The cybersecurity awareness program shall include how to protect
        the entity against the most important and latest cyber risks and threats,
        including: (1) Secure handling of email services, especially phishing emails.
        (2) Secure handling of mobile devices and storage media. (3) Secure Internet
        browsing. (4) Secure usage of social media.'
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10
      ref_id: 1-10-4
      description: 'Specialized skills and necessary training shall be provided to
        personnel in positions that are linked directly to cybersecurity within the
        entity. Such skills and training shall be classified in line with their cybersecurity
        responsibilities, including: (1) Cybersecurity department personnel. (2) Personnel
        working on software/application development and those working on information
        and technology assets of the entity. (3) Executive and supervisory positions.'
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:1-10
      ref_id: 1-10-5
      description: The implementation of cybersecurity awareness program within the
        entity shall be periodically reviewed.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: Cybersecurity Defense
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2
      ref_id: 2-1
      name: Asset Management
      description: "To ensure that the entity has an accurate and updated inventory\
        \ of assets, including details of all information and technology assets of\
        \ the entity, in order to support the entity\u2019s operations and cybersecurity\
        \ requirements to maintain the confidentiality, integrity, accuracy, and availability\
        \ of information and technology assets of the entity."
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1-1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1
      ref_id: 2-1-1
      description: Cybersecurity requirements for managing information and technology
        assets of the entity shall be identified, documented, and approved.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1-2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1
      ref_id: 2-1-2
      description: Cybersecurity requirements for managing information and technology
        assets of the entity shall be implemented.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1-3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1
      ref_id: 2-1-3
      description: The policy of acceptable use of information and technology assets
        of the entity shall be identified, documented, approved, and communicated.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1-4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1
      ref_id: 2-1-4
      description: The policy of acceptable use of information and technology assets
        of the entity shall be implemented.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1-5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1
      ref_id: 2-1-5
      description: Information and technology assets of the entity shall be classified,
        labeled, and handled as per the relevant legislative and regulatory requirements.
    - urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1-6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:2-1
      ref_id: 2-1-6
      description: Cybersecurity requirements for managing information and technology
        assets of the entity shall be periodically reviewed.
