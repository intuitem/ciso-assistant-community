        \ and regulatory requirements, as follows: (1) Approved cryptographic systems\
        \ and solutions standards and their technical and regulatory restrictions.\
        \ (2) Secure management of cryptographic keys during their lifecycles. (3)\
        \ Encryption of data in-transit and at-rest, as per their classification and\
