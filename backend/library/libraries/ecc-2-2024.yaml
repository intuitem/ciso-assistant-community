      parent_urn: urn:intuitem:risk:req_node:ecc-2-2024:4-1
      ref_id: 4-1-2
      description: "Cybersecurity requirements for contracts and agreements with third\
        \ parties, e.g. Service Level Agreement (SLA), which, if impaired, may affect\
        \ the entity's data or services shall include the following as a minimum:\
        \ (1) Clauses of non-disclosure and the secure removal of the entity\u2019\
        s data by the third party upon the end of service. (2) Communication procedures\
        \ in case of the occurrence of a cybersecurity incident. (3) Obligating the\
        \ third party to apply the entity\u2019s cybersecurity requirements and policies\
        \ and the relevant legislative and regulatory requirements."
