      ref_id: 2-2-3
      description: 'Cybersecurity requirements for identity and access management
        of the entity shall include the following as a minimum: (1) Single-factor
        authentication based on username and password. (2) Multi-factor authentication,
        and defining the suitable authentication factors and their numbers as well
        as the suitable authentication techniques based on the result of impact assessment
        of authentication failure and bypass for remote access and for privileged
        accounts. (3) User authorization based on identity and access control principles
        (Need-to- Know and Need-to-Use principle, Least Privilege principle, and Segregation
        of Duties principle). (4) Privileged access management. (5) Periodic review
        of identities and access rights.'
