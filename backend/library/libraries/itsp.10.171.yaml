      ref_id: 03.03.02.A.6
      description: "identit\xE9 des personnes, des sujets, des objets ou des entit\xE9\
        s associ\xE9s \xE0 l\u2019\xE9v\xE9nement."
      translations:
        en:
          description: identity of individuals, subjects, objects, or entities associated
            with the event
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02
      ref_id: 03.03.02.B
      description: "Fournir des renseignements suppl\xE9mentaires pour les enregistrements\
        \ de v\xE9rification, au besoin."
      translations:
        en:
          description: Provide additional information for audit records, as needed
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02
      ref_id: 03.03.02.disc
      name: Discussion
      description: "Le contenu des enregistrements de v\xE9rification pouvant \xEA\
        tre n\xE9cessaire pour appuyer la fonction de v\xE9rification comprend l\u2019\
        horodatage, l\u2019adresse source et l\u2019adresse de destination, les identificateurs\
        \ d\u2019utilisateur et de processus, la description des \xE9v\xE9nements,\
        \ le nom des fichiers et les r\xE8gles de contr\xF4le d\u2019acc\xE8s ou de\
        \ contr\xF4le de flux invoqu\xE9es. Les r\xE9sultats d\u2019\xE9v\xE9nements\
        \ peuvent comprendre des indicateurs de r\xE9ussite ou d\u2019\xE9chec de\
        \ l\u2019\xE9v\xE9nement et des r\xE9sultats propres \xE0 l\u2019\xE9v\xE9\
        nement (par exemple, l\u2019\xE9tat de s\xE9curit\xE9 du syst\xE8me apr\xE8\
        s l\u2019\xE9v\xE9nement). Les renseignements d\xE9taill\xE9s que les organisations\
        \ peuvent consid\xE9rer dans les enregistrements de v\xE9rification peuvent\
        \ comprendre un enregistrement plein texte des commandes privil\xE9gi\xE9\
        es ou les identit\xE9s individuelles des utilisatrices et utilisateurs appartenant\
        \ \xE0 un compte de groupe."
      translations:
        en:
          name: Discussion
          description: Audit record content that may be necessary to support the auditing
            function includes time stamps, source and destination addresses, user
            or process identifiers, event descriptions, file names, and the access
            control or flow control rules that are invoked. Event outcomes can include
            indicators of event success or failure and event-specific results (e.g.,
            the security state of the system after the event occurred). Detailed information
            that organizations may consider in audit records may include a full text
            recording of privileged commands or the individual identities of group
            account users.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.3
      ref_id: 03.03.03
      name: "G\xE9n\xE9ration d\u2019enregistrements de v\xE9rification"
      translations:
        en:
          name: Audit record generation
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.03
      ref_id: 03.03.03.A
      description: "G\xE9n\xE9rer les enregistrements de v\xE9rification pour les\
        \ types d\u2019\xE9v\xE9nements s\xE9lectionn\xE9s et le contenu des enregistrements\
        \ de v\xE9rification indiqu\xE9 dans les exigences **Journalisation d'\xE9\
        v\xE9nements 03.03.01** et **Contenu des enregistrements de v\xE9rification\
        \ 03.03.02** ."
      translations:
        en:
          description: Generate audit records for the selected event types and audit
            record content specified in **Event logging 03.03.01** and **Audit record
            content 03.03.02**
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.03.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.03
      ref_id: 03.03.03.B
      description: "Conserver les enregistrements de v\xE9rification pendant la p\xE9\
        riode correspondant \xE0 la strat\xE9gie de conservation des dossiers."
      translations:
        en:
          description: Retain audit records for a time period consistent with records
            retention policy
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.03
      ref_id: 03.03.03.disc
      name: Discussion
      description: "Les enregistrements de v\xE9rification peuvent \xEAtre cr\xE9\xE9\
        s \xE0 diff\xE9rents niveaux d\u2019abstraction, y compris au niveau des paquets\
        \ lorsque l\u2019information traverse le r\xE9seau. La s\xE9lection du bon\
        \ niveau d\u2019abstraction est un aspect essentiel des capacit\xE9s de journalisation\
        \ des donn\xE9es de v\xE9rification et peut aider \xE0 d\xE9terminer les causes\
        \ profondes des probl\xE8mes. La capacit\xE9 d\u2019ajouter l\u2019information\
        \ g\xE9n\xE9r\xE9e dans les enregistrements de v\xE9rification d\xE9pend des\
        \ fonctionnalit\xE9s du syst\xE8me permettant de configurer le contenu des\
        \ enregistrements de v\xE9rification. Les organisations peuvent consid\xE9\
        rer ajouter de l\u2019information suppl\xE9mentaire dans les enregistrements\
        \ de v\xE9rification, y compris les r\xE8gles de contr\xF4le d\u2019acc\xE8\
        s et de contr\xF4le de flux invoqu\xE9es et les identit\xE9s individuelles\
        \ des utilisatrices et utilisateurs appartenant \xE0 un compte de groupe.\
        \ Les organisations peuvent \xE9galement envisager de limiter l\u2019information\
        \ suppl\xE9mentaire \xE0 ajouter aux enregistrements de v\xE9rification en\
        \ incluant seulement celle qui est n\xE9cessaire aux exigences de v\xE9rification.\
        \ Si les enregistrements g\xE9n\xE9r\xE9s pour le processus de v\xE9rification\
        \ contiennent des renseignements personnels qui ne sont pas requis pour le\
        \ processus de v\xE9rification, les renseignements personnels doivent \xEA\
        tre retir\xE9s ou caviard\xE9s avant la conservation.\n\nSi les enregistrements\
        \ de v\xE9rification se fondent sur des renseignements personnels et si ces\
        \ renseignements sont utilis\xE9s pour prendre une d\xE9cision administrative,\
        \ la p\xE9riode de conservation minimale standard de deux ans suivant la date\
        \ \xE0 laquelle les renseignements personnels ont \xE9t\xE9 utilis\xE9s le\
        \ plus r\xE9cemment \xE0 des fins administratives, \xE0 moins que l\u2019\xE9\
        limination soit explicitement autoris\xE9e par la personne concern\xE9e."
      translations:
        en:
          name: Discussion
          description: 'Audit records can be generated at various levels of abstraction,
            including at the packet level as information traverses the network. Selecting
            the appropriate level of abstraction is a critical aspect of an audit
            logging capability and can facilitate the identification of root causes
            to problems. The ability to add information generated in audit records
            is dependent on system functionality to configure the audit record content.
            Organizations may consider additional information in audit records, including
            the access control or flow control rules invoked and the individual identities
            of group account users. Organizations may also consider limiting additional
            audit record information to only information that is explicitly needed
            for audit requirements. If records generated for the audit process contain
            personal information that is not required for the audit process, that
            personal information should be removed or redacted prior to retention.


            If audit records rely on personal information and that information is
            used to make an administrative decision, the minimum retention standard
            is at least two years following the last time the personal information
            was used for an administrative purpose unless the individual consents
            to its disposal.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.3
      ref_id: 03.03.04
      name: "Intervention en cas de d\xE9faillance du processus de journalisation\
        \ des donn\xE9es de v\xE9rification"
      translations:
        en:
          name: Response to audit logging process failures
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.04
      ref_id: 03.03.04.A
      description: "Alerter le personnel ou les r\xF4les d\xE9sign\xE9s de l\u2019\
        organisation dans une p\xE9riode de [Affectation : p\xE9riode d\xE9finie par\
        \ l\u2019organisation] en cas de d\xE9faillance d\u2019un processus de journalisation\
        \ des donn\xE9es de v\xE9rification."
      translations:
        en:
          description: 'Alert organizational personnel or roles within [Assignment:
            organization-defined time period] in the event of an audit logging process
            failure'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.04.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.04
      ref_id: 03.03.04.B
      description: "Prendre les mesures suppl\xE9mentaires suivantes : [Affectation\
        \ : mesures suppl\xE9mentaires d\xE9finies par l\u2019organisation]."
      translations:
        en:
          description: 'Take the following additional actions: [Assignment: organization-defined
            additional actions]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.04
      ref_id: 03.03.04.disc
      name: Discussion
      description: "Les d\xE9faillances du processus de journalisation des donn\xE9\
        es de v\xE9rification incluent les erreurs logicielles et mat\xE9rielles,\
        \ la d\xE9faillance des m\xE9canismes de saisie des journaux de v\xE9rification\
        \ et l\u2019atteinte ou le d\xE9passement de la capacit\xE9 de stockage du\
        \ journal de v\xE9rification. Les mesures d\u2019intervention comprennent\
        \ notamment l\u2019\xE9crasement des journaux de v\xE9rification plus anciens,\
        \ la fermeture du syst\xE8me et l\u2019arr\xEAt de la g\xE9n\xE9ration des\
        \ enregistrements de v\xE9rification. Les organisations peuvent choisir de\
        \ d\xE9finir des mesures suppl\xE9mentaires associ\xE9es aux d\xE9faillances\
        \ du processus de journalisation des donn\xE9es de v\xE9rification en fonction\
        \ du type, de l\u2019emplacement et de la gravit\xE9 de la d\xE9faillance,\
        \ ou encore une combinaison de ces facteurs. Lorsque la d\xE9faillance du\
        \ processus de journalisation est associ\xE9e au stockage, l\u2019intervention\
        \ doit s\u2019appliquer au d\xE9p\xF4t de stockage des journaux de v\xE9rification\
        \ (c\u2019est-\xE0-dire le composant syst\xE8me particulier o\xF9 les journaux\
        \ de v\xE9rification sont stock\xE9s), au syst\xE8me sur lequel les journaux\
        \ de v\xE9rification se trouvent, \xE0 la capacit\xE9 de stockage totale de\
        \ l\u2019organisation pour les journaux de v\xE9rification (c\u2019est-\xE0\
        -dire tous les d\xE9p\xF4ts de stockage de journaux de v\xE9rification) ou\
        \ \xE0 ces trois \xE9l\xE9ments. Les organisations peuvent d\xE9cider de ne\
        \ pas prendre de mesures suppl\xE9mentaires apr\xE8s avoir avis\xE9 les r\xF4\
        les ou le personnel d\xE9sign\xE9s."
      translations:
        en:
          name: Discussion
          description: Audit logging process failures include software and hardware
            errors, failures in audit log capturing mechanisms, and reaching or exceeding
            audit log storage capacity. Response actions include overwriting the oldest
            audit records, shutting down the system, and stopping the generation of
            audit records. Organizations may choose to define additional actions for
            audit logging process failures based on the type, location, and severity
            of the failure, or a combination of such factors. When the audit logging
            process failure is related to storage, the response is carried out for
            the audit log storage repository (i.e., the distinct system component
            where the audit logs are stored), the system on which the audit logs reside,
            the total audit log storage capacity of the organization (i.e., all audit
            log storage repositories combined), or all three. Organizations may decide
            to take no additional actions after alerting designated roles or personnel.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.3
      ref_id: 03.03.05
      name: "Examen, analyse et production de rapports li\xE9s aux enregistrements\
        \ de v\xE9rification"
      translations:
        en:
          name: Audit record review, analysis, and reporting
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05
      ref_id: 03.03.05.A
      description: "Examiner et analyser les enregistrements de v\xE9rification du\
        \ syst\xE8me tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019organisation]\
        \ afin de rep\xE9rer les indications et les r\xE9percussions potentielles\
        \ d\u2019activit\xE9s inappropri\xE9es ou inhabituelles."
      translations:
        en:
          description: 'Review and analyze system audit records [Assignment: organization-defined
            frequency] for indications and potential impact of inappropriate or unusual
            activity'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05
      ref_id: 03.03.05.B
      description: "Signaler les r\xE9sultats au personnel ou aux r\xF4les d\xE9sign\xE9\
        s de l\u2019organisation."
      translations:
        en:
          description: Report findings to organizational personnel or roles
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05
      ref_id: 03.03.05.C
      description: "Analyser et mettre en correspondance les enregistrements de v\xE9\
        rification provenant de diff\xE9rents d\xE9p\xF4ts afin d\u2019\xE9tablir\
        \ une connaissance de la situation \xE0 l\u2019\xE9chelle de l\u2019organisation."
      translations:
        en:
          description: Analyze and correlate audit records across different repositories
            to gain organization-wide situational awareness
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.05
      ref_id: 03.03.05.disc
      name: Discussion
      description: "Les activit\xE9s d\u2019examen, d\u2019analyse et de production\
        \ de rapports li\xE9es aux enregistrements de v\xE9rification portent sur\
        \ la journalisation des donn\xE9es relatives \xE0 la s\xE9curit\xE9 et \xE0\
        \ la protection de la vie priv\xE9e effectu\xE9e par les organisations et\
        \ peuvent inclure la journalisation de donn\xE9es d\xE9coulant de la surveillance\
        \ de l\u2019utilisation des comptes, des acc\xE8s distants, des connexions\
        \ sans fil, des param\xE8tres de configuration, de l\u2019utilisation d\u2019\
        outils de maintenance (locaux ou non locaux), de l\u2019inventaire des composants\
        \ syst\xE8me, des connexions d\u2019appareils mobiles, de l\u2019installation\
        \ ou du retrait d\u2019\xE9quipement, des acc\xE8s physiques, de la temp\xE9\
        rature et de l\u2019humidit\xE9, des communications au niveau des interfaces\
        \ du syst\xE8me et de l\u2019utilisation de code mobile. Les r\xE9sultats\
        \ peuvent \xEAtre communiqu\xE9s aux entit\xE9s organisationnelles, comme\
        \ l\u2019\xE9quipe d\u2019intervention en cas d\u2019incident, le service\
        \ de d\xE9pannage et le bureau de la s\xE9curit\xE9 ou de la protection de\
        \ la vie priv\xE9e. Si les organisations ne sont pas autoris\xE9es \xE0 examiner\
        \ et \xE0 analyser les enregistrements de v\xE9rification ou si elles sont\
        \ incapables de mener de telles activit\xE9s, les activit\xE9s d\u2019examen\
        \ et d\u2019analyse peuvent \xEAtre men\xE9es par les organisations disposant\
        \ d\u2019une telle autorit\xE9. La port\xE9e, la fr\xE9quence et/ou la pr\xE9\
        cision de l\u2019examen, de l\u2019analyse et de la production de rapports\
        \ li\xE9s aux enregistrements de v\xE9rification peuvent \xEAtre ajust\xE9\
        es afin de r\xE9pondre aux besoins organisationnels, en fonction de l\u2019\
        information nouvelle re\xE7ue. La mise en correspondance des processus d\u2019\
        examen, d\u2019analyse et de production de rapports li\xE9s aux enregistrements\
        \ de v\xE9rification permet de s\u2019assurer que ces processus, collectivement,\
        \ brossent un tableau plus complet des \xE9v\xE9nements."
      translations:
        en:
          name: Discussion
          description: Audit record review, analysis, and reporting cover information
            security- and privacy-related logging performed by organizations and can
            include logging that results from the monitoring of account usage, remote
            access, wireless connectivity, configuration settings, the use of maintenance
            tools and non-local maintenance, system component inventory, mobile device
            connection, equipment delivery and removal, physical access, temperature
            and humidity, communications at system interfaces, and the use of mobile
            code. Findings can be reported to organizational entities, such as the
            incident response team, help desk, and security or privacy offices. If
            organizations are prohibited from reviewing and analyzing audit records
            or unable to conduct such activities, the review or analysis may be carried
            out by other organizations granted such authority. The scope, frequency,
            and/or depth of the audit record review, analysis, and reporting may be
            adjusted to meet organizational needs based on new information received.
            Correlating audit record review, analysis, and reporting processes helps
            to ensure that they collectively create a more complete view of events.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.06
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.3
      ref_id: 03.03.06
      name: "R\xE9duction des enregistrements de v\xE9rification et g\xE9n\xE9ration\
        \ de rapports"
      translations:
        en:
          name: Audit record reduction and report generation
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.06.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.06
      ref_id: 03.03.06.A
      description: "Mettre en \u0153uvre des capacit\xE9s de r\xE9duction des enregistrements\
        \ de v\xE9rification et de g\xE9n\xE9ration de rapports pour r\xE9pondre aux\
        \ exigences en mati\xE8re d\u2019examen, d\u2019analyse et de production de\
        \ rapports ainsi qu\u2019aux enqu\xEAtes sur les incidents."
      translations:
        en:
          description: Implement an audit record reduction and report generation capability
            that supports audit record review, analysis, reporting requirements, and
            after-the-fact investigations of incidents
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.06.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.06
      ref_id: 03.03.06.B
      description: "Conserver le contenu original et la chronologie des enregistrements\
        \ de v\xE9rification."
      translations:
        en:
          description: Preserve the original content and time ordering of audit records
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.06.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.06
      ref_id: 03.03.06.disc
      name: Discussion
      description: "Les enregistrements de v\xE9rification sont g\xE9n\xE9r\xE9s dans\
        \ l\u2019exigence **G\xE9n\xE9ration d'enregistrements de v\xE9rification\
        \ 03.03.03**. La r\xE9duction des enregistrements de v\xE9rification et la\
        \ g\xE9n\xE9ration de rapports surviennent apr\xE8s la g\xE9n\xE9ration des\
        \ enregistrements de v\xE9rification. La r\xE9duction des enregistrements\
        \ de v\xE9rification est un processus qui transforme les donn\xE9es de v\xE9\
        rification recueillies et les condense afin d\u2019en accro\xEEtre la valeur\
        \ pour les analystes. Les capacit\xE9s de r\xE9duction des enregistrements\
        \ de v\xE9rification et de g\xE9n\xE9ration de rapports ne proviennent pas\
        \ toujours du m\xEAme syst\xE8me ou des m\xEAmes entit\xE9s organisationnelles\
        \ qui m\xE8nent les activit\xE9s de v\xE9rification. Les capacit\xE9s de r\xE9\
        duction des enregistrements de v\xE9rification peuvent inclure, par exemple,\
        \ des techniques d\u2019exploration de donn\xE9es modernes comportant des\
        \ filtres de donn\xE9es \xE9volu\xE9s afin de d\xE9tecter les comportements\
        \ anormaux dans les enregistrements de v\xE9rification. Les capacit\xE9s de\
        \ g\xE9n\xE9ration de rapports fournies par le syst\xE8me peuvent aider \xE0\
        \ g\xE9n\xE9rer des rapports personnalisables. Le classement chronologique\
        \ des enregistrements de v\xE9rification peut \xEAtre un probl\xE8me important\
        \ si la granularit\xE9 de l\u2019horodatage des enregistrements est insuffisante."
      translations:
        en:
          name: Discussion
          description: Audit records are generated in **Audit record generation 03.03.03**.
            Audit record reduction and report generation occur after audit record
            generation. Audit record reduction is a process that manipulates collected
            audit information and organizes it in a summary format that is more meaningful
            to analysts. Audit record reduction and report generation capabilities
            do not always come from the same system or organizational entities that
            conduct auditing activities. An audit record reduction capability can
            include, for example, modern data mining techniques with advanced data
            filters to identify anomalous behaviour in audit records. The report generation
            capability provided by the system can help generate customizable reports.
            The time ordering of audit records can be a significant issue if the granularity
            of the time stamp in the record is insufficient.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.07
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.3
      ref_id: 03.03.07
      name: Horodatage
      translations:
        en:
          name: Time stamps
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.07.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.07
      ref_id: 03.03.07.A
      description: "Utiliser les horloges internes du syst\xE8me pour horodater les\
        \ enregistrements de v\xE9rification."
      translations:
        en:
          description: Use internal system clocks to generate time stamps for audit
            records
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.07.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.07
      ref_id: 03.03.07.B
      description: "Consigner l\u2019horodatage des enregistrements de v\xE9rification\
        \ correspondant \xE0 [Affectation : granularit\xE9 de mesure du temps d\xE9\
        finie par l\u2019organisation] et utilisant le temps universel coordonn\xE9\
        \ (UTC), un d\xE9calage fixe par rapport \xE0 l\u2019UTC correspondant \xE0\
        \ l\u2019heure locale, ou encore en incluant le d\xE9calage local dans les\
        \ donn\xE9es d\u2019horodatage."
      translations:
        en:
          description: 'Record time stamps for audit records that meet [Assignment:
            organization-defined granularity of time measurement] and that use Coordinated
            Universal Time (UTC), have a fixed local time offset from <abbr title="Coordinated
            Universal Time">UTC</abbr> , or include the local time offset as part
            of the time stamp'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.07.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.07
      ref_id: 03.03.07.disc
      name: Discussion
      description: "L\u2019horodatage g\xE9n\xE9r\xE9 par le syst\xE8me comprend la\
        \ date et l\u2019heure. L\u2019heure est souvent exprim\xE9e selon l\u2019\
        UTC ou selon l\u2019heure locale qui est un d\xE9calage par rapport \xE0 l\u2019\
        UTC. La granularit\xE9 des mesures temporelle fait r\xE9f\xE9rence au degr\xE9\
        \ de synchronisation entre les horloges du syst\xE8me et des horloges de r\xE9\
        f\xE9rence (par exemple, la synchronisation des horloges avec une pr\xE9cision\
        \ d\u2019un centi\xE8me ou d\u2019un milli\xE8me de seconde). Les organisations\
        \ peuvent d\xE9finir des granularit\xE9s temporelles diff\xE9rentes pour les\
        \ divers composants du syst\xE8me. Le service d\u2019heure peut \xEAtre essentiel\
        \ \xE0 d\u2019autres capacit\xE9s de s\xE9curit\xE9 (par exemple, le contr\xF4\
        le d\u2019acc\xE8s ainsi que l\u2019identification et l\u2019authentification),\
        \ selon la nature des m\xE9canismes utilis\xE9s pour appuyer ces capacit\xE9\
        s."
      translations:
        en:
          name: Discussion
          description: Time stamps generated by the system include the date and time.
            Time is commonly expressed in <abbr title="Coordinated Universal Time">UTC</abbr>
            or local time with an offset from <abbr title="Coordinated Universal Time">UTC</abbr>.
            The granularity of time measurements refers to the degree of synchronization
            between system clocks and reference clocks (e.g., clocks synchronizing
            within hundreds or tens of milliseconds). Organizations may define different
            time granularities for system components. Time service can be critical
            to other security capabilities (e.g., access control, and identification
            and authentication), depending on the nature of the mechanisms used to
            support those capabilities.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.08
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.3
      ref_id: 03.03.08
      name: "Protection de l\u2019information de v\xE9rification"
      translations:
        en:
          name: Protection of audit information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.08.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.08
      ref_id: 03.03.08.A
      description: "Prot\xE9ger l\u2019information de v\xE9rification et les outils\
        \ de journalisation des donn\xE9es de v\xE9rification contre les acc\xE8s\
        \ non autoris\xE9s, les modifications et les suppressions."
      translations:
        en:
          description: Protect audit information and audit logging tools from unauthorized
            access, modification, and deletion
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.08.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.08
      ref_id: 03.03.08.B
      description: "Autoriser l\u2019acc\xE8s pour la gestion de la fonctionnalit\xE9\
        \ de journalisation des donn\xE9es de v\xE9rification uniquement \xE0 un sous-ensemble\
        \ d\u2019utilisatrices et utilisateurs ou de r\xF4les privil\xE9gi\xE9s."
      translations:
        en:
          description: Authorize access to management of audit logging functionality
            to only a subset of privileged users or roles
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.08.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.08
      ref_id: 03.03.08.disc
      name: Discussion
      description: "\u2022 L\u2019information de v\xE9rification comprend les renseignements\
        \ n\xE9cessaires pour mener \xE0 bien la v\xE9rification des activit\xE9s\
        \ du syst\xE8me, notamment les enregistrements de v\xE9rification, les param\xE8\
        tres de journalisation des donn\xE9es de v\xE9rification, les rapports de\
        \ v\xE9rification et les renseignements personnels. Les outils de journalisation\
        \ des donn\xE9es de v\xE9rification sont des programmes et des dispositifs\
        \ servant \xE0 mener les activit\xE9s de v\xE9rification et de consignation.\
        \ La protection de l\u2019information de v\xE9rification se concentre sur\
        \ la protection physique et emp\xEAche des personnes non autoris\xE9es d\u2019\
        acc\xE9der \xE0 des outils de journalisation des donn\xE9es de v\xE9rification\
        \ et de les ex\xE9cuter. La protection physique de l\u2019information de v\xE9\
        rification est abord\xE9e par les exigences de protection physique et des\
        \ supports.\n\u2022 Les personnes ou les r\xF4les dot\xE9s d\u2019un acc\xE8\
        s privil\xE9gi\xE9 \xE0 un syst\xE8me et qui sont \xE9galement l\u2019objet\
        \ d\u2019une v\xE9rification par ce syst\xE8me peuvent affecter la fiabilit\xE9\
        \ de l\u2019information de v\xE9rification en bloquant les activit\xE9s de\
        \ v\xE9rification ou en modifiant les enregistrements de v\xE9rification.\
        \ Le fait d\u2019exiger un acc\xE8s privil\xE9gi\xE9 mieux d\xE9fini en ce\
        \ qui concerne les privil\xE8ges associ\xE9s aux v\xE9rifications et les autres\
        \ privil\xE8ges limite le nombre d\u2019utilisatrices et utilisateurs ou de\
        \ r\xF4les qui d\xE9tiennent les privil\xE8ges associ\xE9s aux v\xE9rifications."
      translations:
        en:
          name: Discussion
          description: 'Audit information includes the information needed to successfully
            audit system activity, such as audit records, audit log settings, audit
            reports, and personal information. Audit logging tools are programs and
            devices used to conduct audit and logging activities. The protection of
            audit information focuses on technical protection and limits the ability
            to access and execute audit logging tools to authorized individuals. The
            physical protection of audit information is addressed by media and physical
            protection requirements.


            Individuals or roles with privileged access to a system and who are also
            the subject of an audit by that system may affect the reliability of the
            audit information by inhibiting audit activities or modifying audit records.
            Requiring privileged access to be further defined between audit-related
            privileges and other privileges limits the number of users or roles with
            audit-related privileges.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.4'
      name: Gestion des configurations
      description: "Les contr\xF4les de gestion des configurations appuient la gestion\
        \ et le contr\xF4le de tous les composants du syst\xE8me, comme le mat\xE9\
        riel, les logiciels et les \xE9l\xE9ments de configuration."
      translations:
        en:
          name: Configuration management
          description: The Configuration management controls support the management
            and control of all components of the system such as hardware, software,
            and configuration items.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.01
      name: "Configuration de r\xE9f\xE9rence"
      translations:
        en:
          name: Baseline configuration
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.01
      ref_id: 03.04.01.A
      description: "\xC9laborer et tenir \xE0 jour, dans le cadre du contr\xF4le des\
        \ configurations, une configuration de r\xE9f\xE9rence du syst\xE8me."
      translations:
        en:
          description: Develop and maintain under configuration control, a current
            baseline configuration of the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.01
      ref_id: 03.04.01.B
      description: "Examiner et mettre \xE0 jour la configuration de r\xE9f\xE9rence\
        \ du syst\xE8me tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019\
        organisation] et lorsque des composants syst\xE8me sont install\xE9s ou modifi\xE9\
        s."
      translations:
        en:
          description: 'Review and update the baseline configuration of the system
            [Assignment: organization-defined frequency] and when system components
            are installed or modified'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.01
      ref_id: 03.04.01.disc
      name: Discussion
      description: "Les configurations de r\xE9f\xE9rence pour les syst\xE8mes et\
        \ les composants des syst\xE8mes incluent les \xE9l\xE9ments associ\xE9s \xE0\
        \ la connectivit\xE9, \xE0 l\u2019utilisation et aux communications. Les configurations\
        \ de r\xE9f\xE9rence sont des sp\xE9cifications des syst\xE8mes ou des \xE9\
        l\xE9ments de configuration connexes document\xE9s dont on a convenu et qui\
        \ font l\u2019objet d\u2019un examen officiel. Les configurations de r\xE9\
        f\xE9rence servent de fondement pour les \xE9ditions, les versions ou les\
        \ changements \xE0 venir du syst\xE8me et comprennent des renseignements \xE0\
        \ propos des composants du syst\xE8me, des proc\xE9dures op\xE9rationnelles,\
        \ de la topologie de r\xE9seau et de la disposition des composants au sein\
        \ de l\u2019architecture du syst\xE8me. La tenue \xE0 jour des configurations\
        \ de r\xE9f\xE9rence n\xE9cessite de cr\xE9er de nouvelles bases de r\xE9\
        f\xE9rence \xE0 mesure que le syst\xE8me \xE9volue au fil du temps. Les configurations\
        \ de r\xE9f\xE9rence des syst\xE8mes tiennent compte de l\u2019architecture\
        \ d\u2019entreprise actuelle. Si le syst\xE8me facilite la collecte ou l\u2019\
        utilisation de renseignements personnels, les configurations de r\xE9f\xE9\
        rence devraient inclure un \xE9nonc\xE9 sur la protection de la vie priv\xE9\
        e fourni aux utilisatrices et utilisateurs."
      translations:
        en:
          name: Discussion
          description: Baseline configurations for the system and system components
            include aspects of connectivity, operation, and communications. Baseline
            configurations are documented, formally reviewed, and agreed-upon specifications
            for the system or configuration items within it. Baseline configurations
            serve as a basis for future builds, releases, or changes to the system
            and include information about system components, operational procedures,
            network topology, and the placement of components in the system architecture.
            Maintaining baseline configurations requires creating new baselines as
            the system changes over time. Baseline configurations of the system reflect
            the current enterprise architecture. If the system facilitates the collection
            or use of personal information, baseline configurations should include
            providing privacy notice to users.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.02
      name: "Param\xE8tres de configuration"
      translations:
        en:
          name: Configuration settings
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.02
      ref_id: 03.04.02.A
      description: "\xC9tablir, documenter et mettre en \u0153uvre les param\xE8tres\
        \ de configuration suivants pour le syst\xE8me afin de refl\xE9ter le mode\
        \ le plus restrictif selon les exigences op\xE9rationnelles : [Affectation\
        \ : param\xE8tres de configuration d\xE9finis par l\u2019organisation]."
      translations:
        en:
          description: 'Establish, document, and implement the following configuration
            settings for the system that reflect the most restrictive mode consistent
            with operational requirements: [Assignment: organization-defined configuration
            settings]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.02
      ref_id: 03.04.02.B
      description: "D\xE9terminer, documenter et approuver toute d\xE9viation des\
        \ param\xE8tres de configuration \xE9tablis."
      translations:
        en:
          description: Identify, document, and approve any deviations from established
            configuration settings.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.02
      ref_id: 03.04.02.disc
      name: Discussion
      description: "Les param\xE8tres de configuration repr\xE9sentent l\u2019ensemble\
        \ des param\xE8tres pouvant \xEAtre modifi\xE9s dans les composants mat\xE9\
        riels, logiciels ou micrologiciels du syst\xE8me et qui affectent la posture\
        \ de s\xE9curit\xE9 ou de protection de la vie priv\xE9e ou encore le fonctionnement\
        \ du syst\xE8me. Les param\xE8tres de configuration li\xE9s \xE0 la s\xE9\
        curit\xE9 peuvent \xEAtre d\xE9finis pour les syst\xE8mes (par exemple, les\
        \ serveurs et postes de travail), les dispositifs d\u2019entr\xE9e-sortie\
        \ (par exemple, les num\xE9riseurs, photocopieurs et imprimantes), les composants\
        \ r\xE9seau (par exemple, les pare-feu, routeurs, passerelles, commutateurs\
        \ voix-donn\xE9es, points d\u2019acc\xE8s sans fil, appareils r\xE9seau et\
        \ capteurs), les syst\xE8mes d\u2019exploitation, les logiciels m\xE9diateurs\
        \ et les applications.\n\nLes param\xE8tres de s\xE9curit\xE9 ont une incidence\
        \ sur l\u2019\xE9tat de s\xE9curit\xE9 du syst\xE8me et incluent les param\xE8\
        tres n\xE9cessaires pour r\xE9pondre \xE0 d\u2019autres exigences de s\xE9\
        curit\xE9. Les param\xE8tres de s\xE9curit\xE9 comprennent notamment les param\xE8\
        tres de registre, les param\xE8tres d\u2019autorisation pour les comptes,\
        \ les fichiers et les r\xE9pertoires (c\u2019est-\xE0-dire les privil\xE8\
        ges) et les param\xE8tres pour les fonctions, les ports, les protocoles et\
        \ les connexions distantes. Les param\xE8tres de protection de la vie priv\xE9\
        e sont les param\xE8tres qui ont une incidence sur la posture de protection\
        \ de la vie priv\xE9e des syst\xE8mes, y compris ceux n\xE9cessaires pour\
        \ r\xE9pondre \xE0 d\u2019autres contr\xF4les de protection de la vie priv\xE9\
        e. Les param\xE8tres de protection de la vie priv\xE9e incluent les exigences\
        \ de contr\xF4le d\u2019acc\xE8s, de renseignements personnels, de pr\xE9\
        cision des donn\xE9es, les capacit\xE9s de manipulation des donn\xE9es, les\
        \ pr\xE9f\xE9rences de traitement des donn\xE9es et les permissions de traitement\
        \ et de r\xE9tention de l\u2019information. Les organisations doivent \xE9\
        tablir des param\xE8tres de configuration \xE0 l\u2019\xE9chelle de l\u2019\
        organisation et par la suite des param\xE8tres de configuration particuliers\
        \ pour le syst\xE8me. Les param\xE8tres \xE9tablis deviennent une partie int\xE9\
        grante de la configuration de r\xE9f\xE9rence du syst\xE8me.\n\nLes configurations\
        \ s\xE9curis\xE9es communes (que l\u2019on appelle \xE9galement les listes\
        \ de v\xE9rification concernant la configuration de s\xE9curit\xE9, les guides\
        \ de confinement et de renforcement, les guides de r\xE9f\xE9rence pour la\
        \ s\xE9curit\xE9 et les guides techniques de mise en \u0153uvre de la s\xE9\
        curit\xE9 [STIG pour Security Technical Implementation Guide]) fournissent\
        \ des points de rep\xE8re reconnus, normalis\xE9s et \xE9tablis qui stipulent\
        \ les param\xE8tres de configuration s\xE9curis\xE9e associ\xE9s \xE0 des\
        \ plateformes ou \xE0 des produits de technologies de l\u2019information (TI)\
        \ particuliers ainsi que des instructions pour la configuration de ces composants\
        \ syst\xE8me afin de r\xE9pondre aux exigences op\xE9rationnelles. Diverses\
        \ organisations peuvent d\xE9velopper des configurations s\xE9curis\xE9es\
        \ communes, y compris les d\xE9veloppeurs de produits TI, les fabricants,\
        \ les fournisseurs, les consortiums, le milieu universitaire, l\u2019industrie,\
        \ les minist\xE8res et organismes f\xE9d\xE9raux ainsi que d\u2019autres organisations\
        \ des secteurs public et priv\xE9."
      translations:
        en:
          name: Discussion
          description: "Configuration settings are the set of parameters that can\
            \ be changed in hardware, software, or firmware components of the system\
            \ which affect the security and privacy posture or functionality of the\
            \ system. Security-related configuration settings can be defined for systems\
            \ (e.g., servers, workstations), input and output devices (e.g., scanners,\
            \ copiers, printers), network components (e.g., firewalls, routers, gateways,\
            \ voice and data switches, wireless access points, network appliances,\
            \ sensors), operating systems, middleware, and applications.\n\nSecurity\
            \ parameters are those that impact the security state of the system, including\
            \ the parameters required to satisfy other security requirements. Security\
            \ parameters include registry settings; account, file, and directory permission\
            \ settings (i.e., privileges); and settings for functions, ports, protocols,\
            \ and remote connections. Privacy parameters are parameters impacting\
            \ the privacy posture of systems, including those required to satisfy\
            \ other privacy controls. Privacy parameters include settings for access\
            \ controls, personal information, data accuracy requirements, data manipulation\
            \ capabilities, data processing preferences, and information handling\
            \ and retention permissions. Organizations establish organization-wide\
            \ configuration settings and subsequently derive specific configuration\
            \ settings for the system. The established settings become part of the\
            \ system\u2019s configuration baseline.\n\nCommon secure configurations\
            \ (also referred to as security configuration checklists, lockdown and\
            \ hardening guides, security reference guides, and security technical\
            \ implementation guides) provide recognized, standardized, and established\
            \ benchmarks that stipulate secure configuration settings for specific\
            \ <abbr title=\"information technology\">IT</abbr> platforms/products\
            \ and instructions for configuring those system components to meet operational\
            \ requirements. Common secure configurations can be developed by a variety\
            \ of organizations, including <abbr title=\"information technology\">IT</abbr>\
            \ product developers, manufacturers, vendors, consortia, academia, industry,\
            \ federal departments and agencies, and other organizations in the public\
            \ and private sectors."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.03
      name: "Contr\xF4le des changements de configuration"
      translations:
        en:
          name: Configuration change control
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03
      ref_id: 03.04.03.A
      description: "D\xE9finir les types de changements apport\xE9s au syst\xE8me\
        \ qui sont contr\xF4l\xE9s par la configuration."
      translations:
        en:
          description: Define the types of changes to the system that are configuration-controlled
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03
      ref_id: 03.04.03.B
      description: "Examiner les changements propos\xE9s au syst\xE8me qui sont contr\xF4\
        l\xE9s par la configuration et les approuver ou les refuser en tenant compte\
        \ explicitement des r\xE9percussions sur la s\xE9curit\xE9."
      translations:
        en:
          description: Review proposed configuration-controlled changes to the system
            and approve or disapprove such changes with explicit consideration for
            security impacts
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03
      ref_id: 03.04.03.C
      description: "Mettre en \u0153uvre et documenter les changements approuv\xE9\
        s au syst\xE8me qui sont contr\xF4l\xE9s par la configuration."
      translations:
        en:
          description: Implement and document approved configuration-controlled changes
            to the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03
      ref_id: 03.04.03.D
      description: "Surveiller et examiner les activit\xE9s associ\xE9es aux changements\
        \ contr\xF4l\xE9s par la configuration visant le syst\xE8me."
      translations:
        en:
          description: Monitor and review activities associated with configuration-controlled
            changes to the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.03
      ref_id: 03.04.03.disc
      name: Discussion
      description: "Le contr\xF4le des changements de configuration fait r\xE9f\xE9\
        rence aux activit\xE9s de suivi, d\u2019examen, d\u2019approbation, de refus\
        \ et de journalisation des changements au syst\xE8me. Ce contr\xF4le comprend\
        \ la proposition, la justification, la mise en \u0153uvre, la mise \xE0 l\u2019\
        essai, l\u2019examen et l\u2019application syst\xE9matiques de changements\
        \ au syst\xE8me, y compris les mises \xE0 niveau et les modifications du syst\xE8\
        me. Le contr\xF4le des changements de configuration inclut les changements\
        \ aux configurations de r\xE9f\xE9rence pour les composants syst\xE8me (par\
        \ exemple, les syst\xE8mes d\u2019exploitation, applications, pare-feu, routeurs\
        \ et appareils mobiles) et aux \xE9l\xE9ments de configuration du syst\xE8\
        me, les changements aux param\xE8tres de configuration, les changements non\
        \ planifi\xE9s et non autoris\xE9s, et les changements visant \xE0 corriger\
        \ des vuln\xE9rabilit\xE9s. Cette exigence est associ\xE9e \xE0 l\u2019exigence\
        \ **Analyses des r\xE9percussions 03.04.04**."
      translations:
        en:
          name: Discussion
          description: Configuration change control refers to tracking, reviewing,
            approving or disapproving, and logging changes to the system. Specifically,
            it involves the systematic proposal, justification, implementation, testing,
            review, and disposition of changes to the system, including system upgrades
            and modifications. Configuration change control includes changes to baseline
            configurations for system components (e.g., operating systems, applications,
            firewalls, routers, mobile devices) and configuration items of the system,
            changes to configuration settings, unscheduled and unauthorized changes,
            and changes to remediate vulnerabilities. This requirement is related
            to **Impact analyses 03.04.04**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.04
      name: "Analyses des r\xE9percussions"
      translations:
        en:
          name: Impact analyses
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.04
      ref_id: 03.04.04.A
      description: "Analyser les r\xE9percussions sur la s\xE9curit\xE9 et sur la\
        \ vie priv\xE9e des changements apport\xE9s au syst\xE8me, avant la mise en\
        \ \u0153uvre."
      translations:
        en:
          description: Analyze the security and privacy impacts of changes to the
            system prior to implementation
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.04.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.04
      ref_id: 03.04.04.B
      description: "V\xE9rifier que les exigences de s\xE9curit\xE9 du syst\xE8me\
        \ continueront d\u2019\xEAtre satisfaites apr\xE8s la mise en \u0153uvre des\
        \ changements."
      translations:
        en:
          description: Verify that the security requirements for the system continue
            to be satisfied after the system changes have been implemented
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.04
      ref_id: 03.04.04.disc
      name: Discussion
      description: "Le personnel de l\u2019organisation ayant des responsabilit\xE9\
        s en mati\xE8re de s\xE9curit\xE9 et de protection de la vie priv\xE9e doit\
        \ mener des analyses des r\xE9percussions qui comprennent les \xE9l\xE9ments\
        \ suivants : examiner les plans, les politiques et les proc\xE9dures de s\xE9\
        curit\xE9 et de protection de la vie priv\xE9e afin de comprendre les exigences\
        \ de s\xE9curit\xE9 et de protection de la vie priv\xE9e; examiner la documentation\
        \ de conception et les proc\xE9dures op\xE9rationnelles du syst\xE8me afin\
        \ de comprendre les r\xE9percussions que peuvent entra\xEEner les changements\
        \ apport\xE9s au syst\xE8me sur l\u2019\xE9tat de s\xE9curit\xE9 et de protection\
        \ de la vie priv\xE9e du syst\xE8me; examiner les r\xE9percussions que peuvent\
        \ entra\xEEner les changements de partenaires de la cha\xEEne d\u2019approvisionnement\
        \ sur les parties prenantes; d\xE9terminer la mani\xE8re dont les changements\
        \ potentiels apport\xE9s au syst\xE8me peuvent cr\xE9er de nouveaux risques\
        \ pour la vie priv\xE9e des personnes et \xE9tablir la capacit\xE9 \xE0 att\xE9\
        nuer ces risques. Les analyses des r\xE9percussions incluent \xE9galement\
        \ les \xE9valuations des risques afin de comprendre les r\xE9percussions des\
        \ changements et de d\xE9terminer si des exigences de s\xE9curit\xE9 ou de\
        \ protection de la vie priv\xE9e suppl\xE9mentaires sont n\xE9cessaires. Les\
        \ changements apport\xE9s au syst\xE8me peuvent avoir une incidence sur les\
        \ mesures de protection et les contre-mesures qui ont \xE9t\xE9 mises en \u0153\
        uvre pr\xE9c\xE9demment. Cette exigence est associ\xE9e \xE0 l\u2019exigence\
        \ **Contr\xF4le des changements de configuration 03.04.03**. Les changements\
        \ au syst\xE8me ne sont pas tous contr\xF4l\xE9s par la configuration."
      translations:
        en:
          name: Discussion
          description: Organizational personnel with security or privacy responsibilities
            conduct impact analyses that include reviewing security and privacy plans,
            policies, and procedures to understand security and privacy requirements;
            reviewing system design documentation and operational procedures to understand
            how system changes might affect the security and privacy state of the
            system; reviewing the impacts of changes on supply chain partners with
            stakeholders; and determining how potential changes to a system create
            new risks to the privacy of individuals, and the ability to mitigate those
            risks. Impact analyses also include risk assessments to understand the
            impacts of changes and to determine whether additional security or privacy
            requirements are needed. Changes to the system may affect the safeguards
            and countermeasures previously implemented. This requirement is related
            to **Configuration change control 03.04.03**. Not all changes to the system
            are configuration controlled.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.05
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.05
      name: "Restriction d\u2019acc\xE8s pour les changements"
      translations:
        en:
          name: Access restrictions for change
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.05.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.05
      ref_id: 03.04.05.A
      description: "D\xE9finir, documenter, approuver et appliquer les restrictions\
        \ d\u2019acc\xE8s physiques et logiques associ\xE9es aux changements apport\xE9\
        s au syst\xE8me."
      translations:
        en:
          description: Define, document, approve, and enforce physical and logical
            access restrictions associated with changes to the system.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.05
      ref_id: 03.04.05.disc
      name: Discussion
      description: "Les changements apport\xE9s aux composants mat\xE9riels, logiciels\
        \ ou micrologiciels du syst\xE8me ou aux proc\xE9dures op\xE9rationnelles\
        \ associ\xE9es au syst\xE8me peuvent avoir des r\xE9percussions importantes\
        \ sur la s\xE9curit\xE9 du syst\xE8me ou la vie priv\xE9e des personnes. Les\
        \ organisations doivent donc accorder l\u2019acc\xE8s au syst\xE8me seulement\
        \ aux personnes qualifi\xE9es et autoris\xE9es et seulement pour effectuer\
        \ les changements. Les restrictions d\u2019acc\xE8s incluent les contr\xF4\
        les d\u2019acc\xE8s physiques et logiques, les biblioth\xE8ques de logiciels,\
        \ l\u2019automatisation de flux de travaux, les m\xE9diath\xE8ques, les couches\
        \ abstraites (c\u2019est-\xE0-dire les changements mis en \u0153uvre dans\
        \ les interfaces externes plut\xF4t que directement dans le syst\xE8me) et\
        \ les fen\xEAtres de changement (c\u2019est-\xE0-dire les changements sont\
        \ appliqu\xE9s seulement \xE0 des moments pr\xE9cis)."
      translations:
        en:
          name: Discussion
          description: "Changes to the hardware, software, or firmware components\
            \ of the system or the operational procedures related to the system can\
            \ have potentially significant effects on the security of the system or\
            \ individuals\u2019 privacy. Therefore, organizations permit only qualified\
            \ and authorized individuals to access the system for the purpose of initiating\
            \ changes. Access restrictions include physical and logical access controls,\
            \ software libraries, workflow automation, media libraries, abstract layers\
            \ (i.e., changes implemented into external interfaces rather than directly\
            \ into the system), and change windows (i.e., changes occur only during\
            \ specified times)."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.06
      name: "Fonctionnalit\xE9 minimale"
      translations:
        en:
          name: Least functionality
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06
      ref_id: 03.04.06.A
      description: "Configurer le syst\xE8me afin qu\u2019il fournisse uniquement\
        \ les capacit\xE9s essentielles \xE0 la mission."
      translations:
        en:
          description: Configure the system to provide only mission-essential capabilities
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06
      ref_id: 03.04.06.B
      description: "Interdire ou restreindre l\u2019utilisation des fonctions, des\
        \ ports, des protocoles, des connexions et des services suivants : [Affectation\
