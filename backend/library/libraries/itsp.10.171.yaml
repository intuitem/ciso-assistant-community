    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.16.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.16
      ref_id: 03.01.16.disc
      name: Discussion
      description: "Les capacit\xE9s de r\xE9seau sans fil repr\xE9sentent une vuln\xE9\
        rabilit\xE9 potentielle importante pouvant \xEAtre exploit\xE9e par des adversaires.\
        \ L\u2019\xE9tablissement de restrictions d\u2019utilisation ainsi que les\
        \ exigences en mati\xE8re de configuration et de connexion pour l\u2019acc\xE8\
        s sans fil au syst\xE8me offrent des crit\xE8res permettant d\u2019appuyer\
        \ les d\xE9cisions d\u2019autorisation d\u2019acc\xE8s. Ces restrictions et\
        \ exigences r\xE9duisent la possibilit\xE9 des acc\xE8s syst\xE8me non autoris\xE9\
        s par des technologies sans fil. Les r\xE9seaux sans fil utilisent des protocoles\
        \ d\u2019authentification <abbr title=\"Authentification&#10;Processus ou\
        \ mesure permettant de v\xE9rifier l\u2019identit\xE9 d\u2019un utilisateur.\"\
        ><sup>(?)</sup></abbr> afin de fournir une protection au moyen de justificatifs\
        \ d\u2019identit\xE9 et d\u2019une authentification mutuelle. Les organisations\
        \ authentifient les personnes et les dispositifs afin de prot\xE9ger les acc\xE8\
        s sans fil au syst\xE8me. Une attention particuli\xE8re doit \xEAtre accord\xE9\
        e \xE0 la vari\xE9t\xE9 des appareils dot\xE9s d\u2019un acc\xE8s sans fil\
        \ au syst\xE8me, y compris les appareils mobiles de petite taille (par exemple,\
        \ les t\xE9l\xE9phones intelligents, les tablettes et les montres intelligentes).\
        \ Les capacit\xE9s de r\xE9seau sans fil int\xE9gr\xE9es aux composants syst\xE8\
        me repr\xE9sentent une vuln\xE9rabilit\xE9 potentielle importante pouvant\
        \ \xEAtre exploit\xE9e par des adversaires. Un m\xE9canisme rigoureux d\u2019\
        authentification des utilisatrices et utilisateurs et des appareils, un chiffrement\
        \ <abbr title=\"Chiffrement&#10;Proc\xE9dure par laquelle une information\
        \ est convertie d\u2019une forme \xE0 une autre afin d\u2019en dissimuler\
        \ le contenu et d&#x27;en interdire l\u2019acc\xE8s aux entit\xE9s non autoris\xE9\
        es.\"><sup>(?)</sup></abbr> robuste et la d\xE9sactivation des capacit\xE9\
        s sans fil non n\xE9cessaires \xE0 la mission ou aux activit\xE9s peuvent\
        \ r\xE9duire sensiblement les menaces que font peser les adversaires exploitant\
        \ des technologies sans fil."
      translations:
        en:
          name: Discussion
          description: Wireless networking capabilities represent a significant potential
            vulnerability that can be exploited by adversaries. Establishing usage
            restrictions, configuration requirements, and connection requirements
            for wireless access to the system provides criteria to support access
            authorization <abbr title="Authorization&#10;Access privileges granted
            to a user, program, or process."><sup>(?)</sup></abbr> decisions. These
            restrictions and requirements reduce susceptibility to unauthorized system
            access through wireless technologies. Wireless networks use authentication
            <abbr title="Authentication&#10;A process or measure used to verify a
            users identity."><sup>(?)</sup></abbr> protocols that provide credential
            protection and mutual authentication. Organizations authenticate individuals
            and devices to protect wireless access to the system. Special attention
            is given to the variety of devices with potential wireless access to the
            system, including small form factor mobile devices (e.g., smart phones,
            tablets, smart watches). Wireless networking capabilities that are embedded
            within system components represent a significant potential vulnerability
            that can be exploited by adversaries. Strong authentication of users and
            devices, strong encryption <abbr title="Encryption&#10;Converting information
            from one form to another to hide its content and prevent unauthorized
            access."><sup>(?)</sup></abbr>, and disabling wireless capabilities that
            are not needed for essential missions or business functions can reduce
            susceptibility to threats by adversaries involving wireless technologies.
