      translations:
        en:
          name: System monitoring
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.a
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06
      ref_id: 03.14.06.A
      description: "Surveiller le syst\xE8me afin de d\xE9tecter :"
      translations:
        en:
          description: 'Monitor the system to detect:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.a.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.a
      ref_id: 03.14.06.A.1
      description: "les attaques et les indicateurs d\u2019attaques potentielles;"
      translations:
        en:
          description: attacks and indicators of potential attacks
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.a.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.a
      ref_id: 03.14.06.A.2
      description: "les connexions non autoris\xE9es."
      translations:
        en:
          description: unauthorized connections
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06
      ref_id: 03.14.06.B
      description: "D\xE9tecter les utilisations non autoris\xE9es du syst\xE8me."
      translations:
        en:
          description: Identify unauthorized use of the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06
      ref_id: 03.14.06.C
      description: "Surveiller le trafic de communications entrantes et sortantes\
        \ afin de d\xE9tecter les activit\xE9s ou les conditions atypiques ou non\
        \ autoris\xE9es."
      translations:
        en:
          description: Monitor inbound and outbound communications traffic to detect
            unusual or unauthorized activities or conditions
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06
      ref_id: 03.14.06.disc
      name: Discussion
      description: "La surveillance du syst\xE8me comprend \xE0 la fois la surveillance\
        \ interne et la surveillance externe. La surveillance interne comprend l\u2019\
        observation des \xE9v\xE9nements qui surviennent dans le syst\xE8me. La surveillance\
        \ externe comprend l\u2019observation des \xE9v\xE9nements qui se produisent\
        \ \xE0 la fronti\xE8re du syst\xE8me. Les organisations peuvent surveiller\
        \ le syst\xE8me en observant les activit\xE9s li\xE9es aux enregistrements\
        \ de v\xE9rification en temps r\xE9el ou en observant d\u2019autres aspects\
        \ du syst\xE8me, comme les tendances d\u2019acc\xE8s, les caract\xE9ristiques\
        \ d\u2019acc\xE8s et d\u2019autres op\xE9rations. Les objectifs de la surveillance\
        \ peuvent orienter la d\xE9termination des \xE9v\xE9nements.\n\nLes capacit\xE9\
        s de surveillance du syst\xE8me sont r\xE9alis\xE9es au moyen d\u2019une vari\xE9\
        t\xE9 d\u2019outils et de techniques (par exemple, les logiciels de surveillance\
        \ des enregistrements de v\xE9rification, les syst\xE8mes de d\xE9tection\
        \ d\u2019intrusion, les syst\xE8mes de pr\xE9vention d\u2019intrusion, les\
        \ logiciels de protection contre le code malveillant, les outils de balayage\
        \ et les logiciels de surveillance de r\xE9seau). Les dispositifs de surveillance\
        \ sont d\xE9ploy\xE9s \xE0 des endroits strat\xE9giques, notamment dans des\
        \ emplacements du p\xE9rim\xE8tre s\xE9lectionn\xE9s et pr\xE8s des grappes\
        \ de serveurs qui prennent en charge des applications essentielles, et sont\
        \ employ\xE9s \xE0 titre d\u2019interfaces syst\xE8me g\xE9r\xE9es. La granularit\xE9\
        \ de la surveillance de l\u2019information collect\xE9e est bas\xE9e sur les\
        \ objectifs de surveillance de l\u2019organisation et la capacit\xE9 du syst\xE8\
        me \xE0 prendre en charge de tels objectifs.\n\nLes connexions aux syst\xE8\
        mes peuvent \xEAtre de type r\xE9seau, distant ou local. Une connexion r\xE9\
        seau est une connexion effectu\xE9e avec un appareil qui communique au moyen\
        \ d\u2019un r\xE9seau (par exemple, un r\xE9seau local, Internet). Une connexion\
        \ distante est une connexion effectu\xE9e avec un appareil qui communique\
        \ au moyen d\u2019un r\xE9seau externe (par exemple, Internet). Les connexions\
        \ r\xE9seau, distantes et locales peuvent \xEAtre filaires ou sans fil.\n\n\
        Les activit\xE9s ou conditions inusit\xE9es ou non autoris\xE9es associ\xE9\
        es au trafic de communications entrantes et sortantes comprennent le trafic\
        \ interne qui indique la pr\xE9sence de code malveillant sur le syst\xE8me\
        \ ou qui se propage entre les composants du syst\xE8me, l\u2019exportation\
        \ d\u2019information non autoris\xE9e ou la signalisation vers des syst\xE8\
        mes externes. Les preuves de code malveillant servent \xE0 d\xE9terminer la\
        \ compromission potentielle du syst\xE8me. Les exigences en mati\xE8re de\
        \ surveillance du syst\xE8me, y compris la surveillance selon le type de syst\xE8\
        me, peuvent se trouver dans d\u2019autres exigences."
      translations:
        en:
          name: Discussion
          description: 'System monitoring involves external and internal monitoring.
            Internal monitoring includes the observation of events that occur within
            the system. External monitoring includes the observation of events that
            occur at the system boundary. Organizations can monitor the system by
            observing audit record activities in real time or by observing other system
            aspects, such as access patterns, characteristics of access, and other
            actions. The monitoring objectives may guide determination of the events.


            A system monitoring capability is achieved through a variety of tools
            and techniques (e.g., audit record monitoring software, intrusion detection
            systems, intrusion prevention systems, malicious code protection software,
            scanning tools, network monitoring software). Strategic locations for
            monitoring devices include selected perimeter locations and near server
            farms that support critical applications with such devices being employed
            at managed system interfaces. The granularity of monitoring the information
            collected is based on organizational monitoring objectives and the capability
            of the system to support such objectives.


            Systems connections can be network, remote, or local. A network connection
            is any connection with a device that communicates through a network (e.g.,
            local area network, the Internet). A remote connection is any connection
            with a device that communicates through an external network (e.g., the
            Internet). Network, remote, and local connections can be either wired
            or wireless.


            Unusual or unauthorized activities or conditions related to inbound and
            outbound communications traffic include internal traffic that indicates
            the presence of malicious code in the system or propagating among system
            components, the unauthorized export of information, or signaling to external
            systems. Evidence of malicious code is used to identify a potentially
            compromised system. System monitoring requirements, including the need
            for types of system monitoring, may be referenced in other requirements.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.08
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.14
      ref_id: 03.14.08
      name: "Gestion et conservation de l\u2019information"
      translations:
        en:
          name: Information management and retention
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.08.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.08
      ref_id: 03.14.08.A
      description: "G\xE9rer et conserver l\u2019information d\xE9sign\xE9e au sein\
        \ du syst\xE8me et les sorties d\u2019information d\xE9sign\xE9e du syst\xE8\
        me conform\xE9ment aux lois, aux d\xE9crets, aux directives, aux r\xE9glementations,\
        \ aux politiques, aux normes, aux lignes directrices et aux exigences op\xE9\
        rationnelles applicables."
      translations:
        en:
          description: Manage and retain specified information within the system and
            specified information output from the system in accordance with applicable
            laws, Orders in Council, directives, regulations, policies, standards,
            guidelines, and operational requirements.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.08.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.08
      ref_id: 03.14.08.disc
      name: Discussion
      description: "Les minist\xE8res et organismes f\xE9d\xE9raux doivent tenir compte\
        \ des exigences de conservation des donn\xE9es des organisations non f\xE9\
        d\xE9rales. La conservation d\u2019information d\xE9sign\xE9e sur des syst\xE8\
        mes non f\xE9d\xE9raux \xE0 la fin de contrats ou d\u2019ententes augmente\
        \ la surface d\u2019attaque de ces syst\xE8mes et les risques de compromission\
        \ de l\u2019information. Biblioth\xE8que et Archives Canada fournit la politique\
        \ et les directives f\xE9d\xE9rales concernant la conservation des documents\
        \ et le calendrier de conservation."
      translations:
        en:
          name: Discussion
          description: Federal departments and agencies consider data retention requirements
            for non-federal organizations. Retaining specified information on non-federal
            systems after contracts or agreements have concluded increases the attack
            surface for those systems and the risk of the information being compromised.
            The Library and Archives Canada provides federal policy and guidance on
            records retention and schedules.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.14
      ref_id: 03.14.09
      name: "Poste de travail administratif d\xE9di\xE9"
      translations:
        en:
          name: Dedicated administration workstation
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09
      ref_id: 03.14.09.A
      description: "Exiger que les op\xE9rations d\u2019administration ou de superutilisateur\
        \ soient r\xE9alis\xE9es \xE0 partir d\u2019un poste de travail physique d\xE9\
        di\xE9 \xE0 ces t\xE2ches pr\xE9cises et isol\xE9es des autres fonctions et\
        \ r\xE9seaux. En particulier, la station ne devrait pas avoir acc\xE8s \xE0\
        \ Internet."
      translations:
        en:
          description: Require any administrative or superuser actions to be performed
            from a physical workstation which is dedicated to those specific tasks
            and isolated from all other functions and networks, and especially from
            any form of internet access
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09
      ref_id: 03.14.09.B
      description: "S\u2019assurer que la connexion distante d\u2019un poste de travail\
        \ administratif d\xE9di\xE9 \xE0 un r\xE9seau cible utilise un r\xE9seau priv\xE9\
        \ d\u2019op\xE9rateur (par exemple, un service LAN priv\xE9 virtuel [VPLS]\
        \ ou une commutation multiprotocole par \xE9tiquette [MPLS]) avec chiffrement\
        \ de RPV."
      translations:
        en:
          description: Remote connection of a <abbr title="dedicated administration
            workstation">DAW</abbr> to a target network is to use carrier private
            networks (e.g., virtual private LAN service (VPLS) or multiprotocol label
            switching (MPLS)) with <abbr title="virtual private network">VPN</abbr>
            encryption
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09
      ref_id: 03.14.09.C
      description: "Utiliser un client l\xE9ger ou un poste de travail physique d\xE9\
        di\xE9 et renforc\xE9 univalent \xE0 titre de poste de travail administratif\
        \ d\xE9di\xE9, qui n\u2019est pas partag\xE9 entre les domaines de s\xE9curit\xE9\
        ."
      translations:
        en:
          description: Use a dedicated and hardened single-purpose physical workstation
            or thin client as the <abbr title="dedicated administration workstation">DAW</abbr>
            , that is not shared between security realms
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.09
      ref_id: 03.14.09.disc
      name: Discussion
      description: "Un poste de travail administratif d\xE9di\xE9 est typiquement\
        \ constitu\xE9 d\u2019un terminal d\u2019utilisateur et d\u2019une tr\xE8\
        s petite s\xE9lection de logiciels con\xE7us pour interfacer avec le syst\xE8\
        me cible. Aux fins du pr\xE9sent contr\xF4le, un poste de travail est un syst\xE8\
        me \xE0 partir duquel les t\xE2ches d\u2019administration sont r\xE9alis\xE9\
        es, par opposition au syst\xE8me cible. Le poste de travail administratif\
        \ d\xE9di\xE9 doit \xEAtre renforc\xE9 pour le r\xF4le afin de r\xE9duire\
        \ la probabilit\xE9 qu\u2019un point d\u2019extr\xE9mit\xE9 de superutilisateur\
        \ ou d\u2019administrateur soit compromis par un auteur de menace (ce qui\
        \ entra\xEEnerait logiquement la compromission du syst\xE8me cible). Les outils\
        \ bureautiques typiques ne sont pas n\xE9cessaires sur le poste de travail\
        \ administratif d\xE9di\xE9. Toutes les applications et tous les services\
        \ non essentiels doivent \xEAtre supprim\xE9s. Les postes de travail administratifs\
        \ d\xE9di\xE9s n\u2019ont pas de jonction de domaine, ne peuvent pas t\xE9\
        l\xE9charger de correctif \xE0 partir d\u2019Internet et ne peuvent pas mettre\
        \ \xE0 jour la documentation dans les applications en r\xE9seau.\n\nLe retrait\
        \ de l\u2019acc\xE8s Internet public des postes de travail administratifs\
        \ r\xE9duit consid\xE9rablement les risques de compromission. Les passerelles\
        \ RPV <abbr title=\"RPV&#10;Voir R\xE9seau priv\xE9 virtuel.\"><sup>(?)</sup></abbr>\
        \ expos\xE9es \xE0 Internet ne sont pas privil\xE9gi\xE9es pour les activit\xE9\
        s d\u2019administration \xE0 distance. Les op\xE9rateurs priv\xE9s offrent\
        \ une meilleure protection, mais n\xE9cessitent tout de m\xEAme un chiffrement\
        \ de RPV au sein de r\xE9seau. Le poste de travail administratif d\xE9di\xE9\
        \ ne doit pas devenir un moyen de d\xE9placement lat\xE9ral entre les domaines\
        \ de s\xE9curit\xE9."
      translations:
        en:
          name: Discussion
          description: "A dedicated administration workstation (DAW) is typically\
            \ comprised of a user terminal with a very small selection of software\
            \ designed for interfacing with the target system. For the purpose of\
            \ this control, workstation means the system from which you are performing\
            \ the administration, as opposed to the target system of administration.\
            \ The <abbr title=\"dedicated administration workstation\">DAW</abbr>\
            \ must be hardened for the role, in order to minimize the likelihood that\
            \ a superuser\u2019s or administrator\u2019s endpoint may be compromised\
            \ by any threat actor (which would logically lead to the compromise of\
            \ the target system). Typical office productivity tools are not required\
            \ on the <abbr title=\"dedicated administration workstation\">DAW</abbr>.\
            \ All non-essential applications and services are removed. <abbr title=\"\
            dedicated administration workstation\">DAW</abbr>s are not domain-joined,\
            \ cannot download patches from the internet, and cannot update documentation\
            \ in networked applications.\n\nRemoving public Internet access from administrative\
            \ workstations substantially reduces risk of compromise. Internet-exposed\
            \ <abbr title=\"virtual private network\">VPN</abbr> gateways are not\
            \ preferred for remote administration, private carriers provide better\
            \ protection, but still require <abbr title=\"virtual private network\"\
            >VPN</abbr> encryption within that network. The <abbr title=\"dedicated\
            \ administration workstation\">DAW</abbr> must not become a means of moving\
            \ laterally between security realms."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.15
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.15'
      name: Planification
      description: "Les contr\xF4les de planification et les activit\xE9s d\u2019\
        assurance sont li\xE9s \xE0 l\u2019\xE9laboration, \xE0 la documentation,\
        \ \xE0 la mise \xE0 jour et \xE0 la mise en \u0153uvre des plans de s\xE9\
        curit\xE9 et de protection de la vie priv\xE9e pour les syst\xE8mes organisationnels.\
        \ Ces plans d\xE9crivent les contr\xF4les de s\xE9curit\xE9 et de protection\
        \ de la vie priv\xE9e ainsi que les activit\xE9s d\u2019assurance en place\
        \ ou planifi\xE9es pour les syst\xE8mes. Ils int\xE8grent \xE9galement les\
        \ r\xE8gles de conduite pour les personnes ayant acc\xE8s aux syst\xE8mes."
      translations:
        en:
          name: Planning
          description: The Planning controls and assurance activities deal with the
            development, documentation, update, and implementation of security and
            privacy plans for organizational systems. Those plans describe the security
            and privacy controls and assurance activities in place or planned for
            the systems, and the rules of behaviour for individuals accessing the
            systems.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.15
      ref_id: 03.15.01
      name: "Politiques et proc\xE9dures"
      translations:
        en:
          name: Policy and procedures
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.01
      ref_id: 03.15.01.A
      description: "\xC9laborer, documenter et diffuser au personnel ou aux r\xF4\
        les de l\u2019organisation les politiques et les proc\xE9dures n\xE9cessaires\
        \ afin de satisfaire les exigences de s\xE9curit\xE9 pour la protection de\
        \ l\u2019information d\xE9sign\xE9e."
      translations:
        en:
          description: Develop, document, and disseminate to organizational personnel
            or roles, policies and procedures needed to satisfy the security requirements
            for the protection of specified information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.01
      ref_id: 03.15.01.B
      description: "Examiner et mettre \xE0 jour les politiques et les proc\xE9dures\
        \ tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Review and update policies and procedures [Assignment: organization-defined
            frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.01
      ref_id: 03.15.01.disc
      name: Discussion
      description: "Cette exigence traite des politiques et des proc\xE9dures pour\
        \ la protection de l\u2019information d\xE9sign\xE9e. Les politiques et les\
        \ proc\xE9dures contribuent \xE0 l\u2019assurance de la s\xE9curit\xE9 et\
        \ doivent s\u2019appliquer \xE0 chaque famille d\u2019exigences de s\xE9curit\xE9\
        \ de l\u2019information d\xE9sign\xE9e. Les politiques peuvent \xEAtre incluses\
        \ dans le cadre de la strat\xE9gie de s\xE9curit\xE9 de l\u2019organisation\
        \ ou \xEAtre repr\xE9sent\xE9es par des politiques s\xE9par\xE9es pour chacune\
        \ des familles d\u2019exigence. Les proc\xE9dures d\xE9crivent comment les\
        \ politiques sont mises en \u0153uvre et peuvent s\u2019appliquer aux personnes\
        \ ou aux r\xF4les \xE9tant l\u2019objet de la proc\xE9dure. Les proc\xE9dures\
        \ peuvent \xEAtre document\xE9es dans les plans de s\xE9curit\xE9 du syst\xE8\
        me ou dans un ou plusieurs documents s\xE9par\xE9s."
      translations:
        en:
          name: Discussion
          description: This requirement addresses policies and procedures for the
            protection of specified information. Policies and procedures contribute
            to security assurance and should address each family of the specified
            information security requirements. Policies can be included as part of
            the organizational security policy or be represented by separate policies
            that address each family of requirements. Procedures describe how policies
            are implemented and can be directed at the individual or role that is
            the object of the procedure. Procedures can be documented in system security
            plans or in one or more separate documents.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.15
      ref_id: 03.15.02
      name: "Plan de s\xE9curit\xE9 du syst\xE8me"
      translations:
        en:
          name: System security plan
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02
      ref_id: 03.15.02.A
      description: "\xC9laborer un plan de s\xE9curit\xE9 et de protection de la vie\
        \ priv\xE9e pour le syst\xE8me qui :"
      translations:
        en:
          description: 'Develop a system security and privacy plan that:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.1
      description: "d\xE9finit les composants constitutifs du syst\xE8me;"
      translations:
        en:
          description: defines the constituent system components
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.2
      description: "identifie les types d\u2019informations trait\xE9es, stock\xE9\
        es et transmises par le syst\xE8me;"
      translations:
        en:
          description: identifies the information types processed, stored, and transmitted
            by the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.3
      description: "d\xE9crit les menaces particuli\xE8res pour le syst\xE8me qui\
        \ sont pr\xE9occupantes pour l\u2019organisation;"
      translations:
        en:
          description: describes specific threats to the system that are of concern
            to the organization
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.4
      description: "d\xE9crit l\u2019environnement op\xE9rationnel du syst\xE8me ainsi\
        \ que les d\xE9pendances ou les connexions \xE0 d\u2019autres syst\xE8mes\
        \ ou \xE0 d\u2019autres composants du syst\xE8me;"
      translations:
        en:
          description: describes the operational environment for the system and any
            dependencies on or connections to other systems or system components
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.5
      description: "fournit un aper\xE7u des exigences de s\xE9curit\xE9 du syst\xE8\
        me;"
      translations:
        en:
          description: provides an overview of the security requirements for the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.6
      description: "d\xE9crit les mesures de protection en place ou pr\xE9vues pour\
        \ r\xE9pondre aux exigences de s\xE9curit\xE9;"
      translations:
        en:
          description: describes the safeguards in place or planned for meeting the
            security requirements
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.7
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.7
      description: "identifie les personnes qui assument des r\xF4les et des responsabilit\xE9\
        s li\xE9s au syst\xE8me;"
      translations:
        en:
          description: identifies individuals that fulfill system roles and responsibilities
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a.8
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.a
      ref_id: 03.15.02.A.8
      description: "contient d\u2019autres renseignements pertinents n\xE9cessaires\
        \ \xE0 la protection de l\u2019information d\xE9sign\xE9e."
      translations:
        en:
          description: includes other relevant information necessary for the protection
            of specified information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02
      ref_id: 03.15.02.B
      description: "Examiner et mettre \xE0 jour le plan de s\xE9curit\xE9 du syst\xE8\
        me tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Review and update the system security plan [Assignment: organization-defined
            frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02
      ref_id: 03.15.02.C
      description: "Prot\xE9ger le plan de s\xE9curit\xE9 du syst\xE8me contre les\
        \ divulgations non autoris\xE9es."
      translations:
        en:
          description: Protect the system security plan from unauthorized disclosure
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.02
      ref_id: 03.15.02.disc
      name: Discussion
      description: "Les plans de s\xE9curit\xE9 et de protection de la vie priv\xE9\
        e pour le syst\xE8me offrent les caract\xE9ristiques cl\xE9s du syst\xE8me\
        \ concernant le traitement, le stockage et la transmission de l\u2019information\
        \ d\xE9sign\xE9e, ainsi que la mani\xE8re dont le syst\xE8me et l\u2019information\
        \ sont prot\xE9g\xE9s. Les plans de s\xE9curit\xE9 et de protection de la\
        \ vie priv\xE9e pour le syst\xE8me doivent contenir suffisamment d\u2019information\
        \ pour faciliter une conception et une mise en \u0153uvre qui sont conformes,\
        \ sans \xE9quivoque, \xE0 leurs objectifs et pour faciliter la d\xE9termination\
        \ des risques si le plan est mis en \u0153uvre comme pr\xE9vu. Les plans de\
        \ s\xE9curit\xE9 et de protection de la vie priv\xE9e pour le syst\xE8me peuvent\
        \ \xEAtre en ensemble de documents, y compris des documents qui existent d\xE9\
        j\xE0. Les plans de s\xE9curit\xE9 du syst\xE8me efficaces font r\xE9f\xE9\
        rence \xE0 des politiques \xE0 des proc\xE9dures et \xE0 des documents suppl\xE9\
        mentaires (par exemple, sp\xE9cifications de conception) contenant de l\u2019\
        information d\xE9taill\xE9e. Ces r\xE9f\xE9rences permettent de r\xE9duire\
        \ les exigences en mati\xE8re de documentation associ\xE9es aux programmes\
        \ de s\xE9curit\xE9 et de conserver l\u2019information relative \xE0 la s\xE9\
        curit\xE9 dans d\u2019autres secteurs op\xE9rationnels ou de gestion \xE9\
        tablis en lien avec l\u2019architecture d\u2019entreprise, le cycle de d\xE9\
        veloppement des syst\xE8mes, l\u2019ing\xE9nierie des syst\xE8mes et l\u2019\
        acquisition."
      translations:
        en:
          name: Discussion
          description: System security and privacy plans provide key characteristics
            of the system that is processing, storing, and transmitting specified
            information and how the system and information are protected. System security
            and privacy plans contain sufficient information to facilitate a design
            and implementation that are unambiguously compliant with the intent of
            the plans and the subsequent determinations of risk if the plan is implemented
            as intended. System security and privacy plans can be a collection of
            documents, including documents that already exist. Effective system security
            plans make use of references to policies, procedures, and additional documents
            (e.g., design specifications) where detailed information can be obtained.
            This reduces the documentation requirements associated with security programs
            and maintains security information in other established management or
            operational areas related to enterprise architecture, the system development
            life cycle, systems engineering, and acquisition.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.15
      ref_id: 03.15.03
      name: "R\xE8gles de conduite"
      translations:
        en:
          name: Rules of behaviour
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03
      ref_id: 03.15.03.A
      description: "\xC9tablir des r\xE8gles qui d\xE9crivent les responsabilit\xE9\
        s et le comportement attendu pour l\u2019utilisation du syst\xE8me et la protection\
        \ de l\u2019information d\xE9sign\xE9e."
      translations:
        en:
          description: Establish, rules that describe the responsibilities and expected
            behaviour for system usage and protecting specified information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03
      ref_id: 03.15.03.B
      description: "Fournir des r\xE8gles aux personnes devant acc\xE9der au syst\xE8\
        me."
      translations:
        en:
          description: Provide rules to individuals who require access to the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03
      ref_id: 03.15.03.C
      description: "Obtenir des personnes devant acc\xE9der au syst\xE8me une attestation\
        \ document\xE9e selon laquelle elles ont lu et compris le document et acceptent\
        \ de respecter les r\xE8gles de conduite avant d\u2019obtenir l\u2019acc\xE8\
        s autoris\xE9 \xE0 l\u2019information d\xE9sign\xE9e et au syst\xE8me."
      translations:
        en:
          description: Receive a documented acknowledgement from individuals indicating
            that they have read, understand, and agree to abide by the rules of behaviour
            before authorizing access to specified information and the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03
      ref_id: 03.15.03.D
      description: "Examiner et mettre \xE0 jour les r\xE8gles de conduite tous les\
        \ [Affectation : fr\xE9quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Review and update the rules of behaviour [Assignment: organization-defined
            frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.15.03
      ref_id: 03.15.03.disc
      name: Discussion
      description: "Les r\xE8gles de conduite repr\xE9sentent un type d\u2019entente\
        \ d\u2019acc\xE8s pour les utilisatrices et utilisateurs du syst\xE8me. Les\
        \ organisations doivent pr\xE9voir des r\xE8gles de conduite pour le traitement\
        \ de l\u2019information d\xE9sign\xE9e en fonction des r\xF4les et des responsabilit\xE9\
        s des utilisatrices et utilisateurs, et faire la distinction entre les r\xE8\
        gles s\u2019appliquant aux utilisatrices et utilisateurs privil\xE9gi\xE9\
        s et les r\xE8gles s\u2019appliquant aux utilisatrices et utilisateurs g\xE9\
        n\xE9raux."
      translations:
        en:
          name: Discussion
          description: Rules of behaviour represent a type of access agreement for
            system users. Organizations consider rules of behaviour for the handling
            of specified information based on individual user roles and responsibilities
            and differentiate between rules that apply to privileged users and rules
            that apply to general users.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.16
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.16'
      name: "Acquisition des syst\xE8mes et des services"
      description: "Les contr\xF4les pour l\u2019acquisition des syst\xE8mes et des\
        \ services s\u2019appliquent \xE0 la passation de march\xE9s pour l\u2019\
        acquisition des produits et des services n\xE9cessaires afin de soutenir la\
        \ mise en \u0153uvre et l\u2019exploitation des syst\xE8mes organisationnels.\
        \ Ils permettent de s\u2019assurer que des ressources suffisantes sont affect\xE9\
        es \xE0 la protection des syst\xE8mes organisationnels et ils appuient les\
        \ processus relatifs au cycle de d\xE9veloppement des syst\xE8mes qui int\xE8\
        grent des consid\xE9rations de s\xE9curit\xE9."
      translations:
        en:
          name: System and services acquisition
          description: The System and services acquisition controls deal with the
            contracting of products and services required to support the implementation
            and operation of organizational systems. They ensure that sufficient resources
            are allocated for the protection of organizational systems, and they support
            system development lifecycle processes that incorporate security considerations.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.16
      ref_id: 03.16.01
      name: "Principes d\u2019ing\xE9nierie de la s\xE9curit\xE9"
      translations:
        en:
          name: Security engineering principles
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.01
      ref_id: 03.16.01.A
      description: "Appliquer les principes d\u2019ing\xE9nierie de la s\xE9curit\xE9\
        \ des syst\xE8mes suivants pour le d\xE9veloppement ou la modification des\
        \ syst\xE8mes et des composants syst\xE8me : [Affectation : principes d\u2019\
        ing\xE9nierie de la s\xE9curit\xE9 des syst\xE8mes d\xE9finis par l\u2019\
        organisation]."
      translations:
        en:
          description: 'Apply the following systems security engineering principles
            to the development or modification of the system and system components:
            [Assignment: organization-defined systems security engineering principles].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.01
      ref_id: 03.16.01.disc
      name: Discussion
      description: "Les organisations doivent appliquer des principes d\u2019ing\xE9\
        nierie de la s\xE9curit\xE9 des syst\xE8mes aux nouveaux syst\xE8mes en d\xE9\
        veloppement. Dans le cas des syst\xE8mes existants, les organisations doivent\
        \ appliquer des principes d\u2019ing\xE9nierie de la s\xE9curit\xE9 des syst\xE8\
        mes aux modifications des syst\xE8mes autant que possible, en tenant compte\
        \ de l\u2019\xE9tat actuel des composants mat\xE9riels, logiciels et micrologiciels.\
        \ L\u2019application de principes d\u2019ing\xE9nierie de la s\xE9curit\xE9\
        \ des syst\xE8mes favorise le d\xE9veloppement de syst\xE8mes dignes de confiance,\
        \ s\xE9curis\xE9s et r\xE9silients, et r\xE9duit la susceptibilit\xE9 des\
        \ organisations aux interruptions, aux risques et aux menaces. Des exemples\
        \ de ces principes comprennent le d\xE9veloppement de mesures de protection\
        \ en couche; l\u2019\xE9tablissement de strat\xE9gies, d\u2019architectures\
        \ et de contr\xF4les de s\xE9curit\xE9 comme base de la conception des syst\xE8\
        mes; l\u2019int\xE9gration d\u2019exigences de s\xE9curit\xE9 au cycle de\
        \ d\xE9veloppement des syst\xE8mes; la d\xE9limitation des fronti\xE8res de\
        \ s\xE9curit\xE9 physiques et logiques; l\u2019assurance que les d\xE9veloppeuses\
        \ et d\xE9veloppeurs sont form\xE9s pour concevoir des logiciels s\xE9curis\xE9\
        s et dignes de confiance; la mod\xE9lisation des menaces afin d\u2019\xE9\
        tablir les cas d\u2019utilisation, les agents de menace, les vecteurs et les\
        \ sch\xE9mas d\u2019attaque, les sch\xE9mas de conception et les contr\xF4\
        les compensatoires n\xE9cessaires pour att\xE9nuer les risques. Les organisations\
        \ qui appliquent des principes d\u2019ing\xE9nierie de la s\xE9curit\xE9 peuvent\
        \ faciliter le d\xE9veloppement de syst\xE8mes, de composants syst\xE8me et\
        \ de services syst\xE8me s\xE9curis\xE9s et dignes de confiance, r\xE9duire\
        \ les risques \xE0 des niveaux acceptables et prendre des d\xE9cisions inform\xE9\
        es en mati\xE8re de gestion des risques."
      translations:
        en:
          name: Discussion
          description: Organizations apply systems security engineering principles
            to new development systems. For legacy systems, organizations apply systems
            security engineering principles to system modifications to the extent
            feasible, given the current state of hardware, software, and firmware
            components. The application of systems security engineering principles
            helps to develop trustworthy, secure, and resilient systems and reduce
            the susceptibility of organizations to disruptions, hazards, and threats.
            Examples include developing layered protections; establishing security
            policies, architectures, and controls as the foundation for system design;
            incorporating security requirements into the system development life cycle;
            delineating physical and logical security boundaries; ensuring that developers
            are trained on how to build trustworthy secure software; and performing
            threat modeling to identify use cases, threat agents, attack vectors and
            patterns, design patterns, and compensating controls needed to mitigate
            risk. Organizations that apply security engineering principles can facilitate
            the development of trustworthy, secure systems, system components, and
            system services; reduce risks to acceptable levels; and make informed
            risk-management decisions.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.16
      ref_id: 03.16.02
      name: "Composants syst\xE8me non pris en charge"
      translations:
        en:
          name: Unsupported system components
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.02
      ref_id: 03.16.02.A
      description: "Remplacer les composants des syst\xE8mes lorsque les d\xE9veloppeurs,\
        \ les fournisseurs ou les fabricants ne prennent plus en charge ces composants."
      translations:
        en:
          description: Replace system components when support for the components is
            no longer available from the developer, vendor, or manufacturer
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.02
      ref_id: 03.16.02.B
      description: "Fournir des options pour l\u2019att\xE9nuation des risques ou\
        \ d\u2019autres sources pour b\xE9n\xE9ficier d\u2019un soutien continu des\
        \ composants non pris en charge si les composants ne peuvent pas \xEAtre remplac\xE9\
        s."
      translations:
        en:
          description: Provide options for risk mitigation or alternative sources
            for continued support for unsupported components if components cannot
            be replaced
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.02
      ref_id: 03.16.02.disc
      name: Discussion
      description: "La prise en charge (ou le soutien) des composants syst\xE8me comprend\
        \ les correctifs logiciels, les mises \xE0 jour de micrologiciels, les remplacements\
        \ de pi\xE8ces et les contrats de maintenance. Les exemples de composants\
        \ non pris en charge comprennent les circonstances o\xF9 les fournisseurs\
        \ ne produisent plus de correctifs logiciels critiques ou de mises \xE0 jour\
        \ pour les produits, ce qui peut mener \xE0 des possibilit\xE9s pour les adversaires\
        \ d\u2019exploiter les faiblesses ou les lacunes des composants install\xE9\
        s. Les exceptions au remplacement des composants syst\xE8me non pris en charge\
        \ comprennent les syst\xE8mes qui fournissent des capacit\xE9s essentielles\
        \ \xE0 la mission ou aux activit\xE9s lorsque des technologies plus r\xE9\
        centes ne sont pas disponibles ou lorsque les syst\xE8mes sont tellement isol\xE9\
        s que l\u2019installation de composants de remplacement n\u2019est pas une\
        \ option.\n\nLes autres sources de soutien permettent de r\xE9pondre au besoin\
        \ de fournir un soutien continu pour les composants syst\xE8me qui ne sont\
        \ plus pris en charge par les fabricants d\u2019origine, les d\xE9veloppeurs\
        \ ou les fournisseurs lorsque ces composants sont essentiels \xE0 la mission\
        \ et aux activit\xE9s de l\u2019organisation. Au besoin, les organisations\
        \ peuvent \xE9tablir un soutien interne en d\xE9veloppant des correctifs sur\
        \ mesure pour les composants logiciels critiques ou avoir recours \xE0 des\
        \ services de fournisseurs externes qui pourront fournir, au moyen de relations\
        \ contractuelles, du soutien continu pour les composants qui ne sont plus\
        \ pris en charge. Ces relations contractuelles peuvent comprendre des fournisseurs\
        \ de logiciels libres \xE0 valeur ajout\xE9e. Le risque accru d\u2019utilisation\
        \ de composants syst\xE8me non pris en charge peut \xEAtre att\xE9nu\xE9 en\
        \ emp\xEAchant la connexion de ces composants aux r\xE9seaux publics ou non\
        \ contr\xF4l\xE9s ou en mettant en \u0153uvre d\u2019autres formes d\u2019\
        isolation."
      translations:
        en:
          name: Discussion
          description: 'Support for system components includes software patches, firmware
            updates, replacement parts, and maintenance contracts. An example of unsupported
            components includes when vendors no longer provide critical software patches
            or product updates, which can result in opportunities for adversaries
            to exploit weaknesses or deficiencies in the installed components. Exceptions
            to replacing unsupported system components include systems that provide
            critical mission or business capabilities when newer technologies are
            unavailable or when the systems are so isolated that installing replacement
            components is not an option.


            Alternative sources of support address the need to provide continued support
            for system components that are no longer supported by the original manufacturers,
            developers, or vendors when such components remain essential to organizational
            mission and business functions. If necessary, organizations can establish
            in-house support by developing customized patches for critical software
            components or obtain the services of external providers who provide ongoing
            support for unsupported components through contractual relationships.
            Such contractual relationships can include open-source software value-added
            vendors. The increased risk of using unsupported system components can
            be mitigated by prohibiting the connection of such components to public
            or uncontrolled networks or implementing other forms of isolation.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.16
      ref_id: 03.16.03
      name: "Services de syst\xE8mes externes"
      translations:
        en:
          name: External system services
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03
      ref_id: 03.16.03.A
      description: "Exiger que les fournisseurs de services de syst\xE8mes externes\
        \ utilis\xE9s pour le traitement, le stockage ou la transmission d\u2019information\
        \ d\xE9sign\xE9e respectent les exigences de s\xE9curit\xE9 suivantes : [Affectation\
        \ : exigences de s\xE9curit\xE9 d\xE9finies par l\u2019organisation]."
      translations:
        en:
          description: 'Require the providers of external system services used for
            the processing, storage, or transmission of specified information, to
            comply with the following security requirements: [Assignment: organization-defined
            security requirements]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03
      ref_id: 03.16.03.B
      description: "D\xE9finir et documenter les r\xF4les et les responsabilit\xE9\
        s d\u2019utilisateur concernant les services de syst\xE8me externe, y compris\
        \ les responsabilit\xE9s partag\xE9es avec les fournisseurs de services externes."
      translations:
        en:
          description: Define and document user roles and responsibilities with regard
            to external system services including shared responsibilities with external
            service providers
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03
      ref_id: 03.16.03.C
      description: "Mettre en \u0153uvre des processus, des m\xE9thodes et des techniques\
        \ pour surveiller la conformit\xE9 aux exigences de s\xE9curit\xE9 des fournisseurs\
        \ de services externes sur une base continue."
      translations:
        en:
          description: Implement processes, methods, and techniques to monitor security
            requirement compliance by external service providers on an ongoing basis
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.16.03
      ref_id: 03.16.03.disc
      name: Discussion
      description: "Les services de syst\xE8me externe sont fournis par des fournisseurs\
        \ de services externes. Les organisations peuvent \xE9tablir des relations\
        \ avec des fournisseurs de services externes de nombreuses fa\xE7ons, y compris\
        \ au moyen de partenariats, de contrats, d\u2019ententes entre les organisations,\
        \ d\u2019ententes li\xE9es aux secteurs d\u2019activit\xE9s, d\u2019accords\
        \ de licence, de coentreprises et d\u2019\xE9changes de cha\xEEne d\u2019\
        approvisionnement. L\u2019organisation devant prot\xE9ger l\u2019information\
        \ d\xE9sign\xE9e demeure responsable de la gestion des risques li\xE9s \xE0\
        \ l\u2019utilisation de services de syst\xE8me externe. Les accords sur les\
        \ niveaux de service d\xE9finissent les attentes de rendement, d\xE9crivent\
        \ les r\xE9sultats mesurables et d\xE9terminent les mesures de correction,\
        \ les mesures d\u2019att\xE9nuation et les exigences en mati\xE8re d\u2019\
        intervention pour les cas de non-conformit\xE9. L\u2019information provenant\
        \ de fournisseurs de services externes concernant les fonctions, les ports,\
        \ les protocoles et les services particuliers utilis\xE9s pour la prestation\
        \ de tels services peut \xEAtre utile pour comprendre les compromis associ\xE9\
        s \xE0 la restriction de certaines fonctions et de certains services ou au\
        \ blocage de certains ports et protocoles. Cette exigence est associ\xE9e\
        \ \xE0 l\u2019exigence **Utilisation de syst\xE8mes externes 03.01.20**."
      translations:
        en:
          name: Discussion
          description: External system services are provided by external service providers.
            Organizations establish relationships with external service providers
            in a variety of ways, including through business partnerships, contracts,
            interagency agreements, lines of business arrangements, licensing agreements,
            joint ventures, and supply chain exchanges. The responsibility for managing
            risks from the use of external system services remains with the organization
            charged with protecting specified information. Service-level agreements
            define expectations of performance, describe measurable outcomes, and
            identify remedies, mitigations, and response requirements for instances
            of noncompliance. Information from external service providers regarding
            the specific functions, ports, protocols, and services used in the provision
            of such services can be useful when there is a need to understand the
            trade-offs involved in restricting certain functions and services or blocking
            certain ports and protocols. This requirement is related to **Use of external
            systems 03.01.20**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.17
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.17'
      name: "Gestion des risques li\xE9s \xE0 la cha\xEEne d\u2019approvisionnement"
      description: "Les contr\xF4les de gestion des risques li\xE9s \xE0 la cha\xEE\
        ne d\u2019approvisionnement appuient l\u2019att\xE9nuation des risques de\
        \ cybers\xE9curit\xE9 dans toutes les phases de la cha\xEEne d\u2019approvisionnement."
      translations:
        en:
          name: Supply chain risk management
          description: The Supply chain risk management controls support the mitigation
            of cyber security risks throughout all phases of the supply chain.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.17
      ref_id: 03.17.01
      name: "Plan de gestion des risques li\xE9s \xE0 la cha\xEEne d\u2019approvisionnement"
      translations:
        en:
          name: Supply chain risk management plan
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01
      ref_id: 03.17.01.A
      description: "\xC9laborer un plan pour g\xE9rer les risques li\xE9s \xE0 la\
        \ cha\xEEne d\u2019approvisionnement associ\xE9s \xE0 la recherche, au d\xE9\
        veloppement, \xE0 la conception, \xE0 la fabrication, \xE0 l\u2019acquisition,\
        \ \xE0 la livraison, \xE0 l\u2019int\xE9gration, \xE0 l\u2019exploitation,\
        \ \xE0 la maintenance et \xE0 l\u2019\xE9limination des syst\xE8mes, des composants\
        \ syst\xE8me ou des services syst\xE8me."
      translations:
        en:
          description: Develop a plan for managing supply chain risks associated with
            the research, development, design, manufacturing, acquisition, delivery,
            integration, operations, maintenance, and disposal of the system, system
            components, or system services
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01
      ref_id: 03.17.01.B
      description: "Examiner et mettre \xE0 jour le plan de gestion des risques li\xE9\
        s \xE0 la cha\xEEne d\u2019approvisionnement tous les [Affectation : fr\xE9\
        quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Review and update the supply chain risk management plan [Assignment:
            organization-defined frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01
      ref_id: 03.17.01.C
      description: "Prot\xE9ger le plan de gestion des risques li\xE9s \xE0 la cha\xEE\
        ne d\u2019approvisionnement des divulgations non autoris\xE9es."
      translations:
        en:
          description: Protect the supply chain risk management plan from unauthorized
            disclosure
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.01
      ref_id: 03.17.01.disc
      name: Discussion
      description: "La d\xE9pendance aux produits, aux syst\xE8mes et aux services\
        \ de fournisseurs externes ainsi que la nature des relations avec ces fournisseurs\
        \ pr\xE9sentent un niveau accru de risque pour une organisation. Les menaces\
        \ pouvant augmenter les risques de s\xE9curit\xE9 ou d\u2019atteinte \xE0\
        \ la vie priv\xE9e incluent la production non autoris\xE9e, la falsification,\
        \ la modification, les mauvaises pratiques de d\xE9veloppement et de fabrication\
        \ dans la cha\xEEne d\u2019approvisionnement, le vol ainsi que l\u2019insertion\
        \ de logiciel, de micrologiciel ou de mat\xE9riel malveillant. Les risques\
        \ li\xE9s \xE0 la cha\xEEne d\u2019approvisionnement peuvent \xEAtre end\xE9\
        miques ou syst\xE9miques au sein d\u2019un syst\xE8me, d\u2019un composant\
        \ ou d\u2019un service. La gestion des risques li\xE9s \xE0 la cha\xEEne d\u2019\
        approvisionnement est une t\xE2che complexe \xE0 plusieurs facettes n\xE9\
        cessitant des efforts coordonn\xE9s au sein d\u2019une organisation afin d\u2019\
        \xE9tablir des relations de confiance et de communiquer avec les parties prenantes\
        \ internes et externes.\n\nLes activit\xE9s de gestion des risques li\xE9\
        s \xE0 la cha\xEEne d\u2019approvisionnement (GRCA) comprennent l\u2019identification\
        \ et l\u2019\xE9valuation des risques, la d\xE9termination des mesures appropri\xE9\
        es de r\xE9ponse aux risques, l\u2019\xE9laboration de plans de GRCA visant\
        \ \xE0 documenter les mesures de r\xE9ponse et la surveillance du rendement\
        \ par rapport aux plans. Les plans de GRCA au niveau du syst\xE8me d\xE9pendent\
        \ de la mise en \u0153uvre particuli\xE8re du syst\xE8me et fournissent une\
        \ mise en \u0153uvre, des exigences, des contraintes et des implications au\
        \ sujet des politiques. Ce plan peut \xEAtre ind\xE9pendant ou int\xE9gr\xE9\
        \ aux plans de s\xE9curit\xE9 et de protection de la vie priv\xE9e pour le\
        \ syst\xE8me. Les plans de GRCA portent sur la gestion, la mise en \u0153\
        uvre et la surveillance des contr\xF4les de GRCA ainsi que le d\xE9veloppement\
        \ ou le maintien des syst\xE8mes pendant le cycle de d\xE9veloppement des\
        \ syst\xE8mes afin de soutenir la mission et les activit\xE9s. Puisque les\
        \ cha\xEEnes d\u2019approvisionnement peuvent varier consid\xE9rablement au\
        \ sein d\u2019une m\xEAme organisation et d\u2019une organisation \xE0 l\u2019\
        autre, les plans de GRCA sont adapt\xE9s aux programmes individuels ainsi\
        \ qu\u2019aux contextes organisationnels et op\xE9rationnels."
      translations:
        en:
          name: Discussion
          description: 'Dependence on the products, systems, and services of external
            providers and the nature of the relationships with those providers present
            an increasing level of risk to an organization. Threat actions that may
            increase security or privacy risks include unauthorized production, the
            insertion or use of counterfeits, tampering, poor manufacturing and development
            practices in the supply chain, theft, and the insertion of malicious software,
            firmware, and hardware. Supply chain risks can be endemic or systemic
            within a system, component, or service. Managing supply chain risks is
            a complex, multifaceted undertaking that requires a coordinated effort
            across an organization to build trust relationships and communicate with
            internal and external stakeholders.


            Supply chain risk management (SCRM) activities include identifying and
            assessing risks, determining appropriate risk response actions, developing
            <abbr title="supply chain risk management">SCRM</abbr> plans to document
            response actions, and monitoring performance against the plans. The system-level
            <abbr title="supply chain risk management">SCRM</abbr> plan is implementation-specific
            and provides policy implementation, requirements, constraints, and implications.
            It can either be stand-alone or incorporated into system security and
            privacy plans. The <abbr title="supply chain risk management">SCRM</abbr>
            plan addresses the management, implementation, and monitoring of <abbr
            title="supply chain risk management">SCRM</abbr> controls and the development
            or sustainment of systems across the system development life cycle to
            support mission and business functions. Because supply chains can differ
            significantly across and within organizations, <abbr title="supply chain
            risk management">SCRM</abbr> plans are tailored to individual program,
            organizational, and operational contexts.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.17
      ref_id: 03.17.02
      name: "Strat\xE9gies, outils et m\xE9thodes d\u2019acquisition"
      translations:
        en:
          name: Acquisition strategies, tools, and methods
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.02
      ref_id: 03.17.02.A
      description: "\xC9laborer et mettre en \u0153uvre des strat\xE9gies d\u2019\
        acquisition, des outils de contrats et des m\xE9thodes d\u2019approvisionnement\
        \ afin de d\xE9terminer, de contrer et d\u2019att\xE9nuer les risques associ\xE9\
        s \xE0 la cha\xEEne d\u2019approvisionnement."
      translations:
        en:
          description: Develop and implement acquisition strategies, contract tools,
            and procurement methods to identify, protect against, and mitigate supply
            chain risks.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.02
      ref_id: 03.17.02.disc
      name: Discussion
      description: "Les processus d\u2019acquisition fournissent un v\xE9hicule important\
        \ pour la protection de la cha\xEEne d\u2019approvisionnement. Il existe de\
        \ nombreux outils et de nombreuses techniques, y compris le masquage de l\u2019\
        utilisation finale d\u2019un syst\xE8me ou d\u2019un composant syst\xE8me,\
        \ l\u2019achat \xE0 l\u2019aveugle, l\u2019exigence d\u2019un emballage prot\xE9\
        g\xE9 contre les modifications ou l\u2019utilisation d\u2019une distribution\
        \ de confiance ou contr\xF4l\xE9e. Les r\xE9sultats d\u2019une \xE9valuation\
        \ des risques li\xE9s \xE0 la cha\xEEne d\u2019approvisionnement peuvent informer\
        \ le choix des strat\xE9gies, des outils et des m\xE9thodes qui conventionnent\
        \ le mieux \xE0 la situation. Les outils et les techniques peuvent fournir\
        \ une protection contre la production non autoris\xE9e, le vol, la modification,\
        \ la contrefa\xE7on, l\u2019insertion de code malveillant ou de porte d\xE9\
        rob\xE9e <abbr title=\"Porte d\xE9rob\xE9e&#10;Moyen non recens\xE9 qui permet,\
        \ discr\xE8tement ou anonymement, d&#x27;acc\xE9der \xE0 distance \xE0 un\
        \ ordinateur apr\xE8s avoir contourn\xE9 les m\xE9canismes d&#x27;authentification\
        \ et s&#x27;\xEAtre donn\xE9 acc\xE8s au texte en clair.\"><sup>(?)</sup></abbr>\
        \ et les mauvaises pratiques de d\xE9veloppement tout au long du cycle de\
        \ vie du syst\xE8me.\n\nLes organisations peuvent \xE9galement penser \xE0\
        \ offrir des mesures incitatives pour les fournisseurs afin de mettre en \u0153\
        uvre des contr\xF4les et de favoriser la transparence des processus et des\
        \ pratiques de s\xE9curit\xE9. Elles peuvent \xE9galement fournir un libell\xE9\
        \ de contrat qui traite de l\u2019interdiction d\u2019utiliser des composants\
        \ contamin\xE9s ou contrefaits et restreindre les achats des fournisseurs\
        \ qui ne sont pas dignes de confiance. Les organisations doivent consid\xE9\
        rer fournir des programmes de formation et de sensibilisation pour le personnel\
        \ concernant les risques li\xE9s \xE0 la cha\xEEne d\u2019approvisionnement,\
        \ les strat\xE9gies d\u2019att\xE9nuation disponibles et les circonstances\
        \ appropri\xE9es pour utiliser les programmes. Les m\xE9thodes pour examiner\
        \ et prot\xE9ger les plans de d\xE9veloppement, la documentation et les preuves\
        \ doivent \xEAtre appropri\xE9es selon les exigences de s\xE9curit\xE9 de\
        \ l\u2019organisation. Les contrats peuvent \xE9galement indiquer les exigences\
        \ concernant la protection des documents."
      translations:
        en:
          name: Discussion
          description: 'The acquisition process provides an important vehicle for
            protecting the supply chain. There are many useful tools and techniques
            available, including obscuring the end use of a system or system component,
            using blind purchases, requiring tamper-evident packaging, or using trusted
            or controlled distribution. The results from a supply chain risk assessment
            can inform the strategies, tools, and methods that are most applicable
            to the situation. Tools and techniques may provide protections against
            unauthorized production, theft, tampering, the insertion of counterfeits,
            the insertion of malicious software or backdoors, and poor development
            practices throughout the system life cycle.


            Organizations also consider providing incentives for suppliers to implement
            controls, promote transparency in their processes and security practices,
            provide contract language that addresses the prohibition of tainted or
            counterfeit components, and restrict purchases from untrustworthy suppliers.
            Organizations consider providing training, education, and awareness programs
            for personnel regarding supply chain risks, available mitigation strategies,
            and when the programs should be employed. Methods for reviewing and protecting
            development plans, documentation, and evidence are commensurate with the
            security requirements of the organization. Contracts may specify documentation
            protection requirements.'
