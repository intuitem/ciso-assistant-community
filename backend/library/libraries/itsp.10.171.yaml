    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02.a.4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02.a
      ref_id: 03.03.02.A.4
      description: "source de l\u2019\xE9v\xE9nement;"
      translations:
        en:
          description: source of the event
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02.a.5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02.a
      ref_id: 03.03.02.A.5
      description: "r\xE9sultat de l\u2019\xE9v\xE9nement;"
      translations:
        en:
          description: outcome of the event
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.02.a.6
      assessable: true
