    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.01
      ref_id: 03.01.01.disc
      name: Discussion
      description: "La pr\xE9sente exigence s\u2019applique \xE0 la gestion des comptes\
        \ pour les syst\xE8mes et les applications. La d\xE9finition et l\u2019application\
        \ des autorisations d\u2019acc\xE8s, autres que celles d\xE9termin\xE9es par\
        \ le type de compte (par exemple, les acc\xE8s privil\xE9gi\xE9s ou non privil\xE9\
        gi\xE9s) sont \xE9nonc\xE9es dans l\u2019exigence **Application de l'acc\xE8\
        s 03.01.02**. Les types de comptes incluent les comptes individuels, les comptes\
        \ de groupe, les comptes temporaires, les comptes syst\xE8me, les comptes\
        \ d\u2019invit\xE9, les comptes anonymes, les comptes d\u2019urgence, les\
        \ comptes de d\xE9veloppeur et les comptes de service. Les utilisatrices et\
        \ utilisateurs n\xE9cessitant des privil\xE8ges administratifs pour les comptes\
        \ syst\xE8me font l\u2019objet d\u2019un examen plus approfondi de la part\
        \ des responsables appropri\xE9s de l\u2019organisation charg\xE9s d\u2019\
        approuver ces comptes et les acc\xE8s privil\xE9gi\xE9s. Les types de comptes\
        \ que les organisations peuvent interdire en raison d\u2019un risque de s\xE9\
        curit\xE9 accru incluent les comptes de groupe, d\u2019urgence, d\u2019invit\xE9\
        , anonymes et temporaires.\n\nLes organisations peuvent choisir de d\xE9finir\
        \ les privil\xE8ges d\u2019acc\xE8s ou d\u2019autres attributs en fonction\
        \ du compte, du type de compte ou d\u2019une combinaison des deux. Les autres\
        \ attributs requis pour autoriser l\u2019acc\xE8s incluent les restrictions\
        \ en fonction du moment de la journ\xE9e, du jour de la semaine et du point\
        \ d\u2019origine. Lors de la d\xE9finition des autres attributs de compte,\
        \ les organisations doivent consid\xE9rer les exigences syst\xE8me (par exemple,\
        \ les mises \xE0 niveau du syst\xE8me et la maintenance planifi\xE9e) et les\
        \ exigences ayant trait \xE0 la mission et aux activit\xE9s (par exemple,\
        \ les diff\xE9rences de fuseau horaire et l\u2019acc\xE8s \xE0 distance pour\
        \ faciliter les d\xE9placements).\n\nLes utilisatrices et utilisateurs qui\
        \ pr\xE9sentent un risque important pour la s\xE9curit\xE9 et/ou l\u2019atteinte\
        \ \xE0 la vie priv\xE9e comprennent les personnes pour lesquelles des preuves\
        \ fiables indiquent l\u2019intention d\u2019utiliser un acc\xE8s autoris\xE9\
        \ au syst\xE8me afin de causer des dommages ou de permettre \xE0 des adversaires\
        \ de causer des dommages par leur entremise. Une collaboration \xE9troite\
        \ entre les gestionnaires des ressources humaines, les responsables de la\
        \ mission ou des activit\xE9s, les administrateurs de syst\xE8me et le personnel\
        \ juridique est essentielle \xE0 la d\xE9sactivation des comptes syst\xE8\
        me des personnes pr\xE9sentant un risque \xE9lev\xE9. Les d\xE9lais pour aviser\
        \ le personnel ou les r\xF4les d\xE9sign\xE9s de l\u2019organisation peuvent\
        \ varier.\n\nLa fermeture de session en cas d\u2019inactivit\xE9 peut \xEA\
        tre bas\xE9e sur des comportements ou sur des strat\xE9gies, et n\xE9cessite\
        \ que les utilisatrices et utilisateurs effectuent une op\xE9ration physique\
        \ afin de fermer leur session s\u2019ils pr\xE9voient d\u2019\xEAtre inactifs\
        \ sur le syst\xE8me pendant une p\xE9riode d\xE9passant la p\xE9riode d\xE9\
        finie. L\u2019application automatique de la fermeture de session en cas d\u2019\
        inactivit\xE9 est abord\xE9e dans l\u2019exigence **Verrouillage d'appareil\
        \ 03.01.10**."
      translations:
        en:
          name: Discussion
          description: 'This requirement focuses on account management for systems
            and applications. The definition and enforcement of access authorizations
            other than those determined by account type (e.g., privileged access or
            non-privileged access) are addressed in **Access enforcement 03.01.02**.
            System account types include individual, group, temporary, system, guest,
            anonymous, emergency, developer, and service accounts. Users who require
            administrative privileges <abbr title="Administrative privileges&#10;The
            permissions that allow a user to perform certain functions on a system
            or network, such as installing software and changing configuration settings."><sup>(?)</sup></abbr>
            on system accounts receive additional scrutiny by organizational personnel
            responsible for approving such accounts and privileged access. Types of
            accounts that organizations may prohibit due to increased risk include
            group, emergency, guest, anonymous, and temporary accounts.


            Organizations may choose to define access privileges or other attributes
            by account, type of account, or a combination of both. Other attributes
            required for authorizing access include restrictions on time-of-day, day-of-week,
            and point of origin. In defining other account attributes, organizations
            consider system requirements (e.g., system upgrades, scheduled maintenance)
            and mission and business requirements (e.g., time zone differences, remote
            access to facilitate travel requirements).


            Users who pose a significant security and/or privacy risk include individuals
            for whom reliable evidence indicates either the intention to use authorized
            access to the system to cause harm or that adversaries will cause harm
            through them. Close coordination among human resource managers, mission/business
            owners, system administrators, and legal staff is essential when disabling
            system accounts for high-risk individuals. Time periods for the notification
            of organizational personnel or roles may vary.


            Inactivity logout is behaviour- or policy-based and requires users to
            take physical action to log out when they are expecting inactivity longer
            than the defined period. Automatic enforcement of inactivity logout is
            addressed by **Device lock 03.01.10**.'
