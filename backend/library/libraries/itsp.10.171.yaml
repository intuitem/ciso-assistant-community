        organisation]."
      translations:
        en:
          description: 'Prohibit or restrict use of the following functions, ports,
            protocols, connections, and services: [Assignment: organization-defined
            functions, ports, protocols, connections, and services]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06
      ref_id: 03.04.06.C
      description: "Examiner le syst\xE8me tous les [Affectation : fr\xE9quence d\xE9\
        finie par l\u2019organisation] afin d\u2019\xE9tablir les fonctions, les ports,\
        \ les protocoles, les connexions et les services non n\xE9cessaires."
      translations:
        en:
          description: 'Review the system [Assignment: organization-defined frequency]
            to identify unnecessary or nonsecure functions, ports, protocols, connections,
            and services'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06
      ref_id: 03.04.06.D
      description: "D\xE9sactiver ou retirer les fonctions, les ports, les protocoles,\
        \ les connexions et les services qui ne sont pas n\xE9cessaires ou non s\xE9\
        curis\xE9s."
      translations:
        en:
          description: Disable or remove functions, ports, protocols, connections,
            and services that are unnecessary or nonsecure
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.06
      ref_id: 03.04.06.disc
      name: Discussion
      description: "Les syst\xE8mes peuvent fournir une grande vari\xE9t\xE9 de fonctions\
        \ et de services. Il se peut que certaines fonctions et certains services\
        \ fournis r\xE9guli\xE8rement par d\xE9faut ne soient pas n\xE9cessaires pour\
        \ appuyer la mission, les fonctions ou les op\xE9rations essentielles de l\u2019\
        organisation. Il peut \xEAtre pratique de fournir plusieurs services \xE0\
        \ partir de composants individuels du syst\xE8me. Toutefois, cette fa\xE7\
        on de faire augmente les risques comparativement au fait de limiter les services\
        \ fournis \xE0 partir d\u2019un seul composant. Dans la mesure du possible,\
        \ les organisations doivent limiter la fonctionnalit\xE9 \xE0 une seule fonction\
        \ par composant.\n\nLes organisations doivent examiner les fonctions et les\
        \ services fournis par le syst\xE8me ou les composants syst\xE8me afin de\
        \ d\xE9terminer ceux qui peuvent \xEAtre \xE9limin\xE9s. Les organisations\
        \ doivent \xE9galement d\xE9sactiver les protocoles et les ports physiques\
        \ et logiques inutilis\xE9s ou qui ne sont pas n\xE9cessaires afin d\u2019\
        emp\xEAcher les connexions non autoris\xE9es des appareils, les transferts\
        \ d\u2019information et la tunnellisation. Les organisations peuvent utiliser\
        \ des outils de balayage r\xE9seau, des solutions de d\xE9tection et de pr\xE9\
        vention d\u2019intrusion et des solutions de protection des points d\u2019\
        extr\xE9mit\xE9 (par exemple, des pare-feu et des syst\xE8mes de d\xE9tection\
        \ d\u2019intrusion sur l\u2019h\xF4te) afin de d\xE9tecter et de pr\xE9venir\
        \ l\u2019utilisation de fonctions, de ports, de protocoles, de connexions\
        \ syst\xE8me et de services non autoris\xE9s. Bluetooth, FTP (File Transfer\
        \ Protocol) et l\u2019interconnexion de r\xE9seaux d\u2019\xE9gal \xE0 \xE9\
        gal sont des exemples de protocoles que les organisations doivent envisager\
        \ d\u2019\xE9liminer, de restreindre ou de d\xE9sactiver."
      translations:
        en:
          name: Discussion
          description: 'Systems can provide a variety of functions and services. Some
            functions and services that are routinely provided by default may not
            be necessary to support essential organizational missions, functions,
            or operations. It may be convenient to provide multiple services from
            single system components. However, doing so increases risk over limiting
            the services provided by any one component. Where feasible, organizations
            limit functionality to a single function per component.


            Organizations review the functions and services provided by the system
            or system components to determine which functions and services are candidates
            for elimination. Organizations disable unused or unnecessary physical
            and logical ports and protocols to prevent the unauthorized connection
            of devices, transfer of information, and tunneling. Organizations can
            employ network scanning tools, intrusion detection and prevention systems,
            and endpoint protection systems (e.g., firewalls and host-based intrusion
            detection systems) to identify and prevent the use of prohibited functions,
            ports, protocols, system connections, and services. Bluetooth, File Transfer
            Protocol (FTP), and peer-to-peer networking are examples of the types
            of protocols that organizations consider eliminating, restricting, or
            disabling.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.08
      name: "Logiciels autoris\xE9s \u2212 Autorisation par exception"
      translations:
        en:
          name: "Authorized software \u2013 allow by exception"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08
      ref_id: 03.04.08.A
      description: "D\xE9terminer les programmes logiciels autoris\xE9s \xE0 \xEA\
        tre ex\xE9cut\xE9s sur le syst\xE8me."
      translations:
        en:
          description: Identify software programs authorized to execute on the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08
      ref_id: 03.04.08.B
      description: "Mettre en \u0153uvre une strat\xE9gie de refus par d\xE9faut,\
        \ autorisation par exception pour l\u2019ex\xE9cution des programmes logiciels\
        \ sur le syst\xE8me."
      translations:
        en:
          description: Implement a deny-all, allow-by-exception policy for the execution
            of software programs on the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08
      ref_id: 03.04.08.C
      description: "Examiner et mettre \xE0 jour la liste des programmes logiciels\
        \ autoris\xE9s tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019\
        organisation]."
      translations:
        en:
          description: 'Review and update the list of authorized software programs
            [Assignment: organization-defined frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.08
      ref_id: 03.04.08.disc
      name: Discussion
      description: "S\u2019ils d\xE9tiennent les privil\xE8ges n\xE9cessaires, les\
        \ utilisatrices et utilisateurs peuvent installer des logiciels sur les syst\xE8\
        mes organisationnels. Afin de garder le contr\xF4le sur les logiciels install\xE9\
        s, les organisations doivent d\xE9terminer les op\xE9rations permises et interdites\
        \ concernant l\u2019installation de logiciels. Les installations de logiciels\
        \ autoris\xE9es comprennent les mises \xE0 jour et l\u2019application de correctifs\
        \ de s\xE9curit\xE9 aux logiciels existants, ainsi que le t\xE9l\xE9chargement\
        \ de nouvelles applications \xE0 partir des magasins d\u2019application approuv\xE9\
        s par l\u2019organisation. Les strat\xE9gies s\xE9lectionn\xE9es pour r\xE9\
        gir les logiciels install\xE9s par les utilisatrices et utilisateurs peuvent\
        \ \xEAtre d\xE9velopp\xE9es par l\u2019organisation ou fournies par une entit\xE9\
        \ externe. Les m\xE9thodes d\u2019application des strat\xE9gies peuvent inclure\
        \ des m\xE9thodes proc\xE9durales et des m\xE9thodes automatis\xE9es.\n\n\
        Les programmes logiciels autoris\xE9s peuvent \xEAtre limit\xE9s \xE0 des\
        \ versions ou \xE0 des sources particuli\xE8res. Afin de favoriser un processus\
        \ complet de gestion des logiciels autoris\xE9s et de renforcer la protection\
        \ contre les attaques qui contournent les logiciels autoris\xE9s au niveau\
        \ de l\u2019application, les programmes logiciels peuvent \xEAtre d\xE9compos\xE9\
        s en diff\xE9rents niveaux de d\xE9tail et surveill\xE9s. Ces niveaux incluent\
        \ les applications, les interfaces de programmation d\u2019applications, les\
        \ modules d\u2019application, les scripts, les processus syst\xE8me, les services\
        \ syst\xE8me, les fonctions noyau, les registres, les pilotes et les biblioth\xE8\
        ques de liens dynamiques."
      translations:
        en:
          name: Discussion
          description: "If provided with the necessary privileges, users can install\
            \ software in organizational systems. To maintain control over the software\
            \ installed, organizations identify permitted and prohibited actions regarding\
            \ software installation. Permitted software installations include updates\
            \ and security patches to existing software and downloading new applications\
            \ from organization-approved \u201Capp stores.\u201D The policies selected\
            \ for governing user-installed software are organization-developed or\
            \ provided by an external entity. Policy enforcement methods can include\
            \ procedural methods and automated methods.\n\nAuthorized software programs\
            \ can be limited to specific versions or from a specific source. To facilitate\
            \ a comprehensive authorized software process and increase the strength\
            \ of protection against attacks that bypass application-level authorized\
            \ software, software programs may be decomposed into and monitored at\
            \ different levels of detail. These levels include applications, application\
            \ programming interfaces, application modules, scripts, system processes,\
            \ system services, kernel functions, registries, drivers, and dynamic\
            \ link libraries."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.10
      name: "Inventaire des composants du syst\xE8me"
      translations:
        en:
          name: System component inventory
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10
      ref_id: 03.04.10.A
      description: "\xC9laborer et documenter un inventaire des composants du syst\xE8\
        me."
      translations:
        en:
          description: Develop and document an inventory of system components
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10
      ref_id: 03.04.10.B
      description: "Examiner et mettre \xE0 jour l\u2019inventaire des composants\
        \ du syst\xE8me tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019\
        organisation]."
      translations:
        en:
          description: 'Review and update the system component inventory [Assignment:
            organization-defined frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10
      ref_id: 03.04.10.C
      description: "Mettre \xE0 jour l\u2019inventaire des composants du syst\xE8\
        me dans le cadre des activit\xE9s d\u2019installation, de retrait et de mise\
        \ \xE0 jour du syst\xE8me."
      translations:
        en:
          description: Update the system component inventory as part of installations,
            removals, and system updates
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.10
      ref_id: 03.04.10.disc
      name: Discussion
      description: "Les composants du syst\xE8me sont des actifs discrets et identifiables\
        \ (c\u2019est-\xE0-dire le mat\xE9riel, les logiciels et les micrologiciels)\
        \ qui composent un syst\xE8me. Les organisations peuvent mettre en \u0153\
        uvre des inventaires de composants syst\xE8me centralis\xE9s qui comprennent\
        \ des composants de tous les syst\xE8mes. Dans de telles situations, les organisations\
        \ doivent s\u2019assurer que les inventaires comportent de l\u2019information\
        \ propre au syst\xE8me requise pour la comptabilisation des composants. L\u2019\
        information n\xE9cessaire pour une comptabilisation efficace des composants\
        \ du syst\xE8me comprend le nom du syst\xE8me, les propri\xE9taires des logiciels,\
        \ les num\xE9ros de version des logiciels, les sp\xE9cifications de l\u2019\
        inventaire du mat\xE9riel, l\u2019information sur les licences de logiciels,\
        \ les composants r\xE9seau, les noms des machines et les adresses r\xE9seau\
        \ pour tous les protocoles mis en \u0153uvre (par exemple, IPv4 et IPv6).\
        \ Les sp\xE9cifications de l\u2019inventaire doivent comprendre le type de\
        \ composant, l\u2019emplacement physique, la date de r\xE9ception, le fabricant,\
        \ le co\xFBt, le mod\xE8le, le num\xE9ro de s\xE9rie et des donn\xE9es sur\
        \ le fournisseur."
      translations:
        en:
          name: Discussion
          description: "System components are discrete, identifiable assets (i.e.,\
            \ hardware, software, and firmware elements) that compose a system. Organizations\
            \ may implement centralized system component inventories that include\
            \ components from all systems. In such situations, organizations ensure\
            \ that the inventories include system-specific information required for\
            \ component accountability. The information necessary for effective accountability\
            \ of system components includes the system name, software owners, software\
            \ version numbers, hardware inventory specifications, software license\
            \ information \u2014 and for networked components \u2014 the machine names\
            \ and network addresses for all implemented protocols (e.g., IPv4, IPv6).\
            \ Inventory specifications include component type, physical location,\
            \ date of receipt, manufacturer, cost, model, serial number, and supplier\
            \ information."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.11
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.11
      name: "Emplacement de l\u2019information"
      translations:
        en:
          name: Information location
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.11.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.11
      ref_id: 03.04.11.A
      description: "\xC9tablir et documenter l\u2019emplacement de l\u2019information\
        \ d\xE9sign\xE9e et des composants syst\xE8me o\xF9 l\u2019information est\
        \ trait\xE9e et stock\xE9e."
      translations:
        en:
          description: Identify and document the location of specified information
            and the system components on which the information is processed and stored.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.11.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.11
      ref_id: 03.04.11.B
      description: "Documenter les changements d\u2019emplacement sur le syst\xE8\
        me ou les composants du syst\xE8me o\xF9 l\u2019information d\xE9sign\xE9\
        e est trait\xE9e et stock\xE9e."
      translations:
        en:
          description: Document changes to the system or system component location
            where specified information is processed and stored.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.11.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.11
      ref_id: 03.04.11.disc
      name: Discussion
      description: "L\u2019emplacement de l\u2019information r\xE9pond au besoin de\
        \ bien comprendre les composants du syst\xE8me o\xF9 l\u2019information d\xE9\
        sign\xE9e est trait\xE9e et stock\xE9e ainsi que les utilisatrices et utilisateurs\
        \ qui ont acc\xE8s \xE0 l\u2019information d\xE9sign\xE9e, afin de pouvoir\
        \ fournir les m\xE9canismes de protection qui conviennent, y compris les contr\xF4\
        les de flux d\u2019information, les contr\xF4les d\u2019acc\xE8s et la gestion\
        \ de l\u2019information."
      translations:
        en:
          name: Discussion
          description: Information location addresses the need to understand the specific
            system components where specified information is being processed and stored
            and the users who have access to specified information so that appropriate
            protection mechanisms can be provided, including information flow controls,
            access controls, and information management.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.12
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.4
      ref_id: 03.04.12
      name: "Configuration des syst\xE8mes et des composants pour des zones \xE0 risque\
        \ \xE9lev\xE9"
      translations:
        en:
          name: System and component configuration for high-risk areas
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.12.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.12
      ref_id: 03.04.12.A
      description: "Remettre des syst\xE8mes ou des composants syst\xE8me dot\xE9\
        s des configurations suivantes aux personnes qui voyagent dans des lieux \xE0\
        \ risque \xE9lev\xE9 : [Affectation : configurations syst\xE8me d\xE9finies\
        \ par l\u2019organisation]."
      translations:
        en:
          description: 'Issue systems or system components with the following configurations
            to individuals traveling to high-risk locations: [Assignment: organization-defined
            system configurations].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.12.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.12
      ref_id: 03.04.12.B
      description: "Appliquer les exigences de s\xE9curit\xE9 suivantes aux syst\xE8\
        mes ou aux composants syst\xE8me lorsque les personnes reviennent de voyage\
        \ : [Affectation : exigences de s\xE9curit\xE9 d\xE9finies par l\u2019organisation]."
      translations:
        en:
          description: 'Apply the following security requirements to the system or
            system components when the individuals return from travel: [Assignment:
            organization-defined security requirements].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.12.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.04.12
      ref_id: 03.04.12.disc
      name: Discussion
      description: "Lorsque l\u2019on sait qu\u2019un syst\xE8me ou qu\u2019un composant\
        \ syst\xE8me se trouvera dans une zone \xE0 risque \xE9lev\xE9, des exigences\
        \ de s\xE9curit\xE9 suppl\xE9mentaires peuvent \xEAtre n\xE9cessaires afin\
        \ de contrer les menaces accrues. Les organisations peuvent mettre en \u0153\
        uvre des mesures de protection sur les syst\xE8mes ou les composants syst\xE8\
        me qui sont utilis\xE9s par des personnes qui partent en voyage et qui en\
        \ reviennent. Les mesures comprennent d\xE9terminer les lieux pr\xE9occupants,\
        \ d\xE9finir les configurations requises pour les composants, s\u2019assurer\
        \ que les composants sont configur\xE9s ad\xE9quatement avant le voyage et\
        \ r\xE9aliser prendre d\u2019autres mesures au retour du voyage. Par exemple,\
        \ les syst\xE8mes qui se trouveront dans des zones \xE0 risque \xE9lev\xE9\
        \ peuvent \xEAtre configur\xE9s avec des disques durs pr\xE9alablement nettoy\xE9\
        s, un nombre limit\xE9 d\u2019applications ou encore des param\xE8tres de\
        \ configuration plus stricts. Les mesures appliqu\xE9es aux appareils mobiles\
        \ au retour du voyage comprennent un examen de l\u2019appareil afin de d\xE9\
        tecter des signes physiques de tentatives de modification, le nettoyage <abbr\
        \ title=\"Nettoyage&#10;Processus par lequel les donn\xE9es sont retir\xE9\
        es d\u2019un support de mani\xE8re d\xE9finitive. Le support d\u2019enregistrement\
        \ peut \xEAtre r\xE9utilis\xE9 conform\xE9ment aux politiques de s\xE9curit\xE9\
        \ des TI, mais il est impossible de r\xE9cup\xE9rer les donn\xE9es qui s\u2019\
        y trouvaient ou d\u2019y acc\xE9der.\"><sup>(?)</sup></abbr> de la m\xE9moire\
        \ ou la recr\xE9ation de l\u2019image de la m\xE9moire de l\u2019appareil."
      translations:
        en:
          name: Discussion
          description: When it is known that a system or a specific system component
            will be in a high-risk area, additional security requirements may be needed
            to counter the increased threat. Organizations can implement protective
            measures on systems or system components used by individuals departing
            on and returning from travel. Actions include determining locations of
            concern, defining the required configurations for the components, ensuring
            that the components are configured as intended before travel is initiated,
            and taking additional actions after travel is completed. For example,
            systems going into high-risk areas can be configured with sanitized hard
            drives, limited applications, and more stringent configuration settings.
            Actions applied to mobile devices upon return from travel include examining
            the device for signs of physical tampering and purging and reimaging the
            device storage.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.5'
      name: Identification et authentification
      description: "Les contr\xF4les d\u2019identification et d\u2019authentification\
        \ appuient l\u2019identification unique des utilisatrices et utilisateurs,\
        \ des processus agissant au nom des utilisatrices et utilisateurs et des dispositifs.\
        \ Ils appuient \xE9galement l\u2019authentification ou la v\xE9rification\
        \ des identit\xE9s des utilisatrices et utilisateurs, des processus et des\
        \ dispositifs \xE0 titre de condition pr\xE9alable pour permettre un acc\xE8\
        s aux syst\xE8mes organisationnels."
      translations:
        en:
          name: Identification and authentication
          description: The Identification and authentication controls support the
            unique identification of users, processes acting on behalf of users and
            devices. They also support the authentication or verification of the identities
            of those users, processes or devices as a prerequisite to allowing access
            to organizational systems.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.01
      name: "Identification, authentification et r\xE9authentification des utilisatrices\
        \ et utilisateurs"
      translations:
        en:
          name: User identification, authentication, and re-authentication
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.01
      ref_id: 03.05.01.A
      description: "Identifier de mani\xE8re unique et authentifier les utilisatrices\
        \ et utilisateurs du syst\xE8me et associer un identificateur unique aux processus\
        \ agissant en leur nom."
      translations:
        en:
          description: Uniquely identify and authenticate system users and associate
            that unique identification with processes acting on behalf of those users
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.01
      ref_id: 03.05.01.B
      description: "R\xE9authentifier les utilisatrices et utilisateurs lors de [Affectation\
        \ : circonstances ou situations n\xE9cessitant une r\xE9authentification d\xE9\
        finies par l\u2019organisation]."
      translations:
        en:
          description: 'Re-authenticate users when [Assignment: organization-defined
            circumstances or situations requiring re-authentication]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.01
      ref_id: 03.05.01.disc
      name: Discussion
      description: "Les utilisatrices et utilisateurs de syst\xE8me incluent les personnes\
        \ (ou les processus syst\xE8me agissant en leur nom) qui sont autoris\xE9\
        es \xE0 acc\xE9der \xE0 un syst\xE8me. Normalement, les identificateurs de\
        \ personne correspondent aux noms d\u2019utilisateur associ\xE9s aux comptes\
        \ syst\xE8me qui leur ont \xE9t\xE9 attribu\xE9s. Puisque les processus syst\xE8\
        me sont ex\xE9cut\xE9s au nom de groupes et de r\xF4les, les organisations\
        \ peuvent exiger l\u2019identification individuelle de chacune des personnes\
        \ comprises dans un compte de groupe aux fins de responsabilisation individuelle\
        \ pour les activit\xE9s r\xE9alis\xE9es sur le syst\xE8me. L\u2019identification\
        \ unique et l\u2019authentification des utilisatrices et utilisateurs s\u2019\
        appliquent \xE0 tous les acc\xE8s syst\xE8me. Les organisations peuvent avoir\
        \ recours \xE0 des mots de passe, \xE0 des authentifiants physiques, \xE0\
        \ la biom\xE9trie ou \xE0 une combinaison de ces \xE9l\xE9ments pour l\u2019\
        authentification de l\u2019identit\xE9 des utilisatrices et utilisateurs.\
        \ Les organisations peuvent proc\xE9der \xE0 une r\xE9authentification des\
        \ personnes dans certaines situations, y compris lors d\u2019un changement\
        \ li\xE9 aux r\xF4les, aux authentifiants ou aux justificatifs d\u2019identit\xE9\
        , lors de l\u2019ex\xE9cution de fonctions privil\xE9gi\xE9es, apr\xE8s une\
        \ p\xE9riode d\xE9termin\xE9e ou p\xE9riodiquement."
      translations:
        en:
          name: Discussion
          description: System users include individuals (or system processes acting
            on behalf of individuals) who are authorized to access a system. Typically,
            individual identifiers are the usernames associated with the system accounts
            assigned to those individuals. Since system processes execute on behalf
            of groups and roles, organizations may require the unique identification
            of individuals in group accounts or accountability of individual activity.
            The unique identification and authentication of users applies to all system
            accesses. Organizations employ passwords, physical authenticators, biometrics,
            or some combination thereof to authenticate user identities. Organizations
            may re-authenticate individuals in certain situations, including when
            roles, authenticators, or credentials change; when the execution of privileged
            functions occurs; after a fixed time period; or periodically.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.02
      name: Identification et authentification des dispositifs
      translations:
        en:
          name: Device identification and authentication
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.02
      ref_id: 03.05.02.A
      description: "Identifier de mani\xE8re unique et authentifier les [Affectation\
        \ : dispositifs ou types de dispositifs d\xE9finis par l\u2019organisation]\
        \ avant d\u2019\xE9tablir une connexion au syst\xE8me."
      translations:
        en:
          description: 'Uniquely identify and authenticate [Assignment: organization-defined
            devices or types of devices] before establishing a system connection.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.02
      ref_id: 03.05.02.disc
      name: Discussion
      description: "Les dispositifs qui exigent une identification et une authentification\
        \ dispositif \xE0 dispositif unique sont d\xE9finis en fonction du type, du\
        \ dispositif ou d\u2019une combinaison des deux. Les types de dispositifs\
        \ d\xE9finis par l\u2019organisation incluent les dispositifs qui n\u2019\
        appartiennent pas \xE0 l\u2019organisation. Les syst\xE8mes utilisent de l\u2019\
        information connue partag\xE9e (par exemple, des adresses Media Access Control\
        \ [MAC] ou Transmission Control Protocol/Internet Protocol [TCP/IP]) pour\
        \ l\u2019identification des dispositifs ou encore des solutions d\u2019authentification\
        \ organisationnelles (par exemple, les protocoles Institute of Electrical\
        \ and Electronics Engineers [IEEE] 802.1x et Extensible Authentication Protocol\
        \ [EAP], un serveur RADIUS avec l\u2019authentification EAP-Transport Layer\
        \ Security [TLS] ou Kerberos) pour identifier et authentifier les dispositifs\
        \ sur les r\xE9seaux locaux et \xE9tendus. Une infrastructure \xE0 cl\xE9\
        \ publique (ICP) et une v\xE9rification de la r\xE9vocation des certificats\
        \ pour les certificats \xE9chang\xE9s peuvent \xE9galement \xEAtre int\xE9\
        gr\xE9es dans le cadre de l\u2019authentification des dispositifs."
      translations:
        en:
          name: Discussion
          description: Devices that require unique device-to-device identification
            and authentication are defined by type, device, or a combination of type
            and device. Organization-defined device types include devices that are
            not owned by the organization. Systems use shared known information (e.g.,
            Media Access Control [MAC], Transmission Control Protocol/Internet Protocol
            [TCP/IP] addresses) for device identification or organizational authentication
            solutions (e.g., Institute of Electrical and Electronics Engineers [IEEE]
            802.1x and Extensible Authentication Protocol [EAP], RADIUS server with
            EAP-Transport Layer Security [TLS] authentication, Kerberos) to identify
            and authenticate devices on local and wide area networks. Public Key Infrastructure
            (PKI) and certificate revocation checking for the certificates exchanged
            can also be included as part of device authentication.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.03
      name: Authentification multifacteur
      translations:
        en:
          name: Multi-factor authentication
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.03
      ref_id: 03.05.03.A
      description: "Mettre en \u0153uvre des m\xE9canismes robustes d\u2019authentification\
        \ multifacteur (AMF) pour l\u2019acc\xE8s aux comptes privil\xE9gi\xE9s et\
        \ non privil\xE9gi\xE9s."
      translations:
        en:
          description: Implement strong multi-factor authentication <abbr title="Multi-factor
            authentication&#10;A tactic that can add an additional layer of security
            to your devices and account. Multi-factor authentication requires additional
            verification (like a PIN or fingerprint) to access your devices or accounts.
            Two-factor authentication is a type of multi-factor authentication."><sup>(?)</sup></abbr>
            (MFA) for access to privileged and non-privileged accounts.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.03
      ref_id: 03.05.03.disc
      name: Discussion
      description: "Cette exigence s\u2019applique aux comptes d\u2019utilisateur.\
        \ L\u2019authentification multifacteur n\xE9cessite l\u2019utilisation de\
        \ deux facteurs diff\xE9rents ou plus pour l\u2019authentification. Les facteurs\
        \ d\u2019authentification sont d\xE9finis comme suit : une information connue\
        \ (par exemple, un num\xE9ro d\u2019identification personnel [NIP]), une possession\
        \ (par exemple, un authentifiant physique comme une cl\xE9 cryptographique\
        \ <abbr title=\"Cl\xE9 cryptographique&#10;Valeur num\xE9rique employ\xE9\
        e dans des processus cryptographiques, notamment le chiffrement et le d\xE9\
        chiffrement, la g\xE9n\xE9ration des signatures ou encore la v\xE9rification\
        \ des signatures.\"><sup>(?)</sup></abbr> priv\xE9e) ou un attribut personnel\
        \ (par exemple, une authentification biom\xE9trique). Les solutions d\u2019\
        authentification multifacteur qui pr\xE9sentent des authentifiants physiques\
        \ comprennent les authentifiants mat\xE9riels qui fournissent des sorties\
        \ \xE0 dur\xE9e limit\xE9e ou de type d\xE9fi-r\xE9ponse ainsi que des cartes\
        \ \xE0 puce. En plus d\u2019authentifier les utilisatrices et utilisateurs\
        \ au niveau du syst\xE8me, les organisations peuvent \xE9galement avoir recours\
        \ \xE0 des m\xE9canismes d\u2019authentification au niveau de l\u2019application\
        \ pour accro\xEEtre la s\xE9curit\xE9 de l\u2019information."
      translations:
        en:
          name: Discussion
          description: 'This requirement applies to user accounts. Multi-factor authentication
            requires the use of two or more different factors to achieve authentication.
            The authentication factors are defined as follows: something you know
            (e.g., a personal identification number [PIN]), something you have (e.g.,
            a physical authenticator, such as a cryptographic private key), or something
            you are (e.g., a biometric). Multi-factor authentication solutions that
            feature physical authenticators include hardware authenticators that provide
            time-based or challenge-response outputs and smart cards. In addition
            to authenticating users at the system level, organizations may also employ
            authentication mechanisms at the application level to provide increased
            information security.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.04
      name: "Authentification r\xE9sistant \xE0 la r\xE9insertion"
      translations:
        en:
          name: Replay-resistant authentication
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.04
      ref_id: 03.05.04.A
      description: "Mettre en \u0153uvre des m\xE9canismes d\u2019authentification\
        \ r\xE9sistant \xE0 la r\xE9insertion pour l\u2019acc\xE8s aux comptes privil\xE9\
        gi\xE9s et non privil\xE9gi\xE9s."
      translations:
        en:
          description: Implement replay-resistant authentication mechanisms for access
            to privileged and non-privileged accounts.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.04
      ref_id: 03.05.04.disc
      name: Discussion
      description: "Les processus d\u2019authentification r\xE9sistent aux attaques\
        \ par r\xE9insertion lorsqu\u2019il n\u2019est pas pratique de r\xE9aliser\
        \ une authentification r\xE9ussie en enregistrant ou en r\xE9ins\xE9rant un\
        \ message d\u2019authentification ant\xE9rieur. Les techniques r\xE9sistant\
        \ \xE0 la r\xE9insertion incluent les protocoles qui utilisent des nonces\
        \ ou des d\xE9fis, comme des authentifiants \xE0 usage unique synchrones ou\
        \ d\xE9fi-r\xE9ponse."
      translations:
        en:
          name: Discussion
          description: Authentication processes resist replay attacks if it is impractical
            to successfully authenticate by recording or replaying previous authentication
            messages. Replay-resistant techniques include protocols that use nonces
            or challenges, such as time synchronous or challenge-response one-time
            authenticators.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.05
      name: Gestion des identifiants
      translations:
        en:
          name: Identifier management
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05
      ref_id: 03.05.05.A
      description: "Recevoir une autorisation du personnel ou des r\xF4les de l\u2019\
        organisation pour attribuer un identifiant \xE0 une personne, \xE0 un groupe,\
        \ \xE0 un r\xF4le, \xE0 un service ou \xE0 un dispositif."
      translations:
        en:
          description: Receive authorization from organizational personnel or roles
            to assign an individual, group, role, service, or device identifier
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05
      ref_id: 03.05.05.B
      description: "S\xE9lectionner et attribuer un identifiant qui identifie une\
        \ personne, un groupe, un r\xF4le, un service ou un dispositif."
      translations:
        en:
          description: Select and assign an identifier that identifies an individual,
            group, role, service, or device
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05
      ref_id: 03.05.05.C
      description: "Pr\xE9venir la r\xE9utilisation d\u2019identifiant pendant [Affectation\
        \ : p\xE9riode d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Prevent reuse of identifiers for [Assignment: organization-defined
            time period]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05
      ref_id: 03.05.05.D
      description: "G\xE9rer les identifiants personnels en identifiant de fa\xE7\
        on unique chaque personne \xE0 titre de [Affectation : caract\xE9ristique\
        \ d\xE9finie par l\u2019organisation identifiant le statut de la personne]."
      translations:
        en:
          description: 'Manage individual identifiers by uniquely identifying each
            individual as [Assignment: organization-defined characteristic identifying
            individual status]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.05
      ref_id: 03.05.05.disc
      name: Discussion
      description: "Les identifiants sont fournis aux utilisateurs, aux processus\
        \ agissant en leur nom et aux dispositifs. Le fait d\u2019emp\xEAcher la r\xE9\
        utilisation d\u2019identifiant emp\xEAche d\u2019attribuer \xE0 une autre\
        \ entit\xE9 des identifiants utilis\xE9s pr\xE9c\xE9demment par une personne,\
        \ un groupe, un r\xF4le, un service ou un dispositif.\n\nLes caract\xE9ristiques\
        \ qui identifient le statut d\u2019une personne comprennent les utilisatrices\
        \ et utilisateurs entrepreneurs, de nationalit\xE9 \xE9trang\xE8re et non\
        \ organisationnels. L\u2019identification du statut d\u2019une personne au\
        \ moyen de ces caract\xE9ristiques offre des renseignements \xE0 propos des\
        \ personnes avec lesquelles le personnel de l\u2019organisation communique.\
        \ Par exemple, il peut \xEAtre utile pour une employ\xE9e ou un employ\xE9\
        \ de savoir que l\u2019une des personnes dans la liste des destinataires d\u2019\
        un courriel est une entrepreneure ou un entrepreneur."
      translations:
        en:
          name: Discussion
          description: 'Identifiers are provided for users, processes acting on behalf
            of users, and devices. Prohibiting the reuse of identifiers prevents the
            assignment of previously used individual, group, role, service, or device
            identifiers to different individuals, groups, roles, services, or devices.


            Characteristics that identify the status of individuals include contractors,
            foreign nationals, and non-organizational users. Identifying the status
            of individuals by these characteristics provides information about the
            people with whom organizational personnel are communicating. For example,
            it is useful for an employee to know that one of the individuals on an
            email message is a contractor.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.07
      name: Gestion des mots de passe
      translations:
        en:
          name: Password management
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      ref_id: 03.05.07.A
      description: "Cr\xE9er une liste des mots de passe couramment utilis\xE9s, attendus\
        \ ou compromis et la mettre \xE0 jour tous les [Affectation : fr\xE9quence\
        \ d\xE9finie par l\u2019organisation] et lorsque l\u2019on soup\xE7onne que\
        \ les mots de passe de l\u2019organisation ont \xE9t\xE9 compromis."
      translations:
        en:
          description: 'Maintain a list of commonly used, expected, or compromised
            passwords and update the list [Assignment: organization-defined frequency]
            and when organizational passwords are suspected to have been compromised'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      ref_id: 03.05.07.B
      description: "V\xE9rifier que les mots de passe ne figurent pas sur la liste\
        \ des mots de passe couramment utilis\xE9s, attendus ou compromis lorsque\
        \ les utilisatrices et utilisateurs cr\xE9ent ou modifient leurs mots de passe."
      translations:
        en:
          description: Verify that passwords are not found on the list of commonly
            used, expected, or compromised passwords when users create or update passwords
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      ref_id: 03.05.07.C
      description: "Transmettre les mots de passe uniquement par des canaux prot\xE9\
        g\xE9s par chiffrement."
      translations:
        en:
          description: Transmit passwords only over cryptographically protected channels
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      ref_id: 03.05.07.D
      description: "Stocker les mots de passe sous forme chiffr\xE9e."
      translations:
        en:
          description: Store passwords in a cryptographically protected form
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07.e
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      ref_id: 03.05.07.E
      description: "S\xE9lectionner un nouveau mot de passe lors de la premi\xE8re\
        \ utilisation \xE0 la suite d\u2019une r\xE9cup\xE9ration de compte."
      translations:
        en:
          description: Select a new password upon first use after account recovery
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07.f
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      ref_id: 03.05.07.F
      description: "Appliquer aux mots de passe les r\xE8gles de composition et de\
        \ complexit\xE9 suivantes : [Affectation : r\xE8gles de composition et de\
        \ complexit\xE9 d\xE9finies par l\u2019organisation]."
      translations:
        en:
          description: 'Enforce the following composition and complexity rules for
            passwords: [Assignment: organization-defined composition and complexity
            rules]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.07
      ref_id: 03.05.07.disc
      name: Discussion
      description: "L\u2019authentification fond\xE9e sur un mot de passe s\u2019\
        applique aux mots de passe utilis\xE9s pour l\u2019authentification \xE0 un\
        \ seul facteur ou multifacteur. Les longs mots de passe ou les phrases de\
        \ passe sont pr\xE9f\xE9rables, par rapport \xE0 des mots de passe courts.\
        \ L\u2019application de r\xE8gles de composition offre certains avantages\
        \ pour la s\xE9curit\xE9, mais r\xE9duit l\u2019utilisabilit\xE9. Les organisations\
        \ peuvent choisir d\u2019\xE9tablir et d\u2019appliquer certaines r\xE8gles\
        \ pour la g\xE9n\xE9ration de mots de passe (notamment concernant le nombre\
        \ minimal de caract\xE8res) dans certaines circonstances. Par exemple, un\
        \ mot de passe oubli\xE9 peut mener \xE0 une r\xE9cup\xE9ration de compte.\
        \ Des mots de passe prot\xE9g\xE9s par chiffrement comprennent le hachage\
        \ cryptographique unidirectionnel sal\xE9 des mots de passe. La liste des\
        \ mots de passe couramment utilis\xE9s, compromis ou attendus comprend les\
        \ mots de passe provenant des corpus de violations pr\xE9c\xE9dentes, les\
        \ mots du dictionnaire et les caract\xE8res r\xE9p\xE9titifs ou s\xE9quentiels.\
        \ Cette liste comprend des mots s\u2019appliquant au contexte, comme le nom\
        \ du service, le nom de l\u2019utilisateur et des d\xE9rivations de ces \xE9\
        l\xE9ments. L\u2019obligation de remplacer un mot de passe temporaire par\
        \ un mot de passe permanent imm\xE9diatement apr\xE8s la connexion au syst\xE8\
        me permet de s\u2019assurer que les m\xE9canismes d\u2019authentification\
        \ sont suffisamment robustes et mis en \u0153uvre \xE0 la premi\xE8re occasion,\
        \ ce qui permet de r\xE9duire les possibilit\xE9s de compromission <abbr title=\"\
        Compromission&#10;Divulgation intentionnelle ou non intentionnelle d\u2019\
        information mettant en p\xE9ril la confidentialit\xE9, l&#x27;int\xE9grit\xE9\
        \ ou la disponibilit\xE9 de ladite information.\"><sup>(?)</sup></abbr> d\u2019\
        authentifiants. Il peut \xEAtre possible d\u2019utiliser de longs mots de\
        \ passe ou des phrases de passe dans le but d\u2019augmenter la complexit\xE9\
        \ des mots de passe."
      translations:
        en:
          name: Discussion
          description: Password-based authentication applies to passwords used in
            single-factor or multi-factor authentication. Long passwords or passphrases
            are preferable to shorter passwords. Enforced composition rules provide
            marginal security benefits while decreasing usability. However, organizations
            may choose to establish and enforce certain rules for password generation
            (e.g., minimum character length) under certain circumstances. For example,
            account recovery can occur when a password is forgotten. Cryptographically
            protected passwords include salted one-way cryptographic hashes of passwords.
            The list of commonly used, compromised, or expected passwords includes
            passwords obtained from previous breach corpuses, dictionary words, and
            repetitive or sequential characters. The list includes context-specific
            words, such as the name of the service, username, and derivatives thereof.
            Changing temporary passwords to permanent passwords immediately after
            system logon ensures that the necessary strength of the authentication
            mechanism is implemented at the earliest opportunity and reduces the susceptibility
            to authenticator compromises. Long passwords and passphrases can be used
            to increase the complexity of passwords.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.11
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.11
      name: "R\xE9troaction d\u2019authentification"
      translations:
        en:
          name: Authentication feedback
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.11.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.11
      ref_id: 03.05.11.A
      description: "Masquer la r\xE9troaction d\u2019information d\u2019authentification\
        \ durant le processus d\u2019authentification."
      translations:
        en:
          description: Obscure feedback of authentication information during the authentication
            process.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.11.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.11
      ref_id: 03.05.11.disc
      name: Discussion
      description: "La r\xE9troaction d\u2019authentification n\u2019offre pas d\u2019\
        information qui pourrait permettre \xE0 des personnes non autoris\xE9es de\
        \ compromettre les m\xE9canismes d\u2019authentification. Par exemple, dans\
        \ le cas des ordinateurs de bureau ou blocs-notes dot\xE9s d\u2019un \xE9\
        cran relativement grand, la menace peut \xEAtre importante en raison de l\u2019\
        espionnage par-dessus l\u2019\xE9paule. Par contre, dans le cas des appareils\
        \ mobiles \xE0 petit \xE9cran, cette menace peut \xEAtre moins importante\
        \ et contrebalanc\xE9e par la possibilit\xE9 accrue d\u2019erreurs d\u2019\
        entr\xE9e due aux claviers de petite taille. Les moyens pour masquer la r\xE9\
        troaction d\u2019authentification doivent \xEAtre s\xE9lectionn\xE9s en cons\xE9\
        quence. Le masquage de la r\xE9troaction comprend l\u2019affichage d\u2019\
        ast\xE9risques au moment o\xF9 l\u2019utilisatrice ou utilisateur entre son\
        \ mot de passe sur l\u2019appareil ou l\u2019affichage d\u2019une r\xE9troaction\
        \ seulement pendant une courte p\xE9riode avant l\u2019application d\u2019\
        un masquage complet."
      translations:
        en:
          name: Discussion
          description: Authentication feedback does not provide information that would
            allow unauthorized individuals to compromise authentication mechanisms.
            For example, for desktop or notebook computers with relatively large monitors,
            the threat may be significant (commonly referred to as shoulder surfing).
            For mobile devices with small displays, this threat may be less significant
            and is balanced against the increased likelihood of input errors due to
            small keyboards. Therefore, the means for obscuring the authentication
            feedback is selected accordingly. Obscuring feedback includes displaying
            asterisks when users type passwords into input devices or displaying feedback
            for a limited time before fully obscuring it.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.5
      ref_id: 03.05.12
      name: Gestion des authentifiants
      translations:
        en:
          name: Authenticator management
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      ref_id: 03.05.12.A
      description: "V\xE9rifier l\u2019identit\xE9 de la personne, du groupe, du r\xF4\
        le, du service ou du dispositif recevant l\u2019authentifiant dans le cadre\
        \ de la distribution initiale d\u2019authentifiant."
      translations:
        en:
          description: Verify the identity of the individual, group, role, service,
            or device receiving the authenticator as part of the initial authenticator
            distribution
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      ref_id: 03.05.12.B
      description: "\xC9tablir le contenu de l\u2019authentifiant initial pour les\
        \ authentifiants \xE9mis par l\u2019organisation."
      translations:
        en:
          description: Establish initial authenticator content for any authenticators
            issued by the organization
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      ref_id: 03.05.12.C
      description: "\xC9tablir et mettre en \u0153uvre des proc\xE9dures administratives\
        \ pour la distribution initiale des authentifiants en cas de perte, de compromission,\
        \ de corruption et de r\xE9vocation."
      translations:
        en:
          description: Establish and implement administrative procedures for initial
            authenticator distribution, for lost, compromised, or damaged authenticators,
            and for revoking authenticators
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      ref_id: 03.05.12.D
      description: "Changer les authentifiants par d\xE9faut lors de la premi\xE8\
        re utilisation."
      translations:
        en:
          description: Change default authenticators at first use
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12.e
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      ref_id: 03.05.12.E
      description: "Changer ou actualiser les authentifiants tous les [Affectation\
        \ : fr\xE9quence d\xE9finie par l\u2019organisation] ou lorsque les \xE9v\xE9\
        nements suivants se produisent : [Affectation : \xE9v\xE9nements d\xE9finis\
        \ par l\u2019organisation]."
      translations:
        en:
          description: 'Change or refresh authenticators [Assignment: organization-defined
            frequency] or when the following events occur: [Assignment: organization-defined
            events]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12.f
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      ref_id: 03.05.12.F
      description: "Prot\xE9ger le contenu des authentifiants contre les divulgations\
        \ ou les modifications non autoris\xE9es."
      translations:
        en:
          description: Protect authenticator content from unauthorized disclosure
            and modification
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.05.12
      ref_id: 03.05.12.disc
      name: Discussion
      description: "Les authentifiants comprennent les mots de passe, les dispositifs\
        \ de chiffrement, la biom\xE9trie, les certificats, les dispositifs avec mot\
        \ de passe \xE0 usage unique et les cartes d\u2019identit\xE9. Le contenu\
        \ de l\u2019authentifiant initial correspond au contenu r\xE9el de l\u2019\
        authentifiant (par exemple, le mot de passe initial). Comparativement, les\
        \ exigences pour le contenu de l\u2019authentifiant contiennent des caract\xE9\
        ristiques particuli\xE8res. La gestion des authentifiants est prise en charge\
        \ par des param\xE8tres et des restrictions d\xE9finis par l\u2019organisation\
        \ pour diff\xE9rentes caract\xE9ristiques d\u2019authentifiant (par exemple,\
        \ la complexit\xE9 du mot de passe et les r\xE8gles de composition, la fen\xEA\
        tre de validation des jetons synchrones \xE0 utilisation unique et le nombre\
        \ de refus permis durant l\u2019\xE9tape de v\xE9rification de l\u2019authentification\
        \ biom\xE9trique).\n\nL\u2019exigence de prot\xE9ger les authentifiants individuels\
        \ peut \xEAtre mise en \u0153uvre au moyen de l\u2019exigence **R\xE8gles\
        \ de conduite 03.15.03**, dans les cas o\xF9 les personnes poss\xE8dent les\
        \ authentifiants, et des exigences **Gestion des comptes 03.01.01**, **Application\
        \ de l'acc\xE8s 03.01.02**, **Droit d'acc\xE8s minimal 03.01.05** et **Confidentialit\xE9\
        \ lors de la transmission et du stockage 03.13.08** pour les authentifiants\
        \ stock\xE9s dans les syst\xE8mes de l\u2019organisation, comme les mots de\
        \ passe stock\xE9s en format hach\xE9 ou chiffr\xE9, ou les fichiers qui contiennent\
        \ des mots de passe hach\xE9s ou chiffr\xE9s accessibles \xE0 l\u2019aide\
        \ de privil\xE8ges d\u2019administrateur. Il est possible de mettre en \u0153\
        uvre des mesures pour prot\xE9ger les authentifiants, y compris garder en\
        \ possession les authentifiants, ne pas partager les authentifiants avec d\u2019\
        autres personnes et signaler imm\xE9diat la perte, le vol ou la compromission\
        \ d\u2019authentifiants.\n\nLes d\xE9veloppeuses et d\xE9veloppeurs peuvent\
        \ livrer des composants syst\xE8me avec les justificatifs d\u2019authentification\
        \ pour l\u2019installation et la configuration initiales. Les justificatifs\
        \ d\u2019authentification par d\xE9faut sont souvent bien connus, faciles\
        \ \xE0 d\xE9couvrir et pr\xE9sentent un risque important. La gestion des authentifiants\
        \ comprend l\u2019\xE9mission et la r\xE9vocation des authentifiants pour\
        \ un acc\xE8s temporaire, qui ne sera plus n\xE9cessaire par la suite. L\u2019\
        utilisation de longs mots de passe ou de phrases de passe peut remplacer le\
        \ besoin d\u2019avoir \xE0 changer p\xE9riodiquement les authentifiants."
      translations:
        en:
          name: Discussion
          description: 'Authenticators include passwords, cryptographic devices, biometrics,
            certificates, one-time password devices, and ID badges. The initial authenticator
            content is the actual content of the authenticator (e.g., the initial
            password). In contrast, requirements for authenticator content contain
            specific characteristics. Authenticator management is supported by organization-defined
            settings and restrictions for various authenticator characteristics (e.g.,
            password complexity and composition rules, validation time window for
            time synchronous one-time tokens, and the number of allowed rejections
            during the verification stage of biometric authentication).


            The requirement to protect individual authenticators may be implemented
            by **Rules of behaviour 03.15.03** for authenticators in the possession
            of individuals and by **Account management 03.01.01**, **Access enforcement
            03.01.02**, **Least privilege 03.01.05**, and **Transmission and storage
            confidentiality 03.13.08** for authenticators stored in organizational
            systems. This includes passwords stored in hashed or encrypted formats
            or files that contain encrypted or hashed passwords accessible with administrator
            privileges. Actions can be taken to protect authenticators, including
            maintaining possession of authenticators, not sharing authenticators with
            others, and immediately reporting lost, stolen, or compromised authenticators.


            Developers may deliver system components with factory default authentication
            credentials to allow for initial installation and configuration. Default
            authentication credentials are often well-known, easily discoverable,
            and present a significant risk. Authenticator management includes issuing
            and revoking authenticators for temporary access when no longer needed.
            The use of long passwords or passphrases may obviate the need to periodically
            change authenticators.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.6'
      name: "Intervention en cas d\u2019incident"
      description: "Les contr\xF4les d\u2019intervention en cas d\u2019incident appuient\
        \ l\u2019\xE9tablissement de capacit\xE9s de traitement d\u2019incident op\xE9\
        rationnel pour les syst\xE8mes organisationnels, y compris la pr\xE9paration,\
        \ la surveillance, la d\xE9tection, l\u2019analyse, le confinement, la reprise\
        \ et l\u2019intervention. Les incidents sont surveill\xE9s, document\xE9s\
        \ et signal\xE9s aux autorit\xE9s et aux responsables organisationnels appropri\xE9\
        s."
      translations:
        en:
          name: Incident response
          description: The Incident response controls support the establishment of
            an operational incident handling capability for organizational systems
            that includes adequate preparation, monitoring, detection <abbr title="Detection&#10;The
            monitoring and analyzing of system events in order to identify unauthorized
            attempts to access system resources."><sup>(?)</sup></abbr>, analysis,
            containment, recovery, and response. Incidents are monitored, documented,
            and reported to appropriate organizational officials and authorities.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.6
      ref_id: 03.06.01
      name: Traitement des incidents
      translations:
        en:
          name: Incident handling
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.01
      ref_id: 03.06.01.A
      description: "Mettre en \u0153uvre des capacit\xE9s de traitement des incidents\
        \ align\xE9es sur le plan d\u2019intervention en cas d\u2019incident et y\
        \ inclure les activit\xE9s de pr\xE9paration, de d\xE9tection, d\u2019analyse,\
        \ de confinement, d\u2019\xE9radication et de reprise."
      translations:
        en:
          description: Implement an incident-handling capability that is consistent
            with the incident response plan and includes preparation, detection and
            analysis, containment, eradication, and recovery
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.01
      ref_id: 03.06.01.disc
      name: Discussion
      description: "L\u2019information li\xE9e aux incidents peut provenir de diff\xE9\
        rentes sources, y compris la surveillance des v\xE9rifications, des r\xE9\
        seaux et des acc\xE8s physiques, les rapports d\u2019utilisateur et d\u2019\
        administrateur, et les \xE9v\xE9nements signal\xE9s de la cha\xEEne d\u2019\
        approvisionnement. L\u2019efficacit\xE9 des capacit\xE9s de traitement des\
        \ incidents d\xE9pendent de la coordination entre diff\xE9rentes entit\xE9\
        s organisationnelles, y compris les propri\xE9taires des activit\xE9s et de\
        \ la mission, les propri\xE9taires des syst\xE8mes, les ressources humaines,\
        \ les \xE9quipes de s\xE9curit\xE9 physique et du personnel, les services\
        \ juridiques, le personnel des op\xE9rations et les responsables de l\u2019\
        approvisionnement.\n\nUn incident touchant les renseignements personnels est\
        \ consid\xE9r\xE9 comme une atteinte \xE0 la vie priv\xE9e. Une atteinte \xE0\
        \ la vie priv\xE9e m\xE8ne \xE0 une perte de contr\xF4le, \xE0 une compromission,\
        \ \xE0 une divulgation non autoris\xE9e, \xE0 une utilisation non autoris\xE9\
        e, \xE0 une collecte ill\xE9gale, \xE0 une conservation ou \xE0 une \xE9limination\
        \ inad\xE9quate, ou \xE0 une occurrence similaire o\xF9 une utilisatrice ou\
        \ un utilisateur autoris\xE9 ou non autoris\xE9 acc\xE8de ou acc\xE8de potentiellement\
        \ \xE0 une telle information \xE0 une fin qui n\u2019est pas autoris\xE9e."
      translations:
        en:
          name: Discussion
          description: 'Incident-related information can be obtained from a variety
            of sources, including audit monitoring, network monitoring, physical access
            monitoring, user and administrator reports, and reported supply chain
            events. An effective incident handling capability involves coordination
            among many organizational entities, including mission and business owners,
            system owners, human resources offices, physical and personnel security
            offices, legal departments, operations personnel, and procurement offices.


            An incident that involves personal information is considered a privacy
            breach. A privacy breach results in the loss of control, compromise, unauthorized
            disclosure, unpermitted use, unlawful collection, improper retention or
            disposal, or a similar occurrence where a person other than an authorized
            user accesses or potentially accesses or an authorized user accesses or
            potentially accesses such information for other than authorized purposes.


            If the incident involves the breach of personal information, notification
            to the contract owner is mandatory.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.6
      ref_id: 03.06.02
      name: "Surveillance des incidents, signalement des incidents et assistance en\
        \ cas d\u2019incident"
      translations:
        en:
          name: Incident monitoring, reporting, and response assistance
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02
      ref_id: 03.06.02.A
      description: "Faire le suivi et documenter les incidents de s\xE9curit\xE9 du\
        \ syst\xE8me."
      translations:
        en:
          description: Track and document system security incidents
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02
      ref_id: 03.06.02.B
      description: "Signaler les incidents soup\xE7onn\xE9s \xE0 l\u2019\xE9quipe\
        \ d\u2019intervention en cas d\u2019incident de l\u2019organisation dans une\
        \ p\xE9riode de [Affectation : p\xE9riode d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Report suspected incidents to the organizational incident
            response capability within [Assignment: organization-defined time period]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02
      ref_id: 03.06.02.C
      description: "Donner de l\u2019information sur l\u2019incident \xE0 [Affectation\
        \ : autorit\xE9s d\xE9finies par l\u2019organisation]."
      translations:
        en:
          description: 'Report incident information to [Assignment: organization-defined
            authorities]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02
      ref_id: 03.06.02.D
      description: "Fournir une ressource de soutien pour l\u2019intervention en cas\
        \ d\u2019incident qui offre des conseils et de l\u2019assistance aux utilisatrices\
        \ et utilisateurs du syst\xE8me pour le traitement et le signalement des incidents."
      translations:
        en:
          description: Provide an incident response support resource that offers advice
            and assistance to system users for the handling and reporting of incidents
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.02
      ref_id: 03.06.02.disc
      name: Discussion
      description: "La documentation des incidents comprend la tenue de dossiers au\
        \ sujet de chaque incident, l\u2019\xE9tat de l\u2019incident et toute autre\
        \ information pertinente aux fins d\u2019investigation informatique, ainsi\
        \ que l\u2019\xE9valuation des d\xE9tails, des tendances et du traitement\
        \ des incidents. L\u2019information relative \xE0 un incident peut provenir\
        \ de diverses sources, y compris la surveillance r\xE9seau, les rapports d\u2019\
        incident, les \xE9quipes d\u2019intervention en cas d\u2019incident, les plaintes\
        \ d\u2019utilisatrices et utilisateurs, les partenaires de la cha\xEEne d\u2019\
        approvisionnement, la surveillance des v\xE9rifications, la surveillance des\
        \ acc\xE8s physiques et les rapports d\u2019utilisateur et d\u2019administrateur.\
        \ L\u2019exigence **Traitement des incidents 03.06.01** fournit de l\u2019\
        information sur les types d\u2019incidents qui sont appropri\xE9s pour la\
        \ surveillance. Les types d\u2019incidents signal\xE9s, le contenu et la rapidit\xE9\
        \ des signalements, ainsi que les autorit\xE9s de signalement doivent refl\xE9\
        ter les lois, les d\xE9crets, les directives, les r\xE9glementations, les\
        \ politiques, les normes et les lignes directrices applicables. Les renseignements\
        \ sur l\u2019incident informent les \xE9valuations des risques, l\u2019efficacit\xE9\
        \ des \xE9valuations de la s\xE9curit\xE9 et de la protection de la vie priv\xE9\
        e, les exigences de s\xE9curit\xE9 pour l\u2019acquisition et les crit\xE8\
        res de s\xE9lection pour les produits technologiques. Les ressources de soutien\
        \ fournies par les organisations pour l\u2019intervention en cas d\u2019incident\
        \ comprennent les services de d\xE9pannage, les groupes d\u2019assistance,\
        \ les syst\xE8mes automatis\xE9s de demandes de service pour l\u2019ouverture\
        \ et le suivi des demandes d\u2019intervention en cas d\u2019incident, et\
        \ l\u2019acc\xE8s aux services d\u2019investigation informatique ou aux services\
        \ de recours des consommatrices et consommateurs, au besoin."
      translations:
        en:
          name: Discussion
          description: Documenting incidents includes maintaining records about each
            incident, the status of the incident, and other pertinent information
            necessary for forensics as well as evaluating incident details, trends,
            and handling. Incident information can be obtained from many sources,
            including network monitoring, incident reports, incident response teams,
            user complaints, supply chain partners, audit monitoring, physical access
            monitoring, and user and administrator reports. **Incident handling 03.06.01**
            provides information on the types of incidents that are appropriate for
            monitoring. The types of incidents reported, the content and timeliness
            of the reports, and the reporting authorities reflect applicable laws,
            jurisprudence, Orders in Council, directives, regulations, policies, standards,
            and guidelines. Incident information informs risk assessments, the effectiveness
            of security and privacy assessments, the security requirements for acquisitions,
            and the selection criteria for technology products. Incident response
            support resources provided by organizations include help desks, assistance
            groups, automated ticketing systems to open and track incident response
            tickets, and access to forensic services or consumer redress services,
            when required.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.6
      ref_id: 03.06.03
      name: "Tests d\u2019intervention en cas d\u2019incident"
      translations:
        en:
          name: Incident response testing
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.03
      ref_id: 03.06.03.A
      description: "Tester l\u2019efficacit\xE9 des capacit\xE9s d\u2019intervention\
        \ en cas d\u2019incident tous les [Affectation : fr\xE9quence d\xE9finie par\
        \ l\u2019organisation]."
      translations:
        en:
          description: 'Test the effectiveness of the incident response capability
            [Assignment: organization-defined frequency].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.03
      ref_id: 03.06.03.disc
      name: Discussion
      description: "Les organisations doivent tester les capacit\xE9s d\u2019intervention\
        \ en cas d\u2019incident afin de d\xE9terminer leur efficacit\xE9 et d\u2019\
        identifier les faiblesses ou les lacunes potentielles. Les tests d\u2019intervention\
        \ en cas d\u2019incident incluent l\u2019utilisation de listes de v\xE9rification,\
        \ les exercices de revue g\xE9n\xE9rale, les exercices de table et les simulations.\
        \ Les tests d\u2019intervention en cas d\u2019incident peuvent comprendre\
        \ la d\xE9termination des effets de l\u2019intervention en cas d\u2019incident\
        \ sur les op\xE9rations de l\u2019organisation, les actifs organisationnels\
        \ et les personnes. Des donn\xE9es qualitatives et quantitatives peuvent aider\
        \ \xE0 d\xE9terminer l\u2019efficacit\xE9 des processus d\u2019intervention\
        \ en cas d\u2019incident."
      translations:
        en:
          name: Discussion
          description: Organizations test incident response capabilities to determine
            their effectiveness and identify potential weaknesses or deficiencies.
            Incident response testing includes the use of checklists, walk-through
            or tabletop exercises, and simulations. Incident response testing can
            include a determination of the effects of incident response on organizational
            operations, organizational assets, and individuals. Qualitative and quantitative
            data can help determine the effectiveness of incident response processes.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.04
