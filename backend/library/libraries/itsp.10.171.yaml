        sign\xE9e."
      translations:
        en:
          name: Discussion
          description: In accordance with applicable laws, Orders in Council, directives,
            policies, regulations, standards, and guidelines, the public is not authorized
            to have access to non-public information, including specified information.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.2
