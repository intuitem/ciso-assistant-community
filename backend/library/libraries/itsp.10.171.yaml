    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.02.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.02.01
      ref_id: 03.02.01.disc
      name: Discussion
      description: "Les organisations doivent fournir de la formation de base et avanc\xE9\
        e en mati\xE8re de s\xE9curit\xE9 et de protection de la vie priv\xE9e aux\
        \ utilisatrices et utilisateurs du syst\xE8me (y compris les gestionnaires,\
        \ la haute direction, les administratrices et administrateurs de syst\xE8\
        me et les entrepreneures et entrepreneurs) ainsi que des mesures pour tester\
        \ les connaissances des utilisatrices et utilisateurs. Les organisations doivent\
        \ \xE9tablir le contenu de la formation en fonction de leurs exigences organisationnelles\
        \ particuli\xE8res, des syst\xE8mes auxquels le personnel a acc\xE8s et des\
        \ environnements de travail (par exemple, le t\xE9l\xE9travail). Le contenu\
        \ devrait comprendre une pr\xE9sentation des besoins de s\xE9curit\xE9 et\
        \ les mesures que doivent prendre les utilisatrices et utilisateurs afin de\
        \ maintenir la s\xE9curit\xE9 et d\u2019intervenir en cas d\u2019incident\
        \ <abbr title=\"Incident&#10;Incident r\xE9el au cours duquel un agent de\
        \ menace exploite une vuln\xE9rabilit\xE9 d\u2019un bien de TI de valeur.\"\
        ><sup>(?)</sup></abbr>. Le contenu devrait \xE9galement inclure les mesures\
        \ n\xE9cessaires en mati\xE8re de s\xE9curit\xE9 op\xE9rationnelle et de traitement\
        \ de l\u2019information d\xE9sign\xE9e.\n\nLes techniques de sensibilisation\
        \ \xE0 la s\xE9curit\xE9 et \xE0 la protection de la vie priv\xE9e comprennent\
        \ des affiches, des objets affichant des rappels de s\xE9curit\xE9, des messages\
        \ au moment de la connexion, des avis envoy\xE9s par courriel ou de la part\
        \ des responsables de l\u2019organisation et des \xE9v\xE9nements de sensibilisation\
        \ au moyen de balados, de vid\xE9os ou de webinaires. La formation sur la\
        \ s\xE9curit\xE9 et la protection de la vie priv\xE9e doit \xEAtre men\xE9\
        e \xE0 une fr\xE9quence conforme aux lois, aux directives, aux r\xE9glementations\
        \ et aux politiques applicables. La mise \xE0 jour p\xE9riodique du contenu\
        \ de formation permet de s\u2019assurer que le contenu reste pertinent. Les\
        \ \xE9v\xE9nements qui peuvent pr\xE9cipiter une mise \xE0 jour du contenu\
        \ de la formation comprennent les conclusions d\u2019une \xE9valuation ou\
        \ d\u2019une v\xE9rification, des incidents ou violations de s\xE9curit\xE9\
        , et des chargements apport\xE9s aux lois, aux d\xE9crets, aux directives,\
        \ aux r\xE9glementations, aux politiques, aux normes et aux lignes directrices\
        \ applicables.\n\nLes indicateurs potentiels et les possibles signes pr\xE9\
        curseurs de menace interne peuvent comprendre des comportements comme les\
        \ suivants : des comportements excessifs, de l\u2019insatisfaction de longue\
        \ dur\xE9e li\xE9e au travail, des tentatives d\u2019acc\xE8s \xE0 de l\u2019\
        information qui n\u2019est pas n\xE9cessaire pour la r\xE9alisation du travail,\
        \ un acc\xE8s inexpliqu\xE9 \xE0 des ressources financi\xE8res, de l\u2019\
        intimidation ou du harc\xE8lement sexuel envers des coll\xE8gues, de la violence\
        \ en milieu de travail et d\u2019autres manquements graves aux politiques,\
        \ aux proc\xE9dures, aux r\xE8gles, aux directives ou aux pratiques de l\u2019\
        organisation. Les organisations peuvent adapter le sujet de la sensibilisation\
        \ aux menaces internes en fonction du r\xF4le (par exemple, la formation des\
        \ gestionnaires peut se concentrer sur les changements particuliers dans les\
        \ comportements des membres de l\u2019\xE9quipe, alors que la formation des\
        \ employ\xE9es et employ\xE9s peut porter sur des observations plus g\xE9\
        n\xE9rales).\n\nLe piratage psychologique <abbr title=\"Piratage psychologique&#10;Pratique\
        \ qui a pour but d&#x27;extorquer des informations confidentielles en manipulant\
        \ les utilisateurs. Un pirate psychologique utilise souvent le t\xE9l\xE9\
        phone ou l&#x27;Internet pour tromper les individus et parvenir \xE0 obtenir\
        \ leurs renseignements personnels. L&#x27;hame\xE7onnage est une forme de\
        \ piratage psychologique.\"><sup>(?)</sup></abbr> vise \xE0 tromper une personne\
        \ pour l\u2019inciter \xE0 r\xE9v\xE9ler de l\u2019information ou \xE0 faire\
        \ une op\xE9ration pouvant servir \xE0 s\u2019introduire dans un syst\xE8\
        me, \xE0 le compromettre ou \xE0 nuire \xE0 un syst\xE8me. Le piratage psychologique\
        \ comprend l\u2019hame\xE7onnage <abbr title=\"Hame\xE7onnage&#10;Proc\xE9\
        d\xE9 par lequel une tierce partie tente de solliciter de l\u2019information\
        \ confidentielle appartenant \xE0 un individu, \xE0 un groupe ou \xE0 une\
        \ organisation en les mystifiant ou en imitant une marque commerciale connue\
        \ dans le but de r\xE9aliser des gains financiers. En l\u2019occurrence, les\
        \ malfaiteurs incitent les utilisateurs \xE0 partager leurs renseignements\
        \ personnels (num\xE9ros de carte de cr\xE9dit, informations bancaires ou\
        \ autres renseignements) afin de s\u2019en servir pour commettre des actes\
        \ frauduleux.\"><sup>(?)</sup></abbr>, le faux-semblant, l\u2019usurpation\
        \ d\u2019identit\xE9, l\u2019app\xE2tage, l\u2019arnaque de la contrepartie,\
        \ le d\xE9tournement de cha\xEEnes de courriels, l\u2019exploitation des m\xE9\
        dias sociaux et le talonnage. L\u2019exploration de donn\xE9es dans les m\xE9\
        dias sociaux vise \xE0 recueillir de l\u2019information \xE0 propos de l\u2019\
        organisation qui pourrait servir \xE0 appuyer des attaques \xE0 venir. La\
        \ formation en mati\xE8re de s\xE9curit\xE9 et de protection de la vie priv\xE9\
        e porte notamment sur la fa\xE7on dont les membres du personnel et de la direction\
        \ peuvent communiquer leurs pr\xE9occupations concernant des indicateurs potentiels\
        \ de menace interne et des instances r\xE9elles et potentielles de piratage\
        \ psychologique et d\u2019exploration de donn\xE9es, au moyen des voies de\
        \ communication appropri\xE9es de l\u2019organisation, conform\xE9ment aux\
        \ politiques et aux proc\xE9dures \xE9tablies."
      translations:
        en:
          name: Discussion
          description: 'Organizations provide basic and advanced levels of security
            and privacy literacy training to system users (including managers, senior
            executives, system administrators, and contractors) and measures to test
            the knowledge level of users. Organizations determine the content of literacy
            training based on specific organizational requirements, the systems to
            which personnel have authorized access, and work environments (e.g., telework).
            The content includes an understanding of the need for security and the
            actions required of users to maintain security and to respond to incidents.
            The content also addresses the need for operations security and the handling
            of specified information.


            Security and privacy awareness techniques include displaying posters,
            offering supplies inscribed with security reminders, displaying logon
            screen messages, generating email advisories or notices from organizational
            officials, and conducting awareness events using podcasts, videos, and
            webinars. Security and privacy literacy training is conducted at a frequency
            consistent with applicable laws, directives, regulations, and policies.
            Updating literacy training content on a regular basis ensures that the
            content remains relevant. Events that may precipitate an update to literacy
            training content include assessment or audit findings, security incidents
            or breaches, or changes in applicable laws, Orders in Council, directives,
            regulations, policies, standards, and guidelines.


            Potential indicators and possible precursors of insider threats include
            behaviours such as inordinate, long-term job dissatisfaction; attempts
            to gain access to information that is not required for job performance;
            unexplained access to financial resources; sexual harassment or bullying
            of fellow employees; workplace violence; and other serious violations
            of the policies, procedures, rules, directives, or practices of organizations.
            Organizations may consider tailoring insider threat awareness topics to
            the role (e.g., training for managers may be focused on specific changes
            in the behaviour of team members, while training for employees may be
            focused on more general observations).


            Social engineering <abbr title="Social engineering&#10;The practice of
            obtaining confidential information by manipulation of legitimate users.
            A social engineer will commonly use the telephone or internet to trick
            people into revealing sensitive information. For example, phishing is
            a type of social engineering."><sup>(?)</sup></abbr> is an attempt to
            deceive an individual into revealing information or taking an action that
            can be used to breach, compromise, or otherwise adversely impact a system.
            Social engineering includes phishing <abbr title="Phishing&#10;An attempt
            by a third party to solicit confidential information from an individual,
            group, or organization by mimicking or spoofing a specific, usually well-known
            brand, usually for financial gain. Phishers attempt to trick users into
            disclosing personal data, such as credit card numbers, online banking
            credentials, and other sensitive information, which they may then use
            to commit fraudulent acts."><sup>(?)</sup></abbr>, pretexting, impersonation,
            baiting, quid pro quo, threadjacking, social media exploitation, and tailgating.
            Social mining is an attempt to gather information about the organization
            that may be used to support future attacks. Security and privacy literacy
            training includes how to communicate employee and management concerns
            regarding potential indicators of insider threat and potential and actual
            instances of social engineering and data mining through appropriate organizational
            channels in accordance with established policies and procedures.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.02.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.2
      ref_id: 03.02.02
