    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.17.03
      ref_id: 03.17.03.disc
      name: Discussion
      description: "Les \xE9l\xE9ments de la cha\xEEne d\u2019approvisionnement incluent\
        \ les organisations, les entit\xE9s ou les outils qui servent \xE0 la recherche,\
        \ au d\xE9veloppement, \xE0 la conception, \xE0 la fabrication, \xE0 l\u2019\
        acquisition, \xE0 la livraison, \xE0 l\u2019int\xE9gration, aux op\xE9rations,\
        \ \xE0 la maintenance et \xE0 l\u2019\xE9limination des syst\xE8mes et des\
        \ composants syst\xE8me. Les processus de la cha\xEEne d\u2019approvisionnement\
        \ incluent les processus de d\xE9veloppement du mat\xE9riel, des logiciels,\
        \ des micrologiciels et des syst\xE8mes; les proc\xE9dures d\u2019exp\xE9\
        dition et de traitement; les programmes de s\xE9curit\xE9 physique; les programmes\
        \ de s\xE9curit\xE9 du personnel; les outils, les techniques et les mesures\
        \ de gestion des configurations pour le maintien de la provenance; ou les\
        \ autres programmes, processus ou proc\xE9dures associ\xE9s au d\xE9veloppement,\
        \ \xE0 l\u2019acquisition, \xE0 la maintenance et \xE0 l\u2019\xE9limination\
        \ des syst\xE8mes et des composants syst\xE8me. Les \xE9l\xE9ments et les\
        \ processus de la cha\xEEne d\u2019approvisionnement peuvent \xEAtre fournis\
        \ par les organisations, les int\xE9gratrices et int\xE9grateurs de syst\xE8\
        mes ou les fournisseurs externes. Les faiblesses ou les lacunes des \xE9l\xE9\
        ments ou des processus de la cha\xEEne d\u2019approvisionnement repr\xE9sentent\
        \ des vuln\xE9rabilit\xE9s potentielles qui peuvent \xEAtre exploit\xE9es\
        \ par des adversaires afin de nuire \xE0 l\u2019organisation et \xE0 sa capacit\xE9\
        \ de r\xE9aliser sa mission ou ses activit\xE9s."
      translations:
        en:
          name: Discussion
          description: Supply chain elements include organizations, entities, or tools
            that are employed for the research, development, design, manufacturing,
            acquisition, delivery, integration, operations, maintenance, and disposal
            of systems and system components. Supply chain processes include hardware,
            software, firmware, and systems development processes; shipping and handling
            procedures; physical security programs; personnel security programs; configuration
            management tools, techniques, and measures to maintain provenance; or
            other programs, processes, or procedures associated with the development,
            acquisition, maintenance, and disposal of systems and system components.
            Supply chain elements and processes may be provided by organizations,
            system integrators, or external providers. Weaknesses or deficiencies
            in supply chain elements or processes represent potential vulnerabilities
            that can be exploited by adversaries to harm the organization and affect
            its ability to carry out its core missions or business functions.
