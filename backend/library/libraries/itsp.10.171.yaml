        \ afin de tenir compte des changements apport\xE9s aux syst\xE8mes et des\
        \ changements organisationnels, ou encore des probl\xE8mes rencontr\xE9s durant\
        \ la mise en \u0153uvre, l\u2019ex\xE9cution ou la mise \xE0 l\u2019essai\
        \ du plan d\u2019intervention."
      translations:
        en:
          description: Update the incident response plan to address system and organizational
            changes or problems encountered during plan implementation, execution,
            or testing
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.05.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.05
      ref_id: 03.06.05.D
      description: "Prot\xE9ger le plan d\u2019intervention en cas d\u2019incident\
        \ des divulgations non autoris\xE9es."
      translations:
        en:
          description: Protect the incident response plan from unauthorized disclosure
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.05
      ref_id: 03.06.05.disc
      name: Discussion
      description: "Il est important que les organisations \xE9laborent et mettent\
        \ en \u0153uvre une approche d\u2019intervention coordonn\xE9e en cas d\u2019\
        incident. La mission et les activit\xE9s organisationnelles d\xE9terminent\
        \ la structure des capacit\xE9s d\u2019intervention en cas d\u2019incident.\
        \ Dans le cadre des capacit\xE9s d\u2019intervention en cas d\u2019incident,\
        \ les organisations doivent consid\xE9rer la coordination et l\u2019\xE9change\
        \ d\u2019information avec des organisations externes, y compris des fournisseurs\
        \ de services et d\u2019autres organisations participant \xE0 la cha\xEEne\
        \ d\u2019approvisionnement."
      translations:
        en:
          name: Discussion
          description: It is important that organizations develop and implement a
            coordinated approach to incident response. Organizational mission and
            business functions determine the structure of incident response capabilities.
            As part of the incident response capabilities, organizations consider
            the coordination and sharing of information with external organizations,
            including external service providers and other organizations involved
            in the supply chain.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.7'
      name: Maintenance
      description: "Les contr\xF4les de maintenance appuient la maintenance p\xE9\
        riodique et opportune des syst\xE8mes organisationnels et fournissent des\
        \ contr\xF4les efficaces pour les outils, les techniques, les m\xE9canismes\
        \ et le personnel employ\xE9s pour mener la maintenance des syst\xE8mes afin\
        \ d\u2019assurer leur disponibilit\xE9 continue."
      translations:
        en:
          name: Maintenance
          description: The Maintenance controls support periodic and timely maintenance
            on organizational systems and provide effective controls on the tools,
            techniques, mechanisms, and personnel used to conduct system maintenance
            to ensure its ongoing availability.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.7
      ref_id: 03.07.04
      name: Outils de maintenance
      translations:
        en:
          name: Maintenance tools
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04
      ref_id: 03.07.04.A
      description: "Approuver, contr\xF4ler et surveiller l\u2019utilisation des outils\
        \ de maintenance des syst\xE8mes."
      translations:
        en:
          description: Approve, control, and monitor the use of system maintenance
            tools
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04
      ref_id: 03.07.04.B
      description: "V\xE9rifier les supports o\xF9 sont stock\xE9s les programmes\
        \ de diagnostic et de test afin de d\xE9tecter la pr\xE9sence de code malveillant,\
        \ avant d\u2019utiliser les supports dans les syst\xE8mes."
      translations:
        en:
          description: Check media containing diagnostic and test programs for malicious
            code before the media are used in the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04
      ref_id: 03.07.04.C
      description: "Pr\xE9venir le retrait d\u2019\xE9quipement de maintenance de\
        \ syst\xE8me qui pourrait contenir de l\u2019information d\xE9sign\xE9e et\
        \ v\xE9rifier qu\u2019il ne contient pas d\u2019information d\xE9sign\xE9\
        e, en proc\xE9dant \xE0 des op\xE9rations de nettoyage ou de destruction de\
        \ l\u2019\xE9quipement ou encore en conservant l\u2019\xE9quipement dans l\u2019\
        installation."
      translations:
        en:
          description: Prevent the removal of system maintenance equipment containing
            specified information by verifying that there is no specified information
            on the equipment, sanitizing or destroying the equipment, or retaining
            the equipment within the facility
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.04
      ref_id: 03.07.04.disc
      name: Discussion
      description: "L\u2019approbation, le contr\xF4le, la surveillance et l\u2019\
        examen des outils de maintenance permettent de traiter les probl\xE8mes de\
        \ s\xE9curit\xE9 en lien avec les outils servant aux activit\xE9s de diagnostic\
        \ et de r\xE9paration sur le syst\xE8me. Les outils de maintenance peuvent\
        \ comprendre l\u2019\xE9quipement de test et de diagnostic mat\xE9riel ou\
        \ logiciel, ainsi que les renifleurs de paquets. Les outils peuvent \xEAtre\
        \ pr\xE9install\xE9s, transport\xE9s par le personnel de maintenance sur des\
        \ supports, bas\xE9s sur le nuage ou t\xE9l\xE9charg\xE9s \xE0 partir de sites\
        \ Web. Les programmes de diagnostic et de test peuvent contenir du code malveillant\
        \ et le livrer au syst\xE8me, intentionnellement ou non. Les supports peuvent\
        \ \xEAtre inspect\xE9s notamment en v\xE9rifiant le hachage cryptographique\
        \ ou les signatures num\xE9riques des programmes de diagnostic et de test,\
        \ ainsi que des supports.\n\nSi les organisations, lors de l\u2019inspection\
        \ d\u2019un support qui contient des programmes de diagnostic et de test,\
        \ d\xE9terminent que le support contient \xE9galement du code malveillant,\
        \ l\u2019incident doit \xEAtre trait\xE9 conform\xE9ment aux politiques et\
        \ aux proc\xE9dures de traitement des incidents. Un examen p\xE9riodique des\
        \ outils de maintenance peut mener au retrait de l\u2019approbation d\u2019\
        outils d\xE9suets, non pris en charge, non pertinents ou inutilis\xE9s. Les\
        \ outils de maintenance ne concernent pas les composants mat\xE9riels et logiciels\
        \ qui appuient la maintenance et sont consid\xE9r\xE9s comme faisant partie\
        \ du syst\xE8me."
      translations:
        en:
          name: Discussion
          description: 'Approving, controlling, monitoring, and reviewing maintenance
            tools address security-related issues associated with the tools that are
            used for diagnostic and repair actions on the system. Maintenance tools
            can include hardware and software diagnostic and test equipment as well
            as packet sniffers. The tools may be pre-installed, brought in with maintenance
            personnel on media, cloud-based, or downloaded from a website. Diagnostic
            and test programs are potential vehicles for transporting malicious code
            into the system, either intentionally or unintentionally. Examples of
            media inspection include checking the cryptographic hash or digital signatures
            of diagnostic and test programs and media.


            If organizations inspect media that contain diagnostic and test programs
            and determine that the media also contains malicious code, the incident
            is handled consistent with incident handling policies and procedures.
            A periodic review of maintenance tools can result in the withdrawal of
            approval for outdated, unsupported, irrelevant, or no-longer-used tools.
            Maintenance tools do not address the hardware and software components
            that support maintenance and are considered a part of the system.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.7
      ref_id: 03.07.05
      name: Maintenance non locale
      translations:
        en:
          name: Non-local maintenance
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05
      ref_id: 03.07.05.A
      description: "Approuver et surveiller les activit\xE9s de maintenance et de\
        \ diagnostic non locales."
      translations:
        en:
          description: Approve and monitor non-local maintenance and diagnostic activities.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05
      ref_id: 03.07.05.B
      description: "Mettre en \u0153uvre des m\xE9canismes d\u2019authentification\
        \ multifacteur et r\xE9sistant \xE0 la r\xE9insertion lors de l\u2019\xE9\
        tablissement des sessions de maintenance et de diagnostic non locales."
      translations:
        en:
          description: Implement multi-factor authentication and replay resistance
            in the establishment of non-local maintenance and diagnostic sessions.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05
      ref_id: 03.07.05.C
      description: "Mettre fin aux sessions et aux connexions r\xE9seau lorsque la\
        \ maintenance non locale est termin\xE9e."
      translations:
        en:
          description: Terminate session and network connections when non-local maintenance
            is completed.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.05
      ref_id: 03.07.05.disc
      name: Discussion
      description: "Les activit\xE9s de maintenance et de diagnostic non locales sont\
        \ men\xE9es par des personnes qui communiquent \xE0 partir de r\xE9seaux externes\
        \ ou internes. Les activit\xE9s de maintenance et de diagnostic locales sont\
        \ men\xE9es par des personnes qui se trouvent physiquement \xE0 l\u2019emplacement\
        \ du syst\xE8me et qui ne communiquent pas au moyen d\u2019une connexion r\xE9\
        seau. Les techniques d\u2019authentification servant \xE0 \xE9tablir des sessions\
        \ de maintenance et de diagnostic non locales sont trait\xE9es dans l\u2019\
        exigence Identification, authentification et r\xE9authentification des utilisatrices\
        \ et utilisateurs 03.05.01."
      translations:
        en:
          name: Discussion
          description: Non-local maintenance and diagnostic activities are conducted
            by individuals who communicate through an external or internal network.
            Local maintenance and diagnostic activities are carried out by individuals
            who are physically present at the system location and not communicating
            across a network connection. Authentication techniques used to establish
            non-local maintenance and diagnostic sessions reflect the requirements
            in **User identification, authentication, and re-authentication 03.05.01**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.7
      ref_id: 03.07.06
      name: Personnel de maintenance
      translations:
        en:
          name: Maintenance personnel
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06
      ref_id: 03.07.06.A
      description: "\xC9tablir un processus pour l\u2019autorisation du personnel\
        \ de maintenance."
      translations:
        en:
          description: Establish a process for maintenance personnel authorization
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06
      ref_id: 03.07.06.B
      description: "Maintenir une liste des organisations ou du personnel autoris\xE9\
        s pour la maintenance."
      translations:
        en:
          description: Maintain a list of authorized maintenance organizations or
            personnel
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06
      ref_id: 03.07.06.C
      description: "V\xE9rifier que le personnel non accompagn\xE9 r\xE9alisant des\
        \ activit\xE9s de maintenance sur le syst\xE8me dispose des autorisations\
        \ d\u2019acc\xE8s n\xE9cessaires."
      translations:
        en:
          description: Verify that non-escorted personnel who perform maintenance
            on the system possess the required access authorizations
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06
      ref_id: 03.07.06.D
      description: "D\xE9signer des membres du personnel de l\u2019organisation qui\
        \ poss\xE8dent les autorisations d\u2019acc\xE8s et les comp\xE9tences techniques\
        \ n\xE9cessaires pour superviser les activit\xE9s de maintenance effectu\xE9\
        es par le personnel qui ne poss\xE8de pas les autorisations d\u2019acc\xE8\
        s appropri\xE9es."
      translations:
        en:
          description: Designate organizational personnel with required access authorizations
            and technical competence to supervise the maintenance activities of personnel
            who do not possess the required access authorizations
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.07.06
      ref_id: 03.07.06.disc
      name: Discussion
      description: "Le personnel de maintenance fait r\xE9f\xE9rence aux personnes\
        \ qui r\xE9alisent les activit\xE9s de maintenance mat\xE9rielle ou logicielle\
        \ sur le syst\xE8me, et l\u2019exigence **Autorisations d'acc\xE8s physique\
        \ 03.10.01** traite de l\u2019acc\xE8s physique des personnes devant r\xE9\
        aliser des activit\xE9s de maintenance qui les placent dans le p\xE9rim\xE8\
        tre de protection physique du syst\xE8me. La comp\xE9tence technique de supervision\
        \ des personnes est li\xE9e \xE0 la maintenance r\xE9alis\xE9e sur le syst\xE8\
        me, tandis que la possession des autorisations d\u2019acc\xE8s appropri\xE9\
        es est li\xE9e \xE0 la maintenance sur ou pr\xE8s du syst\xE8me. Les personnes\
        \ qui n\u2019ont pas \xE9t\xE9 identifi\xE9es pr\xE9c\xE9demment comme faisant\
        \ partie du personnel de maintenance autoris\xE9 (par exemple, les fabricants,\
        \ les consultantes et consultants, les int\xE9gratrices et int\xE9grateurs\
        \ de syst\xE8mes et les fournisseurs) pourraient avoir besoin d\u2019un acc\xE8\
        s privil\xE9gi\xE9 au syst\xE8me, par exemple dans les cas o\xF9 la maintenance\
        \ doit \xEAtre r\xE9alis\xE9e avec peu ou sans pr\xE9avis. Les organisations\
        \ peuvent choisir d\u2019\xE9mettre des justificatifs d\u2019identit\xE9 temporaires\
        \ \xE0 ces personnes, en fonction de leurs \xE9valuations des risques. Ces\
        \ justificatifs peuvent \xEAtre octroy\xE9s pour un acc\xE8s unique ou pour\
        \ une p\xE9riode tr\xE8s limit\xE9e."
      translations:
        en:
          name: Discussion
          description: Maintenance personnel refers to individuals who perform hardware
            or software maintenance on the system, while **Physical access authorizations
            03.10.01** addresses physical access for individuals whose maintenance
            duties place them within the physical protection perimeter <abbr title="Perimeter&#10;The
            boundary between two network security zones through which traffic is routed."><sup>(?)</sup></abbr>
            of the system. The technical competence of supervising individuals relates
            to the maintenance performed on the system, while having required access
            authorizations refers to maintenance on and near the system. Individuals
            who have not been previously identified as authorized maintenance personnel
            (e.g., manufacturers, consultants, systems integrators, and vendors) may
            require privileged access to the system, such as when they are required
            to conduct maintenance with little or no notice. Organizations may choose
            to issue temporary credentials to these individuals based on their risk
            assessments. Temporary credentials may be for one-time use or for very
            limited time periods.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.8'
      name: Protection des supports
      description: "Les contr\xF4les de protection des supports appuient la protection\
        \ des supports du syst\xE8me tout au long du cycle de vie. Ils permettent\
        \ de limiter l\u2019acc\xE8s \xE0 l\u2019information sur les supports du syst\xE8\
        me aux utilisatrices et utilisateurs autoris\xE9s et exigent un nettoyage\
        \ ou une destruction des supports avant leur \xE9limination ou leur r\xE9\
        utilisation."
      translations:
        en:
          name: Media protection
          description: Physically control and securely store system media containing
            <abbr title="controlled information">CI</abbr>.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      ref_id: 03.08.01
      name: Rangement des supports
      translations:
        en:
          name: Media storage
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.01
      ref_id: 03.08.01.A
      description: "Contr\xF4ler physiquement les supports du syst\xE8me contenant\
        \ de l\u2019information d\xE9sign\xE9e et les ranger de fa\xE7on s\xE9curis\xE9\
        e."
      translations:
        en:
          description: Physically control and securely store system media containing
            specified information.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.01
      ref_id: 03.08.01.disc
      name: Discussion
      description: "Les supports du syst\xE8me comprennent les supports num\xE9riques\
        \ et non num\xE9riques. Les supports num\xE9riques comprennent les disquettes,\
        \ les disques \xE0 m\xE9moire flash, les bandes magn\xE9tiques, les disques\
        \ durs ou \xE0 entra\xEEnement magn\xE9tique externes ou amovibles, les disques\
        \ compacts et les disques num\xE9riques polyvalents (DVD pour Digital Versatile\
        \ Disc). Les supports non num\xE9riques incluent le papier et les microfilms.\
        \ Le contr\xF4le physique des supports stock\xE9s comprend la conduite d\u2019\
        inventaires, l\u2019\xE9tablissement de proc\xE9dures afin de permettre aux\
        \ personnes d\u2019emprunter et de retourner des supports dans la biblioth\xE8\
        que et pr\xE9server la responsabilisation des supports stock\xE9s. Le stockage\
        \ s\xE9curis\xE9 comprend les tiroirs, les armoires et les bureaux verrouill\xE9\
        s ainsi que les biblioth\xE8ques de supports contr\xF4l\xE9es. Les zones contr\xF4\
        l\xE9es fournissent des contr\xF4les physiques et proc\xE9duraux afin de r\xE9\
        pondre aux exigences \xE9tablies pour la protection de l\u2019information\
        \ et des syst\xE8mes. Les techniques de nettoyage (par exemple, l\u2019effacement,\
        \ la destruction et la purge cryptographiques) pr\xE9viennent la divulgation\
        \ d\u2019information d\xE9sign\xE9e \xE0 des personnes non autoris\xE9es.\
        \ Le processus de nettoyage retire l\u2019information d\xE9sign\xE9e des supports\
        \ de fa\xE7on \xE0 ce que l\u2019information ne puisse pas \xEAtre r\xE9cup\xE9\
        r\xE9e ou reconstruite."
      translations:
        en:
          name: Discussion
          description: System media includes digital and non-digital media. Digital
            media includes diskettes, flash drives, magnetic tapes, external or removable
            solid state or magnetic drives, compact discs, and digital versatile discs.
            Non-digital media includes paper and microfilm. Physically controlling
            stored media includes conducting inventories, establishing procedures
            to allow individuals to check out and return media to libraries, and maintaining
            accountability for stored media. Secure storage includes a locked drawer,
            desk, or cabinet or a controlled media library. Controlled areas provide
            physical and procedural controls to meet the requirements established
            for protecting information and systems. Sanitization techniques (e.g.,
            cryptographically erasing, destroying, clearing <abbr title="Clearing&#10;Applying
            logical techniques to sanitize data in all user-addressable storage locations
            to protect against simple ways of recovering data. This is done by overwriting
            data with a new value, or if overwriting is not supported, by using a
            menu option to reset the device to factory settings."><sup>(?)</sup></abbr>,
            and purging) prevent the disclosure of specified information to unauthorized
            individuals. The sanitization process removes specified information from
            media such that the information cannot be retrieved or reconstructed.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      ref_id: 03.08.02
      name: "Acc\xE8s aux supports"
      translations:
        en:
          name: Media access
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.02
      ref_id: 03.08.02.A
      description: "Restreindre l\u2019acc\xE8s \xE0 l\u2019information d\xE9sign\xE9\
        e qui se trouve sur les supports du syst\xE8me au personnel ou aux r\xF4les\
        \ autoris\xE9s."
      translations:
        en:
          description: Restrict access to specified information on system media to
            authorized personnel or roles.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.02
      ref_id: 03.08.02.disc
      name: Discussion
      description: "Les supports du syst\xE8me comprennent les supports num\xE9riques\
        \ et non num\xE9riques. L\u2019acc\xE8s \xE0 l\u2019information d\xE9sign\xE9\
        e sur un support du syst\xE8me peut \xEAtre restreint en contr\xF4lant physiquement\
        \ le support. Le contr\xF4le physique des supports du syst\xE8me comprend\
        \ la conduite d\u2019inventaires, l\u2019\xE9tablissement de proc\xE9dures\
        \ afin de permettre aux personnes d\u2019emprunter et de retourner des supports\
        \ dans la biblioth\xE8que et pr\xE9server la responsabilisation des supports\
        \ stock\xE9s. Dans le cas des supports num\xE9riques, l\u2019acc\xE8s \xE0\
        \ l\u2019information d\xE9sign\xE9e peut \xEAtre restreint en ayant recours\
        \ \xE0 des moyens de chiffrement. Le chiffrement de donn\xE9es stock\xE9es\
        \ ou au repos est trait\xE9 dans l\u2019exigence **Confidentialit\xE9 lors\
        \ de la transmission et du stockage 03.13.08**."
      translations:
        en:
          name: Discussion
          description: System media includes digital and non-digital media. Access
            to specified information on system media can be restricted by physically
            controlling such media. This includes conducting inventories, ensuring
            that procedures are in place to allow individuals to check out and return
            media to the media library, and maintaining accountability for stored
            media. For digital media, access to specified information can be restricted
            by using cryptographic means. Encrypting data in storage or at rest is
            addressed in **Transmission and storage confidentiality 03.13.08**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      ref_id: 03.08.03
      name: Nettoyage des supports
      translations:
        en:
          name: Media sanitization
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.03
      ref_id: 03.08.03.A
      description: "Nettoyer les supports du syst\xE8me qui contiennent de l\u2019\
        information d\xE9sign\xE9e avant leur \xE9limination ou leur transfert hors\
        \ du contr\xF4le de l\u2019organisation ou aux fins de r\xE9utilisation."
      translations:
        en:
          description: Sanitize <abbr title="Sanitize&#10;Sanitization is a process
            through which data is irreversibly removed from media. The storage media
            is left in a re-usable condition in accordance with IT security policy,
            but the data that was previously on it cannot be recovered or accessed."><sup>(?)</sup></abbr>
            system media containing specified information prior to disposal, release
            out of organizational control, or release for reuse.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.03
      ref_id: 03.08.03.disc
      name: Discussion
      description: "Le nettoyage des supports s\u2019applique aux supports num\xE9\
        riques et non num\xE9riques sujets \xE0 une \xE9limination ou \xE0 une r\xE9\
        utilisation, qu\u2019ils soient consid\xE9r\xE9s comme amovibles ou non. Il\
        \ peut s\u2019agir, par exemple, de supports num\xE9riques qui se trouvent\
        \ dans les num\xE9riseurs, les photocopieurs, les imprimantes, les ordinateurs\
        \ blocs-notes, les postes de travail, les appareils mobiles, les composants\
        \ r\xE9seau et les supports non num\xE9riques. Le processus de nettoyage retire\
        \ l\u2019information d\xE9sign\xE9e des supports de fa\xE7on \xE0 ce que l\u2019\
        information ne puisse pas \xEAtre r\xE9cup\xE9r\xE9e ou reconstruite. Les\
        \ techniques de nettoyage (par exemple, l\u2019effacement, la destruction\
        \ et la purge cryptographiques) pr\xE9viennent la divulgation d\u2019information\
        \ d\xE9sign\xE9e \xE0 des personnes non autoris\xE9es lorsque les supports\
        \ sont r\xE9utilis\xE9s ou transf\xE9r\xE9s aux fins d\u2019\xE9limination.\
        \ Le Centre pour la cybers\xE9curit\xE9 et la GRC soutiennent les normes pour\
        \ le contr\xF4le des processus de nettoyage des supports contenant de l\u2019\
        information d\xE9sign\xE9e et peuvent exiger la destruction des supports lorsque\
        \ d\u2019autres m\xE9thodes ne peuvent pas \xEAtre appliqu\xE9es aux supports."
      translations:
        en:
          name: Discussion
          description: Media sanitization applies to digital and non-digital media
            subject to disposal or reuse, whether or not the media are considered
            removable. Examples include digital media in scanners, copiers, printers,
            notebook computers, workstations, mobile devices, network components,
            and non-digital media. The sanitization process removes specified information
            from media such that the information cannot be retrieved or reconstructed.
            Sanitization techniques (e.g., cryptographically erasing, clearing, purging,
            and destroying) prevent the disclosure of specified information to unauthorized
            individuals when such media is reused or released for disposal. Cyber
            Centre and <abbr title="Royal Canadian Mounted Police">RCMP</abbr> endorsed
            standards control the sanitization process for media containing specified
            information and may require destruction when other methods cannot be applied
            to the media.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      ref_id: 03.08.04
      name: Marquage des supports
      translations:
        en:
          name: Media marking
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.04
      ref_id: 03.08.04.A
      description: "Marquer les supports du syst\xE8me contenant de l\u2019information\
        \ d\xE9sign\xE9e afin d\u2019indiquer les limites de distribution, les mises\
        \ en garde concernant le traitement et les marquages applicables de l\u2019\
        information d\xE9sign\xE9e."
      translations:
        en:
          description: Mark system media containing specified information to indicate
            distribution limitations, handling caveats, and applicable specified information
            markings.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.04
      ref_id: 03.08.04.disc
      name: Discussion
      description: "Les supports du syst\xE8me comprennent les supports num\xE9riques\
        \ et non num\xE9riques. Le marquage d\xE9signe l\u2019utilisation ou l\u2019\
        application d\u2019attributs de s\xE9curit\xE9 lisibles par les humains. L\u2019\
        \xE9tiquetage d\xE9signe l\u2019utilisation d\u2019attributs de s\xE9curit\xE9\
        \ li\xE9s aux structures de donn\xE9es internes du syst\xE8me. Les supports\
        \ num\xE9riques comprennent les disquettes, les bandes magn\xE9tiques, les\
        \ disques durs ou \xE0 entra\xEEnement magn\xE9tique externes ou amovibles,\
        \ les disques \xE0 m\xE9moire flash, les disques compacts et les disques num\xE9\
        riques polyvalents (DVD). Les supports non num\xE9riques incluent le papier\
        \ et les microfilms. L\u2019information d\xE9sign\xE9e comprend l\u2019information\
        \ PROT\xC9G\xC9 A, PROT\xC9G\xC9 B et \xE0 propos de marchandises contr\xF4\
        l\xE9es qui n\u2019est pas classifi\xE9e. L\u2019information prot\xE9g\xE9\
        e est d\xE9finie par le <abbr title=\"Secr\xE9tariat du Conseil du Tr\xE9\
        sor du Canada\">SCT</abbr> dans la [Directive sur la gestion de la s\xE9curit\xE9\
        \ \u2212 Annexe J : Norme sur la cat\xE9gorisation de s\xE9curit\xE9](https://www.tbs-sct.canada.ca/pol/doc-fra.aspx?id=32614)\
        \ ainsi que les exigences de marquage, de protection et de diffusion pour\
        \ ce type d\u2019information."
      translations:
        en:
          name: Discussion
          description: System media includes digital and non-digital media. Marking
            refers to the use or application of human-readable security attributes.
            Labeling refers to the use of security attributes for internal system
            data structures. Digital media includes diskettes, magnetic tapes, external
            or removable solid state or magnetic drives, flash drives, compact discs,
            and digital versatile discs. Non-digital media includes paper and microfilm.
            Specified information includes any information, other than classified,
            that a <abbr title="Government of Canada">GC</abbr> authority identifies
            and qualifies in a contract as requiring safeguarding.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      ref_id: 03.08.05
      name: Transport des supports
      translations:
        en:
          name: Media transport
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05
      ref_id: 03.08.05.A
      description: "Prot\xE9ger et contr\xF4ler les supports du syst\xE8me contenant\
        \ de l\u2019information d\xE9sign\xE9e durant le transport \xE0 l\u2019ext\xE9\
        rieur des zones contr\xF4l\xE9es."
      translations:
        en:
          description: Protect and control system media that contain specified information
            during transport outside of controlled areas
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05
      ref_id: 03.08.05.B
      description: "Demeurer responsable des supports du syst\xE8me contenant de l\u2019\
        information d\xE9sign\xE9e durant le transport \xE0 l\u2019ext\xE9rieur des\
        \ zones contr\xF4l\xE9es."
      translations:
        en:
          description: Maintain accountability of system media that contain specified
            information during transport outside of controlled areas.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05
      ref_id: 03.08.05.C
      description: "Documenter les activit\xE9s associ\xE9es au transport des supports\
        \ du syst\xE8me contenant de l\u2019information d\xE9sign\xE9e."
      translations:
        en:
          description: Document activities associated with the transport of system
            media that contain specified information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.05
      ref_id: 03.08.05.disc
      name: Discussion
      description: "Les supports du syst\xE8me comprennent les supports num\xE9riques\
        \ et non num\xE9riques. Les supports num\xE9riques incluent les disquettes,\
        \ les disques \xE0 m\xE9moire flash, les bandes magn\xE9tiques, les disques\
        \ durs ou \xE0 entra\xEEnement magn\xE9tique externes ou amovibles, les disques\
        \ compacts et les DVD. Les supports non num\xE9riques incluent le papier et\
        \ les microfilms. Les zones contr\xF4l\xE9es sont des espaces dans lesquels\
        \ les organisations appliquent des mesures physiques ou proc\xE9durales afin\
        \ de respecter les exigences \xE9tablies pour la protection de l\u2019information\
        \ d\xE9sign\xE9e et des syst\xE8mes. La protection des supports durant le\
        \ transport peut comprendre la cryptographie <abbr title=\"Cryptographie&#10;\xC9\
        tude des techniques permettant de chiffrer l\u2019information pour la rendre\
        \ inintelligible ou de rendre lisible une information chiffr\xE9e.\"><sup>(?)</sup></abbr>\
        \ et/ou des contenants verrouill\xE9s. Les activit\xE9s associ\xE9es au transport\
        \ des supports comprennent la remise des supports aux fins de transport, la\
        \ v\xE9rification que les supports suivent les processus de transport ad\xE9\
        quats et le transport en tant que tel. Le personnel autoris\xE9 responsable\
        \ du transport et de la messagerie peut inclure des personnes de l\u2019ext\xE9\
        rieur de l\u2019organisation. Pr\xE9server la responsabilisation des supports\
        \ durant le transport comprend la restriction des activit\xE9s de transport\
        \ au personnel autoris\xE9 et le suivi ou l\u2019obtention des enregistrements\
        \ officiels des activit\xE9s de transport, \xE0 mesure que les supports se\
        \ d\xE9placent dans le syst\xE8me de transport, afin de pr\xE9venir et de\
        \ d\xE9tecter les pertes, les destructions ou les modifications. Cette exigence\
        \ est associ\xE9e aux exigences **Confidentialit\xE9 lors de la transmission\
        \ et du stockage 03.13.08** et **Protection cryptographique 03.13.11**."
      translations:
        en:
          name: Discussion
          description: System media includes digital and non-digital media. Digital
            media includes flash drives, diskettes, magnetic tapes, external or removable
            solid state or magnetic drives, compact discs, and digital versatile discs.
            Non-digital media includes microfilm and paper. Controlled areas are spaces
            for which organizations provide physical or procedural measures to meet
            the requirements established for protecting specified information and
            systems. Media protection during transport can include cryptography <abbr
            title="Cryptography&#10;The study of techniques used to make plain information
            unreadable, as well as to convert it back to a readable form."><sup>(?)</sup></abbr>
            and/or locked containers. Activities associated with media transport include
            releasing media for transport, ensuring that media enter the appropriate
            transport processes, and the actual transport. Authorized transport and
            courier personnel may include individuals external to the organization.
            Maintaining accountability of media during transport includes restricting
            transport activities to authorized personnel and tracking or obtaining
            records of transport activities as the media move through the transportation
            system to prevent and detect loss, destruction, or tampering. This requirement
            is related to **Transmission and storage confidentiality 03.13.08** and
            **Cryptographic protection 03.13.11**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.07
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      ref_id: 03.08.07
      name: Utilisation des supports
      translations:
        en:
          name: Media use
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.07.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.07
      ref_id: 03.08.07.A
      description: "Limiter ou interdire l\u2019utilisation de [Affectation : types\
        \ de supports d\xE9finis par l\u2019organisation]."
      translations:
        en:
          description: 'Restrict or prohibit the use of [Assignment: organization-defined
            types of system media]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.07.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.07
      ref_id: 03.08.07.B
      description: "Interdire l\u2019utilisation de supports amovibles sans la pr\xE9\
        sence d\u2019un propri\xE9taire identifiable."
      translations:
        en:
          description: Prohibit the use of removable system media without an identifiable
            owner
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.07.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.07
      ref_id: 03.08.07.disc
      name: Discussion
      description: "Contrairement \xE0 l\u2019exigence **Rangement des supports 03.08.01**,\
        \ qui restreint l\u2019acc\xE8s des utilisatrices et utilisateurs aux supports,\
        \ cette exigence limite ou interdit l\u2019utilisation de certains types de\
        \ supports, comme les disques durs externes, les disques \xE0 m\xE9moire flash\
        \ ou les \xE9crans intelligents. Les organisations peuvent utiliser des mesures\
        \ techniques et non techniques (par exemple, des politiques, des proc\xE9\
        dures et des r\xE8gles de conduite) afin de contr\xF4ler l\u2019utilisation\
        \ des supports du syst\xE8me. Par exemple, les organisations peuvent contr\xF4\
        ler l\u2019utilisation des dispositifs de stockage portatifs en installant\
        \ des cages sur les postes de travail afin d\u2019emp\xEAcher l\u2019acc\xE8\
        s aux ports externes ou encore d\xE9sactiver ou retirer la possibilit\xE9\
        \ d\u2019insertion, de lecture ou d\u2019\xE9criture de dispositifs.\n\nLes\
        \ organisations peuvent limiter l\u2019utilisation des dispositifs de stockage\
        \ portatifs \xE0 ceux approuv\xE9s, y compris les dispositifs fournis par\
        \ l\u2019organisation, les dispositifs fournis par d\u2019autres organisations\
        \ approuv\xE9es et les dispositifs qui n\u2019appartiennent pas aux personnes.\
        \ Les organisations peuvent aussi contr\xF4ler l\u2019utilisation des dispositifs\
        \ de stockage portatifs en fonction du type de dispositif, en emp\xEAchant\
        \ l\u2019utilisation de dispositifs portatifs inscriptibles, et mettre en\
        \ \u0153uvre cette restriction en d\xE9sactivant ou en retirant la capacit\xE9\
        \ d\u2019\xE9criture sur ces dispositifs. Les limites ayant trait \xE0 l\u2019\
        utilisation des supports de syst\xE8mes contr\xF4l\xE9s par l\u2019organisation\
        \ dans les syst\xE8mes externes incluent les restrictions sur la fa\xE7on\
        \ dont les supports peuvent \xEAtre utilis\xE9s et les conditions associ\xE9\
        es. En attribuant des propri\xE9taires identifiables (par exemple, des personnes,\
        \ des organisations ou des projets) aux supports syst\xE8me amovibles, les\
        \ organisations r\xE9duisent les risques li\xE9s \xE0 l\u2019utilisation de\
        \ ces technologies puisqu\u2019ils savent \xE0 qui attribuer la responsabilit\xE9\
        \ en cas de vuln\xE9rabilit\xE9 connue des supports (par exemple, l\u2019\
        insertion de code malveillant)."
      translations:
        en:
          name: Discussion
          description: "In contrast to requirement **Media storage 03.08.01**, which\
            \ restricts user access to media, this requirement restricts or prohibits\
            \ the use of certain types of media, such as external hard drives, flash\
            \ drives, or smart displays. Organizations can use technical and non-technical\
            \ measures (e.g., policies, procedures, and rules of behaviour) to control\
            \ the use of system media. For example, organizations may control the\
            \ use of portable storage devices by using physical cages on workstations\
            \ to prohibit access to external ports or disabling or removing the ability\
            \ to insert, read, or write to devices.\n\nOrganizations may limit the\
            \ use of portable storage devices to only approved devices, including\
            \ devices provided by the organization, devices provided by other approved\
            \ organizations, and devices that are not personally owned. Organizations\
            \ may also control the use of portable storage devices based on the type\
            \ of device \u2014 prohibiting the use of writeable, portable devices\
            \ \u2014 and implement this restriction by disabling or removing the capability\
            \ to write to such devices. Limits on the use of organization-controlled\
            \ system media in external systems include restrictions on how the media\
            \ may be used and under what conditions. Requiring identifiable owners\
            \ (e.g., individuals, organizations, or projects) for removable system\
            \ media reduces the risk of using such technologies by allowing organizations\
            \ to assign responsibility and accountability for addressing known vulnerabilities\
            \ in the media (e.g., insertion of malicious code)."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.09
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.8
      ref_id: 03.08.09
      name: "Sauvegarde du syst\xE8me \u2212 Protection cryptographique"
      translations:
        en:
          name: "System backup \u2013 cryptographic protection"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.09.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.09
      ref_id: 03.08.09.A
      description: "Prot\xE9ger la confidentialit\xE9 de l\u2019information sauvegard\xE9\
        e."
      translations:
        en:
          description: Protect the confidentiality of backup information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.09.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.09
      ref_id: 03.08.09.B
      description: "Mettre en \u0153uvre des m\xE9canismes cryptographiques afin d\u2019\
        emp\xEAcher la divulgation non autoris\xE9e d\u2019information d\xE9sign\xE9\
        e aux emplacements de stockage des sauvegardes."
      translations:
        en:
          description: Implement cryptographic mechanisms to prevent the unauthorized
            disclosure of specified information at backup storage locations
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.09.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.08.09
      ref_id: 03.08.09.disc
      name: Discussion
      description: "La s\xE9lection de m\xE9canismes cryptographiques est fond\xE9\
        e sur le besoin de prot\xE9ger la confidentialit\xE9 de l\u2019information\
        \ sauvegard\xE9e. Les dispositifs avec module de s\xE9curit\xE9 mat\xE9riel\
        \ (HSM pour Hardware Security Module) prot\xE8gent et g\xE8rent les cl\xE9\
        s cryptographiques et offrent des fonctions de traitement cryptographique.\
        \ Les op\xE9rations cryptographiques (par exemple, le chiffrement, le d\xE9\
        chiffrement, et la g\xE9n\xE9ration et la v\xE9rification de signature) sont\
        \ typiquement h\xE9berg\xE9es sur le dispositif HSM, et plusieurs mises en\
        \ \u0153uvre offrent des m\xE9canismes d\u2019acc\xE9l\xE9ration par mat\xE9\
        riel pour les op\xE9rations cryptographiques. Cette exigence est associ\xE9\
        e \xE0 l\u2019exigence **Protection cryptographique 03.13.11**."
      translations:
        en:
          name: Discussion
          description: The selection of cryptographic mechanisms is based on the need
            to protect the confidentiality of backup information. Hardware security
            module (HSM) devices safeguard and manage cryptographic keys and provide
            cryptographic processing. Cryptographic operations (e.g., encryption,
            decryption, and signature generation and verification) are typically hosted
            on the <abbr title="hardware security module">HSM</abbr> device, and many
            implementations provide hardware-accelerated mechanisms for cryptographic
            operations. This requirement is related to **Cryptographic protection
            03.13.11**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.9'
      name: "S\xE9curit\xE9 du personnel"
      description: "Les contr\xF4les de s\xE9curit\xE9 du personnel appuient les proc\xE9\
        dures requises pour s\u2019assurer que le personnel ayant acc\xE8s aux syst\xE8\
        mes dispose des autorisations n\xE9cessaires et des niveaux d\u2019habilitation\
        \ de s\xE9curit\xE9 appropri\xE9s. Ils contribuent \xE0 prot\xE9ger l\u2019\
        information organisationnelle et les syst\xE8mes durant et apr\xE8s les op\xE9\
        rations du personnel, par exemple apr\xE8s une cessation d\u2019emploi ou\
        \ une mutation."
      translations:
        en:
          name: Personnel security
          description: The Personnel security controls support the procedures required
            to ensure that all personnel who have access to systems have the necessary
            authorizations as well as appropriate security screening levels. They
            ensure that organizational information and systems are protected during
            and after personnel actions such as terminations and transfers.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.9
      ref_id: 03.09.01
      name: "Filtrage de s\xE9curit\xE9 du personnel"
      translations:
        en:
          name: Personnel screening
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.01
      ref_id: 03.09.01.A
      description: "Proc\xE9der au filtrage de s\xE9curit\xE9 des personnes avant\
        \ de leur accorder l\u2019acc\xE8s au syst\xE8me."
      translations:
        en:
          description: Screen individuals prior to authorizing access to the system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.01
      ref_id: 03.09.01.B
      description: "Proc\xE9der \xE0 nouveau au filtrage de s\xE9curit\xE9 des personnes\
        \ conform\xE9ment \xE0 [Affectation : conditions n\xE9cessitant un nouveau\
        \ filtrage de s\xE9curit\xE9 d\xE9finies par l\u2019organisation]."
      translations:
        en:
          description: 'Rescreen individuals in accordance with [Assignment: organization-defined
            conditions requiring rescreening]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.01
      ref_id: 03.09.01.disc
      name: Discussion
      description: "Les activit\xE9s de filtrage de s\xE9curit\xE9 du personnel comprennent\
        \ l\u2019\xE9valuation de la conduite, de l\u2019int\xE9grit\xE9, du jugement,\
        \ de la loyaut\xE9, de la fiabilit\xE9 et de la stabilit\xE9 d\u2019une personne\
        \ (c\u2019est-\xE0-dire, l\u2019\xE9tablissement de la fiabilit\xE9) avant\
        \ d\u2019accorder l\u2019acc\xE8s au syst\xE8me ou d\u2019\xE9lever le niveau\
        \ d\u2019acc\xE8s au syst\xE8me. Les activit\xE9s de filtrage et de refiltrage\
        \ de s\xE9curit\xE9 doivent refl\xE9ter les lois, les d\xE9crets, les directives,\
        \ les politiques, les r\xE9glementations et les crit\xE8res f\xE9d\xE9raux\
        \ \xE9tablis pour le niveau d\u2019acc\xE8s requis en fonction du poste concern\xE9\
        ."
      translations:
        en:
          name: Discussion
          description: "Personnel security screening activities involve the assessment\
            \ of the conduct, integrity, judgment, loyalty, reliability, and stability\
            \ of an individual (i.e., the individual\u2019s trustworthiness) prior\
            \ to authorizing access to the system or when elevating system access.\
            \ The screening and rescreening activities reflect applicable federal\
            \ laws, Orders in Council, directives, policies, regulations, and criteria\
            \ established for the level of access required for the assigned positions."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.9
      ref_id: 03.09.02
      name: "Cessation d\u2019emploi et mutation de personnel"
      translations:
        en:
          name: Personnel termination and transfer
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.a
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02
      ref_id: 03.09.02.A
      description: "Apr\xE8s la cessation d\u2019emploi d\u2019une personne :"
      translations:
        en:
          description: 'When individual employment is terminated:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.a.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.a
      ref_id: 03.09.02.A.1
      description: "d\xE9sactiver l\u2019acc\xE8s au syst\xE8me dans une p\xE9riode\
        \ de [Affectation : p\xE9riode d\xE9finie par l\u2019organisation];"
      translations:
        en:
          description: 'disable system access within [Assignment: organization-defined
            time period]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.a.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.a
      ref_id: 03.09.02.A.2
      description: "mettre fin ou r\xE9voquer les authentifiants et les justificatifs\
        \ d\u2019identit\xE9 associ\xE9s \xE0 la personne;"
      translations:
        en:
          description: terminate or revoke authenticators and credentials associated
            with the individual
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.a.3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.a
      ref_id: 03.09.02.A.3
      description: "r\xE9cup\xE9rer les propri\xE9t\xE9s syst\xE8me associ\xE9es \xE0\
        \ la s\xE9curit\xE9."
      translations:
        en:
          description: retrieve security-related system property
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.b
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02
      ref_id: 03.09.02.B
      description: "Apr\xE8s la mutation d\u2019une personne \xE0 un autre poste au\
        \ sein de l\u2019organisation :"
      translations:
        en:
          description: 'When individuals are reassigned or transferred to other positions
            in the organization:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.b.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.b
      ref_id: 03.09.02.B.1
      description: "examiner et confirmer le besoin op\xE9rationnel continu pour les\
        \ autorisations d\u2019acc\xE8s logiques et physiques au syst\xE8me et aux\
        \ installations;"
      translations:
        en:
          description: review and confirm the ongoing operational need for current
            logical and physical access authorizations to the system and facility
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.b.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.b
      ref_id: 03.09.02.B.2
      description: "modifier les autorisations d\u2019acc\xE8s afin de tenir compte\
        \ des changements op\xE9rationnels n\xE9cessaires."
      translations:
        en:
          description: modify access authorization to correspond with any changes
            in operational need
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.09.02
      ref_id: 03.09.02.disc
      name: Discussion
      description: "Les propri\xE9t\xE9s syst\xE8me associ\xE9es \xE0 la s\xE9curit\xE9\
        \ incluent les jetons d\u2019authentification mat\xE9riels, les manuels techniques\
        \ d\u2019administration de syst\xE8me, les cl\xE9s, les cartes d\u2019identit\xE9\
        \ et les laissez-passer d\u2019immeuble. Les entrevues de d\xE9part permettent\
        \ de s\u2019assurer que les personnes comprennent les contraintes de s\xE9\
        curit\xE9 auxquelles elles doivent se soumettre \xE0 titre d\u2019anciennes\
        \ et anciens membres du personnel et leur responsabilit\xE9 \xE0 l\u2019\xE9\
        gard des biens de l\u2019organisation. Les sujets abord\xE9s lors des entrevues\
        \ de d\xE9part incluent les rappels concernant les \xE9ventuelles limitations\
        \ professionnelles dont ils pourraient faire l\u2019objet et les ententes\
        \ de non-divulgation. Il se peut qu\u2019il soit impossible de proc\xE9der\
        \ aux entrevues de d\xE9part pour certaines employ\xE9es et certains employ\xE9\
        s, y compris dans les cas de non-disponibilit\xE9 des superviseures et superviseurs,\
        \ de maladie ou d\u2019abandon de poste.\n\nUne ex\xE9cution rapide des mesures\
        \ de cessation d\u2019emploi est essentielle dans les cas de cong\xE9diement\
        \ pour motif valable. Les organisations peuvent consid\xE9rer la d\xE9sactivation\
        \ des comptes d\u2019une personne qui a \xE9t\xE9 cong\xE9di\xE9e avant d\u2019\
        en aviser la personne. Cette exigence s\u2019applique dans les cas de r\xE9\
        affectation ou de mutation de personne, lorsque la mesure est permanente ou\
        \ si la dur\xE9e est suffisamment longue pour n\xE9cessiter une protection.\
        \ Les mesures de protection qui peuvent \xEAtre requises en cas de mutation\
        \ ou de r\xE9affectation \xE0 un autre poste au sein de l\u2019organisation\
        \ incluent le retour des anciennes cartes d\u2019identit\xE9, cl\xE9s et laissez-passer\
        \ d\u2019immeuble et l\u2019\xE9mission de nouvelles cartes d\u2019identit\xE9\
        , cl\xE9s et laissez-passer d\u2019immeuble; le changement des autorisations\
        \ d\u2019acc\xE8s au syst\xE8me (c\u2019est-\xE0-dire les privil\xE8ges);\
        \ la fermeture des comptes syst\xE8me et l\u2019\xE9tablissement de nouveaux\
        \ comptes; et le d\xE9blocage de l\u2019acc\xE8s aux documents officiels auxquels\
        \ la personne avait acc\xE8s \xE0 l\u2019emplacement de travail pr\xE9c\xE9\
        dent et des comptes syst\xE8me pr\xE9c\xE9dents."
      translations:
        en:
          name: Discussion
          description: 'Security-related system property includes hardware authentication
            tokens, system administration technical manuals, keys, identification
            cards, and building passes. Exit interviews ensure that terminated individuals
            understand the security constraints imposed by being former employees
            and that accountability is achieved for the organizational property. Security
            topics at exit interviews include reminding individuals of potential limitations
            on future employment and nondisclosure agreements. Exit interviews may
            not always be possible for some individuals, including in cases related
            to the unavailability of supervisors, illnesses, or job abandonment.


            The timely execution of termination actions is essential for individuals
            who have been terminated for cause. Organizations may consider disabling
            the accounts of individuals who are being terminated prior to the individuals
            being notified. This requirement applies to the reassignment or transfer
            of individuals when the personnel action is permanent or of such extended
            duration as to require protection. Protections that may be required for
            transfers or reassignments to other positions within organizations include
            returning old and issuing new identification cards, keys, and building
            passes; changing system access authorizations (i.e., privileges); closing
            system accounts and establishing new accounts; and providing access to
            official records to which individuals had access at previous work locations
            in previous system accounts.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.10'
      name: Protection physique
      description: "Les contr\xF4les de protection mat\xE9rielle appuient le contr\xF4\
        le des acc\xE8s physiques des personnes autoris\xE9es aux syst\xE8mes, \xE0\
        \ l\u2019\xE9quipement et aux environnements d\u2019exploitation respectifs.\
        \ Ils favorisent la protection des installations physiques et des infrastructures\
        \ des syst\xE8mes ainsi que la protection des syst\xE8mes contre les dangers\
        \ environnementaux. En outre, ils fournissent des contr\xF4les environnementaux\
        \ appropri\xE9s des installations h\xE9bergeant des syst\xE8mes."
      translations:
        en:
          name: Physical protection
          description: The Physical protection controls support the control of physical
            access to systems, equipment, and the respective operating environments
            to authorized individuals. They facilitate the protection of the physical
            plant and support infrastructure for systems, the protection of systems
            against environmental hazards, and provide appropriate environmental controls
            in facilities containing systems.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.10
      ref_id: 03.10.01
      name: "Autorisations d\u2019acc\xE8s physique"
      translations:
        en:
          name: Physical access authorizations
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01
      ref_id: 03.10.01.A
      description: "D\xE9velopper, approuver et tenir une liste des personnes disposant\
        \ d\u2019un acc\xE8s autoris\xE9 \xE0 l\u2019emplacement physique o\xF9 se\
        \ trouvent les syst\xE8mes."
      translations:
        en:
          description: Develop, approve, and maintain a list of individuals with authorized
            access to the physical location where the system resides
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01
      ref_id: 03.10.01.B
      description: "\xC9mettre des justificatifs d\u2019identit\xE9 pour autoriser\
        \ l\u2019acc\xE8s physique."
      translations:
        en:
          description: Issue authorization credentials for physical access
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01
      ref_id: 03.10.01.C
      description: "Examiner la liste d\u2019acc\xE8s physique tous les [Affectation\
        \ : fr\xE9quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Review the physical access list [Assignment: organization-defined
            frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01
      ref_id: 03.10.01.D
      description: "Retirer les personnes de la liste d\u2019acc\xE8s physique lorsqu\u2019\
        un tel acc\xE8s n\u2019est plus n\xE9cessaire."
      translations:
        en:
          description: Remove individuals from the physical access list when access
            is no longer required
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.01
      ref_id: 03.10.01.disc
      name: Discussion
      description: "Une installation peut comprendre un ou plusieurs emplacements\
        \ physiques h\xE9bergeant des syst\xE8mes ou des composants syst\xE8me servant\
        \ \xE0 traiter, \xE0 stocker ou \xE0 transmettre de l\u2019information d\xE9\
        sign\xE9e. Les autorisations d\u2019acc\xE8s physique s\u2019appliquent au\
        \ personnel et aux visiteurs. Les personnes avec des justificatifs d\u2019\
        identit\xE9 d\u2019autorisation d\u2019acc\xE8s physique permanents ne sont\
        \ pas consid\xE9r\xE9es comme des visiteurs. Les justificatifs d\u2019autorisation\
        \ comprennent les laissez-passer, les cartes d\u2019identit\xE9 et les cartes\
        \ \xE0 puce. Les organisations doivent d\xE9terminer la force des justificatifs\
        \ d\u2019identit\xE9 d\u2019autorisation en fonction des lois, des d\xE9crets,\
        \ des directives, des r\xE9glementations, des politiques, des normes et des\
        \ lignes directrices applicables. Il se peut que les autorisations d\u2019\
        acc\xE8s physique ne soient pas n\xE9cessaires pour acc\xE9der \xE0 certaines\
        \ zones dans les installations qui sont d\xE9sign\xE9es comme zones d\u2019\
        acc\xE8s public."
      translations:
        en:
          name: Discussion
          description: A facility can include one or more physical locations containing
            systems or system components that process, store, or transmit specified
            information. Physical access authorizations apply to employees and visitors.
            Individuals with permanent physical access authorization credentials are
            not considered visitors. Authorization credentials include identification
            badges, identification cards, and smart cards. Organizations determine
            the strength of the authorization credentials consistent with applicable
            laws, Orders in Council, directives, regulations, policies, standards,
            and guidelines. Physical access authorizations may not be necessary to
            access certain areas within facilities that are designated as publicly
            accessible.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.10
      ref_id: 03.10.02
      name: "Surveillance de l\u2019acc\xE8s physique"
      translations:
        en:
          name: Monitoring physical access
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.02
      ref_id: 03.10.02.A
      description: "Surveiller l\u2019acc\xE8s physique aux installations o\xF9 se\
        \ trouvent les syst\xE8mes afin de d\xE9tecter et d\u2019intervenir en cas\
        \ d\u2019incident de s\xE9curit\xE9 physique."
      translations:
        en:
          description: Monitor physical access to the facility where the system resides
            to detect and respond to physical security incidents
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.02
      ref_id: 03.10.02.B
      description: "Examiner les journaux d\u2019acc\xE8s physique tous les [Affectation\
        \ : fr\xE9quence d\xE9finie par l\u2019organisation] et \xE0 la suite de [Affectation\
        \ : \xE9v\xE9nements ou indications potentielles d\u2019\xE9v\xE9nement d\xE9\
        finis par l\u2019organisation]."
      translations:
        en:
          description: 'Review physical access logs [Assignment: organization-defined
            frequency] and upon occurrence of [Assignment: organization-defined events
            or potential indications of events]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.02
      ref_id: 03.10.02.disc
      name: Discussion
      description: "Une installation peut comprendre un ou plusieurs emplacements\
        \ physiques h\xE9bergeant des syst\xE8mes ou des composants syst\xE8me servant\
        \ \xE0 traiter, \xE0 stocker ou \xE0 transmettre de l\u2019information d\xE9\
        sign\xE9e. La surveillance de l\u2019acc\xE8s physique s\u2019applique aux\
        \ zones \xE0 acc\xE8s public dans les installations de l\u2019organisation.\
        \ Elle peut \xEAtre effectu\xE9e par des gardes de s\xE9curit\xE9, de l\u2019\
        \xE9quipement de vid\xE9osurveillance (c\u2019est-\xE0-dire les cam\xE9ras)\
        \ et des capteurs. L\u2019examen des journaux d\u2019acc\xE8s physique peut\
        \ aider \xE0 rep\xE9rer les activit\xE9s suspectes, les \xE9v\xE9nements anormaux\
        \ ou les menaces. Les examens peuvent \xEAtre appuy\xE9s par les contr\xF4\
        les de journalisation des donn\xE9es de v\xE9rification si les journaux d\u2019\
        acc\xE8s font partie d\u2019un syst\xE8me automatis\xE9. Les capacit\xE9s\
        \ d\u2019intervention en cas d\u2019incident incluent les enqu\xEAtes associ\xE9\
        es aux incidents de s\xE9curit\xE9 physique et les interventions connexes.\
        \ Les incidents incluent les violations de s\xE9curit\xE9 et les activit\xE9\
        s d\u2019acc\xE8s physique suspectes, comme les acc\xE8s hors des heures normales\
        \ de travail, les acc\xE8s r\xE9p\xE9t\xE9s aux zones auxquelles on n\u2019\
        acc\xE8de pas normalement, les acc\xE8s d\u2019une dur\xE9e anormalement longue\
        \ et les acc\xE8s ne respectant pas l\u2019ordre \xE9tabli."
      translations:
        en:
          name: Discussion
          description: A facility can include one or more physical locations containing
            systems or system components that process, store, or transmit specified
            information. Physical access monitoring includes publicly accessible areas
            within organizational facilities. Examples of physical access monitoring
            include guards, video surveillance equipment (i.e., cameras), and sensor
            devices. Reviewing physical access logs can help identify suspicious activity,
            anomalous events, or potential threats. The reviews can be supported by
            audit logging controls if the access logs are part of an automated system.
            Incident response capabilities include investigations of physical security
            incidents and responses to those incidents. Incidents include security
            violations or suspicious physical access activities, such as access outside
            of normal work hours, repeated access to areas not normally accessed,
            access for unusual lengths of time, and out-of-sequence access.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.06
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.10
      ref_id: 03.10.06
      name: Autres lieux de travail
      translations:
        en:
          name: Alternate work site
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.06.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.06
      ref_id: 03.10.06.A
      description: "D\xE9terminer les autres lieux o\xF9 le personnel peut travailler."
      translations:
        en:
          description: Determine alternate work sites allowed for use by employees
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.06.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.06
      ref_id: 03.10.06.B
      description: "Utiliser les exigences de s\xE9curit\xE9 suivantes pour les autres\
        \ lieux de travail : [Affectation : exigences de s\xE9curit\xE9 d\xE9finies\
        \ par l\u2019organisation]."
      translations:
        en:
          description: 'Employ the following security requirements at alternate work
            sites: [Assignment: organization-defined security requirements]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.06.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.06
      ref_id: 03.10.06.disc
      name: Discussion
      description: "Les autres lieux de travail incluent les r\xE9sidences priv\xE9\
        es des membres du personnel ou d\u2019autres installations d\xE9sign\xE9es\
        \ par l\u2019organisation. Les autres lieux de travail peuvent \xEAtre des\
        \ emplacements de travail facilement accessibles pour les op\xE9rations d\u2019\
        urgence. Les organisations peuvent d\xE9finir des exigences de s\xE9curit\xE9\
        \ diff\xE9rentes pour d\u2019autres lieux de travail ou types de lieux particuliers,\
        \ en fonction des activit\xE9s li\xE9es au travail men\xE9es sur ces lieux.\
        \ \xC9valuer l\u2019efficacit\xE9 des exigences et fournir un moyen de communication\
        \ des incidents aux autres lieux de travail permettront d\u2019appuyer les\
        \ activit\xE9s de planification d\u2019urgence des organisations."
      translations:
        en:
          name: Discussion
          description: Alternate work sites include the private residences of employees
            or other facilities designated by the organization. Alternate work sites
            can provide readily available alternate locations during contingency operations.
            Organizations can define different security requirements for specific
            alternate work sites or types of sites, depending on the work-related
            activities conducted at the sites. Assessing the effectiveness of the
            requirements and providing a means to communicate incidents at alternate
            work sites supports the contingency planning activities of organizations.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.10
      ref_id: 03.10.07
      name: "Contr\xF4le d\u2019acc\xE8s physique"
      translations:
        en:
          name: Physical access control
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.a
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07
      ref_id: 03.10.07.A
      description: "Appliquer les autorisations d\u2019acc\xE8s physique aux points\
        \ d\u2019entr\xE9e et de sortie des installations o\xF9 se trouvent les syst\xE8\
        mes au moyen de ce qui suit :"
      translations:
        en:
          description: 'Enforce physical access authorizations at entry and exit points
            to the facility where the system resides by:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.a.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.a
      ref_id: 03.10.07.A.1
      description: "v\xE9rification des autorisations d\u2019acc\xE8s physique avant\
        \ d\u2019accorder l\u2019acc\xE8s aux installations;"
      translations:
        en:
          description: verifying individual physical access authorizations before
            granting access to the facility
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.a.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.a
      ref_id: 03.10.07.A.2
      description: "contr\xF4le des points d\u2019entr\xE9e et de sortie au moyen\
        \ de syst\xE8mes de contr\xF4le d\u2019acc\xE8s physique, de dispositifs ou\
        \ de gardes."
      translations:
        en:
          description: controlling ingress and egress with physical access control
            systems, devices or guards
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07
      ref_id: 03.10.07.B
      description: "Tenir des journaux de v\xE9rification d\u2019acc\xE8s physique\
        \ pour les points d\u2019entr\xE9e et de sortie."
      translations:
        en:
          description: Maintain physical access audit logs for entry or exit points
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07
      ref_id: 03.10.07.C
      description: "Accompagner les visiteurs et contr\xF4ler les activit\xE9s des\
        \ visiteurs."
      translations:
        en:
          description: Escort visitors and control visitor activity
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07
      ref_id: 03.10.07.D
      description: "Fournir des cl\xE9s s\xE9curis\xE9es, des cadenas ou d\u2019autres\
        \ dispositifs d\u2019acc\xE8s physique."
      translations:
        en:
          description: Secure keys, combinations, and other physical access devices
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.e
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07
      ref_id: 03.10.07.E
      description: "Contr\xF4ler l\u2019acc\xE8s physique des dispositifs de sortie\
        \ afin d\u2019emp\xEAcher les personnes non autoris\xE9es d\u2019obtenir l\u2019\
        acc\xE8s \xE0 l\u2019information d\xE9sign\xE9e."
      translations:
        en:
          description: Control physical access to output devices to prevent unauthorized
            individuals from obtaining access to specified information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.07
      ref_id: 03.10.07.disc
      name: Discussion
      description: "Cette exigence traite des emplacements physiques h\xE9bergeant\
        \ des syst\xE8mes ou des composants syst\xE8me qui assurent le traitement,\
        \ le stockage ou la transmission d\u2019information d\xE9sign\xE9e. Les organisations\
        \ doivent d\xE9terminer le type de garde n\xE9cessaire, y compris le personnel\
        \ de s\xE9curit\xE9 professionnel ou le personnel administratif. Les dispositifs\
        \ de contr\xF4le d\u2019acc\xE8s physique comprennent les cl\xE9s, les verrous,\
        \ les cadenas, les lecteurs biom\xE9triques et les lecteurs de cartes. Les\
        \ syst\xE8mes de contr\xF4le d\u2019acc\xE8s physique doivent \xEAtre conformes\
        \ aux lois, aux d\xE9crets, aux directives, aux politiques, aux r\xE9glementations,\
        \ aux normes et aux lignes directrices applicables. Les organisations peuvent\
        \ employer les types de journaux de v\xE9rification de leur choix. Les journaux\
        \ de v\xE9rification peuvent \xEAtre proc\xE9duraux, automatis\xE9s ou une\
        \ combinaison des deux. Les points d\u2019acc\xE8s physique peuvent inclure\
        \ les points d\u2019acc\xE8s ext\xE9rieurs, les points d\u2019acc\xE8s int\xE9\
        rieurs aux syst\xE8mes qui exigent des contr\xF4les d\u2019acc\xE8s suppl\xE9\
        mentaires ou les deux. Les contr\xF4les d\u2019acc\xE8s physique s\u2019appliquent\
        \ au personnel et aux visiteurs. Les personnes avec des autorisations d\u2019\
        acc\xE8s physique permanentes ne sont pas consid\xE9r\xE9es comme des visiteurs.\n\
        \nLes contr\xF4les de l\u2019acc\xE8s physique aux dispositifs de sortie incluent\
        \ le rangement des dispositifs de sortie dans des pi\xE8ces verrouill\xE9\
        es ou d\u2019autres zones s\xE9curis\xE9es dot\xE9es d\u2019un contr\xF4le\
        \ d\u2019acc\xE8s avec clavier num\xE9rique ou lecteur de cartes et auxquelles\
        \ seules les personnes autoris\xE9es peuvent acc\xE9der, le rangement des\
        \ dispositifs de sortie dans des emplacements pouvant \xEAtre surveill\xE9\
        s par le personnel, l\u2019installation de filtres d\u2019\xE9cran et l\u2019\
        utilisation de casques d\u2019\xE9coute. Les \xE9crans, les imprimantes, les\
        \ num\xE9riseurs, les t\xE9l\xE9copieurs, les dispositifs audio et les photocopieurs\
        \ sont des exemples de dispositifs de sortie."
      translations:
        en:
          name: Discussion
          description: 'This requirement addresses physical locations containing systems
            or system components that process, store, or transmit specified information.
            Organizations determine the types of guards needed, including professional
            security staff or administrative staff. Physical access devices include
            keys, locks, combinations, biometric readers, and card readers. Physical
            access control systems comply with applicable laws, Orders in Council,
            directives, policies, regulations, standards, and guidelines. Organizations
            have flexibility in the types of audit logs employed. Audit logs can be
            procedural, automated, or some combination thereof. Physical access points
            can include exterior access points, interior access points to systems
            that require supplemental access controls, or both. Physical access control
            applies to employees and visitors. Individuals with permanent physical
            access authorizations are not considered visitors.


            Controlling physical access to output devices includes placing output
            devices in locked rooms or other secured areas with keypad or card reader
            access controls and only allowing access to authorized individuals, placing
            output devices in locations that can be monitored by personnel, installing
            monitor or screen filters, and using headphones. Examples of output devices
            include monitors, printers, scanners, facsimile machines, audio devices,
            and copiers.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.08
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.10
      ref_id: 03.10.08
      name: "Contr\xF4le d\u2019acc\xE8s pour la transmission"
      translations:
        en:
          name: Access control for transmission
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.08.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.08
      ref_id: 03.10.08.A
      description: "Contr\xF4ler l\u2019acc\xE8s physique aux lignes de distribution\
        \ et de transmission des syst\xE8mes dans les installations de l\u2019organisation."
      translations:
        en:
          description: Control physical access to system distribution and transmission
            lines in organizational facilities.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.08.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.10.08
      ref_id: 03.10.08.disc
      name: Discussion
      description: "Les mesures de protection appliqu\xE9es aux lignes de distribution\
        \ et de transmission des syst\xE8mes permettent de pr\xE9venir les dommages\
        \ accidentels, les pannes et les modifications physiques. De telles mesures\
        \ peuvent \xE9galement \xEAtre n\xE9cessaires afin d\u2019\xE9viter l\u2019\
        \xE9coute clandestine ou la modification des transmissions non chiffr\xE9\
        es. Les mesures de protection servant \xE0 contr\xF4ler l\u2019acc\xE8s physique\
        \ aux lignes de distribution et de transmission des syst\xE8mes incluent la\
        \ d\xE9connexion ou le verrouillage des connecteurs non utilis\xE9s, le verrouillage\
        \ des armoires de c\xE2blage, la protection du c\xE2blage par des conduits\
        \ ou des chemins de c\xE2bles et l\u2019\xE9coute \xE9lectronique des capteurs."
      translations:
        en:
          name: Discussion
          description: Safeguarding measures applied to system distribution and transmission
            lines prevent accidental damage, disruption, and physical tampering. Such
            measures may also be necessary to prevent eavesdropping or the modification
            of unencrypted transmissions. Safeguarding measures used to control physical
            access to system distribution and transmission lines include disconnected
            or locked spare jacks, locked wiring closets, protecting cabling with
            conduit or cable trays, and wiretapping sensors.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.11
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.11'
      name: "\xC9valuation des risques"
      description: "Les contr\xF4les d\u2019\xE9valuation des risques appuient la\
        \ conduite p\xE9riodique d\u2019\xE9valuations des risques, y compris les\
        \ \xE9valuations des facteurs relatifs \xE0 la vie priv\xE9e, qui peuvent\
        \ d\xE9couler de l\u2019exploitation des syst\xE8mes organisationnels ou du\
        \ traitement, du stockage ou de la transmission de donn\xE9es et d\u2019information."
      translations:
        en:
          name: Risk assessment
          description: The Risk assessment controls deal with the periodic conduct
            of risk assessments, including privacy impact assessments, resulting from
            the operation of organizational systems and associated handling, storage,
            or transmission of data and information.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.11
      ref_id: 03.11.01
      name: "\xC9valuation des risques"
      translations:
        en:
          name: Risk assessment
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.01
      ref_id: 03.11.01.A
      description: "\xC9valuer le risque (y compris les risques associ\xE9s \xE0 la\
        \ cha\xEEne d\u2019approvisionnement) de divulgation non autoris\xE9e r\xE9\
        sultant de la gestion, du traitement, du stockage ou de la transmission d\u2019\
        information d\xE9sign\xE9e."
      translations:
        en:
          description: Assess the risk (including supply chain risk) of unauthorized
            disclosure resulting from the handling, processing, storage, or transmission
            of specified information
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.01
      ref_id: 03.11.01.B
      description: "Mettre \xE0 jour les \xE9valuations des risques tous les [Affectation\
        \ : fr\xE9quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Update risk assessments [Assignment: organization-defined
            frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.01
      ref_id: 03.11.01.disc
      name: Discussion
      description: "L\u2019\xE9tablissement du p\xE9rim\xE8tre du syst\xE8me est une\
        \ condition pr\xE9alable pour \xE9valuer les risques de divulgation non autoris\xE9\
        e d\u2019information d\xE9sign\xE9e. Les \xE9valuations des risques doivent\
        \ prendre en compte les menaces, les vuln\xE9rabilit\xE9s, les probabilit\xE9\
        s et les impacts sur les activit\xE9s et les actifs organisationnels, en fonction\
        \ de l\u2019exploitation et de l\u2019utilisation du syst\xE8me, et de la\
        \ divulgation non autoris\xE9e d\u2019information d\xE9sign\xE9e. Les \xE9\
        valuations des risques doivent \xE9galement consid\xE9rer les risques provenant\
        \ des parties externes (par exemple, les entrepreneurs exploitant les syst\xE8\
        mes au nom de l\u2019organisation, les fournisseurs de services, les personnes\
        \ acc\xE9dant aux syst\xE8mes et les sous-traitants). Elles peuvent \xEAtre\
        \ men\xE9es au niveau de l\u2019organisation, des processus li\xE9s \xE0 la\
        \ mission ou aux activit\xE9s, ou des syst\xE8mes, ainsi qu\u2019\xE0 n\u2019\
        importe quelle phase du cycle de d\xE9veloppement des syst\xE8mes. Les \xE9\
        valuations des risques incluent les risques reli\xE9s \xE0 la cha\xEEne d\u2019\
        approvisionnement et associ\xE9s aux fournisseurs ou aux entrepreneurs ainsi\
        \ que le syst\xE8me, le composant syst\xE8me ou le service syst\xE8me fourni\
        \ par les fournisseurs et les entrepreneurs."
      translations:
        en:
          name: Discussion
          description: Establishing the system boundary is a prerequisite to assessing
            the risk of unauthorized disclosure of specified information. Risk assessments
            consider threats, vulnerabilities, likelihood, and adverse impacts to
            organizational operations and assets based on the operation and use of
            the system and the unauthorized disclosure of specified information. Risk
            assessments also consider risks from external parties (e.g., contractors
            operating systems on behalf of the organization, service providers, individuals
            accessing systems, and outsourcing entities). Risk assessments can be
            conducted at the organization level, the mission or business process level,
            or the system level and at any phase in the system development life cycle.
            Risk assessments include supply chain-related risks associated with suppliers
            or contractors and the system, system component, or system service that
            they provide.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.11
      ref_id: 03.11.02
      name: "Surveillance et balayage des vuln\xE9rabilit\xE9s"
      translations:
        en:
          name: Vulnerability monitoring and scanning
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02
      ref_id: 03.11.02.A
      description: "Surveiller et balayer les vuln\xE9rabilit\xE9s du syst\xE8me tous\
        \ les [Affectation : fr\xE9quence d\xE9finie par l\u2019organisation] et lorsque\
        \ de nouvelles vuln\xE9rabilit\xE9s affectant le syst\xE8me sont identifi\xE9\
        es."
      translations:
        en:
          description: 'Monitor and scan for vulnerabilities in the system [Assignment:
            organization-defined frequency] and when new vulnerabilities affecting
            the system are identified'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02
      ref_id: 03.11.02.B
      description: "Corriger les vuln\xE9rabilit\xE9s du syst\xE8me dans une p\xE9\
        riode de [Affectation : d\xE9lais d\u2019ex\xE9cution d\xE9finis par l\u2019\
        organisation]."
      translations:
        en:
          description: 'Remediate system vulnerabilities within [Assignment: organization-defined
            response times]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02
      ref_id: 03.11.02.C
      description: "Mettre \xE0 jour la liste des vuln\xE9rabilit\xE9s du syst\xE8\
        me \xE0 balayer tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019\
        organisation] et lorsque de nouvelles vuln\xE9rabilit\xE9s sont identifi\xE9\
        es et signal\xE9es."
      translations:
        en:
          description: 'Update system vulnerabilities to be scanned [Assignment: organization-defined
            frequency] and when new vulnerabilities are identified and reported'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.02
      ref_id: 03.11.02.disc
      name: Discussion
      description: "Les organisations doivent d\xE9terminer l\u2019analyse des vuln\xE9\
        rabilit\xE9s requise pour les composants du syst\xE8me et s\u2019assurer que\
        \ les sources potentielles de vuln\xE9rabilit\xE9s (par exemple, les imprimantes,\
        \ les num\xE9riseurs et les photocopieurs en r\xE9seau) ne sont pas ignor\xE9\
        es. Les analyses de vuln\xE9rabilit\xE9s des logiciels sur mesure peuvent\
        \ n\xE9cessiter des mesures suppl\xE9mentaires, comme des analyses statistiques,\
        \ dynamiques ou binaires. Les organisations peuvent utiliser ces mesures dans\
        \ les examens de code source et les outils (par exemple, les outils d\u2019\
        analyse statique, les analyseurs d\u2019application Web et des analyseurs\
        \ binaires). Le balayage des vuln\xE9rabilit\xE9s comprend le balayage des\
        \ niveaux de correctifs; le balayage des fonctions, des ports, des protocoles\
        \ et des services qui ne doivent pas \xEAtre accessibles aux utilisatrices\
        \ et utilisateurs ou aux dispositifs; et le balayage des m\xE9canismes de\
        \ contr\xF4le de flux mal configur\xE9s ou d\xE9fectueux.\n\nAfin de faciliter\
        \ l\u2019interop\xE9rabilit\xE9, les organisations doivent consid\xE9rer l\u2019\
        utilisation d\u2019outils de balayage qui expriment les vuln\xE9rabilit\xE9\
        s selon la convention d\u2019appellation des vuln\xE9rabilit\xE9s et expositions\
        \ courantes (CVE pour Common Vulnerabilities and Exposures). Les sources d\u2019\
        information sur les vuln\xE9rabilit\xE9s incluent la liste des lacunes courantes\
        \ (CWE pour Common Weakness Enumeration), la base de donn\xE9es nationale\
        \ sur les vuln\xE9rabilit\xE9s (NVD pour National Vulnerability Database)\
        \ et le syst\xE8me de notation des vuln\xE9rabilit\xE9s courantes (CVSS pour\
        \ Common Vulnerability Scoring System)."
      translations:
        en:
          name: Discussion
          description: 'Organizations determine the required vulnerability scanning
            for system components and ensure that potential sources of vulnerabilities
            (e.g., networked printers, scanners, and copiers) are not overlooked.
            Vulnerability analyses for custom software may require additional approaches,
            such as static analysis, dynamic analysis, or binary analysis. Organizations
            can use these approaches in source code reviews and tools (e.g., static
            analysis tools, web-based application scanners, binary analyzers). Vulnerability
            scanning includes scanning for patch levels; scanning for functions, ports,
            protocols, and services that should not be accessible to users or devices;
            and scanning for improperly configured or incorrectly operating flow control
            mechanisms.


            To facilitate interoperability, organizations consider using scanning
            tools that express vulnerabilities in the Common Vulnerabilities and Exposures
            (CVE) naming convention. Sources for vulnerability information also include
            the Common Weakness Enumeration (CWE) listing, the National Vulnerability
            Database (NVD), and the Common Vulnerability Scoring System (CVSS).'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.11
      ref_id: 03.11.04
      name: "R\xE9ponse aux risques"
      translations:
        en:
          name: Risk response
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.04
      ref_id: 03.11.04.A
      description: "Prendre des mesures \xE0 l\u2019\xE9gard des r\xE9sultats des\
        \ \xE9valuations, des activit\xE9s de surveillance et des v\xE9rifications\
        \ de la s\xE9curit\xE9."
      translations:
        en:
          description: Respond to findings from security assessments, monitoring,
            and audits.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.11.04
      ref_id: 03.11.04.disc
      name: Discussion
      description: "Cette exigence traite le besoin de d\xE9terminer une r\xE9action\
        \ appropri\xE9e aux risques avant de g\xE9n\xE9rer une entr\xE9e dans le plan\
        \ d\u2019action et des jalons (PAJ). Il peut \xEAtre possible d\u2019att\xE9\
        nuer les risques imm\xE9diatement de sorte que l\u2019entr\xE9e dans le PAJ\
        \ ne soit pas n\xE9cessaire. Toutefois, une entr\xE9e dans le PAJ doit \xEA\
        tre g\xE9n\xE9r\xE9e si la r\xE9ponse aux risques consiste \xE0 att\xE9nuer\
        \ les risques identifi\xE9s, mais s\u2019il n\u2019est pas possible de proc\xE9\
        der \xE0 une att\xE9nuation imm\xE9diate."
      translations:
        en:
          name: Discussion
          description: This requirement addresses the need to determine an appropriate
            response to risk before generating a plan of action and milestones (POAM)
            entry. It may be possible to mitigate the risk immediately so that a <abbr
            title="plan of action and milestones">POAM</abbr> entry is not needed.
            However, a <abbr title="plan of action and milestones">POAM</abbr> entry
            is generated if the risk response is to mitigate the identified risk and
            the mitigation cannot be completed immediately.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.12
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.12'
      name: "\xC9valuation de s\xE9curit\xE9 et surveillance"
      description: "Les contr\xF4les d\u2019\xE9valuation de s\xE9curit\xE9 et de\
        \ surveillance traitent des \xE9valuations de s\xE9curit\xE9 et des m\xE9\
        canismes de surveillance du syst\xE8me."
      translations:
        en:
          name: Security assessment and monitoring
          description: The Security assessment and monitoring controls deal with the
            security assessment and monitoring of the system.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.12
      ref_id: 03.12.01
      name: "\xC9valuation de s\xE9curit\xE9"
      translations:
        en:
          name: Security assessment
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.01
      ref_id: 03.12.01.A
      description: "\xC9valuer les exigences de s\xE9curit\xE9 et de protection de\
        \ la vie priv\xE9e pour le syst\xE8me et son environnement d\u2019exploitation\
        \ tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019organisation]\
        \ afin de d\xE9terminer si les exigences sont satisfaites."
      translations:
        en:
          description: 'Assess the security and privacy requirements for the system
            and its environment of operation [Assignment: organization-defined frequency]
            to determine if the requirements have been satisfied.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.01
      ref_id: 03.12.01.disc
      name: Discussion
      description: "En \xE9valuant les exigences de s\xE9curit\xE9 et de protection\
        \ de la vie priv\xE9e, les organisations doivent d\xE9terminer si les mesures\
        \ de protection et les contre-mesures n\xE9cessaires sont correctement mises\
        \ en \u0153uvre, si elles fonctionnent comme pr\xE9vu et si elles produisent\
        \ le r\xE9sultat escompt\xE9. Les \xE9valuations de s\xE9curit\xE9 identifient\
        \ les faiblesses et les lacunes du syst\xE8me et fournissent les renseignements\
        \ essentiels n\xE9cessaires pour prendre des d\xE9cisions en fonction des\
        \ risques. Les rapports d\u2019\xE9valuation de s\xE9curit\xE9 et de protection\
        \ de la vie priv\xE9e documentent les r\xE9sultats de l\u2019\xE9valuation\
        \ \xE0 un niveau de d\xE9tails jug\xE9 suffisant par l\u2019organisation pour\
        \ assurer l\u2019exactitude et l\u2019exhaustivit\xE9 des rapports. Les r\xE9\
        sultats des \xE9valuations de s\xE9curit\xE9 sont pr\xE9sent\xE9s aux personnes\
        \ ou aux r\xF4les appropri\xE9s pour les types d\u2019\xE9valuations men\xE9\
        es."
      translations:
        en:
          name: Discussion
          description: By assessing the security and privacy requirements, organizations
            determine whether the necessary safeguards and countermeasures are implemented
            correctly, operating as intended, and producing the desired outcome. Security
            assessments identify weaknesses and deficiencies in the system and provide
            the essential information needed to make risk-based decisions. Security
            and privacy assessment reports document assessment results in sufficient
            detail as deemed necessary by the organization to determine the accuracy
            and completeness of the reports. Security assessment results are provided
            to the individuals or roles appropriate for the types of assessments being
            conducted.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.12
      ref_id: 03.12.02
      name: "Plans d\u2019action et des jalons"
      translations:
        en:
          name: Plan of action and milestones
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.a
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02
      ref_id: 03.12.02.A
      description: "\xC9laborer un plan d\u2019action et des jalons (PAJ) pour le\
        \ syst\xE8me dans le but de :"
      translations:
        en:
          description: 'Develop a plan of action and milestones (POAMs) for the system
            to:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.a.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.a
      ref_id: 03.12.02.A.1
      description: "documenter les mesures correctives pr\xE9vues pour corriger les\
        \ faiblesses ou les lacunes \xE9tablies lors des \xE9valuations de s\xE9curit\xE9\
        ;"
      translations:
        en:
          description: document the planned remediation actions to correct weaknesses
            or deficiencies noted during security assessments
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.a.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.a
      ref_id: 03.12.02.A.2
      description: "r\xE9duire ou \xE9liminer les vuln\xE9rabilit\xE9s connues du\
        \ syst\xE8me."
      translations:
        en:
          description: reduce or eliminate known system vulnerabilities
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.b
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02
      ref_id: 03.12.02.B
      description: "Mettre \xE0 jour les PAJ existants en fonction des r\xE9sultats\
        \ provenant des activit\xE9s suivantes :"
      translations:
        en:
          description: 'Update the existing <abbr title="plan of action and milestones">POAM</abbr>
            s based on the findings from:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.b.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.b
      ref_id: 03.12.02.B.1
      description: "les \xE9valuations de s\xE9curit\xE9;"
      translations:
        en:
          description: security assessments
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.b.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.b
      ref_id: 03.12.02.B.2
      description: "les v\xE9rifications ou examens;"
      translations:
        en:
          description: audits or reviews
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.b.3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.b
      ref_id: 03.12.02.B.3
      description: la surveillance continue.
      translations:
        en:
          description: continuous monitoring activities
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.02
      ref_id: 03.12.02.disc
      name: Discussion
      description: "Les PAJ sont des documents importants des programmes organisationnels\
        \ de s\xE9curit\xE9 et de protection de la vie priv\xE9e. Les organisations\
        \ ont recours \xE0 des PAJ pour d\xE9crire comment les exigences de s\xE9\
        curit\xE9 non satisfaites seront respect\xE9es et comment les mesures d\u2019\
        att\xE9nuation pr\xE9vues seront mises en \u0153uvre. Les organisations peuvent\
        \ documenter les plans de s\xE9curit\xE9 des syst\xE8mes et les PAJ en utilisant\
        \ des documents s\xE9par\xE9s ou combin\xE9s, peu importe le format."
      translations:
        en:
          name: Discussion
          description: <abbr title="plan of action and milestones">POAM</abbr>s are
            important documents in organizational security and privacy programs. Organizations
            use <abbr title="plan of action and milestones">POAM</abbr>s to describe
            how unsatisfied security requirements will be met and how planned mitigations
            will be implemented. Organizations can document system security plans
            and <abbr title="plan of action and milestones">POAM</abbr>s as separate
            or combined documents and in any format.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.12
      ref_id: 03.12.03
      name: Surveillance continue
      translations:
        en:
          name: Continuous monitoring
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.03
      ref_id: 03.12.03.A
      description: "\xC9laborer et mettre en \u0153uvre une strat\xE9gie de surveillance\
        \ continue des syst\xE8mes qui comprend des activit\xE9s continues d\u2019\
        \xE9valuation de la s\xE9curit\xE9 et de surveillance."
      translations:
        en:
          description: Develop and implement a system-level continuous monitoring
            strategy that includes ongoing monitoring and security assessments.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.03
      ref_id: 03.12.03.disc
      name: Discussion
      description: "La surveillance continue du syst\xE8me facilite une sensibilisation\
        \ permanente de la s\xE9curit\xE9 du syst\xE8me et de la posture li\xE9e \xE0\
        \ la protection de la vie priv\xE9e afin d\u2019appuyer les d\xE9cisions relatives\
        \ \xE0 la gestion des risques. Les termes continu et permanent signifient\
        \ que les organisations \xE9valuent et surveillent leurs syst\xE8mes \xE0\
        \ une fr\xE9quence suffisante pour appuyer les d\xE9cisions en fonction des\
        \ risques. Diff\xE9rents types d\u2019exigence de s\xE9curit\xE9 et de protection\
        \ de la vie priv\xE9e peuvent exiger des fr\xE9quences de surveillance diff\xE9\
        rentes."
      translations:
        en:
          name: Discussion
          description: Continuous monitoring at the system level facilitates ongoing
            awareness of the system security and privacy posture to support risk management
            decisions. The terms "continuous" and "ongoing" imply that organizations
            assess and monitor their systems at a frequency that is sufficient to
            support risk-based decisions. Different types of security and privacy
            requirements may require different monitoring frequencies.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.12
      ref_id: 03.12.05
      name: "\xC9change d\u2019information"
      translations:
        en:
          name: Information exchange
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05
      ref_id: 03.12.05.A
      description: "Approuver et g\xE9rer l\u2019\xE9change d\u2019information d\xE9\
        sign\xE9e entre le syst\xE8me et d\u2019autres syst\xE8mes au moyen de [S\xE9\
        lection (un ou plusieurs) : ententes sur la s\xE9curit\xE9 des interconnexions;\
        \ ententes sur la s\xE9curit\xE9 de l\u2019\xE9change d\u2019information;\
        \ ententes ou protocoles d\u2019entente; ententes sur l\u2019\xE9change d\u2019\
        information; accords sur les niveaux de service; ententes avec les utilisatrices\
        \ et utilisateurs; accords de non-divulgation]."
      translations:
        en:
          description: 'Approve and manage the exchange of specified information between
            the system and other systems using [Selection (one or more): interconnection
            security agreements; information exchange security agreements; memoranda
            of understanding or agreement; information sharing arrangements; service
            level agreements; user agreements; nondisclosure agreements]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05
      ref_id: 03.12.05.B
      description: "Documenter, dans le cadre des ententes d\u2019\xE9change, les\
        \ caract\xE9ristiques d\u2019interface, les exigences de s\xE9curit\xE9 et\
        \ de protection de la vie priv\xE9e ainsi que les responsabilit\xE9s li\xE9\
        es \xE0 chacun des syst\xE8mes."
      translations:
        en:
          description: Document, as part of the exchange agreements, interface characteristics,
            security and privacy requirements, and responsibilities for each system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05
      ref_id: 03.12.05.C
      description: "Examiner et mettre \xE0 jour les ententes d\u2019\xE9change tous\
        \ les [Affectation : fr\xE9quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Review and update the exchange agreements [Assignment: organization-defined
            frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.12.05
      ref_id: 03.12.05.disc
      name: Discussion
      description: "L\u2019\xE9change d\u2019information s\u2019applique aux \xE9\
        changes d\u2019information entre deux ou plusieurs syst\xE8mes de l\u2019\
        organisation ou \xE0 l\u2019ext\xE9rieur de l\u2019organisation. Les organisations\
        \ doivent consid\xE9rer les risques associ\xE9s aux menaces nouvelles ou grandissantes\
        \ qui peuvent \xEAtre introduites lorsque les syst\xE8mes \xE9changent de\
        \ l\u2019information avec d\u2019autres syst\xE8mes qui peuvent avoir des\
        \ exigences ou des strat\xE9gies de s\xE9curit\xE9 diff\xE9rentes. Les types\
        \ d\u2019ententes doivent \xEAtre s\xE9lectionn\xE9s en fonction de facteurs\
        \ comme la relation entre les organisations qui \xE9changent de l\u2019information\
        \ (par exemple, d\u2019un organisme gouvernemental \xE0 un autre, d\u2019\
        un organisme gouvernemental \xE0 une entreprise, d\u2019une entreprise \xE0\
        \ une autre, d\u2019un organisme gouvernemental ou d\u2019une entreprise \xE0\
        \ un fournisseur de services, d\u2019un organisme gouvernemental ou d\u2019\
        une entreprise \xE0 personne) et le niveau d\u2019acc\xE8s au syst\xE8me organisationnel\
        \ par les utilisatrices et utilisateurs de l\u2019autre syst\xE8me. Les types\
        \ d\u2019ententes peuvent inclure des ententes sur la s\xE9curit\xE9 de l\u2019\
        \xE9change d\u2019information, des ententes sur la s\xE9curit\xE9 des interconnexions,\
        \ des ententes ou protocoles d\u2019entente, des ententes sur l\u2019\xE9\
        change d\u2019information, des accords sur les niveaux de service ou d\u2019\
        autres types d\u2019ententes.\n\nLes organisations peuvent int\xE9grer l\u2019\
        information des ententes dans des contrats officiels, en particulier pour\
        \ les \xE9changes d\u2019information entre des minist\xE8res et organismes\
        \ f\xE9d\xE9raux et des organisations non f\xE9d\xE9rales (par exemple, des\
        \ prestataires de services, des entrepreneures et entrepreneurs, des d\xE9\
        veloppeuses et d\xE9veloppeurs de syst\xE8mes et des int\xE9gratrices et int\xE9\
        grateurs de syst\xE8mes). Les renseignements qui se trouvent dans les ententes\
        \ d\u2019\xE9change incluent les caract\xE9ristiques d\u2019interface <abbr\
        \ title=\"Interface&#10;Fronti\xE8re o\xF9 transitent les communications entre\
        \ deux syst\xE8mes. Il peut s\u2019agir d\u2019un connecteur mat\xE9riel utilis\xE9\
        \ pour la connexion \xE0 d\u2019autres dispositifs ou d\u2019une convention\
        \ permettant d\u2019\xE9tablir des communications entre deux syst\xE8mes logiciels.\"\
        ><sup>(?)</sup></abbr>, les exigences de s\xE9curit\xE9 et de protection de\
        \ la vie priv\xE9e, les contr\xF4les et les responsabilit\xE9s pour chaque\
        \ syst\xE8me."
      translations:
        en:
          name: Discussion
          description: 'Information exchange applies to information exchanges between
            two or more systems, both internal and external to the organization. Organizations
            consider the risks related to new or increased threats that may be introduced
            when systems exchange information with other systems that may have different
            security requirements or policies. The types of agreements selected are
            based on factors such as the relationship between the organizations exchanging
            information (e.g., government to government, government to business, business
            to business, government or business to service provider, government or
            business to individual) and the level of access to the organizational
            system by users of the other system. The types of agreements can include
            information exchange security agreements, interconnection security agreements,
            memoranda of understanding or agreement, information sharing arrangements,
            service-level agreements, or other types of agreements.


            Organizations may incorporate agreement information into formal contracts,
            especially for information exchanges established between federal departments
            and agencies and non-federal organizations (e.g., service providers, contractors,
            system developers, and system integrators). The types of information contained
            in exchange agreements include the interface <abbr title="Interface&#10;A
            boundary across which two systems communicate. An interface might be a
            hardware connector used to link to other devices, or it might be a convention
            used to allow communication between two software systems."><sup>(?)</sup></abbr>
            characteristics, security and privacy requirements, controls, and responsibilities
            for each system.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.13'
      name: "Protection des syst\xE8mes et des communications"
      description: "Les contr\xF4les de protection des syst\xE8mes et des communications\
        \ appuient les activit\xE9s de surveillance, de contr\xF4le et de protection\
        \ des syst\xE8mes ainsi que des communications internes et externes des syst\xE8\
        mes."
      translations:
        en:
          name: System and communications protection
          description: The System and communications protection controls support the
            monitoring, control and protection of the systems themselves and of the
            communications between and within the systems.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.01
      name: "Protection de p\xE9rim\xE8tre"
      translations:
        en:
          name: Boundary protection
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01
      ref_id: 03.13.01.A
      description: "Surveiller et contr\xF4ler les communications des interfaces externes\
        \ g\xE9r\xE9es vers le syst\xE8me et des principales interfaces internes g\xE9\
        r\xE9es au sein du syst\xE8me."
      translations:
        en:
          description: Monitor and control communications at the external managed
            interfaces to the system and key internal managed interfaces within the
            system
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01
      ref_id: 03.13.01.B
      description: "Mettre en \u0153uvre des sous-r\xE9seaux pour les composants syst\xE8\
        me \xE0 acc\xE8s public qui sont s\xE9par\xE9s physiquement ou logiquement\
        \ des r\xE9seaux internes."
      translations:
        en:
          description: Implement subnetworks for publicly accessible system components
            that are physically or logically separated from internal networks
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01
      ref_id: 03.13.01.C
      description: "Assurer la connexion des syst\xE8mes externes seulement au moyen\
        \ d\u2019interfaces g\xE9r\xE9es constitu\xE9es de dispositifs de protection\
        \ de p\xE9rim\xE8tre organis\xE9s conform\xE9ment \xE0 l\u2019architecture\
        \ de s\xE9curit\xE9 de l\u2019organisation."
      translations:
        en:
          description: Connect to external systems only through managed interfaces
            consisting of boundary protection devices arranged in accordance with
            an organizational security architecture
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.01
      ref_id: 03.13.01.disc
      name: Discussion
      description: "Les interfaces g\xE9r\xE9es incluent les passerelles, les routeurs,\
        \ les pare-feu, les analyseurs r\xE9seau de code malveillant, les syst\xE8\
        mes de virtualisation et les tunnels chiffr\xE9s mis en \u0153uvre au sein\
        \ d\u2019une architecture de s\xE9curit\xE9. Les sous-r\xE9seaux qui sont\
        \ s\xE9par\xE9s physiquement ou logiquement des r\xE9seaux internes sont appel\xE9\
        s commun\xE9ment des zones d\xE9militaris\xE9es (ZD) ou DMZ <abbr title=\"\
        DMZ&#10;Voir Zone d\xE9militaris\xE9e.\"><sup>(?)</sup></abbr> (pour Demilitarized\
        \ Zones). La restriction ou l\u2019interdiction d\u2019interfaces au sein\
        \ des syst\xE8mes organisationnels comprend la restriction du trafic Web externe\
        \ vers les serveurs Web d\xE9sign\xE9s dans des interfaces g\xE9r\xE9es et\
        \ l\u2019interdiction de la mystification d\u2019adresses (internes et externes)\
        \ pour les protocoles franchissant le p\xE9rim\xE8tre."
      translations:
        en:
          name: Discussion
          description: Managed interfaces include gateways, routers, firewalls, network-based
            malicious code analysis, virtualization systems, and encrypted tunnels
            implemented within a security architecture. Subnetworks that are either
            physically or logically separated from internal networks are referred
            to as demilitarized zones or DMZs. Restricting or prohibiting interfaces
            within organizational systems includes restricting external web traffic
            to designated web servers within managed interfaces, prohibiting both
            internal and external address spoofing for protocols crossing the boundary.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.04
      name: "Information dans les ressources syst\xE8me partag\xE9es"
      translations:
        en:
          name: Information in shared system resources
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.04
      ref_id: 03.13.04.A
      description: "Emp\xEAcher les transferts d\u2019information non autoris\xE9\
        s ou non pr\xE9vus au moyen de ressources syst\xE8me partag\xE9es."
      translations:
        en:
          description: Prevent unauthorized and unintended information transfer via
            shared system resources.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.04
      ref_id: 03.13.04.disc
      name: Discussion
      description: "Emp\xEAcher les transferts d\u2019information non autoris\xE9\
        s ou non pr\xE9vus au moyen de ressources syst\xE8me partag\xE9es permet d\u2019\
        \xE9viter que l\u2019information produite par les op\xE9rations d\u2019utilisatrices\
        \ et utilisateurs ou de r\xF4les ant\xE9rieurs (ou les op\xE9rations de processus\
        \ agissant au nom d\u2019utilisatrices et utilisateurs ou de r\xF4les ant\xE9\
        rieurs) soit disponible pour les utilisatrices et utilisateurs ou les r\xF4\
        les actuels (ou les processus actuels agissant au nom des utilisatrices et\
        \ utilisateurs ou des r\xF4les actuels) qui obtiennent l\u2019acc\xE8s aux\
        \ ressources syst\xE8me partag\xE9es apr\xE8s que les ressources ont \xE9\
        t\xE9 retourn\xE9es au syst\xE8me. L\u2019information dans les ressources\
        \ syst\xE8me partag\xE9es s\u2019applique \xE9galement aux repr\xE9sentations\
        \ chiffr\xE9es de l\u2019information. Dans d\u2019autres contextes, le contr\xF4\
        le de l\u2019information dans les ressources syst\xE8me partag\xE9es est couramment\
        \ appel\xE9 la r\xE9utilisation d\u2019objets et la protection d\u2019information\
        \ r\xE9siduelle. L\u2019information dans les ressources syst\xE8me partag\xE9\
        es ne s\u2019applique pas \xE0 la persistance d\u2019information, qui fait\
        \ r\xE9f\xE9rence \xE0 la repr\xE9sentation r\xE9siduelle des donn\xE9es qui\
        \ ont \xE9t\xE9 nominalement supprim\xE9es, ni aux canaux cach\xE9s (y compris\
        \ les canaux de stockage et de temps) o\xF9 les ressources syst\xE8me partag\xE9\
        es sont manipul\xE9es de fa\xE7on \xE0 enfreindre les restrictions relatives\
        \ aux flux d\u2019information, ni aux composants des syst\xE8mes qui sont\
        \ associ\xE9s \xE0 un seul utilisateur ou r\xF4le."
      translations:
        en:
          name: Discussion
          description: Preventing unauthorized and unintended information transfer
            via shared system resources stops information produced by the actions
            of prior users or roles (or actions of processes acting on behalf of prior
            users or roles) from being available to current users or roles (or current
            processes acting on behalf of current users or roles) that obtain access
            to shared system resources after those resources have been released back
            to the system. Information in shared system resources also applies to
            encrypted representations of information. In other contexts, the control
            of information in shared system resources is referred to as object reuse
            and residual information protection. Information in shared system resources
            does not address information remanence, which refers to the residual representation
            of data that has been nominally deleted, covert channels (including storage
            and timing channels) in which shared system resources are manipulated
            to violate information flow restrictions, or components within systems
            for which there are only single users or roles.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.06
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.06
      name: "Communications r\xE9seau \u2212 Refus par d\xE9faut et autorisation par\
        \ exception"
      translations:
        en:
          name: "Network communications \u2013 deny by default \u2013 allow by exception"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.06.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.06
      ref_id: 03.13.06.A
      description: "Refuser par d\xE9faut le trafic de communications r\xE9seau et\
        \ permettre le trafic de communications r\xE9seau au moyen d\u2019exceptions."
      translations:
        en:
          description: Deny network communications traffic by default and allow network
            communications traffic by exception.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.06.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.06
      ref_id: 03.13.06.disc
      name: Discussion
      description: "Cette exigence s\u2019applique au trafic de communications r\xE9\
        seau entrant et sortant dans le p\xE9rim\xE8tre du syst\xE8me et aux points\
        \ d\xE9sign\xE9s au sein du syst\xE8me. Une strat\xE9gie de trafic de communications\
        \ r\xE9seau de type \xAB refus par d\xE9faut et autorisation par exception\
        \ \xBB permet de s\u2019assurer que seules les connexions essentielles et\
        \ approuv\xE9es sont permises."
      translations:
        en:
          name: Discussion
          description: This requirement applies to inbound and outbound network communications
            traffic at the system boundary and at identified points within the system.
            A deny-all, allow-by-exception network communications traffic policy ensures
            that only essential and approved connections are allowed.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.08
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.08
      name: "Confidentialit\xE9 lors de la transmission et du stockage"
      translations:
        en:
          name: Transmission and storage confidentiality
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.08.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.08
      ref_id: 03.13.08.A
      description: "Mettre en \u0153uvre des m\xE9canismes cryptographiques afin d\u2019\
        emp\xEAcher la divulgation non autoris\xE9e d\u2019information d\xE9sign\xE9\
        e lors de la transmission et du stockage."
      translations:
        en:
          description: Implement cryptographic mechanisms to prevent the unauthorized
            disclosure of specified information during transmission and while in storage.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.08.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.08
      ref_id: 03.13.08.disc
      name: Discussion
      description: "Cette exigence s\u2019applique aux r\xE9seaux internes et externes\
        \ ainsi qu\u2019\xE0 tous les composants du syst\xE8me qui peuvent transmettre\
        \ de l\u2019information d\xE9sign\xE9e, y compris les serveurs, les ordinateurs\
        \ blocs-notes, les ordinateurs de bureau, les appareils mobiles, les imprimantes,\
        \ les photocopieurs, les num\xE9riseurs, les t\xE9l\xE9copieurs et les radios.\
        \ Les voies de communication non prot\xE9g\xE9es sont vuln\xE9rables \xE0\
        \ l\u2019interception et \xE0 la modification. Le chiffrement prot\xE8ge l\u2019\
        information d\xE9sign\xE9e des divulgations non autoris\xE9es lors de la transmission\
        \ et du stockage. Les m\xE9canismes cryptographiques qui prot\xE8gent la confidentialit\xE9\
        \ de l\u2019information d\xE9sign\xE9e durant la transmission incluent les\
        \ protocoles TLS et IPsec. L\u2019information en stockage (c\u2019est-\xE0\
        -dire l\u2019information au repos) d\xE9signe l\u2019\xE9tat de l\u2019information\
        \ d\xE9sign\xE9e lorsqu\u2019elle n\u2019est pas trait\xE9e ou en transit\
        \ et qu\u2019elle r\xE9side sur des dispositifs de stockage internes ou externes,\
        \ sur des dispositifs de r\xE9seau de stockage et dans des bases de donn\xE9\
        es. La protection de l\u2019information d\xE9sign\xE9e en stockage ne concerne\
        \ pas le type de dispositif de stockage ni la fr\xE9quence d\u2019acc\xE8\
        s au dispositif, mais plut\xF4t l\u2019\xE9tat de l\u2019information. Cette\
        \ exigence est associ\xE9e \xE0 l\u2019exigence **Protection cryptographique\
        \ 03.13.11**."
      translations:
        en:
          name: Discussion
          description: This requirement applies to internal and external networks
            and any system components that can transmit specified information, including
            servers, notebook computers, desktop computers, mobile devices, printers,
            copiers, scanners, facsimile machines, and radios. Unprotected communication
            paths are susceptible to interception and modification. Encryption protects
            specified information from unauthorized disclosure during transmission
            and while in storage. Cryptographic mechanisms that protect the confidentiality
            of specified information during transmission include <abbr title="Transport
            Layer Security">TLS</abbr> and IPsec. Information in storage (i.e., information
            at rest) refers to the state of specified information when it is not in
            process or in transit and resides on internal or external storage devices,
            storage area network devices, and databases. Protecting specified information
            in storage does not focus on the type of storage device or the frequency
            of access to that device but rather on the state of the information. This
            requirement relates to **Cryptographic protection 03.13.11**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.09
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.09
      name: "D\xE9connexion r\xE9seau"
      translations:
        en:
          name: Network disconnect
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.09.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.09
      ref_id: 03.13.09.A
      description: "Mettre fin aux connexions r\xE9seau associ\xE9es aux sessions\
        \ de communication \xE0 la fin de la session ou apr\xE8s [Affectation : p\xE9\
        riode d\xE9finie par l\u2019organisation] d\u2019inactivit\xE9."
      translations:
        en:
          description: 'Terminate network connections associated with communications
            sessions at the end of the sessions or after [Assignment: organization-defined
            time period] of inactivity.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.09.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.09
      ref_id: 03.13.09.disc
      name: Discussion
      description: "Cette exigence s\u2019applique aux r\xE9seaux internes et externes.\
        \ L\u2019interruption des connexions r\xE9seau associ\xE9es aux sessions de\
        \ communication comprend la d\xE9saffectation des adresses TCP/IP ou des paires\
        \ de ports au niveau du syst\xE8me d\u2019exploitation ou la d\xE9saffectation\
        \ des attributions r\xE9seau au niveau de l\u2019application si plusieurs\
        \ sessions d\u2019application utilisent une seule connexion r\xE9seau. Les\
        \ p\xE9riodes d\u2019inactivit\xE9 peuvent \xEAtre \xE9tablies par les organisations\
        \ et comprennent des p\xE9riodes par type d\u2019acc\xE8s r\xE9seau ou pour\
        \ des acc\xE8s r\xE9seau particuliers."
      translations:
        en:
          name: Discussion
          description: This requirement applies to internal and external networks.
            Terminating network connections associated with communications sessions
            includes deallocating <abbr title="Transmission Control Protocol/Internet
            Protocol">TCP/IP</abbr> addresses or port pairs at the operating system
            level or deallocating networking assignments at the application level
            if multiple application sessions are using a single network connection.
            Time periods of inactivity may be established by organizations and include
            time periods by type of network access or for specific network accesses.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.10
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.10
      name: "\xC9tablissement et gestion des cl\xE9s cryptographiques"
      translations:
        en:
          name: Cryptographic key establishment and management
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.10.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.10
      ref_id: 03.13.10.A
      description: "\xC9tablir et g\xE9rer les cl\xE9s cryptographiques dans le syst\xE8\
        me conform\xE9ment aux exigences de gestion de cl\xE9s suivantes : [Affectation\
        \ : exigences d\xE9finies par l\u2019organisation li\xE9es \xE0 la g\xE9n\xE9\
        ration, \xE0 la distribution, au stockage, \xE0 l\u2019acc\xE8s et \xE0 la\
        \ destruction des cl\xE9s]."
      translations:
        en:
          description: 'Establish and manage cryptographic keys in the system in accordance
            with the following key management <abbr title="Key management&#10;The
            procedures and mechanisms for generating, disseminating, replacing, storing,
            archiving, and destroying cryptographic keys."><sup>(?)</sup></abbr> requirements:
            [Assignment: organization-defined requirements for key generation, distribution,
            storage, access, and destruction].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.10.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.10
      ref_id: 03.13.10.disc
      name: Discussion
      description: "L\u2019\xE9tablissement et la gestion des cl\xE9s cryptographiques\
        \ peuvent \xEAtre effectu\xE9s au moyen de proc\xE9dures manuelles ou de m\xE9\
        canismes automatis\xE9s appuy\xE9s par des proc\xE9dures manuelles. Les organisations\
        \ doivent r\xE9pondre aux exigences d\u2019\xE9tablissement et de gestion\
        \ de cl\xE9s conform\xE9ment aux lois, aux d\xE9crets, aux politiques, aux\
        \ directives, aux r\xE9glementations et aux normes applicables qui pr\xE9\
        cisent les options, les niveaux et les param\xE8tres appropri\xE9s. Cette\
        \ exigence est associ\xE9e \xE0 l\u2019exigence **Protection cryptographique\
        \ 03.13.11**."
      translations:
        en:
          name: Discussion
          description: Cryptographic keys can be established and managed using either
            manual procedures or automated mechanisms supported by manual procedures.
            Organizations satisfy key establishment and management requirements in
            accordance with applicable federal laws, Orders in Council, policies,
            directives, regulations, and standards that specify appropriate options,
            levels, and parameters. This requirement is related to **Cryptographic
            protection 03.13.11**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.11
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.11
      name: Protection cryptographique
      translations:
        en:
          name: Cryptographic protection
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.11.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.11
      ref_id: 03.13.11.A
      description: "Mettre en \u0153uvre les types de cryptographie suivants pour\
        \ prot\xE9ger la confidentialit\xE9 de l\u2019information d\xE9sign\xE9e :\
        \ [Affectation : types de cryptographie d\xE9finis par l\u2019organisation]."
      translations:
        en:
          description: 'Implement the following types of cryptography when used to
            protect the confidentiality of specified information: [Assignment: organization-defined
            types of cryptography].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.11.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.11
      ref_id: 03.13.11.disc
      name: Discussion
      description: "La cryptographie est mise en \u0153uvre conform\xE9ment aux lois,\
        \ aux d\xE9crets, aux directives, aux r\xE9glementations, aux politiques,\
        \ aux normes et aux lignes directrices applicables. Une cryptographie valid\xE9\
        e selon la norme FIPS (pour Federal Information Processing Standard) est recommand\xE9\
        e pour la protection d\u2019information d\xE9sign\xE9e."
      translations:
        en:
          name: Discussion
          description: Cryptography is implemented in accordance with applicable laws,
            Orders in Council, directives, regulations, policies, standards, and guidelines.
            Federal information processing standard (FIPS)-validated cryptography
            is recommended for the protection of specified information.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.12
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.12
      name: Applications et appareils informatiques collaboratifs
      translations:
        en:
          name: Collaborative computing devices and applications
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.12.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.12
      ref_id: 03.13.12.A
      description: "Emp\xEAcher l\u2019activation \xE0 distance d\u2019applications\
        \ et d\u2019appareils informatiques collaboratifs, sauf pour les exceptions\
        \ suivantes : [Affectation : exceptions d\xE9finies par l\u2019organisation\
        \ pour lesquelles l\u2019activation \xE0 distance doit \xEAtre permise]."
      translations:
        en:
          description: 'Prohibit remote activation of collaborative computing devices
            and applications with the following exceptions: [Assignment: organization-defined
            exceptions where remote activation is to be allowed]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.12.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.12
      ref_id: 03.13.12.B
      description: "Indiquer de mani\xE8re explicite l\u2019utilisation permise pour\
        \ les utilisatrices et utilisateurs physiquement \xE0 proximit\xE9 des appareils."
      translations:
        en:
          description: Provide an explicit indication of use to users physically present
            at the devices
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.12.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.12
      ref_id: 03.13.12.disc
      name: Discussion
      description: "Les appareils informatiques collaboratifs incluent les tableaux\
        \ blancs, les microphones et les cam\xE9ras. Les ordinateurs blocs-notes,\
        \ les t\xE9l\xE9phones intelligents, les \xE9crans et les tablettes int\xE9\
        grant des cam\xE9ras et des microphones sont consid\xE9r\xE9s comme faisant\
        \ partie des appareils informatiques collaboratifs lors de l\u2019utilisation\
        \ d\u2019un logiciel de conf\xE9rence. L\u2019indication explicite d\u2019\
        utilisation comprend l\u2019envoi d\u2019un avis aux utilisatrices et utilisateurs\
        \ (par exemple, un menu contextuel indiquant qu\u2019un enregistrement est\
        \ en cours ou que le microphone est activ\xE9) lorsque des appareils informatiques\
        \ collaboratifs sont activ\xE9s. Les syst\xE8mes de vid\xE9oconf\xE9rence\
        \ d\xE9di\xE9s, qui exigent normalement qu\u2019une participante ou un participant\
        \ appelle les autres personnes ou se connectent pour activer la vid\xE9oconf\xE9\
        rence, sont exclus. Les solutions permettant d\u2019emp\xEAcher l\u2019utilisation\
        \ d\u2019appareils comprennent les bouchons pour cam\xE9ras Web et les boutons\
        \ pour d\xE9sactiver les microphones."
      translations:
        en:
          name: Discussion
          description: Collaborative computing devices include white boards, microphones,
            and cameras. Notebook computers, smartphones, display monitors, and tablets
            containing cameras and microphones are considered part of collaborative
            computing devices when conferencing software is in use. Indication of
            use includes notifying users (e.g., a pop-up menu stating that recording
            is in progress, or that the microphone has been turned on) when collaborative
            computing devices are activated. Dedicated video conferencing systems,
            which typically rely on one of the participants calling or connecting
            to the other party to activate the video conference, are excluded. Solutions
            to prevent device usage include webcam covers and buttons to disable microphones.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.13
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.13
      name: Code mobile
      translations:
        en:
          name: Mobile code
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.13.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.13
      ref_id: 03.13.13.A
      description: "D\xE9finir le code mobile et les technologies de code mobile acceptables."
      translations:
        en:
          description: Define acceptable mobile code and mobile code technologies
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.13.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.13
      ref_id: 03.13.13.B
      description: "Autoriser, surveiller et contr\xF4ler l\u2019utilisation de code\
        \ mobile."
      translations:
        en:
          description: Authorize, monitor, and control the use of mobile code
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.13.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.13
      ref_id: 03.13.13.disc
      name: Discussion
      description: "Le code mobile comprend des programmes informatiques ou des parties\
        \ de programme obtenus de syst\xE8mes distants, transmis sur un r\xE9seau\
        \ et ex\xE9cut\xE9s sur un syst\xE8me local sans installation explicite ou\
        \ ex\xE9cution par la ou le destinataire. Les d\xE9cisions concernant l\u2019\
        utilisation de code mobile reposent sur le degr\xE9 de possibilit\xE9 qu\u2019\
        une utilisation malveillante du code cause des dommages au syst\xE8me. Les\
        \ technologies de code mobile incluent les applets Java, JavaScript, HTML5,\
        \ VBScript et WebGL. Les restrictions d\u2019utilisation et les lignes directrices\
        \ sur la mise en \u0153uvre s\u2019appliquent \xE0 la s\xE9lection et \xE0\
        \ l\u2019utilisation de code mobile install\xE9 sur les serveurs ainsi que\
        \ le code mobile t\xE9l\xE9charg\xE9 et ex\xE9cut\xE9 sur les postes de travail\
        \ et les appareils individuels, y compris les ordinateurs blocs-notes, les\
        \ t\xE9l\xE9phones intelligents et les dispositifs intelligents. Les politiques\
        \ et proc\xE9dures li\xE9es au code mobile concernent les mesures prises afin\
        \ d\u2019emp\xEAcher le d\xE9veloppement, l\u2019acquisition et l\u2019utilisation\
        \ de code mobile non acceptable au sein du syst\xE8me, y compris exiger la\
        \ signature num\xE9rique <abbr title=\"Signature num\xE9rique&#10;M\xE9canisme\
        \ cryptographique employ\xE9 pour v\xE9rifier l&#x27;authenticit\xE9 et l&#x27;int\xE9\
        grit\xE9 d&#x27;un article (p. ex. un document, un logiciel).\"><sup>(?)</sup></abbr>\
        \ du code mobile par une source de confiance."
      translations:
        en:
          name: Discussion
          description: Mobile code includes software programs or parts of programs
            that are obtained from remote systems, transmitted across a network, and
            executed on a local system without explicit installation or execution
            by the recipient. Decisions regarding the use of mobile code are based
            on the potential for the code to cause damage to the system if used maliciously.
            Mobile code technologies include Java applets, JavaScript, HTML5, VBScript,
            and WebGL. Usage restrictions and implementation guidelines apply to the
            selection and use of mobile code installed on servers and mobile code
            downloaded and executed on individual workstations and devices, including
            notebook computers, smart phones, and smart devices. Mobile code policies
            and procedures address the actions taken to prevent the development, acquisition,
            and use of unacceptable mobile code within the system, including requiring
            mobile code to be digitally signed by a trusted source.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.15
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.13
      ref_id: 03.13.15
      name: "Authenticit\xE9 des sessions"
      translations:
        en:
          name: Session authenticity
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.15.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.15
      ref_id: 03.13.15.A
      description: "Prot\xE9ger l\u2019authenticit\xE9 des sessions de communication."
      translations:
        en:
          description: Protect the authenticity of communications sessions.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.15.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.13.15
      ref_id: 03.13.15.disc
      name: Discussion
      description: "La protection de l\u2019authenticit\xE9 des sessions porte sur\
        \ la protection des communications au niveau de la session plut\xF4t qu\u2019\
        au niveau des paquets. Cette protection permet d\u2019instaurer un niveau\
        \ de confiance ad\xE9quat aux deux extr\xE9mit\xE9s des sessions de communication\
        \ quant \xE0 l\u2019identit\xE9 des autres parties et \xE0 la validit\xE9\
        \ de l\u2019information transmise. La protection de l\u2019authenticit\xE9\
        \ comprend la protection contre les attaques par interception, le d\xE9tournement\
        \ de session et l\u2019insertion d\u2019information erron\xE9e dans les sessions."
      translations:
        en:
          name: Discussion
          description: Protecting session authenticity addresses communications protection
            at the session level, not at the packet level. Such protection establishes
            grounds for confidence at both ends of the communications sessions in
            the ongoing identities of other parties and the validity of the transmitted
            information. Authenticity protection includes protecting against adversary-in-the-middle
            attacks, session hijacking, and the insertion of false information into
            sessions.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.14
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.14'
      name: "Int\xE9grit\xE9 de l\u2019information et des syst\xE8mes"
      description: "Les contr\xF4les d\u2019int\xE9grit\xE9 de l\u2019information\
        \ et des syst\xE8mes appuient la protection de l\u2019int\xE9grit\xE9 des\
        \ composants du syst\xE8me et des donn\xE9es que le syst\xE8me traite. Ils\
        \ permettent \xE0 l\u2019organisation d\u2019\xE9tablir, de signaler et de\
        \ corriger les d\xE9fauts li\xE9s aux donn\xE9es et aux syst\xE8mes rapidement\
        \ afin d\u2019offrir une protection contre les programmes malveillants. Ils\
        \ permettent \xE9galement de surveiller les alertes et les avis de s\xE9curit\xE9\
        \ du syst\xE8me et d\u2019intervenir de mani\xE8re appropri\xE9e."
      translations:
        en:
          name: System and information integrity
          description: The System and information integrity controls support the protection
            of the integrity of the system components and the data that it processes.
            They allow an organization to identify, report and correct data and system
            flaws in a timely manner, to provide protection against malicious code,
            and to monitor system security alerts and advisories, and to take appropriate
            actions in response.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.01
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.14
      ref_id: 03.14.01
      name: "Correction des d\xE9fauts"
      translations:
        en:
          name: Flaw remediation
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.01.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.01
      ref_id: 03.14.01.A
      description: "\xC9tablir, signaler et corriger les d\xE9fauts du syst\xE8me."
      translations:
        en:
          description: Identify, report, and correct system flaws
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.01.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.01
      ref_id: 03.14.01.B
      description: "Installer les mises \xE0 jour de s\xE9curit\xE9 appropri\xE9es\
        \ des logiciels et des micrologiciels dans une p\xE9riode de [Affectation\
        \ : p\xE9riode d\xE9finie par l\u2019organisation] suivant la date de publication\
        \ des mises \xE0 jour."
      translations:
        en:
          description: 'Install security-relevant software and firmware updates within
            [Assignment: organization-defined time period] of the release of the updates'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.01
      ref_id: 03.14.01.disc
      name: Discussion
      description: "Les organisations doivent \xE9tablir les syst\xE8mes qui sont\
        \ touch\xE9s par les d\xE9fauts logiciels et micrologiciels, y compris les\
        \ vuln\xE9rabilit\xE9s qui d\xE9coulent de ces d\xE9fauts, et signaler cette\
        \ information au personnel responsable de la s\xE9curit\xE9 de l\u2019information\
        \ et de la protection de la vie priv\xE9e. Les mises \xE0 jour li\xE9es \xE0\
        \ la s\xE9curit\xE9 incluent les correctifs, les ensembles de modifications\
        \ provisoires, les correctifs d\u2019urgence et les signatures de logiciel\
        \ antivirus <abbr title=\"Logiciel antivirus&#10;Logiciel qui prot\xE8ge contre\
        \ les virus, les chevaux de Troie, les vers et les logiciels espions. Le logiciel\
        \ anti-virus proc\xE8de \xE0 l&#x27;analyse des fichiers afin d&#x27;identifier\
        \ des programmes qui sont ou pourraient \xEAtre malveillants. L&#x27;analyse\
        \ permet d&#x27;identifier : les virus connus, les virus auparavant inconnus\
        \ et les fichiers suspects.\"><sup>(?)</sup></abbr>. Les organisations doivent\
        \ corriger les d\xE9fauts d\xE9couverts au cours des \xE9valuations de s\xE9\
        curit\xE9, de la surveillance continue, des activit\xE9s d\u2019intervention\
        \ en cas d\u2019incident et du traitement des erreurs du syst\xE8me. Les organisations\
        \ peuvent tirer parti des ressources offertes (par exemple, les bases de donn\xE9\
        es CWE ou CVE) pour corriger les d\xE9fauts des syst\xE8mes. Les p\xE9riodes\
        \ d\xE9finies par l\u2019organisation pour la mise \xE0 jour de s\xE9curit\xE9\
        \ des logiciels et des micrologiciels peuvent varier en fonction de divers\
        \ facteurs, notamment la criticit\xE9 de la mise \xE0 jour (c\u2019est-\xE0\
        -dire la gravit\xE9 de la vuln\xE9rabilit\xE9 associ\xE9e \xE0 la faille d\xE9\
        couverte). Certains types de correctifs peuvent n\xE9cessiter plus de mises\
        \ \xE0 l\u2019essai que d\u2019autres."
      translations:
        en:
          name: Discussion
          description: Organizations identify systems that are affected by announced
            software and firmware flaws, including potential vulnerabilities that
            result from those flaws, and report this information to designated personnel
            with information security and privacy responsibilities. Security-relevant
            updates include patches, service packs, hot fixes, and anti-virus signatures.
            Organizations address the flaws discovered during security assessments,
            continuous monitoring, incident response activities, and system error
            handling. Organizations can take advantage of available resources (e.g.,
            <abbr title="Common Weakness Enumeration">CWE</abbr> or <abbr title="Common
            Vulnerabilities and Exposures">CVE</abbr> databases) when remediating
            system flaws. Organization-defined time periods for updating security-relevant
            software and firmware may vary based on a variety of factors, including
            the criticality of the update (i.e., severity of the vulnerability related
            to the discovered flaw). Some types of flaw remediation may require more
            testing than other types.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.14
      ref_id: 03.14.02
      name: Protection contre les programmes malveillants
      translations:
        en:
          name: Malicious code protection
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02
      ref_id: 03.14.02.A
      description: "Mettre en \u0153uvre des m\xE9canismes de protection contre les\
        \ programmes malveillants aux points d\u2019entr\xE9e et de sortie du syst\xE8\
        me afin de d\xE9tecter et d\u2019\xE9radiquer le code malveillant."
      translations:
        en:
          description: Implement malicious code protection mechanisms at system entry
            and exit points to detect and eradicate malicious code
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02
      ref_id: 03.14.02.B
      description: "Mettre \xE0 jour les m\xE9canismes de protection contre les programmes\
        \ malveillants d\xE8s que de nouvelles versions sont disponibles, conform\xE9\
        ment aux strat\xE9gies et proc\xE9dures de gestion des configurations."
      translations:
        en:
          description: Update malicious code protection mechanisms as new releases
            are available in accordance with configuration management policies and
            procedures
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.c
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02
      ref_id: 03.14.02.C
      description: "Configurer les m\xE9canismes de protection contre les programmes\
        \ malveillants de fa\xE7on \xE0 :"
      translations:
        en:
          description: 'Configure malicious code protection mechanisms to:'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.c.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.c
      ref_id: 03.14.02.C.1
      description: "effectuer un balayage du syst\xE8me tous les [Affectation : fr\xE9\
        quence d\xE9finie par l\u2019organisation] et des balayages en temps r\xE9\
        el des fichiers de sources externes aux points d\u2019extr\xE9mit\xE9 ou aux\
        \ points d\u2019entr\xE9e et de sortie du syst\xE8me lorsque des fichiers\
        \ sont t\xE9l\xE9charg\xE9s, ouverts ou ex\xE9cut\xE9s;"
      translations:
        en:
          description: 'perform scans of the system [assignment: organization-defined
            frequency] and real-time scans of files from external sources at endpoints
            or system entry and exit points as the files are downloaded, opened, or
            executed'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.c.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.c
      ref_id: 03.14.02.C.2
      description: "bloquer ou mettre en quarantaine le code malveillant ou entreprendre\
        \ d\u2019autres mesures d\u2019att\xE9nuation afin d\u2019intervenir lors\
        \ de la d\xE9tection de code malveillant."
      translations:
        en:
          description: block or quarantine malicious code, or take other mitigation
            actions in response to malicious code detection
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.02
      ref_id: 03.14.02.disc
      name: Discussion
      description: "Les insertions de code malveillant surviennent lors de l\u2019\
        exploitation de vuln\xE9rabilit\xE9s du syst\xE8me. Le code malveillant peut\
        \ \xEAtre ins\xE9r\xE9 dans le syst\xE8me de diff\xE9rentes fa\xE7ons, y compris\
        \ par courriel, par Internet et par des dispositifs de stockage portatifs.\
        \ Le code malveillant comprend les virus <abbr title=\"Virus&#10;Programme\
        \ informatique qui se propage en se copiant par lui-m\xEAme. Les virus informatiques\
        \ se propagent d\u2019un ordinateur \xE0 l\u2019autre, souvent \xE0 l\u2019\
        insu de l\u2019utilisateur, et causent des dommages de toutes sortes. Ils\
        \ peuvent faire afficher des messages irritants, voler des donn\xE9es ou m\xEA\
        me permettre \xE0 d\u2019autres utilisateurs de prendre le contr\xF4le de\
        \ l\u2019ordinateur infect\xE9.\"><sup>(?)</sup></abbr>, les vers, les chevaux\
        \ de Troie et les logiciels espions. Le code malveillant peut \xEAtre encod\xE9\
        \ sous diff\xE9rents formats, contenu dans des fichiers compress\xE9s ou cach\xE9\
        s, ou encore dissimul\xE9 dans des fichiers en utilisant des techniques comme\
        \ la st\xE9ganographie. Le code malveillant peut \xEAtre pr\xE9sent dans des\
        \ logiciels commerciaux sur \xE9tag\xE8re et dans des logiciels con\xE7us\
        \ sur mesure et peut comprendre des bombes logiques, des portes d\xE9rob\xE9\
        es et d\u2019autres types d\u2019attaques qui peuvent affecter la mission\
        \ et les activit\xE9s de l\u2019organisation. Des analyses p\xE9riodiques\
        \ du syst\xE8me et des balayages en temps r\xE9el des fichiers provenant de\
        \ sources externes lorsqu\u2019ils sont t\xE9l\xE9charg\xE9s, ouverts ou ex\xE9\
        cut\xE9s peuvent faciliter la d\xE9tection de code malveillant. Les m\xE9\
        canismes de protection contre les programmes malveillants peuvent \xE9galement\
        \ surveiller les syst\xE8mes afin de d\xE9tecter les comportements anormaux\
        \ ou inattendus et prendre les mesures appropri\xE9es.\n\nCes m\xE9canismes\
        \ comprennent des technologies ax\xE9es ou non sur les signatures. Les m\xE9\
        canismes de d\xE9tection qui ne sont pas ax\xE9s sur les signatures int\xE8\
        grent des techniques d\u2019intelligence artificielle <abbr title=\"Intelligence\
        \ artificielle&#10;Sous-domaine de l&#x27;informatique ayant trait au d\xE9\
        veloppement de programmes informatiques aptes \xE0 r\xE9soudre des probl\xE8\
        mes, \xE0 apprendre, \xE0 comprendre des langages, \xE0 interpr\xE9ter des\
        \ sc\xE8nes visuelles, bref, \xE0 se comporter de fa\xE7on \xE0 reproduire\
        \ les facult\xE9s cognitives de l&#x27;intelligence humaine.\"><sup>(?)</sup></abbr>\
        \ (IA) qui utilisent des heuristiques afin de d\xE9tecter, d\u2019analyser\
        \ et de d\xE9crire les caract\xE9ristiques ou les comportements des programmes\
        \ malveillants. Ils fournissent \xE9galement des contr\xF4les contre de tels\
        \ programmes malveillants pour lesquels il n\u2019existe pas encore de signature\
        \ ou de telles signatures s\u2019av\xE8rent inefficaces. Les cas o\xF9 les\
        \ signatures sont inexistantes ou inefficaces incluent les programmes malveillants\
        \ polymorphiques (c\u2019est-\xE0-dire le code pour lequel les signatures\
        \ sont modifi\xE9es lors de la r\xE9plication). Les m\xE9canismes qui ne sont\
        \ pas ax\xE9s sur les signatures incluent les technologies bas\xE9es sur la\
        \ r\xE9putation. Une gestion omnipr\xE9sente des configurations, des logiciels\
        \ anti-exploitation et des contr\xF4les d\u2019int\xE9grit\xE9 logicielle\
        \ peuvent \xE9galement \xEAtre efficaces pour emp\xEAcher l\u2019ex\xE9cution\
        \ de code non autoris\xE9.\n\nS\u2019il n\u2019est pas possible de d\xE9tecter\
        \ le code malveillant \xE0 l\u2019aide de m\xE9thodes ou de technologies de\
        \ d\xE9tection, les organisations peuvent miser sur des pratiques de codage\
        \ s\xE9curis\xE9es, le contr\xF4le et la gestion des configurations, des processus\
        \ d\u2019approvisionnement de confiance et des pratiques de suivi pour veiller\
        \ \xE0 ce que les logiciels n\u2019ex\xE9cutent que les fonctions pr\xE9vues.\
        \ Les organisations peuvent d\xE9terminer que d\u2019autres mesures s\u2019\
        imposent en r\xE9ponse \xE0 une d\xE9tection de code malveillant. Par exemple,\
        \ les organisations peuvent d\xE9finir des mesures \xE0 prendre en r\xE9ponse\
        \ \xE0 une d\xE9tection de code malveillant au cours d\u2019analyses, de t\xE9\
        l\xE9chargements malveillants ou d\u2019activit\xE9s malveillantes associ\xE9\
        s \xE0 une tentative d\u2019ouverture ou d\u2019ex\xE9cution de fichier."
      translations:
        en:
          name: Discussion
          description: 'Malicious code insertions occur through the exploitation of
            system vulnerabilities. Malicious code can be inserted into the system
            in a variety of ways, including email, the Internet, and portable storage
            devices. Malicious code includes viruses, worms, Trojan <abbr title="Trojan&#10;A
            malicious program that is disguised as or embedded within legitimate software."><sup>(?)</sup></abbr>
            horses, and spyware. Malicious code can be encoded in various formats,
            contained in compressed or hidden files, or hidden in files using techniques
            such as steganography. Malicious code may be present in commercial off-the-shelf
            software and custom-built software and could include logic bombs, backdoors,
            and other types of attacks that could affect organizational mission and
            business functions. Periodic scans of the system and real-time scans of
            files from external sources as files are downloaded, opened, or executed
            can detect malicious code. Malicious code protection mechanisms can also
            monitor systems for anomalous or unexpected behaviours and take appropriate
            actions.


            Malicious code protection mechanisms include signature- and non-signature-based
            technologies. Non-signature-based detection mechanisms include artificial
            intelligence <abbr title="Artificial intelligence&#10;A subfield of computer
            science that develops intelligent computer programs to behave in a way
            that would be considered intelligent if observed in a human (e.g. solve
            problems, learn from experience, understand language, interpret visual
            scenes)."><sup>(?)</sup></abbr> (AI) techniques that use heuristics to
            detect, analyze, and describe the characteristics or behaviour of malicious
            code. They also provide controls against such code for which signatures
            do not yet exist or for which existing signatures may not be effective.
            Malicious code for which active signatures do not yet exist or may be
            ineffective includes polymorphic malicious code (i.e., code that changes
            signatures when it replicates). Non-signature-based mechanisms include
            reputation-based technologies. Pervasive configuration management, anti-exploitation
            software, and software integrity controls may also be effective in preventing
            unauthorized code execution.


            If malicious code cannot be detected by detection methods or technologies,
            organizations can rely on secure coding practices, configuration management
            and control, trusted procurement processes, and monitoring practices to
            help ensure that the software only performs intended functions. Organizations
            may determine that different actions are warranted in response to the
            detection of malicious code. For example, organizations can define actions
            to be taken in response to the detection of malicious code during scans,
            malicious downloads, or malicious activity when attempting to open or
            execute files.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.14
      ref_id: 03.14.03
      name: "Alertes, avis et directives de s\xE9curit\xE9"
