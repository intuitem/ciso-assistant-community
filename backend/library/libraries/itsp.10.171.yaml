      ref_id: 03.03.01.B
      description: "V\xE9rifier et mettre \xE0 jour les types d\u2019\xE9v\xE9nements\
        \ s\xE9lectionn\xE9s pour la journalisation tous les [Affectation : fr\xE9\
        quence d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Review and update the event types selected for logging [Assignment:
            organization-defined frequency]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.01.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.01
      ref_id: 03.03.01.disc
      name: Discussion
      description: "Un \xE9v\xE9nement est une occurrence observable dans un syst\xE8\
        me, y compris toute activit\xE9 syst\xE8me illicite ou non autoris\xE9e. Les\
        \ organisations doivent \xE9tablir les types d\u2019\xE9v\xE9nements pour\
        \ lesquels la fonctionnalit\xE9 de journalisation est requise, notamment les\
        \ \xE9v\xE9nements qui sont li\xE9s \xE0 la s\xE9curit\xE9 des syst\xE8mes,\
        \ \xE0 la protection de la vie priv\xE9e et aux environnements dans lesquels\
        \ ces syst\xE8mes sont exploit\xE9s, afin de r\xE9pondre \xE0 des besoins\
        \ pr\xE9cis et continus en mati\xE8re de v\xE9rification. Les types d\u2019\
        \xE9v\xE9nements peuvent comprendre les changements de mot de passe, l\u2019\
        ex\xE9cution de fonctions privil\xE9gi\xE9es, les tentatives non r\xE9ussies\
        \ de connexion ou d\u2019acc\xE8s associ\xE9es aux syst\xE8mes, l\u2019utilisation\
        \ de privil\xE8ges d\u2019administrateur ou l\u2019utilisation de justificatifs\
        \ d\u2019identit\xE9 de tierce partie. Lors de l\u2019\xE9tablissement des\
        \ types d\u2019\xE9v\xE9nements \xE0 journaliser, les organisations doivent\
        \ consid\xE9rer les activit\xE9s de surveillance et de v\xE9rification du\
        \ syst\xE8me qui sont appropri\xE9es pour chaque exigence de s\xE9curit\xE9\
        . Pour d\xE9finir les types d\u2019\xE9v\xE9nements, les organisations doivent\
        \ consid\xE9rer la journalisation n\xE9cessaire pour couvrir les \xE9v\xE9\
        nements connexes, comme les \xE9tapes dans les processus distribu\xE9s bas\xE9\
        s sur une transaction (par exemple, les processus qui sont distribu\xE9s parmi\
        \ plusieurs organisations) ou encore les op\xE9rations qui surviennent dans\
        \ les architectures orient\xE9es services ou bas\xE9es sur le nuage.\n\nLes\
        \ exigences de surveillance et de v\xE9rification peuvent \xEAtre \xE9quilibr\xE9\
        es avec d\u2019autres besoins du syst\xE8me. Par exemple, les organisations\
        \ peuvent d\xE9terminer que les syst\xE8mes doivent avoir la capacit\xE9 de\
        \ journaliser tous les acc\xE8s aux fichiers, qu\u2019ils soient r\xE9ussis\
        \ ou non, mais d\u2019activer cette capacit\xE9 seulement dans des circonstances\
        \ particuli\xE8res pour ne pas nuire au rendement du syst\xE8me. Les types\
        \ d\u2019\xE9v\xE9nements qui sont journalis\xE9s par les organisations peuvent\
        \ changer au fil du temps. La v\xE9rification et la mise \xE0 jour des types\
        \ d\u2019\xE9v\xE9nements journalis\xE9s sont n\xE9cessaires afin de s\u2019\
        assurer qu\u2019ils demeurent pertinents."
      translations:
        en:
          name: Discussion
          description: 'An event is any observable occurrence in a system, including
            unlawful or unauthorized system activity. Organizations identify event
            types for which a logging functionality is needed. This includes events
            that are relevant to the security of systems, the privacy of individuals,
            and the environments in which those systems operate to meet specific and
            ongoing auditing needs. Event types can include password changes, the
            execution of privileged functions, failed logons or accesses related to
            systems, administrative privilege usage, or third-party credential usage.
            In determining event types that require logging, organizations consider
            the system monitoring and auditing that are appropriate for each of the
            security requirements. When defining event types, organizations consider
            the logging necessary to cover related events, such as the steps in distributed,
            transaction-based processes (e.g., processes that are distributed across
            multiple organizations) and actions that occur in service-oriented or
            cloud-based architectures.


            Monitoring and auditing requirements can be balanced with other system
            needs. For example, organizations may determine that systems must have
            the capability to log every file access, both successful and unsuccessful,
            but only activate that capability under specific circumstances due to
            the potential burden on system performance. The event types that are logged
            by organizations may change over time. Reviewing and updating the set
            of logged event types is necessary to ensure that the current set remains
            relevant.'
