        \xE9valuation et \xE0 la surveillance de la s\xE9curit\xE9 ou de la protection\
        \ de la vie priv\xE9e."
      translations:
        en:
          name: Audience
          description: "This publication is intended for various individuals and organizations\
            \ in the public and private sectors, including:\n\u2022 <abbr title=\"\
            Government of Canada\">GC</abbr> departments and agencies responsible\
            \ for managing and protecting specified information\n\u2022 non- <abbr\
            \ title=\"Government of Canada\">GC</abbr> organizations responsible for\
            \ protecting specified information\n\u2022 individuals with system development\
            \ lifecycle (SDLC) responsibilities\n\u2022 individuals with acquisition\
            \ or procurement responsibilities\n\u2022 individuals with system, security,\
            \ privacy or risk management and oversight responsibilities\n\u2022 individuals\
            \ with security or privacy assessment and monitoring responsibilities"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:1.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:1
      ref_id: '1.3'
      name: Structure de la publication organization
      description: "La suite de cette publication sera structur\xE9e comme suit :\n\
        \u2022 La **section 2 Principes de base** d\xE9crit les hypoth\xE8ses et la\
        \ m\xE9thodologie utilis\xE9es pour la mise au point des exigences de s\xE9\
        curit\xE9 qui visent \xE0 prot\xE9ger la confidentialit\xE9 de l\u2019information\
        \ d\xE9sign\xE9e. Elle pr\xE9sente \xE9galement le format des exigences et\
        \ les crit\xE8res d\u2019adaptation appliqu\xE9s aux lignes directrices du\
        \ Centre pour la cybers\xE9curit\xE9 pour obtenir les exigences.\n\u2022 La\
        \ **section 3 Exigences** \xE9num\xE8re les exigences de s\xE9curit\xE9 pour\
        \ la protection de la confidentialit\xE9 de l\u2019information d\xE9sign\xE9\
        e dans les organisations et les syst\xE8mes ne relevant pas du <abbr title=\"\
        gouvernement du Canada\">GC</abbr> .\n\nLes sections suivantes fournissent\
        \ des renseignements suppl\xE9mentaires pour appuyer la protection de l\u2019\
        information d\xE9sign\xE9e :\n\u2022 **Annexe A : Crit\xE8res d\u2019adaptation**\n\
        \u2022 **Annexe B : Param\xE8tres d\xE9finis par l\u2019organisation**"
      translations:
        en:
          name: Publication organization
          description: "The remainder of this publication is organized as follows:\n\
            \u2022 **Section 2 Fundamentals** describes the assumptions and methodology\
            \ used to develop the security requirements for protecting the confidentiality\
            \ of specified information, the format of the requirements, and the tailoring\
            \ criteria applied to the Cyber Centre guidelines to obtain the requirements\n\
            \u2022 **Section 3 Requirements** lists the security requirements for\
            \ protecting the confidentiality of specified information in non- <abbr\
            \ title=\"Government of Canada\">GC</abbr> systems and organizations\n\
            \nThe following sections provide additional information to support the\
            \ protection of specified information:\n\u2022 **Annex A: Tailoring criteria**\n\
            \u2022 **Annex B: Organization-defined parameters**"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: Principes de base
      description: "La pr\xE9sente section d\xE9crit les hypoth\xE8ses et la m\xE9\
        thodologie utilis\xE9es pour mettre au point les exigences visant \xE0 prot\xE9\
        ger la confidentialit\xE9 de l\u2019information d\xE9sign\xE9e dans les organisations\
        \ et les syst\xE8mes ne relevant pas du <abbr title=\"gouvernement du Canada\"\
        >GC</abbr>. Elle comprend \xE9galement les crit\xE8res d\u2019adaptation appliqu\xE9\
        s aux contr\xF4les dans l\u2019ITSP.10.033."
      translations:
        en:
          name: Fundamentals
          description: This section describes the assumptions and methodology used
            to develop the requirements to protect the confidentiality of specified
            information in non-<abbr title="Government of Canada">GC</abbr> systems
            and organizations. It also includes the tailoring criteria applied to
            the controls in ITSP.10.033.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:2.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:2
      ref_id: '2.1'
      name: "Hypoth\xE8ses concernant les exigences de s\xE9curit\xE9"
      description: "Les exigences de s\xE9curit\xE9 dans la pr\xE9sente publication\
        \ sont bas\xE9es sur les hypoth\xE8ses suivantes :\n\u2022 l\u2019information\
        \ du <abbr title=\"gouvernement du Canada\">GC</abbr> d\xE9sign\xE9e comme\
        \ \xE9tant de l\u2019information d\xE9sign\xE9e a toute la m\xEAme valeur,\
        \ peu importe si elle r\xE9side sur des syst\xE8mes relevant ou ne relevant\
        \ pas du <abbr title=\"gouvernement du Canada\">GC</abbr> ;\n\u2022 les exigences\
        \ l\xE9gislatives et r\xE9glementaires relatives \xE0 la protection de l\u2019\
        information d\xE9sign\xE9e sont coh\xE9rentes dans les organisations et les\
        \ syst\xE8mes relevant et ne relevant pas du <abbr title=\"gouvernement du\
        \ Canada\">GC</abbr> ;\n\u2022 les mesures de protection mises en \u0153uvre\
        \ afin de prot\xE9ger l\u2019information d\xE9sign\xE9e sont coh\xE9rentes\
        \ dans les organisations et les syst\xE8mes relevant et ne relevant pas du\
        \ <abbr title=\"gouvernement du Canada\">GC</abbr> ;\n\u2022 la valeur d\u2019\
        incidence sur la confidentialit\xE9 pour l\u2019information d\xE9sign\xE9\
        e n\u2019est pas inf\xE9rieure \xE0 faible (Prot\xE9g\xE9 A), mais sera moyenne\
        \ (Prot\xE9g\xE9 B) pour la plupart des jeux de donn\xE9es de grande taille\
        \ du <abbr title=\"gouvernement du Canada\">GC</abbr> ;\n\u2022 les organisations\
        \ ne relevant pas du <abbr title=\"gouvernement du Canada\">GC</abbr> peuvent\
        \ mettre en \u0153uvre directement une vari\xE9t\xE9 de solutions de s\xE9\
        curit\xE9 potentielles ou avoir recours \xE0 des fournisseurs de services\
        \ externes afin de r\xE9pondre aux exigences de s\xE9curit\xE9."
      translations:
        en:
          name: Security requirements assumptions
          description: "The security requirements in this publication are based on\
            \ the following assumptions:\n\u2022 <abbr title=\"Government of Canada\"\
            >GC</abbr> information designated as specified information has the same\
            \ value regardless of whether such information resides in a <abbr title=\"\
            Government of Canada\">GC</abbr> or a non- <abbr title=\"Government of\
            \ Canada\">GC</abbr> system or organization\n\u2022 statutory and regulatory\
            \ requirements for the protection of specified information are consistent\
            \ in <abbr title=\"Government of Canada\">GC</abbr> and non- <abbr title=\"\
            Government of Canada\">GC</abbr> systems and organizations\n\u2022 safeguards\
            \ implemented to protect specified information are consistent in <abbr\
            \ title=\"Government of Canada\">GC</abbr> and non- <abbr title=\"Government\
            \ of Canada\">GC</abbr> systems and organizations\n\u2022 the confidentiality\
            \ impact value for specified information is no less than low (Protected\
            \ A), but will be medium for most large <abbr title=\"Government of Canada\"\
            >GC</abbr> datasets\n\u2022 non- <abbr title=\"Government of Canada\"\
            >GC</abbr> organizations can directly implement a variety of potential\
            \ security solutions or use external service providers to satisfy security\
            \ requirements"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:2.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:2
      ref_id: '2.2'
      name: "M\xE9thodologie d\u2019\xE9laboration des exigences de s\xE9curit\xE9"
      description: "En commen\xE7ant par les contr\xF4les de l\u2019ITSP.10.033 dans\
        \ le profil confidentialit\xE9 moyenne, int\xE9grit\xE9 <abbr title=\"Int\xE9\
        grit\xE9&#10;Aptitude \xE0 prot\xE9ger l&#x27;information contre les modifications\
        \ ou les suppressions non intentionnelles ou inopportunes. L&#x27;int\xE9\
        grit\xE9 permet de savoir si l&#x27;information est conforme \xE0 ce qu&#x27;elle\
        \ est cens\xE9e \xEAtre. L&#x27;int\xE9grit\xE9 s&#x27;applique \xE9galement\
        \ aux processus op\xE9rationnels, \xE0 la logique des applications logicielles,\
        \ au mat\xE9riel ainsi qu&#x27;au personnel.\"><sup>(?)</sup></abbr> moyenne,\
        \ disponibilit\xE9 <abbr title=\"Disponibilit\xE9&#10;Caract\xE9ristique de\
        \ l&#x27;information ou des syst\xE8mes qui sont accessibles aux personnes\
        \ autoris\xE9es au moment o\xF9 celles-ci en ont besoin. La disponibilit\xE9\
        \ est un attribut des actifs informationnels, logiciels, et mat\xE9riels (l&#x27;infrastructure\
        \ et ses composantes). Il est \xE9galement entendu que la disponibilit\xE9\
        \ comprend la protection des actifs contre les acc\xE8s non autoris\xE9s ou\
        \ les compromissions.\"><sup>(?)</sup></abbr> moyenne (impact moyen) de l\u2019\
        ITSP.10.033-01, les contr\xF4les ont \xE9t\xE9 adapt\xE9s afin d\u2019\xE9\
        liminer les contr\xF4les ou les parties de contr\xF4les qui :\n\u2022 rel\xE8\
        vent principalement du <abbr title=\"gouvernement du Canada\">GC</abbr> ;\n\
        \u2022 ne sont pas directement li\xE9s \xE0 la protection de la confidentialit\xE9\
        \ de l\u2019information d\xE9sign\xE9e;\n\u2022 sont d\xE9j\xE0 abord\xE9\
        s ad\xE9quatement par d\u2019autres contr\xF4les;\n\u2022 ne s\u2019appliquent\
        \ pas.\n\nLes exigences de s\xE9curit\xE9 de l\u2019ITSP.10.171 repr\xE9sentent\
        \ un sous-ensemble des contr\xF4les n\xE9cessaires \xE0 la protection de la\
        \ confidentialit\xE9 de l\u2019information d\xE9sign\xE9e. Les exigences de\
        \ s\xE9curit\xE9 sont organis\xE9es en 17 familles, tel qu\u2019il est illustr\xE9\
        \ dans le tableau 1. Chaque famille contient les exigences associ\xE9es au\
        \ sujet de s\xE9curit\xE9 d\u2019ordre g\xE9n\xE9ral qu\u2019elle aborde.\
        \ Certaines familles de l\u2019ITSP.10.033 n\u2019ont pas \xE9t\xE9 incluses\
        \ dans la pr\xE9sente, car elles ne contribuent pas directement \xE0 la confidentialit\xE9\
        . Par exemple, les activit\xE9s de la famille Traitement des renseignements\
        \ personnels et transparence (PT) ne sont pas incluses, car elles portent\
        \ sur le traitement de renseignements personnels et non leur confidentialit\xE9\
        . La famille Gestion des programmes (PM) n\u2019est pas incluse, car elle\
        \ n\u2019est pas associ\xE9e \xE0 la confidentialit\xE9. Enfin, la famille\
        \ Planification d\u2019urgence (CP) n\u2019est pas incluse, car elle traite\
        \ de la disponibilit\xE9 de l\u2019information.\n\nLa liste qui suit donne\
        \ les familles d\u2019exigences de s\xE9curit\xE9 :\n\u2022 Contr\xF4le d\u2019\
        acc\xE8s\n\u2022 Sensibilisation et formation\n\u2022 V\xE9rification et responsabilit\xE9\
        \n\u2022 Gestion des configurations\n\u2022 Identification et authentification\n\
        \u2022 Intervention en cas d\u2019incident\n\u2022 Maintenance\n\u2022 Protection\
        \ des supports\n\u2022 S\xE9curit\xE9 du personnel\n\u2022 Protection physique\n\
        \u2022 \xC9valuation des risques\n\u2022 \xC9valuation de s\xE9curit\xE9 et\
        \ surveillance\n\u2022 Protection des syst\xE8mes et des communications\n\u2022\
        \ Int\xE9grit\xE9 de l\u2019information et des syst\xE8mes\n\u2022 Planification\n\
        \u2022 Acquisition des syst\xE8mes et des services\n\u2022 Gestion des risques\
        \ li\xE9s \xE0 la cha\xEEne d\u2019approvisionnement\n\nLes param\xE8tres\
        \ d\xE9finis par l\u2019organisation (ODP pour Organization-defined Parameter)\
        \ sont inclus dans certaines exigences de s\xE9curit\xE9. Les <abbr title=\"\
        param\xE8tres d\xE9finis par l\u2019organisation\">ODP</abbr> offrent une\
        \ meilleure souplesse avec l\u2019utilisation d\u2019affectations et de s\xE9\
        lections permettant aux minist\xE8res et organismes du <abbr title=\"gouvernement\
        \ du Canada\">GC</abbr>, ainsi qu\u2019aux organisations ne relevant pas du\
        \ <abbr title=\"gouvernement du Canada\">GC</abbr>, de sp\xE9cifier des valeurs\
        \ pour les param\xE8tres d\xE9sign\xE9s dans les exigences. Les affectations\
        \ et les s\xE9lections servent \xE0 adapter les exigences de s\xE9curit\xE9\
        \ en fonction de besoins particuliers en mati\xE8re de protection. L\u2019\
        \xE9tablissement des valeurs des <abbr title=\"param\xE8tres d\xE9finis par\
        \ l\u2019organisation\">ODP</abbr> peut \xEAtre guid\xE9 et inform\xE9 par\
        \ des lois, des d\xE9crets, des directives, des r\xE9glementations, des politiques,\
        \ des normes, des lignes directrices ou des besoins li\xE9s \xE0 la mission\
        \ et aux activit\xE9s. Apr\xE8s avoir sp\xE9cifi\xE9 les valeurs des <abbr\
        \ title=\"param\xE8tres d\xE9finis par l\u2019organisation\">ODP</abbr>, elles\
        \ font partie int\xE9grante de l\u2019exigence. Des crochets qui se trouvent\
        \ dans un \xE9nonc\xE9 de contr\xF4le ou d\u2019activit\xE9 indiquent que\
        \ la lectrice ou le lecteur doit ins\xE9rer une valeur d\u2019<abbr title=\"\
        param\xE8tres d\xE9finis par l\u2019organisation\">ODP</abbr> afin de permettre\
        \ \xE0 l\u2019organisation d\u2019adapter le contr\xF4le \xE0 son contexte\
        \ particulier.\n\nLes <abbr title=\"param\xE8tres d\xE9finis par l\u2019organisation\"\
        >ODP</abbr> sont une partie importante de la sp\xE9cification d\u2019une exigence\
        \ de s\xE9curit\xE9. Ils offrent aux organisations la souplesse et la sp\xE9\
        cificit\xE9 n\xE9cessaires pour d\xE9finir clairement leurs exigences en mati\xE8\
        re de s\xE9curit\xE9 pour la protection de l\u2019information d\xE9sign\xE9\
        e, en fonction de leur mission, de leurs activit\xE9s, de leurs environnements\
        \ op\xE9rationnels et de leur tol\xE9rance au risque. De plus, les <abbr title=\"\
        param\xE8tres d\xE9finis par l\u2019organisation\">ODP</abbr> permettent d\u2019\
        assurer l\u2019uniformit\xE9 des \xE9valuations de s\xE9curit\xE9 qui visent\
        \ \xE0 d\xE9terminer si les exigences de s\xE9curit\xE9 sp\xE9cifi\xE9es ont\
        \ \xE9t\xE9 satisfaites ou non. Si un minist\xE8re ou organisme du <abbr title=\"\
        gouvernement du Canada\">GC</abbr>, ou encore un groupe de minist\xE8res ou\
        \ d\u2019organismes, ne pr\xE9cise pas de valeur ou d\u2019intervalle de valeurs\
        \ pour un <abbr title=\"param\xE8tres d\xE9finis par l\u2019organisation\"\
        >ODP</abbr>, les organisations ne relevant pas du <abbr title=\"gouvernement\
        \ du Canada\">GC</abbr> devront affecter la ou les valeurs afin de satisfaire\
        \ \xE0 l\u2019exigence de s\xE9curit\xE9.\n\nChaque exigence comprend une\
        \ section de discussion d\xE9coulant des sections de discussion qui se trouvent\
        \ dans le document NIST SP 800-53 (en anglais seulement). Ces sections offrent\
        \ des renseignements suppl\xE9mentaires afin de faciliter la mise en \u0153\
        uvre et l\u2019\xE9valuation des exigences. Elles sont informatives, et non\
        \ normatives. Les sections de discussion ne sont pas destin\xE9es \xE0 \xE9\
        tendre la port\xE9e d\u2019une exigence ni \xE0 influencer les solutions adopt\xE9\
        es par les organisations pour satisfaire \xE0 une exigence. Les exemples fournis\
        \ sont notionnels, non exhaustifs et ne pr\xE9sentent pas toutes les options\
        \ offertes aux organisations. La section \xAB R\xE9f\xE9rences \xBB pr\xE9\
        sente les sources pour les contr\xF4les ou les activit\xE9s d\u2019assurance\
        \ tir\xE9es de l\u2019ITSP.10.033 et \xE9num\xE8re les publications pertinentes\
        \ permettant d\u2019obtenir des renseignements suppl\xE9mentaires sur le sujet\
        \ d\xE9crit dans l\u2019exigence.\n\nLe pr\xE9sent document est la premi\xE8\
        re version de la publication canadienne. Ainsi, les contr\xF4les du document\
        \ NIST SP 800 171 (en anglais seulement), r\xE9vision 3, qui n\u2019ont pas\
        \ \xE9t\xE9 inclus dans la pr\xE9sente publication portent la mention \xAB\
        \ Non affect\xE9 \xBB afin de conserver la num\xE9rotation aux fins d\u2019\
        interop\xE9rabilit\xE9.\n\nLa structure et le contenu d\u2019une exigence\
        \ de s\xE9curit\xE9 type sont illustr\xE9s ci-dessous \xE0 titre d\u2019exemple.\n\
        \nLe terme \xAB organisation \xBB est employ\xE9 dans un grand nombre d\u2019\
        exigences de s\xE9curit\xE9 et sa signification peut varier en fonction du\
        \ contexte. Par exemple, dans une exigence de s\xE9curit\xE9 comportant un\
        \ <abbr title=\"param\xE8tres d\xE9finis par l\u2019organisation\">ODP</abbr>,\
        \ une organisation peut d\xE9signer soit le minist\xE8re ou organisme du <abbr\
        \ title=\"gouvernement du Canada\">GC</abbr>, soit l\u2019organisation ne\
        \ relevant pas du <abbr title=\"gouvernement du Canada\">GC</abbr> qui doit\
        \ \xE9tablir les valeurs de param\xE8tre pour l\u2019exigence.\n\nL\u2019\
        annexe A d\xE9crit les crit\xE8res d\u2019adaptation des contr\xF4les de s\xE9\
        curit\xE9 qui servent \xE0 \xE9laborer les exigences de s\xE9curit\xE9 et\
        \ les r\xE9sultats du processus d\u2019adaptation. Elle offre une liste des\
        \ contr\xF4les et des activit\xE9s tir\xE9s de l\u2019ITSP.10.033 qui appuient\
        \ les exigences, ainsi que les contr\xF4les et les activit\xE9s qui ont \xE9\
        t\xE9 \xE9limin\xE9s du profil impact moyen, conform\xE9ment aux crit\xE8\
        res d\u2019adaptation."
      translations:
        en:
          name: Security requirement development methodology
          description: "Starting with the ITSP.10.033 controls in the ITSP.10.033-01\
            \ Medium impact profile, the controls are tailored to eliminate selected\
            \ controls or parts of controls that are:\n\u2022 primarily the responsibility\
            \ of the <abbr title=\"Government of Canada\">GC</abbr>\n\u2022 not directly\
            \ related to protecting the confidentiality of specified information\n\
            \u2022 adequately addressed by other related controls\n\u2022 not applicable\n\
            \nITSP.10.171 security requirements represent a subset of the controls\
            \ that are necessary to protect the confidentiality of specified information.\
            \ The security requirements are organized into 17 families, as illustrated\
            \ in Table 1. Each family contains the requirements related to its general\
            \ security topic. Certain families from ITSP.10.033 are not included because\
            \ they do not directly contribute to confidentiality. For example, the\
            \ Personal information handling and transparency (PT) family is not included\
            \ because it is about handling personal information (PI), not about the\
            \ confidentiality of the <abbr title=\"personal information\">PI</abbr>.\
            \ The Program management (PM) family is not included because it is not\
            \ related to confidentiality. Finally, the Contingency planning (CP) family\
            \ is not included because it addresses availability <abbr title=\"Availability&#10;The\
            \ ability for the right people to access the right information or systems\
            \ when needed. Availability is applied to information assets, software,\
            \ and hardware (infrastructure and its components). Implied in its definition\
            \ is that availability includes the protection of assets from unauthorized\
            \ access and compromise.\"><sup>(?)</sup></abbr>.\n\nThe following are\
            \ the security requirements families:\n\u2022 Access control\n\u2022 Awareness\
            \ and training\n\u2022 Audit and accountability\n\u2022 Configuration\
            \ management\n\u2022 Identification and authentication\n\u2022 Incident\
            \ response\n\u2022 Maintenance\n\u2022 Media protection\n\u2022 Personnel\
            \ security\n\u2022 Physical protection\n\u2022 Risk assessment\n\u2022\
            \ Security assessment and monitoring\n\u2022 System and communications\
            \ protection\n\u2022 System and information integrity\n\u2022 Planning\n\
            \u2022 System and services acquisition\n\u2022 Supply chain risk management\n\
            \nOrganization-defined parameters (ODPs) are included in certain security\
            \ requirements. <abbr title=\"organization-defined parameter\">ODP</abbr>s\
            \ provide flexibility through the use of assignment and selection operations\
            \ to allow <abbr title=\"Government of Canada\">GC</abbr> departments\
            \ and agencies and non-<abbr title=\"Government of Canada\">GC</abbr>\
            \ organizations to specify values for the designated parameters in the\
            \ requirements. Assignment and selection operations allow security requirements\
            \ to be customized based on specific protection needs. The determination\
            \ of <abbr title=\"organization-defined parameter\">ODP</abbr> values\
            \ can be guided and informed by laws, Orders in Council, directives, regulations,\
            \ policies, standards, guidance, or mission and business needs. Once specified,\
            \ <abbr title=\"organization-defined parameter\">ODP</abbr> values become\
            \ part of the requirement. When present in a control or activity statement,\
            \ the square brackets indicate that there is an <abbr title=\"organization-defined\
            \ parameter\">ODP</abbr> that needs to be inserted by the reader in order\
            \ for an organization to tailor the control to their context.\n\n<abbr\
            \ title=\"organization-defined parameter\">ODP</abbr>s are an important\
            \ part of specifying a security requirement. <abbr title=\"organization-defined\
            \ parameter\">ODP</abbr>s provide both the flexibility and the specificity\
            \ needed by organizations to clearly define their specified information\
            \ security requirements according to their particular missions, business\
            \ functions, operational environments and risk tolerance. In addition,\
            \ <abbr title=\"organization-defined parameter\">ODP</abbr>s support consistent\
            \ security assessments to determine if specified security requirements\
            \ have been satisfied. If a <abbr title=\"Government of Canada\">GC</abbr>\
            \ department or agency, or a group of departments or agencies, does not\
            \ specify a particular value or range of values for an <abbr title=\"\
            organization-defined parameter\">ODP</abbr>, non-<abbr title=\"Government\
            \ of Canada\">GC</abbr> organizations must assign the value or values\
            \ to complete the security requirement.\n\nEach requirement includes a\
            \ discussion section, derived from the control discussion sections in\
            \ NIST SP 800-53. These sections provide additional information to facilitate\
            \ the implementation and assessment of the requirements. They are informative,\
            \ not normative. The discussion sections are not intended to extend the\
            \ scope of a requirement or to influence the solutions that organizations\
            \ may use to satisfy a requirement. Examples provided are notional, not\
            \ exhaustive, and do not reflect all the potential options available to\
            \ organizations. The \u201CReferences\u201D section provides the source\
            \ controls or assurance activities from ITSP.10.033, and a list of relevant\
            \ publications with additional information on the topic described in the\
            \ requirement.\n\nBecause this is the first iteration of the Canadian\
            \ publication, controls that were withdrawn in NIST SP 800-171 Revision\
            \ 3 have been labelled as \u201Cnot allocated\u201D to keep the same numbering\
            \ for interoperability purposes.\n\nThe structure and content of a typical\
            \ security requirement is provided in the example below.\n\nThe term \u201C\
            organization\u201D is used in many security requirements, and its meaning\
            \ depends on context. For example, in a security requirement with an <abbr\
            \ title=\"organization-defined parameter\">ODP</abbr>, an organization\
            \ can refer to either the <abbr title=\"Government of Canada\">GC</abbr>\
            \ department or agency or to the non-<abbr title=\"Government of Canada\"\
            >GC</abbr> organization establishing the parameter values for the requirement.\n\
            \nAnnex A describes the security control <abbr title=\"Security control&#10;A\
            \ management, operational, or technical high-level security requirement\
            \ needed for an information system to protect the confidentiality, integrity,\
            \ and availability of its IT assets. Security controls can be applied\
            \ by using a variety of security solutions that can include security products,\
            \ security policies, security practices, and security procedures.\"><sup>(?)</sup></abbr>\
            \ tailoring criteria used to develop the security requirements and the\
            \ results of the tailoring process. It provides a list of controls and\
            \ activities from ITSP.10.033 that support the requirements and the controls\
            \ and activities that have been eliminated from the Medium impact profile\
            \ in accordance with the tailoring criteria."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3
      assessable: false
      depth: 1
      ref_id: '3'
      name: Exigences
      description: "Cette section d\xE9crit les 17 familles d\u2019exigences de s\xE9\
        curit\xE9 visant \xE0 prot\xE9ger la confidentialit\xE9 de l\u2019information\
        \ d\xE9sign\xE9e dans les organisations et les syst\xE8mes ne relevant pas\
        \ du <abbr title=\"gouvernement du Canada\">GC</abbr>. Dans la pr\xE9sente\
        \ section, le terme \xAB syst\xE8me \xBB fait r\xE9f\xE9rence aux syst\xE8\
        mes ou aux composants de syst\xE8me ne relevant pas du <abbr title=\"gouvernement\
        \ du Canada\">GC</abbr> qui g\xE8rent, traitent, stockent ou transmettent\
        \ de l\u2019information d\xE9sign\xE9e ou qui offrent une protection pour\
        \ de tels syst\xE8mes ou composants. Les exigences de s\xE9curit\xE9 ne mentionnent\
        \ pas toutes l\u2019information d\xE9sign\xE9e de mani\xE8re explicite. Les\
        \ exigences qui ne mentionnent pas l\u2019information d\xE9sign\xE9e de mani\xE8\
        re explicite sont incluses, car elles ont une incidence directe sur la protection\
        \ de l\u2019information d\xE9sign\xE9e lors du traitement, du stockage ou\
        \ de la transmission de ce type d\u2019information.\n\nIl peut y avoir des\
        \ limites quant \xE0 la fa\xE7on dont certains syst\xE8mes, y compris les\
        \ syst\xE8mes sp\xE9cialis\xE9s (par exemple, les syst\xE8mes de contr\xF4\
        le industriels ou de processus, les dispositifs m\xE9dicaux ou les machines\
        \ \xE0 commande num\xE9rique par ordinateur) peuvent appliquer certaines exigences\
        \ de s\xE9curit\xE9. Pour tenir compte de ces limites, le plan de s\xE9curit\xE9\
        \ du syst\xE8me (tel qu\u2019il est indiqu\xE9 dans l\u2019exigence **Plan\
        \ de s\xE9curit\xE9 du syst\xE8me 03.15.02**) est utilis\xE9 afin de d\xE9\
        crire toutes les exceptions durables aux exigences de s\xE9curit\xE9. De plus,\
        \ les plans d\u2019action et des jalons servent \xE0 g\xE9rer les lacunes\
        \ individuelles, isol\xE9es ou temporaires (tel qu\u2019il est indiqu\xE9\
        \ dans l\u2019exigence **Plan d'action et des jalons 03.12.02**).\n\nLes exigences\
        \ de s\xE9curit\xE9 dans cette section ne s\u2019appliquent qu\u2019aux composants\
        \ des syst\xE8mes ne relevant pas du <abbr title=\"gouvernement du Canada\"\
        >GC</abbr> qui traitent, stockent ou transmettent de l\u2019information d\xE9\
        sign\xE9e ou qui offrent une protection pour de tels composants."
      translations:
        en:
          name: Requirements
          description: "This section describes 17 families of security requirements\
            \ for protecting the confidentiality of specified information in non-<abbr\
            \ title=\"Government of Canada\">GC</abbr> systems and organizations.\
            \ In this section, the term \u201Csystem\u201D refers to non-<abbr title=\"\
            Government of Canada\">GC</abbr> systems or system components that handle,\
            \ process, store or transmit specified information, or that provide protection\
            \ for such systems or components. Not all security requirements mention\
            \ specified information explicitly. Requirements that do not mention specified\
            \ information explicitly are included because they directly affect the\
            \ protection of specified information during its processing, storage or\
            \ transmission.\n\nThere may be limitations to how some systems, including\
            \ specialized systems (e.g., industrial/process control systems, medical\
            \ devices, or computer numerical control machines) can apply certain security\
            \ requirements. To accommodate such issues, the system security plan \u2014\
            \ as reflected in requirement **System security plan 03.15.02** \u2014\
            \ is used to describe any enduring exceptions to the security requirements.\
            \ Plans of action and milestones are used to manage individual, isolated\
            \ or temporary deficiencies, as reflected in requirement **Plan of action\
            \ and milestones 03.12.02**.\n\nThe security requirements in this section\
            \ are only applicable to components of non-<abbr title=\"Government of\
            \ Canada\">GC</abbr> systems that process, store or transmit specified\
            \ information or that provide protection for such components."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
