    translations:
      en:
        name: '[ITSP.10.171] Protecting specified information in non-Government of
          Canada systems and organizations'
        description: "Protecting Specified Information is of paramount importance\
          \ to Government of Canada (GC) departments and agencies and can directly\
          \ impact the GC\u2019s ability to successfully conduct its essential missions\
          \ and functions. This publication provides GC departments and agencies with\
          \ recommended security requirements for protecting the confidentiality of\
          \ specified information when it resides in non-GC systems and organizations.\
          \ These requirements apply to the components of non-GC systems that handle,\
          \ process, store or transmit CI, or that provide protection for such components.\
          \ The security requirements are intended for use by GC departments and agencies\
