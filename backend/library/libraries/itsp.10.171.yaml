    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.20.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.20
      ref_id: 03.01.20.disc
      name: Discussion
      description: "Les syst\xE8mes externes sont des syst\xE8mes qui sont utilis\xE9\
        s par l\u2019organisation, mais qui ne font pas partie de celle ci. Ces syst\xE8\
        mes comprennent notamment les syst\xE8mes, les composants syst\xE8me ou les\
        \ dispositifs personnels; les dispositifs de traitement et de communication\
        \ appartenant \xE0 une entreprise priv\xE9e dans des installations commerciales\
        \ ou publiques; les syst\xE8mes d\xE9tenus ou contr\xF4l\xE9s par des organisations\
        \ non f\xE9d\xE9rales; et les syst\xE8mes g\xE9r\xE9s par des entrepreneurs.\
        \ Les organisations ont l\u2019option d\u2019interdire l\u2019utilisation\
        \ de tous les types de syst\xE8mes externes ou de certains types de syst\xE8\
        mes externes (par exemple, interdire l\u2019utilisation de syst\xE8mes externes\
        \ qui n\u2019appartiennent pas \xE0 l\u2019organisation). Les conditions g\xE9\
        n\xE9rales doivent \xEAtre conformes aux relations de confiance \xE9tablies\
        \ avec les entit\xE9s qui poss\xE8dent, utilisent ou maintiennent les syst\xE8\
        mes externes, et doivent comprendre une description des responsabilit\xE9\
        s partag\xE9es.\n\nLes personnes autoris\xE9es comprennent notamment le personnel\
        \ de l\u2019organisation, les entrepreneures et entrepreneurs ou toute autre\
        \ personne autoris\xE9e \xE0 acc\xE9der au syst\xE8me organisationnel et \xE0\
        \ qui l\u2019organisation est en droit d\u2019imposer des r\xE8gles de conduite\
        \ pr\xE9cises concernant l\u2019acc\xE8s au syst\xE8me. Les restrictions que\
        \ les organisations peuvent imposer aux personnes autoris\xE9es peuvent d\xE9\
        pendre des relations de confiance entre l\u2019organisation et les entit\xE9\
        s externes. Les organisations doivent avoir l\u2019assurance que les syst\xE8\
        mes externes satisfont aux exigences de s\xE9curit\xE9 afin qu\u2019ils ne\
        \ compromettent pas ou n\u2019endommagent pas le syst\xE8me de l\u2019organisation,\
        \ ou encore qu\u2019ils ne nuisent pas au syst\xE8me. Cette exigence est associ\xE9\
        e \xE0 l\u2019exigence **Services de syst\xE8mes externes 03.16.03**."
      translations:
        en:
          name: Discussion
          description: 'External systems are systems that are used by but are not
            part of the organization. These systems include personally owned systems,
            system components, or devices; privately owned computing and communication
            devices in commercial or public facilities; systems owned or controlled
            by non-federal organizations; and systems managed by contractors. Organizations
            have the option to prohibit the use of any type of external system or
            specified types of external systems, (e.g., prohibit the use of external
            systems that are not organization-owned). Terms and conditions are consistent
            with the trust relationships established with the entities that own, operate,
            or maintain external systems and include descriptions of shared responsibilities.


            Authorized individuals include organizational personnel, contractors,
            or other individuals with authorized access to the organizational system
            and over whom the organization has the authority to impose specific rules
            of behaviour regarding system access. Restrictions that organizations
            impose on authorized individuals may vary depending on the trust relationships
            between the organization and external entities. Organizations need assurance
            that the external systems satisfy the necessary security requirements
            so as not to compromise <abbr title="Compromise&#10;The intentional or
            unintentional disclosure of information, which adversely impacts its confidentiality,
            integrity, or availability."><sup>(?)</sup></abbr>, damage, or harm the
            system. This requirement is related to **External system services 03.16.03**.'
