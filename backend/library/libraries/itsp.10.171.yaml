urn: urn:intuitem:risk:library:itsp.10.171
locale: fr
ref_id: ITSP.10.171
name: "[ITSP.10.171] Protection de l\u2019information d\xE9sign\xE9e dans les organisations\
  \ et les syst\xE8mes ne relevant pas du gouvernement du Canada"
description: "La protection de l\u2019information d\xE9sign\xE9e rev\xEAt une importance\
  \ capitale pour les minist\xE8res et organismes du gouvernement du Canada (GC) et\
  \ peut avoir une incidence directe sur la capacit\xE9 du GC de r\xE9aliser ses missions\
  \ et ses fonctions essentielles avec succ\xE8s. Cette publication offre aux minist\xE8\
  res et aux organismes du GC des exigences de s\xE9curit\xE9 recommand\xE9es afin\
  \ de prot\xE9ger la confidentialit\xE9 de l\u2019information d\xE9sign\xE9e se trouvant\
  \ dans des organisations et des syst\xE8mes ne relevant pas du GC. Ces exigences\
  \ s\u2019appliquent aux composants des syst\xE8mes ne relevant pas du GC qui g\xE8\
  rent, traitent, stockent ou transmettent de l\u2019information d\xE9sign\xE9e ou\
  \ qui prot\xE8gent de tels composants. Les exigences de s\xE9curit\xE9 sont destin\xE9\
  es \xE0 l\u2019usage des minist\xE8res et organismes du GC dans des contrats ou\
  \ d\u2019autres ententes \xE9tablis avec des organisations ne relevant pas du GC.\n\
  \nLe pr\xE9sent document est une version canadienne de la publication du National\
  \ Institute of Standards and Technology intitul\xE9e [NIST SP 800-171 Protecting\
  \ Controlled Unclassified Information in Nonfederal Systems and Organizations (en\
  \ anglais seulement)](https://csrc.nist.gov/pubs/sp/800/171/r3/final). Le Centre\
  \ pour la cybers\xE9curit\xE9 produira une publication compl\xE9mentaire \xE0 utiliser\
  \ conjointement avec le document intitul\xE9 [NIST SP 800-171A Assessing Security\
  \ Requirements for Controlled Unclassified Information (en anglais seulement)](https://csrc.nist.gov/pubs/sp/800/171/a/r3/final).\
  \ Ce document fournira un ensemble complet de proc\xE9dures pour \xE9valuer les\
  \ exigences de s\xE9curit\xE9. Dans l\u2019intervalle, le document NIST SP 800-171A\
  \ (en anglais seulement) pourra servir de r\xE9f\xE9rence."
copyright: "Centre de la s\xE9curit\xE9 des t\xE9l\xE9communications Canada. [Open\
  \ Government Licence - Canada](https://open.canada.ca/fr/licence-du-gouvernement-ouvert-canada)"
version: 1
publication_date: 2026-03-04
provider: "Centre de la s\xE9curit\xE9 des t\xE9l\xE9communications Canada"
packager: intuitem
translations:
  en:
    name: '[ITSP.10.171] Protecting specified information in non-Government of Canada
      systems and organizations'
    description: "Protecting Specified Information is of paramount importance to Government\
      \ of Canada (GC) departments and agencies and can directly impact the GC\u2019\
      s ability to successfully conduct its essential missions and functions. This\
      \ publication provides GC departments and agencies with recommended security\
      \ requirements for protecting the confidentiality of specified information when\
      \ it resides in non-GC systems and organizations. These requirements apply to\
      \ the components of non-GC systems that handle, process, store or transmit CI,\
      \ or that provide protection for such components. The security requirements\
      \ are intended for use by GC departments and agencies in contractual vehicles\
      \ or other agreements established between those departments and agencies and\
      \ non-GC organizations.\n\nThis publication is a Canadian version of the National\
      \ Institute of Standards and Technology [NIST SP 800-171 Protecting Controlled\
      \ Unclassified Information in Nonfederal Systems and Organizations](https://csrc.nist.gov/pubs/sp/800/171/r3/final).\
      \ The Cyber Centre will produce a companion publication to use in conjunction\
      \ with this publication, based on [NIST SP 800-171A Assessing Security Requirements\
      \ for Controlled Unclassified Information](https://csrc.nist.gov/pubs/sp/800/171/a/r3/final).\
      \ That publication will provide a comprehensive set of procedures to assess\
      \ the security requirements. In the interim, NIST SP 800-171A can be used as\
      \ a reference."
    copyright: Communications Security Establishment Canada. [Open Government Licence
      - Canada](https://open.canada.ca/en/open-government-licence-canada)
    provider: Communications Security Establishment Canada
