    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.12.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.12
      ref_id: 03.01.12.disc
      name: Discussion
      description: "Un acc\xE8s \xE0 distance (ou acc\xE8s distant) est l\u2019acc\xE8\
        s des utilisatrices et utilisateurs (ou des processus ex\xE9cut\xE9s en leur\
        \ nom) aux syst\xE8mes au moyen de r\xE9seaux externes, comme Internet. Les\
        \ m\xE9thodes de surveillance et de contr\xF4le d\u2019acc\xE8s \xE0 distance\
        \ permettent aux organisations de d\xE9tecter les attaques et d\u2019assurer\
        \ la conformit\xE9 aux strat\xE9gies d\u2019acc\xE8s \xE0 distance. L\u2019\
        acheminement de l\u2019acc\xE8s distant au moyen de points de contr\xF4le\
        \ d\u2019acc\xE8s g\xE9r\xE9s am\xE9liore le contr\xF4le explicite de telles\
        \ connexions et r\xE9duit la probabilit\xE9 d\u2019acc\xE8s non autoris\xE9\
        \ au syst\xE8me, ce qui r\xE9duit \xE9galement la probabilit\xE9 de divulgation\
        \ non autoris\xE9e d\u2019information d\xE9sign\xE9e.\n\nL\u2019acc\xE8s distant\
        \ \xE0 un syst\xE8me repr\xE9sente une vuln\xE9rabilit\xE9 <abbr title=\"\
        Vuln\xE9rabilit\xE9&#10;D\xE9fectuosit\xE9 ou lacune inh\xE9rente \xE0 la\
        \ conception ou \xE0 la mise en \u0153uvre d\u2019un syst\xE8me d\u2019information\
        \ ou \xE0 son environnement, qui pourrait \xEAtre exploit\xE9e en vue de compromettre\
        \ les biens ou les activit\xE9s d\u2019une organisation.\"><sup>(?)</sup></abbr>\
        \ potentielle importante pouvant \xEAtre exploit\xE9e par des adversaires.\
        \ La restriction des commandes et des acc\xE8s privil\xE9gi\xE9s \xE0 l\u2019\
        information li\xE9e \xE0 la s\xE9curit\xE9 au moyen d\u2019un acc\xE8s \xE0\
        \ distance r\xE9duit l\u2019exposition des organisations et leur vuln\xE9\
        rabilit\xE9 aux menaces provenant des adversaires. Une commande privil\xE9\
        gi\xE9e est une commande lanc\xE9e par un humain et ex\xE9cut\xE9e sur un\
        \ syst\xE8me impliquant le contr\xF4le, la surveillance ou l\u2019administration\
        \ du syst\xE8me, y compris les fonctions de s\xE9curit\xE9 ou l\u2019information\
        \ li\xE9e \xE0 la s\xE9curit\xE9. L\u2019information li\xE9e \xE0 la s\xE9\
        curit\xE9 constitue de l\u2019information susceptible d\u2019influer sur l\u2019\
        ex\xE9cution des fonctions de s\xE9curit\xE9 ou la prestation des services\
        \ de s\xE9curit\xE9, de telle fa\xE7on qu\u2019elle nuirait \xE0 l\u2019application\
        \ des strat\xE9gies de s\xE9curit\xE9 du syst\xE8me ou \xE0 l\u2019isolation\
        \ du code et des donn\xE9es. Les commandes privil\xE9gi\xE9es permettent aux\
        \ personnes d\u2019ex\xE9cuter des fonctions sensibles, essentielles \xE0\
        \ la s\xE9curit\xE9 ou li\xE9es \xE0 la s\xE9curit\xE9 du syst\xE8me."
      translations:
        en:
          name: Discussion
          description: 'Remote access is access to systems (or processes acting on
            behalf of users) that communicate through external networks, such as the
            Internet. Monitoring and controlling remote access methods allows organizations
            to detect attacks and ensure compliance with remote access policies. Routing
            remote access through managed access control points enhances explicit
            control over such connections and reduces susceptibility to unauthorized
            access to the system, which could result in the unauthorized disclosure
            of specified information.


            Remote access to the system represents a significant potential vulnerability
            that can be exploited by adversaries. Restricting the execution of privileged
            commands and access to security-relevant information via remote access
            reduces the exposure of the organization and its susceptibility to threats
            by adversaries. A privileged command is a human-initiated command executed
            on a system that involves the control, monitoring, or administration of
            the system, including security functions and security-relevant information.
            Security-relevant information is information that can potentially impact
            the operation of security functions or the provision of security services
            in a manner that could result in failure to enforce the system security
            policy or maintain isolation of code and data. Privileged commands give
            individuals the ability to execute sensitive, security-critical, or security-relevant
            system functions.'
