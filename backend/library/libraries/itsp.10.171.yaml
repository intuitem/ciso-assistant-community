          description: '[Assignment: organization-defined frequency] thereafter'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.04.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.04
      ref_id: 03.06.04.B
      description: "Examiner et mettre \xE0 jour le contenu de la formation d\u2019\
        intervention en cas d\u2019incident tous les [Affectation : fr\xE9quence d\xE9\
        finie par l\u2019organisation] et \xE0 la suite de [Affectation : \xE9v\xE9\
        nements d\xE9finis par l\u2019organisation]."
      translations:
        en:
          description: 'Review and update incident response training content [Assignment:
            organization-defined frequency] and following [Assignment: organization-defined
            events]'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.06.04
      ref_id: 03.06.04.disc
      name: Discussion
      description: "La formation d\u2019intervention en cas d\u2019incident est associ\xE9\
        e \xE0 des responsabilit\xE9s et \xE0 des r\xF4les affect\xE9s au personnel\
        \ de l\u2019organisation afin d\u2019assurer un contenu et un niveau de d\xE9\
        tails appropri\xE9s. Par exemple, les utilisatrices et utilisateurs peuvent\
        \ avoir seulement besoin de conna\xEEtre avec qui communiquer ou comment reconna\xEE\
        tre un incident; les administratrices et administrateurs de syst\xE8me peuvent\
        \ n\xE9cessiter de la formation suppl\xE9mentaire sur le traitement des incidents;\
        \ et les intervenantes et intervenants en cas d\u2019incident pourraient recevoir\
        \ de la formation sur les techniques d\u2019investigation informatique, de\
        \ collecte de donn\xE9es, de signalement, de reprise et de restauration des\
        \ syst\xE8mes. La formation d\u2019intervention en cas d\u2019incident comprend\
        \ la formation offerte aux utilisatrices et utilisateurs pour reconna\xEE\
        tre et signaler les activit\xE9s suspectes provenant de sources externes ou\
        \ internes. La formation d\u2019intervention en cas d\u2019incident pour les\
        \ utilisatrices et utilisateurs peut \xEAtre fournie dans le cadre de l\u2019\
        exigence **Formation selon le r\xF4le 03.02.02**. Les \xE9v\xE9nements qui\
        \ peuvent n\xE9cessiter une mise \xE0 jour du contenu de la formation d\u2019\
        intervention en cas d\u2019incident comprennent la mise \xE0 l\u2019essai\
        \ du plan d\u2019intervention en cas d\u2019incident, l\u2019intervention\
        \ \xE0 la suite d\u2019un incident r\xE9el, les r\xE9sultats d\u2019une \xE9\
        valuation ou d\u2019une v\xE9rification, ou les changements apport\xE9s aux\
        \ lois, aux d\xE9crets, aux politiques, aux directives, aux r\xE9glementations,\
        \ aux normes ou aux lignes directrices applicables."
      translations:
        en:
          name: Discussion
          description: Incident response training is associated with the assigned
            roles and responsibilities of organizational personnel to ensure that
            the appropriate content and level of detail are included in such training.
            For example, users may only need to know whom to call or how to recognize
            an incident; system administrators may require additional training on
            how to handle incidents; and incident responders may receive specific
            training on forensics, data collection techniques, reporting, system recovery,
            and system restoration. Incident response training includes user training
            in identifying and reporting suspicious activities from external and internal
            sources. Incident response training for users may be provided as part
            of **Role-based training 03.02.02**. Events that may cause an update to
            incident response training content include incident response plan testing,
            response to an actual incident, audit or assessment findings, or changes
            in applicable laws, jurisprudence, Orders in Council, policies, directives,
            regulations, standards, and guidelines.
