    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.22.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.22
      ref_id: 03.01.22.disc
      name: Discussion
      description: "Conform\xE9ment aux lois, aux d\xE9crets, aux directives, aux\
