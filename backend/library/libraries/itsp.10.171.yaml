          name: Access enforcement
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.02.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.02
      ref_id: 03.01.02.A
      description: "Appliquer les autorisations approuv\xE9es pour l\u2019acc\xE8\
        s logique \xE0 l\u2019information d\xE9sign\xE9e et aux ressources syst\xE8\
        me conform\xE9ment aux politiques de contr\xF4le d\u2019acc\xE8s applicables."
      translations:
        en:
          description: Enforce approved authorizations for logical access to specified
            information and system resources in accordance with applicable access
            control policies.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.02
      ref_id: 03.01.02.disc
      name: Discussion
      description: "Les politiques de contr\xF4le d\u2019acc\xE8s contr\xF4lent l\u2019\
        acc\xE8s entre des entit\xE9s ou sujets actifs (c\u2019est-\xE0-dire les utilisatrices\
        \ et utilisateurs ou les processus syst\xE8me agissant au nom des utilisatrices\
        \ et utilisateurs) et des entit\xE9s ou objets passifs (c\u2019est-\xE0-dire\
        \ les dispositifs, les fichiers, les documents et les domaines) dans les syst\xE8\
        mes organisationnels. Les types d\u2019acc\xE8s au syst\xE8me incluent l\u2019\
        acc\xE8s distant et l\u2019acc\xE8s aux syst\xE8mes qui communiquent \xE0\
        \ l\u2019aide de r\xE9seaux externes, comme Internet. Les m\xE9canismes d\u2019\
        application de l\u2019acc\xE8s peuvent \xE9galement \xEAtre utilis\xE9s au\
        \ niveau des applications et des services afin de fournir une meilleure protection\
        \ de l\u2019information d\xE9sign\xE9e. Ces m\xE9canismes permettent de reconna\xEE\
        tre que les syst\xE8mes peuvent h\xE9berger de nombreuses applications et\
        \ de nombreux services afin d\u2019appuyer la mission et les activit\xE9s.\
        \ Les politiques de contr\xF4le d\u2019acc\xE8s sont d\xE9finies dans l\u2019\
        exigence **Politiques et proc\xE9dures 03.15.01**."
      translations:
        en:
          name: Discussion
          description: Access control policies control access between active entities
            or subjects (i.e., users or system processes acting on behalf of users)
            and passive entities or objects (i.e., devices, files, records, and domains)
            in organizational systems. Types of system access include remote access
            and access to systems that communicate through external networks, such
            as the Internet. Access enforcement mechanisms can also be employed at
            the application and service levels to provide increased protection for
            specified information. This recognizes that the system can host many applications
            and services in support of mission and business functions. Access control
            policies are defined in Policy and procedures 03.15.01.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.03
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.03
      name: "Application du contr\xF4le de flux d\u2019information"
      translations:
        en:
          name: Information flow enforcement
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.03
      ref_id: 03.01.03.A
      description: "Appliquer des autorisations approuv\xE9es pour contr\xF4ler le\
        \ flux de l\u2019information d\xE9sign\xE9e dans le syst\xE8me et entre les\
        \ syst\xE8mes interconnect\xE9s."
      translations:
        en:
          description: Enforce approved authorizations for controlling the flow of
            specified information within the system and between connected systems.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.03
      ref_id: 03.01.03.disc
      name: Discussion
      description: "Le contr\xF4le de flux d\u2019information d\xE9termine o\xF9 l\u2019\
        information d\xE9sign\xE9e peut transiter au sein d\u2019un syst\xE8me et\
        \ entre des syst\xE8mes (par opposition aux personnes autoris\xE9es \xE0 acc\xE9\
        der \xE0 l\u2019information), quels que soient les acc\xE8s subs\xE9quents\
        \ \xE0 cette information. Les restrictions de contr\xF4le de flux comprennent\
        \ notamment : emp\xEAcher les transmissions d\u2019information d\xE9sign\xE9\
        e en clair sur Internet, bloquer le trafic entrant qui pr\xE9tend provenir\
        \ de l\u2019int\xE9rieur de l\u2019organisation, restreindre les demandes\
        \ d\u2019acc\xE8s \xE0 Internet qui ne proviennent pas du serveur mandataire\
        \ Web interne et limiter le transfert d\u2019information d\xE9sign\xE9e entre\
        \ les organisations en fonction des structures de donn\xE9es et du contenu.\n\
        \nLes organisations utilisent souvent des politiques de contr\xF4le de flux\
        \ d\u2019information et des m\xE9canismes d\u2019application pour contr\xF4\
        ler le flux d\u2019information d\xE9sign\xE9e entre des sources et des destinations\
        \ d\xE9sign\xE9es (par exemple, des r\xE9seaux, des personnes et des dispositifs)\
        \ dans des syst\xE8mes et entre des syst\xE8mes interconnect\xE9s. Le contr\xF4\
        le de flux est bas\xE9 sur les caract\xE9ristiques de l\u2019information ou\
        \ sur le chemin d\u2019acc\xE8s de l\u2019information. Le contr\xF4le de flux\
        \ s\u2019applique aux dispositifs de protection de p\xE9rim\xE8tre (par exemple,\
        \ tunnels chiffr\xE9s, routeurs, passerelles et pare feu) qui ont recours\
        \ \xE0 des ensembles de r\xE8gles ou qui \xE9tablissent des param\xE8tres\
        \ de configuration pour restreindre les services d\u2019un syst\xE8me, pour\
        \ fournir des capacit\xE9s de filtrage des paquets selon les donn\xE9es d\u2019\
        en-t\xEAte ou pour fournir des capacit\xE9s de filtrage des messages en fonction\
        \ du contenu du message (par exemple, mise en \u0153uvre des recherches par\
        \ mots-cl\xE9s ou utilisation des caract\xE9ristiques du document). Les organisations\
        \ doivent \xE9galement consid\xE9rer la fiabilit\xE9 des m\xE9canismes de\
        \ filtrage et d\u2019inspection (c\u2019est-\xE0-dire les composants mat\xE9\
        riels, micrologiciels et logiciels) qui sont essentiels \xE0 l\u2019application\
        \ du contr\xF4le de flux d\u2019information.\n\nLe transfert d\u2019information\
        \ d\xE9sign\xE9e entre des organisations peut n\xE9cessiter une entente indiquant\
        \ comment le flux d\u2019information sera appliqu\xE9 (voir l\u2019exigence\
        \ **\xC9change d'information 03.12.05**). Le transfert d\u2019information\
        \ d\xE9sign\xE9e entre des syst\xE8mes associ\xE9s \xE0 des domaines de s\xE9\
        curit\xE9 diff\xE9rents et \xE0 des strat\xE9gies de s\xE9curit\xE9 diff\xE9\
        rentes comporte un risque de contravention \xE0 une ou \xE0 plusieurs strat\xE9\
        gies de s\xE9curit\xE9 des domaines. Dans de telles situations, les d\xE9\
        positaires de l\u2019information doivent fournir des directives aux points\
        \ d\xE9sign\xE9s d\u2019application des strat\xE9gies entre les syst\xE8mes\
        \ interconnect\xE9s. Les organisations doivent examiner la possibilit\xE9\
        \ d\u2019imposer des solutions architecturales particuli\xE8res lorsqu\u2019\
        elles appliquent des strat\xE9gies de s\xE9curit\xE9 pr\xE9cises. Ces solutions\
        \ peuvent comprendre l\u2019interdiction de transf\xE9rer de l\u2019information\
        \ d\xE9sign\xE9e entre des syst\xE8mes interconnect\xE9s (c\u2019est-\xE0\
        -dire autoriser seulement l\u2019acc\xE8s \xE0 l\u2019information), l\u2019\
        utilisation de m\xE9canismes mat\xE9riels pour appliquer un flux d\u2019information\
        \ unidirectionnel et la mise en \u0153uvre de m\xE9canismes remani\xE9s de\
        \ confiance pour r\xE9assigner les attributs et \xE9tiquettes de s\xE9curit\xE9\
        ."
      translations:
        en:
          name: Discussion
          description: 'Information flow control regulates where specified information
            can transit within a system and between systems (versus who can access
            the information) and without explicit regard to subsequent accesses to
            that information. Flow control restrictions include keeping specified
            information from being transmitted in the clear to the Internet, blocking
            outside traffic that claims to be from within the organization, restricting
            requests to the Internet that are not from the internal web proxy server,
            and limiting specified information transfers between organizations based
            on data structures and content.


            Organizations commonly use information flow control policies and enforcement
            mechanisms to control the flow of specified information between designated
            sources and destinations (e.g., networks, individuals, and devices) within
            systems and between interconnected systems. Flow control is based on characteristics
            of the information or the information path. Enforcement occurs in boundary
            protection devices (e.g., encrypted tunnels, routers, gateways, and firewalls)
            that use rule sets or establish configuration settings that restrict system
            services, provide a packet-filtering capability based on header information,
            or provide a message-filtering capability based on message content (e.g.,
            implementing key word searches or using document characteristics). Organizations
            also consider the trustworthiness of filtering and inspection mechanisms
            (i.e., hardware, firmware, and software components) that are critical
            to information flow enforcement.


            Transferring specified information between organizations may require an
            agreement that specifies how the information flow is enforced (see **Information
            exchange 03.12.05**). Transferring specified information between systems
            that represent different security domains with different security policies
            introduces the risk that such transfers may violate one or more domain
            security policies. In such situations, information custodians provide
            guidance at designated policy enforcement points between interconnected
            systems. Organizations consider mandating specific architectural solutions
            when required to enforce specific security policies. Enforcement includes
            prohibiting specified information transfers between interconnected systems
            (i.e., allowing information access only), employing hardware mechanisms
            to enforce one-way information flows, and implementing trustworthy regrading
            mechanisms to reassign security attributes and security labels.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.04
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.04
      name: "S\xE9paration des t\xE2ches"
      translations:
        en:
          name: Separation of duties
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.04.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.04
      ref_id: 03.01.04.A
      description: "\xC9tablir les t\xE2ches des personnes devant \xEAtre s\xE9par\xE9\
        es."
      translations:
        en:
          description: Identify the duties of individuals requiring separation.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.04.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.04
      ref_id: 03.01.04.B
      description: "D\xE9finir les autorisations d\u2019acc\xE8s au syst\xE8me afin\
        \ d\u2019appuyer la s\xE9paration des t\xE2ches."
      translations:
        en:
          description: Define system access authorizations to support separation of
            duties.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.04.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.04
      ref_id: 03.01.04.disc
      name: Discussion
      description: "La s\xE9paration des t\xE2ches <abbr title=\"S\xE9paration des\
        \ t\xE2ches&#10;Principe de s\xE9curit\xE9 selon lequel il convient de r\xE9\
        partir les responsabilit\xE9s de nature sensible ou essentielle entre plusieurs\
        \ entit\xE9s (comme le personnel ou les processus) plut\xF4t que les attribuer\
        \ \xE0 une seule, afin de pr\xE9venir les infractions \xE0 la s\xE9curit\xE9\
        .\"><sup>(?)</sup></abbr> permet d\u2019\xE9liminer l\u2019abus possible des\
        \ privil\xE8ges autoris\xE9s et r\xE9duit le risque d\u2019activit\xE9s malveillantes\
        \ sans collusion. Les m\xE9canismes de s\xE9paration des t\xE2ches comprennent\
        \ notamment : la division des fonctions li\xE9es \xE0 la mission et des fonctions\
        \ de soutien entre les personnes ou r\xF4les, l\u2019ex\xE9cution de fonctions\
        \ de soutien li\xE9es au syst\xE8me par diff\xE9rentes personnes ou diff\xE9\
        rents r\xF4les (par exemple, l\u2019assurance de la qualit\xE9, la gestion\
        \ de la configuration, la gestion du syst\xE8me, les \xE9valuations, la programmation\
        \ et la s\xE9curit\xE9 r\xE9seau) et l\u2019assurance que le personnel qui\
        \ administre les fonctions de contr\xF4le d\u2019acc\xE8s n\u2019administre\
        \ pas \xE9galement les fonctions de v\xE9rification. Puisque les violations\
        \ de s\xE9paration des t\xE2ches peuvent s\u2019\xE9tendre sur plusieurs syst\xE8\
        mes et domaines d\u2019application, les organisations doivent prendre en consid\xE9\
        ration l\u2019ensemble de leurs syst\xE8mes et de leurs composants de syst\xE8\
        me lors de l\u2019\xE9laboration des strat\xE9gies sur la s\xE9paration des\
        \ t\xE2ches. Cette exigence est appliqu\xE9e par l\u2019exigence **Application\
        \ de l'acc\xE8s 03.01.02**."
      translations:
        en:
          name: Discussion
          description: Separation of duties <abbr title="Separation of duties&#10;A
            security principle stating that sensitive or critical responsibilities
            should be shared by multiple entities (e.g. staff or processes), rather
            than a single entity, to prevent a security breach."><sup>(?)</sup></abbr>
            addresses the potential for abuse of authorized privileges and reduces
            the risk of malicious activity without collusion. Separation of duties
            includes dividing mission functions and support functions among different
            individuals or roles, conducting system support functions with different
            individuals or roles (e.g., quality assurance, configuration management,
            system management, assessments, programming, and network security), and
            ensuring that personnel who administer access control functions do not
            also administer audit functions. Because separation of duty violations
            can span systems and application domains, organizations consider the entirety
            of their systems and system components when developing policies on separation
            of duties. This requirement is enforced by **Access enforcement 03.01.02**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.05
      name: "Droit d\u2019acc\xE8s minimal"
      translations:
        en:
          name: Least privilege
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05
      ref_id: 03.01.05.A
      description: "Permettre uniquement les acc\xE8s autoris\xE9s au syst\xE8me pour\
        \ les utilisatrices et utilisateurs (ou les processus ex\xE9cut\xE9s en leur\
        \ nom) qui sont n\xE9cessaires pour accomplir les t\xE2ches organisationnelles\
        \ assign\xE9es."
      translations:
        en:
          description: Allow only the authorized system access for users (or processes
            acting on behalf of users) that is necessary to accomplish assigned organizational
            tasks.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05
      ref_id: 03.01.05.B
      description: "Autoriser l\u2019acc\xE8s aux [Affectation : fonctions de s\xE9\
        curit\xE9 d\xE9finies par l\u2019organisation] et \xE0 [Affectation : information\
        \ li\xE9e \xE0 la s\xE9curit\xE9 d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Authorize access to [Assignment: organization-defined security
            functions] and [Assignment: organization-defined security-relevant information].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05
      ref_id: 03.01.05.C
      description: "Examiner les privil\xE8ges attribu\xE9s aux r\xF4les ou aux classes\
        \ d\u2019utilisateur tous les [Affectation : fr\xE9quence d\xE9finie par l\u2019\
        organisation] afin de valider la n\xE9cessit\xE9 de d\xE9tenir ces privil\xE8\
        ges."
      translations:
        en:
          description: 'Review the privileges assigned to roles or classes of users
            [Assignment: organization-defined frequency] to validate the need for
            such privileges.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05.d
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05
      ref_id: 03.01.05.D
      description: "R\xE9attribuer ou retirer les privil\xE8ges, au besoin."
      translations:
        en:
          description: Reassign or remove privileges, as necessary.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.05
      ref_id: 03.01.05.disc
      name: Discussion
      description: "Les organisations doivent avoir recours au principe de droit d\u2019\
        acc\xE8s minimal <abbr title=\"Droit d\u2019acc\xE8s minimal&#10;Principe\
        \ selon lequel il convient de n&#x27;accorder aux utilisateurs que les autorisations\
        \ d&#x27;acc\xE8s dont ils ont besoin pour accomplir les t\xE2ches qui leur\
        \ ont \xE9t\xE9 d\xFBment attribu\xE9es. Ce principe permet de limiter les\
        \ dommages pouvant r\xE9sulter d&#x27;une utilisation non autoris\xE9e \u2013\
        \ abusive ou accidentelle \u2013 d&#x27;un syst\xE8me d&#x27;information.\"\
        ><sup>(?)</sup></abbr> pour des t\xE2ches pr\xE9cises et les acc\xE8s autoris\xE9\
        s pour les utilisatrices et utilisateurs et les processus syst\xE8me. Le principe\
        \ de droit d\u2019acc\xE8s minimal s\u2019applique au d\xE9veloppement, \xE0\
        \ la mise en \u0153uvre et \xE0 l\u2019exploitation du syst\xE8me. Les organisations\
        \ doivent envisager de cr\xE9er des processus, des r\xF4les et des comptes\
        \ syst\xE8me suppl\xE9mentaires afin de r\xE9pondre \xE0 ce principe. Les\
        \ fonctions de s\xE9curit\xE9 comprennent notamment l\u2019\xE9tablissement\
        \ de comptes syst\xE8me, l\u2019attribution de privil\xE8ges, l\u2019installation\
        \ de logiciels, la configuration des autorisations d\u2019acc\xE8s, la configuration\
        \ des param\xE8tres pour les \xE9v\xE9nements qui seront v\xE9rifi\xE9s, l\u2019\
        \xE9tablissement des param\xE8tres de balayage des vuln\xE9rabilit\xE9s, l\u2019\
        \xE9tablissement des param\xE8tres de d\xE9tection <abbr title=\"D\xE9tection&#10;Surveillance\
        \ et analyse des \xE9v\xE9nements d&#x27;un syst\xE8me en vue de relever les\
        \ tentatives d\u2019acc\xE8s non autoris\xE9es aux ressources du syst\xE8\
        me.\"><sup>(?)</sup></abbr> d\u2019intrusion et la gestion de l\u2019information\
        \ de v\xE9rification. L\u2019information li\xE9e \xE0 la s\xE9curit\xE9 comprend\
        \ notamment l\u2019information sur les menaces et les vuln\xE9rabilit\xE9\
        s, les r\xE8gles de filtrage pour les routeurs et les pare-feu, les param\xE8\
        tres de configuration pour les services de s\xE9curit\xE9, l\u2019architecture\
        \ de s\xE9curit\xE9, l\u2019information de gestion des cl\xE9s <abbr title=\"\
        Gestion des cl\xE9s&#10;Proc\xE9dures et m\xE9canismes de g\xE9n\xE9ration,\
        \ de distribution, de remplacement, de stockage, d&#x27;archivage et de destruction\
        \ des cl\xE9s cryptographiques.\"><sup>(?)</sup></abbr> cryptographiques,\
        \ les listes de contr\xF4le d\u2019acc\xE8s et l\u2019information de v\xE9\
        rification."
      translations:
        en:
          name: Discussion
          description: Organizations employ the principle of least privilege <abbr
            title="Least privilege&#10;The principle of giving an individual only
            the set of privileges that are essential to performing authorized tasks.
            This principle limits the damage that can result from the accidental,
            incorrect, or unauthorized use of an information system."><sup>(?)</sup></abbr>
            for specific duties and authorized access for users and system processes.
            Least privilege is applied to the development, implementation, and operation
            of the system. Organizations consider creating additional processes, roles,
            and system accounts to achieve least privilege. Security functions include
            establishing system accounts and assigning privileges, installing software,
            configuring access authorizations, configuring settings for events to
            be audited, establishing vulnerability <abbr title="Vulnerability&#10;A
            flaw or weakness in the design or implementation of an information system
            or its environment that could be exploited to adversely affect an organization&#x27;s
            assets or operations."><sup>(?)</sup></abbr> scanning parameters, establishing
            intrusion detection <abbr title="Intrusion detection&#10;A security service
            that monitors and analyzes network or system events to warn of unauthorized
            access attempts. The findings are provided in real-time (or near real-time)."><sup>(?)</sup></abbr>
            parameters, and managing audit information. Security-relevant information
            includes threat and vulnerability information, filtering rules for routers
            or firewalls, configuration parameters for security services, security
            architecture, cryptographic key <abbr title="Cryptographic key&#10;A numerical
            value used in cryptographic processes, such as encryption, decryption,
            signature generation, and signature verification."><sup>(?)</sup></abbr>
            management information, access control lists, and audit information.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.06
      name: "Droit d\u2019acc\xE8s minimal \u2212 Comptes privil\xE9gi\xE9s"
      translations:
        en:
          name: "Least privilege \u2013 privileged accounts"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06
      ref_id: 03.01.06.A
      description: "Restreindre les comptes privil\xE9gi\xE9s sur le syst\xE8me \xE0\
        \ [Affectation : personnel ou r\xF4les d\xE9finis par l\u2019organisation]."
      translations:
        en:
          description: 'Restrict privileged accounts on the system to [Assignment:
            organization-defined personnel or roles].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06
      ref_id: 03.01.06.B
      description: "Exiger que les utilisatrices et utilisateurs (ou les r\xF4les)\
        \ associ\xE9s \xE0 des comptes privil\xE9gi\xE9s utilisent des comptes non\
        \ privil\xE9gi\xE9s lorsqu\u2019ils acc\xE8dent \xE0 des fonctions ou \xE0\
        \ de l\u2019information qui ne sont pas li\xE9es \xE0 la s\xE9curit\xE9."
      translations:
        en:
          description: Require that users (or roles) with privileged accounts use
            non-privileged accounts when accessing non-security functions or non-security
            information.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06
      ref_id: 03.01.06.C
      description: "Exiger que les op\xE9rations d\u2019administration ou de superutilisateur\
        \ soient r\xE9alis\xE9es \xE0 partir d\u2019un poste de travail physique d\xE9\
        di\xE9 \xE0 ces t\xE2ches pr\xE9cises et isol\xE9es des autres fonctions et\
        \ r\xE9seaux. En particulier, la station ne devrait pas avoir acc\xE8s \xE0\
        \ Internet."
      translations:
        en:
          description: Require any administrative or superuser actions to be performed
            from a physical workstation which is dedicated to those specific tasks
            and isolated from all other functions and networks, especially any form
            of Internet access.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.06
      ref_id: 03.01.06.disc
      name: Discussion
      description: "Les comptes privil\xE9gi\xE9s d\xE9signent les comptes associ\xE9\
        s \xE0 des privil\xE8ges \xE9lev\xE9s pour acc\xE9der \xE0 des ressources\
        \ (y compris les fonctions de s\xE9curit\xE9 ou l\u2019information li\xE9\
        e \xE0 la s\xE9curit\xE9) qui sont autrement restreintes pour les comptes\
        \ non privil\xE9gi\xE9s. Les comptes privil\xE9gi\xE9s sont normalement d\xE9\
        crits comme des comptes d\u2019administrateur de syst\xE8me ou des comptes\
        \ de surpeutilisateur. Par exemple, un compte privil\xE9gi\xE9 est souvent\
        \ requis pour r\xE9aliser des fonctions privil\xE9gi\xE9es, comme l\u2019\
        ex\xE9cution de commandes pouvant modifier le comportement du syst\xE8me.\
        \ La restriction des comptes privil\xE9gi\xE9s au personnel ou aux r\xF4les\
        \ d\xE9sign\xE9s permet d\u2019emp\xEAcher que des utilisatrices et utilisateurs\
        \ non privil\xE9gi\xE9s acc\xE8dent \xE0 des fonctions de s\xE9curit\xE9 ou\
        \ \xE0 de l\u2019information li\xE9e \xE0 la s\xE9curit\xE9. L\u2019exigence\
        \ d\u2019utiliser des comptes non privil\xE9gi\xE9s pour acc\xE9der \xE0 des\
        \ fonctions ou \xE0 de l\u2019information qui ne sont pas li\xE9es \xE0 la\
        \ s\xE9curit\xE9 limite l\u2019exposition lors de l\u2019utilisation de comptes\
        \ privil\xE9gi\xE9s.\n\nUn poste de travail administratif d\xE9di\xE9 est\
        \ typiquement constitu\xE9 d\u2019un terminal d\u2019utilisateur et d\u2019\
        une tr\xE8s petite s\xE9lection de logiciels con\xE7us pour interfacer avec\
        \ le syst\xE8me cible. Aux fins du pr\xE9sent contr\xF4le, un poste de travail\
        \ est consid\xE9r\xE9 comme \xE9tant le syst\xE8me \xE0 partir duquel les\
        \ t\xE2ches d\u2019administration sont r\xE9alis\xE9es, par opposition au\
        \ syst\xE8me cible."
      translations:
        en:
          name: Discussion
          description: 'Privileged accounts refer to accounts that are granted elevated
            privileges to access resources (including security functions or security-relevant
            information) that are otherwise restricted for non-privileged accounts.
            These accounts are typically described as system administrator or super-user
            accounts. For example, a privileged account is often required in order
            to perform privileged functions such as executing commands that could
            modify system behaviour. Restricting privileged accounts to specific personnel
            or roles prevents non-privileged users from accessing security functions
            or security-relevant information. Requiring the use of non-privileged
            accounts when accessing non-security functions or non-security information
            limits exposure when operating from within privileged accounts.


            A dedicated administration workstation (DAW) is typically comprised of
            a user terminal with a very small selection of software designed for interfacing
            with the target system. For the purpose of this control, workstation is
            meant as the system from which you are performing the administration,
            as opposed to the target system of administration.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.07
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.07
      name: "Droit d\u2019acc\xE8s minimal \u2212 Fonctions privil\xE9gi\xE9es"
      translations:
        en:
          name: "Least privilege \u2013 privileged functions"
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.07.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.07
      ref_id: 03.01.07.A
      description: "Emp\xEAcher les utilisatrices et utilisateurs non privil\xE9gi\xE9\
        s d\u2019ex\xE9cuter des fonctions privil\xE9gi\xE9es."
      translations:
        en:
          description: Prevent non-privileged users from executing privileged functions.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.07.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.07
      ref_id: 03.01.07.B
      description: "Journaliser l\u2019ex\xE9cution de fonctions privil\xE9gi\xE9\
        es."
      translations:
        en:
          description: Log the execution of privileged functions.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.07.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.07
      ref_id: 03.01.07.disc
      name: Discussion
      description: "Les fonctions privil\xE9gi\xE9es comprennent notamment l\u2019\
        \xE9tablissement de comptes syst\xE8me, les contr\xF4les d\u2019int\xE9grit\xE9\
        \ du syst\xE8me, l\u2019application de correctifs et les activit\xE9s de gestion\
        \ des cl\xE9s cryptographiques. Les utilisatrices et utilisateurs non privil\xE9\
        gi\xE9s ne d\xE9tiennent pas les autorisations n\xE9cessaires pour ex\xE9\
        cuter les fonctions privil\xE9gi\xE9es. Le contournement des m\xE9canismes\
        \ de d\xE9tection et de pr\xE9vention d\u2019intrusion et les m\xE9canismes\
        \ de protection contre les programmes malveillants sont des exemples de fonctions\
        \ privil\xE9gi\xE9es qui ne doivent pas \xEAtre ex\xE9cut\xE9es par des utilisatrices\
        \ et utilisateurs non privil\xE9gi\xE9s. Cette exigence repr\xE9sente une\
        \ condition devant \xEAtre respect\xE9e en vertu de la d\xE9finition des privil\xE8\
        ges autoris\xE9s de l\u2019exigence **Gestion des comptes 03.01.01** et de\
        \ l\u2019application des privil\xE8ges de l\u2019exigence **Application de\
        \ l'acc\xE8s 03.01.02**.\n\nUne mauvaise utilisation des fonctions privil\xE9\
        gi\xE9es, qu\u2019elle soit intentionnelle ou non, par des utilisatrices et\
        \ utilisateurs autoris\xE9s ou par des entit\xE9s externes non autoris\xE9\
        es ayant compromis des comptes syst\xE8me est une pr\xE9occupation constante\
        \ et s\xE9rieuse qui peut avoir des r\xE9percussions n\xE9gatives importantes\
        \ sur les organisations. La journalisation de l\u2019utilisation des fonctions\
        \ privil\xE9gi\xE9es est une m\xE9thode permettant de d\xE9tecter les mauvaises\
        \ utilisations et d\u2019att\xE9nuer les risques li\xE9s aux menaces persistantes\
        \ avanc\xE9es et aux menaces internes."
      translations:
        en:
          name: Discussion
          description: "Privileged functions include establishing system accounts,\
            \ performing system integrity <abbr title=\"Integrity&#10;The ability\
            \ to protect information from being modified or deleted unintentionally\
            \ or when it\u2019s not supposed to be. Integrity helps determine that\
            \ information is what it claims to be. Integrity also applies to business\
            \ processes, software application logic, hardware, and personnel.\"><sup>(?)</sup></abbr>\
            \ checks, conducting patching operations, or administering cryptographic\
            \ key management activities. Non-privileged users do not possess the authorizations\
            \ to execute privileged functions. Bypassing intrusion detection and prevention\
            \ mechanisms or malicious code protection mechanisms are examples of privileged\
            \ functions that require protection from non-privileged users. This requirement\
            \ represents a condition to be achieved by the definition of authorized\
            \ privileges in **Account management 03.01.01** and privilege enforcement\
            \ in **Access enforcement 03.01.02**.\n\nThe misuse of privileged functions\
            \ \u2013 whether intentionally or unintentionally by authorized users\
            \ or by unauthorized external entities that have compromised system accounts\
            \ \u2013 is a serious and ongoing concern that can have significant adverse\
            \ impacts on organizations. Logging the use of privileged functions is\
            \ one way to detect such misuse and mitigate the risks from advanced persistent\
            \ threats and insider threats."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.08
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.08
      name: "Tentatives d\u2019ouverture de session infructueuses"
      translations:
        en:
          name: Unsuccessful logon attempts
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.08.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.08
      ref_id: 03.01.08.A
      description: "Limiter le nombre de tentatives d\u2019ouverture de session invalides\
        \ \xE0 [Affectation : nombre d\xE9fini par l\u2019organisation] en moins de\
        \ [Affectation : p\xE9riode d\xE9finie par l\u2019organisation]."
      translations:
        en:
          description: 'Limit the number of consecutive invalid logon attempts to
            [Assignment: organization-defined number] in [Assignment: organization-defined
            time period].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.08.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.08
      ref_id: 03.01.08.B
      description: "[S\xE9lection (un ou plusieurs) : Verrouiller le compte ou le\
        \ n\u0153ud pendant [Affectation : p\xE9riode d\xE9finie par l\u2019organisation];\
        \ verrouiller le compte ou le n\u0153ud jusqu\u2019\xE0 ce qu\u2019une administratrice\
        \ ou un administrateur le lib\xE8re; retarder la prochaine invite d\u2019\
        ouverture de session; aviser l\u2019administratrice ou administrateur de syst\xE8\
        me; effectuer une autre op\xE9ration] automatiquement lorsque le nombre maximal\
        \ de tentatives infructueuses est d\xE9pass\xE9."
      translations:
        en:
          description: 'Automatically [Selection (one or more): lock the account or
            node for an [Assignment: organization-defined time period]; lock the account
            or node until released by an administrator; delay next logon prompt; notify
            system administrator; take other action] when the maximum number of unsuccessful
            attempts is exceeded.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.08.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.08
      ref_id: 03.01.08.disc
      name: Discussion
      description: "En raison des possibilit\xE9s de d\xE9ni de service, le verrouillage\
        \ automatique du syst\xE8me est, dans la plupart des cas, temporaire et un\
        \ r\xE9tablissement automatique survient normalement apr\xE8s une p\xE9riode\
        \ pr\xE9d\xE9termin\xE9e \xE9tablie par l\u2019organisation (c\u2019est-\xE0\
        -dire au moyen d\u2019un algorithme de temporisation). Les organisations peuvent\
        \ avoir recours \xE0 diff\xE9rents algorithmes de temporisation pour diff\xE9\
        rents composants du syst\xE8me en fonction des capacit\xE9s des composants\
        \ respectifs. Les r\xE9ponses aux tentatives d\u2019ouverture de session syst\xE8\
        me infructueuses peuvent \xEAtre mises en \u0153uvre au niveau du syst\xE8\
        me ou de l\u2019application.\n\nLes op\xE9rations d\xE9finies par l\u2019\
        organisation qui peuvent \xEAtre effectu\xE9es comprennent notamment l\u2019\
        affichage d\u2019un message invitant l\u2019utilisatrice ou utilisateur \xE0\
        \ r\xE9pondre \xE0 une question secr\xE8te en plus d\u2019entrer son nom d\u2019\
        utilisateur et son mot de passe, l\u2019utilisation d\u2019un mode de confinement\
        \ avec des capacit\xE9s limit\xE9es pour les utilisatrices et utilisateurs\
        \ (plut\xF4t qu\u2019un verrouillage complet), permettre aux utilisatrices\
        \ et utilisateurs de se connecter uniquement \xE0 partir de certaines adresses\
        \ de protocole Internet (IP pour Internet Protocol) pr\xE9cises, l\u2019utilisation\
        \ d\u2019un test captcha pour \xE9viter les attaques automatis\xE9es ou l\u2019\
        application de profils d\u2019utilisateur qui font intervenir d\u2019autres\
        \ param\xE8tres, comme l\u2019emplacement, le moment de la journ\xE9e, l\u2019\
        adresse <abbr title=\"protocole Internet\">IP</abbr>, l\u2019appareil ou l\u2019\
        adresse de contr\xF4le d\u2019acc\xE8s au support (MAC pour Media Access Control)."
      translations:
        en:
          name: Discussion
          description: 'Due to the potential for denial of service, automatic system
            lockouts are, in most cases, temporary and automatically release after
            a predetermined period established by the organization (i.e., using a
            delay algorithm). Organizations may employ different delay algorithms
            for different system components based on the capabilities of the respective
            components. Responses to unsuccessful system logon attempts may be implemented
            at the system and application levels.


            Organization-defined actions that may be taken include prompting the user
            to answer a secret question in addition to the username and password,
            invoking a lockdown mode with limited user capabilities (instead of a
            full lockout), allowing users to only logon from specified Internet Protocol
            (IP) addresses, requiring a CAPTCHA to prevent automated attacks, or applying
            user profiles, such as location, time of day, IP address, device, or Media
            Access Control (MAC) address.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.09
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.09
      name: "Avis d\u2019utilisation syst\xE8me"
      translations:
        en:
          name: System use notification
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.09.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.09
      ref_id: 03.01.09.A
      description: "Afficher un message d\u2019avis d\u2019utilisation du syst\xE8\
        me qui comprend des \xE9nonc\xE9s sur la protection de la vie priv\xE9e et\
        \ sur la s\xE9curit\xE9 qui sont conformes aux r\xE8gles li\xE9es \xE0 l\u2019\
        information d\xE9sign\xE9e applicables, avant d\u2019accorder l\u2019acc\xE8\
        s au syst\xE8me."
      translations:
        en:
          description: Display a system use notification message with privacy and
            security notices consistent with applicable specified information rules
            before granting access to the system.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.09.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.09
      ref_id: 03.01.09.disc
      name: Discussion
      description: "Les avis concernant l\u2019utilisation du syst\xE8me peuvent \xEA\
        tre mis en \u0153uvre au moyen de messages d\u2019avertissement ou de banni\xE8\
        res. Ces messages sont affich\xE9s avant que les personnes se connectent au\
        \ syst\xE8me. Les avis d\u2019utilisation syst\xE8me sont utilis\xE9s lors\
        \ de l\u2019acc\xE8s au moyen d\u2019interfaces d\u2019ouverture de session\
        \ avec utilisatrices et utilisateurs humains et ne sont pas requis lorsque\
        \ de telles interfaces n\u2019existent pas. Les organisations doivent d\xE9\
        terminer si un avis d\u2019utilisation secondaire est n\xE9cessaire pour acc\xE9\
        der \xE0 des applications ou \xE0 d\u2019autres ressources syst\xE8me apr\xE8\
        s la connexion initiale au r\xE9seau. Des affiches ou d\u2019autres documents\
        \ imprim\xE9s peuvent \xE9galement \xEAtre utilis\xE9s au lieu d\u2019un message\
        \ syst\xE8me automatis\xE9. Cette exigence est associ\xE9e \xE0 l\u2019exigence\
        \ **R\xE8gles de conduite 03.15.03**."
      translations:
        en:
          name: Discussion
          description: System use notifications can be implemented using warning or
            banner messages. The messages are displayed before individuals log in
            to the system. System use notifications are used for access via logon
            interfaces with human users and are not required when human interfaces
            do not exist. Organizations consider whether a secondary use notification
            is needed to access applications or other system resources after the initial
            network logon. Posters or other printed materials may be used in lieu
            of an automated system message. This requirement is related to **Rules
            of behaviour 03.15.03**.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.10
      name: "Verrouillage d\u2019appareil"
      translations:
        en:
          name: Device lock
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10
      ref_id: 03.01.10.A
      description: "Emp\xEAcher l\u2019acc\xE8s au syst\xE8me [S\xE9lection (un ou\
        \ plusieurs) : en proc\xE9dant \xE0 un verrouillage d\u2019appareil apr\xE8\
        s [Affectation : p\xE9riode d\xE9finie par l\u2019organisation] d\u2019inactivit\xE9\
        ; en exigeant que l\u2019utilisatrice ou utilisateur proc\xE8de \xE0 un verrouillage\
        \ d\u2019appareil avant de laisser le syst\xE8me sans surveillance]."
      translations:
        en:
          description: 'Prevent access to the system by [Selection (one or more):
            initiating a device lock after [Assignment: organization-defined time
            period] of inactivity; requiring the user to initiate a device lock before
            leaving the system unattended].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10
      ref_id: 03.01.10.B
      description: "Pr\xE9server le verrouillage d\u2019appareil jusqu\u2019\xE0 ce\
        \ que l\u2019utilisatrice ou utilisateur r\xE9tablisse l\u2019acc\xE8s au\
        \ moyen des proc\xE9dures d\u2019identification et d\u2019authentification\
        \ \xE9tablies."
      translations:
        en:
          description: Retain the device lock until the user re-establishes access
            using established identification and authentication procedures.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10.c
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10
      ref_id: 03.01.10.C
      description: "Masquer, au moyen d\u2019un verrouillage d\u2019appareil, l\u2019\
        information auparavant visible \xE0 l\u2019\xE9cran en utilisant une image\
        \ visible."
      translations:
        en:
          description: Conceal, via the device lock, information previously visible
            on the display with a publicly viewable image.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.10
      ref_id: 03.01.10.disc
      name: Discussion
      description: "Les verrouillages d\u2019appareil sont des mesures temporaires\
        \ servant \xE0 emp\xEAcher l\u2019acc\xE8s au syst\xE8me lorsque les utilisatrices\
        \ et utilisateurs ne se trouvent pas \xE0 proximit\xE9 du syst\xE8me et qu\u2019\
        ils pr\xE9f\xE8rent ne pas se d\xE9connecter en raison de la nature temporaire\
        \ de leur absence. Le verrouillage peut \xEAtre mis en \u0153uvre au niveau\
        \ du syst\xE8me d\u2019exploitation ou de l\u2019application. Le verrouillage\
        \ d\u2019appareil est initi\xE9 par l\u2019utilisatrice ou utilisateur. Il\
        \ peut s\u2019agir d\u2019une op\xE9ration bas\xE9e sur des comportements\
        \ ou des strat\xE9gies et n\xE9cessite que l\u2019utilisatrice ou utilisateur\
        \ effectue une op\xE9ration physique pour verrouiller son appareil. Les verrouillages\
        \ d\u2019appareil ne remplacent pas la fermeture de session sur le syst\xE8\
        me (par exemple, l\u2019organisation peut exiger que les utilisatrices et\
        \ utilisateurs ferment leur session \xE0 la fin de leur journ\xE9e de travail).\
        \ Les images visibles peuvent inclure des images statiques ou dynamiques,\
        \ comme celles g\xE9n\xE9r\xE9es par les \xE9conomiseurs d\u2019\xE9cran,\
        \ des photographies, des couleurs solides, une horloge, un indicateur de la\
        \ charge de la pile ou un \xE9cran vide, ce qui assure que l\u2019information\
        \ d\xE9sign\xE9e n\u2019est pas affich\xE9e."
      translations:
        en:
          name: Discussion
          description: Device locks are temporary actions taken to prevent access
            to the system when users depart from the immediate vicinity of the system
            but do not want to log out because of the temporary nature of their absences.
            Device locks can be implemented at the operating system level or application
            level. User-initiated device locking is behaviour- or policy-based and
            requires users to take physical action to initiate the device lock. Device
            locks are not an acceptable substitute for logging out of the system (e.g.,
            when organizations require users to log out at the end of workdays). Publicly
            viewable images can include static or dynamic images, such as patterns
            used with screen savers, photographic images, solid colors, a clock, a
            battery life indicator, or a blank screen with the caveat that specified
            information information is not displayed.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.11
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.11
      name: Fin de session
      translations:
        en:
          name: Session termination
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.11.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.11
      ref_id: 03.01.11.A
      description: "Mettre automatiquement fin \xE0 une session utilisateur apr\xE8\
        s [Affectation : conditions ou \xE9v\xE9nements d\xE9clenchant une d\xE9connexion\
        \ d\xE9finis par l\u2019organisation]."
      translations:
        en:
          description: 'Terminate a user session automatically after [Assignment:
            organization-defined conditions or trigger events requiring session disconnect].'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.11.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.11
      ref_id: 03.01.11.disc
      name: Discussion
      description: "Cette exigence concerne la fin d\u2019une session logique initi\xE9\
        e par l\u2019utilisateur, par opposition \xE0 la fin d\u2019une connexion\
        \ r\xE9seau qui est associ\xE9e \xE0 une session de communication (c\u2019\
        est-\xE0-dire une d\xE9connexion r\xE9seau) pr\xE9sent\xE9e dans l\u2019exigence\
        \ **D\xE9connexion r\xE9seau 03.13.09**. Une session logique est lanc\xE9\
        e chaque fois qu\u2019une utilisatrice ou un utilisateur (ou un processus\
        \ ex\xE9cut\xE9 en son nom) acc\xE8de \xE0 un syst\xE8me. Il est possible\
        \ de mettre fin aux sessions logiques (ce qui met fin \xE0 l\u2019acc\xE8\
        s de l\u2019utilisatrice ou utilisateur) sans mettre fin aux sessions r\xE9\
        seau. La fin d\u2019une session arr\xEAte tous les processus syst\xE8me associ\xE9\
        s \xE0 une session logique d\u2019utilisateur, \xE0 l\u2019exception des processus\
        \ qui ont \xE9t\xE9 cr\xE9\xE9s par l\u2019utilisatrice ou utilisateur (c\u2019\
        est-\xE0-dire la ou le responsable de la session) et qui sont destin\xE9s\
        \ \xE0 se poursuivre lorsque la session est termin\xE9e. Les conditions ou\
        \ les \xE9v\xE9nements d\xE9clenchant la fin automatique d\u2019une session\
        \ peuvent inclure les p\xE9riodes d\u2019inactivit\xE9 de l\u2019utilisateur\
        \ d\xE9finies par l\u2019organisation, des restrictions li\xE9es au moment\
        \ de la journ\xE9e pour l\u2019utilisation du syst\xE8me et des r\xE9ponses\
        \ cibl\xE9es \xE0 certains types d\u2019incidents."
      translations:
        en:
          name: Discussion
          description: "This requirement addresses the termination of user-initiated\
            \ logical sessions in contrast to the termination of network connections\
            \ that are associated with communications sessions (i.e., disconnecting\
            \ from the network) in **Network disconnect 03.13.09**. A logical session\
            \ is initiated whenever a user (or processes acting on behalf of a user)\
            \ accesses a system. Logical sessions can be terminated (and thus terminate\
            \ user access) without terminating network sessions. Session termination\
            \ ends all system processes associated with a user\u2019s logical session\
            \ except those processes that are created by the user (i.e., session owner)\
            \ to continue after the session is terminated. Conditions or trigger events\
            \ that require automatic session termination can include organization-defined\
            \ periods of user inactivity, time-of-day restrictions on system use,\
            \ and targeted responses to certain types of incidents."
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.12
