    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.18.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.18
      ref_id: 03.01.18.disc
      name: Discussion
      description: "Un appareil mobile est un dispositif informatique de petite taille\
        \ qui peut facilement \xEAtre transport\xE9 par une personne. Il est con\xE7\
        u pour fonctionner sans connexion physique, il dispose d\u2019un stockage\
        \ de donn\xE9es local, fixe ou amovible. Il comprend \xE9galement une source\
        \ d\u2019alimentation autonome. Les fonctionnalit\xE9s des appareils mobiles\
        \ peuvent \xE9galement comprendre des capacit\xE9s de communication vocale,\
        \ des capteurs embarqu\xE9s permettant aux appareils de recueillir des donn\xE9\
        es et/ou des fonctions int\xE9gr\xE9es de synchronisation de donn\xE9es locale\
        \ avec des emplacements distants. Les t\xE9l\xE9phones intelligents, les montres\
        \ intelligentes et les tablettes sont des exemples d\u2019appareils mobiles.\
        \ Les appareils mobiles sont typiquement associ\xE9s \xE0 une seule personne.\
        \ Les capacit\xE9s de traitement, de stockage et de transmission des appareils\
        \ mobiles peuvent \xEAtre comparables \xE0 un sous-ensemble d\u2019ordinateurs\
        \ blocs-notes ou d\u2019ordinateurs de bureau, selon la nature et l\u2019\
        utilisation pr\xE9vue de l\u2019appareil. La protection et le contr\xF4le\
        \ des appareils mobiles sont bas\xE9s sur les comportements et les politiques\
        \ et n\xE9cessitent que les utilisatrices et utilisateurs effectuent des op\xE9\
        rations physiques afin de prot\xE9ger et de contr\xF4ler leurs appareils lorsqu\u2019\
        ils se trouvent \xE0 l\u2019ext\xE9rieur des zones contr\xF4l\xE9es. Les zones\
        \ contr\xF4l\xE9es sont des espaces dans lesquels les organisations fournissent\
        \ des contr\xF4les physiques ou proc\xE9duraux afin de respecter les exigences\
        \ \xE9tablies pour la protection de l\u2019information d\xE9sign\xE9e.\n\n\
        En raison de la grande vari\xE9t\xE9 d\u2019appareils mobiles, y compris leur\
        \ vaste gamme de caract\xE9ristiques et de capacit\xE9s, les restrictions\
        \ organisationnelles peuvent varier en fonction des classes ou des types d\u2019\
        appareils. Les restrictions d\u2019utilisation ainsi que les exigences en\
        \ mati\xE8re de configuration et de connexion impos\xE9es aux appareils mobiles\
        \ comprennent notamment la gestion de la configuration, l\u2019identification\
        \ et l\u2019authentification des appareils, la mise en \u0153uvre obligatoire\
        \ de logiciels de protection, le balayage des appareils afin de d\xE9tecter\
        \ les programmes malveillants, la mise \xE0 jour des logiciels antivirus,\
        \ la recherche des mises \xE0 jour et des correctifs critiques, la v\xE9rification\
        \ de l\u2019int\xE9grit\xE9 du syst\xE8me d\u2019exploitation de base et possiblement\
        \ d\u2019autres logiciels, et la d\xE9sactivation du mat\xE9riel qui n\u2019\
        est pas n\xE9cessaire. Sur les appareils mobiles, des contenants s\xE9curis\xE9\
        s offrent une isolation logicielle des donn\xE9es destin\xE9e \xE0 segmenter\
        \ les applications et donn\xE9es organisationnelles, et les applications et\
        \ donn\xE9es personnelles. Des contenants peuvent pr\xE9senter diff\xE9rentes\
        \ interfaces utilisateur, l\u2019une des plus courantes \xE9tant une application\
        \ mobile agissant \xE0 titre de portail vers une suite d\u2019applications\
        \ de productivit\xE9 des activit\xE9s, comme le courriel, les contacts et\
        \ le calendrier. Les organisations peuvent utiliser un chiffrement complet\
        \ des appareils ou un chiffrement des contenants afin de prot\xE9ger la confidentialit\xE9\
        \ de l\u2019information d\xE9sign\xE9e sur les appareils mobiles."
      translations:
        en:
          name: Discussion
          description: 'A mobile device is a computing device that has a small form
            factor such that it can easily be carried by a single individual; is designed
            to operate without a physical connection; possesses local, non-removable,
            or removable data storage; and includes a self-contained power source.
            Mobile device functionality may also include voice communication capabilities,
            on-board sensors that allow the device to capture information, and/or
            built-in features for synchronizing local data with remote locations.
            Examples include smart phones, smart watches, and tablets. Mobile devices
            are typically associated with a single individual. The processing, storage,
            and transmission capabilities of mobile devices may be comparable to or
            a subset of notebook or desktop systems, depending on the nature and intended
            purpose of the device. The protection and control of mobile devices are
            behaviour- or policy-based and requires users to take physical action
            to protect and control such devices when outside of controlled areas.
            Controlled areas are spaces for which the organization provides physical
            or procedural controls to meet the requirements established for protecting
            specified information.


            Due to the large variety of mobile devices with different characteristics
            and capabilities, organizational restrictions may vary for the different
            classes or types of such devices. Usage restrictions, configuration requirements,
            and connection requirements for mobile devices include configuration management,
            device identification and authentication, implementing mandatory protective
            software, scanning devices for malicious code, updating virus <abbr title="Virus&#10;A
            computer program that can spread by making copies of itself. Computer
            viruses spread from one computer to another, usually without the knowledge
            of the user. Viruses can have harmful effects, ranging from displaying
            irritating messages to stealing data or giving other users control over
            the infected computer."><sup>(?)</sup></abbr> protection software, scanning
            for critical software updates and patches, conducting primary operating
            system and possibly other software integrity checks, and disabling unnecessary
            hardware. On mobile devices, secure containers provide software-based
            data isolation designed to segment enterprise applications and information
            from personal apps and data. Containers may present multiple user interfaces,
            one of the most common being a mobile application that acts as a portal
            to a suite of business productivity apps, such as email, contacts, and
            calendar. Organizations can employ full-device encryption or container-based
            encryption to protect the confidentiality of specified information on
            mobile devices.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.01.20
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.1
      ref_id: 03.01.20
