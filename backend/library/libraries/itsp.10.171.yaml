    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.02.02.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.02.02
      ref_id: 03.02.02.disc
      name: Discussion
      description: "Les organisations doivent d\xE9terminer le contenu et la fr\xE9\
        quence des formations relatives \xE0 la s\xE9curit\xE9 et \xE0 la protection\
        \ de la vie priv\xE9e en fonction des t\xE2ches, des r\xF4les et des responsabilit\xE9\
        s des personnes ainsi que des exigences en mati\xE8re de s\xE9curit\xE9 et\
        \ de protection de la vie priv\xE9e des syst\xE8mes auxquels le personnel\
        \ autoris\xE9 peut acc\xE9der. De plus, les organisations doivent fournir\
        \ une formation technique sur la s\xE9curit\xE9 adapt\xE9e \xE0 chacun des\
        \ r\xF4les suivants : d\xE9veloppeuses et d\xE9veloppeurs de syst\xE8me, architectes\
        \ d\u2019entreprise, architectes de la s\xE9curit\xE9, agentes et agents de\
        \ protection de la vie priv\xE9e, d\xE9veloppeuses et d\xE9veloppeurs de logiciels,\
        \ int\xE9gratrices et int\xE9grateurs de syst\xE8mes, responsables de l\u2019\
        acquisition et de l\u2019approvisionnement, administratrices et administrateurs\
        \ de syst\xE8me et de r\xE9seau, personnel responsable des activit\xE9s de\
        \ gestion de la configuration et de v\xE9rification, personnel r\xE9alisant\
        \ des v\xE9rifications et des validations ind\xE9pendantes, \xE9valuatrices\
        \ et \xE9valuateurs de la s\xE9curit\xE9 et personnel dot\xE9 d\u2019un acc\xE8\
        s logiciel de niveau syst\xE8me.\n\nUne formation compl\xE8te ax\xE9e sur\
        \ les r\xF4les permet de tenir compte des r\xF4les et responsabilit\xE9s gestionnels,\
        \ op\xE9rationnels et techniques et pr\xE9sente des contr\xF4les physiques,\
        \ techniques et s\u2019appliquant au personnel. Une telle formation peut porter\
        \ sur les politiques, les proc\xE9dures, les outils et les art\xE9facts qui\
        \ sont adapt\xE9s aux r\xF4les de s\xE9curit\xE9 et de protection de la vie\
        \ priv\xE9e. Dans le cadre de leur programme de s\xE9curit\xE9 de l\u2019\
        information, les organisations doivent \xE9galement fournir la formation n\xE9\
        cessaire afin que les personnes puissent s\u2019acquitter de leurs responsabilit\xE9\
        s en mati\xE8re de s\xE9curit\xE9 des op\xE9rations et de la cha\xEEne d\u2019\
        approvisionnement."
      translations:
        en:
          name: Discussion
          description: 'Organizations determine the content and frequency of security
            and privacy training based on the assigned duties, roles, and responsibilities
            of individuals and the security and privacy requirements of the systems
            to which personnel have authorized access. In addition, organizations
            provide system developers, enterprise architects, security architects,
            privacy officers, software developers, systems integrators, acquisition/procurement
            officials, system and network administrators, personnel conducting configuration
            management and auditing activities, personnel performing independent verification
            and validation, security assessors, and personnel with access to system-level
            software with security-related technical training specifically tailored
            for their assigned duties.


            Comprehensive role-based training addresses management, operational, and
            technical roles and responsibilities that cover physical, personnel, and
            technical controls. Such training can include policies, procedures, tools,
            and artifacts for the security and privacy roles defined. Organizations
            also provide the training necessary for individuals to carry out their
            responsibilities related to operations and supply chain security within
            the context of organizational information security programs.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:3.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3
      ref_id: '3.3'
      name: "V\xE9rification et responsabilit\xE9"
      description: "Les contr\xF4les de v\xE9rification et de responsabilit\xE9 permettent\
        \ de recueillir, d\u2019analyser et de stocker les enregistrements de v\xE9\
        rification associ\xE9s aux op\xE9rations des utilisatrices et utilisateurs\
        \ r\xE9alis\xE9es sur le syst\xE8me."
      translations:
        en:
          name: Audit and accountability
          description: The Audit and accountability controls support the ability to
            collect, analyze, and store audit records associated with user operations
            performed within the system.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.03.01
