    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:itsp.10.171:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: Introduction
      description: "Cette publication est la version canadienne du document [NIST\
        \ SP 800-171 Protecting Controlled Unclassified Information in Nonfederal\
        \ Systems and Organizations (en anglais seulement)](https://csrc.nist.gov/pubs/sp/800/171/r3/final).\
        \ Il n\u2019y a pas de changements techniques importants entre le pr\xE9sent\
        \ document et le document NIST SP 800-171 (en anglais seulement). Les principales\
        \ modifications concernent les diff\xE9rences entre les lois, les politiques,\
        \ les directives, les normes et les lignes directrices. Autrement dit, les\
        \ changements tiennent compte du contexte r\xE9glementaire et de conformit\xE9\
        \ canadien distinct; aucun changement n\u2019a \xE9t\xE9 apport\xE9 au contexte\
        \ technique sous-jacent.\n\nCes contr\xF4les sont align\xE9s sur le Catalogue\
        \ des activit\xE9s d\u2019assurance et des contr\xF4les de s\xE9curit\xE9\
        \ et de protection de la vie priv\xE9e (ITSP.10.033), qui est une version\
        \ adapt\xE9e au contexte canadien du document [NIST SP 800-53 Rev. 5 Security\
        \ and Privacy Controls for Information Systems and Organizations (en anglais\
        \ seulement)](https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final).\n\nL\u2019\
        information d\xE9sign\xE9e comprend toute information autre que classifi\xE9\
        e qu\u2019une autorit\xE9 du <abbr title=\"gouvernement du Canada\">GC</abbr>\
        \ d\xE9signe et mentionne dans un contrat comme devant faire l\u2019objet\
        \ d\u2019une sauvegarde. L\u2019information prot\xE9g\xE9e, y compris les\
        \ exigences de protection et de diffusion connexes, est d\xE9finie par le\
        \ Secr\xE9tariat du Conseil du Tr\xE9sor du Canada (SCT) dans le document\
        \ [<abbr title=\"Secr\xE9tariat du Conseil du Tr\xE9sor du Canada\">SCT</abbr>\
        \ \u2212 Directive sur la gestion de la s\xE9curit\xE9 \u2013 Annexe J : Norme\
        \ sur la cat\xE9gorisation de s\xE9curit\xE9](https://www.tbs-sct.canada.ca/pol/doc-fra.aspx?id=32614)\
        \ et codifi\xE9e dans le document [<abbr title=\"Secr\xE9tariat du Conseil\
        \ du Tr\xE9sor du Canada\">SCT</abbr> \u2212 Politique sur la protection de\
        \ la vie priv\xE9e](https://www.tbs-sct.canada.ca/pol/doc-fra.aspx?id=12510).\
        \ Nous employons le terme \xAB information d\xE9sign\xE9e \xBB \xE0 la place\
        \ du terme anglais \xAB controlled unclassified information \xBB (CUI) utilis\xE9\
        \ dans le document am\xE9ricain, et dont l\u2019\xE9quivalent fran\xE7ais\
        \ est \xAB information non classifi\xE9e contr\xF4l\xE9e \xBB.\n\nLes minist\xE8\
        res et organismes du <abbr title=\"gouvernement du Canada\">GC</abbr> doivent\
        \ suivre les politiques et les directives publi\xE9es par le <abbr title=\"\
        Secr\xE9tariat du Conseil du Tr\xE9sor du Canada\">SCT</abbr> lorsqu\u2019\
        ils utilisent des syst\xE8mes f\xE9d\xE9raux pour g\xE9rer, traiter, stocker\
        \ ou transmettre de l\u2019information[1].\n\nLa responsabilit\xE9 des minist\xE8\
        res et des organismes du <abbr title=\"gouvernement du Canada\">GC</abbr>\
        \ de prot\xE9ger l\u2019information d\xE9sign\xE9e demeure la m\xEAme lorsqu\u2019\
        elle communique une telle information \xE0 des organisations ne relevant pas\
        \ du <abbr title=\"gouvernement du Canada\">GC</abbr>. Par cons\xE9quent,\
        \ un niveau de protection similaire est n\xE9cessaire lorsque des organisations\
        \ \xE0 l\u2019ext\xE9rieur du <abbr title=\"gouvernement du Canada\">GC</abbr>\
        \ utilisent des syst\xE8mes ne relevant pas du <abbr title=\"gouvernement\
        \ du Canada\">GC</abbr> pour g\xE9rer, traiter, stocker ou transmettre de\
        \ l\u2019information d\xE9sign\xE9e. Afin d\u2019assurer un niveau de protection\
        \ coh\xE9rent, les exigences de s\xE9curit\xE9 pour la protection de l\u2019\
        information d\xE9sign\xE9e dans les organisations et les syst\xE8mes ne relevant\
        \ pas du <abbr title=\"gouvernement du Canada\">GC</abbr> doivent \xEAtre\
        \ conformes aux documents suivants : [<abbr title=\"Secr\xE9tariat du Conseil\
        \ du Tr\xE9sor du Canada\">SCT</abbr> \u2212 Politique sur la s\xE9curit\xE9\
        \ du gouvernement](https://www.tbs-sct.canada.ca/pol/doc-fra.aspx?id=16578),\
        \ [<abbr title=\"Secr\xE9tariat du Conseil du Tr\xE9sor du Canada\">SCT</abbr>\
        \ \u2212 Politique sur les services et le num\xE9rique](https://www.tbs-sct.canada.ca/pol/doc-fra.aspx?id=32603)\
        \ et <abbr title=\"Secr\xE9tariat du Conseil du Tr\xE9sor du Canada\">SCT</abbr>\
        \ \u2212 Politique sur la protection de la vie priv\xE9e.\n\nLes contr\xF4\
        les et les activit\xE9s de s\xE9curit\xE9 pr\xE9sent\xE9s dans cette publication\
        \ prennent en consid\xE9ration les exigences associ\xE9es aux contrats f\xE9\
        d\xE9raux.\n\nLe pr\xE9sent document n\u2019int\xE8gre pas tous les ensembles\
        \ de contr\xF4les et d\u2019activit\xE9s associ\xE9s \xE0 la protection de\
        \ la vie priv\xE9e d\xE9crits dans l\u2019ITSP.10.033. Il pr\xE9sente plut\xF4\
        t un sous-ensemble des contr\xF4les associ\xE9s \xE0 la protection de la vie\
        \ priv\xE9e qui sont communs avec les contr\xF4les de confidentialit\xE9."
      annotation: "[1] Syst\xE8me utilis\xE9 ou exploit\xE9 par un minist\xE8re ou\
        \ un organisme du <abbr title=\"gouvernement du Canada\">GC</abbr>, par une\
        \ entrepreneure ou un entrepreneur, ou par une autre organisation au nom d\u2019\
        un minist\xE8re ou d\u2019un organisme. Le terme \xAB syst\xE8me \xBB, tel\
        \ qu\u2019il est utilis\xE9 dans cette publication, comprend les personnes,\
        \ les processus et les technologies qui interviennent dans la gestion, le\
        \ traitement, le stockage ou la transmission d\u2019information d\xE9sign\xE9\
        e. Les syst\xE8mes peuvent inclure les technologies op\xE9rationnelles (TO),\
        \ les technologies de l\u2019information (TI), les dispositifs de l\u2019\
        Internet des objets <abbr title=\"Internet des objets&#10;R\xE9seau form\xE9\
        \ par les dispositifs Web utilis\xE9s couramment, qui peuvent se connecter\
        \ les uns aux autres et qui peuvent se transmettre de l&#x27;information.\"\
        ><sup>(?)</sup></abbr> (IdO), les dispositifs de l\u2019Internet industriel\
        \ des objets (IIdO), les syst\xE8mes sp\xE9cialis\xE9s, les cybersyst\xE8\
        mes physiques, les syst\xE8mes embarqu\xE9s et les capteurs."
      translations:
        en:
          name: Introduction
          description: "This publication is a Canadian version of [NIST SP 800-171\
            \ Protecting Controlled Unclassified Information in Nonfederal Systems\
            \ and Organizations](https://csrc.nist.gov/pubs/sp/800/171/r3/final).\
            \ There are no substantial technical changes between this publication\
            \ and NIST SP 800-171. The primary modifications arise from differences\
            \ in laws, policies, directives, standards and guidelines. In other words,\
            \ the changes reflect the distinct Canadian regulatory and compliance\
            \ landscape; there are no changes to the underlying technical context.\n\
            \nThe controls are aligned with Security and privacy controls and assurance\
            \ activities catalogue (ITSP.10.033), which is a version of [NIST SP 800-53\
            \ Rev. 5 Security and Privacy Controls for Information Systems and Organizations](https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final)\
            \ adapted to the Canadian context.\n\nSpecified information includes any\
            \ information, other than classified, that a GC authority identifies and\
            \ qualifies in a contract as requiring safeguarding. Protected information,\
            \ as well as the safeguarding and dissemination requirements for such\
            \ information, is defined by the Treasury Board of Canada Secretariat\
            \ [<abbr title=\"Treasury Board Secretariat\">TBS</abbr> Directive on\
            \ Security Management, Appendix J: Standard on Security Categorization](https://www.tbs-sct.canada.ca/pol/doc-eng.aspx?id=32614)\
            \ and is codified in the [<abbr title=\"Treasury Board Secretariat\">TBS</abbr>\
            \ Policy on Privacy Protection](https://www.tbs-sct.canada.ca/pol/doc-eng.aspx?id=12510).\
            \ We use the term \u201Cspecified information\u201D in place of \u201C\
            controlled unclassified information\u201D (CUI) which is used in the US\
            \ document.\n\nGC departments and agencies are required to follow the\
            \ policies and directives published by <abbr title=\"Treasury Board Secretariat\"\
            >TBS</abbr> when using federal systems to handle, process, store, or transmit\
            \ information[1].\n\nThe responsibility of <abbr title=\"Government of\
            \ Canada\">GC</abbr> departments and agencies to protect specified information\
            \ remains the same when sharing it with non-<abbr title=\"Government of\
            \ Canada\">GC</abbr> organizations. Therefore, a similar level of protection\
            \ is needed when non-<abbr title=\"Government of Canada\">GC</abbr> organizations\
            \ using non-<abbr title=\"Government of Canada\">GC</abbr> systems handle,\
            \ process, store or transmit specified information. To maintain a consistent\
            \ level of protection, the security requirements for safeguarding specified\
            \ information in non-<abbr title=\"Government of Canada\">GC</abbr> systems\
            \ and organizations must comply with the [<abbr title=\"Treasury Board\
            \ Secretariat\">TBS</abbr> Policy on Government Security](https://www.tbs-sct.canada.ca/pol/doc-eng.aspx?id=16578),\
            \ [<abbr title=\"Treasury Board Secretariat\">TBS</abbr> Policy on Service\
            \ and Digital](https://www.tbs-sct.canada.ca/pol/doc-eng.aspx?id=32603),\
            \ and <abbr title=\"Treasury Board Secretariat\">TBS</abbr> Policy on\
            \ Privacy Protection.\n\nThe security controls and activities presented\
            \ in this publication outline requirements for federal contracting.\n\n\
            This publication does not contain the complete set of privacy-related\
            \ controls and activities described in ITSP.10.033. Rather, it contains\
            \ a subset of privacy-related controls that are shared with confidentiality-related\
            \ controls."
          annotation: '[1] System that is used or operated by a <abbr title="Government
            of Canada">GC</abbr> department or agency, by a contractor, or by another
            organization on behalf of a department or agency. The term system as used
            in this publication includes people, processes and technologies involved
            in the handling, processing, storage or transmission of specified information.
            Systems can include operational technology (OT), information technology
            (IT), Internet of Things (IoT) devices, industrial IoT (IIoT) devices,
            specialized systems, cyber-physical systems, embedded systems, and sensors.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:1.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:1
      ref_id: '1.1'
      name: Objectif
      description: "La pr\xE9sente publication pr\xE9sente aux minist\xE8res et aux\
        \ organismes du <abbr title=\"gouvernement du Canada\">GC</abbr> des exigences\
        \ de s\xE9curit\xE9 recommand\xE9es visant \xE0 prot\xE9ger la confidentialit\xE9\
        \ de l\u2019information d\xE9sign\xE9e lorsque l\u2019information se trouve\
        \ dans des syst\xE8mes et des organisations ne relevant pas du <abbr title=\"\
        gouvernement du Canada\">GC</abbr> et lorsqu\u2019il n\u2019existe pas d\u2019\
        autres exigences de protection particuli\xE8res impos\xE9es par des lois,\
        \ des r\xE9glementations ou des politiques s\u2019appliquant \xE0 l\u2019\xE9\
        chelle gouvernementale pour la cat\xE9gorie d\u2019information d\xE9sign\xE9\
        e.\n\nLes exigences de s\xE9curit\xE9 dans la pr\xE9sente publication ne s\u2019\
        appliquent qu\u2019aux composants[2] des syst\xE8mes ne relevant pas du <abbr\
        \ title=\"gouvernement du Canada\">GC</abbr> qui g\xE8rent, traitent, stockent\
        \ ou transmettent de l\u2019information d\xE9sign\xE9e ou qui prot\xE8gent\
        \ de tels composants. Ces exigences serviront aux minist\xE8res et aux organismes\
        \ du <abbr title=\"gouvernement du Canada\">GC</abbr> dans le cadre de contrats\
        \ ou d\u2019autres ententes \xE9tablies avec des organisations ne relevant\
        \ pas du <abbr title=\"gouvernement du Canada\">GC</abbr>.\n\nIl est important\
        \ d\u2019\xE9tablir ad\xE9quatement la port\xE9e des exigences impos\xE9es\
        \ aux organisations ne relevant pas du <abbr title=\"gouvernement du Canada\"\
        >GC</abbr> lors des d\xE9cisions d\u2019investissement en mati\xE8re de protection\
        \ et de la gestion des risques li\xE9s \xE0 la s\xE9curit\xE9. Dans le cadre\
        \ des activit\xE9s de conception associ\xE9es aux composants syst\xE8me pour\
        \ la gestion, le traitement, le stockage ou la transmission d\u2019information\
        \ d\xE9sign\xE9e, les organisations ne relevant pas du <abbr title=\"gouvernement\
        \ du Canada\">GC</abbr> peuvent limiter la port\xE9e des exigences de s\xE9\
        curit\xE9 qui s\u2019appliquent gr\xE2ce \xE0 l\u2019isolation des composants\
        \ syst\xE8me dans un domaine de s\xE9curit\xE9 s\xE9par\xE9. L\u2019isolation\
        \ est possible gr\xE2ce \xE0 des concepts architecturaux et de conception\
        \ (par exemple, la mise en \u0153uvre de sous-r\xE9seaux dot\xE9s de pare-feu\
        \ ou d\u2019autres dispositifs de protection de p\xE9rim\xE8tre <abbr title=\"\
        P\xE9rim\xE8tre&#10;Fronti\xE8re entre deux zones de s\xE9curit\xE9 r\xE9\
        seau \xE0 travers laquelle le trafic est achemin\xE9.\"><sup>(?)</sup></abbr>\
        \ et l\u2019utilisation de m\xE9canismes de contr\xF4le de flux d\u2019information).\
        \ Les domaines de s\xE9curit\xE9 peuvent utiliser une s\xE9paration physique,\
        \ une s\xE9paration logique ou une combinaison des deux. Une telle approche\
        \ peut fournir une s\xE9curit\xE9 ad\xE9quate pour l\u2019information d\xE9\
        sign\xE9e, tout en \xE9vitant d\u2019augmenter la posture de s\xE9curit\xE9\
        \ d\u2019une organisation ne relevant pas du <abbr title=\"gouvernement du\
        \ Canada\">GC</abbr> au-del\xE0 du niveau requis afin de prot\xE9ger ses missions,\
        \ ses op\xE9rations et ses actifs."
      annotation: "[2] Les composants incluent les postes de travail, les serveurs,\
        \ les ordinateurs blocs-notes, les t\xE9l\xE9phones intelligents, les tablettes,\
        \ les dispositifs d\u2019entr\xE9e-sortie, les composants r\xE9seau, les syst\xE8\
        mes d\u2019exploitation, les machines virtuelles, les syst\xE8mes de gestion\
        \ de base de donn\xE9es et les applications."
      translations:
        en:
          name: Purpose
          description: "This publication provides <abbr title=\"Government of Canada\"\
            >GC</abbr> departments and agencies with recommended security requirements\
            \ for protecting the confidentiality of specified information when in\
            \ resides in non-<abbr title=\"Government of Canada\">GC</abbr> systems\
            \ and organizations and where there are no specific safeguarding requirements\
            \ prescribed by the authorizing law, regulation, or government-wide policy\
            \ for the specified information category.\n\nThe security requirements\
            \ in this publication are only applicable to components[2] of non-<abbr\
            \ title=\"Government of Canada\">GC</abbr> systems that handle, process,\
            \ store, or transmit specified information or that provide protection\
            \ for such components. The requirements are intended to be used by <abbr\
            \ title=\"Government of Canada\">GC</abbr> departments and agencies in\
            \ contractual vehicles or other agreements established with non-<abbr\
            \ title=\"Government of Canada\">GC</abbr> organizations.\n\nIt is important\
            \ that non-<abbr title=\"Government of Canada\">GC</abbr> organizations\
            \ scope requirements appropriately when making protection-related investment\
            \ decisions and managing security risks. By designating system components\
            \ for handling, processing, storing or transmitting specified information,\
            \ non-<abbr title=\"Government of Canada\">GC</abbr> organizations can\
            \ limit the scope of the security requirements by isolating the system\
            \ components in a separate security domain. Isolation can be achieved\
            \ by applying architectural and design concepts (e.g., implementing subnetworks\
            \ with firewalls or other boundary protection devices and using information\
            \ flow control mechanisms). Security domains can use physical separation,\
            \ logical separation, or a combination of both. This approach can provide\
            \ adequate security for specified information and avoid increasing the\
            \ non-<abbr title=\"Government of Canada\">GC</abbr> organization\u2019\
            s security posture beyond what it requires for protecting its missions,\
            \ operations and assets."
          annotation: '[2] Components include workstations, servers, notebook computers,
            smartphones, tablets, input and output devices, network components, operating
            systems, virtual machines, database management systems, and applications.'
    - urn: urn:intuitem:risk:req_node:itsp.10.171:1.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:1
      ref_id: '1.2'
      name: Public cible
      description: "Cette publication est destin\xE9e \xE0 de nombreuses personnes\
        \ et organisations des secteurs publics et priv\xE9s, y compris :\n\u2022\
        \ les minist\xE8res et organismes du <abbr title=\"gouvernement du Canada\"\
