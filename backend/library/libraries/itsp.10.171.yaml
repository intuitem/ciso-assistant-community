        en:
          name: Security alerts, advisories, and directives
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.03.a
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.03
      ref_id: 03.14.03.A
      description: "Recevoir r\xE9guli\xE8rement d\u2019organisations externes des\
        \ alertes, des avis et des directives de s\xE9curit\xE9 concernant les syst\xE8\
        mes."
      translations:
        en:
          description: Receive system security alerts, advisories, and directives
            from external organizations on an ongoing basis
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.03.b
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.03
      ref_id: 03.14.03.B
      description: "G\xE9n\xE9rer et diffuser les alertes, les avis et les directives\
        \ de s\xE9curit\xE9 internes concernant les syst\xE8mes, au besoin."
      translations:
        en:
          description: Generate and disseminate internal system security alerts, advisories,
            and directives, as necessary
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.03.disc
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.03
      ref_id: 03.14.03.disc
      name: Discussion
      description: "Il existe de nombreuses sources publiques pour les alertes et\
        \ les avis de s\xE9curit\xE9 des syst\xE8mes. Par exemple, le Centre canadien\
        \ pour la cybers\xE9curit\xE9 (Centre pour la cybers\xE9curit\xE9) g\xE9n\xE8\
        re des alertes et des bulletins de s\xE9curit\xE9 pour assurer une connaissance\
        \ de la situation au sein des organismes du <abbr title=\"gouvernement du\
        \ Canada\">GC</abbr> et des organisations ne relevant pas du <abbr title=\"\
        gouvernement du Canada\">GC</abbr>. Les fournisseurs de logiciels, les services\
        \ d\u2019abonnement et les centres ISAC (pour Information Sharing and Analysis\
        \ Centres) de l\u2019industrie peuvent \xE9galement fournir des alertes et\
        \ des avis de s\xE9curit\xE9. La conformit\xE9 aux directives de s\xE9curit\xE9\
        \ est essentielle en raison de la nature critique d\u2019un grand nombre de\
        \ ces directives et des effets n\xE9fastes imm\xE9diats possibles sur les\
        \ op\xE9rations et les actifs organisationnels, sur les utilisatrices et utilisateurs,\
        \ sur d\u2019autres organisations et sur l\u2019ensemble du pays dans l\u2019\
        \xE9ventualit\xE9 o\xF9 les directives ne sont pas mises en \u0153uvre rapidement."
      translations:
        en:
          name: Discussion
          description: There are many publicly available sources of system security
            alerts and advisories. For example, the Canadian Centre for Cyber Security
            (Cyber Centre) generates security alerts and advisories to maintain situational
            awareness across the <abbr title="Government of Canada">GC</abbr> and
            in non-<abbr title="Government of Canada">GC</abbr> organizations. Software
            vendors, subscription services, and industry Information Sharing and Analysis
            Centres (ISACs) may also provide security alerts and advisories. Compliance
            with security directives is essential due to the critical nature of many
            of these directives and the potential immediate adverse effects on organizational
            operations and assets, individuals, other organizations, and Canada should
            the directives not be implemented in a timely manner.
    - urn: urn:intuitem:risk:req_node:itsp.10.171:03.14.06
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:itsp.10.171:3.14
