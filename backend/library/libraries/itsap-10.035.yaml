urn: urn:cccs:risk:framework:itsap10035_2024_fr
locale: fr
ref_id: ITSAP.10.035
name: Cybersécuritaire Canada – Contrôles de cybersécurité de base
description: Les 13 catégories de contrôles de cybersécurité de base pour les petites
  et moyennes organisations, publiées par le Centre canadien pour la cybersécurité
  (CCCS) dans le cadre du programme Cybersécuritaire Canada.
copyright: © Centre de la sécurité des télécommunications Canada 2024
version: 1
publication_date: 2026-06-06
provider: Centre canadien pour la cybersécurité (CCCS)
packager: L. Cambron-L. Legastelois – INF810 DESS Cybersécurité UdeS
objects:
  framework:
    urn: urn:cccs:risk:framework:itsap10035_2024_fr
    ref_id: ITSAP.10.035
    name: Cybersécuritaire Canada – Contrôles de cybersécurité de base
    description: Framework ITSAP.10.035 — 13 catégories, 57 contrôles évaluables.
      Généré pour CISO Assistant dans le cadre du projet CyberGouv360 (INF810).
    requirement_nodes:
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: Élaborer un plan d'intervention en cas d'incident
      description: Un plan vous permettra de réagir rapidement en cas d'incident,
        de restaurer les données et les systèmes essentiels et de minimiser les interruptions
        de service et les pertes de données.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1
      assessable: false
      depth: 2
      ref_id: '1.1'
      name: Développer et documenter le plan
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1.1
      assessable: true
      depth: 3
      ref_id: 1.1.1
      name: Documenter les procédures d'intervention
      description: Documenter les procédures à suivre lors d'un incident de cybersécurité,
        incluant les étapes de détection, de confinement, d'éradication et de récupération.
      annotation: 'Référence : ITSAP.40.003 – Élaborer un plan d''intervention en
        cas d''incident'
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1.2
      assessable: true
      depth: 3
      ref_id: 1.1.2
      name: Définir les rôles et responsabilités
      description: Identifier et documenter les rôles et responsabilités de chaque
        membre de l'équipe lors d'un incident (responsable SI, direction, TI, communications).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1.3
      assessable: true
      depth: 3
      ref_id: 1.1.3
      name: Établir une liste de contacts d'urgence
      description: 'Maintenir une liste à jour des personnes à contacter en cas d''incident
        : équipe interne, fournisseurs, partenaires, autorités compétentes.'
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1.4
      assessable: true
      depth: 3
      ref_id: 1.1.4
      name: Inclure des stratégies de sauvegarde des données
      description: Le plan doit inclure des stratégies explicites de sauvegarde et
        de restauration des données critiques en cas d'incident.
      annotation: 'Référence : ITSAP.40.004 – Élaboration d''un plan de reprise informatique'
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.2
      assessable: false
      depth: 2
      ref_id: '1.2'
      name: Tester et maintenir le plan
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.2.1
      assessable: true
      depth: 3
      ref_id: 1.2.1
      name: Tester le plan d'intervention régulièrement
      description: Réaliser des exercices de simulation (tabletop exercises) au moins
        une fois par an pour valider l'efficacité du plan d'intervention.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.2
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.2.2
      assessable: true
      depth: 3
      ref_id: 1.2.2
      name: Mettre à jour le plan après chaque incident ou exercice
      description: Réviser et mettre à jour le plan d'intervention suite à chaque
        incident réel ou exercice de simulation pour intégrer les leçons apprises.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:1.2
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: Appliquer des correctifs aux applications et aux systèmes d'exploitation
      description: Dès qu'un problème ou une vulnérabilité est détecté, les fabricants
        diffusent des correctifs. Les appliquer rapidement empêche les auteurs de
        menace d'exploiter ces vulnérabilités.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1
      assessable: false
      depth: 2
      ref_id: '2.1'
      name: Gestion des mises à jour logicielles
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:2
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1.1
      assessable: true
      depth: 3
      ref_id: 2.1.1
      name: Activer les mises à jour automatiques
      description: Activer l'application automatique des correctifs et des mises à
        jour pour tous les logiciels, systèmes d'exploitation et équipements réseau.
      annotation: 'Référence : ITSAP.10.096 – Comment les mises à jour sécurisent
        vos appareils'
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1.2
      assessable: true
      depth: 3
      ref_id: 2.1.2
      name: Maintenir un inventaire des logiciels et matériels
      description: Maintenir un inventaire à jour de tous les logiciels et équipements
        pour identifier rapidement les actifs nécessitant des correctifs.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1.3
      assessable: true
      depth: 3
      ref_id: 2.1.3
      name: Prioriser les correctifs critiques
      description: 'Établir un processus de priorisation des correctifs en fonction
        de la criticité des vulnérabilités (ex. : CVSS ≥ 7 dans les 72h).'
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1.4
      assessable: true
      depth: 3
      ref_id: 2.1.4
      name: Gérer les logiciels en fin de vie (EOL)
      description: Identifier et remplacer ou isoler les logiciels et systèmes d'exploitation
        qui ne reçoivent plus de correctifs de sécurité du fabricant.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:2.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:3
      assessable: false
      depth: 1
      ref_id: '3'
      name: Utiliser une authentification robuste
      description: Établir des politiques d'authentification qui répondent aux besoins
        de sécurité. S'assurer que les dispositifs authentifient les utilisateurs
        avant de leur donner accès aux systèmes.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.1
      assessable: false
      depth: 2
      ref_id: '3.1'
      name: Authentification multifacteur (MFA)
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:3
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.1.1
      assessable: true
      depth: 3
      ref_id: 3.1.1
      name: Implémenter l'authentification multifacteur (MFA)
      description: Déployer le MFA pour tous les accès aux systèmes critiques, aux
        comptes privilégiés et aux accès distants (VPN, portails Web).
      annotation: 'Référence : ITSAP.30.030 – Sécurisez vos comptes avec l''authentification
        multifacteur'
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.1.2
      assessable: true
      depth: 3
      ref_id: 3.1.2
      name: Appliquer une politique de mots de passe robuste
      description: Exiger des mots de passe ou phrases de passe forts (min. 12 caractères),
        uniques par service, et les renouveler en cas de compromission.
      annotation: 'Référence : ITSAP.30.032 – Pratiques exemplaires de création de
        phrases de passe'
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.2
      assessable: false
      depth: 2
      ref_id: '3.2'
      name: Gestion des accès et des sessions
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:3
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.2.1
      assessable: true
      depth: 3
      ref_id: 3.2.1
      name: Implémenter la gestion des identités et des accès (IAM)
      description: Mettre en place un système centralisé de gestion des identités
        pour contrôler et auditer les accès aux systèmes et données.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.2
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.2.2
      assessable: true
      depth: 3
      ref_id: 3.2.2
      name: Configurer le verrouillage automatique des sessions
      description: 'Configurer le verrouillage automatique des sessions après une
        période d''inactivité définie (ex. : 10–15 minutes).'
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:3.2
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: Faire des sauvegardes et chiffrer les données
      description: Copier les informations et applications critiques vers un ou plusieurs
        emplacements sécurisés. Chiffrer les données sensibles en transit et au repos.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.1
      assessable: false
      depth: 2
      ref_id: '4.1'
      name: Sauvegardes des données
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:4
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.1.1
      assessable: true
      depth: 3
      ref_id: 4.1.1
      name: Mettre en place une stratégie de sauvegarde (règle 3-2-1)
      description: 'Appliquer la règle 3-2-1 : 3 copies des données, sur 2 supports
        différents, dont 1 hors site ou dans le nuage.'
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.1.2
      assessable: true
      depth: 3
      ref_id: 4.1.2
      name: Tester la restauration des sauvegardes régulièrement
      description: Vérifier périodiquement (au moins trimestriellement) que les sauvegardes
        peuvent être restaurées avec succès et dans les délais requis.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.1.3
      assessable: true
      depth: 3
      ref_id: 4.1.3
      name: Isoler les sauvegardes du réseau principal
      description: S'assurer que les sauvegardes sont stockées dans un environnement
        isolé (air-gap ou immuable) pour les protéger des rançongiciels.
      annotation: 'Référence : ITSAP.00.099 – Comment prévenir les rançongiciels et
        s''en remettre'
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.2
      assessable: false
      depth: 2
      ref_id: '4.2'
      name: Chiffrement des données
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:4
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.2.1
      assessable: true
      depth: 3
      ref_id: 4.2.1
      name: Chiffrer les données sensibles au repos
      description: Chiffrer les données sensibles stockées sur les serveurs, appareils
        mobiles, supports amovibles et dans le nuage (AES-256 ou équivalent).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.2
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.2.2
      assessable: true
      depth: 3
      ref_id: 4.2.2
      name: Chiffrer les données en transit
      description: Utiliser des protocoles de chiffrement (TLS 1.2 minimum, TLS 1.3
        recommandé) pour toutes les communications réseau contenant des données sensibles.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:4.2
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:5
      assessable: false
      depth: 1
      ref_id: '5'
      name: Activer les logiciels de sécurité
      description: Activer les pare-feu et installer des antivirus et antimaliciels
        sur tous les dispositifs. Télécharger les logiciels uniquement auprès de fournisseurs
        de bonne réputation.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1
      assessable: false
      depth: 2
      ref_id: '5.1'
      name: Protection des postes de travail
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:5
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1.1
      assessable: true
      depth: 3
      ref_id: 5.1.1
      name: Déployer un antivirus et antimaliciel sur tous les appareils
      description: Installer et maintenir à jour un logiciel antivirus et antimaliciel
        sur tous les appareils (postes, serveurs, mobiles).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1.2
      assessable: true
      depth: 3
      ref_id: 5.1.2
      name: Activer les pare-feu sur tous les dispositifs
      description: Activer et configurer les pare-feu sur tous les postes de travail,
        serveurs et équipements réseau.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1.3
      assessable: true
      depth: 3
      ref_id: 5.1.3
      name: Installer un filtre DNS pour bloquer les sites malveillants
      description: 'Déployer un filtre DNS (ex. : Cisco Umbrella, Cloudflare Gateway)
        pour bloquer les sites Web malveillants et le contenu dangereux.'
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1.4
      assessable: true
      depth: 3
      ref_id: 5.1.4
      name: Activer la détection et réponse aux points de terminaison (EDR)
      description: Déployer une solution EDR pour détecter, analyser et répondre aux
        menaces avancées sur les postes de travail et serveurs.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:5.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:6
      assessable: false
      depth: 1
      ref_id: '6'
      name: Gérer les accès et les privilèges
      description: Limiter l'accès des utilisateurs aux ressources dont ils ont besoin
        pour leurs tâches. Appliquer le principe du moindre privilège.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1
      assessable: false
      depth: 2
      ref_id: '6.1'
      name: Contrôle des accès utilisateurs
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:6
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1.1
      assessable: true
      depth: 3
      ref_id: 6.1.1
      name: Appliquer le principe du moindre privilège
      description: Accorder aux utilisateurs uniquement les droits d'accès minimaux
        nécessaires à l'exécution de leurs tâches professionnelles.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1.2
      assessable: true
      depth: 3
      ref_id: 6.1.2
      name: Contrôler et limiter les accès administrateurs
      description: Restreindre le nombre de comptes administrateurs. Utiliser des
        comptes dédiés pour les tâches administratives, distincts des comptes courants.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1.3
      assessable: true
      depth: 3
      ref_id: 6.1.3
      name: Réviser périodiquement les droits d'accès
      description: Effectuer une revue périodique (semestrielle minimum) des droits
        d'accès de tous les utilisateurs pour révoquer les accès non nécessaires.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1.4
      assessable: true
      depth: 3
      ref_id: 6.1.4
      name: Désactiver immédiatement les comptes des anciens employés
      description: Mettre en place un processus de désactivation immédiate des comptes
        lors du départ d'un employé ou d'un changement de poste.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:6.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:7
      assessable: false
      depth: 1
      ref_id: '7'
      name: Sécuriser les appareils mobiles
      description: Mettre en place des politiques et contrôles pour sécuriser les
        appareils mobiles (téléphones, tablettes, ordinateurs portables) utilisés
        pour accéder aux systèmes organisationnels.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1
      assessable: false
      depth: 2
      ref_id: '7.1'
      name: Politiques de gestion des appareils mobiles
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:7
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1.1
      assessable: true
      depth: 3
      ref_id: 7.1.1
      name: Mettre en place une solution MDM (Mobile Device Management)
      description: Déployer une solution de gestion des appareils mobiles pour appliquer
        les politiques de sécurité sur tous les appareils mobiles.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1.2
      assessable: true
      depth: 3
      ref_id: 7.1.2
      name: Exiger le chiffrement des appareils mobiles
      description: S'assurer que tous les appareils mobiles (y compris les appareils
        personnels utilisés à des fins professionnelles – BYOD) ont le chiffrement
        activé.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1.3
      assessable: true
      depth: 3
      ref_id: 7.1.3
      name: Activer le verrouillage et l'effacement à distance
      description: Configurer la capacité de verrouiller ou d'effacer à distance les
        appareils mobiles en cas de perte ou de vol.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1.4
      assessable: true
      depth: 3
      ref_id: 7.1.4
      name: Établir une politique BYOD documentée
      description: Documenter et communiquer une politique claire sur l'utilisation
        des appareils personnels (BYOD) pour accéder aux ressources organisationnelles.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:7.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:8
      assessable: false
      depth: 1
      ref_id: '8'
      name: Établir un périmètre de réseau sécurisé
      description: Mettre en place des contrôles pour sécuriser le périmètre réseau
        de l'organisation et limiter les accès non autorisés.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1
      assessable: false
      depth: 2
      ref_id: '8.1'
      name: Segmentation et protection du réseau
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:8
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1.1
      assessable: true
      depth: 3
      ref_id: 8.1.1
      name: Segmenter le réseau en zones de sécurité
      description: 'Diviser le réseau en segments distincts (ex. : DMZ, réseau interne,
        réseau invité) pour limiter la propagation des attaques.'
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1.2
      assessable: true
      depth: 3
      ref_id: 8.1.2
      name: Configurer et maintenir les règles de pare-feu réseau
      description: Déployer et configurer des pare-feu réseau avec des règles de filtrage
        strictes basées sur le principe du moindre privilège.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1.3
      assessable: true
      depth: 3
      ref_id: 8.1.3
      name: Sécuriser les accès distants (VPN)
      description: Utiliser un VPN chiffré pour tous les accès distants aux ressources
        organisationnelles. Combiner avec MFA.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1.4
      assessable: true
      depth: 3
      ref_id: 8.1.4
      name: Sécuriser les réseaux sans fil (Wi-Fi)
      description: Utiliser WPA3 (ou WPA2 minimum) pour les réseaux Wi-Fi. Séparer
        les réseaux invités des réseaux internes.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1.5
      assessable: true
      depth: 3
      ref_id: 8.1.5
      name: Mettre en place une protection DDoS et WAF
      description: Déployer des protections contre les attaques par déni de service
        distribué (DDoS) et un pare-feu applicatif Web (WAF) pour les services exposés.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:8.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:9
      assessable: false
      depth: 1
      ref_id: '9'
      name: Prévenir et détecter les cyberincidents
      description: Mettre en place des mécanismes de surveillance et de détection
        pour identifier rapidement les activités suspectes et les incidents de cybersécurité.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1
      assessable: false
      depth: 2
      ref_id: '9.1'
      name: Surveillance et détection
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:9
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1.1
      assessable: true
      depth: 3
      ref_id: 9.1.1
      name: Mettre en place une journalisation centralisée des événements
      description: Collecter et centraliser les journaux d'événements (logs) de tous
        les systèmes critiques pour faciliter la détection et l'investigation d'incidents.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1.2
      assessable: true
      depth: 3
      ref_id: 9.1.2
      name: Déployer un système de détection d'intrusion (IDS/IPS)
      description: Mettre en place des systèmes IDS/IPS pour détecter et prévenir
        les tentatives d'intrusion sur le réseau et les systèmes.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1.3
      assessable: true
      depth: 3
      ref_id: 9.1.3
      name: Surveiller les activités réseau et systèmes en continu
      description: Mettre en place une surveillance continue (24/7) des activités
        réseau et systèmes pour détecter les comportements anormaux.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1.4
      assessable: true
      depth: 3
      ref_id: 9.1.4
      name: Définir des alertes sur les événements critiques de sécurité
      description: Configurer des alertes automatiques pour les événements de sécurité
        critiques (tentatives de connexion échouées, modifications de comptes privilégiés,
        etc.).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:9.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:10
      assessable: false
      depth: 1
      ref_id: '10'
      name: Former les employés en matière de cybersécurité
      description: Sensibiliser et former les employés aux cybermenaces et aux meilleures
        pratiques de cybersécurité pour réduire les risques liés aux comportements
        humains.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1
      assessable: false
      depth: 2
      ref_id: '10.1'
      name: Formation et sensibilisation
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:10
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1.1
      assessable: true
      depth: 3
      ref_id: 10.1.1
      name: Mettre en place un programme de sensibilisation à la cybersécurité
      description: Développer et déployer un programme de sensibilisation couvrant
        les menaces courantes (hameçonnage, ingénierie sociale, mots de passe, etc.).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1.2
      assessable: true
      depth: 3
      ref_id: 10.1.2
      name: Former tous les employés à la reconnaissance du hameçonnage
      description: Dispenser une formation spécifique sur la reconnaissance et le
        signalement des courriels et messages d'hameçonnage (phishing).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1.3
      assessable: true
      depth: 3
      ref_id: 10.1.3
      name: Réaliser des simulations de hameçonnage
      description: Effectuer des tests de simulation d'hameçonnage réguliers pour
        évaluer le niveau de sensibilisation des employés et adapter la formation.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1.4
      assessable: true
      depth: 3
      ref_id: 10.1.4
      name: Former les employés aux procédures de signalement d'incidents
      description: S'assurer que tous les employés connaissent et comprennent la procédure
        à suivre pour signaler un incident ou un comportement suspect.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:10.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:11
      assessable: false
      depth: 1
      ref_id: '11'
      name: Sécuriser les services infonuagiques
      description: Mettre en place des contrôles de sécurité appropriés pour protéger
        les données et services hébergés dans le nuage.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1
      assessable: false
      depth: 2
      ref_id: '11.1'
      name: Configuration et accès aux services nuagiques
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:11
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1.1
      assessable: true
      depth: 3
      ref_id: 11.1.1
      name: Appliquer une configuration sécurisée des services nuagiques
      description: Configurer les services nuagiques selon les meilleures pratiques
        de sécurité du fournisseur (CIS Benchmarks, configurations par défaut sécurisées).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1.2
      assessable: true
      depth: 3
      ref_id: 11.1.2
      name: Contrôler les accès aux services nuagiques (IAM nuagique)
      description: Mettre en place un contrôle strict des accès aux services nuagiques
        avec MFA, RBAC et journalisation de toutes les actions.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1.3
      assessable: true
      depth: 3
      ref_id: 11.1.3
      name: Comprendre le modèle de responsabilité partagée
      description: Documenter et comprendre les responsabilités de sécurité partagées
        entre l'organisation et le fournisseur de services nuagiques.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1.4
      assessable: true
      depth: 3
      ref_id: 11.1.4
      name: Chiffrer les données dans le nuage
      description: S'assurer que les données sensibles stockées dans le nuage sont
        chiffrées, idéalement avec des clés gérées par l'organisation.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1.5
      assessable: true
      depth: 3
      ref_id: 11.1.5
      name: Évaluer la sécurité des fournisseurs de services nuagiques
      description: Vérifier les certifications de sécurité des fournisseurs (SOC 2,
        ISO 27001) et les clauses contractuelles relatives à la sécurité et la confidentialité.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:11.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:12
      assessable: false
      depth: 1
      ref_id: '12'
      name: Sécuriser les sites Web et les applications
      description: Mettre en place des contrôles de sécurité pour protéger les sites
        Web et applications contre les attaques courantes.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1
      assessable: false
      depth: 2
      ref_id: '12.1'
      name: Sécurité des applications Web
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:12
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1.1
      assessable: true
      depth: 3
      ref_id: 12.1.1
      name: Effectuer des évaluations de vulnérabilités des applications Web
      description: Réaliser régulièrement des analyses de vulnérabilités et des tests
        de pénétration sur les applications Web exposées.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1.2
      assessable: true
      depth: 3
      ref_id: 12.1.2
      name: Déployer un pare-feu applicatif Web (WAF)
      description: Mettre en place un WAF pour protéger les applications Web contre
        les attaques courantes (injection SQL, XSS, CSRF, etc.).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1.3
      assessable: true
      depth: 3
      ref_id: 12.1.3
      name: Appliquer les correctifs aux applications Web
      description: Maintenir à jour toutes les applications Web, CMS, bibliothèques
        et dépendances pour corriger les vulnérabilités connues.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1.4
      assessable: true
      depth: 3
      ref_id: 12.1.4
      name: Sécuriser les certificats SSL/TLS
      description: Utiliser des certificats SSL/TLS valides et à jour pour toutes
        les applications Web. Désactiver les protocoles obsolètes (SSL, TLS 1.0/1.1).
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:12.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:13
      assessable: false
      depth: 1
      ref_id: '13'
      name: Contrôler l'utilisation des dispositifs amovibles
      description: Mettre en place des contrôles pour gérer l'utilisation des dispositifs
        de stockage amovibles (clés USB, disques durs externes) afin de prévenir les
        fuites de données et l'introduction de maliciels.
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1
      assessable: false
      depth: 2
      ref_id: '13.1'
      name: Politique et contrôles des dispositifs amovibles
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:13
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1.1
      assessable: true
      depth: 3
      ref_id: 13.1.1
      name: Établir une politique d'utilisation des dispositifs amovibles
      description: Documenter et communiquer une politique claire sur l'utilisation
        autorisée des dispositifs de stockage amovibles.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1.2
      assessable: true
      depth: 3
      ref_id: 13.1.2
      name: Restreindre ou bloquer les ports USB non autorisés
      description: Configurer les systèmes pour bloquer ou restreindre l'utilisation
        des ports USB à des dispositifs autorisés et enregistrés.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1.3
      assessable: true
      depth: 3
      ref_id: 13.1.3
      name: Scanner automatiquement les dispositifs amovibles
      description: Configurer le logiciel de sécurité pour analyser automatiquement
        tout dispositif amovible connecté avant d'autoriser l'accès à son contenu.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1
    - urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1.4
      assessable: true
      depth: 3
      ref_id: 13.1.4
      name: Chiffrer les données sur les dispositifs amovibles autorisés
      description: Exiger le chiffrement de toutes les données stockées sur les dispositifs
        amovibles utilisés à des fins professionnelles.
      annotation: ''
      parent_urn: urn:cccs:risk:framework:itsap10035_2024_fr:13.1
