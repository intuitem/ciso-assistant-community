      ref_id: AVAIL 1
      name: System availability and intended functionality
      description: Availability is preserved through continuity management, resource
        availability, and fail-state behavior.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-1
      ref_id: AVAIL 1.1
      name: Continuity management
      description: 'Programme: Business and operational continuity for the IACS is
        documented, exercised, and integrated with broader organizational continuity.
        Verify: BCP/DRP exists with IACS scope; exercise records are maintained.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-1
      ref_id: AVAIL 1.2
      name: Resource availability management
      description: 'Programme: IACS resources (compute, storage, network) are managed
        to remain available under load and failure. Verify: Resource limits and monitoring
        are documented; alerting is in place.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-1
      ref_id: AVAIL 1.3
      name: Failure-state
      description: 'Programme: Failure-state behavior of IACS components is documented
        and acceptable to the asset owner. Verify: Failure modes are documented per
        component; behavior under failure is predictable and acceptable.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:13
      ref_id: AVAIL 2
      name: Backup/restore/archive
      description: Backups, restoration, and archives provide recoverability.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2
      ref_id: AVAIL 2.1
      name: Backup
      description: 'Programme: Backups of IACS state are taken on a defined schedule
        covering documented scope (PLC programs, HMI projects, historian databases,
        engineering tool configs, network device configs). Verify: Backup scope is
        documented and matches the asset inventory; backups are scheduled and completed.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2
      ref_id: AVAIL 2.2
      name: Backup non-interference
      description: 'Programme: Backup processes do not interfere with IACS operations.
        Verify: Backup-window scheduling is documented; resource impact is monitored.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2
      ref_id: AVAIL 2.3
      name: Backup verification
      description: 'Programme: Backups are verified for restorability on a defined
        cadence. Verify: Verification records (test restores, integrity checks) exist.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2
      ref_id: AVAIL 2.4
      name: Backup media
      description: 'Programme: Backup media are protected against loss, theft, and
        tampering. Verify: Media protection (encryption, physical access control)
        is documented and enforced.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:avail-2
      ref_id: AVAIL 2.5
      name: Backup restoration
      description: "Programme: Documented procedures restore IACS state from backups,\
        \ satisfying both the recovery-time objective (RTO \u2014 how fast) and the\
        \ recovery-point objective (RPO \u2014 how much state loss is acceptable);\
        \ for continuous-process plants RPO often matters more than RTO. Verify: Restoration\
        \ procedures exist, are tested end-to-end, and meet documented RTO and RPO\
        \ targets per asset class."
      implementation_groups:
      - spe
