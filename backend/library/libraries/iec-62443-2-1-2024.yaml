urn: urn:intuitem:risk:library:iec-62443-2-1-2024
locale: en
ref_id: iec-62443-2-1-2024
name: "IEC 62443-2-1:2024 \u2014 Security program for IACS asset owners (outline)"
description: "Outline of IEC 62443-2-1:2024 Edition 2 \u2014 Security for industrial\
  \ automation and control systems - Part 2-1: Security program requirements for IACS\
  \ asset owners. Restructured from Ed.1's CSMS clauses into 8 Security Program Elements\
  \ (SPEs). Each sub-element is rated on the CMMI-derived Maturity Level scale (ML\
  \ 1-4) per Annex C. 87 sub-elements with paraphrased descriptions in program/policy\
  \ tone; purchase the standard for normative text and ML evaluation guidance."
copyright: IEC - Purchase the standard for the full normative text.
version: 1
publication_date: 2026-04-28
provider: IEC
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:iec-62443-2-1-2024
    ref_id: iec-62443-2-1-2024
    name: "IEC 62443-2-1:2024 \u2014 Security program for IACS asset owners (outline)"
    description: Targets asset owners / operators (railway operators, chemical plants,
      energy utilities, etc.). Audited via the ISASecure ACSSA scheme alongside 62443-2-4,
      62443-3-2 and 62443-3-3.
    min_score: 0
    max_score: 5
    scores_definition:
    - score: 0
      name: Incomplete
      description: Ad hoc and unknown
    - score: 1
      name: Initial
      description: Unpredictable and reactive
    - score: 2
      name: Managed
      description: Managed on the project level
    - score: 3
      name: Defined
      description: Proactive, rather than reactive
    - score: 4
      name: Quantitatively managed
      description: Measured and controlled
    - score: 5
      name: Optimizing
      description: Stable and flexible
    implementation_groups_definition:
    - ref_id: spe
      name: Security Program Elements
      description: All 87 sub-elements across SPE 1-8 (clauses 6-13).
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
      assessable: false
      depth: 1
      ref_id: '6'
      name: SPE 1 - Organizational security measures
      description: Governance, policies, training, supply-chain, and physical-access
        foundation of the IACS security programme.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
      ref_id: ORG 1
      name: Security related organization and policies
      description: Documented organizational policies, roles, training, and supply-chain
        rules.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
      ref_id: ORG 1.1
      name: Information security management system (ISMS)
      description: 'Programme: An ISMS covering the IACS exists, is documented, and
        is integrated with the organization''s broader ISMS (ISO 27001-aligned acceptable).
        Verify: ISMS scope explicitly covers IACS; governance, roles, and review cycles
        are documented.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
      ref_id: ORG 1.2
      name: Background checks
      description: 'Programme: Background checks are performed on personnel with access
        to the IACS, proportional to access level and applicable law. Verify: Documented
        background-check policy; records exist for IACS-access personnel; renewal
        cadence is defined.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
      ref_id: ORG 1.3
      name: Security roles and responsibilities
      description: 'Programme: Cybersecurity roles and responsibilities for the IACS
        are documented and assigned (CISO, ICS security lead, system owner, operator
        security duties). Verify: A RACI or role map exists covering IACS cybersecurity;
        gaps are tracked and closed.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
      ref_id: ORG 1.4
      name: Security awareness training
      description: 'Programme: General cybersecurity awareness training is provided
        to all personnel with IACS access. Verify: Training catalogue exists; completion
        records are maintained; refresh cadence is documented.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
      ref_id: ORG 1.5
      name: Security responsibilities training
      description: 'Programme: Role-specific cybersecurity training is provided to
        personnel with cybersecurity responsibilities (operators, engineers, security
        staff). Verify: Role-specific training records exist; training maps to the
        responsibilities defined in ORG 1.3.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
      ref_id: ORG 1.6
      name: Supply chain security
      description: 'Programme: Supply-chain cybersecurity requirements are placed
        on suppliers (procurement language, evaluation, periodic review). Verify:
        Procurement contracts include cybersecurity clauses; supplier evaluation records
        exist (e.g. requiring 62443-2-4 / 4-1 certifications, SBOM).'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
      ref_id: ORG 2
      name: Security assessments and reviews
      description: Periodic assessments, anomaly discovery, secure-development support,
        and programme reviews verify the programme's effectiveness.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
      ref_id: ORG 2.1
      name: Security risk mitigation
      description: 'Programme: Cybersecurity risks identified through risk assessments
        (62443-3-2) are tracked through to mitigation. Verify: A risk register exists;
        mitigation actions have owners, dates, and tracked status.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
      ref_id: ORG 2.2
      name: Processes for discovery of security anomalies
      description: 'Programme: Documented processes exist to discover security anomalies
        (vulnerability scans, penetration tests, threat hunting, log review). Verify:
        Anomaly-discovery activities are scheduled and produce records; findings are
        routed into the risk register.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
      ref_id: ORG 2.3
      name: Secure development and support
      description: 'Programme: For internally developed or modified IACS components,
        the asset owner applies (or requires of contractors) secure development practices.
        Verify: Internal development follows a documented SDLC; contractor work is
        bound to equivalent expectations (e.g. flow-down of 62443-4-1).'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
      ref_id: ORG 2.4
      name: SP reviews
      description: 'Programme: The security programme itself is reviewed periodically
        for adequacy and effectiveness. Verify: Programme reviews are scheduled; review
        records show participants, scope, findings, and corrective actions.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
      ref_id: ORG 3
      name: Security of physical access
      description: Physical access to IACS components is controlled and monitored.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-3
      ref_id: ORG 3.1
      name: Physical access control
      description: 'Programme: Physical access to IACS components (control rooms,
        field cabinets, engineering rooms) is restricted, logged, and monitored. Verify:
        Physical-access policy is documented; access lists are maintained; physical-access
        events are logged where applicable.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:7
      assessable: false
      depth: 1
      ref_id: '7'
      name: SPE 2 - Configuration management
      description: Inventory, baselines, drawings, and change control for IACS components.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:7
      ref_id: CM 1
      name: Inventory management of IACS hardware/software components and network
        communications
      description: Configuration management starts with knowing what is deployed,
        what its baseline is, and how changes are controlled.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
      ref_id: CM 1.1
      name: Asset inventory baseline
      description: 'Programme: A current inventory of IACS hardware, software, and
        network communications exists. Verify: Inventory is reconciled with deployed
        reality on a defined cadence; covers hardware, firmware versions, software
        versions, and inter-component communications.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
      ref_id: CM 1.2
      name: Infrastructure drawings/documentation
      description: 'Programme: Infrastructure drawings (network diagrams, control
        architecture, zone-and-conduit diagrams) are maintained and current. Verify:
        Drawings exist, are version-controlled, and match deployed reality at a defined
        cadence.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
      ref_id: CM 1.3
      name: Configuration settings
      description: 'Programme: Configuration settings for IACS components are defined,
        documented, and maintained against secure baselines. Verify: Per-component-type
        baselines are documented and deviations are tracked.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
      ref_id: CM 1.4
      name: Change control
      description: 'Programme: Changes to IACS configurations go through a documented
        change-control process covering review, approval, testing, and back-out. Verify:
        Change records show the documented steps; emergency changes have a documented
        after-the-fact review.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
      assessable: false
      depth: 1
      ref_id: '8'
      name: SPE 3 - Network and communications security
      description: Network segmentation, secure wireless, and secure remote access
        enforce the zone-and-conduit boundaries.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
      ref_id: NET 1
      name: System segmentation
      description: Network segmentation enforces zone-and-conduit boundaries from
        the 62443-3-2 design.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.1
      name: Segmentation from non-IACS zones
      description: 'Programme: IACS zones are segmented from non-IACS networks (corporate
        IT, Internet) per the documented zone-and-conduit design. Verify: Boundary
        devices match the zone diagram; rules are reviewed periodically.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.2
      name: Documentation of zones and network zone interconnections
      description: 'Programme: Zones and inter-zone connections are documented with
        protocols, directions, and authorized counterparts. Verify: Inter-zone documentation
        matches deployed reality.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.3
      name: Network segmentation from safety systems
      description: 'Programme: Safety systems are segmented from non-safety networks,
        with safety-specific access controls on connections to non-safety zones. Verify:
        Safety-network segmentation is documented and verifiable; non-safety access
        goes through controlled boundaries.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.4
      name: Network autonomy
      description: 'Programme: IACS networks operate autonomously from external/corporate
        networks during outages of those external networks. Verify: Autonomy testing
        has been performed; documented behavior under loss of upstream connectivity
        is acceptable.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.5
      name: Network disconnection from external networks
      description: 'Programme: A documented capability exists to disconnect the IACS
        from external networks if needed (kill-switch, manual disconnection procedure).
        Verify: Disconnect capability is documented, tested, and authorized for use
        under defined conditions.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.6
      name: Internal network access control
      description: 'Programme: Internal IACS network access is controlled through
        documented access-control mechanisms (NAC, port security, MAC filtering).
        Verify: Internal network access controls are documented and operational.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.7
      name: Network accessible services
      description: 'Programme: Network-accessible services on IACS components are
        minimized to those required for authorized functions, enforced through deny-by-default
        firewall and host-firewall rules with explicit allowlists per zone and conduit.
        Verify: Per-component allowed-services list is documented; firewall and host-firewall
        rules deny by default; unused services are disabled at the component level
        (defense in depth, not boundary-only).'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.8
      name: User messaging
      description: 'Programme: User-messaging facilities (broadcast, multicast operator
        messages) are controlled to prevent abuse. Verify: User-messaging policy is
        documented; abuse-prevention controls are in place.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
      ref_id: NET 1.9
      name: Network time distribution
      description: 'Programme: A documented, secure network time source (NTP, PTP)
        is provided to IACS components. Verify: Time source is authoritative, redundant
        where required, and time synchronization is monitored.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
      ref_id: NET 2
      name: Secure wireless access
      description: Wireless access (where used) follows authenticated, encrypted,
        segregated practices.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
      ref_id: NET 2.1
      name: Wireless protocols
      description: 'Programme: Wireless protocols in use are documented and use authenticated,
        encrypted modes (WPA2/WPA3-Enterprise, WirelessHART, ISA100.11a). Verify:
        Wireless protocol inventory exists; legacy/unsecured protocols are not in
        use or are explicitly compensated.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
      ref_id: NET 2.2
      name: Wireless network segmentation
      description: 'Programme: Wireless networks are segmented from wired control
        networks at a documented boundary. Verify: Wireless segmentation matches the
        zone-and-conduit design.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
      ref_id: NET 2.3
      name: Wireless properties and addresses
      description: 'Programme: Wireless network identifiers (SSIDs, MAC addresses,
        frequencies) are managed and documented. Verify: Wireless properties are inventoried;
        rogue-AP detection is in place.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
      ref_id: NET 3
      name: Secure remote access
      description: "Remote access is authenticated, monitored, and time-bounded \u2014\
        \ particularly for vendor support."
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
      ref_id: NET 3.1
      name: Remote access applications
      description: 'Programme: Authorized remote-access applications are documented
        (jump host, VPN client, vendor remote tool). Verify: Remote-access application
        inventory exists; only documented tools are permitted.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
      ref_id: NET 3.2
      name: Remote access connections
      description: 'Programme: Remote-access connections are authenticated, encrypted,
        and individually authorized; vendor connections are time-bounded. Verify:
        Connection logs show authenticated identities and durations; vendor sessions
        are recorded or supervised.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
      ref_id: NET 3.3
      name: Remote access termination
      description: 'Programme: Remote-access sessions terminate automatically after
        defined inactivity or upon disconnection. Verify: Termination is enforced
        and logged; abandoned sessions are detected.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:9
      assessable: false
      depth: 1
      ref_id: '9'
      name: SPE 4 - Component security
      description: Component hardening, portable-media control, malware protection,
        and patch management.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:9
      ref_id: COMP 1
      name: Components and portable media
      description: Components are hardened and portable-media use is controlled.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1
      ref_id: COMP 1.1
      name: Component hardening
      description: 'Programme: IACS components are hardened against documented secure
        baselines (CIS, vendor hardening guides). Verify: Per-component-type hardening
        baselines exist; deployed components conform; deviations are tracked.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1
      ref_id: COMP 1.2
      name: Dedicated portable media
      description: 'Programme: Portable media (USB drives, optical media) used in
        the IACS are dedicated, authorized, and controlled (e.g. scanned at a kiosk
        before use). Verify: Portable-media policy exists; sanitization or scanning
        is performed before use; uncontrolled media are rejected.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:9
      ref_id: COMP 2
      name: Malware protection
      description: IACS components are protected against malicious code with mechanisms
        compatible with operational constraints.
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2
      ref_id: COMP 2.1
      name: Malware free
      description: 'Programme: IACS components are commissioned in a known-malware-free
