      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:event-1
      ref_id: EVENT 1.6
      name: Log access
      description: 'Programme: Log access is restricted to authorized personnel. Verify:
        Log-access roles are documented and enforced; access events are themselves
        logged.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:event-1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:event-1
      ref_id: EVENT 1.7
      name: Event analysis
      description: 'Programme: Events are analyzed to detect security incidents. Verify:
        Event-analysis cadence is documented; analyst role and tooling are defined.'
      implementation_groups:
      - spe
    - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:event-1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:event-1
      ref_id: EVENT 1.8
      name: Incident handling and response
      description: 'Programme: A documented incident-response process covers detection,
        containment, eradication, recovery, and lessons learned; cyber IR is coordinated
        with safety incident response (joint plan, joint exercises, defined handoffs
        between cyber-IR and safety-IR roles) since OT incidents often have safety
        implications and vice versa. Verify: IR playbook exists with safety-coordination
        procedures; joint cyber+safety tabletop or live exercises are performed; handoff
        thresholds and authority are documented.'
      implementation_groups:
      - spe
