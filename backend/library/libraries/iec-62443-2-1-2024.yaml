      ref_id: EVENT 1.5
      name: Log entries
      description: 'Programme: Log entries contain sufficient information for analysis
        (timestamp, identity, action, outcome). Verify: Sample log entries cover the
        required fields per category.'
      implementation_groups:
      - spe
