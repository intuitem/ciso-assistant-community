      ref_id: EVENT 1.9
      name: Vulnerability handling
      description: 'Programme: Vulnerabilities discovered or reported are tracked,
        assessed, and remediated. Verify: Vulnerability tracker exists; SLA per severity
        is documented; remediation is tracked.'
      implementation_groups:
      - spe
