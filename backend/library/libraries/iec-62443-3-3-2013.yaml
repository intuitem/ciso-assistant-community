urn: urn:intuitem:risk:library:iec-62443-3-3-2013
locale: en
ref_id: iec-62443-3-3-2013
name: "IEC 62443-3-3:2013 \u2014 System security requirements and security levels\
  \ (outline)"
description: "Outline of IEC 62443-3-3:2013 \u2014 Industrial communication networks\
  \ - Network and system security - Part 3-3: System security requirements and security\
  \ levels. Lists the 7 Foundational Requirements (FR1-FR7) with their 51 System Requirements\
  \ (SRs). Outline only (ref_id + paraphrased description); purchase the standard\
  \ for the normative text, Requirement Enhancements (REs) and Annex B Security Level\
  \ (SL 1-4) gating table."
copyright: IEC - Purchase the standard for the full normative text.
version: 1
publication_date: 2026-04-28
provider: IEC
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:iec-62443-3-3-2013
    ref_id: iec-62443-3-3-2013
    name: "IEC 62443-3-3:2013 \u2014 System security requirements and security levels\
      \ (outline)"
    description: Targets system integrators and asset owners. Each SR has 0..N Requirement
      Enhancements (REs) and a per-Security-Level (SL 1-4) gate published in Annex
      B of the standard - not reproduced in this outline.
    min_score: 0
    max_score: 5
    scores_definition:
    - score: 0
      name: Incomplete
      description: Ad hoc and unknown
    - score: 1
      name: Initial
      description: Unpredictable and reactive
    - score: 2
      name: Managed
      description: Managed on the project level
    - score: 3
      name: Defined
      description: Proactive, rather than reactive
    - score: 4
      name: Quantitatively managed
      description: Measured and controlled
    - score: 5
      name: Optimizing
      description: Stable and flexible
    implementation_groups_definition:
    - ref_id: ccsc
      name: Common Control System Security Constraints
      description: Clause 4 framing constraints (essential functions, compensating
        countermeasures, least privilege).
    - ref_id: system_requirements
      name: System Requirements
      description: FR1-FR7 system requirements (clauses 5-11).
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: Common control system security constraints
      description: Foundational constraints that override the SR-level requirements
        where in conflict; must hold for any security-level claim.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
      ref_id: '4.2'
      name: Support of essential functions
      description: "Control: Security mechanisms do not impair the operation of essential\
        \ control system functions (safety, integrity, availability) \u2014 including\
        \ under degraded conditions, failure of the security mechanism itself, or\
        \ loss of communication with security infrastructure (e.g. authentication\
        \ server unreachable). Verify: A list of essential functions exists; each\
        \ security control is traced against potential interference; behavior under\
        \ security-mechanism failure or supporting-service loss is documented and\
        \ acceptable to the asset owner."
      implementation_groups:
      - ccsc
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
      ref_id: '4.3'
      name: Compensating countermeasures
      description: 'Control: Where a system requirement cannot be met directly (legacy
        equipment, operational constraint), compensating countermeasures are designed
        and approved that achieve an equivalent target Security Level (SL-T) for the
        affected zone. Verify: Each invoked compensating countermeasure is documented
        with the SR it offsets, a risk analysis showing equivalent SL-T coverage,
        asset-owner approval, and a test plan or operational evidence of effectiveness.'
      implementation_groups:
      - ccsc
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
      ref_id: '4.4'
      name: Least privilege
      description: "Control: All accesses (human users, software processes, devices,\
        \ service accounts) operate at the minimum privileges required for their authorized\
        \ function \u2014 applied as an overarching design principle across authentication,\
        \ authorization, and operational use. Verify: Role catalogs document privilege\
        \ scopes; periodic access reviews are performed; service and process accounts\
        \ run with restricted rights; emergency-elevated privileges are logged and\
        \ reviewed."
      implementation_groups:
      - ccsc
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      assessable: false
      depth: 1
      ref_id: '5'
      name: FR 1 - Identification and authentication control
      description: Identifies and authenticates all human users, software processes,
        and devices before granting access to the control system.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.1
      name: Human user identification and authentication
      description: 'Control: The control system identifies and authenticates each
        human user before granting access on every interface (local console, HMI,
        engineering workstation, remote, configuration tool); authentication strength
        scales with the target Security Level (multifactor at higher SLs per the Annex
        B REs). Verify: Each human user has a unique identity for non-shared use;
        where shared/role accounts are operationally required (e.g. operator console)
        they are documented with compensating controls; authentication is enforced
        on every access path. NIST 800-53: IA-2, IA-5, IA-8.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.2
      name: Software process and device identification and authentication
      description: 'Control: The control system identifies and authenticates software
        processes and connected devices before granting them access. Verify: Each
        non-human entity (PLC, gateway, application) has a distinct identity used
        during authentication. NIST 800-53: IA-3, IA-9.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.3
      name: Account management
      description: "Control: All accounts (operator, engineer, admin, service, vendor,\
        \ maintenance, time-bounded) are created, modified, enabled, disabled, and\
        \ removed under a documented account management process covering provisioning,\
        \ role changes, periodic review, and offboarding. Verify: Account lifecycle\
        \ is documented and enforced for every account class \u2014 vendor and maintenance\
        \ accounts in particular have a documented provisioning + de-provisioning\
        \ workflow with an SLA from offboarding to disable. NIST 800-53: AC-2."
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.4
      name: Identifier management
      description: 'Control: Identifiers (user IDs, device IDs) are assigned uniquely
        over the system lifetime, are non-reusable for a defined period after retirement,
        and are traceable from any audit record back to a single specific actor. Verify:
        Identifier-management policy defines the uniqueness rules, post-retirement
        reuse delay, and audit-trace requirement; the system enforces them. NIST 800-53:
        IA-4.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.5
      name: Authenticator management
      description: 'Control: Authenticators (passwords, tokens, certificates) are
        issued, distributed, stored protected (hashed or encrypted, never plaintext),
        rotated, and revoked under documented procedures; default and shared authenticators
        are changed before commissioning. Verify: Authenticator storage uses appropriate
        protection (no plaintext credentials anywhere); rotation, distribution, and
        revocation procedures are documented and exercised; default credentials on
        every component were changed before the system entered production. NIST 800-53:
        IA-5.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.6
      name: Wireless access management
      description: 'Control: Wireless connections to or within the control system
        (Wi-Fi, WirelessHART, ISA100.11a, Bluetooth) are authorized, identified, authenticated,
        encrypted, and segregated from wired control networks; rogue access points
        are detected. Verify: A wireless-asset inventory exists; APs and clients use
        authenticated/encrypted protocols (WPA2/WPA3-Enterprise or industrial-protocol
        equivalents); rogue-AP detection is in place; wireless segments are separated
        from wired control networks at a documented boundary. NIST 800-53: AC-18.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.7
      name: Strength of password-based authentication
      description: 'Control: Password-based authentication uses configurable strength
        rules (length, complexity, lifetime, history) appropriate to the assigned
        security level. Verify: Password policy is enforced at the system level and
        is configurable. NIST 800-53: IA-5(1).'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.8
      name: Public key infrastructure (PKI) certificates
      description: 'Control: Where PKI is used, the control system supports certificate
        issuance, validation, revocation checking, and trust chain management. Verify:
        A documented PKI hierarchy exists and certificates are validated (path, expiry,
        CRL/OCSP) on every authentication attempt. NIST 800-53: IA-5(2).'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.9
      name: Strength of public key authentication
      description: 'Control: Public-key authentication uses key strengths and algorithms
        appropriate to the assigned security level (e.g. RSA-2048+, ECDSA P-256+).
        Verify: Key sizes and algorithms in use meet documented minimums and are upgradable
        over the system lifetime. NIST 800-53: SC-12, SC-13.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.10
      name: Authenticator feedback
      description: 'Control: Authentication input (e.g. typed passwords) is obscured
        and authentication errors do not disclose which factor was incorrect. Verify:
        Password fields obscure input and error messages do not reveal whether the
        username or the password was wrong. NIST 800-53: IA-6.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.11
      name: Unsuccessful login attempts
      description: 'Control: Consecutive failed login attempts are limited and a defined
        action (lockout, alert) is taken when the threshold is reached, balanced against
        essential-function continuity. Verify: A configurable failed-attempt threshold
        exists; lockout actions are logged and have a defined recovery procedure.
        NIST 800-53: AC-7.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.12
      name: System use notification
      description: 'Control: Before granting access, the control system displays an
        authorized-use banner consistent with organizational policy. Verify: The banner
        appears on all interactive sessions and matches the policy text. NIST 800-53:
        AC-8.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
      ref_id: SR 1.13
      name: Access via untrusted networks
      description: 'Control: Access to the control system from untrusted networks
        (corporate IT, Internet, vendor remote support) is monitored, individually
        authorized, terminated at a controlled boundary, and protected by additional
        safeguards (VPN, jump host, MFA, session recording for vendor access). Verify:
        Every untrusted-network access path is documented; vendor remote access is
        time-bounded, logged, and supervisable (live attendance or recorded session);
        safeguards exceed intra-zone authentication. NIST 800-53: AC-17.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      assessable: false
      depth: 1
      ref_id: '6'
      name: FR 2 - Use control
      description: Restricts what authenticated users, processes, and devices are
        permitted to do on the control system.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.1
      name: Authorization enforcement
      description: "Control: The control system enforces authorizations on every protected\
        \ action \u2014 at minimum separating view-only, operate (set-points, alarm\
        \ acknowledge), configure (logic, recipes, parameters), and override (point\
        \ manipulation, safety-system bypass) \u2014 per role assigned to each user,\
        \ process, and device. Verify: A documented role-to-action matrix exists;\
        \ access decisions match assignments on every protected action; privileged\
        \ actions (override, point manipulation, safety bypass) require elevated authorization\
        \ with an audit trail. NIST 800-53: AC-3."
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.2
      name: Wireless use control
      description: 'Control: Wireless connections are subject to the same use-control
        authorizations as wired access, including action-specific restrictions. Verify:
        Wireless users do not bypass authorization checks present on the wired interfaces.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.3
      name: Use control for portable and mobile devices
      description: 'Control: Portable and mobile devices are authorized, monitored,
        and constrained when connected to the control system. Verify: Portable-device
        connections are logged, scanned, and configured before use; unauthorized devices
        are blocked. NIST 800-53: MP-7.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.4
      name: Mobile code
      description: 'Control: Mobile code (e.g. ActiveX, Java applets, scripts on HMIs)
        is restricted to authorized types and trusted sources. Verify: Allowed mobile-code
        types and sources are explicitly listed, signed or validated, and unauthorized
        code is blocked. NIST 800-53: SC-18.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.5
      name: Session lock
      description: 'Control: Interactive sessions lock after a configurable inactivity
        period and require re-authentication to resume. Verify: Session-lock timeout
        is configurable and applied to all interactive interfaces. NIST 800-53: AC-11.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.6
      name: Remote session termination
      description: 'Control: Remote interactive sessions are terminated automatically
        after a defined inactivity period or upon explicit logout. Verify: Remote-session
        termination is enforced and logged. NIST 800-53: AC-12.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.7
      name: Concurrent session control
      description: 'Control: The number of concurrent sessions per user or device
        is limited to a configurable value. Verify: Concurrent-session limits are
        enforced and tested. NIST 800-53: AC-10.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.8
      name: Auditable events
      description: "Control: The control system records audit events covering authentication\
        \ (success and failure), authorization decisions, account changes, privilege\
        \ escalations, configuration changes (including changes to the audit configuration\
        \ itself), and other security-relevant activities. Verify: The auditable-event\
        \ catalog is documented and the configured logger captures each listed event\
        \ class \u2014 particularly changes to the audit configuration and any privilege-elevation\
        \ actions, since silently disabling logging is a common attack pattern. NIST\
        \ 800-53: AU-2, AU-3, AU-12."
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.9
      name: Audit storage capacity
      description: 'Control: Sufficient audit storage capacity is provisioned to retain
        audit records for the required retention period under expected event rates.
        Verify: Storage sizing is documented, monitored, and overflow handling (rotation,
        alarms) is defined. NIST 800-53: AU-4.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.10
      name: Response to audit processing failures
      description: 'Control: Audit-processing failures (logger crash, storage exhaustion)
        trigger a configured response such as alarm, halt, or controlled overwrite.
        Verify: The failure response is documented, tested, and observable in operations.
        NIST 800-53: AU-5.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.11
      name: Timestamps
      description: 'Control: The control system uses synchronized, accurate timestamps
        for audit records and inter-component sequencing. Verify: All components are
        time-synchronized to a documented reference; clock drift is monitored. NIST
        800-53: AU-8, SC-45.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
      ref_id: SR 2.12
      name: Non-repudiation
      description: 'Control: Audit records and security-critical actions are bound
        to the originating identity such that the originator cannot plausibly deny
        the action. Verify: Audit identifiers map uniquely to authenticated users
        or devices; audit integrity is protected from tampering. NIST 800-53: AU-10.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      assessable: false
      depth: 1
      ref_id: '7'
      name: FR 3 - System integrity
      description: Protects the control system, its software, and its data from unauthorized
        modification.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.1
      name: Communication integrity
      description: 'Control: Communications between control system components are
        protected against unauthorized modification using cryptographic integrity
        (HMAC, digital signatures, TLS) or trusted-channel protocols (OPC UA Secure,
        DNP3-SA, IPsec); legacy industrial protocols without native integrity (Modbus/TCP,
        DNP3 v1, PROFINET classic) are wrapped in a secure overlay or tunneled across
        a trusted boundary. Verify: Each documented channel has an integrity mechanism
        appropriate to its target SL; legacy protocols without native integrity are
        explicitly tunneled or compensated, with the wrapping mechanism documented.
        NIST 800-53: SC-8, SC-8(1).'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.2
      name: Malicious code protection
      description: 'Control: The control system implements detection and response
        measures against malicious code (allowlisting, anti-malware, integrity checks)
        suited to the operational context. Verify: A documented malicious-code defense
        is in place, tested, and does not conflict with essential functions. NIST
        800-53: SI-3.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.3
      name: Security functionality verification
      description: 'Control: The control system supports operator-initiated tests
        confirming that security functions (authentication, logging, etc.) operate
        as intended. Verify: Security-functionality tests exist, are documented, and
        are run on a defined cadence. NIST 800-53: SI-6.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.4
      name: Software and information integrity
      description: 'Control: The control system detects unauthorized changes to software,
        configuration, and security-critical information. Verify: Integrity monitoring
        (file-integrity, signed firmware checks) is configured and alerts on deviations.
        NIST 800-53: SI-7.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.5
      name: Input validation
      description: 'Control: Inputs to security-relevant interfaces (operator commands,
        network messages, configuration imports) are validated against expected syntax
        and semantics. Verify: Input-validation rules are documented per interface
        and malformed inputs are rejected and logged. NIST 800-53: SI-10.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.6
      name: Deterministic output
      description: 'Control: Under abnormal conditions (failure, fault), control outputs
        are placed in a documented, predetermined state to maintain process safety.
        Verify: Fail-safe / fail-fixed behavior is documented per output and validated
        under test.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.7
      name: Error handling
      description: 'Control: Error conditions are handled in a way that does not expose
        sensitive information or destabilize the control system. Verify: Error messages
        disclose only what is needed for operations; no leakage of credentials, paths,
        or internal configuration. NIST 800-53: SI-11.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.8
      name: Session integrity
      description: 'Control: Sessions are protected against hijacking, replay, and
        unauthorized re-use (e.g. via unpredictable tokens, timeouts, source binding).
        Verify: Session tokens are unpredictable, expire, and are invalidated on logout.
        NIST 800-53: SC-23.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
      ref_id: SR 3.9
      name: Protection of audit information
      description: 'Control: Audit records and audit tooling are protected from unauthorized
        access, modification, and deletion. Verify: Audit data has restricted access
        (separate accounts) and integrity is enforced (write-once or signed). NIST
        800-53: AU-9.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
      assessable: false
      depth: 1
      ref_id: '8'
      name: FR 4 - Data confidentiality
      description: Protects data at rest and in transit from unauthorized disclosure.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-4.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
      ref_id: SR 4.1
      name: Information confidentiality
      description: 'Control: Information classified as confidential is protected against
        unauthorized disclosure both at rest and in transit. Verify: A data-classification
        scheme exists; classified data is identified; protection mechanisms (encryption
        at rest, encryption/trusted channel in transit, access control) match the
        classification. NIST 800-53: SC-8, SC-28.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-4.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
      ref_id: SR 4.2
      name: Information persistence
      description: 'Control: Data is sanitized or rendered unreadable when it persists
        beyond its operational need (e.g. on reassigned media, retired components).
        Verify: A data-disposal procedure exists, is followed for retired components,
        and is auditable. NIST 800-53: MP-6.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-4.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
      ref_id: SR 4.3
      name: Use of cryptography
      description: 'Control: Cryptographic mechanisms in use follow approved algorithms,
        modes, and key-length minimums appropriate to the assigned security level.
        Verify: Cryptographic primitives are listed, current (no deprecated algorithms),
        and key management follows a documented process. NIST 800-53: SC-13.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
      assessable: false
      depth: 1
      ref_id: '9'
      name: FR 5 - Restricted data flow
      description: Confines control system data flow to the boundaries defined by
        the zone-and-conduit design.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
      ref_id: SR 5.1
      name: Network segmentation
      description: 'Control: Logical or physical network segmentation separates the
        control system into zones consistent with the IEC 62443-3-2 zone-and-conduit
        design. Verify: Deployed segmentation matches the documented zone diagram;
        inter-zone traffic is constrained to defined conduits. NIST 800-53: SC-7,
        SC-32, AC-4.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
      ref_id: SR 5.2
      name: Zone boundary protection
      description: 'Control: Boundaries between zones (and between control zones and
        external networks) are protected by mechanisms that enforce the documented
        data-flow policy. Verify: Boundary devices (firewalls, data diodes, gateways)
        implement the documented inter-zone rules; rule changes go through change
        control. NIST 800-53: SC-7, SC-46.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
      ref_id: SR 5.3
      name: General purpose person-to-person communication restrictions
      description: 'Control: General-purpose person-to-person communications (email,
        chat, browsing) are restricted on or from control-system components. Verify:
        Such applications are not installed on control-system hosts, or their network
        access is blocked at the boundary.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
      ref_id: SR 5.4
      name: Application partitioning
      description: 'Control: Application functions are partitioned so that compromise
        of one component does not propagate freely to others. Verify: Control-system
        applications run in isolated execution environments (separate processes, accounts,
        hosts) per documented design. NIST 800-53: SC-2, SC-3.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:10
      assessable: false
      depth: 1
      ref_id: '10'
      name: FR 6 - Timely response to events
      description: Detects, reports, and responds to security-relevant events in a
        timely manner.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-6.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:10
      ref_id: SR 6.1
      name: Audit log accessibility
      description: 'Control: Authorized personnel can read and analyze audit records
        via a defined interface, without disrupting control operations. Verify: Audit-data
        access is provisioned for security and operations staff; read access does
        not interfere with the controller workload. NIST 800-53: AU-6, AU-7.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-6.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:10
      ref_id: SR 6.2
      name: Continuous monitoring
      description: 'Control: Security-relevant events are continuously monitored and
        forwarded to a place where they can be reviewed (SIEM, monitoring station).
        Verify: A documented monitoring path exists and is operational; monitored
        event categories cover the auditable-events catalog. NIST 800-53: SI-4, CA-7.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      assessable: false
      depth: 1
      ref_id: '11'
      name: FR 7 - Resource availability
      description: Maintains the availability of control-system resources during normal
        and adverse conditions.
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.1
      name: Denial of service protection
      description: 'Control: The control system maintains an operational state under
        defined denial-of-service conditions, through resource limits, rate limits,
        and segmentation. Verify: DoS protections are configured and tested; essential
        functions remain available under the test scenarios. NIST 800-53: SC-5.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.2
      name: Resource management
      description: 'Control: Control-system resources (CPU, memory, network) are reserved
        or prioritized for security-relevant and safety-relevant functions over non-essential
        workloads. Verify: Resource limits are documented per process; monitoring
        detects exhaustion conditions. NIST 800-53: SC-6.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.3
      name: Control system backup
      description: 'Control: Backups of control-system state are taken on a defined
        schedule and stored safely; backup scope explicitly covers PLC programs, HMI
        projects, historian databases, engineering tool configurations, network and
        security device configurations (firewall rules, IDS rules), and security configurations
        (account databases, certificates). Verify: Backup scope is documented per
        asset class and matches the control-system inventory (SR 7.8); backups are
        scheduled, completed, integrity-verified, and stored under access control;
        restoration sources are identified. NIST 800-53: CP-9, CP-6.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.4
      name: Control system recovery and reconstitution
      description: 'Control: Recovery procedures restore the control system to a known-good
        operational state after a disruption, using available backups. Verify: Documented
        recovery procedures exist, have been tested end-to-end, and meet the recovery-time
        objective. NIST 800-53: CP-10.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.5
      name: Emergency power
      description: 'Control: Essential control-system components are powered through
        an emergency power source sized for the required hold-up time. Verify: Emergency
        power coverage is documented per component, tested on a schedule; battery/UPS
        health is monitored. NIST 800-53: PE-11.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.6
      name: Network and security configuration settings
      description: 'Control: Network and security configurations are set to documented
        secure baselines; changes are managed under configuration control. Verify:
        A documented hardening baseline exists per component type; deviations are
        reviewed and approved. NIST 800-53: CM-6.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.7
      name: Least functionality
      description: 'Control: Control-system components are configured to provide only
        the network ports, services, and applications required for their authorized
        functions. Verify: Installed services and open ports per component are documented
        and minimized; unused services are disabled. NIST 800-53: CM-7.'
      implementation_groups:
      - system_requirements
    - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
      ref_id: SR 7.8
      name: Control system component inventory
      description: 'Control: An accurate, current inventory of control-system components
        (hardware, firmware, software versions) is maintained. Verify: The inventory
        is regularly reconciled with deployed reality and used as input to vulnerability
        and patch management. NIST 800-53: CM-8.'
      implementation_groups:
      - system_requirements
