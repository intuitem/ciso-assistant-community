urn: urn:intuitem:risk:library:iec-62443-series
locale: en
ref_id: iec-62443-series
name: ISA/IEC 62443 — Series of standards for IACS cybersecurity (outline bundle)
description:
  "Bundle of the six normative IS parts of the ISA/IEC 62443 series, packaged in a single library file but exposed as six independent Framework objects so each stays selectable individually.


  Included parts:

  - IEC 62443-2-1:2024 — Asset owner security program (Ed.2)

  - IEC 62443-2-4:2023 — Service provider security program (Ed.2)

  - IEC 62443-3-2:2020 — System risk assessment (Ed.1)

  - IEC 62443-3-3:2013 — System security requirements (Ed.1; Ed.2 in committee)

  - IEC 62443-4-1:2018 — Secure product development lifecycle (Ed.1; CENELEC amendment AA:2026 in DIS)

  - IEC 62443-4-2:2019 — Component security requirements (Ed.1; CENELEC amendment AA:2026 in DIS)


  Each framework keeps its own score scale (SL 1-4 for 3-3/4-2, ML 1-4 for 4-1/2-1/2-4) and its own implementation groups. Outline only (ref_id + clause name); purchase the standards for normative text."
copyright: IEC - Purchase the standards for the full normative text.
version: 1
publication_date: "2026-04-28"
provider: IEC
packager: intuitem
objects:
  frameworks:
    - urn: urn:intuitem:risk:framework:iec-62443-3-3-2013
      ref_id: iec-62443-3-3-2013
      name: IEC 62443-3-3:2013 — System security requirements and security levels (outline)
      description: Targets system integrators and asset owners. Each SR has 0..N Requirement Enhancements (REs) and a per-Security-Level (SL 1-4) gate published in Annex B of the standard - not reproduced in this outline.
      min_score: 0
      max_score: 5
      scores_definition:
        - score: 0
          name: Incomplete
          description: Ad hoc and unknown
        - score: 1
          name: Initial
          description: Unpredictable and reactive
        - score: 2
          name: Managed
          description: Managed on the project level
        - score: 3
          name: Defined
          description: Proactive, rather than reactive
        - score: 4
          name: Quantitatively managed
          description: Measured and controlled
        - score: 5
          name: Optimizing
          description: Stable and flexible
      implementation_groups_definition:
        - ref_id: ccsc
          name: Common Control System Security Constraints
          description: Clause 4 framing constraints (essential functions, compensating countermeasures, least privilege).
        - ref_id: system_requirements
          name: System Requirements
          description: FR1-FR7 system requirements (clauses 5-11).
      requirement_nodes:
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
          assessable: false
          depth: 1
          ref_id: "4"
          name: Common control system security constraints
          description: Foundational constraints that override the SR-level requirements where in conflict; must hold for any security-level claim.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
          ref_id: "4.2"
          name: Support of essential functions
          description: "Control: Security mechanisms do not impair the operation of essential control system functions (safety, integrity, availability) — including under degraded conditions, failure of the security mechanism itself, or loss of communication with security infrastructure (e.g. authentication server unreachable). Verify: A list of essential functions exists; each security control is traced against potential interference; behavior under security-mechanism failure or supporting-service loss is documented and acceptable to the asset owner."
          implementation_groups:
            - ccsc
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
          ref_id: "4.3"
          name: Compensating countermeasures
          description: "Control: Where a system requirement cannot be met directly (legacy equipment, operational constraint), compensating countermeasures are designed and approved that achieve an equivalent target Security Level (SL-T) for the affected zone. Verify: Each invoked compensating countermeasure is documented with the SR it offsets, a risk analysis showing equivalent SL-T coverage, asset-owner approval, and a test plan or operational evidence of effectiveness."
          implementation_groups:
            - ccsc
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:4
          ref_id: "4.4"
          name: Least privilege
          description: "Control: All accesses (human users, software processes, devices, service accounts) operate at the minimum privileges required for their authorized function — applied as an overarching design principle across authentication, authorization, and operational use. Verify: Role catalogs document privilege scopes; periodic access reviews are performed; service and process accounts run with restricted rights; emergency-elevated privileges are logged and reviewed."
          implementation_groups:
            - ccsc
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          assessable: false
          depth: 1
          ref_id: "5"
          name: FR 1 - Identification and authentication control
          description: Identifies and authenticates all human users, software processes, and devices before granting access to the control system.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.1
          name: Human user identification and authentication
          description: "Control: The control system identifies and authenticates each human user before granting access on every interface (local console, HMI, engineering workstation, remote, configuration tool); authentication strength scales with the target Security Level (multifactor at higher SLs per the Annex B REs). Verify: Each human user has a unique identity for non-shared use; where shared/role accounts are operationally required (e.g. operator console) they are documented with compensating controls; authentication is enforced on every access path. NIST 800-53: IA-2."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.2
          name: Software process and device identification and authentication
          description: "Control: The control system identifies and authenticates software processes and connected devices before granting them access. Verify: Each non-human entity (PLC, gateway, application) has a distinct identity used during authentication. NIST 800-53: IA-3, IA-9."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.3
          name: Account management
          description: "Control: All accounts (operator, engineer, admin, service, vendor, maintenance, time-bounded) are created, modified, enabled, disabled, and removed under a documented account management process covering provisioning, role changes, periodic review, and offboarding. Verify: Account lifecycle is documented and enforced for every account class — vendor and maintenance accounts in particular have a documented provisioning + de-provisioning workflow with an SLA from offboarding to disable. NIST 800-53: AC-2."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.4
          name: Identifier management
          description: "Control: Identifiers (user IDs, device IDs) are assigned uniquely over the system lifetime, are non-reusable for a defined period after retirement, and are traceable from any audit record back to a single specific actor. Verify: Identifier-management policy defines the uniqueness rules, post-retirement reuse delay, and audit-trace requirement; the system enforces them. NIST 800-53: IA-4."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.5
          name: Authenticator management
          description: "Control: Authenticators (passwords, tokens, certificates) are issued, distributed, stored protected (hashed or encrypted, never plaintext), rotated, and revoked under documented procedures; default and shared authenticators are changed before commissioning. Verify: Authenticator storage uses appropriate protection (no plaintext credentials anywhere); rotation, distribution, and revocation procedures are documented and exercised; default credentials on every component were changed before the system entered production. NIST 800-53: IA-5."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.6
          name: Wireless access management
          description: "Control: Wireless connections to or within the control system (Wi-Fi, WirelessHART, ISA100.11a, Bluetooth) are authorized, identified, authenticated, encrypted, and segregated from wired control networks; rogue access points are detected. Verify: A wireless-asset inventory exists; APs and clients use authenticated/encrypted protocols (WPA2/WPA3-Enterprise or industrial-protocol equivalents); rogue-AP detection is in place; wireless segments are separated from wired control networks at a documented boundary. NIST 800-53: AC-18."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.7
          name: Strength of password-based authentication
          description: "Control: Password-based authentication uses configurable strength rules (length, complexity, lifetime, history) appropriate to the assigned security level. Verify: Password policy is enforced at the system level and is configurable. NIST 800-53: IA-5(1)."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.8
          name: Public key infrastructure (PKI) certificates
          description: "Control: Where PKI is used, the control system supports certificate issuance, validation, revocation checking, and trust chain management. Verify: A documented PKI hierarchy exists and certificates are validated (path, expiry, CRL/OCSP) on every authentication attempt. NIST 800-53: IA-5(2)."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.9
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.9
          name: Strength of public key authentication
          description: "Control: Public-key authentication uses key strengths and algorithms appropriate to the assigned security level (e.g. RSA-2048+, ECDSA P-256+). Verify: Key sizes and algorithms in use meet documented minimums and are upgradable over the system lifetime. NIST 800-53: SC-12, SC-13."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.10
          name: Authenticator feedback
          description: "Control: Authentication input (e.g. typed passwords) is obscured and authentication errors do not disclose which factor was incorrect. Verify: Password fields obscure input and error messages do not reveal whether the username or the password was wrong. NIST 800-53: IA-6."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.11
          name: Unsuccessful login attempts
          description: "Control: Consecutive failed login attempts are limited and a defined action (lockout, alert) is taken when the threshold is reached, balanced against essential-function continuity. Verify: A configurable failed-attempt threshold exists; lockout actions are logged and have a defined recovery procedure. NIST 800-53: AC-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.12
          name: System use notification
          description: "Control: Before granting access, the control system displays an authorized-use banner consistent with organizational policy. Verify: The banner appears on all interactive sessions and matches the policy text. NIST 800-53: AC-8."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-1.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:5
          ref_id: SR 1.13
          name: Access via untrusted networks
          description: "Control: Access to the control system from untrusted networks (corporate IT, Internet, vendor remote support) is monitored, individually authorized, terminated at a controlled boundary, and protected by additional safeguards (VPN, jump host, MFA, session recording for vendor access). Verify: Every untrusted-network access path is documented; vendor remote access is time-bounded, logged, and supervisable (live attendance or recorded session); safeguards exceed intra-zone authentication. NIST 800-53: AC-17."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          assessable: false
          depth: 1
          ref_id: "6"
          name: FR 2 - Use control
          description: Restricts what authenticated users, processes, and devices are permitted to do on the control system.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.1
          name: Authorization enforcement
          description: "Control: The control system enforces authorizations on every protected action — at minimum separating view-only, operate (set-points, alarm acknowledge), configure (logic, recipes, parameters), and override (point manipulation, safety-system bypass) — per role assigned to each user, process, and device. Verify: A documented role-to-action matrix exists; access decisions match assignments on every protected action; privileged actions (override, point manipulation, safety bypass) require elevated authorization with an audit trail. NIST 800-53: AC-3."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.2
          name: Wireless use control
          description: "Control: Wireless connections are subject to the same use-control authorizations as wired access, including action-specific restrictions. Verify: Wireless users do not bypass authorization checks present on the wired interfaces."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.3
          name: Use control for portable and mobile devices
          description: "Control: Portable and mobile devices are authorized, monitored, and constrained when connected to the control system. Verify: Portable-device connections are logged, scanned, and configured before use; unauthorized devices are blocked. NIST 800-53: MP-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.4
          name: Mobile code
          description: "Control: Mobile code (e.g. ActiveX, Java applets, scripts on HMIs) is restricted to authorized types and trusted sources. Verify: Allowed mobile-code types and sources are explicitly listed, signed or validated, and unauthorized code is blocked. NIST 800-53: SC-18."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.5
          name: Session lock
          description: "Control: Interactive sessions lock after a configurable inactivity period and require re-authentication to resume. Verify: Session-lock timeout is configurable and applied to all interactive interfaces. NIST 800-53: AC-11."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.6
          name: Remote session termination
          description: "Control: Remote interactive sessions are terminated automatically after a defined inactivity period or upon explicit logout. Verify: Remote-session termination is enforced and logged. NIST 800-53: AC-12."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.7
          name: Concurrent session control
          description: "Control: The number of concurrent sessions per user or device is limited to a configurable value. Verify: Concurrent-session limits are enforced and tested. NIST 800-53: AC-10."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.8
          name: Auditable events
          description: "Control: The control system records audit events covering authentication (success and failure), authorization decisions, account changes, privilege escalations, configuration changes (including changes to the audit configuration itself), and other security-relevant activities. Verify: The auditable-event catalog is documented and the configured logger captures each listed event class — particularly changes to the audit configuration and any privilege-elevation actions, since silently disabling logging is a common attack pattern. NIST 800-53: AU-2, AU-3."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.9
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.9
          name: Audit storage capacity
          description: "Control: Sufficient audit storage capacity is provisioned to retain audit records for the required retention period under expected event rates. Verify: Storage sizing is documented, monitored, and overflow handling (rotation, alarms) is defined. NIST 800-53: AU-4."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.10
          name: Response to audit processing failures
          description: "Control: Audit-processing failures (logger crash, storage exhaustion) trigger a configured response such as alarm, halt, or controlled overwrite. Verify: The failure response is documented, tested, and observable in operations. NIST 800-53: AU-5."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.11
          name: Timestamps
          description: "Control: The control system uses synchronized, accurate timestamps for audit records and inter-component sequencing. Verify: All components are time-synchronized to a documented reference; clock drift is monitored. NIST 800-53: AU-8."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-2.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:6
          ref_id: SR 2.12
          name: Non-repudiation
          description: "Control: Audit records and security-critical actions are bound to the originating identity such that the originator cannot plausibly deny the action. Verify: Audit identifiers map uniquely to authenticated users or devices; audit integrity is protected from tampering. NIST 800-53: AU-10."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          assessable: false
          depth: 1
          ref_id: "7"
          name: FR 3 - System integrity
          description: Protects the control system, its software, and its data from unauthorized modification.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.1
          name: Communication integrity
          description: "Control: Communications between control system components are protected against unauthorized modification using cryptographic integrity (HMAC, digital signatures, TLS) or trusted-channel protocols (OPC UA Secure, DNP3-SA, IPsec); legacy industrial protocols without native integrity (Modbus/TCP, DNP3 v1, PROFINET classic) are wrapped in a secure overlay or tunneled across a trusted boundary. Verify: Each documented channel has an integrity mechanism appropriate to its target SL; legacy protocols without native integrity are explicitly tunneled or compensated, with the wrapping mechanism documented. NIST 800-53: SC-8, SC-8(1)."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.2
          name: Malicious code protection
          description: "Control: The control system implements detection and response measures against malicious code (allowlisting, anti-malware, integrity checks) suited to the operational context. Verify: A documented malicious-code defense is in place, tested, and does not conflict with essential functions. NIST 800-53: SI-3."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.3
          name: Security functionality verification
          description: "Control: The control system supports operator-initiated tests confirming that security functions (authentication, logging, etc.) operate as intended. Verify: Security-functionality tests exist, are documented, and are run on a defined cadence. NIST 800-53: SI-6."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.4
          name: Software and information integrity
          description: "Control: The control system detects unauthorized changes to software, configuration, and security-critical information. Verify: Integrity monitoring (file-integrity, signed firmware checks) is configured and alerts on deviations. NIST 800-53: SI-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.5
          name: Input validation
          description: "Control: Inputs to security-relevant interfaces (operator commands, network messages, configuration imports) are validated against expected syntax and semantics. Verify: Input-validation rules are documented per interface and malformed inputs are rejected and logged. NIST 800-53: SI-10."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.6
          name: Deterministic output
          description: "Control: Under abnormal conditions (failure, fault), control outputs are placed in a documented, predetermined state to maintain process safety. Verify: Fail-safe / fail-fixed behavior is documented per output and validated under test."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.7
          name: Error handling
          description: "Control: Error conditions are handled in a way that does not expose sensitive information or destabilize the control system. Verify: Error messages disclose only what is needed for operations; no leakage of credentials, paths, or internal configuration. NIST 800-53: SI-11."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.8
          name: Session integrity
          description: "Control: Sessions are protected against hijacking, replay, and unauthorized re-use (e.g. via unpredictable tokens, timeouts, source binding). Verify: Session tokens are unpredictable, expire, and are invalidated on logout. NIST 800-53: SC-23."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-3.9
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:7
          ref_id: SR 3.9
          name: Protection of audit information
          description: "Control: Audit records and audit tooling are protected from unauthorized access, modification, and deletion. Verify: Audit data has restricted access (separate accounts) and integrity is enforced (write-once or signed). NIST 800-53: AU-9."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
          assessable: false
          depth: 1
          ref_id: "8"
          name: FR 4 - Data confidentiality
          description: Protects data at rest and in transit from unauthorized disclosure.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-4.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
          ref_id: SR 4.1
          name: Information confidentiality
          description: "Control: Information classified as confidential is protected against unauthorized disclosure both at rest and in transit. Verify: A data-classification scheme exists; classified data is identified; protection mechanisms (encryption at rest, encryption/trusted channel in transit, access control) match the classification. NIST 800-53: SC-8, SC-28."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-4.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
          ref_id: SR 4.2
          name: Information persistence
          description: "Control: Data is sanitized or rendered unreadable when it persists beyond its operational need (e.g. on reassigned media, retired components). Verify: A data-disposal procedure exists, is followed for retired components, and is auditable. NIST 800-53: MP-6."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-4.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:8
          ref_id: SR 4.3
          name: Use of cryptography
          description: "Control: Cryptographic mechanisms in use follow approved algorithms, modes, and key-length minimums appropriate to the assigned security level. Verify: Cryptographic primitives are listed, current (no deprecated algorithms), and key management follows a documented process. NIST 800-53: SC-13."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
          assessable: false
          depth: 1
          ref_id: "9"
          name: FR 5 - Restricted data flow
          description: Confines control system data flow to the boundaries defined by the zone-and-conduit design.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
          ref_id: SR 5.1
          name: Network segmentation
          description: "Control: Logical or physical network segmentation separates the control system into zones consistent with the IEC 62443-3-2 zone-and-conduit design. Verify: Deployed segmentation matches the documented zone diagram; inter-zone traffic is constrained to defined conduits. NIST 800-53: SC-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
          ref_id: SR 5.2
          name: Zone boundary protection
          description: "Control: Boundaries between zones (and between control zones and external networks) are protected by mechanisms that enforce the documented data-flow policy. Verify: Boundary devices (firewalls, data diodes, gateways) implement the documented inter-zone rules; rule changes go through change control. NIST 800-53: SC-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
          ref_id: SR 5.3
          name: General purpose person-to-person communication restrictions
          description: "Control: General-purpose person-to-person communications (email, chat, browsing) are restricted on or from control-system components. Verify: Such applications are not installed on control-system hosts, or their network access is blocked at the boundary."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-5.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:9
          ref_id: SR 5.4
          name: Application partitioning
          description: "Control: Application functions are partitioned so that compromise of one component does not propagate freely to others. Verify: Control-system applications run in isolated execution environments (separate processes, accounts, hosts) per documented design. NIST 800-53: SC-2, SC-3."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:10
          assessable: false
          depth: 1
          ref_id: "10"
          name: FR 6 - Timely response to events
          description: Detects, reports, and responds to security-relevant events in a timely manner.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-6.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:10
          ref_id: SR 6.1
          name: Audit log accessibility
          description: "Control: Authorized personnel can read and analyze audit records via a defined interface, without disrupting control operations. Verify: Audit-data access is provisioned for security and operations staff; read access does not interfere with the controller workload. NIST 800-53: AU-6, AU-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-6.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:10
          ref_id: SR 6.2
          name: Continuous monitoring
          description: "Control: Security-relevant events are continuously monitored and forwarded to a place where they can be reviewed (SIEM, monitoring station). Verify: A documented monitoring path exists and is operational; monitored event categories cover the auditable-events catalog. NIST 800-53: SI-4, CA-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          assessable: false
          depth: 1
          ref_id: "11"
          name: FR 7 - Resource availability
          description: Maintains the availability of control-system resources during normal and adverse conditions.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.1
          name: Denial of service protection
          description: "Control: The control system maintains an operational state under defined denial-of-service conditions, through resource limits, rate limits, and segmentation. Verify: DoS protections are configured and tested; essential functions remain available under the test scenarios. NIST 800-53: SC-5."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.2
          name: Resource management
          description: "Control: Control-system resources (CPU, memory, network) are reserved or prioritized for security-relevant and safety-relevant functions over non-essential workloads. Verify: Resource limits are documented per process; monitoring detects exhaustion conditions. NIST 800-53: SC-6."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.3
          name: Control system backup
          description: "Control: Backups of control-system state are taken on a defined schedule and stored safely; backup scope explicitly covers PLC programs, HMI projects, historian databases, engineering tool configurations, network and security device configurations (firewall rules, IDS rules), and security configurations (account databases, certificates). Verify: Backup scope is documented per asset class and matches the control-system inventory (SR 7.8); backups are scheduled, completed, integrity-verified, and stored under access control; restoration sources are identified. NIST 800-53: CP-9."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.4
          name: Control system recovery and reconstitution
          description: "Control: Recovery procedures restore the control system to a known-good operational state after a disruption, using available backups. Verify: Documented recovery procedures exist, have been tested end-to-end, and meet the recovery-time objective. NIST 800-53: CP-10."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.5
          name: Emergency power
          description: "Control: Essential control-system components are powered through an emergency power source sized for the required hold-up time. Verify: Emergency power coverage is documented per component, tested on a schedule; battery/UPS health is monitored. NIST 800-53: PE-11."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.6
          name: Network and security configuration settings
          description: "Control: Network and security configurations are set to documented secure baselines; changes are managed under configuration control. Verify: A documented hardening baseline exists per component type; deviations are reviewed and approved. NIST 800-53: CM-6."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.7
          name: Least functionality
          description: "Control: Control-system components are configured to provide only the network ports, services, and applications required for their authorized functions. Verify: Installed services and open ports per component are documented and minimized; unused services are disabled. NIST 800-53: CM-7."
          implementation_groups:
            - system_requirements
        - urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:sr-7.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-3-2013:11
          ref_id: SR 7.8
          name: Control system component inventory
          description: "Control: An accurate, current inventory of control-system components (hardware, firmware, software versions) is maintained. Verify: The inventory is regularly reconciled with deployed reality and used as input to vulnerability and patch management. NIST 800-53: CM-8."
          implementation_groups:
            - system_requirements
    - urn: urn:intuitem:risk:framework:iec-62443-4-1-2018
      ref_id: iec-62443-4-1-2018
      name: IEC 62443-4-1:2018 — Secure product development lifecycle requirements (outline)
      description: Targets product suppliers. The standard rates each Practice on a CMMI-DEV-derived Maturity Level scale ML1 (Initial) to ML4 (Improving), per Annex A. ML scoring is not reproduced in this outline.
      min_score: 0
      max_score: 5
      scores_definition:
        - score: 0
          name: Incomplete
          description: Ad hoc and unknown
        - score: 1
          name: Initial
          description: Unpredictable and reactive
        - score: 2
          name: Managed
          description: Managed on the project level
        - score: 3
          name: Defined
          description: Proactive, rather than reactive
        - score: 4
          name: Quantitatively managed
          description: Measured and controlled
        - score: 5
          name: Optimizing
          description: Stable and flexible
      implementation_groups_definition:
        - ref_id: sdl_practices
          name: SDL Practices
          description: 8 secure-development-lifecycle practices (SM, SR, SD, SI, SVV, DM, SUM, SG).
      requirement_nodes:
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          assessable: false
          depth: 1
          ref_id: "5"
          name: Practice 1 - Security management
          description: The product supplier maintains a documented secure development process applied across all relevant products.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-1
          name: Development process
          description: "Practice: A documented secure development process is in place and is applied to every product within the SDLC scope. Evidence: The documented process exists, is current, and is referenced in product development records."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-2
          name: Identification of responsibilities
          description: "Practice: Roles and responsibilities for executing the secure development process are documented and assigned. Evidence: A RACI or role map names individuals or roles for each process step; gaps are tracked and closed."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-3
          name: Identification of applicability
          description: "Practice: For each product, applicability of the SDLC requirements is documented (which apply, which don't, which are tailored, with justification). Evidence: A per-product applicability statement exists with rationale for any tailoring."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-4
          name: Security expertise
          description: "Practice: Personnel performing security-relevant SDLC activities have demonstrable competence in product cybersecurity. Evidence: Training records, certifications, and experience matrices map to the SDLC roles defined in SM-2."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-5
          name: Process scoping
          description: "Practice: The boundary between the secure development process and other organizational processes (sales, support, manufacturing) is documented and managed. Evidence: Process scope documents show interfaces and handoffs between the SDLC and adjacent processes."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-6
          name: File integrity
          description: "Practice: Source code, design documents, build artifacts, CI/CD pipeline definitions, and security-relevant files are protected against unauthorized modification. Evidence: Version control with access control; signed commits or signed build artifacts; pipeline-definition changes go through review; provenance is auditable end-to-end (SLSA-style attestations where applicable)."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-7
          name: Development environment security
          description: "Practice: Development, build, and test environments — including build clusters, package proxies / artifact caches, container registries, and signing infrastructure — are secured (access control, malware protection, segregation from production). Evidence: Hardened development infrastructure with documented controls and monitoring; environment-access reviews; build-server and dependency-cache integrity is verifiable (recent supply-chain attack patterns covered)."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-8
          name: Controls for private keys
          description: "Practice: Code-signing and other product-related private keys are stored, accessed, rotated, and revoked under documented controls (HSM, sealed access); a documented key-compromise procedure covers detection, immediate rotation, certificate revocation, and customer notification. Evidence: Private-key management policy with auditable access logs; HSM/secure-storage attestation; key-compromise runbook with notification-timeline commitments. NIST 800-53: SC-12."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-9
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-9
          name: Security requirements for externally provided components
          description: "Practice: Security requirements are placed on external components (commercial, open-source) entering the product, with documented selection, vetting, and SBOM tracking. Evidence: Component intake process; SBOM (e.g. SPDX, CycloneDX) with provenance; vulnerability-monitoring feed for tracked components."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-10
          name: Custom developed components from third-party suppliers
          description: "Practice: When custom components are developed by third parties, security obligations flow down contractually to sub-contractors as well, and the primary supplier verifies sub-contractor compliance. Evidence: Supplier contracts with cybersecurity clauses requiring flow-down to sub-contractors; supplier-audit or attestation records; risk register for third-party components; source-code escrow or equivalent continuity arrangement for critical custom work."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-11
          name: Assessing and addressing security-related issues
          description: "Practice: Security issues identified throughout the lifecycle (defects, vulnerabilities, deviations) are tracked, prioritized, and addressed under a documented process. Evidence: Defect/vulnerability tracker with severity, status, owner, and remediation timeline."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-12
          name: Process verification
          description: "Practice: Independent personnel periodically verify that the secure development process is being followed (audits, gate reviews). Evidence: Process-verification audit reports with findings and corrective actions tracked to closure."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sm-13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:5
          ref_id: SM-13
          name: Continuous improvement
          description: "Practice: The secure development process is periodically reviewed and improved based on lessons learned, incidents, and external developments. Evidence: Review records (cadence, participants, outcomes); changes to the process are version-controlled."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:6
          assessable: false
          depth: 1
          ref_id: "6"
          name: Practice 2 - Specification of security requirements
          description: Security requirements for each product are explicitly specified, threat-modeled, reviewed, and traceable through development.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sr-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:6
          ref_id: SR-1
          name: Product security context
          description: "Practice: For each product, the intended operational environment, intended use cases, and assumed external security context are documented. Evidence: A product security context document covering intended deployment zones, user roles, and threat assumptions per product."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sr-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:6
          ref_id: SR-2
          name: Threat model
          description: "Practice: A threat model for each product is created, maintained, and updated as the product evolves. Evidence: Threat-model artifacts (data-flow diagrams, attack trees, STRIDE/PASTA tables) with traceability to mitigations."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sr-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:6
          ref_id: SR-3
          name: Product security requirements
          description: "Practice: Security requirements derived from the threat model are documented for each product, traceable to features and tests. Evidence: A product security requirement specification; each requirement traces to a design element and a verification test."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sr-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:6
          ref_id: SR-4
          name: Product security requirements content
          description: "Practice: Security requirements are written with sufficient detail to be testable (no vague 'be secure' language). Evidence: Each security requirement has a measurable acceptance criterion and references applicable 62443-3-3 SRs or 62443-4-2 CRs."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sr-5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:6
          ref_id: SR-5
          name: Security requirements review
          description: "Practice: Security requirements are reviewed by qualified personnel (including independent reviewers) before development proceeds. Evidence: Review records with reviewer identities, dates, findings, and dispositions."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:7
          assessable: false
          depth: 1
          ref_id: "7"
          name: Practice 3 - Secure by design
          description: "Product designs incorporate security from the start: defense in depth, secure-design principles, and design review."
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sd-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:7
          ref_id: SD-1
          name: Secure design principles
          description: "Practice: Designs apply documented secure-design principles (least privilege, defense in depth, fail secure, complete mediation, economy of mechanism). Evidence: Design documents reference and apply named principles; deviations are justified."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sd-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:7
          ref_id: SD-2
          name: Defense in depth design
          description: "Practice: Product designs implement multiple layers of defense so that compromise of one component does not compromise the system. Evidence: Architecture diagrams identify defense layers; threat models map attacks against each layer."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sd-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:7
          ref_id: SD-3
          name: Security design review
          description: "Practice: Designs are subject to security review (peer or independent) at defined milestones. Evidence: Design-review records covering security topics, with findings and dispositions tracked to closure."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sd-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:7
          ref_id: SD-4
          name: Secure design best practices
          description: "Practice: Designs follow industry secure-design best practices applicable to the product class (cryptography choices, secure boot, sandboxing, isolation). Evidence: Design documents reference applicable best-practice sources (NIST, OWASP, CERT, ENISA) and explicitly justify any deviations."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:8
          assessable: false
          depth: 1
          ref_id: "8"
          name: Practice 4 - Secure implementation
          description: Code is implemented to documented secure-coding standards with implementation review.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:si-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:8
          ref_id: SI-1
          name: Security implementation review
          description: "Practice: Code is reviewed for security defects before being released, using qualified reviewers and/or automated tooling. Evidence: Code-review records (manual review checklists + SAST tool reports) covering all release-bound code; review findings tracked to closure."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:si-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:8
          ref_id: SI-2
          name: Secure coding standards
          description: "Practice: Documented secure coding standards exist and are followed for the product's languages and frameworks (e.g. CERT C/C++, MISRA, OWASP for web). Evidence: Documented coding standards; CI enforces a baseline (linters, SAST); deviations are tracked and justified."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:9
          assessable: false
          depth: 1
          ref_id: "9"
          name: Practice 5 - Security verification and validation testing
          description: Testing covers security requirements, threat mitigations, vulnerability discovery, and penetration testing, with appropriate independence.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:svv-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:9
          ref_id: SVV-1
          name: Security requirements testing
          description: "Practice: Each security requirement (SR-3) has corresponding verification tests covering positive and negative cases. Evidence: Test plans and results trace 1:1 to security requirements."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:svv-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:9
          ref_id: SVV-2
          name: Threat mitigation testing
          description: "Practice: Threat mitigations identified in the threat model (SR-2) are explicitly tested. Evidence: A test matrix maps each mitigation to test cases with executed results."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:svv-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:9
          ref_id: SVV-3
          name: Vulnerability testing
          description: "Practice: Vulnerability identification activities (SAST, DAST, fuzzing, dependency scanning) are performed before release. Evidence: Vulnerability scan reports run against release candidates; findings tracked to closure or accepted with rationale."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:svv-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:9
          ref_id: SVV-4
          name: Penetration testing
          description: "Practice: Penetration testing exercises the product against realistic attacker techniques before release. Evidence: Pentest reports (internal or third-party) with scope, findings, severity, and remediation status."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:svv-5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:9
          ref_id: SVV-5
          name: Independence of testers
          description: "Practice: Persons performing security testing are sufficiently independent from the developers (organizational separation or third-party). Evidence: Tester role assignments demonstrate independence; reporting line is documented."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:10
          assessable: false
          depth: 1
          ref_id: "10"
          name: Practice 6 - Management of security-related issues
          description: Externally reported and internally discovered security issues are received, reviewed, assessed, addressed, disclosed, and the process is itself reviewed.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:dm-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:10
          ref_id: DM-1
          name: Receiving notifications of security-related issues
          description: "Practice: A documented intake channel (security@..., PSIRT contact, security.txt) receives external reports and routes them to the right team. Evidence: A published vulnerability-reporting channel; incoming reports are logged; SLA for acknowledgement is defined and met."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:dm-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:10
          ref_id: DM-2
          name: Reviewing security-related issues
          description: "Practice: Reported issues are reviewed for validity, scope, and applicability under a documented process. Evidence: Issue tracker entries show review timestamps, reviewer, and validity disposition."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:dm-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:10
          ref_id: DM-3
          name: Assessing security-related issues
          description: "Practice: Valid issues are assessed for severity (e.g. CVSS), exploitability, and impact across affected products. Evidence: Each valid issue has a severity rationale and an impact-analysis record covering all affected product versions."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:dm-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:10
          ref_id: DM-4
          name: Addressing security-related issues
          description: "Practice: Issues are addressed (fix, mitigation, workaround) with timelines proportional to severity. Evidence: Remediation plans with target dates per severity; actual closure metrics reported."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:dm-5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:10
          ref_id: DM-5
          name: Disclosing security-related issues
          description: "Practice: Security issues are disclosed to affected customers and the public per a documented coordinated-disclosure policy. Evidence: Published advisories (CVE/CSAF), customer communications, and a disclosure-timeline policy."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:dm-6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:10
          ref_id: DM-6
          name: Periodic review of security defect management practice
          description: "Practice: The defect-management practice is reviewed periodically and improved based on metrics and incidents. Evidence: Review records covering SLA attainment, false-positive rate, time-to-fix, and improvement actions."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
          assessable: false
          depth: 1
          ref_id: "11"
          name: Practice 7 - Security update management
          description: Security updates are qualified, documented, distributed, and delivered in a timely manner.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sum-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
          ref_id: SUM-1
          name: Security update qualification
          description: "Practice: Each security update is qualified (regression tested, integration tested) before release to ensure it does not destabilize deployed systems. Evidence: Qualification test plans and results per update; rollback plan included."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sum-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
          ref_id: SUM-2
          name: Security update documentation
          description: "Practice: Each security update is accompanied by documentation (what's fixed, severity, prerequisites, side effects, install instructions). Evidence: Release notes / advisory templates with all required content fields."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sum-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
          ref_id: SUM-3
          name: Dependent component or operating system security update documentation
          description: "Practice: For updates that depend on components outside the supplier's control (OS, third-party libraries), the dependency relationship and tested versions are documented. Evidence: Compatibility matrices listing tested OS / dependency versions per product release."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sum-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
          ref_id: SUM-4
          name: Security update delivery
          description: "Practice: Updates are delivered via authenticated, integrity-protected mechanisms to authorized customers. Evidence: Signed update packages, authenticated distribution channels, and download/verification documentation."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sum-5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:11
          ref_id: SUM-5
          name: Timely delivery of security patches
          description: "Practice: Security patches are delivered within timeframes proportional to severity, per a documented policy; an out-of-cycle / emergency-patch path exists for high-impact zero-days (Log4Shell-class events) with a target measured in hours, not days. Evidence: Patch SLA policy (e.g. critical = N days, high = M days) plus emergency-patch SLA; metrics show SLA attainment for both routine and emergency releases."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          assessable: false
          depth: 1
          ref_id: "12"
          name: Practice 8 - Security guidelines
          description: Documentation guides the customer on deploying, operating, and decommissioning the product securely.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sg-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          ref_id: SG-1
          name: Product defense in depth
          description: "Practice: Documentation describes the product's defense-in-depth design, including the security responsibilities the customer must implement to complete the picture. Evidence: A 'security overview' document per product covering layered defenses and customer-side obligations."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sg-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          ref_id: SG-2
          name: Defense in depth measures expected in the environment
          description: "Practice: Documentation specifies environmental security measures the product depends on (network segmentation, authentication infrastructure, time sources). Evidence: Environmental prerequisites are documented; deployment guides require confirmation."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sg-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          ref_id: SG-3
          name: Security hardening guidelines
          description: "Practice: Hardening guidelines tell the customer how to configure the product securely (services to disable, ports to close, accounts to remove, secure baselines). Evidence: A hardening guide aligned with documented secure baselines (CIS benchmarks where applicable)."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sg-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          ref_id: SG-4
          name: Secure disposal guidelines
          description: "Practice: End-of-life and disposal guidelines tell the customer how to securely retire the product (sanitize storage, revoke certificates, decommission accounts). Evidence: A disposal procedure document; field decommissioning kits or scripts where applicable."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sg-5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          ref_id: SG-5
          name: Secure operation guidelines
          description: "Practice: Operation guidelines cover security-relevant operational tasks (account management, log review, patch application). Evidence: An operations guide with security-task playbooks."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sg-6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          ref_id: SG-6
          name: Account management guidelines
          description: "Practice: Documentation covers customer-side account management (default account list, role assignments, password-policy support). Evidence: A documented account-management section listing default accounts and recommended customer practice."
          implementation_groups:
            - sdl_practices
        - urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:sg-7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-1-2018:12
          ref_id: SG-7
          name: Documentation review
          description: "Practice: All security-related customer documentation is reviewed for accuracy, completeness, and consistency before release. Evidence: Document-review records covering security guides; revisions are tracked under change control."
          implementation_groups:
            - sdl_practices
    - urn: urn:intuitem:risk:framework:iec-62443-4-2-2019
      ref_id: iec-62443-4-2-2019
      name: IEC 62443-4-2:2019 — Technical security requirements for IACS components (outline)
      description: "Use implementation-group filtering to scope by component type: select 'cr' + 'software_app' / 'embedded_device' / 'host_device' / 'network_device' depending on what is being certified. Always include 'ccsc'."
      min_score: 0
      max_score: 5
      scores_definition:
        - score: 0
          name: Incomplete
          description: Ad hoc and unknown
        - score: 1
          name: Initial
          description: Unpredictable and reactive
        - score: 2
          name: Managed
          description: Managed on the project level
        - score: 3
          name: Defined
          description: Proactive, rather than reactive
        - score: 4
          name: Quantitatively managed
          description: Measured and controlled
        - score: 5
          name: Optimizing
          description: Stable and flexible
      implementation_groups_definition:
        - ref_id: ccsc
          name: Common Component Security Constraints
          description: 4 framing constraints (clause 4) - mandatory for all components.
        - ref_id: cr
          name: Component Requirements
          description: 58 CRs across FR1-FR7 (clauses 5-11) - mandatory for all components.
        - ref_id: software_app
          name: Software Application Requirements
          description: 2 SARs specific to software applications (clause 12).
        - ref_id: embedded_device
          name: Embedded Device Requirements
          description: 8 EDRs specific to embedded devices (clause 13).
        - ref_id: host_device
          name: Host Device Requirements
          description: 8 HDRs specific to host devices (clause 14).
        - ref_id: network_device
          name: Network Device Requirements
          description: 12 NDRs specific to network devices (clause 15).
      requirement_nodes:
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:4
          assessable: false
          depth: 1
          ref_id: "4"
          name: Common component security constraints
          description: Foundational constraints applying to every component requirement; must hold for any SL-C(component) claim.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ccsc-1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:4
          ref_id: CCSC 1
          name: Support of essential functions
          description: "Control: Component security mechanisms do not impair the operation of essential functions of the broader control system, including under degraded conditions or failure of the security mechanism itself. Verify: Component behavior under security-mechanism failure (auth server unreachable, certificate expired) is documented and acceptable; essential-function trace exists."
          implementation_groups:
            - ccsc
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ccsc-2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:4
          ref_id: CCSC 2
          name: Compensating countermeasures
          description: "Control: Where a component requirement cannot be met directly, compensating countermeasures provide equivalent capability at the target SL-C(component) for the affected zone. Verify: Each compensating countermeasure is documented with the CR it offsets, equivalent SL-C analysis, asset-owner approval, and effectiveness evidence."
          implementation_groups:
            - ccsc
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ccsc-3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:4
          ref_id: CCSC 3
          name: Least privilege
          description: "Control: Component access controls grant users, processes, and connected devices only the privileges required for authorized component functions. Verify: Component role/permission definitions are minimal-privilege; service accounts run with restricted rights; emergency elevations are logged."
          implementation_groups:
            - ccsc
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ccsc-4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:4
          ref_id: CCSC 4
          name: Software development process
          description: "Control: The component is developed under a secure development process meeting IEC 62443-4-1. Verify: The supplier holds an SDLA certification or equivalent attestation against 62443-4-1; supporting process artifacts are referenced."
          implementation_groups:
            - ccsc
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          assessable: false
          depth: 1
          ref_id: "5"
          name: FR 1 - Identification and authentication control
          description: The component identifies and authenticates all human users, software processes, and devices before granting access.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.1
          name: Human user identification and authentication
          description: "Control: The component identifies and authenticates each human user before granting access on every interface (local console, remote, configuration tool). Verify: Each human user has a unique identity for non-shared use; where shared/role accounts are operationally required they are documented with compensating controls. NIST 800-53: IA-2."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.2
          name: Software process and device identification and authentication
          description: "Control: The component identifies and authenticates software processes and connected devices before granting them access. Verify: Each non-human entity has a distinct identity used during authentication. NIST 800-53: IA-3, IA-9."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.3
          name: Account management
          description: "Control: Component accounts (operator, engineer, admin, service, vendor) are created, modified, enabled, disabled, and removed under a documented account-management process. Verify: Component supports the account-lifecycle steps; vendor and maintenance accounts have documented offboarding. NIST 800-53: AC-2."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.4
          name: Identifier management
          description: "Control: Component identifiers (user IDs, device IDs) are unique over the system lifetime, non-reusable for a defined period after retirement, and traceable in audit records. Verify: Identifier-management policy is documented and enforced by the component. NIST 800-53: IA-4."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.5
          name: Authenticator management
          description: "Control: The component supports issuing, distributing, storing protected (hashed/encrypted, never plaintext), rotating, and revoking authenticators; default credentials are changed before commissioning. Verify: Authenticator storage uses appropriate protection; rotation/revocation is supported; default credentials can be (and are) changed before production. NIST 800-53: IA-5."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.6
          name: Wireless access management
          description: "Control: Wireless connections to the component are authorized, identified, authenticated, encrypted, and segregated from wired networks. Verify: Component supports authenticated/encrypted wireless protocols; rogue-AP detection coordinates with the broader system. NIST 800-53: AC-18."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.7
          name: Strength of password-based authentication
          description: "Control: Component password-based authentication uses configurable strength rules (length, complexity, lifetime, history) appropriate to the assigned SL-C(component). Verify: Password policy is enforced and configurable on the component. NIST 800-53: IA-5(1)."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.8
          name: Public key infrastructure certificates
          description: "Control: Where PKI is used, the component supports certificate issuance, validation, revocation checking, and trust-chain management. Verify: Component validates certificates (path, expiry, CRL/OCSP) on every authentication attempt. NIST 800-53: IA-5(2)."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.9
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.9
          name: Strength of public key-based authentication
          description: "Control: Component public-key authentication uses key strengths and algorithms appropriate to the assigned SL-C (e.g. RSA-2048+, ECDSA P-256+). Verify: Key sizes and algorithms in use meet documented minimums and are upgradable. NIST 800-53: SC-12, SC-13."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.10
          name: Authenticator feedback
          description: "Control: Component authentication input (e.g. typed passwords) is obscured and authentication errors do not disclose which factor was incorrect. Verify: Password fields obscure input; failure messages are generic. NIST 800-53: IA-6."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.11
          name: Unsuccessful login attempts
          description: "Control: Component limits consecutive failed login attempts and takes a defined action (lockout, alert) when the threshold is reached, balanced against essential-function continuity. Verify: Failed-attempt threshold is configurable; lockout is logged and has a recovery procedure. NIST 800-53: AC-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.12
          name: System use notification
          description: "Control: Component displays an authorized-use banner before granting access. Verify: Banner is configurable and displayed on all interactive sessions. NIST 800-53: AC-8."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.13
          name: Access via untrusted networks
          description: "Control: Component access from untrusted networks is monitored, individually authorized, terminated at a controlled boundary, and protected by additional safeguards. Verify: Untrusted-network access paths are documented; safeguards exceed intra-zone authentication. NIST 800-53: AC-17."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-1.14
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:5
          ref_id: CR 1.14
          name: Strength of symmetric key-based authentication
          description: "Control: Component symmetric-key authentication uses key strengths and algorithms appropriate to the assigned SL-C. Verify: Symmetric primitives in use are documented, current, and key management is documented. NIST 800-53: SC-12, SC-13."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          assessable: false
          depth: 1
          ref_id: "6"
          name: FR 2 - Use control
          description: The component restricts what authenticated users, processes, and devices can do.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.1
          name: Authorization enforcement
          description: "Control: Component enforces authorizations on every protected action — view-only, operate, configure, override — per role assigned. Verify: Component supports a role-to-action matrix; access decisions match assignments. NIST 800-53: AC-3."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.2
          name: Wireless use control
          description: "Control: Wireless connections to the component are subject to the same use-control authorizations as wired access. Verify: Wireless access does not bypass authorization checks present on wired interfaces."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.3
          name: Use control for portable and mobile devices
          description: "Control: Portable and mobile devices connected to the component are authorized, monitored, and constrained. Verify: Component logs portable-device connections; unauthorized devices are blocked. NIST 800-53: MP-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.4
          name: Mobile code
          description: "Control: Component restricts mobile code (interpreters, scripts, plugins) to authorized types and trusted sources. Verify: Allowed mobile-code types/sources are documented; unauthorized code is blocked. NIST 800-53: SC-18."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.5
          name: Session lock
          description: "Control: Component session locks after configurable inactivity and requires re-authentication to resume. Verify: Session-lock timeout is configurable on the component. NIST 800-53: AC-11."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.6
          name: Remote session termination
          description: "Control: Remote sessions on the component are terminated automatically after defined inactivity or upon logout. Verify: Remote-session termination is configurable, enforced, and logged. NIST 800-53: AC-12."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.7
          name: Concurrent session control
          description: "Control: Component limits concurrent sessions per user/device to a configurable value. Verify: Concurrent-session limit is configurable and enforced. NIST 800-53: AC-10."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.8
          name: Auditable events
          description: "Control: Component records audit events covering authentication, authorization, account changes, privilege escalations, and configuration changes (including changes to the audit configuration itself). Verify: Auditable-event catalog is documented and the component captures each listed event class. NIST 800-53: AU-2, AU-3."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.9
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.9
          name: Audit storage capacity
          description: "Control: Component provides sufficient audit storage to retain records for the required retention period under expected event rates. Verify: Storage sizing and overflow handling (rotation, alarms) are documented. NIST 800-53: AU-4."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.10
          name: Response to audit processing failures
          description: "Control: Component takes a configured response to audit-processing failures (logger crash, storage exhaustion): alarm, halt, or controlled overwrite. Verify: Failure response is documented and tested. NIST 800-53: AU-5."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.11
          name: Timestamps
          description: "Control: Component uses synchronized, accurate timestamps for audit records and inter-component sequencing. Verify: Component is time-synchronized to a documented reference; clock drift is bounded. NIST 800-53: AU-8."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.12
          name: Non-repudiation
          description: "Control: Component binds audit records and security-critical actions to the originating identity such that the originator cannot plausibly deny the action. Verify: Audit identifiers map uniquely to authenticated users/devices; audit integrity is protected. NIST 800-53: AU-10."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-2.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:6
          ref_id: CR 2.13
          name: Use of physical diagnostic and test interfaces
          description: "Control: Component physical diagnostic/test interfaces (JTAG, UART, debug ports, programming headers) are protected against unauthorized use after development (disabled, locked, or authentication-protected). Verify: Production components have diagnostic interfaces disabled or authenticated; field-debug access is logged."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          assessable: false
          depth: 1
          ref_id: "7"
          name: FR 3 - System integrity
          description: The component protects its own software, configuration, and security-critical data from unauthorized modification.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.1
          name: Communication integrity
          description: "Control: Component protects communications against unauthorized modification (cryptographic integrity codes, trusted-channel protocols); legacy protocols without native integrity are wrapped. Verify: Each communication channel uses an integrity mechanism appropriate to its target SL. NIST 800-53: SC-8, SC-8(1)."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.2
          name: Protection from malicious code
          description: "Control: Component implements detection and response measures against malicious code suited to its operational context (allowlisting, anti-malware, integrity checks). Verify: Documented malicious-code defense is in place and does not conflict with essential functions. NIST 800-53: SI-3."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.3
          name: Security functionality verification
          description: "Control: Component supports operator-initiated tests confirming that security functions operate as intended. Verify: Security-functionality tests exist, are documented, and are executable on the component. NIST 800-53: SI-6."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.4
          name: Software and information integrity
          description: "Control: Component detects unauthorized changes to software, configuration, and security-critical information. Verify: Integrity monitoring (file-integrity, signed firmware checks) is configured and alerts on deviations. NIST 800-53: SI-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.5
          name: Input validation
          description: "Control: Component validates inputs to security-relevant interfaces (operator commands, network messages, configuration imports) against expected syntax and semantics. Verify: Input-validation rules are documented per interface; malformed inputs are rejected and logged. NIST 800-53: SI-10."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.6
          name: Deterministic output
          description: "Control: Under abnormal conditions (failure, fault), component outputs are placed in a documented, predetermined state to maintain process safety. Verify: Fail-safe / fail-fixed behavior is documented per output and validated under test."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.7
          name: Error handling
          description: "Control: Component handles errors without exposing sensitive information or destabilizing operation. Verify: Error messages disclose only what is needed; no leakage of credentials, paths, or internal configuration. NIST 800-53: SI-11."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.8
          name: Session integrity
          description: "Control: Component sessions are protected against hijacking, replay, and unauthorized re-use (unpredictable tokens, timeouts, source binding). Verify: Session tokens are unpredictable, expire, and are invalidated on logout. NIST 800-53: SC-23."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.9
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.9
          name: Protection of audit information
          description: "Control: Component audit records and audit tooling are protected from unauthorized access, modification, and deletion. Verify: Audit data has restricted access; integrity is enforced (write-once or signed). NIST 800-53: AU-9."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.10
          name: Support for updates
          description: "Control: Component supports authenticated, integrity-protected updates throughout its lifecycle. Verify: Update mechanism uses signed packages; update history is auditable; update failure is handled gracefully (rollback, atomic install). NIST 800-53: SI-2."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.11
          name: Physical tamper resistance and detection
          description: "Control: Component resists (where SL requires) and detects physical tamper attempts. Verify: Tamper-resistance and tamper-detection mechanisms are documented per SL; tamper events are logged or trigger key zeroization. NIST 800-53: PE-3, SC-12(8)."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.12
          name: Provisioning product supplier roots of trust
          description: "Control: Roots of trust originating from the product supplier (signing keys, factory certificates) are provisioned and protected. Verify: Provisioning process is documented and audited; supplier root-of-trust integrity is verifiable from firmware."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.13
          name: Provisioning asset owner roots of trust
          description: "Control: Roots of trust originating from the asset owner (customer CAs, configuration-signing keys) can be provisioned, replacing or augmenting supplier defaults. Verify: Documented procedure exists for asset-owner root-of-trust provisioning; supplier defaults can be removed."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-3.14
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:7
          ref_id: CR 3.14
          name: Integrity of the boot process
          description: "Control: Component boot process verifies the integrity of firmware, bootloader, and OS images using cryptographic mechanisms (secure boot). Verify: Secure boot is enabled by default in production; boot-failure response (halt, alert, recovery) is documented."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:8
          assessable: false
          depth: 1
          ref_id: "8"
          name: FR 4 - Data confidentiality
          description: The component protects data at rest and in transit from unauthorized disclosure.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-4.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:8
          ref_id: CR 4.1
          name: Information confidentiality
          description: "Control: Component protects information classified as confidential against unauthorized disclosure both at rest and in transit. Verify: Encryption at rest, encryption/trusted channel in transit, and access control match the classification scheme. NIST 800-53: SC-8, SC-28."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-4.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:8
          ref_id: CR 4.2
          name: Information persistence
          description: "Control: Component sanitizes or renders unreadable data that persists in any storage medium beyond its operational need — including NVRAM, flash, EEPROM, removable storage, swap files, configuration backups, and decommissioning paths. Verify: Data-disposal procedure is documented per medium type and supported by the component (factory-reset, secure-erase, key-zeroization). NIST 800-53: MP-6."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-4.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:8
          ref_id: CR 4.3
          name: Use of cryptography
          description: "Control: Cryptographic mechanisms in the component follow approved algorithms, modes, and key-length minimums appropriate to the assigned SL. Verify: Cryptographic primitives are documented, current, and key management is documented. NIST 800-53: SC-13."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:9
          assessable: false
          depth: 1
          ref_id: "9"
          name: FR 5 - Restricted data flow
          description: The component supports the zone-and-conduit data-flow model defined for the system.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-5.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:9
          ref_id: CR 5.1
          name: Network segmentation
          description: "Control: Component supports network segmentation (e.g. multiple network interfaces, VLAN tagging) consistent with the zone-and-conduit design. Verify: Component segmentation capabilities match the documented zone diagram. NIST 800-53: SC-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-5.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:9
          ref_id: CR 5.2
          name: Zone boundary protection
          description: "Control: Component (when acting as a boundary) enforces the documented inter-zone data-flow policy. Verify: Boundary rules implemented by the component match the zone-and-conduit design; rule changes go through change control. NIST 800-53: SC-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-5.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:9
          ref_id: CR 5.3
          name: General-purpose person-to-person communication restrictions
          description: "Control: Component restricts general-purpose person-to-person communications (email, chat, browsing) on or through it. Verify: Such applications are not installed on the component, or their network access is blocked at the boundary."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-5.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:9
          ref_id: CR 5.4
          name: Application partitioning
          description: "Control: Component application functions are partitioned so compromise of one component-internal function does not propagate freely to others. Verify: Application functions run in isolated execution environments (separate processes, accounts) per documented design. NIST 800-53: SC-2, SC-3."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:10
          assessable: false
          depth: 1
          ref_id: "10"
          name: FR 6 - Timely response to events
          description: The component supports detecting and reporting security-relevant events.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-6.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:10
          ref_id: CR 6.1
          name: Audit log accessibility
          description: "Control: Authorized personnel can read and analyze component audit records via a defined interface. Verify: Audit-data access is provisioned for security and operations staff; read access does not interfere with workload. NIST 800-53: AU-6, AU-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-6.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:10
          ref_id: CR 6.2
          name: Continuous monitoring
          description: "Control: Component supports continuous monitoring by forwarding security-relevant events to a central facility (SIEM, monitoring station). Verify: Monitoring path exists and is operational; monitored event categories cover the auditable-events catalog. NIST 800-53: SI-4, CA-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          assessable: false
          depth: 1
          ref_id: "11"
          name: FR 7 - Resource availability
          description: The component maintains the availability of its resources during normal and adverse conditions.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.1
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.1
          name: Denial of service protection
          description: "Control: Component maintains operational state under defined denial-of-service conditions through resource limits, rate limits, and segmentation. Verify: DoS protections are configured and tested; essential functions remain available. NIST 800-53: SC-5."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.2
          name: Resource management
          description: "Control: Component reserves or prioritizes resources for security-relevant and safety-relevant functions over non-essential workloads. Verify: Resource limits are documented per process; monitoring detects exhaustion. NIST 800-53: SC-6."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.3
          name: Control system backup
          description: "Control: Component supports backup of its state (configuration, applications, programs) on a defined schedule with secure storage. Verify: Backup scope is documented; backups are completed and integrity-verified. NIST 800-53: CP-9."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.4
          name: Control system recovery and reconstitution
          description: "Control: Component supports recovery to a known-good operational state after a disruption using available backups. Verify: Documented recovery procedures exist and have been tested end-to-end. NIST 800-53: CP-10."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.5
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.5
          name: Emergency power
          description: "Control: Component supports operation through an emergency power source sized for the required hold-up time (where applicable). Verify: Emergency power coverage is documented; hold-up time is tested on a schedule. NIST 800-53: PE-11."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.6
          name: Network and security configuration settings
          description: "Control: Component ships with a secure-by-default configuration (no unnecessary services enabled, no default credentials in production, encryption on by default); on-site changes are managed under configuration control against a documented secure baseline. Verify: Out-of-the-box configuration meets a documented secure baseline; deviations applied during deployment are reviewed and approved; default credentials are forced-changed at first use. NIST 800-53: CM-6."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.7
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.7
          name: Least functionality
          description: "Control: Component is configured to provide only the network ports, services, and applications required for its authorized functions. Verify: Installed services and open ports are documented and minimized; unused services are disabled. NIST 800-53: CM-7."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:cr-7.8
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:11
          ref_id: CR 7.8
          name: Control system component inventory
          description: "Control: Component supports being inventoried (hardware identifiers, firmware versions, software versions) by the broader IACS asset-management system. Verify: Inventory data is exposed via a documented interface; reconciles with the deployed component state. NIST 800-53: CM-8."
          implementation_groups:
            - cr
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:12
          assessable: false
          depth: 1
          ref_id: "12"
          name: Software application requirements (SAR)
          description: Component-type-specific overlays for software applications. Apply when certifying a software-application component.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:sar-2.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:12
          ref_id: SAR 2.4
          name: Mobile code (software application)
          description: "Control: For software applications, mobile-code restrictions cover the application's runtime — embedded interpreters, scripting hosts, plugin systems. Verify: Application mobile-code execution paths are documented and constrained per allowlist."
          implementation_groups:
            - software_app
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:sar-3.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:12
          ref_id: SAR 3.2
          name: Protection from malicious code (software application)
          description: "Control: Software application provides hooks for malicious-code protection (allowlisting, integrity validation) compatible with its runtime. Verify: Application-level integrity checks (manifest verification, code signing, plugin signing) are documented."
          implementation_groups:
            - software_app
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          assessable: false
          depth: 1
          ref_id: "13"
          name: Embedded device requirements (EDR)
          description: Component-type-specific overlays for embedded devices (PLCs, RTUs, IEDs). Apply when certifying an embedded-device component.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-2.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 2.4
          name: Mobile code (embedded device)
          description: "Control: Embedded device mobile-code restrictions cover firmware-loaded scripts, interpreters, and dynamically loaded code. Verify: Firmware does not load unsigned dynamic code; allowed-types list is documented."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-2.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 2.13
          name: Use of physical diagnostic and test interfaces (embedded device)
          description: "Control: Embedded device debug interfaces (JTAG, UART, programming headers) are disabled or authentication-locked in production. Verify: Production firmware disables debug interfaces; access requires an authenticated procedure."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 3.2
          name: Protection from malicious code (embedded device)
          description: "Control: Embedded device firmware integrity is verified (signed firmware, secure boot); the device does not execute unsigned code. Verify: Firmware signing is enforced at boot; signing-key management is documented."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 3.10
          name: Support for updates (embedded device)
          description: "Control: Embedded device firmware updates are authenticated, integrity-protected, and survive interruption (atomic install / dual-bank). Verify: Update mechanism uses signed firmware; partial-update failure does not brick the device."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 3.11
          name: Physical tamper resistance and detection (embedded device)
          description: "Control: Embedded device tamper-resistance mechanisms (potting, mesh, sensors) match the SL-C; tamper events are logged or trigger key zeroization. Verify: Physical-tamper testing has been performed; tamper-response behavior is documented."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 3.12
          name: Provisioning product supplier roots of trust (embedded device)
          description: "Control: Supplier roots of trust are provisioned in a secure factory environment and protected in hardware (secure element, fuses, OTP). Verify: Factory provisioning has documented controls; supplier roots are stored in tamper-resistant storage."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 3.13
          name: Provisioning asset owner roots of trust (embedded device)
          description: "Control: Asset-owner roots can be provisioned through an authenticated procedure; supplier defaults can be replaced. Verify: A documented owner-provisioning procedure exists; ownership-transfer steps are auditable."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:edr-3.14
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:13
          ref_id: EDR 3.14
          name: Integrity of the boot process (embedded device)
          description: "Control: Embedded device secure boot validates firmware authenticity from the immutable hardware root of trust through bootloader and OS. Verify: Secure-boot chain is documented; boot-failure behavior (halt, recovery) is defined."
          implementation_groups:
            - embedded_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          assessable: false
          depth: 1
          ref_id: "14"
          name: Host device requirements (HDR)
          description: Component-type-specific overlays for host devices (engineering workstations, servers, HMI hosts). Apply when certifying a host-device component.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-2.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 2.4
          name: Mobile code (host device)
          description: "Control: Host device mobile-code restrictions cover OS-level interpreters, drivers, plugins, and scripts. Verify: Host-OS configurations restrict mobile-code execution per documented allowlist."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-2.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 2.13
          name: Use of physical diagnostic and test interfaces (host device)
          description: "Control: Host device physical interfaces (USB, serial, JTAG) are managed (disabled where not needed, authentication-locked otherwise). Verify: Physical-interface policy is documented and enforced via OS or hardware controls."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 3.2
          name: Protection from malicious code (host device)
          description: "Control: Host devices implement malicious-code protection appropriate to a general-purpose OS (anti-malware, allowlisting, integrity monitoring). Verify: Host-OS protection is configured, current, and monitored."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 3.10
          name: Support for updates (host device)
          description: "Control: Host-OS and application updates are authenticated and integrity-protected. Verify: OS and application updates are signed; update mechanism is documented."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 3.11
          name: Physical tamper resistance and detection (host device)
          description: "Control: Host devices implement physical access controls and tamper detection (chassis intrusion, boot-time integrity). Verify: Tamper-detection events are logged; physical-access controls are documented."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 3.12
          name: Provisioning product supplier roots of trust (host device)
          description: "Control: Host devices ship with supplier roots of trust protected by hardware (TPM, OS keys). Verify: TPM/HSM provenance is documented; supplier-root integrity is verifiable."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 3.13
          name: Provisioning asset owner roots of trust (host device)
          description: "Control: Asset owners can provision their own roots of trust onto the host (TPM ownership transfer, custom CA install). Verify: Owner-provisioning procedure is documented; supplier defaults can be replaced."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:hdr-3.14
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:14
          ref_id: HDR 3.14
          name: Integrity of the boot process (host device)
          description: "Control: Host secure boot (UEFI Secure Boot, measured boot) validates the host boot chain from hardware root of trust. Verify: Secure boot is enabled in production; boot-time integrity is measurable (e.g. via TPM PCR values)."
          implementation_groups:
            - host_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          assessable: false
          depth: 1
          ref_id: "15"
          name: Network device requirements (NDR)
          description: Component-type-specific overlays for network devices (switches, routers, firewalls, gateways). Apply when certifying a network-device component.
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-1.6
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 1.6
          name: Wireless access management (network device)
          description: "Control: Network devices providing wireless access (APs) implement wireless-specific authentication, encryption, and segregation. Verify: Wireless-AP configurations are documented (SSIDs, encryption, auth methods); wireless segments are isolated."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-1.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 1.13
          name: Access via untrusted networks (network device)
          description: "Control: Network devices acting as boundaries between trusted and untrusted zones implement the additional safeguards required for untrusted-network access. Verify: Boundary configurations match the documented inter-zone policy; untrusted-side access requires elevated safeguards."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-2.4
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 2.4
          name: Mobile code (network device)
          description: "Control: Mobile-code execution on network devices (embedded scripting, automation) is restricted to authorized types and sources. Verify: Network-device scripting/automation is constrained per documented allowlist."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-2.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 2.13
          name: Use of physical diagnostic and test interfaces (network device)
          description: "Control: Network device physical interfaces (console, USB, JTAG) are managed and physical access is controlled. Verify: Console/management ports require authentication; out-of-band access is protected."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 3.2
          name: Protection from malicious code (network device)
          description: "Control: Network device firmware integrity is verified; unauthorized firmware will not load. Verify: Firmware signing is enforced; firmware-update history is auditable."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 3.10
          name: Support for updates (network device)
          description: "Control: Network device firmware updates are authenticated, integrity-protected, and minimize service disruption (e.g. ISSU, graceful failover). Verify: Update mechanism is documented; failover/rollback procedures are tested."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 3.11
          name: Physical tamper resistance and detection (network device)
          description: "Control: Network devices implement physical access controls suited to their deployment (locked enclosures, intrusion sensors). Verify: Physical-security requirements are documented per deployment scenario."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 3.12
          name: Provisioning product supplier roots of trust (network device)
          description: "Control: Supplier roots of trust are protected in network device hardware (TPM, secure element). Verify: Supplier root-of-trust storage is documented; provenance is verifiable."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.13
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 3.13
          name: Provisioning asset owner roots of trust (network device)
          description: "Control: Asset-owner roots can be provisioned onto network devices (custom CAs, signed configurations). Verify: Owner-provisioning procedure exists; supplier defaults can be replaced."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-3.14
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 3.14
          name: Integrity of the boot process (network device)
          description: "Control: Network device secure boot validates firmware from hardware root of trust. Verify: Secure-boot chain is documented and enforced in production."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-5.2
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 5.2
          name: Zone boundary protection (network device)
          description: "Control: Network devices enforcing zone boundaries (firewalls, gateways, data diodes) implement the documented inter-zone data-flow policy. Verify: Boundary rules match the zone-and-conduit design; rule changes go through change control. NIST 800-53: SC-7."
          implementation_groups:
            - network_device
        - urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:ndr-5.3
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-4-2-2019:15
          ref_id: NDR 5.3
          name: General purpose, person-to-person communication restrictions (network device)
          description: "Control: Network devices block general-purpose person-to-person communications (email, chat, browsing) at boundaries between control zones and external networks. Verify: Boundary policies block general-purpose comms protocols/ports between control zones and corporate/Internet zones."
          implementation_groups:
            - network_device
    - urn: urn:intuitem:risk:framework:iec-62443-3-2-2020
      ref_id: iec-62443-3-2-2020
      name: IEC 62443-3-2:2020 — Security risk assessment for system design (outline)
      description: Workflow for partitioning the System under Consideration (SUC) into zones and conduits and conducting initial + detailed cyber security risk assessments. ZCR 5.6 outputs the SL-T (target Security Level) per zone/conduit consumed by 62443-3-3.
      min_score: 0
      max_score: 5
      scores_definition:
        - score: 0
          name: Incomplete
          description: Ad hoc and unknown
        - score: 1
          name: Initial
          description: Unpredictable and reactive
        - score: 2
          name: Managed
          description: Managed on the project level
        - score: 3
          name: Defined
          description: Proactive, rather than reactive
        - score: 4
          name: Quantitatively managed
          description: Measured and controlled
        - score: 5
          name: Optimizing
          description: Stable and flexible
      implementation_groups_definition:
        - ref_id: zcr
          name: Zone, Conduit and Risk Assessment Requirements
          description: All 32 ZCR sub-requirements (clause 4).
      requirement_nodes:
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          assessable: false
          depth: 1
          ref_id: "4"
          name: Zone, conduit and risk assessment requirements
          description: Workflow for defining the System under Consideration, partitioning it into zones and conduits, and conducting initial + detailed risk assessments to derive the target Security Level (SL-T) and Cybersecurity Requirements Specification (CRS).
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-1
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          ref_id: ZCR 1
          name: Identify the SUC
          description: Define what is and is not in scope of the cyber risk assessment.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-1.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-1
          ref_id: ZCR 1.1
          name: Identify the SUC perimeter and access points
          description: "Step: Identify the boundary of the System under Consideration (SUC), including all external access points (network connections, USB, vendor remote, wireless, physical). Output: SUC boundary diagram listing every access point with its protocol, direction, and counterparty."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-2
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          ref_id: ZCR 2
          name: Initial cyber security risk assessment
          description: High-level initial risk assessment to decide whether detailed assessment is needed per zone.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-2.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-2
          ref_id: ZCR 2.1
          name: Perform initial cyber security risk assessment
          description: "Step: For each candidate zone, identify worst-case scenarios and impact and compare against the asset owner's tolerable-risk threshold. Output: Initial risk-assessment record with worst-case impact, frequency assumptions, and a gating decision (proceed to detailed RA or not)."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          ref_id: ZCR 3
          name: Partition the SUC into zones and conduits
          description: Group SUC assets into zones and document the conduits (communication paths) connecting them.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3
          ref_id: ZCR 3.1
          name: Establish zones and conduits
          description: "Step: Document zone-grouping criteria (function, criticality, ownership, access-control needs) and create the zone-and-conduit model. Output: Documented zones, conduits, and the criteria used to define them."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3
          ref_id: ZCR 3.2
          name: Separate business and IACS assets
          description: "Step: Place business/IT assets and IACS assets in separate zones with controlled conduits between them. Output: Business and IACS zones are clearly delineated; inter-zone conduits are documented."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3
          ref_id: ZCR 3.3
          name: Separate safety related assets
          description: "Step: Place safety-related assets (SIS, ESD) in separate zones from non-safety assets, aligning the cybersecurity zone boundary with the safety integrity boundary (SIL per IEC 61508/61511). Output: Safety zones are documented separately with restricted conduits to control zones; the SIL of the safety zone is recorded and the cyber boundary respects it."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3.4
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3
          ref_id: ZCR 3.4
          name: Separate temporarily connected devices
          description: "Step: Account for transient devices (engineer laptops, vendor laptops, USB drives, mobile diagnostic tools) as their own zone class or with documented connection controls. Output: Temporary-device handling is documented in the zone-and-conduit model."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3.5
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3
          ref_id: ZCR 3.5
          name: Separate wireless devices
          description: "Step: Wireless-only zones are established or wireless devices are clearly placed within a zone with documented isolation. Output: Wireless devices are accounted for in the zone-and-conduit diagram."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3.6
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-3
          ref_id: ZCR 3.6
          name: Separate devices connected via external networks
          description: "Step: Devices reachable from external networks (Internet, corporate IT, partner networks, vendor remote) are placed in zones reflecting their elevated exposure. Output: External-connectivity zones are documented with their exposure characteristics."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-4
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          ref_id: ZCR 4
          name: Risk comparison
          description: Compare the initial risk against the asset owner's tolerable-risk threshold to decide whether detailed risk assessment is needed.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-4.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-4
          ref_id: ZCR 4.1
          name: Compare initial risk to tolerable risk
          description: "Step: For each zone, decide whether further (detailed) risk assessment is needed based on whether initial risk exceeds tolerable risk. Output: Per-zone decision documented (proceed to detailed RA, accept, transfer, or avoid)."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          ref_id: ZCR 5
          name: Perform a detailed cyber security risk assessment
          description: For each zone where ZCR 4 indicates need, conduct detailed risk assessment per the next 13 sub-steps.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.1
          name: Identify threats
          description: "Step: Identify threats applicable to each zone and conduit (threat actors, scenarios, attack patterns) drawing on MITRE ATT&CK for ICS, CISA / SANS top-OT-threat lists, sector ISACs (E-ISAC, WaterISAC, Auto-ISAC), and current threat-intelligence feeds. Output: Threat catalog per zone, traceable to specific TTPs / ATT&CK techniques."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.2
          name: Identify vulnerabilities
          description: "Step: Identify vulnerabilities (known CVEs, design weaknesses, configuration issues) applicable to assets in each zone. Output: Vulnerability inventory per zone, periodically refreshed."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.3
          name: Determine consequence and impact
          description: "Step: For each zone, determine the consequence and impact of a successful compromise (safety, environmental, operational, financial, regulatory, reputational). Output: Impact-rating record per zone."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.4
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.4
          name: Determine unmitigated likelihood
          description: "Step: Estimate the likelihood of compromise without considering existing countermeasures, based on threat capability and vulnerability exposure. Output: Unmitigated-likelihood rating per threat-zone pairing."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.5
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.5
          name: Determine unmitigated cyber security risk
          description: "Step: Combine unmitigated likelihood and impact to compute unmitigated risk per zone. Output: Unmitigated risk record per zone."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.6
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.6
          name: Determine SL-T
          description: "Step: Determine the target Security Level (SL-T) per Foundational Requirement (FR1-FR7) per zone, based on the risk-reduction needed. Output: SL-T vector (SL-T(IAC), SL-T(UC), SL-T(SI), SL-T(DC), SL-T(RDF), SL-T(TRE), SL-T(RA)) per zone — consumed by 62443-3-3."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.7
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.7
          name: Compare unmitigated risk with tolerable risk
          description: "Step: Compare unmitigated risk against tolerable risk to identify the gap requiring mitigation. Output: Risk-gap analysis per zone."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.8
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.8
          name: Identify and evaluate existing countermeasures
          description: "Step: Identify and evaluate the effectiveness of countermeasures already in place (technical, procedural, compensating). Output: Existing-countermeasure inventory with effectiveness ratings."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.9
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.9
          name: Reevaluate likelihood and impact
          description: "Step: Reevaluate likelihood and impact taking existing countermeasures into account. Output: Mitigated likelihood and impact ratings per zone."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.10
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.10
          name: Determine residual risk
          description: "Step: Compute residual risk after existing countermeasures. Output: Residual-risk record per zone."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.11
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.11
          name: Compare residual risk with tolerable risk
          description: "Step: Compare residual risk against tolerable risk to identify any remaining gap. Output: Residual-vs-tolerable decision per zone."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.12
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.12
          name: Identify additional cyber security countermeasures
          description: "Step: Where residual risk exceeds tolerable risk, identify additional countermeasures (technical, procedural, compensating) to close the gap. Output: Recommended additional-countermeasure list per zone."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5.13
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-5
          ref_id: ZCR 5.13
          name: Document and communicate results
          description: "Step: Document the detailed risk-assessment results and communicate them to the named stakeholder set: asset owner (decision authority), system integrator (design input), SOC / monitoring team (detection priorities), safety engineering (joint risk picture), and product suppliers (procurement requirements). Output: Detailed risk-assessment report per zone with audience-specific summaries (executive, technical, safety, supplier-procurement)."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          ref_id: ZCR 6
          name: Document cyber security requirements, assumptions and constraints
          description: Capture the cybersecurity requirements, assumptions, and constraints derived from the risk assessment as the input to system design — the Cybersecurity Requirements Specification (CRS).
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.1
          name: Cyber security requirements specification
          description: "Step: Produce a Cybersecurity Requirements Specification (CRS) covering the per-zone cybersecurity requirements. Output: CRS document per zone with traceability to risk-assessment outputs."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.2
          name: SUC description
          description: "Step: Document the SUC as part of the CRS context (scope, perimeter, architecture). Output: SUC description in the CRS."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.3
          name: Zone and conduit drawings
          description: "Step: Include zone-and-conduit diagrams in the CRS. Output: Zone-and-conduit drawings as CRS deliverables."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.4
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.4
          name: Zone and conduit characteristics
          description: "Step: Document characteristics of each zone and conduit (function, criticality, SL-T, throughput, latency, reliability). Output: Per-zone and per-conduit characteristic table."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.5
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.5
          name: Operating environment assumptions
          description: "Step: Document assumptions about the operating environment (physical security, organizational controls, neighboring systems). Output: Operating-environment assumption list in the CRS."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.6
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.6
          name: Threat environment
          description: "Step: Document the assumed threat environment (threat actors, capabilities, motivations). Output: Threat-environment description in the CRS."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.7
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.7
          name: Organizational security policies
          description: "Step: Reference the applicable organizational security policies in the CRS. Output: Policy-reference list in the CRS."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.8
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.8
          name: Tolerable risk
          description: "Step: Document the tolerable-risk thresholds used in the risk assessment. Output: Tolerable-risk criteria captured in the CRS."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6.9
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-6
          ref_id: ZCR 6.9
          name: Regulatory requirements
          description: "Step: Document applicable regulatory and contractual requirements affecting the SUC. Output: Regulatory-requirement list in the CRS."
          implementation_groups:
            - zcr
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-7
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:4
          ref_id: ZCR 7
          name: Asset owner approval
          description: Obtain asset owner formal approval of the risk assessment outputs and CRS.
        - urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-7.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-3-2-2020:zcr-7
          ref_id: ZCR 7.1
          name: Attain asset owner approval
          description: "Step: Present the risk-assessment results, CRS, and recommended countermeasures to the asset owner for formal approval. Output: Signed asset-owner approval record."
          implementation_groups:
            - zcr
    - urn: urn:intuitem:risk:framework:iec-62443-2-4-2023
      ref_id: iec-62443-2-4-2023
      name: IEC 62443-2-4:2023 — Security program for IACS service providers (functional-area outline)
      description: v0 outline at functional-area granularity in procurement tone (what the service provider does + what the asset owner asks for). Each row corresponds to a SP.aa functional area; BR-level (SP.aa.bb) rows are pending full Ed.2 text access.
      min_score: 0
      max_score: 5
      scores_definition:
        - score: 0
          name: Incomplete
          description: Ad hoc and unknown
        - score: 1
          name: Initial
          description: Unpredictable and reactive
        - score: 2
          name: Managed
          description: Managed on the project level
        - score: 3
          name: Defined
          description: Proactive, rather than reactive
        - score: 4
          name: Quantitatively managed
          description: Measured and controlled
        - score: 5
          name: Optimizing
          description: Stable and flexible
      implementation_groups_definition:
        - ref_id: functional_areas
          name: Functional Areas
          description: 12 functional areas SP.01-SP.12 (Annex A Table A.1).
      requirement_nodes:
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          assessable: false
          depth: 1
          ref_id: A
          name: Annex A (normative) - Security requirements
          description: Service-provider security capabilities organized by 12 functional areas; each area carries multiple Base Requirements (BRs) and Requirement Enhancements (REs) — paywalled, not in this v0 outline.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.01
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.01
          name: Solution staffing
          description: "Service capability: The service provider's staff working on IACS solutions are competent, screened, and have role-specific cybersecurity training. Asset owner asks: Background-check policy and records, cybersecurity training records, role-competency matrix mapping staff to engagement responsibilities."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.02
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.02
          name: Assurance
          description: "Service capability: The service provider executes its services under documented assurance practices (quality, security, change control, defect tracking). Asset owner asks: Assurance documentation, internal-audit reports, defect-tracking metrics, certifications (e.g. ISASecure, ISO 9001/27001)."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.03
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.03
          name: Architecture
          description: "Service capability: The service provider designs IACS architectures aligned with the asset owner's cybersecurity requirements (62443-3-2 zones and conduits, 62443-3-3 SL-T). Asset owner asks: Architecture-review records, evidence that the design honors the zone-and-conduit model and target Security Levels."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.04
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.04
          name: Wireless
          description: "Service capability: The service provider deploys wireless capabilities under documented secure-wireless practices (authentication, encryption, segregation, rogue-AP detection). Asset owner asks: Wireless deployment standards and configurations; segmentation evidence; protocol/encryption choices."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.05
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.05
          name: SIS (Safety Instrumented Systems)
          description: "Service capability: The service provider handles safety-instrumented systems with heightened controls — documented separation aligned with the SIL boundary, dual approval (safety + cybersecurity) for any change, testing in a separate environment, reversibility requirements, and coordination with the asset owner's safety lifecycle (IEC 61511 management of change). Asset owner asks: SIS-handling procedures with explicit dual-approval workflow, SIL-aware separation evidence, change-control records, evidence of integration with the asset owner's IEC 61511 MoC."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.06
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.06
          name: Configuration management
          description: "Service capability: The service provider maintains documented configuration management for delivered solutions (inventory, baselines, change control, version tracking). Asset owner asks: Configuration-management plans, baselines, change records, version-control evidence."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.07
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.07
          name: Remote access
          description: "Service capability: The service provider's remote-access activities follow asset-owner-approved procedures (authentication, time-bounding, session recording, supervised access). Asset owner asks: Remote-access policy, approved-tool list, session logs, evidence of compliance with the asset owner's remote-access rules."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.08
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.08
          name: Event management
          description: "Service capability: The service provider monitors, records, and reports security-relevant events from delivered solutions, integrating with the asset owner's monitoring where applicable, with a documented incident-handoff procedure (who calls whom, escalation thresholds, contractual response times) coordinating with the asset owner's IR team. Asset owner asks: Event-management procedures, integration with asset-owner SOC if applicable, IR-handoff runbook with named contacts and contractual response SLAs, joint-exercise records."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.09
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.09
          name: Account management
          description: "Service capability: The service provider manages accounts (its own and customer-supplied) under documented account-management practices including offboarding SLAs for service-provider personnel. Asset owner asks: Account-management procedures, vendor-account inventory, offboarding records, evidence that departed personnel lose access promptly."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.10
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.10
          name: Malware protection
          description: "Service capability: The service provider's deployed and operated malware-protection capabilities are documented and operational on every component class. Asset owner asks: Malware-protection approach per component type, signature-update process, scan history."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.11
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.11
          name: Patch management
          description: "Service capability: The service provider qualifies, distributes, and applies patches per documented procedures aligned with the asset owner's change-control. Asset owner asks: Patch-qualification procedure, patch-status reports, deferred-patch mitigation register, integration with the asset owner's change-control."
          implementation_groups:
            - functional_areas
        - urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:sp.12
          assessable: true
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-4-2023:a
          ref_id: SP.12
          name: Backup/restore
          description: "Service capability: The service provider provides backup and restore capabilities for delivered solutions, with documented scope, schedule, verification, and media protection. Asset owner asks: Backup scope and schedule, restoration test records, media handling and protection, recovery-time evidence."
          implementation_groups:
            - functional_areas
    - urn: urn:intuitem:risk:framework:iec-62443-2-1-2024
      ref_id: iec-62443-2-1-2024
      name: IEC 62443-2-1:2024 — Security program for IACS asset owners (outline)
      description: Targets asset owners / operators (railway operators, chemical plants, energy utilities, etc.). Audited via the ISASecure ACSSA scheme alongside 62443-2-4, 62443-3-2 and 62443-3-3.
      min_score: 0
      max_score: 5
      scores_definition:
        - score: 0
          name: Incomplete
          description: Ad hoc and unknown
        - score: 1
          name: Initial
          description: Unpredictable and reactive
        - score: 2
          name: Managed
          description: Managed on the project level
        - score: 3
          name: Defined
          description: Proactive, rather than reactive
        - score: 4
          name: Quantitatively managed
          description: Measured and controlled
        - score: 5
          name: Optimizing
          description: Stable and flexible
      implementation_groups_definition:
        - ref_id: spe
          name: Security Program Elements
          description: All 87 sub-elements across SPE 1-8 (clauses 6-13).
      requirement_nodes:
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
          assessable: false
          depth: 1
          ref_id: "6"
          name: SPE 1 - Organizational security measures
          description: Governance, policies, training, supply-chain, and physical-access foundation of the IACS security programme.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
          ref_id: ORG 1
          name: Security related organization and policies
          description: Documented organizational policies, roles, training, and supply-chain rules.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
          ref_id: ORG 1.1
          name: Information security management system (ISMS)
          description: "Programme: An ISMS covering the IACS exists, is documented, and is integrated with the organization's broader ISMS (ISO 27001-aligned acceptable). Verify: ISMS scope explicitly covers IACS; governance, roles, and review cycles are documented."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
          ref_id: ORG 1.2
          name: Background checks
          description: "Programme: Background checks are performed on personnel with access to the IACS, proportional to access level and applicable law. Verify: Documented background-check policy; records exist for IACS-access personnel; renewal cadence is defined."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
          ref_id: ORG 1.3
          name: Security roles and responsibilities
          description: "Programme: Cybersecurity roles and responsibilities for the IACS are documented and assigned (CISO, ICS security lead, system owner, operator security duties). Verify: A RACI or role map exists covering IACS cybersecurity; gaps are tracked and closed."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.4
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
          ref_id: ORG 1.4
          name: Security awareness training
          description: "Programme: General cybersecurity awareness training is provided to all personnel with IACS access. Verify: Training catalogue exists; completion records are maintained; refresh cadence is documented."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.5
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
          ref_id: ORG 1.5
          name: Security responsibilities training
          description: "Programme: Role-specific cybersecurity training is provided to personnel with cybersecurity responsibilities (operators, engineers, security staff). Verify: Role-specific training records exist; training maps to the responsibilities defined in ORG 1.3."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1.6
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-1
          ref_id: ORG 1.6
          name: Supply chain security
          description: "Programme: Supply-chain cybersecurity requirements are placed on suppliers (procurement language, evaluation, periodic review). Verify: Procurement contracts include cybersecurity clauses; supplier evaluation records exist (e.g. requiring 62443-2-4 / 4-1 certifications, SBOM)."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
          ref_id: ORG 2
          name: Security assessments and reviews
          description: Periodic assessments, anomaly discovery, secure-development support, and programme reviews verify the programme's effectiveness.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
          ref_id: ORG 2.1
          name: Security risk mitigation
          description: "Programme: Cybersecurity risks identified through risk assessments (62443-3-2) are tracked through to mitigation. Verify: A risk register exists; mitigation actions have owners, dates, and tracked status."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
          ref_id: ORG 2.2
          name: Processes for discovery of security anomalies
          description: "Programme: Documented processes exist to discover security anomalies (vulnerability scans, penetration tests, threat hunting, log review). Verify: Anomaly-discovery activities are scheduled and produce records; findings are routed into the risk register."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
          ref_id: ORG 2.3
          name: Secure development and support
          description: "Programme: For internally developed or modified IACS components, the asset owner applies (or requires of contractors) secure development practices. Verify: Internal development follows a documented SDLC; contractor work is bound to equivalent expectations (e.g. flow-down of 62443-4-1)."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2.4
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-2
          ref_id: ORG 2.4
          name: SP reviews
          description: "Programme: The security programme itself is reviewed periodically for adequacy and effectiveness. Verify: Programme reviews are scheduled; review records show participants, scope, findings, and corrective actions."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-3
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:6
          ref_id: ORG 3
          name: Security of physical access
          description: Physical access to IACS components is controlled and monitored.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-3.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:org-3
          ref_id: ORG 3.1
          name: Physical access control
          description: "Programme: Physical access to IACS components (control rooms, field cabinets, engineering rooms) is restricted, logged, and monitored. Verify: Physical-access policy is documented; access lists are maintained; physical-access events are logged where applicable."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:7
          assessable: false
          depth: 1
          ref_id: "7"
          name: SPE 2 - Configuration management
          description: Inventory, baselines, drawings, and change control for IACS components.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:7
          ref_id: CM 1
          name: Inventory management of IACS hardware/software components and network communications
          description: Configuration management starts with knowing what is deployed, what its baseline is, and how changes are controlled.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
          ref_id: CM 1.1
          name: Asset inventory baseline
          description: "Programme: A current inventory of IACS hardware, software, and network communications exists. Verify: Inventory is reconciled with deployed reality on a defined cadence; covers hardware, firmware versions, software versions, and inter-component communications."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
          ref_id: CM 1.2
          name: Infrastructure drawings/documentation
          description: "Programme: Infrastructure drawings (network diagrams, control architecture, zone-and-conduit diagrams) are maintained and current. Verify: Drawings exist, are version-controlled, and match deployed reality at a defined cadence."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
          ref_id: CM 1.3
          name: Configuration settings
          description: "Programme: Configuration settings for IACS components are defined, documented, and maintained against secure baselines. Verify: Per-component-type baselines are documented and deviations are tracked."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1.4
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:cm-1
          ref_id: CM 1.4
          name: Change control
          description: "Programme: Changes to IACS configurations go through a documented change-control process covering review, approval, testing, and back-out. Verify: Change records show the documented steps; emergency changes have a documented after-the-fact review."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
          assessable: false
          depth: 1
          ref_id: "8"
          name: SPE 3 - Network and communications security
          description: Network segmentation, secure wireless, and secure remote access enforce the zone-and-conduit boundaries.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
          ref_id: NET 1
          name: System segmentation
          description: Network segmentation enforces zone-and-conduit boundaries from the 62443-3-2 design.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.1
          name: Segmentation from non-IACS zones
          description: "Programme: IACS zones are segmented from non-IACS networks (corporate IT, Internet) per the documented zone-and-conduit design. Verify: Boundary devices match the zone diagram; rules are reviewed periodically."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.2
          name: Documentation of zones and network zone interconnections
          description: "Programme: Zones and inter-zone connections are documented with protocols, directions, and authorized counterparts. Verify: Inter-zone documentation matches deployed reality."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.3
          name: Network segmentation from safety systems
          description: "Programme: Safety systems are segmented from non-safety networks, with safety-specific access controls on connections to non-safety zones. Verify: Safety-network segmentation is documented and verifiable; non-safety access goes through controlled boundaries."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.4
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.4
          name: Network autonomy
          description: "Programme: IACS networks operate autonomously from external/corporate networks during outages of those external networks. Verify: Autonomy testing has been performed; documented behavior under loss of upstream connectivity is acceptable."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.5
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.5
          name: Network disconnection from external networks
          description: "Programme: A documented capability exists to disconnect the IACS from external networks if needed (kill-switch, manual disconnection procedure). Verify: Disconnect capability is documented, tested, and authorized for use under defined conditions."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.6
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.6
          name: Internal network access control
          description: "Programme: Internal IACS network access is controlled through documented access-control mechanisms (NAC, port security, MAC filtering). Verify: Internal network access controls are documented and operational."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.7
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.7
          name: Network accessible services
          description: "Programme: Network-accessible services on IACS components are minimized to those required for authorized functions, enforced through deny-by-default firewall and host-firewall rules with explicit allowlists per zone and conduit. Verify: Per-component allowed-services list is documented; firewall and host-firewall rules deny by default; unused services are disabled at the component level (defense in depth, not boundary-only)."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.8
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.8
          name: User messaging
          description: "Programme: User-messaging facilities (broadcast, multicast operator messages) are controlled to prevent abuse. Verify: User-messaging policy is documented; abuse-prevention controls are in place."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1.9
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-1
          ref_id: NET 1.9
          name: Network time distribution
          description: "Programme: A documented, secure network time source (NTP, PTP) is provided to IACS components. Verify: Time source is authoritative, redundant where required, and time synchronization is monitored."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
          ref_id: NET 2
          name: Secure wireless access
          description: Wireless access (where used) follows authenticated, encrypted, segregated practices.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
          ref_id: NET 2.1
          name: Wireless protocols
          description: "Programme: Wireless protocols in use are documented and use authenticated, encrypted modes (WPA2/WPA3-Enterprise, WirelessHART, ISA100.11a). Verify: Wireless protocol inventory exists; legacy/unsecured protocols are not in use or are explicitly compensated."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
          ref_id: NET 2.2
          name: Wireless network segmentation
          description: "Programme: Wireless networks are segmented from wired control networks at a documented boundary. Verify: Wireless segmentation matches the zone-and-conduit design."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-2
          ref_id: NET 2.3
          name: Wireless properties and addresses
          description: "Programme: Wireless network identifiers (SSIDs, MAC addresses, frequencies) are managed and documented. Verify: Wireless properties are inventoried; rogue-AP detection is in place."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:8
          ref_id: NET 3
          name: Secure remote access
          description: Remote access is authenticated, monitored, and time-bounded — particularly for vendor support.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
          ref_id: NET 3.1
          name: Remote access applications
          description: "Programme: Authorized remote-access applications are documented (jump host, VPN client, vendor remote tool). Verify: Remote-access application inventory exists; only documented tools are permitted."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
          ref_id: NET 3.2
          name: Remote access connections
          description: "Programme: Remote-access connections are authenticated, encrypted, and individually authorized; vendor connections are time-bounded. Verify: Connection logs show authenticated identities and durations; vendor sessions are recorded or supervised."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:net-3
          ref_id: NET 3.3
          name: Remote access termination
          description: "Programme: Remote-access sessions terminate automatically after defined inactivity or upon disconnection. Verify: Termination is enforced and logged; abandoned sessions are detected."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:9
          assessable: false
          depth: 1
          ref_id: "9"
          name: SPE 4 - Component security
          description: Component hardening, portable-media control, malware protection, and patch management.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:9
          ref_id: COMP 1
          name: Components and portable media
          description: Components are hardened and portable-media use is controlled.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1
          ref_id: COMP 1.1
          name: Component hardening
          description: "Programme: IACS components are hardened against documented secure baselines (CIS, vendor hardening guides). Verify: Per-component-type hardening baselines exist; deployed components conform; deviations are tracked."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-1
          ref_id: COMP 1.2
          name: Dedicated portable media
          description: "Programme: Portable media (USB drives, optical media) used in the IACS are dedicated, authorized, and controlled (e.g. scanned at a kiosk before use). Verify: Portable-media policy exists; sanitization or scanning is performed before use; uncontrolled media are rejected."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:9
          ref_id: COMP 2
          name: Malware protection
          description: IACS components are protected against malicious code with mechanisms compatible with operational constraints.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2
          ref_id: COMP 2.1
          name: Malware free
          description: "Programme: IACS components are commissioned in a known-malware-free state. Verify: Pre-commissioning malware scans / integrity checks are performed and documented."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2
          ref_id: COMP 2.2
          name: Malware protection
          description: "Programme: Operational malware-protection mechanisms (anti-malware, allowlisting, integrity checks) appropriate to each component type are in place. Verify: Per-component-type malware-protection approach is documented; signatures/baselines are kept current."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2.3
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-2
          ref_id: COMP 2.3
          name: Malware protection software validation and installation
          description: "Programme: Anti-malware software updates and installations are validated against IACS compatibility before deployment. Verify: Update-validation procedure exists; updates are tested before production rollout."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-3
          assessable: false
          depth: 2
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:9
          ref_id: COMP 3
          name: Patch management
          description: Patches are validated, scheduled, applied, monitored, and where deferred, mitigated.
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-3.1
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-3
          ref_id: COMP 3.1
          name: Security patch authenticity/integrity
          description: "Programme: Patches applied to IACS components are authenticated and integrity-verified (signed packages, vendor channels). Verify: Patch-acquisition process verifies authenticity; cryptographic signatures are checked."
          implementation_groups:
            - spe
        - urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-3.2
          assessable: true
          depth: 3
          parent_urn: urn:intuitem:risk:req_node:iec-62443-2-1-2024:comp-3
          ref_id: COMP 3.2
          name: Security patch validation and installation
