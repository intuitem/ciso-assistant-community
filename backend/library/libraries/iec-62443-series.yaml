          ref_id: AVAIL 2.5
          name: Backup restoration
          description: "Programme: Documented procedures restore IACS state from backups, satisfying both the recovery-time objective (RTO — how fast) and the recovery-point objective (RPO — how much state loss is acceptable); for continuous-process plants RPO often matters more than RTO. Verify: Restoration procedures exist, are tested end-to-end, and meet documented RTO and RPO targets per asset class."
