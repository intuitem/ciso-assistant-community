<!doctype html>
<html lang="en">
<head>
    <style>
@page {
    size: A4 portrait;
    margin: 2cm 2.5cm;
    @bottom-center {
        content: "Page " counter(page) " of " counter(pages);
        font-size: 9pt;
        color: #666;
    }
    @bottom-right {
        content: "v{{ version_number }}";
        font-size: 9pt;
        color: #666;
    }
    @bottom-left {
        content: "Generated by CISO Assistant";
        font-size: 9pt;
        color: #999;
    }
}

@page :first {
    @bottom-center { content: none; }
    @bottom-right { content: none; }
    @bottom-left { content: none; }
}

body {
    font-family: 'Source Sans Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.6;
    color: #333;
}

/* Title page */
.title-page {
    page-break-after: always;
    text-align: center;
    padding-top: 8cm;
}

.title-page h1 {
    font-size: 28pt;
    color: #1a1a2e;
    margin-bottom: 1cm;
    border-bottom: 3px solid #3b82f6;
    padding-bottom: 0.5cm;
    display: inline-block;
}

.title-page .meta {
    margin-top: 3cm;
    font-size: 12pt;
    color: #555;
}

.title-page .meta table {
    margin: 0 auto;
    border-collapse: collapse;
    text-align: left;
}

.title-page .meta td {
    padding: 0.3cm 0.8cm;
}

.title-page .meta td:first-child {
    font-weight: 600;
    color: #333;
}

/* Content styles */
.content h1 {
    font-size: 20pt;
    color: #1a1a2e;
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 0.3cm;
    margin-top: 1cm;
}

.content h2 {
    font-size: 16pt;
    color: #1e3a5f;
    margin-top: 0.8cm;
}

.content h3 {
    font-size: 13pt;
    color: #374151;
    margin-top: 0.6cm;
}

.content h4 {
    font-size: 11pt;
    color: #4b5563;
    margin-top: 0.4cm;
}

.content p {
    margin-bottom: 0.4cm;
    text-align: justify;
}

.content ul, .content ol {
    margin-left: 1cm;
    margin-bottom: 0.4cm;
}

.content li {
    margin-bottom: 0.15cm;
}

.content table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5cm 0;
    font-size: 10pt;
}

.content table th {
    background-color: #f3f4f6;
    font-weight: 600;
    text-align: left;
    padding: 0.3cm 0.4cm;
    border: 1px solid #d1d5db;
}

.content table td {
    padding: 0.25cm 0.4cm;
    border: 1px solid #d1d5db;
}

.content table tr:nth-child(even) {
    background-color: #f9fafb;
}

.content blockquote {
    border-left: 4px solid #3b82f6;
    margin: 0.5cm 0;
    padding: 0.3cm 0.8cm;
    background-color: #f0f7ff;
    color: #1e3a5f;
}

.content code {
    background-color: #f3f4f6;
    padding: 0.05cm 0.15cm;
    border-radius: 3px;
    font-size: 10pt;
}

.content pre {
    background-color: #1f2937;
    color: #e5e7eb;
    padding: 0.5cm;
    border-radius: 5px;
    font-size: 9pt;
    overflow-wrap: break-word;
    white-space: pre-wrap;
}

.content pre code {
    background-color: transparent;
    color: inherit;
    padding: 0;
}

.content img {
    max-width: 100%;
    height: auto;
}

.content strong {
    color: #1a1a2e;
}

/* Status badge */
.status-badge {
    display: inline-block;
    padding: 0.1cm 0.4cm;
    border-radius: 4px;
    font-size: 10pt;
    font-weight: 600;
    text-transform: uppercase;
}

.status-draft { background-color: #fef3c7; color: #92400e; }
.status-in_review { background-color: #dbeafe; color: #1e40af; }
.status-published { background-color: #d1fae5; color: #065f46; }
.status-deprecated { background-color: #f3f4f6; color: #6b7280; }
.status-change_requested { background-color: #fee2e2; color: #991b1b; }
</style>
</head>
<body>

<div class="title-page">
    <h1>{{ policy_name }}</h1>
    <div class="meta">
        <table>
            <tr>
                <td>Version:</td>
                <td>{{ version_number }}</td>
            </tr>
            <tr>
                <td>Status:</td>
                <td><span class="status-badge status-{{ status }}">{{ status_display }}</span></td>
            </tr>
            {% if author_name %}
            <tr>
                <td>Author:</td>
                <td>{{ author_name }}</td>
            </tr>
            {% endif %}
            {% if published_at %}
            <tr>
                <td>Published:</td>
                <td>{{ published_at }}</td>
            </tr>
            {% endif %}
            <tr>
                <td>Date:</td>
                <td>{{ date }}</td>
            </tr>
        </table>
    </div>
</div>

<div class="content">
    {{ content_html|safe }}
</div>

</body>
</html>
