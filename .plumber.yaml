# Plumber configuration (https://github.com/getplumber/plumber)
# Generated by: plumber analyze

version: "2.0"
github:
  controls:
    containerImageMustNotUseForbiddenTags:
      enabled: true
      tags:
      - latest
      - dev
      - development
      - staging
      - main
      - master
      containerImagesMustBePinnedByDigest: true
    branchMustBeProtected:
      enabled: true
      namePatterns:
      - main
      - master
      - release/*
      - production
      - dev
      defaultMustBeProtected: true
      allowForcePush: false
      codeOwnerApprovalRequired: true
    externalRefsMustNotCollide:
      enabled: true
    pipelineMustNotEnableDebugTrace:
      enabled: true
      forbiddenVariables:
      - ACTIONS_STEP_DEBUG
      - ACTIONS_RUNNER_DEBUG
    pipelineMustNotLeakSecretsInConfig:
      enabled: true
      # Optional. Defaults to looking up `gitleaks` on $PATH.
      # gitleaksPath: /usr/local/bin/gitleaks
      # Optional. Defaults to gitleaks's built-in rule catalogue.
      # gitleaksConfigPath: .gitleaks.toml
    securityJobsMustNotBeWeakened:
      enabled: true
      securityJobPatterns:
      - '*codeql*'
      - '*dependency-review*'
      - '*trufflehog*'
      - '*gitleaks*'
      - '*osv-scanner*'
      - '*-sast'
      - '*-sast-*'
      - '*-scan'
      - '*scan*'
      - '*-security'
      - '*-security-*'
      - '*-audit'
      - '*-audit-*'
      allowFailureMustBeFalse:
        enabled: true
      rulesMustNotBeRedefined:
        enabled: true
      whenMustNotBeManual:
        enabled: true
    pipelineMustNotUseDockerInDocker:
      enabled: true
      detectInsecureDaemon: true
    actionsMustBePinnedByCommitSha:
      enabled: true
      trustedOwners:
      - actions
      - github
    githubActionMustComeFromAuthorizedSources:
      enabled: true
      trustGithubOfficialActions: true
      trustSameOrgActions: true
      # Explicit allowlist of trusted third-party actions. All entries are
      # SHA-pinned at their call sites (see actionsMustBePinnedByCommitSha).
      # Owner-level wildcards for well-known vendor orgs; exact repos for
      # individual-maintainer accounts.
      trustedGithubActions:
      - astral-sh/*              # setup-uv (uv/ruff maintainers)
      - pnpm/*                   # action-setup
      - docker/*                 # setup-buildx/login/metadata/build-push/setup-qemu
      - google/*                 # clusterfuzzlite
      - azure/*                  # setup-helm
      - losisin/helm-docs-github-action
      - losisin/helm-values-schema-json-action
    workflowMustNotInjectUserInputInScripts:
      enabled: true
    workflowMustNotUseDangerousTriggers:
      enabled: true
    pullRequestTargetMustNotCheckoutHead:
      enabled: true
    workflowsMustDeclarePermissions:
      enabled: true
    reusableWorkflowsMustNotInheritSecrets:
      enabled: true
    workflowMustNotGrantPermissionsWriteAll:
      enabled: true
    actionsMustNotBeArchived:
      enabled: true
    actionsMustNotCarryKnownCVEs:
      enabled: true
